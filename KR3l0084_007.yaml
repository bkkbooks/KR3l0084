front:
  text: 南村輟耕録卷之七
  hash: sha256:b7faed1e8268f164102572b1cb96acce884706bb6faaec843254156cbbd20cfd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_007-1a}
body:
  text: 天台陶宗儀九成魏國趙文敏公孟頫以書法稱䧺一世書入神品其書人但知自魏晋中來晚年則稍入李北海耳嘗見千字文一卷以為唐人字絶無一點一畫似公法度閱至後方知為公書公自題云業廿年來寫千文以百数此卷殆数年前所書當時學禇河南孟法師碑故結字䂓模八分今日視之不知孰為勝也田君良卿於駱駝橋市中買得此卷持来求跂為書其後因思自五歲入小學學書不過如世人漫尓學之耳不意時人持去可以粥錢而吾良卿又捐錢若干緍以購之皆可笑也元貞二年正月十八日子昻題則知公之書所以妙者無帖不習也又嘗見公題所畫馬云吾自㓜好畫馬自謂頗盡物之性友人郭祐之嘗贈余詩云世人但觧比龍眠那知巳出曹韓上曹韓固是過許使龍眠無恙當與之並驅耳然徃徃閱公所畫馬及人物山水花竹禽鳥等圖無慮数十百軸又豈止龍眠並驅而巳哉又聞公偶得米海岳書壮懐賦一卷中闕数行因取刻本摹榻以𥙷其闕凡易五七𥿄終不如意乃嘆曰今不逮古多矣遂以刻本完之公之翰墨爲國朝第一猶且服善如此近有一等人僅能點畫如法便自誇大者於公寧不愧乎吾郷于佩逺先生演題金鰲山詩曰金鰲之山金碧浮重玄寳坊居上頭鍾聲夜渡海門月樹色逺攬豐山秋龍伯國人真妙手掣此巨靈鎮江口丹丘逸士来跨之石窪為尊江當酒黄鬚天子七寳鞭黄頭漁郎櫂江船百年塵跡果何在芒碭雲去山蒼然歴試諸難固天造中興開國何草草腹心有疾日月昏英䧺無聲天地老兩官不歸汴水流此地空傳帝子遊惜無健筆驅風雨一洗江山萬古愁此詩至今膾炙人口山枕海属臨海縣章安鎮𥘉宋髙宗在潜邸日泰州人徐神翁云能知前来事群閹言於徽宗召至以賔禮接之一日献詩於帝曰牡蠣灘頭一艇横夕陽西去待潮生與君不負登臨約同上金鰲背上行及兩宫北狩匹馬南渡建炎庚戌正月三日帝航海次章安鎮灘淺閣舟落帆于鎮之臨濟寺前以俟潮頋問左右曰此何山曰金鰲山又問此何所曰牡蠣灘因黙思神翁之詩乃屏去警蹕易衣徒歩登岸見此詩在寺壁間題墨若新方信其為異人也時住持僧方陞坐道祝聖之詞帝趾忽前聞其稱讃之語甚善戒左右勿驚怖而諦聽之少焉千乗萬騎畢集始知為六飛臨幸野僧𥘉不閑禮節恐怖失措從行有司教以起居之儀山下曰黄椒村村之婦女聞天子至咸来瞻拜龍顔歡聲如雷曰不圖今日得覩天日帝喜敕夫人各自遂便故至今村婦皆曰夫人難易世其稱謂尚然不改宋史但載御舟幸章安鎮而不見金鰲之詳偶與張善𥘉話郷中舊事因筆之善𥘉章安人也吾郷台之黄巖諸山脉絡相連属大江走州治北自州出南門陸行四五里許有委羽山特立不倚形如落舞鳯故得名然州人與之朝夕者俱弗自知其為勝山㫄廣而中深青樹翠蔓䕃翳蓊欝幽泉琮琤若鳴珮環於脩竹間千變萬態不可状其畧中藏洞穴仙家所謂空明洞天者是也好道之士嘗持炬入行兩日不可窮聞櫓聲乃出洞之側産方石周正光澤五色錯雜雖加琢殆不是過大者三四分小者比米粒而小以斧粉碎之亦無不端方見長老言嘗有素服靚妝飄飄若仙之女者當風清月白時則逍遥乎松杉竹栢之下或時變服叩里人門求水火里人所居去洞所不能百歩異其状宻覘之迤邐從洞中去里人以為恠糞其地越数日里人家夜失火埶張甚不可滅室宇一空妻子僅以身免遂離他䖏識者以為厭穢仙境故致此竒禍自是仙女不復出矣余㓜時尚及見里人故址至今有欲得方石者裹糧撮許徃洞口撒之隨意拾地上土則有石在土中不尓絶無有也鎮國上将軍福建宣慰使費榮敏公㮤余内子之曽大父也呉興人今著籍松江之上海噐度弘厚不以富貴驕人輕財好施勇於為義人皆稱曰費佛子陵陽牟先生巘所譔墓誌銘載其事甚詳家之量衡無二致刻銘於斛之四面曰岀以是入以是子孫永如是推此則真古仁人之用心者矣内子之大父良顕侯拱辰父昭武大将軍䧺皆世守其業克不墜先志越楓橋里人丁氏母雙目失明丁至孝每朝盥漱訖即䑛毋之目積有年矣俄而毋左目明未乆右目復明憲司上其事於朝表其閭曰孝子之門至治年間也因讀江南别録彭李者世為義門陳氏之傭夫䘮明巳乆有子一人嘗聞陳之子弟言舜為父瞽叟䑛目而致明乃歸效之不旬日父目忽然明朗右二事誠孝行所感今叚吉父先生毋夫人劉双目乆失明醫弗能愈先生中郷舉一目忽自見物先生及弟一目又如之雖夫人喜溢于中不自知其然而然亦先生學業有成所致與傳曰立身揚各以顕於後世孝之至也其此之謂焉先生諱天祐汴梁蘭陵人仕至江浙儒學提舉火失刺把都者回回田地所産藥也其形如木鱉子而小可治一百二十種證每證有湯引今人家窓户設鉸具或鐡或銅名曰環紐即古金鋪之遺意北方謂之屈戍其稱甚古梁簡父詩織成屏風金屈戍李啇隱詩鎖香金屈戍李賀詩屈膝銅鋪鎖阿甄屈膝當是屈戍回回石頭種類不一其價亦不一大徳間本土巨啇中賣紅刺一塊於官重一兩三錢估直中統鈔一十四萬錠用嵌㡌頂上自後累朝皇帝相承寳重凡正旦及天夀節大朝賀時則服用之呼曰刺亦方言也今問得其種類之名具記于後紅石頭四種同出一坑俱無白水刺淡紅色嬌避者逹深紅色石薄方嬌昔刺泥黒紅色苦木蘭紅黒黃不正之色塊雖大石至低者緑石頭三種同出一坑助把避上等暗深緑色助木刺中等明緑色撒卜泥下等帯石淺緑色鴉鶻紅亞姑上有白水馬思艮底帯石無光二種同坑青亞姑上等深青色你藍中等淺青色屋撲你藍下等如氷様帶石渾青色黄亞姑白亞姑猫睛猫睛中含活光一縷走水石新坑岀者似猫睛而無光甸子你捨卜的即回回甸子文理細乞里馬泥即河西甸子文理麄荆州石即襄陽甸子色變趙生者宋宗室子也家苦貧居閩之深山業薪以自給一日伐木溪滸忽見一巨蛇章質盡白昻首吐舌若將噬已生棄斧斤奔避得脫妻問故具以言因竊念曰白䑕白蛇豈寳物變幻邪即拉夫同徃蛇尚宿留未去見其夫婦来回首遡流而上尾之行数百歩則入一岩穴中就啓之得石石隂刻押字與歲月姓名乃黄巢手瘞治為凢穴中穴置金甲餘八穴金銀無筭生掊取畸零仍舊掩蓋自是家用日饒不復事事鄰家疑其為盜告其姊之夫嘗為吏者吏詢之嚴不敢隱隨餽白金五錠吏貪求無厭訟之官生不獲巳主一巨室悉以九穴奉巨室廣行賄賂有司莫能問迨帥府特委福州路一官徃㢘之巨室私献金甲因回申云具問本根所以實不曽掘發寳蔵其事遂絶路官得金甲珍襲甚至任滿他適其妻徙置榻下一夕聞繞榻風雨聲頃刻而止頗恠之夫歸共取視鐍鑰如故啔籠乃無有也生無子夫婦終老巨室嗟夫天地間物茍非我有雖得之亦終失也巢之亂唐天下剽掠寳貨歴三四百年至于我朝而為編民所得民固得之不能保之而卒歸於富家其路官得金甲自以為子孫百世計一旦作神物化去是皆可為貪婪妄求者勸今以妓為官奴即官婢也周禮天官酒人奚三百人注今之侍史官婢唐鄭能番禺雜記廣中僧有室家者謂之火宅僧宋陶糓清異録京師大相國寺僧有妻曰𣑽㛮王子年拾遺記石季倫有妾名朔風及色衰退為房老孟蜀主一錦𬒳其闊猶今之三幅帛而一梭織成𬒳頭作二穴若雲版様盖以叩于項下如盤領状兩側餘錦則擁覆于肩此之謂鴛衾也楊元誠太史言兒時聞尊人樞宻公云嘗於宋官庫見之宋季叅政家公鉉翁於杭将求一容貌才藝兼全之妾經旬餘未能愜意忽有奚奴者至姿色固羙問其藝則曰能温酒左右皆失笑公漫尓留試之及執事𥘉甚熱次略寒三次微温公方飲既而毎日並如𥘉之第三次公喜遂納焉終公之身未嘗有過不及時歸附後公携入京公死嚢槖皆為所有因時巨富人稱曰奚娘子者是也吁彼女流賤隸耳一事精至便能動人亦其專心致志而然士君子之學為窮理正心脩已治人之道而不能至於當然之極者視彼有間矣江右胡存齋叅政能折節下士賔客至如家焉故南北士大夫有經過其地無不碩見者每虞閽人不為通刺苟不岀日即於門首挂一牌云胡存齋在家松江在城金世昌者出繼夏氏嘗買廢宅脩葺前㕔梁内有鑿成金世昌三字必昔時客商所記姓名人以為有定数云恒陽㢘文正王希憲字善父畏吾氏由父孝懿王布曽凱官㢘訪使氏焉國初拜中書平章政事秉政日中書右丞劉武敏公整以𥘉附為都元帥騎從甚都詣門求見王之兄弟凡十人後皆至一品内王弟昭文館大學士光禄大夫薊國公希貢猶布衣為通報王方讀書略不荅薊公岀整復凂入言之因令徹去坐椅自㩀中坐令整入整展拜起側立不予之一言整求退謂曰此是我私宅汝欲有所言明日當詣政事堂及出愧赧無人色頃之宋士之在覊旅者寒餓狼狽冠衣襤縷䄂詩求見王之兄弟皆耶揄之薊公復為入言急令鋪設坐椅且戒内人備酒饌出至大門外肅入對坐出酒饌執禮甚恭且録其居止諸儒但言困苦乞歸王明日遂言於世皇皆遂其請是夜諸兄弟問曰今日劉元帥者主上之所倚任反菲薄之江南窮秀才却禮遇如此其至我䓁不能無疑王曰我是國家大臣言動嚬笑繫天下重輕整雖貴賣國叛臣也故折辱之令其知君臣義重若寒士數十皆誦法孔子者也在宋朝不坐燕不與何故而拘執於此况今國家起朔漠斯文不絶如綫我更不尊禮則儒術且将掃地矣王之作興斯文若此是大有功於名教者也許魯齋先生在中書日命牙儈雇一僕役時選一能應對閑禮莭者進郤之曰特欲老實耳他日領一蓬首垢面愚騃之人来遂用之儈請問其故先生曰諺云馬騎上䓁馬牛用中䓁牛人使下䓁人馬上䓁能致逺牛中䓁良善人下䓁易馴若其聦明過我則我反為所使矣假如司馬温公家一僕二十年止稱君實秀才蘇子瞻學士来謁聞而教之明日改稱太参公相公驚問以實告公曰好一僕𬒳蘇東坡教壞了這便是様子至正壬辰春自杭州避難居湖州三月廿三日黒氣亘天電電以雨有物若果核與雨雜下五色間錯光塋堅固破其實食之似松子仁人皆曰娑婆樹子閠月十二日復雨八月過杭州因知三月十八日亦雨如湖州郡人𥘉不以為異及九月十日紅巾犯省治雨核之地悉𬒳兵火無有䖏屋宇如故余弗之信九月廿六日湖州䧟儀鳳橋四向焚戮特甚追思雨核時橋四向為最多信前言不誣也後聞池州亦然與杭日同池州之禍尤可惨也按白樂天詩集載月中嘗墜桂子於天笁寺葉石林王澗雜書亦云仁宗天聖中七月八月兩月之望有桂子從空降如雨其大如豆雜黄白黒二色食之味辛寺僧遵式取以種得二十五本二書豈盡妄耶此理殊不可暁但今又為時䜟尤可異也俗呼牝馬為課馬者唐六典凡牝四㳺五課羊則當年而課之課歲課駒犢也今人之指傭工者曰客作三國時已有此語焦光饑則出為人客作飽食而已今人以米湯和八塩草灰以圑鴨卵謂曰鹹杬子按齊民要術用杬木皮淹漬故名之若作圓字寫則誤矣官制資品文宗之御奎章日舉士虞集博士柯九思常侍從以討論法書名畫為事時授經即掲徯斯亦在列比之集九思之承寵眷者則稍䟽因潜著一書曰奎章政要以進二人不知也萬㡬之睱毎賜披覽及晏朝有畫授經郎献書圖行于世厥有深意存焉句曲外史張雨題詩曰侍書愛題博士畫日日退朝書滿牀奎章閣中觀政要無人知有授經郎盖柯作畫虞必題故云劉信甫揚州人郡富商曹氏奴曹瀕死以孤託之孤漸長孤之叔利孤財妄訴于府曰某家貲産未嘗分析今悉為姪所㩀郡守劉察其詐直之叔之子以父訟不勝漸且憤毒父死而復訴於府曰弟挟怨殺吾父適逹魯花赤馬馬火者受署之𥘉與守不和竟欲置孤法并得以中守引致百餘人皆抑使誣服曰孤俾某等殺叔守受孤賄若干末鞠信甫信甫曰殺人者某也孤實不知守亦無賄既𬒳鍜錬無完膚終無兩辭𥘉信甫先遣人宻送孤至京師避於一逹䆠家嘱之曰慎毋出至是乃厚以金帛賂逹魯花赤孤得無預而信甫减死既岀叩蹕陳告逹魯花赤以罪罷去守復官凡獄訟道里費盖鉅萬計孤歸悉筭償信甫曰奴之富皆主翁之䕃也今主有難奴救脫之分内事耳寧望求報哉力辤不受至正壬辰秋邊宼䧟常州守吏望風奔潰徐婦倡者宼命以佐燕乃憤詈弗從竟剚死之未㡬江浙平章定定来剋復儒流吴寅夫趙君謨等以從逆伏誅嘉興張翔南翼作忠徐倡詩以白于世曰西神峩峩睢孽蔓乗兵塗甿膏國武乏興唶尓尸素營賄朋城弗典守妖孤凌彼章逢之徒冠倫魁能蒲伏讋服倒授太阿傔以承天廓不白暑雨氷綱常淪隨綫絶罔憑胡為優徐倡冶容倚市矜鬕妖驅之俾侑樂頩玉肆詈無凌兢噤謳裭舞餘恕鬟植鬅鬙鉛為鋼刄劃􅈾載營霸灼上升頋守臣鉅儒汗恧䘖愧死莫懲二義磅礴忠義氣獨出下里孰可仍桓桓執夷徒乃反經溝塍尓倡丹衷燭日月易粉黛譽聲繩繩汗瀆流回清􅊹盖呉嘗室其少妹且與生子名教中所不齒者一死固有餘辜趙頗純謹老成乃亦在列可哀也巳隨隱漫録載宋端平二年榮全㩀髙郵城叛召官奴毛惜惜佐酒罵曰汝本徤兒官家何負於汝而反吾有死耳不能為反賊行酒全以刃裂口立命臠之罵至死不絶後閫臣以聞特封英烈夫人且賜廟潘紫岩有詩曰淮海艶姬毛惜惜蛾眉有此萬人英恨無七首學秦女向使裹頭真杲卿玉骨花顔城下土氷䰟雪魄史間名古今無限要金者歌舞筵中過一生噫當是時也姦兇得志埶熖熏天雖厚禄重臣峩冠世儒罔不效力執事戰兢奔走於指麾之下而俳下賤乃能奮不頋身獨何仁與夫徐氏之與英烈夫人同一死耳而無有為之舉申朝廷褒贈封號以為世勸惜㦲北方凡皁鵰作巢所在官司必令人窮巢探卵較其多寡如一巢而三卵者置卒守謢日覘視之及其成鷇一乃狗耳取以飼飬進之于朝其狀與狗無異但耳尾上多毛羽数根而已田獵之際鵰則戾天狗則走陸所逐同至名曰鷹背狗盖至正乙未五月廿三日曰入時平江在城忽聞東南方軍聲且漸近驚走覘視巳無所有但見黒雲一簇中彷彿皆類人馬而前後火光若燈燭者莫知其筭迤邐由西北方而沒惟葑門至齊門居民屋脊龍要悉掲去屋内牀榻屏風俱仆醋坊橋董家雜物鋪失白米十餘石醤一缸不知置之何地此等恠事竟不可暁至正乙未春中書省臣進奏遣兵部員外郎劉謙来江南募民𥙷路府州司縣官自五品至九品入粟有差非舊例之職專茶塩務埸者比雖功名逼人無有碩之者既而抵松江時知府崔思誠惟知曲承使命不問民間有粟與否也乃拘集属縣巨室點科十二名衆皆號泣告訴曽弗之頋輙施拷掠抑使承伏即填空名告身授之平江路逹魯花赤六十不避譴斥力爭以為不可竟無一人應募者崔聞之深自悔赧曹公克明鏗號以齋宛平人為湖廣行省員外郎日麻陽主簿顧淵白致書問訊且以辰砂一包見寄未及啓封漫尓置箧笥中後有憲官過訪因論製藥謂苦無好辰砂公曰我有一故人嘗以此為惠當奉送及取視乃有砂金三兩雜其内公驚嘆曰淵白以我為何如人也時淵白已没呼其子歸之其廉潔如此官至禮部尚書謚文穆王淵字若水錢唐人善山水人物尤長於花竹翎毛㓜時獲侍趙魏公故多得公指教所以傳色特妙天暦中畫集慶龍翔寺兩廡壁時都下劉捴管者捴其事劉命若水於門首壁上作一鬼其壁髙三丈餘難於著筆因取𥿄連黏粉本以呈劉曰好則好矣其如手足長短何若水不得其理因具酒禮再拜求教於劉劉曰子能不耻下問吾當告焉若先配定尺寸畫為躶體然後加以衣冠則不差矣若水受教而退依法為之果善南村輟耕録卷之七終
