front:
  text: 南村輟耕録卷之十九
  hash: sha256:73275fcff4b8b6c1c2deb689a0a8c9c75756c07093171209d72d82763e107e86
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_019-1a}
body:
  text: 天台陶宗儀九成人稟天地五行之氣以生手三陽三隂足三陽三隂合為十二經以環絡一身往來流通無少間斷其脈應於兩手三部焉夫脈者血也脈不自動氣實使之故有九候之法內經云脈者血之府説文云血理分􅏨行體者從􅏨從血亦作脈通釋云五藏六府之氣血分流四體也釋名云脈幕也幕給一體字從肉從􅏨􅏨音普拜切水之邪流也脈自從􅏨取脈行之象無求子云脈之字從肉從􅏨又作爬蓋脈以肉為陽脈以血為隂華他云脈者血氣之先也氣血盛則脈盛氣血衰則脈衰血熱則脈數血寒則脈遲血微則脈弱氣血平則脈緩晉王叔和分為七表八裏可謂詳且至矣然文理繁多學者卒難究白宋淳熙中南康崔子虛隱君嘉彥以難經於六難專言浮沉九難專言遲數故用為宗以統七表八裏而總萬病其説以為浮者為表為陽外得之病也有力主風無力主氣浮而無力為芤有力為洪又沉為實沉者為裏為隂內受之病也有力主積無力主氣沉而極小為微至骨為伏無力為弱遲者為隂主寒內受之病也有力主痛無力主冷遲而少駃為緩短細為澀無力為濡數者為陽主熱外得之病也有力主熱無力主瘡數而極弦為緊有力為弦流利為滑它若九道六極之殊三焦五藏之辨與夫持脈之道療病之方其間玄妙具在四脈玄文及西原脈訣等書世以為祕授始由隱君傳之劉復真先生先生傳之朱宗陽錬師鍊師傳之張玄白髙士今往往有得其法者學者其求諸俗稱四司六局者多不能舉其目古杭夢遊録云官府貴家置四司六局各有所掌故筵席排當凡事整齊都下街市亦有之常時人户每遇禮席以錢倩之四司六局皆可致四司者帳設司厨司茶酒司臺盤司也六局者果子局蜜煎局菜𬞞局油燭局香藥局排辦局也凡四司六局人祗應慣熟便省賔主一半力博古圖宋徽廟朝所修書故世知有博古之名而不知更有稽古等閣蔡京保和殿曲燕記云宣和元年九月十二日皇帝召臣京等燕保和殿臣鯈等東曲水朝於玉華殿上步西曲水循酴醿至架太寧閣登層巒林霄騫鳯垂雲亭始至保和殿三楹楹七十架兩挾閣中楹置榻東西二間列寶玩與古鼎彛器玉在挾閣曰妙有設古今儒書史子楮墨右曰日宣道家金匱玉笈之書與神霄諸天隱文上步前行稽古閣有宣王石鼓歷邃古尚古鑑古作古傳古博古袐古諸閣藏祖宗訓謨與夏啇周尊彛鼎鬲爵斚卣敦盤盂漢晉隋唐書畫多不知識上親指示為言其概今人以善能營生者為經紀唐滕王元嬰與蔣王皆好聚斂太宗嘗賜諸王帛敕曰滕叔蔣兄自能經紀不須賜物韓昌黎作栁子厚墓志云舅弟盧遵又將經紀其家則自唐已有此言世斥貪利之人必曰汝便是龐居士矣蓋相傳以為居士家資巨萬殊用勞神竊自念曰若以與人又恐人之我若不如置諸無何有之鄊因輦送大海中舉家修道總成證果又以為居士即襄陽龐德公釋氏傳燈録龐居士傳云襄州居士龐藴者衡州衡陽縣人也字道玄世本業儒志求真諦德宗貞元初謁石頭遷禪師豁然有省後參馬祖問不與萬法為似者是甚麼人答曰待汝一口吸盡西江水却向汝道遂於言下頓悟玄旨乃留駐參承有偈曰有男不婚有女不嫁大家團欒頭共説無生話元和六年北遊襄漢隨處而居女靈照賣竹鹿籬以供朝夕將入滅謂曰視日早晚以報靈照遽曰日巳中矣而有蝕也居士出户觀視即登父座合掌坐亡居士曰我女機鋒捷矣更延七日州牧于公頔聞之來問居士謂曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖枕公膝而化龐婆走田中謂其子龐大曰汝父死矣龐大曰嗄倚鉏脫去婆為焚燒畢自後莫知其所按此傳知非龐德公明矣但亦不言其富何耶輦財之説特恐後人所傳會耳然今之積金蓄榖倍息計贏校斗斛合􅕛詐欺不得自休息又否則射歉飢彂積授枚識出布籌會入窮日疲極而睡者能以居士之事便作真想豈不為飬生之福哉鄭遂昌言宋巨璫李太尉者國亡為道士號梅溪余童時嘗侍其遊故內指點歷歷如在過葫蘆井揮涕曰是蓋宋之先朝位上釘金字大牌曰皇帝過此罰金百兩近周申父言先表叔祖金二提舉住杭州暗問其室氏乃宋內夫人余年十四五尚猶識之但兩鬢俱秃問知在宫中任此職者例褁巾巾帶之未各綴一金錢每晨用以掠髮入巾故久而致然也因曰吾為內夫人日每日輪流六人侍帝左右以𥿄一畨從後端起筆書帝起居旋書旋卷至暮封付史館內夫人别居一宫宫門金字大牌曰官家無故至此罰金一鎰以二者言之可見宋朝家法之嚴至至乙酉冬朝廷遣官奉使宣撫諸道問民疾苦然而政迹昭著者十不二三明年秋江右儒人黃如徵邀駕上書指數散散王士宏等罪狀且及國家利害斧鉞在前有所不避古之所謂豪傑之士如徵其人者與天子親覽其書喜見于色又虞如徵必為權豪所中顧近臣館榖以俟越數日特授江西等處儒學提舉敕侍衛護送出都如徵感上德意受命而不領職天下共賢之散散王士宏等雖免譴責終以不顯死其書略曰江西布衣書生黃如徴百拜上書皇帝陛下如徴忝生僻土遭遇明時用竭愚衷冒干天聽伏望采覽萬一焉夫皇朝版圖之廣歷古所無法制之良萬世莫易而水旱災變連年不息者實由官皆汙濫民悉怨咨之所致也欽惟陛下憂民之心日夕孜孜遂於去年冬分遣大臣奉使宣撫諸道正欲其察政事之臧否問生民之疾苦禮賢德振貧乏信冤抑起淹滯俾所至之處如陛下親臨焉苟能宣布聖澤各盡乃職則雍熙泰和之治政在今日然江西福建一道地處蠻方去京師萬里外傳聞奉使之來皆若大旱之望雲霓赤子之仰慈母而散散王士宏等不體聖天子撫綏元元之意鷹楊虎噬雷厲風飛聲色以淫吾中賄賂以緘吾口上下交征公私朘剝贓吏貪婪而不問良民塗炭而罔知閭閻失望田里寒心乃歌曰九重丹詔頒恩至萬兩黃金奉使回又歌曰奉使來時驚天動地奉使去時烏天黑地官吏都􅌚天喜地百姓却啼天哭地又歌曰官吏黑􅃮皮燈籠奉使來時添一重如此怨謡未能枚舉皆萬姓不平之氣鬱結于懷而彂諸聲者然也此蓋廟堂遴選非人使生民感陛下憂恤之虛恩受奉使掊剝之實禍陛下於此而不察將何以取法於後世哉如徵無官守無言責所以不憚江河之險不畏斧鉞之誅而詣闕以陳其事者政恐散散王士宏等回覲之日各飾巧言妄稱官清民泰欺詐百端昏蔽主聰陛下不悟為姦邪所賣擢任省臺恣行威福流毒四海則江西福建一道之痛苦與天下共之以此而望隂陽和風雨時年歲登邊隅靜不亦難乎倘陛下不棄芻蕘之言委官察其實迹責以欺天罔民之罪投諸遐荒雪江西福建一道之痛苦以為百官勸則天下幸甚萬世幸甚如陛下以為誹謗大臣置而不問非惟今日禍起蕭墻抑且天下萬世之不幸矣如徵鄙語俗言不知避諱觸犯清蹕罪在不赦請伏鑕以俟命吾鄉錢叔琛氏贇乃武肅王之諸孫也其家在郡城東北隅亭臺沼沚聮絡映帶猶是先朝賜第與余相友善嘗出示所藏鐡劵形宛如瓦髙尺餘闊一尺許劵詞黃金商嵌一角有斧痕蓋至元丙子天兵南下時其家人竊負以逃而死於難劵亦莫知所在越再丙子漁者偶網得之乃在黃岩州南地名澤庫深水內漁意寶物試斧擊之則鐡焉因棄諸幽一村學究與漁鄰頗聞賜劵之説買以鐡價然二人皆不悟其字乃金也有報於叔環之兄者用十斛榖易得青氊復還誠為異事時余就録劵詞一通叔琛又出武肅當日謝表藁併録之昨晚檢閲經笥偶得於故𥿄中轉首已三十餘年矣人生能幾何哉謾志于此詞云維乾寧四年歲次丁巳八月甲辰朔四日丁未皇帝若曰咨尓鎮海鎮東等軍節度浙江東西等道觀察處置營田招討等使兼兩浙鹽鐡制置彂運等使開府儀同三司檢校太尉兼中書令使持節閏越等州諸軍事兼閏越等州刺史上柱國彭城郡王食邑五千户實對一百户錢鏐朕聞銘鄧隲之勳言垂漢典載孔悝之德事美魯經則知褒德䇿勳古今一致頃者董昌僣偽為皆鏡水狂謀惡貫泄染齊人而尓披攘凶渠蕩定江表忠以衛社稷惠以福生靈其機也氛祲清其化也疲羸泰折甌越於塗炭之上師無私焉保餘杭於金湯之間政有經矣志奬王室績冠侯藩溢于旗常流在丹素雖鍾繇刋五熟之釡竇憲勒燕然之山未足顯功抑有異數是用錫其金版申以誓詞長河有似帶之期泰山有如拳之日唯我念功之旨永將延祚子孫使卿長襲寵榮克保富貴卿恕九死子孫三死或犯常刑有司不得加責承我信誓往惟欽哉宜付史館頒示天下表云恩主賜臣金書鐡劵一道臣恕九死子孫三死者出於睿眷形此綸言録臣以絲髮之勞賜臣以山河之誓鎘金作字指日成文震動神祗飛揚肝膽伏念臣從筮仕殆及秉麾每自揣量是何叨忝所以行如履薄動若持盈惟憂福過禍生敢忘慎𥘉護末豈其此志上感宸聰憂臣以處極多危慮臣以防微不至遂開聖澤永保私門屈以常刑宥其必死雖君親囑念皆云必恕必容而臣子為心豈敢傷慈傷愛謹當日慎一日戒子戒孫不敢因此而纍恩不敢乘此而賈禍聖主萬歲愚臣一心按史唐僖宗乾符五年王仙芝餘黨曹師雄寇掠二浙杭州募兵使石鏡都將董昌等將以討之臨安人錢鏐以驍勇事昌為兵馬使中和元年昌為杭州刺史光啓二年昌謂鏐曰汝能取越州吾以杭授汝鏐攻剋之昌遂徒越以鏐知杭州事三年昌為浙東觀察使鏐為杭州刺史招宗景福元年為武勝軍防禦使二年為鎮海節度使乾寧二年昌僣號鏐遺書曰與其關門作天子與九族百姓俱陷塗炭豈若開門作莭度使終身富貴邪昌不聽鏐以狀聞削奪昌官爵委鏐討之三年昌伏誅鏐令兩浙吏民上表請兼領浙東朝廷不得已以為鎮海鎮東莭度使改威勝曰鎮東天復二年進爵越王天祐元年更封吳王梁太祖開平元年以為吳越王乾化二年加尚父末帝貞明二年以為諸道兵馬元帥三年以為天下兵馬元帥龍德三年以為吳越王鏐始建國儀衛名稱多如天子之制惟不改元置百官有丞相侍郎客省等使唐明宗天成四年削鏐官爵初鏐嘗遺安重誨書辭禮甚倨及朝廷遣奉使烏昭遇韓玫使鏐還玫奏昭遇見鏐稱臣拜舞重誨奏賜昭遇死鏐以太師致仕自餘官爵皆削之長興三年鏐卒鏐寢疾出卯鑰授子元􅗕曰子孫善事中國勿以易姓廢事大之禮卒年八十一史稱乾寧三年秋九月以鏐為鎮海鎮東莭度使而劵詞乃四年秋八月何邪史稱儀衛名稱多如天子之制惟不改元程大昌演蕃露云寶正六年歲在辛卯見封落星石制書辛卯乃唐明宗長興二年寶太元年羅隱記新城縣記云癸未歲癸未乃唐莊宗同光元年以此知吳越雖稟中原正朔既長興同光年號與其寶正寶太同歲而名不同知吳越自嘗改元審矣又僧文瑩湘山野録云唐昭宗以錢武肅平董昌拜為鎮海鎮東節度使中書令賜鐡劵羅隱為撰謝表殆莊宗入洛又遣使貢奉懇請玉册金劵有司定議非天子不得用後竟賜之鏐即以節鉞授其子元􅗕自稱吳越國王名其居曰殿官屬悉稱臣又於衣錦軍大建王册金劵詔書三樓遣使册東夷諸國對拜其君長幾極其藝與向之謝表所陳處極防微纍恩賈禍之誡殊相戾矣禪月貫休嘗以詩投之有滿堂花醉三千客一劔霜寒十四州之句鏐愛其詩遣客吏諭之曰教和尚改十四為四十方與見休性匾分謂吏曰州亦難添詩亦不改然間雲野鶴何天而不飛邪遂飄然入蜀鏐後果為安重誨奏削王爵以太師致仕重誨死明宗乃復鏐爵位夫武肅之踰越固莫逃乎二書所論有教子射字法必須彼我二人俱聰明熟於翻切優於記問者方乃便捷倘遇人以詩詞或言語示我彼在隔坐不及知聞我則拊掌彼便説出與所示同然片假文章皆可成誦非特一句一字而巳用拊掌代擊鼓殊無勾肆市井俗態此天下太平優遊無事謾以取一時之笑樂耳使鼙鼓之聲震天干戈之鋒耀日又能留情於此邪字法七字詩十二句逐句排寫前四句括定字毋後八句括定叶韻詩曰輕輕牽兵兵邉平平便明明眠逢興興掀征征煎經經堅迎迎年俜俜偏停停田應應煙成成涎聲聲羶清清干澄澄纏星星鮮晴晴涎丁丁顛檠檠虔盈盈延能能稱稱千非精精煎零零連汀汀天橙橙纏東蒙鍾江支茲為微魚胡模齊乖佳灰咍真諄臻匡虧元魂痕寒歡關山先森蕭宵爻豪歌戈麻陽唐耕斜滎青蒸登尤侯車侵潭談鹽添橫光凡如欲切春字清諄清清千春清字在第三行第一字諄字在第七行第四字拊掌則前三後一少歇又前七後四下字平聲為霞盈麻盈盈延霞盈字在第三行第七字麻字在第十行第二字拊掌則前三後七少歇又前十後二少歇又三蓋夏字去聲所以又三也若入聲則四矣餘倣此但字毋不離二十八字而叶韻莫逃五十六字此為至要後見賔退録一則與此略同併志之其曰俗間有擊鼓射字之伎莫知所始蓋全用切字該以兩詩詩皆七言一篇六句四十二字以代三十六字毋全用五支至十二齊韻取其聲相近便於誦習一篇七句四十九字以該平聲五十七韻而無側聲如一字字毋在第三句第四字則鼓節前三後四叶韻亦如之又以一二三四為平上去入之别亦有不擊鼓而揮扇之類其實一也詩曰西希低之機詩資非卑妻欺癡梯歸披皮肥其辭移題擕持齊時依眉微離為兒儀伊鋤尼醯雞箆溪批毗迷此字毋也羅家瓜藍斜凌倫思戈交勞皆來論留連王郎龍南關盧甘林巒雷聊鄰簾櫳羸婁參辰闌楞根彎離驢寒間懷橫榮鞋庚光顔此叶韻也松江之橫雲山古冡纍纍然世傳以為多晉陸氏所藏山人封生業盜冡至正甲辰春彂一冡冡磚上有太元二年造五字按太元東晉武帝時也逆數而上計九百一十餘年矣或者謂冡有志石恐事泄袐弗示人冡中得古銅罍勺壷洗尊鼎雜器物二百餘件內一水滴作獅子昻首軒尾走躍狀而一人靣部方大髭須飄蕭騎獅子背左手握無底圓桶右手臂鷹人之腦心為竅以安吸子吸子頂微大正蓋腦心儼一席帽胡人衣摺及獅鷹羽毛種種備具通身青緑吸子渾若碧玉論其製作膚理則非晉人所能乃漢器無疑必其平生寶惜而以循葬約長五寸髙四寸許誠竒物也士安偶過生生出以售捐錢五十緡買之歸剔鑿沙土飾澤蠟石神氣百倍於昔韞櫝保藏時以示博古好雅者一日為有藝力時貴奪去昔鮮于困學公嘗畜一水滴正與士安者大同小異相承曰蠻人獅子愛之未嘗去手寓杭州斷橋日臨湖有水閣倚闌把玩偶墜吸子於湖水中百計求之不可見悒快慨嘆形神為之凋枯既它往踰三年復來杭仍居昔所寓舍追懷故物注視湖波適當霜降水淨之時吸子儼在土內亟命僕下取欣然如獲至珍即易號曰神人獅子遂序述顛未求館閣諸老與夫騷人雅士歌咏以張之浸成巨軸公殁子孫不能世守水滴與詩卷皆歸婺州陶氏陶亦不能久有又將求善賈而沽諸今不知所在自我朝百餘年來僅聞公得其一於先而士安得其一於今非若它古銅器比可以屈指數也中書左丞葉公亦愚李錢唐人宋太學生上書詆賈似道公田關子不便專權誤國似道怒嗾林德夫告公泥金飾齋扁不法令獄吏鞫之云只要尓做一箇麻糊公即口占一詩曰如今便一似麻糊也是人間大丈夫筆裏無時那解有命中有處未應無百千萬世傳名節二十三年非故吾寄語長安朱紫客盡心好上帝王書遂遭黥流嶺南及蒙恩放還與似道遇諸途公以詞贈云君來路吾歸路來來去去何時住公田關子竟何如國事當時誰汝誤雷州户崖州户人生會有相逢處客中頗恨乏蒸羊聊贈一篇長短句歸附後入京上書言時相併獻至元鈔樣此樣在宋時固嘗進呈請以代關子朝廷不能用故今别改年號復獻之世皇嘉納便用鑄板以功纍官至今任而終歌妓順時秀姓郭氏性資聰敏色藝超絶教坊之白眉也翰林學士王公元鼎甚眷之偶有疾思得馬版腸充饌公殺所騎千金五花馬取腸以供至今都下傳為佳話時中書參政阿魯溫尤屬意焉因戲謂曰我比元鼎如何對曰參政宰相也學士才人也燮理隂陽致君澤民則學士不及參政嘲風咏月惜玉憐香則參政不如學士參政付之一笑而罷郭氏亦善於應對者矣至正辛丑四月朔日日未沒三四竿許忽然無光漸漸作蕉葉樣天且昏黑如夜星斗粲然飯頃方復舊天再明星斗亦隱又少時乃沒按天官書王隱晉書曰日無光臣有隂謀京房易傳曰臣專刑兹謂分威蒙微而日不明至正壬寅八月中上海縣三十四保辰字圍金夀一家巳閹雄狗生小狗八其一觜瓜紅如鮮血然犬之為妖多見於占驗之書而未有若此者若男變為女男子孕育則嘗聞之古昔蓋陽衰隂盛兵戈亂離之兆今夫牡物而生兒陽化隂也又犬屬火一觜瓜紅紅亦火也豈非主兵立火者與甲辰四月十三日華亭縣五保楊巷邵浦雲之西清菴廊屋一十九間每間屋柱皆有聲其聲若以桶覆水靣而擊其底者人以手按之則振掉而起經時乃止按乾坤變異録人君宮室無故有音聲主兵起若人家主家亡六月二十三日夜四更松江近海去處潮忽驟至人皆驚訝以非正候至辰時潮方來乃知先非潮也後見湖泖人説湖泖素不通潮忽平擁起髙三四尺若潮漲之藝正與此時同又聞平江嘉興亦如之按五行志水自盈溢主兵興乾坤變異録河水大壅臣下執政有背叛國朝品官母妻四品贈郡君五品贈縣君然古邦君之妻邦人曰小君禮士喪妾不得匹其夫必曰君妻曰女君後世封羊祜妻為萬嵗君則此可為令甲之原人之四支百骸莫不畏寒獨靣則否醫書謂頭者諸陽之會諸隂脈至頸及胸而還獨諸陽脈上至頭所以然也南村輟耕録卷之十九
