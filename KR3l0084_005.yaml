front:
  text: 南村輟耕録卷之五
  hash: sha256:7462aab83ecdd69d1ed9048b15cf329d323c1750b95539435234fc73affbfe6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_005-1a}
body:
  text: 天台陶宗儀九成金華黃先生溍嘗云子將以舉子經學取科第有一賦題曰角端亦曽求其事實否乎余曰未也因記史記司馬相如傳獸則麒麟角端之語退而閲之按注郭璞曰角􅗧音端似猪角在鼻上堪作弓又云似麒麟而無角毛詩疏云麟黃色角端有肉張揖云角端似牛角可以為弓以此推之豈亦麟之屬與及考符瑞志名臣事略癸辛雜識等書乃始得其詳蓋太祖皇帝駐師西印度忽有大獸其髙數十丈一角如犀牛然能作人語云此非帝丗界宜速還左右皆震懾獨耶律文正主進曰此名角端乃旄星之精也聖人在位則斯獸奉書而至且能日馳萬八千里靈異如鬼神不可犯也帝即回馭載稽之前志神禹氏治水功成天降飛莵曰行三萬里而未嘗善言也又后土趺蹄之獸至善言而未聞其獨角也軒轅獲飛黃而獨角漢武獲獸并角而五蹄又未嘗聞其能言善馳也及聖祖誕膺天命而角端出焉夫一角者所以明海宇之一而萬八千里之􅍱者所以示無逺弗屇此又天將開天下於大一統之象也至正庚寅江浙鄉試八月二十二日夜二鼓院中倣佛見一物馳過甚疾其狀若猛獸者軍卒從而喧閧因出角端為賦題劈正斧以蒼水玉碾造高二尺有奇廣半之遍地文藻粲然或曰自殷時流傳至今者如天子登極正旦天壽節御大明殿㑹朝時則一人執之立於陛下酒海之前盡所以正人不正之意興隆笙在大明殿下其制植衆管于柔韋以象大匏上鼓二韋槖按其管則簧鳴簨首為二孔雀笙鳴機動則應而舞凡燕㑹之日此笙一鳴衆樂皆作笙止樂亦止尚食局進御麥麵其磨在樓上於樓下設機軸以旋之驢畜之蹂踐人役之往來皆不能及且無塵土臭穢所侵乃巧工瞿氏造者大德間僧膽巴者一時朝貴咸敬之德壽太子病㿀薨不魯罕皇后遣人問曰我夫婦崇信佛法以師事汝止有一子寧不能延其壽邪答曰佛法譬猶燈籠風雨至乃可蔽若燭盡則無如之何矣此語即吾儒死生有命之意異端中得此亦可謂有口才者矣鄧光薦先生剡號中齊廬陵人宋亡以義行著其所賦鷓鴣詩曰行不得也哥哥瘦妻弱子羸牸䭾天長地闊多網羅南音漸少北語多肉飛不起可奈何行不得也哥哥其意可見又有所􅐌文丞相像曰目煌煌兮疏星曉寒氣英英兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼孰謂斯人不在世間汪元量先生大有號水雲天兵平杭日詩曰西塞山邊日落處北關門外雨來天南人墮淚北人笑臣甫低頭拜杜䳌又曰錢塘江上雨𥘉乾風入端門陳陳酸萬馬亂嘶臨警蹕三官灑淚涇鈴鸞童兒賸遣追徐福癘鬼終當滅賀蘭若說和親能活國嬋姢應是嫁呼韓此語尤悲哽先生詩有水雲集徐文獻公琰字子方至元間為陜西省郎中有屬路申解到省誤漏聖字案吏指為不敬議欲問罪公改其牘云照得來解內第一行脫去第三字今將元文隨此發下可重别申來時皆稱為厚德長者後至元間太師伯顔出太府監所藏歷代玉璽磨去篆文改造押字圖書及鷹墜等物以分散其黨與蓋先巳奏請故也獨唐武一璽玉色瑩白製作如官印璞瑾半寸許因不可它用遂付藝文監收之竟獲永存豈武氏之智能逆料之乎天子郊祀與祭太廟日百官陪位者皆法服凡披秉須依歌訣次第則免顛倒之失歌曰襪履中單黃帶先裙𫀆蔽膝綬紳連方心曲領藍腰帶玉佩丁當冠笏全孛术魯中羽子翬公在翰林時進講罷上問曰三教何者為貴對曰釋如黃金道如白璧儒如五穀上曰若然則儒賤耶對曰黃金白璧無亦何妨五穀於世其可一日闕哉上大說授時曆要法歌曰授時曆法君要知但以九年舊曆推古云但看九年兔望日便是今年正月一月大月小起𥘉一看其𥘉一天地支天不言干者為詩句所拘然舉支以見干也當推九年前曆每月𥘉一是何干支便以此干支依後法數去大月天干五支九且如大月天干五地支九假令𥘉一日甲子甲至戊五數也子至申九數也即以戊申為今月朔小月天四池八耦且如小月天干四地支八假令𥘉一日丙寅丙至巳四數也寅至酉八數也即以巳酉為今月朔古云前九之年起算法大月五九小四八月大三十日無差如初一日巳酉數至次月翔見巳卯即月大也月小分明只草九如月翔數至次月翔止草九日即月小也節氣只慿九年曆假若造甲午年曆則看丙戌年莭氣二十四氣真端的要知今日莭氣則看前九年中是何莭氣天干三數地支七假如癸亥日癸見乙三數亥見己七數也熟記心中須歷歷定時二十四年取逢時遇八君無慮如逢子時交節氣却用未時亦交也中氣如之若依此法箇中推方省隂陽玄奧處閏月本來中氣無古云閏月無中氣何勞物外更它圖世人諳得神仙術不是愚氓是丈夫又歌曰九年二月半便是正月一前九年二月十五日辰即今年正月𥘉一日辰該九十七箇半月二千八百八十日六甲轉四十八周只九年中取大小無差失又歌曰若要求立春相衝對食神假如前九年甲子日立春甲食丙子衝午即今年丙午日立春也二十四氣准此閏月無中氣說與惺惺人又一法云古有數九九之語蓋自至後起數至九九則春巳分矣正如至後一百六日為寒食之類豈特此為然凡推算皆有約法推閏歌括云欲知來歲閏先算至之餘更看大小盡决定不差殊謂如來歲合置閏止以今年冬至後餘日為率且如今年十一月二十二日冬至則本月尚餘八日則來年之閏當在八月或小盡則七月若冬至在上旬則以望月為斷十二日足則復起一數焉推節氣歌括云中氣與節氣但有半月隔若要知仔細兩時零五刻謂如正月甲子日子時𥘉𥘉刻立春則數至巳卯日寅時正一刻則是雨水節也推立春歌括云今歲先知來歲春但隔五日三時辰謂如今年是甲子日子時立春則明年合是己巳日卯時立春若夫刻數則用前法推之又求節氣歌曰驚蟄五時二刻求清明十時四刻流立夏一日三時六芒種一日九時周小暑二日二時二立秋二日七時四白露三日零六刻寒露三日六時至立冬三日十一二大寒四日四時四小寒四日九時六五日三時交新歲節遇子時加一日此為捷法君須記又一年約法云一周年三百六十五日零三時一月節三十日零五刻二刻半月一氣十五日零二時五刻又食神定法云甲食丙乙食丁丙食戊丁食已戊食庚巳食辛庚食壬辛食癸壬食甲癸食乙其捷要但取我生之干陽配陽隂配隂是也又時刻約法歌云二十四氣漸差除循環時刻四同途單逢正四換𥘉一正三依舊復𥘉𥘉又乘除法推算二十四氣時刻云其法不論何歲何月但以日為百數時為十數刻為零數𥘉一至𥘉十於百上下數如遇𥘉十於千上下數假如正月十一日亥正一刻立春欲求中氣則先下一千一百數十一日故也再下十二數亥時故也如子一丑二之類復加一千五百二十五數共得二七三三則二十七日寅𥘉二刻雨水也何以知為𥘉二刻蓋零一數𥘉𥘉刻二數𥘉一刻三數𥘉二刻四數𥘉三刻五數正𥘉刻六數正一刻七數正二刻八數正三刻此立成法也今零三數是乃𥘉二刻矣欲求二月節則於前數上加一五二五即前一千五百二十五也此項數節氣中氣皆以之加用為前正月小盡除去二十九日如遇大月除去三十日算中氣則不除大小月剩下一三五八則十三日辰時正三刻驚蟄也餘倣此十二時為一日如遇十三時刻以上則退十二時為一日八為一時如遇九刻以上則退八刻為一時也執披賈釋云謂以葬時乘人故有柩車前執引者及在柩車傍執披者皆御治之又注云居柩車之前若道有位仰傾虧則以布為抑揚左右之節使執引者執披者知之也道有低謂下阪時也道有仰謂上阪時也傾虧謂道之兩邊在柩車左右轍有髙下也若道有低則抑下其布使執引者知其下阪也若道有仰則揚舉其布使執引者知其止阪也若柩車左邊右邊或髙下傾虧亦左右布使知道有傾虧也假令車之東轍下則抑下其布向東使西邊執拔者持之若車之西轍下則抑下其布向西使東邊執披者持之所以然者使車不傾虧也大夫御柩以茅諸候以羽葆天子以纛指引前後左右皆如功布之施為也又既夕禮將葬啓肂音異也商祝免袒執功布入自西階注云功布灰治之布也執之以接神為有所拂㧍方罔反賈釋云拂㧍猶言拂拭也故下經云商祝拂柩用功布是拂拭去塵也此始告神而用功布拂拭謂拂拭去凶邪之氣也出聶崇義三禮圖錢唐陳鑑如以寫神見推一時嘗持趙文敏公真像來呈公援筆改其所未然者因謂曰唇之上何以謂之人中若曰人身之中半則當在臍腹間蓋自此而上眼耳鼻皆雙竅自此而下口暨二便皆單竅三畫陽三畫隂成泰卦也杭人削松木為小片其薄如紙鎔疏黃塗木片頂分許名曰發燭又曰碎兒蓋以發火及代燈燭用也史載周建德六年齊后妃貧者以發燭為業豈即杭人之所製與宋翰林學士陶公穀清異録云夜有急苦於作燈之緩有知者批杉條染疏黃置之待用一與火遇得𦦨穗然既神之呼引光奴今遂有貨者易名火寸按此則焠寸聲相近字之僞也然引光奴之名為新沈仲說古姑蘇人年四十未有子其妻鄒氏候其他適為置一年少貌美之妾及歸命出拜將以奉枕席仲說詢其鄉貫祖父來歷始不肯言詢之再泣而曰妾范復𥘉女也父喪家貧老母見粥於此仲說惻然淚下因囑妻曰此女父吳中名士乃吾故人豈可以為妾當如已子視之即尋其母使擇壻仲說備奩具嫁之邦人稱之至今不置夫嫁人之女之為妾為妓為娼者古有其人矣今則未聞也仲說誠賢矣哉中書左丞李忠宣公德輝字仲寶通州潞縣人至元七年庚午公為戶部尚書歲旱蝗世祖特命公録山西河東囚行至懷仁民有魏氏發得木偶持告其妻挾左道厭勝謀殺巳經數獄服詞皆具自以為不冤公燭其誣召鞠魏妾搒掠一加服不移晷蓋爐其女君謂獨陷以是罪可必殺之也即直其妻而杖其夫之溺愛受欺當妾罪死觀者神之或咨賞泣下姚忠肅公至元二十年癸未為遼東按察使武平縣民劉義訟其嫂與其所私同殺其兄成縣尹丁欽以成尸無傷憂悶不食妻韓問之欽語其故韓曰恐頂𩕄有釘塗其迹耳驗之果然獄定上讞公召欽諦詢之欽因矜其妻之能公曰若妻處子邪曰再醮今有司開其夫棺毒與成類並正其辜欽悸卒時比公為宋包孝肅公極云嘗聞諸翰林大老云古碑刻中單書國號曰漢曰宋者蓋其建國號詔曰漢曰宋也我朝大元二字在詔旨不可單用又凡書官銜俱當從實如廉訪使總管之類若曰監司太守是亂其官制久遠莫可考矣又篆蓋二字止可施諸壙石若於碑須曰篆額為是詹成者宋髙宗朝匠人雕刻精妙無比嘗見所造鳥籠四靣花版皆於竹片上刻成宫室人物山水花木禽鳥纎悉具備其細若縷而且玲瓏活動求之二百餘年來無復此一人矣劉須溪先生㑹孟題蘇李泣别圖云事已矣泣何為蘇武節李陵詩噫馮海粟先生子振題楊妃病齒圖云華清宫一齒痛馬嵬坡一身痛漁陽鼙鼓動地來天下痛陳伯敷先生繹曽題楊妃上馬嬌圖云此索淸平調詞赴沉香亭時邪抑聞漁陽鼙鼓聲赴馬嵬坡時邪上馬固相似情狀大不同觀者當審諸余觀三先生之跋語痛快嚴峻抑揚感傷使後世之為人君而荒於色為人臣而失其節者見之寧不知懼乎張毅父先生千載廬陵人而宋丞相文公友也公貴顯時屢以官辟不就江南既內屬公自廣還過吉州城下先生來見曰今日丞相赴北某當偕行既至燕寓于公囚所側近日以美饌餽凡三載始終如一且潜製一櫝公受刑日即以藏其首復訪求公之室毆陽氏於俘虜中俾出焚其尸先生收拾骸骨􅊞以重􅌩與先所函櫝南歸付公家葬之後公之子忽夢公怒云繩鋸髮斷明日啓視果有繩束髮其英爽尚如此劉須溪紀其事􅐌子公畫像上曰間居忽忽萬古咄咄天風慘然如動生髮如何尋約亦念束髮豈其英爽猶纍形軀同時之人能不顙泚昔忌其生今爐其死鄧中齊題曰目炯炯兮踈星曉寒氣鬱鬱兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼曽謂斯人不在世間宋季年群亡賴子相聚乘舟鈔掠海上朱清張瑄最為雄長隂部曲曹伍之當時海濵沙民富家以為苦崇明鎮特甚清嘗傭楊氏夜殺楊氏盜妻子貨財去若捕急輒引舟東行三日夜得沙門島又東北過髙句麗水口見文登夷維諸山又北見燕山與碣石往來若風與鬼影迹不可得稍怠則復來亡慮十五六返私念南北海道此固徑且不逢淺角識之杭吳明越楊楚與幽薊萊密遼鮮俱岸大海固舟航可通相傳朐山海門水中流積淮淤江沙其長無際浮海者以竿料淺深此淺生角故曰料角明不可度越云廷議兵方興請事招懷奏可清瑄即日來以吏部侍郎左選七資最下一等授之令部其徒屬為防海民義隸提刑節制水軍江南既內附二人者從宰相入見授金符千户時方挽漕東南供京師運河隘淺不容大舟不能百里五十里輒為堰潴水又絶江淮遡泗水吕梁彭城古稱險處㑹通河未鑿東阿荏平道中車運三百里轉輸艱而糜費重二人者建言海漕事試之良便至元十九年也上方注意嚮之𥘉年不過百萬石後乃至三百萬石二人者父子致位宰相弟姪甥壻皆大官田園宅館遍天下庫藏倉庾相望巨艘大船帆交蕃夷中輿騎塞隘門巷左右僕從皆佩於莵金符為萬户千户纍爵積資氣意自得二人者既滿盈父子同時夷􅓍殆盡沒資産縣官黨與家破禁錮大德六年冬也見胡石塘先生所撰何長者傳陳子方閔仲逹同舍生也皆待次杭府史陳月日在前閔以計力反先之陳殊無怒意因赴都以薦舉入仕厯官浙西廉訪司僉事閔方升書吏聞陳來嘆曰復何面目見之遂稱疾不出陳下車即問左右曰閔仲逹何在衆以疾對陳曰必為我故非疾也亟造其家閔皇恐出肅陳曰吾與君氣誼契厚君昔先我而食祿者命也使非此吾又能致是耶今幸同一公署惟有以教正之幸甚寧舍我與閔感激從事相好如𥘉吾鄉周待制先生仁榮字本心築一室才落成友人楊公道輿疾至門曰願假君新宅以死先生讓正寢居之妻子咸不然先生弗顧未幾楊死箱財草八莫有主者楊之弟詣先生求分財先生若兄寄死于我意固在是喪事之費自巳出終不利其一毫對衆封藉自平陽呼其子來悉付與之福州鄭丞相府清風堂石階上有卧尸迹天隂雨時迹尤顯蓋其當宋季以暮年登科未幾拜相至令閭巷表之曰耆德魁輔之坊鄭顯時侵漁百姓至奪其屋廬以廣居宅有𬒳逼抑者遂自殺於此今所居為官藝豪奪子孫不絶如線因記宋臨川吳曽能改齊漫録云建炎四年五月楊勍叛卒由建安冦延平道出小常村掠一婦人逼脅欲犯之婦人毅然誓死不受汚遂遇害橫尸道傍賊退人為收瘞之而其尸枕藉處痕迹隱然不滅每雨則其迹乾晴即溼宛如人影往來者莫不嗟異鄉人或削去之隨即復見覆以它土而其迹愈明今三十年矣與順昌軍貟范旺事略同但范現迹街碑而此現於土上耳范死以忠婦死以莭小常村去劒浦縣治二十里以漫録言之則二人之死足以驚動萬世宜其英烈之氣不泯如此若清風堂者不過冤抑之志不伸以决絶於一時耳亦何為而然哉豈幽憤所積結致是邪此理殆不可曉翰林學士盧踈齊先生摯字處道涿郡人坐右銘大書一天字其下細注六字云有記性不急性可謂知畏天者也杭瑪瑙寺僧溫日觀能書所畫蒲萄須梗枝葉皆草書法也􅒏嗜酒然楊總統飲以酒則不一沾唇見輒罵曰掘墳賊掘墳賊云李仲謙思讓滕州鄒縣人前至元間由嘉興路吏貟𥙷浙西按察司書吏廉介有為上侍父母下撫兩弟每退食自公則閉户讀書稽今考古而教訓之俸薄奉養不給婦躬紡績以益薪水之費仲謙止有一布衫或須浣濯𥙷紉必俟休假日至是若賔客見訪則俾小子致謝曰家君治衣弗可出雷彥正號苦齊者清正慎許可人也時為使偶戲謂曰外郎穿布衲到敢裹著珍珠仲謙略不答徐至本案書寫辭退呈狀壓几上而歸使知深悔失言親謁謝過請其出終不允使去它使來復往請始復役後仕至憲官至元三十一年甲午歲節氣正月一日壬子立春二月二日癸未驚蟄三月三日癸丑清明四月四日甲申立夏五月五日甲寅芒種六月六日乙酉小暑七月七日乙卯立秋八月八日乙酉白露九月九日丙辰寒露十月十日丙戌立冬十一月十一日丁巳大雪十二月十二日丁亥大寒武林錢思復先生惟善嘗言年十六七時以詩見息齊李公于州橋寓居既拜公公答拜命坐辭之再公曰仲尼之席童子隅坐因不敢辭徐永之先生為江浙提舉日客往訪之者無間親疏貴賤必送之外門外客或請納步則曰不可婦人送迎不踰閾右二事可見前輩諸老謙恭退抑汲引後進待人接物者如此白廷玉先生珽號湛淵錢唐人家多竹忽一竿上岐為二人皆異之賦雙竹杖詩未幾先生殁先生有二子或以為先兆云南村輟耕録卷之五
