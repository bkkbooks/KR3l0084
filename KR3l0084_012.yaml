front:
  text: 南村輟耕録卷之十二
  hash: sha256:d8a50a4b38f64eea19a5540c155f61c1e56ba3c7abad6d362ee1a26de476aeb3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_012-1a}
body:
  text: 天台陶宗儀九成唐南陽樊宗師字紹述所譔絳守居園池記艱深竒澀讀之徃徃昧其句讀况義乎哉韓文公謂其文不蹈襲前人一言一句觀此記則誠然矣宋王晟劉忱甞為觧釋今不復有偶得滦陽趙仁舉字伯昻箋注本句分字析詞理煥然因書其記傳其句讀以便披覽云有未觧者又須觀全註可也點法為句為讀記曰絳即東雍雍去声為守去声理所禀參所今切實沈分分去声氣畜雨河潤有陶唐兾遺風餘思思去声晉韓魏之相剥剖世說搃其土田士人令無暁口交切雜優宜得地形勝瀉水施法豈新田又蕞猥不可居州地或自有興廢州字或属上句人因得附為奢儉将為守恱致平理與與平声益侈心耗物害時與與平声自将失敦窮華終披夷不可知陴音脾睨也疑作陑孤顛跒倔上苦下切下渠勿切玄武踞守居割有北自甲辛苞大池泓横硤旁潭甲癸次木腔瀑三丈餘或属上句涎玉沬珠子午梁貫亭曰回漣虹蜺雄雌穹鞫覷􅜹時忍切礙佷胡懇切島泜音池淹淹委委平声莎靡縵莫半切蘿薔翠蔓紅刺相拂綴南連軒井陣中湧曰香承守寝睟雖遂切思西南有門曰虎豹左畫虎搏𥙷各切立萬力千氣底音旨彂彘匿地努有腦口牙快抗電火雷風黒山震将合右胡人鬅黄㠾於元切纍力追切珠丹碧錦襖身刀囊華革撾縚土刀切白豹玄斑飫距掌胛意相得東南有亭曰新前含音頷曰槐有槐屓虚器切護䨴欝䕃後頥渠決決縁池西直南折廡赴可宴可衙又東騫渠曰望月騫音軒又東騫窮角池研雲曰柏有柏蒼官青士擁列與槐朋友巉鉏銜切隂洽色北俯渠憧憧來刮級回西巽㬂疑作隅間黄原玦天汾水鈎帶白言謁行旦艮間逺岡青縈近楼臺井閭點畫察可四時合竒士觀雲風霜露雨雪所為去声彂生收歛賦歌詩正東曰蒼塘蹲瀕西􅐯望瑶翻碧㶑光文切􅍢棃深撓撓奴巧切收窮正北曰風隄乗携左右隄埶北回股努墆從計切捩力計切蹴墉䘖渠歆池南楯楹景怪爥蛟龍鈎牽寳龜靈蠯薄猛切一音脾文文章章隂欱呼合切墊都念切㰹呼恬切煙潰靄聚桃李蘭蕙神君仙人衣裳雅冶可㑹脫赤熱西北曰鼇䖶音灰原閙咍呼來切儲虚明茫茫嵬眼􅐓耳可大客旅鍾鼓樂提鷴挈鷺􅷏音弼池豪渠憎乖憐圍正西曰白濵薈烏外切深棃素女雪舞百佾水翠披㬑㬑虚郭切千幅迎西引東土長崖挾横埓埒字音劣日卯酉日或作自樵途隖徑幽委蟲鳥声無人風日燈火之晝夜漏刻詭姽魚毁切絢化大小亭餖池渠間走池隄上亭後前陴乘墉如連山群峯擁地髙下如原隰隄谿壑水引古自源三十里鑿髙槽絶竇墉為或作其池溝􅜲渠瀑潨音叢潺終出汨汨于筆切音滑非街衖畦町阡陌間入汾巨樹木資土悍水沮沮將預切宗族盛茂㫄䕃逺映錦繍交菓枝香畹麗又上下可通作一句絶他郡考其臺亭􅜲池之増盖豪王才侯襲以竒意相勝至今過客尚徃徃有指可創起䖏余退常吁後其能無果有不音否補建者池由於湯及當作反者雅文安薛雅裴文安二人彂土築臺為拒㡬平声附於汙宮水本於正平軌病井滷生物瘠引古沃澣人便㡬附於河渠嗚呼為附於河渠則可為附於汙官其可書以薦後君子長慶三年五月十七日記又見一本亦註觧者不著姓名所分句讀與前畧有不同䖏併附于此絳即東雍為守理所作一句世說土田士人冝得地形勝自将失敦窮華陴孤顛跒倔玄武守居割有北自甲辛苞大池泓横硤㫄作一句潭中癸次木腔作一句瀑三丈餘作一句子午梁虹蜺雄雌穹鞫覷􅜹作一句莎靡縵南連軒井陣左畫虎搏立萬力千氣厎彂作一句彘匿地電火雷風右胡人鬅黃㠾纍珠丹碧錦襖身刀嚢鞾撾縚白豹玄班飫距掌脾作一句有槐屓護䨴作一句欝䕃渠決決縁池西直南折廡赴擁列與槐朋友巽㬂間白言謁行旦艮間逺岡青縈近可四時合竒士觀雲風霜露雨雪所為彂生收歛正東曰蒼塘蹲瀕西􅐯望作一句瑶翻碧㶑正北曰風隄乗携左右作一句隄埶北囬股帑墆捩蹴墉作一句南楯楹景􅏜爥蛟龍鈎牽煙潰靄聚開咍儲虚明茫茫提鷴挈鷺㬑㬑千幅迎西引東日卯酉樵途隖徑幽委蟲鳥声晝夜大小亭餖池渠間間作去声走池隄上亭後前陴乗墉作一句如連山群峯擁地髙下作一句鑿髙槽作一句絶竇墉作句一為此作其池溝􅜲渠瀑潨毎字汨汨街衖畦町阡陌毎字間入汾作一句水沮宗族茂盛作一句㫄䕃逺映錦繡交菓枝香畹麗絶地郡作一句考其臺亭􅜲沚之増後其能無果有不𥙷建者作一句池由於煬及者雅文安作一句誅此本多此字病井滷生物瘠引古沃澣作一句人便㡬附於河渠作一句今寺觀削木為籌置溷圊中名曰廁籌北史齊文宣王嗜酒淫泆肆行彺暴雖以楊愔為相使進廁籌然則愔所進者豈即此與按說文廁清也從广則声韻書𥘉吏切間也雜也次也圊也居髙臨垂邉曰廁髙岸夾水曰廁史記太倉公傳豎奉劍從士之廁汲黯傳衛青大将軍侍中上踞廁見之注如淳曰廁音則謂牀邉㩀牀視之一云溷廁也廁牀邉側漢書注如淳曰廁溷也孟康曰廁邉側也師古曰如說是也仲馮曰廁當从孟說愚意古者見大臣則御坐為起夫武帝固以奴隸待青亦不應踞溷圊而見之然漢文居㶚北臨廁使慎夫人鼓瑟注韋昭曰髙岸夾水為廁即此推之則凡廁者皆取其在兩物間為義又郅都傳賈姬如廁有野彘入廁命都擊之則此之如廁亦恐非是溷圊它如劉安別傳謫守都廁三年荘子庚桑篇適其偃註偃屏廁也屏廁則以偃􅘞儀禮既夕禮甸人築坅坎隸人温廁塞廁萬石君傳建取親中裠厠牏身自澣洒注孟康曰廁行清牏行中受糞凾也至於晉侯食麥脹如廁䧟而卒趙㐮子如廁執豫譲髙祖鴻門㑹如廁召樊噲等及如廁見栢人金日磾如廁擒莾何羅范睢佯死置廁中李斯如廁見鼠陶侃如廁見朱衣王敦如廁食棗劉寔誤入石崇廁郭璞𬒳髮廁上劉季和廁上置香炉沈慶之夢鹵簿入廁中崔浩焚經投廁中錢義廁神李赤廁鬼蒯瞶盟孔悝於廁曹植戒露頂入廁之類則真溷圊矣南方或謂折花曰拗花唐元微之詩試問酒旗歌板地今朝誰是拗花人又古樂府拗折楊栁枝京師教坊官妓連枝秀姓孫氏盖以色事人者年四十餘因投禮逸士風髙老為師而主教者褒必空湛静慧散人之號挾二女童放浪江海間偶至松江愛其風物秀麗将結数椽為棲息所郡人陸宅之居仁甞徃訪焉秀頗不以禮貌因其請作募縁䟽遂為譔之䟽曰京師第一部教坊占排場曽使萬人喝啋道徳五千言公案抽鎖鑰只因片語投機向林下得大道真風指雲間問前縁福地一跳身纔離了百戯棚中圈子双擺手便作箇三清門下閒人赤緊地無是無非到大來自由自在識盡悲歡離合幻打開老病生死関交媾功成隂陽炭燒空慾海脩持行滿雌䧺劒劈破愁城七星冠剛替下鳯頭釵合歡帶生紐做鹿皮袋空非空色非色即色是空道可道名可名强名曰道徃常時紅裙翠䄂生綃帕猛可地草屨麻衣匾皁絛銷金帳冷落風情飬丹炉消磨火性半世連枝帶葉算從前歴盡虚花一朝剗草除根到此際方成結果㝷㡬箇煙霞外逍遥伴侣􅔰多少塵埃中浮浪男児存一點志誠心百事可做少㡬䖏風流債一筆都勾試問它濁酒狂歌争如我清茶淡話迷魂陣當時落䧟人負我我負人縂是虚脾玄関竅今日點開心即道道即心無非妙用牢著眼怕烏飛兎走急回頭早鶴怨猿啼五陵人買笑追歡掉頭不顧三島客談玄論道稽首相迎大都来㡬箇知音多管是前生有分玉楼花下千鍾酒㡬畨歌白苧遏行雲𥿄帳梅邉一炷香從此誦黃庭消永日桃花扇深蔵明月影椰子瓢長醉白雲郷皓齒細要打疊少年歌舞錦心繍腹宣揚老子經文彂科打諢不離機鋒課觜撩牙長存道眼燒夜香非尋佳偶披鶴􅌁星月下禮拜茅君登春臺不望逺人駕鵉車雲霄上追㝷蕭史歌館化為仙館静戯房翻作道房幽净洗燕支見全真本来面目䡖𫾣檀板聽歩虚别是宫商人盡誇七真臺添上箇小孫姑我只道五城山冊立了新王母不比尋常鈎子曽經老大鉗鎚百錬不囬萬夫莫敵疇昔微通一笑白面郞争與纒頭如今頓悟三生青眼人便當擡手既不作入夢朝雲莫雨也須撇等閒秋月春風若教了蒲團上工夫便可到蓬壷中境界肯荘嚴一䖏千年香火是成就到頭陸地神仙金銀鈔等物是必大塊子捨来福禄壽利錢擬定加倍児還你得道者多助看琳宮寳殿日月交輝愛人者必親仗玉磬金鍾晨昏報徳䟽文一出逺迩傳誦以資笑談秀不可留遂宵遁然文雖新竒固近於俳視厚徳君子有間矣而其帷箔之不修者豈偶然哉文貞王阿憐帖木児之夫人舉月思的斤以賢行稱一日有献馬鞭於馬者鞭内暗蔵一鉄簡㧞靶取之則得王喜持示夫人将酬以幣夫人曰君平昔若甞害人則防人之必我害也茍無此心焉用為王悟亟逺之㤗州人袁氏兄弟二人同居飬母至正壬辰紅巾壓境兄弟負母逃避至中途兄念妻子不置辤母歸惟弟與母借居田舎後城䧟其一房盡遭殺戮獨弟之妻子獲免乗間奔避適夫婦父子相㑹時傳為孝行所感杭州行金玉府副縂管羅國噐世榮郡人也天性仁慈有匠人程限稽違案具吏請引决羅曰吾聞其新娶若責之舅姑必以新婦不利口舌之餘不測繫焉姑置勿問後或再犯重加懲治可也夫羅職在造作耳尚能知此而受民命之寄者則反貪墨苛慘惟以鞭朴立威為務哀㢤諺云三代士䆠學不得著衣喫飯按魏書文帝䛇群臣云三世長者知被服五世長者知飲食則古巳有此語吕仲實先生思誠僉浙西憲司事時有自首不合令女習學謳唱者先生案議云男女無父母之命私有所徃王法不許父母違男女之願置之非地公論豈容所首冝不准合依律杖断又有年七十之上而敺人者案議云既能為不能為之事必當受不當受之刑先生文章政事皆過人逺甚而廉潔不汙家甚貧至正閒官至中書左丞先生未顯時一日晨炊不継欲擕布袍質米於人室氏有吝色因戯作一詩曰典却春衫辦早厨老妻何必更躊躇瓶中有醋堪燒菜嚢裏無錢莫買魚不敢妄為些子事只因曽讀数行書嚴霜烈日皆經過次弟春風到草廬後果及弟浙江一名錢唐江一名羅刹江所謂羅刹者江心有石即秦望山脚横截波濤中啇旅船到此多値風濤所困而傾覆遂呼云此事見呉越時僧贊寧傳載中其晝夜二潮甚信上人以詩括之曰午未未未申申卯卯辰辰巳巳巳午午朔望一般輪此晝候也𥘉一日午末𥘉二日未𥘉十五日如𥘉一夜候則六時對衝子午丑未之類漢東宣伯聚先生昭甞作浙江潮候圖說云大江而東凡水之入于海者無不通潮而浙江之潮獨為天下竒觀地埶然也浙江之口有兩山焉其南曰龕山其北曰赭山並峙於江海之㑹謂之海門下有沙潭跨江西東三百餘里若伏檻然潮之入于浙江也彂乎浩渺之區而頓就歛束逼礙沙潭回簿激射折而趍于兩山之間拗怒不洩則奮而上隮如素蜺横空奔雷殷地觀者膽掉渉者心悸故為東南之至險非它江之可同也原其消長之故者曰天河激涌曰地機翕張揆其晨夕之候者曰依隂而附陽曰隨日而應月地志濤經言殊㫖異胡可得而一㢤盖圓則之運大氣舉之方儀之静大水承之氣有升降地有浮沉而潮汐生焉月有盈虚潮有起伏故盈於朔望虚於兩弦息於朓朒消於朏魄而大小凖焉月為隂精水之所在日為陽宗隂之所從故晝潮之期日常加子夜潮之候月必在午而晷刻定焉卯酉之月隂陽之交故潮大於餘月大梁析木河漢之津也朔望之後天地之变故潮大於餘日寒暑之大建丑未也一晦一明再潮再汐一朔一望再虚再盈天一地二之道也月經于上水緯于下進退消長相為生成暦數可推豪釐不爽斯天地之至信幽贊於神明而古今不易者也杭之為郡枕帶江梅逺引甌閩近控呉越啇賈之所輻湊舟航之所駢集則浙江為要津焉而其行止之淹速無不畢聽於潮汐者或違其大小之信爽其緩急之宜則必至於傾墊底滯故不可以不之謹也某承乏兹郡属兵革未弭之秋信使之徃来師旅之進退雖期㑹紛紜邉陲警急必告之曰謹候潮汐毋躁進以自危然而跡累肩摩晨馳夕騖有不能人喻而户說之者考之郡志得四時潮候圖簡明可信故為之說而刻石于浙江亭之壁間使凡行李之過此者皆得而觀之以毋蹈夫觸險躁進之害亦庶乎思患而預防之之意云此說愽極群書辤理超詣而古今之論潮候者盖莫能過之矣因併録之千夫長李某戍天台縣日一部卒妻郭氏有令姿見之者無不嘖嘖稱賞李心慕焉去縣七八十里有私􅐭出没䖏李分兵徃戍卒遂在行既而日至卒家百計調之郭氏毅然莫犯經半載夫歸具以白為属所轄罔敢誰何一日李過卒門卒邀入治茶忽憶得前事怒形於色亟轉身持刄出而李幸脫走訴於縣縣捕繫窮竟案議持刄殺本部官罪死桎梏囹圄中從而邑之悪少年與官之吏胥皁隷輩無有不起覬覦之心者郭氏躬餽食於卒外閉户業績紡以資衣食人不敢一至其家乆之府檄調黃岩州一獄卒葉其姓者至尤有意於郭氏乃顧視其卒日飲食之情若手足卒感激入骨髓忽傳有五府官出五府之官所以斬决罪囚者葉報卒知且謂曰汝或可活我與為義兄弟萬一不保汝之妻尚少汝之子若女纔八九歲耳奚以依頋我尚未娶寧肯俾為我室乎若然我之視汝子女猶我子女也卒喜諾葉遂令郭氏私見卒卒謂曰我死有日此葉押獄性柔善未有妻汝可嫁之郭氏曰汝之死以我之色我又能貳適以求生乎既歸特二㓜痛泣而言曰汝爺行且死孃死亦在旦夕我児無所怙恃終必死於飢寒我今賣汝與人嬢豈忍哉盖埶不容巳将復柰何汝在它人家非若父母膝下比母仍如是嬌癡為也天苟有知使汝成立歲時能以巵酒奠父母則是我有後矣其子女頗聦慧觧母語意抱母而號引𥚑不肯釋手遂擕二児出市召人與之行路亦為之墮淚邑人有憐之者納其子女贈錢三十緡郭氏以三之一具酒饌擕至獄門謂葉曰願與夫一再見葉聽入哽咽不能語既而曰君優押獄多矣可用此少禮荅之又有錢若干可收取自給我去一富家執作為口食計恐旬日不及看君故也相別垂泣而出走至仙人渡溪水中危坐而死此䖏水極險悪竟不為衝激倒仆人有見者報之縣縣官往騐視得實皆驚異失色為具棺歛就葬於死所之側山下又為申逹上司仍表其墓曰貞烈郭氏之墓大書刻石墓上至正丙戍朝廷遣奉使宣撫循行列郡廉得其事原卒之情釋之人遂付還子女終身誓不再娶墨藪載徐氏書記云平一齠齓之歲見育宮中甞覩先后閱書法数軸将榻以賜藩令女學内人出六十餘凾於億歲殿曝之多装以􅍢牙軸紫羅縹云是太宗時所􅏻其中有故青綾䌚玳瑁軸者云是梁氏舊跡楷書毎凾可二十餘卷别有一小凾有十餘卷所記憶者是扇書樂毅告誓黄庭私訪於所主女學問其凾出盡否荅云尚有不知其㡬至中宗神龍𥘉貴戚寵盛官禁不嚴御府之珍多歸私室先盡金璧次及書法嬪主之家因此擅出或有報安樂公主者於内出二十餘凾駙馬武延秀乆踐虜庭無功扵此徒聞二王之迹强效寳特時呼薛稷鄭愔及平一詳其善悪諸人隨事荅稱上者登時去牙軸紫縹易以􅃮軸黄麻𥿄縹題云特徤藥云是虜語其書合作者時有太宗御筆於後題之歎其雄逸云云及考之書苑菁華特徤藥作特徤樂恐是鋟梓者之誤耳世之曰乞求盖謂正欲若是也然唐時巳有此言王建宮詞只恐它時身到此乞求自在得還家又花蕊夫人宮詞種得海柑纔結子乞求自過與君王暨陽之南門橋軍人張旺者人咸稱之曰張牌素兇狠無頼甞夜盗城西田父菜𬒳執濡其首溺池而釋之以故恨入骨髓毎思有以為報而未能一夕宿火瓦罌徃燒其家道由觀溝時月色微明晝師呉碧山尚未寝偶聞歩履声穴窓窺之見張前行而殤鬼百数踵其後飯頃又聞歩履声復窺之則張回而青衣童子二人前導焉呉甚驚恠盖張乃呉常所厚善者詰旦徃叩張張𥘉不承及語之審因以前事告且曰我實欲燬其室以快所憤因念冤冤相報無有了時遂棄火歸它無見也呉乃告以其詳張大感悟曰一念之頃可不謹哉即捨俗岀家人又咸稱之曰張道人後竟得道云此在至正五年事也昔真州一巨啇每歲販粥至杭時有挾姑布子之術曰鬼眼者設肆省前言皆竒中故門常如市啇方坐下坐忽指之曰公大富人也惜乎中秋前後三曰内數不可逃商懼即戒程時八月之𥘉舟次揚子江見江濵一婦仰天大號商問焉荅曰妾之夫作小經紀止有本錢五十緡每買鵝鴨過江貨賣歸則計本於妾然後持贏息易柴米餘資盡付酒家率以為常今妾偶遺失所留本錢非惟飲食之計無所措亦必𬒳箠死寧自沉啇聞之歎曰我今厄於命設令鑄金可代我無虞矣彼乃自夭其生哀㢤亟贈錢一百緡婦感謝去啇至家具以鬼眼之言告父母且與親戚故舊叙永訣閉門待盡父母親故宛轉寛觧終弗自悟踰期無它故復之杭舟阻風偶泊向時贈錢䖏登岸散歩適此婦襁負嬰孩遇諸道迎拜且告曰自蒙恩府抍㧞数日後乃産妾母子二人没齒感再生之賜者豈敢忘㢤啇至杭便遇鬼眼所驚顧曰公中秋胡不死乃詳觀其形色而笑曰公隂徳所致必曽救一老隂少陽之命矣啇異其術捐錢若干以報之巴思八帝師法號曰皇天之下一人之上開教宣文輔治大聖至徳普覺真智祐國如意大寳法王西天佛子大元帝師板的逹巴思八八合失南村輟耕録卷之十二
