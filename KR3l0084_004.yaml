front:
  text: 南村輟耕録卷之四
  hash: sha256:bc1b506efb6f9d0d19bb5d3a95265d4f528379fd25dcb8522b2a32d1d631289d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_004-1a}
body:
  text: 天台陶宗儀九成吳興王筠菴先生國器示余所藏唐義士傳讀之不覺令人泣下謹録之傳曰辛亥秋友人端叟倪君過余溪上示遊杭雜藁中有識唐玉潛事一篇余讀大驚頓足起立曰異哉今世乃有此人有此事願詳告我叟乃言曰唐君名珏字玉潛會嵇山隂人家貧聚徒授經營滫髓以飬其母歲戊寅有總江南浮屠者楊璉真珈怙恩橫肆勢𦦨爍人窮驕極淫不可具狀十二月十有二日帥徒役頓蕭山發趙氏諸陵寢至斷殘支體攫珠𥜗玉押焚其胔棄骨草莾間唐時年三十二歲聞之痛憤亟貨家具得白金百星許執劵行貸得白金又百星許乃具酒醪市羊豕邀里中少年若干輩狎坐轟飲酒且酣少年起請曰君儒者若是將何為焉唐慘然具以告願收遺骸共瘞之衆謝曰諾中一少年曰發丘中郎將耽耽餓虎事露奈何唐曰余固籌矣今四郊多暴骨取竄以易誰復知之乃斫文木為匱復黃絹為囊各署其表曰某陵某陵分委而散遣之蕝地以藏為文而告詰旦事訖來集出白金羡餘酬戒勿泄越七曰捴浮屠下令哀陵骨雜置牛馬枯骼中築一塔壓之名曰鎮南杭民悲戚不忍仰視了不知陵骨之猶存也禍淫不爽流傳京師上逹四聰天怒赫赫飛風雷號令捽首禍者北焉山隂人始有籍籍傳唐事者由是唐之義風震動吳越聲生執長若胥江掀八月之濤名雖高困固自若明年已卯後上元兩日唐出觀燈歸忽坐􅯠自奄奄若將絶者良久始蘇曰吾見黃衣吏持文書來告曰王召君導我往觀闕巍峩宫宇靚麗殆非人間有一冕旒坐殿上數黃衣貴人逡巡降揖曰藉君掩骸其有以報唐乃陛謁造王前王謂曰汝受命窶且貧兼無妻若子今忠義動天帝命錫汝伉儷子三人田三頃拜謝降出遂覺罔不知其何也踰時越有治中袁俊齋至始下車為子求師有以唐薦者一見置賔館一日問曰吾渡江聞有唐氏瘞宋諸陵骨子豈其宗耶左右指君曰此是巳袁大駭拱手曰君此舉豫讓不能抗也曳之坐北靣而納拜焉禮敬特加情欵益篤叩知家徒四璧側然嗟矜語左右曰唐先生家甚寒吾當料理使有妻有田以給左右逢迎爰諏爰度不數月二事俱愜聘婦偶故國之公女負郭食故國之公田所費一一自袁出人固奇唐之節而又奇唐之遇兩高之曰二公真義士義士尓後獲三丈夫子鼎立頎凡夢中神所許稽其數無一不合咄咄怪事乃如此唐葬骨後又於宋常朝殿拙冬靑樹植於所函土堆上作冬青行二首曰馬箠問髐形南面欲起語野􅍪尚純束何物敢盜取餘花拾飄蕩白日哀后土六合忽怪事蛻龍桂茅宇老天鑒區區千載護風雨又曰冬靑花不可折南風吹涼積香雪遙遙翆蓋萬年枝上有鳯巢下龍穴君不見犬之年羊之月劈歷一聲天地梨復有夢中詩四首曰珠亡忽震蛟龍睡軒弊寧忘犬馬情親拾寒瓊出幽草四山風雨鬼神驚一杯自築珠丘土雙匣親傳竺國經只有春風知此意年年杜宇哭冬靑昭陵玉匣走天涯金粟堆寒起莫雅水到蘭亭轉嗚咽不知真帖落誰家珠鳬玉鷹又成埃班竹臨江首量靣猶憶年時寒食節天家一騎奉香來余客錢塘久熟悉其事唐至今無恙靈鄉既具聞始來謂端叟曰江左運窮天水源涸宋之亡非有啇辛流毒為白旄黃鉞之招也直以千載也河淸六合藝一木火運移衣冠道盡卧榻側難容它人鼾睡耳聖朝量包覆燾恩完獝狨喣育亡國遺㣧坦無驚猜何物異端無忌憚敢尓至今言之可為痛哭已抑吾不能無慨異時會稽近畿世家林立雖蓬萊清淺陵岸變遷豈無一二慷慨僅存者卓哉斯舉乃出閭里一寒士何歟豈所飬非所用而民彛物則獨具於藝卑位下者之資稟與余又怪世之言命者窮通禍福罔不在厥𥘉生一成而不可變今忠義所感定命靡常六極轉移易若反掌乃知元命自作多福自求樞機由人雖天有所不能制聖言豈欺我哉一分行通神明捷於景響況力又有大者其積彌厚其澤當彌長又可以槩量乎哉吾謂趙氏昔者皆己破程嬰公孫杵臼強有其真孤今者國巳亡唐君玉潛匱藏其真骨兩雄力當無能優劣以其繫人倫關世教有足多尚援茟以紀待編野史者采焉此雲溪羅先生有開所撰也先生德興人董石林吉翁題其後曰釋𦦨熏天墨毒殘骨不啻鞭尸刖骸之慘藝張威揖孰攖其鋒儒流唐進士念世藉陽和生育雨露涵濡之恩忠憤激發毁室捐資仗義集儔潛遺骼於暴露之後拔遊魂於獸髑之中身首免異處支體脫烈炎視漆身隕鉞者盡在下風精誠動天奇節震世錫佳麗偶送麒麟兒陽施隂報捷若景響善者勸矣詹厚齋載采復題曰嘗疑武王伐商劒鉞斬擊事竊意王者之師未必尓也紂死矣既擊之以斷其首注太白不巳甚乎當時舉天下無非之者而西山餓夫獨非之昌黎頌之曰若伯夷者特立獨行窮天地亘萬古而不顧者也會稽諸陵非有啇辛之虐不幸而遭樊崇當時曽無一人動孟陽之哀者嗚呼痛哉唐生一寒士耳其藝位非如孤竹君之子徒以故國遺黎不忍視其上之人之禍之慘憤激于中毀家取義為人所不敢為於不可為之時深謀祕計全而歸之智名勇功足以驚世絶俗視伯夷固未易同日語而一念之烈行之而不顧豈非韓子所謂千百年乃一人者與余讀羅君所為傳為之掩卷泣下嗚呼尚忍言哉天地惟一感應之理有感必應其得報固其理耳不然天者有時而難必神者有時而難明善者怠矣厥後越有新治中來聞其事義其人下車首物色得之亟拜亟為禮羅而致之館下又從而振德之唐固義士治中亦偉人皆出秉彛好德之真微唐君不能成治中之義微治中不能著唐君之忠是大有功於人倫世教者也此傳之所以不可不作也皇慶二年夏五月題及見遂昌鄭明德先生元祐所書林義士事迹云宋太學生林德陽字景䂀號霽山當楊總統發掘諸陵寢時林故為杭丐者背竹籮手持竹夾遇物即以夾投籮中林鑄銀作兩許小牌百十繫腰間取賄西畨僧曰餘不敢望收其骨得高家孝家斯足矣畨僧左右之果得高孝兩朝骨為兩函貯之歸葬於東嘉其詩有夢中作十首其一絶曰一杯未築珠宫土雙匣親傳笁國經只有東風知此意年年杜宇哭冬青又曰空山急雨洗岩花金粟堆寒起莫雅水到蘭亭更嗚咽不知真帖落誰家又曰喬山弓劒未成灰玉匣珠𥜗一夜開猶記去年寒食日天家一騎捧香來餘七首猶悽怨則忘之葬後林於宋常朝殿掘冬青一株植於所函土堆上又有冬青花一首曰冬青花冬青花花時一日腸九析隔江風雨清影空五月深山落微雪石根雲氣龍所藏尋常螻蟻不敢穴移來此種非人間曽識萬年觴底月蜀魂飛繞百鳥臣夜半一聲山竹裂又一首有曰不記羊之一年馬之月劈歷一聲山石裂聞其事甚異不欲書若林霽山者其亦可謂義士也巳此五詩與前所録句語微不同詩中有雙匣字則事收兩陵骨之意得非林義士詩而羅雲溪以傳者之誤而寫人傳中乎但曰移宋常朝殿冬青植所函土上而作冬青詩吾意會稽去杭止隔一水或者可以致之若夫東嘉相望千餘里豈能容易持去縱持去又豈能不枯瘁作如此想則又疑是唐義士詩且葬骨一事豈唐方起謀時林巳先得髙孝兩陵骨耶抑得唐所易之骨耶蓋各行其所志不相知會理固有之載考之齊人周草窗先生密癸辛雜識所記云至元二十二年乙酉八月楊髠發陵之事起於天長寺福僧聞號西山者成於演福寺剡僧澤號雲夢者𥘉天長乃魏憲靖王墳寺聞欲媚楊髠遂獻其寺旋又發魏王冡多得金玉以此起發陵之想澤一力􅐌成之俾泰寧寺僧宗愷宗允等詐稱楊侍郎汪安撫侵占寺地為名告詞出給文書將帶河西僧及凶黨如沈照磨之徒部領人夫發掘時有中官陵使羅銑者守陵不去與之極力爭執為澤痛箠脅之以刃令人逐去大哭而出遂先啓寧宗理宗度宗楊后四陵劫取寶玉極多惟理宗之陵所藏尤多啓棺之𥘉有白氣亘天蓋寶氣也理宗之尸如生其下皆藉以錦錦之下承以竹絲細簟一小厮攫取擲地有聲乃金絲所成或對云含珠有夜明者乃倒縣其尸樹間瀝取水銀如此三日竟失其首或謂西畨僧回回其俗以得帝王髑髏可以厭勝徑冨故盜去耳事竟羅陵使買棺製衣收斂大慟垂絶鄰里為之感泣是夕聞西山皆有哭聲凡晝夜不絶至十一月復發徽欽髙孝光五帝陵孟韋吳謝四后陵𥘉欽徽葬五國城數遣使祈請於金人欲歸梓宫凡六七年而後許以梓宫還行在髙宗親至臨平奉迎易緦服寓于龍德别官一時朝野以為大事諸公論功受賞費於官帑者不資先是選人楊煒貼書執政乞奏聞命大臣取神櫬之最下者斫而視之既而禮官請用安陵故事梓宫入境即承之以槨仍納衮冕翬衣於槨中不改斂從之至此𬒳發掘欽徽二陵皆空無一物徽陵有朽木一段欽陵有木燈檠一枚而巳蓋當時巳料其真偽不可知不𣣔逆詐亦以慰一時之人心耳而二帝遺骸浮沉沙漠𥘉未嘗還也高宗陵骨髮盡化略無寸餘止錫器數件端硯一隻硯為澤所得孝陵亦蛻化無餘止頂骨小片內有玉爐瓶一副古銅鬲一隻亦為澤所得昔聞有道之士能蛻骨而仙未聞并骨蛻者真天人也若光寧與諸后優然如生羅陵尸亦如前棺斂後悉從火化可謂忠且義矣當與張承業同傳陵中金錢以萬計皆為尸氣所蝕如銅鐵狀以故諸凶棄而不取往往為村氓所得間有得貓睛異寶者一村翁於孟后陵得一髻其髮長六尺餘其色紺碧髻根有短金叉遂取以歸以其帝后遺物庋置佛堂中奉事之自此家道寖豐凡得金錢之家非病即死翁恐甚函送龍洞中而此翁今成富家矣方移理宗尸時澤在傍以足蹴其首以示無懼隨覺竒痛一點起於足心自此苦足疾數年以致潰爛雙股墮落十指而亡聞既得志且富不義之財復倚楊髠藝豪奪鄉人産業後為鄉夫二十人伺道間屠而臠之罪不加衆各不過受杖而巳其愷與楊髠分贓不平已受杖死尚有允在據此説則雲溪所傳歲月絶不同蓋嘗論之至元丙子天兵下江南至乙酉將十載版圖必巳定法制必巳明安得有此事然戊寅距丙子不三年竊恐此時庶事草創而妖髠得以肆其惡與妖髠就􅓍群凶接踵隕於非命天之所以祻淫者亦嚴矣但云髙宗陵骨髮盡化孝宗陵頂骨小片不知唐義士所易者何骨也林義士所收者又何骨也惜余生晚不及識宋季以來老儒先生以就正其是非姑以待熟兩朝典故之人問焉國𥘉有李國用者自圵來杭能望氣占休咎能相人其人崖岸倨傲而時貴咸敬之謝后諸孫字退樂者設早饌延致至即據中位省幕官皆坐下坐不得其一言以及禍福時趙文敏公謂之七司戶與謝姻戚屈來同飯文敏公風瘡滿面李遙見即起迎謂坐客曰我過江僅見此人耳瘡愈即面君公輩記取異日官至一品名聞四海方襄陽未破時世皇命其即軍中望氣行踰三兩舍遄還奏曰臣見卒伍中往往有台輔器襄陽不破江南不平置此人於何地噫李之術亦神矣國用登州人嘗為卒遇神仙教以觀日之法能洞見肺腑世稱神相延祐間興聖宫成中官李丞相邦寧傳奉太后懿旨命趙集賢孟俯書額對曰凡禁扁皆李雪菴所書公冥奏聞既而命李趙偕至雪菴處雪菴曰子昻何不書而以屬吾邪李因具言之雪菴遂不固辭前輩推讓之風豈後人所可企哉胡汲仲先生長孺號石塘特立獨行剛分有守趙松雪嘗為羅司徒奉鈔百定為先生潤筆請作乃父墓銘先生怒曰我豈為宦官作墓銘邪是日先生五絶糧其子以情白坐上諸客咸勸受之先生郤愈堅觀此則一毫不苟取於人從可知矣故雖凍餒有所不顧也先生送蔡如愚歸東陽詩有云薄麋不繼襖不暖謳吟猶是鍾球鳴語之曰此余祕密藏中休糧方也虞伯生先生集楊仲弘先生載同在京日楊先生每言伯生不能作詩虞先生載酒請問作詩之法楊先生酒既酣盡為傾倒虞先生遂超悟其理繼有詩送袁伯長先生桷扈駕上都以所作詩分他人質諸楊先生先生曰此詩非虞伯生不能也或曰先生嘗謂伯生不能作詩何以有此曰伯生學問髙余曽授以作詩法餘莫能及又以詣趙魏公孟俯詩中有山連閣道晨留輦野散周蘆夜屬櫜之句公曰美則美矣若改山為天野為星則則尤美虞先生深服之故國朝之詩稱虞趙楊范揭焉范即德機先生椁揭即曼碩先生傒斯也嘗有問於虞先生曰仲弘詩如何先生曰仲弘詩如百戰健兒德機詩如何曰德機詩如唐臨晉帖曼碩詩如何曰曼碩詩如美女簮花先生詩如何笑曰虞集乃漢廷老吏蓋先生未免自負公論以為然程公鵬舉在宋季𬒳虜於興元板橋張萬户家為奴張以虜到宦家女某氏妻之既婚之三日即竊謂其夫曰觀君之才貌非久在人後者何不為去計而甘心於此乎夫疑其試巳也訴於張張命箠之越三日復告曰君若去必可成大器否則終為人奴耳夫愈疑之又訴於張張命出之遂粥於市人家妻臨行以所穿繡鞋一易程一履泣而曰期執此相見矣程感悟奔歸宋時年十七八以蔭輔入官逮國朝統一海宇程為陜西行省參知政事自與妻别巳三十餘年義其為人未嘗再娶至是遣人携向之鞋履往興元訪求之市家云此婦到吾家執作甚勤遇夜未嘗解衣以寢每紡織逹旦毅然莫可犯吾妻異之視如巳女將半載以所成布匹償元粥鏹物乞身為尼吾妻施資以成其志見居城南某菴中所遣人即往尋見以暴衣為由故遺鞋履在地尼見之詢其所從來曰吾主翁程參政使尋其偶耳尼出鞋履示之合函拜曰主母也尼曰鞋履復全吾之碩畢矣歸見程相公與夫人為道致意竟不再出告以參政未嘗娶終不出旋報程移文夲省遣使檄興元路路官為具禮委幕屬李克復防護其車輿至陜西重為夫婦焉揭曼碩先生未逹時多遊湖湘間一日治舟江涘夜二鼓攬衣露坐仰視明月如晝忽中流一擢漸逼舟側中有素收女子斂祍而起容儀甚清雅先生問曰汝何人答曰妾啇婦也良人久不歸聞君逺來故相迓耳因與談論皆世外恍惚事且云妾與君有夙緣非同人間之淫奔者幸勿見郤先生深異之逮曉戀戀不忍去臨别謂先生曰君大富貴人也亦冝自重因留詩曰盤塘江上是奴家郎若間時來喫茶黃土作墻茅蓋屋庭前一樹紫荆花明日舟阻風上岸沽酒問其地即盤塘鎮行數步見一水仙祠墻垣皆黃土中庭紫荆分然及登殿所設像與夜中女子無異余往聞先生之姪孫立禮説及此亦一竒事也今先生官至翰林侍講學士可知神女之言不誣矣戴石屏先生復古未遇時流寓江右武寧有富家翁愛其才以女妻之居二三年忽欲作歸計妻問其故告以曽娶妻白之父父怒妻宛曲解釋盡以奩具贈夫仍餞以詞云惜多才憐薄命無計可留汝揉碎花箋忍寫斷腸句道傍楊桞依依千絲萬縷拞不住一分愁緒捉月盟言不是夢中語後回君若重來不相忘處把杯酒澆奴墳土夫既别遂赴水死可謂賢烈也巳宋丞相文公天祥其事載在史册雖使三尺之童亦能言其忠義翰林學士徐威卿先生世隆有詩挽之曰大元不殺文丞相君義臣忠兩得之義似漢王封齒日忠如蜀將斫頭時乾坤日月華夷見嶺海風霜草木知只恐史官編不盡老夫和淚寫新詩可謂善風刺者矣虞伯生先生集亦有詩曰徒把金戈挽落睴南冠無奈北風吹子房本為韓仇出諸葛安知漢祚移雲暗鼎湖龍去遠月明華表鶴歸遲何須更上新亭飲大不如前灑淚時讀此二詩而不泣下者幾希往往見蒙古人之禱雨者非若方士然至於印令旗劒符圖氣訣之類一無所用惟取淨水一盆浸石子數牧而已其大者若雞卵小者不等然後默持密呪將石子淘漉玩弄如此良久輒有雨豈其靜定之功已成特假此以愚人邪抑果異物邪石子名曰鮓答乃走獸腹中所産狗牛馬者最妙恐亦是牛黃狗寶之屬耳虞卲菴先生集在翰苑時宴散散學士家歌兒郭氏順時秀者唱今樂府其折桂令起句云博山銅細裊香風一句而兩韻名曰短桂極不易作先生愛其親竒席上偶談蜀漢事因命紙筆亦賦一曲曰鸞輿三顧茅廬漢祚難扶日莫桑榆深渡南瀘長驅西蜀力拒東吳美乎周瑜妙術悲夫關羽云殂天數盈虛造物乘除問汝何如早賦歸與蓋兩字二韻比之一句兩韻者為尤難先生之學問該博雖一時娛戲亦過人逺矣折桂令一名廣寒秋一名天香第一枝一名蟾宮引令中州之韻入聲似平聲又可作去聲所以蜀術等字皆與魚虞相近戰國䇿趙威后問齊使歲無恙邪王亦無恙邪楚辭九辨曰還及君之無恙説苑魏文侯語倉唐曰擊無恙乎又曰子之君無恙乎漢書元帝詔貢禹曰今生有恙何至不已乃上疏乞骸骨聘禮亦曰公問君賓對公再拜鄭注云拜其無恙者顧愷之與殷仲堪箋行人安穩布帆無恙隋日本遣使稱日出處皇帝致書日沒處皇帝無恙神異經曰北方大荒中有獸咋人則疾名曰㺊㺊恙也嘗入人室屋黃帝殺之人無憂疾謂之無恙尓雅曰恙憂也應劭風俗通曰上古之時草居露宿恙噬人蟲也善食人心人患苦之凡相問云無恙恙或以為獸或以為蟲或為無憂廣干祿書兼取憂及蟲事物紀原兼取憂及獸廣韻㺊字下云㺊獸如獅子食虎豹及人恙字下云憂也病也噬蟲善食人心是㺊恙二義神異經合而一之則誤矣維楊秦君昭妙年遊京師其執友鄧載酒祖餞既而舁一殊色小鬟至前令拜秦因指之曰此吾為部主事某人所買妾也幸君便航可以附逹秦弗敢諾鄧作色曰縱君自得之亦不過二千五百緡耳何峻辭乃尓秦勉強從命迤邐至臨淸天漸暄夜多蚊蚋可畏內之帳中同寢直抵都下置書館處持書往見主事問曰足下與家眷來邪曰無有主事意極不恱隨以小車取歸踰三日謁謝曰足下長者也昨巳作答簡附便驛報吾鄧公且使知足下果能不孤公付託之意矣遂相與痛飲盡歡而散夫栁下惠夜宿郭門有女子來同宿恐其凍死坐之於懷至曉不為亂顔叔子獨居夜大雨有女子投之令其執燭至明不二志故千古以為美事今秦之於此女子也相從數千里飲食起居無適而不同又非造次顛沛者之比可謂厚德君子矣後秦之子孫咸至顯宦南村輟耕録卷之四
