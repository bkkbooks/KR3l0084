front:
  text: 南村輟耕録卷之十三
  hash: sha256:1962c8541707c32c2838d860562843cbde949b3b74855661709f1ab94595b255
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_013-1a}
body:
  text: 天台陶宗儀九成中書省準陜西行省咨察罕腦兒宣慰司呈入匝街禮敬坊王弼告至正三年九月內到義利坊平易店見有算卦王先生因問來歷致爭當月草九日夜睡房窗下似風吹葫蘆聲不時有之請到李江法師遣送虛空人言算卦先生使我來哭聲內稱冤枉弻祝之曰尓神尓鬼明以告我鬼云我是豐州黑河村周大親女月惜至正二年九月十七日夜因後院𬒳這王先生將我殺了使奴婢使喚如今教在尓家作怪哭者索要衣服抄寫所説赴官陳告差盧捕盜等與社長吳信甫於王先生房內􅊧獲木印二顆黑羅繩二條上釘鐵針四箇魘鎮女身小紙人八箇五色綵五色絨上俱有頭髮相纒又小葫蘆一箇上拴紅頭繩一條內盛琥珀珠二顆外包五色絨朱書符命一沓又告十二月𥘉三日有鬼空中言我是奉元路南坊開張機房耿大第二男頑驢這先生改名頑童我年一十八歲𬒳那老先生引三箇伴當殺了我二十二日又有鬼空中云我是察罕腦兒李帖家孩兒延奴又名搶灰那老賊殺了秋改名買買我𬒳殺時年一十四歲勘問得犯人王萬里即王先生狀招年五十二歲江西省吉安路民於襄陽周先生處習會隂陽課命至順二年三月內到興元府逢見劉先生云我能使術法迷惑人心收採生魂使去人家作禍廣得財物我有收下的賣與你一箇隨於身畔取出五色綵帛并頭髮相結一塊言稱這箇小名喚延奴我課算㨂性格聰明的童男童女用符命法水呪語迷惑活割鼻口唇舌尖耳朵眼睛呪取活氣剖腹掏割心肝各小塊曬乾搗羅為末收褁及用五色綵帛同生魂頭髮相結用𥿄作人形樣符水呪遣往人家作怪根隨到伊下處至夜劉先生焚香念呪燒符聽得口言不見形影問師父你教我誰家索甚去劉先生分付李延奴你與這先生做伴去説罷將呪語收禁萬里與訖鈔七十五兩買得五色綵帛頭髮相結一塊稱説我改名買買傳教采生遣使收禁符命呪水又云牛狗肉破法休喫續後於房州山地面經過逢見廣州舊識矌先生云我亦會遣使鬼魂我有收下的生魂賣與你萬里與訖鈔一定矌先生取出五色綵帛頭髮相結𥿄人兒一箇云此名取頑童萬里將與李買買一處遣使以課算為由前到大同路豐州黑河村地面往來至正二年八月內到於周大家課命將伊女周月惜八字看算性格聰慧要將殺害收采生魂至九月十七日夜於周大住宅後院墻下黑影內潛藏間見一人往後院內來認得係是月惜在彼出後萬里密念呪語向前拖拽往東奔走將月惜禁止端立脫下沿身衣服用元帶魚刀將其額皮割開扯下懸蓋眼瞻及將頭髮割下一縷用𥿄人并五色綵帛絨線結成一塊如人形樣然後割下鼻口唇舌耳尖眼睛手十指梢腳十趾梢却剖開胸腹才方倒地氣絶又將心肝肺各割一塊曬乾搗末􅏻於小葫蘆內至正三年九月內來到察罕腦兒平易店安下開張卦肆與王弼相爭挾讎令生魂周月惜等三名前往伊家作禍為買馬肉食用店內將牛肉作馬肉賣與因此不能收禁事發到官及責得李福寶即李帖狀結生到孩兒延奴常有疾病於五嶽觀口許出家落在𥿄灰內改名搶灰天曆二年二月內令其趕牛牧放不歸此時飢荒想得𬒳人虧害不曽根尋及行移奉元路咸寧縣并大同路豐州照勘耿頑童周月惜致死緣由相同呈乞咨請施行準此送據刑部擬得王萬里殘忍不道合令凌遲處死其妻子遷徙海南安置余幼時嘗見胡石塘先生玄寶傳今不能記其全篇有人出永嘉髙則誠明烏寶傳相示雖曰以文為戲要亦有關於世教傳曰烏寶者其先出於會稽楮氏世尚儒務詞藻然皆不甚顯至寶厭祖父業變姓名從墨氏遊盡得其通神之術由是知名𥘉寶之先有錢氏者亦以通神術顯逮寶出而錢氏遂廢然其術亦頗相類故不知者猶以為錢云寶輕薄柔默外若方正內實垢汚善隨時舒卷常自得聖人一貫之道故無入而不自得流俗多惑之凡有謀於寶小大輕重多寡精粗無不曲隨人所求自公卿以下莫不敬愛其子姓蕃衍散處郡國者皆官給廬舍而加守護焉其有老死者則官為聚其尸而焚之蓋知墨之末俗也寶之所在人爭迎取邀致苟得至其家則老稚婢隸無不欣恱且重扄邃宇敬事保愛惟恐其它適也然素趍藝利其富室執人每屈輒往雖終身服役弗厭其窶人貧氓有傾心願見終不肯一往尤不喜儒雖有轉相與往來者亦終不能久留也蓋儒墨之素不相合若此寶好逸惡勞愛儉素疾華侈常客於弘農田氏田氏朴且嗇寶竭誠與交田氏沒其子好奢靡日以聲色宴遊為事寶甚厭之鄰有啇氏者亦若田氏父之為也遂挈其族往依焉蓋墨之道貴清淨也故然其為人多詐反覆不常凡逹宮執人無不願交而率皆不利敗事故其廉外自持者率不與寶交自寶之術行挾詐者往往偽為寶術以售于時後皆敗死故寶之術益尊是時崑崙抱璞公南海玄珠子永昌從革生皆能濟人與世俯仰曲隨人意而三人者亦顧與寶交茍得寶一往則三人亦無不可致故時譽咸歸於寶焉寶族雖夥然其狀貌技術亦頗相似知與不知咸謂之烏寶云論曰烏氏見於春秋世本姓苑若存餘技烏獲皆為顯仕至唐承恩重㣧始盛逮寶而益著寶裔本楮而自謂烏氏則變詐亦可知矣寶之學雖出於墨而其害道傷化尤甚雖孟軻氏復生不能闢也然使寶生於唐虞三代時其術未必若是顯然則寶之得行其志者亦其時有以使之嗚呼豈獨寶之罪哉新喻傳汝礪先生若金嘗志其妻殯云君諱淑字蕙蘭姓孫氏其先汴人年二十三歸我於湘中五日而卒君髙朗秀惠生六歲母卒父教以書稍長習女工晨起獨先盥櫛適父母所問安畢佐諸母具食飲退治女上晡時觀經史或嗚琴自休既夕聚家人暝坐説古貞女孝婦傳燭至治女工如𥘉富貴家多求婚火不許及以許余家人不恱一曰有幸余疾者欲因動之君曰大人以愛子許人必慎所擇矣即有不諱命也若等謂我且慕世俗冨貴而改聘耶有死而巳皆愧謝不敢復言事繼母盡孝道死之日母大慟既瞑目久忽徐起止母哭令自寬及母出私泣告余曰妾為父母所偏愛即死必傷其心然終必死矣為將奈何君後當貴幸念之言既復瞑目泰定五年八月草有一日也後三日寓殯湘中及序其遺稿云故妻孫氏蕙蘭早失母父周卿先生以孝經論語及凡女誡之書教之詩固未知學也因其弟受唐詩家法於庭取而讀之得其音格輒能為近體五七言語皆間雅可誦非苟學所能至者然不多為又恆毀其稿家人或竊收之令勿毀則曰偶適情耳女子當治織絍組紃以致其孝敬辭翰非所事也既卒家人哭而稱之因出其稿得五言七首七言十一首五也言未成章者草六句特為編集成帙題曰緑窗遺稿序而藏之五言詩曰窗裏人𥘉起窗前栁正嬌捲簾衝落絮開鏡見垂條坐對分金線行防拂翆趐流鶯空巧語倦聽不須調右一小閣烹香茗疏簾下玉鉤燈光翻出鼎叉影倒沈甌婢捧消春困親嘗散暮愁吟詩因坐久月轉晚妝樓右二燈前催曉妝把酒向髙堂但願梅花月年年映壽觴右三采閣閉朝寒妝成擬問安忽聞春雪下喚婢捲簾看右四粲粲梅花樹盈盈似玉人甘心對氷雪不受艷陽春右五小小春羅扇團團秋月生蟠桃花樹裏繡得董雙成右六自拂雙眉黛何曽慣得愁若教如翆栁便恐不禁秋右七七言詩曰樓前楊栁發青枝樓下春寒病起時獨坐小窗無氣力隔簾風亂海棠絲右一窗緑寂寞掩殘春繡得羅衣懶上身昨日翆帷新病起滿簾飛絮正愁人右二小妹方才習孝經可憐嬌怯性偏靈自尋女誡窗前讀嗔道傍人不與聽右三幾點梅花發小盆氷肌玉骨伴黃昏鄗窗久坐憐清影間劃金叉記月䀶右四繡𬒳寒多未欲眼梨花枝上聽春鵑明朝又是清明節愁見人家買𥿄錢右五春雨隨風􅊜粉墻園花滴滴斷人腸愁紅怨白知多少流過長溝水亦香右六春風昨夜碧桃開正想瑶池月滿臺欲折一枝寄王母青鸞飛去幾時來右七空階日晚雨才乾小婢相隨倚畫闌金叉誤挂緋桃落羅袖愁依翆竹寒右八小窗今夕繡針間坐對銀蟾整翆鬟凡世何曽到天上月宫依舊似人間右九乞巧樓前雨乍晴彎彎新月伴雙星鄰家小女都相學鬪取金盆看五生右十庭院深深早閉門停針無語對黃昏碧紗窗外𥘉生月照見梅花欲斷魂右十一未成章詩曰露下庭梧葉風吹月桂花登樓聞過鷹開戶見棲鴉繡簾當雪卷銀燭背風然雪睛山顯翠風暖水生紋萱草當階緑櫻桃落地紅芍藥開時病荼䕷落處愁玉叉簮末利羅扇繡夫容窗前垂栁分春色鏡裏幽蘭對曉妝花間影過那知燕栁外聲來不見鶯慈親教婢回金剪嬌妹嗔人奪繡針妝成寶鏡楊花過行出珠簾燕子歸自傾甕裏春泉水親灌階前石竹花海棠帶雨燕支重楊栁凝煙翡翠濃先生既喪妻哀戚之情多見於詩悼亡曰驚飈吹羅幕明月照階戺春草忽不芳秋蘭亦同死斯人藴淑德夙昔明詩禮靈質奄獨化孤魂將安止迢迢湘西山湛湛江中水水深有時極山髙有時巳憂思何能齊曰月從此始右一皇天平四時白日一何遽勤儉畢婚姻新人忽復故衾裳斂遺􅊞棺槨無完具送葬出北門徘徊怛歸路玉顔不可恃况乃紈與素纍纍花下墳鬱鬱塋西樹他人亮同此胡為獨哀慕右二新婚誓偕老恩義永且深旦暮為夫婦哀戚奄相尋涼月燭西樓悲風鳴北林空帷奠巾櫛中房虛織絍辭章餘婉孌琴瑟有餘音眷言瞻故物惻愴內不任豈無新人好焉知諧我心掩冗撫長暮涕下霑衣襟右三人生貴有別室家各有宜貧賤逺結婚中心兩不移前日良宴會今為死別離親戚各在前臨訣不成辭傍人拭我淚令我要裁悲共盡固人理誰能心勿思右四感獨曰幽幽蕙草晚靡靡蘭芳斷皎皎夜泉人冥冥不復旦流塵棲暗壁涼吹經虛幔無論歡意消日復愁思亂魂傷夕方永氣變秋將晏當窗慘斷素捐篋悲柔翰憶𥘉成好合誓且同憂患何言遂長終獨處增永嘆窹寐忽如在展轉驚復散念兹何嗟及哀至聊自判右五百日曰人生悲死别矧在心相知新婚未及久杳杳遽何之昔為連理木今為斷腸枝相去時幾何百日奄在兹虧月有圓夕逝水無還期棄置非人情何以慰我思右一入室曰汝閣閉長夜幽蘭坐復春猶疑挑錦字不見掩羅巾故物空在目蕭條生網塵右三虛窗明月滿芳砌緑苔滋花間時染翰尚憶解題詩寂寞幽泉下貞心空自知右四追和蕙蘭曰小窗開盡碧桃枝憶得青鸞化去時昨夜秋風動幽怨夢中吹斷素琴絲右一江上愁時復值春帶圍寬盡不宜身階前舊種櫻桃樹日暮飛花故著人右二嗟夫孫氏之詩依乎禮義先生之詩哀而不傷舉得性情之正是可傳也巳王皮者住鳯翔府城外八九里許盛暑中入城買皮料歸至中途憩道傍大樹下忽有二卒來前狀貌竒怪似非凡世間人遽問曰汝王皮與王竊疑懼然不敢不以實對乃曰某是巳卒曰隂府攝汝王曰某平生無他過惡望賜矜憐卒不諾又告曰容到家與妻子一别可乎卒乃諾將及門卒力挽之不能入王大呌救我比妻子來前王巳仆地氣絶既斂胸間微暖如生經宿未敢蓋棺王於冥漠中隨卒至一所􅌂若王者之庭儀衛吏隸無備具問曰汝為秦白起偏將坑趙降卒四十萬知其罪否王答曰某庸工平生不曽讀書不知白起為何人亦不知降卒為何事於是令王起凡再歷二庭問亦如之答亦如之乃反接王一大池邉取池中泥塗其胸寒氣凛洌洞腹透背王即悟曰某已記前身事矣遂解其縛復引至元問苐三庭王告曰某當年曽為白起偏將其殺趙降卒時某曽力諌不從非某之罪頃間牽一荷鐵校者跪王側王認得似是白起而形骸骨立又若非似蓋因久囚故也起見王曰子來矣余復何言方招承庭吏發王還苐一庭檢録陽壽及閲籍尚有若干年即命元攝卒引至元憩樹下一推而王乃在棺中跳躍而起妻子親鄰既驚且喜叩問之備言其故有傳之至京師者差進士卨哲篤來鳯翔覆察果實時王元吉為本府照磨元吉能備言其詳且有抄録公文此一事然雖若幻誕端可為為將而嗜殺人者之戒故略莭大槩如上楊州泰興縣馬駝沙農夫司大者其里中富人陳氏之佃家也家貧不能出租以輸主乃將以所佃田轉質於他姓陳氏田旁有李慶四者亦業佃種潛賂主家兒約能奪田與我而不以與陳氏者以所酬錢十倍之一分之家兒素用事因以利啖其主主聽奪田歸李氏司固無可奈何既以穀田不相侔輕其直十之一司愈不平會歸而李與嘗所用力及為立劵者殺雞飲酒司因隨所之所欲卻司輒先持一巵酒飲之司忿恨去對妻語所以與李怨仇之故妻苦口諌曰吾之窮命也奈何仇人哉不聽夜持炬火往燒其家忽聞得內有人娩司竊念吾所讎者其家公也何故殺其母子遂棄火溝中而歸司無以為飬生計即所償錢為豆乳釀酒貨賣以給食久之不復乏絶更自餘而李日益貧更十年李復出所佃田質陳氏司還用李計復其田過種之錢比前又損其一為劵悉值前人相視驚嘆司記為李所辱時今幸可一報復遂具雞酒飲亦如之李妄前過不自責反怨薄巳怒甚歸積膏火破盎中夜抵司家司妻方就蓐李猶豫間聞人啓戶懼事覺遺火亟走而司家實不有人旦得火器場中驗器底有李字因悟昔我焚彼家以其家人産子不欲焚今彼焚我家而我之妻亦産子而不𬒳焚此天也非人也持錢五阡往李曰昨日小人無狀失禮義不得共飲兹願少伸謝意幸母督過李疑詒以疾卧不起強請不已遂同之酒家邀酤兒與飲酒半自起酌酒勸李曰子之孫某年月日夜子時生而吾子亦夜者子時生怨仇之事慎勿復為具白前所仇事歷酒為誓語酤兒曰子識之試用此警世間人不善慎勿為也劇飲盡歡乃更約為婚姻自是李亦不貧兩家至今豐給此在至正𥘉元間吾謂司氏婦之極諌與司氏之易慮時天固巳監之所以李不復可加害也向使司氏決快所欲未必能復田縱復田未必不無􅍔一念之善從而兩家子孫皆蒙其利澤書曰天道福善􅍔淫又曰惟上帝不常作善降之百祥作不善降之百殃嗚呼天豈逺人哉天豈逺人哉嘗讀杜荀鶴詩其亂後逢村叟曰經亂衰翁居破村村中何事不傷魂因供寨木無桑柘為點鄉兵絶子孫還似平寧徴賦稅未嘗州縣略安存至于雞犬皆星散日落前山獨倚門山中寡婦曰夫因兵死守蓬茅麻苧衣衫鬢髮焦桑柘廢來猶納稅田園荒後尚徴苗時挑野菜和根煮旋斫生柴帶葉燒任尓深山更深處也應無計避征徭旅泊遇郡中亂曰握手相看誰敢言軍家刀劒在要邉遍􅊧寶貨無藏處亂殺平人不怕天古寺拆為修寨木荒墳掘作甃城磚郡侯逐去渾間事正是鑾輿幸蜀年然方之今日始信其非寓言也今人謂曽祖父曰太公此蓋相承之謬當稱祖父為是後漢李固之父郃為司空固女當固伏誅日曰太公以來云注太公謂祖父郃也御史臺準陜西行臺咨監察御史烏古孫良楨呈伏聞綱常者天之所以經天下者也天子所以為天守綱常者也臣而不忠子而不孝凡觸罪於綱常者不容於死又烏可處以相位俾之重任乎謹按遼陽行省丞相答失帖木兒即駙馬丞相也心懷隂險行畜姦邪敗壞彛倫反側不道通天之罪無所於容昔在晉邸擢登首相居百僚之上極一品之榮受任托孤躬承顧命君臣分義至重且深及乎大事之時干戈之際盡領北上之兵以救顛危本官隂畜二心坐觀成敗南至紅橋逗遛不進致於敗亡不能死義靦面入降大虧臣莭反以藉口矜為巳功天下義士聞之莫不為恥昔丁公為項王一將耳嘗二心於漢及天下定髙帝誅之後世稱其明斷方楚之與漢敵國之執未分尚以大義責之以示垂戒今答失帖木兒之於晉邸爵祿之寵巳崇君臣之忿素定較之丁公不忠之罪又有甚焉况天曆之𥘉營充樞密知院御史巳嘗紏言又復賄賂權臣出為江西行省丞相兩居江浙至與房鄰拜降都運賄賂交通壞亂鹽法至今官民皆𬒳其害中間徇私敗政不可枚舉所至之處流毒一方今則移置遼陽之民奚罪焉原其本官昔既不忠今豈盡節又兼遼陽即係東方重鎮反覆之人豈宜處此脫有邉釁關繫非輕似此賣國賣臣之罪使其人巳死猶當追貶今既未死得以幸逭天祿設居相位是國法不行邪正不辨愚恐姦臣賊子接迹倣效甚非國家之福伏望聞奏為天下正綱常之義將答失帖木兒流竄遐荒追奪纍受宣命庶幾人臣分嚴罪於綱常者死有餘辜以為不忠不道之勸其於治道不為小輔天下幸甚公論幸甚至正元年八月十二日別理怯不花怯薛弟一日忽魯納鉢裏有時分雲都赤汪家奴殿中百撒里大夫亦真班經歷臧吉蒙古必闍赤朵朵等奏臺官備著西臺文書俺商量來行與省家文書將他見行的勾當黜罷了呵怎生奏呵奉聖旨那般者欽此𥘉良禎之父福建閩海道肅政廉訪使潤甫公澤年五十未有子夫人杜氏深以為憂屢請公再聘公不允仕西廣時聞寡居王安人者美而宜子夫人自為公謀聘之既歸執婦禮甚恭長夫人數歲夫人推讓正寢以居之相處雍睦宛若姊娣飲食起居罔有不同公獨內不自安越明年天人生良楨一日王氏告公曰君自有婦所以再娶妾者為嗣續計耳今夫人既生子妾何事焉即出道家冠服一􅊞以示曰妾之志決矣請從此辭夫人固留不得公因謂夫人曰向吾再娶懼無後也若不改圖人其以我為汰乎乃聽王氏去奩資萬金􅊖返之自是出居一女道菴戒行嚴謹人未嘗能見其靣而夫人歲時問遺彌至後良楨貴顯迎以歸事之如親母嗟夫自古求忠臣於孝子之門今良楨外有嚴君內有賢母教誨造就之道有過人者冝乎在家為孝子而在朝為忠臣也然其揚歷臺省秉性剛介不畏強禦事無不言言必有中如駙馬丞相恃居國戚莫敢孰何乃必發其底裏直使去位而後巳推此一節則凡忠君之事類可知矣後至中書左丞而卒至元間釋氏豪橫改宫觀為寺削道士為髠且各處陵墓發掘逮盡孤山林和靖處士墓尸骨皆空惟遺一玉簮時有人作詩以悼之曰生前不繫黃金帶身後空餘白玉簮南村輟耕録卷之十三
