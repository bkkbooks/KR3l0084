front:
  text: 南村輟耕録卷之二十一
  hash: sha256:19321032c9c34fea79fb315fef341c0fc4d667ee734052ab8a36396cd1aecd86
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_021-1a}
body:
  text: 天台陶宗儀九成至元四年正月城京師以為天下本右擁太行左注滄海撫中原正南靣枕居庸奠朔方峙萬夀山浚太液池派玉泉通金水縈畿帶甸負山引河壯哉帝居擇此天府城方六十里里二百四十步分十一門正南曰麗正南之右曰順承南之左曰文明北之東曰安貞北之西曰健德正東曰崇仁東之右曰齊化東之左曰光熙正西曰和美西之右曰肅清西之左曰平則大內南臨麗正門正衙曰大明殿曰延春閣宮城周回九里三十步東西四百八十步南北六百十五步髙三十五尺甎甃至元八年八月十七日申時動土明年三月十五日即工分六門正南曰崇天十二間五門東西一百八十七尺深五十五尺髙八十五尺左右􅝔樓二􅝔樓登門兩斜廡十門闕上兩觀皆三􅝔樓連􅝔樓東西廡各五間西􅝔樓之西有塗金銅幡竿附宫城南面有宿衛直廬凡諸宫門皆金鋪朱戶丹楹藻繪􅊮壁琉璃瓦飾簷脊崇天之左曰星拱三間一門東西五十五尺深四十五尺髙五十尺崇天之右曰雲從制度如星拱東曰東華七間三門東西一百十尺深四十五尺髙八十尺西曰西華制度如東華北曰厚載五間一門東西八十七尺深髙如西華角樓四據宮城之四隅皆三􅝔樓琉璃瓦飾簷脊直崇天門有白玉石橋三虹上分三道中為御道鐫百花幡龍星拱南有御膳亭亭東有拱辰堂蓋百官㑹集之所東南角樓東差北有生料庫庫東為柴埸夾垣東北隅有羊圈西南角樓南紅門外留守司在焉西華南有儀鵉局西有鷹房厚載北為御苑外周垣紅門十有五內紅門垣五御苑紅門四此兩垣之內也大明門在崇天門內大明殿之正門也七間三門東西一百二十尺深四十四尺重簷日精門在大明門左月華門在大明門右皆三間一門大明殿乃登極正旦夀莭㑹朝之正衙也十一間東西二百尺深一百二十尺髙九十尺柱廊七間深二百四十尺廣四十四尺髙五十尺寢室五間東西挾六間後連香閣一間東西一百四十尺深五十尺髙七十尺青石花礎白玉石圓䲽文石甃地上藉重茵丹楹金飾龍繞其上四面朱瑣窗藻井間金繪飾燕石重陛朱䦨塗金銅飛鵰冒中設七寶雲龍御榻白蓋金縷褥並設后位諸王百寮怯薛官侍宴坐牀重列左右前置燈漏貯水運機小偶人當時刻捧牌而出木質銀褁􅃮瓮一金雲龍蜿繞之髙一丈七尺貯酒可五十餘石雕象酒卓一長八尺闊七尺一寸玉瓮一刑編磬一巨笙一玉笙玉空侯咸備于前前縣繍緣朱簾至冬月大殿則黃㹨皮壁幛黑貂褥香閣則銀鼠皮壁幛黑貂暖帳凡諸宮殿乘輿所臨御者皆丹楹朱瑣窗間金藻繪設御榻䄄褥咸備屋之簷脊皆飾琉璃瓦文思殿在大明寢殿東三間前後軒東西三十五尺深七十二尺紫檀殿在大明寢殿西制度如文思皆以𬗋檀香木為之縷花龍涎香間白玉飾壁草色髹緑其皮為地衣寶雲殿在寢殿後五間東西五十六尺深六十三尺髙三十尺鳯儀門在東廡中三間一門東西一百尺深六十尺髙如其深門之外有庖人之室稍南有酒人之室麟瑞門在西廡中制度如鳯儀門之外有內藏庫二十所所為七間鍾樓又名文樓在鳯儀南鼓樓又名武樓在麟瑞南皆五間髙七十五尺嘉慶門在後廡寶雲殿東景福門在後廡寶雲殿西皆三間一門周廡一百二十門髙三十五尺四隅角樓四間重簷凡諸宮周廡並用丹楹彤壁藻繪琉璃瓦飾簷脊延春門在寶雲殿後延春閣之正門也五間三門東西七十七尺重簷懿範門在延春左嘉則門在延春右皆三間一門延春閣九間東西一百五十尺深九十尺髙一百尺三詹重屋柱廊七間廣四十五尺深一百四十尺髙五十尺寢殿七間東西夾四間後香閣一間東西一百四十尺深七十五尺髙如其深重簷文石甃地藉花毳䄄簷帷咸備白玉石重陛朱䦨銅冒楯塗金翔其上閣上御榻二柱廊中設小山屏牀皆楠木為之而飾以金寢殿楠木御榻東夾𬗋檀御榻壁皆張素畫飛龍舞鳯西夾事佛像香閣楠木寢牀金縷褥黑貂壁幛慈福殿又曰東暖殿在寢殿東三間前後軒東西三十五尺深七十二尺明仁殿又曰西暖殿在寢殿西制度如慈福景耀門在左廡中三間一門髙三十尺清灝門在右廡中制度如景耀鍾樓在景耀南鼓樓在清灝南各髙七十五尺周廡一百七十二間四隅角樓四間玉德殿在清灝外七間東西一百尺深四十九尺髙四十尺飾以白玉甃以文石中設佛像東香殿在玉德殿東西香殿在玉德殿西宸慶殿在玉德殿後九間東西一百三十尺深四十尺髙如其深中設御榻簾帷䄄褥咸備前列朱䦨左右闢二紅門後山字門三間東更衣殿在宸慶殿東五間髙三十尺西更衣殿在宸慶殿西制度如東殿隆福殿在大內之西興聖宮之前南紅門三東西紅門各一繚以磚垣南紅門一東紅門一後紅門一光天門光天殿正門也五間三門髙三十一尺重簷崇華門在光天門左膺福門在光天門右各三間一門光天殿七間東西九十八尺深五十五尺髙七十尺柱廊七間深九十八尺髙五十尺寢殿五間兩夾四間東西一百三十尺髙五十八尺五寸重簷藻井瑣窗文石甃地籍花毳茵縣朱簾重陛朱䦨塗金鵰冒楯正殿縷金雲龍樟木御榻從臣坐牀重列前兩傍寢殿亦設御榻茵褥咸備青陽門在左廡中明暉門在右廡中各三間一門翥鳯樓在青陽南三間髙四十五尺驂龍樓在明暉南制度如翥鳯後有牧人宿衛之室夀昌殿又曰東暖殿在寢殿東三間前後軒重簷嘉僖殿又曰西暖殿在寢殿西制度如壽昌中位佛像傍設御榻針線殿在寢殿後周廡一百七十二間四隅角樓四間侍女直廬五所在針線殿後又有侍女室七十二間在直廬後及左右浴室一區在宮垣東北隅文德殿在明暉外又曰楠木殿皆楠木為之三間前後軒一間盝頂殿五間在光天殿西北角樓西後有盝頂小殿香殿在宮垣西北隅三間前軒一間前寢殿三間柱廊三間後寢殿三間東西夾各二間文宸庫在宮垣西南隅酒房在宮垣東南隅內庖在酒房之北興聖宮在大內之西北萬夀山之正西周以磚垣南闢紅門三東西紅門各一北紅門一南紅門外兩傍附垣有宿衛直廬凡四十間東西門外各三間南門前夾垣內有省院臺百司官侍直板屋北門外有窨花室五間東夾垣外有䆠人之室十七間凌室六間酒房六間南北西門外棊置衛士直宿之舍二十一所所為一間外夾垣東紅門三直儀天殿吊橋西紅門一逹徽政院門內差北有盝頂房二各三間又北有屋二所各三間差南有庫一所及屋三間北紅門外有臨街門一所三間此夾垣之北門也興聖門興聖殿之正門也五間三門重簷東西七十四尺明華門在興聖門左肅章門在興聖門右各三間一門興聖殿七間東西一百尺深九十七尺柱廊六間深九十四尺寢殿五間兩夾各三間後香閣三間深七十七尺正殿四靣朱懸瑣窗文石甃地藉以毳茵中設扆屏榻張白蓋簾帷皆錦繍為之諸王百寮宿衛官侍宴坐牀重列左右其柱廊寢殿亦各設御榻茵褥咸備白玉石重陛朱䦨塗金冒楯覆以白磁瓦碧琉璃飾其簷脊弘慶門在東廡中宣則門在西廡中各三間一門凝暉樓在弘慶南五間東西六十七尺延皓樓在宣則南制度如凝暉嘉德殿在寢殿東三間前後軒各三間重簷寶慈殿在寢殿西制度同嘉德山字門在興聖宮後延華閣之正門也正一間兩夾各一間重簷一門脊置金寶瓶又獨腳門二周閣以紅板垣延華閣五間方七十九尺二寸重阿十字脊白琉璃瓦覆青琉璃瓦飾其簷脊立金寶瓶單陛御榻從臣坐牀咸具東西殿在延華閣西左右各五間前軒一間圓亭在延華閣後芳碧亭在延華閣後圓亭東三間重簷十字脊覆以青琉璃瓦飾以緑琉璃瓦脊置金寶瓶徽青亭在圓亭西制度同芳碧亭浴室在延華閣東南隅東殿後傍有盝頂井亭二間又有盝頂房三間畏吾兒殿在延華閣右六間傍有窨花半屋八間木香亭在畏吾兒殿後東盝頂殿在延華閣東版垣外正殿五間前軒二間東西六十五尺深三十九尺柱廊二間深二十六尺寢殿三間東西四十八尺前宛轉置花朱蘭八十五扇殿之傍有盝頂房三間庖室一間靣湯盝頂房二間妃嬪庫房一間縫紉女庫房三間紅門一盝頂之制三椽其頂若笥之平故名西盝頂殿在延華閣西版垣之外制度同東殿東殿之傍有庖室三間好事房二各三間獨腳門二紅門一妃嬪院四二在東盝頂殿後二在西盝頂殿後各正室三間東西夾四間前軒三間後有三椽半屋二間侍女室八十五間半在東妃嬪院左西向半在西妃嬪院右東向室後各有三椽半屋二十五間東盝頂殿紅門外有屋三間盝頂軒一間後有盝頂房一間庖室一區在凝暉樓後正屋五間前軒一間後披屋三間又有盝頂房一間盝頂井亭一間周以土垣前闢紅門酒房在宮垣東南隅庖室南正屋五間前盝頂軒三間南北房各三間西北隅盝頂房三間紅門一土垣四周之學士院在閣後西盝頂殿門外之西偏三間生料庫在學士院南又南為鞍轡庫又南為軍器庫又南為牧人庖人宿衛之室藏珍庫在宫垣西南隅制度並如酒室惟多盝頂半屋三間庖室三間萬夀山在大內西北太液池之陽金人名瓊在島中統三年修繕之至元八年賜今名其山皆疊玲瓏石為之峯巒隱映松檜隆鬱秀若天成引金水河至其後轉機運㪺汲水至山頂出石龍口注方池伏流至仁智殿後有石刻蟠龍昻首噴水仰出然後由東西流入于太液池山前有白玉石橋長二百餘尺直儀天殿後橋之北有玲瓏石擁木門五門皆為石色內有隙地對立日月石西有石棋枰又有石坐牀左右皆有登山之徑縈紆萬石中洞府出入宛轉相迷至一殿一亭各擅一景之妙山之東有石橋長七十六尺闊四十一尺半為石渠以載金水而流於山後以汲於山頂也又東為靈圃竒獸珍禽在焉廣寒殿在山頂七間東西一百一十尺深六十二尺髙五十尺重阿藻井文石甃地四靣瑣窗板密其裏遍綴金紅雲而蟠龍矯蹇於丹楹之上中有小玉殿內設金嵌玉龍御榻左右列從臣坐林前架黑玉酒瓮一玉有白章隨其形刻為魚獸出汲于波濤之狀其大可貯酒三十餘石又有玉假山一峯玉響鐡一懸殿之後有小石二內出石龍首以噀所引金水西北有厠堂一間仁智殿在山之半三間髙三十尺金露亭在廣寒殿東其制圓九柱髙二十四尺尖頂上置琉璃珠亭後有銅幡竿玉虹亭在廣寒殿西制度如金露方亭在荷葉殿後髙三十尺重屋八靣重屋無梯自金露亭前復道登焉又曰線珠亭􅌡洲亭在溫石浴室後制度同方玉虹亭前仍有登重屋復道亦曰線珠亭荷葉殿在方前仁智西北三間髙三十尺方頂中置琉璃珠溫石浴石在􅌡洲前仁智西北三間髙二十三尺方頂中置塗金寶瓶圜亭又曰胭粉亭在荷葉稍西蓋后妃添妝之所也八靣介福殿在仁智東差北三間東西四十一尺髙二十五尺延和殿在仁智西北制度如介福馬湩室在介福前三間牧人之室在延和前三間庖室在馬湩前東浴室更衣殿在山東平地三間兩夾太液池在大內西周回若干里植夫容儀天殿在池中圓坻上當萬夀山十一楹髙三十五尺圍七十尺重簷圓蓋頂圓臺址甃以文石藉以花茵中設御榻周闢瑣窗東西門各一間西北厠堂一間臺西向列甃磚龕以居宿衛之士東為木橋長一百草尺闊草二尺通大內之夾垣西為木吊橋長四百七十尺闊如東橋中闕之立柱架梁于二舟以當其空至車駕行幸上都留守宮則移舟斷橋以禁往來是橋通興聖宮前之夾垣後有白玉石橋乃萬夀山之道也犀山臺在儀天殿前水中上植木芍藥隆福宫西御苑在隆福宫西先后妃多居焉香殿在石假山上三間兩夾二間柱廊三