body:
  text: 天台陶宗儀九成至元四年正月城京師以爲天下本右擁太行左注滄海撫中原正南靣枕居庸奠朔方峙萬夀山浚太液池派玉泉通金水縈畿帶甸負山引河壮哉帝居擇此天府城方六十里里二百四十歩分十一門正南曰麗正南之右曰順承南之左曰文明北之東曰安貞北之西曰徤徳正東曰崇仁東之右曰齊化東之左曰光熈正西曰和羙西之右曰肅清西之左曰平則大内南臨麗正門正衙曰大明殿曰延春閣宮城周回九里三十歩東西四百八十歩南北六百十五歩髙三十五尺甎甃至元八年八月十七日申時動土明年三月十五日即工分六門正南曰崇天十二間五門東西一百八十七尺深五十五尺髙八十五尺左右􅝔楼二􅝔楼登門兩斜廡十門闕上兩觀皆三􅝔楼連􅝔楼東西廡各五間西􅝔楼之西有塗金銅幡竿附宫城南面有宿衞直廬凡諸宫門皆金鋪朱戸丹楹藻繪􅊮壁琉璃瓦飾簷脊崇天之左曰星拱三間一門東西五十五尺深四十五尺髙五十尺崇天之右曰雲從制度如星拱東曰東華七間三門東西一百十尺深四十五尺髙八十尺西曰西華制度如東華北曰厚載五間一門東西八十七尺深髙如西華角楼四㩀宮城之四隅皆三􅝔樓琉璃瓦飾簷脊直崇天門有白玉石橋三虹上分三道中為御道鐫百花幡龍星拱南有御膳亭亭東有拱辰堂盖百官㑹集之所東南角楼東差北有生料庫庫東為柴埸夾垣東北隅有羊圈西南角楼南紅門外留守司在焉西華南有儀鵉局西有鷹房厚載北為御苑外周垣紅門十有五内紅門垣五御苑紅門四此兩垣之内也大明門在崇天門内大明殿之正門也七間三門東西一百二十尺深四十四尺重簷日精門在大明門左月華門在大明門右皆三間一門大明殿乃登極正旦夀莭㑹朝之正衙也十一間東西二百尺深一百二十尺髙九十尺柱廊七間深二百四十尺廣四十四尺髙五十尺寢室五間東西挟六間後連香閣一間東西一百四十尺深五十尺髙七十尺青石花礎白玉石圓䲽文石甃地上藉重茵丹楹金飾龍繞其上四面朱瑣窓藻井間金繪飾燕石重陛朱䦨塗金銅飛鵰冒中設七寳雲龍御榻白盖金縷褥並設后位諸王百寮怯薛官侍宴坐牀重列左右前置燈漏貯水運機小偶人當時刻捧牌而出木質銀褁􅃮瓮一金雲龍蜿繞之髙一丈七尺貯酒可五十餘石雕象酒卓一長八尺闊七尺一寸玉瓮一刑編磬一巨笙一玉笙玉空侯咸備于前前縣繍縁朱簾至冬月大殿則黄㹨皮壁幛黑貂褥香閣則銀䑕皮壁幛黒貂煖帳凡諸宮殿乗輿所臨御者皆丹楹朱瑣窓間金藻繪設御榻䄄褥咸備屋之簷脊皆飾琉璃瓦文思殿在大明寝殿東三間前後軒東西三十五尺深七十二尺紫檀殿在大明寝殿西制度如文思皆以𬗋檀香木爲之縷花龍涎香間白玉飾壁草色髹緑其皮爲地衣寳雲殿在寝殿後五間東西五十六尺深六十三尺髙三十尺鳯儀門在東廡中三間一門東西一百尺深六十尺髙如其深門之外有庖人之室稍南有酒人之室麟瑞門在西廡中制度如鳯儀門之外有内蔵庫二十所所為七間鍾楼又名文楼在鳯儀南鼔楼又名武楼在麟瑞南皆五間髙七十五尺嘉慶門在後廡寳雲殿東景福門在後廡寳雲殿西皆三間一門周廡一百二十門髙三十五尺四隅角楼四間重簷凡諸宮周廡並用丹楹彤壁藻繪琉璃瓦飾簷脊延春門在寳雲殿後延春閣之正門也五間三門東西七十七尺重簷懿範門在延春左嘉則門在延春右皆三間一門延春閣九間東西一百五十尺深九十尺髙一百尺三詹重屋柱廊七間廣四十五尺深一百四十尺髙五十尺寢殿七間東西夹四間後香閤一間東西一百四十尺深七十五尺髙如其深重簷文石甃地藉花毳䄄簷帷咸備白玉石重陛朱䦨銅冐楯塗金翔其上閣上御榻二柱廊中設小山屏牀皆楠木為之而飾以金寢殿楠木御榻東夹𬗋檀御榻壁皆張素畫飛龍舞鳯西夹事佛像香閤楠木寢牀金縷褥黒貂壁幛慈福殿又曰東煖殿在寝殿東三間前後軒東西三十五尺深七十二尺明仁殿又曰西煖殿在寢殿西制度如慈福景耀門在左廡中三間一門髙三十尺清灝門在右廡中制度如景耀鍾楼在景耀南鼓楼在清灝南各髙七十五尺周廡一百七十二間四隅角樓四間玉徳殿在清灝外七間東西一百尺深四十九尺髙四十尺飾以白玉甃以文石中設佛像東香殿在玉徳殿東西香殿在玉徳殿西宸慶殿在玉徳殿後九間東西一百三十尺深四十尺髙如其深中設御榻簾帷䄄褥咸備前列朱䦨左右闢二紅門後山字門三間東更衣殿在宸慶殿東五間髙三十尺西更衣殿在宸慶殿西制度如東殿隆福殿在大内之西興聖宮之前南紅門三東西紅門各一繚以磚垣南紅門一東紅門一後紅門一光天門光天殿正門也五間三門髙三十一尺重簷崇華門在光天門左膺福門在光天門右各三間一門光天殿七間東西九十八尺深五十五尺髙七十尺柱廊七間深九十八尺髙五十尺寢殿五間兩夹四間東西一百三十尺髙五十八尺五寸重簷藻井瑣窓文石甃地籍花毳茵縣朱簾重陛朱䦨塗金鵰冐楯正殿縷金雲龍樟木御榻從臣坐牀重列前兩傍寢殿亦設御榻茵褥咸備青陽門在左廡中明暉門在右廡中各三間一門翥鳯楼在青陽南三間髙四十五尺驂龍楼在明暉南制度如翥鳯後有牧人宿衞之室夀昌殿又曰東煖殿在寢殿東三間前後軒重簷嘉僖殿又曰西煖殿在寝殿西制度如壽昌中位佛像傍設御榻針線殿在寢殿後周廡一百七十二間四隅角楼四間侍女直廬五所在針線殿後又有侍女室七十二間在直廬後及左右浴室一區在宮垣東北隅文德殿在明暉外又曰楠木殿皆楠木為之三間前後軒一間盝頂殿五間在光天殿西北角楼西後有盝頂小殿香殿在宮垣西北隅三間前軒一間前寝殿三間柱廊三間後寢殿三間東西夹各二間文宸庫在宮垣西南隅酒房在宮垣東南隅内庖在酒房之北興聖宮在大内之西北萬夀山之正西周以磚垣南闢紅門三東西紅門各一北紅門一南紅門外兩傍附垣有宿衞直廬凡四十間東西門外各三間南門前夹垣内有省院臺百司官侍直板屋北門外有窨花室五間東夹垣外有䆠人之室十七間凌室六間酒房六間南北西門外棊置衞士直宿之舎二十一所所爲一間外夹垣東紅門三直儀天殿吊橋西紅門一逹徽政院門内差北有盝頂房二各三間又北有屋二所各三間差南有庫一所及屋三間北紅門外有臨街門一所三間此夹垣之北門也興聖門興聖殿之正門也五間三門重簷東西七十四尺明華門在興聖門左肅章門在興聖門右各三間一門興聖殿七間東西一百尺深九十七尺柱廊六間深九十四尺寝殿五間兩夹各三間後香閤三間深七十七尺正殿四靣朱懸瑣窓文石甃地藉以毳茵中設扆屏榻張白盖簾帷皆錦繍為之諸王百寮宿衞官侍宴坐牀重列左右其柱廊寢殿亦各設御榻茵褥咸備白玉石重陛朱䦨塗金冐楯覆以白磁瓦碧琉璃飾其簷脊弘慶門在東廡中宣則門在西廡中各三間一門凝暉楼在弘慶南五間東西六十七尺延顥楼在宣則南制度如凝暉嘉徳殿在寝殿東三間前後軒各三間重簷寳慈殿在寝殿西制度同嘉徳山字門在興聖宮後延華閣之正門也正一間兩夹各一間重簷一門脊置金寳瓶又獨脚門二周閣以紅板垣延華閣五間方七十九尺二寸重阿十字脊白琉璃瓦覆青琉璃瓦飾其簷脊立金寳瓶單陛御榻從臣坐牀咸具東西殿在延華閣西左右各五間前軒一間圓亭在延華閣後芳碧亭在延華閣後圓亭東三間重簷十字脊覆以青琉璃瓦飾以緑琉璃瓦脊置金寳瓶徽青亭在圓亭西制度同芳碧亭浴室在延華閣東南隅東殿後傍有盝頂井亭二間又有盝頂房三間畏吾児殿在延華閣右六間傍有窨花半屋八間木香亭在畏吾児殿後東盝頂殿在延華閣東版垣外正殿五間前軒二間東西六十五尺深三十九尺柱廊二間深二十六尺寝殿三間東西四十八尺前宛轉置花朱蘭八十五扇殿之傍有盝頂房三間庖室一間靣湯盝頂房二間妃嬪庫房一間縫紉女庫房三間紅門一盝頂之制三椽其頂若笥之平故名西盝頂殿在延華閣西版垣之外制度同東殿東殿之傍有庖室三間好事房二各三間獨脚門二紅門一妃嬪院四二在東盝頂殿後二在西盝頂殿後各正室三間東西夹四間前軒三間後有三椽半屋二間侍女室八十五間半在東妃嬪院左西向半在西妃嬪院右東向室後各有三椽半屋二十五間東盝頂殿紅門外有屋三間盝頂軒一間後有盝頂房一間庖室一區在凝暉楼後正屋五間前軒一間後披屋三間又有盝頂房一間盝頂井亭一間周以土垣前闢紅門酒房在宮垣東南隅庖室南正屋五間前盝頂軒三間南北房各三間西北隅盝頂房三間紅門一土垣四周之學士院在閣後西盝頂殿門外之西偏三間生料庫在學士院南又南為鞍轡庫又南為軍器庫又南為牧人庖人宿衞之室蔵珎庫在宫垣西南隅制度並如酒室惟多盝頂半屋三間庖室三間萬夀山在大内西北太液池之陽金人名瓊在島中統三年脩繕之至元八年賜今名其山皆疊玲瓏石為之峯巒隱映松檜隆欝秀若天成引金水河至其後轉機運㪺汲水至山頂出石龍口注方池伏流至仁智殿後有石刻蟠龍昻首噴水仰出然後由東西流入于太液池山前有白玉石橋長二百餘尺直儀天殿後橋之北有玲瓏石擁木門五門皆為石色内有隙地對立日月石西有石棋枰又有石坐牀左右皆有登山之徑縈紆萬石中洞府出入宛轉相迷至一殿一亭各擅一景之妙山之東有石橋長七十六尺闊四十一尺半為石渠以載金水而流於山後以汲於山頂也又東為靈圃竒獸珍禽在焉廣寒殿在山頂七間東西一百一十尺深六十二尺髙五十尺重阿藻井文石甃地四靣瑣窓板宻其裏徧綴金紅雲而蟠龍矯蹇於丹楹之上中有小玉殿内設金嵌玉龍御榻左右列從臣坐林前架黒玉酒瓮一玉有白章隨其形刻為魚獸出汲于波濤之状其大可貯酒三十餘石又有玉假山一峯玉響鐡一懸殿之後有小石二内出石龍首以噀所引金水西北有厠堂一間仁智殿在山之半三間髙三十尺金露亭在廣寒殿東其制圓九柱髙二十四尺尖頂上置琉璃珠亭後有銅幡竿玉虹亭在廣寒殿西制度如金露方亭在荷葉殿後髙三十尺重屋八靣重屋無梯自金露亭前複道登焉又曰線珠亭􅌡洲亭在温石浴室後制度同方玉虹亭前仍有登重屋複道亦曰線珠亭荷葉殿在方前仁智西北三間髙三十尺方頂中置琉璃珠温石浴石在􅌡洲前仁智西北三間髙二十三尺方頂中置塗金寳瓶圜亭又曰臙粉亭在荷葉稍西盖后妃添妆之所也八靣介福殿在仁智東差北三間東西四十一尺髙二十五尺延和殿在仁智西北制度如介福馬湩室在介福前三間牧人之室在延和前三間庖室在馬湩前東浴室更衣殿在山東平地三間兩夹太液池在大内西周迴若干里植夫容儀天殿在池中圓坻上當萬夀山十一楹髙三十五尺圍七十尺重簷圓盖頂圓臺址甃以文石藉以花茵中設御榻周闢瑣窓東西門各一間西北厠堂一間臺西向列甃磚龕以居宿衞之士東為木橋長一百廿尺闊廿二尺通大内之夹垣西為木吊橋長四百七十尺闊如東橋中闕之立柱架梁于二舟以當其空至車駕行幸上都留守宮則移舟断橋以禁徃来是橋通興聖宮前之夹垣後有白玉石橋乃萬夀山之道也犀山臺在儀天殿前水中上植木芍藥隆福宫西御苑在隆福宫西先后妃多居焉香殿在石假山上三間兩夹二間柱廊三