front:
  text: 南村輟耕録卷之二十六
  hash: sha256:afa1a6bbdd4032b6f4591480bac35dbc83d0db6c7edabfe6ad6a30b98da5a05d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_026-1a}
body:
  text: 天台陶宗儀九成御史中丞崔彧進傳國壐牋曰資徳大夫御史中丞臣崔彧言至元三十一年嵗次甲午春正月既旦臣畨直宿衞御史臺通事臣闊闊术即衞所告曰太師國王之孫曰拾得者嘗官同知通政院事今既殁矣生産散失家計窘極其妻脫脱真縈病一子甫九歲託以玉見貿供朝夕之給及岀玉印也闊闊术蒙古人不暁文字兹故来告聞之且驚且疑乃還私家取視之色混青緑而玄光采射人其方可黍尺四寸厚及方之三不足皆紐盤螭四厭方際紐盡壐之上取中通一横窽可徑二分舊貫以韋條靣有篆文八刻畫捷徑位置匀適皆若蟲鳥魚龍之状別其彷彿有若命字若壽字者心益驚駭意謂無乃當此昌運傳國璽出乎急召監察御史臣楊桓至即讀之曰受命于天既壽永昌此傳國寳璽文也聞之果合前意神為肅然乃加以凈緜複以白帕率御史臣楊桓通事臣闊闊木等直趋青宫因鎮國上将軍都指揮使詹事王慶端嘉議大夫家令臣阿散䍐少中大夫詹事院判臣僕散壽導謁進獻皇太妃御前徽聖仁格皇后啓曰此古傳國璽也秦以和氏璧所造厥後有天下者寳之以君萬國然自前代失之乆矣今當宫車晚岀諸大臣僉議迎請皇太孫成宗龍飛之時不求而見此乃天示其瑞應也冝早逹於皇太孫行殿以符靈貺巳蒙嘉納翼日令資善大夫中書右丞詹事臣張九思少中大夫詹事院判臣僕散壽傳皇太孫親為付授此盖皇太妃懿慮深遠非臣愚所能及也臣前又啓收蔵寳璽之家不知甄別循常以玉求粥臣見而識之特将来獻彼猶未知望恩䘏其家傳㫖賜收玉之家楮幣二千五百貫并逮臣等進辯其實者三人衣叚各一表裏紋金綺素有差以為異日旌賞之徴臣等巳詣府前敬受訖自惟無状不勝慚赧是日金紫光禄大夫中書右丞相臣完澤率集賢翰林侍從諸臣入賀御前命出寳璽徧示群臣此又出扵皇太妃至公正大之量翰林學士臣董文用等前啓曰此誠祥物岀當其時若非皇太妃皇太孫聖感何以臻此丞相以下臺臣等次第上夀自是内外稱慶咸曰天命有㱕臣聞詩序曰文王有明徳故天復命武王今神寳之出盖因先帝有明德故天命復㱕于皇太孫也又曰皇天親有徳厚有道以言皇天非有徳有道則不親不厚也又聞之書曰皇天無親惟徳是輔又曰天命有徳克享天心受天明命作善降之百祥歴觀上世詩書之㫖未有無徳而能致天命之㱕也欽惟太祖聖武皇帝秉資神格始為天下除禍定亂隆功盛徳簡在天心受命而為天下主以至我憲天述道仁文義武大光孝皇帝徳配乾坤功包海嶽孝格宗廟子育黎元輿地所記悉主悉臣照臨無幽咸遂生樂施及明孝太子天錫仁慈之徳上感君親之恱下係億兆之望至元建號日月重明無為而治者迨廿年雖由太子進徳修業之洪溢亦賴元妃内助之渊宻也敬惟皇太妃聦明㳤懿毋儀崇嚴徳量漙厚孝敬慈恕出乎天性徃古未有也自明孝太子升遐内則皇孫翼翼訓導端嚴外則百司班班臨御整飾由是聖上君父大見倚重雖于時皇太孫未昭儲副之託而詹事之司未甞一日廢闕以見皇天定命扵青宫之位無時不在誠非人力所能爲也欽惟皇太孫殿下徳資剛明才兼文武英謀獨断大肖祖宗族属係望遐迩㱕心聖祖憲天述道仁文義武大光孝皇帝灼知天命之所在乆存隆顧将付以撫軍之重扵至元三十年夏六月二十二日賜以皇太子金寳大正儲位而後詔以出師之期天下聞之室家胥慶和氣穣穰出於两間是歲秋稔數年䍐遇臣切念天象無言託命不爽豈期又於大行皇帝宫車晚出之後甫八日傳國神寳不求而出於大功臣子孫之家連由臺諌耳目之司直逹於皇太妃御前斯盖皇天授命皇太孫誕膺龍飛以正九五之位㑭符寳璽之文既壽而永永而又昌臣又見皇天之心大頼我皇元継體之君不疾不遲景命適至以允四海之望者其瑞應之兆有三按唐史代宗之将為太子先封楚王及位正儲副而監國楚州獻定國寳一十有三因曰楚者太子之封今天降寳于楚冝建元寳應盖以寳為太子瑞應也昔明孝太子封為燕王今皇太孫燕王之子也将主神器而神寳出於燕適與前事相符此瑞應之兆一也又寳璽之出正當皇元聖天子六合一統之時宫車晚出之近朝以見天心正為継體之君設也此瑞應之兆二也又寳璽之出適當月之三十日有終而復始之象以見先聖皇帝御丗太平之功既成㑭継之君復其始也此瑞應之兆三也今以此三兆觀之益見天命之来際合於青宫也臣區區之情無任傾嚮輙罄所見以贊其萬一謹将寳璽之出䖏古今始末詳㩀􅊲按許慎說文壐王者印也以守土故為文從爾從土其義盖曰天付爾此器俾寳之以守爾土也至周太史籀易為从爾从王義取天付爾此玉寳以為天下君也三代以上璽文無所考諸史籍并寳璽篆文圖說曰傳國璽方四寸其文文飾如前楚以卞和所獻之璞琢而成璧後求昏扵趙以納聘焉秦昭王請以十城昜之而不獲始皇併六國得之命李斯篆其文玉工孫壽刻之太平御覽又以為藍田玉所刻二世子嬰奉璽降沛公扵軹道旁髙祖即位服其璽因世傳之謂為傳国璽厥後孺子未立蔵扵長樂宫及莾篡位使安陽矦王舜迫太后求之太后怒罵而不與舜言益切出璽投之地璽因歸莾及更始㓕莾校尉公賔得壐詣宛獻扵更始赤眉殺更始立盆子璽為盆子所有後盆子靣縳奉璽扵光武至獻帝董卓作亂掌璽者投扵井中孫堅征董卓扵井中得之袁術奪扵堅妻死􅍮州刺史徐璆聞帝為曹操迎在許昌以璽送之帝後遜位并以璽歸魏帝道鄕公禅位璽歸扵晋懐帝遇劉聦之害壐歸扵聦聦死歸矅矅為石勒所滅璽入扵勒勒㓕入扵冉閔閔敗見收扵閔之将軍蔣幹晋征西将軍謝尚購得之以還東晋時穆帝永和八年也自璽寄扵劉石共五十三年晋復得之是後宋齊梁陳相傳以至扵隋㓕陳蕭后與太子正道并傳國璽並入扵突厥唐太宗即位寳璽未獲乃自刻玉曰皇帝景命有徳者昌貞觀四年蕭后與正道自突厥奉璽歸扵唐唐始得焉朱温篡唐璽入扵温荘宗定亂璽入扵後唐荘宗遇害明宗嗣立再傳飬子從珂是為廢帝石氏篡立自焚自是璽不知所在至宋哲宗咸陽民叚義獻玊璽及徽宗為金所虜凡有寳璽金皆取之内璽一十有四青玊傳國璽一其色與今所獻玊璽相同則知宋之南遷二百年無此寳璽也明矣然自金既取扵宋之後寳璽出䖏得失亦未見明說以及我元適集皇太孫寳命所歸之際應期而出臣職揔御史親㑹盛事不可以不録又圖中別有璽其文亦八旁注曰此傳國璽背文也今見寳璽之背皆刻螭形蟠屈凹凸不齊偏厭四際無地可置此文按太平御覧晋泰光十九年雝州刺史㕁恢表慕容水稱藩奉璽方六寸厚七分蟠螭為鼻今髙四寸六分四邊龜文下有字曰受天之命皇帝夀昌原其所由未詳厥始以斯言之當別是一璽非今傳國璽也此又不可不辯臣彧誠惶誠恐頓首頓首謹奉牋上進以聞伏希聽覧微臣不勝瞻望之至謹言此文乃桓所譔桓字武子兖州人㓜警悟為人寛厚事篤孝博覧群籍尤精篆籀之學由儒學教授仕至國子司業䘚闊闊木拓跋氏成宗即位近臣以其事聞授漢中廉訪司僉事仕至湖廣㢘訪使率國史扵按禮児傳謂拾得乃國王速渾察之子謂桓辯其文曰受命于天既壽永昌於桓傳謂桓辯其文曰受天之命既壽永昌盖秦别有受天之命皇帝壽昌一璽又非此璽此則史之誤也今取宋薛尚功所編歴代鐘鼎彛器欵識法帖碑夲第十八卷内璽文模勒于後以備博古者之一覽云尚功云二璽文本只一器縁傳摹宇畫不同形制大湖州長興州金沙泉唐時用此水造紫荀茶進貢泉不常出有司具牲牢祭之始得水事訖即涸宋季屢加浚治泉迄不出至元十五年歲戊寅中書省遣官致祭一夕水溢可漑田千畒遂賜名瑞應泉曹操疑家七十二在漳河上宋俞應符有詩題之曰生前欺天絶漢統死後欺人設疑冢人生用智死即休何有餘機到丘壟人言疑冢我不疑我有一法君未知直湏盡發疑冢七十二必有一冢藏君屍此亦詩之斧鉞也丗人多用盧橘以稱枇杷按司馬相如㳺獵賦云盧橘夏熟黄柑橙揍枇杷然而善切柿夫盧橘與枇杷並列則盧橘非枇杷明矣郭璞注蜀中有給容橙冬夏花實相継通嵗食之謂即盧橘也意者橙橘惟熟於冬而盧橘夏亦熟故舉以為重歟唐三體詩裴庾註云廣州記盧橘皮厚大如柑酢多至夏熟土人呼為壷橘又曰盧橘葉公李為宋太學生時上書極言賈似道權姦誤國㡬為所害及世祖平江南即召見官之至中書右丞凡有軍國大事必問曰曽與蠻子秀才啇量否盖指李也一日議事大廷乃不在列問其故則病足遂以所御五龍車召之至命坐而諮决焉甞扵其孫以道䖏見當時所畫應召圖五龍車中坐一山野質朴之老其遭遇有如此者使無賈似道以發其正大之論直一書生耳而望功名顯天下亦難矣瓊州一水南北有兩伏波将軍廟丗人莫明其故嘗􅊲之史記及東漢書盖漢元鼎五年衞尉路博德為伏波将軍岀桂林下匯水不特馬援為伏波将軍也至元印造通行寳鈔分一十一料貳貫壹貫伍伯文叄伯文貳伯文壹伯文伍拾文叄拾文貳拾文壹拾文伍文某人浮湛里中無以為生偵民有小不平嗾之訟佐之請謁巳旁縁自資且既餌臨政者因持其短長以蠹民梗政遂有人作鵰傳以警之傳曰昔皇帝少皥氏之世鳯鳥適至故爲鳥師而鳥名命鳳凰爲百禽長當是時南山有鳥其名曰鵰鵰之性鷙而徤貪而狡稲梁之甘木實之羙鵰不屑焉資衆禽之肉以爲食鵰之徒實繁其與鵰同氣而異質者鷹鸇鳶隼鷂鶻鶚皆助鵰爲雪者也其異類而同姓者鴟鶚鵂鶹梟鴆訓狐鬼車其惡與鵰同特其材異爾然鵰有大小小者從鷦鷯鷃雀力可制則制之大者雖鴻鵠不畏也故鵰之所在衆禽皆迯散逺去摽枝無安巢灌叢無息羽鵰無所得食則遣操詭辭招衆禽之過而愬諸鳯曰鴻鴈背北而来南是叛也鸚鵡舍禽言習人語是姦者也倉庚出幽谷遷喬木是冐越者也鷾鴯秋乆逺遁是避役者也烏知吉㐫言妖祥以惑衆聴鵲道河以阻水利鳲鳩攘鵲之居鴛鴦荒淫無度鷗好閒雞好闘毆相傷鳬鷖鵝鴨習水戰鸕鷀白鷺得魚不税孔雀有異相杜䳌催帰令戍卒逃亡提壷勸人飲酒生事是皆有罪不治将益甚鳯凰惑焉命爽鳩氏治之鵰與爽鳩相為表裏窮山谷捜林麓禽之出者摶之逐之攫之拏之啄胔扼吭裂肪筋磔毛揚風洒血殷地凢遇之者無噍類其餘皆周章振掉謀所以免禍者毁巢破鷇空所以積奉爽鳩且以賂鵰使勿執扵是鵰之勢益張而衆禽之生理曰蹙其瓜距稍利者慕鵰所為則起而效之其鈍者深蔵逺竄餒死扵草莾者相藉也而鳯皇始憂之間蓬菜之顛有胎仙焉胎仙名鶴號青田翁㢘分而潔白和平而好生於是徴爽鳩使鶴乗軒而治之鶴乃與鳯皇謀曰夫鵰其始一而巳自子之不戒而使之蔓延今之為鵰者何其多耶昔之鵰名鵰宇鵰形鵰性鵰本為鵰者也今有非鵰而鵰者何也鵰則得食不鵰則不得食鵰則有利而無害不鵰則利未見而害常隨之故不容其不鵰也今禽之産子者願為鵰鶵之習飛者學為鵰形状與鵰異者又冐為鵰不誅其渠魁殱其兇醜以勵其餘吾恐鸞鷃鵷䴏神雀大鵬金翅皆化為鵰耳鳯凰曰善奏請于帝帝遣虞人持弓矢張網羅隨鵰而磔之鵰之徒盡斃敕天下無留鵰故其餘黨皆屏迹匿影不敢出衆禽始得安扵生飬以盡其天年此皆少皥氏之恩鳯凰與鶴之力也太史公曰鵰姦禽也暴悪受誅固宜吾獨懼今之人子務飬鵰意有所欲舉鵰而放之求衆禽之血肉以肥其軀殊不知少皥氏之戒也嗟夫害物而日益者刑雖未及天必譴之其鵰豈足恤哉陳衆仲先生嘗題樂全堂有能守不成三瓦戒之句人多不知所出按史記龜笑傅云天尚不全故世為屋不成三瓦而陳之注陳猶居也貫酸齋先生臨終有辤世詩曰洞花幽草結良縁𬒳我瞞他四十年今日不留生死相海天秋月一般圓洞花幽草乃先生二妾名虞文靖公集撰髙昌王丗勲碑序其丗冢曰畏吾兒之地有和林山二水出焉曰秃忽刺曰薛靈哥一夕有天光降于樹在两河之間國人即而候之樹生廮若人姙身然自是光恒見者越九月又十日而廮裂得廮児五收飬之其最稺者曰卜吉可䍐既壮遂能有其民人土田而為之君長傳二十餘君是為玉倫的斤數與唐人相攻戰乆之乃議和親以息民而罷兵扵是唐以金蓮公主妻玉倫的斤之子葛勵的斤居和林别力跛力荅言婦所居山也後遷交州至太祖龍飛朔漠當是時巴而术阿而忒的斤亦都護在位亦都護者其國王號也舉國入朝太祖嘉之妻以公主曰也立安敦自是子孫皆封王今上皇后弘吉刺氏名伯顔忽都武帝宣懿惠聖皇后之姪毓徳王孛羅帖木児女後至元二年丁丑三月立性節儉不妬忌動以禮法自持第三皇后竒氏素有寵居興聖西宫帝希幸東内左右以為言后無㡬微怨望意甞從帝時巡上京次中道帝遣内官傳㫖欲臨幸辤曰莫夜非至尊徃来之時内官徃来再三竟拒不納帝益賢之居坤德殿終日端坐未嘗妄踰户閾至元二十五年乙巳八月丁未崩年四十二文宗居金陵潜邱時命臣房大年畫京都萬歲山大年辤以未嘗至其地上索𥿄為運筆布畫位置令按槀圖上大年得槀敬蔵之意匠經營格法遒整雖積學專工所莫能及至元十三年江南𥘉内附民間盛傳武當山真武降筆書長短句曰西江月者鋟刻于梓黄𥿄模印貼璧間其詞云九九乾坤巳定清明節候開花米田天下亂如麻直待龍蛇繼馬継一作暨依舊中華福地古月一陣還冢當𥘉指望作生涯死在西江月下虞邵菴先生布衣時落落不偶乆客錢唐一日偕友人楊公仲弘薛公宗海范公徳機訪方外宰渊微練師於西湖之曲求召鬼仙以卜家蔵練師即置箕縣筆書符作法有頃箕動筆運而附降云某非仙乃當境神也練師叱曰吾不汝召汝神何来神附云其欲乞虞公撰一保文申逹上帝用求遷陞耳衆因勸先生其無辤神請先生遂諾翼日文成火於湖濵逾再詣練師禱卜神復降云某巳獲授城隍謹候謁謝公必貴顯幸毋自忍忽旣而先生由校官至奎章閣侍書學士贈江西行中書省叅知政事封仁壽郡公謚文靖以文章名海内豈非先丗積有餘慶天将報施扵先生之躬而鬼神預有知耶髙文簡公一日與客逰西湖見素屏潔雅乗興畫竒石古木數曰後文敏公為𥙷叢竹後為户部楊侍郎所得虞文靖公題詩其上云不見湖州三百年髙公尚書生古燕西湖醉歸冩古木呉興爲𥙷幽篁妍國朝名筆誰第一尚書醉後妙無敵老蛟欲起風雨来星堕天河化爲石趙公自是真天人獨與尚書情最親髙懷古誼两相得慘澹酬酢皆天真侍郎得此自京國使我觀之三嘆息今人何必非古人淪落文章付陳迹此圖遂成三絶矣浙西園苑之勝惟松江下砂瞿氏爲最古宋秀州守方岳亦有詩留題壁間後紫陽虚谷翁来逰継題十絶其一云璧間墨客埽龍蛇所寫詩佳字亦佳忽見題詩增感慨吾家宗伯老秋厓是也次則平江福山之曹横澤之頋又其次則嘉興魏塘之陳當愛山全盛時春二三月間逰人如織後其卒未及數月花木一空廢弛之速未有若此者自後其地呉氏之園曰竹荘盖元有池陂數十畒天然若湖瑩之嘗買得水殿圖㩀圖位置構亭水心潇灑莫比譁訏之徒欲聞諸官亟塑三教像于中易曰三教堂人不可得而入矣瑩之卒荐遭兵燹今無一存者福山横澤下砂皆無有乆矣可勝嘆哉呉江長橋七十二間作橋者僧徒雅師立捴其役崇敬率衆以給其費居士姚行獨任勞以終事經始扵㤗定乙丑二月期年而成後九年州守的斤海牙作鉅閣奉觀音㑰于上南村輟耕録卷之二十六
