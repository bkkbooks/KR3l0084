front:
  text: 南村輟耕録卷之十一
  hash: sha256:b6b6318d55357b5d0f650f74a55de35e779a03a6469a44bfb9ea06d1385d7470
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_011-1a}
body:
  text: 天台陶宗儀九成王思善繹自號癡絶生其先睦人居杭之新門篤志好學雅有才思至正乙酉間檇李葉居仲廣居寓思善之東里教授余從永嘉李五峯先生孝光徃訪之時思善在諸生中年方十二三巳能丹青亦觧寫真先生即俾作一圓光小像面部僅大如錢而宛然無毫髮異先生喜作文以華之尓後余復託交於其尊人日華曅遂與思善為忘年友思善継得中呉顧周道逵緒年開彂益造精微是故於小像特妙非惟貌人之形似枊且得人之神氣甞授余祕訣并采繪法令著于此與好事者共之寫像祕訣凡寫像湏通曉相法盖人之面貌部位與夫五岳四瀆各各不侔自有相對照䖏而四時氣色亦異彼方呌嘨談話之間本真性情彂見我則静而求之黙識于心閉目如在目前放筆如在筆底然後以淡墨覇定逐旋積起先蘭臺庭尉次鼻凖鼻凖既成以之為主若山根髙取印堂一筆下来如低取眼堂邉一筆下來或不髙不低在乎八九分中則側邉一筆下来次人中次口次眼堂次眼次眉次頦次頰次髮際次耳次髮次頭次打圈打圈者面部也必冝如此一一對去庶㡬無纎毫遺失近代俗工膠柱鼓瑟不知変通之道必欲其正襟危坐如泥塑人方乃傳寫因是萬無一得此又何足恠㢤吾吁不可柰何矣采繪法凡靣色先用三朱膩粉方粉藤黃檀子土黄京墨合和襯底上面仍用底粉薄籠然後用檀子墨水斡染靣色白者粉入少土黄燕支不用燕支則三朱紅者前件色入少土朱𬗋堂者粉檀子老青入少燕支黄者粉土黄入少土朱青黒者粉入檀子上黄老青各一點粉薄罩檀墨斡巳上看顔色清濁加减用又不可執一也口角燕支淡如要帶笑容口角兩筆畧放起眼中白染瞳子外兩筆次用煙子點睛墨打圈眼梢微起有摺便笑口唇上燕支驀鼻色紅燕支微籠面雀班淡墨水斡麻檀水斡髯色墨者依鬂髮渲紫者檀墨間渲黄紅者藤黄檀子渲髮先用墨染次用煙子渲有間渲排渲乱渲當自取用手指甲先用燕支染次用粉染根凡染婦女靣色燕支粉襯薄粉籠淡檀墨斡凡染法白𥿄上先染後却罩粉然後再染提掇絹則先襯背後凡調合服飾器用顔色者緋紅用銀朱紫花合桃紅用銀朱燕支合肉紅用粉為主入燕支合栢枝緑用枝條緑入漆緑合黑緑用漆緑入螺青合檀栁緑用枝條緑入槐花合官緑即枝條緑是鴨頭緑用枝條緑入髙漆緑合月下白用粉入宗墨合栁黃用粉入三緑標并少藤黄合鵝黃用粉入槐花合磚褐用粉入煙合荆褐用粉入槐花螺青土黃標合艾褐用粉入槐花螺青土黄檀子合鷹背褐用粉入檀子煙墨土黃合銀褐用粉入藤黃合珠子褐用粉入藤黄燕支合藕絲褐用粉入螺青燕支合露褐用粉入少土黄檀子合茶褐用土黄為主入漆緑煙墨槐花合麝香褐用土黄檀子入煙墨合檀褐用土黄入紫花合山谷褐用粉入土黃標合枯竹褐用粉土黄入檀子一點合湖水褐用粉入三緑合䓗白褐用粉入三緑標合棠梨褐用粉八土黄銀朱合秋茶褐用土黄入三緑槐花合油裏墨用𬗋花土黄煙墨合玉色用粉入髙三緑合鮀色用粉漆緑標墨入少土黃合氁子用粉土黃檀子入墨一點合藍青用三青入髙三緑合金黃用槐花粉入燕支合雅青用蘇青襯螺青罩鼠毛褐用土黃粉入墨合不老紅用紫花銀朱合蒲萄褐用粉入三緑𬗋花合丁香褐用肉紅為主入少槐花合杏子絨用粉墨螺青八檀子合氁綾用紫花底𬗋粉榙花様畨皮用土黄銀朱合鹿胎用白粉底紫花様水獺氊用粉土黄合牙笏用好粉一點土黃粉凝皁鞾用煙墨標柘木交椅用粉檀子土黃煙墨合金絲柘同上不入墨紫袍用三青燕支合其餘不能一一脩載在對物用色可也凡合用顔色細色頭青二青三青深中青淺中青螺青蘇青二緑三緑花葉緑枝條緑南緑油緑漆緑黃丹飛丹三朱土朱銀朱枝紅紫花藤黄槐花削粉石榴顆綿燕支檀子其檀子用銀朱淺入老墨燕支合江隂州宋李時兵馬司在州治東南里許平地上司之後置土牢歸附後有善地理者以為宜帝王居之人問其故曰君山龍脉正結於此是以知其然也皆弗之信越数年就其上起盖三皇廟亦竒術㢤君山州之主山也姑蘇鄭君輔放浪不覊爲漕府小史時督運至直沽狎逰群娼挑逹太甚殊弗堪之或有進藥於鄭曰此助陽竒劑也鄭試傳之数日後隂器消縮若閹䆠然竟以此終其身漫書為後人戒應之紹才錢唐人以郷貢下第任嘉興學正丁父憂仍寓居授徒至正壬辰秋避難于其諸生李氏子家去城数十里曰奉賢郷李之從祖號太無為道士住持紫虚觀之紹一見若平生歡八月廿九日太無得中風疾之紹饋藥療之獲蘇日一再詣問九月四日又自𬗋虚問疾還寓忽得疾一中而殂其妻楊氏太史同僉瑀之女就所館治䘮且以訃其母若弟於海寧及嘉興城中𬗋虚之徒以其疾與太無同不以告是夜将半太無忽呼弟子卓䖏潜輩謂曰適得夢甚恠俾取𥿄筆書之云扵本觀所奉岳祠之前見有某姓名吏及卒二人押男女各一併持公文而来因讀其詞曰嘉興路城隍司准海寧州城隍司牒為陸小蓮告至正八年内溺水事冤屈未伸今彂陳喜児應偉前去勒要應才同觧岳祠周府君取問太無詢来使之詳荅曰陸小蓮者嘉興百福坊人而應才之婢也為其妻妒逐之遂赴水死陳喜児者才之毋也時居海寧偉字之竒才之弟也居嘉㒷城東謂彼時不為救護故連逮耳太無見陳氏帶鎖衣白衣黄裙問之年六十有四應偉荷校衣青衣録其罪状皆歷歴可記来使云今若貴司移牒温都統為之觧釋則尚可也遂覺始知之紹巳逝王昌言與之紹有交承之好同寓其所明旦来𬗋虚太無因問應母之年及之竒之貌皆如所夢乃以告之昌言馳報楊氏楊即詣紫虚拜懇太無于床下謂夢中事皆實有之復自侯其詳且言某夫胸間尚温手足猶欶故求移文觧釋仍躬禱岳祠兾之紹之復生也是日午後之竒自城東来衣青衣云昨日亦得疾與兄同所見如太無夢今雖少甦猶憒憒莫知所以然至夜楊氏以憂懼亦疾作旋即無它而之紹氣巳絶矣時建徳卲青溪偶宿紫虚目擊其事翼曰遂行不知徃訃陳氏者歸報何如及之竒之死生耳開元時髙太素隱啇山起六逍遥館各製一銘其三為名曰𥘉出銘曰折膠墮指夢想負背金鑼騰空映簷白醉見清異録楼攻媿甞取白醉二字以名閤聶以道宰江右一邑日有村人早出賣菜拾得至元鈔十五錠歸以奉母母怒曰得非盗来而欺我乎縦有遺失亦不過三兩張耳寜有一束之理况我家未甞有此立當禍至可急速送還毋累我為也言之再子弗從母曰必如是我須訴之官子曰拾得之物送還何人母曰但於元拾處俟候定有失主来矣子遂依命携徃頃間果見㝷鈔者村人本朴質竟不詰其数便以付還傍觀之人皆令分取為賞失主靳曰我元三十㝎今纔一半安可賞之争閙不巳相持至􅈦事下聶推問村人其辤實又暗喚其母審之合乃俾二人各具失者實三十定得者實十五定文状在官後却謂失主曰此非汝鈔必天賜賢母以飬老者若三十定則汝鈔也可自别尋去遂給付母子聞者稱快朶那者杭城東偉兀氏之女奴也年十九勤敏謹愿主卒某郡官所朶那奉主婦日謹主婦亦委以腹心至正壬辰秋七月𥘉十日㓂䧟杭刼官民府庫至偉兀氏家不得物乃反接主婦柱下㧞刀礪􅖪上諸侍婢皆散走朶那獨以身覆主婦請代死且告曰将軍利吾財豈利殺人㢤凡家之貨寳皆我所蔵主母固弗知若免主母死我當悉與將軍不吝宼允觧主婦縛朶那乃探金銀珠玉幣帛等散至堂上㓂争奪竟又欲犯朶那身朶那持刀欲自屠曰我主二千石我誓不奴它姓主況汝賊乎宼驚異捨而去朶那泣拜主婦曰棄主貨全主命權也妾受命主鑰貨今失貨而全身非義也請從此死遂自殺時人莫不稱之曰義烈義烈云龍廣寒江西人多居錢唐挾預知之術游湖海間咸推為異人或謂專持寂感報耳袐呪故尓寂感即俗所謂萬回哥哥之師號也釋氏傳燈録師姓張九歲乃能語兄戍安西父母遣問訊朝徃夕返以萬里而回號萬回又護法論虢州閿鄉張萬回法雲公者生於唐貞觀六年五月五日有兄萬年乆征遼左相去萬里母程氏思其信音公早晨告母而徃至莫持書而還護法論乃宋無盡居士張商英撰必有所㩀按此則師之靈通容有之廣寒又行服氣導引之法常佩小龜十数于身至晩仍觧飼之事母至孝六月一日母生辰方舉觴為夀忽見北窓外梅花一枝盛開人皆以為孝行所感士大夫遂稱之曰孝梅贈詩者甚多惟張菊存一篇最可膾炙曰南風吹南枝一白照萬緑歲寒誰知心孟宗林下竹至治𥘉間廣寒卒時年百有八歲猶童顔緑髮云凡篙師於城埠市鎮人煙湊集去䖏招聚客旅装載夜行者謂之夜航船太平之時在䖏有之然古樂府有夜航船曲皮日休詩有明朝有物充君信携酒三缾寄夜航之句則此名亦古矣世謂有疾曰不快陳夀作華佗傳巳然至正庚子二月六日浙西諸郡震霆掣電雪大如掌頃刻積深尺許人甚驚異後閲李復中青唐雜記云宋元符二年九月廿一日夜鎮洮大雷自𥘉更至四鼓凡一百三十餘雷雪深二尺後旬日西羗叛以有俻無患出師大捷又周宻癸辛雜識云庚寅正月二十九日癸酉余至愽陸大雷雪下如織而雷不止天地為之陡黑平生所未見㩀二說如此然杭州自去歲十二月𬒳圍至三月兵退豈即青唐之䜟與人之自辨白其事之是否者俗曰分䟽䟽平声漢書袁盎傳不以親為觧顔師古注曰觧者若今分䟽矣北齊書祖珽傳髙元海奏珽不合作領軍并與廣寧正交結珽亦見帝令引入自分䟽髹器稱西皮者世人誤以為犀角之犀非也乃西方馬韀自黒而丹自丹而黃時復改易五色相疊馬鐙磨擦有凹䖏粲然成文遂以髹器倣為之事見因話録今之人宅與遷居者隣里醵金治具過主人飲謂曰煖屋或曰煖房王建宫詞太儀前日煖房來則煖屋之禮其来尚矣温州監郡某一女及笄未岀室貌羙而性慧父母之所鍾愛者以疾卒念畫工寫其像歲序張設哭奠常時則庋置之任滿偶忘取去新監郡復居是屋其子未婚忽得此心竊念曰娶妻能若是平生願事足矣因以懸于臥室一夕見其下從軸中詣榻前叙殷勤遂與好合自此無夜不来踰半載形状羸弱父母詰責以實告且云至必深夜去以五鼓或賫佳果啖我我荅與餅餌則堅郤不食父母教其此畨湏力勸之既而女不得辤為咽少許天漸明竟不可去定然人耳特不能言語而巳遂真為夫婦而病亦無恙矣此事余童子時聞之甚熟惜不能記兩監郡之名近讀杜荀鶴松窓雜記云唐進士趙顔於畫工䖏得一軟障圖一婦人甚麗顔謂畫工曰世無其人也如可令生余願納為妻工曰余神畫也此亦有名曰真真呼其名百日晝夜不歇即必應之應則以百家綵灰酒灌之必活顔如其言乃應曰諾急以百家綵灰酒灌之遂活下歩言笑飲食如常終歲生一児児年兩歲友人曰此妖也必與君為患余有神劒可斬之其夕遺顔劒劒絻及顔室真真乃曰妾南岳地仙也無何為人畫妾之形君又呼妾名既不奪君願今疑妾妾不可住言訖携其子却上軟障覩其障惟添一孩子皆是畫焉讀竟轉懷舊聞巳三十餘年若杜公所書不虚則監郡子之異遇有之矣今人謂駔儈者為牙郎本謂之互郎謂主互市事也唐人書互作牙互與牙字相似因訛而為牙耳松江蟠龍塘普門寺側一無主古墓至正已亥春為其里之張雕盜彂有誌石乃宋時錢叅政良臣妹諱惠净以該恩奏封孺人生一男五女年六十有五甞捨田入寺因於紹熈四年十月祔夫墓之右破棺無穢氣顔色如生口脂靣澤若𥘉傅者冠服鮮新亦不朽腐得金銀首飾噐皿甚多至脫其繍履傳相玩弄人以為異余聞漢廣川王去疾彂魏王子且渠冡無棺槨有石床牀下悉是雲母床上二屍一男一女皆年二十餘東首祼臥顔色如生人鬂髮亦如生人此恐是雲母之功今此婦塟日距今百七八十年而亦不損壊其理有何邪平江在城峨眉橋葉剃者門首簷下有一枯井深可丈許偶所畜猫墜入適隣家浚井遂與井夫錢一緡俾其取猫夫父子諾子既入井乆不出父継入視之亦不出葉皇恐繫索于要令家人次弟放索将及井底亟呼救命比拽起下躰巳僵木如屍而氣息奄奄郷里救活之白于官官来騐視令籠次下燭彷彿見若有㫄空者向之死人一横卧地上一斜倚不倒鉤其髮提出徧身無它恙止紫黑耳衆議以恐是蛟蜃之属實之土焉余意山風蛮瘴尚能殺人何况乆年乾涸隂毒凝結納其氣而死復奚凝㢤此事在至正巳亥秋八月𥘉旬也後讀酉陽雜爼有云凡冡井間氣秋夏多殺人先以雞毛投之直下無毒迴舞而下不可犯當以泔数斗澆之方可入矣得此一章信余意之誠是也前至元間杭州有鄭萬户者天性浚急不能有所容而奉事母夫人俻極孝道母誕日垂至預市文繡氁段製𫀆為夀鍼工持歸縫綴既成為油所汚時估貴重工莫能償自經不死鄰婦有識其母者潜送入白之至日臥不起子至候問安否見有憂色請其故曰昨莫偶視新𫀆適几上油缶翻濺漬成玷我情思殊不佳耳子告曰一袍壊復製一袍可也夫人何重惜乃尓母陽為自觧遂起受子孫拜賀如常歲儀人咸以此賢母而益見萬户之孝國朝婦人禮服逹旦曰𫀆漢人曰團衫南人曰大衣無貴賤皆如之服章但有金素之别耳惟䖏子則不得衣焉今萬户有姓者而亦曰𫀆其母豈逹旦與然俗謂男子布衫曰布𫀆則凡上盖之服或可㮣曰𫀆睱日讀書遇事物史異名者偶記一二以俻采覧云割政割剥之政也史記帝紀三父馬牡馬也史記平凖書毳布罽也說文曰西胡毳布香物夢書曰夢得香物婦女歸也蔵魚說文鮓蔵魚也請室獄也史袁盎傳㹸糖獅子乳糖也後漢顕宗紀令草宜男花也傳玄賦毛席氊也後漢西域傳注竹綀竹布也庾翼與燕王書曰竹綀三端竹萌筍也說文練香和香也李賀詩練香熏宋鵲南威橄㰖也太平廣記石蜜櫻桃也同上木蜜棗子也同上雜馥合香也通典四十三脂炬燭也杜陽雜編竹胎筍也說文調香和香也華嚴經曰粥香長者善調香毛布褐也詩七月箋獵碣石鼓曰獵碣蘇朂載記玉窪酒噐也緯畧浹日從甲至癸凡十曰也周礼天官浹辰辰十二辰自子至亥也左傳成九年丹若石榴也酉陽雜爼木八刺字西瑛西域人其軀榦魁偉故人咸曰長西瑛云一日方與妻對飯妻以小金鎞刺脔肉将入口門外有客至西瑛岀肅客妻不及啖且置器中起去治茶比回無覔金鎞䖏時一小婢在側執作意其竊取拷問萬端終無認辤竟至隕命歲餘召匠者整屋掃瓦瓴積垢忽一物落石上有声取視之乃向所失金鎞也與朽骨一塊同墜原其所以必是猫来偷肉故帶而去婢偶不及見而含冤以死哀哉世之事有如此者甚多姑書焉以為後人鑒也杭民尚淫奢男子誠厚者十不二三婦人則多以口腹為事不習女工至如日用飲膳惟尚新出而價貴者稍賤便鄙之縦𣣔買又恐貽笑鄰里至正已亥冬十二月金陵㳺軍斬関而入突至城下城門閉三月餘各路糧道不通城中米價湧貴一斗直二十五緡越数日米既盡糟糠亦與常日米價等有貲力人則得食貧者不能也又数日糟糠亦盡乃以油車家糠餅搗屑啖之老㓜婦女三五為群行乞於市雖姿色艶麗而衣裳濟楚不暇自漸也至有合家父子夫婦兄弟結𬒮把臂共沉于水亦可憐也一城之人餓死者十六七軍既退呉淞米航湊集藉以活而又太半病疫死豈平昔浮靡暴殄之過造物者有以警之與平江承天寺𥘉畜大木将造千佛閣㑹浙省灾責有司籍所在木植官酬以價寺一黠僧於閣木上皆鑿萬歲閣三字於是有司不敢取及閣成其字固在諸寺觀凡起造必作儷語題兩梁間其餘則記住持檀越主名此所必然獨承天諸殿俱否至正丙申春今張太尉士誠未歸順時偽稱誠王國號大周改元天祐暦日明時由淮渡浙攻破平江即承天以居盡撤去殿上像設坐於其中且以僧元鑿字名其閣豈亦有定数乎淮人宼江南日於臨陣之際齊声大喊阿癐癐以助軍威按朝野僉載武后時滄州南皮縣丞郭勝静毎巡鄉喚百姓婦託以縫補而姦之其夫至縛勝静鞭数十主簿李懋徃救觧之勝静羞諱其事低身荅云忍痛不得口唱阿癐癐勝静不𬒳打阿癐癐㩀此乃有所本國朝海運糧儲自朱清張瑄始以為古來未甞有此按杜工部詩出塞云漁陽豪俠地擊鼓吹笙竽雲帆轉遼海稉稲来東呉又昔㳺云幽燕盛用武供給亦勞哉呉門持粟帛汎海淩蓬莱如此則唐時巳有海運矣朱張特舉行耳杜陽父友開江隂人隱居教授妻呉辟纑以資之天暦間浙右菑荒米價騰踴學徒散去困於飢餓呉之兄弟屡勸斬丘木粥墓地以少延餘息陽父堅持不可継𣣔挈呉歸呉曰夫既盡孝妾獨不以義自䖏寧不食若粟遂相枕藉而卒至正辛夘春江隂永寧鄉陸氏家一猪産十四児内一兒人之首靣手足而猪身南村輟耕録卷之十一
