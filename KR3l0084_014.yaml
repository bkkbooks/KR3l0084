front:
  text: 南村輟耕録卷之十四
  hash: sha256:88b694ad5e3a28d58d9815d553d4b901523240c7463060df6c0b9226a59285b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_014-1a}
body:
  text: 天台陶宗儀九成蕭景茂漳州龍溪隔洲里人儒而有文以謹厚信於鄊里仍至元間漳寇亂景茂率鄊人立柵保險堅不可破㑹㫄里有人導之從間道入景茂𬒳執賊便拜曰汝賊也何拜賊欲脅之降以從民望景茂罵曰逆賊國家何負汝而反汝族汝里何負汝而坐纍之賊相語曰吾殺官軍將吏多矣至吾寨皆愞靡求生未有若此餓夫之倔彊者察其志終不為吾用留之秪取辱耳遂縳之於樹刲其肉使自啖之且嚼且罵曰我食我肉無若汝賊行將萬假狗彘棄不食賊怒絶其舌而死又江州路總管李黼字子威汝寧人泰定丁卯狀元及第至正十年庚寅來守是郡政修民和明年辛卯夏五月紅巾寇逼淮西公即甲告江西行省以謂九江為䂊章藩屏之地蘄黃乃九江唇齒之邦不可不早為進兵守護或者非其過慮公乃張文榜以諭民曰為臣死忠為子死孝在黼之分惟知盡死守土而巳所謂城存與存誠亡與亡者也聞者悚然秋九月寇侵蘄黃屬邑公復上言冝速乘機進援苟淮西失守長江之險與彼共之非所恃矣行省不報既而蘄州陷冬十月黃州陷十一月二十五日行省平章秃堅不花奉中書省命領兵至公極陳攻守之䇿秃堅不花以隄備把截為辭越明年壬辰春正月𥘉二日行省右丞孛羅帖木兒奉總兵御史大夫領樞密院也先帖木兒命領兵進攻淮西亦來屯駐逗遛不前十四日武昌陷十六日藩王大臣官民舟航蔽江而下我民解散十九日秃堅不花孛羅帖木兒皆遁之僚佐司屬􅊖為一空公亟發廩振民收召士卒數日稍輯機務繁劇不遑寢食以三十三日卧病然猶扶􅉵乘肩輿領兵出境行省以公忠誠昭著授本省參知政事行江州南康路軍民都總管便宜行事二月𥘉九日秃堅不花懼臺憲公議自三山移兵入城十一日寇忽至城下甘棠湖縱火焚西門公立城上身當矢石秃堅不花從北門遁去日中執益熾分衆攻北門城遂陷公猶執鐵檛指揮左右迎戰衆驚潰公𬒳執脅以刃不肻降口罵不絶聲遂殺之姪男秉昭亦遇害𥘉武昌陷時公謂子秉方曰我國之守臣當死此土汝可奉母往下江依伯父以存吾後秉方曰父死國子死父有何不可公怒曰汝不遵命是不孝也秉昭亦告其兄曰兄不去則叔父無後不孝莫大於是其當與叔父同死生矣兄無慮焉秉方不獲巳買舟奉母夫人行舟次何家堡遲留不忍捨公聞之手批責以大義遂去不半月公死又江浙行省參知政事樊執敬字時中鄆人是年秋七月𥘉十日紅巾自徽犯杭時公守宿衛于省有報巳入北關門省吏皆次第引去公獨𬒳甲上馬率宿衛兵急出省將救關從者止之公曰吾封彊之守不守而去是以私利廢臣道行至清河坊口遇它走將又以兵孤且散控其馬首返公怒引佩刀斫其人曰城不守何適遂躍馬逆戰以死死時猶嚼齒罵不絶聲死之所則天水橋也又福寧州尹王伯顔字伯敬濵州人由湖廣行省知印歷官至兹任撫字多方政教大行是年春除福建鹽運司同知將行㑹鄰境賊衆藝頗張州民群擁馬前拜且泣曰公吾之父母豈容舍我去方今兵戈蜂起公去吾民將孰賴父老千餘人詣上司乞留公遂復留至秋賊衆自邵武間道迫福寧公募民兵得一千五百餘人為守禦備冬十一月庚辰賊進至青皎屯楊梅嶺公與中子相引兵直扺其營與戰破之既而益衆復進我兵僅千餘人乃分為二道拒之公為五百人還守州治壬午賊衆萬餘平旦攻西門衆寡不敵吏卒奔潰公獨身奮以死自誓俄馬中流矢遂為賊所執其魁首王兼善者謂曰聞公廉能著稱欲屈再尹此州公厲聲叱曰我天子守臣義當殺賊不幸敗有死耳魁怒令公跪公曰此膝豈跪賊耶魁益怒令左右毆之公曰我為人臣當為國死乃嚙舌出血噴其面罵曰殺我即殺毆何也然可殺我不可害吾民官軍旦暮旦至殺尓等無噍類矣㑹其執逹魯花赤阿撒都刺至責之曰汝何得與王尹同起兵拒我阿撒都刺股栗口噤不能對公曰吾義當起兵殺賊何名拒汝因大罵不絶口且曰我死當為神以殺汝曹魁大怒遂害之臨死色不變立而受刃頚斷微有血如乳時年七十矣子相亦𬒳執魁欲官之相曰汝逆吾君又殺吾父義不共戴天我忠臣子詎能事賊邪魁知不可屈亦殺之相妻潘氏逃民間有惡少欲亂之不從執獻魁潘慟哭曰吾既失所天義豈受辱乃絶不飲食及其二幼女皆死又溧陽儒學教授林夢正字古泉吾鄉人中書以著述薦得官是歲賊衆寇溧陽獲其魁張某先生問曰尓何人也應曰我父為軍千戶紅巾入境逼我父為帥父以年老不堪從事令我代先生痛罵之曰尓之父祖世為國家臣子而爾忍僞邪既而其執復盛竟奪張去下令曰生得林教授者有賞先生匿它處􅊧得張曰前日罵我者非尓邪先生曰然張曰降我則俾亦為元帥同享富貴先生曰尓僞也我何為降再三終不屈縳手樹不解衣冠而殺之又江浙行省員外郎楊乘字文載濵州人蚤為天官小史辟中書參議掾歷官至穀城介休二縣尹拜監察御史擢今任是年杭州陷公與郎中赫德尓王仲溫貟外月忽難都事張鏞俱坐黜公退居松江之青龍鎮後御史臺以公等職在􅐌理不當罪宜復其官爵上之事遂白十六年丙申淮西陷平江連陷松江秋七月十八日遣所署官吳縣丞張經等賫禮幣造請公遣人告曰吾廢處田里久不足以蓐使者吾當擇日受命請以幣置里門外經等如其言公命子卣卓具牲醴告祖禰既竣事復命酒飲逮暮起行後圃中顧西日晴好慨然日晚節如是足矣命卣等治畦處置家事如平日撫其孫虎林若怡怡自得也歸坐至夜分二子立侍命曰二子行且休吾將就寢公儉約無姬侍其燕息寢處人莫得與俱詰且卣等怪寢門未啓發視之則公巳自經得手書遺語大意言死生晝夜之理且以得存晚節為快又西臺監察御史張公謝職居確山縣縣陷賊賊魁者素聞公有治績置公上坐脅之受僞官公唾罵之遂縛公妻孥九人至前先殺妾次殺子女以及妻每殺一人則諭公曰御史若降餘可免公弗為動容其罵如𥘉魁怒拽下坐殺之此在至正辛卯秋八月間公諱桓字彥威南村野史曰天下之事戰爭十有餘年于兹矣為臣辱國為將辱師敗降奔竄不可勝計甚者含詬忍耻偷生冒榮以為得志名節大間一蕩去弗顧求其忠義英烈於千百之中莫克什一咦忠義英烈雖出於天性要亦講之有素處之甚安故於造次顛沛之際决然行之而無疑如李總管黼王州尹伯顔樊參政執敬張御史桓林教授夢正蕭處士景茂之殺身成仁視死如歸是必講之熟而處之當一旦出於人所不肯為遂以驚動天下而精英忠烈之氣在宇宙間與嵩華相髙者自不容泯若桓之居在閒地乘之久坐廢黜夢正之分顓講教視握將帥之權受民社之託任大而責重者有間矣一皆從容就義是尤難也景茂里中一儒生耳𥘉未嘗得斗升之祿以養其父母尺寸之組以榮其身始于保民終于報國臨大節而不可奪古稱烈丈夫又豈能過是與至於子為父死婦為夫死聲光赫奕照映史冊使百世而下知綱常大義之不可廢天理人心之不可滅如此其有功于名教為何如是亦深仁厚澤涵養所致孰謂百年之國而無人哉瘞鶴銘華陽真逸撰上皇山樵鶴壽不知其紀也壬辰歲得於華亭甲午歲化於朱方天其未遂吾翔廖廓邪奚奪之遽也乃衷以玄黃之幣藏乎兹山之下仙家無隱我故立石旌事篆銘不朽詞曰相此胎禽浮丘著經乃徴前事我傳尓銘余欲無言尓其藏靈雷門去鼓華表留形義惟仿佛事亦微冥尓將何之解化惟寧後蕩洪流前固重扄右割荆門未下華亭奚集真侣瘞尓作銘丹陽外仙尉江隂真宰右刻在鎮江焦山下頑石上潮落方可模相傳為晉王右軍書帷宋黃睿東觀餘論云為陶隱居書良是其曰今審是文格字法殊類陶弘景弘景自别華陽隱居今曰真逸者豈其别號與又其著真誥但云已卯歲而不著年名其它書亦尓今此銘壬辰歲甲午歲亦不書年名此又可證云壬辰者梁天監十一年也甲午者十三年也按隱居天監七年東遊海嶽權駐㑹稽永嘉十一年乙未歲始還苐山其弟子周子良仙去為之作傳即十一年十三年正在華陽矣後又有題丹陽尉江隂宰數字當是效陶書故題於石側也王逸少以晉惠帝大安二年癸亥歲年五十九至穆帝升平五年辛酉歲卒則成帝咸和九年甲子歲逸少方年三十二至永和七年辛卯歲年三十八始去㑹稽間居不應三十二歲巳自稱真逸也又未官於朝及閒居時不在華陽以是考之决非王右軍書也審矣毆陽文忠公以為不類王右軍法而類顔魯公又疑是顧况云道號同又疑王瓉皆非睿字長孑焉正號雲林子邵武人又童逌書跋苐六卷載南陽張舉子厚所記云瘞鶴銘今存於焦山凡文字句讀之可識及點畫之僅存者百三十餘言而所亡失幾五十字計其完書蓋九行行之全者二十五字而首尾不預焉熙寧三年春余索其逸遺餘焦山之隂偶得十二字於亂石間石甚迫隘偃卧其下然後可讀政昔人未之見而世不傳其後又有丹陽外仙江隂真宰八字與華陽真逸上皇山樵為傳是真侣之號今取其可考者次序之如此又董君自書其後云文忠集古録謂得六百字今以石校之為行凡十八為字二十五安得字至六百疑書之誤也余於崖上又得唐人詩詩在真觀中巳列銘後則銘之刻非顧况時可知集古録豈又并詩繫之邪君字彥逺號廣川東平人又國朝鄭枃衍極苐二卷論瘞鶴銘而劉有定釋云潤州圖經以為王羲之書或曰華陽真逸顧况號也蔡君謨曰瘞鶴文非逸少字東漢末多善書惟隸最盛至於晉魏之分南北差異鍾王楷法為世所尚元魏間盡習隸法自隋平陳中國多以楷隸相參瘞鶴文有楷隸筆當是隋代書曹士冕曰焦山瘞鶴銘筆法之妙為書家冠冕前輩摹其字而不知其人最後雲林子以為華陽隱居為陶弘景及以句曲所刻隱居朱陽館帖參校然後衆疑釋然其鑒賞可謂精矣以余考之一本山撨下有書字真宰下有立石二字一本我傳尓銘作出於上真尓其藏靈作紀尓歲辰張􅘏本作丹陽外仙邵亢本作丹陽仙尉文有作丹陽外仙尉者且中間詞句亦多先後不同尚俟拿舟過揚子手自模印以稽其得失之一二可也吾鄉柯敬仲先生九思際遇文宗起家為奎章閣鑒書博士以避言路居吳下時虞邵菴先生在館閣賦風入松長短句寄博士云畫堂紅䄂倚清酣華髮不勝簮幾回晚直金鑾殿東風軟花裏停驂書詔許傳宫燭香羅𥘉剪朝衫御溝冰泮水挼藍飛燕又呢喃重重簾幕寒猶在憑誰寄銀字泥緘報道先生歸也杏花春雨江南詞翰兼美一時爭相傳刻而此曲遂遍滿海內矣剪一作試睦人邵玄問先生准子嘗作忍默恕退四卦揭之坐隅真得保身慎言潔矩知止之道者矣其忍卦曰忍亨𥘉難終吉利君子貞不利小丈夫彖曰忍剛發乎內柔制乎外故亨𥘉若甚難乃終有吉唯君子為能動心忍性不利小丈夫其中淺也象曰忍在心上忍君子以含容成德𥘉一小不忍則亂大謀象曰小不克忍成大亂也次二必有忍其乃有濟象曰能忍于中事克濟也次三一朝之忿亡其身以及其親象曰一朝之忿至易忍也亡身及親禍孰大也次四出于􅘳下以成漢功韓信以之象曰􅘳下之辱小辱也成漢之功大功也次五張公藝九世同居書一忍字以對于天子象曰同居之義忍克致也積而九世有容德也上六血氣方剛戒之在鬪象曰方剛之氣忍則滅也形而為鬪自求禍也其默卦曰默無咎可貞不利有所言彖曰默不言也亂之所生也則言語以為階是以君子慎密而不出故無咎默以自守其道可貞也不利有所言尚口乃窮也象曰口尚玄曰默君子以去辨食靜𥘉一守口如瓶終吉象曰守口如瓶謹所出其𥘉能默終則吉也次二多言不如守中象曰言不如默得中道也次三駟不及舌有悔象曰駟不及舌滕口說也一言之失悔何追也次四無以利口亂厥官卿士戒之象曰位高而言䡖亦可戒也次五聖人之教不言而信象曰不言而信淵默之化也上六君子之道或默或語象曰時然後言默不可長也其恕卦曰恕有孚終吉彖曰恕之為道善推其所為而巳以巳之心合人之心巳所不欲勿施於人故有孚能以一言終身而行之其吉可知矣象曰如心恕君子以明好惡同物我𥘉一强恕而行求仁莫近焉象曰强而行之恕之始也行而不巳違道不逺也次二君子有潔矩之道象曰潔矩之道始也次三好人之所惡惡人之所好是謂拂人之性菑必逮夫身象曰拂人從欲身之菑也次四已欲立而立人巳欲逹而逹人象曰立而逹恕以從人也次五聖人與衆同欲象曰與衆同欲聖人之恕也上六責巳重以周待人輕以約象曰待人之法可用恕也責巳之道不可自恕也其退卦曰退勿用有攸往彖曰退止也勿用有攸往知止也日中則退而􅉴月盈則退而虧四時之運成功者退而况於人乎退之時義大矣哉象曰艮止其所退君子以晦藏於密𥘉一退無咎象曰其進未鋭義無咎也次二難進易退象曰難進易退可事君也次三兼人凶象人之凶勇不知退也次四見可而進難而退象曰知難而退終無尤也次五終日如愚以退為進顔子以之象曰顔子之退進不可御也上六蝜蝂升高躓而不悔象曰蝜蝂升高其道窮也躓而不悔亦可戒也文章用事填塞故實舊謂之點鬼録又謂之堆垜死尸見江氏類苑今人以邪僻不經之術如運氣逆流采戰之類曰房中術按史周有房中樂漢書禮樂志髙祖時有房中詞樂唐山夫人所作武帝時有房中歌又云房中者情性之極至道之際是以聖王制外樂以禁內情而為之節文樂而有節則和平壽考及迷者弗顧以生疾而隕性命禮記曽子問衆主人卿大夫士房中皆哭注房中婦人也然房中之謂豈取此二書與娘字俗書也古無之當作娘按說文煩優也肥大也從女襄聲女良切其義如此今乃通為婦女之稱故子謂母曰娘而世謂穩婆曰老娘女巫曰師娘都下及江南謂男覡亦曰師娘娼婦曰花娘逹旦又謂草娘苗人謂妻曰夫娘南方謂婦人之無行者亦曰夫娘謂婦人之卑賤者曰某娘曰幾娘鄙之曰婆娘考之風俗通漢何敞為鬼蘇珠娘按誅亭長龔壽隋書韋世康為絳州刺史與子第書云况娘春秋巳髙溫清宜奉教坊記北齊時丈夫著婦人衣行歌㫄人齊和云䠌謡娘南史梁元徐妃與帝左右暨季江私通季江曰徐娘雖老尚猶多情又梁臨川王宏侵魏魏遺以巾幗歌曰不畏蕭娘與吳姥但畏合肥有韋虎謂韋睿吕僧珍也大業拾遺隋煬帝宫婢曰雅娘唐史張旭草書見公孫大娘舞劒器而通神又武承嗣聞喬知之婢窈娘美奪取之杜工部詩耶娘妻子走相送又黃四娘家花滿蹊白樂天詩吳娘暮雨蕭蕭曲韋應物詩春風一曲杜韋娘栁子厚下場女墓磚記始名和娘樂府雜録張紅紅唱歌丐於市韋青納為姬敬宗召入宫號記曲娘又望江南曲始自朱崖李太尉鎮浙西日為姬謝秋娘所製明皇雜録稱白鸚鵡為雪衣娘甘澤謡武三思晚獲一妓曰綺娘狄仁傑至遂逃璧隙中曰我上天花月之妖也樊川集杜秋娘年十五為李錡妾錡敗入宫後主譴歸故里又竇桂娘父良建中𥘉為汴州户曹李希烈破汴州取桂娘去李賀集賀撰申胡子觱栗歌成朔客喜擎觴起立命花娘出幕徘徊拜告劉賔客集泰娘本韋尚書家主謳者河東記唐進士假何卧病遇妊娘留詩而愈傳竒崔氏鶯鶯婢曰紅娘霍小玉傳長安中有媒氏鮑十二娘薛蒼駙馬青衣也余媚娘叙録陸希聲娶余媚娘媚娘約媒曰陸郎中若必得兒侍巾櫛須立誓不置側室及女奴圖經蠶神謂之馬頭娘杜陽雜編南海貢其女盧媚娘工巧無比麗情集陳敏兄妾越娘貌美兄死遂與欵狎續齊諧記齊頴寓山隂夜見前宰妾萬女娘墨莊漫録李后主令宮媚窅娘以帛繞腳令纎小右略舉一二不能悉載是則今之云云皆有所本然都下自庶人妻以及大官之國夫人皆曰娘子未嘗有稱夫人郡君等封贈者載考之史隋柴紹妻李氏起兵應李淵與紹各置莫府號娘子軍唐平陽公主兵與秦王定京師號娘子軍花蕊夫人宫詞諸院各分娘子位韓昌黎有祭周氏二十娘子文以此推之古之公主宫妃已與民間共稱娘子則今之不分尊卑亦自有來矣至正壬辰春城平江於古城基內掘得一碑其文云三十六十八子寅卯年至辰巳合收張翼同為利不在常不在揚切須欵欵細思量且卜水莫問米浮圖倒地莫扶起修古岸重開河軍民拍手笑呵呵日出屋東頭鯉魚山上逰星從月裏過㑹在午年頭右不曉所言何事姑識之或者以為三十六四九也張翼巳午之交也今張大尉苐行九四而同首亂者適十八人即十八子也豈其然與今世女子之笄曰上頭而倡家處女𥘉得薦寢於人亦曰上頭花蕊夫人宫調年𥘉十五最風流新賜雲鬟使上頭又天癸曰月事黃帝內經女子二七而天癸至月事以時下又曰女子不月史記濟北王侍者韓女病月事不下診其腎脉嗇而不屬故曰月不下又程姬有所避不願進注天子諸侯群妾以次進御有月事者止不御更不口說故以丹注面目的的為識令女史見之王察神女賦施玄的的即上所云也然入月二字尤新王建宫詞密奏君王知入月喚人相伴洗裙𥚑至正乙巳春平江金國寶䄂人臘出售余獲一觀其形長六寸許口目耳鼻與人無異亦有髭髯頭髮披至臀下須髮皆黃色間有白髮二根遍身黃毛長二分許臍下隂物乃男子也相傳云至元間世皇受外國貢獻以賜國公阿你哥者無幾何時即死因剖開背後剜去腸藏實以它物仍縫合烘乾故至今無恙按漢武故事東郡送一短人長七寸名巨靈神異經西海有一鶴國人長七寸山海經有小人國名靖人詩含神霧東北極曰人長九寸殆謂此小人也靖或作竫音同然古尺短今六寸比之周尺將九寸矣則所臘者豈其人與天子臨軒授鉞頻東南無地不紅巾鐵衣逺道三軍老白骨中原萬鬼新義士精靈虹貫曰仙家談笑海揚塵都將兩眼凄凉淚哭盡平生幾古人此至正辛丑間張蛻菴承旨翥在都下寄浙省周玉坡參政伯琦詩也夫翰苑詞臣而寓言如此則感時之意從可知矣南村輟耕録卷之十四
