front:
  text: 南村輟耕録卷之九南村輟耕録卷之十
  hash: sha256:e36f715a7a2c2d84bfb3d6a817f747e85961ecd2ad8ac2f6c74648d898a81517
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_010-1a}
body:
  text: 天台陶宗儀九成周景逺先生馳名能文為南臺御史時分治過浙省每日與朋友往復其書吏不樂似有舉刺之意大書壁上曰御史某日訪某人某日某人來訪御史忽見之呼謂曰我嘗又訪某人汝乃失記何也苐輔書之因復謂曰人之所以讀書為仕君子者正欲為五常主張也使我今日謝絶故舊是為御史而無一常寧不為御史不可滅人理吏赧服而退今官府收斂秋糧之際比先涓吉啓倉於青龍方厫房入粟六石六斗六升六合以應日蓋國家𥘉無定制不知各處何以一皆如此余意必取上下四方六合之意耳凡食河豚者一日內不可服湯藥恐內有荆芥蓋與此物大相反亦惡烏頭附馬之屬余在江隂時親見一儒者因此喪命其子尤不可食能使人脹死嘗水浸試之經宿顆大如芡實世傳中其毒者亟飲穢物乃解否則必亡又聞不必用此以龍腦浸水或至寶丹或橄欖皆可解後得一方用槐花微炒過與乾燕支各等分同搗粉水調灌大妙趙魏公刻私印曰水晶宫道人錢唐周草窗先生密以瑪瑙寺行者屬比之魏公遂不用此印後見先生同郡崔進之藥肆縣一牌曰飬生主藥室乃以敢死軍醫人對之進之亦不復説此牌魏公語人曰吾今日方為水晶宫吐氣矣先輩雖諧謔自是可喜馮公士啓夢弼嘗言為八蕃雲南宣慰司令史日嘗因公差抵一站日巳莫矣站吏告曰今夜馬判上岸麻線須暫停驛程以避之問其故閉目搖手不敢言公怒便上馬行數十里至大溪忽見一物如屋所謂烏刺赤者下馬跪泣若告訴狀呼問何為亦閉目搖手弗答於是下馬祝之曰某許昌人竊祿來此苟天命合盡尓其啖之否則容我行祝畢即轉人溪中腥風臭霧觸人口鼻既而各上馬比曙抵前站吏驚曰是何麻線大膽若是耶公問此為何物始敢言曰馬蟥精也麻線方言曰官人烏刺赤站之牧馬者公官至禮部尚書善字訓多字詩載馳女子善懷鄭箋善猶多也漢書岸善崩善亦多也大宗師長春真人姓丘氏名處機字通密號長春子登州棲霞縣濵都里人也祖父業農世稱善門金皇統戊辰正月十九日生生而聰敏有日者相之曰此子當為神仙宗伯大定丙戍年十九辭親居崑崙山依道者修真丁亥謁重陽全真開化王真君嘉於海寧請為弟子戊申召見闕下隨還終南山貞祐乙亥太祖平燕城金主奔汴丙子復召不起巳卯居萊州時齊魯入宋宋遣使來召亦不起是年五月太祖自乃蠻國遣近侍劉仲祿持手詔致聘十二月至隱所召文云制曰天厭中原驕華太極之性朕居北野嗜愁莫生之情反朴還淳去奢從儉每一衣一食與牛竪馬圉共弊同饗視民如赤子飬士若兄第謀素和恩素畜練萬衆以身人之先臨百陳無念我之後七載之中成大業六合之內為一統非朕之行有德蓋金之政無恆是以受天之祐獲承至尊南連趙宋北接回紇東夏西夷悉稱臣佐念我單于國千載百世以來未之有也然而任大守重治平猶懼有闕且夫刳舟剡楫將欲濟江河也聘賢選佐將以安天下也朕踐祚巳來勤心度政而三九之位未見其人訪聞丘師先生體真履規博物洛聞探賾窮理道沖德著懷古君子之肅風抱真上人之雅操久棲岩谷藏身隱形闡祖宗之遺化坐致有道之士雲集仙徑莫可稱數自干戈而後伏知先生猶隱山東舊境朕心仰懷無巳豈不聞渭水同車茅廬三顧之事奈何山川懸闊有失躬迎之禮朕伹避位側身齋戒沐浴選差近侍官劉仲祿備輕騎素車不逺千里謹􅌽先生暫屈仙步不以沙漠悠逺為念或以憂民當世之務或以恤朕保身之術朕親侍仙座欽惟先生將咳唾之餘伹授一言斯可矣今者聊彂朕之微意萬一明於詔章誠望先生既著大道之端要善無不應亦豈違衆生小碩哉故兹詔示惟宜知悉五月𥘉一日筆庚辰正月北行二月至燕欲俟駕回朝謁仲録令從官曷刺馳奏真人進表陳請表曰登州棲霞縣志道丘處機近奉宣旨逺召不才海上居民心皆恍惚處機自念謀生太拙學道無成辛苦萬端老而不死名雖播於諸國道不加於衆人內顧自傷哀情誰測前者南京及宋國屢召不從今者龍庭一呼即至何也伏聞皇帝天賜勇智今古絶倫道協威靈華夷率服是故便欲投山竄海不忍相違且當冒雪衝霜圖其一見兼聞車駕只在桓撫之北及到燕京聽得車駕遙逺不知其幾千里風塵澒洞天氣蒼黃老弱不堪切恐中途不能到得假之皇帝所則軍國之事非已所能道德之心令人戒欲悉為難事遂與宣差劉仲祿啇議不若且在燕京德興府等處盤桓住坐先令人前去奏知其劉仲祿不從故不免自納奏帖念處機肯來歸命逺冒風霜伏望皇帝早下寬大之䛇詳其可否兼同時四人出家三人得道惟處機虛得其名顔色憔悴形容枯稿伏望聖裁龍兒年三月日奏十月曷刺回復奉敕旨曰成吉思皇帝敕真人丘師省所奏應召而來者具悉惟師道踰三子德重多方命臣奉厥玄纁馳傳訪諸滄海時與碩適天不人違兩朝屢召而弗行單使一邀而肯起謂朕天啓所以身歸不辭暴露於風霜自願跋涉於沙磧書章來上喜慰何言軍國之事非朕所期道德之心誠云可尚朕以彼酋不遜我伐用張軍旅試臨邊陲底定來從去背實力率之故然久逸暫勞兾心服而後巳於是載揚威德略駐車徒重念雲軒既彂於蓬萊鶴馭可逰於天竺逹磨東邁元印法以傳心老氏西行或化胡而成道顧州途之雖闊瞻凡杖以非遙爰答來章可明朕意秋暑師比平安好旨不多及十四日辛巳十一月至邪迷思干城壬午三月過鐵門關四月逹行在所時上在雪山之陽舍館定入見上勞曰它國徵聘皆不應今逺踰萬里而來朕甚嘉焉賜坐就食設二帳於御幄之東以居之約日問道以回紇叛親征不果至九月設庭燎虛前席延問至道真人大略答以節欲保躬天道好生惡殺治尚無為清淨之理上説命左史書諸䇿癸未乞東還賜號神仙爵大宗師掌管天下道教甲申三月至燕八月奉旨居太極宫丁亥五月特改太極為長春七月九日留頌而逝年八十至元已巳正月詔贈五祖七真徽號而曰長春演道主教真人巳上見蟠溪集鳴道集西逰記風雲慶會録七真年譜等書𥘉真人自行在歸道由宣德日一富家新居落成禮致下顧將兾一言以為福既入其室默然無語輒以所持鐵柱杖於窗户墻壁上頗毁數處而出主人再拜希解悟曰尓屋完矣美矣完而必毀理藝然也吾不尓毀尓將無以圖厥終今毀矣尓宜思其毁而欲克保全之則尓與尓子子孫孫庶幾歌斯哭斯永終弗替主人説服吁真人真之道哉宋季城信州掘土處為濠百畒許在郡南曰南池池之旁可居舊為里人屋歸附後逹魯花赤滅徹據有其地每春夏之交群蝿聒耳寢食不安會三十八代天師張與材朝京回因以告天師朱書符篆新瓦上使人投池中戒之曰汝蛙毋再喧自是至今寂然漢書太液池中鳬雛雁子布滿充積用雁子甚佳王維詩蘆筍穿荷葉菱花骨雁兒又新浙省廣濟庫歲差杭城諲實戶若干名充役庫子以司出納比一家中侵用官錢太多無可為償府判王某素號殘忍乃拘其妻妾子女于官又無可為計則命小舟載之求食於西湖以資納官鬼妾鬼馬不肖輩群趨焉鮮于伯幾先生樞作湖邊曲云湖邊蕩漿誰家女緑慘紅愁羞不語低回忍淚傍郎船貪得船頭強歌舞玉壷美酒不須憂魚腹熊蟠棄如土陽臺夢短匆匆去鴛鎖生寒愁日莫安得義士擲千金遂令桑濮歌行路後王之子孫有為娼者人之報施一何捷也義興王子明家饒於財所藏三代彛鼎六朝以來法書名畫實冠浙右每年必祈一籖於烈帝廟以卜休咎一歲籖詞有曰開溝鑿井當得鼎殊不以為意家人以啇賈至汴夾谷郎中者藏一啇彛絶精妙示之曰恐尓王翁未必有此物也歸以白即遣賫金購得之比舊藏皆不能及至正壬辰冦起蘄黃將由義興取道犯浙西子明其所藏鑿深窖以埋之彛亦在列既入窖作牛鳴者七夜頗可怪取出寄田家其窖後遭彂掘獨此彛獲存俗語以不潔為鏖糟按霍去病傳鏖皋闌下注世俗謂盡死殺人為鏖糟然義雖不同却有所出邁里古思字善卿西夏人僑居松江家貧授徒以飬母性至孝然落落不羈善諧謔名人士多與之遊至正甲午進士及苐授紹興路録事司逹魯花赤比視篆天下雲優所在悉瘵君撫字周至民愛之如父母乙未秋杭破遄即剋復浙省左丞楊完者以夲部苗將持露布至統洞蠻甚衆意實覘視虛實又將流毒於我民也縱虐恣暴民皆束手惴惴不敢與爭無故劫府架閣照磨陳修家妻妾幾𬒳汚君激怒填膺指揮吏兵收之郡民歡呼從事苗遂盡死後完者聞越民結義且固終不敢調兵渡浙江方集慶陷時江南行臺官流避􅔰慶元奉旨置治所於越遂􅊾君總督義民護城池君更募得勇悍者二千餘人以果毅二字為號曰果毅軍練習武事分撥守要害乃日與常所往來者擊鮮飲醲酣咏呌嘯以為娛樂雖戶外上官坌至不少延納武康寇起據有縣境君收復朝廷旌其功除江南浙西道廉訪司知事未上又除江東建康道經歷浙省丞相塔失帖木兒便宜除行樞密院判官君即自署諸參謀為幕官曰經歷曰都事者不可枚舉時御史大夫拜住哥任猜禍吏為瓜牙又自統軍三千曰臺軍紀律不嚴民橫𬒳擾害有訴於君君輒抑之衆軍皆怨怒然拜委瑣齷齪惟以鈎距致財為務君不禮之或以諌君曰吾知上有君下有民耳安問其它拜頗聞銜之遂與臺軍元帥列占永安張某萬戶閻塔思不花玉哈刺帖木兒等謀殺之未得間戊戌十月草二日首事出兵踰曹娥江與平章方國珍部下萬戶馮某鬪既不利駐軍東關單騎馳歸拜意決矣草三日遲明召君私苐議事入至中門左右以鐵槌撾殺之𥘉甚祕守閽軍自相謂無已殺總督官我輩幸也民始有聞之者走白君部捋浙東僉元帥黃中諸參謀聞變奔避不顧至有墜城以出行四五十里者𥘉夜二鼓中提軍入城危戒珠山拜未及知中臥病方飲藥得少汗尚昏潰困頓左右扶翼擐甲上馬遇臺軍於江橋鬪十數合破陳陷堅身當矢石郡民老幼皆號泣曰殺我總督官我尚何生為壯者助中軍殊死戰臺軍一敗塗地屠其二營入拜家姬侍奴隸死者相枕藉一女為隊官陳某所掠舉君尸無元大索三日得于溺池中拜與二子匿𣑽宇幽隱處民􅊧見之齊唾其面且罵曰瞎賊我總督官何罪而令致於此耶不自殺執以歸中兾中殺之中解其縛率諸軍羅拜之曰總督官忠肝義膽照映天地人神所共知公信任憸邪使國之柱石隕于無辜我之復讐明大義也殺我主將者既巳斬之公幸毋罪拜執中以泣曰我之罪尚何言尚何言既而軍民為君持服為位以祭私諡曰越民考越六日拜自劾納印綬去其印是夜遺失中以白金百兩購得於一卒以還行臺者君未死先王日有星大如杯碗紅光燭天墜鎮粵門化為石及君出師識者巳卜君之有死兆矣至是果驗云南村野史曰兵凶器也戰逆德也聖人不得已而用之故吾夫子必以臨事而懼好謀而成答子路行三軍之問夫邁里古思受任云𥘉殊有古賢縣令之風一握兵柄志滿意得酣觴廢事輕謀首亂不旋踵而身首異處蓋亦平昔越已之過有以釀成此􅍔與微中則老毋稚子亦皆几上之肉矣原其忠君愛民之心昞然與日星相昭明者則無可議也拜住哥為國大臣坐鎮四者百官庶司孰不聽令邁之不奉臺檄擅興師旅明問其罪黜之可也斬之可也而乃隂結小醜作為此態是盜殺之非公論矣民心之所以不服良以是也噫享有尊爵重祿而當國步囏難之日既不思涓埃輔報之道又不責自已貪叨之非反以謀害忠良為先務謂之無罪得乎故其妻妾于女遭罹􅓍辱實自取之尚復何憐哉三姑者尼姑道姑卦姑也六婆者牙婆媒婆師婆虔婆藥婆穩婆也蓋與三刑六害同也人家有一於此而不致姦盜者幾希矣若能謹而逺之如避蛇蝎庶乎淨宅之法不中用不可用也左傳成二年郤子曰克於先大夫無能為役杜預注不中為之役使杜清碧先生本字伯原有所編五聲韻目大小篆分隸真草以至外化蕃書及國朝蒙古新字靡不收録題曰華夏同音至正壬午中書奏修三史以翰林待制聘先生起至武林辭疾不行盤桓久之浙省平章康里子山公巙巙時來訪一日語及聲律之學因問國字何以用司喉音有無字字為首先生曰正如嬰兒𥘉墮地時作此一聲乃得天地之全氣也平章甚説服陶朱公飬魚經曰夫治生之法有五水畜第一水畜魚也此二字亦竒張邦基墨莊漫録云婦人之纒足起於近世前世書傳皆無所自南史齊東昏侯為潘貴妃鑿金為蓮花以帖地令妃行其上曰此步步生蓮花然亦不言其弓小也如古樂府玉臺新咏皆六朝詞人纎艷之言類多體狀美人容色之姝麗及言妝飾之華眉目唇口要支手指之類無一言稱纒足者如唐之杜牧之李白李商隱之輩作詩多言閨幃之事亦無及之者韓偓香奩集有咏屧子詩云六寸膚圓光緻緻唐尺短以今校之亦自小也而不言其弓惟道山新聞云李後主宫嬪窅娘纎麗善舞後主作金蓮髙六尺飾以寶物細帶纓絡蓮中作品色瑞蓮令窅娘以帛繞腳令纎小屈上作新月狀素襪舞雲中回旋有淩雲之態唐鎬詩曰蓮中花更好雲裏月長新因窅娘作也由是人皆效之以纎弓為妙以此知札腳自五代而來方為之如熙寧元豐以前人猶為者少近年則人人相效以不為者為耻也漳州籠溪縣澳里人陳端才之妻蔡氏三玉後至元間本處寇起掠其里里媪集里中婦女同舟避難寇追及三玉亟以水漬衣寇視三玉有姿色欲先汙之三玉紿曰衣濕更求衣間寇取衣投水死寇曰溺者必躍以長竿絡鈎俟其躍而舉之尸竟不躍寇退三玉之父端廣舟次上流尸逆流附父舟捭之不去移舟遡河而上尸從之上者三父異甚視則其女也夫三玉一婦人耳寧死不辱出於天性宜其貞爽不昧如此韃靼田地野馬或與蛟龍交遺精入地久之彂起如筍上豐下儉鱗甲櫛比筋脈聮絡其形絶類男隂名曰鎖陽即肉從容之類或謂里婦之淫者就合之一得隂氣勃然怒長土人掘取洗滌去皮薄切晒乾以充藥貨功力百倍於從容也淮南潘子素純嘗作輥卦譏世之人以突梯滑稽而得顯爵者雖曰資一時之謔浪調笑不為無輔於名教卦辭曰輥亨可小事亦可大事彖曰輥亨天地輥而四時行日月輥而晝夜明上下輥而萬事成輥之時義大矣哉象曰地上有不輥君子以容身固位𥘉六輥出門無咎象曰出門使輥又何咎也六二傅于鐵轊象曰傅于鐵轊天下可行也六三君子終日輥輥屬無咎象曰終日輥輥雖危無咎也九四模稜吉象曰模稜之吉以隨時也六五神輥象曰六五神輥老於事也上六或錫之髙爵天下揶揄之象曰以輥受爵亦不足敬也此篇或者又謂自宋末即有非潘所造未審是否後平江蔡宗魯衛作吝卦以配之曰吝亨利居間不利有所為彖曰吝鄙啚也利居間無所求也不利有所為恐致禍也𥘉六居富吝於周急悔亡無攸利象曰吝於周急莫恤其貧也悔亡無攸利巳終有望也六二聽婦言至吝不飬其親不恤其弟貞凶象曰聽婦言昵於私也不飬其親忘大恩也不恤其弟失大義也雖飬弗時亦致災也故貞凶九三極吝吝其財不吝其身於行非冝象曰吝其財務至富也不吝其身乃輕生也六四太吝君子吉小人凶象曰吝於君子雖有言無尤也吝於小人雖不有言終有悔也六五不吝於色務所欲終以死亡凶朋來吝於酒食弗克歡無咎象曰不吝於色惑於淫也務所欲樂其順從也終以死亡凶可知也朋來從具類也吝於酒食誠大謬也雖弗克歡可無咎也上九居其家不吝於內吝於教子弗叶吉象曰居其家妄自尊也不吝於內畏寡妻也吝於教子終無所成也近扶風馬文璧琬又作諞卦曰諞貞亨𥘉吉終凶利見小人不利于君子彖曰貞正也亨通也通乎正言諞或庶幾也終凶諞不由𥘉也利旦小人猶同類也不利于君子入于邪也象曰麗口掉舌諞君子以求名干祿𥘉九諞于同朋無咎象曰同朋于諞又誰咎也九二略施于民吉象曰九二之吉以新衆聽也六三來其諞酒食用享象曰來其諞民取則也享其酒食以崇功也九四飾言如簧以娛彼心乃獲南金象曰娛人獲金不足道也九五君子終日髙諞王用徴安車以迎終歲弗寧後有凶象曰以諞受徵不羞也終歲弗寧祖足煩勞也後有凶不副實也上六莾諞不巳四方欲殺之象曰莾諞取怒殺之何過也右三卦切中時病真得風刺之正因併録之廣海采珠之人懸絙于要沉入海中良久得珠撼其絙舶上人挈出之葬于黿鼉蛟龍之腹者比比有焉有司名曰烏蛋戶蛋音但仁宗登極特旨放免時敬公威卿為江西行省參知政事俾該管掾史立案令廣東帥府抄具烏蛋戶一一籍貫姓名置册申解它省官曰中書咨文無是恐不必也公曰萬一申明舊典庶不害及良民未幾太后中使至人咸服公先見之明凡婢役於婢者俗謂之重臺按左氏傳昭公五年日之數十故有十時亦當十位自王以下其二為公其三為卿注云日中為王食時為公平旦為卿雞鳴為士夜半為皂人定為輿黃昏為隸日入為僚晡時為僕日昳為臺㬂中日出闕不在第等王公曠其位又昭公七年天有十日人有十等故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣臺則所謂臺者十等之至卑今豈亦本是與然加以重字尤有意文選曹公􅊾吳將校部曲文年月朔日子注彂􅊾時也南村輟耕録卷之十
