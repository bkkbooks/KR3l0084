front:
  text: 南村輟耕録卷之九南村輟耕録卷之十
  hash: sha256:e36f715a7a2c2d84bfb3d6a817f747e85961ecd2ad8ac2f6c74648d898a81517
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_010-1a}
body:
  text: 天台陶宗儀九成周景逺先生馳名能文為南臺御史時分治過浙省毎日與朋友徃復其書吏不樂似有舉刺之意大書壁上曰御史某日訪某人某日某人来訪御史忽見之呼謂曰我甞又訪某人汝乃失記何也苐𥙷書之因復謂曰人之所以讀書為仕君子者正欲為五常主張也使我今日謝絶故舊是為御史而無一常寕不為御史不可滅人理吏赧服而退今官府收歛秋粮之際比先㳙吉啓倉於青龍方厫房入粟六石六斗六升六合以應日盖國家𥘉無定制不知各䖏何以一皆如此余意必取上下四方六合之意耳凡食河豚者一日内不可服湯藥恐内有荆芥盖與此物大相反亦悪烏頭附馬之属余在江隂時親見一儒者因此䘮命其子尤不可食能使人脹死甞水浸試之經宿顆大如芡實世傳中其毒者亟飲穢物乃觧否則必亡又聞不必用此以龍腦浸水或至寳丹或橄㰖皆可觧後得一方用槐花微炒過與乾燕支各等分同搗粉水調灌大妙趙魏公刻私印曰水晶宫道人錢唐周草窓先生宻以瑪瑙寺行者属比之魏公遂不用此印後見先生同郡崔進之藥肆縣一牌曰飬生主藥室乃以敢死軍醫人對之進之亦不復說此牌魏公語人曰吾今日方為水晶宫吐氣矣先輩雖諧謔自是可喜馮公士啓夢弼甞言為八蕃雲南宣慰司令史日甞因公差抵一站日巳莫矣站吏告曰今夜馬判上岸麻線湏暫停驛程以避之問其故閉目揺手不敢言公怒便上馬行数十里至大溪忽見一物如屋所謂烏刺赤者下馬跪泣若告訴状呼問何為亦閉目摇手弗荅於是下馬祝之曰某許昌人竊禄来此苟天命合盡尓其啖之否則容我行祝畢即轉人溪中腥風臭霧觸人口鼻既而各上馬比曙抵前站吏驚曰是何麻線大膽若是耶公問此為何物始敢言曰馬蟥精也麻線方言曰官人烏刺赤站之牧馬者公官至禮部尚書善字訓多字詩載馳女子善懐鄭箋善猶多也漢書岸善崩善亦多也大宗師長春真人姓丘氏名䖏機字通宻號長春子登州棲霞縣濵都里人也祖父業農世稱善門金皇統戊辰正月十九日生生而聦敏有日者相之曰此子當為神仙宗伯大定丙戍年十九辤親居崑崙山依道者脩真丁亥謁重陽全真開化王真君嘉於海寜請為弟子戊申召見闕下隨還終南山貞祐乙亥太祖平燕城金主奔汴丙子復召不起巳夘居萊州時齊魯入宋宋遣使来召亦不起是年五月太祖自乃蛮國遣近侍劉仲祿持手詔致聘十二月至隱所召文云制曰天厭中原驕華太極之性朕居北野嗜愁莫生之情反朴還淳去奢從儉毎一衣一食與牛竪馬圉共弊同饗視民如赤子飬士若兄第謀素和恩素畜練萬衆以身人之先臨百陣無念我之後七載之中成大業六合之内為一統非朕之行有徳盖金之政無恒是以受天之祐獲承至尊南連趙宋北接囬紇東夏西夷悉稱臣佐念我單于國千載百世以来未之有也然而任大守重治平猶懼有闕且夫刳舟剡楫将欲済江河也聘賢選佐将以安天下也朕踐祚巳來勤心度政而三九之位未見其人訪聞丘師先生體真履規愽物洛聞探賾窮理道沖徳著懐古君子之肅風抱真上人之雅操乆棲岩谷蔵身隱形闡祖宗之遺化坐致有道之士雲集仙逕莫可稱数自干戈而後伏知先生猶隱山東舊境朕心仰懐無巳豈不聞渭水同車茅廬三頋之事柰何山川懸闊有失躬迎之禮朕伹避位側身齋戒沐浴選差近侍官劉仲禄俻䡖騎素車不逺千里謹􅌽先生暫屈仙歩不以沙漠悠逺為念或以憂民當世之務或以恤朕保身之術朕親侍仙座欽惟先生将咳唾之餘伹授一言斯可矣今者聊彂朕之微意萬一明於詔章誠望先生既著大道之端要善無不應亦豈違衆生小碩哉故兹詔示惟宜知悉五月𥘉一日筆庚辰正月北行二月至燕欲俟駕回朝謁仲録令從官曷刺馳奏真人進表陳請表曰登州棲霞縣志道丘䖏機近奉宣旨逺召不才海上居民心皆怳惚䖏機自念謀生太拙學道無成辛苦萬端老而不死名雖播於諸國道不加於衆人内顧自傷哀情誰測前者南京及宋國屡召不從今者龍庭一呼即至何也伏聞皇帝天賜勇智今古絶倫道恊威靈華夷率服是故便欲投山竄海不忍相違且當冒雪衝霜圖其一見兼聞車駕只在桓撫之北及到燕京聽得車駕遥逺不知其㡬千里風塵澒洞天氣蒼黄老弱不堪切恐中途不能到得假之皇帝所則軍國之事非已所能道徳之心令人戒欲悉為難事遂與宣差劉仲祿啇議不若且在燕京徳興府等䖏盤桓住坐先令人前去奏知其劉仲禄不從故不免自納奏帖念䖏機肯来歸命逺冒風霜伏望皇帝早下寛大之䛇詳其可否兼同時四人出家三人得道惟䖏機虚得其名顔色顦顇形容枯槁伏望聖裁龍児年三月日奏十月曷刺回復奉敕旨曰成吉思皇帝敕真人丘師省所奏應召而来者具悉惟師道踰三子徳重多方命臣奉厥玄纁馳傳訪諸滄海時與碩適天不人違兩朝屡召而弗行單使一邀而肯𧺫謂朕天啓所以身歸不辤暴露於風霜自願䟦渉於沙磧書章来上喜慰何言軍國之事非朕所期道徳之心誠云可尚朕以彼酋不遜我伐用張軍旅試臨邊陲底定来從去背寔力率之故然乆逸暫勞兾心服而後巳於是載揚威德畧駐車徒重念雲軒既彂於蓬萊鶴馭可逰於天竺逹磨東邁元印法以傳心老氏西行或化胡而成道顧州途之雖闊瞻凡杖以非遥爰荅来章可明朕意秋暑師比平安好旨不多及十四日辛巳十一月至邪迷思干城壬午三月過鉄門関四月逹行在所時上在雪山之陽舎館定入見上勞曰它國徵聘皆不應今逺踰萬里而来朕甚嘉焉賜坐就食設二帳於御幄之東以居之約日問道以回紇叛親征不果至九月設庭燎虚前席延問至道真人大畧荅以節慾保躬天道好生悪殺治尚無為清浄之理上說命左史書諸䇿癸未乞東還賜號神仙爵大宗師掌管天下道教甲申三月至燕八月奉旨居太極宫丁亥五月特改太極為長春七月九日留頌而逝年八十至元已巳正月詔贈五祖七真徽號而曰長春演道主教真人巳上見蟠溪集鳴道集西逰記風雲慶㑹録七真年譜等書𥘉真人自行在歸道由宣徳日一富家新居落成禮致下顧将兾一言以為福既入其室黙然無語輙以所持鉄柱杖於窓户墙壁上頗毁数䖏而出主人再拜希觧悟曰尓屋完矣羙矣完而必毀理埶然也吾不尓毀尓将無以圖厥終今毀矣尓宜思其毁而欲克保全之則尓與尓子子孫孫庶㡬歌斯哭斯永終弗替主人說服吁真人真之道㦲宋季城信州掘土䖏為濠百畒許在郡南曰南池池之㫄可居舊為里人屋歸附後逹魯花赤㓕徹㩀有其地毎春夏之交群蝿聒耳寝食不安㑹三十八代天師張與材朝京回因以告天師朱書符篆新瓦上使人投池中戒之曰汝䵷毋再喧自是至今寂然漢書太液池中鳬雏雁子布滿充積用雁子甚佳王維詩蘆筍穿荷葉菱花骨雁児又新浙省廣濟庫歲差杭城諲實戸若干名充役庫子以司出納比一家中侵用官錢太多無可為償府判王某素號殘忍乃拘其妻妾子女于官又無可為計則命小舟載之求食於西湖以貲納官鬼妾鬼馬不肖輩群趋焉鮮于伯㡬先生樞作湖邊曲云湖邊蕩漿誰家女緑慘紅愁羞不語低回忍涙傍郎船貪得船頭強歌舞玉壷羙酒不須憂魚腹熊蟠棄如土陽䑓夢短匆匆去鴛鎖生寒愁日莫安得義士擲千金遂令桑濮歌行路後王之子孫有為娼者人之報施一何捷也義興王子明家饒於財所蔵三代彛鼎六朝以来法書名畫實冠浙右毎年必祈一籖於烈帝廟以卜休咎一歲籖詞有曰開溝鑿井當得鼎殊不以爲意家人以啇賈至汴夾谷郎中者蔵一啇彛絶精妙示之曰恐尓王翁未必有此物也歸以白即遣賷金購得之比舊蔵皆不能及至正壬辰冦起蘄黄将由義興取道犯浙西子明其所蔵鑿深窖以埋之彛亦在列既入窖作牛鳴者七夜頗可恠取出寄田家其窖後遭彂掘獨此彛獲存俗語以不潔爲鏖糟按霍去病傳鏖皐䦨下注世俗謂盡死殺人爲鏖糟然義雖不同却有所出邁里古思字善卿西夏人僑居松江家貧授徒以飬母性至孝然落落不覊善諧謔名人士多與之㳺至正甲午進士及苐授紹興路録事司逹魯花赤比視篆天下雲優所在悉瘵君撫字周至民愛之如父母乙未秋杭破遄即剋復浙省左丞楊完者以夲部苗将持露布至統洞蛮甚衆意實覘視虚實又将流毒於我民也縱虐恣暴民皆束手惴惴不敢與争無故刼府架閣照磨陳脩家妻妾㡬𬒳汚君激怒填膺指揮吏兵收之郡民讙呼從事苗遂盡死後完者聞越民結義且固終不敢調兵渡浙江方集慶䧟時江南行臺官流避􅔰慶元奉旨置治所於越遂􅊾君総督義民護城池君更募得勇悍者二千餘人以果毅二字為號曰果毅軍練習武事分撥守要害乃日與常所徃来者擊鮮飲醲酣咏呌嘯以為娯樂雖戸外上官坌至不少延納武康宼起㩀有縣境君收復朝廷旌其功除江南浙西道㢘訪司知事未上又除江東建康道經歴浙省丞相塔失帖木児便宜除行樞宻院判官君即自署諸叅謀為幙官曰經歴曰都事者不可枚舉時御史大夫拜住哥任猜禍吏為瓜牙又自統軍三千曰臺軍紀律不嚴民横𬒳擾害有訴於君君輙抑之衆軍皆怨怒然拜委瑣齷齪惟以鈎距致財為務君不禮之或以諌君曰吾知上有君下有民耳安問其它拜頗聞衘之遂與臺軍元帥列占永安張某萬戸閻塔思不花玉哈刺帖木児等謀殺之未得間戊戌十月廿二日首事出兵踰曹娥江與平章方國珍部下萬戸馮某闘既不利駐軍東関單騎馳歸拜意决矣廿三日遲明召君私苐議事入至中門左右以鉄槌撾殺之𥘉甚祕守閽軍自相謂无已殺縂督官我輩幸也民始有聞之者走白君部捋浙東僉元帥黄中諸叅謀聞変奔避不顧至有墜城以出行四五十里者𥘉夜二鼓中提軍入城危戒珠山拜未及知中臥病方飲藥得少汗尚昏潰困頓左右扶翼擐甲上馬遇臺軍於江橋闘十數合破陣䧟堅身當矢石郡民老㓜皆號泣曰殺我縂督官我尚何生為壮者助中軍殊死戦臺軍一敗塗地屠其二營入拜家姬侍奴隸死者相枕藉一女為隊官陳某所掠舉君屍無元大索三日得于溺池中拜與二子匿𣑽宇幽隱䖏民􅊧見之齊唾其面且罵曰瞎賊我縂督官何罪而令致於此耶不自殺執以歸中兾中殺之中觧其縛率諸軍羅拜之曰縂督官忠肝義膽照映天地人神所共知公信任憸邪使國之柱石隕于無辜我之復讐明大義也殺我主将者既巳斬之公幸毋罪拜執中以泣曰我之罪尚何言尚何言既而軍民為君持服為位以祭私謚曰越民考越六日拜自劾納印綬去其印是夜遺失中以白金百兩購得於一卒以還行臺者君未死先王日有星大如桮椀紅光燭天墜鎮粤門化為石及君出師識者巳卜君之有死兆矣至是果驗云南村野史曰兵凶器也戦逆徳也聖人不得已而用之故吾夫子必以臨事而懼好謀而成荅子路行三軍之問夫邁里古思受任云𥘉殊有古賢縣令之風一握兵柄志滿意得酣觴廢事䡖謀首乱不旋踵而身首異䖏盖亦平昔越已之過有以醸成此􅍔與微中則老毋稚子亦皆几上之肉矣原其忠君愛民之心昞然與日星相昭明者則無可議也拜住哥為國大臣坐鎮四者百官庶司孰不聴令邁之不奉臺檄擅興師旅明問其罪黜之可也斬之可也而乃隂結小醜作為此態是盗殺之非公論矣民心之所以不服良以是也噫享有尊爵重禄而當國歩囏難之日既不思㳙埃𥙷報之道又不責自已貪饕之非反以謀害忠良為先務謂之無罪得乎故其妻妾于女遭罹􅓍辱實自取之尚復何憐㦲三姑者尼姑道姑卦姑也六婆者牙婆媒婆師婆䖍婆藥婆穏婆也盖與三刑六害同也人家有一於此而不致姦盜者㡬希矣若能謹而逺之如避蛇蝎庶乎浄宅之法不中用不可用也左傳成二年郤子曰克於先大夫無能為役杜預注不中為之役使杜清碧先生本字伯原有所編五声韻目大小篆分隸真草以至外化蕃書及國朝蒙古新字靡不收録題曰華夏同音至正壬午中書奏修三史以翰林待制聘先生起至武林辤疾不行盤桓乆之浙省平章康里子山公巙巙時来訪一日語及声律之學因問國字何以用司喉音有無字字為首先生曰正如嬰児𥘉墮地時作此一声乃得天地之全氣也平章甚說服陶朱公飬魚經曰夫治生之法有五水畜第一水畜魚也此二字亦竒張邦基墨荘漫録云婦人之纒足起於近世前世書傳皆無所自南史齊東昏侯為潘貴妃鑿金為蓮花以帖地令妃行其上曰此歩歩生蓮花然亦不言其弓小也如古樂府玉臺新咏皆六朝詞人纎艶之言類多体状羙人容色之姝麗及言妆飾之華眉目唇口要支手指之類無一言稱纒足者如唐之杜牧之李白李商隱之輩作詩多言閨幃之事亦無及之者韓偓香奩集有咏屧子詩云六寸膚圓光緻緻唐尺短以今校之亦自小也而不言其弓惟道山新聞云李後主宫嬪窅娘纎麗善舞後主作金蓮髙六尺飾以寳物細帶纓絡蓮中作品色瑞蓮令窅娘以帛繞脚令纎小屈上作新月狀素韤舞雲中回旋有淩雲之態唐鎬詩曰蓮中花更好雲裏月長新因窅娘作也由是人皆效之以纎弓爲妙以此知札脚自五代而来方爲之如熈寧元豊以前人猶爲者少近年則人人相效以不爲者爲耻也漳州籠溪縣澳里人陳端才之妻蔡氏三玉後至元間本䖏宼起掠其里里媪集里中婦女同舟避難㓂追及三玉亟以水漬衣宼視三玉有姿色欲先汙之三玉紿曰衣濕更求衣間宼取衣投水死宼曰溺者必躍以長竿絡鈎俟其躍而舉之屍竟不躍宼退三玉之父端廣舟次上流屍逆流附父舟捭之不去移舟遡河而上屍從之上者三父異甚視則其女也夫三玉一婦人耳寧死不辱出於天性宜其貞爽不昧如此韃靼田地野馬或與蛟龍交遺精入地乆之彂起如筍上豐下儉鱗甲櫛比筋脉聮絡其形絶類男隂名曰鎖陽即肉從容之類或謂里婦之淫者就合之一得隂氣勃然怒長土人掘取洗滌去皮薄切晒乾以充藥貨功力百倍於從容也淮南潘子素純甞作輥卦譏世之人以突梯滑稽而得顕爵者雖曰資一時之謔浪調笑不為無𥙷於名教卦辤曰輥亨可小事亦可大事彖曰輥亨天地輥而四時行日月輥而晝夜明上下輥而萬事成輥之時義大矣哉象曰地上有不輥君子以容身固位𥘉六輥出門無咎象曰出門使輥又何咎也六二傅于鉄轊象曰傅于鉄轊天下可行也六三君子終日輥輥属無咎象曰終日輥輥雖危無咎也九四模稜吉象曰模稜之吉以隨時也六五神輥象曰六五神輥老於事也上六或錫之髙爵天下揶揄之象曰以輥受爵亦不足敬也此篇或者又謂自宋末即有非潘所造未審是否後平江蔡宗魯衞作吝卦以配之曰吝亨利居閒不利有所為彖曰吝鄙啚也利居閒無所求也不利有所為恐致禍也𥘉六居富吝於周急悔亡无攸利象曰吝於周急莫恤其貧也悔亡无攸利巳終有望也六二聴婦言至吝不飬其親不恤其弟貞凶象曰聽婦言昵於私也不飬其親忘大恩也不恤其弟失大義也雖飬弗時亦致灾也故貞凶九三極吝吝其財不吝其身於行非冝象曰吝其財務至富也不吝其身乃輕生也六四太吝君子吉小人凶象曰吝於君子雖有言无尤也吝於小人雖不有言終有悔也六五不吝於色務所欲終以死亡凶朋来吝於酒食弗克歡无咎象曰不吝於色惑於淫也務所欲樂其順從也終以死亡凶可知也朋来從具類也吝於酒食誠大謬也雖弗克歡可無咎也上九居其家不吝於内吝於教子弗叶吉象曰居其家妄自尊也不吝於内畏寡妻也吝於教子終無所成也近扶風馬文璧琬又作諞卦曰諞貞亨𥘉吉終凶利見小人不利于君子彖曰貞正也亨通也通乎正言諞或庶㡬也終凶諞不由𥘉也利旦小人猶同類也不利于君子入于邪也象曰麗口掉舌諞君子以求名干禄𥘉九諞于同朋無咎象曰同朋于諞又誰咎也九二畧施于民吉象曰九二之吉以新衆聴也六三来其諞酒食用享象曰来其諞民取則也享其酒食以崇功也九四飾言如簧以娱彼心乃獲南金象曰娱人獲金不足道也九五君子終日髙諞王用徴安車以迎終歲弗寜後有凶象曰以諞受徵不羞也終歲弗寕祖足煩勞也後有凶不副實也上六莾諞不巳四方欲殺之象曰莾諞取怒殺之何過也右三卦切中時病真得風刺之正因併録之廣海采珠之人懸絙于要沉入海中良乆得珠撼其絙舶上人挈出之塟于黿鼉蛟龍之腹者比比有焉有司名曰烏蜑戸蜑音但仁宗登極特㫖放免時敬公威卿為江西行省叅知政事俾該管掾史立案令廣東帥府抄具烏蜑戸一一籍貫姓名置冊申觧它省官曰中書咨文無是恐不必也公曰萬一申明舊典庶不害及良民未㡬太后中使至人咸服公先見之明凡婢役於婢者俗謂之重臺按左氏傳昭公五年日之數十故有十時亦當十位自王以下其二為公其三為卿注云日中為王食時為公平旦為卿雞鳴為士夜半為皁人定爲輿黄昏爲隸日入爲僚晡時爲僕日昳爲臺㬂中日出闕不在第等王公曠其位又昭公七年天有十日人有十等故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣臺則所謂臺者十等之至卑今豈亦本是與然加以重字尤有意文選曹公􅊾呉將校部曲文年月朔日子注彂􅊾時也南村輟耕録卷之十
