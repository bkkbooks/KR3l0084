body:
  text: 南村輟耕録叙余友天台陶君九成避兵三吴間有田一㕓家于松南作勞之暇每以筆墨自隨時時輟耕休于􅀣隂抱􅂰而嘆鼓腹而􅁔遇事肎綮摘葉書之貯一破盎去則埋于􅀣根人莫測焉如是者十載遂累盎至十數一日盡發其蔵㑭門人小子萃而録之得凡若干條合三十卷題曰南村輟畊錄上兼六􅀴百氏之㫖下極稗官小史之談昔之􅀁未攷今之􅀁未聞其採摭之博侈扵白帖研覈之精儗扵洪茟論議抑􅀭有傷今慨古之思鋪張盛羙為忠臣孝子之勸文章制度不辨而明疑似根㩀可覧而悉盖唐宋以来專門史學之􅀁未譲雖周室之蔵郯子之對有不待環轍而後知又豈抵掌談􅀏以求賢扵優孟者哉九成名宗儀少工舉子業晚乃棄去闔戸著書此其一云至正丙午夏六月江隂孫作大雅序南村輟耕録䟽南村田叟陶君九成著書三十卷凢六合之内朝野之間天理人事有関於風化者皆采而録之非徒作也然又能不忘稼穡艱難盖有取於聖門餒在其中禄在其中之㫖乃名之曰南村輟耕録朋㳺間咸欲為之版行以備太史氏采擇而未有倡首之者於是僣為䟽引以伸其意同志之士有觀其書者必皆樂聞而興起焉伏以兒寛帯經而鉏名髙前史陶亮既耕還讀教及後昆頋服田力穡乃士之常然著書立言於世為重比覩輟耕之録實為載道之文凢例既明書法尤備鈎玄提要匪按啚索􅂹之空言攷古驗今得閉户斵輪之大意盍亦寫諸琬琰庻可緝于簡編惟鏤板乃見全書在司帑當無難色同門曰明合志曰友幸慫慂以相成副墨之子洛誦之孫共流􅀓於不朽學海之波瀾無障研田之稼穡有秋謹䟽今月日䟽青溪野史邵亨貞南村輟耕録總目卷之一大元世系列聖正綂氏族平江南獨松関淛江潮宋興亾萬􅀊山大軍渡河檄朝儀科舉江南謡白道子官不致仕荅刺䍐皇族列拜内八府宰相云都赤大漢貴由赤昔寳赤卷之二聖聰隆師重道受佛戒減御膳聖儉后德端夲堂徵聘治天下匠以官為氏受孔子戒不食死染髭殺虎張御史舉薦切諌丁􅀕髙學士大黃愈疾置䑓憲内御史署御令史臺字詔西畨五刑錢幣巴而思善諌使交趾刻名印􅀦璽宣文閣占驗權臣擅政懐孟蛙賊臣攝􅀕叛黨告遷地土人作􅁺蕭先生端厚㢧字卷之三正統辯貞烈岳鄂王木乃伊卷之四發宋􅁜寢相術前軰謙讓不苟取論詩妻賢致貴竒遇賢烈挽文丞相詩禱雨廣寒秋無恙不乱附妾卷之五角端劈正斧興隆笙尚食麫磨僧有口才鄧中齋汪水雲厚德毁前朝玉璽披秉歌訣三教授時暦法功布人中發燭嫁故人女平反勘釘碑志書法雕刻精絶題䟦隆友道朱張交􅁩假宅以死淸風堂屍迹坐右銘掘墳賊廉介甲午節氣先軰謙讓双竹杖卷之六蘭亭集刻禊帖考喪師衰經廉使長厚私苐延賔句曲山房熟水法帖譜系評帖淳化祖石刻家翁奴材沙魘孝行吾竹房先生抗䟽諌伐宋髪䐈􅀑贓居士親家研山圖衞夫人卷之七趙魏公書􅀞金鰲山委羽山斛銘孝感火失刺把都屈戍囬囬石頭黄巢地蔵官奴􅆊㛮房老鴛衾奚奴温酒挂牌延客買宅有䜟待士雇僕􅃥志異課馬客作鹹杬子官制資品奎章政要義奴忠倡鷹背狗盖志恠粥爵還金絶交􅀞􅀑卷之八寫山水訣鄧山房狗站五馬入門隐逸関莭梯媒利市志苗􅀟硯堂嫁妾猶䖏子聶碧窓詩玉􅃾􅈉㫁作今樂府法岷江緑温暾飛雲渡漢子長年龍見嘉興星入月軍中禮士不耐煩阿誰卷之九文章宗旨麻荅把暦續演雅發揮面花子竒疾磨兠鞬􅁑大哥萬栁堂􅀣鳴松江官號割埶題屏謝客㛰啓陶毋碑許文懿先生謡言獸醫想􅁏王眉叜錢唐潄芳亭食品有名火災落水蘭亭隂府辯詞詩法姓名考女諌買印呉江塔頴箭素領卷之十御史五常官倉入粟食物相反先軰諧謔馬判字訓丘真人南池䵷㕍子趂辦官錢􅂦作牛鳴鏖糟越民考三姑六婆不中用國字水畜纒足溺水不躍鎖陽輥吝諞三卦烏蜑户重臺日字卷之十一寫像訣相地理狎娼遭毒夣白醉賢毋辤拾遺鈔女奴義烈龍廣寒夜航船不快雷雪分䟽西皮煖屋􅀑室牙􅀰墓屍如生枯井有毒賢孝事物異名金鎞刺􅁏杭人遭難承天閣阿癐癐海運夫婦死孝猪妖卷之十二園池記厠籌拗花連枝秀郤鞭奉毋避難匠官仁慈著衣喫飯文章政事浙江潮􅀱貞烈墓特徤藥乞求張道人隂德延壽帝師卷之十三中書􅀑案烏寳傳緑窓遺藁為將嗜殺釋怨結姻杜荀鶴詩太公剛介發墓卷之十四忠烈􅄟鶴銘風入松四卦􅀧􅀑録房中術婦女曰娘古刻上頭入月人腊張翰林詩卷之十五淳化閣帖幽圄煮豆帖妓妾守節與妓下火文賀人妾得子啓吊四状元詩雞妖胡烈女䵷獄沁園春㳟敏坊隠趣日書三萬字妓出家河南王妖異塔影入屋錢唐懐古詞人命至重度量宏深髙麗民守節寒號蟲鄧思賢醫科卷之十六陶氏二譜藥譜世系卷之十七古銅器石敢當方頭七十二旃檀佛傳席歸婦吟穿耳丫頭􅀧心奴婢愠羝天子爭臣嬸妗黄金縷哨遍花蕊夫人崔麗人江浙省地分改常卷之十八叙畫記宋宫殿廉察宣髪撽書露布靸鞵書手卷之十九脈四司六局稽古閣經紀龐居士宋朝家法䦨駕上書錢武肅鐵劵射字法神人獅子至元鈔様妓聦敏日無光松江志異郡縣君面不畏寒卷之二十納音化氣應聘不遇皇舅墓真率㑹珠廉秀漢兒字聖㫖碧瀾妾箕仙咏史夫婦同棺宋㓜主詩孔椽史挽文教授詩狷潔雁書碑刻印識九姑玄女課白翎雀天下士卷之二十一宫闕制度公宇喝盞碧珠示䜟卷之二十二聖門弟子河源皇太子署牒禽戯虎禍河南婦玉堂嫁妓數䜟戎顯再生筭命得子夫婦入道項節婦西域竒術童子属對先軰風􅃱司馬善諫俞竹心犬脇生子卷之二十三書􅀞褾軸爐鳴田夫入嗓金蓮盃大佛頭􅀭州白萊譎誕有配檢田吏玉鹿盧猴盜盜有道預知改元醉太平小令譏省臺造物有報復鎖鎖葉氏還金傅氏死義武官可􅀏鞠獄聖鐵􅀑爺爺死護文廟卷之二十四結交重氣義帝廷神獸勾䦨壓鵓鴿傳書待士鄙吝陳公子漢魏正閏剛卯倜儻好義道士壽凾餛飩方精塑佛像繆孝子趙孝子王義士木冰龍湫獻靈王一山誤堕龍窟雞司晨有凖黄道婆天隕魚十二生子劉節婦歴代醫師卷之二十五論秦蜀院夲名目遁毋天竺觀音卷之二十六傳國璽瑞應泉疑冡盧橘五龍車伏波將軍至元鈔料鵰傳三瓦戒酸齋辤世詩高昌世家后德文宗能畫武當山降筆箕仙有驗詩畫題三絶浙西園􅁐吳江長橋卷之二十七四位配享金果李哥貞烈劉節婦病潔雜劇曲名唱論莊蓼塘蔵書買假山戴氏絶嗣妓妾守志譏伯顔太師譏方士燕都賦裱背十二科厲狄旗聮桃符䜟金甲藺節婦忠孝里胡仲彬聚衆扶箕詩卷之二十八非程文于闐玉佛䖏士門前怯薛憲僉案判詩䜟丘機山不孝䧟地死嘲回回白縣尹詩廢家子孫詩樂曲􅅡梅花文如夣令黄門花山賊爵禄前定醋缽兒棊譜軍前請法師淩捴管岀對承天寺義丈夫觧語盃戯題小像水仙子銅錢代著刑賞失冝􅀞家十三科卷之二十九紀隆平降真香宋二十一帝字音許􅀒李玉溪先生稱地為􅀟骨咄犀一門五節一門三節黄龍洞黏接􅁓縫法井珠一錢太守廟全真教馬孝子楊貞婦窯器墨斵琴名手古琴名戯語日家安命法淮渦神寄衣詩卷之三十印章制度銀工祖孝子白月圜文金靈馬髹器只孫宴服三教一源銀錠字號學宫講說松江之變果典坐詩䜟書畫楼物必遇主鎗金銀法磨兠堅箴三􅀏圖官制字訛巾幘考屨舄履考南村輟耕録總目終
