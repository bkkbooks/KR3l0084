front:
  text: 南村輟耕録卷之十五
  hash: sha256:acf7166b4eca6c7ab419ee97edf7e4b7f067cc6deb23e9a1b6fd925dcf0ce6b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_015-1a}
body:
  text: 天台陶宗儀九成淳化閣帖非精於鑒賞者莫能辨其真偽非愽於討論者不可得其源流第六卷中甞記祖石刻之説今復究研大畧於稽古之書質正是否於好事之人用贅于此云宋太宗留意翰墨淳化中出御府所蔵命侍書王著臨榻以􅀥木鏤刻􅁵為十卷於每卷末􅂐題云淳化三年壬辰􅀊十一月六日奉聖旨模勒上石至仁宗有詔僧希白刻石于祕閣前有目録卷後無􅂐題世傳以為二王府帖者非也盖元祐中親賢宅從禁中借板墨百但用潘谷墨光輝有餘而不甚黟黒又多木横裂紋時有皴皵失字䖏賢親宅魏王所居魏王二王也又有髙宗紹興中國子監本其首尾與淳化畧無少異當時御前拓者多用匱紙盖打金銀箔者也自後碑工作蟬翼本且以厚􅁓覆板上􅀮然爲銀鋌􅗚㾗以愚人但損剥非復拓本之遒勁矣􅀄徽宗建中靖國間出内府續所􅀵書令刻石即今續法帖也大􅀚中又奉旨摹搨歴代真跡刻石于太清楼字行稍髙而先後之次與淳化則少異其間数帖多寡不同各卷末題云大􅀚三年正月一日奉聖旨摹勒上石此蔡京書也而巳建中靖國續帖十卷易去􅀊月名䘖以為後帖又刻孫過庭書譜及貞􅀚十七帖総為二十二卷謂之大􅀚大清楼帖絳帖者尚書郎潘師旦以官帖摹刻于家為石本而傳寫字多譌失世稱為潘駙馬帖凡二十卷其次序卷帙雖與淳化官帖不同而實則祖之特有所増益耳單炳文曰淳化官本法帖今不復多見其次綘帖最佳而舊本亦巳艱得甞以数本較之字畫多不侔偉家蔵舊本比之今本多誤筆法且俗曹士冕曰帖縂二十卷元無字號及断眼数目單炳文曹士冕各有模刻本世傳潘氏析居法帖分而為二其後綘州公庫乃得其一於是􅀘刻餘帖名東庫本第九卷之舛誤盖始於此且逐卷逐段各分字號以日月光天徳等二十字為次弟後避金主亮諱但􅁃亮帖内亮字皆去右邉轉筆謂之亮字不全本又有新綘本北方别本武岡新舊本福溝烏鎮彭州資州本木本前十卷等􅀋皆綘帖之别也潭帖者慶暦中刘丞相帥潭日以淳化官帖命慧照大師希白模刻于石􅁳之郡齋増入傷寒十七日王濛顔真卿諸帖而字行頗髙與淳化閣本差不同逐卷有慧照大師希白重模字而􅀊月各異中間繆䖏甚多朱文公譏其極為可􅀏者是也潭帖之别則有刘丞相私第本長沙碑匠新刻本三山木本蜀本廬􅁜䔥氏本等􅁼甚多戯魚即臨江帖也元祐間劉次荘以家蔵淳化閣帖十卷摹刻于戯魚堂除去􅂐題而増釋文慶元中四川総領權安節又重摹于利州黔江者黔人秦世章於長沙買石摹僧寳月古法帖十卷寳月慧照也謀舟載入黔中壁之黔江之紹聖院後題云長沙湯正臣重摹䁀帖板本校諸帖増益最多澧陽石刻散失僅存者右軍数帖而巳又有淳熈􅁱内司本北方印成本烏鎮張氏福清李氏本若此之􅁼大抵皆法帖一再之翻摹殊失筆意無足􅀚者汪逵字季路衢州人官至端明殿學士建集古堂蔵竒書柲蹟金石遺文二千卷著淳化閣帖辨記共十卷極為詳俻末云其本乃木刻計一百八十四版二千二百八十七行其逐叚以一二三四刻于㫄或刻人名或有銀鋌印㾗則是木裂其墨乃李廷珪墨黒甚如􅃮其字精明而豐􅃾比諸刻為肥劉潜夫曰近人多不識閣帖某家寳蔵本皆非真真者字極豐穣有神采如潭綘則太􅛀臨江則太媚又用李廷珪墨印造余始得汪端明所記閣帖行数恨無真帖叅校晩使江左用二千楮致一本尤伯晦見之曰寳物也夫真帖可辨者有数條墨色一也他本刋卷数在上版数在下惟此本卷数版数字皆相聮属二也他本行数字比帖字小而􅛀此本行数字比帖中字皆大而濃三也余所得江左本毎版皆全紙無接黏䖏一部十卷無一版不與端明所記合乃知昔人装禙之際寧使毎版行数或多或寡而不肯剪截湊合者欲存舊帖之真面目四也太師丞相脫脫之死盖副樞哈馬與其弟雪雪并􅉟事顙哥失里等所以擠䧟之也哈兄弟得侍上帷幄而顙在東宫為近幸故哈黨顙而私相誓曰􅀂太師去位後我能作右相則左相必􅉟事矣既而入中書又虞顙来其􅁠不顓奏除宣政使而以弟雪為御史大夫顙殊失所望末㡬哈得罪杖死雪亦仰薬死􅀄顙有侍從人亦曰桑哥失里止顙哥一字之異耳服劳執事得顙意䫙舉充院宣使一日􅍕然長逝絰日乃醒云方坐卧室榻上見二卒自外躍入導之徃至都城隍廟轉彂嶽祠祠吏曰来矣可亟觧去旋有行入祠西北隅大林内有殿宇若王者居入拜殿下巳仰視之則太師也太師曰我所攝者院使也於汝無預因俾左右引􅀚幽圄見吟兄弟括髪関械顧桑泣下及出太師謂曰汝可即歸此非人間世也退而覺恍􅀂一夣然明日同寅有来約徃院使家桑辞疾且曰君幸毋泄吾􅂲院使不乆生矣衆問其故告以詳皆相顧驚􅕎曰昨日院使将上馬以體少不安而入豈􅃍至此乎語未終有報院使巳􅁀卒近見浙西憲司經歴何伯大所􅀃甚詳此特其畧耳黃山谷煮豆帖云庭堅頓首失牛児来終日惘然至今頭昏眼痛雖取所喜者為之亦不能如意也以是不能􅁱問辱手誨喜承日用䡖安所須諸方既無人可抄又意緒不佳􅈸動耳煮黒豆法碓豆一升挼莎極浄用貫衆一斥細剉如􅄬子同豆斟酌水多少慢火煮豆香熟日乾之翻覆令展盡餘汁􅉫取黒豆去貫衆空心日㗖五七粒食百草木枝葉皆有味可飽也世間不強學力行自致於古人者不可不畜此方庭堅頓首翰禮祕校足下妓妾之以色藝取憐炉竉於主家者亦曰我之富與貴有以感動其中耳誤遇患難貧病彼必戚戚然求為脫身之計又肻守志不貳者哉如金谷園緑珠燕子楼盼盼韓香之扵葉氏愛愛之於張逞者真絶無而僅有也大元混一以来得三人焉李翠娥維􅀭名倡也石九山萬戸納置別業石􅃿李誓不適他姓以辱身終日閉閤誦經而巳年及七十餘萬戸之子若孫遇􅀊時咸徃拜之樂籍中相傳以為盛事五巧児京師旦色也陳雲嶠同知與之狎擕至杭陳卒奉正室鐵氏以清慎勤儉終其身汪憐憐湖州角妓也􅄺古伯經歴常属意焉汪曰君若不棄寒㣲當以側室䖏妾䑕􅀼狗偷妾决不為此態􅄺乃遣媒妁俻財禮娶之經三載死汪髠髮尼寺時公卿士夫有徃訪之者汪故毀其身形以絶狂念卒老于尼若此者亦可以追踪前古之懿徳矣錢唐道士洪丹谷與一妓通因娶為室病且革顧謂洪曰妾死在旦夕卿須自執薪還肯作一轉語乎夫妾歌児也卿能集曲調於妾未死時使預聞之雖死無憾矣洪固滑稽䡖佻者遂作文曰二十年前我共伊只因彼此太癡迷忽然四大相離後你是何人我是誰共惟稱呼秀鍾谷水聲遏楚雲王交枝堅一片心錦􅆞道餘二十載􅃍成如夣令休憶少年逰􅂘相思兩手託空意難忘一筆勾断且道如何是一筆勾断孝順哥終無孝順逍遥樂永遂逍遥聽畢一􅀏而卒因記中呉紀聞載一事云昆山倡周氏係籍部中張子韶為守時倡􅁀亡適道川来訪因命作下火文云可惜許可惜許大家且道可惜許箇甚麽可惜巫山一段雲眼如新水􅀧綘唇昔年繍閤迎仙客今日桃源憶故人休記醜奴児臉子便須抖擞好精神南柯夢断如何也一曲離愁别是春大衆還知某人向甚麽䖏去這裏分明㑹得驀山溪畔頭頭盡是喜相逢芳草渡頭䖏䖏六么花十八其或未然更聽下句咦與君一把無明火焼盡千愁萬恨心其事頗相􅁼併附于此陸伯麟側室育子友人陸象翁以啓戯賀之曰犯簾前禁尋竈下盟玉雖種扵藍田珠将還於合浦移夜半鷺鷥之歩㡬度驚惶得天上麒麟之児這回喝采既可續詩書禮樂之脉深嗅得油鹽醤醋之香蘇東坡咏婢謔詞有掲起裙児一陣油塩醤醋香之句平江一驛舟中有題吊四狀元詩者不知誰所作詩曰四榜狀元逢此日他年公論定難逃空令太守提三尺不見元戎用六韜元舉何如兼善死公平争似子威髙世間多少偷生者黄甲由来出俊髦元舉王宗哲字也至正戊子科三元進士時為湖廣憲僉兼善㤗不華字也時為台州路逹魯花赤公平李齊字也時為髙郵府知府子威李黼字也時為江州路捴管此四公者或大􅃜臣節或盡忠王事或遇難而亡故云若論其優劣則江州第一台州次之髙郵有次之憲僉不足道矣至正丁酉春三月上海李勝一家雞伏七雏一雏作大雞狀鼓翼長鳴明年戊戍春正月錢唐盧子明家一雞伏九雏一雏有三足二足在前一足在後三月諸暨􅀽彦誠家一雞伏五雏一雏有四足二足在翼下不数日皆死而各家亦無他異越􅌘縣剡溪胡氏諱妙端適同邑祝某至正庚子春為苗獠虜至金華縣􅀅妻之義不受辱乗間囓指血題詩壁上已赴水而死三月廿四日也獠帥服其節為立廟祀之邑人咸曰烈女廟詩曰弱質空懐漆室憂摉山千􅀐入深幽旌旗影乱天同慘金皷聲淫􅀑亦愁父母劬勞何日報夫妻恩愛此時休九泉有路還歸去􅃚箇雲邉是越州盧伯玉文璧至正初尹荆山日忽有一巨䵷登㕔前兩目瞠視􅁼有所訴者令卒尾之行去縣六七里有廢井遂跳入不出既得報徃集里社汲井獲死屍乃兩日前二人同出為商一人謀其財而殺之掩捕究問抵罪死者之家属云其在生不食䵷見即買放豈一念之善為造物者固已鑒之䵷能雪􅁈良有以也宋劉改之先生過詞贍􅇣有思致賦沁園春二首以咏羙人之指甲與足者尤纎麗可愛一曰銷薄春氷碾䡖寒玉漸長漸彎見鳯鞵泥汚偎人強剔龍涎香断撥火䡖翻學撫瑶琴時時欲剪更掬水魚鱗波底寒纎柔䖏試摘花香滿􅍢􅀥成班時􅀅粉淚偷弹記綰玉曽教栁傅看筭恩情相著搔便玉體歸期暗数畫徧䦨干毎到相思沈吟静䖏斜􅀝朱唇皓齒間風流甚把仙郎暗搯莫放春閒一曰洛浦淩波為誰㣲歩輕塵暗生記踏花芳徑乱紅不損歩菭幽砌嫰緑無㾗襯玉羅慳銷金様窄載不起盈盈一叚春嬉㳺倦􅀏教人欵捻㣲捉些根有時自度歌声悄不覺㣲尖􅀧拍頻憶金蓮移換文鴛得佀繍茵催衮舞鳯䡖分懊恨深遮牽情半露出􅃿風前煙􅈁裙如何似似一鈎新月淺碧籠雲近邵青溪亨貞嗣其體調以咏眉目真雋永有味一曰巧闘彎環纎凝嫵媚明粧未􅀵似江亭暁玩遥山拂翠宫簾暮捲新月横鈎掃黛嫌濃塗鉛訝淺能畫張郎不自由傷春倦為皱多無力翻做嬌羞填來不滿横秋料著得人間多少愁記魚箋緘啓背人偷歛雁鈿膠併運指䡖揉有喜先占長顰難效柳葉輕黄今在否双尖鎖試臨鸞一展依舊風流一曰􅃮􅀧填眶鳯梢侵􅁂天然俊生記隔花瞥見踈星烱烱􅀝䦨凝注止水盈盈端正窺簾瞢騰並枕睥睨檀郎長是青端相乆待嫣然一􅀏宻意􅀅成困酣曽􅀍鶯驚強臨鐿挼抄猶未醒憶帳中親見似嫌羅宻尊前相顧翻怕燈明醉後看承歌䦨闘弄幾度孜孜頻送情難忘䖏是鮫綃揾透別淚双零李恭敏公者所居在江隂之南門其門首巷坊亦題曰恭敏不知當日名坊之義而七八十年来子孫消削第宅傾圯殆盡棄遺故址竟為里豪薛德昭所吞土木一新郷閭健羡忽有人獻謟於薛云若不除去舊坊終非君家利也薛深然之指数恭敏之族尊且長者惟李唐卿可主其事乃呼至贈泉百緡李忻然撤之一夕囈語呻吟甚苦妻急呼之覺問其故曰我夢見􅂁笏大官自云是我祖責以不能世守其業又毀其坊既罵且撻我􅀒痛呌號故致此耳語既􅁀死莫救又数年城燬于兵薛氏室屋財産悉空貧無為計遂執幹役於時貴之家噫子孫之不肖強覇之用心皆可為後人鑒也余家天台萬山中茅屋可以芘風雨石田可以具饘粥雖行江海上而泉石草木之勝未甞不在夢寐時見也偶讀廬􅁜羅景綸大經所者鶴林玉露有曰唐子西云山静似大古日長如小年余家深山之中毎春夏之交蒼蘚盈階落花滿徑門無剥啄松影叅差禽声上下午睡􅀄足旋汲山泉拾松枝煮苦茗啜之随意讀周易國風左氏傳離搔太史公書及陶杜詩韓蘇文数篇從容歩山􅈳撫松竹與麛犢共偃息於長林豐草間坐弄流泉潄齒濯足既歸竹窓下則山妻稚子作筍蕨供麥飯欣然一飽弄筆窓間随大小作数十字展所蔵法帖墨蹟畫卷縦􅀚之興到則吟小詩或草玉露一兩叚再烹苦茗一桮出歩溪邉觧后園翁溪友問桑麻􅀃秔稲量晴校雨探節数時相與􅇵談一餉歸而􅀝杖柴門之下則夕陽在山􅂵緑萬狀変幻頃刻恍可人目牛背笛声兩兩来歸而月印前溪矣味子西此句可謂絶妙然此句妙矣識其妙者盖少彼牽黄臂蒼馳獵於声利之􅂣者但見衮衮馬頭塵匆匆駒􅂩影耳烏知此句之妙哉人能真知此妙則東坡所謂無事此静坐一日是兩日若活七十年便是百四十所得不巳多乎此羅君語也余盖亦知此妙乆矣風塵澒洞豺虎咬人㡬賦歸與之詩計無所得又未知何日可以遂吾志也掩卷為之三嘆江浙平章子山公書法妙一時自松雪翁之後便及之甞問客有人一日能寫得㡬字客曰聞趙學士言一日可寫萬字公曰余一日寫三萬字未甞以力倦而輟筆公號正齋恕叜又號蓬累􅙕康里人李當當者教坊名妓也姿藝超出輩流忽翻然若有所悟遂著道士服江浙儒學提舉叚吉甫先生天祐贈之以詩曰歌舞當今第一流洗妆拭靣别青楼便随南嶽夫人去不與蘇州刺史留璚館月明簘鳯下綺窓雲散鏡鸞􅀵却嫌癡絶潯陽婦嫁得商人已白頭能改齋漫録云唐陽郇伯作妓人出家詩曰盡出花鈿與四鄰雲鬟剪落向殘春暫驚風燭難留世便是池蓮不染身貝葉欲翻迷錦字􅆊声􅀄學誤梁塵從今艶色歸空後湘浦應無解佩人湘山野録乃謂陳彭年作此不考之過也吁二先生之風流餘韻於此可以想見矣河南王卜憐吉歹為本省丞相時一日􅁺史田榮甫抱牘詣府請印王留田侍宴命司印開匣取印至前田誤觸墜地王適更新衣而印朱濺汙滿􅁭王色不少動􅂬飲竟夕又一日行郊天氣且暄王易涼帽左右捧笠侍風吹堕石上擊碎御賜玉頂王􅀏曰是有数也諭令毋懼噫此其所以為丞相之量至正辛夘夏松江普照寺僧舎一􅁦帚開花又嘉興儒學閽人陶氏磨上木肘彂青條開白花又呉江分湖里煆工一栁􅀣樁以安鐡碪者且十餘年矣彂長條数莖如葦三家雖有此恠而皆無恙豈非関係國家之氣数乎平江虎丘閣版上有一竅當日色清朗時以掌大白􅁓承其影則一寺之形勝悉於此見之但頂反居下耳此固有象可寓非幻出者松江城中有四塔西曰普照又西曰延恩西南曰超果東南曰興聖夏監運家乃在四塔之東而小室内却有一塔影長五寸許倒縣于西壁之上不知從何而來然不常有或時見之焉是有不可暁也傅按察者忘其名錢唐懐古甞作一詞云静中看記昔日淮山􅀮􅀮宛若虎踞龍蟠下㐮樊指揮湘漢鞭雲􅀐圍繞江干執不成三時當混一過唐之数不為難陳橋驛􅀌児寡婦乆假當還掛征帆龍舟催彂紫宸􅀄卷朝班禁庭空土花暈碧輦路悄訶喝声乾縦餘得西湖風景花桞亦凋殘去國三千㳺仙一夢依然天淡夕陽閒昨宵也一輪明月還照臨安盖鴨頭緑調也後至元間同知兩浙都轉運塩使司事趙君伯常休日與書吏談官府政事因曰吾􅇮為中書提控椽史時夜坐私第一室忽有兩吏来前傳都堂鈞㫖呼喚遂即上馬隸前導至一官府􅀣木隂翳大官危坐㕔事上問云河南饑省咨至乃緩七日不報彼䖏死者甚衆汝知之乎吾荅曰某提控耳該􅁺稽遲之罪已甞呈舉官沉思良乆曰非汝過也汝退又命前隸曰可急追該掾某人来吾遂覺夢也明日晨起令人覘之夜􅁀死矣人命至重尓軰其慎之建徳路逹魯花赤古篤魯丁字志道守贛州路任滿聽除時有故吏丘徃臨江貼􅀘分魯尺牘見搃管木八刺木即日録用就遣丘持俸鈔五十定餽魯盖魯以㢘故家甚貧朋友間毎分財以濟之丘竟匿其鈔後木所得魯書而謝不及此疑焉因便使問之魯知為丘所有即具書請失謝之罪丘聞此惶赧無地令児子奉鈔還魯終不受且為􅀮其􅁖未甞與人言夫魯西域人也度量之宏深乃如是可謂厚徳君子矣若丘者名教中所不可容尚孰責哉中書平章闊闊歹之側室髙麗氏有賢行平章死誓弗貳適正室子拜馬朶児赤􅀃其色欲妻之而不可得乃以其父所有大荅納環子獻於太師伯顔此物盖伯顔所属意者伯顔喜問所欲遂白前事伯顔特為奏聞奉㫖命拜馬朶児赤收継小母髙麗氏髙麗氏夜與親母踰垣而出削髪為尼伯顔怒以為故違聖㫖再奏命省臺洎侍正府官鞠問諸官奉命惟謹鍜錬俻極􅃤酷時國公闊里吉思於鞠問官中獨秉􅁠力侍正府都事帖木児不花数致言曰雖無妻子安能相守至死得有如此守節者莫大之幸而反坐以罪􅂲非我治朝之盛典也國公悟為言於伯顔之前宛曲觧釋其事遂以帖木児不花漢名劉正卿後至監察御史而卒五臺山有鳥名寒號蟲四足有肉趐不能飛其糞即五􅂕脂當盛暑時文采絢爛乃自鳴曰鳯凰不如我比至深冬嚴寒之際毛羽脫落索然如鷇雏遂自鳴曰得過且過嗟夫世之人中無所守者率不甘湛涪郷里必振㧞自豪求尺寸名詫九族儕􅁼則便志滿意得出肆入􅀭以為天下無復我加矣及乎稍遇貶抑􅃍若䘮家之狗垂首帖耳揺尾乞憐惟􅂲人不我恤視寒號蟲何異哉可哀巳甞見人戯呼一譁訐者為鄧思賢􅀄不可暁後讀筆談始得其􅀃云世傳江西人好訟有一書名鄧思賢皆訟牒法也其始則教以侮文侮文不可得則欺誣以取之欺誣不可得則求其罪刼之盖思賢人名也人傳其術遂以名書村校中徃徃以授生待醫有十三科考之聖濟搃録大方脉雜醫科小方脉科風科産科兼婦人雜病科眼科口齒兼咽喉科正骨兼金鏃科瘡腫科鍼灸科祝由科則通兼言南村輟耕録卷之十五
