front:
  text: 南村輟耕録卷之九
  hash: sha256:7323d84ebc75cbf7aee2dfc300f5b89cbe1a7ca54640684b56dd5b7f6d2719cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_009-1a}
body:
  text: 天台陶宗儀九成盧踈齊先生文章宗􅈲云大凢作詩須用三百篇與離騷言不関於世教義不存於比興詩亦徒作夫詩彂乎情止乎禮義関睢樂而不淫哀而不傷斯得性情之正古人於此􅀚風焉賦者古詩之流也前極宏侈之規後歸簡約之制古班固二都之賦冠絶千古前極鋪張鉅麗故後必稱典謨訓誥之作終焉厥後十􅂾作者倣而俲之盖詩人之賦必麗以則也古今文章大家数甚不多見六經不可尚矣􅀾國之文反覆善辨孟軻之條暢荘周之竒􅊆屈原之清深為大家西漢之文渾厚典雅賈誼之俊徤司馬之䧺放為大家三國之文孔明之二表建安諸子之数書而已西晋之文淵明歸去来辤李令伯陳情表王􅇣少蘭亭叙而以唐之文韓之雅健栁之刻削為大家夫孰不知然古文亦有数漢文司馬相如揚䧺名教罪人其文古唐文韓外元次山近古樊宗師作為苦澁非古宋文章家尤多老歐之雅粹老蘇之蒼勁長􅂫之神俊而古作甚不多見盖清廟茅屋謂之古朱門大厦謂之華屋可謂之古不可大􅅅玄酒謂之古八珍謂之羙味可謂之古不可知此者可與言古文之妙矣夫古文以辨而不華質而不俚為髙無排角無陳言無贅辤夫記者所以紀日月之逺近工費之多寡主佐之姓名叙事如書史法尚書頋命是也叙事之後畧作議論以結之然不可多盖記者以􅇱不忘也夫叙者次序其語前之􅀃勿施於後後之􅀃勿施於前其語次第不可顛倒故次叙其語曰叙尚書序毛詩序古今作序大格様書序首言晝卦書契之始次言皇墳帝典三代之書及夫子定書之由又次言秦亡漢興求書之事詩序首言六義之始次言変風変雅之作又次言二南王化之自碑文惟韓公最髙毎碑行文言人人殊面目首尾决不再行蹈􅊞神道碑掲於外行文稍可加詳埋文壙記最宜謹嚴銘字從金一字不況用善為文者宜如古詩雅頌之作行實之作當取其人平生忠孝大節其餘小善寸長書法宜畧為人立傳之法亦然䟦取古詩狼䟦其胡之義犯前則躐其胡䟦語不可多多則冗尾語冝峻峭以其不可復加之意􅀃則出自巳意横􅀃竪􅀃其文詳贍抑楊無所不可如韓公師􅀃是也真公編次古文自西漢而下它並不録迄唐惟存韓公四記栁公㳺西山六記而巳古文之難豈其然乎耶律文正王於星暦醫卜雜􅄸内􅄸音律儒釋異國之書無不通究甞言西域暦五星宻於中國乃作麻荅杷暦盖囬鶻暦名也白湛淵先生續演雅十詩彂揮云海青羽中虎燕燕能制之小􅂩沉大舟関尹不吾欺者海青俊禽也而群燕縁擈之即墜物受於所制者無小大也右一草食押不蘆雖死元不死未見滌腸人先聞棄簀子者莫北有名押不蘆食其汁立死然以它藥觧之即蘇華佗洗腸胃攻疾疑先服此也右二誰令珠玉唾岀彼藜藿腸仁人不爲寳良賈宜深蔵者和林有尼能􅄍珠玉雜寳也右三嬰啼聞木枝羝乳見茅茹何如百年身反尓無根㩀者漠北種羊角能産羊其大如兎食之肥羙嬰啼木枝見山海經所載右四西狩獲白麟至死意不吐代北有角端能通諸國語者角端北地異獸也能人言其髙如浮圖右五􅅻脫海鶴喙已登方物輿仰靣勿啾啾我長非僑如者小人長僅七寸夫婦二枚形躰畢具也右六羯尾大如斛堅車載不起此以不掉滅彼以不掉死者西漠有羯尾大於身之半非車載尾不可行也右七八珍殽龍鳯此出龍鳯外荔枝配江䖴徒誇有風味者謂迤北八珍也所謂八珍則醍醐麆沆野駝蹄鹿唇駝乳糜天鵝炙紫玉􅄴玄玉􅄴也玄玉􅄴即馬妳子右八灤人新巨松童山八百里世無奚超勇惆悵度易水者取松煤於滦陽即今上都去上都二百里即古松林千里其大十圍居人薪之􅀅八百里也右九兩駝侍雪立終日飢不起一覺沙日黄肉屏那足擬者沙漠雪盛命兩駝趺其旁終夜不動用断梗架片毡其上而寝䖏於下煖勝肉屏且不起心兵也右十今婦人面飾用花子起自唐昭容上官氏所製以掩􅀧迹大暦巳前士大夫妻多妒悍婢妾小不如意輙印靣故有月􅀧錢􅀧事見酉陽雜爼今上之長公主之駙馬剛哈刺咱慶王因墜馬得一竒疾兩眼黒睛俱無而舌出至胸諸醫罔知所措廣惠司卿聶只児乃也里可温人也甞識此證遂剪去之頃間復生一舌亦剪之又於真舌兩側各去一指許却塗以藥而愈時元統癸酉也廣惠司者回囬之為醫者隸焉㐮州榖城縣城門外道傍石人缺剥腹上有字云磨兠鞬慎勿言是亦金人之流也距縣西五十里有石人二相偶而立腹上題刻一云已及一云未匝不可得而詳也浮休閱目集吾郷臨海章安鎮有蔡木匠者一夕手持斧斤自外歸道由東山東山衆所殯塟之䖏蔡沉醉中􅀅謂抵家捫其棺曰是我榻也寝其上夜半酒醒天且昏黒不可前未免坐以待旦忽聞一人髙呌棺中應云喚我何事彼云某家女病損證盖其後園􅁑大哥淫之耳却請法師捉􅀑我與你同行一􅀚如何捾中云我有客至不可去蔡明日詣主人曰娘子之疾我能愈之主人驚喜諾以厚謝因問屋後曽種􅁑否曰然蔡徧地翻掘内得一根甚巨斫之且有血煑啖女子病即痊京師城外萬栁堂亦一宴㳺䖏也野雲㢘公一日於中置酒招䟽齋盧公松雪趙公同飲時歌児劉氏名觧語花者左手折荷花右手執盃歌小聖樂云緑葉隂濃徧池亭水閣偏趂涼多海榴􅀄綻朶朶蹙紅羅乳燕雏鶯弄語對髙栁鳴蝉相和驟雨過似璚珠乱撒打遍新荷人生百年有㡬念良辰羙景休放虚過富貧前定何用苦張羅命友邀賔宴賞飲芳醑淺斟低歌且酩酊從教二輪来徃如梭既而行酒趙公喜即席賦詩曰萬栁堂前数畆池平鋪雲錦盖漣漪主人自有滄洲趣逰女仍歌白雪詞手把荷花来􅂆酒歩隨芳草去尋詩誰知只尺京城外便有無窮萬里思此詩集中無小聖樂乃小石調曲元遺山先生好問所製而名􅁎多歌之俗以為驟雨打新荷者是也金石草木之変異雜見於傳記数年来天下擾攘怪事尤甚信前人之書不誣也至正丙申浙西都郡皆有兵正月嘉興楓涇鎮戴君實門首栁􅀣若牛鳴者三主人與㒒從悉聞之斬其􅀣不一月苗軍抄掠貲産又兩月屋燬于兵是􅀊寒食日海塩州趙􅀄心率子姪輩詣先壟汛掃松揪忽聞如老􅔏作声戞戞不絶審聽所在乃是一柏􅀣頃間衆􅀣同声和之一二時方止舉家惶惑至八月苗軍火其居明年六月紅軍掠貨財婦女而姪善如死於難余親見君實館賔黄伯成與􅀄心之孫元衡􅀃元衡善如子也其事雖遲速不同而二家之遭禍則一吁誠異哉至正丙申正月常熟州䧟松江府印造官號給散吏兵佩帶以防姦偽號之製作畫為圓圈繞圈皆火􅆋圈之内一府字以府印印府字上圈之外四角府官花押民間謡曰滿城都是火府官四散躱城裏無一人紅軍府上坐不二月城破悉如所言杭州赤山之隂曰筲箕泉黄大癡所甞結廬䖏其徒弟沈生狎近側一女道姑閭門有欲白之於師沈懼引厨刀自割其執㡬死衆救得活而瘡口流血經月餘不合偶問諸閹奴教以煆所割執搗粉酒服如其言不数日而愈三寳柱字延珪色目人頗以才學知名雖湛於酒色而能練逹吏事剛正有守爲浙省郎中日大書四句於門屏之上曰逆刮蛟龍鱗順捋虎豹尾若􅀅二伎論尤比干人易其意盖以杜絶人之求請耳然亦隘矣哉終不大顕逹而死於難至元間平原郡公趙氏與芮宋福王也其子娶全竹齋少保之女婚啓内一聮云依光薊北苟安公位之居囬首江南惟重毋家之念儘有味陶侃毋得古正之道彂人倫之本􅀅示教於天下謂朴散俗壊樂潰禮闕有子不教不至於道若失大訓不可登于􅊆望乃求師傅延英茂終日迫于用不欲于郤缺俄而車盖載止餼饋並竭茍失其人子􅀅不進計畫始成􅃀然獨断謂髪可棄訓不可失乃金刀既止黰髮雲散怡然無咨嗟之色儼若待賔之具上􅂲不足以顕恭下未可謂訓子頋其母激忿填膺寸晷是學不迨于至以超聖人之域煥乎賢者之業且禮信仁義君子之事婦人何得而知盖至道大䘮其俗巳乱故婦人賢君得以行其事千古之下厥行獨明當時爲人之父爲人之母覩斯行聞斯舉得不激厲乎苟天下皆如陶母之志則天下皆陶之子也盖人謂子㓜而蒙稺不致精訓致悖大道乱人紀良可惜哉銘曰髮也者為飬之具賔也者致教之英茍非異禮孰能作世之程千載之下如陶之毋安可継乎齊英宗儀因讀唐皇甫持正先生湜文集見陶母碑不覺泣数行下􅇷惟先妣拳拳於教子真有陶母之志是故今翰林承旨蛻菴張先生翥所譔墓銘有曰夫家貧劬力紡績以給諸子無􅆸學之辭自頋不肖不克勉于學已成令名罪莫大焉謹録于此庶亦可以自懼也婺州許白雲先生謙字益之􅀮居金華山四十年不入城府著書立言足以垂教後世浙東㢘使王公継學訪先生於山中謂先生清氣逼人可畏既退明日以學行薦于朝有録其舉文至者先生方講􅀃目不一少視其無意於仕䆠如此先生殁追謚文懿先生後至元丁廿夏六月民間謡言朝廷􅀅采童男女以授韃靼為奴婢且俾父母護送抵􅀡北交割故自中原至于江之南府縣村落凡品官庶人家但有男女年十二三以上便為㛰嫁六禮既無片言即合至於巨室有不待車輿親迎輙徒歩以徃者盖惴惴焉惟􅂲使命戻止不可逃也雖守土官吏與夫韃靼色目之人亦如之竟莫能暁經十餘日􅅻息自後有貴賤貧富長㓜妍醜匹配之不齊者各生悔怨或夫棄其妻或妻憎其夫或訟于官或死于天此亦天下之大変從古未知聞也呉中僧祖柏號子庭者素稱滑稽口占絶句曰一封丹􅇉未為真三桮淡酒便成親夜来明月楼頭望惟有姮娥不嫁人又有人集古句云翡翠屏風燭影深良宵一刻􅀡千金共君今夜不須睡明日池塘是緑隂可謂深於命意者矣世以療馬者曰獸醫療牛者曰牛醫周禮天官􅃁宰篇獸醫下士八人注獸牛馬之属按此則療牛者亦當曰獸醫矣天下兵甲方殷而淮右之軍􅄝食人以小児為上婦女次之男子又次之或使坐兩缸間外逼以火或於鉄架上生炙或􅅞其手足先用沸湯澆潑却以竹帚刷去苦皮或盛夾袋中入巨鍋活煑或刲作事件而淹之或男子則止断其雙腿婦女則特剜其兩乳酷毒萬状不可具言緫名曰想肉以為食之而使人想之也此與唐初朱粲以人為糧置搗磨寨謂啖醉人如食糟豚者無異固在所不足論唐張鷟朝野僉載云武后時杭州臨安尉薛震好食人肉有債主及奴􅍗臨安止於客舎飲之醉並殺之水銀和煎并骨銷盡後又欲食其婦婦知之踰墙而遯以告縣令令詰之具得其情申州録事奏奉勑杖一百而死叚成式酉陽雑爼云李廓在頴州獲火光賊七人前後殺人必食其肉獄具廓問食肉之故其首言某受教於巨盜食人肉者夜入人家必昏沉或有魘不窹者盧氏雜􅀃云唐張茂昭為節鎮頻喫人肉及除統軍到京班中有人問曰聞尚書在鎮好人肉虚實􅀏曰人肉腥而且䏰争堪喫五代史云萇從簡家世屠羊從簡仕至左金吾衞上􅀅軍甞歴河陽忠武武寧諸鎮好食人肉所至多潜捕民間小児以食之趙思綰好食人肝及長安城中食盡取婦女㓜稚為軍粮毎犒軍􅂺屠数百人三國志云呉􅀅髙澧好使酒􅄝殺人而飲其血日莫必於宅前後掠行人而食之宋荘季􅁉鷄肋編云自靖康丙午􅀊金狄乱華盜賊官兵以至居民更互相食全軀􅁀以為腊登州范温率忠義之人泛海到錢唐有持至行在猶食者老痩男子痩詞謂之饒把火婦人少艾者名之不羡􅅅小児呼為和骨爛又通目為兩脚羊趙與峕賔退録云本朝王継勲孝明皇后母弟太祖時屡以罪貶後以右監門衞率府副率分司西京殘􅁀愈甚强市民間子女以俻給使小不如意即殺而食之太宗即位㑹有訴者斬于洛陽又知欽州林千之坐食人肉削籍隸海南嗟夫食人之肉人亦食其肉此兵革間之流慘耳君子所不􅂅聞者其薛震輩當天下宴安之日而又身為顕䆠豈無珍羞羙善足以厭其口腹頋乃喜啖人肉是雖人􅁼而無人性者矣終至於誅斬竄逐而後巳天之報施不亦宜乎王眉叜夀衍號溪月杭州人出家為道士受知晋邸後以弘文輔道粹徳真人管領郡之開元宫浙省都事劉君時中致者海内名士也既卒貧無以為􅌾躬徃吊哭周其遺􅀌舉其柩􅁙於徳清縣與巳之夀穴相近春秋祭掃不怠然此事行之於異教中尤不易得錢唐二字其來甚逺按史記始皇本紀至雲夢浮江下丹陽至錢唐臨浙江上㑹稽立石刻頌秦徳西漢地理志亦有錢唐縣今唐字从土則誤矣盖以錢易土及􅂢錢築塘等事皆傅㑹之辭自注世􅀃者巳然况後世乎道士張伯雨雨號句曲外史又號貞居甞從王溪月真人入京􅀄燕地未有梅花呉閒閒宗師全節時為嗣師新從江南移至護以穹廬扁曰漱芳亭伯雨偶造其所怳若與西湖故人遇徘徊既乆不覺熟寝于中真人終日不見伯雨深以為憂意其出外迷失街道也夢覺日巳莫矣歸道所由嗣師􅀏曰伯雨素有詩名冝作詩以贖過伯雨遂賦長詩有風沙不憚五千里􅀅身跳入仙人壷之句嗣師大喜送翰林集賢甞所徃来者􅀽學士伯長謝􅀶士敬徳馬御史伯庸呉助教飬浩虞脩譔伯生和之它日伯雨徃謁謝諸公惟虞先生全不言儒者事只問道家典故雖荅之或不能詳末問能作㡬家符􅂐曰不能先生曰某試書之以質是否連書七十二家伯雨汗流浹背輙下拜曰真吾師也自是託交甚契故與先生書必稱弟子焉伯雨杭州人水之鹹淡相交䖏産河豚河豚魚􅀋也無鱗頰常怒氣滿腹形殊弗雅然味極佳煮治不精則能殺人所以東坡先生在資善堂與人談河豚之羙云㩀其味真是消得一死浙西惟江隂人尤珍之毎春首􅀄出時必用羞祭品畢然後作􅅅而鄰里間互相餽送以爲禮腹中之膟曰西施乳夫西施一羙婦耳豈乳亦異於人耶顧千載而下乃使人道之不置如此則夫差之亡國非偶然矣若鱭魚子名螳螂子及松江之上海杭州之海寕人皆喜食蟛蜞螯名曰鸚哥觜以有極紅者似之故也二物象形而云又非西施乳之比矣按􅁼編魚部引􅀶雅云鯸䱌盈之反魨也背青腹白觸物即怒其肝殺人正今人名為河豚者也然則豚當為魨至正辛巳莫春之􅀄江浙行省平章政事只理瓦台入城知任之日衣紅児童謡曰火殃来矣至四月十九日杭州灾燬官民房屋公􅇬寺􅀚一萬五千七百五十五間燒死七十四人明年壬午四月一日又灾尤甚於先自昔所未有也数百年浩繁之地日就凋弊實基於此余甞見落水蘭亭一卷乃五字不損本今呉中分湖陸氏所蔵而趙彛齋之物也彛齋宋宗室子諱孟堅字子固􅃔齋其自號居嘉興之廣陳酷􅄝古法書名畫能作墨花於水仙􅀹長此帖姜白石舊蔵後歸霅川俞夀翁􅃔齋復從夀翁易得喜甚来夜囬櫂至昇山大風覆舟行李皆渰溺無餘彛齋立淺水中手持此帖示人曰蘭亭在此餘不足分吾意也因題八字于卷首云性命可䡖至寳是保李子昭者松江府提控案牘李宗慶子也側室刁氏有娠妻怒之箠撻苦楚晝夜不息数次自經與溺以省􅁴不得死竊自念曰我若就蓐亦必死耳等死何自求早死之為幸因多食海蟄與冷水胎既落血上衝心而身隨亡不数日􅀑恠百出妻得竒疾宛若死者但只心胸微温支躰不僵其家就牀褥作一竅任其便溺時以少飲納口中􅂺咽不與亦不言肌經三年餘形骸枯槁無復生理家人益厭之一夕忽詣舅姑所叩􅆍室户舅姑曰汝惡得至此必為􅀑矣曰妾已復生實非􅀑也􅂅見舅姑具告所然舅姑驚􅂲呼家人悉起取火燭之果此病軀及覘其卧榻已空始信之因問其詳曰妾為亡婢訴􅁈攝至隂府即今嶽祠也命妾與婢對詞妾以汝懐孕時打罵則或有之然未甞令汝吞藥損墮婢仇執甚堅妾不得白遂招承枷禁幽圄中日得小叔以餅餌粥飯之􅁼相餽故不餒今復得送妾還入門弄其児戯撻之一下児哭遂推妾置竈上即若夢􅁴者但􅁴怠倦故勉强至此舅姑曰汝旣􅀍禁何自得釋曰㑹上帝有赦故也急呼小郎妻問之曰適間児子驚啼云夢見乃父擊其首小郎盖提控之次子㤗甫先為其妹夫金可大所殺者此婦至今強健與夫見寓府城西郭又復生兩子矣志怪古或多然漫書于此以為世之妒婦􅂆趙魏公云作詩用虚字殊不佳中兩聮填滿方好出䖏􅅻使唐巳下事便不古荘綽雞肋編云太史公作伯夷傳但云伯夷叔齊􅀌竹君之二子也而論語音註引春秋少陽篇謂伯夷姓墨名允一名元字公信叔齊名智字公逹夷齊謚也陸徳明取之不知少陽篇何人所著今世猶有此書否吾衍閒居録云􅀌竹君姓墨音眉名台音怡􅀄見孔叢子注中子名伯遼見周曇咏史詩注伯當作仲若如吾􅀃則伯夷叔齊似又是名非謚矣淮海龔翠岩先生開寓呉門日一僧􅁠道衡者頗聡慧識道理先生與之㳺偶市肆粥漢印一顆􅁠甞酬價歸取鏹先生適見主人以實告遂用十五緡買之語諸女女曰大人乃亦奪人所好先生驚悟即持送􅁠遇諸道􅁠曰先生愛而收蔵奚以贈曰在彼猶在此也􅁠固辭曰在彼猶在此也相譲乆之沉諸淵而别吁若先生者可謂善矣孰謂異端中有此㢤然先生之女􅀹可敬也呉江華嚴寺浮圖之頴望之二矢著其上簳羽宛然可辨相傳宋南渡􅀄金人粘䍐乗快一彂而中又賈似道出督時祝矢自誓亦中焉故留題者有至今塔杪留遺鏃猶是元戎金僕姑之句大徳庚子春寺主僧善信大修浮圖更其頴而新之視向二矢實圓鉄條二交貫横亘盖必昔人以是輔頴且以防􅔏鶻之巢故耳傳者所謂乃大妄也因著此以祛後世之惑長樂郭徳基甞有華嚴塔頴辨疑行於時盖郭甞官此州目擊其非項後白髮曰素領漢馮唐白首為􅀰官素髮垂領
