front:
  text: 南村輟耕録卷之十三
  hash: sha256:1962c8541707c32c2838d860562843cbde949b3b74855661709f1ab94595b255
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_013-1a}
body:
  text: 天台陶宗儀九成中書省准陜西行省咨察䍐腦児宣慰司呈入匝街禮敬坊王弼告至正三年九月内到義利坊平易店見有筭卦王先生因問來歴致爭當月廿九日夜睡房窻下似風吹葫蘆聲不時有之請到李江法師遣送虚空人言筭卦先生使我來哭聲内􅁛􅁈枉弻祝之曰尓神尓􅀑明以告我􅀑云我是豐州黒河村周大親女月惜至正二年九月十七日夜因後院􅀍這王先生􅀅我殺了使奴婢使喚如今教在尓家作怪哭者索要衣服抄冩所􅀃赴官陳告差盧捕盗等與社長呉信甫於王先生房内􅊧􅀗木印二顆黒羅繩二條上釘鐵鍼四箇魘鎮女身小紙人八箇五色綵五色絨上俱有頭髪相纒又小葫蘆一箇上拴紅頭繩一條内盛琥珀珠二顆外包五色絨朱書符命一沓又告十二月􅀄三日有􅀑空中言我是奉元路南坊開張機房耿大第二男頑驢這先生改名頑童我年一十八􅀊􅀍那老先生引三箇伴當殺了我二十二日又有􅀑空中云我是察䍐腦児李帖家孩児延奴又名搶􅁅那老賊殺了秋改名買買我􅀍殺時年一十四􅀊勘問得犯人王萬里即王先生状招年五十二􅀊江西省吉安路民於襄陽周先生䖏習會隂陽課命至順二年三月内到興元府逢見劉先生云我能使術法迷惑人心􅀵採生䰟使去人家作禍廣得財物我有收下的賣與你一箇隨於身畔取岀五色綵帛并頭髪相結一塊言􅁛這箇小名喚延奴我課筭㨂性格聰明的童男童女用符命法水呪語迷惑活割鼻口唇舌尖耳朶眼睛呪取活氣剖腹掏割心肝各小塊曬乾搗羅為末收褁及用五色綵帛同生䰟頭髪相結用􅁓作人形様符水呪遣徃人家作怪根隨到伊下䖏至夜劉先生焚香念呪燒符聴得口言不見形影問師父你敎我誰家索甚去劉先生分付李延奴你與這先生做伴去􅀃罷􅀅呪語收禁萬里與訖鈔七十五兩買得五色綵帛頭髪相結一塊􅁛􅀃我改名買買傳教采生遣使收禁符命呪水又云牛狗肉破法休喫續後於房州山地面經過逢見廣州舊識矌先生云我亦㑹遣使􅀑䰟我有收下的生䰟賣與你萬里與訖鈔一定矌先生取出五色綵帛頭髪相結􅁓人児一箇云此名取頑童萬里􅀅與李買買一䖏遣使以課􅄸為由前到大同路豐州黒河村地面徃来至正二年八月内到於周大家課命􅀅伊女周月惜八字看筭性格聰慧要􅀅殺害收采生䰟至九月十七日夜於周大住宅後院墻下黒影内潜蔵間見一人徃後院内来認得係是月惜在彼出後萬里宻念呪語向前拖拽徃東奔走􅀅月惜禁止端立脫下沿身衣服用元帶魚刀􅀅其額皮割開扯下懸盖眼瞻及􅀅頭髪割下一縷用􅁓人并五色綵帛絨線結成一塊如人形様然後割下鼻口唇舌耳尖眼睛手十指梢脚十趾梢却剖開胸腹􅅻方倒地氣絶又􅀅心肝肺各割一塊曬乾搗末􅏻於小葫蘆内至正三年九月内来到察䍐腦児平易店安下開張卦肆與王弼相爭挾讎令生䰟周月惜等三名前徃伊家作禍爲買馬􅁏食用店内􅀅牛􅁏作馬􅁏賣與因此不􅀎􅀵禁事發到官及責得李福寳即李帖状結生到孩兒延奴常有疾病於五岳觀口許出家落在􅁓􅁅内改名搶􅁅天暦二年二月内令其趕牛牧放不歸此時饑荒想得􅀍人􅃜害不曽根尋及行移奉元路咸寕縣并大同路豐州照勘耿頑童周月惜致死縁由相同呈乞咨請施行准此送㩀刑部擬得王萬里殘忍不道合令凌遅䖏死其妻子遷徙海南安置余㓜時甞見胡石塘先生玄寳傳今不能記其全篇有人出永嘉髙則誠明烏寳傳相示雖曰以文為戯要亦有関於世教傳曰烏寳者其先出於㑹稽楮氏世尚儒務詞藻然皆不甚顯至寳厭祖父業變姓名從墨氏㳺盡得其通神之術由是知名􅀄寳之先有錢氏者亦以通神術顯迨寳出而錢氏遂􅆸然其術亦頗相􅀋故不知者猶以為錢云寳䡖薄柔黙外若方正内實垢汚善隨時舒卷常自得聖人一貫之道故無入而不自得流俗多惑之凡有謀於寳小大􅁿重多寡精粗無不曲隨人所求自公卿以下莫不敬愛其子姓蕃衍散䖏郡國者皆官給廬舍而加守護焉其有老死者則官為聚其屍而焚之盖知墨之末俗也寳之所在人爭迎取邀致苟得至其家則老稚婢隷無不忻恱且重扄􅃉宇敬事保愛惟恐其它適也然素趍埶利其富室執人每屈輙徃雖終身服􅃥弗厭其窶人貧氓有傾心願見終不肯一徃尤不喜儒雖有轉相與徃来者亦終不能乆留也盖儒墨之素不相合若此寳好􅇣􅁖勞愛儉素疾華侈常客於弘農田氏田氏朴且嗇寳竭誠與交田氏没其子好奢靡日以聲色宴㳺為事寳甚厭之隣有啇氏者亦若田氏父之為也遂挈其族徃依焉盖墨之道貴清淨也故然其為人多詐反覆不常凡逹宮執人無不願交而率皆不利敗事故其廉外自持者率不與寳交自寳之術行挾詐者徃徃偽為寳術以售于時後皆敗死故寳之術益尊是時崑崙抱璞公南海玄珠子永昌從革生皆能濟人與世俯仰曲隨人意而三人者亦頋與寳交茍得寳一徃則三人亦無不可致故時譽咸歸於寳焉寳族雖夥然其状貌技術亦頗相似知與不知咸謂之烏寳云論曰烏氏見於春秋世本姓􅁐若存餘技烏獲皆為顯仕至唐承恩重㣧始盛迨寳而益著寳裔本楮而自謂烏氏則變詐亦可知矣寳之學雖出於墨而其害道傷化尤甚雖孟軻氏復生不能闢也然使寳生於唐虞三代時其術未必若是顯然則寳之得行其志者亦其時有以使之嗚呼豈獨寳之罪㢤新喻傳汝礪先生若金嘗志其妻殯云君諱淑字􅈍蘭姓孫氏其先汴人年二十三歸我於湘中五日而卒君髙朗秀惠生六􅀊母卒父教以書稍長習女工晨起獨先盥櫛適父母所問安畢佐諸母具食飲退治女上晡時觀經史或嗚琴自休既夕聚家人􅊕坐􅀃古貞女孝婦傳燭至治女工如􅀄富貴家多求婚火不許及以許余家人不恱一曰有幸余疾者欲因動之君曰大人以愛子許人必慎所擇矣即有不諱命也若等謂我且慕世俗冨貴而改聘耶有死而巳皆愧謝不敢復言事継母盡孝道死之日母大慟既􅉂目乆忽徐起止母哭令自寛及母出􅀻泣告余曰妾爲父母所偏愛即死必傷其心然終必死矣爲􅀅柰何君後當貴幸念之言既復􅉂目泰定五年八月廿有一日也後三日寓殯湘中及序其遺稿云故妻孫氏蕙蘭早失母父周卿先生以孝經論語及凡女誡之書教之詩固未知學也因其弟受唐詩家法於庭取而讀之得其音格􅂺能爲近體五七言語皆閒雅可誦非苟學所能至者然不多爲又恒毀其稿家人或􅀼􅀵之令勿毀則曰偶適情耳女子當治織絍組紃以致其孝敬辭翰非所事也既卒家人哭而稱之因出其稿得五言七首七言十一首五也言未成章者廿六句特為編集成帙題曰緑窓遺稿序而蔵之五言詩曰窓裏人􅀄起窓前栁正嬌捲簾衝落絮開鏡見垂條坐對分金線行防拂翆趐流鶯空巧語倦􅃪不湏調右一小閤烹香茗䟽簾下玉鉤燈光翻岀鼎釵影倒沈甌婢捧消春困親嘗散暮愁吟詩因坐乆月轉晚妆樓右二燈前催曉妆把酒向髙堂但願梅花月年年映壽觴右三采閤閉朝寒妆成擬問安忽聞春雪下喚婢捲簾看右四粲粲梅花􅀣􅄹􅄹似玉人甘心對氷雪不受艶陽春右五小小春羅扇􅇛􅇛秋月生蟠桃花􅀣裏繡得董双成右六自拂双眉黛何曽慣得愁􅀂教如翆栁便恐不禁秋右七七言詩曰樓前楊栁發青枝樓下春寒病起時獨坐小窓無氣力隔簾風亂海棠絲右一窓緑寂寞掩殘春繡得羅衣􅈸上身昨日翆帷新病起滿簾飛絮正愁人右二小妹方􅅻習孝經可憐嬌怯性偏靈自尋女誡窓前讀嗔道傍人不與􅃪右三幾􅀧梅花發小盆氷肌玉骨伴黄昏䧚窓乆坐憐清影閒劃金􅁫記月㾗右四繡􅀍寒多未欲眼梨花枝上􅃪春䳌明朝又是清明節愁見人家買􅁓錢右五春􅀨隨風􅊜粉墻園花滴滴断人腸愁紅怨白知多少流過長溝水亦香右六春風昨夜碧桃開正想瑶池月滿臺欲折一枝􅀉王母青鸞飛去㡬時来右七空階日晚􅀨􅅻乾小婢相隨􅀝􅀞䦨金􅁫誤掛緋桃落羅䄂愁依翆竹寒右八小窓今夕繡鍼間坐對銀蟾整翆鬟凡世何曽到天上月宫依舊似人間右九乞巧樓前􅀨乍晴彎彎新月伴双星隣家小女都相學闘取金盆看五生右十庭院深深早閉門停鍼無語對黄昏碧紗窓外􅀄生月照見梅花欲断䰟右十一未成章詩曰露下庭梧葉風吹月桂花登樓聞過䧹開戸見棲鵶繡簾當雪卷銀燭背風然雪睛山顯翠風煖水生紋萱草當階緑櫻桃落地紅芍藥開時病荼䕷落䖏愁玉􅁫簮末利羅扇繡夫容窓前垂栁分春色鏡裏幽蘭對曉妆花間影過那知燕栁外聲来不見鶯慈親教婢回金剪嬌妹嗔人奪繡鍼妆成寳鏡楊花過行出珠簾燕子歸自傾瓮裏春泉水親灌階前石竹花海棠帶􅀨燕支重楊栁凝煙翡翠濃先生既䘮妻哀戚之情多見於詩悼亡曰驚飈吹羅幙明月照階戺春草忽不芳秋蘭亦同死斯人藴淑徳夙昔明詩禮靈質奄獨化孤䰟􅀅安止迢迢湘西山湛湛江中水水􅀷有時極山髙有時巳􅁨思何能齊曰月從此始右一皇天平四時白日一何􅃍勤儉畢婚姻新人忽復故衾裳歛遺􅊞棺槨無完具送葬出北門徘徊怛歸路玉顔不可恃况乃紈與素纍纍花下墳欝欝塋西􅀣他人亮同此胡為獨哀慕右二新婚誓偕老恩義永且􅀷旦暮為夫婦哀戚奄相尋凉月燭西樓悲風鳴北林空帷奠巾櫛中房虚織絍辭章餘婉孌琴瑟有餘音睠言瞻故物惻愴内不任豈無新人好焉知諧我心掩冗撫長暮涕下霑衣􅁭右三人生貴有別室家各有宜貧賤逺結婚中心两不移前日良宴㑹今為死別離親戚各在前臨訣不成辭􅅖人拭我淚令我要裁悲共盡固人理誰能心勿思右四感獨曰幽幽􅈍草晚靡靡蘭芳断皎皎夜泉人􅄀􅄀不復旦流塵棲暗壁凉吹􅀴虚幔無論懽意消日復愁思亂䰟傷夕方永氣變秋􅀅晏當窓􅃤断素􅂢篋悲柔翰憶􅀄成好合誓且同憂患何言遂長終獨䖏増永嘆窹􅄰忽如在展轉驚復散念兹何嗟及哀至聊自判右五百日曰人生悲死别矧在心相知新婚未及乆杳杳􅃍何之昔為連理木今為断膓枝相去時㡬何百日奄在兹􅃜月有圓夕逝水無還期棄置非人情何以慰我思右一入室曰汝閤閉長夜幽蘭坐復春猶疑挑錦字不見掩羅巾故物空在目蕭條生􅃠塵右三虚窓明月滿芳砌緑苔滋花間時染翰尚憶觧題詩􅄫寞幽泉下貞心空自知右四追和蕙蘭曰小窓開盡碧桃枝憶得青鸞化去時昨夜秋風動幽怨夣中吹断素琴絲右一江上愁時復值春帶圍寛盡不宜身階前舊種櫻桃􅀣日暮飛花故著人右二嗟夫孫氏之詩依乎禮義先生之詩哀而不傷舉得性情之正是可傳也巳王皮者住鳯翔府城外八九里許盛暑中入城買皮料歸至中途憇道􅅖大􅀣下忽有二卒来前状貌竒恠似非凡世間人􅃍問曰汝王皮與王竊疑懼然不敢不以實對乃曰某是巳卒曰隂府攝汝王曰某平生無他過惡望賜矜憐卒不諾又告曰容到家與妻子一别可乎卒乃諾􅀅及門卒力挽之不能入王大呌救我比妻子來前王巳仆地氣絶既斂胸間微煖如生經宿未敢盖棺王於􅁳漠中隨卒至一所􅌂􅀂王者之庭儀衛吏隷無備具問曰汝為秦白起偏􅀅坑趙降卒四十萬知其罪否王荅曰某庸工平生不曽讀書不知白起為何人亦不知降卒為何事於是令王起凡再歴二庭問亦如之答亦如之乃反接王一大池邉取池中泥塗其胸寒氣凛洌洞腹透背王即悟曰某已記前身事矣遂觧其縛復引至元問苐三庭王告曰某當年曽為白起偏􅀅其殺趙降卒時某曽力諌不從非某之罪頃間牽一荷鐵校者跪王側王認得似是白起而形骸骨立又􅀂非似盖因乆囚故也起見王曰子来矣余復何言方招承庭吏發王還苐一庭檢録陽壽及閱籍尚有􅀂干年即命元攝卒引至元憇􅀣下一推而王乃在棺中跳躍而起妻子親隣既驚且喜叩問之􅇱言其故有傳之至京師者差進士卨哲篤來鳯翔覆察果實時王元􅁻為本府照磨元􅁻能􅇱言其詳且有抄録公文此一事然雖􅀂幻誕端可為為􅀅而嗜殺人者之戒故畧莭大槩如上楊州泰興縣馬駝沙農夫司大者其里中富人陳氏之佃家也家貧不能岀租以輸主乃􅀅以所佃田轉質於他姓陳氏田旁有李慶四者亦業佃種潜賂主家兒約能奪田與我而不以與陳氏者以所酬錢十倍之一分之家兒素用事因以利㗖其主主聽奪田歸李氏司固無可柰何既以􅂖田不相侔䡖其直十之一司愈不平㑹歸而李與嘗所用力及為立劵者殺雞飲酒司因隨所之所欲卻司輙先持一巵酒飲之司忿恨去對妻語所以與李怨仇之故妻苦口諌曰吾之竆命也柰何仇人哉不聴夜持炬火徃燒其家忽聞得内有人娩司竊念吾所讎者其家公也何故殺其母子遂棄火溝中而歸司無以為飬生計即所償錢為豆乳釀酒貨賣以給食乆之不復乏絶更自餘而李日益貧更十年李復出所佃田質陳氏司還用李計復其田過種之錢比前又損其一為劵悉值前人相視驚嘆司記為李所辱時今幸可一報復遂具雞酒飲亦如之李妄前過不自責反怨薄巳怒甚歸積膏火破盎中夜抵司家司妻方就蓐李猶豫間聞人啓戸懼事覺遺火亟走而司家實不有人旦得火器塲中驗器底有李字因悟昔我焚彼家以其家人産子不欲焚今彼焚我家而我之妻亦産子而不􅀍焚此天也非人也持錢五阡徃李曰昨日小人無状失禮義不得共飲兹願少伸謝意幸母督過李疑詒以疾卧不起强請不已遂同之酒家邀酤兒與飲酒半自起酌酒􅂆李曰子之孫某年月日夜子時生而吾子亦夜者子時生怨仇之事慎勿復為具白前所仇事歴酒為誓語酤兒曰子識之試用此警世間人不善慎勿為也􅇵飲盡歡乃更約為㛰姻自是李亦不貧两家至今豊給此在至正􅀄元間吾謂司氏婦之極諌與司氏之易慮時天固巳監之所以李不復可加害也向使司氏决快所欲未必能復田縦復田未必不無􅍔一念之善從而两家子孫皆􅂪其利澤書曰天道福善􅍔􅁋又曰惟上帝不常作善降之百祥作不善降之百殃嗚呼天豈逺人哉天豈逺人哉甞讀杜荀鶴詩其亂後逢村叜曰經亂衰翁居破村村中何事不傷䰟因供寨木無桑柘爲􅀧郷兵絶子孫還似平寜徴賦稅未嘗州縣畧安存至扵雞犬皆星散日落前山獨􅀝門山中寡婦曰夫囙兵死守蓬茅麻苧衣衫􅁂髮焦桑柘廢來猶納稅田園荒後尚徴苗時挑野菜和根煮旋斫生柴帶葉燒任尓深山更深䖏也應無計避征徭旅泊遇郡中亂曰握手相㸔誰敢言軍家刀劒在要邉徧􅊧寳貨無蔵䖏亂殺平人不怕天古寺拆爲修寨木荒墳掘作甃城磚郡侯逐去渾間事正是鑾輿幸蜀年然方之今日始信其非寓言也今人謂曽祖父曰太公此盖相承之謬當􅁛祖父為是後漢李固之父郃為司空固女當固伏誅日曰太公以来云注太公謂祖父郃也御史臺准陜西行臺咨監察御史烏古孫良楨呈伏聞綱常者天之所以經天下者也天子所以為天守綱常者也臣而不忠子而不孝凡觸罪於綱常者不容於死又烏可䖏以相位俾之重任乎謹按遼陽行省丞相荅失帖木児即駙馬丞相也心懷隂險行畜姦邪敗壊􅃔倫反側不道通天之罪無所於容昔在晋邸擢登首相居百僚之上極一品之榮受任托孤躬承顧命君臣分義至重且深及乎大事之時干戈之際盡領北上之兵以救顛危本官隂畜二心坐觀成敗南至紅橋逗遛不進致於敗亡不能死義靦面入降大􅃜臣莭反以藉口矜為巳功天下義士聞之莫不為恥昔丁公為項王一􅀅耳嘗二心於漢及天下定髙帝誅之後世􅁛其明断方楚之與漢敵國之執未分尚以大義責之以示垂戒今荅失帖木児之於􅀳邸爵禄之寵巳崇君臣之忿素定較之丁公不忠之罪又有甚焉况天暦之􅀄營充樞宻知院御史巳甞紏言又復賄賂權臣出為江西行省丞相两居江浙至與房隣拜降都運賄賂交通壊亂塩法至今官民皆􅀍其害中間徇私敗政不可枚舉所至之䖏流毒一方今則移置遼陽之民奚罪焉原其本官昔既不忠今豈盡節又兼遼陽即係東方重鎮反覆之人豈宜䖏此脫有邉釁関繫非䡖似此賣國賣臣之罪使其人巳死猶當追貶今既未死得以幸逭天禄設居相位是國法不行邪正不辨愚恐姦臣賊子接跡倣傚甚非國家之福伏望聞奏為天下正綱常之義􅀅荅失帖木児流竄遐荒追奪累受宣命庻幾人臣分嚴罪於綱常者死有餘辜以為不忠不道之􅂆其於治道不為小􅀘天下幸甚公論幸甚至正元年八月十二日別理怯不花怯薛弟一日忽魯納缽裏有時分雲都赤汪家奴殿中百撒里大夫亦真班經歴臧吉􅂪古必闍赤朶朶等奏臺官􅇱著西臺文書俺商量來行與省家文書􅀅他見行的勾當黜罷了呵怎生奏呵奉聖旨那般者欽此􅀄良禎之父福建閩海道肅政㢘訪使潤甫公澤年五十未有子夫人杜氏深以為憂屡請公再聘公不允仕西廣時聞寡居王安人者羙而宜子夫人自為公謀聘之既歸執婦禮甚恭長夫人數􅀊夫人推譲正􅃦以居之相䖏雍睦宛若姊娣飲食起居罔有不同公獨内不自安越明年天人生良楨一日王氏告公曰君自有婦􅀁以􅄪娶妾者為嗣續計耳今夫人既生子妾何事焉即出道家冠服一􅊞以示曰妾之志决矣請從此辭夫人固留不得公囙謂夫人曰向吾再娶懼無後也若不改圖人其以我為汰乎乃􅃪王氏去奩貲萬金􅊖返之自是岀居一女道菴戒行嚴謹人未嘗能見其靣而夫人􅀊時問遺弥至後良楨貴顯迎以歸事之如親母嗟夫自古求忠臣於孝子之門今良楨外有嚴君内有賢母教誨造就之道有過人者冝乎在家為孝子而在朝為忠臣也然其敭歴臺省秉性剛介不畏彊禦事無不言言必有中如駙馬丞相恃居國戚莫敢孰何乃必發其底裏直使去位而後巳推此一節則凡忠君之事􅀋可知矣後至中書左丞而卒至元間釋氏豪横改宫觀為寺削道士為髠且各䖏陵墓發掘迨盡􅀌山林和靖䖏士墓屍骨皆空惟遺一玉簮時有人作詩以悼之曰生前不繫黃金帶身後空餘白玉簮南村輟耕録卷之十三
