front:
  text: 南村輟耕録卷之三十
  hash: sha256:c32833452a050fe6f35192b55899d1c61b640f00f70c389ac8b16a17e22d2635
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_030-1a}
body:
  text: 天台陶宗儀九成周禮璽節鄭氏註云壐節者今之印章也許慎􅀃文云印執政􅀁持信也徐鍇曰从􅀲手􅀲以持信也衞宏曰秦以前民皆以金玉為印龍虎鈕惟其􅀁好然則秦以来天子獨以印稱璽又獨以玉郡臣莫敢用也七雄之時臣下壐始稱曰印漢制諸侯王金壐壐之言信也古者印璽通名漢舊儀云諸侯王黄金壐橐佗鈕又曰璽謂刻曰某王之壐列侯黄金印􅀛鈕文曰某侯之章丞相太尉與三公前後左右􅀅軍黄金印􅀛鈕文曰章中二千石銀印􅀛鈕文曰章千石六百石四百石至二百石以上皆銅印鼻鈕文曰印建武元年詔諸侯王金印綟綬公侯金印紫綬中二千石以上銀印青綬千石至四百石以下銅印墨綬及黃綬陳制金章或􅀛鈕􅆛鈕獸鈕豹鈕銀章或􅀛鈕熊鈕羆鈕羔鈕鹿鈕銀印或珪鈕兎鈕銅印率環鈕吾衍云漢有摹印􅂐其法只是方正􅂐法與隷相通後人不識古印妄意盤屈且以為法大可􅀏也多見故家蔵得漢印字皆方正近乎隷書此即摹印􅂐也王俅嘯堂集古録􅀁載古印正與相合凡屈曲盤回廣􅂐始如此今碑刻有魯公官誥尚書省印可考其􅀃漢晋印章皆用白大不過寸許朝爵印文皆鑄盖擇日封拜可緩者也軍中印文多鑿盖急於行令不可緩者也古無押字以印章為官職信今故如此耳唐用朱文古法漸廢至宋南渡絶無知此者故後宋印文皆大繆白文印皆用漢􅂐平正方直字不可圓縱有斜筆亦當取巧冩過三字印右一邉一字左一邉两字者以两字䖏與一字䖏相等不可两字中㫁又不可十分相接四字印若前二字交界有空後二字無空湏當空一畫別之字有有脚無脚故言及此不然一邉見分一邉不分非法度也軒齋等印古無此式唯唐相李泌有耑居堂白文玉印或可照例終是白文非古法不若只從朱文朱文印或用雜體􅂐不可太怪擇其近人情免費辭􅀃白文印用崔子玉冩張平子碑上字及漢噐上并碑盖印章等字最為第一凡姓名表字古有法式不可用雜􅂐及朱文白文印必逼扵邉不可有空空便不古朱文印不可逼邉湏當以字中空白得中䖏為相去庶免印出與邊相􅀝無意思耳字冝細四旁有出筆皆帶邉邉湏細於字邊若一體印出時四邊虚􅁓皆昂起未免邉肥扵字也非是印多不能曉此黏邉朱文建業文房之法多有人依欵識字式作印此大不可盖漢時印法不曽如此三代時却又無印學者慎此周禮雖有璽節及職金掌其媺􅁖掲而璽之之􅀃註曰印其實乎執之卪也正面刻字如秦氏璽而不可印印則字皆反矣古人以之表信不問字反淳朴如此若戰國時蘇秦六印制度未聞淮南子人間訓曰魯君召子貢授以大􅀅軍印劉安萬言而先辭耳道號唐人雖有不曽有印故不可以道號作印用也三字屋扁唐印有法凡印文中有一二字忽有自然空缺不可映帶者􅃪其自空古印多如此凡印㒒有古人印式二冊一為官印一為私印具列􅀁以實為甚詳不若嘯堂集古録􅀁載只具音釋也凡名印不可妄冩或姓名相合或加印章等字或兼用印章字曰姓某印章不若只用印字最為正也二名者可回文冩姓下著印字在右二名在左是也單名者曰姓某之印却不可回文冩名印内不得著氏字表徳可加氏字宜審之表字印只用二字此為正式近人􅁒并姓氏扵其上曰某氏某若作姓某父古雖有此􅁛係他人羙巳却不可入印人多好古不論其原不為俗亂可也漢人三字印非􅃨姓及無印字者皆非名印盖字印不當用印字以亂名漢張安字㓜君有印曰張㓜君右一字左二字唐吕温字化光有印曰吕化光此亦三字表徳式諸印下有空䖏懸之最佳不可妄意伸開或加屈曲務􅁒填满若冩得有道理自然不覺空也字多無空不必問此李陽冰曰摹印之法有四功侔造化􅄀受􅀑神謂之神筆畫之外得微妙法謂之竒藝精于一規䂓方圓謂之工緐簡相叅布置不紊謂之巧趙彦衞云曰印文作白文盖用以印泥紫泥封詔是也今之米印及倉敖印近之矣自有紙始用朱字間有爲白字者通典云北齊有木印長一尺廣二寸五分背上爲鼻鈕長九寸厚一寸廣七分腹下隠起􅂐文曰督攝萬幾惟以印藉縫今齪合缝條印盖原於此秦有八體書三曰刻符即古􅀁謂繆􅂐五四摹印蕭子良以刻符摹印合為一體徐鍇謂符者竹而中刻之字形半分理應別為一體摹印屈曲填宻則秦璽文也子良誤合之宣和譜四卷楊克一圖書譜一卷又名集古印格王厚之復齋印譜顔叔夏古印譜二卷姜䕫集古印譜一卷吾衍古印文二卷趙孟頫印史二卷浙西銀工之精扵手藝表表有聲者屈指不多數也朱碧山嘉興魏塘謝君餘平江謝君和同上唐俊卿松江祖孝子浩然字飬吾建寜浦城人世儒家至元中盗黄華起政和朝廷命􅀅帥師徃討未至盗巳就縳回軍經浦城焚其廬舍孝子母全氏􅇜掠而北是時孝子年六􅀊母子相失獨與父居不聞問者二十又八年至大三年福建閫府撽為三山書院山長􅀅之任或告之曰而母在河南而不能名其䖏孝子欣然弃職辤父為河南行既渡江抵河南每舍逆旅行道途間聞操南音者必就與語庶㡬有􅀁遇也當時從軍之人猶有存者或曰此有趙副使故為軍校歸自軍中得婦人全氏非而母也耶趙死而家替全氏歸一蒙古氏挈之而南當在汝鄧間耳孝子知母定在驚喜遂回汝州抵鵶路山不遇行八百里至牛蹄白石不遇又行七百餘里至􅀥陽崔橋又不遇然自離汝州行路既逺知母􅀁郷停車道傍投宿旅舍舉其状以問人頗有相酬荅可物色或指唐州以告曰彼有别盖山可㝷討也孝子夢神人顧而言有月圓􅂯圓之語既窹言猶在耳益喜抃自崔橋三百餘里至别盖訪其母在焉既見相與抱持涕泣七月之朢也神人之言扵是有徴矣留別盖半月舟具奉母南歸當時聞其事者自朝廷逹官以至湖海名勝莫不為歌詩以羙之多至數十百篇徃徃舉朱壽昌事以為比㑹稽韓荘節先生性作孝子傳行于世周易癡䖏館講授賔主不合遂作白日圜文飄然而去其文曰􅃪之不聞視之不見子以我為隠乎用之則行舍之則蔵吾亦從此逝矣未得青雲路且坐白日圜飯􅂼食樂亦在中素貧賤不􅂅乎外兹承賢主人不取通士乃求拘儒匪我求童蒙取其交以道餽以禮擇師教子弟盖亦㩀扵徳依扵仁圜土而居重門以待當尓耳不聴􅁋目不視􅁖􅀅以塞其兊閉其聡然而口不絶吟手不停披安能存其心飬其性黄芽􅀂就白髮巳空常念流地上之白水真人且作鎖洞門清溪道士子其子親其親固冝造次必於是顛沛必於是尓為尓我為我安肯哀矜而辟焉敖惰而辟焉不越文字之間自行束脩以上受風魔貶為自在囚口出雌黃用狙翁朝四暮三之術目生虚白披羲皇天一地二之圖有朋自逺方来與進也與退也使君從此中入或止之或尼之我行其庭不見其人而子過我門不入我室朢而未見招之不来所不與同心指蒼天而為證亦欲從逰耳曰黃昏以為期不以我為貧知有時為飬所願諸生人十已千以一識百師也過商也不及尚得夫子之中庸參也魯回也如愚竟傳聖人之道統而某詩書無􅑂筆墨有靈蟬蛻汗濁之中鳯翔塵埃之表排雲呌閶闔吐三千丈豪氣之沉埋乗風歸蓬莱訴百萬億顛厓之辛苦藩籬既剖門闔洞開縱意􅀁如從吾􅀁好口􅀃五千年乗牛出凾谷願與関門令尹㳺乎腰纒十萬貫􅀐鶴上􅀭州皆曰閉户先生来也凡宫車晏駕棺用香楠木中分為二刳肖人形其廣狹長短僅足容身而巳殮用貂皮襖皮㡌其鞾韤繫腰盒鉢俱用白粉皮為之殉以金壷瓶二盞一椀楪匙筯各一殮訖用黃金為篐四條以束之輿車用白氊青縁納失失為簾覆棺亦以納失失為之前行用􅂪古巫媪一人衣新衣􅀐馬牽馬一疋以黃金飾鞍轡籠以納失失謂之金靈馬髹器黒光凡造椀楪盤盂之属其胎骨則梓人以脆松劈成薄片扵旋牀上膠黏而成名曰捲素髹工買来刀刳膠縫乾凈平正夏月無膠汎之患却煬牛皮膠和生漆微嵌縫中名曰捎當去聲然後膠漆布之方加麄􅁅􅁅乃磚瓦搗屑篩過分麄中細是也膠漆調和令稀稠得􅀁如髹工自家造賣低歹之物不用膠漆止用猪血厚餬之􅀋而以麻筋代布所以易壊也麄􅁅過停令日乆磗石車磨去􅁅􅄴潔凈停一二日􅀱乾燥方漆之謂之糙漆􅂯停数月車磨糙漆絹帛桃上聲去􅄴跡􅅻用黒光黒光者用漆斤两􅀂干煎成膏再用漆如上一半加鷄子清打匀入在内日中晒翻三五度如栗殻色入前項􅀁煎漆中和勻試簡看緊慢若緊再晒􅀂慢加生漆多入觸藥觸藥即鐵􅄴沬用隔年米醋煎此物乾為末入漆中名曰黒光用刷蘸漆漆器物上不要刷㾗停三五日待漆内外俱乾置隂䖏䀶之然後用揩光石磨去漆中􅀋雷上聲揩光石雞肝石也岀杭州上柏三橋埠牛頭嶺再用篛帉次用布帉次用菜油傅却用出光粉揩方明亮朱紅修治布􅁅一一如前不用糙漆都用贉朱桐葉色然後用銀朱以漆煎成膏子調朱如朱一两則膏子亦一两生漆少許看四時天氣試簡加減冬多加生漆顔色闇春秋色居中夏四五月秋七月此三月顔色正且紅亮鰻水好桐油煎沸以水試之看躁也方入黄丹膩粉無名異煎一滚以水試如宻之状令冷油水各等分杖棒攪匀却取磚􅁅一分石􅁅一分細麫一分和匀以前項油水攪和稠黏􅁅器物上再加細􅁅然後用漆並如作錠每重五十两歸朝獻納世祖大會皇子王孫附馬国戚從而頒賜或用貨賣􅀁以民間有此錠也後朝廷亦自鑄至元十四年者重四十九两十五年者重四十八两遼陽元寳乃至元二十三年二十四年征遼東所得銀子而鑄者凡學官朔望講􅀃乃禮之常􅀁属上司官或省憲官至自教授學官暨學賔齋諭等皆講􅀃一書然儒生未達時宜徃徃迕意多矣泰定甲子呉淞江省臺憲僚咸集時治書劉公濼源北方學者首謁先聖先師某年值閏詹肖岩講書尭典三百有六旬有六日以閏月定四時成􅀊大咈其意以為學校講􅀃雖賤夫皁隷執鞭執鐙之人皆令通暁今乃稽筭度数何為肖岩由是悒快而卒至元巳夘冬分憲老老公檢踏災傷以復熟糧為急陸宅之講省刑罰薄稅歛一章公變色而作至正辛巳知府楊侯銳意浚河以㒷利除害為巳任時憲僉某謁學官王玉岩講禹别九州隨山濬川結意皆歸羙於知府憲僉不恱而罷丁酉歳張士誠㩀有姑蘇日遣蘇守周仁来王可􅁠講易泰卦盖君子道長小人道消之義周以為譏訕累及諸職事皆停月廪惟錢先生伯全父作訓導時行刑官至講欽哉欽哉惟刑之恤哉講畢稱賞不巳前數君子亦可為後人戒也王與敬字可權淮西安豊人由浙省典吏充宣使後於董􅅮霄部下立功擢松江府判未任轉省都鎮撫升元帥至正丙申二月朔偽誠王張士誠紅軍破平江時與敬兵敗徑趍嘉興又與苗人叅政楊完者不恊乃􅄬松江名曰守禦實欲戀倡婦董賽兒故逹魯花赤八都帖木兒知府崔思誠皆無制變之術激成其禍盖其至也不郊迎之巳自不恱越二日浙省又命元帥帖古列思等提兵而来鎮守城池二帥抗行不相上下帖􅀧两倉脚夫散口糧給器械發號施令盖意在逐與敬行十八日帖宴軍民官無一人至者至夜與敬下萬户戴列孫等率引軍卒自西門放火皷譟而叛官僚潰散寺觀民房悉化焦土檢刮金銀財物塞滿舟船自與敬以下人口輜重皆出西門二十四日完者下元帥蕭亮員成等率苗軍突至兵不與敵遂北出通波塘而去􅄬降士誠子女玉帛悉為苗軍􅀁有民亦持挺相逐列孫孔鎮撫等死者過半苗軍恣肆檢刮截人耳鼻城中女婦多為􅁋汙房舍間有存者皆為焚燬靡有子遺居民两􅇜鋒鏑死者填街塞巷水為不流四月初十日士誠下元帥史文炳一部兵馬自湖􅍩入古浦塘舳艫相衘旗熾蔽日苗軍一矢不交竟潰散而去南村野史曰天下本無事庸人自擾之卓哉斯言也􅀄王與敬之戾止苟得一守土官能以智慮䖏之則不致若是况松江尚侈靡習􅁋風者乆矣余甞扼腕而歎必有後日之患終爲一賤倡禍及數萬家非小變也與敬􅀒逆賊之名遺臭萬年戴氏逞匹夫之勇卒喪其生皆自取之也悲夫嘉興天寜寺有老僧曰果典坐平生不蓄積得錢輒買酒飲長老念空海毎􅀊遺衣叚至正癸巳正月一日無疾而卒年一百二􅀊潮逢谷水難興浪月到雲間便不明松江古有此語谷水雲間皆松江别名也近代來作官者始則赫然有聲終則闒茸貪濫始終廉㓗者鮮两句竟成詩䜟松江自来無大火灾至正丙戌閏十月廿九日夜普照寺西業製帽民不謹于火延燎五千餘家重門還館靈宫梵宇悉為煨燼而夏愛閒氏收蔵古法書名畫樓巋然獨存豈有神物護之也耶抑亦數耶松江普照寺門首刀鑷胡忽見街上有一片荷葉舒卷不巳一人拾置懐中去胡叩之曰汝得何物但欲見之以决􅀁疑及出示乃至元鈔叄拾文又同郡夏氏㒒嘗見小花蛇盤旋道左行人捉蔵諸䄂生頗訝問其􅀁以則至元鈔貳拾文右二事絶相􅀋吁三十文二十文直微末耳尚必待主今之積金蓄􅂖倍息計贏孳孳以利為念者於此寕不可鑒哉嘉興斜塘楊匯髹工鎗去聲金鎗銀法凡器用什物先用黑漆為地以針刻畫或山水􅀣石或花竹翎毛亭臺屋宇或人物故事一一完整然後用新羅漆若鎗金則調雌黄􅀂鎗銀則調韶粉日晒後角挑挑嵌􅀁刻縫罅以金薄依銀匠􅀁用􅁓餬籠􅇁置金銀簿在内逐旋細切取鋪已施漆上新綿揩拭牢實但著漆者自然黏住其餘金銀都在綿上於熨斗中燒􅁅甘鍋内鎔鍜潬不走失磨兠鞬巳見第九卷昔李侍􅀰敦立嘗揭磨兠堅三字於坐隅磨兠堅者古之慎言人也其善扵自防者哉金華宋濓為著箴曰磨兠堅慎勿言口為禍門昔人之云磨兠堅人各有心山髙海深磨兠堅髙不知極深不可側磨兠堅言出諸口禍隨其後磨兠堅鍾皷之聲因叩而鳴磨兠堅不叩而鳴必駭衆􅃪磨兠堅惟口之則守之以黙是曰玄徳磨兠堅磨兠堅慎勿言楊鐡厓云坡翁䟦石恪所畫以為三人皆大􅀏至衣服冠屨皆有􅀏態其後之童子亦罔知而大􅀏永書室圖三􅀏于璧想見石恪所作與此無異然坡翁􅀁䟦三􅀏不言為誰山谷特實以遠公陶陸事陳賢良舜俞廬山記亦謂舉世信之有趙彦通者作廬岳獨􅀏一篇謂遠公不與脩静同時樓攻媿亦言脩静元嘉末始来廬山時逺公亡巳三十餘牛淵明亡亦二十餘年其不同時信哉後世傳訛徃徃如此使坡翁見之亦當絶倒也按古官制取義皆有􅀁主非徒名也後世或訛其音者有矣音雖訛而義則不訛也如㒒射秦官㒒主也古者重武事每官必有主射以督課之射音神夜友關中人訛為寅詐反韻書不取其義扵神夜反中却收在寅射反下尚書亦秦官秦世少府遣吏四人在殿中主彂書故謂之尚書尚猶主也如尚方尚食尚醫尚衣尚冠尚浴尚席之尚並音時亮反後世乃以尚書之尚訛為辰羊反陸徳明亦音平聲韻書遂兩收之洗馬前漢志太子太傅少傅属官有先馬張晏曰先馬貟十六人秩比謁者如淳曰前驅也國語載勾踐親為夫差先馬先先之也从先見反今韻書作蘇典反字作洗愚意此􅀋並當􅀙其正義不當从其訛音今人但見讀㒒射之射作神夜反尚書之尚作時亮反洗馬之洗作先見反便非哂之不究其義故也此􅀋甚多今姑舉其􅂋者巾幘釋名巾謹也當自謹於四教儀禮二十成人士冠如字庶人巾􅀃文髪有巾曰幘幘即巾也又方言覆䯻謂之幘漢書卑賤執事不冠者􅀁服或謂之承露按儀禮士冠庶人巾則古也士以上有冠無巾幘惟庶人戴之秦謂民為黔首漢謂僕隷為蒼頭漢書謂卑賤者􅀁服此其證者後世上下通用之謂之燕巾蔡邕獨断曰漢元帝額有壮髮不欲人見故如巾幘以包之也然則巾自巾幘自幘不獨卑賤者􅀁服雖尊者亦服之矣至王莾冠内加巾故時人云王莾秃幘施屋又光武岸幘見馬援又按魏志注太祖以天下㓙荒資財乏匱擬皮弁裁縑帛為帢或作幅乞洽反合乎簡易隨時之義以色別其貴賤本施軍飾非為國容韻書弁缺四隅謂之帢前時軍人弓手所戴小白㡌是也一曰按頭使下故曰帢増韻埤蒼皆白㡌也􅀳輿服志哀帝立秋御讀令改用素白幍漢末王公名士多委王服以幅巾為雅魏武始制幍成帝制使尚書八坐丞􅀰門下三省侍官乗車白幍低幃岀入掖門又二宫直宫著烏紗幍徃徃士人宴居皆著幍矣幍雖冠弁遺制去古益逺用巾幘為近之一􅀃秦加武􅀅首飾為絳帕從稍稍作顔題漢興續其顔却摞音羅之施巾連題却覆之即喪幘也名之曰幘至孝文帝乃髙顔題續之以耳崇其巾為屋合後施巾上下文者長耳武者短耳古者冠制皆硬殻自額上至於頂如今禮冠者然後世乃作小冠厪以束髮冠下施幘冠幘之上又摠施中皆效漢元帝􅀁服之制也夫歴代損益隨其􅀁宜苟不害於義從俗可也孔子居宋衣縫掖居魯冠章甫亦從俗也屨舄履屨人註禪下曰屨複下曰舄􅀃文無舄字舄本鵲字今借為履舄字也陸佃云舄通為舄履之舄古人居欲如燕行不欲如鵲故借爲舄字所以為行戒也然借鵲為舄作思積反者盖舄履也古今注以木置屨下乾腊不是􅅺濕故曰舄以是知舄履之下必􅄪用木矣士喪禮夏葛屨冬皮屨屨人注又謂凡屨青絇劬繶億純准素幘白屨緇絇繶純爵弁纁屨黒絇繶純是也絇􅀃文纑繩絇也玉藻注履頸飾也韻㑹状如刀衣鼻在屨頭言拘者取自拘持使低目不暇顧視一曰用繒一寸屈爲之頭著屨頭以受穿貫繶屨人注縫中紃也絛也純屨人注縁也言繶必有絇繶純矣凡絇繶純皆一色又按屨人注舄有三等赤舄白舄黒舄也赤舄爲上冕服之舄詩曰王錫韓侯玄衮赤舄則諸侯與王同矣􅀁謂玄舄青舄王后祭服之舄也凡屨之飾如繡次也黄屨白飾白屨黒飾黒屨青飾天子諸侯􅁻事皆舄其餘服冕著舄耳士爵弁纁屨黒絇繶純尊􅀕服之屨飾从繢也至若履者􅀃文足􅀁依也从尸从乆从舟象履形毛氏曰舟能載物履能載人又草曰扉芳米反麻曰屨凡布皆可謂之麻皮曰履按履無別制􅀃文屨屨也从履省婁聲又鞮也徐曰鞮革履也舄韻㑹履也古今注以木置履下乾腊不畏􅅺濕故曰舄以是知履舄屨之異名也但有禪下􅃨下用本之異耳古人舄屨至階必脫唯著韤而入禮戸外有二屨是脫屨而入者也漢賜劒履上殿是不賜則不敢著履上殿明矣諌不行則納履而去納結也言納履則在外明矣是脫履而入者也王喬入朝双舄化鳬先生是脫舄而入者也古者堂上皆有席􅀁以著韤爲宜况韤又从韋乎又按郷飲酒云祝屨揖讓如􅀄升堂䟽云凡堂上揖行禮不脱屨坐則脫屨理固然也由是觀之凡宗廟堂室之間行禮亦必不脱履矣夫降而脫履然後升坐禮也其後賔與主人酬酢之時皆在两階之間又須降而著屨復升于階酬酢之禮畢又降而脱屨復升于坐也古人禮繁如此今何略也南村輟耕録卷之三十終
