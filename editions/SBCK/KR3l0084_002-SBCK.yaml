front:
  text: 南村輟耕録卷之二
  hash: sha256:76b2cd84e012a71b2ab9fd44bf20a0b379fa02ae3c15c310de663a7018048fea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_002-1a}
body:
  text: 天台陶宗儀九成至元六年二月二十五日上御玉徳殿命史臣榻前草詔黜謫太師伯顔詔文有云其各領所部詔書到日悉還本衛上曰自蚤至莫皆一日也可改日字作時字時伯顔以飛放為名挾持皇太子在栁林意􅀅犯分詔既成遣中書平章只理瓦歹賷至彼䖏開讀奉皇太子歸國而各枝軍馬即時散去盖一字之中利害繫焉亶聰明作元后扵此有以見之矣文定王沙刺班今上之師也為學士時嘗在上左右一日體少倦遂扵便殿之側偃卧因而就􅄰上以藉坐方褥國語所謂朶兒别真者親扶其首而枕之後嘗患􅟻額上上於合缽中取拂手膏躬與貼之上之隆師重道可謂至矣盡矣王字敬臣號山齋畏吾人累朝皇帝先受佛戒九次方正大寳而近侍陪位者必九人或七人譯語謂之煖荅世此國俗然也今上之􅀄入戒壇時見馬哈刺佛前有物為供因問學士沙刺班曰此何物曰羊心上曰曽聞用人心肝者有諸曰嘗聞之而未嘗目暏請問刺馬刺馬者帝師也上遂命沙刺班傅旨問之荅曰有之凡人萌歹心害人者事􅁴則以其心肝作供耳以此言復奏上復命問曰此羊曽害人乎帝師無答國朝日進御膳例用五羊而上自即位以來日減一羊以􅀊計之為數多矣太府少監阿魯奏取黄金三两為御鞾刺花用上曰不可因請易以銀金鍍金者上曰亦不可金銀首飾也今民間所用何物對曰用銅上曰可右五事楊太史瑀所言太史居官時日侍上故知其詳今上皇太子之正位東宫也設諭徳置端本堂以䖏太子講讀忽一日帝師来啓太子母后曰向者太子學佛法頓覺開悟今迺受孔子之教恐損太子真性后曰我雖居於深官不知道德嘗聞自古及今治天下者須用孔子之道捨此它求即爲異端佛法雖好乃餘事耳不可以治天下安可使太子不讀書帝師赧服而退皇太子方在端本堂讀書近侍之嘗以飛放從者輒臂鷹至廊廡間喧呼馳逐以惑亂之􅀅勾引出㳺爲樂太子授業畢徐令左右戒之曰此讀書之所先生長者在前汝輩安敢䙝狎如此急引去毋召責也衆皆驚懼而退右二事乃貢尚書師泰授經宣文閣下日所目見者至正丙申間避地雲間毎談朝廷典故因及此中書左丞魏國文正公魯齋許先生衡中統元年應召赴都日道謁文靖公静脩劉先生因謂曰公一聘而起毋乃大速乎答曰不如此則道不行至元二十年徴劉先生至以為􅐌善大夫未幾辤去及召為集賢學士復以疾辤或問之乃曰不如此則道不尊中書令耶律文正王楚材字晉郷在金為燕京行省貟外􅀰國亡歸于我朝從太祖征伐諸國夏人常八斤者以治弓見知於上詫王曰本朝尚武而明公欲以文進不已左乎王曰且治弓尚湏弓匠豈治天下不用治天下匠耶上聞之喜自是用王益宻中書平章政事廉希憲字善甫封恒陽王謚文正本畏吾氏王之父諱布魯凱為回鶻王歸朝官至順徳諸路宣慰使封魏國公謚孝懿拜廉訪使之命時適王生顧曰是兒必大吾門吾聞古者以官受氏天􅀅以廉氏吾宗乎吾其從之舉族承命世祖一曰命廉文正王受戒於國師對曰臣以受孔子戒上曰汝孔子亦有戒邪對曰為臣當忠為子當孝孔門之戒如是而已上喜謝君直先生枋號疊山信州弋陽人宋景定甲子江東漕闈校文彂䇿問權姦誤國趙氏必亡忤賈似道貶興國軍三年遇赦得還天兵南下郡城潰棄家入閩至元二十三年御史程文海承旨留夣炎等交薦累召不赴二十六年春正月福建行省􅂙知政事魏天祐復􅀍詔旨集守令戍􅀅追蹙上道臨行以詩别常所徃来者曰雪中松栢愈靑靑扶植綱常在此行天下豈無龔勝㓗人不獨伯夷淸義髙便􅁴生堪捨禮重方知死甚䡖南八男児終不屈皇天上帝眼分明夏四月至京師不食死年六十有四秋八月子定之奉柩歸塟門人誄而題之曰文節先生謝公墓嗟乎伯夷叔齊在周雖為頑民而在啇則為義士孰謂數千載後有啇義士之風者復見先生焉中書丞相史忠武王天澤髭髯巳白一朝忽盡黒世皇見之驚問曰史㧞都汝之髯何乃更黒邪對曰臣用藥染之故也上曰染之欲何如曰臣覽鏡見髭髯白􅀼傷年且莫盡忠於陛下之曰短矣因染之使玄而報效之心不異疇昔耳上大喜人皆以王捷於奏對推此一事則餘可知矣漢人賜名㧞都者惟王與太師張獻武王弘範及真定新軍張萬戸興祖耳真定新軍張萬戸興祖中山無極人至元十九年丞相楚國文定公阿里海涯以中書右丞南取漢郢公實從有功授前職平生射虎數十一日遇虎一發而踣語人曰吾聞生虎之髭剔齒疾可已風因㧞之虎怒􅀲鞾裂賴其氣息垂盡不能傷足由是人目之曰殺虎張後以國言賜名㧞突㧞突即㧞都都與突字雖異而聲相近盖譯語無正音故也姚文公先生燧為中臺監察御史時忽御史大夫謂曰我天子以女賢故擢居耳目之官今且􅀊餘至如興利除害之事未嘗有片言及之但惟以薦舉為務何邪先生答曰某所薦者已百有餘人皆經世之士其在中外並能上禆聖治則某之報效亦勤矣又何待屑屑於興利除害然後為監察御史之職任乎大夫曰真宰相器也嘆賞乆之太宗素嗜酒晚年尤甚日與大臣酣飲耶律文正王數言之不􅃪一日持酒槽之金口以進日此乃鐵耳為酒所蝕尚􅃱如此況人之五蔵有不損邪上􅀃賜以金帛仍􅃙左右日惟進酒三鍾而止夫以王之切諫不巳而上終納之可謂君明臣良者矣内翰王文康公鶚字百一開州東明人國􅀄自保定應聘北行時故人馬雲漢以宣聖􅀞像為贈既逹北庭植秋丁公奏行釋奠禮世祖􅀃即命舉其事公為祝文行三獻禮禮畢進胙於上上既飲福熟其胙命左右均沾所賜自是春秋二仲􅀊以為常蓋上之所以尊師重道者實公有以啓之也國朝儒者自戊戌選試後所在不務存恤徃徃混為編氓至於奉一札十行之書崇學校奨秀藝正戸藉免徭役皆翰林學士髙公智耀奏陳之力也公河西人今學校中徃徃有祠之者丙戌冬十一月耶律文正王從太祖下靈武諸􅀅争掠子女玉帛王獨取書籍數部大黃兩駝而巳既而軍中病疫惟得大黃可愈所活幾萬人吁廉而不貪此固淸慎者能之若其先見之明則有非人之所可及者御史臺至元五年置䄮從二品二十一年陞正二品大徳十一年陞從一品臺有大夫一人後増一人中丞二人後又増二人隨復故侍御史二人治書侍御史二人殿中侍御史二人治朝著之事典事二人掌幙府文書之事後改為都事三人後又以都事之長蒙古若色目一人為經歷檢法二人後廢管勾三人其一人兼照磨監察御史十二人後増至十六人皆漢人又増蒙古色目人如漢人之數今三十二人至元十四年既取宋置南行臺二十七年專蒞江南之地號江南諸道行御史臺秩如内臺而監察御史今二十四人西行臺􅀄由雲南廉訪司陞行臺大徳元年移治陜西號陜西諸道行御史臺蒞陜西甘肅四川雲南之地延祐間暫廢隨復其官秩如南臺而監察御史今二十人各道提刑按察司至元六年置正三品有使副使僉事察判經歷知事二十八年改肅政廉訪司使副使僉事各二人司農奏罷各道勸農司以農事歸憲司増僉事二人經歴知事照磨各一人今天下凡二十二道始建臺時大夫則塔察兒也内監察御史署御無御史臺三字以為天子耳目之官非御史大夫以下􅀁可制也行臺則不然國朝凡省臺院吏曰椽史獨江南行臺作令史者盖縁至元十四年􅀄立行臺日御史大夫授三品秩故也後雖陞一品而樂因循者不為申明改正西臺立視南臺巳陞品秩則曰椽史焉三臺凡公文所書臺字並從士從口不敢作其字頭若然則偽文也按許氏􅀃文臺从至从之从髙省則土乃之之正書耳當从上从口為是累朝皇帝於踐祚之始必布告天下使咸知之惟詔西畨者以粉書詔文於青繒而繡以白絨網以真珠至御寳䖏則用􅃢瑚遣使賫至彼國張于帝師所居䖏國􅀄立法以來有笞杖徒流死之制凡七下至五十七下用笞六十七下至一百七下用杖徒之法徒一年杖六十七一年半杖七十七二年杖八十七二年半杖九十七三年杖一百七此以杖麗徒者也塩徒既决而又鐐之使居􅃥也數用七者建元以前皆用成數今匿稅者笞五十犯私塩茶者杖七十私宰馬牛者杖一百舊法猶有存者大徳中刑部尚書王約數上言一國朝用刑寛恕笞杖十减其三故笞一十減為七今之杖一百者宜止九十七不當反加十也議者憚於變更其事遂􅆍流則南之遷者之北北之遷者之南死則有斬有􅓸遅而無絞世皇嘗以錢幣問太保劉文貞公秉忠公曰錢用於陽楮用於隂華夏陽明之區沙漠幽隂之域今陛下龍興朔漠君臨中夏宜用楮幣俾子孫世守之若用錢四海且􅀅不靖遂絶不用錢迨武宗頗用之不乆輙罷此雖術數䜟緯之學然驗之於今果如所言河南江北行中書省􅂙知政事姚忠肅公天福字君祥平陽人至元十一年拜監察御史彈擊權臣無所顧畏世祖賜名巴而思國言虎也後條奏宰相阿合馬罪二十有四召廷辨公枚數之彼輙引服數至於三氣沮色喪上曰此三者罪巳不在宥因目公曰巴而思臣下有違太祖之制干朕之紀者汝抨擊毋􅀮廷臣皆震悚時方􅀝相理財姑釋不問衆人莫不為公危之公之太夫人有賢識朂之曰為國者忘其家汝第盡力效忠果不測吾追蹤􅁜毋死日猶生年也公泣謝白其長曰萬一得譴乞不以老毋坐連語聞上嘆曰是毋子有古義烈􅃙侍臣符寳􅀰董文忠宣付史館書之至元二十四年桑哥之為尚書丞相也專擅權政虐􅆋薫天賄賂公行畧無畏避中書平章武寕正獻王徹理時為利用監獨􅁬然數其姦􅂍於上前上怒以為醜詆大臣命左右批其頬王辨不為止且曰臣思之熟矣國家置臣子猶人家畜犬譬有賊至而犬吠主人􅀄不見賊乃箠犬犬遂不吠豈良犬哉上悟收桑哥籍其家明日王拜御史中丞余按北史宋游道傳畢義雲奏劾㳺道楊遵彦曰譬之畜狗夲取其吠今以數吠殺之恐􅀅来無復吠犬詔除名則王之以犬自況為有所本矣翰林學士元文敏公明善字復􅀄清河人􅂙議中書日㑹朝廷遣蒙古大臣一貟使交趾公副之􅀅還國之偽主賮以金􅂪古受之公固辤偽主曰彼使臣巳受矣公獨何為公曰彼所以受者安小國之心我所以不受者全大國之體偽主歎伏今蒙古色目人之為官者多不能執筆花押例以象牙或木刻而印之宰輔及近侍官至一品者得旨則用玉圖書押字非特賜不敢用按周廣順二年平章李榖以病臂辤位詔令刻名印用㩀此則押字用印之始也文宗開奎章閣作二壐一曰天暦之寳一曰奎章閣寳命臣虞集􅂐文今上作二小璽一曰明仁殿寳一曰洪禧命臣楊瑀􅂐文洪禧璞純白而龜紐墨色天暦􅀄建奎章閣于西宫興聖殿之西廊為屋三間髙明敝爽南間以蔵物中間諸官入直所北間南嚮設御座左右列珍玩命群玉内司掌之閣官署御􅀄名奎章閣階正三品隷東宫属官後文宗復位乃陞為奎章閣學士院階正二品置大學士五員並知經筵事侍書學士二員承制學士二員供奉學士二員並兼經筵官幕職置叅書二員典韯二員並兼經筵參􅐌官照磨一貟内椽四名内二名兼檢討宣使四名知印二名譯史二名典書四名属官則有群玉内司階正三品置監群玉内司一員司尉一員亞尉二員僉司二員典簿一員令史二名典吏二名司鑰二名司膳四名給使八名專掌祕玩古物藝文監階正三品置太監兼檢校書籍事二員少監同檢校書籍事二員監丞參檢校書籍事二員或有兼經筵官者典簿一員照磨一員令史四名典吏二名專掌書籍鍳書􅀶士司階正五品置􅀶士兼經筵叅􅐌官二員書吏一名專一鍳辦書畫授經􅀰階正七品置授經􅀰兼經筵譯文官二員專一訓教怯薛官大臣子孫藝林庫階從六品置提􅀧一員大使一員副使一員司吏二名庫子一名專一收貯書籍廣成局階從七品置大使一員副使一員直長二員司吏二名専一印行祖宗聖訓及國制等書特恩剏製象齒小牌五十上書奎章閣三字一面􅂐字一面􅂐古字與畏吾兒字分散各官縣佩出入宫門無禁學士院凡與諸司徃復惟劄送叅書㕔行移而巳命侍書學士虞集撰記御書刻石閣中今上即位改奎章曰宣文其記曰大統既正海内定一乃稽古右文崇徳樂道以天暦二年三月作奎章之閣備燕閒之居􅀅以渊潛遐思緝熈典學乃置學士貟俾頌乎祖宗之成訓毋忘乎創業之艱難而守成之不易也又俾陳夫内聖外王之道興亡得失之故而以自儆焉其爲閣也因便殿之西廡擇髙明而有容不加飾乎采斵不重勞於土木不過啓戸牗以順清燠樹庋以棲圖書而已至於器玩之陳非古制作中法度者不得在列其爲䖏也跬歩戸庭之間而清嚴􅃉宻非有朝㑹祠享時廵之事㡬無一日而不御於斯於是宰輔有所奏請宥宻有所圖回爭臣有所縄紏侍從有所獻替以次入對從容宻勿盖終日焉而聲色狗馬不􅁤不物者無因而至前矣自古聖明獻知善於怡心飬神培本浚源泛應萬變而不窮者未有易乎此者也盖聞天有恒運日月之行不息矣地有恒執水土之載不匱矣人君有恒居則天地民物有所係属而不易矣居是閣也静焉而天為一動焉而天弗違庶乎有道之福以保我子孫􅀺民於無窮哉至順辛未孟春二日記傳􅀄菴先生立以占筮起東南時杭州􅀄内附世皇以故都之地生聚浩繁貲力殷盛得無有􅂯興者命占其􅀅来如何卦既成對曰其地六七十年後㑹見城市生荆􅁄不如今多者今杭連厄於火自至正壬辰以來又數燬於兵昔時歌舞之地悉為草莾之墟軍旅填門畜豕載道乃知立之占亦神矣立乃畨易祝泌甥泌精皇極數中書右丞相伯顔所署官䘖計二百四十六字曰元徳上輔廣忠宣義正節振武佐運功臣太師開府儀同三司秦王荅刺罕中書右丞相上柱國録軍國重事監脩國史兼徽政院侍正招功萬戸府都總使虎符威武阿速衛親軍都指揮使司逹魯花赤忠翊侍衞親軍都指揮使奎章閣大學士領學士院知經筵事太史院宣政院事也可千戸哈必陳千戸逹魯花赤宣忠斡羅謀扈衞親軍都指揮使司逹魯花赤提調回回漢人司天監群牧監廣惠司内史府左都威衞使司事欽察親軍都指揮使司事宫相都總管府領太禧宗禋院兼都典制神御殿事中政院事宣鎮待衞親軍都指揮使司逹魯花赤提調宗人􅂪古侍衞親軍都指揮使司事提調哈刺赤也不干察兒領隆祥使司事當其擅政之日前後左右無非隂邪小輩惟恐獻謟進佞之不至孰能告以忠君爱民之事有一王爵者驛奏云薛禅二字人皆可以為名自世祖皇帝廟號之後遂不敢用今太師伯顔功髙徳重可以薛禅名字與之時御史大夫帖木兒不花亦其心腹毎隂嗾省臣奏允其請文定王沙刺班時為學士從容言於上曰萬一曲從所請関係非䡖遂命學士歐陽玄監丞掲徯斯㑹議以元徳上輔四字代之加於功臣之上又典瑞院都事某建言凡省官提調軍馬者必佩虎符今太師伯顔難與它人同宜錫龍鳯牌以寵異之制可遂製龍鳯牌一面其三珠各􅉼徑寸真珠一枚而飭以紅刺鴉忽寳石牌身脫鈒元徳上輔功臣號字仍用白玉嵌造牌成計直數萬定既􅀍貶黜毀其牌就以珠宝給還物主盖督勒有司和買元價尚未酬也又京畿都運納速刺上言太師伯顔功勲盖世所授宣命難與百官一體合用􅅺金書詞以尊榮之省臺院官議不可行宛轉禀白止金書上天眷命皇帝聖㫖八字餘仍墨筆云大徳間仁宗在潛邱日奉答􅁻太后駐輦懐孟特苦群鼃亂喧終夕無􅄰翼旦太后命近侍傳㫖論之曰吾毋子方憒憒鼃忍惱人邪自後其毋􅂯鳴故至今此地雖有鼃而不作聲後仁宗入京誅安西王阿難答等迎武宗即位時大徳十一年也越四年而仁宗継登大寳則知元后者天命攸歸豈行在之所雖未踐祚而山川􅀑神巳隂来相之不然則蟲魚微物耳又能聽令者乎但迄今不鳴􅀹可異矣至􅆓癸亥十月六日甲子先一夕因􅀳邱入繼大統告􅀕太廟之頃隂風北来殿上燈燭皆滅良乆方息盖攝􅀕官鐵失也先帖木兒赤斤帖木兒等皆弑君之元􅁖也時全思誠以國子生充齋􅀰目繫之此無他必祖宗威靈在上不便姦臣賊子得以有事于太廟而明示嚴譴之耳彼徒罪無所􅏉至於身誅族赤而後巳吁可畏哉至元二十四年宗王乃顔叛後伏誅徙其餘黨于慶元之定海縣延祐間􅀝納脫脫公来為浙相其黨屢以水土不便為詐乞遷善地公曰汝軰自尋一箇不死人的田地當為汝遷之衆遂不敢􅂯言至正間别兒怯不花公為江浙丞相議以本省所轄土人不得為椽史時左丞佛住公謂曰􅀂然則中書椽當用外國人為之矣相有報色議遂不行蕭貞敏公斗奭字維斗京兆人蚤􅀊吏于府一日呈牘尹前尹偶墜筆目公拾之公陽為不觧而止白所議公事如此者三公曰某所言者王事也拾筆責在皁隷非吏所任尹怒公即辤退隠居十五年惟以讀書為志從公㳺者屨交户外平章咸寧王野仙聞其賢薦之於世祖徵不至授陜西儒學提舉継而成宗武宗仁宗累徵授國子司業集賢直學士未赴改集賢侍講又以太子右諭徳徴始至京師授集賢學士國子􅀕酒尋復得告還山年七十七以壽終謚貞
