body:
  text: 天台陶宗儀九成國􅀄張公可與李公仲方鮮于公伯機同仕于朝既而張除浙省􅀰中李除都事鮮于除浙東宣慰經歴胥㑹于驩甚李卒于官張移書鮮于曰仲方殁矣家貧子小吾輩若不為之􅀴紀則􅀌寡何􅀁依也吾以一女許配其仲子矣公以為何如鮮于聞訃哀祭成礼亦以一女許贅其長子即從善也後官至紹興推官仲子字復􅀄官至淮安捴官扵此可見前軰結交重氣義不以貴賤貧富易其心誠可敬也張公官至中書左丞國朝毎宴諸王大臣謂之大聚㑹是日盡岀諸獸于萬􅀊山􅀂虎豹熊象之属一一列置訖然後獅子至身材短小絶􅀋人家􅀁畜金毛猱狗諸獸見之畏懼俯伏不敢仰視氣之相壓也如此及各飼以鷄鴨野味之􅀋諸獸不免以􅀲按定用舌去其毛羽惟獅子則以掌擎而吹之毛羽紛然脱落有􅀂燖洗者此其所以異於諸獸也古云獅子吼盖不易於吼一吼則百獸為之辟易也至元壬寅夏松江府前勾闌隣居顧百一者一夕萝􅀍攝入城隍廟中同􅀍攝者約四十餘人一皆責状畫字時有沈氏子以摶銀為業亦夢與顧同欝欝不樂家人無以紓之勸入勾闌觀俳戯獨顧以宵夢匪貞不敢出門有女官奴習謳唱毎聞勾闌鼓鳴則入是日入未㡬棚屋拉然有聲衆驚散既而無恙復集焉不移時棚阽壓顧走入抱其女不謂女巳出矣遂斃於顛木之下死者凡四十一人内有一僧人二道士獨歌児天生秀全家不損一人其死者皆碎首折脇㫁筋潰髄亦有􅀍壓而幸免者見衣朱紫人指示其出不得出者亦曲為遮護云顔清甫曲阜人顔子四十八代孫嘗臥病其㓜子偶弹得一鵓鴿㱕以供膳於梢翎間得書一緘書上題云家書付男郭禹開拆禹乃曲阜縣尹郭仲賢也盖其父自真定􅀉至者時仲賢改授逺平縣尹去鴿未及知盤桓尋覔遂遇害清甫見之責其子便耴木匣凾鴿􅀱病稍愈直抵仲賢官􅀁獻書與鴿且語其故仲賢戚然曰畜此鴿巳十七年矣凡有家書雖隔數千里亦能傳致誠異禽也命左右􅄟之以清甫長厚君子留之累日問及子弟出䖏仲賢告言長子國祥頗習儒業及仲賢知霍州召􅀘州史貢山東㢘訪奏差陞書吏後官至漢中㢘訪使嘉興林叔大鏞􅁺江浙行省時貪墨鄙吝然頗交接名流以沽羙譽其於逹官顯䆠則刲羔殺豕品饌甚盛􅀂士夫君子不過素湯餅而巳一日延黄大癡作畫多士畢集而此品復出捫腹闊歩譏謔交作叔大赧甚不敢仰視遂揖潘子素求題其畫子素即書一絶句云阿翁作畫如􅀃法信手拈来種種佳好水好山塗抹盡阿婆臉上不曽搽大癡􅀏謂曰好水好山言逹官􅂋䆠也阿婆臉不搽言素面也言未巳子素復加一句云諸佛菩薩摩訶蕯俱不觧其意子素曰此謝語即僧家纎悔也閧堂大􅀏而散􅅩大數日羞出見客人之鄙吝一至於此亦可憐巳陳雲嶠柏泗州人性豪宕結客其祖平章故宋制置􅀰龍麟洲題琵琶亭以譏之者凡積金七屋不數年散盡嘗為侍儀舎人館閣諸老朝省名公莫不折軰行與交咸􅁛之曰公子其妻鐵太保女也恃富貴近戚偶以一言驕之遂終身不見甞􅀍命監鑄􅀕器于杭無錫􅌼元鎮慕其名来見之張燕湖山間羅設甚至酒終為别以一帖饋米百石雲嶠命從者移置近􅀁舉巨􅘑引妭樂趋􅀙者而前悉分散之頋􅌼曰吾在京時即熟尔名云南士之清者它無與比其􅀁以章章者盖以米沽之也諸􅀙令日絶交且罵諸嘗譽之者時張伯禹在坐不勝跼蹐其豪氣􅀋如此嘗雪中􅀐牛拜米南宫墓詩云少年不觧事買駿輕千金何如小黄犢􅂿雪空山深小小双牧童吹笛穿松林醉拜南宫墓地下有知言世上無知音也平日喜居錢唐好古有餘而治才不足又不樂小官怒罵宰相年逾六十不得志而死其畢命時作偈云前身本是泗州僧霍治書云紫陽楊煥然先生讀通鑑至論漢魏正閏大不平之遂脩漢書駁正其事因作詩云風煙􅃤淡駐三巴漢燼􅀅燃蜀婦髽欲起温公問書法武侯入㓂㓂誰家後攻宋軍廻始見通鑑綱目其書乃寝順徳劉道済先生尤不平之脩書名三為亦見綱目閟而不行中統改元陵川郝伯常先生使宋􅀍􅅏儀真執不得還就買書作續漢史既脫藁㑹同僚苟正甫諸公飲至數行忽長歎曰某辛苦十餘年莫不􅀍高頭巾軰巳做了也皆對云不聞之至元丁亥余分臺江西購得蕭常續漢書全部因喟然曰惜乎郝君不及見此剛卯者按許慎􅀃文㱾音開改大剛昴以遂􅀑也玉篇開改剛卯也大印以辟􅀑也廣韻㱾改大開堅也王莾傳服䖍注曰剛卯以正月卯日作佩之長三寸廣一寸四分或用玊或用金或用桃著佩之又注當中央從穿作孔以綵絲茸其刻其上文曰正月剛卯既央靈殳四方赤青白黄四色是當帝令祝融以教䕫龍庶疫剛癉莫我敢當又曰疾日嚴卯帝令䕫化順尓國化伏兹靈殳既正既直既觚既方庶使剛癉莫我敢當凡六十六字㱾改者佩印也以正月卯日作故謂剛夘又謂之大堅以辟邪也金刀之利者皆不得行服䖍曰剛夘以正月夘日作佩之長三寸廣一寸四分或用金或用桃著革􅅁佩之金有玊在者銘其一靣曰正月剛夘金刀莾􅀁鑄之錢也􅀳灼曰剛夘長一寸廣五分四分當中央從穿作孔以綵􅁝茸其底如冠纓頭㽔刻其上靣作两行書文曰正月剛夘既央靈殳四方云云同前其一銘曰疾日嚴夘帝令䕫化順尓故一作固伏化兹靈殳云云同前師古曰今泩泩於土中得玊剛夘者案大小及文服􅀃是也莾以劉字上有夘下有金旁有又刀故禁剛夘及金刀也慱謀卿士僉曰天人同應昭然著明其去剛夘莫以為佩除刀錢勿以為利承順天心快百姓意乃更作小錢徑六分重一銖文曰小錢直一與大泉五十者為二品並行後漢輿服志佩双印長寸二分方六分乗輿諸侯及王公列侯以白玊中二千石以下四百石皆以黒犀三百石以至私學弟子皆以象牙上合􅁝乗輿以縢貫白珠赤罽㽔諸侯王以下以槂赤絲􅅋槂各如其印質刻書曰正月剛夘既决云云同前慎尓周伏伯兹靈殳云云同前凡六十六字前書注云正月剛夘作霍治書清甫云甞於呉中得白玊剛嚴双印四牧完具者二剛夘銘詞三十四字嚴夘銘詞三十二字其二字筆畫損缺剛夘無既央二字餘十字難辯甞考王莾傳輿服志􅀃文剛夘銘與􅀃文及王莾傳同輿服志央為决嚴夘疾日為曰疑志誤又順尓故化伏與莾傳同􅀃文作順尔國化伏輿服志作填尓周伏化未詳孰是其服用制度逓相引㩀亦不同後見徐容齋叅政蔵剛夘一梁貢父尚書蔵剛嚴二並係古玉􅂐體剛夘銘三十四字字畫亦損缺制度銘詞與前雙印大約不異續􅀵嚴夘二一以玉為之一若瑟瑟俗傳􅁑仙翁練丹頭又名藥注子其文曰制曰嚴卯帝命莫忘日資唯是黒青白黄既正既直既觚既方庶使罔談莫我敢當與前嚴夘銘詞並差鮮于伯機經歴收一枚高彦敬尚書收二枚並真楷書皆似近代制作未見􅀁出偶得金陵學宫􅀁刻黄山谷先生辯剛夘遺蹟其􅀃與前相同但云絲縄也音護古文無此字按五紐縄器也􅅈兎􅅈也豈紐絲縄與兎􅅈相􅀋故同此音耶又馬永卿嬾真子録公漢人以正月卯日作佩之銘其一靣曰剛夘乃知今人立春或戴春勝亦古制也蓋剛者强也夘者劉也正月佩之尊國姓也與陳湯􅀁謂强漢也同義顧仲庸泰州人以財䧺一郷倜儻好義有古豪俠風自奉甚薄而禮賢飬士無虚日名公鉅儒多館其家張蛻菴承旨亦其人也仲庸與保定張文友交文友􅌘縣尹秩滿僑居江隂一日􅁀卒時仲庸留京師友人以訃告戒勿泄友詢其故曰文友賢而貧在六品選中吾􅀅與其子為地即走告當路者曰張文友末疾病矣願致仕因代入状中書遂獲以奉政大夫嘉定知州致仕既領宣命數月又代文友之子告䕃尋注常州􅀳陵縣尉便其飬毋也其家悉無􅀁知仲庸南歸遣人致􅐠奠奉宣勑以授其子聞者驚嘆仲庸行事􅀋如此㑹稽陽明洞天在秦望山後禹廟之西南云即古禹穴越之勝境也諸峯環聳盤欝空曲中有東嶽行祠及老子宫余甞宿􅅏其間一老道士者朱顔鶴髮延至其室室横一空棺云巳十餘年矣未能即棄浮世而入此匣也其後兵攻越城㳺􅀐四出道士乃沐浴冠佩絶粒飲與衆永訣卧于其中七日不死軍至彂棺挈之出兵退乃入城一病而卒向之棺不可得矣豈非分定欤喬公仲山官吏部中好古􅀶雅仍喜諧謔􅀁交皆名人才士公家製餛飩得法常苦賔朋需索一日於毎客前先置一帖且戒云食畢展卷既而取視乃製造方法也大􅀏而散自後無復言矣劉元字秉元薊之寳坁人官至昭文館大學士正奉大夫袐書監卿元甞為黃冠師事青州祀道録傳其藝非一而獨長扵至元七年世祖建大護國仁王寺嚴設梵天佛像特求奇工為之有以元薦者及􅀍召又􅀙阿尼哥國公學西天梵相神思妙合遂為紀藝凡兩都名刹有塑土範金搏換為佛一出元之手天下無與比􅀁謂摶換者漫帛土偶上而髹之巳而去其土髹帛儼然像也昔人甞為之至元尤妙摶丸又曰脫活京師語如此繆孝子倫字叔􅃔東平人侍父䆠㳺寓居錢唐至正十六年淮兵㓂城執其父􅀅殺之倫哀號乞免弗聴傾家貲以贖又弗􅃪乃自縳請代扵是殺倫而釋其父甚㢤賊之不仁也趙孝子天爵字伯㢘平陽觧州夏縣人嘗為史多平反惇行孝弟治家甚嚴三子皆頎然玉立毋喪廬墓三年父継䘮又如之惟􅂼食菜羙不飲酒食􅁏不與妻妾見有司以聞于朝旌表其門閭復其身王義士天爵字世傑亦夏縣人家饒於財有善行以粟貸人不圖重息年豊僅取十之二三稍饑但收其本大凶則巳皆之郷里不知字咸稱義士焉毎值生身之辰寝苫一月以報父毋朝廷扵歳首例遣使􅀕岳瀆至正乙巳翰林應奉李國鳯代祀嵩恒醫無閭抵汴路閉即城中望祭嵩岳時閏月下旬也二月十三日㳺相國寺池上群僧方聚觀􅀙之仰視日旁一月一星月如􅀄弦者又十日雨木氷状如樓閣人物冠帶鳥獸卉木百態具備殆非人工髙林大樹珠葆羽憧弥望不絶凡五日始觧又十日復冰自汴至中滦皆然不一􅀊盗䧟汴㩀之亦集乃路在西北方有山曰蹇占山比多龍湫􅁟人􅁒有􅀁事則􅃥之􅁻安道士劉學仙嘗至其地見有烹羔桐酪祠焉數皮而沈之祝曰神為我鞣而治之為期日而去至期復祠之則得成革矣若有􅀑工然不可測也㱕語扵虞邵菴先生先生􅀄以為誑及質諸其土人之在京師者則始信盖其人習以為常不以為異耳杭州属邑有一巨室怙財挟執虐害良善邑官貪墨莫敢孰何衆不能堪走愬憲府巨室迯匿憲使怒督責有司示罪賞掲大逵且家至壁白隠蔵者罪連坐首捕者賞萬緡其友人王一山者丗業儒居湖山第一樓儔彼於宻期月不彂隣家察知圖給賞錢告報于官官􅊧索得之併王逮繫囚見憲使使問云女知彼􅀁犯乎王曰知之女聞國有制乎曰知之女見揭示罪賞乎曰見之女奚不就利避害乎曰朋友顛連来奔乗其危以售之則名教中有􅀁不容某誠弗忍為事覺連坐乃甘心焉使竦然曰君子􅀁謂臨難毋苟免其人踐之矣真義士也若加以罪是吾政苛而刑濫民何以勸遂釋之使即許攵正公子也徐彦璋云啇人某海舶失風漂至山島匍匐登岸深夜昏黒偶墜入一穴其穴險峻不可攀縁比明穴中微有光見大蛇無数蟠結在内始甚懼乆稍與之狎蛇亦無吞噬意􅀁苦飢渴不可當但見蛇時時䑛石璧間小石絶不飲㗖於是商人亦漫尓取小石噙之頓忘飢渇一日聞雷聲􅀮􅀮蛇始伸展相継騰升􅅻知其為神龍遂急攙蛇尾得出附舟還家携􅀁噙小石數十至京城示識者皆雅鶻等宝石也乃信神龍之窟多異􅎇焉自此貨之致富彦璋親見啇人道其始末如此甞至松江鍾山浄行菴見籠一䧺雞置于殿之東簷請問其故寺僧云蓄此以司晨盖十有餘年矣時刻不爽余竊記張公文潜明道雜志云鷄能司晨見於經傳以為至論而未必然也或天寒雞􅈸至􅀅旦而未鳴或夜月出時鄰雞悉鳴大抵有情之物自不能有常而或變也若然則張公之言非欤因舉似以詢其所以僧云司晨之雞必以童若壊其天真豈能有常哉盖張公特未知此理故耳閩廣多種木綿紡績為布名曰吉貝松江府東去五十里許曰烏􅅺涇其地土田磽􅇤民食不給因謀樹藝以資生業遂覔種於彼􅀄無踏車椎弓之製率用手剖去子線弦竹弧置案間振棹成劑厥功甚艱國􅀄時有一嫗名黄道婆者自厓州来乃教以做造捍弹紡織之具至扵錯紗配色綜餞挈花各有其法以故織成􅀍褥帯悅其上折枝􅇛􅃫棋局字棣粲然􅀂冩人既受教競相作為轉貨它郡家計就殷未㡬嫗卒莫不感恩洒泣而共􅁙之又為立祠嵗時享之越三十年祠毀郷人趙愚軒重立今祠復毀無人為之創建道婆之名日漸泯滅無聞矣至正丙午八月辛酉上海縣浦東俞店橋南牧羊児三四聞頭上恰恰有聲仰視之流光中隕一魚刺麻佳上成一創其狀不常見自首至尾根僅盈尺似闊霸而短是日晴無隂雲亦無鵰􅀚之􅀋是可恠也日昳時縣市人閧然指流星自南投北即此時也橋下一細家取欲烹食其妻塩而蔵之来者多就觀焉或者曰志有云天隕魚人民失􅀁之象至元丁丑民間謡言拘刷童男女以故婚嫁不問長㓜而亂倫者多矣平江蘇逹卿特為上海吏有女年十二贅里人浦仲明之子為壻明年生一子劉節婦泰州坂埨人至正丙申春隨父渡江居呉門適張士誠部􅀅曺某方數月夫陣亡劉不避凶險躬至死􅀁求得其屍㱕􅌾欲以身徇父不許既而權貴人聞劉羙且賢争欲强委禽焉劉擔死不貳遂削髪為比丘尼夫劉夲一閭閻女子其操行乃尓盖有貴為后妃而莫之及者謂非天性也欤歴代醫師三皇僦貸季天師岐伯􅀑􅁷區少師少俞伯髙桐君太乙雷公馬師皇五帝巫咸伊尹周巫彭矯氏俞氏盧氏醫緩醫竘文摯醫和范蠡鳯綱秦長桑君李豹神應王扁鵲子陽安期先生太醫令李䤈崔文子西漢樓護元里公楊􅂟公孫光秦信太倉公淳于意王遂宋邑馮信髙期王禺唐安杜信玄俗東漢張機仲景郭玊程高涪翁沈建張伯祖杜度魏沉淮南子蜀漢李譔唐慎微韓保昇孟昶魏華陀李當吴普青牛道士封君逹樊阿韓康吴吕摶􅀒局先生董奉西􅀳王􅅩和李子豫仰道士殷仲堪李法存皇甫謚玄晏先生張苗裴頠裴顗劉徳史脫宫泰靳邵張華蔡謨趙泉阮徳東晋􅁑洪抱朴子范注程㩀南宋少主元徽王繤胡治徐㷩秋夫徐道度秋夫長子徐􅅩嚮道度弟薛伯宗徐仲融徐文伯徐嗣伯僧􅀷劉㳙子羊晣秦承祖南齊張子信馬嗣明張逺逰北齊顧歡李元忠李宻崔季舒祖挺禇澄鄧宣文顔光禄龍樹王菩薩徐之才徐林卿之才長子徐同卿林卿弟梁貞白先生蘇㳟陶􅊼景後魏王顯徐謇徐雄謇長子後周徐之範杜善方隋徐敏齋許智蔵巢元方楊善唐金元起真人孫思􅥞許㣧宗宋侠藥王􅅊慈蔵甄權甄立信王氷啓玄子張文仲孟詵蘭陵䖏士蕭炳李䖍縦楊玄操元珠先生楊損之王方慶秦鳴鶴許孝宗陳士良李含光張鼎陳蔵器五代日華子宋趙從古謝復古劉温舒朱昡無求子孫用和紀天錫劉元賔通真子翟煦劉禹錫􅀄虞世道士馬志龐安時宋道方許叔微王􅀙藴吴復圭張洞曹孝忠林億秦宗古丁徳用賈祐蘇頌朱有章孫兆王惟一王光祐蔣淮安自長張素陳遇明劉翰金成無巳何公務劉守真侯徳和張子和馬守素楊􅀙政李道源張元素潔古老人􅀽景安南村輟耕録卷之二十四
