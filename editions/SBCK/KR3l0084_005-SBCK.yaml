front:
  text: 南村輟耕録卷之五
  hash: sha256:7462aab83ecdd69d1ed9048b15cf329d323c1750b95539435234fc73affbfe6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_005-1a}
body:
  text: 天台陶宗儀九成金華黄先生溍嘗云子􅀅以舉子經學取科第有一賦題曰角端亦曽求其事實否乎余曰未也因記史記司馬相如傳獸則麒麟角端之語退而閱之按注郭璞曰角􅗧音端似猪角在鼻上堪作弓又云似麒麟而無角毛詩䟽云麟黄色角端有􅁏張揖云角端似牛角可以為弓以此推之豈亦麟之属與及考符瑞志名臣事略癸辛雜識䓁書乃始得其詳盖太祖皇帝駐師西印度忽有大獸其髙數十丈一角如犀牛然能作人語云此非帝丗界宜速還左右皆震懾獨耶律文正主進曰此名角端乃旄星之精也聖人在位則斯獸奉書而至且能日馳萬八千里靈異如􅀑神不可犯也帝即回馭載稽之前志神禹氏治水功成天降飛莵曰行三萬里而未嘗善言也又后土趺蹄之獸至善言而未聞其獨角也軒轅獲飛黄而獨角漢武獲獸并角而五蹄又未嘗聞其能言善馳也及聖祖誕膺天命而角端出焉夫一角者所以明海宇之一而萬八千里之􅍱者所以示無逺弗屇此又天􅀅開天下於大一統之象也至正庚寅江浙郷試八月二十二日夜二皷院中彷彿見一物馳過甚疾其状􅀂猛獸者軍卒􅀙而喧閧因出角端爲賦題劈正斧以蒼水玉碾造高二尺有奇廣半之徧地文藻粲然或曰自殷時流傳至今者如天子登極正旦天壽節御大明殿㑹朝時則一人執之立於陛下酒海之前盡所以正人不正之意興隆笙在大明殿下其制植衆管于柔韋以􅁚大匏上皷二􅅊槖按其管則簧鳴簨首爲二孔雀笙鳴機動則應而舞凡燕㑹之日此笙一鳴衆樂皆作笙止樂亦止尚食局進御麥麵其磨在樓上於樓下設機軸以旋之驢畜之蹂踐人􅃥之徃来皆不能及且無塵土臭穢所侵乃巧工瞿氏造者大德間僧膽巴者一時朝貴咸敬之德壽太子病㿀薨不魯䍐皇后遣人問曰我夫婦崇信佛法以師事汝止有一子寕不能延其壽邪答曰佛法譬猶燈籠風雨至乃可蔽若燭盡則無如之何矣此語即吾儒死生有命之意異端中得此亦可謂有口才者矣鄧光薦先生剡號中齋廬陵人宋亡以義行著其所賦鷓鴣詩曰行不得也哥哥痩妻弱子羸牸䭾天長地闊多網羅南音漸少北語多肉飛不起可柰何行不得也哥哥其意可見又有所􅐌文丞相像曰目煌煌􅀆䟽星暁寒氣英英􅀆晴雷殷山頭碎柱兮璧完血化碧􅀆心丹嗚呼孰謂斯人不在世間汪元量先生大有號水雲天兵平杭日詩曰西塞山􅁁日落䖏北関門外雨来天南人墮淚北人咲臣甫低頭拜杜䳌又曰錢塘江上雨􅀄乾風入端門陣陣酸萬馬亂嘶臨警蹕三官洒淚涇鈴鸞童児賸遣追徐福癘􅀑終當滅賀蘭若説和親能活囯嬋姢應是嫁呼韓此語尤悲哽先生詩有水雲集徐文獻公琰字子方至元間為陜西省􅀰中有属路申觧到省誤漏聖字案吏指為不敬議欲問罪公改其牘云照得来觧内第一行脫去第三字今􅀅元文隨此發下可重别申來時皆稱為厚德長者後至元間太師伯顔出太府監所蔵歴代玉璽磨去􅂐文改造押字圖書及鷹墜等物以分散其黨與盖先巳奏請故也獨唐武一玺玉色􅉷白製作如官印􅒄瑾半寸許因不可它用遂付藝文監收之竟獲永存豈武氏之智能逆料之乎天子郊祀與􅀕太廟日百官陪位者皆法服凡披秉湏依􅁔訣次第則免顛倒之失歌曰襪履中單黄帶先裙􅂁蔽膝綬紳連方心曲領藍腰帶玉佩丁當冠笏全孛术魯中羽子翬公在翰林時進講罷上問曰三教何者為貴對曰釋如黄金道如白璧儒如五糓上曰􅀂然則儒賤耶對曰黄金白璧無亦何妨五􅂖於世其可一日􅇅哉上大􅀃授時暦要法歌曰授時暦法君要知但以九年舊暦推古云但看九年兎望日便是今年正月一月大月小起􅀄一看其􅀄一天地支天不言干者為詩句所拘然㪯支以見干也當推九年前暦毎月􅀄一是何干支便以此干支依後法數去大月天干五支九且如大月天干五地支九假令􅀄一日甲子甲至戊五数也子至申九數也即以戊申為今月朔小月天四池八耦且如小月天干四地支八假令􅀄一日丙寅丙至巳四數也寅至酉八數也即以巳酉為今月􅃋古云前九之年起筭法大月五九小四八月大三十日無差如初一日巳酉数至次月翔見巳卯即月大也月小分明只廿九如月翔數至次月翔止廿九日即月小也節炁只慿九年暦假若造甲午年暦則看丙戌年莭炁二十四氣真端的要知今日莭炁則看前九年中是何莭炁天干三數地支七假如癸亥日癸見乙三数亥見己七數也熟記心中湏歴歴定時二十四年取逢時遇八君無慮如逢子時交節炁却用未時亦交也中炁如之若依此法箇中推方省隂陽玄奥䖏閏月本来中氣無古云閏月无中炁何勞物外更它圖世人諳得神仙術不是愚氓是丈夫又歌曰九年二月半便是正月一前九年二月十五日辰即今年正月􅀄一日辰該九十七箇半月二千八百八十日六甲轉四十八周只九年中取大小無差失又歌曰若要求立春相衝對食神假如前九年甲子日立春甲食丙子衝午即今年丙午日立春也二十四炁准此閏月無中氣􅀃與惺惺人又一法云古有數九九之語盖自至後起數至九九則春巳分矣正如至後一百六日爲寒食之􅀋豈特此爲然凡推筭皆有約法推閏歌括云欲知来􅀊閏先筭至之餘更看大小盡决定不差殊謂如來􅀊合置閏止以今年冬至後餘日爲率且如今年十一月二十二日冬至則本月尚餘八日則來年之閏當在八月或小盡則七月若冬至在上旬則以望月爲㫁十二日足則復起一數焉推節氣歌括云中氣與節氣但有半月隔若要知仔細兩時零五刻謂如正月甲子日子時􅀄􅀄刻立春則數至巳夘日寅時正一刻則是雨水節也推立春歌括云今􅀊先知来􅀊春但隔五日三時辰謂如今年是甲子日子時立春則明年合是己巳日夘時立春若夫刻數則用前法推之又求節氣歌曰驚蟄五時二刻求清明十時四刻流立夏一日三時六芒種一日九時周小暑二日二時二立秋二日七時四白露三日零六刻寒露三日六時至立冬三日十一二大寒四日四時四小寒四日九時六五日三時交新􅀊節遇子時加一日此為捷法君湏記又一年約法云一周年三百六十五日零三時一月節三十日零五刻二刻半月一氣十五日零二時五刻又食神定法云甲食丙乙食丁丙食戊丁食已戊食庚巳食辛庚食壬辛食癸壬食甲癸食乙其捷要但取我生之干陽配陽隂配隂是也又時刻約法歌云二十四氣漸差除循環時刻四同途單逢正四換􅀄一正三依舊復􅀄􅀄又乗除法推筭二十四氣時刻云其法不論何􅀊何月但以日爲百數時爲十數刻爲零數􅀄一至􅀄十於百上下數如遇􅀄十於千上下數假如正月十一日亥正一刻立春欲求中炁則先下一千一百數十一日故也􅂯下十二數亥時故也如子一丑二之􅁼復加一千五百二十五數共得二七三三則二十七日寅􅀄二刻雨水也何以知爲􅀄二刻盖零一數􅀄􅀄刻二數􅀄一刻三數􅀄二刻四數􅀄三刻五數正􅀄刻六數正一刻七數正二刻八數正三刻此立成法也今零三數是乃􅀄二刻矣欲求二月節則於前數上加一五二五即前一千五百二十五也此項數節炁中炁皆以之加用爲前正月小盡除去二十九日如遇大月除去三十日筭中炁則不除大小月剰下一三五八則十三日辰時正三刻驚蟄也餘倣此十二時爲一日如遇十三時刻以上則退十二時爲一日八爲一時如遇九刻以上則退八刻爲一時也執披賈釋云謂以塟時乘人故有柩車前執引者及在柩車傍執披者皆御治之又注云居柩車之前若道有位仰傾􅃜則以布為抑􅀭左右之節使執引者執披者知之也道有低謂下阪時也道有仰謂上阪時也傾􅃜謂道之兩邊在柩車左右轍有髙下也若道有低則抑下其布使執引者知其下阪也􅀂道有仰則􅀭舉其布使執引者知其止阪也若柩車左􅁁右􅁁或髙下傾􅃜亦左右布使知道有傾􅃜也假令車之東轍下則抑下其布向東使西􅁁執抜者持之􅀂車之西轍下則抑下其布向西使東􅁁執披者持之所以然者使車不傾􅃜也大夫御柩以茅諸􅀱以羽葆天子以纛指引前後左右皆如功布之施為也又旣夕禮􅀅塟啓肂音異也商祝免􅃝執功布入自西階注云功布􅁅治之布也執之以接神為有所拂㧍方罔反賈釋云拂㧍猶言拂拭也故下經云商祝拂柩用功布是拂拭去塵也此始告神而用功布拂拭謂拂拭去凶邪之氣也出聶崇義三禮圖錢唐陳鑑如以寫神見推一時嘗持趙文敏公真像来呈公援筆改其所未然者因謂曰唇之上何以謂之人中􅀂曰人身之中半則當在臍腹間盖自此而上眼耳鼻皆􅀟竅自此而下口暨二便皆單竅三畫陽三畫隂成泰卦也杭人削松木為小片其薄如紙鎔䟽黄塗木片頂分許名曰發燭又曰碎兒盖以發火及代燈燭用也史載周建徳六年齊后妃貧者以發燭為業豈即杭人之所製與宋翰林學士陶公􅂖清異録云夜有急苦於作燈之緩有知者批杉條染䟽黄置之待用一與火遇得􅆋穂然既神之呼引光奴今遂有貨者易名火寸按此則焠寸聲相近字之偽也然引光奴之名為新沈仲􅀃古姑蘇人年四十未有子其妻鄒氏􅀱其他適為置一年少貌羙之妾及歸命出拜􅀅以奉枕席仲􅀃詢其郷貫祖父来歴始不肯言詢之􅄪泣而曰妾范復􅀄女也父喪家貧老母見粥於此仲􅀃惻然淚下因嘱妻曰此女父吳中名士乃吾故人豈可以為妾當如已子視之即尋其母使擇壻仲􅀃備奩具嫁之􅀖人􅁛之至今不置夫嫁人之女之為妾為妓為娼者古有其人矣今則未聞也仲􅀃誠賢矣哉中書左丞李忠宣公徳輝字仲寳通州潞縣人至元七年庚午公為戸部尚書􅀊旱蝗世祖特命公録山西河東囚行至懐仁民有魏氏發得木偶持告其妻挟左道厭勝謀殺巳經數獄服詞皆具自以為不􅁈公燭其誣召鞠魏妾搒掠一加服不移晷盖炉其女君謂獨䧟以是罪可必殺之也即直其妻而杖其夫之溺愛受欺當妾罪死觀者神之或咨賞泣下姚忠肅公至元二十年癸未為遼東按察使武平縣民劉義訟其嫂與其所私同殺其兄成縣尹丁欽以成屍無傷憂懣不食妻韓問之欽語其故韓曰恐頂􅇟有釘塗其迹耳驗之果然獄定上讞公召欽諦詢之欽因矜其妻之能公曰􅀂妻䖏子邪曰􅂯醮今有司開其夫棺毒與成􅀋幷正其􅇳欽悸卒時比公為宋包孝肅公極云嘗聞諸翰林大老云古碑刻中單書國號曰漢曰宋者盖其建國號詔曰漢曰宋也我朝大元二字在詔旨不可單用又凡書官衘俱當從實如廉訪使總管之􅀋􅀂曰監司太守是乱其官制乆遠莫可考矣又􅂐盖二字止可施諸壙石若於碑湏曰􅂐額為是詹成者宋髙宗朝匠人雕刻精妙無比嘗見所造鳥籠四靣花版皆於竹片上刻成宫室人物山水花木禽鳥纎悉具備其細若縷而且玲瓏活動求之二百餘年来無復此一人矣劉湏溪先生㑹孟題蘇李泣别圖云事已矣泣何為蘇武節李􅁜詩噫馮海粟先生子振題楊妃病齒圖云華清宫一齒痛馬嵬坡一身痛漁陽鼙鼓動地来天下痛陳伯敷先生繹曽題楊妃上馬嬌圖云此索淸平調詞赴沉香亭時邪抑聞漁陽鼙鼓聲赴馬嵬坡時邪上馬固相似情状大不同觀者當審諸余觀三先生之䟦語痛快嚴峻抑揚感傷使後世之為人君而荒於色為人臣而失其節者見之寕不知懼乎張毅父先生千載廬􅁜人而宋丞相文公友也公貴􅂋時屢以官辟不就江南既内属公自廣還過吉州城下先生来見曰今日丞相赴北某當偕行既至燕寓于公囚所側近日以羙饌餽凡三載始終如一且潜製一櫝公受刑日即以蔵其首復訪求公之室毆陽氏於俘虜中俾出焚其屍先生收拾骸骨􅊞以重􅌩與先所凾櫝南歸付公家塟之後公之子忽夢公怒云繩鋸髮断明日啓視果有繩束髪其英爽尚如此劉湏溪紀其事􅐌子公􅀞像上曰間居忽忽萬古咄咄天風慘然如動生髮如何尋約亦念束髪豈其英爽猶累形軀同時之人能不顙泚昔忌其生今爐其死鄧中齋題曰目烱烱􅀆踈星暁寒氣欝欝􅀆晴雷殷山頭碎柱􅀆璧完血化碧􅀆心丹嗚呼曽謂斯人不在世間宋季年群亡頼子相聚乗舟鈔掠海上朱清張瑄最為䧺長隂部曲曹伍之當時海濵沙民富家以為苦崇明鎮特甚清嘗傭楊氏夜殺楊氏盗妻子貨財去若捕急輙引舟東行三日夜得沙門島又東北過髙句麗水口見文登夷維諸山又北見燕山與碣石往來若風與􅀑影迹不可得稍怠則復來亡慮十五六返私念南北海道此固徑且不逢淺角識之杭吴明越楊楚與幽薊莱宻遼鮮俱岸大海固舟航可通相􅀓朐山海門水中流積淮淤江沙其長無際浮海者以竿料淺深此淺生角故曰料角明不可度越云廷議兵方興請事招懐奏可清瑄即日來以吏部侍􅀰左選七資最下一等授之令部其徒属為防海民義隷提刑節制水軍江南既内附二人者從宰相入見授金符千户時方輓􅈇東南供京師運河隘淺不容大舟不能百里五十里輒為堰潴水又絶江淮遡泗水吕梁彭城古稱險䖏㑹通河未鑿東阿荏平道中車運三百里轉輸艱而糜費重二人者建言海漕事試之良便至元十九年也上方注意嚮之􅀄年不過百萬石後乃至三百萬石二人者父子致位宰相弟姪甥壻皆大官田園宅館徧天下庫蔵倉􅁃相望巨艘大舡帆交蕃夷中輿􅀐塞隘門巷左右僕從皆佩於莵金符為萬户千户累爵積貲氣意自得二人者既滿􅄹父子同時夷􅓍殆盡􅃿貲産縣官黨與家破禁錮大徳六年冬也見胡石塘先生所撰何長者傳陳子方閔仲逹同舍生也皆待次杭府史陳月日在前閔以計力反先之陳殊無怒意因赴都以薦舉入仕厯官浙西㢘訪司僉事閔方陞書吏聞陳来嘆曰復何面目見之遂稱疾不出陳下車即問左右曰閔仲逹何在衆以疾對陳曰必為我故非疾也亟造其家閔皇恐出肅陳曰吾與君氣誼契厚君昔先我而食禄者命也使非此吾又能致是耶今幸同一公署惟有以教正之幸甚寕舍我與閔感激􅀙事相好如􅀄吾鄉周待制先生仁榮字本心築一室􅅻落成友人楊公道輿疾至門曰願假君新宅以死先生譲正􅆍居之妻子咸不然先生弗頋未㡬楊死箱財廿八莫有主者楊之弟詣先生求分財先生􅀂兄􅀉死扵我意固在是丧事之費自巳出終不利其一毫對衆封藉自平陽呼其子来悉付與之福州鄭丞相府清風堂石階上有卧屍迹天隂雨時迹􅀹顕盖其當宋季以暮年登科未㡬拜相至令閭巷表之曰􅂄徳魁輔之坊鄭顕時侵漁百姓至奪其屋廬以廣居宅有􅀍逼抑者遂自殺於此今所居為官埶豪奪子孫不絶如綫因記宋臨川吴曽能改齋漫録云建炎四年五月楊勍叛卒由建安冦延平道出小常村掠一婦人逼脅欲犯之婦人毅然􅊎死不受汚遂遇害横屍道傍賊退人為􅀵瘞之而其屍枕藉處痕迹􅀮然不㓕每雨則其迹乾晴即溼宛如人影徃来者莫不嗟異郷人或削去之隨即復見覆以它土而其迹愈明今三十年矣與順昌軍貟范旺事畧同但范現迹街碑而此現於土上耳范死以忠婦死以莭小常村去劒浦縣治二十里以漫録言之則二人之死足以驚動萬世宜其英烈之氣不泯如此􅀂清風堂者不過􅁈抑之志不伸以决絶於一時耳亦何為而然㢤豈幽憤所積結致是邪此理殆不可曉翰林學士盧踈齋先生摯字䖏道涿郡人坐右銘大書一天字其下細註六字云有記性不急性可謂知畏天者也杭瑪瑙寺僧温日觀能書所畫蒲萄須梗枝葉皆草書法也􅒏􅄝酒然楊総統飲以酒則不一沾唇見輙罵曰掘墳賊掘墳賊云李仲謙思譲滕州鄒縣人前至元間由嘉興路吏貟􅀘浙西按察司書吏廉介有為上侍父母下撫兩弟每退食自公則閉户讀書稽今考古而教訓之俸薄奉養不給婦躬紡績以益薪水之費仲謙止有一布衫或湏浣濯􅀘紉必俟休假日至是􅀂賔客見訪則俾小子致謝曰家君治衣弗可出雷彦正號苦齋者清正慎許可人也時為使偶戯謂曰外郎穿布衲到敢裹著珍珠仲謙畧不荅徐至本案書冩辤退呈状壓几上而歸使知深悔失言親謁謝過請其出終不􅁢使去它使来復往請始復役後仕至憲官至元三十一年甲午􅀊節氣正月一日壬子立春二月二日癸未驚蛰三月三日癸丑清明四月四日甲申立夏五月五日甲寅芒種六月六日乙酉小暑七月七日乙夘立秋八月八日乙酉白露九月九日丙辰寒露十月十日丙戌立冬十一月十一日丁巳大雪十二月十二日丁亥大寒武林錢思復先生惟善嘗言年十六七時以詩見息齋李公扵州橋寓居既拜公公荅拜命坐辤之􅄪公曰仲尼之席童子隅坐因不敢辭徐永之先生為江浙提舉日客徃訪之者無間親䟽貴賤必送之外門外客或請納歩則曰不可婦人送迎不踰閾右二事可見前軰諸老謙恭退抑汲引後進待人接物者如此白廷玉先生珽號湛淵錢唐人家多竹忽一竿上岐為二人皆異之賦双竹杖詩未幾先生殁先生有二子或以為先兆云􅀯村輟耕録卷之五
