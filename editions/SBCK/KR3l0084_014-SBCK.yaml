front:
  text: 南村輟耕録卷之十四
  hash: sha256:88b694ad5e3a28d58d9815d553d4b901523240c7463060df6c0b9226a59285b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_014-1a}
body:
  text: 天台陶宗儀九成蕭景茂漳州龍溪隔洲里人儒而有文以謹厚信於鄊里仍至元間漳㓂亂景茂率鄊人立柵保險堅不可破㑹㫄里有人導之從間道入景茂􅀍執賊便拜曰汝賊也何拜賊欲脅之降以從民望景茂罵曰逆賊國家何􅀒汝而反汝族汝里何􅀒汝而坐累之賊相語曰吾殺官軍􅀅吏多矣至吾砦皆愞靡求生未有若此餓夫之倔彊者察其志終不為吾用留之秪取辱耳遂縳之於􅀣刲其􅁏使自㗖之且嚼且罵曰我食我􅁏無若汝賊行􅀅萬叚狗彘棄不食賊怒絶其舌而死又江州路總管李黼字子威汝寜人泰定丁卯狀元及第至正十年庚寅來守是郡政修民和明年辛卯夏五月紅巾㓂逼淮西公即甲告江西行省以謂九江為䂊章藩屏之地蘄黃乃九江唇齒之􅀖不可不早為進兵守護或者非其過慮公乃張文􅖑以諭民曰為臣死忠為子死孝在黼之分惟知盡死守􅁟而巳􅀁謂城存與存誠亡與亡者也聞者悚然秋九月㓂侵蘄黃属邑公復上言冝速乗機進援苟淮西失守長江之險與彼共之非所恃矣行省不報既而蘄州䧟冬十月黄州䧟十一月二十五日行省平章秃堅不花奉中書省命領兵至公極陳攻守之䇿秃堅不花以隄􅇱把截為辭越明年壬辰春正月􅀄二日行省右丞孛羅帖木児奉總兵御史大夫領樞宻院也先帖木児命領兵進攻淮西亦来屯駐逗遛不前十四日武昌䧟十六日藩王大臣官民舟航蔽江而下我民觧散十九日秃堅不花孛羅帖木児皆遯之僚佐司属􅊖為一空公亟發􅅒振民收召士卒數日稍輯機務繁􅇵不遑􅆍食以三十三日卧病然猶扶􅉵乗肩輿領兵出境行省以公忠誠昭著授本省叅知政事行江州南康路軍民都摠管便宜行事二月􅀄九日秃堅不花懼臺憲公議自三山移兵入城十一日㓂忽至城下甘棠湖縱火焚西門公立城上身當矢石秃堅不花從北門遁去日中執益熾分衆攻北門城遂䧟公猶執鐵檛指揮左右迎􅀾衆驚潰公􅀍執脅以刄不肻降口罵不絶聲遂殺之姪男秉昭亦遇害􅀄武昌䧟時公謂子秉方曰我國之守臣當死此土汝可奉母徃下江依伯父以存吾後秉方曰父死國子死父有何不可公怒曰汝不遵命是不孝也秉昭亦告其兄曰兄不去則叔父無後不孝莫大於是其當與叔父同死生矣兄無慮焉秉方不獲巳買舟奉母夫人行舟次何家堡遅留不忍捨公聞之手批責以大義遂去不半月公死又江浙行省叅知政事樊執敬字時中鄆人是年秋七月􅀄十日紅巾自徽犯杭時公守􅀫衛于省有報巳入北関門省吏皆次第引去公獨􅀍甲上馬率宿衛兵急出省􅀅捄関從者止之公曰吾封彊之守不守而去是以私利廢臣道行至清河坊口遇它走􅀅又以兵孤且散控其馬首返公怒引佩刀斫其人曰城不守何適遂躍馬逆戰以死死時猶嚼齒罵不絶聲死之所則天水橋也又福寕州尹王伯顔字伯敬濵州人由湖廣行省知印歴官至兹任撫字多方政教大行是年春除福建塩運司同知􅀅行㑹鄰境賊衆埶頗張州民群擁馬前拜且泣曰公吾之父母豈容舎我去方今兵戈蠭起公去吾民􅀅孰頼父老千餘人詣上司乞留公遂復留至秋賊衆自邵武間道迫福寕公募民兵得一千五百餘人為守禦俻冬十一月庚辰賊進至青皎屯楊梅嶺公與中子相引兵直扺其營與戰破之既而益衆復進我兵僅千餘人乃分為二道拒之公為五百人還守州治壬午賊衆萬餘平旦攻西門衆寡不敵吏卒奔潰公獨身奮以死自誓俄馬中流矢遂為賊所執其魁首王兼善者謂曰聞公㢘能著稱欲屈再尹此州公厲聲叱曰我天子守臣義當殺賊不幸敗有死耳魁怒令公跪公曰此膝豈跪賊耶魁益怒令左右毆之公曰我為人臣當為國死乃嚙舌出血噴其面罵曰殺我即殺毆何也然可殺我不可害吾民官軍旦暮旦至殺尓等無噍􅀋矣㑹其執逹魯花赤阿撒都刺至責之曰汝何得與王尹同起兵拒我阿撒都刺股慄口噤不能對公曰吾義當起兵殺賊何名拒汝因大罵不絶口且曰我死當為神以殺汝曹魁大怒遂害之臨死色不變立而受刃頚㫁㣲有血如乳時年七十矣子相亦􅀍執魁欲官之相曰汝逆吾君又殺吾父義不共戴天我忠臣子詎能事賊邪魁知不可屈亦殺之相妻潘氏逃民間有惡少欲亂之不從執獻魁潘慟哭曰吾既失所天義豈受辱乃絶不飲食及其二㓜女皆死又溧陽儒學教授林夢正字古泉吾郷人中書以著述薦得官是􅀊賊衆㓂溧陽獲其魁張某先生問曰尓何人也應曰我父為軍千戸紅巾入境逼我父為帥父以年老不堪從事令我代先生痛罵之曰尓之父祖世為囯家臣子而尔忍偽邪既而其執復盛竟奪張去下令曰生得林教授者有賞先生匿它䖏􅊧得張曰前日罵我者非尓邪先生曰然張曰降我則俾亦為元帥同享富貴先生曰尓偽也我何為降􅂯三終不屈縳手􅀣不觧衣冠而殺之又江浙行省員外􅀰楊乗字文載濵州人蚤為天官小史辟中書叅議􅁺歴官至􅂖城介休二縣尹拜監察御史擢今任是年杭州䧟公與􅀰中赫徳尓王仲温貟外月忽難都事張鏞俱坐黜公退居松江之青龍鎮後御史臺以公等職在􅐌理不當罪宜復其官爵上之事遂白十六年丙申淮西䧟平江連䧟松江秋七月十八日遣所署官呉縣丞張經等賷禮幣造請公遣人告曰吾廢䖏田里乆不足以蓐使者吾當擇日受命請以幣置里門外經等如其言公命子卣卓具牲醴告祖禰既竣事復命酒飲逮暮起行後圃中頋西日晴好慨然日晚節如是足矣命卣等治畦䖏置家事如平日撫其孫虎林􅀂怡怡自得也帰坐至夜分二子立侍命曰二子行且休吾􅀅就寝公儉約無􅁎侍其燕息寝䖏人莫得與俱詰且卣等恠寝門未啓發視之則公巳自經得手書遺語大意言死生晝夜之理且以得存晚節為快又西臺監察御史張公謝職居確山縣縣䧟賊賊魁者素聞公有治績置公上坐脇之受偽官公唾罵之遂􅅞公妻孥九人至前先殺妾次殺子女以及妻毎殺一人則諭公曰御史􅀂降餘可免公弗為動容其罵如􅀄魁怒拽下坐殺之此在至正辛夘秋八月間公諱桓字彦威南村野史曰天下之事戰争十有餘年于兹矣為臣辱國為􅀅辱師敗降奔􅇡不可勝計甚者含詬忍耻偷生冐荣以為得志名節大閑一蕩去弗顧求其忠義英烈於千百之中莫克什一咦忠義英烈雖岀於天性要亦講之有素䖏之甚安故於造次顛沛之際决然行之而無疑如李總管黼王州尹伯顔樊叅政執敬張御史桓林教授夢正蕭䖏士景茂之殺身成仁視死如帰是必講之熟而䖏之當一旦出於人所不肎為遂以驚動天下而精英忠烈之氣在宇宙間與嵩華相髙者自不容泯若桓之居在閒地乗之乆坐廢黜夢正之分顓講教視握􅀅帥之權受民社之託任大而責重者有間矣一皆􅀙容就義是尤難也景茂里中一儒生耳􅀄未嘗得斗升之禄以養其父母尺寸之組以荣其身始扵保民終扵報国臨大節而不可奪古􅁛烈丈夫又豈能過是與至於子為父死婦為夫死聲光赫奕照映史冊使百世而下知綱常大義之不可廢天理人心之不可㓕如此其有功扵名教為何如是亦􅀷仁厚澤􅆂養所致孰謂百年之國而無人哉􅄟鶴銘華陽真逸譔上皇山樵鶴壽不知其紀也壬辰􅀊得於華亭甲午􅀊化於朱方天其未遂吾翔廖廓邪奚奪之􅃍也迺衷以玄黄之幣蔵乎兹山之下仙家無隱我故立石旌事􅂐銘不朽詞曰相此胎禽浮丘著經乃徴前事我傳尓銘余欲無言尓其蔵靈雷門去皷華表留形義惟仿彿事亦微􅄀尓􅀅何之觧化惟寕後蕩洪流前固重扄右割荆門未下華亭奚集真侣􅄟尓作銘丹陽外仙尉江隂真宰右刻在鎮江焦山下頑石上潮落方可模相傳為􅀳王右軍書帷宋黄睿東觀餘論云為陶隱居書良是其曰今審是文格字法殊􅀋陶弘景弘景自别華陽􅀮居今曰真􅇣者豈其别號與又其著真誥但云已卯􅀊而不著年名其它書亦尓今此銘壬辰􅀊甲午歳亦不書年名此又可證云壬辰者梁天監十一年也甲午者十三年也按􅀮居天監七年東㳺海嶽權駐㑹稽永嘉十一年乙未􅀊始還苐山其弟子周子良仙去爲之作傳即十一年十三年正在華陽矣後又有題丹陽尉江隂宰數字當是效陶書故題於石側也王􅇣少以􅀳惠帝大安二年癸亥􅀊年五十九至穆帝升平五年辛酉􅀊卒則成帝咸和九年甲子􅀊􅇣少方年三十二至永和七年辛卯􅀊年三十八始去㑹稽間居不應三十二􅀊巳自稱真􅇣也又未官於朝及閒居時不在華陽以是考之决非王右軍書也審矣毆陽文忠公以為不􅀋王右軍法而􅀋顔魯公又疑是顧况云道號同又疑王瓉皆非睿字長􅐐號雲林子邵武人又童逌書跋苐六卷載南陽張舉子厚所記云􅄟鶴銘今存於焦山凡文字句讀之可識及􅀧畫之僅存者百三十餘言而所亡失㡬五十字計其完書盖九行行之全者二十五字而首尾不預焉熈寕三年春余索其逸遺餘焦山之隂偶得十二字於亂石間石甚迫隘偃卧其下然後可讀政昔人未之見而世不傳其後又有丹陽外仙江隂真宰八字與華陽真􅇣上皇山樵為傳是真侣之號今取其可考者次序之如此又董君自書其後云文忠集古録謂得六百字今以石校之為行凡十八為字二十五安得字至六百疑書之誤也余於崖上又得唐人詩詩在真觀中巳列銘後則銘之刻非顧况時可知集古録豈又并詩繫之邪君字彦逺號廣川東平人又國朝鄭枃衍極苐二卷論􅄟鶴銘而劉有定釋云潤州圖經以為王羲之書或曰華陽真逸顧况號也蔡君謨曰􅄟鶴文非􅇣少字東漢末多善書惟隷最盛至於􅀳魏之分南北差異鍾王楷法為世所尚元魏間盡習隷法自隋平陳中國多以楷隷相叅􅄟鶴文有楷隷筆當是隋代書曹士冕曰焦山􅄟鶴銘筆法之妙為書家冠冕前軰摹其字而不知其人最後雲林子以為華陽隱居為陶弘景及以句曲所刻隱居朱陽館帖叅校然後衆疑釋然其鑒賞可謂精矣以余考之一本山撨下有書字真宰下有立石二字一本我傳尓銘作出於上真尓其蔵靈作紀尓􅀊辰張􅘏本作丹陽外仙邵亢本作丹陽仙尉文有作丹陽外仙尉者且中間詞句亦多先後不同尚俟挐舟過􅀭子手自模印以稽其得失之一二可也吾鄕柯敬仲先生九思際遇文宗起家為奎章閣鑒書􅀶士以避言路居呉下時虞邵菴先生在館閣賦風入松長短句􅀉􅀶士云畫堂紅䄂􅀝清酣華髮不勝簮㡬回晚直金鑾殿東風軟花裏停􅆖書詔許傳宫燭香羅􅀄剪朝衫御溝冰泮水挼藍飛燕又呢喃重重簾幙寒猶在憑誰􅀉銀字􅅺緘報道先生歸也杏花春雨江南詞翰兼羙一時争相傳刻而此曲遂徧滿海内矣剪一作試睦人邵玄問先生准子甞作忍黙恕退四卦掲之坐隅真得保身慎言絜矩知止之道者矣其忍卦曰忍亨􅀄難終吉利君子貞不利小丈夫􅂏曰忍剛發乎内柔制乎外故亨􅀄􅀂甚難乃終有􅁻唯君子為能動心忍性不利小丈夫其中淺也象曰忍在心上忍君子以含容成徳􅀄一小不忍則亂大謀象曰小不克忍成大亂也次二必有忍其乃有濟象曰能忍于中事克濟也次三一朝之忿亡其身以及其親象曰一朝之忿至易忍也亡身及親禍孰大也次四出于􅘳下以成漢功韓信以之象曰􅘳下之辱小辱也成漢之功大功也次五張公藝九世同居書一忍字以對于天子象曰同居之義忍克致也積而九世有容徳也上六血氣方剛戒之在闘象曰方剛之氣忍則滅也形而為闘自求禍也其黙卦曰黙无咎可貞不利有所言􅂏曰黙不言也亂之所生也則言語以為階是以君子慎宻而不出故无咎黙以自守其道可貞也不利有所言尚口乃窮也象曰口尚玄曰黙君子以去辨食静􅀄一守口如缾終􅁻象曰守口如缾謹所出其􅀄能黙終則吉也次二多言不如守中象曰言不如黙得中道也次三駟不及舌有悔象曰駟不及舌滕口􅀃也一言之失悔何追也次四無以利口亂厥官卿士戒之象曰位高而言䡖亦可戒也次五聖人之教不言而信象曰不言而信淵黙之化也上六君子之道或黙或語象曰時然後言黙不可長也其恕卦曰恕有孚終􅁻􅂏曰恕之為道善推其所為而巳以巳之心合人之心巳所不欲勿施於人故有孚能以一言終身而行之其􅁻可知矣象曰如心恕君子以明好惡同物我􅀄一强恕而行求仁莫近焉象曰强而行之恕之始也行而不巳違道不逺也次二君子有絜矩之道象曰絜矩之道始也次三好人之所惡惡人之所好是謂拂人之性菑必逮夫身象曰拂人從欲身之菑也次四已欲立而立人巳欲逹而逹人象曰立而逹恕以從人也次五聖人與衆同欲象曰與衆同欲聖人之恕也上六責巳重以周待人輕以約象曰待人之法可用恕也責巳之道不可自恕也其退卦曰退勿用有攸徃􅂏曰退止也勿用有攸徃知止也日中則退而􅉴月盈則退而􅃜四時之運成功者退而况於人乎退之時義大矣哉象曰艮止其所退君子以晦蔵於宻􅀄一退无咎象曰其進未銳義无咎也次二難進易退象曰難進易退可事君也次三兼人凶象人之凶勇不知退也次四見可而進難而退象曰知難而退終無尤也次五終日如愚以退為進顔子以之象曰顔子之退進不可御也上六蝜蝂升高躓而不悔象曰蝜蝂升高其道竆也躓而不悔亦可戒也文章用事填塞故實舊謂之􅀧􅀑録又謂之堆垜死屍見江氏􅀋􅁐今人以邪僻不􅀴之術如運氣逆流采戰之􅀋曰房中術按史周有房中樂漢書禮樂志髙祖時有房中詞樂唐山夫人所作武帝時有房中歌又云房中者情性之極至道之際是以聖王制外樂以禁内情而爲之節文樂而有節則和平壽考及迷者弗頋以生疾而隕性命禮記曽子問衆主人卿大夫士房中皆􅂘注房中婦人也然房中之謂豈取此二書與娘字俗書也古無之當作嬢按􅀃文煩􅅰也肥大也从女㐮聲女良切其義如此今乃通爲婦女之稱故子謂母曰娘而世謂穩婆曰老娘女巫曰師娘都下及江南謂男覡亦曰師娘娼婦曰花娘逹旦又謂草娘苗人謂妻曰夫娘南方謂婦人之無行者亦曰夫娘謂婦人之卑賤者曰某娘曰㡬娘鄙之曰婆娘考之風俗通漢何敞為􅄦蘇珠娘按誅亭長龔壽隋書􅅊世康為絳州刺史與子第書云况娘春秋巳髙温清宜奉教坊記北齊時丈夫著婦人衣行歌㫄人齊和云䠌謡娘南史梁元徐妃與帝左右暨季江私通季江曰徐娘雖老尚猶多情又梁臨川王宏侵魏魏遺以巾幗歌曰不畏蕭娘與呉姥但畏合肥有􅅊虎謂􅅊叡吕僧珍也大業拾遺隋煬帝宫婢曰雅娘唐史張旭草書見公孫大娘舞劒器而通神又武承嗣聞喬知之婢窈娘羙奪取之杜工部詩耶娘妻子走相送又黃四娘家花滿蹊白樂天詩呉娘暮􅀨蕭蕭曲􅅊應物詩春風一曲杜􅅊娘栁子厚下塲女墓磚記始名和娘樂府雜録張紅紅唱􅁔丐於市􅅊青納為􅁎敬宗召入宫號記曲娘又望江南曲始自朱崖李太尉鎮浙西日為􅁎謝秋娘所製明皇雜録􅁛白鸚鵡為雪衣娘甘澤謡武三思晚獲一妓曰綺娘狄仁傑至遂逃璧􅂩中曰我上天花月之妖也樊川集杜秋娘年十五為李錡妾錡敗入宫後主譴歸故里又竇桂娘父良建中􅀄為汴州户曹李希烈破汴州取桂娘去李賀集賀撰申胡子觱栗歌成朔客喜擎觴起立命花娘出幙徘徊拜告劉賔客集泰娘本􅅊尚書家主謳者河東記唐進士叚何卧病遇妊娘留詩而愈傳竒崔氏鸎鸎婢曰紅娘霍小玉傳長安中有媒氏鮑十二娘薛蒼駙馬青衣也余媚娘叙録陸希聲娶余媚娘媚娘約媒曰陸􅀰中􅀂必得児侍巾櫛湏立誓不置側室及女奴圖經蠶神謂之馬頭娘杜陽雜編南海貢其女盧媚娘工巧無比麗情集陳敏兄妾越娘貌羙兄死遂與欵狎續齊諧記齊頴寓山隂夜見前宰妾萬女娘墨荘漫録李后主令宮媚窅娘以帛繞脚令纎小右畧舉一二不能悉載是則今之云云皆有􅀁本然都下自庶人妻以及大官之國夫人皆曰娘子未嘗有􅁛夫人郡君等封贈者載考之史隋柴紹妻李氏起兵應李渊與紹各置莫府號娘子軍唐平陽公主兵與秦王定京師號娘子軍花蕊夫人宫詞諸院各分娘子位韓昌黎有􅀕周氏二十娘子文以此推之古之公主宫妃已與民間共􅁛娘子則今之不分尊卑亦自有來矣至正壬辰春城平江於古城基内掘得一碑其文云三十六十八子寅卯年至辰巳合收張翼同為利不在常不在􅀭切湏欵欵細思量且卜水莫問米浮圖倒地莫扶起修古岸重開河軍民拍手咲呵呵日出屋東頭鯉魚山上逰星從月裏過㑹在午年頭右不曉所言何事姑識之或者以為三十六四九也張翼巳午之交也今張大尉苐行九四而同首亂者適十八人即十八子也豈其然與今世女子之笄曰上頭而倡家䖏女􅀄得薦􅆍於人亦曰上頭花蕊夫人宫調年􅀄十五最風流新賜雲鬟使上頭又天癸曰月事黄帝内􅀴女子二七而天癸至月事以時下又曰女子不月史記濟北王侍者韓女病月事不下診其腎脉嗇而不属故曰月不下又程􅁎有􅀁避不願進注天子諸侯群妾以次進御有月事者止不御更不口􅀃故以丹注面目的的為識令女史見之王察神女賦施玄的的即上􅀁云也然入月二字尤新王建宫詞宻奏君王知入月喚人相伴洗裙􅅂至正乙巳春平江金國寳䄂人腊出售余獲一􅀚其形長六寸許口目耳鼻與人無異亦有髭髯頭髪披至臀下湏髪皆黄色間有白髪二根徧身黄毛長二分許臍下隂物乃男子也相傳云至元間世皇受外國貢獻以賜國公阿你哥者無㡬何時即死因剖開背後剜去腸蔵實以它物仍縫合烘乾故至今無恙按漢武故事東郡送一短人長七寸名巨靈神異經西海有一鶴囯人長七寸山海經有小人囯名靖人詩含神雾東北極曰人長九寸殆謂此小人也靖或作竫音同然古尺短今六寸比之周尺􅀅九寸矣則所腊者豈其人與天子臨軒授鉞頻東南無地不紅巾鐵衣逺道三軍老白骨中原萬􅄦新義士精靈虹貫曰仙家談􅀏海􅀭塵都􅀅兩眼凄凉淚􅂘盡平生㡬古人此至正辛丑間張蛻菴承旨翥在都下􅀉浙省周玉坡叅政伯􅄾詩也夫翰􅁐詞臣而寓言如此則感時之意從可知矣南村輟耕録卷之十四
