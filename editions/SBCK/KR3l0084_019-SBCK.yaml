front:
  text: 南村輟耕録卷之十九
  hash: sha256:73275fcff4b8b6c1c2deb689a0a8c9c75756c07093171209d72d82763e107e86
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_019-1a}
body:
  text: 天台陶宗儀九成人禀天地五行之氣以生手三陽三隂足三陽三隂合為十二􅀴以環絡一身徃来流通無少間断其脉應於兩手三部焉夫脉者血也脉不自動氣實使之故有九候之法内􅀴云脉者血之府􅀃文云血理分􅏨行軆者从􅏨从血亦作脉通釋云五蔵六府之氣血分流四體也釋名云脉幕也幕給一體字从肉从􅏨􅏨音普拜切水之邪流也脉自从􅏨取脉行之象無求子云脉之字从肉从􅏨又作爬盖脉以肉為陽衇以血為隂華佗云脉者血氣之先也氣血盛則脉盛氣血衰則脉衰血􅀬則脉数血寒則脉遲血微則脉弱氣血平則脉緩晋王叔和分爲七表八裏可謂詳且至矣然文理繁多學者卒難究白宋淳熈中南康崔子虚􅀮君嘉彦以難􅀴於六難專言浮沉九難專言遅数故用爲宗以統七表八裏而搃萬病其􅀃以爲浮者爲表爲陽外得之病也有力主風無力主氣浮而無力爲芤有力爲洪又沉爲實沉者爲裏爲隂内受之病也有力主積無力主氣沉而極小爲微至骨爲伏無力爲弱遲者爲隂主寒内受之病也有力主痛無力主冷遲而少駃爲緩短細爲濇無力為濡数者為陽主􅀬外得之病也有力主􅀬無力主瘡数而極弦為緊有力為弦流利為滑它若九道六極之殊三焦五蔵之辨與夫持脉之道療病之方其間玄妙具在四脉玄文及西原脉訣等書世以為祕授始由􅀮君傳之劉復真先生先生傳之朱宗陽錬師鍊師傳之張玄白髙士今徃徃有得其法者學者其求諸俗稱四司六局者多不能舉其目古杭夢㳺録云官府貴家置四司六局各有所掌故筵席排當凡事整齊都下街市亦有之常時人户每遇禮席以錢倩之四司六局皆可致四司者帳設司厨司茶酒司臺盤司也六局者果子局􅁡煎局菜􅂼局油燭局香薬局排辦局也凡四司六局人祗應慣熟便省賔主一半力愽古圖宋徽廟朝所脩書故世知有􅀶古之名而不知更有稽古等閣蔡京保和殿曲燕記云宣和元年九月十二日皇帝召臣京等燕保和殿臣鯈等東曲水朝於玉華殿上歩西曲水循酴醿至架太寜閣登層峦林霄騫鳯垂雲亭始至保和殿三楹楹七十架兩挾閣中楹置榻東西二間列寳玩與古鼎彛器玉在挾閣曰妙有設古今儒書史子楮墨右曰日宣道家金櫃玉笈之書與神霄諸天􅀮文上歩前行稽古閣有宣王石鼔歴􅃉古尚古鑑古作古傳古􅀶古袐古諸閣蔵祖宗訓謨與夏啇周尊彛鼎鬲爵斚卣敦盤盂漢晋隋唐書畫多不知識上親指示為言其㮣今人以善能營生者為經紀唐􅅬王元嬰與蔣王皆好聚歛太宗甞賜諸王帛敕曰􅅬叔􅃽兄自能經紀不須賜物韓昌􅀺作栁子厚墓志云舅弟盧遵又􅀅經紀其家則自唐已有此言世斥貪利之人必曰汝便是龐居士矣盖相傳以為居士家資巨萬殊用勞神竊自念曰若以與人又􅂲人之我若不如置諸無何有之鄊因輦送大海中舉家脩道縂成證果又以為居士即㐮陽龐德公釋氏傳燈録龐居士傳云㐮州居士龐藴者衡州衡陽縣人也字道玄世本業儒志求真諦徳宗貞元初謁石頭遷禅師豁然有省後叅馬祖問不與萬法為佀者是甚麽人荅曰待汝一口吸盡西江水却向汝道遂於言下頓悟玄旨乃留駐叅承有偈曰有男不婚有女不嫁大家􅇛欒頭共􅀃無生話元和六年北遊㐮漢隨䖏而居女􅂕照賣竹鹿籬以供朝夕􅀅入滅謂曰視日早晚以報靈照􅃍曰日巳中矣而有蝕也居士出户􅀚視即登父座合掌坐亡居士曰我女機鋒捷矣更延七日州牧于公頔聞之來問居士謂曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖枕公􅂰而化龐婆走田中謂其子龐大曰汝父死矣龐大曰嗄􅀝鉏脫去婆為焚燒畢自後莫知其所按此傳知非龐徳公明矣但亦不言其富何耶輦財之􅀃特恐後人所傳㑹耳然今之積金蓄榖倍息計贏校斗斛合􅕛詐欺不得自休息又否則射歉飢彂積授枚識出布籌㑹入窮日疲極而睡者能以居士之事便作真想豈不為飬生之福哉鄭遂昌言宋巨璫李太尉者國亡為道士號梅溪余童時甞侍其游故内指􅀧歴歴如在過葫蘆井揮涕曰是盖宋之先朝位上釘金字大牌曰皇帝過此罰金百兩近周申父言先表叔祖金二提舉住杭州暗問其室氏乃宋内夫人余年十四五尚猶識之但兩鬂俱秃問知在宫中任此職者例褁巾巾帶之未各綴一金錢每晨用以掠髮入巾故乆而致然也因曰吾為内夫人日每日輪流六人侍帝左右以􅁓一畨從後端起筆書帝起居旋書旋卷至暮封付史館内夫人别居一宫宫門金字大牌曰官家無故至此罰金一鎰以二者言之可見宋朝家法之嚴至至乙酉冬朝廷遣官奉使宣撫諸道問民疾苦然而政蹟昭著者十不二三明年秋江右儒人黃如徵邀駕上書指数散散王士宏等罪状且及國家利害斧􅃏在前有所不避古之所謂豪傑之士如徵其人者與天子親覽其書喜見于色又虞如徵必為􅁠豪所中頋近臣館榖以俟越数日特授江西等䖏儒學提舉􅃙侍衛護送出都如徵感上徳意受命而不領職天下共賢之散散王士宏等雖免譴責終以不顯死其書畧曰江西布衣書生黄如徴百拜上書皇帝陛下如徴忝生僻土遭遇明時用竭愚􅂨冐干天聽伏望采覽萬一焉夫皇朝版圖之廣歴古所無法制之良萬世莫易而水旱灾変連年不息者實由官皆汙濫民悉怨咨之所致也欽惟陛下憂民之心日夕孜孜遂於去年冬分遣大臣奉使宣撫諸道正欲其察政事之􅆇否問生民之疾苦禮賢德振貧乏信􅁈抑起淹􅆡俾所至之䖏如陛下親臨焉苟能宣布聖澤各盡乃職則雍熈㤗和之治政在今日然江西福建一道地䖏蠻方去京師萬里外傳聞奉使之來皆若大旱之望雲霓赤子之仰慈母而散散王士宏等不體聖天子撫綏元元之意鷹楊虎噬雷厲風飛声色以淫吾中賄賂以緘吾口上下交征公私朘剥􅂍吏貪婪而不問良民塗炭而罔知閭閻失望田里寒心乃歌曰九重丹詔頒恩至萬兩黄金奉使回又歌曰奉使來時驚天動地奉使去時烏天黒地官吏都􅌚天喜地百姓却啼天哭地又歌曰官吏黒􅃮皮燈籠奉使来時添一重如此怨謡未能枚舉皆萬姓不平之氣欝結于懐而彂諸声者然也此盖廟堂遴選非人使生民感陛下憂恤之虚恩受奉使掊剥之實禍陛下於此而不察􅀅何以取法於後世哉如徵無官守無言責所以不惮江河之險不畏斧􅃏之誅而詣闕以陳其事者政􅂲散散王士宏等回覲之日各飾巧言妄稱官清民泰欺詐百端昏蔽主聦陛下不悟為姦邪所賣擢任省臺恣行威福流毒四海則江西福建一道之痛苦與天下共之以此而望隂陽和風􅀨時年􅀊登􅁁隅静不亦難乎倘陛下不棄蒭蕘之言委官察其實蹟責以欺天罔民之罪􅄬諸遐荒雪江西福建一道之痛苦以為百官􅂆則天下幸甚萬世幸甚如陛下以為誹謗大臣置而不問非惟今日禍起䔥墻抑且天下萬世之不幸矣如徵鄙語俗言不知避諱觸犯清蹕罪在不赦請伏鑕以俟命吾郷錢叔琛氏贇乃武粛王之諸孫也其家在郡城東北隅亭臺沼沚聮絡映帯猶是先朝賜第與余相友善甞出示所藏鐡劵形宛如瓦髙尺餘闊一尺許劵詞黄金商嵌一角有斧痕盖至元丙子天兵南下時其家人竊負以逃而死於難劵亦莫知所在越再丙子漁者偶網得之乃在黄岩州南地名澤庫深水内漁意寳物試斧擊之則鐡焉因棄諸幽一村學䆒與漁隣頗聞賜劵之􅀃買以鐡價然二人皆不悟其字乃金也有報於叔環之兄者用十斛榖易得青氊復還誠為異事時余就録劵詞一通叔琛又出武肅當日謝表藁併録之昨晚檢閲􅀴笥偶得於故􅁓中轉首已三十餘年矣人生能㡬何哉謾志于此詞云維乾寧四年􅀊次丁巳八月甲辰朔四日丁未皇帝若曰咨尓鎮海鎮東等軍節度浙江東西等道􅀚察䖏置營田招討等使兼兩浙塩鐡制置彂運等使開府儀同三司檢校太尉兼中書令使持節閏越等州諸軍事兼閏越等州刺史上柱國彭城郡王食邑五千户實對一百户錢鏐朕聞銘鄧隲之勲言垂漢典載孔悝之德事羙魯經則知褒徳䇿勲古今一致頃者董昌僣偽為皆鏡水狂謀􅁖貫㳿染齊人而尓披攘兇渠盪定江表忠以衞社稷惠以福生靈其機也氛祲清其化也疲羸㤗折甌越於塗炭之上師無私焉保餘杭於金湯之間政有經矣志奨王室績冠侯藩溢于旂常流在丹素雖鍾繇刋五熟之釡竇憲勒燕然之山未足顕功抑有異数是用錫其金版申以誓詞長河有似帯之期泰山有如拳之日唯我念功之㫖永􅀅延祚子孫使卿長襲寵榮克保富貴卿恕九死子孫三死或犯常刑有司不得加責承我信誓徃惟欽哉宜付史館頒示天下表云恩主賜臣金書鐡劵一道臣恕九死子孫三死者出於睿眷形此綸言録臣以絲髮之勞賜臣以山河之誓鎘金作字指日成文震動神祗飛􅀭肝膽伏念臣從筮仕殆及秉麾毎自揣量是何叨忝所以行如􅂂薄動若持盈惟憂福過禍生敢忘慎􅀄護末豈其此志上感宸聰憂臣以䖏極多危慮臣以防微不至遂開聖澤永保私門屈以常刑宥其必死雖君親嘱念皆云必恕必容而臣子為心豈敢傷慈傷愛謹當日慎一日戒子戒孫不敢因此而累恩不敢乗此而賈禍聖主萬􅀊愚臣一心按史唐僖宗乾符五年王仙芝餘黨曹師䧺㓂掠二浙杭州募兵使石鏡都􅀅董昌等􅀅以討之臨安人錢鏐以驍勇事昌為兵馬使中和元年昌為杭州刺史光啓二年昌謂鏐曰汝能取越州吾以杭授汝鏐攻剋之昌遂徒越以鏐知杭州事三年昌為浙東􅀚察使鏐為杭州刺史招宗景福元年為武勝軍防禦使二年為鎮海節度使乾寧二年昌僣號鏐遺書曰與其関門作天子與九族百姓俱䧟塗炭豈若開門作莭度使終身富貴邪昌不聽鏐以状聞削奪昌官爵委鏐討之三年昌伏誅鏐令兩浙吏民上表請兼領浙東朝廷不得已以為鎮海鎮東莭度使改威勝曰鎮東天復二年進爵越王天祐元年更封呉王梁太祖開平元年以為吳越王乾化二年加尚父末帝貞明二年以為諸道兵馬元帥三年以為天下兵馬元帥龍徳三年以為呉越王鏐始建國儀衞名稱多如天子之制惟不改元置百官有丞相侍郎客省等使唐明宗天成四年削鏐官爵初鏐嘗遺安重誨書辤禮甚倨及朝廷遣奉使烏昭遇韓玫使鏐還玫奏昭遇見鏐稱臣拜舞重誨奏賜昭遇死鏐以太師致仕自餘官爵皆削之長興三年鏐卒鏐寝疾出卯鑰授子元􅗕曰子孫善事中國勿以易姓廢事大之禮卒年八十一史稱乾寧三年秋九月以鏐為鎮海鎮東莭度使而劵詞乃四年秋八月何邪史稱儀衞名稱多如天子之制惟不改元程大昌演蕃露云寳正六年􅀊在辛卯見封落星石制書辛卯乃唐明宗長興二年寳太元年羅􅀮記新城縣記云癸未􅀊癸未乃唐荘宗同光元年以此知呉越雖禀中原正􅃋既長興同光年號與其寳正寳太同􅀊而名不同知呉越自甞改元審矣又僧文瑩湘山野録云唐昭宗以錢武粛平董昌拜為鎮海鎮東節度使中書令賜鐡劵羅􅀮為譔謝表殆荘宗入洛又遣使貢奉懇請玉冊金劵有司定議非天子不得用後竟賜之鏐即以節􅃏授其子元􅗕自稱吳越國王名其居曰殿官属悉稱臣又於衣錦軍大建王冊金劵詔書三楼遣使冊東夷諸國對拜其君長㡬極其埶與向之謝表所陳䖏極防微累恩賈禍之誡殊相戾矣禅月貫休甞以詩􅄬之有滿堂花􅋨三千客一劔霜寒十四州之句鏐愛其詩遣客吏諭之曰教和尚改十四為四十方與見休性匾分謂吏曰州亦難添詩亦不改然閒雲野鶴何天而不飛邪遂飄然入蜀鏐後果為安重誨奏削王爵以太師致仕重誨死明宗乃復鏐爵位夫武粛之踰越固莫逃乎二書所論有教子射字法必須彼我二人俱聰明熟於翻切優於記問者方乃便捷倘遇人以詩詞或言語示我彼在隔坐不及知聞我則拊掌彼便􅀃出與所示同然片叚文章皆可成誦非特一句一字而巳用拊掌代擊鼓殊無勾肆市井俗態此天下太平優㳺無事謾以取一時之􅀏樂耳使鼙鼓之声震天干戈之鋒耀日又能留情於此邪字法七字詩十二句逐句排寫前四句括定字毋後八句括定叶韻詩曰䡖䡖牽兵兵邉平平便明明眠逢興興掀征征煎經經堅迎迎年俜俜偏停停田應應煙成成涎聲聲羶清清干澄澄􅅶星星鮮晴晴涎丁丁顛檠檠䖍盈盈延能能稱稱千非精精煎零零連汀汀天橙橙􅅶東蒙鍾江支茲為微魚胡模齊乖佳􅁅咍真諄臻匡􅃜元䰟痕寒􅂬関山先森䔥宵爻豪歌戈麻陽唐耕斜滎青蒸登􅀹侯車侵潭談塩添横光凡如欲切春字清諄清清千春清字在第三行第一字諄字在第七行第四字拊掌則前三後一少歇又前七後四下字平声為霞盈麻盈盈延霞盈字在第三行第七字麻字在第十行第二字拊掌則前三後七少歇又前十後二少歇又三盖夏字去声所以又三也若入声則四矣餘倣此但字毋不離二十八字而叶韻莫逃五十六字此為至要後見賔退録一則與此畧同併志之其曰俗間有撃鼓射字之伎莫知所始盖全用切字該以兩詩詩皆七言一篇六句四十二字以代三十六字毋全用五支至十二齊韻取其声相近便於誦習一篇七句四十九字以該平声五十七韻而無側声如一字字毋在第三句第四字則鼓節前三後四叶韻亦如之又以一二三四為平上去入之别亦有不擊鼓而揮扇之􅁼其實一也詩曰西希􅊠之機詩資非卑妻欺癡梯歸披皮肥其辤移題擕持齊時依眉微離為児儀伊鋤尼醯雞箆溪批毗迷此字毋也羅家􅀲藍斜凌倫思戈交勞皆來論留連王郎龍南関盧甘林峦雷􅂓隣簾櫳羸婁叅辰䦨楞根彎離驢寒間懐横榮鞵庚光顔此叶韻也松江之横雲山古􅃁纍纍然世傳以為多晉陸氏所蔵山人封生業盜􅃁至正甲辰春彂一􅃁􅃁磚上有太元二年造五字按太元東晋武帝時也逆数而上計九百一十餘年矣或者謂􅃁有志石恐事泄袐弗示人􅃁中得古銅罍勺壷洗尊鼎雜器物二百餘件内一水滴作獅子昻首軒尾走躍状而一人靣部方大髭湏飄䔥􅀐獅子背左手握無底圓桶右手臂鷹人之腦心為竅以安吸子吸子頂微大正盖腦心儼一席帽胡人衣摺及獅鷹羽毛種種俻具通身青緑吸子渾若碧玉論其製作膚理則非晋人所能乃漢器無疑必其平生寳惜而以循􅁙約長五寸髙四寸許誠竒物也士安偶過生生出以售􅂢錢五十緡買之歸剔鑿沙土飾澤蠟石神氣百倍於昔韞櫝保蔵時以示愽古好雅者一日為有埶力時貴奪去昔鮮于困學公甞畜一水滴正與士安者大同小異相承曰蛮人獅子愛之未甞去手寓杭州断橋日臨湖有水閣􅀝䦨把玩偶墜吸子於湖水中百計求之不可見悒快嘅嘆形神為之凋枯既它徃踰三年復來杭仍居昔所寓舎追懷故物注視湖波適當霜降水浄之時吸子儼在土内亟命僕下取欣然如獲至􅈿即易號曰神人獅子遂序述顛未求館閣諸老與夫騷人雅士歌咏以張之浸成巨軸公殁子孫不能世守水滴與詩卷皆歸婺州陶氏陶亦不能乆有又􅀅求善賈而沽諸今不知所在自我朝百餘年來僅聞公得其一於先而士安得其一於今非若它古銅器比可以屈指数也中書左丞葉公亦愚李錢唐人宋太學生上書詆賈似道公田関子不便專􅁠誤國似道怒嗾林德夫告公泥金飾齋扁不法令獄吏鞫之云只要尓做一箇麻餬公即口占一詩曰如今便一似麻餬也是人間大丈夫筆裏無時􅃚觧有命中有䖏未應無百千萬世傳名節二十三年非故吾􅀉語長安朱紫客盡心好上帝王書遂遭黥流嶺南及蒙恩放還與似道遇諸途公以詞贈云君来路吾歸路来來去去何時住公田関子竟何如國事當時誰汝誤雷州户厓州户人生㑹有相逢䖏客中頗恨乏蒸羊􅂓贈一篇長短句歸附後入京上書言時相併献至元鈔様此様在宋時固甞進呈請以代関子朝廷不能用故今别改年號復献之世皇嘉納便用鑄板以功累官至今任而終歌妓順時秀姓郭氏性資聪敏色藝超絶教坊之白眉也翰林學士王公元鼎甚眷之偶有疾思得馬版腸充饌公殺所􅀐千金五花馬取腸以供至今都下傳為佳話時中書叅政阿魯温尤属意焉因戯謂曰我比元鼎如何對曰叅政宰相也學士才人也爕理隂陽致君澤民則學士不及叅政嘲風咏月惜玉憐香則叅政不如學士叅政付之一􅀏而罷郭氏亦善於應對者矣至正辛丑四月朔日日未沒三四竿許忽然無光漸漸作蕉葉様天且昏黒如夜星斗粲然飯頃方復舊天再明星斗亦􅀮又少時乃沒按天官書王􅀮晋書曰日無光臣有隂謀京房易傳曰臣專刑兹謂分威蒙微而日不明至正壬寅八月中上海縣三十四保辰字圍金夀一家巳閹雄狗生小狗八其一觜􅀲紅如鮮血然犬之為妖多見於占驗之書而未有若此者若男変為女男子孕育則甞聞之古昔盖陽衰隂盛兵戈乱離之兆今夫牡物而生児陽化隂也又犬属火一觜􅀲紅紅亦火也豈非主兵立火者與甲辰四月十三日華亭縣五保楊巷邵浦雲之西清菴廊屋一十九間每間屋柱皆有声其声若以桶覆水靣而擊其底者人以手按之則振掉而起􅀴時乃止按乾坤変異録人君宮室無故有音声主兵起若人家主家亡六月二十三日夜四更松江近海去䖏潮忽驟至人皆驚訝以非正候至辰時潮方来乃知先非潮也後見湖泖人􅀃湖泖素不通潮忽平擁起髙三四尺若潮漲之埶正與此時同又聞平江嘉㒷亦如之按五行志水自盈溢主兵興乾坤変異録河水大壅臣下執政有背叛國朝品官母妻四品贈郡君五品贈縣君然古􅀖君之妻􅀖人曰小君禮士䘮妾不得匹其夫必曰君妻曰女君後世封羊祜妻為萬嵗君則此可為令甲之原人之四支百骸莫不畏寒獨靣則否醫書謂頭者諸陽之㑹諸隂脉至頸及胸而還獨諸陽脉上至頭所以然也南村輟耕録卷之十九
