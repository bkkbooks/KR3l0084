front:
  text: 南村輟耕録卷之二十五
  hash: sha256:f5f9d4a13696ff39d267aa1886b88e79953787bc8bbaa7ebf66d1864ac17d14b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_025-1a}
body:
  text: 天台陶宗儀九成秦皇坑儒武侯相漢未有置異議於其間者偶讀宋蕭森希通録及俞文豹吹劒録而得其􅀃可采森曰李斯曰非慱士官􅀁職天下敢有蔵詩書百家語者皆詣守尉雜燒之則是天下之書雖焚而􅀶士官猶有存者惜乎入関収圖籍而不及此竟爲楚人一炬耳前軰嘗論也但坑儒一事未有䆒極之者僕按史書􅀁坑特侯生盧生四百六十餘人非能盡坑天下儒者爲其􅀁坑又非儒者何以知之始皇三十二年使盧生求羡門刻碣石門壊城郭决通隄防又盧生入海還因奏録圖書曰亡秦者胡也始皇乃遣􅂪恬發兵三十萬人北伐匃奴起臨洮築遼水又盧生􅀃始皇曰日方中人主時為微行以辟􅁖􅀑􅁖􅀑辟真人至願上􅀁居宫毋令人知然後不死之藥殆可得也其後建阿房宫千間萬落必自此言彂之觀此二事皆盧生稔其􅁖又縦􅁷之特方伎之流耳豈􅀁謂儒者㢤始皇因封禪之議謗口紛紛巳懐殺意及其一怒而坑之或者天理之不容方其求藥海上者則挟童男童女以行皆取扵民間奪其無告之􅀌肆厥不􅁤之人如今􅀁謂妖教竊其中死無辜者多矣此一罪也因亡胡之䜟興北伐之師築長城斷地脉南北生靈因是􅃥而死者不可勝􅄸骸積如山血流成川調彂頻仍剥及閭左原始要終誰生厲階此二罪也獻辟􅀑之術覬真人之来咸陽官觀二百七十􅃨道相連有言其􅀁幸之䖏者罪死梁山之上其語一泄時在旁者盡殺之自是莫知行之所在此三罪也有一於此罪不容於死况兼有之以四百六十餘人之坑償萬民之命良不為過天網恔恔䟽而不漏真可畏哉始皇曰盧生等吾尊賜之甚厚今乃誹􅉪我諸生在咸陽者吾使㢘問或為妖言以亂黔首扵是使御史按問諸生傳相告引僕亦信盧生非吾儒中人况始皇自謂尊賜甚厚豈非如前三者方術圗䜟之􅀋有以中其􅁒故尊賜之􅀄不聞其誦孔子之言以進古今相承皆曰坑儒盖惑扵扶蘇之諌扶蘇曰諸子皆誦法孔子皇上皆重法䋲之臣恐天下不安嗚呼至若盧生者何嘗誦法孔子自扶蘇言之誤使儒者􅂪不韙之名自我一洗亦萬丗之快也不然如两生四皓伏生之流鴻飛􅄀􅄀弋人何慕肯揺唇鼓吻自􅄬於䧟穽哉僕故曰盧生四百六十餘人皆方伎之士也天下之大􅀁謂儒者固不止此其坑之者此而巳矣有道之士秦不能坑火徳一炎两生以講禮聞四皓以羽翼之功聞伏生以口授古書聞豈非天壽其脉留此數公以見吾儒不可磨滅而朋姦黨􅁖小人終不能為長乆計啇君以變法禍秦竟遭車裂盧生以方伎禍秦坑於咸陽其罪等也天其或者假手於秦欤商君裂矣盧生坑矣而秦以不祀抑亦自相擠䧟之明報而禍􅁋之道為不偏矣僕悪夫坑儒之名故論其顛末如此文豹曰古今論孔明者莫不以忠義許之然余兄文龍嘗考其顛末以為孔明之才謂之識時務則可謂之明大義則末也謂之忠於劉備則可謂之忠於漢室則未也其􅀃有四一者備雖􅁛為中山靖王之後然其服属䟽逺丗数難攷温公謂猶宋髙祖自􅁛楚元王後故通鑑不敢以紹漢統况備又非人望之􅀁帰周瑜以梟雄目之劉巴也以雄人視之司馬懿以詐力鄙之孫􅁠以猾虜呼之亮獨何見而委身焉藉使以為劉氏族属然獻帝在上猶當如光武之事更始陳征而伐一切􅃪命焉可也二者備之枉駕草蘆也始謀不過曰主上􅂪塵􅀌不度徳量力欲伸大義於天下其辭甚正其志甚􅊆自亮開之以跨􅍮益成覇業之利而備之志向始移無復以獻帝為念由建安舉兵以来四十二年天子或都許或居長安或幸洛陽宫室煨燼越在籬􅁄間備未嘗使一介行李詣行在􅀁今年合衆萬餘明年合衆三萬未嘗一言禀命朝廷而亮亦未嘗一談及焉盖其帝蜀之心己定於草廬一見之時矣三者曺操欲順流東下求捄於呉無一言及獻帝而獨􅀃以鼎足之􅀃夫鼎足之􅀃始於蒯通然通之􅀃韓信以此猶有漢之一足當三國時而爲是􅀃則獻帝無復染指之望矣頼周瑜漢賊之罵足以􅈭怒孫􅁠故能成赤壁之勝若備若亮何以厲􅀅士之氣服曺操之心哉􅍮楚之士􅀙之如雲非從備也乃從漢也四者備之􅁛王漢中則建安二十四年也獻帝在上而敢於自王及􅁛帝武擔則聞獻帝之遇害也亮不能如董公􅀃髙祖率三軍為義帝縞素仗大義連孫吴聲罪討賊乃􅃍乘此即帝位而反鋒政吴晋文公有言父死之謂何又因以為利故費詩以為大敵未克便先自立􅂲人心疑惑而諌以髙祖不敢王秦之事亮反怒而黜之夫以操之姦雄其王其公猶必待天子之命荀彧且以此憤死以丕之篡逆亦必待獻帝之禪楊彪且不肯臣之備雖宗室而亦臣也何􅀁禀命而自王自帝固方嘵嘵以興復漢室為辭不知興復漢室為獻帝耶為劉備耶亮既有心於帝備矣萬一果能興復􅀅置獻帝扵何地出師一表雖忠誠懇懇特忠於􅀁事耳其於大義實有􅀁未明也管仲樂毅之事君子􅀁羞道者以其但知有燕齊而不知有王室也亮乃以管樂自許冝其志慮之􅀁圖回功業之􅀁成就止於區區一蜀耳或者但謂備劉氏宗也備帝蜀則漢祚存矣亮忠於備即忠於漢矣吁無獻帝則可有獻帝在而君臣自相推戴則赤眉之立盆子亦有辞於世矣春秋之末諸侯爭强周室微弱孔子無一日不以尊王爲心若如亮之見則魯同姓也亦可奉之爲王矣天下後丗惟特此見故於亮之事無敢置異議於其間文中子曰通也敢忘太皇昭烈之懿識孔明公瑾之盛心噫漢之君既􅁛獻魏之君又􅁛武帝吳之君又􅁛大皇帝蜀之君又􅁛昭烈皇帝天無二日民無二王一天下而四帝並立可乎通之見如此宜其爲續書之僣也余兄嘗以是􅀃取觧於同文舘唐有傳竒宋有戯曲唱諢詞􅀃金有院本雜􅇵諸宫調院本雜􅇵其實一也國朝院本雜􅇵始釐而二之院本則五人一曰副凈古謂之叅軍一曰副末古謂之蒼鶻鶻能擊禽鳥末可打副凈故云一曰引戯一曰求􅅺一曰装􅀌又謂之五花㸑弄或曰宋徽宗見㸑國人来朝衣装鞵履巾褁傳粉墨舉動如此使優人效之以爲戯又有􅆋叚亦院本之意但差簡耳取其如火􅆋易明而易㓕也其間副凈有散􅀃有道念有筯斗有科汎教坊色長魏武劉三人􅂦新編輯魏長於念誦武長於筯斗劉長於科汎至今樂人皆宗之偶得院本名目用載于此以資􅀶識者之一覽和曲院本月明法曲鄆王法曲燒香法曲送使法曲上墳伊州燒花新水㷩州駱駝列良羸府病鄭逍遥樂四皓逍遥樂賀貼萬年歡􅐝廪降黄電列女降黄電上皇院本壼春堂太湖石金明池恋鰲山六變妆萬嵗山打花陣賞花燈錯入内悶相思探花街㫁上皇打毬㑹春從天上来題目院本栁絮風紅索冷墻外道共粉淚楊栁枝蔡消閑方偷眼呆太守􅀞堂前夢周公梅花底三咲圖脫布衫呆秀才隔年期賀方回王安石断三行兢尋芳双打梨花院覇王院本悲怨覇王范増覇王草馬覇王散楚覇王三官覇王􅀘塑覇王諸雜大小院本喬托􅀌旦判􅀌計筭􅀌双判􅀌百戯􅀌哨􅥦􅀌焼􅀥􅀌孝經􅀌菜園􅀌貨􅀰􅀌合房酸麻皮酸花酒酸狗皮酸還魂酸别離酸三纒酸謁食酸三楪酸哭貧酸挿撥酸酸􅀌旦毛詩旦老􅀌遣旦􅆞三旦禾哨旦哮賞旦貧富旦書櫃児􅁓襴児蔡奴児刴手児喜牌児卦冊児綉篋児粥碗児佀娘児卦鋪児師婆児教學児雞鴨児黄丸児稜角児田牛児小九児醜奴児病㐮王馬明王閙學堂閙浴堂寛布衫泥布衫趕湯瓶􅁓湯瓶閙棋亭夫容亭壊食店閙酒店壊粥店荘周夢花酒萝蝴蝶萝三出舎三入舍瑶池㑹八仙㑹蟠桃㑹洗児㑹蔵䦰㑹打五臓蘭昌宫廣寒宫閙結親􅌒成親强風惜大論情三園子紅娘子太平還鄕衣錦還鄕四論藝殿前四藝競敲門都子撞門呆大􅀰四酸擂問前程十樣錦長慶舘􅋪􅀅軍两相同競花枝五變妆洪福無彊白牡丹赤璧鏖兵穷相思金壇謁宿調奴漸官吏不和閙廵鋪判不由巳大勘刀同官不睦閙平康趕門不上賣花容同官賀授無􅀑論四酸諱偌閙棚闌双藥盤街閙文林四國來朝双捉壻酒色財氣毉作媒風流藥院監法童漁樵閑話閗鶴鶉杜甫逰春夗央簡四酸提猴滿朝􅂬月夜聞箏鼓角􅀅閙夫容城双閙毉張生煑海賖徐饅頭文房四寶謝神天陳橋兵変双揭牓朦唖質庫双福神院公狗児告和来佛印燒猪酸賣徕琴劒書箱花前飲五􅀑􅃪琴白雲菴迓鼓二􅀰壊道塲獨脚五􅀰賣花聲進奉伊州錯上墳毉五方打五鋪拷梅香四道姑隔簾听硬竹蔡義飬娘􅥦師姨論秋蝉劉盼盼墻頭馬刺董卓鋸周朴四柏板大論淡撁龍舟擊梧桐渰藍橋入桃园双防送海常春香藥車四方和九頭頂閗元宵趕村禾眼藥􅀌两同心更漏子隂陽􅀌提頭巾三索債防送哨偌賣旦是耶酸怕水酸回回梨花院晋宣成道記院么海棠軒海棠园海棠怨海棠院魯李三慶七夕􅂯相逢風流壻王子端捲㢘記紫雲迷四季張与孟楊妃女状元春桃記粉墻梨花院妮女梨花院龐方温道徳􅀴大江東注呉彦臯不抽開不掀簾紅梨花玎璫天賜暗姻緣諸雜院㸑閙夾棒六么閙夾棒法曲望羸法曲分拐法曲送宣道人􅂬逍遥樂打馬鋪撦綵延壽樂諱老長壽仙夜半樂打明星􅂬呼萬里山水日月集賢賔打三教打白雪􅁔地水火風夜􅀷􅀷三磕胞佳景堪遊十四十五􅀰喜遷鶯刴草鞋太公家教琹棋書盡滕王閣閙入妆春夏秋冬風花雪月上小樓衮頭子噴水朝僧打注論語恨秋風􅀑􅀧偌詩書禮樂論語謁食下角瓶大毉淡再逰恩地累受恩深送􅃵湯放火子擂鼓孝􅀴香茶酒果船子和尚四不犯徐演黄河單兠望梅芲皇都好景四偌大提猴双聲疊韵上皇四軸􅀞三偌一卜調猿卦鋪倬刀饅頭河轉迓鼓背箱伊州酒樓伊州簔衣百家詩埋頭百家詩偷酒牡丹香雪詩打樊噲抹􅔇長夀仙四偌賣諢四偌祈雨松竹亀鶴王毋祝壽四偌抹紫粉四偌劈馬椿截紅閙浴堂和燕㱕梁蘇武和畨􅃵湯六么河湯舅舅偌請都子双女頗飯一貫質庫児私媒質庫児清無事豐稔太平一人有慶四海民和金皇聖徳皇家萬􅀊背皷千字文變電千字文摔盒千字文錯打千字文木驢千字文埋頭千字文講來年好講聖州序講樂章集講道徳經神農大􅀃藥食店提猴人叅腦子㸑断朱温㸑變二􅀰㸑講百果㸑講百花㸑講􅂪求㸑講百禽㸑講心字㸑變栁七㸑三跳澗㸑打王樞宻㸑水酒梅花㸑調猿香字㸑三分食㸑煎布衫㸑頼布衫㸑􅀟楪紙㸑謁金門㸑跳布袋㸑文房四寳㸑開山五芲㸑衝撞引首打三十打謝樂打八哥錯打了錯耴􅀑􅀃狄青憨郭􅀰枝頭巾小閙摑鶯哥猫児大陽唐小陽唐歇貼韵三般尿大驚睡小驚睡大分界小分界雙㕍児唐韻六貼我来也情知本分喬捉蛇鐺鍋釡竈代元保毋子御頭觜笛児山梨柿子打淡的一日一箇村城詩胡􅎛雖小蔡伯喈􅃒截架觧窄磚児三打歩穿百倬盤榛子四魚名四坐山撮頭􅅁天下樂四帕水四門児􅀃古人山麻稭喬道塲黄風蕩蕩貪狼􅀚通一毋串􅀖子拖下来唖伴哥劉千劉義􅂬㑹旗生死鼓搗練子三群頭酒槽児凈瓶児賣官衣苗青根白調􅀏令閗鼓􅅇栁青娘論句児請車児身􅁁有藝調劉滚覇工草難古典左必来香供飬合五百妳妳嗔一偝一與巳巳巳舞秦始皇學像生攴道饅頭打調刼馿城白守呆木大定魂刀􅀃罰錢年紀大小打扇盤蛇相眼告假捉記照淡朦唖投河畧通調賊多筆僉押扯状羅打記水来楞焼奏轉芲枝計頭児長嬌惓歇後語芦子語廻且語大支散拴搐艶叚㐮陽㑹馿軸不了抛綉毬鞭􅒱金鐙門簾児天長地乆眼藥里衙府則例金含楞太下太平㱕塞北春夏秋冬閗百草呌子盖頭大劉備石榴花詩唖漢書􅀃古棒唱拄杖日月山河胡餅大觜揾地屋裏蔵罵吕布張天斍打論語十果頑十般乞還故里劉今􅅁四草䖝四厨子四妃艶望長安長安住罵