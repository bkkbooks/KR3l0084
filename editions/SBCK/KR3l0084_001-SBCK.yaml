front:
  text: 列聖授受正統
  hash: sha256:4a2fdf97ef107f82ff70cde191c2daedc8df1f4ceaab105ce06271e6390f7ec0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_001-1a}
body:
  text: 始祖諱孛端义兒烈祖神元皇帝諱也速該姓竒渥温氏太祖應天啓運聖武皇帝諱鐵木真囯語曰成􅁻思宋開禧二年丙寅十二月即位于斡難河自號可汗至宋寳慶三年丁亥七月己丑崩于薩里川在位二十二年壽六十六􅁙起輦谷太宗英文皇帝諱窩闊台宋紹定二年己丑八月己未即位于忽魯班雪不只至宋淳祐元年辛丑十一月崩于胡䦨山在位一十三年壽五十六􅁙起輦谷太皇后秃里吉納臨朝稱制皇后乃馬真氏睿宗仁聖景㐮皇帝諱拖雷憲宗追謚定宗簡平皇帝諱貴由宋淳祐二年壬寅至乙巳皇后當國丙午七月歸政即位于荅蘭荅八思至戊申三月崩于胡眉斜陽吉兒在位三年壽四十三􅁙起輦谷皇太后秃里吉納復治國事憲宗桓肅皇帝諱蒙哥宋淳祐十一年辛亥六月即位于闊帖兀阿蘭至宋開慶元年己未七月二十七日癸亥崩于鈎魚山在位九年壽五十世祖聖徳神功文武皇帝諱忽必烈囯語曰薛禅宋景定元年庚申四月一日戊辰即位于開平建元中統至至元三十一年甲午正月十九日庚午崩于紫檀殿在位三十五年壽八十􅁙起輦谷中統四至元三十一􅁉宗文惠明孝皇帝諱真金成宗追謚順宗昭聖衍孝皇帝諱荅刺麻八刺武宗追謚成宗欽明廣孝皇帝諱銕木耳國語曰完者篤至元三十一年甲午四月十四日甲午即位于上都改至元三十二為元貞至大徳十一年丁未正月八日癸酉崩于王徳殿在位十三年壽四十二􅁙起輦谷元貞二大徳十一武宗仁惠宣孝皇帝諱海山囯語曰曲律大徳十一年丁未五月十一日甲戌即位于上都十二月詔改大徳十二為至大至四年辛亥正月八日庚辰崩于玉徳殿在位四年壽三十一􅁙起輦谷至大四仁宗聖文欽孝皇帝諱爱育􅀺㧞刁八逹囯語曰普顔篤至大四年辛亥三月十八日庚寅即位于大明殿九月壬子詔改至大五為皇慶至延祐七年庚申正月二十一日辛丑崩于光天宫在位九年壽三十六􅁙起輦谷皇慶二延祐七英宗睿聖文孝皇帝諱碩徳八刺囯語曰革堅延祐七年庚申三月十一日庚寅即位十二月乙巳詔改延祐八為至治至三年癸亥八月四日癸亥遇弑崩于上都途中南坡行幄在位四年壽二十一從􅁙諸帝陵至治三顯宗光聖仁孝皇帝諱甘刺麻泰定追謚今出廟泰定皇帝諱也先帖木兒元封􅀳王至治三年癸亥九月四日癸巳即位于上都龍居河十二月丁亥昭改至治四為泰定至五年戊辰二月庚申改致和七月十日庚午崩文宗追廢在位五年壽二十六泰定四泰定伍改致和文宗即改天暦明宗翼獻景孝皇帝諱和世刺囯語曰忽都篤天暦二年己巳正月二十八日丙戌即位于和寕北八月二日大駕次王忽察都六日暴崩不改元在位八月壽三十􅁙起輦谷文宗聖明元孝皇帝諱脫脫木兒囯語曰扎牙篤致和元年戊辰九月十三日壬申即位于大明殿改元天暦詔譲大兄明宗明年己巳五月帝發京師北迎八月二日丙戌遇于王忽察都庚寅明宗暴崩巳亥復即位于上都至三年庚午五月戊午改至順至三年壬申八月十二日己酉崩在位五年壽二十九􅁙起輦谷後至元六年庚辰六月丙申以帝謀不軌使明宗飲恨而崩詔撤其廟主天暦二至順三寕宗冲聖嗣孝皇帝諱懿璘質班至順三年壬申十月四日庚子即位于大明殿至十一月十六日壬午崩不改元年七􅀊􅁙起輦谷今上皇帝御名妥歡帖睦爾至順四年癸酉六月八日己巳即位于上都十月戊辰改元元統至三年乙亥十一月辛丑改至元至七年正月一日改至正元統二至元六至正今二十六年氏族蒙古七十二種阿刺刺扎刺兒歹忽神忙兀歹瓮吉刺歹晃忽攤永吉列思兀魯兀郭兒刺思别刺歹怯烈歹秃别歹八魯刺忽曲吕律也里􅁻斤扎刺只刺脫里别歹塔塔兒哈答兒散兒歹乞要歹列木歹顔不花歹歹列里飬賽散木兀歹滅里􅁻歹阿火里􅁻歹兀羅歹别帖里歹蠻歹也可抺合刺那顔􅁻歹阿塔里􅁻歹亦乞列歹合惑乞歹木里乞外兀歹外抺歹阿兒刺歹伯要歹􅑃古歹外刺歹末里乞歹許火歹晃兀攤别速歹顔不萆歹木温塔歹忙兀歹塔塔歹那顔乞台阿塔力吉歹忽神塔一兒元魯歹撒木歹滅里􅁻阿火里力歹扎馬兒歹兀羅羅歹答答兒歹别帖乞乃蠻歹也可林合刺瓮吉歹木里歹忙古歹外抺歹乃朶里别歹八憐察里􅁻歹八魯忽歹哈答歹外刺色目三十一種哈刺魯欽察唐兀阿速秃八康里苦里魯刺乞歹赤乞歹畏吾兀回回乃蠻歹阿兒渾合魯歹火里刺撒里哥秃伯歹雍古歹賽亦思夯力苦魯丁貴赤匣刺魯秃魯花哈刺吉答歹拙兒察歹秃魯入歹火里刺甘木魯徹兒哥乞失迷兒漢人八種契丹髙麗女直竹因歹术里闊歹竹温竹赤歹渤海女直同金人姓氏完顔漢姓曰王烏古論曰商乞石烈曰高徒單曰杜女奚烈曰􅀰兀顔曰朱蒲察曰李顔盞曰張温迪罕曰温石抹曰蕭奥屯曰曹孛术魯曰魯移刺曰劉斡勤曰石納刺曰康夾谷曰全裴滿曰麻尼忙古曰魚斡准曰趙阿典曰雷阿里侃曰何温敦曰空吾魯曰惠抹顔曰孟都烈曰强散答曰駱呵不哈曰田烏林答曰蔡僕散曰林术虎曰董右里甲曰汪至元十一年甲戌宋之咸淳十年也秋七月世祖命中書右丞相伯顔摠制大軍取宋諭之􅀂曰朕聞曹彬不嗜殺人一舉而定江南汝其體朕心法彬事毋使吾赤子横罹鋒刃伯顔叩首奉命惟謹既而混一職方豈非不嗜殺人之驗與明年乙亥春諸郡望風降敗丞相伯顔遣貟外􅀰石天麟詣闕奏聞世皇喜顧謂侍臣曰朕兵巳到江南宋之君臣必知恐畏茲􅀂遣使議和邀索􅀊幣想無不從者遂敕伯顔按兵乃命禮部尚書廉希賢侍􅀰嚴忠範計議官宋徳秀祕書丞柴紫芝等齎奉國書使宋次建康希賢等借兵衞送伯顔曰方今两軍相阨互有設險宜令行人先往道意􅀂便擁兵前進吾恐别生罅􅂩則和議之事必難成矣希賢等謹請乃簡閱銳卒五百􅂌之至獨松関戍関者宋浙西安撫司􅂙議官張濡也以為北兵叩関率衆掩擊殺忠範執希賢希賢亦病創死世皇聞之大怒趣進攻嗟夫宋之亡也非有桀紂之惡特以始之以拘􅅏使者肇天兵之興終之以誤殺使者激世皇之怒耳藉使獨松之使不死宋之存亡未可知其亦有數也與明年正月甲申丞相伯顔駐軍皐亭山宋奉表及國壐以降遣千戸嚢加歹等入城慰諭令居民門首各貼好􅄬拜三字及聞益王廣王如婺州即命分兵守屯諸門范文虎安營浙江沙滸太皇太后望祝曰海􅀂有􅂕當使波濤大作一洗而空之潮汐三日不至軍馬晏然文虎吕文煥壻安慶守臣降扵我者宋之興始於後周恭帝顯徳七年恭帝方八􅀊及其亡也終扵少帝徳祐元年少帝時四􅀊名顯而顯徳二字竟與得國時合周以主㓜而失國宋亦以主㓜而失國周有太后在上宋亦有太后在上始終興亡之數昭然如此萬􅀊山在大内西北太液池之陽金人名瓊花島中統三年脩繕之其山皆以玲瓏石疊罍峰巒􅀮映松檜隆欝秀􅀂天成引金水河至其後轉機運紏汲水至山頂出石龍口注方池伏流至仁智殿後有石刻蟠龍昻首噴水仰出然後東西流入于太液池山上有廣寒殿七間仁智殿則在山半為屋三間山前白玉石橋長二百尺􅀡儀天殿後殿在太液池中之圓坻上十一溋正對萬􅀊山山之東為靈囿竒獸珍禽在焉車駕􅀊巡上都先宴百官于此浙省叅政赫徳爾嘗云向任􅅏守司都事時聞故老言國家起朔漠日塞上有一山形埶䧺偉金人望氣者謂此山有王氣非我之利金人謀欲厭勝之計無所出時國巳多事乃求通好入貢既而曰它無所冀願得某山以鎮壓我土耳衆皆鄙􅀏而許之金人乃大發卒鑿掘輦運至幽州城北積累成山因開挑海子栽植花木營構宫殿以為㳺幸之所未幾金亡世皇徙都之至元四年興築宫城山適在禁中遂賜今名云􅅏守司在宫城西南角樓之南專掌宫禁工􅃥者世皇取江南大軍次黄河苦乏舟擑夜夣一老叟曰陛下欲渡河當隨我來引至一所指曰此即是巳帝遂以物標識之及覺歴歴可記明日循行河滸尋夣中所見䖏果是方驚顧間忽有人進曰此間水淺可渡時帝徴夣中語因謂曰汝能先渉否其人乃行大軍自後從之無一不濟帝欲重旌其功對曰富與貴悉非所願但得自在足矣遂封爲答刺罕與五品印撥三百戸以食之今其子孫尚有存者此事楊元誠太史瑀所云世皇下江南檄枚舉賈似道無君之罪宋國臣民其不誠服者與其文曰宅中圖大天開一統之期自北而南雷動六師之衆先謂吊民而伐罪盖􅀅用夏而變夷欲制江浙以削平極汝海隅而混一堪嗟此宋信任非人處之師相之尊委以國柄之重世濟其惡真兇悖之賈充謀及迺心效姦雄之曹操不學無識舞術弄􅁠誇滸黄僅免其身比河清莫大之績承君之寵如彼之專貪天之功􅃀乎不㧞惜官爵以摠寳貨苛條法以苦賢才奪土田而無地可耕變􅀜㑹而物價溢湧藉鄙猥者伴食於廟堂任反側者失兵於邊徼恬視雷星之召異罔聞水火之降災滿朝皆其私人用􅀅因其重賂用白剳而破世守之法曲丹筆而容天討之刑民心巳離而不知天命􅀅革而未悟方且貪湖山之樂聚寳玉之珍弗頋毋死奪制以貪榮乃乘君寵立㓜而固位以巳峻功碩徳而自比於周公欺人寡婦􅀌兒反不如於石勒深懐禍慝恣肆姦邪合正兩觀之誅可紓百姓之怒我大元皇帝聰明智睿神武慈仁焚香祝天誓莫殺而混海宇振兵畧地隨所向而宣皇威一戰乘勝而渡江諸􅀅列降而獻土厥魚稽首迎我前矛後實先聲易如破竹昭天順人信之􅂇成我風行草偃之功合宇宙以清寕蘇人民而鎮撫恩寛㓜主以下罪止元惡之身自今檄到應守令以境土􅄬拜除大支犒賞外仍其官職謹檄大元受天命肇造區夏列聖相承至于世皇至元􅀄尚未遑興建宫闕凡遇􅁛賀則臣庶皆集帳前無有尊卑貴賤之辨執法官厭其喧雜揮杖擊逐去而復來者數次翰林承㫖王文忠公盤時兼太常卿慮􅀅貽􅀏外國奏請立朝儀遂如其言皇慶癸丑冬十一月詔曰其以皇慶三年八月天下郡縣興其賢者能者充賦有司明年二月會試京師中選者朕􅀅親䇿焉按遺山元公好問所撰廉訪使楊文憲公奂墓碑云太宗即位之十年戊戌開舉選特詔宣徳課稅使劉公用之試諸道進士公試東平两平賦論第一奏授河南路徴收課稅所長官兼廉訪使則國朝科舉之設己肇於此􅋁􅋁七十餘年而普顔篤皇帝克不墜祖宗之令典尊號曰仁不亦宜乎􅀄焉試論賦盖又宋金餘習後則一以經學為夲非復向時比矣汲郡王公玉堂嘉話云宋未下時江南謠云江南􅀂破百鴈來過當時莫喻其意及宋亡盖知指丞相伯顔也太宗時諸國來朝者多以冐禁應死耶律文正王楚材進奏曰願無汗白道子從之盖國俗尚白以白為吉故也大徳七年詔内外官年及七十並聴致仕時郭守敬字􅀂思順徳邢臺人知太史院事以舊臣且熟朝廷所施為獨不許其請至今翰林太史司天官不致仕者咸自公始答刺䍐譯言一國之長得自由之意非勲戚不與焉太祖龍飛日朝廷草創官制簡古惟左右萬戸次及千户而巳丞相順徳忠獻王哈刺哈孫之曽祖啓昔禮以英材見遇擢任千戸錫號答刺䍐至元壬申世祖録勲臣後拜王宿衞官􅊞號答刺䍐己丑秋八月太宗即皇帝位耶律文正王時為中書令定冊立儀禮皇族尊長皆令就班列拜尊長之有拜禮盖自此始内八府宰相八員視二品秩而不降授宣命時中書照㑹之任而已􅀉位於翰林之埽鄰埽鄰宫門外院官㑹集處也所職視草制􅀂詔赦之文則非其掌也至於院之公事亦不得與焉例以國戚與勲貴之子弟充之國朝有四怯薛太官怯薛者分宿衛供奉之士為四畨畨三晝夜凡上之起居飲食諸服御之政令怯薛之長皆摠焉中有雲都赤乃侍衛之至親近者雖官隨朝諸司亦三日一次輪流入􅀡􅀒骨朶於肩佩環刀於要或二人四人多至八人時􅀂上御控鶴則在宫車之前上御殿廷則在墀陛之下蓋所以虞姦回也雖宰輔之日覲清光然有所奏請云都赤在固不敢進今中書移咨各省或有湏備録奏文事者内必有云都赤某等以此之故余又究骨朶字義嘗記宋景文筆記云関中人以腹大為􅍺􅞷上音􅀌下音都俗因謂杖頭大者赤曰􅍺後訛為骨朶朶平聲國朝鎮殿􅀅軍募選身驅長大異常者充凡有所請給名曰大漢衣粮年過五十方許岀官貴由赤者快行是也毎􅀊一試之名曰放走以脚力便捷者膺上賞故監臨之官齊其名數而約之以繩使無後先􅂙差之争然後去繩放行在大都則自河西務起程􅀂上都則自􅅺河兒起程越三時走一百八十里􅀡抵御前俯伏呼萬􅀊先至者賜銀壹餅餘則段疋有差昔寳赤鷹房之執􅃥者毎􅀊以所飬海青獲頭鵝者賞黄金壹錠頭鵝天鵝也以首得之又重過三十餘斤且以進御膳故曰頭南村輟耕録卷之一
