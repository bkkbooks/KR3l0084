body:
  text: 端厚文貞王額琳特穆爾嘗言婁師徳唾面自乾以為美事我思之雖狗亦不可惡他且如有一狗自卧於地無故以足蹴之或擲以物狗固不便咬人亦吠數聲而去却有甚好聽處㢧字㢧即卷字真誥中謂一卷為一㢧或以為弔字及篇字者皆非輟耕録卷二欽定四庫全書輟耕録卷三元陶宗儀撰正統辨至正二年壬午春三月十有四日上御咸寧殿中書右丞相托克托等奏命史臣纂修宋遼金三史制曰可越二年甲申春三月進遼史本紀三十卷志三十一卷表八卷列𫝊四十六卷冬十一月進金史本紀一十九卷志三十九卷表四卷列𫝊七十三卷又明年乙酉冬十一月進宋史本紀四十七卷志一百六十二卷表三十二卷列𫝊世家二百五十五卷初會稽楊維楨嘗進正統辨可謂一洗天下紛紜之論公萬世而為心者也惜三史已成其言終不見用後之秉史筆而續通鑑綱目者必以是為本矣維楨字廉夫號鐵崖人咸稱之曰鐵史先生泰定丁卯李黼榜相甲及第以文章名當世表曰至正三年五月日伏覩皇帝詔㫖起大梁張京兆杜本等爵某官職専修宋遼金三史越明年史有成書而正統未有所歸臣維楨謹撰三史正統辨凡二千六百餘言謹表以上者右伏以一代離合之殊固繫乎天數盛衰之變萬年正閏之統實出於人心是非之公蓋統正而例可興猶綱舉而目可備前代異史今日兼修是非之論既明正閏之統可定奈三史雖云有作而一統猶未有歸恭惟世祖皇帝以湯武而立國皇帝陛下以堯舜而為君建極建中致中和而育物惟精惟一大一統以書元嘗怪遼金史之未成必列趙宋編而全備芸臺大啓草澤髙升宜開三百載之編年以垂千萬代之大典豈料諸儒之謙筆徒為三國之志書春秋之首例未聞綱目之大節不舉臣維楨素讀春秋之王正月公羊謂大一統之書再觀綱目之紹春秋文公有在正統之說故以始皇二十六年而繼周統髙祖成功五年而接秦亡晉始於平吳而不始於泰和唐始於滅盜而不始於武徳稽之于古證之于今况當世祖命巴延平江南之時式應宋祖命曹彬下江南之歲親𫝊詔㫖有過唐不及漢之言確定統宗有繼宋不繼遼之禪故臣維楨敢痛排浮議力建公言挈大宋之編年包遼金之紀載置之上所用成一代可鑒之書傳之將來永示萬世不刋之典冒干天聽深懼氷兢下情無任瞻天望闕激切屏營之至辨曰正統之說何自而起乎起於夏后𫝊國湯武革世皆出於天命人心之公也統出於天命人心之公則三代而下厯數之相仍者可以妄歸於人乎故正統之義立於聖人之經以扶萬世之綱常聖人之經春秋是也春秋萬代之史宗也首書王正於魯史之元年者大一統也五伯之權非不強於王也而春秋必黜之不使奸此統也吳楚之號非不竊於王也而春秋必外之不使僭此統也然則統之所在不得以割據之地強梁之力僭偽之名而論之也尚矣先正論統於漢之後者不以劉蜀之祚促與其地之偏而奪其統之正者春秋之義也彼志三國降昭烈以儕吳魏使漢嗣之正下與漢賊並稱此春秋之罪人矣復有作元經自謂法春秋者而又帝北魏黜江左其失與志三國者等耳以致尊昭烈續江左兩魏之名不正而言不順者大正於宋朱氏之綱目焉或問朱氏述綱目主意曰在正統故綱目之挈統者在蜀晉而抑統者則秦昭襄唐武氏也至不得巳以始皇之廿六年而始繼周漢始於髙帝之五年而不始於降秦晉始于平吳而不始於泰和唐始於羣盜既夷之後而不始於降武徳之元又所以法春秋之大一統也然則今日之修宋遼金三史者宜莫嚴於正統與大一統之辨矣自我世祖皇帝立國史院嘗命承㫖百一王公修遼金二史矣宋亡又命詞臣通修三史矣延祐天厯之間屢勤詔㫖而三史卒無成書者豈不以二史正統之議未決乎夫其議未決者又豈不以宋渡于南之後拘於遼金之抗於北乎吾嘗究契丹之有國矣自呼紐氏之部落始廣其初枯骨化形戴豬服豕荒唐怪誕中國之人所不道也八部之雄至於按巴堅披其黨而自尊迨耶律光而其埶浸盛契丹之號立於梁貞明之初大遼之號復改於漢天福之日自按巴堅訖於天祚凡七主歴二百一十有五年夫遼固唐之邊夷也乘唐之衰草竊而起石晉氏通之且割幽燕以與之遂得窺釁中夏而石晉氏不得不亡矣而議者以遼乘晉統吾不知其何統也再考金之有國矣始於完顔氏實又臣屬於契丹者也至阿固達苟逃性命於道宗之世遂敢萌人臣之將而簒有其國僭稱國號於宋重和之元相傳九主凡歴一百一十有七年而議者又以金之平遼尅宋帝有中原而謂接遼宋之統吾又不知其何統也議者又謂完顔氏世為君長保其肅慎至太祖時南北為敵國素非君臣遼祖神冊之際宋祖未生遼祖比宋前興五十餘年而宋嘗遣使卑辭以告和結為兄弟晩年且遼為翁而宋為孫矣此又其說之曲而陋也漢之匈奴唐之突厥不皆興於漢唐之前乎而漢唐又與之通和矣吳魏之於蜀也亦一時角立而不相統攝者也而秉史筆者必以匈奴突厥為紀𫝊而以漢唐為正統必以吳魏為分繫而以蜀漢為正統何也天理人心之公閱萬世而不可泯者也議者之論五代又以朱梁氏為簒逆不當合為五代史其說似矣吾又不知朱晃之簒克用氏父子以為仇矣契丹氏背唐兄弟之約而稱臣於梁非逆黨乎春秋誅逆重誅其黨契丹氏之誅為何如哉且石敬瑭事唐不受其命而簒唐謂之承晉可乎縱承晉也謂之統可乎又謂東漢四主逺兼郭周宋至興國四年始受其降遂以周為閏以宋統不為受周禪之正也吁茍以五代之統論之則南唐李昪嘗立大唐宗廟而自稱為憲宗五代之孫矣宋於開寳八年滅南唐則宋統繼唐不優於繼周繼漢乎但五代皆閏也吾無取其統吁天之厯數自有歸代之正閏不可紊千載厯數之統不必以承先朝續亡主為正則宋興不必以膺周之禪接漢接唐之閏為統也宋不必膺周接漢接唐以為統則遂謂歐陽子不定五代為南史為宋膺周禪之張本者皆非矣當唐明宗之祝天也自以夷虜不任社稷生靈之主願天早生聖人以主生靈自是天人交感而宋祖生矣天厭禍亂之極使之君主中國非欺孤弱寡之所致也朱氏綱目於五代之年皆細注於歲之下其餘意固有待於宋矣有待於宋則直以宋接唐統之正矣而又何計其受周禪與否乎中遭陽九之阨而天猶不泯其社稷𤓰瓞之系在江之南子孫享國又凡百五十有五年金泰和之議以靖康為游魂餘魄比之昭烈在蜀則泰和之議固知宋有遺統在江之左矣而金欲承其絶為得統可乎好黨君子遂斥紹興為偽宋吁吾不忍道矣張邦昌迎康邸之書曰由康邸之舊藩嗣宋朝之大統漢家之戹十世而光武中興獻公之子九人而重耳尚在兹惟天意夫豈人謀是書也邦昌肯以靖康之後為游魂餘魄而代有其國乎邦昌不得革宋則金不得以承宋是則後宋之與前宋即東漢前漢之比耳又非劉蜀牛晉族屬疎逺馬牛疑迷者之可以同日語也論正閏者猶以正統在蜀正朔相仍在江東矧嗣祚親切比諸光武重耳者乎而又可以偽斥之乎此宜不得以南渡為南史也明矣再考宋祖生於丁亥而建國於庚申我太祖之降年與建國之年亦同宋以甲戌渡江而平江南於乙亥丙子之年而我王師渡江平江南之年亦同是天數之有符者不偶然天意之有屬者不茍然矣故我世祖平宋之時有過唐不及漢宋統當絶我統當續之喻是世祖以厯數之正統歸之於宋而以今日接宋統之正者自屬也當時一二大臣又有奏言曰其國可滅其史不可滅也是又以編年之統在宋矣論而至此則中華之統正而大者不在遼金而在於天付生靈之主也昭昭矣然則論我元之大一統者當在平宋而不在平遼與金之日又可推矣夫何今之君子昧於春秋大一統之旨而急於我元開國之年遂欲接遼以為統至於咈天數之符悖世祖君臣之喻逆萬世是非之公論而不恤也吁不以天數之正華統之大屬之我元承乎有宋如宋之承唐唐之承隋承晉承漢也而妄分閏代之承欲以荒夷非統之統屬之我元吾又不知今之君子待今日為何時待今聖人為何君也哉於乎春秋大統之義吾已悉之請復以成周之大統明之於今日也文王在諸侯凡五十年至三分天下有其二遂誕膺天命以撫方夏然猶九年而大統未集必至武王十有三年代商有天下商命始革而大統始集焉蓋革命之事間不容髪一日之命未絶則一日之統未集當日之命絶則當日之統集也宋命一日而未革則我元之大統亦一日而未集也成周不急文王五十年武王十三年而集天下之大統則我元又豈急於太祖開國五十年及世祖十有七年而集天下之大統哉抑又論之道統者治統之所在也堯以是𫝊之舜舜以是𫝊之禹湯文武周公孔子孔子沒幾不得其𫝊百有餘年而孟子𫝊焉孟子沒又幾不得其𫝊千有餘年而濂洛周程諸子𫝊焉及乎中立楊氏而吾道南矣既而宋亦南渡矣楊氏之𫝊為豫章羅氏延平李氏及於新安朱子朱子沒而其𫝊及於我朝許文正公此歴代道統之源委也然則道統不在遼金而在宋在宋而後及於我朝君子可以觀治統之所在矣於乎世隔而後其議公事久而後其論定故前代之史必修於異代之君子以其議公而論定也晉史修於唐唐史修於宋則宋史之修宜在今日而無讓矣而今日之君子又不以議公論定者自任而又諉曰付公論於後之儒者吾又不知後之儒者又何儒也此則予為今日君子之痛惜也今日堂堂大國林林鉅儒議事為律吐辭為經而正統大筆不自竪立又闕之以遺將來不以貽千載綱目君子之笑為厚恥吾又不知負儒名於我元者何施眉目以誦孔子之遺經乎洪惟我聖天子當朝廷清明四方無虞之日與賢宰臣親覽經史有志於聖人春秋之經制故斷然定修三史以繼祖宗未遂之意甚盛典也知其事大任重以在館之諸賢為未足而又遣使草野以聘天下之良史才負其任以往者有其人矣而問之以春秋之大法綱目之主意則槩乎其無以為言也於乎司馬遷易編年為紀傳破春秋之大法唐儒蕭茂挺能議之孰謂林林鉅儒之中而無一蕭茂挺其人乎此草野有識之士之所甚惜而不能倡其言於上也故私著其說為宋遼金正統辨以伺千載綱目之君子云若其推子午卯酉及五運之王以分正閏之說者此日家小技之論君子不取也吾無以為論貞烈至元十三年丙子春正月十八日淮安王巴延以中書右相統兵入杭宋謝全兩后以下皆赴北有王昭儀者題滿江紅詞於驛云太液芙蓉渾不似舊時顔色曾記得春風雨露玉樓金闕名播蘭簪妃后裏暈潮蓮臉君王側忽一朝鼙鼓揭天來緐華歇龍虎散風雲滅千古恨慿誰説對山河百二淚霑襟血驛館夜驚塵土夢宫車曉碾關山月願嫦娥相顧肯從容隨圓缺昭儀名清蕙字冲華後為女道士五月二日抵上都朝見世皇十二日夜故宋宫人安定夫人陳氏安康夫人朱氏與二小姬沐浴整衣焚香自縊死朱夫人遺四言一篇於衣中云既不辱國幸免辱身世食宋禄羞為北臣妾輩之死守於一貞忠臣孝子期以自新丙子五月吉日泣血書明日奏聞上命斷其首縣全后寓所夫此四人之貞烈視前日之託𨼆憂於辭章者相去蓋萬萬矣是年丞相偏師徇台之臨海民婦王氏者美姿容被掠至師中千夫長殺其舅姑與夫而欲私之婦誓死不可自念且被汚因陽曰能俾我為舅姑與夫服朞月乃可事主君千夫見其不難於死從所請仍使俘婦雜守之師還挈行至嵊過上清風嶺婦仰天竊歎曰吾知所以死矣即囓拇指出血冩口占詩於崖石上曰君王無道妾當災棄女抛男逐馬來夫面不知何日見此身料得幾時回兩行清淚偷頻滴一片愁眉鎖未開迴首故山看漸逺存亡兩字實哀哉冩畢即投崖下以死死之日距今且將八九十年石上血僨起如始冩時不為風雨所剥蝕予昔過其下尚能讀所冩詩嵊丞徐君端樹石祠刻碑於死所浙東元帥白野台哈布哈公字兼善狀元及第守越日為立廟像鄉之人私表曰貞婦著作李五峯先生孝光為記郡上其事於朝請封如民所表先是岳州破時韓氏為游卒所掠以獻諸主將韓知必不免乘間赴水死越三日有得其屍於練裙中題五言長句曰宋未有天下堅正臣禮秉開國百戰功每陣惟雄整及侍周幼主臣心常烱烱帝曰卿北伐山戎今有警死狗莫擊尾此行當繫頸即日辭陛下盡敵心欲逞陳橋忽兵變不得守箕潁禪讓法堯舜民物普安靜有國三百年仁義道馳騁未改祖宗法天胡肆大𤯝細思天地理中有幸不幸天果喪中原大似裂冠衽君誠不獨活臣實無魏丙失人焉得人垂戒嘗耿耿江南無謝安塞北有王猛所以戎馬來飛渡以陵境大江限南北今此一舴艋本期固封疆誰謂如畫餅烈火燎昆岡不辨金玉礦妾本良家子性僻守孤梗嫁與尚書兒銜署紫蘭省直以才徳合不棄宿瘤癭初結合歡帶誓比日月昞鴛鴦㑹雙飛比目願長並豈期金石堅化作桑榆景旄頭埶正然􅃖尤氣先屏不意風馬牛復及此燕郢一方遭刼虜六族死俄頃退鷁落迅風孤鸞弔空影簪堅折白玉瓶沉斷青綆一死空冥府憂心長炳炳意堅志不移改邑不改井我本瑚璉器安肯作溺皿志節匪轉石氣噎如吞鯁不作爝火燃願為死灰冷貪生念麴蛾乞憐羞虎穽借此清江水葬我全首領皇天如有知定作血面請願魂化精衞填海使成嶺此詩士大夫多稱道之韓名希孟年十有八魏公五世孫襄陽賈尚書之子瓊之婦死且三十年而其英爽不昧復能託夢趙魏公為書其詩則節婦之名因公之翰墨而愈不朽矣又岳州徐君寳妻某氏亦同時被虜來杭居韓蘄王府自岳至杭相從數千里其主者數欲犯之而終以巧計脫蓋某氏有令姿主者弗忍殺之也一日主者怒甚將欲強焉因告曰俟妾祭謝先夫然後乃為君婦不遲也君奚用怒哉主者喜諾即嚴籹焚香再拜黙祝南向飲泣題滿庭芳詞一闋於壁上已投大池中以死詞曰漢上繁華江南人物尚遺宣政風流緑牕朱戸十里爛銀鈎一旦刀兵齊舉旌旗擁百萬􅆛貅長驅入歌樓舞榭風捲落花愁清平三百載典章文物掃地俱休幸此身未北猶客南州破鑑徐郎何在空惆悵相見無由從今後斷魂千里夜夜岳陽樓杭徐子祥與韓府居相隣嘗聞長老嗟悼之及見所書詞故能言其詳某氏余偶忘其姓噫使宋之公卿將相貞守一節若此數婦者則豈有賣降覆國之禍哉宜乎秦賈之徒為萬世之罪人也岳鄂王岳武穆王飛墓在杭棲霞嶺下王之子雲祔焉自國初以來墳漸傾圮江州岳氏諱士迪者於王為六世孫與宜興州岳氏通譜合力以起廢廟與寺復完美久之王之諸孫有為僧者居墳之西為其廢壊廟與寺靡有孑遺天台僧可觀以訴於官時何君頤貞為湖州推官柯君敬仲九思以書白其事田之沒於人者復歸然廟與寺無寸椽片瓦會李君全初為杭總管府經歴慨然以興廢為己任而鄭君明徳元祐為作疏語曰西湖北山褒忠演福禪寺竊見故宋贈太師武穆岳鄂王忠孝絶人功名蓋世方畧如霍驃姚不逢漢武徒結志於忘家意氣如祖豫州乃遇晉元空誓言於擊楫賜墓田棲霞嶺下建祀祠秋水觀西落日鼓鐘長為聲寃於草木空山香火猶將薦爽於淵泉豈期破蕩子孫盡壊久長規制典祊田隳佛宇春秋無所烝嘗塞墓道毁神棲風雨遂頽廟貌休留夜啼拱木躑躅春開斷垣淚落路人事關世教蓋忠臣烈士每詔條有致祭之文豈狂子野僧攙國典出募縁之疏望明有司告之臺省冀聖天子錫之圭璋褒忠義在天之靈激生死為臣之勸周武封比干墓事著遺經唐宗建白起祠恩覃異代疏成郡人王華父一力興建於是寺與廟又復完美且杭州申明浙省轉咨中書以求褒贈適趙公子期在禮部倡議奏聞降命勅封並如宋止加保義二字自我元統一函夏以來名人佳士多有詩弔之不下數十百篇其最膾炙人口者如葉靖逸先生紹翁云萬古知心只老天英雄堪恨亦堪憐如公少緩須㬰死彼國安能八十年漠漠凝塵空偃月堂堂遺像在凌烟早知埋骨西湖路悔不鴟夷理釣船趙魏公孟頫云岳王墳上草離離秋日荒涼石獸危南渡君臣輕社稷中原父老望旌旗英雄已死嗟何及天下中分遂不支莫向西湖歌此曲水光山色不勝悲髙則誠先生明云莫向中州歎黍離英雄生死係安危内廷不下班師詔絶漠全收大將旗父子一門甘伏節山河萬里竟分支孤臣尚有埋身地二帝游魂更可悲潘子素先生純云海門寒日澹無輝偃月堂深晝漏遲萬竈􅆛貅江上老兩宫環珮夢中歸内園羯鼓催花發小殿珠簾看雪飛不道帳前胡旋舞有人行酒著青衣林清源先生泉生云誰收將骨葬西湖已卜他年必沼吳孤冢有人來下馬六陵無樹可棲烏廟堂短計慚􅊔婦宇宙惟公是丈夫往事重觀如敗局一龕燈火屬浮屠讀此數詩而不墮淚者幾希然賊檜欺君賣國雖擢髪不足以數其罪翻四海之波不足以湔其惡而武穆之精忠藹然與天地相終始死猶生也彼思陵者信任姦邪竟無父兄之念亦獨何心哉故余亦有詩云精忠祠宇西湖上再拜荒墳感昔遊斷碣草深蒙奰􅂒空山日落呌鈎輈天移宋祚難恢復帝幸燕雲困楚囚逆檜隂圖傾大業思陵無意問神州偷安甫遂邦家志飲痛甘忘父母讐信使北和憐屈膝策文南駐忍含羞兩宫五國瞻征幟丹詔班師下節樓萬里長城真自壊中興武績遂云休烏乎竟死姦邪手顛沛誰為社稷憂黯黯寃魂遊狴犴紛紛雨淚灑􅆛貅唯餘滿地萇𢎞血不見中流祖逖舟氛􅟓已塵金匼匝冕旒終換鐵兠鍪姓名竹帛書千載父子英雄土一邱老樹尚知朝禹穴遺􅀺總解說王猷復田起廢憐僧寺移檄褒嘉賴省侯聖世即今崇祀典佇看寵渥到松楸精忠宋所賜廟額此詩在未曾加封前作故云時至正己丑也木乃伊回回田地有年七十八歲老人自願捨身濟衆者絶不飲食惟澡身啖蜜經月便溺皆蜜既死國人礆以石棺仍滿用蜜浸鐫志歲月於棺蓋瘞之俟百年後啓封則蜜劑也凡人損折肢體食少許立愈雖彼中亦不多得俗曰蜜人畨言木乃伊輟耕録卷三
