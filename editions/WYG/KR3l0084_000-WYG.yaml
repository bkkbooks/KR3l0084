body:
  text: 乾隆辛丑孟春欽定四庫全書子部十二輟耕録小説家𩔖一雜事之屬提要臣等謹案輟耕録三十巻元陶宗儀撰宗儀有國風尊經已著録此書乃􅇎記聞見瑣事前有至正丙午孫作序書中稱明兵曰集慶軍或曰江南游軍葢丙午為至正二十七年猶未入明時所作也郎瑛七修𩔖稿謂宗儀多録舊書如廣客談通本録之率皆攘為己作今其書未見𫝊本無由證瑛説之確否但就此書而論則於有元一代法令制度及至正東南兵亂之事紀録頗詳所考訂書畫文藝亦多足備㕘證惟多􅇎以俚俗戲謔之語閭里鄙􅁾之事頗乖著作之體葉盛水東日記深病其所載猥䙝良非苛論然其首尾賅貫要為能留心於掌故故朱彛尊靜志居詩話謂宗儀練習舊章元代朝野舊事實借此書以存而許其有禆史學則雖瑜不掩瑕固亦論古者所不廢矣惟第三卷中載楊維楨正統辨二千六百餘言大㫖欲以元承南宋之統而排斥遼金攷隋先代周繼乃平陳未聞唐宋諸儒謂隋承陳不承周也持論殊為紕繆後維楨編東維子集不載此文葢已自悟其謬而削之宗儀乃掇拾縷載尤為寡識今刪除此條用昭公義焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀輟耕録序余友天台陶君九成避兵三呉間有田一廛家於松南作勞之暇每以筆墨自随時時輟耕休於樹隂抱膝而歎鼔腹而歌遇事肯綮摘葉書之貯一破盎去則埋於樹根人莫測焉如是者十載遂累盎至十數一日盡發其藏俾門人小子萃而録之得凡若干條合三十卷題曰南村輟耕録上兼六經百氏之㫖下極稗官小史之談昔之所未考今之所未聞其採摭之博侈於白帖研覈之精擬於洪筆論議抑揚有傷今慨古之思鋪張盛美為忠臣孝子之勸文章制度不辨而明疑似根據可覽而悉蓋唐宋以來專門史學之所未讓雖周室之藏郯子之對有不待環轍而後知又豈抵掌談笑以求賢於優孟者哉九成名宗儀少工舉子業晩乃棄去闔戸著書此其一云至正丙午夏六月江隂孫作大雅序欽定四庫全書輟耕録卷一元陶宗儀撰大元宗室世系
