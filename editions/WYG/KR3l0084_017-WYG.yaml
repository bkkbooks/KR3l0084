body:
  text: 輟耕録卷十七元陶宗儀撰古銅器宋番昜張世南宦㳺紀聞云辨博書畫古器前輩盖嘗著書矣其間有論議而未詳明者如臨摹硬黄響榻是四者各有其說今人皆謂臨摹為一體殊不知臨之與摹逈然不同臨謂置紙在旁觀其大小濃淡形勢而學之若臨淵之臨摹謂以薄紙覆上随其曲折婉轉用筆曰摹硬黄謂置紙熱熨斗上以黄蠟塗匀儼如枕角毫釐必見響榻謂以紙覆其上就明窓牖間映光摹之辨古器則有所謂欵識臘茶色朱砂斑真青緑井口之𩔖方為真古其製作有雲紋雷紋山紋輕重雷紋垂花雷紋鱗紋細紋粟紋蟬紋黄目飛廉饕餮蛟螭虬龍麟鳯熊虎龜蛇鹿馬象鸞䕫犧蜼鳬雙魚蟠虺如意圜絡盤雲百乳鸚耳貫耳偃耳直耳附耳挟耳獸耳虎耳獸足䕫足百獸三螭穟草瑞草帶若蚪結之勢星帶四旁飾以星象輔乳鐘名用以節樂者碎乳鐘名大乳三十六外復有小乳周之立䕫雙䕫之𩔖凡古器制度一有合此則以名之如雲雷鐘鹿馬洗鸚耳壺之𩔖是也如有欵識則以欵識名如周叔液鼎齊侯鐘之𩔖是也古器之名則有鐘大曰特中曰鎛小曰編鼎尊罍彛舟𩔖洗而有耳卣音酉又音由中尊器也有攀盖足𩔖壺瓶爵斗有耳有流有足流即觜也巵觶之豉切酒觴也角𩔖彛而無柱桮敦簠其形方簋𩔖鼎而矮盖有四足豆獻牛偃切無底甑也錠徒徑切又都定切斚觚鬲形製同鼎漢志謂空足曰鬲鍑才宥切玉篇云似釜而大其實𩔖小瓮而有環盉户戈切又胡臥切盛五味之器也似鼎而有盖有觜有執攀壺其𩔖有四曰圓曰匾曰方曰温盫於含切覆盖也似洗様而腰大有足有提攀瓿蒲後切𩔖壺而矮鋪𩔖豆鋪陳薦獻之義罌𩔖釜鑑盛水器上方如斗鏤底如風窓下設盤以盛之匜代支切沃盥器盤洗盆鋗呼𤣥切𩔖洗玉篇云小盆也杅磬錞鐸征𩔖鐘而矮鐃戚鐓飾物柄者奩鑑即鏡節鉞戈矛盾弩機表坐旂鈴刀筆杖頭蹲龍宫廟乗輿之飾或云䦨楯間物鳩車兒戱之具提梁龜蛇硯滴車輅托轅之屬此其大槩難扵盡備然知此者亦思過半矣所謂欵識乃分二義欵謂隂字是凹入者刻畫成之識謂陽字是挺出者正如臨之與摹各自不同也臘茶色亦有差别三代及秦漢間器流𫝊世間嵗月寖乆其色㣲黄而潤澤今士大夫間論古器以極薄為真此盖一偏之見也亦有極薄者有極厚者但觀製作色澤自可見也亦有數百年前句容所鑄其藝亦精今鑄不及必竟黑而燥須自然古色方為真古器也趙􅛽鵠洞天清録集古鐘鼎彛器辨云夏尚忠商尚質周尚文其制器亦然商器質素無文周器雕細宻此固一定不易之論而夏器獨不然余嘗見夏琱戈扵銅上相嵌以金其細如髮夏器大抵皆然嵗久金脫則成隂窽以其刻畫者成凹也銅器入土千年純青如鋪翠其色子後稍淡午後乗隂氣翠潤欲滴間有土蝕處或穿或剥並如蝸自然或有斧痕則是偽也銅器墜水千年則純緑色而瑩如玉未及千年緑而不瑩其蝕處如前今人皆以此二品體輕者為古不知器大而厚者銅性未盡其重止能減三分之一或減半器小而薄者銅性為水土蒸淘亦盡至有鉏擊破處並不見銅色惟翠緑徹骨或其中有一線紅色如丹然尚有銅聲𫝊世古則不曾入水土惟流傳人間色紫褐而有硃砂斑甚者其斑凸起如上等辰砂入釜以沸湯煑之良久斑愈見偽者以漆調朱為之易辨也三等古銅並無腥氣惟土古新出土尚帶土氣久則否若偽作者熱摩手心以擦之銅腥觸鼻所謂識紋欵紋亦不同識乃字以紀功所謂銘書鐘鼎夏用鳥跡商則蟲魚周以蟲魚大秦用大小漢以小𨽻書三國𨽻書晉宋以来用楷書唐用楷隸三代用隂識謂之偃蹇字其字凹入也漢已来或用陽識其字凸間有凹者或用刀刻如鐫碑盖隂識難鑄陽識易為决非三代物也欵乃花紋以為飾古器欵居外而凸識居内而凹夏周器有欵有識商器多無欵有識古人作事精緻工人預四民之列非若後世賤丈夫之事故古器欵必細如髮匀整分曉無纎毫糢糊識文之筆畫宛宛如仰瓦而不深峻大小深淺如一亦明浄分曉無纎毫糢糊此盖用銅之精者並無砂顆一也良工精妙二也不吝工夫非一朝夕所為三也今設有古器欵稍或糢糊必是偽作質色臭味亦自不同句容器非古物盖自唐天寳間至南唐後主時扵昇州句容縣置官塲以鑄之故其上多有監官花押其輕薄漆黑欵細雖可愛要非古器嵗乆亦有㣲青色者世所見天寳時大鳯環瓶此極品也偽古銅器其法以水銀雜錫末即今磨鏡藥是也先上在新銅器上令匀然後以釅醋調細碙砂末筆蘸匀上候如臘茶面色急入新汲水滿浸即成臘茶色候如漆急入新水浸成漆色浸稍緩即變色矣若不入水則成純翠色三者並以新布擦令光瑩其銅腥為水銀所匱並不發露然古銅聲㣲而清新銅聲濁而閧不能逃識者之見古人惟鐘鼎祭器稱功頌徳則有識盤盂寓戒則有識他器亦有無識者不可遽以為非但辨其體質欵紋顔色臭味足矣夫二書之論銅器固已粲然具備然清修好古之士又不可不讀經傳紀録以求其源委如薛尚功欵識法帖及重廣鐘鼎韻七卷者宣和博古圖吕大臨考古圖王俅嘯堂集古録黄睿東觀餘論董逌廣川書跋等書皆當熟味徧㕘而斷之以經庶可言精鍳也石敢當今人家正門適當巷陌橋道之衝則立一小石將軍或植一小石碑鐫其上曰石敢當以厭禳之按西漢史㳺急就章云石敢當顔師古注曰衛有石碏石買石惡鄭有石制皆為石氏周有石速齊有石之紛如其後以命族敢當所向無敵也據所說則世之用此亦欲以為保障之意方頭俗謂不通時宜者為方頭陸魯望詩云頭方不㑹王門事塵土空緇白紵衣七十二玉臺詩入門時左頋但見雙鴛鴦鴛鴦七十二羅列自成行孟東野和薔􅅔歌仙機軋軋飛鳯凰花開七十有二行詩皆用七十二不知何所祖旃檀佛京師旃檀佛以靈異著聞海宇王侯公相士庶婦女捐金荘嚴以丐福利者嵗無虚日故老相𫝊云其像四體無所倚着人君有道則至其國國初時尚可通一綫無礙今則不然矣按翰林學士程鉅夫瑞像殿碑刻云􅇚迦如来初為太子生七日母摩耶棄世生忉利天佛既成道思念母恩遂昇忉利天為母說法優填國王自以乆失瞻仰扵如来欲見無從乃刻旃檀為像目犍連尊者慮有闕陋躬以神力攝三十二匠昇忉利天諦觀相好三返乃得其真既成國王臣民奉之猶真佛焉及佛自忉利天復至人間王率臣庶同往迎佛此像騰歩空中向佛稽首佛為摩頂授記曰我滅度千年之後汝従震旦東士也廣利人天由是西土一千二百八十五年龜兹六十八年凉州十四年長安一十七年江南一百七十三年淮南三百六十七年復至江南二十一年汴梁一百七十七年北至燕京居聖安寺十二年北至上京大儲慶寺二十年南還燕宫内殿五十四年丁丒嵗三月燕宫火迎還聖安寺居今五十九年乙亥嵗當今大元世祖皇帝至元十二年也帝遣大臣博囉等四衆備法駕仗衛音伎迎奉萬夀山仁智殿丁丒建大聖安寺己丑嵗自仁智殿迎安寺之後殿大作佛事瑞像計自優填王造始之嵗至今延祐丙辰凡二千三百有七年又釋氏感通録云梁武帝遣郝騫等往天竺國迎佛旃檀像其王模刻一像付騫天監十年至建康帝迎奉太極殿建齋度僧大赦斷殺自是蔬食絶慾據此說又與碑文不同即今聖安寺所安之像抑優填之所刻歟天竺之摹刻歟𫝊席今人家娶婦輿轎迎至大門則𫝊席以入弗令履地然唐人已爾樂天春深娶婦家詩云青衣轉去聲氊褥錦繡一條斜歸婦吟吉之永豐劉氏女天兵南下日為東平王郎中宥所虜後王聞其父母兄弟舅姑夫子咸在因放之歸且作歸婦吟以送之詩曰烈火都將玉石焚死生契濶憶中分信音一絶思青鳥望眼雙穿見白雲殘日鶺鴒還有難北風鴻鴈正離羣新詩送爾還家去重續當年織錦紋吁固雖劉氏有莫大之幸而王亦仁人者矣穿耳或者謂晉唐間人所畫士女多不帶耳環以為古無穿耳者然荘子曰天子之侍御不叉揃不穿耳自古亦有之矣丫頭吴中呼女子之賤者為丫頭劉賔客寄贈小樊詩花面丫頭十三四春来綽約向人時㸃心今以早飯前及飯後午前午後晡前小食為㸃心唐史鄭傪為江淮留後家人備夫人晨饌夫人頋其弟曰治妝未畢我未及餐爾且可㸃心則此語唐時已然奴婢今蒙古色目人之臧獲男曰奴女曰婢總曰驅口盖國初平定諸國日以俘到男女匹配為夫婦而所生子孫永為奴婢又有曰紅契買到者則其元主轉賣扵人立劵投稅者是也故買良為驅者有禁又有陪送者則摽撥随女出嫁者是也奴婢男女止可互相婚嫁例不許聘娶良家若良家願娶其女者聽然奴或致富主利其財則俟少有過犯杖而錮之席卷而去名曰抄估亦有自願納其財以求脫免奴籍則主署執憑付之名曰放良刑律私宰牛馬杖一百敺死驅口比常人减死一等杖一百七所以視奴婢與馬牛無異按周禮其奴男子入于皁隸女子入于舂藁說文奴婢皆古罪人夫今之奴婢其父祖初無罪惡而世世不可逃亦可痛已又奴婢所生子亦曰家生孩兒按漢書陳勝𫝊秦令少府章邯免驪山徒人奴産子師古曰奴産子猶人云家生奴也則家生兒亦有所據愠羝愠羝謂腋氣也唐崔令欽敎坊記云范漢女大娘子亦是竿木家開元二十一年出内有姿媚而㣲愠羝天子争臣張公可與者濟南人律身廉正持法公平茍可以納忠扵國雖斧鉞有所不避為中書郎中日先帝時一大姦以元惡受顯戮後二子夤縁入侍幸沐天眷特各授行省平章陛辭叩首言曰先臣在九原弗獲霑一命之榮當不瞑目臣敢昧死請上命左右𫝊㫖中書獨公不奉詔越數日上召丞相面諭之丞相退謂公曰聖意寵遇之深當復奈何公曰朝廷果欲舉行贈典必湏雪其非罪若然是先帝不合誅之以先帝為何如主哉則上之扵先帝反不若大姦之有後矣不孝孰大焉丞相備公言以聞上為動容而止公以病在告都堂有人訴宗室謀逆奏送刑部問状逮鞫有證驗而死于獄宗室之妻見上泣曰臣妾夫某無罪枉死上但知送部而不謂其已死聖怒命御史臺鞫問丞相懼謀之公即扶疾至省取牘補署花押衆皆愕然丞相曰恐掾史所行有錯欲照略耳非謂此也公曰自丞相以下皆當聽問某何獨求免耶既而緘牘令該掾抱詣臺臺官首問曰張郎中曽書卷否曰然臺官議曰張郎中所行未嘗差錯况此一事中書得㫖施行執法者復何罪因覆奏曰臣等取省案根勘宗室某之死不枉上頷之其事遂寝如公者誠天子之争臣也夫嬸妗宋張文潜明道雜志云經𫝊中無嬸妗二字嬸字乃世母字二合呼妗字乃舅母字二合呼也二合如真言中合兩字音為一黄金縷蘇小小見諸古今吟咏者多矣而世又圖寫以玩之一何動人也如此哉春渚紀聞云司馬才仲初在洛下晝寝夢一美姝牽帷而歌曰妾本錢唐江上住花落花開不管流年度燕子銜將春色去紗窓幾陣黄梅雨才仲愛其詞因詢曲名云是黄金縷且曰後日相見扵錢唐江上及才仲以東坡先生薦應制舉中等遂為錢唐幕官其􅇬舍後堂蘇小墓在焉時秦少章為錢唐尉為續其詞後云斜揷犀梳雲半吐檀板輕敲唱徹黄金縷夢斷綵雲無覔處夜凉明月生春浦不逾年而才仲得疾所乗畫水輿犧泊河塘柁工遽見才仲擕一麗人登舟即前聲喏而火起舟尾蒼忙走報家已慟哭矣能改齋漫録云劉次荘樂府觧題曰錢唐蘇小小歌蘇小小非唐人世見樂天夢得詩多稱咏遂謂與之同時耳次荘雖知蘇小小非唐人而無所據余按郭茂倩所編引廣題曰蘇小小錢唐名娼也盖南齊時人西陵在錢唐江之西故古辭云何處結同心西陵松柏下余嘗記虞美人長短句云槐隂别院宜清晝入坐春風秀美人圖子阿誰留都是宣和名筆内家收鶯鶯燕燕分飛後粉淡梨花痩只除蘇小不風流斜揷一枝萱草鳯釵頭亦藴藉可喜乃元遺山先生所作也哨遍某人以善經紀積貲至鉅萬計而既鄙且嗇不欲書其姓名其尊行錢素菴者抱素逸士也多㳺名公卿間善詩曲有集行於世某嘗以貴富驕之故作今樂府一闋譏警焉哨遍試把賢愚窮究看錢奴自古呼銅臭徇已苦貪求待不敎泉貨周流忍包羞油鐺揷手血海舒拳肯落他人後曉夜尋思機彀縁情鉤鉅巧取旁捜蠅頭塲上苦驅馳馬足塵中厮追逐積儧下無厭就捨死忘生出乖弄醜耍孩兒安貧知足神明佑好聚歛多招悔尤王戎遺下舊牙籌夜連明計算無休不思日月搬烏兎只與兒孫作馬牛添消痩不調䄄鼎恣逞戈矛十煞漸消磨雙臉春已凋颼兩􅁂秋終朝不樂眉長皺恨不得櫃頭錢五分息招人借架上袑一周年不放贖狠毒性如狼狗把平人骨肉做自己膏油九有心待拜五侯敎人喚甚半州忍饑寒儧得家私厚待壘做錢山兒倩軍士喝號提鈴守怕化做錢龍兒請法官行罡布氣留半炊兒八徧把牙闗叩只願得無支有管少出多收八􅃜心事儘意為不義財儘力掊那裏問親弟兄親姊妹親姑舅只待要春風金谷驕王凱一任敎夜雨新豐困馬周無親舊只知敬明眸皓齒不想共肥馬輕裘七資生利轉多貪婪意不休為錙銖捨命尋争鬭田連阡陌心猶窄架揷詩書眼不瞅也學采東籬菊子是箇装呵元亮豹子浮邱六恨不得楊子江變作酒棗穰金積到斗為幾文贉背錢受了些旁人呪一斗粟與親眷分了顔面二斤麻把相知結下冦讐真紕繆一味的驕而且吝甚的是樂以忘憂五這財曾然了董卓臍曽梟了元載頭聚而不散遭殃咎怕不是堆金積玉連城富眨眼早野草閒花滿地愁干生受生財有道受用無由四有一日大小運併在命官死囚限􅅶在卯酉甚的散得疾只為你聚来得驟恰待調和新曲歌金帳逼臨得佳人墜玉樓難收救一壁相投河奔井一壁相爛額焦頭三窓槅每都颭颭的飛椅卓每都出出的走金銀錢米都消為塵垢山魈木客相呼喚寡宿孤辰厮趂逐喧白晝花月妖將家人狐媚虚耗鬼把倉庫潜偷二惱天公降下災犯官刑繫在囚他用錢時難參透待買他土木驢釘子輕輕釘弔脊筋鈎兒淺淺鈎便用殺難寛宥魂飛蕩蕩魄散悠悠尾出落他平生聚歛的情都寫做臨刑犯罪由將他死骨頭告示向通衢裏甃任他日炙風吹慢慢的朽樂府中押逐贖菊字韻者盖中州之音輕與尤字韻相近故也此曲雖曰為某而作然亦可以為世勸花蕋夫人蜀主孟昶納徐匡璋女拜貴妃别號花蘂夫人意花不足擬其色似花蘂之翾輕也或以為姓費氏則誤矣崔麗人余向在武林日扵一友人處見陳居中所畫唐崔麗人圖其上有題云並燕鶯為字聨徽氏姓崔非烟宜采畫秀玉勝江梅薄命千年恨芳心一寸灰西廂舊紅樹曾與月徘徊余丁卯春三月銜命陕右道出扵蒲東普救之僧舍所謂西廂者有唐麗人崔氏女遺照在焉因命畫師陳居中繪模真像意非登徒子之用心迨將勉情鍾始終之戒仍拾四十言使好事者知百勞之歌以記云泰和丁卯林鐘吉日十洲種玉大誌宜之題延祐庚申春二月余傳命至東平頋市粥雙鷹圖觀乆之弗見主人而歸夜宿府治西軒夢一麗人綃裳玉質逡廵而前曰君玩雙鷹圖雖佳非君几席間物妾流落乆矣有雙鷹名冠古今願託君為重覺而怪之未卜其何祥遲明欲行忽主人携鷹圖来且四軸余意麗人雙鷹符此數耳繼出一小軸乃夢所見有詩四十字跋語九十八識曰泰和丁卯出蒲東普救僧舍繪唐崔氏鶯鶯真十洲種玉大誌宜之題畫詩書皆絶神品也余驚詫良乆時有司羣官吏環視因縮不目託以跋語佳勝贖之吁物理相感果何如耶豈法書名畫自有靈耶抑名不朽者随神耶遇合有定數耶余嘗謂闗雎碩人姿徳兼備君子之配也琴心雪句才艶聨芳文士之偶也自詩書道廢丈夫弗學况女流乎故近世非無秀色往往脂粉腥􅁾鴉鳯莫辨求其彷彿待月章之萬一絶代無聞焉此亦慨世降之一端也因歸于我義弗辭已宜之者盖前金趙愚軒之字曾為鞏西簿遺山謂泰和有詩名五言平淡他人未易造信然泰和丁卯迨今百十四年云其月二日壁水見士思容題右共五百九字雖不知壁水見士為何如人然二君之風韻可想見矣因俾嘉禾繪工盛懋臨寫一軸適舅氏趙公待制雝見而愛之就為録文扵上按唐元㣲之𫝊竒鶯鶯事以為張生寓蒲之普救寺適有崔氏孀婦亦止兹寺崔氏婦鄭氏也生出扵鄭視鄭則異𣲖之從母因丁文雅軍擾掠蒲人鄭惶駭不知所措生與將之靈善請吏䕶之不及扵難鄭厚生徳謂曰姨之弱子幼女當以仁兄之禮奉承命鶯鶯出拜顔色艶異光輝動人生問其年紀鄭曰十七嵗矣生自是惓之私禮鶯鶯之侍婢紅娘間道其意既而詩章往復遂酬所願中間離合多故然不能終諧伉儷說者以為生即張子野宋王性之著傳竒辨正按㣲之作姨母鄭氏墓銘云其既䘮夫遭軍亂㣲之為保護其家又作陸氏誌云余外祖睦州刺史鄭濟白樂天作㣲之母鄭氏誌亦言鄭濟女而唐崔氏譜永寧尉鵬娶鄭濟女則鶯鶯乃崔鵬之女扵㣲之為中表也𫝊竒言生年二十二樂天作㣲之墓誌以太和五年薨年五十三即當以大歴十四年己未生至貞元庚辰正二十二嵗凡此數端决為㣲之無疑特託他姓以避就耳事具侯鯖録中江浙省地分江浙行省建治所于杭陸路赴都三千九百二十四里若水程則四千四百四十里東至大海四百九里順風海洋七日七夜可到日本國西至鄱陽湖接連江西省南康路界一千三百四十五里南至汀洲路接連廣東潮州界二千四百二十里北至楊子江接連淮南省揚州界七百二十里東到大海四百九里西到江西省南康路一千七百五里南到廣東潮州路二千五百一十里北到淮南省揚州路七百六十五里東南到漳州路海岸二千四百九十九里西南到江西省建昌路一千五百九十里東北到松江海岸五百二十二里西北到池州路接連河南省安慶路一千三百四十二里此四至八到也今割福建道立行省則又不同矣改常今人謂易其所守者曰改常北夢瑣言左軍容使嚴遵美閹官中仁人也嘗一日發狂手足舞蹈傍有一猫一犬猫忽謂犬曰軍容改常也
