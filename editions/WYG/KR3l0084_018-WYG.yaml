body:
  text: 輟耕録卷十七欽定四庫全書輟耕録卷十八元陶宗儀撰叙畫唐張彦逺著歴代名畫記十卷自軒轅時至㑹昌元年能畫者三百七十餘人其敘畫之源流曰夫畫者成教化助人倫窮神變測幽㣲與六籍同功古先聖王受命應籙則有龜字効靈龍圖呈寳自巢燧已來皆有此瑞庖犧氏發於滎河中典籍圖畫萌矣軒轅氏得於温洛中史皇蒼頡狀焉是時也書畫同體而未分象制肇創而猶畧無以傳其意故有書無以見其形故有畫按字學之部其六曰鳥書在幡信上書端象鳥頭者則畫之流也顔光禄云圖載之意有三一曰圖理卦象是也二曰圖識字學是也三曰圖形繪畫是也又周官教國子以六書其三曰象形則畫之意也是故知書畫異名而同體也洎乎有虞作繪繪畫明矣既就彰施仍深比象於是禮樂大闡教化由興故能揖讓而天下治廣雅云畫𩔖也爾雅云畫形也說文云畫畛也象曰畛畔所以畫也釋名云畫掛也以采色掛物象也故鐘鼎刻則識魑魅而知神姦旂章明則昭軌度而備國制清廟肅而尊彛陳廣輪度而疆理辨以忠以孝盡在於雲臺有烈有勲皆登於麟閣見善足以戒惡見惡足以思賢故陸士衡云宣物莫大於言存形莫善於畫此之謂也其論畫六法曰昔謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨𩔖傳采五曰經營位置六曰傳模移寫自古畫人罕能兼之彦逺試論之曰古之畫或能遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得形似而氣韻不生以氣韻求其畫則形似在其間矣上古之畫迹簡意淡而雅正顧陸之流是也中古之畫細宻精緻而臻麗展鄭之流是也近代之畫煥爛而求備今人之畫錯亂而無㫖衆工之迹是也夫象物必在乎形似形似須全其骨氣骨氣形似皆本乎立意而歸乎用筆顧愷之曰畫人最難次山水次狗馬其臺閣一定器耳差易為也斯言得之至於鬼神人物有生動之可狀湏神韻而後全故韓子曰狗馬難鬼神易狗馬乃凡俗所見鬼神乃譎怪之狀斯言得之至於經營位置則畫之總要然今之畫人粗善寫貌得其形似則無其氣韻具其采色則失其筆法豈曰畫也其論畫體工用榻寫曰夫畫物特忌形貌采章歴歷具足甚謹甚細而外露巧宻所以不患不了而患於了既知其了亦何必了此非不了也若不識其了是真不了也夫失於自然而後神失於神而後妙失於妙而後精精之為病也而成謹細自然者為上品之上神者為上品之中妙者為上品之下精者為中品之上謹而細者為中品之中余今立此五等以包六法以貫衆妙其間詮量可有數百等孰能周知非夫神邁識高情超心慧者豈可議乎知畫宋郭若虚著圖畫見聞志六卷自唐㑹昌元年至神宗熈寜七年能畫者二百七十四人其論製作楷模曰大率圖畫風力氣韻固在當人其如種種之要不可不察畫人物必分貴賤氣貌朝代衣冠釋門有善功方便之顔道像具修真度世之範帝王崇上聖天日之表外夷得慕華欽順之情儒賢見忠信禮義之風武士多勇悍英烈之貌𨼆逸識肥遯高世之節貴戚尚紛華侈靡之容天帝明威福嚴重之儀鬼神作魗䰩尺者反馳趡干鬼反之狀士女宜秀色婑鳥果反媠奴坐反之態田家有醇甿朴野之真畫衣紋林石用筆全𩔖于書衣紋有重大而調暢者有縝細而勁健者勾綽縱掣理無妄下以狀高側深斜卷摺飄舉之勢林木有樛枝梃􅆬屈節皴皮紐裂多端分敷萬狀作怒龍驚􅚣之勢聳凌霄翳日之姿山石多作礬頭亦為稜面落筆便見堅重之性皴淡即生窊凸之形破墨之功尤難畫畜獸全要停分向背筋力精神肉質肥圓毛骨𨼆起畫龍窮游泳蜿蜒之妙得回蟠升降之宜畫水湯湯若動使觀者有浩然之氣畫屋木折算無􅃜筆畫匀壯深逺透空畫花竹有四時㬌候隂陽向背筍篠老嫩苞蕚先後自然艶麗閒野逮諸園蔬野草咸有出土體性畫禽鳥識形體各件之異悟翔舉飛集之態其論氣韻非師曰謝赫六法精論萬古不移然而骨法用筆以下五法可學如其氣韻必在生知固不可以巧宻得復不可以歲月到黙契神㑹不知然而然其論用筆得失曰凡畫氣韻本乎游心神采生於用筆意在筆先筆周意内畫盡意在像應神全夫内自足然後神閒意定神閒意定則思不竭而筆不困也畫有三病皆繫用筆一曰版二曰刻三曰結版者腕弱筆痴全􅉛取與物狀平􅄶不能圓混也刻者運筆中疑心手相戾勾畫之際妄生圭角也結者欲行未行當散不散似物凝滯不能流暢也其論古今優劣曰佛道人物士女牛馬近不及古山水林石花竹禽魚古不及近何以明之且顧愷之陸探㣲張僧繇吳道𤣥及閻立徳立本皆純重雅正性出天然吳生之作為萬世法號曰畫聖張萱周昉韓幹戴嵩氣韻骨法皆出意表後之學者終莫能到故曰近不及古如李成關仝范寛董源之迹徐熈黄筌居宷之蹤前不籍師資後無復繼踵者借使二李三王之輩復起邊鸞陳庻之倫再生亦將何以措手於其間哉故曰古不及近鄧椿著畫繼十卷自熈寧七年至孝宗乾道三年能畫者一百一十九人其論逺曰畫之為用大矣盈天地間者萬物悉皆含豪運思曲盡其態而所以能曲盡者止一法耳一者何也曰傳神而已矣世徒知人之有神而不知物之有神此若虚深鄙衆工謂雖曰畫而非畫者蓋止能傳其形不能傳其神也故畫法以氣韻生動為第一而若虚獨歸於軒冕巖穴有以哉又曰自昔鑒賞家分品有三曰神曰妙曰能獨唐朱景真譔唐賢畫録三品之外更増逸品其後王休復作益州名畫記乃以逸為先而神妙能次之景真雖云逸格不拘常法用表賢愚然逸之高豈得附於三品之末未若休復首推之為當也又有畫繼𥙷遺一卷不知誰所譔則自乾道以後至理度間能畫者八十餘人爾後陳徳輝著續畫記一卷再自高宗建炎初至幼主徳祐乙亥能畫者一百五十一人然與畫繼補遺則相出入者耳二書僅可考閱姓名無足觀也趙希鵠洞天清録集云古畫多直幅至有畫身長八尺者雙幅亦然横披始於米氏父子非古制也河北絹經緯一等故無背面江南絹則經粗而緯細有背面唐人畫或用搗熟絹為之然止是生搗令絲褊不礙筆非如今煑鍊如漿也古絹自然破者必有鯽魚口與雪絲僞作者則否古畫色墨或淡黑則積塵所成自有一種古香可愛若偽作者多作黄色而鮮明不塵暗此可辨也米芾畫史云古畫若得之不脫不湏背褾若不佳換褾一次背一次壊屢更矣深可惜蓋人物精神髪采花之濃艶蜂蝶只在約畧濃淡之間一經背多或失之也古畫至唐初皆生絹至吳生周昉韓幹後來皆以熟湯湯半熟搥如銀版故作人物精采入筆今人收唐畫必以絹辨見紋粗便云不是唐非也張僧繇閻令畫皆生絹南唐畫皆粗絹徐熈絹或如布絹素百破必好畫裂文各有辨長幅横卷裂紋横横幅直卷裂紋直各隨軸勢裂也直㫁不當一縷歳乆卷自兩頭蘇開㫁不相合不作毛搯亦蘇不可僞作其僞者快刀直過當縷兩頭依舊生作毛起搯又堅紉也濕染者色棲縷間乾熏者烟臭上深下淺古紙素有一般古香真絹色淡雖百破而色明白精神采色如新惟佛像多經香烟熏損本色染絹作溫香色棲塵文間最易辨仍盖色上作一重古破不直裂湏連兩三經不可僞作國朝東楚湯垕字君載號采真子著畫鑒一卷論歴代名畫悉有依據其雜論曰古人作畫皆有深意運思落筆莫不各有所主况名下無虚士相傳既乆必有過人處今人看畫出自己見不經師授不閱記録但合其意者為佳不合其意者為不佳及問其如何是佳則茫然失對僕自十七八歳時便有迂濶之意見圖畫愛玩不去手見鑒賞之士便加禮問徧借記録彷彿成誦詳味其言歴觀名迹叅考古說始有少悟若不留心不過為聽聲隨影終不精鑒也燈下不可看畫醉餘酒邊不可看畫俗客尤不可示之卷舒不得其法最為害物至於庸人孺子見畫必看妄加雌黄品藻本不識物亂訂真僞令人短氣古人畫藁謂之粉本前輩多寳畜之蓋其草草不經意處有天然之妙宣和紹興所藏粉本多有神妙古人作畫有得意者多再作之如李成寒林范寛雪山王詵烟江疊嶂不可枚舉看畫如看美人其風神骨相有體肌之外者今人看古迹必先求形似次及傅染次及事實殊非賞鑒之法也元章謂好事家與賞鑒家自是兩等家多資力貪好名勝遇物收置不過聴聲此謂好事若鑒賞則天資高明多閱傳録或自能畫或深畫意毎得一圖終日寳玩如對古人不能奪也觀六朝畫先觀絹素次觀筆法次觀氣韻大槩十中可信者一二有御府題印者尤不可信古畫東移西掇撏補成章此弊自高宗朝莊宗古始也余友人吳興夏文彦字士良號蘭渚生其家世藏名蹟鮮有比者朝夕玩索心領神㑹加以游於畫藝悟入厥趣是故鑒賞品藻萬不失一因取各畫記圖畫見聞志畫繼續畫記為本叅以宣和畫譜南渡七朝畫史齊梁魏陳唐宋以來諸家畫録及傳記雜說百氏之書捜潜剔祕網羅無遺自軒轅時至宋幼主徳祐乙亥得能畫者一千二百八十餘人又女真三十人本朝自至元丙子至今九十餘年間二百餘人共一千五百餘人其考覈誠至矣其用心良勤矣所論畫之三品蓋擴前人所未發論曰氣韻生動出於天成人莫窺其巧者謂之神品筆墨超絶傅染得宜意趣有餘者謂之妙品得其形似而不失䂓矩者謂之能品古人畫墨色俱入絹縷精神逈出偽者雖極力彷彿而粉墨皆浮於縑素之上神氣亦索然蓋古人筆法圓熟用意精到初若率易愈玩愈佳今人雖極工緻一覽而意盡矣唐及五代絹素粗厚宋絹輕細望而可别也御題畫真僞相雜徃徃有當時名筆臨摹之作故祕府所藏臨摹本皆題為真迹惟明昌所題最多具眼自能識也吁可謂真知畫者哉記宋宫殿廉訪使楊文憲公煥字煥然乾州奉天人嘗作汴故宫記云己亥春三月按部至于汴汴長史宴于廢宫之長生殿懼後世無以考為纂其大槩云皇城南外門曰南薫南城之北新城門曰豐宜橋曰龍津橋北曰丹鳳而其門三丹鳯北曰州橋橋少北曰文武樓遵御路而北横街也東曰太廟西曰郊社正北曰承天門而其門五雙闕前引東曰登聞檢院西曰登聞鼔院檢院之東曰左掖門門之南曰待漏院鼓院之西曰右掖門門之南曰都堂承天之北曰大慶門而日精門左昇平門居其東月華門右昇平門居其西正殿曰大慶殿東廡曰嘉福樓西廡曰嘉瑞樓大慶之後曰徳儀殿徳儀之東曰左昇龍門西曰右昇龍門王門曰隆徳曰蕭牆曰丹墀曰隆徳殿隆徳之左曰東上閣門右曰西上閣門皆南嚮東西二樓鐘鼓之所在鼔在東鐘在西隆徳之次曰仁安門仁安殿東則内侍局内侍之東曰近侍局近侍之東曰嚴祗門宫中則曰撤合門少南曰東樓即授除樓也西曰西樓仁安之次曰純和殿正寢也純和西曰雪香亭雪香之北后妃位也有樓樓西曰瓊香亭亭西曰涼位有樓樓北少西曰玉清殿純和之次曰寧福殿寧福之後曰苑門由苑門而北曰仁智殿有二大石左曰敷錫神運萬歳峰右曰玉京獨秀太平巖殿曰山莊莊之西南曰翠㣲閣苑門東曰仙韶院院北曰湧翠峰峰之洞曰大滌湧翠東連長生殿殿東曰湧金殿湧金之東曰蓬萊殿長生西浮玉殿浮玉之西曰瀛洲殿長生之南曰閲武殿閱武南曰内藏庫由嚴祗門東曰尚食局尚食東曰宣徽院宣徽北曰御藥院御藥北曰右藏庫右藏之東曰左藏宣徽東曰㸃檢司㸃檢北曰祕書監祕書北曰學士院學士之北曰諫院諫院之北曰武器署㸃檢之南曰儀鸞局儀鸞之南曰尚輦局宣徽之南曰拱衛司拱衛之南曰尚衣局尚衣之南曰繁禧門繁禧南曰安泰門安泰西與左升龍門直東則夀聖宫兩宫太后位本明俊殿試進士之所宫北曰徽音殿徽音之北曰燕夀殿燕壽殿垣後少西曰震肅衛司東曰中衛尉司儀鸞之東曰小東華門更漏在焉中衛尉司東曰祗肅門祗肅門東少南曰將軍司徽音夀聖之東曰太后苑苑之殿曰慶春慶春與燕夀並小東華與正東華對東華門内正北尚廏局尚廏西北曰臨武殿左掖門正北尚食局局南曰宫苑司宫苑司西北曰尚醖局湯藥局侍儀司少西曰符寳局器物局西則撒合門嘉瑞樓西曰三廟正殿曰徳昌東曰文昭殿西曰光興殿並南嚮徳昌之後宣宗廟也宫西門曰西華與東華直其北門曰安貞二大石外凡花石臺榭池亭之細並不録觀其制度簡素比土階茅茨則過矣視漢之所謂千門萬户珠璧華麗之室則無有也然後之人因其制度而損益之以求其稱斯可矣公又有録汴梁宫人語五言絶句一十九首雖一時之所寄興亦不無有傷感之意今併附于此詩曰一入深宫裏經今十五年長因批帖子呼到御床前右一歲歳逢元夜金蛾閙簇巾見人心自怯終是女兒身右二殿前輪直罷偷去賭金釵怕見黄昏月殷勤上玉階右三翠翹珠掘背小殿夜藏鈎驀地羊車至低頭笑不休右四内府頒金帛教酬賀節盤兩宫新有㫖先與問孤寒右五人間多􅀥栗不到九重天長􅀍黄衫吏花攤月賜錢右六仁聖生辰節君王進玉巵夀棚兼夀表留待北還時右七邊奏行臺急東華夜啓封内人催歩輦不候景陽鐘右八畫燭雙雙引珠簾一一開輦前齊下拜歡飲辟寒盃右九聖躬香閣内只道下朝遲扶杖嬌無力紅綃貼玉肌右十今日天顔喜東朝内宴開外邊農事動詔遣教坊回右十一駕前雙白鶴日日候朝回自送鑾輿去經今更不來右十二陡覺文書靜相將立夕陽傷心寧福位無復夜熏香右十三二后睢陽去潜身泣到明却回誰敢問校似有心情右十四為道圍城乆妝奩鬭犒軍入春渾㫁絶饑苦不堪聞右十五監國推梁邸初頭靜不知但疑牆外笑人有看宫時右十六别殿弓刀嚮倉皇接鄭王尚愁宫正怒含淚强添妝右十七一向傳宣喚誰知不復還來時舊鍼線記得在窓間右十八北去遷沙漠誠心畏從行不如當日死頭白若為生右十九陳隨應南度行宫記云杭州治舊錢王宫也紹興因以為行宫皇城九里入和寧門左進奏院玉堂右中殿外庫至北宫門循廊左序巨璫幕次列如魚貫祥曦殿朶殿接修廊為後殿對以御酒庫御藥院慈元殿外庫内侍省内東門司大内都廵檢司御厨天章等閣廊回路轉衆班排列又轉内藏庫對軍器庫又轉便門垂拱殿五間十二架修六丈廣八丈四尺簷屋三間修廣各丈五朶殿四兩廊各二十間殿門三間内龍墀折檻殿後擁舍七間為延和殿右便門通後殿殿左一殿隨時易名明堂郊祀曰端誠䇿士唱名曰集英宴對奉使曰崇徳武舉及軍班授官曰講武東宫在麗正門内南宫門外本宫會議所之側入門垂楊夾道間芙蓉環朱闌二里至外宫門節堂後為財帛生料二庫環以官屬直舎轉外窑子入内宫門廊右為贊導春坊直舎左講堂七楹扁新益外為講官直舎正殿向明左聖堂右祠堂後凝華殿瞻箓堂環以竹左寢室右齊安位内人直舎百二十楹左彛齋太子賜號也接繡香堂便門通繹已堂重簷􅃨屋昔楊太后垂簾於此曰慈明殿前射圃竟百歩環修廊右愽雅樓十二間左轉數十歩雕闌花甃萬卉中出秋千對陽春亭清霽亭前芙蓉後木樨玉質亭梅繞之由繹已堂過錦臙廊百八十楹直通御前廊外即後苑梅花千𣗳曰梅崗亭曰氷花亭枕小西湖曰水月境界曰澄碧牡丹曰伊洛傳芳芍藥曰冠芳山茶曰鶴丹桂曰天闕清香堂曰本支百世祐聖祠曰慶和泗洲曰慈濟鍾吕曰得真橘曰洞庭佳味茅亭曰昭儉木香曰架雪竹曰賞静松亭曰天陵偃盖以日本國松木為翠寒堂不施丹艧白如象齒環以古松碧琳堂近之一山崔嵬作觀堂為上焚香祝天之所吳知古掌焚修每三茅觀鐘鳴觀堂之鐘應之則駕興山背芙蓉閣風㠶沙鳥履舄下山下一溪縈帶通小西湖亭曰清漣恠石夾列獻瑰逞秀三山五湖洞穴深杳豁然平朗翬飛翼拱凌虚樓對瑞慶殿損齋緝熈崇正殿之東為欽先孝思復古紫宸等殿木圍即福寜殿射殿曰選徳坤寧殿貴妃昭儀婕妤等位宫人直舎螘聚焉又東過閣子庫睿思殿儀鸞修内八作翰林諸司是謂東華門右二記書法詳贍宋之宫闕槩可見矣廉察徐文獻公任西浙廉訪使日遇有訴訟者必歴問其郡邑官吏臧否分為三等載諸集第一等純臧者第二等臧否相半者第三等極否者又用覆察相同候分司按巡時遂以畀之曰第一等褒舉之第二等勿問第三等懲戒之使改可也慎勿罷其職役分司遵奉一道肅清宣髪人之年壯而髪斑白者俗曰算髪以為心多思慮所致蓋髪乃血之餘心主血血為心役不能上廕乎髮也然本草云蕪菁子壓油塗頭能變蒜髪則亦可作蒜易說卦巽為寡髪陸徳明曰寡本作宣黑白雜為宣髪據此則當用宣字為是檄書露布檄書露布何所起乎漢陳琳草檄曹操見之頓愈頭風遂謂檄起於琳説文檄二尺書徐鍇通釋曰檄徴兵之書也漢高祖以羽檄徴天下兵有急則挿以羽爾雅木無枝為檄注檄擢直上也文心雕龍有張儀檄楚書隗囂檄亡新文文選有司馬相如喻蜀檄文則檄非自琳始也明矣隋禮儀志後魏毎戰尅書帛於漆竿上名露布世說桓宣武征鮮卑喚𡊮粲作露布倚馬手不輟筆俄成七紙如隋志世說所云則露布起於後魏而晉因之然漢官儀凡制書皆彌封唯赦贖令司徒印露布州郡又漢書賈洪為馬超作伐曹操露布則漢時已然及讀初學記引春秋佐助期曰武露布文露沉宋均云甘露見其國布散者人上武文采者則甘露沉重豈露布之義當取於此與靸鞵西浙之人以草為履而無跟名曰靸鞵婦女非纒足者通曵之炙轂子雜録引實録云靸鞵舄三代皆以皮為之朝祭之服也始皇二年遂以蒲為之名曰靸鞵二世加鳳首仍用蒲晉永嘉元年用黄草宫内妃御皆著始有伏鳩頭履子梁天監中武帝易以絲名解脫履至陳隋間吳越大行而模様差多唐大歴中進五朶草履子建中元年進百合草履子據此則靸鞵之製其來甚古然北夢瑣言載霧是山巾子船為水靸鞵之句抑且咏諸詩矣靸悉合切在颯字韻下今俗呼與翣同音者誤書手世稱鄉胥為書手處處皆然報應記宋衎江淮人應明經舉元和初至河隂縣因疾病廢業為鹽鐡院書手盖唐時已有此名輟耕録卷十八
