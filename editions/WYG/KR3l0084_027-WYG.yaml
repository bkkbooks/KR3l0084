body:
  text: 輟耕録卷二十七元陶宗儀撰四位配享封爵顔子唐𤣥宗太極元年壬子二月贈太子太師配享孔子廟宋真宗大中祥符二年己酉四月封兖國公曽子同前贈太子太保配享孔子廟宋理宗咸淳三年癸卯二月封郕國公配食大成殿子思宋度宗咸淳三年丁卯二月封沂國公配食大成殿孟子宋神宗元豐七年甲子五月追封鄒國公配享先聖位次兖國公下宋黄震云徃嵗顔孟配享並列先聖左近升曽子子思又並列先聖左而虚其右不以相向震聞太學博士陸鵬舉云初制顔孟配享左顔而右孟熈豐新經盛行以王安石為聖人没而躋之配享位顔子下故左則顔子及安石右則孟子未幾安石女壻蔡卞當國謂安石不當在孟子下遷安石於右與顔子對而移孟子位第三次顔子之下遂左列顔孟而右列安石又未幾蔡卞再欲升安石壓顔子漸次而升為代先聖張本優人有以藝諫於殿下者設一大言之士戯薄先聖顔子出爭之不勝子貢出爭之不勝子路出而盛氣爭之又不勝然後設為公冶長有繫其首而叱之曰汝何不出一爭且看他人家女壻盖蔡卞安石壻而公冶長先聖壻也蔡卞聞之遂不敢進安石於顔子上顔孟左而安石右遂為定制南渡後安石罷配享宜遷孟子以對顔子如舊制議者失於討論故安石既去其右遂虚而顔孟並列於左岳珂嘗記其事近嵗増曽子子思又並列於左亦未有討論者金果成都府江瀆廟前有樹六株世傳自漢唐以来即有之其樹高可五六十丈圍約三四尋挺直如矢無他柯榦頂上纔生枝葉若㯶櫚狀皮如龍鱗葉如鳳尾實如􅀥而加大每嵗仲冬有司具牲饌祭畢然後采摘金鼓儀衛迎入公􅅟差㸃醫工以刀逐箇劙去青皮石灰湯焯過入熬熟冷􅁡浸五七日漉起控乾再換熟􅁡如此三四次却入瓶缶封貯進獻不如此修製則生澁不可食泉州萬年􅀥三株識者謂即四川金果也畨中名為苦魯麻􅀥盖鳳尾蕉也李哥貞烈河南理幕沈易云灞州倡女李哥年十二三時母教之歌舞哥泣曰女率有工繄我獨為此乎母告以業不可廢哥曰若此聽母母亦當從我好否則有死而已母陽許之因是不粉澤不茹葷所歌多仙曲道情有召者必先詢主客姓名然後徃人亦預相戒毋戯狎哥凝立筵前酒行歌闋目不流盼與之酒弗飲州判官嘗忤哥徑還誓不與見孟津縣達嚕噶齊厚賂哥母夜抵舍哥懐利刃閉臥内罵之曰汝職在牧民而狗􅇾之不若可急去不且血汙吾刃矣慚怒以囘明日知州聞之嘆曰州有貞女而吾不知是一失也吾次子明經舉秀才真若配以禮聘娶之未幾紅巾入㓂夫婦被執見哥妍麗將殺其夫哥走前抱夫項大呼曰吾斷不從汝求活㓂并殺之劉節婦劉節婦冀之衡水人通古文孝經小學書適同郡曹泰財紅巾䧟河朔因避兵聊城村賊掩至大掠見節婦居羣人中特妍整持刀驅之行節婦曰吾婦人惟知從夫而已不從賊也賊欲移其心乃盛陳金玉珠璣仍用錦繡衣服被節婦身節婦裂碎之强擁上馬墮地者數四賊怒繩其項就馬上曵之節婦以手􅎲地以頭觸石流血罵賊不絶聲遂遇害病潔毘陵倪元鎮有潔病一日眷歌姬趙買兒留宿别業中心疑其不潔俾之浴既登榻以手自項至踵且捫且嗅捫至隂有􅁾氣復俾浴凡再三東方既白不復作巫山之夢徒贈以金趙或自談必至絶倒雜劇曲名稗官廢而傳竒作傳竒作而戲曲繼金季國初樂府猶宋詞之流傳竒猶宋戲曲之變世傳謂之雜劇金章宗時董解元所編西廂記世代未逺尚罕有人能解之者况今雜劇中曲調之冗乎因取諸曲名分調類編以備後來好事稽古者之一覽云正宫端正好衮繡毬倘秀才脱布衫小梁州朝天子四換頭十二月堯民歌收尾叨叨令醉太平呆古朶笑和尚蠻姑兒伴讀書剔銀燈道和柳青娘雙鴛鴦攤破滿庭芳月照庭塞鴻秋白鶴子中吕出入快活三中吕出入黄鍾願成雙醉花隂喜遷鶯出隊子刮地風四門子神伏兒挂金索水仙子興龍引金殿樂三臺侍香金童降黄龍衮塞鴈兒接接高南吕一枝花梁州第七賀新郎牧羊關隔尾紅芍藥菩薩梁州三煞罵玉郎感皇恩采茶歌隨煞尾鬭蝦䗫四塊玉哭皇天烏夜啼隔尾黄鍾煞攤破采茶歌楚天秋隔尾隨煞中吕粉蝶兒醉春風迎仙客石榴花鬬鵪鶉上小樓快活三正宫出入鮑老兒般渉哨遍耍孩兒收尾紅繡鞵喜春來堯民歌滿庭芳鮑老來醉高歌十二月普天樂呌聲雙鴛鴦白鶴子正宫出入窮河西朝天子乾荷葉剔銀燈菩薩蠻墻頭花喬捉蛇鶻打􅇠酥􅀥兒鎮江囘鵪鶉兒鴛鴦兒風流體賣花聲蔓菁菜仙吕賣花時㸃絳唇油葫蘆天下樂那叱令鵲踏枝六么序后庭花青哥兒賺煞混江龍金盞兒醉中天村里迓鼓元和令上馬嬌聖葫蘆江西後庭花柳葉兒寄生草賺煞尾攤破天下樂醉扶歸低過金盞兒八聲甘州遊四門賺尾憶王孫一半兒得勝樂雁兒祅神急翠裙腰六么遍大安樂柳葉兒商調集賢賔逍遥樂梧葉兒後庭花雙雁兒金菊香浪來里醋葫蘆青哥兒上京馬隨調煞柳葉兒仙吕出入黄鶯兒踏莎行垂絲釣盖天旗大石青杏子好觀音六國朝念奴嬌歸塞北初問口怨離别擂鼓體雁過南樓憨郭郎催拍子玉翼蟬荼䕷香女冠子林里雞近驀山溪喜秋風淨瓶兒鷓鴣天雙調新水令駐馬聽甜水令折桂令落梅風沉醉東風小將軍清江引碧玉簫鴈兒落徳勝令喬牌兒掛玉鈎川撥棹殿前歡七弟兄梅花酒收江南水仙子滴滴金鴛鴦煞歩歩嬌攪箏琶豆葉黄風入松撥不斷慶東原沽美酒太平令一錠銀荆湘怨阿納忽夜行船鎮江囘中吕出入胡十八掛玉鈎序伍供養行香子梧桐樹離亭宴煞鴛鴦兒煞尾太平歌十棒鼓小婦孩兒挂打燈喬木查蝶戀花慶宣和棗卿調石竹子山石榴山丹花醉娘子駙馬還朝大拜門鵰刺鴣不拜門喜人心忽都白倘兀歹風流體中吕出入燕南芝菴先生唱論古之善唱者三人韓秦娥沈古之石存符帝王知音者五人唐𤣥宗後唐莊宗南唐後主宋徽宗金章宗三教所尚道家唱情僧家唱性儒家唱理近世所謂大曲蘇小小蝶戀花鄧千江望海潮蘇東坡念奴嬌辛稼軒摸魚子晏叔原鷓鴣天柳耆卿雨霖鈴吳彦高春草碧朱淑真生查子蔡伯堅石州慢張子野天仙子歌之格調抑揚頓挫頂疊垜換縈紆牽結敦拖嗚咽推題九轉揺欠遏透歌之節奏停聲待拍偷吹拽棒字真句篤依腔貼調凡歌一聲聲有四節起末過度揾簮攧落凡歌一句句有聲韻一聲平一聲背一聲圓聲要圓熟腔要徹滿凡一曲中各有其聲變聲敦聲抗聲啀聲困聲三過聲偷氣取氣換氣歇氣就氣愛者有一口氣歌聲變件三臺破子遍子攧落實催全篇尾聲賺煞隨煞隔煞羯煞本調煞拐子煞三煞十煞唱曲門户小唱寸唱慢唱壇唱歩虚道情撒鍊帶煩瓢呌唱曲題目曲情鐡騎故事采蓮擊壤叩角結席添夀宫詞采詞花詞湯詞酒詞燈詞江景雪景夏景冬景秋景春景凱歌櫂歌漁歌挽歌楚歌杵歌歌之所桃花扇竹葉尊柳枝詞桃葉怨堯民鼓腹壯士擊節牛童馬僕閭閻女子天涯遊客洞裏仙人閨中怨女江邊商婦塲上少年闤闠優伶華屋蘭堂衣冠文㑹小樓狹閣月館風亭雨窓雪屋柳外花前凡聲音各應律吕分六宫十一調共十七宫調仙吕宫唱清新緜邈南吕宫唱感嘆傷悲中吕宫唱高下閃賺黄鍾宫唱富貴􅅶緜正宫唱惆悵雄壯道宫唱飄逸清幽大石唱風流藴藉小石唱旖旎嫵媚高平唱條物滉漾般渉唱拾掇坑塹歇指唱急併虚歇商角唱悲傷宛轉雙調唱健棲激裊商調唱悽愴怨慕角調唱嗚咽悠揚宫調唱典雅沉重越調唱陶寫泠笑有子母調有姑舅兄弟有字多聲少有聲少字多所謂一串驪珠也比如仙吕㸃絳唇大石青杏兒人喚作殺唱的劊子有愛唱的有學唱的有能唱的有㑹唱的有高不揭低不咽有排字兒打截兒放指兒唱意兒有明掯兒暗掯兒長掯兒短掯兒碎掯兒有一曲入數調者如啄木兒女冠子抛毬樂鬭鵪鶉黄鶯兒金盞兒之類是也凡唱曲有地所東平唱木蘭花慢大名唱摸魚子南京唱生查子彰徳唱木斛沙陜西唱陽關三疊黒漆弩凡唱所忌子弟不唱作家歌浪子不唱及時曲男不唱艶詞女不唱雄曲南人不唱北人不歌凡人聲音不等各有所長有川嗓有堂聲皆合破簫管有唱得雄壯的失之村沙唱得藴拽的失之乜斜唱得輕巧的失之寒賤唱得本分的失之老實唱得用意的失之穿鑿唱得打稻的失之本調凡唱節病有困的灰的涎的呌的大的有樂官聲撒錢聲拽鋸聲猫呌聲不入耳不著人不徹腔不入調工夫少徧數少歩力少官塲少字様訛文理差無叢林無傳授嗓抝劣調落架漏氣凡唱聲病散散焦焦乾乾冽冽啞啞􅀈􅀈尖尖低低雌雌雄雄短短憨憨濁濁赸赸格嗓囊鼻揺頭歪口合眼張口撮唇撇口昻頭咳𠻳凡添字病則他兀那是他家俺子道我不見兀的不呢一條弓唇撒了一片子團圞子茄子了大忌鄭衛之淫聲續雅樂之後絲不如竹竹不如肉以其近之也又云取来歌裏唱勝向笛中吹成文章曰樂府有尾聲曰套數時行小令曰葉兒套數當有樂府氣味樂府不可似套數詞山曲海千生萬熟三千小令四十大曲莊蓼塘藏書莊蓼塘住松江府上海縣青龍鎮嘗為宋秘書小史其家蓄書數萬卷且多手抄者經史子集山經地志醫卜方伎稗官小説靡所不具書目以甲乙分十門蓼塘既沒子孫不知保惜或為蟲䑕蝕囓或為隣識盗竊或供飲博之需或應糊覆之用編帙散亂所存無幾至正六年朝廷開局修宋遼金三史詔求遺書有以書獻者予一官江南藏書多者止三家莊其一也繼命危學士樸特來𨕖取其家慮恐兵遁圖䜟干犯禁條悉付祝融氏及收拾燼餘存者又無幾矣其孫羣玉悉載入京覬領恩澤宿畱日乆仍布衣而歸書之不幸如此買假山陳愛山買顧氏廢族石假山一所移置家園一日邀淵白觀之指而謂曰此公族中之物淵白笑荅曰東搬西倒陳黙然戴氏絶嗣華亭楓涇戴君實其家巨富妻王氏妬悍無比僅有一女贅謝季初為壻君實納一妾于嘉興外舍得男王聞之蚤夜怒詈君實不得已遣其妾取兒以歸而女恐其長大分我財産遂於襁褓中酷加陵虐致成驚疾又不容醫療竟就夭亡大為喜幸越三年自孕將産夢抱此兒及娩得男後隨殞於蓐兒亦不育此婦女妬悍之報今戴氏絶嗣天道豈逺也哉事在至正十五年四月上旬也妓妾守志汪佛奴歌兒也姿色秀麗嘉興富户濮樂閒以中統鈔一千錠娶為妾一日桂花盛開濮置酒佛奴奉觴濮有感于中澘然墮淚佛奴請問其故濮曰吾老矣非乆於人世者汝宜善事後人佛奴亦泣下誓無貳志人莫之信既而濮果死佛奴獨居尼寺深藏簡出操行潔白以終其身譏巴延太師重紀至元間太師丞相巴延專權蠧政貪惡無比以罪左遷南恩州達嚕噶齊至隆興卒寄棺驛舍滑稽者題于壁云百千萬定猶嫌少垜積金銀北斗邊可惜太師無運智不將些子到黄泉譏方士丙子歲松江亢旱聞方士沈雷伯道術高妙府官遣吏齎香幣過嘉興迎請以來驕傲之甚以為雨可立致結壇仙鶴觀行月孛法下鐡簡于湖泖潭井日取蛇燕焚之了無應驗羞赧宵遁僧柏子庭有詩其一聨云誰呼蓬島青頭鴨來殺松江赤縺蛇聞者絶倒燕都賦檇李顧淵白恃才傲物嘗入京獻燕都賦翰長元公復初不喜曰今大朝四海一統六合一家燕盖昔時戰國名何燕之稱慚恨而歸晚年始得領教岳陽高照菴先生以詩送之云豪氣欲吞天下士冷官初到岳陽城切中其實淵白自出一對句云天下秀才爺有刀鑷人對之曰村中和尚種裱背十三科世人但知醫有十三科畫有十三科殊不知裱背亦有十三科一織造綾錦絹帛一染練上件一抄造紙劄一染製上件顔色一糊料麥麪一糊藥礬蠟一界尺裁版桿帖一軸頭或金或玉或石或瑪瑙水晶珊瑚沉檀花梨烏木每軸上用一色所以只歸一科一糊刷一鉸鍊一絛一經帶一裁刀數内闕其一則不能成全畫矣其糊刷裁尺亦皆有名糊刷㯶軟者謂之平分㯶硬者謂之糊㮶大小得中者謂之黏合狹小者謂之寸金裁尺極等濶者曰滿手次等曰三指又次等曰兩指最狹者曰單指厲狄越人朱仲桓武云至正丙申歲大旱余在蕭山觀方士陳希微禱雨于北嶺將軍廟累日俄降筆云吾秦人厲狄也與項羽起事山隂雖功不竟而死然有徳于民其父老不忘我者俾血食于此爾來幾千五百年世代雲變遂湮我姓名至蔑焉無聞故以相告目擊其事感嘆彌日旗聨中原紅軍初起時旗上一聨云虎賁三千直抵幽燕之地龍飛九五重開大宋之天其後毛貴一賊横行山東侵犯畿甸駕幸灤京賊勢猖獗無異唐末桃符䜟張之翰字周卿邯鄲人由翰林學士除授松江知府自題桃符云雲間太守過三載天下元貞第二年是歲卒亦䜟也金甲嘉定州大塲沈氏因下番買賣致巨富一日自番中還先報家信有云番船今到何處發金甲先囘金甲者碓坊甲頭也後因逐一幹僕僕出此書首告以為玉印未到金甲先囘沈厚賂官府得理聞者亦可為戒藺節婦許叔瑛璞云陳友諒部屬稱鄧平章者䧟江西某縣有婦藺氏其夫以財雄一鄉因賂鄧之帥某丐免剽戮帥聞藺有殊色輙殱其家獨生藺及四歲嬰將納之藺曰帥貴人妾事之無恨然吾良人以禮幣聘妾為婦者若干年與生二子妾不忍即背恩軍中禮不備請持一月喪服乃為帥婦未晚帥許之服未終移兵别縣帥曰吾如汝約今夕諧吾婚乎藺曰諾既而帥上馬他之使二卒守藺曰為取雞酒具香火今夕吾為帥婦敢告先良人靈卒俱出乃先殺嬰嚙指血書壁曰涇渭難分濁與清此身不幸厄紅巾孤兒未忍更他姓烈婦何曽嫁二人白刃自揮心似鐡黄泉欲到骨如銀荒村日落猿啼處過客聞之亦慘神書罷即自刎帥返驚歎訊二卒欲罪之卒指壁間題倩人讀其詩馳白鄧鄧聞之陳陳為立廟旌表云忠孝里至正壬辰秋七月紅巾䧟錢唐九月䧟吳興延陵冬十月䧟江隂州州大姓許晉字徳昭者有武畧善格鬭仲子如璋亦英勇遂相謀曰烏合之衆敗亡可待我族我里何忍坐累焉乃潜聚無頼惡少資以飲食保䕶隣井日有餘黨四散抄掠則誘使深入悉殪而埋之所居素隱僻賊無知者尋聞官軍駐近郊隂遣人約為内應十一月八日浙東宣慰元帥觀孫統兵入城晉率所募應之官軍少却晉弗之知尚與賊戰於城北之祥符寺前㑹賊黨自他所來掎其後如璋遂與家僮徃救手刃數人破圍而入偕父力戰衆寡不敵父子皆死明日官軍復進攻賊遂潰家人得父子屍歛而葬之柩車相繼于道見者無不墮淚鄉之父老誄之曰父死於忠子死於孝私表其里曰忠孝郡上其事于朝不報胡仲彬聚衆胡仲彬乃杭州勾闌中演説野史者其妹亦能之時登省官之門因得夤縁注授廵檢至正十七年七月内招募游食無藉之徒文其背曰赤心䕶國誓殺紅巾八字作號將遂作亂為乃叔首告搜其書名簿得三册纔以一册到官餘火之亦誅三百六十餘人扶箕詩天遣魔軍殺不平不平人殺不平人不平人殺不平者殺盡不平方太平此扶箕語驗之今日果然輟耕録卷二十七
