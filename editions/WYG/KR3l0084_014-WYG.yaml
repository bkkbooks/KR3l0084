front:
  text: 十四
  hash: sha256:29473899eff56892a47924f15290ca4d02a6b5900c4deb190c594181213de9bf
body:
  text: 元陶宗儀撰忠烈蕭景茂漳州龍溪隔洲里人儒而有文以謹厚信扵鄉里後至元間漳冦亂景茂率鄊人立柵保險堅不可破㑹旁里有人導之從間道入景茂􅀍執賊使拜曰汝賊也何拜賊欲脅之降以従民望景茂罵曰逆賊國家何負汝而反汝族汝里何負汝而坐累之賊相語曰吾殺官軍將吏多矣至吾砦皆愞靡求生未有若此餓夫之倔彊者察其志終不為吾用留之祗取辱耳遂縛之扵樹刲其肉使自㗖之且嚼且罵曰我食我肉無若汝賊行將萬叚狗􅇾棄不食賊怒絶其舌而死又江州路總管李黼字子威汝寧人泰定丁卯状元及第至正十年庚寅来守是郡政修民和明年辛卯夏五月紅巾冦逼淮西公即申告江西行省以謂九江為豫章藩屏之地蘄黄乃九江唇齒之邦不可不早為進兵守護或者非其過慮公乃張文榜以諭民曰為臣死忠為子死孝在黼之分惟知盡死守土而已所謂城存與存城亡與亡者也聞者悚然秋九月冦侵蘄黄屬邑公復上言宜速乘機進援茍淮西失守長江之險與彼共之非所恃矣行省不報既而蘄州䧟冬十月黄州䧟十一月二十五日行省平章圖卜戬布哈奉中書省命領兵至公極陳攻守之策圖卜戬布哈以隄備把截為辭越明年壬辰春正月初二日行省左丞博囉特穆爾奉總兵御史大夫領樞宻院額森特穆爾命領兵進攻淮西亦来屯住逗遛不前十四日武昌䧟十六日藩王大臣官民舟航蔽江而下我民觧散十九日圖卜戬布哈博囉特穆爾皆遯去僚佐司屬悉為一空公亟發廩賑民收召士卒數日稍輯機務繁劇不遑寝食以二十三日卧病然猶扶憊乗肩輿領兵出境行省以公忠誠昭著授本省參知政事行江州南康軍民都總管便宜行事二月初九日圖卜戬布哈懼臺憲公議自三山移兵入城十一日冦忽至城下甘棠湖縱火焚西門公立城上身當矢石圖卜戬布哈從北門遯去日中勢益熾分衆攻北門城遂䧟公猶執鐵撾指揮左右迎戰衆驚潰公􅀍執脅以刃不肯降口罵不絶聲遂殺之姪男秉昭亦遇害初武昌䧟時公謂子秉方曰我國之守臣當死此土汝可奉母往下江依伯父以存吾後秉方曰父死國子死父有何不可公怒曰汝不遵命是不孝也秉昭亦告其兄曰兄不去則叔父無後不孝莫大扵是某當與叔父同死生矣兄無慮焉秉方不獲已買舟奉母夫人行舟次何家堡遲留不忍捨公聞之手批責以大義遂去不半月公死又江浙行省參知政事樊執敬字時中鄆人是年秋七月初十日紅巾自徽犯杭時公守宿衛于省有報已入北闗門省吏皆次第引去公獨􅀍甲上馬率宿衛兵急出省將捄闗従者止之公曰吾封疆之守不守而去是以私利廢臣道行至清河坊口遇他走将又以兵孤且散控其馬首返公怒引佩刀斫其人曰城不守何適遂躍馬逆戰以死死時猶嚼齒罵不絶聲死之所則天水橋也又福寧州尹王巴延字伯敬濵州人由湖廣行省知印歴官至兹任撫字多方政敎大行是年春除福建鹽運司同知將行㑹鄰境賊衆勢頗張州民羣擁馬前拜且泣曰公吾之父母豈容捨我去方今兵戈蠭起公去吾民将孰賴父老千餘人詞上司乞留公遂復留至秋賊衆自邵武間道迫福寧公募民兵得一千五百餘人為守禦備冬十一月庚辰賊進至青皎屯楊梅嶺公與中子相引兵直抵其營與戰破之既而益衆復進我兵僅千餘人乃分為二道拒之公以五百人還守州治壬午賊衆萬餘平旦攻西門衆寡不敵吏卒奔潰公獨身奮以死自誓俄馬中流矢遂為賊所執其魁首王兼善者謂曰聞公廉能著稱欲屈再尹此州公厲聲叱曰我天子守臣義當殺賊不幸敗有死耳魁怒令公跪公曰此膝豈跪賊耶魁益怒令左右毆之公曰我為人臣當為國死乃嚙舌出血噴其面罵曰殺我即殺毆何也然可殺我不可害吾民官軍旦暮且至殺爾等無噍𩔖矣㑹其執逹嚕噶齊額森都喇至責之曰汝何得與王君同起兵拒我額森都喇股慄口噤不能對公曰吾義當起兵殺賊何名拒汝因大罵不絶口且曰吾死當為神以殺汝曹魁大怒遂害之臨死色不變立而受刃頸斷㣲有血如乳時年七十矣子相亦􅀍執魁欲官之相曰汝逆吾君又殺吾父義不共戴天我忠臣子詎能事賊耶魁知不可屈亦殺之相妻潘氏逃民間有惡少欲亂之不従執獻魁潘慟哭曰吾既失所天義豈受辱乃絶不飲食及其二幼女皆死又溧陽儒學敎授林夢正字古泉吾鄉人中書以著述薦得官是嵗賊衆寇溧陽獲其魁張某先生問曰爾何人也應曰我父為軍千户紅巾入境逼我父為帥父以年老不堪從事令我代先生痛罵之曰爾之父祖世為國家臣子而爾忍偽耶既而其勢復盛竟奪張去下令曰生得林敎授者有賞先生匿他處捜得張曰前日罵我者非爾耶先生曰然張曰降我則俾爾為元帥同享富貴先生曰爾偽也我何為降再三終不屈縛于樹不觧衣冠而殺之又江浙行省員外郎楊乗字文載濵州人蚤為天官小史辟中書參議掾歴官至榖城介休二縣尹拜監察御史擢今任是年杭州䧟公與郎中赫徳爾王仲温員外裕呼諾都事張鏞俱坐黜公退居松江之青龍鎮後御史臺以公等職在賛理不當罪宜復其官爵上之事遂白十六年丙申淮人䧟平江連䧟松江秋七月十八日遣所署官吴縣丞張經等齎禮幣造請公遣人告曰吾廢處田里乆不足以辱使者吾當擇日受命請以幣置里門外經等如其言公命子卣卓具牲醴告祖禰既竣事復命酒飲逮暮起行後圃中頋西日晴好慨然曰晚節如是足矣命卣等治畦處置家事如平日撫其孫虎林若怡怡自得也歸坐至夜分二子立侍命曰二子行且休吾將就寢公儉約無姬侍其燕息寝處人莫得與俱詰旦卣等怪寝門未啓發視之則公已自經得手書遺語大意言死生晝夜之理且以得全晩節為快又西臺監察御史張公謝職居雄山縣而䧟賊賊魁者素聞公有治績置公上坐脅之受偽官公唾罵之遂縛公妻奴九人至前先殺妾次殺子女以及妻每殺一人則諭公曰御史若降餘可免公弗為動容其罵如初魁怒拽下坐殺之此在至正辛卯秋八月間公諱桓字彦威南村野史曰天下之事戰争十有餘年于兹矣為臣辱國為将辱師敗降奔竄不可勝計甚者含詬忍恥偷生冐榮以為得志名節大閑一蕩去弗頋求其忠義英烈于千百之中莫克什一噫忠義英烈雖出扵天性要亦講之有素處之甚安故扵造次顛沛之際决然行之而無疑如李總管黼王州尹巴延樊參政執敬張御史桓林敎授夢正蕭處士景茂之殺身成仁視死如歸是必講之熟而處之當一旦出扵人所不肯為遂以驚動天下而精英忠烈之氣在宇宙間與嵩華相髙者自不容冺若桓之居在閒地乗之久坐廢黜夢正之分顓講敎視握將帥之權受民社之託任大而責重者有間矣一皆従容就義是尤難也景茂里中一儒生耳初未嘗得斗升之禄以養其父母尺寸之組以榮其身始扵保民終扵保國臨大節而不可奪古稱烈丈夫又豈能過是與至于子為父死婦為夫死聲光赫奕照映史冊使百世而下知綱常大義之不可廢天理人心之不可滅如此其有功扵名敎為何如是亦深仁厚澤涵養所致孰謂百年之國而無人哉瘞鶴銘瘞鶴銘華陽真逸譔上皇山樵鶴夀不知其紀也壬辰嵗得于華亭甲午嵗化扵朱方天其未遂吾翔寥廓耶奚奪之遽也迺裹以𤣥黄之幣蔵兹山之下仙家無𨼆我故立石旌事銘不朽詞曰相此胎禽浮邱著經乃徴前事我𫝊爾銘余欲無言爾其蔵靈雷門去鼓華表留形義惟彷彿事亦㣲㝠爾將何之觧化惟寧後蕩洪流前固重扄右割荆門歴下華亭奚集真侣瘞爾作銘丹陽外仙尉江隂真宰右刻在鎮江焦山下頑石上潮落方可模相𫝊為晉王右軍書惟宋黄睿東觀餘論云為陶𨼆居書良是其曰今審定文格字法殊𩔖陶𢎞景𢎞景自號華陽𨼆居今號真逸者豈其别號與又其著真誥但云己卯嵗而不著年名其他書亦爾今此銘壬辰嵗甲午嵗亦不書年名此又可證云壬辰嵗梁天監十一年也甲午者十三年也按𨼆居天監七年東㳺海嶽權駐㑹稽永嘉十一年乙未嵗始還茅山其弟子周子良仙去為之作傳即十一年十三年正在華陽矣後又有題丹陽尉江隂宰數字當是效陶書故題扵石側也王逸少以晉恵帝大安二年癸亥嵗年五十九至穆帝升平五年辛酉嵗卒則成帝咸和九年甲午嵗逸少方年二十三至永和七年辛亥嵗年三十八始去㑹稽閒居不應二十三嵗已自稱真逸也又未官扵朝及閒居時不在華陽以是考之决非王右軍書也審矣歐陽文忠公以為不𩔖王右軍法而𩔖顔魯公又疑是頋况云道號同又疑王瓉皆非睿字長孺號雲林子邵武人又董逌書跋第六卷載南陽張舉子厚所記云瘞鶴銘今存扵焦山凡文章句讀之可識及㸃畫之僅存者百三十餘言而所亡失幾五十字計其完書盖九行行之全者二十五字而首尾不預焉熙寧三年春余索其逸遺扵焦山之隂偶得十二字扵亂石間石甚迫隘偃卧其下然後可讀故昔人未之見而世不𫝊其後又有丹陽外仙江隂真宰八字與華陽真逸上皇山樵為似是真侣之號今取其可考者次序之如此又董君自書其後云文忠集古録謂得六百字今以石校之為行凡十八為字二十五安得字至六百疑書之誤也余扵崖上又得唐人詩詩在貞觀中已列銘後則銘之刻非頋况時可知集古録豈又并詩繫之耶君字彦逺號廣川東平人又國朝鄭枃衍極第二巻論瘞鶴銘而劉有定釋云潤州圖經以為王羲之書或曰華陽真逸頋况號也蔡君謨曰瘞鶴文非逸少字東漢末多善書惟𨽻最盛至扵晉魏之分南北差異鍾王楷法為世所尚元魏間盡習𨽻法自隋平陳中國多以楷𨽻相參瘞鶴文有楷𨽻筆當是隋代書曹士冕曰焦山瘞鶴銘筆法之妙為書家冠冕前輩慕其字而不知其人最後雲林子以為華陽𨼆居為陶𢎞景及以句曲所刻𨼆居朱陽館帖參校然後衆疑􅇚然其鍳賞可謂精矣以余考之一本山樵下有書字真宰下有立石二字一本我𫝊爾銘作出扵上真爾其蔵靈作紀爾嵗辰張舉本作丹陽外仙邵亢本作丹陽仙尉又有作丹陽外仙尉者且中間詞句亦多先後不同尚俟拏舟過揚子手自模印以稽其得失之一二可也風入松吾鄉柯敬仲先生九思際遇文宗起家為奎章閣鍳書博士以避言路居吴下時虞邵菴先生在館閣賦風入松長短句寄博士云畫堂紅袖倚清酣華髮不勝簮幾回晚直金鑾殿東風軟花裏停驂書詔許𫝊宫燭香羅初翦朝衫御溝氷泮水挼藍飛燕又呢喃重重簾幕寒猶在憑誰寄錦字泥緘報道先生歸也杏花春雨江南詞翰兼美一時争相𫝊刻而此曲遂徧滿海内矣翦一作試四卦睦人邵𤣥同先生桂子嘗作忍黙恕退四卦掲之坐隅真得保身慎言絜矩知止之道者矣其忍卦曰忍亨初難終吉利君子貞不利小丈夫􅂏曰忍剛發乎内柔制乎外故亨初若甚難乃終有吉惟君子為能動心忍性不利小丈夫其中淺也象曰刃在心上忍君子以含容成徳初一小不忍則亂大謀象曰小不克忍成大亂也次二必有忍其乃有濟象曰能忍于中事克濟也次三一朝之忿亡其身以及其親象曰一朝之忿至易忍也亡身及親禍孰大焉次四出于跨下以成漢功韓信以之象曰跨下之辱小辱也成漢之功大功也次五張公藝九世同居書一忍字以對于天子象曰同居之義忍克致也積而九世有容徳也上六血氣方剛戒之在鬬象曰方剛之氣忍則滅也形而為鬬自求禍也其黙卦曰黙無咎可貞不利有所言􅂏曰黙不言也亂之所生也則言語以為階是以君子慎宻而不出故無咎黙以自守其道可貞也不利有所言尚口乃窮也象曰口尚𤣥曰黙君子以去辨養静初一守口如瓶終吉象曰守口如瓶謹所出也其初能黙終則吉也次二多言不如守中象曰言不如黙得中道也次三駟不及舌有悔象曰駟不及舌滕口說也一言之失悔何追也次四無以利口亂厥官卿士戒之象曰位髙而言輕亦可戒也次五聖人之敎不言而信象曰不言而信淵黙之化也上六君子之道或黙或語象曰時然後言黙不可長也其恕卦曰恕有孚終吉􅂏曰恕之為道善推其所為而已以己之心合人之心己所不欲勿施扵人故有孚能以一言終身而行之其吉可知矣象曰如心恕君子以明好惡同物我初一强恕而行求仁莫近焉象曰强而行之恕之始也行而不已違道不逺也次二君子有絜矩之道象曰絜矩之道恕也次三好人之所惡惡人之所好是謂拂人之性菑必逮夫身象曰拂人從欲身之菑也次四己欲立而立人己欲逹而逹人象曰立而逹恕以從人也次五聖人與衆同欲象曰與衆同欲聖人之恕也上六責己重以周待人輕以約象曰待人之法可用恕也責己之道不可自恕也其退卦曰退勿用有攸往􅂏曰退止也勿用有攸往知止也日中則退而昃月盈則退而􅃜四時之運成功者退而况扵人乎退之時義大矣哉象曰艮止其所退君子以晦蔵扵宻初一退无咎象曰其進未銳義无咎也次二難進易退象曰難進易退可事君也次三兼人凶象曰兼人之凶勇不知退也次四見可而進知難而退象曰知難而退終无尤也次五終日如愚以退為進顔子以之象曰顔子之退進不可御也上六蝜蝂升髙躓而不悔象曰蝜蝂升髙其道窮也躓而不悔亦可戒也㸃鬼録文章用事填塞故實舊謂之㸃鬼録又謂之堆垜死屍見江氏𩔖苑房中術今人以邪僻不經之術如運氣逆流采戰之𩔖曰房中術按史周有房中樂漢書禮樂志髙祖時有房中詞樂唐山夫人所作武帝時有房中歌又曰房中者情性之極至道之際是以聖王制外樂以禁内情而為之節文樂而有節則和平夀考及迷者弗頋以生疾而殞性命禮記曾子問衆主人卿大夫士房中皆哭注房中婦人也然房中之謂豈取此一書與婦女曰娘娘子俗書也古無之當作孃按說文頻擾也肥大也從女襄聲女良切其義如此今乃通為婦女之稱故子謂母曰娘而世謂穏婆曰老娘女巫曰師娘都下及江南謂男覡亦曰師娘娼婦曰花娘蒙古又謂曰草娘苖人謂妻曰夫娘南方謂婦人之無行者亦曰夫娘謂婦人之卑賤者曰某娘曰幾娘鄙之曰婆娘考之風俗通漢何敞為鬼蘇珠娘按誅亭長龔夀隋書韋世康為絳州刺史與子弟書云况娘春秋已髙温凊宜奉敎坊記北齊時丈夫着婦人衣行歌傍人齊和云􅂿謡娘南史梁元徐妃與帝左右暨季江私通季江曰徐娘雖老尚猶多情又梁臨川王宏侵魏魏遺以巾幗歌曰不畏蕭娘與吴姥但畏合肥有韋虎謂韋睿吕僧珍也大業拾遺隋煬帝宫婢曰雅娘唐史張旭草書見公孫大娘舞劒器而通神又武承嗣聞喬知之婢􅆼娘美奪取之杜工部詩耶娘妻子走相送又黄四娘家花滿蹊白樂天詩吴娘暮雨蕭蕭曲韋應物詩春風一曲杜韋娘栁子厚下殤女墓磚記始名和娘樂府雜録張紅紅唱歌丐於市韋青納為姬敬宗召入宫號記曲娘又望江南曲始自朱崖李太尉鎮浙西日為姬謝秋娘所製明皇雜録呼白鸚鵡為雪衣娘甘澤謡武三思晚獲一妓曰綺娘狄仁傑至遂逃壁隙中曰我天上花月之妖也樊川集杜秋娘年十五為李錡妾錡敗入宫後坐譴歸故里又竇桂娘父良建中初為汴州户曹掾李希烈破汴州取桂娘去李賀集賀撰申胡子觱篥歌成翔客喜擎觴起立命花娘出幙徘徊拜客劉賔客集泰娘本韋尚書家主謳者河東記唐進士叚何卧病遇妊娘留詩而愈𫝊竒崔氏鸎鸎婢曰紅娘霍小玉𫝊長安中有媒氏鮑十二娘薛蒼駙馬青衣也余媚娘叙録陸希聲娶余媚娘媚娘約媒曰陸郎中若必得兒侍巾櫛須立誓不置側室及女奴圖經􅅙神謂之馬頭娘杜陽雜編南海貢竒女盧媚娘工巧無比麗情集陳敏兄妾越娘貌美兄死遂與欵狎續齊諧記齊穎寓山隂夜見前宰妾萬文娘墨荘漫録李后主令宫嬪窅娘以帛繞脚令纎小右畧舉一二不能悉載是則今之云云皆有所本然都下自庶人妻以及大官之國夫人皆曰娘子未嘗有稱夫人郡君等封贈者載考之史隋柴紹妻李氏起兵應李淵與紹各置幕府號娘子軍唐平陽公主兵與秦王定京師號娘子軍花蕋夫人宫詞諸院各分娘子位韓昌黎有祭周氏二十娘子文以此推之古之公主宫妃已與民間共稱娘子則今之不分尊卑亦自有来矣古刻至正壬辰春城平江扵古城基内掘得一碑其文云三十六十八子寅卯年至辰巳合收張翼同為利不在常不在揚切湏欵欵細思量且卜水莫問米浮圖倒地莫扶起修古岸重開河軍民拍手笑呵呵日出屋東頭鯉魚山上逰星従月裏過㑹在午年頭右不曉所言何事姑識之或者以為三十六四九也張翼巳午之交也今張太尉第行九四而同首亂者適十八人也豈其然與上頭入月今世女子之笄曰上頭而倡家處女初得薦寝扵人亦曰上頭花蕊夫人宫詞年初十五最風流新賜雲鬟使上頭又天癸曰月事黄帝内經女子二七而天癸至月事以時下又曰女子不月史記濟北王侍者韓女病月事不下診其腎脉嗇而不屬故曰月不下又程姬有所避不願進注天子諸侯羣妾以次進御有月事者止不御更不口說故以丹注面目的的為識令女史見之王察神女賦施𤣥的的即上所云也然入月二字尤新王建宫詞宻奏君王知入月喚人相伴洗裙裾人腊至正乙巳春平江金國寳袖人腊出售余獲一觀其形長六寸許口耳目鼻與人無異亦有髭􅂡頭髮披至臋下須髪皆黄色間有白髪一根徧身黄毛長二分許臍下隂物乃男子也相𫝊云至元間世皇受外國貢獻以賜國公阿爾尼格者無幾何時即死因剖開背後剜去腸臓實以他物仍縫合烘乾故至今無恙按漢武故事東郡送一短人長七寸名巨靈神異經西海有一鶴國人長七寸山海經有小人國名靖人詩含神霧東北極有人長九寸殆為此小人也靖或作竫音同然古尺短今六寸比之周尺將九寸矣則所腊者豈其人與張翰林詩天子臨軒授鉞頻東南無地不紅巾鐵衣逺道三軍老白骨中原萬鬼新義士精靈虹貫日仙家談笑海揚塵都将兩眼淒涼淚哭盡平生幾故人此至正辛丑間張蛻菴承㫖翥在都下寄浙省周玉坡參政伯琦詩也夫翰苑詞臣而寓言如此則感時之意從可知矣輟耕録巻十四
