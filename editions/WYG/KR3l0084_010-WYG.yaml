body:
  text: 輟耕録卷九欽定四庫全書輟耕録卷十元陶宗儀撰御史五常周景逺先生馳名能文為南臺御史時分治過浙省每日與朋友往復其書吏不樂似有舉刺之意大書壁上曰御史某日訪某人某日某人来訪御史忽見呼謂曰我嘗又訪某人汝乃失記何也第補書之因復謂曰人之所以讀書為士君子者正欲為五常主張也使我今日謝絶故舊是為御史而無一常寜不為御史不可滅人理吏赧服而退官倉入粟今官府收歛秋糧之際比先涓吉啓倉於青龍方敖房入粟六石六斗六升六合以應日蓋國家初無定制不知各處何以一皆如此予意必取上下四方六合之意耳食物相反凡食河豚者一日内不可服湯藥恐内有荆芥蓋與此物大相反亦惡烏頭附子之屬予在江陰時親見一儒者因此䘮命其子尤不可食能使人脹死嘗水寖試之經宿顆大如芡實世傳中其毒者亟飲􅁾物乃解否則必亡又聞不必用此以龍腦浸水或至寳丹或橄欖皆可解後得一方用槐花㣲炒過與乾燕支各等分同搗粉水調灌大妙先輩諧謔趙魏公刻私印曰水晶宫道人錢唐周草窓先生宻以瑪瑙寺行者屬比之魏公遂不用此印後見先生同郡崔進之藥肆懸一牌曰養生主藥室乃以敢死軍醫人對之進之亦不復設此牌魏公語人曰吾今日方為水晶宫吐氣矣先輩雖諧謔自是可喜馬判馮公士啓夢弼嘗言為八番雲南宣慰司令史曰嘗因公差抵一站日已莫矣站吏告曰今夜馬判上岸麻線須暫停驛程以避之問其故閉目揺手不敢言公怒便上馬行數十里至大溪忽見一物如屋所謂烏剌赤者下馬跪泣若告訴狀呼問何為亦閉目揺手弗荅於是下馬祝之曰某許昌人竊禄来此茍天命合盡爾其啖之否則容我行祝畢即轉入溪中腥風臭霧觸人口鼻既而各上馬比曙抵前站站吏驚曰是何麻線大膽若是耶公問此為何物始敢言曰馬蟥精也麻線方言曰官人烏剌赤站之牧馬者公官至禮部尚書字訓善字訓多字詩載馳女子善懐鄭箋善猶多也漢書岸善崩善亦多也丘真人大宗師長春真人姓丘氏名處機字通宻號長春子登州棲霞縣濵都里人也祖父業農世稱善門金皇統戊辰正月十九日生生而聰敏有日者相之曰此子當為神仙宗伯大定丙戌年十九辭親居崑崙山依道者脩真丁亥謁重陽全真開化王真君嘉於海寜請為弟子戊申召見闕下隨還終南山貞祐乙亥太祖平燕城金主奔汴丙子復召不起己夘居萊州時魯齊入宋宋遣使来召亦不起是年五月太祖自乃蠻國遣近侍劉仲禄持一手詔致聘十一月至𨼆所詔文云制曰天厭中原驕華大極之性朕居北野嗜慾莫生之情反朴還淳去奢從儉每一衣一食與牛竪馬圉共弊同饗視民如赤子養士若兄弟謀素和思素畜練萬衆以身人之先臨百陣無念我之後七載之中成大業六合之内為一統非朕之行有徳蓋金之政無恒是以受天之佑獲承至尊南連趙宋北接回紇東夏西夷悉稱臣佐念我單于國千載百世以来未之有也然而任大守重治平猶懼有闕且夫刳舟剡楫將欲濟江河也聘賢選佐將以安天下也朕踐祚已来勤心庶政而三九之位未見其人訪聞丘師先生體真履規博物洽聞探􅄨窮理道冲徳著懐古君子之肅風抱真上人之雅操乆棲巖谷藏身𨼆形闡祖宗之遺化坐致有道之士雲集仙逕莫可稱數自干戈而後伏知先生猶𨼆山東舊境朕心仰懐無已豈不聞渭水同車茅廬三顧之事奈何山川懸濶有失躬迎之禮朕但避位側身齋戒沐浴選差近侍官劉仲禄備輕騎素車不逺千里謹邀先生暫屈仙歩不以沙漠悠逺為念或以憂民當世之務或以恤朕保身之術朕親侍仙座欽惟先生將咳唾之餘但授一言斯可矣今者聊發朕之㣲意萬一明於詔章誠望先生既著大道之端要善無不應亦豈違衆生之願哉故兹詔示惟宜知悉五月初一日筆庚辰正月北行二月至燕欲候駕回朝謁仲禄今從官哈喇馳奏真人進表陳情表曰登州棲霞縣志道丘處機近奉宣㫖逺召不才海上居民心皆恍惚處機自念謀生太拙學道無成辛苦萬端老而不死名雖播於諸國道不加於衆人内顧自傷𠂻情誰測前者南京及宋國屢召不從今者龍庭一呼即至何也伏聞皇帝天賜勇智今古絶倫道恊威靈華夷率服是故便欲投山竄海不忍相違且當冐雪衝霜圖其一見蓋聞車駕只在桓撫之北及到燕京聽得車駕遥逺不知其幾千里風塵澒洞天氣蒼黄老弱不堪切恐中途不能到得假之皇帝所則軍國之事非己所能道徳之心令人戒欲悉為難事遂與宣差劉仲禄商議不若且在燕京徳興府等處盤桓住坐先令人前去奏知其劉仲禄不從故不免自納奏帖念處機肯来歸命逺冐風霜伏望皇帝早下寛大之詔詳其可否兼同時四人出家三人得道惟處機虚得其名顔色憔顇形容枯槁伏望聖裁龍兒年三月日奏十月哈喇回復奉𠡠㫖曰青吉斯皇帝𠡠真人丘師省所奏應召而来者具悉惟師道踰三子徳重多方命臣奉厥𤣥纁馳傳訪諸滄海時與願適天不人違兩朝屢召而弗行單使一邀而肯起謂朕天啓所以身歸不辭暴露於風霜自願䟦渉於沙磧書章来上喜慰何言軍國之事非朕所期道徳之心誠云可尚朕以彼酋不遜我伐用張單旅試臨邊陲底定来從去背實力率之故然乆逸暫勞冀心服而後已於是載揚威徳畧駐車徒重念雲軒既發於蓬萊鶴馭可遊於天竺逹磨東邁元印法以傳心老氏西行或化人而成道顧川途之雖濶瞻几杖以非遙爰荅来章可明朕意秋暑師比平安好㫖不多及十四日辛巳十一月至賽瑪爾堪城壬午三月過鐡門闗四月逹行在所時上在雪山之陽舎館定入見上勞曰他國徴聘皆不應今逺踰萬里而来朕甚嘉焉賜坐就食設二帳於御幄之東以居之約日問道以回紇叛親征不果至九月設庭燎虚前席延問至道真人大略荅以節慾保躬天道好生惡殺治尚無為清淨之理上説命左史書諸䇿癸未乞東還賜號神仙爵大宗師掌管天下道教甲申三月至燕八月奉㫖居太極宫丁亥五月特改太極為長春七月九日留頌而逝年八十至元己巳正月㫖詔贈五祖七真徽號而曰長春演道主教真人已上見蟠溪集鳴道集西游記風雲慶㑹録七真年譜等書初真人自行在歸道由宣徳日一富家新居落成禮致下顧將冀一言以為福既入其室黙然無語輙以所持鐡拄杖於窓戸墻壁上頗毁數處而出主人再拜希解悟曰爾屋完矣美矣完而必毁理執然也吾不爾毁爾將無以圖厥終今毁矣爾宜思其毁而欲完克保全之則爾與爾子子孫孫庶幾歌斯哭斯永終弗替主人説服吁真人真知道哉南池鼃宋季城信州掘土處為濠百畆許在郡南曰南池池之旁可居舊為里人屋歸附後逹嚕噶齊瑪察據有其地每春夏之交羣鼃聒耳寢食不安會三十八代天師張廣微與材朝京回因以告天師朱書符新瓦上使人投池中戒之曰汝鼃母再喧自是至今寂然鴈子漢書太液池中鳬雛鴈子布滿充積用鴈子甚佳王維詩蘆筍穿荷葉菱花罥鴈兒又新趂辦官錢浙省廣濟庫嵗差杭城諲實戸若干名充役庫子以司出納比一家中侵用官錢太多無可為償府判王某素號殘忍乃拘其妻妾子女於官又無可為計則命小舟載之求食於西湖以貲納官鬼妾鬼馬不肖輩羣趨焉鮮于伯幾先生樞作湖邊曲云湖邊蕩漿誰家女緑慘紅愁羞不語低回忍淚傍郎船貪得纒頭強歌舞玉壺美酒不須憂魚腹熊蹯棄如土陽臺夢短匆匆去鴛鎻生寒愁日暮安得義士擲千金遂令桑濮歌行路後王之子孫有為娼者天之報施一何捷也鼎作牛鳴義興王子明家饒於財所藏三代彛鼎六朝以来法書名畫實冠浙右每年必祈一籖於烈帝廟以卜休咎一嵗籖詞有曰開溝鑿井當得古鼎殊不以為意家人以商賈至汴夾谷郎中者藏一商彛絶精妙示之曰恐爾主翁未必有此物也歸以白即遣齎金購得之比舊藏皆不能及至正壬辰宼起蘄黄將由義興取道犯浙西子明罄其所藏鑿深窖以埋之彛亦在列既入窖作牛鳴者七夜頗可怪取出寄田家其窖後遭發掘獨此彛獲存鏖糟俗語以不潔為鏖糟按霍去病傳鏖皋蘭下注以世俗謂盡死殺人為鏖糟然義雖不同却有所出越民考穆爾古蘓字善卿西夏人僑居松江家貧授徒以養母性至孝然落落不羈善諧謔名人士多與之遊至正甲午進士及第授紹興路録事司達嚕噶齊比視天下雲擾所在悉􅂒瘵君撫字周至民愛之如父母乙未秋杭破遄即克復浙省左丞楊諤勒哲以本部苖將持露布至統洞蠻甚衆意實覘視虚實又將流毒於我民也縱虐恣暴民皆束手惴惴不敢與爭無故刼府架閣照磨陳修家妻妾幾被汚君激怒填膺指揮吏兵收之郡民讙呼從事苗遂盡死後諤勒哲聞越民結義且固終不敢調兵渡浙江方集慶䧟時江南行臺官流避抵慶元奉㫖置治所於越遂檄君總統義民䕶城池君更募得勇悍者二千餘人以果毅二字為號曰果毅軍練習武事分撥守要害乃日與常所徃來者擊鮮飫醲酣咏呌嘯以為娛樂雖戸外上官坌至不少延納永康㓂起據有縣境君收復朝廷旌其功除江南浙西道亷訪司知事未上又除江東建康道經歴浙省丞相達實特穆爾便宜除行樞宻院判官君即自署諸叅謀為幕官曰經歴曰都事者不可枚舉時御史大夫拜珠克任奸􅃛吏為爪牙又自統軍三千曰臺軍紀律不嚴民横被擾害有訴於君君輒抑之衆軍皆怨怒然拜委𤨏齷齪惟以鈎距致財為務君不禮之或以諫君曰吾知上有君下有民耳安問其他拜頗聞銜之遂與臺軍元帥埒克戬永安張某萬戸閻塔斯布哈王哈喇特穆爾等謀殺之未得間戊戌十月廿二日首事出兵踰曹娥江與平章方國珍部下萬戸馮某鬬既不利駐軍東闗單騎馳歸拜意决矣廿三日遲明召君私第議事入至中門左右以鐡槌撾殺之初甚秘守閽軍自相謂無已殺總督官我輩幸也民始有聞之者走白君部將浙東僉元帥黄中諸叅謀聞變奔避不顧至有墜城以出行四五十里者初夜二鼔中提軍入城屯戒珠山拜未及知中臥病方飲藥得少汗尚昏潰困頓左右扶翼擐甲上馬遇臺軍於江橋鬬十數合破陣䧟堅身當矢石郡民老幼皆號泣曰殺我總督官我尚何生為壯者助中軍殊死戰臺軍一敗塗地屠其二營入拜家姬侍奴𨽻死者相枕藉一女為隊官陳某所掠舉君屍無元大索三日得於溺池中拜與二子匿梵宇幽𨼆處民搜見之齊唾其面且罵曰瞎賊我總督官何罪而令致於此耶不自殺執以歸中冀中殺之中解其縛率諸軍羅拜之曰總督官忠肝義膽照映天地人神所共知公信任憸邪使國家之柱石隕於無辜我之復讐明大義也殺我主將者既已斬之公幸毋罪拜執中以泣曰我之罪尚何言尚何言繼而軍民為君持服為位以祭私諡曰越民考越六日拜自劾納印綬去其印是夜遺失中以白金百兩購得於一卒以還行臺者君未死先三日有星大如桮椀紅光燭天墜鎮粤門化為石及君出師識者已卜君之有死兆矣至是果驗云南村野史曰兵凶器也戰逆徳也聖人不得已而用之故吾夫子必以臨事而懼好謀而成荅子路行三軍之問夫穆爾古蘓受任之初殊有古賢縣令之風一握兵柄志滿意得酣觴廢事輕謀首亂不旋踵而身首異處蓋亦平昔越己之過有以釀成此禍與㣲中則老母稚子亦皆几上之肉耳原其忠君愛民之心昞然與日星相昭明者則無可議也拜珠為國大臣坐鎮四省百官庶司孰不聽令邁之不奉臺檄擅興師旅明問其罪黜之可也斬之可也而乃陰結小醜作為此態是盜殺之非公論矣民心之所以不服良以是也噫享有尊爵重禄而當國步艱難之日既不思㳙埃補報之道又不責自己貪饕之非反以謀害忠良為先務謂之無罪得乎故其妻妾子女遭罹戮辱實自取之尚復可憐哉三姑六婆三姑者尼姑道姑卦姑也六婆者牙婆媒婆師婆䖍婆藥婆穩婆也蓋與三刑六害同也人家有一於此而不致姦盜者幾希矣若能謹而逺之如避蛇蠍庶乎淨宅之法不中用不中用不可用也左傳成二年郤子曰克於先大夫無能為役杜預注不中為之役使國字杜清碧先生本字伯原有所編五聲韻自大小分隸真草以至於外蕃書及國朝蒙古新字靡不收録題曰華夏同音至正壬午中書奏修三史以翰林待制聘先生起至武林辭疾不行盤桓久之浙省平章喀喇子山公庫庫時来訪一日語及聲律之學因問國字何以用可侯此喉音也有音無字字為首先生曰正如嬰兒初堕地時作此一聲乃得天地之全氣也平章甚説服水畜陶朱公養魚經曰夫治生之法有五水畜第一水畜魚也此二字亦竒纒足張邦基墨莊漫録云婦人之纒足起於近世前世書傳皆無所自南史齊東昏侯為潘貴妃鑿金為蓮花以帖地令妃行其上曰此歩歩生蓮花然亦不言其弓小也如古樂府玉臺新咏皆六朝詞人纎艶之言𩔖多體狀美人容色之姝麗及言妝飾之華眉目唇口要支手指之𩔖無一言稱纒足者如唐之杜牧之李白李商𨼆之輩作詩多言閨幃之事亦無及之者韓偓香奩集有咏屧子詩云六寸膚圓光緻緻唐尺短以今校之亦自小也而不言其弓惟道山新聞云李後主宫嬪窅娘纎麗善舞後主作金蓮髙六尺飾以寳物細帶纓絡蓮中作品色瑞蓮令窅娘以帛繞脚令纎小屈上作新月狀素韈舞雲中回旋有凌雲之態唐鎬詩曰蓮中花更好雲裏月長新因窅娘作也由是人皆效之以纎弓為妙以此知札脚自五代以来方為之如熈寜元豐以前人猶為者少近年則人人相效以不為者為耻也溺水不躍漳州龍溪縣澳里人陳端才之妻蔡氏三玉後至元間本處㓂起掠其里里媪集里中婦女同舟避難㓂追及三玉亟以水漬衣㓂視三玉有姿色欲先汙之三玉紿曰衣濕更求衣間㓂取衣投水死㓂曰溺者必躍以長竿絡鈎俟其躍而舉之屍竟不躍㓂退三玉之父端廣舟次上流屍遂逆流附父舟捭之不去移舟遡河而上屍從之上者三父異甚視則其女也夫三玉一婦人耳寧死不辱出於天性宜其貞爽不昧如此鎻陽韃靼田地野馬或與蛟龍交遺精入地乆之發起如笋上豐下儉鱗甲櫛比筋脉連絡其形絶𩔖男陰名曰鎻陽即肉從容之𩔖或謂里婦之滛者就合之一得陰氣勃然怒長土人掘取洗滌去皮薄切曬乾以充藥貨功力百倍於從容也輥吝諞三卦淮南潘子素純嘗作輥卦譏世之仕宦人以突梯滑稽而得顯爵者雖曰資一時之謔浪調笑不為無補於名教卦辭曰輥亨可小事亦可大事􅂏曰輥亨天地輥而四時行日月輥而晝夜明上下輥而萬事成輥之時義大矣哉象曰地上有木輥君子以容身固位初六輥出門無咎象曰出門便輥又何咎也六二傳於銕轊象曰傳於銕轊天下可行也六三君子終日輥輥厲無咎象曰終日輥輥雖危無咎也九四模稜吉象曰模稜之吉以隨時也六五神輥象曰六五神輥老於事也上六或錫之髙爵天下揶揄之象曰以輥受爵亦不足敬也此篇或者又謂自宋末即有非潘所造未審是否後平江蔡宗魯衛作吝卦爻配之曰吝亨利居閒不利有所為􅂏曰吝鄙嗇也利居閒無所求也不利有所為恐致禍也初六居富吝於周急悔亡無攸利象曰吝於周急不恤其貧也悔亡無攸利己終有望也六二聽婦言至吝不養其親不恤其弟貞凶象曰聽婦言昵於私也不養其親忘大恩也不恤其弟失大義也雖養弗時亦致災也故貞凶九三極吝吝其財不吝其身於行非宜象曰吝其財斯致富也不吝其身乃輕生也六四太吝君子吉小人凶象曰吝於君子雖有言無尤也吝於小人雖不有言終有悔也六五不吝於色務所欲終以死亡凶朋來吝於酒食弗克歡無咎象曰不吝於色惑於淫也務所欲樂其順從也終以死亡凶可知也朋来從其𩔖也吝於酒食誠大謬也雖弗克歡而無咎也上九居其家不吝於内吝於教子弗叶吉象曰居其家妄自尊也不吝於内畏寡妻也吝於教子終無所成也近扶風馬文璧琬又作諞卦曰諞貞亨初吉終凶利見小人不利於君子􅂏曰貞正也亨通也通乎正言諞或庶幾也終凶諞不由初也利見小人猶同𩔖也不利於君子入於邪也象曰麗口掉舌諞君子以求名干禄初九諞於同朋無咎象曰同朋於諞又誰咎也九二略施於民吉象曰九二之吉以新衆聽也六三来其諞酒食用享象曰来其諞民取則也享其酒食以崇功也九四飾言如簧以娛彼心用獲南金象曰娛人獲金不足道也九五君子終日髙諞王用徴安車以迎終嵗弗寜後有凶象曰以諞受徴不羞也終嵗弗寧祗足煩勞也後有凶不副實也上六莾諞不已四方欲殺之象曰莾諞衆怒殺之何過也右三卦切中時病真得風刺之正因併録之烏蜑戸廣東采珠之人懸絙於腰沉入海中良乆得珠撼其絙舶上人挈出之𦵏於黿鼉蛟龍之腹者比比有焉有司名曰烏蜑戸蜑音但仁宗登極特㫖故免時敬公戴卿為江西行省叅知政事俾該管掾史立案令廣東帥府抄具烏蜑戸一一籍貫姓名置册申解他省官曰中書咨文無是恐不必也公曰萬一乃申明舊典庶不害及良民未幾太后中使至人咸服公先見之明重臺凡婢役於婢者俗謂之重臺按左氏傳昭公五年日之數十故有十時亦當十位自王以下其二為公其三為卿注云日中為王食時為公平旦為卿鷄鳴為士夜半為皂人定為輿黄昏為𨽻日入為僚晡時為僕日昳為臺㬂日中出闕不在第等王公曠其位又昭公七年天有十日人有十等故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣臺則所謂臺者十等之至卑今豈亦本是與然加以重字尤有意日子文選曹公檄吳將校部曲文年月朔日子注發檄時也輟耕録卷十
