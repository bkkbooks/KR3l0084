seq: 7
front:
  text: 官奴今以妓為官奴即官婢也周禮天官酒人奚三百人注
  hash: sha256:3226c6c7b984ff64d5e74fbaa412fed7b78f211e6f83afe7fa60b1f9b3928061
body:
  text: 今之待史官婢右此石是南唐寳石乆為吾齋研山今被道祖易去中美舊有詩云研山不易見移得小翠峯潤色裛書几𨼆約煙朦朧巉巖自有古獨立髙崧巃安知無雲霞造化與天通立壁照春野當有千丈松﨑嶇浮波瀾偃仰蟠蛟龍蕭蕭生風雨儼若山林中塵夢忽不到觸目萬慮空公家富竒石不許常人同研山出層碧崢嶸實天工淋漓上山泉滴瀝助毫端揮成驚世丈主意皆逢原江南秋色起風逺洞庭寛往往入佳趣揮掃出妙言願公珍此石美與衆物肩何必嵩少𨼆可藏為地仙今每誦此詩必懐此石近余亦有作云研山不復見哦詩徒嘆息唯有玉蟾蜍向余頻淚滴此石一入渠手不得再見每同交友往觀亦不出示紹彭公真忍人也余今筆想成圖彷彿在目從此吾齋氣秀尤不復泯矣崇寜元年八月望米芾書余二十年前嘉興吳仲圭為畫圖錢唐吳孟思書文後携至吳興燬於兵偶因清暇黙懐往事漫記於此衛夫人翰墨志云衛夫人名鑅字茂漪晉汝隂太守李矩妻善鍾法能正書入妙王逸少師之西溪藂語云夫人廷尉展之弟恒之從妹中書郎李充之母親家凡男女締姻者兩家相謂曰親家此二字見唐蕭嵩𫝊今北方以親字為去聲按盧綸作王駙馬花燭詩云人主人臣是親家則是亦有所祖親家又曰親家翁五代史劉昫傳昫與馮道為姻家而同為相道罷李愚代之愚素惡道之為人凡事有稽失者愚必指以誚昫曰此公親家翁所為蘇氏開談録馮道與趙鳳同在中書鳳有女適道中子以飲食不中為道夫人譴罵趙令婢長號知院者来訴凡數百言道都不荅及去但云傳語親家翁今日好雪梵嫂唐鄭熊番禺雜記廣中僧有室家者謂之火宅僧宋陶榖清異録京師大相國寺僧有妻曰梵嫂房老王子年拾遺記石季倫有妾名翔風及色衰退為房老輟耕録卷六欽定四庫全書輟耕録卷七元陶宗儀撰趙魏公書畫魏國趙文敏公孟頫以書法稱雄一世畫入神品其書人但知自魏晉中来晩年則稍入李北海耳嘗見千字文一卷以為唐人字絶無一㸃一畫似公法度閱至後方知為公書公自題云僕廿年来寫千文以百數此卷殆數年前所書當時學禇河南孟法師碑故結字規模八分今日視之不知孰為勝也田君良卿於駱駝橋市中買得此卷持来求䟦為書其後因思自五嵗入小學學書不過如世人漫爾學之耳不意時人持去可以粥錢而吾良卿又捐錢若干緡以購之皆可笑也元貞二年正月十八日子昻題則知公之書所以妙者無帖不習也又嘗見公題所畫馬云吾自幼好畫馬自謂頗盡物之性友人郭祐之嘗贈余詩云世人但解比龍眠那知巳出曹韓上曹韓固是過許使龍眠無恙當與之並驅耳然往往閱公所畫馬及人物山水花竹禽鳥等圖無慮數十百軸又豈止龍眠並驅而已哉又聞公偶得米海岳書壯懐賦一卷中闕數行因取刻本摹榻以補其闕凡易五七紙終不如意乃嘆曰今不逮古多矣遂以刻本完之公之翰墨為國朝第一猶且服善如此近有一等人僅能㸃畫如意便自誇大者於公寧不愧乎金鼇山吾鄉于佩逺先生演題金鼇山詩曰金鼇之山金碧浮重𤣥寳坊居上頭鐘聲夜度海門月樹色逺攬豐山秋龍伯國人真妙手掣此巨靈鎮江口丹丘逸士来跨之石窪為尊江當酒黄鬚天子七寳鞭黄頭漁郎櫂江船百年塵跡果何在芒碭雲去山蒼然歴試諸難固天造中興開國何草草腹心有疾日月昏英雄無聲天地老兩宫不歸汴水流此地空傳帝子遊惜無徤筆驅風雨一洗江山萬古愁此詩至今膾炙人口山枕海屬臨海縣章安鎮初宋髙宗在潜邸日泰州人徐神翁云能知前来事羣閹言於髙宗召至以賔禮接之一日獻詩於帝曰牡蠣灘頭一艇横夕陽西去待潮生與君不負登臨約同上金鼇背上行及兩宫北狩匹馬南渡建炎庚戌正月三日帝航海次章安鎮灘淺閣舟落㠶於鎮之福濟寺前以候潮顧問左右曰此何山曰金鼇山又問此何所曰牡蠣灘因黙思神翁之詩乃屏去警蹕易衣徒步登岸見此詩在寺壁間題墨若新方信其為異人也時住持僧方陞坐道祝聖之詞帝趾忽前聞其稱讃之語甚喜戒左右勿驚怖而諦聽之少焉千乗萬騎畢集始知為六龍臨幸野僧初不閑禮節恐怖失措從行有司教以起居之儀山下曰黄椒村村之婦女聞天子至咸来瞻拜龍顔歡聲如雷曰不圖今日得覩天日帝喜𠡠夫人各自遂便故至今村婦皆曰夫人雖易世其稱謂尚然不改宋史但載御舟幸章安鎮而不見金鼇之詳偶與張善初話鄉中舊事因筆之善初章安人也委羽山吾鄉台之黄巖諸山脉絡相連屬大江越州治北自州出南門陸行四五里許有委羽山特立不倚形如落舞鳳故得名然州人與之朝夕者俱弗自知其為勝山旁廣而中深青樹翠蔓䕃翳蓊鬱幽泉琮琤若鳴珮環於修竹間千變萬態不可狀其畧中藏洞宂仙家所謂空明洞天者是也好道之士嘗持炬入行兩日不可窮聞櫓聲乃出洞之側産方石周正光澤五色錯雜雖加琢磨殆不是過大者三四分小者比米粒而小以斧粉碎之亦無不端方見長老言嘗有素服靚妝飄飄若仙之女者當風清月白時則逍遥乎松杉竹柏之下或時變服叩里人門求水火里人所居去洞所不能百步異其狀宻覘之迤􅆔從洞中去里人以為怪糞其地越數日里人家夜失火埶張甚不可滅室宇一空妻子僅以身免遂流離他處識者以為厭􅁾仙境故致此竒禍自是仙女不復出矣余幼時尚及見里人故址至今有欲得方石者裹糧撮許往洞口撒之隨意拾地上土則有石在土中不爾絶無有也斛銘鎮國上將軍福建宣慰使費榮敏公㮤余内子之曾大父也吳興人今著籍松江之上海器度𢎞厚不以富貴驕人輕財好施勇於為義人皆稱曰費佛子陵陽牟先生瓛所撰墓誌銘載其事甚詳家之量衡無二致刻銘於斛之四面曰出以是入以是子孫永如是推此則真古仁人之用心者矣内子之大父良顯侯拱辰父昭武大將軍雄皆世守其業克不墜先志云孝感越楓橋里人丁氏母雙目失明丁至孝每朝盥漱訖即舐母之目積有年矣俄而母左目明未乆右目復明憲司上其事於朝表其閭曰孝子之門至治年間也因讀江南别録彭李者世為義門陳氏之傭夫喪明已乆有子一人嘗聞陳之子弟言舜為父瞽叟舐目而致明乃歸效之不旬日父目忽然明朗右二事誠孝行所感今段吉父先生母夫人劉雙目乆失明醫弗能愈先生中鄉舉一目忽自見物先生及第一目又如之雖夫人喜溢於中不自知其然而然亦先生學業有成所致與傳曰立身揚名以顯於後世孝之至也其此之謂焉先生諱天佑汴梁蘭陵人仕至江浙儒學提舉和沙拉卜都和沙拉卜都者回回田地所産藥也其形如木鱉子而小可治一百二十種證每證有湯引屈戍今人家窓戸設鉸具或鐡或銅名曰環紐即古金鋪之遺意北方謂之屈戌其稱甚古梁簡文詩織成屏風金屈戍李商𨼆詩鎻香金屈戍李賀詩屈膝銅鋪鎻阿甄屈膝當是屈戌回回石頭回回石頭種𩔖不一其價亦不一大徳間本土商賣紅埒阿勒一塊於官重一兩三錢估直中統鈔一十四萬定用嵌帽頂上自後累朝皇帝相承寳重凡正旦及天夀節大朝賀時則服用之曰埓阿勒方言也今問得其種𩔖之名具記於後紅石頭四種同出一坑俱無白水埒阿勒淡紅色嬌必扎達深紅色石薄方嬌齊拉尼黑紅色古里朗紅帶黒黄不正之色塊雖大石至低者緑石頭三種同出一坑賚雅實勒上等暗深緑色濟拉里克雅實勒中等明緑色阿持雅實勒下等𢃄石淺緑色鴉鶻紅雅古特上有白水宻斯堪尼帶石無光二種同坑青雅古特上等深青色尼勒朗中等淺青色烏帕尼勒朗下等如水樣帶石渾青色黄雅古特白雅古特猫睛猫睛中含活光一縷走水石新坑出者似猫睛而無光甸子尼沙布哩即回回甸子文理細尼爾瑪尼即河西甸子文理麄荆州石即襄陽甸子色變黄巢地藏趙生者宋宗室子也家苦貧居閩之深山業薪以自給一日伐木溪滸忽見一巨蛇章質盡白昻首吐舌若將噬已生棄斧斤奔避得脱妻問故具以言因竊念曰白鼠白蛇豈寳物變幻耶即拉夫同往蛇尚宿留未去見其夫婦来回首遡流而上尾之行數百步則入一巖宂中就啟之得石石隂刻押字與嵗月姓名乃黄巢手瘞治為九宂中宂置金甲餘八宂金銀無􅈫生掊取畸零仍舊掩盖自是家用日饒不復事薪鄰家疑其為盜告其姊之夫嘗為吏者吏詢之嚴不敢𨼆隨餽白金五錠吏貪求無厭訟之官生不獲已主一巨室悉以九宂奉巨室廣行賄賂有司莫能問迨帥府特委福州路一官往㢘之巨室私獻金甲因回申云具問本根所以實不曾掘發寳藏其事遂絶路官得金甲珍襲甚至任滿他適其妻徙置榻下一夕聞繞榻風雨聲頃刻而止頗怪之夫歸共取視鐍鑰如故啓籠乃無有也生無子夫婦終老巨室嗟夫天地間物茍非我有雖得之亦終失也巢之亂唐天下剽掠寳貨歴三四百年至於我朝而為編氓所得氓固得之不能保之而卒歸於富家其路官者得金甲自以為子孫百世計一旦作神物化去是皆可為貪婪妄求者勸鴛衾孟蜀主一錦被其濶猶今之三幅帛而一梭織成被頭作二宂若雲版様盖以叩於項下如盤領狀兩側餘錦則擁覆於肩此之謂鴛衾也楊元誠太史言兒時聞尊人樞宻公云嘗於宋官庫見之奚奴温酒宋季叅政相公鉉翁於杭將求一容貎才藝兼全之妾經旬餘未能惬意忽有以奚奴者至姿色固美問其藝則曰能温酒左右皆失笑公漫爾留試之及執事初甚熱次略寒三次㣲温公方飲既而每日並如初之第三次公喜遂納焉終公之身未嘗有過不及時歸附後公携入京公死囊槖皆為所有因而巨富人稱曰奚娘子者是也吁彼女流賤隸耳一事精至便能動人亦其專心致志而然士君子之學為窮理正心修己治人之道而不能至於當然之極者視彼有間矣掛牌延客江右胡存齋叅政能折節下士賔客至如家焉故南北士大夫有經過其地無不願見者每虞閽人不為通刺茍不出日即於門首掛一牌云胡存齋在家買宅有䜟松江在城金世昌者出繼夏氏嘗買廢宅修葺前㕔梁内有鑿成金世昌三字必昔時客商所記姓名人以為有定數云待士恒陽㢘文正王希憲字善父輝和氏由父孝懿王布瀂凱官㢘訪使氏焉國初拜為平章政事秉政日中書右丞劉武敏公整以初附為都元帥騎從甚都詣門求見王之弟兄凡十人後皆至一品内王弟昭文舘大學士光禄大夫薊國公希貢猶布衣為通報王方讀書畧不荅薊公出整復凂入言之因令徹去坐椅自據中坐令整入整展拜起側立不予之一言整求退謂曰此是我私宅汝欲有所言明日當詣政事堂及出慚赧無人色頃之宋士之在覊旅者寒餓狼狽冠衣􅀈縷袖詩求見王之兄弟皆揶揄之薊公復為入言急令鋪設坐椅且戒内人備酒饌出至大門外肅入對坐出酒饌執禮甚恭且録其居止諸儒但言困苦乞歸王明日遂言於世皇皆遂其請是夜諸兄弟問曰今日劉元帥者主上之所倚任反菲薄之江南窮秀才却以禮遇如此其至我等不能無疑王曰我是國家大臣言動嚬笑繫天下重輕整雖貴賣國叛臣也故折辱之令其知君臣義重若寒士數十皆誦法孔子者也在宋朝不坐燕不與何故而拘執於此况今國家起朔漠斯文不絶如綫我更不尊禮則儒術且將掃地矣王之作興斯文若此是大有功於名教者也雇僕役許魯齋先生在中書日命牙儈雇一僕役特選一能應對閑禮節者進郤之曰特欲老實耳他日領一蓬首垢面愚騃之人来遂用之儈請問其故先生曰諺云馬騎上等馬牛用中等牛人使下等人馬上等能致逺牛中等良善人下等易馴若其聰明過我則我反為所使矣假如司馬温公家一僕三十年止稱君實秀才蘇子瞻學士来謁聞而教之明日改稱大叅相公公驚問以實告公曰好一僕被蘇東坡教壊了這便是樣子志異至正壬辰春自杭州避難居湖州三月廿三日黒氣亘天雷電以雨有物若果核與雨雜下五色間錯光瑩堅固破其實食之似松子仁人皆曰娑婆樹子閏月十二日復雨八月過杭州因知三月十八日亦雨如湖州郡人初不以為異及九月十日紅巾犯省治雨核之地悉被兵火無有處屋宇如故余弗之信九月廿六日湖州䧟儀鳳橋四向焚戮特甚追思雨核時橋四向為最多信前言不誣也後聞池州亦然與杭日同池州之禍尤可慘也按白樂天詩集載月中嘗墜桂子於天竺寺葉石林玉澗雜書亦云仁宗天聖中七月八月兩月之望有桂子從空降如雨其大如豆雜黄白黒三色食之味辛寺僧道式取以種得二十五本二書豈盡妄耶此理殊不可曉但今又為時䜟尤可異也課馬俗呼牝馬為課馬者唐六典凡牝四游五課羊則當年而課之課嵗課駒犢也客作今人之指傭工者曰客作三國時已有此語焦光飢則出為人客作飽食而已鹹杬子今人以米湯和入鹽草灰以團鴨卵謂曰鹹杬子按齊民要術用杬木皮淹漬故名之若作圓字寫則誤矣鷹背狗北方凡皁鵰作巢所在官司必令人窮巢探卵較其多寡如一巢而三卵者置卒守護日覘視之及其成鷇一乃狗耳取以飼飬進之於朝其狀與狗無異但耳尾上多毛羽數根而已田獵之際鵰則戾天狗則走陸所逐同至名曰鷹背狗官制資品奎章政要文宗之御奎章日學士虞集博士柯九思常侍從以討論法書名畫為事時授經郎揭徯斯亦在列比之集九思之承寵眷者則稍䟽因潜著一書曰奎章政要以進二人不知也萬幾之暇每賜披覽及晏朝有畫授經郎獻書圖行於世厥有深意存焉句曲外史張伯雨題詩曰侍書愛題博士畫日日退朝書滿牀奎章閣上觀政要無人知有授經郎盖柯作畫虞必題故云義奴劉信甫揚州人郡富商曹氏奴曹瀕死以孤託之孤漸長孤之叔利孤財妄訴於府曰某家貲産未嘗分析今悉為姪所據郡守劉察其詐直之叔之子以父訟不勝慚且憤毒父死而復訴於府曰弟挾怨殺吾父適達嚕噶齊穆穆呼者受署之初與守不和竟欲置孤法并得以中守引致百餘人皆抑使誣服曰孤俾某等殺叔守受孤賄若干末鞠信甫信甫曰殺人者某也孤實不知守亦無賄既被鍛鍊無完膚終無兩辭初信甫先遣人宻送孤過京師避於一達宦家囑之曰慎毋出至是乃厚以金帛賂達嚕噶齊孤得無預而信甫減死既而叩蹕陳告達嚕噶齊以罪罷去守復官凡獄訟道里費盖鉅萬計孤歸悉􅈫償信甫曰奴之富皆主翁之䕃也今主有難奴救脱之分内事耳寧望求報哉力辭不受忠倡至正壬辰秋邊宼䧟常州守吏望風奔潰徐婦倡者㓂命以佐燕乃憤詈弗從竟刺死之未幾江浙平章定定来尅復儒流吳寅夫趙君謨等以從逆伏誅嘉興張翔南翼作忠徐倡詩以白於世曰西神峩峩睢孽蔓乗兵塗甿膏國武乏興唶爾尸素營賄朋城弗典守妖狐凌彼章逢之徒冠倫魁能蒲伏讋服倒授太阿傔以承天廓不白暑雨氷綱常淪隳綫絶罔憑胡為優徐倡冶容倚市矜鬕妖驅之俾侑樂頩玉肆詈無陵兢噤謳裭舞餘怒鬟植鬅鬙鉛為鋼刃劃膺載營覇灼上升顧守臣鉅儒汗恧銜愧死莫懲二儀磅礴忠義氣猶出下里孰可仍桓桓執夷徒乃反經溝塍爾倡丹𠂻燭日月易粉黛譽聲繩繩汙瀆流回清澂盖吳嘗室其少妹且與生子名教中所不齒者一死固有餘辜趙頗純謹老成乃亦在列可哀也已隨隱漫録載宋端平二年李全據髙郵城叛召官奴毛惜惜佐酒罵曰汝本徤兒官家何負於汝而反吾有死耳不能為反賊行酒全以刃裂口立命臠之罵至死不絶後閫臣以聞特封英烈夫人且賜廟潘紫巖有詩曰淮海艷姬毛惜惜蛾眉有此萬人英恨無匕首學秦女向使裹頭真杲卿玉骨花顔城下土氷魂雪魄史閒名古今無限要金者歌舞筵中過一生噫當是時也姦兇得志埶熖熏天雖厚禄重臣峩冠世儒罔不效力執事戰兢奔走於指揮之下而倡優下賤乃能奮不顧身獨何人與夫徐氏之與英烈夫人同一死耳而無有為之舉申朝廷褒贈封號以為世勸惜哉志怪至正乙未正月廿三日日入時平江在城忽望東南方軍聲且漸近驚走覘視他無所有但見黒雲一簇中彷彿皆𩔖人馬而前後火光若燈燭者莫知其􅈫迤􅆔由西北方而没惟葑門至齊門居民屋脊龍腰悉揭去屋内牀榻屏風俱仆醋坊橋董家雜物鋪失白米十餘石醬一缸不知置之何地此等怪事竟不可曉粥爵至正乙未春中書省臣進奏遣兵部員外郎劉謙来江南募民補路府州司縣官自五品至九品入粟有差非舊例之職專茶鹽務塲者比雖功名逼人無有願之者既而抵松江時知府崔思誠惟知曲承使命不問民間有粟與否也乃拘集屬縣巨室㸃科十二名衆皆號泣告訴曽弗之顧輒施拷掠抑使承伏即填空名告身授之平江路達嚕噶齊卒不避譴斥力爭以為不可竟無一人應募者崔聞之深自悔赧還金絶交曹公克明鑑號以齋宛平人為湖廣行省員外郎日麻陽主簿顧淵白致書問訊且以辰砂一包見寄未及啓封漫爾置箧笥中後有憲官過訪因論製藥為苦無好辰砂公曰我一故人嘗以此為恵當奉送及取視乃有砂金三兩雜其内公驚嘆曰淵白以我為何如人也時淵白已没呼其子歸之其㢘潔如此官至禮部尚書諡文穆畫師王淵字若水錢唐人善山水人物尤長於花竹翎毛幼時獲侍趙魏公故多得公指教所以傅色特妙天歴中畫集慶龍翔寺兩廡壁時都下劉總管者總其事劉命若水於門首壁上作一鬼其壁髙三丈餘難於着筆因取紙連粘粉本以呈劉曰好則好矣其如手足長短何若水不得其理因具酒禮再拜求教於劉劉曰子能不耻下問吾當告焉若先配定尺寸畫為躶體然後加以衣冠則不差矣若水受教而退依法為之果善輟耕録卷七
