body:
  text: 輟耕録卷十三元陶宗儀撰中書鬼案中書省准陕西行省咨察罕諾爾宣慰司呈巴咱爾街禮敬坊王弼告至正三年九月内到義利坊平易店見有算卦王先生因問來歴致争當月二十九日夜睡房窻下似風吹葫蘆聲不時有之請到李法師遣送虚空人言算卦先生使我來哭聲内稱寃枉弼祝之曰爾神爾鬼明以告我鬼云我是豐州黒河村周大親女月惜至正二年九月十七日夜因出後院被這王先生將我殺了做奴婢使喚如今教在你家作怪哭者索要衣服抄冩所說赴官陳告差盧捕盗等與社長吳信甫於王先生房内搜獲木印二顆黒羅繩二條上釘鐵鍼四箇魘鎮女身小紙人八箇五色綵五色絨上俱有頭髪相􅅶又小葫蘆一箇上拴紅頭繩一條内盛琥珀珠二顆外包五色絨朱書符命一沓又告十二月初三日有鬼空中言我是奉元路南坊開張機房耿大第二男頑驢這先生改名頑童我年一十八嵗被那老先生引三箇伴當殺了我二十二日又有鬼空中云我是察罕諾爾李帖家孩兒延奴又名搶灰那老賊殺了我改名買賣我被殺時年十四嵗勘問得犯人王萬里即王先生狀招年五十一嵗江西省吉安路民於襄陽周先生處習㑹隂陽課命至順二年三月内到興元府逢見劉先生云我㑹使術法迷惑人心收採生魂使去人家作禍廣得財物我有收下的賣與你一箇隨於身畔取出五色綵帛并頭髪相結一塊言稱這箇小名喚延奴我課算揀性格聰明的童男童女用符命法水呪語迷惑活割鼻口唇舌尖耳朶眼睛呪取活氣剖腹掏割心肝各小塊曬乾搗羅為末收裹及用五色綵帛同生魂頭髪相結用紙作人形様符水呪遣往人家作怪跟隨到伊下處至夜劉先生焚香念呪燒符聽得口言不見形影問師父你教我誰家裏索甚去劉先生分付李延奴你與這先生做伴去說罷將呪語收禁萬里與訖鈔七十五兩買得五色綵帛頭髪相結一塊稱說可改名買賣傳教採生遣使收禁符命呪水又云牛狗肉破法休喫續後於房州山地面經過逢見廣州舊識鄺先生云我亦㑹遣使鬼魂我有收下的生魂賣與你萬里與訖鈔一錠鄺先生取出五色綵帛頭髪相結紙人兒一箇云此名耿頑童萬里將與李買賣一處遣使以課算為由前到大同路豐州黑河村地面往來至正二年八月内到於周大家課命將伊女周月惜八字看算性格聰慧要將殺害收采生魂至九月十七日夜於周大住宅後院墻下黑影内潛藏間見一人往後院内來認得係是月惜在彼出後萬里密念咒語向前拖拽往東奔走將月惜禁止端立脫下沿身衣服用元帶魚刀將其額皮割開扯下懸葢眼睛及將頭髪割下一縷用紙人并五色采帛絨線相結作塊一如人形様然後割下鼻口唇舌耳尖眼睛手十指梢脚十趾梢却剖開胷腹纔方倒地氣絶又將心肝肺各割一塊曬乾搗末裝於小葫蘆内至正三年九月内來到察罕諾爾平易店安下開張卦肆與王弼相争挟讐令生魂周月惜等三名前往本家作禍為買馬肉食因店内將牛肉作馬肉賣與因此不能收禁事發到官及責得李福寳即李帖狀結生到孩兒延奴常有疾病於五岳觀口許出家落在紙灰内改名搶灰天歴二年二月内令其趕牛牧放不歸此時饑􅂽想得􅀍人虧害不曾根尋及行移奉元路咸寧縣并大同路豐州照勘耿頑童周月惜致死縁由相同呈乞咨請施行准此送據刑部擬得王萬里殘忍不道合令凌遲處死其妻子遷徙海南安置烏寳傳余幼時嘗見胡石塘先生𤣥寳傳今不能記其全篇有人出永嘉髙則誠明烏寳傳相示雖曰以文為戱要亦有闗於世教傳曰烏寳者其先出於㑹稽禇氏世尚儒務詞藻然皆不甚顯至寳厭祖父業變姓名從墨氏㳺盡得其通神之術由是知名初寳之先有錢氏者亦以通神之術顯迨寳出而錢氏遂廢然其術亦頗相𩔖故不知者猶以為錢云寳輕薄柔黙外若方正内實垢汚善隨時舒卷常自得聖人一貫之道故無入而不自得流俗多惑之凡有謀於寳小大輕重多寡精粗無不曲隨人所求自公卿以下莫不敬愛其子姓蕃衍散處郡國者皆官給廬舎而加守䕶焉其有老死者則官為聚其屍而焚之葢知墨之末俗也寳之所在人争迎取邀致茍得至其家則老稚婢𨽻無不忻恱且重扄邃宇敬事保愛惟恐其他適也然素趍勢利其富室勢人每屈輙往雖終身服役弗厭其窶人貧氓有傾心願見終不肯一往尤不喜儒雖有暫相與往來者亦終不能乆留也葢儒墨之素不相合若此寳好逸惡勞愛儉素疾華侈常客於𢎞農田氏田氏朴且嗇寳竭誠與交田氏没其子好奢靡日以聲色宴㳺為事寳甚厭之隣有商氏者亦若田氏父之為也遂挈其族往依焉葢墨之道貴清浄故也然其為人也多詐反覆不常凡逹官勢人無不願交而率皆不利敗事故其廉介自持者率不與寳交自寳之術行挟詐者往往偽為寳術以售于時後皆敗死故寳之術益尊是時崑崙抱璞公南海𤣥珠子永昌從革生皆能濟人與世俯仰曲隨人意而三人者亦願為寳交茍得寳一往則三人亦無不可致故術譽咸歸於寳焉寳族雖夥然其狀貌技術亦頗相似知與不知咸謂之烏寳云論曰烏氏見於春秋世本姓苑若存餘技烏獲皆為顯仕至唐承恩重𦙍始盛迨寳而益著寳裔本禇氏而自謂烏氏則變詐亦可知矣寳之學雖出於墨而其害道傷化尤甚雖孟軻氏復生不能闢也然使寳生於唐虞三代時其術未必若是顯然則寳之得行其志者亦其時有以使之嗚呼豈獨寳之罪哉緑窻遺藁新喻傅汝礪先生若金嘗志其妻殯云君諱淑字􅈍蘭姓孫氏其先汴人年二十三歸我於湘中五月而卒君髙朗秀惠生六嵗母卒父教以書稍長習女工晨起獨先盥櫛適父母所問安畢佐諸母具食飲退治女工晡時觀經史或鳴琴自休既夕聚家人瞑坐說古貞女孝婦傳燭至治女工如初富貴家多求婚父不許及以許余家人不恱一日有幸余疾者欲因動之君曰大人以愛子許人必慎所擇矣即有不諱命也若等謂我且慕世俗富貴而改聘耶有死而已皆愧謝不敢復言事繼母盡孝道死之日母大慟既瞑目久忽徐起止母哭令自寛及母出私泣告余曰妾為父母所偏愛即死必傷其心然終必死矣為將奈何君後富貴幸念之言既復瞑目泰定五年八月廿有一日也後三日寓殯湘中及序其遺藁云故妻孫氏蕙蘭早失母父周卿先生以孝經論語及凡女誡之書敎之詩固未之學也因其弟受唐詩家法於庭取而讀之得其音格輙能為近體五七言語皆閒雅可誦非茍學所能至者然不多為又恒毁其藁家人或竊收之令勿毁則曰偶適情耳女子當治織絍組紃以致其孝敬辭翰非所事也既卒家人哭而稱之因出其藁得五言七首七言十一首五七言未成章者廿六句特為編集成帙題曰緑窻遺藁序而藏之五言詩曰窻裏人初起窻前栁正嬌捲簾衝落絮開鏡見垂條坐對分金線行防拂翠翹流鶯空巧語倦聽不須調右一小閣烹香茗䟽簾下玉鈎燈光翻出鼎釵影倒沉甌婢捧消春困親嘗散暮愁吟詩因坐久月轉晩妝樓右二燈前催曉妝把酒向髙堂但願梅花月年年映夀觴右三采閣閉朝寒妝成擬問安忽聞春雪下喚婢捲簾看右四粲粲梅花𣗳盈盈似玉人甘心對氷雪不愛艶陽春右五小小春羅扇團團秋月生蟠桃花𣗳裏繡得董䨇成右六自拂䨇眉黛何曽慣得愁若教如翠栁便恐不禁秋右七七言詩曰樓前楊栁發青枝樓下春寒病起時獨坐小窻無氣力隔簾風亂海棠絲右一緑窻寂寞掩殘春繡得羅衣懶上身昨日翠帷新病起滿簾飛絮正愁人右二小妹方纔習孝經可憐嬌怯性偏靈自尋女誡窻前讀嗔道家人不與聽右三幾㸃梅花發小盆氷肌玉骨伴黄昏隔窻久坐憐清影閒劃金釵記月㾗右四繡被寒多未欲眠梨花枝上聽春鵑明朝又是清明節愁見人家買紙錢右五春雨隨風濕粉墻園花滴滴斷人膓愁紅怨白知多少流過長溝水亦香右六春風昨夜碧桃開正想瑶池月滿臺欲折一枝寄王母青鸞飛去幾時來右七空堦日晚雨纔乾小婢相隨倚畫䦨金釵誤掛緋桃落羅袖愁依翠竹寒右八小窻今夕繡鍼閒坐對銀蟾整翠鬟凡世何曽到天上月宫依舊似人間右九乞巧樓前雨乍晴彎彎新月伴䨇星隣家小女都相學鬭取金盆看五生右十庭院深深早閉門停鍼無語對黄昏碧紗窻外初生月照見梅花欲斷䰟右十一未成章詩曰露下庭梧葉風吹月桂花登樓聞過鴈開户見棲鵶繡簾當雪卷銀燭背風然雪晴山顯翠風暖水生紋萱草當堦緑櫻桃落地紅芍藥開時病荼䕷落處愁玉釵簮茉莉羅扇繡芙蓉窻前垂栁分春色鏡裏幽蘭對曉妝花間影過那知燕栁外聲來不見鶯慈親教婢囘金剪驕妹嗔人奪繡鍼妝成寳鏡楊花過行出珠簾燕子歸自傾瓮裏春泉水親灌堦前石竹花海棠帶雨臙脂重楊栁凝烟翡翠濃先生既䘮妻哀戚之情多見於詩悼亡曰驚颷吹羅幙明月照堦戺春草忽不芳秋蘭亦同死斯人藴淑德夙昔明詩禮靈質奄獨化孤䰟將安止迢迢湘西山湛湛江中水水深有時極山髙有時已憂思何能齊日月從此始右一皇天平四時白日一何遽勤儉畢婚姻新人忽復故衾裳歛遺襲棺槨無完具送葬出北門徘徊怛歸路玉顔不可恃况乃紈與素纍纍花下墳鬱鬱塋西𣗳他人亮同此胡為獨哀慕右二新婚誓偕老恩義永且深旦暮為夫婦哀戚奄相尋涼月燭西樓悲風鳴北林空帷奠巾櫛中房虚織絍辭章餘婉孌琴瑟有餘音睠言瞻故物惻愴内不任豈無新人好焉知諧我心掩穴撫長暮涕下霑衣襟右三人生貴有别室家各有宜貧賤逺結婚中心兩不移前日良宴㑹今為死别離親戚各在前臨訣不成辭傍人拭我淚令我要裁悲共盡固人理誰能心勿思右四感獨曰幽幽蕙草晚靡靡蘭芳斷皎皎夜泉人㝠㝠不復旦流塵棲暗壁凉吹經虚幔無論懽意消日復愁思亂䰟傷夕方永氣變秋將晏當窻慘斷素捐箧悲柔翰憶初成好合誓且同憂患何言遂長終獨處増永嘆寤寢忽如在展轉驚復散念兹何嗟及哀至聊自判百日曰人生悲死别矧在心相知新婚未及久杳杳遽何之昔為連理木今為斷腸枝相去時幾何百日奄在兹􅃜月有圓夕逝水無還期棄置非人情何以為我思入室曰妝閣閉長夜幽蘭坐復春猶疑挑錦字不見掩羅巾故物空在目蕭條生網塵右一虚窻明月滿芳砌緑苔滋花間時染翰尚憶解題詩寂寞幽泉下貞心空自知右二追和蕙蘭曰小窻開盡碧桃枝憶得青鸞化去時昨夜秋風妬幽怨夢中吹斷素琴絲右一江上愁時復值春帶圍寛盡不宜身階前舊種櫻桃𣗳日暮飛花故著人右二嗟夫孫氏之詩依乎禮義先生之詩哀而不傷舉得性情之正是可傳也已為將嗜殺王皮者住鳯翔府城外八九里許盛暑中入城買皮料歸至中途憩道傍大𣗳下忽有二卒來前狀貌竒怪似非凡世間人遽問曰汝王皮歟王竊疑懼然不敢不以實對乃曰某是已卒曰隂府攝汝王曰某平生無他過惡望賜矜憐卒不諾又告曰容到家與妻子一别可乎卒乃諾將及門卒力挽之不能入王大呌救我救我比妻子來前王已仆地氣絶既歛胷間微煖如生經宿未敢葢棺王於㝠漠中隨卒至一所儼若王者之庭儀衛吏𨽻無不備具問曰汝為秦白起偏將坑趙降卒四十萬知其罪否王答曰某傭工平生不曾讀書不知白起為何人亦不知降卒為何事於是令王起凡再歴二庭問亦如之答亦如之乃反接王一大池邊取池中泥塗其胸寒氣凛冽洞腹透背王即悟曰某巳記前身事矣遂解其縛復引至原問第三庭王告曰某曽為白起偏將其當年殺趙降卒時某曽力諫不從非某之罪頃間牽一荷鐡校者跪王側王認得似是白起而形骸骨立又若非似葢因久囚故也起見王曰子來矣余復何言方招承庭吏發王還第一庭檢録陽夀及閱籍尚有若干年即命原攝卒引至原憩𣗳下一推而王乃在棺中跳躍而起妻子親隣既驚且喜叩問之備言其故有傳之至京師者差進士卨哲篤來鳯翔覆察果實時王元吉為本府照磨元吉能備言其詳且有抄録公文此一事然雖若幻誕端可為為將而嗜殺人之戒故畧節大槩如上釋怨結姻揚州泰興縣馬駝沙農夫司大者其里中富人陳氏之佃家也家貧不能出租以輸主乃將以所佃田轉質於他姓陳氏田傍有李慶四者亦業佃種潛賂主家兒約能奪田與我而不以與陳氏者以所酬錢十倍之一分之家兒素用事因以利㗖其主主聽奪田歸李氏司固無可奈何既以榖田不相侔輕其直十之一司愈不平㑹歸而李與嘗所用力及為立劵者殺雞飲酒司因隨所之李欲卻司輙先將一巵酒飲之司忿恨去對妻語所以與李怨仇之故妻苦口諫曰吾之窮命也柰何仇人哉不聽夜持炬火往燒其家忽聞得内有人娩司竊念吾所讐者其家公也何故殺其母子遂棄火溝中而歸司無以為養生計即所償錢為豆乳釀酒貨賣以給食乆之不復乏絶更自有餘而李日益貧更十年李復出所佃田質陳氏司還用李計復其田過種之錢比前又損其一為劵悉值前人相視驚嘆司記為李所辱時今幸可一報復遂具雞酒飲亦如之李忘前過不自責反怨薄已怒甚歸積膏火破盎中夜抵司家司妻方就蓐李猶豫間聞人啟户懼事覺遺火亟走而司家實不有人旦得火器塲中驗器底有李字因悟昔我焚彼家以其家人産子不欲焚今彼焚我家而我之妻亦産子而不被焚此天也非人也持錢五千往李曰昨日小人無狀失禮義不得共飲兹願少伸謝意幸毋督過李疑紿以疾卧不起強請不已遂同之酒家邀酤兒與飲酒半自起酌酒勸李曰子之孫某年月日夜子時生而吾子亦夜者子時生怨仇之事慎勿復為具白前所仇事瀝酒為誓語酤兒曰子識之試用此警世間人不善慎勿為也劇飲盡歡乃更約為婚姻自是李亦不貧兩家至今豐給此在至正初元間吾謂司氏婦之極諌與司氏之易慮時天固已監之所以李不復可加害也向使司氏决快所欲未必能復田縱復田未必其無禍一念之善從而兩家子孫皆蒙其利澤書曰天道福善禍淫又曰惟上帝不常作善降之百祥作不善降之百殃嗚呼天豈逺人哉天豈逺人哉杜荀鶴詩嘗讀杜荀鶴詩其亂後逢村叟曰經亂衰翁居破村村中何事不傷䰟因供寨木無桑柘為著鄉兵絶子孫還似平寧徴賦稅未嘗州縣畧安存至於雞犬皆星散日落前山獨倚門山中寡婦曰夫因兵死守蓬茅麻苧衣衫􅁂髪焦桑柘廢來猶納稅田園荒後尚徴苗時挑野菜和根煮旋斫生柴帶葉燒任爾深山更深處也應無計避征徭旅泊遇郡中亂曰握手相看誰敢言軍家刀劍在要邊徧搜寳貨無藏處亂殺平人不怕天古寺拆為修寨木荒墳掘作甃城磚郡侯逐去渾閒事正是鑾輿幸蜀年然方之今日始信其非寓言也太公今人謂曾祖父曰太公此葢相承之謬當稱祖父為是後漢李固之父郃為司空固女當固伏誅日曰太公以來云注太公謂祖父郃也剛介御史臺准陕西行臺咨監察御史烏克遜良禎呈狀聞綱常者天之所以經天下者也天子所以為天守綱常者也臣而不忠子而不孝凡觸罪於綱常者不容於死又烏可處以相位俾之重任乎謹按遼陽行省丞相達實特穆爾即駙馬丞相也心懷隂險行畜姦邪敗壊彛倫反側不道通天之罪無所於容昔在晉邸擢登首相居百僚之上極一品之榮受任託孤躬承頋命君臣分義至重且深及乎大事之時干戈之際盡領北土之兵以救顛危本官隂畜二心坐觀成敗南至紅橋逗遛不進致於敗亡不能死義靦面入降大􅃜臣節反以藉口矜為己功天下義士聞之莫不為恥昔丁公為項王一將耳嘗二心於漢及天下定髙帝誅之後世稱其明斷方楚之與漢敵國之勢未分尚以大義責之以示垂戒今達實特穆爾之於晉邸爵禄之寵己崇君臣之分素定較之丁公不忠之罪又有甚焉况天歴之初營充樞密知院御史已嘗紏言又復賄賂權臣出為江西行省丞相兩居江浙至與房隣拜降都運賄賂交通壊亂鹽法至今官民皆􅀍其害中間徇私敗政不可枚舉所至之處流毒一方今則移置遼陽遼陽民奚罪焉原其本官昔既不忠今豈盡節又兼遼陽即係東方重鎮反覆之人豈宜處此脫有邊釁闗繫非輕似此賣國賣臣之罪使其人已死猶當追貶今既未死得以幸逭天誅設居相位是國法不行邪正不辨愚恐姦臣賊子接迹倣傚甚非國家之福伏望聞奏為天下正綱常之義將達實特穆爾流竄遐荒追奪累受宣命庶幾人臣分嚴罪於綱常者死有餘辜以為不忠不道之勸其於治道不為小補天下幸甚公論幸甚至正元年八月十二日伯勒齊爾布哈集賽第一日呼嚕圖巴納裏有時分伊勒都齊汪嘉努殿中巴咱爾大夫額琳沁巴勒經歴桑節孟古古筆且齊托多等奏臺官備著西臺文書俺商量來行與省家文書將他見行的勾當黜罷了呵怎生奏呵奉聖㫖那般者欽此初良禎之父江東建康道肅政廉訪使潤甫公澤年五十未有子夫人杜氏深以為憂屢請公再聘公不允仕西廣時聞寡居王安人者美而宜子夫人自為公謀聘之既歸執婦禮甚恭長夫人數嵗夫人推讓正寢以居之相處雍睦宛若姊娣飲食起居罔有不同公獨内不自安越明年夫人生良禎一日王氏告公曰君自有婦所以再娶妾者為嗣續計耳今夫人既生子妾又何事焉即出道家冠服一襲以示曰妾之志决矣請從此辭夫人固留不得公因謂夫人曰向吾再娶懼無後也若不改圖人其以我為汰乎乃聽王氏去奩貲萬金悉返之自是出居一女道菴戒行嚴謹人未嘗能見其面而夫人嵗時問遺彌至後良禎貴顯迎以歸事之如親母嗟夫自古求忠臣於孝子之門今良禎外有嚴君内有賢母教誨造就之道有過人者宜乎在家為孝子而在朝為忠臣也然其敭歴臺省秉性剛介不畏彊禦事無不言言必有中如駙馬丞相恃居國戚莫敢孰何乃必發其底裏直使去位而後已推此一節則凡忠君之事𩔖可知矣後至中書左丞而卒發墓至元間釋氏豪横改宫觀為寺削道士為髠且各處陵墓發掘迨盡孤山林和靖處士墓屍骨皆空惟遺一玉簪時有人作詩以悼之曰生前不繫黄金帶身後空餘白玉簮輟耕録巻十三欽定四庫全書輟耕録卷
