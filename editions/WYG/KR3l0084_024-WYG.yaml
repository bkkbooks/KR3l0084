body:
  text: 輟耕録卷二十四元陶宗儀撰結交重氣義國初張公可與李公仲方鮮于公伯機同仕于朝既而張除浙省郎中李除都事鮮于除浙東宣慰經歴胥㑹於杭驩甚李卒於官張移書鮮于曰仲方殁矣家貧子㓜吾輩若不為之經紀則孤寡何所依也吾以一女許配其仲子矣公以為何如鮮于聞訃哀祭成禮亦以一女許贅其長子即從善也後官至紹興推官仲子字復初官至淮安總管於此可見前輩結交重義氣不以貴賤貧富易其心誠可敬也張公官至中書左丞帝廷神獸國朝毎宴諸王大臣謂之大聚㑹是日盡出諸獸於萬歳山若虎豹熊象之屬一一列置訖然後獅子至身才短小絶𩔖人家所畜金毛猱狗諸獸見之畏懼俯伏不敢仰視氣之相壓也如此及各飼以雞鴨野味之𩔖諸獸不免以爪按定用舌去其毛羽惟獅子則以掌擎而吹之毛羽紛然脫落有若燖洗者此其所以異於諸獸也古云獅子吼盖不易於吼一吼則百獸為之辟易也勾䦨壓至元壬寅夏松江府前勾欄隣居顧百一者一夕夢攝入城隍廟中同被攝者約四十餘人一皆責状畫字時有沈氏子以搏銀為業亦夢與顧同鬱鬱不樂家人無以紓之勸入勾欄觀排戯獨顧以宵夢匪貞不敢出門有女官奴習嘔唱毎聞勾欄鼓鳴則入是日入未幾棚屋拉然有聲衆驚散既而無恙復集焉不移時棚阽壓顧走入抱其女不謂女已出矣遂斃於顚木之下死者凡四十二人内有一僧人二道士獨歌兒天生秀全家不損一人其死者皆碎首折脇斷筋潰髓亦有被壓而幸免者見衣朱紫人指示其出不得出者亦曲為遮䕶云鵓鴿傳書顔清甫曲阜人顔子四十八代孫嘗卧病其㓜子偶彈得一鵓鴿歸以供膳於梢翎間得書一緘書上題云家書付男郭禹開拆禹乃曲阜縣尹郭仲賢也盖其父自真定寄至者時仲賢改授逺平縣尹去鴿未及知盤桓尋覔遂遇害清甫見之責其子便取木匣函鴿候病稍愈直抵仲賢官所獻書與鴿且語其故仲賢戚然曰畜此鴿已十七年矣凡有家書雖隔數千里亦能傳致誠異禽也命左右瘞之以清甫長厚君子留之累日商及子弟出處清甫告言長子國祥頗習儒業及仲賢知霍州召補州史貢山東廉訪奏差陞書吏後官至漢中廉訪使待士鄙吝嘉興林叔大鏞椽江浙行省時貪墨鄙吝然頗交接名流以沽美譽其於達官顯宦則刲羔殺豕品饌甚盛若士夫君子不過素湯餅而已一日延黄大癡作畫多士畢集而此品復出捫腹濶歩譏謔交作叔大赧甚不敢仰視遂揖潘子素求題其畫子素即書一絶句云阿翁作畫如說法信手拈來種種佳好水好山塗抹盡阿婆臉上不曾搽大癡笑謂曰好水好山言達官顯宦也阿婆臉不搽言素面也言未己子素復加一句云諸佛菩薩摩訶薩俱不解其意子素曰此謝語即僧家懴悔也閧堂大笑而散叔大數日羞出見客人之鄙吝一至於此亦可憐已陳公子陳雲嶠栢泗州人性豪宕結客其祖平章故宋制置即龍麟洲題琵琶亭以譏之者凡積金七屋不數年散盡嘗為侍儀舍人館閣諸老朝省名公莫不折輩行與交咸稱之曰公子其妻銕太保女也恃富貴近戚偶以一言驕之遂終身不見嘗被命監鑄祭器於杭無錫倪元鎮慕其名來見之張燕湖山間羅設甚至酒終為别以一帖饋米百石雲嶠命從者移置近所舉巨觥引妓樂騶從者而前悉分散之顧倪曰吾在京時即熟爾名云南士之清者它無與比其所以章章者盖以米沽之也請從今日絶交且罵諸嘗譽之者時張伯雨在坐不勝跼􅐲其豪氣𩔖如此嘗雪中騎牛拜米南宫墓詩云少年不解事買駿輕千金何如小黄犢踏雪空山深小小雙牧童吹笛穿松林醉拜南宫墓地下有知音言世上無知音也平日喜居錢唐好古有餘而治才不足又不樂小官怒罵宰相年逾六十不得志而死其畢命時作偈云前身本是泗州僧漢魏正閏霍治書云紫陽楊煥然先生讀通鑑至論漢魏正閏大不平之遂修漢書駁正其事因作詩云風煙慘淡駐三巴漢燼將燃蜀婦髽欲起温公問書法武侯入冦冦誰家後攻宋軍㢠廻始見通鑑綱目其書乃寢順徳劉道濟先生尤不平之修書名三為亦見綱目閟而不行中統改元陵川郝伯常先生使宋被留儀真埶不得還就買書作續漢史既脫藁㑹同僚茍正甫諸公飲至數行忽長嘆曰某辛苦十餘年莫不被高頭巾輩已做了也皆對云不聞之至元丁亥予分臺江西購得蕭常續漢書全部因喟然曰惜乎郝君不及見此剛夘剛夘者按許慎說文㱾音開改大剛昴以逐鬼也玉篇開改剛夘大印以辟鬼也廣韻㱾改大開堅也王莽傳服䖍注曰剛夘以正月夘日作佩之長三寸廣一寸四分或用玉或用金或用桃著佩之又注當中央從穿作孔以綵絲葺其底刻其上文曰正月剛夘既央靈殳四方赤青白黄四色是當帝令祝融以教䕫龍庶疫剛癉莫我敢當又曰疾日嚴夘帝令䕫化順爾固伏化兹靈殳既正既直既觚既方庶使剛癉莫我敢當凡六十六字㱾改者佩印也以正月夘日作故謂剛夘又謂之大堅以辟邪也金刀之利者皆不得行服䖍曰剛夘以正月夘日作佩之長三寸廣一寸四方或用金或用桃著革帶佩之今有玉在者銘其一面曰正月剛夘金刀莽所鑄之錢也晉灼曰剛夘長一寸廣五分四方當中央従穿作孔以綵絲葺其底如冠纓頭㽔刻其上面作兩行書文曰正月剛夘既央靈殳四方云云同前其一銘曰疾日嚴夘帝今䕫化順爾故一作固伏化兹靈殳云云同前師古曰今往往於土中得玉剛夘者按大小及文服說是也莽以劉字上有夘下有金旁又有刀故禁剛夘及金刀也博謀卿士僉曰天人同應昭然著明其去剛夘莫以為佩除刀錢勿以為利承順天心快百姓意乃更作小錢徑六分重一銖文曰小錢直一與大泉五十者為二品並行後漢輿服志佩雙印長寸二分方六分乘輿諸侯及王公列侯以白玉中二千石以下至四百石皆以黒犀三百石以至私學弟子皆以象牙上合絲乘輿以縢貫白珠赤罽㽔諸侯王以下以槂赤絲㽔縢槂各如其印質刻書曰正月剛夘既決云云同前慎爾周伏化兹靈殳云云同前凡六十六字前書注云正月剛夘作霍治書清甫云嘗於吳中得白玉剛嚴雙印四枚完具者二剛夘銘詞三十四字嚴夘銘詞三十二字其二字筆畫損缺剛夘無既央二字餘十字難辯嘗考王莽傳輿服志說文剛夘銘與說文及王莽傳同輿服志央為決嚴夘疾日為曰疑志誤又順爾故化伏與莾傳同說文作慎爾國化伏輿服志作填爾周化伏未詳孰是其服用制度逓相引據亦不同後見徐容齋叅政藏剛夘一梁貢父尚書蔵剛嚴二並係古玉體剛夘銘三十四字字畫亦損缺制度銘詞與前雙印大約不異續收嚴夘二一以玉為之一若琴瑟俗傳葛仙翁煉丹頭又名藥注子其文曰制曰嚴夘帝命莫忘日資唯是黒青白黄既正既直既觚既方庶使罔談莫我敢當與前嚴夘銘詞並差鮮于伯機經歴收一枚高彦敬尚書收二枚並真楷書皆似近代制作未見所出偶得金陵學宫所刻黄山谷先生辯剛夘遺蹟其說與前相同但云槂絲繩也音護古文無此字按五紐繩器也􅀢兎罟也豈紉絲繩與兎罟相𩔖故同此音耶又馬永鄉􅈸真子録云漢人以正月卯日作佩之銘其一面曰剛夘乃知今人立春或戴春勝亦古制也盖剛者強也夘者劉也正月佩之尊國姓也與陳湯所謂強漢者同義倜儻好義顧仲庸泰州人以財雄一鄉倜儻好義有古豪俠風自奉甚薄而禮賢養士無虚日名公鉅儒多館其家張蛻菴承㫖亦其人也仲庸與保定張文友交文友嵊縣尹秩滿僑居江隂一日暴卒時仲庸留京師友人以訃告戒勿泄友詢其故曰文友賢而貧在六品選人中吾將與其子為地即走告當路者曰張文友已疾病矣願致仕因代入状中書遂獲以奉政大夫嘉定知州致仕既領宣命數月又代文友之子告廕尋注常州晉陵縣尉便其養母也其家悉無所知仲庸南歸遣人致賻奠奉宣勑以授其子聞者驚嘆仲庸行事𩔖如此道士夀函㑹稽陽明洞天在秦望山後禹廟之西南云即古禹穴越之勝境也諸峯環聳盤鬱空曲中有東嶽行祠及老子宫余嘗宿留其間一老道士者朱顔鶴髪延至其室室横一空棺云已十餘年矣未能即棄浮世而入此匣也其後兵攻越城遊騎四出道士乃沭浴冠佩絶粒飲與衆永訣卧於其中七日不死軍至發棺挈之出兵退乃入城一病而卒向之棺不可得矣豈非分定歟餛飩方喬公仲山官吏部郎中好古博雅仍喜諧謔所交皆名人才士公家製餛飩得法常苦賔朋需索一日於毎客前先置一帖且戒云食畢展卷既而取視乃製造方法也大笑而散自後無復言矣精塑佛像劉元字秉元薊之寳坻人官至昭文館大學士正奉大夫祕書監卿元嘗為黄冠師事青州杞道録傳其藝非一而獨長于塑至元七年世祖建大護國仁王寺嚴設梵天佛像特求竒工為之有以元薦者及被召又從阿納噶木國公學西天梵相神思妙合遂為絶藝凡兩都名刹有塑土範金摶換為佛一出元之手天下無與比所謂摶換者漫帛土偶上而髹之已而去其土髹帛儼然像也昔人嘗為之至元尤妙摶丸又曰脫活京師語如此繆孝子繆孝子倫字叔彛東平人侍父宦遊寓居錢唐至正十六年淮兵冦城執其父將殺之倫哀號乞免弗聽傾家貲以贖又弗聽乃自縳請代於是殺倫而釋其父甚哉賊之不仁也趙孝子趙孝子天爵字伯廉平陽解州夏縣人嘗為吏多平反惇行孝弟治家甚嚴三子皆頎然玉立母喪廬墓三年父繼喪又如之惟蔬食菜羮不飲酒食肉不與妻妾見有司以聞于朝旌表其門閭復其身王義士王義士天爵字仁傑亦夏縣人家饒於財有善行以粟貸人不圖重息年豐僅取十之二三稍饑但收其本大凶則皆已之鄉里不知字咸稱義士云每值生身之辰寝苫一月以報父母木氷朝廷於歳首例遣使祭嶽瀆至正乙巳翰林應奉李國鳯代祀嵩恒醫無閭抵汴路閉即城中望祭嵩嶽時閏月下旬也二月十三日游相國寺池上羣僧方聚觀從之仰視日旁一月一星月如初弦者又十日雨木氷状如樓閣人物冠帶鳥獸卉木百態具備殆非人工高林大𣗳珠葆羽幢彌望不絶凡五日始解又十日復氷自汴至中灤皆然不一歳盗䧟汴據之龍湫獻靈額齊訥路在西北方有山曰蹇占山北多龍湫土人欲有所事則投之吉安道士劉學仙嘗至其地見有烹羔桐酪祠焉數皮而沈之祝曰神為我鞣而治之為期而去至期復祠之則得成革矣若有曰􅄦工然不可測也歸語於虞邵菴先生先生初以為誑及質諸其土人之在京師者則始信盖其人習以為常不以為異耳王一山杭州屬邑有一巨室怙財挾勢虐害良善邑官貪墨莫敢誰何衆不可堪走訴憲府巨室逃匿憲使怒督責有司示罪賞揭大逵且家至壁白𨼆蔵者罪連坐首捕者賞萬緡其友人王一山者世業儒居湖山第一樓幬彼於宻期月不發隣家察知圖給賞錢告報於官官搜索得之倂王逮繫囚見憲使使問云女知彼所犯乎王曰知之女聞國有制乎曰知之女見揭示罪賞乎曰見之女奚不就利避害乎曰朋友顛連來奔乘其危以售之則名教中有所不容某誠弗忍為事覺連坐乃甘心焉使竦然曰君子所謂臨難毋茍免其人踐之矣真義士也若加以罪是吾政苛而刑濫民何以勸遂釋之使即許文正公子也誤墮龍窟徐彦璋云商人某海舶失風飄至山島匍匐登岸深夜昏黑偶墜入一穴其穴險峻不可攀縁比明穴中微有光見大蛇無數蟠結在内始甚懼乆稍與之狎蛇亦無吞噬意所苦飢渴不可當但見蛇時時䑛石壁間小石絶不飲㗖於是商人亦漫爾取小石噙之頓忘饑渴一日聞雷聲𨼆𨼆蛇始伸展相繼騰升纔知其為神龍遂挽蛇尾得出附舟還家攜所噙小石數十至京城示識者皆鴉鶻等寳石也乃信神龍之窟多異珍焉自此貨之致富彦璋親見商人道其始末如此雞司晨有凖嘗至松江鍾山浄行菴見籠一雄雞置於殿之東簷請問其故寺僧云蓄此以司晨盖十有餘年矣時刻不爽余竊記張公文潛明道雜志云雞能司晨見於經傳以為至論而未必然也或天寒雞􅈸至將旦而未鳴或夜月出時隣雞悉鳴大抵有情之物自不能有常而或變也若然則張公之言非歟因舉似以詢其所以僧云司晨之雞必以童若壞其天真豈能有常哉盖張公特未知此理故耳黄道婆閩廣多種木棉紡績為布名曰吉貝松江府東去五十里許曰烏泥涇其地土田磽瘠民食不給因謀𣗳藝以資生業遂覔種於彼初無踏車椎􅃓之製率用手剖去子線弦竹弧置按間振掉成劑厥功甚艱國初時有一嫗名黄道婆者自崖州來乃教以做造捍彈紡織之具至於錯紗配色綜綫挈花各有其法以故織成被褥帶帨其上折枝團鳳棋局字様粲然若寫人既受教競相作為轉貨他郡家既就殷未幾嫗卒莫不感恩灑泣而共葬之又為立祠歳時享之越三十年祠毁鄉人趙愚軒重立今祠復毁無人為之創建道婆之名日漸泯滅無聞矣天隕魚至正丙午八月辛酉上海縣浦東俞店橋南牧羊兒三四聞頭上恰恰有聲仰視之流光中隕一魚剌麻佳上成二創其状不常見自首至尾根僅盈尺似濶覇而短是日晴無隂雲亦無鵰鸛之𩔖是可怪也日昳時縣市人閧然指流星自南投北即此時也橋下一細家取欲烹食其妻鹽而藏之來者多就觀焉或者曰志有云天隕魚人民失所之象十二生子至元丁丑民間謠言拘刷童男女以故㛰嫁不問長㓜而亂倫者多矣平江蘇達卿時為上海吏有女年十二贅里人浦仲明之子為壻明年生一子劉節婦劉節婦泰州坂埨人至正丙申春隨父渡江居吳門適張士誠部將曹某方數月夫陣亡劉不避凶險躬至死所求得其屍歸葬欲以身殉父不許既而權貴人聞劉美且賢爭欲強委禽焉劉誓死不貳遂削髪為比丘尼夫劉本一閭閻女子其操行乃爾盖有貴為后妃而莫之及者謂非天性也歟歴代醫師三皇僦貸季天師岐伯鬼臾區少師少俞伯高桐君太乙雷公馬師皇五帝巫咸伊尹周巫彭矯氏俞氏盧氏醫緩醫竘文摯醫和范蠡鳯綱秦長桑君李豹神應王扁鵲子陽安期先生太醫令李􅀈崔文子西漢樓䕶元里公楊慶公孫光秦信太倉公淳于意王遂宋邑馮信高期王禺唐安杜信俗東漢張機仲景郭玉程高涪翁沈建張伯祖杜度魏沉淮南子蜀漢李譔唐慎微韓保昇孟昶魏華佗李當吳普青牛道士封君達樊阿韓康吳吕博負局先生董奉西晉王叔和李子豫仰道士殷仲堪李法存皇甫謐𤣥晏先生張苗裴頠裴顗劉徳史脫宫泰靳邵張華蔡謨趙泉阮徳東晉葛洪抱朴子范汪程據南宋少主元微王纂胡洽徐熙秋夫徐道度秋夫長子徐叔嚮道度弟薛伯宗徐仲融徐文伯徐嗣伯僧深劉涓子羊晰秦承祖南齊張子信馬嗣明張逺遊北齊顧歡李元忠李宻崔季舒祖挺禇澄鄧宣文顔光禄龍𣗳王菩薩徐之才徐林卿之才長子徐同卿林卿弟梁貞白先生蘇恭陶𢎞景後魏王顯徐謇徐雄謇長子後周徐之範杜善方隋徐敏齋許智蔵巢元方楊善唐金元起真人孫思邈許𦙍宗宋俠藥王韋慈蔵甄權甄立言王氷啓𤣥子張文仲孟詵蘭陵處士蕭炳李䖍縱楊𤣥操𤣥珠先生楊損之王方慶秦鳴鶴許孝宗陳士良李含光張鼎陳蔵器五代日華子宋趙從古謝復古劉温舒朱肱無求子孫用和紀天錫劉元賔通真子翟煦宋道方許叔微王從藴吳復圭張泂曹孝忠林億秦宗古丁徳用賈祐蘇頌朱有章劉禹錫初虞世道士馬志寵安時孫兆王惟一王光祐蔣淮安自良張素陳遇明劉翰金成無已何公務劉守真侯徳和張子和馬守素楊從政李道源張元素㓗古老人𡊮景安輟耕録卷二十四
