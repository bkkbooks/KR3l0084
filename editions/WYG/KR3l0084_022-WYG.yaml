body:
  text: 輟耕録􅃃二十二元陶宗儀撰聖門弟子孔門弟子姓字見諸家語論語史記等書金華張君孟兼稽考異同集為章句以便記誦即古急就之義也其文曰繄昔聖門弟子三千身通六藝七十二人徳行著稱顔回子淵冉耕伯牛閔損子騫及冉雍仲􅃓為四科之先宰予子我並魯人端木賜子貢衛人言語是稱賜言多中乃多才藝仲由季路陳人冉求子有魯人政事並著言偃子游吳人卜商子夏衛人文學著名孰可方駕曾參子輿純孝全歸父㸃子晳浴沂舞雩囘父無繇並魯人仲由同字有公晳哀齊人字以季次縣成子祺左郢子行並魯人樂欬亡顔噲同字子聲其字子羽澹臺滅明並魯人子之是字公祖句兹亡其有秦非亦字子之孔忠子蔑叔仲會子期乃子旗字者粤巫馬施顔之㒒子叔申棖子續商瞿子木並魯人蘧瑗伯玉衛人有若子有公伯寮子周並魯人其申黨一作續者止字曰周亡司馬犂耕宋人乃字子牛顓孫師子張陳人公冶長子長齊人一字子禽其陳亢子亢陳人名而不字唯句井疆高柴子羔並衛人公肩定子中亡有南宮适子容魯人薛邦子從亡公西箴魯人及公西輿如亡字子上同穰駟赤子徒秦人子潔子庸衛人漆雕開魯人琴牢子開字同宓不齊子賤並衞人步叔乘子車齊人其漆雕哆邽巽子歛字俱並魯人粤梁鱣者其字叔魚齊人秦祖子南秦人燕伋亡樊湏子遲齊人亦有后處字以里之亡原憲魯人同字子思鄭國榮旂字子徒子祺伯䖍子柝公首夏子乘施之常子恒並亡公良孺子正陳人冉孺子魯冉季子産字子栁者顔幸並魯人字子象者縣亶石作蜀子明並亡公孫龍子石楚人商澤子季奚谷箴子晳之罕父黒子索其原亢籍仍字子籍並亡字子丕字子丕者曰惟秦商楚人秦冉字開顔祖字襄並亡任不齊子選楚人曹䘏子循漆雕徒父字曰子文顔高一作刻子驕鄡單子家並亡顔何字冉公西赤子華並魯人猗與多賢升堂入室慨舉世之所傳名固踰乎七十乃稽紀載尚遺其實家語史遷所録不一嗟嗟小子何敢忘逸爰重列以自識俾䝉士之易述其不銓次豈縁聲律不韙之辠莫敢自䘏尚同好事之君子幸有以釘愚之失顔無繇音遙音由縣音𤣥成公祖句音鈞兹句音勾井疆宓音宻當作伏不齊邽音圭巽鄡音梟單音善漆雕哆音侈潘昻霄志曰延祐乙夘春聖天子以四海萬國之廣軫念庶民艱虞罔控告也分使詣外郡諸道布揚徳心戚休興替之清洿揚激之畿甸宻邇獨不得均其澤越五月詔前翰林學士承㫖臣庫庫楚翰林侍讀臣昻霄奉使宣撫京畿西道臣昻霄承命驚悸㒺措唯務罄竭忠赤盡恤民瘼後已闊公一日語昻霄余嘗從余兄榮禄公都實抵西國窮河源耳之不覺瞿然以駭有是乎哉請畢其語公曰世祖皇帝至元十七年歳在庚辰欽承聖諭黄河之入中國夏后氏導之知自積石矣漢唐所不能悉其源今為吾地朕欲極其源之所出營一城俾畨賈互市規置航傳凡物貢水行達京師古無有也朕為之以永後來無窮利益盖難其人都實汝舊人且習諸國語往圖汝諧授招討使佩金虎符以行是歳四月至河州州東六十里有寧河驛驛西南五六十里山曰殺馬闗林麓穹隘譯言塔斯達巴啓足寖高一日程至巔西邁愈高四閱月約四五千里始抵河源冬還圖城傳位置以聞上悅往營之授土蕃等處都元帥仍金虎符置寮寀督工工師悉資内地造航為艘六十城傳措工物完庫庫楚驛聞適僧格征恭噶蔵布爾力沮遂止翼歳兄都實旋都河源在土蕃朶甘斯西鄙有泉百餘泓或泉或潦水沮洳散渙方可七八十里且泥淖溺不勝人跡逼觀弗克旁履高山下眎燦若列星以故名鄂端諾爾鄂端譯言星宿也羣流奔湊近五七里匯二巨澤名鄂楞諾爾自西徂東連屬吞噬廣輪馬行一日程迤邐東騖成川號齊必勒河二三日程水西南來名伊爾齊與齊必勒河合三四日程南來名呼蘭又水東南來名伊拉齊合流入齊必勒其流寖大始名黄河然水清人可渉又一二日岐裂八九股名伊遜鄂羅木譯言九度通廣六七里馬亦可度又四五日程水渾濁土人抱革囊乘馬過之民聚落紏木幹象舟傅毛革以濟僅容兩人繼是兩山峽東廣可一里二里或半里深叵測矣朶甘斯東北鄙有大雪山名伊拉瑪博囉其山最高譯言騰格哩哈達即崑崙也山腹至頂皆雪冬夏不消土人言逺年成氷時六月見之自八九股水至崑崙行二十日程河行崑崙南半日程地又四五日程至地名庫濟克特二地相屬又三日程地名哈喇伯勒齊爾四達之衝也多冦盗有官兵鎮防崑崙迤西人簡少多處山南山皆不穹峻水亦散漫獸有髦牛野馬狼狍羱羊之𩔖其東山益高地亦漸下岸狹隘有狐可一躍越之者行五六日程有水西南來名納琳哈喇譯言細黄河也又兩日程水南來名竒爾穆蘓二水合流入河河北行轉西至崑崙北二日程地水過之北流少東又北流約行半月程至貴徳州地名必齊勒始有州事官府州隸河州置司土蕃等處宣慰司所轄又四五日程至積石州即禹貢積石五日程至河州安鄉闗一日程至打羅坑東北行一日程洮河水南來入河又一日程至蘭州其下過北卜渡至鳴沙州過應吉里州正東行至寧夏府南東行即東勝州隸西京大同路地面自發源至漢地南北澗溪細流傍貫莫知紀極山皆草山石山至積石方林木暢茂世言河九折彼地有二折盖竒爾穆蘓及貴徳州必齊勒也漢張騫使絶域覊聨拘執艱厄百罹歴大宛月氐等數國其傍大國五六皆稱傳聞以為窮河源烏能覩所謂河源哉史稱河有兩源一出于闐一出葱嶺于闐水北行出蔥嶺河注蒲𩔖海不流洑至臨洮出焉今洮水自南來非蒲𩔖明矣詢之土人言于闐葱嶺水其下流散之沙磧又有言河與天河通尋源得織女支機石以歸亦妄也崑崙至嵩高五萬里閬風元圃積瑤華盖仙人所居又何耶唐史土蕃傳河上流由河洪濟梁南二千里水益狹春可渉秋夏乃勝舟其南三百里三山中高而四下曰紫山古所謂崑崙其言頗𩔖然止稱河源其間云國家敞天威亘天所覆燾無間海内外冠帶萬國罔非臣妾視漢唐為不足訝故窮河源去萬里若歩閨闥嘻盛典也不可不志因志之都實族女真富察氏統烏思藏路暨招討都元帥凡三至吐蕃庫庫楚今除甘肅行省參知政事是歳八月初吉翰林侍讀學士中奉大夫知制誥同修國史臣潘昻霄謹述柯九思序云河源有志自本朝始前乎此曷為未有志河源者道路遼阻所傳聞異辭莫能䆒河之源也山經曰敦薨之水西流注於泑澤出於崑崙之東北陬實惟河源而水經載河出崑崙經十餘國乃至泑澤山經又稱陽紆之山河出其中凌門之山河出其中穆天子傳亦云陽紆之山河曰馮夷所居是惟河宗氏釋氏西域志稱阿耨達大山上有大淵水即崑崙山也地里志亦稱崑崙山在臨羌西而漢書載河出兩源或稱有或稱無而河源所著異同况世殊代易名地亦異終莫能有究之者我太祖皇帝二十有一年春正月征西夏夏取甘肅等城秋取西凉府遂過沙陀至黄河九渡按崑崙當九渡下流則崑崙固已歸我職方氏矣憲宗皇帝二年命皇太弟實喇帥諸部軍征西域凡六年闢封疆四萬里於是河源及所注枝出者盡在封域之内當時在行有能記其說皆得於目擊非放也逮世祖皇帝功成治定天下殷富遂命臣都實置郡河源故翰林侍讀學士潘公得究其詳實搜源析𣲖而作斯志乃知更崑崙行一月始窮河源於戯當四海混一之盛聞廣見覈致數千載莫能究者俾後世有考而傳信焉豈斯文之光實邦家無疆之休也公之子詡能不墜其先業増光而潤色之至順間以同知嘉定州事來吳將刋是書行於世屬九思叙其說于篇端元統元年冬十有一月日南至奎章閣學士院鍳書博士文林郎柯九思序皇太子署牒國朝政事正六品以下官中書奉勑署牒以命之牒具中書官位最尊者令也署牒者自丞相以下而不敢以煩令惟皇太子立必兼中書令樞宻使皇太子既受冊即中書上日獨署一牒明日省臣以其名聞天子即以宣命超拜五品官其人自非素親近有譽望取於羣臣者不得也禽戲余在杭州日嘗見一弄百禽者蓄龜七枚大小凡七等置龜几上擊鼓以使之則第一等大者先至几心伏定第二等者從而登其背直至第七等小者登第六等之背乃竪身直伸其尾向上宛如小塔状謂之烏龜疊塔又見蓄蝦䗫九枚先置一小墩於席中其􅇰大者乃踞坐之餘八小者左右對列大者作一聲衆亦作一聲大者作數聲衆亦作數聲既而小者一一至大者前㸃首作聲如作禮状而退謂之蝦蟆說法至松江見一全真道士寓太古菴一日取二鰍魚一黄色一黒色小大相侔者用藥塗利刃各斷其腰互換接綴首尾異色投放水内浮游如故郡人衛立中以盆池養之經半月方死疊塔說法固教習之功但其質性蠢蠢非他禽鳥可比誠難矣哉若夫斷而復續死而復生藥歟法歟是未可知也但劇戱中似此者果亦罕見哉虎禍大徳間荆南境内有九人山行值雨避於路傍舊土洞中忽有一虎來踞洞口哮咆怒視目光射人内一人素愚八人者宻議虎若不得人惡得去因紿愚者先出我輩共掩殺之愚者意未決遂各解一衣縳作人形擲而出之虎愈怒八人倂力排愚者於外虎即銜置洞口怒視如前湏臾土洞壓塌八人皆死愚者獲生夫當顛沛患難之際乃欲以八人之智而䧟一人之愚其用心亦險矣天道果夢夢耶河南婦死河南婦世為河南民家天兵下江南婦被虜姑與夫行求數年得之湖南婦已妻千戸某饒於財情好甚洽視夫姑若塗人㑹有㫖凡婦人被虜許銀贖敢匿者死某懼罪亟遣婦婦堅不行夫姑留以俟婦閉其室弗與通遂號慟頓絶而去行未百歩青天無雲而雷回視婦已震死錢唐白湛囦先生記以詩曰從軍古云樂獲罪禱應難母望明珠復夫求破鏡完押衙逢義士公主奉春官為報河南婦天刑不可干玊堂嫁妓姚文公燧為翰林學士承㫖日玉堂設宴歌妓羅列中有一人秀麗閒雅微操閩音公使來前問其履歴初不以實對叩之再泣而訴曰妾乃建寧人氏真西山之後也父官朔方時禄薄不足以給侵貸公帑無償遂賣入娼家流落至此公命之坐仍遣使詣丞相三寳努請為落籍丞相素敬公意公欲以侍巾櫛即令教坊檢籍除之公得報語一小吏黄㻖後顯官者曰我以此女為汝妻女即以我為父也吏忻然從命京師之人相傳以為盛事云嘉興貝闕嘗有詩曰斷絲棄道邊何日縁長松墮羽别炎洲不復巢梧桐昔在至元日六合車書同玉堂盛文士燕集來雍雍金刀手割鮮酒給葡萄濃坐有一枝春秀色不可雙叶娉婷劉碧玉綽約商玲瓏寳釧金雀釵已覺燕趙空或聞操南音未解歌北風上客驚且疑姓氏初未通問之慚復泣乃起陳始終妾本建寧女逺出西山翁父母生妾時謂是金母童梨花鎻院落燕子窺簾櫳迢迢官朔方位卑食不充侵貸國有刑桎梏加父躬粥女以自贖白璧淪泥中秋娘教歌舞屢入明光宫永為娼家婦遂屬梨園工京華多少年門外嘶青驄不如孟光醜猶得嫁梁鴻自傷妾薄命失落似秋􅅫客聞為三歎天道何懵懵遣使白宰相削籍歸舊宗小史十八九勿恨相如窮配爾執箕箒今夕看乘龍鴛鴦並玉𣗳鸚鵡開金籠棄汝桃花扇紅牙不復從提瓮自汲水絺綌自御冬時多困轗軻事或忻遭逢安知百尺井忽登羣玉峯借問為者誰内相姚文公數䜟至元甲子阿哈瑪特拜中書平章領制國用使司時樂府中盛唱胡十八小令知䜟緯者謂其當擅重權十八年人未之信果於至元壬午伏誅越五年丁亥閏二月僧格拜中書平章立尚書省貪暴殘忍又十倍於阿哈瑪特人亦謂桑字拆而為四十八桑字後改作相字亦拆為四十八竟不知應之於夀或應之於職然自立省之日至辛夘正月敗績恰四十八月其神驗如是案僧格原文作桑哥故當時附㑹如此戎顯再生大徳戊戍二月二十日張漢臣尚書趙松雪學士費北山漕侯同在杭州泛舟過西湖至毛家步上岸乘肩輿將遊水樂洞行里餘逢一尼寺趙公偕二公入寺訪親俄而從人來報張公之老㒒戎顯卒死矣亟回至其所呼救不省氣絶身僵忽有二道士過一老一㓜云不妨事老者即於死人面上吹呵㓜者就籬落間摘一青葉度於老者若作法書符状置死人頂上隨即再生頃間失二道士所在或云恐是洞賔變現隐括其姓如此耳算命得子檇李郭宗夏嘗見建徳路總管趙良臣言都下有李總管者官三品家巨富年逾五十而無子聞樞宻院東有術者設肆算命談人休咎多竒中試往叩焉且語之曰吾之禄夀已不必言但推有子與否術者笑曰君有子矣何為紿我李曰吾實無子豈紿汝耶術者怒曰君年四十當有子今年五十六矣非紿我而何同坐者皆軍官見二人争執甚訝之李沉吟良乆曰吾年四十時一婢有娠吾以職事赴上都比歸則吾妻粥之矣莫知所徃若有子則此是也術者曰此子終當還君相别而出時坐中一千户邀李入茶坊告之曰十五年前吾亦無子因到都置一婢則已有孕到家時適吾妻亦有孕前後一兩月間各生一男今皆十五六矣豈君之子也兩人各言婦人之容貎嵗齒相同李歸語於妻妻往日誠悍妬至是見夫無嗣心頗慚而憐之翼日邀千户至家享以盛饌與之刻期而别千户先歸南陽府李以實告於所管近侍大官乞假前往大官曰此美事也我當與汝奏聞既而有㫖得給驛以行凡筵席之費皆從官辦李至衆官郊迎徃千户宅設大宴李所以餽獻千户并其妻子㒒妾之物甚侈千户命二子出拜風度不殊衣冠如一莫知何者為己子致請於千户千户曰君自認之李諦視良乆天性感通前抱一人曰此吾子也千户曰然於是父子相持而哭坐中皆為墮淚舉盃交賀大醉而罷明日千户荅禮㑹客如昨謂李曰吾既與君子矣豈可使母子分離今幷其母以奉李喜出望外回都攜見大官大官曰佳兒也引之入覲通籍宿衛後亦官至三品大抵人之有子無子數使之然非人力所能也而術士之業亦精矣夫婦入道王氏守素錢唐民家女其夫丁棄家為全真道士於吳山之紫陽菴一日召守素入山自付四句云􅈸散六十三妙用無人識逆順兩俱忘虚空鎮常寂坐抱一膝而逝方外者流謂之騎鶴化守素遂亦束髪簮冠着道士服奉夫遺屍二十年迹不下山年逾七十幾於得道者神仙渺茫故未暇論貞守一節乃可尚也丁夘進士薩都刺天錫贈之詩曰不見遼東丁令威舊遊城郭昔人非鏡中春去青鸞老華表山空白鶴歸石竹淚乾斑雨在玉簫聲斷綵雲飛洞門花落無人迹獨坐蒼苔𥙷道衣項節婦燕山項氏其夫江南人行賈燕薊間聘項與居未幾夫死項時年二十奉柩回江南誓以夫餘貲養姑以自終比至姑已改適勵志孑居以守夫祀旴江李宗烈閔其事而賦之詩曰少無依倚老何堪白髪婆娑亂不簮夢裏尚思江北好悔將夫骨葬江南西域竒術任子昭云向寓都下時隣家兒患頭疼不可忍有回回醫官用刀割開額上取一小蟹堅硬如石尚能活動頃焉方死疼亦遄止當求得蟹至今蔵之夏雪簑云嘗於平江閶門見過客馬腹膨脹倒地店中偶有老回回見之於左腿内割取小塊出不知何物也其馬隨即騎而去信西域多竒術哉童子屬對湖廣行省平章歸自雨中有一童子年七八歳直造傘下避雨平章問曰學生能屬對否曰能平章曰青衿來避雨即應聲曰紫綬去朝天平章喜引至家遺以果肴明日除書至拜中書平章之命復大喜再以楮幣綵繒贈之先輩風致龍麟州先生過福建憲府設宴命宫妓小玉帶佐觴酒半憲使舉盃請曰今日之歡皆玉帶為也願先生酬之以詩先生其毋辭時先生負海内重名雅畏清議又不能違憲使之請遂書一絶句云菡蓞池邊風滿衣木樨亭下雨霏霏老夫記得坡仙語病體難禁玉帶圍於是舉席稱嘆盡歡而散盖前輩既不肯拂人意又不欲失所守而且用事清切一時風致可想見信非野儒俗士所能及也司馬善諫御史大夫額森特穆爾與夫人不睦已數年矣翰林學士承㫖阿穆恰巴拉死大夫遣司馬明埓往唁之及歸問其所以明埓云承㫖帶罟罟娘子十有五人皆務爭奪家財全無哀戚之情惟正室坐守靈幃哭泣不已大夫黙然是夜遂與夫人同寢歡愛如初若司馬者可謂善於寓諌者矣俞竹心術士俞竹心者居慶元嗜酒落魄與人寡合順其意者即與推算醉筆如飛畧不構思頃刻千餘言道已往之事極驗時皆以為異人至元己夘間婁敬之為本路治中嘗以休咎叩之荅曰公他日直至一品便休婁深信其說棄職别進適值壬午更化俯就省掾陞除益都府判改換押字再宛然真書一品二字未幾卒於官所此偶然耶抑數使然耶犬脇生子元貞丙申秋大都南城武仲祥家有乳犬懷胎在脇下忽腫成瘡六七日後於瘡生五子色皆青蒼每當􅆃梁自頂至尾生逆毛一道他無所異又數日瘡亦平復輟耕録卷二十二
