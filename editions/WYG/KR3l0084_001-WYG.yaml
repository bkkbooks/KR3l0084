front:
  text: 列聖授受正統始祖諱勃端察爾烈祖神元皇帝諱伊蘇克依姓却特氏太祖應天啓運聖武皇帝諱特穆津國語曰青吉斯
  hash: sha256:eef20b7e3261dd8cb83c9ea81756b4ebb5198f529b7a0bcb87cfeb36ae50ab4d
body:
  text: 宋開禧二年丙寅十二月即位於鄂諾河自號為汗至宋寳慶三年丁亥七月己丑崩於薩里川在位二十二年夀六十六葬起輦谷太宗英文皇帝諱諤格徳依宋紹定二年己丑八月己未即位於固爾班蘇巴克至宋淳祐元年辛丑十一月崩於呼蘭山在位一十三年壽五十六𦵏起輦谷六皇后塔納竒納臨朝稱制皇后鼐瑪錦氏睿宗仁聖景襄皇帝諱托壘憲宗追諡定宗簡平皇帝諱庫裕克宋淳祐二年壬寅至乙巳皇后當國丙午七月歸政即位於達蘭達巴至戊申三月崩於和碩瑪勒昻吉爾在位三年夀四十三𦵏起輦谷皇太后塔納竒納復治國事憲宗桓肅皇帝諱孟克宋淳祐十一年辛亥六月即位於奎騰敖拉至宋開慶元年己未七月二十七日癸亥崩於釣魚山在位九年壽五十世祖聖德神功文武皇帝諱呼必賚國語曰色辰宋景定元年庚申四月一日戊辰即位於開平建元中統至至元三十一年甲午正月十九日庚午崩於紫檀殿在位三十五年壽八十𦵏起輦谷中統四至元三十一裕宗文恵明孝皇帝諱珍戩成宗追諡順宗昭聖衍孝皇帝諱達爾瑪巴拉武宗追謚成宗欽明廣孝皇帝諱特穆爾國語曰諤勒哲圖至元三十一年甲午四月十四日甲午即位於上都改至元三十二為元貞至大德十一年丁未正月八日癸酉崩於玉徳殿在位十三年壽四十二𦵏起輦谷元貞二大德十一武宗仁惠宣孝皇帝諱哈尚國語曰庫魯克大德十一年丁未五月十一日甲戌即位於上都十二月詔改大徳十二為至大至四年辛亥正月八日庚辰崩於玉徳殿在位四年夀三十一葬起輦谷至大四仁宗聖文欽孝皇帝諱阿裕爾巴哩巴特喇國語曰布延圖至大四年辛亥三月十八日庚寅即位於大明殿九月壬子詔改至大五為皇慶至延祐七年庚申正月二十一日辛丑崩於光天宫在位九年夀三十六𦵏起輦谷皇慶二延祐七英宗睿聖文孝皇帝諱碩迪巴拉國語曰格根延祐七年庚申三月十一日庚寅即位十二月乙巳詔改延祐八為至治至三年癸亥八月四日癸亥遇弑崩於上都途中南坡行幄在位四年夀二十一從𦵏諸帝陵至治三顯宗光聖仁孝皇帝諱噶瑪拉泰定追諡今出廟泰定皇帝諱伊蘇特穆爾元封晉王至治三年癸亥九月四日癸巳即位於上都龍居河十二月丁亥詔改至治四為泰定至五年戊辰二月庚申改致和七月十日庚午崩文宗追廢在位五年夀二十六泰定四泰定五改致和文宗即改天厯明宗翼獻景孝皇帝諱和實拉國語曰胡土克圖天厯二年己巳正月二十八日丙戌即位於和寧北八月二日大駕次翁郭察圖六日暴崩不改元在位八月夀三十𦵏起輦谷文宗聖明元孝皇帝諱圖卜特穆爾國語曰濟雅圖致和元年戊辰九月十三日壬申即位於大明殿改元天厯詔讓大兄明宗明年己巳五月帝發京師北迎八月二日丙戌遇於呼察圖庚寅明宗暴崩己亥復即位於上都至三年庚午五月戊午改至順至三年壬申八月十二日己酉崩在位五年夀二十九𦵏起輦谷後至元六年庚辰六月丙申以帝謀不軌使明宗飲恨而崩詔撤其廟主天厯二至順三寧宗冲聖嗣孝皇帝諱伊埒哲伯至順三年壬申十月四日庚子即位於大明殿至十一月十六日壬午崩不改元年七嵗葬起輦谷今上皇帝御名托歡特穆爾至順四年癸酉六月八日己巳即位於上都十月戊辰改元元統至三年乙亥十一月辛丑改至元至七年正月一日改至正元統二至元六至正今二十六年氏族蒙古七十二種阿爾拉扎拉爾岱庫克新莽固岱翁吉喇特鴻和岱雲吉喇實烏爾固果爾羅斯必嚕岱齊哩克岱圖卜岱巴哩勒呼竒哩婁伊埒齊勤扎拉濟蘭圖嚕卜岱塔塔爾哈塔錦薩里岱濟雅岱婁珠克岱雅克布哈岱塔拉爾約蘇沙卜珠岱黙勒吉岱阿爾德哷濟達鄂勒對拜達勒岱瑪勒岱伊克穆爾哈喇納延濟達阿爾德哷濟達伊奇爾岱和塔濟達摩哩齊諤爾古岱鄂摩克岱阿喇勒岱巴約特丹濟岱衛喇特黙爾吉濟特碩岱台鴻和岱伯蘇岱雅克布色岱穆爾温塔岱莽固岱塔塔爾岱納延濟達阿爾徳哷濟達忽神塔尼勒烏嚕克岱沙卜珠岱黙勒吉阿古拉里達扎瑪勒岱烏嚕勒岱布德吉鼐滿岱塔塔爾岱伊克埒哈喇昻吉岱卓囉岱蒙固岱鄂摩克岱圖魯卜岱巴琳徹爾濟達巴爾固岱哈達岱衛喇特色目三十一種哈喇婁欽察唐古阿克蘇圖巴喀喇科爾羅拉察岱奇徹勒岱輝和爾回回鼐滿岱阿勒呼木和羅岱和爾拉薩拉噶土伯特永和爾岱密持斯巴勒哩科爾羅丹珪齊實喇婁圖爾哈哈喇濟達岱卓爾齊岱圖魯卜岱和爾拉噶瑪拉齊徳徳哩克實宻爾漢人八種契丹髙麗女直準台珠爾噶岱哲衮卓沁台渤海女直同金人姓氏完顔漢姓曰王烏庫哩曰商赫舍哩曰髙圖克坦曰杜紐祜禄曰郎烏雅曰朱富察曰李延扎曰張温特赫曰温舒穆嚕曰蕭鄂屯曰曹富珠哩曰魯伊喇曰劉沃哷曰石納喇曰康𤓰爾佳曰仝費摩曰麻尼瑪哈曰魚威準曰趙阿克展曰雷阿里罕曰何温都曰空烏嚕曰惠穆延曰孟都哷曰強薩塔曰駱阿布哈曰田烏凌阿曰蔡布薩曰林珠格曰董果爾嘉曰汪平江南至元十一年甲戌宋之咸淳十年也秋七月世祖命中書右丞相巴延總制大軍取宋諭之若曰朕聞曹彬不嗜殺人一舉而定江南汝其體朕心法彬事毋使吾赤子横罹鋒刃巴延叩首奉命惟謹既而混一職方豈非不嗜殺人之驗與獨松闗明年乙亥春諸郡望風降敗丞相巴延遣員外郎石天麟詣闕奏聞世皇喜顧謂侍臣曰朕兵已到江南宋之君臣必知畏恐兹若遣使議和邀索嵗幣想無不從者遂勅巴延按兵乃命禮部尚書亷希賢侍郎嚴忠範計議官宋德秀祕書丞柴紫芝等齎奉國書使宋次建康希賢等借兵衛送巴延曰方今兩軍相阨互有設險宜令行人先往道意若便擁兵前進吾恐别生罅隙則和議之事必難成矣希賢等堅請乃簡閲鋭卒五百畀之至獨松闗戍闗者宋浙西安撫司參議官張濡也以為北兵叩闗率衆掩擊殺忠範執希賢希賢亦病創死世皇聞之大怒趣進攻嗟夫宋之亡也非有桀紂之惡特以始之以拘留使者肇天兵之興終之以誤殺使者激世皇之怒耳藉使獨松之使不死宋之存亡未可知其亦有數也與浙江潮明年正月甲申丞相巴延駐軍臯亭山宋奉表及國璽以降遣千户囊嘉特等入城慰諭令居民門首各貼好投拜三字及聞益王廣王如婺州即命分兵屯守諸門范文虎安營浙江沙滸太皇太后望祝曰海若有靈當使波濤大作一洗而空之潮汐三日不至軍馬宴然文虎吕文煥壻安慶守臣降於我者宋興亡宋之興始於後周恭帝顯徳七年恭帝方八歲及其亡也終於少帝徳祐元年少帝時四歲名顯而顯徳二字竟與得國時合周以主幼而失國宋亦以主幼而失國周有太后在上宋亦有太后在上始終興亡之數昭然如此萬歲山萬歲山在大内西北太液池之陽金人名瓊花島中統三年修繕之其山皆以玲瓏石疊壘峰巒𨼆暎松檜隆鬱秀若天成引金水河至其後轉機運􅆽汲水至山頂出石龍口注方池伏流至仁智殿後有石刻蟠龍昂首噴水仰出然後東西流入於太液池山上有廣寒殿七間仁智殿則在山半為屋三間山前白玉石橋長二百尺直儀天殿後殿在太液池中圓坻上十一楹正對萬歲山山之東也為靈囿奇獸珍禽在焉車駕歲巡上都先宴百官于此浙省參政齊達爾嘗云向任留守司都事時聞故老言國家起朔漠日塞上有一山形埶雄偉金人望氣者謂此山有王氣非我之利金人謀欲厭勝之計無所出時國已多事乃求通好入貢既而曰他無所冀願得某山以鎮壓我土耳衆皆鄙笑而許之金人乃大發卒鑿掘輦運至幽州城北積累成山因開挑海子栽植花木營構宫殿以為遊幸之所未幾金亡世皇徙都之至元四年興築宫城山適在禁中遂賜今名云留守司在宫城西南角樓之南專掌宫禁工役者大軍渡河世皇取江南大軍次黄河苦乏舟楫夜夢一老􅅱曰陛下欲渡河當隨我來引至一所指曰此即是已帝遂以物標識之及覺歴歴可記明日循行河滸尋夢中所見處果是方驚顧間忽有人進曰此間水淺可渡時帝徵夢中語因謂曰汝能先涉否其人乃行大軍自後從之無一不濟帝欲重旌其功對曰富與貴悉非所願但得自在足矣遂封為達爾罕與五品印撥三百戸以食之今其子孫尚有存者此事楊元誠太史瑀所云檄世皇下江南檄枚舉賈似道無君之罪宋國臣民其有不誠服者與其文曰宅中圖大天開一統之期自北而南雷動六師之衆先謂弔民而伐罪蓋將用夏而變夷欲制江浙以削平極汝海隅而混一堪嗟此宋信任非人處之師相之尊委以國柄之重世濟其惡真兇悖之賈充謀及迺心效姦雄之曹操不學無識舞術弄權誇滸黄僅免其身比河清莫大之績承君之寵如彼之專貪天之功確乎不拔惜官爵以總寳貨苛條法以苦賢才奪土田而無地可耕變關會而物價溢湧藉鄙猥者伴食於廟堂任反側者失兵於邊徼恬視雷星之召異罔聞水火之降災滿朝皆其私人用將因其重賂用白劄而破世守之法曲丹筆而容天討之刑民心已離而不知天命將革而未悟方且貪湖山之樂聚寳玉之珍弗顧母死奪制以貪榮乃乘君寵立幼而固位以已峻功碩徳而自比於周公欺人寡婦孤兒反不如於石勒深懐禍慝自肆奸邪合正兩觀之誅可紓百姓之怒我大元皇帝聰明智睿神武慈仁焚香祝天誓莫殺而混海宇振兵畧地隨所向而宣皇威一戰乘勝而渡江諸將列降而獻土厥角稽首迎我前矛後實先聲易如破竹昭天順人信之助成風行草偃之功合宇宙以清寜蘇人民而鎮撫恩寛幼主以下罪止元惡之身自今檄到應守令以境土投拜除大支犒賞外仍其官職謹檄朝儀大元受天命肇造區夏列聖相承至於世皇至元初尚未遑興建宫闕凡遇稱賀則臣庶皆集帳前無有尊卑貴賤之辨執法官厭其喧雜揮杖擊逐之去而復來者數次翰林承㫖王文忠公磐時兼太常卿慮將貽笑外國奏請立朝儀遂如其言科舉皇慶癸丑冬十一月詔曰其以皇慶三年八月天下郡縣興其賢者能者充賦有司明年二月會試京師中選者朕將親䇿焉按遺山元公好問所撰廉訪使楊文憲公奐墓碑云太宗即位之十年戊戌開舉選特詔宣徳課稅使劉公用之試諸道進士公試東平兩中賦論第一奏授河南路徵收課稅所長官兼廉訪使則國朝科舉之設已肇於此寥寥七十餘年而布延圖皇帝克不墜祖宗之令典尊號曰仁不亦宜乎初焉試論賦蓋反宋金餘習後則一以經學為本非復向時比矣江南謡汲郡王公玉堂嘉話云宋未下時江南謡云江南若破百鴈來過當時莫喻其意及宋亡蓋知指丞相巴延也白道子太宗時諸國來朝者多以冒禁應死耶律文正王楚材進奏曰願無汙白道子從之蓋國俗尚白以白為吉故也官不致仕大徳七年詔内外官年及七十並聽致仕時郭守敬字若思順徳邢臺人知太史院事以舊臣且熟朝廷所施為獨不許其請至今翰林太史司天官不致仕者咸自公始達爾罕達爾罕譯言一國之長得自由之意非􅈴戚不與焉太祖龍飛日朝廷草創官制簡古惟左右萬户次及千户而已丞相順徳忠獻王哈喇哈遜之曾祖竒徹勒以英材見遇擢任千戸錫號達爾罕至元壬申世祖録􅈴臣後拜王宿衞官襲號達爾罕皇族列拜己丑秋八月太宗即皇帝位耶律文正王時為中書令定冊立儀禮皇族尊長皆令就班列拜尊長之有拜禮蓋自此始内八府宰相内八府宰相八員視二品秩而不降授宣命特中書照會之任而已寄位於翰林之繅琳繅琳宫門外院官會集處也所職視草制若詔赦之文則非其掌也至於院之公事亦不得與焉例以國戚與􅈴貴之子弟充之伊勒都齊國朝有四集賽台官集賽者分宿衞供奉之士為四畨畨三晝夜凡上之起居飲食諸服御之政令集賽之長皆總焉中有伊勒都齊乃侍御之至親近者雖官隨朝諸司亦三日一次輪流入直負骨朶於肩佩環刀於要或二人四人多至八人時若上御控鶴則在墀陛之下蓋所以虞姦回也雖宰輔之日覲清光然有所奏請伊勒都齊在固不敢進今中書移咨各省或有須備録奏文事者内必有伊勒都齊某等以此之故余又究骨朶字義嘗記宋景文筆記云關中人以腹大為􅍺􅞷上音孤下音都俗音謂杖頭大者亦曰􅍺􅞷後譌為骨朶朶平聲大漢國朝鎮殿將軍募選身軀長大異常者充凡有所請給名曰大漢衣糧年過五十方許出官珪齊珪齊者快行是也每歳一試之名曰放走以脚力便捷者膺上賞故監臨之官齊其名數而約之以繩使無後先參差之爭然後去繩放行在大都則自河西務起程若上都則自泥河兒起程越三時走一百八十里直抵御前俯伏呼萬歲先至者賜銀一餅餘者賜段匹有差實保齊實保齊鷹房之執役者每嵗以所養海青有獲頭鵞者賞黄金一錠頭鵞天鵞也以首得之又重過三十餘斤且以進御膳故曰頭輟耕録卷一
