  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_WYG_006-1a, image: WYG1040/WYG1040-0471a.png}
body:
  text: 輟耕録卷六元陶宗儀撰蘭亭集刻蘭亭一百一十七刻裝禠作十册乃宋理宗内府所藏每版有内府圖書鈐縫玉池上後歸賈平章至國朝有江南八十餘年之間凡又易數主矣往在錢唐謝氏處見之後陸國瑞携至松江因得再三披閱併録其目真傳世之寳也甲集一十二刻州郡修城本葉仲山䟦定武濶行若合一契行濶定武肥定武瘦定武板刻霍子明䟦定武缸石定武斷石定武古刻兩京斷石永興古懿郡齋宣城乙集一十三刻舊梅花三衢板刻安吉古苔真草臨川麻石臨賀豫章二靜江府復州鼎州後有武陵二字古潭新梅花宣城南陵丙集一十刻蘇州府治福州府治福州棗木道州金陵三米米芾米友仁米尹知永嘉古霅斷石隆州郴州蘭亭重言丁集一十刻紹興府治二紹興倉司紹興府學紹興古刻餘姚縣治曲水詩蘭亭曲水詩前曲水詩後婺州府治禇遂良摹戊集一十刻内府髙宗臨定武米友仁䟦唐貞觀太清開皇祕首内殿内司四京師玉堂已集九刻雜集玉枕花石栁誠懸大字唐人硬黄臨唐人雙鈎晉唐刻孫過庭草京師鵝黄􅀥木黄紙印彭城小字庚集一十一刻故家蔡君謨臨薛紹彭秦少游小字安定家藏辛道宗建康晁謙之紹興湯氏南昌京氏廬陵胡氏蜀劉涇唐摹刻辛集一十四刻吳詵草書吳璜劉無言臨龍潭潘氏方朔習寫周平所藏臨江張氏天台丁氏新安汪氏江西故家廬山甲秀堂九江陶氏循王家藏米芾跋云壬午閏六月九日大江濟川亭􅋈寳晉齋艎對紫金浮玉羣山迎快風消暑重裝番陽洪氏壬集一十四刻金陵畢氏廬山呉氏紹興曾氏紹興石氏二毘陵尤遂初李忠愍所刻新唐李氏江隂邱氏二東陽郭氏昌谷曹氏三癸集一十四刻趙虚齋吕氏家藏建鄴朱氏大梁曾朴陸子與韓松陸載之胡氏將玉林二趙菊坡不題名二錢唐李和禊帖考姜白石先生禊帖偏傍考云永字無畫發筆處㣲折轉和字口下横筆稍出年字懸筆上湊頂在字左反剔嵗字有㸃在山之下戈畫之右事字脚斜拂不挑流字内公字處就回筆不是㸃殊字挑脚帶横是字下疋凡三轉不斷趣字波畧反捲向上欣字欠右一筆作章草發筆之狀不是捺抱字已開口死生亦大矣亦字是四㸃興感感字戈邊是直作一筆不是㸃未嘗不不字下反挑脚處有一闕右法如此甚多畧舉其大概持此法亦可以觀天下之蘭亭矣五字損本者湍流帶右天五字有損也喪師衰絰顧徳玉字潤之槜李人自幼從寧國路儒學教授俞觀光先生學先生無子嘗與人曰吾昔寢疾於杭潤之侍湯藥情至切若父子醫為之感動弗忍受金今我行且老必託之以死既而訪醫吳中病且革趣舟歸潤之進次尹山卒時後至元初元閏十二月戊子也明日乃至槜李潤之奉其屍歛於家衰絰就位邦人士為潤之來弔者潤之拜之越明年𦵏於海鹽近顧氏之先塋嵗時祭享惟謹或曰歛於家禮與曰吾聞師哭諸寢又云生於我乎館死於我乎殯非家歛之則將師尸委諸草莾生服其訓死而委諸草莾有人心者弗為也曰師無服而為衰絰固近於掠美者矣曰疑衰加麻之絰帶禮也故曰二三子絰而出至𦵏除之心喪戚容終三年夫民生於三師居其一於父子也何異今吾則加一等以行之盖出於人心天理之本然若之何其惑也聞者嘆伏先生諱長孺越之新昌人吁聖逺言湮世道不古乆矣朝為師生而莫若途人者比比皆是潤之乃獨能行人之所難行於不可行之時盖絶無而僅有者真仁矣哉天下後世之為人弟子而忘其師聞潤之之言寧不有動於中歟法帖譜系法帖譜系云熙陵以武定四方載櫜弓矢文治之餘留意翰墨乃出御府歴代所藏真蹟命侍書王著摹勒刻板禁中釐為十卷各於卷尾題奉聖㫖模勒入石此歴代法帖之祖評帖劉後村先生云閣帖為祖十㢧綘帖次之二十㢧臨江又次之潭又次之武岡又次之大觀尤妙武岡佳者可亂絳臨江佳者可亂閣潭乃僧希白所模有江左風味希白工於摹字拙於尋行數墨文理錯繆然則雖工其如難讀何其字比之淳化帖為勝東坡推潭帖勝閣帖韓侂胄家開羣玉帖字好薛紹彭亦有家塾帖好淳化祖石刻大梁劉衍卿世昌云大徳己亥婦翁張君錫携余同觀淳化祖石帖卷尾各有題識第一卷邊髙平范仲淹曽觀年月日題第五卷東坡張文潜等題又有姜白石小楷三四十字第六卷洛陽伊川老夫不知為何人又太學博士陳士元云此正祖石又有蘇舜欽題第七卷陳簡齋奉㫖觀於秋香亭下云魏晉法書非人間合有自我太宗皇帝刻石寵錫下方見不滿十數臣與義頓首謹書第八卷蘇頌云此帖世不多見是日賞牡丹得觀於相君西齋張舜民題亦在此卷第十卷太宗書淳化四年六月廿二日賜畢士安賜字上寳後段畢丞相黄字書子孫保享等語百餘字逐卷有髙宗内府印百餘顆後有賈氏長字印又有一小印合縫云是蔡太師印山和尚錦裝禠籖頭題云淳化祖石刻及見吳郡陸友仁又云嘗觀禇伯秀所記江南李後主命徐鉉以所藏古今法帖入石名昇元帖此則在淳化之前當為法帖之祖劉陸之説殊不相合偶讀劉䟦暇日記亦載此事云馬傳慶説此帖本唐保大年摹上石題云保大七年倉曹㕘軍王文炳摹勒校對無差國朝下江南得此石淳化中太宗令將書館所有増作十卷為版本而石本復以火斷缺人家時收得一二卷然閣帖於各卷尾書題云淳化三年壬辰嵗十一月六日奉聖㫖模勒上石此侍書王著筆也而陳簡齋亦云太宗刻石則衍卿所謂祖石刻豈即南唐時帖乎抑太宗増刻者但不知南唐亦作十巻否徐鉉馬傳慶二説又不同今世言淳化閣帖用銀錠􅗚棗木板刻而以澄心堂紙李廷珪墨印者則傳慶板本之説合故趙希鵠洞天清録集亦云用棗木板摹刻故時有銀錠紋用李廷珪墨打手揩之不汚手余嘗見閣本數十止三本真者其紙墨法度種種逈别妙在心悟固難以言語形容然又傳仁宗嘗詔僧希白刻石於秘閣前有目録卷尾無書題字所謂祖石刻者豈即此與家翁世言家之尊者曰家主翁亦曰家公唐代宗謂郭子儀曰鄙諺有云不癡不聾不作家翁奴材世之鄙人之不肖者為奴材郭子儀曰子儀諸子皆奴材也沙魘湖南益陽州夜中同寢之人無故忽自相打每每有之名曰沙魘土人熟此不以為異惟取冷水噴噀候稍息飲之湯徐就醒然猶二三日如醉餘不知者殊用驚駭孝行延祐乙夘冬平江常熟之支塘里民朱良吉者母錢氏年六十餘病將死良吉沐浴禱天以刀剖胷割取心肉一臠煑粥以飲母母食粥而病愈良吉心痛就榻不可起隣里憐其且欲絶乃裒財命頥貞觀道士馬碧潭者醮告神明祈隂祐之是日邑人俞浩齋聞而過其家觀良吉胷間瘡裂幾五寸氣騰出痛莫能言俞為納其心以桑白皮線縫合未及期月已無恙矣予因述其事以為勸郡宋翠巖先生有詩紀之其小序曰夫孝為百行宗人以父母遺體而生乳哺鞠育教誨劬勞其恩號罔極然而剖心刲股恐其傷生而或死也父母存而子死故又有禁止之令焉觀今世降俗薄悖逆其父母者視良吉何如哉如良吉者自當旌異為世教勸而有司曾莫能省原其一念之純剖心之際動天地感鬼神固不待賞之於有司而天地神明固已隂録其孝矣太上感應篇所謂若人者人敬之天佑之福禄隨之衆邪逺之神靈衛之今日謝世明日為地下主進補仙階若良吉者有焉故為顯白其孝以為人子之勸省也宗儀之先人有孝感一事人多傳道會稽張君思㢘嘗書於楊鐡崖先生所譔墓銘之後矣今併録於此云元故白雲漫士陶明元氏諱煜弱冠時用道家法事所謂𤣥武神甚謹明元母病心痛痛則拍張跳躅齧牀簀衾褥號呌以紓苦楚嵗瀕死者六七發醫莫能愈明元每搯心嚼舌以代母痛一日危甚計無所出走禱𤣥武前曰刲股割肝非先王禮在法當禁某非不知也今事急矣敢犯死取一臠為湯劑神爾有靈疾庶幾其瘳禱畢即引刀欲下忽有二童自外躍入叱曰毋自損我天醫也明元大駭伏地乞哀童子取案上筆書十數字於几面擲筆二童子咸仆地隨呼家人救之噀以水良乆蘇乃鄰氏兒也叩之無所知焉視其書藥方也隨讀隨𨼆明元私喜曰此必𤣥武神也吾母其瘳矣即如方治之藥甫及口而痛已失終母身不再舉張子曰齊諧志怪聖人不道左氏尚誣君子非之明元之事遂昌鄭元祐狀行㑹稽先生楊維楨誌墓皆不書非逸也畏譏而削之也彼以謂𤣥武神者西北方之氣也莽蒼無知非如俞跗岐扁能切脉察色投湯熨火抉腸剔胃以取人疾在理所不通故不書雖然動天地感鬼神莫大乎孝焉知𠖇𠖇中英魂烈氣不散者或如俞跗岐扁依馮精魄以遂孝子之請也不然何穹然漠然之體而有所謂天醫乎明元子宗儀與余友善其寓殯又在玉笥山下去余居不逺以是得其實尤詳故寧受左氏之譏不敢没明元之孝書曰與其殺不辜寧失不經先王之過盖如此㑹稽張憲譔㢘使長厚徐文獻公為浙西㢘使時治所尚在平江有㫖遷置於杭嵗云莫矣擇日啓行一書吏者掌照刷支郡諸司案牘官吏合受稽違罪責已皆取狀至是引決公謂曰正旦在邇此曹乃職官俸吏禮宜陪位望闕致賀受刑而從事無耻也否則為不敬盍别議之吏以白於幕官因進曰相公長厚之道固如此然將若之何公曰奚難立案候明年分司施行可也庭下歡聲如雷此亦厚風化之一端故記之私第延賔公既遷司至杭一日有本路總管與一萬戸謁公私第公以賔禮延之上坐適書吏從外来見而趍避伺其退入見曰總管萬户皆屬官耳得無禮貎之過與公曰在公府則有尊卑之辨若私宅須明主客之分我輩能㢘介則百司自然知懼何待恃威埶以驕凌之然後為尊嚴乎吏赧甚句曲山房熟水句曲山房熟水法削沉香釘數箇揷入林禽中置缾内沃以沸湯宻封缾口乆之乃飲其妙莫量吾竹房先生吾子行先生衍大末人大父為宋太學諸生因家錢唐先生踈曠故髙不事之節其所厭棄者或請謁從樓上遥謂曰吾出有間矣顧彈琴吹洞簫撫弄如意不輟求室委巷教小學常數十人與客對笑談喧樓上下羣童一是肅安其所著述有尚書要略聽𤣥集造𤣥集九歌譜十二月樂譜辭重正卦氣楚史檮杌晉文春秋兼通聲音律吕之學工書初先生年四十未娶所知宛丘趙君天錫為買酒家孤女為妾年饑女嘗事人後夫知妻在先生所訟之因逮妾父母父母至客先生家又偽楮幣事覺因言舎主人先生固弗知因邏捽辱先生南出數百步録事張君景亮識先生叱邏曰是不知情攝之何為即解縱遣歸先生不勝慚明日持𤣥絛緇笠詣仇山村先生别值晨出因留詩一章詩有西冷橋外斷橋邊之句意將從靈均於斯明日有得遺履於橋上者後衛大𨼆以六壬筮之得亥子丑順流象曰是其骨朽淵泥九十日矣西湖多寳院僧可權從先生學聞先生之死哭甚哀乃𦵏先生遺文於後山與其師骨塔相對曰皆吾師仍乞銘於胡石塘先生庶幾先生有後世名銘曰生弗瀆死弗辱貞哉白余習書極愛先生翰墨得一紙半幅如獲至珍以故於書法頗有助偶與鄭遂昌先生談先生之始末就識之竹房竹素貞白皆先生號也抗䟽諫伐宋何公巨川者京師長春宫道士也㑹世皇將取宋乃上䟽抗言宋未有可伐之罪遂命副國信使翰林學士郝文忠公經使江南殁於真州至正間詔追贈二品官有人作詩悼之云竒才不泄神仙事抗䟽曾干世祖知每恨南邦本無罪比留北使欲何為忠魂乆掩孤城館褒詔新鎸二品碑地上若逢姦似道為言故國􅁰離離髪䐈婦人頭髪有時為膏澤所黏必沐乃解者謂之䐈按攷工記弓人注云䐈亦黏也音職則髪䐈之䐈正當用此字鬼􅂍陜西某縣一老嫗者住村莊間日有道流乞食與之無吝色忽問曰汝家得無為妖異所苦乎嫗曰然曰我為汝除之即命取火焚囊中符頃之聞他所有震霆聲曰妖已誅殛纔遁其一廿年後汝家當有難今以鐡簡授汝至時亟投諸火言訖而去自是乆之嫗之女長而且美一日有曰大王者騎從甚都借宿嫗家遣左右謂曰聞嘗得異人鐡簡可出示否盖嫗平日數為他人借觀因造一偽物而以真者懸腰間不置也遂用偽獻留不還謂曰可呼汝女行酒以疾辭大王怒便欲為姦意嫗竊思道流之説計􅈫嵗數又合乃解所佩鐡簡投酒竈火内既而電掣雷轟煙火滿室須􅁷平息擊死獼猴數十其一最鉅疑即向之逃者所齎隨行器用悉係金銀寳玉赴告有司籍入官庫台哈布哈元師為西臺御史日閱其案朱語曰鬼􅂍云余親聞台公説甚詳且有鈔具案文惜不随即記録今則忘邑里姓名嵗月矣居士今人以居士自號者甚多考之六經中惟禮記玉藻有曰居士錦帶注謂道藝處士也吳曾能改齋漫録云居士之號起於商周之時按韓非子書曰太公封於齊東海上有居士任矞華仕昆弟二人立議曰吾不臣天子不友諸侯耕而食之掘而飲之吾無求於人無上之名無君之禄不仕而事力云然則居士云者處士之𩔖是已
