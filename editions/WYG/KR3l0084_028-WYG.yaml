body:
  text: 輟耕録卷二十八元陶宗儀撰非程文各行省鄉試則有人取發解進士姓名一如登科記鋟梓印行以圗少利至正四年甲申江浙揭曉後乃有四六長篇題曰非程文語與抄白省榜同時版行不知何人所造而路府州縣盛傳之語曰設科取士深感聖世之恩倚公挾私無奈吏胥之弊豈期江浙之大省壊於禹疇之小劉名錫眉山人當該掾史斯文孔艱衷情痛憤待士無禮呼名散餅於路傍懐璧有謀打號貼圖於墻上厨𫝊用猾吏内外之消息可通試官取貪夫上下之機關不泄陽揭題駕言無弊實自生姦宄之心覔厚賂力舉還魂特欲箝是非之口五服之親不避故違國朝之典章雜犯之卷俱抄恐失手本之名字應才杭州鼓勇於終塲之日局長之信已通劉環即環翁杭州知名於未榜之前代筆之錢盡去萬户侯之關節可驗丈人峯之氣力何勤吕將鉛山萬户吕天澤監門進樂平之八子許援董彛徐復鄒成操琬汪緈許道傅戴用海郎吳縣主簿海魯丁受卷通括蒼之二林松慶彬祖本生之地増輝同列之情不薄黄璋松江稱幹首二三月已買試官鮑恂嘉興在榜中十四名全頼妻父建徳知事俞鎮藉開元真人之力葉氏葉瓉信州禮經依永嘉縣尹林泉生之門江郎兄弟輝晃建寕劉大希賢慶元在列頼為省郎之師沈小惟時杭州登科誰知運吏之壻黄岩趙藺友藺得家兄寕海丞由欽為簾外之官瑞安高明託館主有堂上之友紛紛在眼歴歴難言許瑗饒州作魁三百定賣幾千株之木鄒成饒州駝牓十八日納七萬户吕天澤之錢左者如斯右其可見尺牘先来於柏府仕宦勢高槀文潜出於􅁄闈師生情宻逓手帖全憑廵綽寫懐挾不避軍人四子入塲代筆有此劉之手一家在牓瞞人起各路之文所謀不臧其忠何在王賀紹興偹牓省中典吏不讀書亦解成名李思思齊婺山村童未知禮焉宜中𨕖錯春秋之年分臨海夢龍姓趙備牓亂周易之隂陽平江俞鼎耳目之所及者如此心術之潜運者難知姑舍舉人更陳坐主俞鎮建德知事夤縁考試這番豐卒嵗之貲吳暾峽州知事買題登科方得證舊時之本麟經錯亂因賂取林泉之生生何如永嘉尹林泉生易義駁雜以名尋夏日之孜孜安用㑹稽尹夏日孜其餘汎汎不必叨叨分經考卷得便私情自開科曽無此例出院改文以欺公論雖刋板乃是訛傳歴觀解據之非益見文衡之繆指實告官者反罹其罪懐才抱藝者虚費其勞趙俶蔣堂空仰天而歎息江孚沈幹徒踏地以咨嗟潘伯修蔡餘慶兩舉奚為聞夢吉陸居仁再來告免嗚呼文運已矣吾道安之何等主司汙濫壊今年之𨕖舉既生聖世進修冀異日之公明此非一口之經陳實乃衆賢之願告有人心者念天理焉至二十二年壬寅復有作彈文云文運重開多士歡騰於此日科塲作弊醜聲莫甚於今年啟姦人僥倖之門負賢相賔興之意事既如此人其奈何切惟考試官實文章之司命詎宜偽定於臨期員外郎執科舉之權衡安可公然而受賂憸謀既遂清議難容聞人樞膚淺之學翰林懐賔主之舊情啜靄山游狹之徒座主念梓桑之宿好只因厚契便擢科名尸位憲賔進鄉閭之十子居喪臺掾升里閈之三王沈庭珪錯破書經混死生於同列戰惟肅不明詩意強今古於已然朱舜民乃瀕海之強梁喻宜之實許門之童子新昌庭瑞輸彩叚之幾縑霅水莫孜奉白金之一錠張誼罔知彖象皆徐中造就之私楊明不辨春秋拜周溥作成之賜施省憲貼書之手叚壊鄉閭整肅之綱常唐肅以詞賦而見收明經安在柯理以梯媒而得中對䇿何長舍弟致謀甚矣有心之唐溥家兄代筆嗟哉無學之鄭沂靖而思之良可醜也白頭錢宰感綈袍戀戀之情碧眼倪中發倉廪陳陳之粟俞潜徐鼎三月初早買試官邱民韓明五日前預知題目元孚乃泉南之大賈揮金不啻於泥沙許徴實雲間之富家納粟猶同於瓦礫㧞頴之於陋巷餘波有自於楊明超宋祀於窮途主意必資於張誼既正榜之若此則備選之可知姑舍前言更陳餘意屈仲孚於受卷易經可謂失人進公甫於考文麟史大孤衆望不分報賽叔通豈可與言詩繆講進修孺子烏足以論易重載連檣之白粲始諧校藝於青藜逯信止素乏文才嗟老夫之已耄孟天暐每稱好觜奈舉業之乆疏大壊士風難逃輿論嗚呼天之將喪斯文實係興衰之運士欲致用於國豈期貢舉之私此非一口之誣謀實乃衆情之公論用書既徃以警將來于闐玉佛丞相巴延嘗至于闐國於其國中鑿井得一玉佛高三四尺色如截肪照之皆見筋骨脉絡即貢上方又有白玉一叚高六尺闊五尺長十七歩以重不可致處士門前集賽杜清碧先生本應召次錢唐諸儒者爭趨其門燕孟初作詩嘲之有紫藤帽子高麗靴處士門前當集賽之句聞者傳以為笑用紫色㯶藤縛㡌而製靴作高麗國様皆一時所尚集賽則内府執役者之譯語也憲僉案判松江府儒學直學沈伯雲因花破錢糧乃與教授陳仲微有隙伯雲之父曰君實者老吏也一日率婢妾詈箠仲微于途適憲僉吕公思誠分按至府具狀以訴公怒其詬辱師表有傷風化勾攝赴官服辜君實年逾七旬乞以銅贖公判云既能為不能為之事正當受不當受之刑卒杖斷之詩䜟張起字起之四明人有詩名嘗作一聨云别來越樹長為客看盡吳山不是家未幾卒詩亦有䜟歟邱機山邱機山松江人宋季元初以滑稽聞于時商謎無出其右遨遊湖海間嘗至福州譏其秀才不識字衆怒無以難之一日構思一對欲令其辭屈心服對云五行金木水火土邱隨口荅曰四位公侯伯子男其博學敏捷類如此不孝䧟地死杭州楊鎮一兇徒素不孝於母尤凌虐其妻有子三歲愛惜甚至妻常抱負偶失手攧損其頭泣而謂姑曰夫歸婦必被毆死不若先溺水之為幸姑曰汝第無憂但云是我之誤我却去避汝小姑處俟其怒息而還至晚夫歸見兒頭破徑捽妻欲殺之妻告曰非我過也婆攧之耳懼汝怒已徃小姑家去遂釋之次日持刀尋母中途藏諸石下却到妹家好言誘母還至石邊忿躁詈罵取刀殺母竟失藏刀所在惟見巨蛇介道畏怯退縮不覺雙足䧟入地中湏臾即没至膝七竅流血聲罪自咎母急扶抱無計可施走報於婦婦掘地隨掘隨䧟啖以飲食三日乃死觀者日數千人莫不稱快時至正甲辰六月也嘲囘囘杭州薦橋側首有高樓八間俗謂八間樓皆富實囘囘所居一日娶婦其昬禮絶與中國殊雖伯叔姊妹有所不顧街巷之人肩摩踵接咸来窺視至有攀縁簷闌窓牖者踏翻樓屋賔主壻婦咸死此亦一大怪事也郡人王梅谷戯作下火文云賔主滿堂歡閭里盈門看洞房忽崩摧喜樂成禍患壓落瓦碎兮倒落沙泥彆都釘析兮木屑飛揚玉山摧坦腹之郎金谷墜落花之相難以乘龍兮魄散魂消不能跨鳳兮筋斷骨折氁絲脫兮塵土昏頭袖碎兮珠翠黯壓倒象鼻塌不見猫睛亮嗚呼守白頭未及一朝賞黄花却在半餉移厨聚景園中歇馬飛來峯上阿剌郎葛反一聲絶無聞哀哉樹倒胡孫散阿老瓦倒刺沙别都丁木偰非皆囘囘小名故借音及之象鼻猫睛其貎氁上聲絲頭袖其服色也阿剌其語也聚景園囘囘叢冡在焉飛来峯猿猴来徃之處白縣尹詩嘉興白縣尹得代過姚莊訪僧勝福州閒遊市井間見婦人女子皆濃粧艶飾因問從行者或答云風俗使然少艾者僧之寵下此則皆道人所有白遂戱題一絶于壁云紅紅白白好花枝盡被山僧折取歸祗有野薇顔色淺也來鈎惹道人衣勝見亟命去之然已盛傳矣廢家子孫詩秀之斜塘有故宋大姓居焉家富饒田連阡陌宗族雖盛衍而子孫多不肖祖父財産廢敗罄盡郡人金方所談辭滑稽為賦誦好嫚戱因摭其事成近體一律云興廢從來固有之爾家忒煞欠扶持諸墳掘見黄泉骨兩觀番成白地皮宅眷皆為撑目兎舍人總作縮頭龜強奴猾幹欺凌主說與人家子弟知夫兎撑目望月而孕則婦女之不夫而妊也其家有道觀二所語雖鄙俚然為人後者見此寧不知懼也哉樂曲韃靼樂器如箏秦琵琶胡琴和必斯之類所彈之曲與漢人曲調不同大曲哈巴爾圖口温也葛儻兀輝和爾閔古里起土苦里䟦四土魯海舎舎弼揺落四蒙古揺落四閃彈揺落四阿耶兒虎桑哥兒苦不丁江南謂之孔雀雙手彈答罕謂之白翎雀雙手彈苦只把失品弦小曲阿厮闌扯弼回盞曲雙手彈阿林捺花紅哈兒火失哈赤黒雀兒呌洞洞伯曲律買者歸牝疇兀兒把擔葛失削浪沙馬哈相公仙鶴阿下水花囘囘曲附伉里馬黒某當當清泉當當爇梅花文周申父之翰寒夜擁罏􅅡火見缾内所挿折枝梅花氷凍而枯因取投火中戯作下火文云寒勒銅瓶凍未開南枝春斷不歸來這囘勿入梨雲夢却把芳心作死灰共惟地罏中處士梅公之靈生自羅浮𣲖分庾嶺形若槁木稜稜山澤之臞膚如凝脂凛凛雪霜之操春魁占百花頭上歲寒居三友圖中玉堂茅舍總無心金鼎商羮期結果不料道人見挽便離有色之根夫何氷氏相凌遽返華胥之國玉骨擁罏烘不醒氷魂剪紙竟難招紙帳夜長猶作尋香之夢筠窓月淡尚疑弄影之時雖宋廣平鐡石心腸忘情未得使華光老丹青手叚摸索難真却愁零落一枝春好與茶毗三昧火惜花君子還道這一㸃香魂今在何處咦烱然不逐東風散只在孤山水月中如夢令一人娶妻無元𡊮可潜贈之如夢令云今夜盛排筵宴准擬尋芳一遍春去已多時問甚紅深紅淺不見不見還你一方白絹黄門世有男子雖娶婦而終身無嗣育者謂之天閹世俗則命之曰黄門晉海西公嘗有此疾北齊李庶生而天閹按黄帝鍼經曰人有具傷於隂隂氣絶而不起隂不能用然其􅂡不去宦者之獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脉血寫不復皮膚内結唇口不榮故􅂡不生黄帝曰其有天宦者未嘗被傷然其􅂡不生其故何也岐伯曰此天之所不足其任衝不盛宗筋不成有氣無血唇口不榮故􅂡不生又大般若經載五種黄門云梵言扇搋丑皆切半釋迦唐言黄門其類有五一曰半釋迦總名也有男根用而不生子二曰伊利沙半釋迦此云妬謂他行欲即發不見即無亦具男根而不生子三曰扇搋半釋迦謂本來男根不滿亦不能生子四言博叉半釋迦謂半月能男半月能女五曰留拏半釋迦此云割謂被割形者此五種黄門名為人中惡趣受身處然周禮閹人鄭氏註云閹真氣藏者宋趙忠惠帥維揚日幙僚趙參議有婢慧􅃛盡得儕輩之歡趙昵之堅拒不從疑有異强即之則男子也聞于有司盖身二形前後姦狀不一遂寘之極刑近李安民嘗於福州得徐氏處子年十五六交際一再漸具男形盖天真未破則彼亦不自知然小説中有池州李氏女及婢添喜事正相類而此外絶未見於古今傳記等書豈以為人之妖而汙筆墨不復載乎晉五行志謂之人痾惠帝時京洛有人兼男女體亦能兩用人道而性尤淫亂此亂氣所生也玉厯通政經男女兩體主國淫亂而二十八宿真形圖所載心房二星皆兩形與丈夫婦女更為雌雄此又何耶異物志云靈狸一體自為隂陽故能媚人褚氏遺書曰非男非女之身精血散分又曰感以婦人則男脉應診動以男子則女脉順指皆天地不正之氣也事載周宻癸辛雜識花山賊中原紅冦未起時花山賊畢四等僅三十六人内一婦女尤勇捷聚集茅山一道宫縱横出沒畧無忌憚始終三月餘三省撥兵不能收捕殺傷官軍無數朝廷召募鹺徒朱陳率其黨與一鼓而擒之從此天下之人視官軍為無用不三五年自河以南盗賊充斥其數也夫爵禄前定宇文公諒字子貞湖州人初領鄉貢入浙省試院頭塲占一席舍其案上有宇文同知四字不知何人書試官考卷以文不中式將黜之時坐主龍麟洲先生江西老儒也年八十餘始過江浙力主此卷卒置榜中及㑹試果登髙第授同知婺源州事雖曰爵禄前定盖亦陰徳所致人鮮有知者公年少時嘗館授巨室其閨愛中夜來奔堅拒不納明旦託以他故歛書告别此非陰徳也與醋鉢兒俞俊嘉興人巴延太師柄國日嘗賦清平樂長短句云君恩如草秋至還枯槁落落殘星猶弄曉豪傑消磨盡了放開湖海襟懷休教鷗鷺驚猜我是江南倦客等閒容易安排手槀留葉起之處後與葉交惡竟訴于官必欲搆成其罪寅緣賄賂浙省移准中書省咨劄付儒學提舉司議得古人寄情遣興作為閨怨詩詞多有指夫為君者然此亦當禁止以故獲免罪戾而所費已幾萬定矣至正丙申春張士誠僣號誠王據有平江日又以賄通松江偽尹鄭煥署宰華亭用酷刑朘剥邑民恨入骨髓郡士𡊮海叟有詩曰四海清寧未有期諸公衮衮正當時忽然一日天兵至打破王婆醋鉢兒或者不知醋鉢之義以問叟叟曰昔有不軌伏誅暴屍于竿王婆買醋經過其下適索朽屍墜醋鉢為其所壓着地而碎王婆年老無知將謂死者所致顧謂之曰汝只是未曽喫惡官司來聞者皆絶倒棋譜通𤣥集通逺集清逺集清樂集幽𤣥集機深集増廣通逺集𤣥𤣥集忘憂集軍前請法師謝景陽居松江北郭結壇於家行召鬼法至正十一年官兵下海勦捕方國珍傳云賊中有人能呼召風雨必得破其法者乃可擒討千户額森等遂以謝薦總兵官給傳致請省劄有云參裁軍事必訪異人既達天時其為世用時知府王克敏廉介端嚴有聲于時不得已親造其廬起赴軍前其術一無所驗自後全軍敗衂吁宰臣統大兵數十萬勦除草竊如拉朽耳而乃延一方士則其機畧安在哉凌總管出對嘉興總管凌師德以文章政事自居同僚莫敢與抗然其行實貪汙頗聞人有譏議因出對云竹本無心外面自生枝節貢推官對云藕因有竅中間抽出絲毫盖諷之也承天寺平江承天寺遭囘禄殿宇一空僧悅楚南來住持施財者雲集遂大興土木之工金碧殊勝有加於昔或勸題梁悦不從曰當有俗人來暫居悦陞領徑山卒高郵兵攻破城張士誠據以為宫佛像悉毁壊銅觀音鑄為錢既投降作太尉别造府越四五年復為寺義丈夫吳興錢泰窩云至正初二賈自嘉興來平江買舟至海口收市舶貨行二十餘里兩道人詣舟求渡一負磬一持鬼神像既上舟去巾服乃兩甲者從像中出二長刀叱曰吾逐盗至此汝真盗也舟人陽應曰我固知為盗顧無以發今壯士誠與吾意合此未可前途乃可耳故紆行且曰二盗已落公手願治酒助公勇遂命妻取酒勸甲者遲暮醉抽其刀斫賊其一躍起復斫之二盗盡死舟還二賈泣且拜曰非公吾幾不免虎口遂以白金二餅為舟人夀吁決死生於阽危之際不負賈之託不謂之義丈夫可乎解語盃至正庚子秋七月九日飲松江泗濵夏氏清樾堂上酒半折正開荷花置小金巵於其中命歌姬捧以行酒客就姬取花左手執枝右手分開花瓣以口就飲其風致又過碧筩逺甚余因名為解語盃坐客咸曰然戯題小像張句曲戯題黄大癡小像云全真家數禪和口鼓貧子骨頭吏員臓腑唐伯剛題邾仲誼小像云七尺軀威儀濟濟三寸舌是非風起一雙眼看人做官兩􅃗脚沿門報喜仲誼云是誰是誰伯剛云是你是你水仙子張明善作北樂府水仙子譏時云鋪眉苦眼早三公裸袖揎拳享萬鍾胡言亂語成時用大綱來都是烘上聲説英雄誰是英雄五眼雞岐山鳴鳳兩頭蛇南陽臥龍三脚猫渭水非熊銅錢代蓍今人卜卦以銅錢代蓍便於用也又有以錢八文周圍鋪轉而取六爻名曰金井闌但乾卦初爻及復之泰不可變盖止有六十二卦耳此法不可用刑賞失宜至正十二年歲壬辰秋蘄黄徐夀輝賊黨攻破昱嶺關徑抵餘杭縣七月初十日入杭州城偽帥項蔡楊蘇一屯明慶寺一屯北關門妙行寺稱彌勒佛出世以惑衆浙省參政樊執敬死于天水橋寳格與妻同溺于西湖其賊不殺不淫招民投附者署姓名于簿籍府庫金帛悉輦以去至二十六日浙西廉訪使自紹興率鹽塲竈丁過江同羅木營官軍尅復城池賊遂潰散三平章鼎鼎逃徃嘉興郎中托克托過江南越數日携省印來㑹權署省事至是亦囘四平章嘉琿自湖州統軍歸舉火焚城殘蕩殆盡附賊充偽職者范縣尹等明正典刑里豪施遵禮顧八為迎敵官軍咼于市家産悉没縣官明慶妙行亦然省都事以下坐失守城池罷黜不叙省官復任如故朝廷法度既隳刑賞失宜欲天下宴安不可復得矣畫家十三科佛菩薩相玉帝君王道相金剛鬼神羅漢聖僧風雲龍虎宿世人物全境山林花竹翎毛野騾走獸人間動用界畫樓臺一切傍生耕種機織雕青嵌緑輟耕録卷二十八
