body:
  text: 輟耕録卷二十元陶宗儀撰納音六十甲子之有納音世人鮮知其理嘗觀筆談有曰六十甲子納音盖六十律旋相為宫也一律合五音十二律納六十音也凡氣始於東方而右行音起於西方而左行隂陽相錯而生變化所以氣始於東方者四時始於木右行傳於火火傳於土土傳於金金傳於水所謂音始于西方者五音始于金左旋傳於火火傳於木木傳於水水傳於土納音與易納甲同法乾納甲而坤納癸始于乾而終于坤納音始于金金乾也終於土土坤也納音之法同𩔖娶妻隔八生子此漢志語也此律吕相生之法也五行先仲而後孟孟而後季此遁甲三元之紀也甲子金之仲黄鍾之商同位娶乙丑大吕之商同位謂甲與乙丙與丁之􅁼下皆倣此隔八下生壬申金之孟夷則之商隔八謂大吕下生夷則也下皆倣此壬申同位娶癸酉南吕之商隔八上生庚辰金之季姑洗之商此金三元終若只以陽辰言之則依遁甲逆轉仲孟季若兼妻言則順傳孟仲季也庚辰同位娶辛巳仲吕之南隔八下生戊子火之仲黄鍾之徴金三元終則左行傳南方火也戊子娶己丑大吕之徴生丙申火之孟夷則之徴丙申娶丁酉南吕之徵生甲辰火之季姑洗之徴甲辰娶乙巳仲吕之徴生壬子木之仲黄鍾之角火三元終則左行傳于東方木如是左行至於丁巳中吕之宫五音一終復自甲午金之仲娶乙未隔八生壬寅一如甲子之法終于癸亥謂㽔賔娶林鍾上生太簇之􅁼自子至于巳為陽故自黄鍾至于中吕皆下生自午至于亥為隂故自林鍾至于應鍾皆上生甲子乙丑金與甲午乙未金雖同然甲子乙丑為陽律陽律皆下生甲午乙未為陽吕陽吕皆上生六十律相反所以分為一紀也得此一説固己判然及讀瑞桂堂暇録亦論及此則尤明白簡易其曰六十甲子之納音此以金木水火土之音而明之也一六為水二七為火三八為木四九為金五十為土然五行之中惟金木為自然之音水火土必相假而後成音盖水假土火假水土假火故金音四九木音三八水音五十火音一六土音二七此不易之論也何以言之甲巳子午九也乙庚丑未八也丙辛寅申七也丁壬卯酉六也戊癸辰戌五也己亥四也甲子乙丑其數三十有四四者金之音也故曰金戊辰己巳其數二十有八八者木之音也故曰木庚午辛未其數三十有二二者火也土以火為音故曰土甲申乙酉其數三十十者土也水以土為音故曰水戊子己丑其數三十有一一者水也火以水為音故曰火凡六十甲子皆然此納音之所起也大抵六十甲子歴也納音律也支干納音之别也此天地自然之數河圖生數也生者左旋故以中央之土而生西方之金西方之金而生北方之水北方之水而生東方之木東方之木而生南方之火南方之火而復生中央之土洛書尅數也尅者右轉故以中央之土而尅北與西北之水北與西北之水而尅西與西南之火西與西南之火而尅南與東南之金南與東南之金而尅東與東北之木東與東北之木而又尅中央之土此圖書生尅自然之數也又見日家一書専解海中爐中之𩔖其辭雖鑿亦自頗通因併録之曰甲子乙丑海中金者子屬水又為湖又為水旺之地兼金死於子墓於丑水旺而金死墓故曰海中金也丙寅丁卯爐中火者寅為三陽卯為四陽火既得地又得寅卯之木以生之此時天地開爐萬物始生故曰爐中火也戊辰己巳大林木者辰為原野巳為六陽木至六陽則枝榮葉茂以茂盛之木而在原野之間故曰大林木也庚午辛未路傍土者未中之木而生午位之旺火火旺則土於斯而受刑土之始生未能育物猶路傍土若也故曰路傍土也壬申癸酉劔鋒金者申酉金之正位兼臨官申帝旺酉金既生旺則成剛矣剛則無踰於劔鋒故曰劔鋒金也甲戍乙亥山頭火者戌亥為天門火照天門其光至高故曰山頭火也丙子丁丑澗下水者水旺於子衰於丑旺而反衰則不能為江河故曰澗下水也戊寅己卯城頭土者天干戊己屬土寅為艮山上積而為山故曰城頭土也庚辰辛巳白蠟金者金養於辰生於巳形質初成未能堅利故曰白蠟金也壬午癸未楊柳木者木死於午墓於未木既死墓雖得天干壬癸之水以生之終是柔弱故曰楊柳木也甲申乙酉井泉水者金臨官申帝旺酉金既生旺則水由以生然方生之際力量未洪故曰井泉水也丙戌丁亥屋上土者丙丁屬火戌亥為天門火既炎上則土非在下而生故曰屋上土也戊子己丑霹􅆮火者丑屬土子屬水水居正位而納音乃火水中之火非龍神則無故曰霹􅆮火也庚寅辛卯松柏木者木臨官寅帝旺卯木既生旺則非柔弱之比故曰松栢木也壬辰癸巳長流水者辰為水庫巳為金長生之地金生則水性已存以庫水而逢生金則泉源終不竭故曰長流水也甲午乙未沙中金者午為火旺之地火旺則金敗未為火衰之地火衰則金冠帶敗而方冠帶未能斫伐故曰沙中金也丙申丁酉山下火者申為地戸酉為日入之門日至此時而藏光故曰山下火也戊戌己亥平地木者戌為原野亥為木生之地夫木生於原野則非一根一株之比故曰平地木也庚子辛丑壁上土者丑雖土家正位而子則水旺之地土見水多則為泥也故曰壁上土也壬寅癸卯金箔金者寅卯為木旺之地木旺則金羸又金絶於寅胎於卯金既無力故曰金箔金也甲辰乙巳覆燈火者辰為食時巳為禺中日之將中艶陽之勢光於天下故曰覆燈火也丙午丁未天河水者丙丁屬火午為火旺之地而納音乃水水自火出非銀漢不能有也故曰天河水也戊申己酉大驛土者申為坤坤為地酉為兑兌為澤戊巳之土加於坤澤之上非其他浮薄之土也故曰大驛土也庚戌辛亥釵釧金者金至戌而衰至亥而病金既衰病則誠柔矣故曰釵釧金也壬子癸丑桑柘木者子屬水丑屬金水方生木金則伐之猶桑柘方生人便以餧􅁞故曰桑柘木也甲寅乙卯大溪水者寅為東北維卯為正東水流正東則其性順而川澗池沼俱合而歸故曰大溪水也丙辰丁巳沙中土者土庫辰絶巳而天干丙丁之火至辰冠帶巳臨官土既庫絶旺火復與生之故曰沙中土也戊午己未天上火者午為火旺之地未中之木又復生之火性炎上及逢生地故曰天上火也庚申辛酉石榴木者申為七月酉為八月此時木則絶矣惟石榴之木反結實故曰石榴木也壬戌癸亥大海水者水冠帶戌臨官亥水臨官冠帶則力厚矣兼亥為江非他水之比故曰大海水也化氣甲己土乙庚金丁壬木丙辛水戊癸火此十干化五行真氣也其法取歳首月建之干如甲己丙作首丙屬火火生土故化土餘倣此又一説亦通謂遇龍則化龍辰也甲巳得戊辰戊屬土故化土乙庚得庚辰庚屬金故化金丙辛以下皆然應聘不遇胡石塘先生嘗應聘入京世皇召見於便殿趨進張皇不覺笠子欹側上問曰秀才何學對曰脩身齊家治國平天下之學上笑曰自家一笠尚不端正又能平天下耶然憐其貧特授揚州路儒學教授吁以先生之學行而不見遇於明君是果命矣夫皇舅墓河間路景州蓨縣河滸一土阜相傳為皇舅墓自國家奄混區夏即有謡云皇舅墓門閉運糧向北去水渰墓門開運糧却回來至正辛卯中原大水舟行木杪間及水退土阜崩圮墓門顯露繼後天下多事海道不通先是張蛻菴翥嘗有詩云青州刺史河上墳墳不可識碑仍存維舟上讀半磨滅使君乃縁戚里恩當時賜葬宜過厚冢闕樹立湏雄尊豈知陵谷有遷變石馬盡沒龜趺蹲驛夫指我元傍岸縣官恐墜移高原岸濵徃徃多古冢零落空餘秋草根至今父老傳䜟記野人之語那足論我疑其藏必深錮或謂已被湍流吞安得壯士塞河水萬古莫令開墓門讀公之詩傷今之世則䜟緯之説誠不可誣矣真率㑹林昉田間書載㑹友人遊山檄云人有殘縑敗素繪一山一水愛之若寳售之必千金至於目與眞景㑹則略不加喜毋乃貴僞而賤真耶求樂之真今日正在我輩春雪既霽春風亦和或坐釣於鷗邊或行歌於犢外百年瞬息懽樂㡬何肴核盃盤隨意所命毋以豐約拘也檄書馳告盍勇而前此文殊清新向予避兵雲間泗濵時其地有林泉之勝而無烽燧之虞同時嘉遯者皆文人高士因倣司馬温公故事俾予作約語云百嵗光隂萬物乃天地逆旅四時行樂我輩亦風月主人幸居同泗水之濱况地接九山之勝儘可傍花隨柳庻㡬㳺目騁懐節序駸駸莫負芒鞵竹杖盃盤草草何慚野蔌山肴雖云一餉之清懽亦是百年之嘉話敢煩同志互作遨頭慨元祐之耆英衣冠逺矣集永和之少長觴咏依然訂約既勤踐言弗替用附於此以見真率之㑹不讓逰山之樂也珠簾秀歌兒珠簾秀姓朱氏姿容姝麗雜劇當今獨歩胡紫山宣慰極鍾愛之嘗擬沉醉東風小曲以贈云錦織江邊翠竹絨穿海上明珠月淡時風清處都隔斷落紅塵土一片閒情任卷舒挂盡朝雲暮雨馮海粟先生亦有鷓鴣天云十二闌干映逺眸醉香空㫁楚天秋鰕􅂡影薄㣲㣲見龜背紋輕細細浮香霧歛翠雲收海霞為帶月為鈎夜來捲盡西山雨不着人間半㸃愁皆咏珠簾以寓意也由是聲譽益彰漢兒字聖㫖至元丙子秋八月宋揚州守臣朱煥以城降後於煥之孫道存家欽覩世祖招諭詔㫖其文曰上天眷命大元皇帝聖㫖諭淮安州安撫朱煥據陳楚客奏臣與朱安撫同年又有通家之好自戊午歸順之後不相見者十有八載今王師弔伐諸道並進數内一路領漣河清河將士攻取淮東未附州郡切恐城䧟之日玉石俱焚臣於故人情分不容緘黙且彼所以嬰城自守者無他原其本心但未知趨向之方初無執迷抗拒之意今大江南北西至全蜀悉入版圖若蒙聖慈特發使命宣示徳音開其生路彼亦識時達變之士也寧不以數萬生靈為念乎臣昧死上言伏候勑㫖准奏今遣使特㫖前去宣布大信若能識時逹變可保富貴應在城守禦將帥同謀歸順者意不殊此故兹詔示想宜知悉至元十二年七月日白麻正書北方謂之漢兒字聖㫖此詔嵗月在城未降一載先則煥之來歸必先有所期矣煥之子徳輝承父廕仕至漢陽同知道存徳輝之子也亦以父廕仕至江隂知事既而復受僞周戸部主事之職將命揚州被執至淮安殺之弟兄子姪客居上海又悉死於苗獠之刼掠煥之宗族所遺殆無噍𩔖夫煥既不能盡忠於前而道存又不能盡忠於後􅀍執遭戮之地適在揚州淮安天之報施固其宜也謾書於此以為叛逆之勸碧瀾妾吳興趙公碧瀾宋宗室也老而益貧二妾方少艾慮無以安其心因遣之去咸弗肯嫁數獻肴酒致殷勤焉公於卒也覆諸水曰慎毋再見昔吾割情忍愛以去爾爾弗我忘祗攪我心耳既而各與其父母俱至泣而言曰妾家每歳請給足可養贍願執事終身為尼以報主恩公遂復留之他日公死果如所言公有寡女復資育之四明黄伯成先生玠嘗有詩曰感之以誠感必深應之以真應必㨗真情一合了弗離聽我長歌碧瀾妾碧瀾亦是諸王孫世殊事異老且貧少陵尚愛燕玉煖况是當時真貴人春衣典盡春寒峭二妾朱顔正姝好忍將羅帶拆同心懊恨浮生頭白早珠鈿翠靨幸僅存此時猶及嫁夫君十二樓頭燕子去揮手不可留仙裠去妾相悲兩相約既去猶煩送肴酌主君詎忍覆棄之見此翻令心緒惡一心專天天得知忍着主衣還事誰遂携衾襥與俱來後君死者當為尼碧瀾堂下雙溪水使客徃來豈知此不願新懽戀舊恩千萬人中兩人耳箕仙咏史懸箕扶鸞召仙徃徃皆古名人高士來格所作詩文間有絶佳者意必英爽不昧之鬼依馮精魄以闡揚其靈恠耳友人檇李顧元凱舜舉亦善此術嘗召一仙至大書曰獨樂園主也可命題衆以咏史請鸞不停留作成長篇自非熟於史學者弗能焉殊不知此等為何如鬼也詩曰三皇之前不可傳堯舜垂衣化自然夏衰商敗兵革起征討有罪非傳賢蒼姬種徳極深厚歴載八百何緜緜孔丘孟軻不得位唯有文字登書編春秋筆削嚴一字誅惡褒善持大權丘明作傳詳本末下迨戰國何茫然秦皇併吞六王畢始廢封建迷井田功高自謂傳萬世仁義不施徒託仙東遊弗返祖龍死赤靈火徳明中天漢朝文景稱至治刑措可比成康前無端雜用黄老術是以未得稱其全王莽賊臣簒漢祚賴有光武如周宣雲臺名將應列宿婉婉良䇿扶戎軒絶勝高祖􅊽彭越可比周召終天年崇儒徃謁曲阜廟典章燦燦羅星􅄤後人不省創業苦寵任閹宦皆貂蟬西園粥爵誠可恥黨錮忠士災何延一朝曹氏帝稱魏銅駝荆棘生荒烟關張早死後主弱典午自帝開坤埏五方雲擾亂中國五馬南渡何翩翩六朝興廢有得失豈知合併歸楊堅瓊花城裏建宫闕汴河春水浮龍船亂離思治否復泰唐室高祖催飛騫秦王神武不可及遂承天祚傳高𤣥大綱不正有慚色我嘗撫卷思其淵紛紛女禍握神器擾擾藩鎮横戈鋋乘輿避亂數奔竄翠華幾度遊西川黄巢殘賊不忍説白骨山積血成泉侵凌漸使唐祚絶江海雖大猶㳙㳙朱溫降將乃一賊僣號暫時得復失後唐石晉暨知逺但以功利不尚徳周家亦僣登天基獨有世宗明治術我朝列聖皆深仁天下蒼生得蘇息史書浩浩充屋棟人主欲觀寧遍及小臣纂集作通鑑治亂興亡明似日願言乙夜細垂觀比美成王戒無逸夫婦同棺張春兒葉縣軍士李青之妻也年二十青疾革顧謂春曰吾殆矣汝其善事後人春截髮示信誓弗再適未幾青死春慟垂絶且囑匠人曰造棺宜極大將以盡納亡者衣服􅃓劔之屬匠如其言既歛乃自經鄰里就用此棺同葬之事奏上于朝旌其墓時至正戊子也嗚呼春兒生長寒㣲不閑禮節尚知夫婦大義如此顧世之名門巨族動以衣冠自眩徃徃有夫骨未寒而求匹之念已萌于中者豈不為春兒萬世之罪人也與宋幼主詩寄語林和靖梅花㡬度開黄金臺下客應是不歸來此宋幼主在京都所作也始終二十字含蓄無限凄戚意思讀之而不興感者幾希孔掾史孔某者皇慶癸丑間為江浙省掾史身軀短小僅與堂上公案相等凡呈署牘文必用低凳閣足令高托歡丞相以其先聖子孫而且才學優長甚禮遇之時有詔許文正公從祀夫子廟庭公之子參知政事惡孔風度不雅因小過叱之退丞相曰他祖公容得參政父親坐參政反不容他一箇子孫立耶許大慚挽文教授詩至元間宋文丞相有子出為郡教授行數驛而卒人皆作詩以悼之閩人翁某一聨云地下修文同父子人間讀史各君臣獨為絶唱狷潔鄭所南先生思肖福州連江人宋太學上舎應博學宏詞科剛介有立志㑹天兵南叩闕上䟽犯新禁衆爭目之由是遂變今名曰肖曰南義不忘趙北面他姓也𨼆居吳下一室蕭然坐必南向嵗時伏臘望南野哭而再拜乃返人莫識焉誓不與朔客交徃或於朋友坐上見有語音異者便引去人咸知其狷㓗亦弗為怪工畫墨蘭不妄與人邑宰求之不得聞先生有田三十畆因脅以賦役取先生怒曰頭可斫蘭不可畫嘗自寫一㢧長丈餘高可五寸許天真爛漫超出物表題云純是君子絶無小人深山之中以天為春過齊子芳之書塾云此世但除君父外不曾别受一人恩寒菊云禦寒不籍水為命去國自同金鑄心其忠肝義膽於此可見晚年究竟性命之學以夀終鴈書零落風高恣所如歸期回首是春初上林天子援􅃓繳窮海纍臣有帛書中統十五年九月一日放鴈獲者勿殺國信大使郝經書于真州忠勇軍營新館右五十九字郝公書也公字伯常澤州陵川人世皇召居潜邸嵗己未扈従濟江授江淮宣慰司副使中統元年拜翰林侍讀學士充國信使宋館于真州凡十有六年始得歸此書當在至元十一年是時南北隔絶但知紀元為中統也先是有以鴈獻命畜之鴈見公輒鼓翼引吭似有所訴者公感悟擇日率從者具香案北向拜舁鴈至前手書尺帛親繫鴈足而縦之後虞人獲之􅁐中以聞上惻然曰四十騎留江南曽無一人鴈比乎遂進師南伐越二年宋亡至今祕監帛書尚存碑刻印識李和錢唐人國初時尚存粥故書為業尤精於碑刻凡博古之家或有贗本求一印識毅然弗從其印文李和鑒定石刻印九姑元女課吳楚之地村巫野叟及婦人女子輩多能卜九姑課其法折草九莖屈之為十八握作一束祝而呵之兩兩相結止留兩端已而抖開以占休咎若續成一條者名曰黄龍儻仙又穿一圏者名曰仙人上馬圏不穿者名曰蟢窠落地皆吉兆也或紛錯無緒不可分理則㓙矣又一法曰九天元女課其法折草一把不計莖數多寡茍用算籌亦可兩手隨意分之左手在上竪放右手在下横放以三除之不及者為卦一竪一横曰大陽二竪一横曰靈通二竪二横曰老君二竪三横曰太吳三竪一横曰洪石三竪三横曰祥雲皆吉兆也一竪二横曰太隂一竪三横曰懸崕三竪三横曰隂中皆凶兆也愚意俗謂九姑豈即九天元女歟離騷經云索璚茅以筳篿兮命靈氛為余卜注曰璚茅靈草也筳小破竹也楚人名結草折竹以卜曰篿據此則亦有所本矣白翎雀白翎雀者國朝教坊大曲也始甚雍容和緩終則急躁繁促殊無有餘不盡之意竊嘗病焉後見陳雲嶠先生云白翎雀生于烏桓朔漠之地雌雄和鳴自得其樂世皇因命伶人碩徳閭製曲以名之曲成上曰何其末有怨怒衰婺之音乎時譜已傳矣故至今卒莫能改㑹稽張思廉憲作歌以咏之曰真人一統開正朔馬上鞮鞻手親作教坊國手碩徳閭傳得開基太平樂檀槽􅞛呀鳯凰齶十四銀環挂冰索摩訶不作兠率聲聽奏筵前白翎雀霜皬皬風殻殻白草黄雲日色薄玲瓏碎玉九天來亂撒冰花灑毡幕玉翎琤珄起盤礴左旋右折入寥廓崒嵂孤高繞羊角啾啁百鳥紛叅錯須臾力倦忽下躍萬㸃寒星墜叢薄砉然一聲震雷撥一十四弦喑一抹鴐鵞飛起暮雲平鷙鳥東來海天濶黄羊之尾文豹胎玉液淋漓萬壽盃九龍殿高紫帳煖􅂿歌聲裏懽如雷白翎雀樂極哀節婦死忠臣摧八十一年生草萊鼎湖龍去何時回天下士漫浪野録云蘇子瞻泛愛天下士無賢不肖懽如也嘗自言上可以陪玉皇大帝下可以陪卑田院乞兒子由晦黙少許可嘗戒子瞻擇交子瞻曰吾眼前見天下無一箇不好人此乃一病以余言之先生天下士也此其所以汎愛天下士顧今之忌才嫉能口堯舜而心盜蹠者使先生視之乃土苴之不若矣輟耕録卷二十
