body:
  text: 輟耕録巻十五元陶宗儀撰淳化閣帖淳化閣帖非精扵鍳賞者莫能辨其真偽非博扵討論者不可得其源流第六巻中嘗記祖石刻之說今復究研大略於稽古之書質正是否扵好事之人用贅于此云宋太宗留意翰墨淳化中出御府所蔵命侍書王著臨榻以棗木鏤刻釐為一十巻扵每卷末題云淳化三年壬辰嵗十一月六日奉聖㫖模勒上石至仁宗又詔僧希白刻石于秘閣前有目録卷後無題世𫝊以為二王府帖者非也盖元祐中親賢宅從禁中借板墨百本但用潘谷墨光輝有餘而不甚黟黑又多木横裂紋時有皴皵失字處親賢宅魏王所居魏王二王也又有髙宗紹興中國子監本其首尾與淳化略無少異當時御前拓者多用匱紙盖打金銀箔者也自後碑工作蟬翼本且以厚紙覆板上𨼆然為銀鋌痕以愚人但損剥非復拓本之遒勁矣初徽宗建中靖國間出内府續所收書令刻石即今續法帖也大觀中又奉㫖摹榻歴代真跡刻石于太清樓字行稍髙而先後之次與淳化則少異其間數帖多寡不同各卷末題云大觀三年正月一日奉聖㫖摹勒上石此蔡京書也而以建中靖國續帖十巻易去嵗月名銜以為後帖又刻孫過庭書譜及貞觀十七帖總為二十二卷謂之大觀太清樓帖絳帖者尚書郎潘師旦以官帖摹刻于家為石本而𫝊冩字多譌舛世稱為潘駙馬帖凡二十卷其次序卷帖雖與淳化官帖不同而實則祖之特有所增益耳單炳文曰淳化官本法帖今不復多見其次絳帖最佳而舊本亦已艱得嘗以數本較之字畫多不侔煒家蔵舊本比之今本第九巻内今本多誤筆法且俗曹士冕曰帖總二十卷元無字號及斷眼數目單炳文曹士冕各有模刻本世𫝊潘氏析居法帖分而為二其後絳州公庫乃得其一扵是補刻餘帖名東庫本第九卷之舛誤盖始于此且逐卷逐叚各分字號以日月光天徳等二十字為次第後避金主亮諱但庾亮帖内亮字皆去右邊轉筆謂之亮字不全本又有新絳本北方别本武岡新舊本福清烏鎮彭州資州本木本前十巻等𩔖皆絳帖之别也潭帖者慶歴中劉丞相帥潭日以淳化官帖命慧照大師希白模刻于石置之郡齋增入傷寒十七日王濛顔真卿諸帖而字行頗髙與淳化閣本差不同逐卷有慧照大師希白重模字而嵗月各異中間繆處甚多朱文公譏其極為可笑者是也潭帖之别則有劉丞相私第本長沙碑匠新刻本三山木本蜀本廬陵蕭氏本等𩔖甚多戯魚即臨江帖也元祐間劉次荘以家蔵淳化閣帖十卷摹刻于戱魚堂除去題而増􅇚文慶元中四川總領權安節又重摹扵利州黔江者黔人秦世章扵長沙買石摹僧寳月古法帖十巻寳月慧照也謀舟載入黔中壁之黔江之紹聖院後題云長沙湯正臣重摹鼎帖板本校諸帖増益最多灃陽石刻散失僅存者右軍數帖而已又有淳熙修内司本北方印成本烏鎮張氏福清李氏本若此之𩔖大抵皆法帖一再之翻摹殊失筆意無足觀者汪逵字季路衢州人官至端明殿學士建集古堂蔵竒書秘蹟金石遺文二千巻著淳化閣帖辨記共十卷極為詳備末云其本乃木刻計一百八十四版二千二百八十七行其逐叚以一二三四刻扵旁或刻人名或有銀鋌印痕則是木裂其墨乃李廷珪墨黒甚如漆其字精明而豐􅃾比諸刻為肥劉潜夫曰近人多不識閣帖某家寳蔵本皆非真真者字極豐穰有神采如潭絳則太痩臨江則太媚又用李廷珪墨印造余始得汪端明所記閣帖行數恨無真帖㕘校晚使江左用二千楮致一本尤伯晦見之曰寳物也夫真帖可辨者有數條墨色一也他本刋巻數在上版數在下惟此本巻數版數字皆相聨屬二也他本行數字比帖字小而瘦此本行數字比帖中字皆大而濃三也余所得江左本每版皆全紙無接黏處一部十卷無一版不與端明所記合乃知昔人装背之際寧使每版行數或多或寡而不肯剪截湊合者欲舊帖之真面目四也幽圄太師丞相托克托之死盖副樞哈瑪爾與其弟蘓蘓并詹事僧格實哩等擠陷之也哈瑪爾輩得侍上帷幄而僧格在東宫為近侍故哈瑪爾黨僧格而私相誓曰若太師去位後我能作右相則左相必詹事矣既而入中書又虞僧格來其權不顓奏除宣政使而以弟蘇蘇為御史大夫僧格殊失望未幾哈瑪爾得罪杖死蘓蘓亦仰藥死初僧格有侍從人亦曰僧格實哩服勞執事得僧格意僧格舉充院宣使一日奄然長逝經日乃醒云方坐卧室榻上見二卒自外躍入導之往都城隍廟轉發嶽祠祠吏曰来矣可亟觧去旋又行入祠西北隅大林内有殿宇若王者居入拜殿下已仰視之則太師也太師曰我所攝者院使也於汝無預因俾左右引之觀幽圄見哈瑪爾兄弟括髪闗械頋僧格泣下及出太師謂曰汝可即歸此非人間世也退而覺恍若一夢然明日同寅有来約往院使家僧格辭疾且曰君幸毋泄吾恐院使不久生矣衆問其故告以詳皆相頋驚愕曰昨日院使將上馬以體少不安而入豈遽至此乎語未畢有報院使已暴卒近見浙西憲司經歴何伯大所說甚悉此特其略耳煑豆帖黄山谷煑豆帖云庭堅頓首失牛兒来終日惘然至今頭昏眼痛雖取所喜者為之亦不能如意也以是不能修問辱手誨喜承日用輕安所湏諸方既無人可抄又意緒不佳嬾動耳煑黑豆法確豆一升挼莎極浄用貫衆一斤細剉如骰子同豆斟酌水多少慢火煑豆香熟日乾之翻覆令展盡餘汁簸取黑豆去貫衆空心日㗖五七粒食百草木枝葉皆有味可飽也世間不强學力行自致扵古人者不可不畜此方庭堅頓首翰禮秘校足下妓妾守節妓妾之以色藝取憐妬寵扵主家者亦曰我之富與貴有以感動其中耳設遇患難貧病彼必戚戚然求為脫身之計又肯守志不貳者哉如金谷園緑珠燕子樓盼盼韓香之扵葉氏愛愛之扵張逞者真絶無而僅有也大元混一以来得三人焉李翠娥維揚名娼也石九山萬户納置别業石没李誓不適他姓以辱身終日閉閣誦經而已年及七十餘萬户之子若孫遇嵗時咸往拜之樂籍中相傳以為盛事王巧兒京師上色也陳雲嶠同知與之狎擕至杭陳卒奉正室鐵氏以清慎勤儉終其身汪憐憐湖州角妓也訥古伯經歴常屬意焉汪曰君若不棄寒㣲當以側室處妾䑕竊狗偷妾决不為此態訥乃遣媒妁備財禮娶之經三載死汪髠髮尼寺時公卿士夫有往訪之者汪故毁其身形以絶狂念卒老于尼若此者亦可以追踪前古之懿徳矣與妓下火文錢唐道士洪丹谷與一妓通因娶為室病且革頋謂洪曰妾死在旦夕卿湏自執薪還肯作一轉語乎夫妾歌兒也卿能集曲調扵妾未死時使預聞之雖死無憾矣洪固滑稽輕佻者遂作文曰二十年前我共伊只因彼此太癡迷忽然四大相離後你是何人我是誰恭惟稱呼秀鍾谷水聲遏楚雲玉交枝堅一片心錦傳道餘二十載遽成如夢令休憶少年逰哭相思兩手託空意難􅁯一筆勾斷且道如何是一筆勾斷孝順哥終無孝順逍遥樂永遂逍遥聴畢一笑而卒因記中吴紀聞載一事云崑山娼周氏係籍部中張子韶為守時娼暴亾適道川来訪因命作下火文云可惜許可惜許大家且道可惜許箇甚麽可惜巫山一段雲眼如新水㸃絳唇昔年繡閣迎仙客今日桃源憶故人休記醜奴兒臉子便湏抖擻好精神南柯夢斷如何也一曲離愁别是春大衆還知某人向甚麽處去這裏分明㑹得驀山溪畔頭頭盡是喜相逢芳草渡頭處處六么花十八其或未然更聽下句咦與君一把無明火燒盡千愁萬恨心其事頗相𩔖併附于此云賀人妾得子啟陸伯麟側室育子友人陸象翁以啓戱賀之曰犯簾前禁尋竈下盟玉雖種扵藍田珠將還於合浦移夜半鷺鷥之歩㡬度驚惶得天上麒麟之兒這囘喝采既可續詩書禮樂之脉深嗅得油鹽醤醋之香蘇東坡咏婢謔詞有掲起裙兒一陣油鹽醤醋香之句弔四狀元詩平江一驛舟中有題弔四狀元詩者不知誰所作詩曰四榜状元逢此日他年公論定難逃空令太守提三尺不見元戎用六韜元舉何如兼善死公平争似子威髙世間多少偷生者黄甲由来出俊髦元舉王宗哲字也至正戊子科三元進士時為湖廣憲僉兼善台哈布哈字也時為台州路逹嚕噶齊公平李齊字也時為髙郵府知府子威李黼字也時為江州路總管此四公者或大􅃜臣節或盡忠王事或遇難而亾故云若論其優劣則江州第一台州次之髙郵又次之憲僉不足道也雞妖至正丁酉春三月上海李勝一家雞伏七雛一雛作大雞状鼓翼長鳴明年戊戌春正月錢唐盧子明家一雞伏九雛一雛有三足二足在前一足在後三月諸暨𡊮彦城家一雞伏五雛一雛有四足二足在翼下不數日皆死而各家亦無他異胡烈女越嵊縣剡溪胡氏諱妙端適同邑祝某至正庚子春為苖䝤虜至金華縣将妻之義不受辱乘間嚙指血題詩壁上已赴水而死三月廿四日也䝤帥服其節為立廟祀之邑人咸曰烈女廟詩曰弱質空懐漆室憂捜山千騎入深幽旌旗影亂天同慘金鼓聲淫鬼亦愁父母劬勞何日報夫妻恩愛此時休九泉有路還歸去那箇雲邊是越州鼃獄盧伯玉文璧至正初尹荆山日忽有一巨鼃登㕔前兩目瞠視𩔖有所訴者令卒尾之行去縣六七里有廢井遂跳入不出既得報往集里社汲井獲死屍乃兩日前二人同出為商一人謀其財而殺之掩捕究問抵罪死者之家屬云其在生不食鼃見即買放豈一念之善為造物者固已鍳之鼃能雪寃良有以也沁園春宋劉改之先生造詞贍逸有思致賦沁園春二首以咏美人之指甲與足者尤纎麗可愛一曰銷薄春氷碾輕寒玉漸長漸彎見鳯鞵泥汙偎人强剔龍涎香斷撥火輕翻學撫瑶琴時時欲剪更掬水魚鱗波底寒纎柔處試摘花香滿鏤棗成斑時將粉淚偷彈記綰玉曾敎栁傅看算恩情相著搔便玉體歸期暗數畫徧䦨干每到相思沉吟静處斜倚朱唇皓齒間風流甚把仙郎暗搯莫放春閒一曰洛浦淩波為誰㣲歩輕塵暗生記􅂿花芳徑亂紅不損歩苔幽砌嫩緑無痕襯玉羅慳銷金様窄載不起盈盈一叚春嬉㳺倦笑敎人欵捻㣲褪些根有時自度歌聲悄不覺㣲尖㸃拍頻憶金蓮移換文鴛得侣繡茵催衮舞鳯輕分懊恨深遮牽情半露出没風前煙縷裙知何似似一鉤新月淺碧籠雲近邵清溪亨貞嗣其體調以咏眉目真雋永有味一曰巧鬭彎環纎凝嫵媚明装未收似江亭曉望遥山拂翠宫簾暮捲新月横鉤掃黛嫌濃塗鉛訝淺能畫張郎不自由傷春倦為皺多無力翻做嬌羞填来不滿横秋料著得人間多少愁記魚箋緘啟背人偷歛鴈鈿膠併運指輕揉有喜先占長顰難效栁葉輕黄金在否雙尖鎖試臨鸞一展依舊風流一曰漆㸃填眶鳯稍侵􅁂天然俊生記隔花瞥見踈星烱烱倚䦨凝注止水盈盈端正窺簾瞢騰並枕睥睨檀郎長是青端相乆待嫣然一笑宻意將成困酣曾􅀍鶯驚强臨鏡挼挱猶未醒憶帳中親見似嫌羅宻尊前相頋翻怕燈明醉後看承歌䦨鬭弄㡬度孜孜頻送情難􅁯處是鮫綃揾透别淚雙零恭敏坊李恭敏公者所居在江隂之南門其門首巷坊亦題曰恭敏不知當日名坊之義而七八十年来子孫消削第宅傾圯殆盡棄遺故址竟為里豪薛得昭所吞土木一新鄉閭徤羡忽有人獻謟扵薛云若不除去舊坊終非君家利也薛深然之指數恭敏之族尊且長者惟李唐卿可主其事乃呼至贈泉百緡李欣然撤之一夕囈語呻吟甚苦妻急呼之覺問其故曰我夢見袍笏大官自云是我祖責以不能世守其業又毁其坊既罵且撻我負痛呌號故致此耳語既暴死莫救又數年城燬扵兵薛氏室屋財産悉空貧無為計遂執幹役扵時貴之家噫子孫之不肖强覇之用心皆可為後人鍳也𨼆趣余家天台萬山中茅屋可以芘風雨石田可以具饘粥雖行江海上而泉石草木之勝未嘗不在夢寐時見也偶讀廬陵羅景綸大經所著鶴林玉露曰唐子西云山静似太古日長如小年余家深山之中每春夏之交蒼蘚盈階落花滿逕門無剥啄松影參差禽聲上下午睡初足旋汲山泉拾松枝煑苦茗啜之随意讀周易國風左氏𫝊離騷太史公書及陶杜詩韓蘇文數篇從容歩山徑撫松竹與麛犢共偃息扵長林豐草間坐弄流泉潄齒濯足既歸竹窓下則山妻稚子作筍蕨供麥飯欣然一飽弄筆窓間随大小作數十字展所蔵法帖墨蹟畫卷縦觀之興到則吟小詩或草玉露一兩叚再烹苦茗一杯出歩溪邊邂逅園翁溪友問桑麻說秔稲量晴校雨探節數時相與劇談一餉歸而倚杖柴門之下則夕陽在山紫緑萬状變幻頃刻恍可人目牛背笛聲兩兩来歸而月印前溪矣味子西此句可謂絶妙然此句妙矣識其妙者盖少彼牽黄臂蒼馳獵扵聲利之塲者但見衮衮馬頭塵匆匆駒隙影耳烏知此句之妙哉人能真知此妙則東坡所謂無事此静坐一日是兩日若活七十年便是百四十所得不已多乎此羅君語也余盖亦知此妙乆矣風塵􅐓洞豺虎咬人㡬賦歸與之詩計無所得又未知何日可以遂吾志也掩卷為之三嘆日書三萬字江浙平章子山公書法妙一時自松雪翁之後便及之嘗問客有人一日能寫得幾字客曰聞趙學士言一日可寫萬字公曰余一日寫三萬字未嘗以力倦而輟筆公號正齋恕叟又號蓬累叟康里人妓出家李當當者敎坊名妓也姿藝超出輩流忽翻然若有所悟遂著道士服江浙儒學提舉叚吉甫先生天祐贈之以詩曰歌舞當今第一流洗妝拭面别青樓便随南嶽夫人去不為蘇州刺史留璚館月明簫鳯下綺窓雲散鏡鸞收却嫌癡絶潯陽婦嫁得商人已白頭能改齋漫録云唐陽郇伯作妓人出家詩曰盡出花鈿與四隣雲鬟剪落向殘春暫驚風燭難留世便是池蓮不染身貝葉欲翻迷錦字梵聲初落誤梁塵従今艶色歸空後湘浦應無觧佩人湘山野録乃謂陳彭年作此不考之過也吁二先生之風流餘韻扵此可以想見矣河南王河南王布琳濟達為本省丞相時一日掾吏田榮甫抱牘詣府請印王留田侍宴命司印開匣取印至前田誤觸墜地王適更新衣而印朱濺汙滿襟王色不少動歡飲竟夕又一日行郊天氣且暄王易凉帽左右捧笠侍風吹堕石上擊碎御賜玉頂王笑曰是有數也諭令毋懼噫此其所以為丞相之量妖異至正辛卯夏松江普照寺僧舍一弊帚開花又嘉興儒學閽人陶氏磨上木肘發青條開白花又吴江分湖里煆工一栁樹樁以安鐵碪者且十餘年矣發長條數莖如葦三家雖有此怪而皆無恙豈非闗係國家之氣數乎塔影入屋平江虎丘閣版上有一竅當日色清朗時以掌大白紙承其影則一寺之形勝悉扵此見之但頂反居下耳此固有象可寓非幻出者松江城中有四塔西曰普照又西曰延恩西南曰超果東南曰興聖夏監運家乃在四塔之東而小室内却有一塔影長五寸許倒懸于西壁之上不知從何而来然不常有或時見之焉是又不可曉也錢唐懐古詞傅按察者􅁯其名錢唐懐古嘗作一詞云静中看記昔日湖山𨼆𨼆宛若虎踞龍蟠下襄樊指揮湘漢鞭雲騎圍繞江干勢不成三時當混一過唐之數不為難陳橋驛孤兒寡婦乆假當還掛征㠶龍舟催發紫宸初卷朝班禁庭空土花暈碧輦路悄訶喝聲乾縦餘得西湖風景花栁亦凋殘去國三千㳺仙一夢依然天淡夕陽間昨宵也一輪明月還照臨安盖鴨頭緑調也人命至重後至元間同知兩浙都轉運鹽使司事趙君伯常休日與書吏談官府政事因曰吾曩為中書提控掾史時夜坐私第一室忽有兩𨽻来前𫝊都堂鈞㫖呼喚遂即上馬頴前導至一官府樹木隂翳大官危坐聽事上問曰河南饑省咨至乃緩七日不報彼處死者甚衆汝知之乎吾答曰某提控耳該掾稽遲之罪已嘗呈舉官沉思良久曰非汝過也汝退又命前𨽻曰可急追該掾某人来吾遂夢覺也明日晨起令人覘之夜暴死矣人命至重爾輩其愼之度量宏深建德路達嚕噶齊衮都羅丹字志道守贑州路任滿聽除時有故吏某往臨江貼補介衮都羅丹尺牘見總管穆巴喇即日録用就遣某持俸鈔五十定餽之時衮都羅丹家甚貧朋友間每分財以濟某竟匿其鈔後穆巴喇數得書而謝不及疑焉因使問之衮都羅丹知為某匿即具書請失謝之罪某聞惶赧無地令兒子奉鈔還終不受且為𨼆其惡未嘗與人言衮都羅丹西域人也度量之宏深如是可謂厚德君子矣若某者名教中所不可容尚孰責哉髙麗氏守節中書平章庫庫岱之側室髙麗氏有賢行平章死誓弗貳適正室子巴特瑪多爾濟說其色欲妻之而不可得乃以其父所有大塔納環子獻扵太師巴延此物盖巴延所屬意者巴延喜問所欲遂白前事巴延特為奏聞奉㫖命巴特瑪多爾濟收繼小母髙麗氏髙麗氏夜與親母踰垣而出削髮為尼巴延怒以為故違聖㫖拜奏命省臺洎侍正府官鞫問諸官奉命惟謹鍜錬備極慘酷時國公庫哩濟蘓扵鞫問官中獨秉權力持正府都事特穆爾布哈數致語曰誰無妻子安能相守至死得有如此守節者莫大之幸而反坐以罪恐非我治朝之盛典也國公悟為言扵巴延之前宛曲觧釋其事遂已特穆爾布哈漢名劉正卿後至監察御史而卒寒號蟲五臺山有鳥名寒號蟲四足有肉翅不能飛其糞即五靈脂當盛暑時文采絢爛乃自鳴曰鳯凰不如我比至深冬嚴寒之際毛羽脫落索然如鷇雛遂自鳴曰得過且過嗟夫世之人中無所守者率不甘湛涪鄉里必振拔自豪求尺寸名詫九族儕𩔖則便志滿意得出肆入揚以為天下無復我加矣及乎稍遇貶抑遽若䘮家之狗垂首貼耳揺尾乞憐惟恐人不我恤視寒號蟲何異哉是可哀已鄧思賢嘗見人戱呼一譁訐者為鄧思賢初不可曉後讀筆談始得其說云世𫝊江西人好訟有一書名鄧思賢皆訟牒法也其始則教以侮文侮不可得則欺誣以取之欺誣不可得則求其罪刦之盖思賢人名也人𫝊其術遂以名書村校中往往以授生徒醫科醫有十三科考之聖濟總録大方脉雜醫科小方脉科風科産科兼婦人雜病科眼科口齒兼咽喉科正骨兼金鏃科瘡腫科鍼灸科祝由科則通兼言輟耕録巻十五欽定四庫全書輟耕録卷
