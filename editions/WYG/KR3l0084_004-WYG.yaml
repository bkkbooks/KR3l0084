body:
  text: 輟耕録卷四元陶宗儀撰發宋陵寢吳興王筠菴先生國器示余所藏唐義士𫝊讀之不覺令人泣下謹録之𫝊曰辛亥秋友人端容倪君過余溪上示游杭雜藁中有識唐玉潛事一篇余讀大驚頓足起立曰異哉今世乃有此人有此事願詳告我容乃言曰唐君名珏字玉潛會稽山隂人家貧聚徒授經營滫􅔱以養其母歲戊寅有總江南浮屠者楊璉真珈怙恩横肆埶燄爍人窮驕極淫不可具狀十二月十有二日帥徒役頓蕭山發趙氏諸陵寢至斷殘支體攫珠襦玉柙焚其胔棄骨草莽間唐時年三十二歲聞之痛憤亟貨家具得白金百星許執券行貸得白金又百星許乃具酒醪市羊豕邀里中少年若干輩狎坐轟飲酒且酣少年起請曰君儒者若是將何為焉唐慘然具以告願收遺骸共瘞之衆謝曰諾中一少年曰發丘中郎將耽耽餓虎事露奈何唐曰余固籌矣今四郊多暴骨取竄以易誰復知之乃斵文木為匱複黄絹為囊各署其表曰某陵某陵分委而散遣之蕝地以藏為文而告詰旦事訖來集出白金羡餘酬戒勿泄越七日總浮屠下令裒陵骨雜置牛馬枯骼中築一塔壓之名曰鎮南杭民悲戚不忍仰視了不知陵骨之猶存也禍淫不爽流𫝊京師上達四聰天怒赫赫飛風雷號令捽首禍者北焉山隂人始有藉藉𫝊唐氏者由是唐之義風震動吳越聲生埶長若胥江掀八月之濤名雖髙困固自若明年己卯後上元兩日唐出觀燈歸忽坐􅯠息奄奄若將絶者良久始蘇曰吾見黄衣吏持文書來告曰王召君導我往觀闕巍峩宫宇靚麗殆非人間有一冕旒坐殿上數黄衣貴人逡巡降揖曰藉君掩骸其有以報唐乃陞謁造王前王謂曰汝受命窶且貧兼無妻若子今忠義動天帝命錫汝伉儷子三人田三頃拜謝降出遂覺罔不知其何也踰時越有治中𡊮俊齋至始下車為子求師有以唐薦者一見置賔館一日問曰吾渡江聞有唐氏瘞宋諸陵骨子豈其宗耶左右指君曰此是已𡊮大駭拱手曰君此舉豫讓不能抗也曳之坐北面而納拜焉禮敬特加情欵益篤叩知家徒四壁惻然嗟矜語左右曰唐先生家甚寒吾當料理使有妻有田以給左右逢迎爰諏爰度不數月二事俱愜聘婦偶故國之公女負郭食故國之公田所費一一自𡊮出人固奇唐之節而又竒唐之遇兩高之曰二公真義士義士爾後獲三丈夫子鼎立頎頎凡夢中神所許稽其數無一不合咄咄怪事乃如此唐葬骨後又於宋常朝殿掘冬青樹植於所函土堆上作冬青行二首曰馬箠問髐形南面欲起語野麕尚屯束何物敢盜取餘花拾飄蕩白日哀后土六合忽怪事蛻龍掛茅宇老天鑒區區千載䕶風雨又曰冬青花不可折南風吹涼積香雪遥遥翠蓋萬年枝上有鳳巢下龍穴君不見犬之年羊之月劈歴一聲天地裂復有夢中詩四首曰珠亡忽震蛟龍睡軒弊寧忘犬馬情親拾寒瓊出幽草四山風雨鬼神驚一坏自築珠邱土雙匝親𫝊竺國經只有春風知此意年年杜宇哭冬青昭陵玉匣走天涯金粟堆寒起莫鴉水到蘭亭轉嗚咽不知真帖落誰家珠鳬玉鴈又成埃斑竹臨江首重回猶憶年時寒食節天家一騎奉香來余客錢唐久熟悉其事唐至今無恙靈卿既具聞始末謂端曰江左運窮天水源涸宋之亡非有商辛流毒為白旄黄鉞之招也直以千載河清六合埶一大火運移海濱道盡卧榻側難容他人鼾睡耳聖朝量包覆燾恩完獝狨喣育亡國遺嗣坦無驚猜何物異端無忌憚敢爾至今言之可為痛哭已抑吾不能無慨異時會稽近畿世家林邱雖蓬萊清淺陵岸變遷豈無一二慷慨僅存者卓哉斯舉乃出閭里一寒士何歟豈所養非所用而民彞物則獨具於埶卑位下者之資禀與余又怪世之言命者窮通禍福罔不在厥初生一成而不可變今忠義所感定命靡常六極轉移易若反掌乃知元命自作多福自求樞機由人雖天有所不能制聖言豈欺我哉一分行通神明捷於影響况力又有大者其積彌厚其澤當彌長又可以槩量乎哉吾謂趙氏昔者家已破程嬰公孫杵臼強有其真孤今者國已亡唐君玉潛匱藏其真骨兩雄力當無能優劣以其繫人倫關世教有足多尚援筆以紀待編野史者采焉此雲溪羅先生有開所撰也先生徳興人董石林吉翁題其後曰釋燄熏天墨毒殘骨不啻鞭屍刖骸之慘埶張威懾孰攫其鋒儒流唐進士念世籍陽和生育雨露涵濡之恩忠憤激發毁室捐貲仗義集儔潛遺骼於暴露之後拔游魂於獸髑之中身首免異處支體脫烈炎視漆身隕鉞者盡在下風精誠動天奇節震世錫佳麗偶送麒麟兒陽施隂報捷若影響善者勸矣詹厚齋載道復題曰嘗疑武王伐商劒鉞斬擊事竊意王者之師未必爾也紂死矣既擊之又斷其首注太白不已甚乎當時舉天下無非之者而西山餓夫獨非之昌􅀺頌之曰若伯夷者特立獨行窮天地亘萬古而不顧者也會稽諸陵非有商辛之虐不幸而遭樊崇當時曾無一人動孟陽之哀者嗚呼痛哉唐生一寒士耳其埶位非如孤竹君之子徒以故國遺􅀺不忍視其上之人之禍之慘憤激於中毁家取義為人所不敢為於不可為之時深謀祕計全而歸之智名勇功足以驚世絶俗視伯夷固未易同日語而一念之烈行之而不顧豈非韓子所謂千百年乃一人者與余讀羅君所為𫝊為之掩卷泣下嗚呼尚忍言哉天地惟一感應之理有感必應其得報固其理耳不然天者有時而難必神者有時而難明善者怠矣厥後越有新治中來聞其事異其人下車首物色得之亟拜亟為禮羅而致之館下又從而振徳之唐固義士治中亦偉人皆出秉􅂜好徳之真微唐君不能成治中之義微治中不能著唐君之忠是大有功於人倫世教者也此𫝊之所以不可不作也皇慶二年夏五月題及見遂昌鄭明徳先生元祐所書林義士事蹟云宋太學生林徳陽字景曦號霽山當楊總統發掘諸陵寢時林故為杭丐者背竹籮手持竹夾遇物即以夾投籮中林鑄銀作兩許小牌百十繫腰間取賄西畨僧曰餘不敢望收其骨得髙家孝家斯足矣番僧左右之果得髙孝兩朝骨為兩函貯之歸𦵏於東嘉其詩有夢中作一十首其一絶曰一坏未築珠宫土雙匣親𫝊竺國經只有東風知此意年年杜宇哭冬青又曰空山急雨洗岩花金粟堆寒起莫鴉水到蘭亭更嗚哽不知真帖落誰家又曰喬山弓劎未成灰玉匣珠襦一夜開猶記去年寒食日天家一騎捧香來餘七首猶悽怨則忘之葬後林於宋常朝殿掘冬青一株置於所函土堆上又有冬青花一首曰冬青花冬青花花時一日腸九折隔江風雨清影空五月深山落微雪石根雲氣龍所藏尋常螻螘不敢穴移來此種非人間曾識萬年觴底月蜀魂飛繞百鳥臣夜半一聲山竹裂又一首有曰君不記羊之年馬之月劈歴一聲山石裂聞其事甚異不欲書若林霽山者其亦可謂義士也已此五詩與前所録語句微不同詩中有雙匣字則是收兩陵骨之意得非林義士詩羅雲溪以𫝊者之誤而寫入傳中者乎但曰移宋常朝殿冬青植所函土上而作冬青詩吾意會稽去杭止隔一水或者可以致之若夫東嘉相望千餘里豈能容易持去縱持去又豈能不枯瘁作如此想則又疑是唐義士詩且𦵏骨一事豈唐方起謀時林已先得髙孝兩陵骨邪抑得唐所易之骨邪蓋各行其所志不相知會理固有之載考之齊人周草牕先生密癸辛雜識所記云至元二十二年乙酉八月楊髠發陵之事起於天長寺福僧聞號西山者成於演福寺剡僧澤號雲夢者初天長乃魏憲靖王墳寺聞欲媚楊髠遂獻其寺旋又發魏王冢多得金玉以此起發陵之想澤一力贊成之俾泰寧寺僧宗愷宗允等詐稱楊侍郎汪安撫侵占寺地為名告詞出給文書將帶河西僧及凶黨如沈照磨之徒部令人夫發掘時有中官陵使羅銑者守陵不去與之極力爭執為澤痛箠脇之以刃令人逐去大哭而出遂先啓寧宗理宗度宗楊后四陵劫取寳玉極多惟理宗之陵所藏尤多啓棺之初有白氣亘天蓋寳氣也理宗之屍如生其下皆藉以錦錦之下承以竹絲細簟一小厮攫取擲地有聲乃金絲所成或對云含珠有夜明者乃倒懸其屍樹間瀝取水銀如此三日竟失其首或謂西番僧回回其俗以得帝王髑髏可以厭勝致富故盜去耳事竟羅陵使買棺製衣收歛大慟垂絶隣里為之感泣是夕聞西山皆有哭聲凡晝夜不絶至十一月復發徽欽髙孝光五帝陵孟韋吳謝四后陵初欽徽葬五國城數遣使祈請於金人欲歸梓宫凡六七年而後許以梓宫還行在髙宗親至臨平奉迎易緦服寓于龍徳别宫一時朝野以為大事諸公論功受賞費於官帑者不貲先是選人楊偉貽書執政乞奏聞命大臣取神櫬之最下者斵而視之既而禮官請用安陵故事梓宫入境即承之以槨仍納衮冕翬衣於槨中不改斂從之至此被發掘欽徽二陵皆空無一物徽陵有朽木一段欽陵有木燈檠一枚而已蓋當時已料其真偽不可知不欲逆詐亦以慰一時之人心耳而二帝遺骸浮沉沙漠初未嘗還也髙宗陵骨髪盡化畧無寸餘止錫器數件端硯一隻硯為澤所得孝陵亦蛻化無餘止頂骨小片内有玉罏瓶一副古銅鬲一隻亦為澤所得昔聞有道之士能蛻骨而仙未聞并骨蛻者真天人也若光寧與諸后儼然如生羅陵使亦如前棺歛後悉從火化可謂忠且義矣當與張承業同𫝊陵中金錢以萬計皆為屍氣所蝕如銅鐵狀以故諸兇棄而不收往往為村民所得聞有得猫晴異寳者一村翁於孟后陵得一髻其髻長六尺餘其色紺碧髻根有短金釵遂取以歸以其帝后遺物􅍥置佛堂中奉事之自此家道寖豐凡得金錢之家非病即死翁恐甚亟送龍洞中而此翁今成富家矣方移理宗屍時澤在傍以足蹴其首以示無懼隨覺奇痛一㸃起於足心自此苦足疾數年以致潰爛雙股墮落十指而亡聞既得志且富不義之財復倚楊髠埶豪奪鄉人産業後為鄉夫二十人伺道間屠而臠之罪不加衆各不過受杖而已其愷與楊髠分􅂍不平已受杖死尚有允在據此說則雲溪所傳歲月絶不同蓋嘗論之至元丙子天兵下江南至乙酉將十載版圖必已定法制必已明安得有此事然戊寅距丙子不三年竊恐此時庶事草創而妖髠得以肆其惡與妖髠就戮羣兇接踵隕於非命天之所以禍淫者亦嚴矣但云髙宗陵骨髪盡化孝宗陵頂骨小片不知唐義士所易者何骨也林義士所收者又何骨也惜余生晩不及識宋季以來老儒先生以就正其是非姑以待熟兩朝典故之人問焉相術國初有李國用者自北來杭能望氣占休咎能相人其人崖岸倨傲而時貴咸敬之謝后諸孫字退樂者設早饌延致至即據中位省幕官皆坐下坐不得其一言以及禍福時趙文敏公謂之七司户與謝婣戚屈來同飯文敏公風瘡滿面李遥見即起迎謂坐客曰我過江僅見此人耳瘡愈即面君公輩記取異日官至一品名聞四海方襄陽未破時世皇命其即軍中望氣行踰三兩舍遄還奏曰臣見卒伍中往往有台輔器襄陽不破江南不平置此人於何地噫李之術亦神矣國用登州人嘗為卒遇神仙教以觀日之法能洞見肺腑世稱神相前輩謙讓延祐間興聖宫成中官李丞相邦寧𫝊奉太后懿㫖命趙集賢孟頫書額對曰凡禁扁皆李雪菴所書公宜奏聞既而命李趙偕至雪菴處雪菴曰子昂何不書而以屬吾邪李因具言之雪菴遂不固辭前輩推讓之風豈後人所可企哉不茍取胡汲仲先生長儒號石塘特立獨行剛介有守趙松雪嘗為羅司徒奉鈔百錠為先生潤筆請作乃父墓銘先生怒曰我豈為宦官作墓銘邪是日先生正絶糧其子以情白坐上諸客咸勸受之先生卻愈堅觀此則一毫不茍取於人從可知矣故雖凍餒有所不顧也先生送蔡如愚歸東陽詩有云薄糜不繼襖不煖謳吟猶是鍾球鳴語之曰此余祕密藏中休糧方也論詩虞伯生先生集楊仲𢎞先生載同在京日楊先生每言伯生不能作詩虞先生載酒請問作詩之法楊先生酒既酣盡為傾倒虞先生遂超悟其理繼有詩送𡊮伯長先生桷扈駕上都以所作詩介他人質諸楊先生先生曰此詩非虞伯生不能也或曰先生嘗謂伯生不能作詩何以有此曰伯生學問髙余曾授以作詩法餘莫能及又以詣趙魏公孟頫詩中有山連閣道晨留輦野散周廬夜屬櫜之句公曰美則美矣若改山為天野為星則尤美虞先生深服之故國朝之詩稱虞趙楊范揭焉范即徳機先生椁揭即曼碩先生傒斯也嘗有問於虞先生曰仲𢎞詩如何先生曰仲𢎞詩如百戰健兒徳機詩如何曰徳機詩如唐臨晉帖曼碩詩如何曰曼碩詩如美女簪花先生詩如何笑曰虞集乃漢廷老吏蓋先生未免自負公論以為然賢妻致貴程公鵬舉在宋季被虜於興元版橋張萬戸家為奴張以虜到宦家女某氏妻之既婚之三日即竊謂其夫曰觀君之才貌非久在人後者何不為去計而甘心於此乎夫疑其試已也訴於張張命箠之越三日復告曰君若去必可成大器否則終為人奴耳夫愈疑之又訴於張張命出之遂粥于市人家妻臨行以所穿繡鞵一易程一履泣而曰期執此相見矣程感悟奔歸宋時年十七八以䕃補入官迨國朝統一海宇程為陜西行省參知政事自與妻别已三十餘年義其為人未嘗再娶至是遣人擕向之鞵履往興元訪求之市家云此婦到吾家執作甚勤遇夜未嘗解衣以寢每紡績達旦毅然莫可犯吾妻異之視如己女將半載以所成布匹償元粥鏹物乞身為尼吾妻施貲以成其志見居城南某菴中所遣人即往尋見以曝衣為由故遺鞵履在地尼見之詢其所從來曰吾主翁程參政使尋其偶耳尼出鞵履示之合亟拜曰主母也尼曰鞵履復全吾之願畢矣歸見程相公與夫人為道致意竟不再出告以參政未嘗娶終不出旋報程移文本省遣使檄興元路路官為具禮委幙屬李克復防護其車輿至陜西重為夫婦焉奇遇揭曼碩先生未達時多游湖湘間一日泊舟江涘夜二鼓攬衣露坐仰視明月如晝忽中流一櫂漸近舟側中有素妝女子歛袵而起容儀甚清雅先生問曰汝何人荅曰妾商婦也良人久不歸聞君逺來故相迎耳因與談論皆世外恍惚事且云妾與君有夙縁非同人間之淫奔者幸勿見卻先生深異之迨曉戀戀不忍去臨别謂先生曰君大富貴人也亦宜自重因留詩曰盤塘江上是奴家郎若閒時來喫茶黄土築牆茅蓋屋庭前一樹紫荆花明日舟阻風上岸沽酒問其地即盤塘鎮行數步見一水仙祠墻垣皆黄土中庭紫荆芬然及登殿所設像與夜中女子無異余往聞先生之姪孫立禮說及此亦一奇事也今先生官至翰林侍講學士可知神女之言不誣矣賢烈戴石屏先生復古未遇時流寓江右武寧有富家翁愛其才以女妻之居二三年忽欲作歸計妻問其故告以曾娶妻白之父父怒妻宛曲解釋盡以奩具贈夫仍餞以詞云惜多才憐薄命無計可留汝揉碎花牋忍寫斷腸句道傍楊柳依依千絲萬縷抵不住一分愁緒捉月盟言不是夢中語後回君若重來不相忘處把杯酒澆奴墳土夫既别遂赴水死可謂賢烈也矣挽文丞相詩宋丞相文公天祥其事載在史冊雖使三尺之童亦能言其忠義翰林學士徐威卿先生世隆有詩挽之曰大元不殺文丞相君義臣忠兩得之義似漢王封齒日忠如蜀將斫顔時乾坤日月華夷見嶺海風霜草木知只恐史官編不盡老夫和淚寫新詩可謂善風刺者矣虞伯生先生集亦有詩曰徒把金戈挽落暉南冠無奈北風吹子房本為韓仇出諸葛安知漢祚移雲暗鼎湖龍去逺月明華表鶴歸遲何須更上新亭飲大不如前灑淚時讀此二詩而不泣下者幾希禱雨往往見蒙古人之禱雨者非若方士然至於印令旗劎符圖氣訣之𩔖一無所用惟取淨水一盆浸石子數枚而已其大者若雞卵小者不等然後黙持密呪將石子淘漉玩弄如此良久輙有雨豈其靜定之功已成特假此以愚人耳抑果異物耶石子名曰鮓荅乃走獸腹中所産獨牛馬者最妙恐亦是牛黄狗寳之屬耳廣寒秋虞邵菴先生集在翰苑時宴繖薩爾學士家歌兒郭氏順時秀者唱今樂府其折桂令起句云博山銅細裊香風一句而兩韻名曰短柱極不易作先生愛其新奇席上偶談蜀漢事因命紙筆亦賦一曲曰鸞輿三顧茅廬漢祚難扶日莫桑榆深渡南瀘長驅西蜀力拒東吳美乎周瑜妙術悲夫關羽云殂天數盈虚造物乘除問汝何如早賦歸歟蓋兩字一韻比之一句兩韻者為尤難先生之學問該博雖一時娛戱亦過人逺矣折桂令一名廣寒秋一名天香第一枝一名蟾宫引今中州之韻入聲似平聲又可作去聲所以蜀術等字皆與魚虞相近無恙戰國䇿趙威后問齊使歲無恙耶王亦無恙耶楚辭九辨曰還及君之無恙說苑魏文侯語倉庚曰擊無恙乎又曰子之君無恙乎漢書元帝詔貢禹曰今生有恙何至不已乃上疏乞骸骨聘禮亦曰公問君賔對公再拜鄭注云拜其無恙者顧愷之與殷仲堪牋行人安穏布帆無恙隋日本遣使稱日出處皇帝致書日没處皇帝無恙神異經曰北方大荒中有獸咋人則疾名曰㺊㺊恙也嘗入人室屋黄帝殺之人無憂疾謂之無恙爾雅曰恙憂也應劭風俗通曰上古之時草居露宿恙噬人蟲也善食人心大患苦之凡相問曰無恙恙或以為獸或以為蟲或謂無憂廣干禄書兼取憂及蟲事物紀原兼取憂及獸廣韻㺊字下云㺊獸如獅子食虎豹及人恙字下云憂也病也噬蟲善食人心是㺊恙二義神異經合而一之則誤矣不亂附妾維揚秦君昭妙年游京師其執友鄧載酒祖餞既而舁一殊色小鬟至前令拜秦因指之曰此吾為部主事某人所買妾也幸君便航可以附達秦弗敢諾鄧作色曰縱君自得之亦不過二千五百緡耳何峻辭乃爾秦勉強從命迤􅆔至臨清天漸暄夜多蟲蚋可畏内之帳中同寢直抵都下置舍館主婦處持書往見主事問曰足下與家眷來耶曰無有主事意極不恱隨以小車取歸踰三日謁謝曰足下長者也昨已作答簡附便驛報吾鄧公且使知足下果能不孤公付託之意矣遂相與痛飲盡歡而散夫柳下惠夜宿郭門有女子來同宿恐其凍死坐之於懐至曉不為亂顔叔子獨居夜大雨有女子投之令其執燭至明不二志故千古以為美事今秦之於此女子也相從數千里飲食起居無適而不同又非造次顛沛者之比可謂厚徳君子矣後秦之子孫咸至顯宦輟耕録卷四
