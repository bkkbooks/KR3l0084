body:
  text: 輟耕録卷九元陶宗儀撰文章宗㫖盧踈齋先生文章宗㫖云大凡作詩須用三百篇與離騷言不闗於世教義不存於比興詩亦徒作夫詩發乎情止乎禮義闗睢樂而不滛哀而不傷斯得性情之正古人於此觀風焉賦者古詩之流也前極宏侈之規後歸簡約之制故班固二都之賦冠絶千古前極鋪張鉅麗故後必稱典謨訓誥之作終焉厥後十數作者倣而傚之盖詩人之賦必麗以則也古今文章大家數甚不多見六經不可尚矣戰國之文反覆善辨孟軻之條暢莊周之竒偉屈原之清深為大家西漢之文渾厚典雅賈誼之俊健司馬之雄放為大家三國之文孔明之二表建安諸子之數書而已西晉之文淵明歸去來辭李令伯陳情表王逸少蘭亭叙而已唐之文韓之雅徤栁之刻削為大家夫孰不知然古文亦有數漢文司馬相如揚雄名教罪人其文古唐文韓外元次山近古樊宗師作為苦澁非古宋文章家尤多老歐之雅粹老蘇之蒼勁長蘇之神俊而古作甚不多見盖清廟茅屋謂之古朱門大厦謂之華屋可謂之古不可太羮𤣥酒謂之古八珍謂之美味可謂之古不可知此者可與言古文之妙矣夫古文以辨而不華質而不俚為髙無排句無陳言無贅辭夫記者所以紀日月之逺近工費之多寡主佐之姓名叙事如書史法尚書顧命是也叙事之後略作議論以結之然不可多盖記者以備不忘也夫叙者次序其語前之説勿施於後後之説勿施於前其語次第不可顛倒故次序其語曰叙尚書叙毛詩序古今作序大格樣書序首言畫卦書契之始次言皇墳帝典三代之書及夫子定書之由又次言秦亡漢興求書之事詩序首言六義之始次言變風變雅之作又次言二南王化之自碑文惟韓公最髙每碑行文言道人人殊面目首尾決不再行蹈襲神道碑揭於外行文稍可加詳埋文壙記最宜謹嚴銘字從金一字不汎用善為文者宜如古詩雅頌之作行實之作當取其人平生忠孝大節其餘小善寸長書法宜畧為人立傳之法亦然䟦取古詩狼䟦其胡之義犯前則躐其胡䟦語不可多多則宂尾語宜峻峭以其不可復加之意説則出自己意横説堅説其文詳贍抑揚無所不可如韓公師説是也真公編次古文自西漢而下他並不録迄唐惟尊韓公四記栁公游西山六記而已古文之難豈其然乎瑪達巴歴耶律文正王於星歴筮卜雜􅈫内􅈫音律儒釋異國之書無不通究嘗言西域歴五星宻於中國乃作瑪達巴歴盖回鶻歴名也續演雅發揮白湛淵先生續演雅十詩發揮云海青羽中虎燕燕能制之小隙沉大舟闗尹不吾欺者海青俊禽也而羣燕縁撲之即墜物受於所制者無小大也右一草食押不蘆雖死元不死未見滌腸人先聞棄簀子者漠北有名押不蘆食其汁立死然以他藥解之即蘇華佗洗腸胃攻疾疑先服此也右二誰令珠玉唾出彼藜藿腸仁人不為寳良賈宜深藏者和林有尼能吐珠玉雜寳也右三嬰啼聞木枝羝乳見茅茹何如百年身反爾無根據者漠北種羊角能産羊其大如兎食之肥美嬰啼木枝見山海經所載右四西狩獲白麟至死意不吐代北有角端能通諸國語者角端北地異獸也能人言其髙如浮圖右五纔脱海鶴啄已登方物輿仰面勿啾啾我長非僑如者小人長僅七寸夫婦二枚形體畢具也右六羯尾大如斛堅車載不起此以不掉滅彼以不掉死者西漢有羯尾大於身之半非車載尾不可行也右七八珍殽龍鳳此出龍鳳外荔枝配江珧徒誇有風味者謂迤北八珍也所謂八珍則醍醐麆沆野駝蹄鹿唇駝乳糜天鵝炙紫玉漿𤣥玉漿也𤣥玉漿即馬妳子右八灤人薪巨松童山八百里世無奚超勇惆悵度易水者取松煤於灤陽即今上都去上都二百里即古松林千里其大十圍居人薪之將八百里也右九兩駝侍雪立終日饑不起一覺沙日黄肉屏那足擬者沙漠雪盛命兩駝趺其旁終夜不動用斷梗架片氊其上而寢處於下煖勝肉屏且不起心兵也右十面花子本婦人面飾用花子起自唐昭容上官氏所製以掩黥迹大歴已前士大夫妻多妬悍婢妾小不如意輒印面故有月黥錢黥事見酉陽雜爼竒疾今上之長公主之駙馬剛噶勒藏慶王因墜馬得一竒疾兩眼黒睛俱無而舌出至胷諸醫罔知所措廣恵司卿能哲哷鼐葉爾羌人也嘗識此證遂剪去之頃間復生一舌亦剪之又於真舌兩側各去一指許却塗以藥而愈時元統癸酉也廣恵司者回回之為醫者隸焉磨兠鞬襄州榖城縣城門外道傍石人缺剥腹上有字云磨兠鞬慎勿言是亦金人之流也距縣四五十里有石人二相偶而立腹上題刻一云已及一云未匝不可得而詳也浮休閱日集葛大哥吾鄉臨海章安鎮有蔡木匠者一夕手持斧斤自外歸道由東山東山衆所殯𦵏之處蔡沉醉中將謂抵家捫其棺曰是我榻也寢其上夜半酒醒天且昏黒不可前未免坐以待旦忽聞一人髙呌棺中應云喚我何事彼云某家女病損證盖其後園葛大哥滛之耳却請法師捉鬼我與你同行一觀如何棺中云我有客至不可去蔡明日詣主人曰娘子之疾我能愈之主人驚喜許以厚謝因問屋後曾種葛否曰然蔡徧地翻掘内得一根甚巨斫之且有血煑啖女子病即除萬栁堂京師城外萬栁堂亦一宴游處也野雲㢘公一日於中置酒招䟽齋盧公松雪趙公同飲時歌兒劉氏名解語花者左手折荷花右手執盃歌小聖樂云緑葉隂濃徧池亭水閣偏趂涼多海榴初綻朶朶蹙紅羅乳燕穉鶯弄語對髙栁鳴蟬相和驟雨過似瓊珠亂撒打遍新荷人生百年有幾念良辰美景休放虚過富貧前定何用苦張羅命友邀賔宴賞飲芳醑淺斟低歌且酩酊從教二輪往来如梭既而行酒趙公喜即席賦詩曰萬栁堂前數畆池平鋪雲錦盖漣漪主人自有滄洲趣遊女仍歌白雪詞手把荷花来勸酒步隨芳草去尋詩誰知只尺京城外便有無窮萬里思此詩集中無小聖樂乃小石調曲元遺山先生好問所製而名姬多歌之俗以為驟雨打新荷者是也樹鳴金石草木之變異雜見於傳記數年来天下擾攘怪事尤甚信前人之書不誣也至正丙申浙西諸郡皆有兵正月嘉興楓涇鎮戴君實門首栁樹若牛鳴者三主人與僕從悉聞之斬其樹不一月苗軍抄掠貲産又兩月屋燬於兵是嵗寒食日海鹽州趙初心率子姓輩詣先壟汛掃松楸忽聞如老鶴作聲戞戞不絶審聽所在乃是一栢樹頃間衆樹同聲和之一二時方止舉家惶惑至八月苗軍火其居明年六月紅軍掠貨財婦女而姪善如死於難予親見君實館賔黄伯成與初心之孫元衡説元衡善如子也其事雖遲速不同而二家之遭禍則一吁誠異哉松江官號至正丙申正月常熟州䧟松江府印造官號給散吏兵佩帶以防姦偽號之製作畫為圓圏繞圏皆火燄圏之内一府字以府印印府字上圏之外四角府官花押民間謡曰滿城都是火府官四散躱城裏無一人紅軍府上坐不二月城破悉如所言割埶杭州赤山之隂曰簫箕泉黄大癡所嘗結廬處其徒弟沈生狎近側一女道姑同門有欲白之於師沈懼引厨刀自割其埶㡬死衆救得活而瘡口流血經月餘不合偶問諸閹奴教以煆所割埶搗粉酒服如其言不數日而愈題屏謝客三寳柱字廷珪色目人頗以才學知名雖湛於酒色而能練達吏事剛正有守為浙省郎中日大書四句於門屛之上曰逆刮蛟龍鱗順捋虎豹尾若將二伎論尤比於人易其意盖以杜絶人之求請耳然亦隘矣哉終不顯達而死於難婚啓至元間平原郡公趙氏與苪宋福王也其子娶全竹齋少保之女婚啓内一聨云休光薊北茍安公位之居回首江南惟重母家之念儘有味陶母碑陶侃母得古正之道發人倫之本將示教於天下謂朴散俗壊樂潰禮闕有子不教不至於道若失大訓不可登於偉望乃求師傅延英茂終日迫於用不欲子郤客俄而車盖載止餼饋並竭茍失其人子將不進計畫始成確然獨斷謂髪可棄訓不可失乃金刀既止黰􅄠雲散怡然無咨嗟之色儼若待賔之具上恐不足以顯㳟下未可謂訓子顧其母激忿填膺寸晷是學不迨於至以超聖人之域煥乎賢者之業且禮信仁義君子之事婦人何得而知盖世道大喪其俗已亂故婦人賢者得以行其事千古之下厥行獨明當時為人之父為人之母覩斯行聞斯舉得不激厲乎茍天下皆如陶母之志則天下皆陶之子也盖人謂子幼而蒙穉不致精訓致悖大道亂人紀良可惜哉銘曰髪也者為養之具賔也者致教之英茍非異禮孰能作世之程千載之下如陶之母安可繼乎齊英宗儀因讀唐皇甫持正先生湜文集見陶母碑不覺淚數行下追惟先妣拳拳於教子真有陶母之志是故今翰林承㫖蜕菴張先生翥所譔墓銘有曰夫家貧劬力紡績以給諸子無廢學之辭自顧不肖不克勉於學以成令名罪莫大焉謹録於此庶亦可以自懼也許文懿先生婺州許白雲先生謙字益之隱居金華山四十年不入城府著書立言足以垂教後世浙東亷使王公繼學訪先生於山中謂先生清氣逼人可畏既退明日出學行薦於朝有録其舉文至者先生方講説目不一少視其無意於仕宦如此先生殁追諡文懿先生謡言後至元丁丒夏六月民間謡言朝廷將采童男女以授韃靼為奴婢且俾父母䕶送抵直北交割故自中原至於江之南府縣村落凡品官庶人家但有男女年十二三以上便為婚嫁六禮既無片言即合至於巨室有不待車輿親迎輒徒步以往者盖惴惴焉惟恐使命戾止不可逃也雖守土官吏與夫韃靼色目之人亦如之竟莫能曉經十餘日纔息自後有貴賤貧富長幼妍醜匹配之不齊者各生悔怨或夫棄其妻或妻憎其夫或訟於官或死於夭此亦天下之大變從古未之聞也吳中僧祖伯號子庭者素稱滑稽口占絶句曰一封丹詔未為真三杯淡酒便成親夜来明月樓頭望惟有姮娥不嫁人又有人集古句云翡翠屏風燭影深良宵一刻直千金共君今夜不須睡明日池塘是緑隂可謂深於命意者矣獸醫世以療馬者曰獸醫療牛者曰牛醫周禮天官冡宰篇獸醫下士八人注獸牛馬之屬按此則療牛者亦當曰獸醫矣想肉天下兵甲方殷而淮右之軍嗜食人以小兒為上婦女次之男子又次之或使坐兩缸間外逼以火或於銕架上生炙或縛其手足先用沸湯澆潑却以竹帚刷去苦皮或乗夾袋中入巨鍋活煑或刲作事件而淹之或男子則止斷其雙腿婦女則特剜其兩乳酷毒萬狀不可具言總名曰想肉以為食之而使人想之也此與唐初朱粲以人為糧置搗磨寨謂啖醉人如食糟豚者無異固在所不足論唐張鷟朝野僉載云武后時杭州臨安尉薛震好食人肉有債主及奴詣臨安止於客舎飲之醉並殺之水銀和煎并骨銷盡後又欲食其婦婦知之踰墻而遯以告縣令令詰之具得其情申州録事奏奉勑杖一百而死段成式酉陽雜爼云李廓在頴州獲火光賊七人前後殺人必食其肉獄具廓問食肉之故其首言某受教於巨盜食人肉者夜入人家必昏沉或有魘不寤者盧氏雜説云唐張茂昭為節鎮頻喫人肉及除統軍到京班中有人問曰聞尚書在鎮好人肉虚實笑曰人肉腥而且䏰爭堪喫五代史云萇從蕳家世屠羊從蕳仕至左金吾衛上將軍嘗歴河陽忠武武寧諸鎮好食人肉所至多潜捕民間小兒以食之趙思綰好食人肝及長安城中食盡取婦女幼稚為軍糧每犒軍輒屠數百人三國志云吳將髙灃好使酒嗜殺人而飲其血日暮必於宅前後掠行人而食之宋莊季裕鷄肋編云自靖康丙午嵗大金入汴盜賊官兵以至居民更互相食全軀暴以為腊登州范温率忠義之人泛海到錢唐有持至行在猶食者老瘦男子庾詞謂之饒把火婦人少艾者名之下羮羊小兒呼為和骨爛又通目為兩脚羊趙與時賔退録云本朝王繼勲孝明皇后母弟太祖時屢以罪貶後以右監門衛率府副率分司西京殘暴愈甚强市民間子女以備給使小不如意即殺而食之太宗即位會有訴者斬於洛陽又知欽州林千之坐食人肉削籍隸海南嗟夫食人之肉人亦食其肉此兵革間之流慘耳君子所不願聞者其薛震輩當天下宴安之日而又身為顯宦豈無珍羞美膳足以厭其口腹顧乃喜啖人肉是雖人𩔖而無人性者矣終至於誅斬竄逐而後已天之報施不亦宜乎王眉叟王眉叟夀延號溪月杭州人出家為道士受知晉邸後以𢎞文輔道粹徳真人管領郡之開元宫浙省都事劉君時中致者海内名士也既卒貧無以為𦵏躬往弔哭周其遺孤舉其柩𦵏於徳清縣與己之夀穴相近春秋祭掃不怠然此事行之於異教中尤不易得錢唐錢唐二字其来甚逺按史記始皇本紀至雲夢浮江下丹陽至錢唐臨浙江上會稽立石刻頌秦徳西漢地理志亦有錢唐縣今唐字從土則誤矣盖以錢易土及捐錢築塘等事皆傅會之辭自注世説者已然况後世乎漱芳亭道士張伯雨雨號句曲外史又號貞居嘗從王溪月真人入京初燕地未有梅花吳間閒宗師全節時為嗣師新從江南移至䕶以穹廬扁曰漱芳亭伯雨偶造其所恍若與西湖故人遇徘徊既乆不覺熟寢於中真人終日不見伯雨深以為憂意其出外迷失街道也夢覺日已莫矣歸道所由嗣師笑曰伯雨素有詩名宜作詩以贖過伯雨遂賦長詩有風沙不憚五千里將身跳入仙人壺之句嗣師大喜送翰林集賢嘗所往来者𡊮學士伯長謝博士敬徳馬御史伯庸吳助教養浩虞修譔伯生和之他日伯雨往謁謝諸公惟虞先生全不言儒者事只問道家典故雖荅之或不能詳末問能作幾家符曰不能先生曰某試書之以質是否連書七十二家伯雨汗流浹背輒下拜曰真吾師也自是託交甚契故與先生書必稱弟子焉伯雨杭州人食品有名水之鹹淡相交處産河豚河豚魚𩔖也無鱗頰常怒氣滿腹形殊弗雅然味極佳煑治不精則能殺人所以東坡先生在資善堂與人談河豚之美云據其味真是消得一死浙西惟江隂人尤珍之每春首初出時必用羞祭品畢然後作羮而鄰里間互相餽送以為禮腹中之膟曰西施乳夫西施一美婦也豈乳亦異於人耶顧千載而下乃使人道之不置如此則夫差之亡國非偶然矣若鱭魚子名螳螂子及松江之上海杭州之海寜人皆喜食蟛蜞螯名曰鸚哥嘴以有極紅者似之故也二物象形而云又非西施乳之比矣按𩔖編魚部引博雅云鯸䱌盈之反魨也背青腹白觸物即怒其肝殺人正今人名為河豚者也然則豚當為魨火災至正辛巳莫春之初江浙行省平章政事濟爾噶岱入城之任之日衣紅兒童謡曰火殃来矣至四月十九日杭州災燬官民房屋公􅅟寺觀一萬五千七百五十五間燒死七十四人明年壬午四月一日又災尤甚於先自昔所未有也數百年浩繁之地日就凋弊實基於此落水蘭亭予嘗見落水蘭亭一卷乃五字不損本今吳中分湖陸氏所藏而趙彛齋之物也彛齋宋宗室子諱孟堅字子固彛齋其自號居嘉興之廣戌酷嗜古法書名畫能作墨花於水仙尤長此帖姜白石舊藏後歸霅川俞夀翁彛齋復從夀翁易得喜甚乗夜回櫂至昇山大風覆舟行李皆渰溺無餘彛齋立淺水中手持此帖示人曰蘭亭在此餘不足介吾意也因題八字於卷云性命可輕至寳是保隂府辯詞李子昭者松江府提控案牘李宗慶子也側室刁氏有娠妻怒之箠撻苦楚晝夜不息數次自經與溺以省覺不得死竊自念曰我苦就蓐亦必死耳等死何自求早死之為幸因多食海蟄與冷水胎既落血上充心而身遂亡不數日鬼怪百出妻得竒疾宛若死者但只心胷㣲温支體不僵其家就床褥作一竅任其便溺時以少飲納口中輒咽不與亦不言饑經三年餘形骸枯槁無復生理家人益厭之一夕忽詣舅姑所扣寢室戸舅姑曰汝惡得至此必為鬼矣曰妾已復生實非鬼也願見舅姑具告所然舅姑驚恐呼家人悉起取火燭之果此病軀及覘其卧榻已空始信之因問其詳曰妾為亡婢訴寃攝至隂府即今嶽祠也命妾與婢對詞妾以汝懐孕時打罵則或有之然未嘗令汝吞藥損墮婢仇執甚堅妾不得白遂招承枷禁幽圄中日得小叔以餅餌粥飯之𩔖相餽故不餒今復得送妾還入門弄其兒戱撻之一下兒哭遂推妾置竈上即若夢覺者但覺怠倦故勉强至此舅姑曰汝既被禁何自得釋曰㑹上帝有赦故也急呼小郎妻問之曰適間兒子驚啼云夢見乃父擊其首小郎盖提控之次子泰甫先為其妺夫金可大所殺者此婦至今强徤與夫見寓府城西郭又復生兩子矣志怪古或多然漫書於此以為世之妬婦勸詩法趙魏公云作詩用虚字殊不佳中兩聨填滿方好出處纔使唐已下事便不古姓名者莊綽鷄肋編云太史公作伯夷傳但云伯夷叔齊孤竹君之二子也而論語音註引春秋少陽篇謂伯夷姓墨名允一名元字公信叔齊名智字公達夷齊諡也陸徳明取之不知少陽篇何人所著今世猶有此書否吾衍閒居録云孤竹君姓墨音眉名台音怡初見孔叢子注中子名伯遼見周曇詠史詩注伯當作仲若如吾説則伯夷叔齊似又是名非諡矣女諫買印淮海龔翠巖先生開寓吳門日一僧權道衡者頗聰慧識道理先生與之遊偶市肆粥漢印一顆權嘗酬價歸取鏹先生適見主人以實告遂用十五緡買之語諸女女曰大人乃亦奪人所好先生驚悟即持送權曰先生愛而收藏奚以贈曰在彼猶在此也權固辭曰在彼猶在此也相讓乆之沉諸淵而别吁若先生者可謂善矣孰謂異端中有此哉然先生之女尤可敬也吳江塔顛箭吳江華嚴寺浮圖之顛望之二矢著其上簳羽宛然可辨相傳宋南渡初金人尼瑪哈乗快一發而中又賈似道出督時祝矢自誓亦中焉故留題者有至今塔杪留遺跡猶是元戎金僕姑之句大徳庚子其寺主僧善信大修浮圖更其顛而新之視向二矢實圓鐡條二交貫横亘盖必昔人以示輔顛且以防鸛鶻之巢故耳傳者所謂大妄也且著此以祛後世之惑長樂郭徳基嘗有華嚴塔頴辨疑行於時盖郭嘗官此州目擊其非素領項後白髪曰素領漢馮唐白首為郎官素髪垂領
