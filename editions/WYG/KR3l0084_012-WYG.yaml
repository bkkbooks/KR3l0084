body:
  text: 輟耕録卷十二元陶宗儀撰園池記唐南陽樊宗師字紹述所譔絳守居園池記艱深竒澁讀之往往昧其句讀况義乎哉韓文公謂其文不蹈襲前人一言一句觀此記則誠然矣宋王晟劉忱嘗為解釋今不復有偶得灤陽趙仁舉字伯昻箋註本句分字析詞理焕然因書其記傳其句讀以便披覽云有未解者又須觀全註可也㸃法為句為讀記曰絳即東雍雍去聲為守去聲理所禀參所今切實沈分分去聲氣畜兩河潤有陶唐冀遺風餘思思去聲晉韓魏之相剥剖世說總其土田士人今無磽口交切雜擾宜得地形勝㵼水施法豈新田又蕞猥不可居州地或自有興廢州字或屬上句人因得附為奢儉將為守恱致平理與與平聲益侈心耗物害時與與平聲自將失敦窮華終披夷不可知陴􅀈音脾睨也􅀈疑作緬孤顛跒倔上苦下切下渠勿切𤣥武踞守居割有北自甲辛苞太池泓横硖旁潭中癸次木腔暴三丈餘或屬上句涎玉沫珠子午梁貫亭曰洄漣虹蜺雄雌穹鞠覷蜃時忍切礙佷胡懇切島坻音池淹淹委委平聲莎靡縵莫半切蘿蕃翠蔓紅刺相拂綴南連軒井陣中湧曰香承守寢睟雖遂切思西南有門曰虎豹左書虎搏𥙷各切立萬力千氣底音㫖發􅇾匿地努肩腦口牙快􅎨電火雷風黑山震將合右胡人鬅黄㠾於元切累力追切珠丹碧錦襖身刀囊鞾檛縚上刀切白豹𤣥班飫距掌脾意相得東南有亭曰新前含音領曰槐有槐屓虛器切䕶䨴鬱䕃後頤渠決決緑池西直南折廡赴可宴可衙又東騫渠曰望月騫音軒又東騫窮角池硏雲曰栢有栢蒼青官士擁列與槐朋友巉鉏銜切隂洽色北俯渠憧憧來刮級面西巽㬂疑作隅間黄原玦天汾水鈎帶白言謁行旦艮間逺岡青縈近樓臺井閭㸃畫察可四時合竒士觀雲風霜露雨雪所為去聲發生收歛賦歌詩正東曰蒼塘遵瀕西漭望瑶翻碧㶑光文切鏤棃深撓撓奴巧切收窮正北曰風隄乘携左右隄勢北囘股努墆徒計切捩刀計切蹴墉御渠歆池南楯楹景怪孎蛟龍鉤牽寳龜靈蠯薄猛切一音睥文文章章隂欱呼合切墊都念切㰹呼括切煙潰靄聚桃李蘭􅈍神君仙人衣裳雅冶可㑹脫赤熱西北曰鼇䖶音灰原開咍呼來切儲虚明􅃼􅃼嵬眼􅐓耳可大客旅鐘鼓樂提鷴挈鷺􅷏音弼池豪渠憎乖憐圍正西曰白濵薈烏外切深憐梨素女雪舞百佾水翠披㬑㬑虚郭切干幅迎西引東士長崖挾横埒埒音劣日夘酉日或作自樵途隖徑幽委蟲鳥聲無人風日燈火之晝夜漏刻詭姽魚毁切絢化大小亭餖池渠間走池隄上亭後前陴乘墉如連山羣峰擁地髙下如原隰隄谿壑水引古自源三十里鑿髙槽絶竇墉為或作其池溝沼渠瀑潨音叢潺終出汨汨于筆切音骨非街衖畦町阡陌間入汾巨𣗳木資士悍水沮將預切宗族盛茂旁䕃逺映錦繡交菓枝香畹麗麗上下可通作一句絶他郡考其臺亭沼池之増葢豪王才侯襲以竒意相勝至今過客尚往往有指可創起處余退常吁後其能無果有不音否𥙷建者池由於煬及當作反者雅文安薛雅裴文安二人發土築臺為拒幾平聲附於汚宫水本於正平軌病井滷生物瘠引古沃澣人便幾附於河渠嗚呼為附於河渠則可為汚於汙宫其可書以薦後君子長慶三年五月十七日記又見一本亦註解者不著姓名所分句讀與前略有不同處併附于此絳即東雍為守理所作一句世説土田士人宜得地形勝自將失暾窮華陴􅀈孤顛跒倔𤣥武守居割有北自甲辛苞大池泓横硖旁作一句潭中癸次木腔作一句瀑三丈餘作一句子午梁虹蜺雄雌穹鞠覷蜃作一句莎靡縵南連軒井陣左畫虎摶立萬力千氣底發作一句彘匿地電火雷風右胡人鬅黄㠾纍珠丹碧錦襖身刀囊鞾撾縚白豹𤣥班飫距掌脾作一句有槐屓䕶䨴作一句鬱䕃渠決決縁池西直南折廡赴擁列與槐朋友巽㬂間白言謁行旦艮間逺岡青縈近可四時合竒士觀雲風霜露雨雪所為發生收歛正東曰蒼塘蹲瀕西漭望作一句瑶翻碧㶑正北曰風隄乘携左右作一句隄勢北囘股努墆披蹴墉作一句南楯楹景怪爥蛟龍鉤牽烟漬靄聚開咍儲虚明茫茫提鷴絜鷺䁨䁨千幅迎引西東日夘酉樵途隖徑幽委蟲鳴聲晝夜大小亭餖池渠間走池隄上亭後前陴乘墉作一句如連山群峯擁地髙下作一句鑿髙槽作一句絶竇墉作一句為此作其池溝沼渠瀑潨每字汨汨街衖町畦阡陌每字間入汾作句水祖宗族茂盛作一句旁䕃逺映錦繡交菓枝香畹麗絶地郡作一句考其臺亭沼沚之増後其能無果有不補建者作一句池由於煬及者雅文安作一句誅此本多比字病井滷生物瘠引古沃澣作一句人便幾附於河渠作一句廁籌今寺觀削木為籌置溷圊中名曰廁籌北史齊文宣王嗜酒淫泆肆行狂暴雖以楊愔為相使進廁籌然則愔所進者豈即此與按說文廁清也從廁則聲韻初吏切間也雜也次也圊也居髙臨垂邊曰廁髙岸夹水曰廁史記太倉公𫝊䜿奉劍從王之廁汲黯𫝊衛青大將軍侍中上踞廁見之注如淳曰廁音則謂牀邊據牀視之一云溷廁也廁牀邊側漢書注如淳曰廁溷也孟康曰廁邊側也師古曰如說是也仲馮曰廁當從孟說愚意古者見大臣則御坐為起夫武帝固以奴𨽻待青亦不應踞溷􅀈而見之然漢文居㶚北臨廁使慎夫人鼓瑟注韋昭曰髙岸夹水為廁即此推之則凡廁者皆取其在兩物間為義又郅都𫝊賈姬如廁有野􅇾入廁命都擊之則此之如廁亦恐非是溷圊他如劉安别傳謫守都厠三年莊子庚桑篇適其偃註偃屏廁也屏廁則以偃儀禮既夕禮甸人築坅坎𨽻人温廁塞廁萬石君𫝊建取親中裙廁牏身自澣洒注孟康曰廁行清牏行中受糞函也至於晉侯食麥脹如廁䧟而卒趙襄子如厠執豫讓髙祖鴻門㑹如廁召樊噲等及如廁見柏人金日磾如廁擒莽何羅范睢佯死置廁中李斯如廁見䑕陶侃如廁見朱衣王敦如廁食􅀥劉寔誤入石崇廁郭璞􅀍髪廁上劉季和廁上置香爐沈慶之夢鹵簿入側中崔浩焚經投廁中錢義廁神李赤廁鬼蒯瞶盟孔悝於廁曹植戒露頂入廁之𩔖則真溷圊矣抝花南方或謂折花曰抝花唐元㣲之詩試問酒旗歌板地今朝誰是抝花人又古樂府抝折楊栁枝連枝秀京師教坊官妓連枝秀姓孫氏葢以色事人者年四十餘因投禮逸士風髙老為師而主教者褒以空湛静慧散人之號挟二女童放浪江海間偶至松江愛其風物秀麗將結數椽為棲息所郡人陸宅之居仁嘗往訪焉秀頗不以禮貌因其請作募縁疏遂為譔之疏曰京師第一部教坊占排塲曽使萬人喝采道德五千言公案抽鎖鑰只因片語投機向林下得大道髙風指雲間問前縁福地一跳身纔離了百戱棚中圏子䨇擺手便作箇三清門下閒人赤𦂳地無是無非到大來自由自在識盡悲歡離合幻打開老病死生闗交媾功成隂陽炭燒空慾海修持行滿雌雄劍劈破愁城七星冠剛替下鳯頭釵合歡帶生紉做鹿皮袋空非空色非色色即是空道可道名可名强名曰道往常時紅裙翠袖生綃帕猛可里草履麻衣匾皂絛銷金帳冷落風情養丹爐消磨火性半世連枝帶葉算從前歴盡虛花一朝剗草除根到此際方成結果尋幾箇烟霞外逍遥伴侣抵多少塵埃中浮浪男兒存一㸃志誠心百事可做少幾處風流債一筆都勾試問他濁酒狂歌争如我清茶淡話迷魂陣當時落䧟人負我我負人總是虚脾𤣥闗竅今日㸃開心即道道即心無非妙用牢着眼看烏飛兎走急囘頭怕鶴怨猿啼五陵人買笑追歡掉頭不頋三島客談𤣥論道稽首相迎大都來幾箇知音多管是前生有分玉樓花下千鍾酒幾畨歌白苧遏行雲紙帳梅邊一炷香從此誦黄庭消永日桃花扇深蔵明月影椰子瓢長醉白雲鄉皓齒細腰打疊少年歌舞錦心繡腹宣揚老子經文發科打諢不離機鋒課嘴撩牙長存道眼燒夜香非尋佳偶披鶴􅌁星月下禮拜茅君登春臺不望逺人駕鸞車雲霄上追尋蕭史歌館化為仙館静戯房畨作道房幽浄洗臙脂見全真本來面目輕敲檀板聽歩虚别是宫商人盡誇七真堂添上箇小孫姑我只道五城山冊立下新王母不比尋常鉤子曽經老大鉗鎚百鍊不囘萬夫難敵疇昔㣲通一笑白面郎争與􅅶頭如今頓悟三生青眼客便當擡手既不作入夢朝雲暮雨也須撇等閒秋月春風若教了蒲團上工夫便可到蓬壺中境界肯莊嚴一處千年香火是成就到頭陸地神仙金銀鈔等物是必大塊子捨來福禄夀利錢擬定加倍兒還你得道者多助看琳宫寳殿日月交輝愛人者必親仗玉磬金鐘晨昏報德疏文一出逺邇傳誦以資笑談秀不可留遂宵遁然文雖新竒固近於俳視厚德君子有間矣而其帷箔之不修者豈偶然哉卻鞭文真王額琳特穆爾之夫人卓勒約蘓徳濟以賢行稱一日有獻馬鞭於王者鞭内暗蔵一鐡簡拔靶取之則得王喜持示夫人將酬以幣夫人曰君平昔若嘗害人則防人之必我害也茍無此心焉用為王悟亟還之奉母避難泰州人𡊮氏兄弟二人同居養母至正壬辰紅巾壓境兄弟負母逃避至中途兄念妻子不置辭母歸惟弟與母借居田舎後城䧟其一房盡遭殺戮獨弟之妻子獲免乘間奔避適夫婦父子相㑹時傳為孝行所感匠官仁慈杭州行金玉府副總管羅國器世榮郡人也天性仁慈有匠人程限稽違案具吏請引决羅曰吾聞其新娶若責之舅姑必以新婦不利口舌之餘不測係焉姑置勿問後或再犯重加懲治可也夫羅軄在造作耳尚能知此而受民命之寄者則反貪墨苛慘惟以鞭扑立威為務哀哉著衣喫飯諺云三代仕宦學不得着衣喫飯按魏書文帝詔羣臣云三世長者知被服五世長者知飲食則古已有此語文章政事吕仲實先生思誠僉浙西憲司事時有自首不合令女習學謳唱者先生案議云男女無父母之命私有所從王法不許父母違男女之願置之非地公論豈容所首宜不准合依律杖斷又有年七十之上而毆人者案議云既能為不能為之事必當受不當受之刑先生文章政事皆過人逺甚而廉潔不汚家甚貧至正間官至中書左丞先生未顯時一日晨炊不繼欲携布袍貿米於人室氏有吝色因戱作一詩曰典却春衫辦早厨老妻何必更躊躇瓶中有醋堪燒菜囊裏無錢莫買魚不敢妄為些子事只因曾讀數行書嚴霜烈日皆經過次第春風到草廬後果及第浙江潮候浙江一名錢唐江一名羅刹江所謂羅刹者江心有石即秦望山脚横截波濤中商旅船到此多值風濤所困而傾覆遂呼云此事見吳越時僧賛寧傳載中其晝夜二潮甚信上人以詩括之曰午未未未申申夘卯辰辰巳巳巳午午朔望一般輪此晝候也初一日午未初二日未初十五日如初一夜候則六時對衝子午丑未之𩔖漢東宣伯聚先生嘗作浙江潮候圖說云大江而東凡水之入于海者無不通潮而浙江之潮獨為天下竒觀地勢然也浙江之口有兩山焉其南曰龕山其北曰赭山並峙於江海之㑹謂之海門下有沙潬跨江西東三百餘里若伏檻然潮之入于浙江也發乎浩渺之區而頓就歛束逼礙沙潬囘薄激射折而趨于兩山之間抝怒不拽則奮而上隮如素蜺横空奔雷殷地觀者膽掉渉者心悸故為東南之至險非他江之可同也原其消長之故者曰天河激湧曰地機翕張揆其晨夕之候者曰依隂而附陽曰隨日而應月地志濤經言殊㫖異胡可得而一哉葢圓則之運大氣舉之方儀之静大水承之氣有升降地有浮沉而潮汐生焉月有盈虚潮有起伏故盈於朔望虚於兩弦息於朓朒消於朏魄而大小凖焉月為隂精水之所生日為陽宗水之所從故晝潮之期日常加子夜潮之候月必在午而晷刻定焉卯酉之月隂陽之交故潮大於餘月大梁析木河漢之津也朔望之後天地之變故潮大於餘日寒暑之大建丑未也一晦一明再潮再汐一朔一望再虚再盈天一地二之道也月經於上水緯於下進退消長相為生成歴數可推毫釐不爽斯天地之至信幽贊於神明而古今不易者也杭之為郡枕帶江海逺引甌閩近控吳越商賈之所輻湊舟航之所駢集則浙江為要津焉而其行止之淹速無不畢聽於潮汐者或違其大小之信爽其緩急之宜則必至於傾墊底滯故不可以不之謹也某承乏兹郡屬兵革未弭之秋信使之往來師旅之進退雖期㑹紛紜邊陲警急必告之曰謹候潮汐毋躁進以自危然而跡累肩摩晨馳夕騖有不能人喻而户說之者考之郡志得四時潮候圖簡明可信故為之說而刻石于浙江亭之壁間使凡行李之過此者皆得而觀之以毋蹈夫觸險躁進之害亦庶乎思患而預防之意云此說博極羣書辭理超詣而古今之論潮汐者葢莫能過之矣因併録之貞烈墓千夫長李某戍天台縣日一部卒妻郭氏有令姿見之者無不嘖嘖稱賞李心慕焉去縣七八十里有私盗出没處李分兵往戍卒遂在行既而日至卒家百計調之郭氏毅然莫犯經半載夫歸具以白為屬所轄㒺敢誰何一日李過卒門卒邀入治茶忽憶得前事怒形於色亟轉身持刃出而李幸脫走訴于縣縣捕繫窮竟案議持刃殺本部官罪死縣桎梏囹圄中從而邑之惡少年與官之吏胥皂𨽻輩無有不起覬覦之心者郭氏躬餽食於卒外閉户業績紡以資衣食人不敢一至其家久之府檄調黄巖州一獄卒葉其姓者至尤有意於郭氏乃頋視其卒日飲食之情若手足卒感激入骨髓忽傳有五府官出五府之官所以斬决罪囚者葉報卒知且謂曰汝或可活我與為義兄弟萬一不保汝之妻尚少汝之子若女纔八九嵗耳奚以依顧我尚未娶寧肯俾為我室乎若然我之視汝子女猶我子女也卒喜諾葉遂令郭氏私見卒卒謂曰我死有日此葉押獄性柔善未有妻汝可嫁之郭氏曰汝之死以我之色我又能二適以求生乎既歸持二幼痛泣而言曰汝爹行且死娘死亦在旦夕我兒無所怙恃終必死於饑寒我今賣汝與人娘豈忍哉葢勢不容已將復柰何汝在他人家非若父母膝下比母仍似是嬌癡為也天茍有知使汝成立嵗時能以巵酒奠父母則是我有後矣其子女頗聰慧解母語意抱母而號引裾不肯釋手遂携二兒出市召人與之行路亦為之墮淚邑人有憐之者納其子女贈錢三十緡郭氏以三之一具酒饌携至獄門謂葉曰願與夫一再見葉聽入哽咽不能語既而曰君擾押獄多矣可用此少禮答之又有錢若干可收取自給我去一富家執作為口食計恐旬日不及看君故也相别垂泣而出走至仙人渡溪水中危坐而死此處水極險惡竟不為衝􅈭倒仆人有見者報之縣縣官往驗視得實皆驚異失色為具棺歛就葬於死所之側山下又為申達上司仍表其墓曰貞烈郭氏之墓大書刻石墓上至正丙戍朝廷遣奉使宣撫循行列郡廉得其事原卒之情釋之人遂付還子女終身誓不再娶特徤藥墨藪載徐氏書記云平一齠齓之嵗見育宫中嘗覩先后閱書法數軸將榻以賜藩邸令女學内人出六十餘函於億嵗殿曝之多裝以鏤牙軸紫羅縹云是太宗時所裝其中有故青綾縹玳瑁軸者云是梁氏舊跡楷書每函可二十餘卷别有一小函有十餘卷所記憶者是扇書樂毅告誓黄庭私訪於所主女學問其函出盡否答云尚有不知其幾至中宗神龍初貴戚寵盛宫禁不嚴御府之珍多歸私室先盡金壁次及書法嬪主之家因此擅出或有報安樂公主者於内出二十餘函駙馬武延秀乆踐外國無功於此徒聞二王之迹强効寳持時呼薛稷鄭愔及平一詳其善惡諸人隨事答稱上者登時去牙軸紫縹易以漆軸黄麻紙縹題云特徤藥是外國語其書合作者時有太宗御筆於後題之嘆其雄逸云及考之書苑菁華特徤藥作云特徤樂恐是鋟梓誤耳乞求世之曰乞求葢謂正欲若是也然唐時已有此言王建宫詞只恐他時身到此乞求自在得還家又花蕊夫人宫詞種得海柑纔結子乞求自過與君王張道人暨陽之南門橋軍人張旺者人咸稱之曰張牌素兇狠無賴嘗夜盗城西田父菜被執濡其首溺池而􅇚之以故恨入骨髓每思有以為報而未能一夕宿火瓦罌往燒其家道由觀溝時月色㣲明畫師吳碧山尚未寢偶聞歩履聲穴窻窺之見張前行而殤鬼百數踵其後飯頃又聞歩履聲復窺之則張囘而青衣童子二人前𨗳焉吳甚驚怪葢張乃吳常所厚善者詰旦往叩張張初不承及語之審因以前事告且曰我實欲燬其室以快所憤因念寃寃相報無有了時遂棄火歸他無見也吳乃告以其詳張大感悟曰一念之頃可不謹哉即捨俗出家人又咸稱之曰張道人後竟得道云此在至正五年事也隂德延夀昔真州一巨商每嵗販粥至杭時有挟姑布子之術曰鬼眼者設肆省前言皆竒中故門常如市商方坐下坐忽指之曰公大富人也惜乎中秋前後三日内數不可逃商懼即戒程時八月之初舟次楊子江見江濵一婦仰天大號商問焉答曰妾之夫作小經紀止有本錢五十緡每買鵝鴨過江貨賣歸則計本於妾然後持􅑿息易柴米餘貲盡付酒家率以為常今妾偶遺失所留本錢非惟飲食之計無所措亦必被箠死寧自沉商聞之歎曰我今厄於命設令鑄金可代我無虞矣彼乃自夭其生哀哉亟贈錢一百緡婦感謝去商至家具以鬼眼之言告父母且與親戚故舊叙永訣閉户待盡父母親故宛轉寛解終弗自悟踰期無他故復之杭舟阻風偶泊向時贈錢處登岸散適此婦襁負嬰孩遇諸道迎拜且告曰自蒙恩府持拔數日後乃產母子二人没齒感再生之賜者豈敢忘哉商至杭便過鬼眼所驚顧曰公中秋胡不死乃詳觀形色而笑曰公隂德所致必曽救一老隂少陽之命矣商異其術捐錢若干以報之帝師帕克斯巴帝師法號曰皇天之下一人之上開教宣文輔治大聖至德普覺真知佑國如意大寳法王西天佛子大元帝師班第達帕克巴巴克實輟耕録卷十二
