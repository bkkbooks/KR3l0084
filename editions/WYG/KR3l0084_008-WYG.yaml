body:
  text: 輟耕録巻八元陶宗儀撰寫山水訣黄子乆散人公望自號大癡又號一峯本姓陸世居平江之常熟繼永嘉黄氏穎悟明敏博學彊記畫山水宗董巨自成一家可入逸品其所作寫山水訣亦有理致邇来初學小生多效之但未有得其髣髴者正所謂畫虎刻鵠之不成也近代作畫多宗董源李成二家筆法樹石各不相似學者當盡心焉樹要四面俱有榦與枝盖取其圓潤樹要有身分畫家謂之紐子要折搭得中樹身各要有發生樹要偃仰稀宻相間有葉樹枝軟面後皆有仰枝畫石之法先從淡墨起可改可救漸用濃墨者為上石無十步真石看三面用方圓之法湏方多圓少董源坡脚下多有碎石乃畫建康山埶董石謂之麻皮皴坡脚先向筆畫邊皴起然後用淡墨破其深凹處著色不離乎此石著色要重董源小山石謂之礬頭山中有雲氣此皆金陵山景皴法要滲軟下有沙地用淡墨掃屈曲為之再用淡墨破山論三逺從下相連不斷謂之平逺從近隔開相對謂之濶逺從山外逺景謂之髙逺山水中用筆法謂之筋骨相連有筆有墨之分用描處糊突其筆謂之有墨水筆不動描法謂之有筆此畫家𦂳要處山石樹木皆用此大槩樹要填空去聲小樹大樹一偃一仰向背濃淡各不少相犯繁處間踈處須要得中若畫得純熟自然筆法出現畫石之妙用滕黄水浸入墨筆自然潤色不可用多多則要滯筆間用螺青入墨亦妙吳妝容易入眼使墨士氣皮袋中置描筆在内或於好景處見樹有怪異便當模寫記之分外有發生之意登樓望空濶處氣韻看雲采即是山頭景物李成郭熈皆用此法郭熈畫石如雲古人云天開圖畫者是也山水中唯水口最難畫逺水無灣逺人無目水出髙源自上而下切不可斷𣲖要取活流之源山頭要折搭轉換山脉皆順此活法也衆峯如相揖遜萬樹相從如大軍領卒森然有不可犯之色此寫真山之形也山坡中可以置屋舎水中可置小艇從此有生氣山腰用雲氣見得山埶髙不可測畫石之法最要形象不要石有三面或在上在左側皆可為面臨筆之際殆要取用山下有水潭謂之瀬畫此甚有生意四邊用樹簇之畫一窠一石當逸墨撇脱有士人家風纔多便入畫工之流矣或畫山水一幅先立題目然後著筆若無題目便不成畫更要記春夏秋冬景色春則萬物發生夏則樹木繁冗秋則萬象肅殺冬則煙雲黯淡天色糢糊能畫此者為上矣李成畫坡脚須要數層取其濕厚米元章論李光丞有後代兒孫昌盛果出為官者最多畫亦有風水存焉松樹不見根喻君子在野雜樹喻小人崢嶸之意夏山欲雨要帶水筆山上有石小塊堆在上謂之礬頭用水筆暈開加淡螺青又是一般秀潤畫不過意思而已冬景借地為雪要薄粉暈山頭山水之法在乎隨機應變先記皴法不雜布置逺近相映大槩與寫字一般以熟為妙紙上難畫絹上礬了好著筆好用顔色易入眼先命題目此為之上品古人作畫胷次寛濶布景自然合古人意趣畫法盡矣好絹用水噴濕石上槌眼匾然後上幀子礬法春秋膠礬停夏月膠多礬少冬天礬多膠少著色螺青拂石上藤黄入墨畫樹甚色潤好看作畫祇是箇理字最𦂳要吳融詩云良工善得丹青理作畫用墨最難但先用淡墨積至可觀處然後用焦墨濃墨分出畦徑逺近故在生紙上有許多滋潤處李成惜墨如金是也作畫大要去邪甜俗賴四箇字鄧山房平江會道觀主鄧山房道樞綿州人在宋季為道士時齋法已精際遇理度兩朝一日謝后遣巨璫召至内後門泣降徳音且令其責軍令狀使無他泄後謂曰吾昨夜夢見濟王怒甚以為吾且將兵由獨松闗入滅汝社稷矣吾此夢頗可怪汝可就南髙峯頂為謄心章哀告上帝已而黄頭先鋒斬闗而来宋亡後鄧遂築今觀狗站髙麗以北名别十八華言連五城也罪人之流尼嚕罕者必經此其地極寒海亦氷自八月即合至明年四五月方解人行其上如履平地征東行省每嵗委官至尼嚕罕給散囚糧須用站車每車以四狗挽之狗悉諳人性站有狗分例若尅減之必嚙其主者至死乃已五馬入門吾鄉陳剛中先生孚臨海縣人國初時嘗為僧以避世變一日大書所作詩於其父執某之粉墻上云我不學㓂丞相地黄變髪髪如漆又不學張長史醉後揮毫掃狂墨平生紺髪三十丈幾度和雲眠石上不合感時怒衝冠天公罰作圓頂相肺肝本無兒女情亦豈惜此雙髩青只憶山間秋月冷搔首不見髼鬆影父執見之曰此子欲歸俗也呼来館榖之命養髪經半年餘謂曰汝當娶吾將以女事汝先生辭謝再三既而命寓他所遣媒妁行言擇日迎歸父執喜曰五馬入門矣先生雖獲佳偶自妻母以至妻之兄姊弟妹皆不然遂挈家入京館閣諸老交章薦舉入翰林會朝廷遣使交趾授先生禮部郎中副之至交州嘗有詩曰老母越南垂白髪病妻塞北倚黄昏蠻烟瘴雨交州客三處相思一夢魂及抵安南國以文字言語諭之其國遂降將其世子并國相入朝後以功授治中典鄉郡終老焉若父執者可謂識人也已隱逸吾鄉吕徽之先生闕家仙居萬山中博學能詩文問無不知者而安貧樂道常逃其名耕漁以自給一日携楮幣詣富家易榖種值大雪立門下人弗之顧徐至庭前聞東閣中有人分韻作雪詩一人得滕字苦吟弗就先生不覺失笑閣中諸貴㳺子弟輩聞得遣左右詰之先生初不言衆愈疑親自出見先生露頂短褐布襪草屨輒侮之詢其見笑之由先生不得已乃曰我意舉滕王蛺蝶事耳衆始歎伏邀先生入坐先生曰我如此形狀安可厠諸君子問請之益堅遂入閣衆以藤滕二字請先生足之即援筆書曰天上九龍施法水人間二鼠嚙枯藤鶩鵝聲亂功收蔡蝴蜨飛來妙過滕復請和曇字韻詩又隨筆寫云萬里闗河凍欲含渾如天地尚函三橋邊驢子詩何惡帳底羔兒酒正酣竹委長身寒郭索松埋短髪老瞿曇不如乗此擒元濟一洗江南草木慚寫訖便出門留之不可得問其姓字亦不荅皆驚訝曰嘗聞吕處士名欲一見而不能先生豈其人邪曰我農家安知吕處士為何如人恵之榖怒曰我豈取不義之財必易之刺船而去遣人遥尾其後路甚僻逺識其所而返雪晴徃訪焉惟草屋一間家徒壁立忽米桶中有人乃先生妻也因天寒故坐其中試問徽之先生何在荅曰在溪上捕魚始知真為先生矣至彼果見之告以特來候謝之意隔溪謂曰諸公先到舎下我得魚當換酒飲諸公也少頃携魚與酒至盡歡而散回至中途夜黒不良於行暫憇一露棚下適主人自外歸乃嘗識面者問所從來語以故喜曰是固某平日所願見者止客宿翼旦客别主人躡其蹤則先生已遷居矣又一日先生與陳剛中治中遇於道治中䇿蹇驢時猶布衣見先生風神髙簡問曰得非吕徽之乎曰然足下非陳剛中乎曰然握手若平生歡共論驢故事先生言一事治中荅一事互至四十餘事治中止矣先生曰我尚記得有某出某書某出某傳又三十餘事治中深敬之闗節梯媒杜陽雜編云元載寵姬薛瑶英善為巧媚載惑之瑶英之父曰宗本兄曰從義與趙娟相逓出入以搆賄賂號為闗節趙娟本岐王愛妾後出為薛氏妻生瑶英三人更與中書主吏卓倩等為腹心而宗本輩以事告者載未嘗不領之天下齎寳貨求大官無不恃載權埶指薛卓為梯媒又李肇國史補總叙進士科云造請權要謂之闗節劉軻牛羊日歴云由是輕薄奔走揚鞭馳騖以闗節𦂳慢為甲乙以此推之則諺所謂打闗節有梯媒者不為無祖矣市利利市之説到處皆然易説卦巽為利市三倍老苖楊旺札勒字彦英武岡綏寜之赤水人為人隂鷙酷烈嗜斬殺初羣無賴嘯聚溪洞旺扎勒深賊持權詐故衆推以為長王事日􅁄湖廣陶夢禎氏舉師勤王聞苖有衆習鬬擊遣使往招之由千戸累階至元帥夢禎死樞宻院判鄂爾和總兵駐淮西仍用招納既得旁縁入中國不復可控制畧上江順流而下直抵揚州禽獸之行絶天逆理民怨且怒共起義攻殺之餘黨奔潰度揚子宿留廣徳吳興間至正十六年春二月朔淮人䧟平江時江浙行中書省丞相達實特穆爾有㫖得便宜從事嘉興北連平江南去杭州無二百里為藩鎮喉舌有司告援急星火驛使交道中不絶丞相兵少䇿無所出以旺札勒來守之旺札勒取道自杭以兵刼丞相陞本省參知政事填募民入粟空名告身予之即拜添設左丞所統苖䝤洞猺達拉哈等無尺籍伍符無統屬相謂曰阿哥曰麻線至稱主將亦然喜著斑斕衣製衣袖廣狹脩短與臂同衣幅長不過膝袴如袖裙如衣總名曰草裙草袴固脰以獸皮曰護項束要以帛兩端懸凥後若尾無間晴雨被氊毯狀絶𩔖犬按邕管雜記溪蠻叢笑等書所載五溪之蠻盡槃瓠種屬曰猫曰徭曰􅱒曰犵狑曰犵狫字皆從犬則諺所謂苖犬者信然軍中無金鼔雜鳴小鑼以節進止其鑼若賣貨郎擔人所敲者夜遣士卒伏路日坐草軍行尚首功資抄掠抄掠曰檢刮檢刮者盡取而靡有孑遺之意所過無不殘滅擄得男女老羸者甚幼者色陋者殺之壯者曰土乖幼者曰賴子皆驅以為奴人之投其黨者曰入火婦人艶而晢者畜為婦曰夫娘人有三四婦多至十數一語不合即剸以刃與之處者得至日莫無恙則心竊自賀古云好則人怒則獸形容盡之矣是月丞相又以王與敬攝元帥事守松江與敬據郡應平江完者遣部將蕭亮員成來與敬奔苗有松江火一月不絶城邑殆無噍𩔖偶獲免者亦舉則去兩耳掠婦女刼貨財殘忍貪􅁾慘不忍言官庾尚有粟四十萬餘籍為己有越五十日平江兵破澱湖栅苖夜遁去秋平江兵入杭苗將吳大旺敗旺札勒自嘉興來駐兵城中菜市橋外未即進民自為戰勝旺札勒兵滛刑以逞嘉興僅保孤城城之外悉遭兵燹有窮目力所至無寸草尺木處旺札勒雖陽浮尊事丞相生殺予奪於己是決丞相僅得署成案然浙江之南則行御史臺總督官穆爾古蘓建徳路則逹嚕噶齊衮都羅丹各自為守苗不敢犯其境旺札勒之威令僅行於杭州嘉興兩郡而已築營徳勝堰周圍三四里子女玉帛皆在焉且以為郿塢計用法刻深任埶立威而鄧子文金希尹王彦良之徒又悉邪佞輕佻左右交煽氣燄翕忽時左丞李伯昇行樞宻同知史文炳行樞宻同僉吕珍等皆先魁淮旅而降順者丞相以其衆攻殺之既受圍遣吏致牲酒於文炳為可憐之意曰願少須㬰毋死得以底裏上路報不可旺札勒乗躁力戰敗盡殺所有婦女自經以死獨平章慶童女以先往在富陽得免平章女已嘗許嫁親王為旺札勒强委禽焉至是未及三月故數其罪者此居首諸軍開門納欵惟恐弗先文炳解衣裹屍瘞之祭哭盡哀十八年秋八月也旺札勒部將宋興在嘉興閉城自守亦攻降之城中燔燬者三之二民遇害者十之七南村野史曰苗入華夏民之不幸亦國家之不幸也國以民為本本不固矣邦奚以寧為之將若相者在於明黜陟嚴賞罸奉將天威降者招之逆者討之以培國家之本可也顧於此而不為又無他竒謀逺畧而乃借重於非𩔖正猶開虎兕之柙而使赴犬羊耳尚冀保民命為社稷計一何愚哉罪惡貫盈天怒於上敗亡戮辱身膏草野民爭以為快實亦自取之也惟旺札勒則有説焉旺札勒寵榮過望豈有貳志忠君愛民之道頗亦見諸行事獨矜已犯分貪財好色固苗性所然君子責備賢者於此可以畧之則罪亦未至於死也兼以所部吏卒視旺札勒起身等寒㣲故威令有所不信急之則恐内變緩之則壞法敗度遂卒至於如此亦可哀矣又惜乎草草之舉斷自一時吾恐國家之本剷刈殆盡雖有智謀之士亦無如之何矣天乎人乎吾不得而知也雙硯堂周待制月巖先生仁榮買地於府城之鄭􅑃兒坊剏義塾以淑後進築礎時掘地深纔數尺有青石獲雙硯硯有欵識乃唐鄭司戸䖍故物塾既成遂名雙硯堂爾後先生之弟本道先生仔肩登庚申科仕至恵州判官䖍字弱齊俗譌為􅑃兒云嫁妾猶處子先師錢先生壁字伯全壬申科進士端重清慎語不傷氣嘗内一女鬟風姿秀雅殊可人意室氏勸先生私之正色而荅曰我之所以置此者欲以侍巾櫛耳豈有他意哉汝乃反欲敗吾徳耶即具貲嫁之果處子也先生雲間人聶碧窓詩京口天慶觀主聶碧窓江西人嘗為龍翔宫書記國初時詔赦至感而有詩曰乾坤殺氣正沉沉又聽燕臺降徳音萬口盡𫝊新詔好累朝誰念舊恩深分茅列土將軍志問舎求田父老心麗正立班猶昨日小臣無語淚霑襟又哀被虜婦云當年結髪在深閨豈料人生有别離到底不知因色誤馬前猶自買臙脂又咏燕姬云雙栁垂鬟别樣梳醉來馬上倩人扶江南有眼何曾見爭捲珠簾看固姑玉􅃾江鄰幾雜志云丁正臣齎玉􅃾來館中沈休文云福州人謂之佩羮即今魚脬是也蟹斷陸龜蒙蟹志云稻之登也率執一穂以朝其魁然後任其所之蚤夜嘈沸指江而奔漁者緯蕭承其流而障之名曰蟹斷然緯蕭二字尤竒作今樂府法喬孟符吉博學多能以樂府稱嘗云作樂府亦有法曰鳳頭猪肚豹尾六字是也大槩起要美麗中要浩蕩結要響亮尤貴在首尾貫穿意思清新茍能若是斯可以言樂府矣此所謂樂府乃今樂府如折桂令水仙子之𩔖岷江緑太師巴延擅權之日剡王齊齊克圖髙昌王特穆爾布哈皆以無罪殺山東憲吏曹明善時在都下作岷江緑二曲以風之大書揭於五門之上巴延怒令左右暗察得實肖形捕之明善出避吳中一僧舎居數年伯顔事敗方再入京其曲曰長門栁絲千萬縷總是傷心處行人折柔條燕子銜芳絮都不由鳳城春做主長門栁絲千萬結風起花如雪離别重離别攀折復攀折苦無多舊時枝葉也此曲又名清江引俗曰江兒水温暾南人方言曰温暾者乃懐暖也唐王建宫詞新晴草色煖温暾又白樂天詩池水煖温暾則古已然矣飛雲渡飛雲渡風浪甚惡每有覆舟之患有一少年子放縱不羈嘗以所生年月日時就日者問平生富貧夀夭有告曰汝之夀莫能踰三旬及徧叩他日者言亦多同於是意謂非乆於人世乃不娶妻不事生産作業每以輕財仗義為志嘗俟船渡傍見一了鬟女子徘徊悲戚若將赴水少年亟止之問曰何為輕生如此荅曰我本人家小婢主人有姻事暫借親眷珠子耳環一雙直鈔三十餘定今日送還竟於中途失去寜死耳焉敢歸少年曰我適拾得但不審果是汝物否方再三磨問顆數裝束實是遂同造主人主人感謝欲贈以禮辭不受既而主人怒此婢遣嫁業梳剃者所居去渡所咫尺間期嵗少年與同行二十有八人將過渡道遇一婦人拜且謝視之乃失環女也因告其故於夫屈留午飯餘人先登舟俄風濤大作皆𦵏魚腹盖少年能救人一命而造物者亦救其一命以荅之後少年以夀終渡在温之瑞安漢子今人謂賤丈夫曰漢子按北齊魏愷自散騎常侍遷青州長史固辭文宣帝大怒曰何物漢子與官不就又叚成式廬陵官下記韋令去西蜀時彭州刺史被縣令宻論訴韋前期勘知屈刺史詣府陳謝及迴日諸縣令悉逺迎所訴者為首大言曰使君今日可謂朱研益丹矣刺史笑曰則公便是研朱漢子也長年吾鄉稱舟人之老者曰長老長上聲盖唐已有之矣杜工部詩云長年三老歌聲裏白晝攤錢髙浪中古今詩話謂川峽以篙手為三老乃推一船之最尊者言之耳因思海舶中以司柁曰大翁是亦長老三老之意龍見嘉興檇李郭元之言至正乙未秋七月三日城東馬橋上白龍掛盲風怪雨天闇黒若深夜然壞民居五百餘所大木盡㧞木自半空墜下悉折為二雜以萬瓦亂飛溪水直立人皆呌號奔走不暇顧妻子龍由馬橋歴城北北麗橋望太湖而去時方在家家去城可三里許如聞萬屋齊壓急出戸四望黒雲洶湧失府城所在經一二時方乃開霽不一年為戰鬬之地凡龍所過處荆棘寒烟衰草野燐視昔時之繁華如一夢也星入月松江孫元璘言至正己未七月六日夜自平江歸泊舟城西栅口方掀篷露坐忽見一星大如桮碗色白而㣲青尾長四五丈光燄燭天戞然有聲由東北方飛入月中而止此時月如仰瓦正乗之無偏倚若人以手拾置其中者嘗記宋張端義貴耳集云丁亥年余為儀真録參十月二十三日夜因觀天象見一星入月􅈫歴者鄒淮絶早相别云昨夜星入月恐兩淮兵動不可住徑喚渡過建康余問之古有此否鄒云漢獻帝時一次星入月今再見也十一月十二日劉倬舉兵僇孝姑姑反戈一城狼狽僅以身免繼此兵禍未泯也據此説則松江之禍亦非偶然松江自丙申二月十八日軍亂越三日苗来尅復首尾兩月之間焚殺擄掠十里之城悉化瓦礫之區視他郡尤可畏是則星入月不知此時在於何所分野顧乃松江獨應其兆與軍中禮士浙省參政董公搏霄字孟起以名行當至正癸巳之間總兵戌昱嶺獨松千秋三闗日號令嚴肅民賴以安及尅復諸郡不殺擄不抄掠其御將帥也凛然不可犯而四方之士歸之者禮遇勤至尊酒在前起立捧觴既恭且和然後取其所長而任之若董公者可謂得待士之體矣不耐煩不耐煩三字見宋書庾登之弟仲文𫝊阿誰阿誰二字見三國志龎統𫝊輟耕録卷八
