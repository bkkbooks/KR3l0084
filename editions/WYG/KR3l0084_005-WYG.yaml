body:
  text: 輟耕録卷五元陶宗儀撰角端金華黄先生溍嘗云子將以舉子經學取科第有一賦題曰角端亦曾求其事實否乎余曰未也因記史記司馬相如𫝊獸則麒麟角􅗧之語退而閱之按注郭璞曰角􅗧音端似豬角在鼻上堪作弓又云似麒麟而無角毛詩疏云麟黄色角端有肉張楫云角端似牛角可以為弓以此推之豈亦麟之屬與及考符瑞志名臣事畧癸辛雜識等書乃始得其詳蓋太祖皇帝駐師西印度忽有大獸其髙數十丈一角如犀牛然能作人語云此非帝世界宜速還左右皆震懾獨耶律文正王進曰此名角端乃旄星之精也聖人在位則斯獸奉書而至且能日馳萬八千里靈異如鬼神不可犯也帝即回馭載稽之前志神禹氏治水功成天降飛莬日行三萬里而未嘗善言也又后土趺蹄之獸至善言而未聞其獨角也軒轅獲飛黄而獨角漢武獲獸并角而五蹄又未嘗聞其能言善馳也及聖祖誕膺天命而角端出焉夫一角者所以明海宇之一萬八千里之涉者所以示無逺弗屆也此又天將開天下於大一統之象也至正庚寅江浙鄉試八月二十二日夜二鼓院中彷彿見一物馳過甚疾其狀若猛獸者軍卒從而喧哄因出角端為賦題劈正斧劈正斧以蒼水玉碾造髙二尺有奇廣半之徧地文藻粲然或曰自殷時流𫝊至今者如天子登極正旦天夀節御大明殿會朝時則一人執之立於陛下酒海之前蓋所以正人不正之意興隆笙興隆笙在大明殿下其制植衆管於柔韋以象大匏土鼓二韋橐按其管則簧鳴簨首為二孔雀笙鳴機動則應而舞凡燕會之日此笙一鳴衆樂皆作笙止樂亦止尚食麫磨尚食局進御麥麫其磨在樓上於樓下設機軸以旋之驢畜之蹂踐人役之往來皆不能及且無塵土臭穢所侵乃巧工瞿氏造焉僧有口才大徳間僧丹巴者一時朝貴咸敬之徳夀太子病㿀薨布爾罕皇后遣人問曰我夫婦崇信佛法以師事汝止有一子寧不能延其夀邪荅曰佛法譬猶燈籠風雨至乃可蔽若燭盡則無如之何矣此語即吾儒死生有命之意異端中得此亦可謂有口才者矣鄧中齋鄧光薦先生剡號中齋廬陵人宋亡以義行著其所賦鷓鴣詩曰行不得也哥哥痩妻弱子羸㹀䭾天長地闊多網羅南音漸少北語多肉飛不起可奈何行不得也哥哥其意可見矣又有贊文丞相像曰目煌煌兮疎星曉寒氣英英兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼孰謂斯人不在世間汪水雲汪元量先生大有號水雲天兵平杭日詩曰西塞山邊日落處北關門外雨來天南人墮淚北人笑臣甫低頭拜杜鵑又曰錢塘江上雨初乾風入端門陣陣酸萬馬亂嘶臨警蹕三宫灑淚濕鈴鸞童兒賸遣追徐福癘鬼須當滅賀蘭若說和親能活國嬋娟應是嫁呼韓此語尤悲哽先生詩有水雲集厚徳徐文獻公琰字子方至元間為陜西省郎中有屬路申解到省誤漏聖字案吏指為不敬議欲問罪公改其牘云照得來解内第一行脫去第三字今將元文隨此發下可重别申來時皆稱為厚徳長者毁前朝玉璽後至元間太師巴延出太府監所藏歴代玉璽磨去文改造押字圖書及鷹墜等物以分散其黨與蓋先以奏請故也獨唐武氏一璽玉色瑩白製作如官印璞僅半寸許因不可他用遂付藝文監收之竟獲永存豈武氏之智能料之乎披秉歌訣天子郊祀與祭太廟日百官陪位者皆法服凡披秉須依歌訣次第則免顛倒之失歌曰襪履中單黄帶先裙袍蔽膝綬紳連方心曲領藍腰帶玉珮丁當冠笏全三教富珠哩翀子翬公在翰林時進講罷上問曰三教何者為貴對曰釋如黄金道如白璧儒如五榖上曰若然則儒賤邪對曰黄金白璧無亦何妨五榖于世豈可一日闕哉上大說授時厯法授時厯要法歌曰授時厯法君要知但以九年舊厯推古云但看九年兔望日便是今年正月一月大月小起初一看其初一天地支天不言干者為詩句所拘然舉支以見干也當推九年前厯每月初一是何干支便以此干支依後法數去大月天干五支九且如大月天干五地支九假令初一日甲子甲至戊五數也子至申九數也即以戊申為今月朔小月天四地八耦且如小月天干四地支八假令初一日丙寅丙至已四數也寅至酉八數也即以己酉為今月朔古云前九之年起􅈫法大月五九小四八月大三十日無差如初一日己酉數至次月朔見己卯即月大也月小分明只廿九如月朔數至次月朔止廿九日即月小也節氣只憑九年厯假若造甲午年厯則看丙戌年節氣二十四氣真端的要知今年節氣則看前九年中是何節氣天干三數地支七假如癸亥日癸見乙三數亥見己七數也熟記心中須歴歴定時二十四年取逢時遇八君無慮如逢子時交節氣却用未時亦交也中氣如之若依此法箇中推方省隂陽𤣥奥處閏月本來中氣無古云閏月無中氣何勞物外更他圖世人諳得神仙術不是愚氓是丈夫又歌曰九年二月半便是正月一前九年二月十五日辰即今年正月初一日辰該九十七箇半月二千八百八十日六甲轉四十八周只九年中取大小無差失又歌曰若要求立春相衝對食神假如前九年甲子日立春甲食丙子衝午即今年丙午日立春也二十四氣准此閏月無中氣說與惺惺人又一法云古有數九九之語蓋自至後起數至九九則春已分矣正如至後一百六日為寒食之𩔖豈特此為然凡推算皆有約法推閏歌括云欲知來歲閏先算至之餘更看大小盡決定不差殊謂如來歲合置閏止以今年冬至後餘日為率且如今年十一月二十二日冬至則本月尚餘八日則來年之閏當在八月或小盡則七月若冬至在上旬則以望日為斷十二日足則復起一數焉推節氣歌括云中氣與節氣但有半月隔若要知仔細兩時零五刻謂如正月甲子日子時初初刻立春則數至己卯日寅時正一刻則是雨水節也推立春歌括云今歲先知來歲春但隔五日三時辰謂如今年是甲子日子時立春則明年合是己巳日卯時立春若夫刻數則用前法推之又求節氣歌曰驚蟄五時二刻求清明十時四刻流立夏一日三時六芒種一日九時周小暑二日二時二立秋二日七時四白露三日零六刻寒露三日六時至立冬三日十一二大雪四日四時四小寒四日九時六五日三時交新歲節遇子時加一日此為捷法君須記又一年約法云一周年三百六十五日零三時一月節三十日零五時二刻半月一氣十五日零二時五刻又食神定法云甲食丙乙食丁丙食戊丁食己戊食庚巳食辛庚食壬辛食癸壬食甲癸食乙其捷要但取我生之干陽配陽隂配隂是也又時刻約法歌云二十四氣漸差除循環時刻四同途單逢正四換初一正三依舊復初初又乘除法推算二十四氣時刻云其法不論何歲何月但以日為百數時為十數刻為零數初一至初十於百上下數如過初十於千上下數假如正月十一日亥正一刻立春欲求中氣則先下一千一百數十一日故也再下十二數亥時故也如子一丑二之𩔖復加一千五百二十五數共得一七三三則二十七日寅初二刻雨水也何以知為初二刻蓋零一數初初刻二數初一刻三數初二刻四數初三刻五數正初刻六數正一刻七數正二刻八數正三刻此立成法也今零三數乃是初二刻矣欲求二月節則於前數上加一五二五即前一千五百二十五也此項數節氣中氣皆以之加用為前正月小盡除去二十九日如遇大月除去三十日算中氣則不除大小月剩下一三五八則十三日辰時正三刻驚蟄也餘倣此十二時為一日如遇十三時以上則退十二時為一日八刻為一時如遇九刻以上則退八刻為一時也喪大記云士葬用國車國音船示專反或作團又誤作國二綍無碑比出宫用功布注云比出宫用功布則出宫而止至壙無矣舊圖云功布謂以大功之布長三尺以御柩居前為行者之節度又𨼆義云羽葆功布等其象皆如麾則旌旗無旒者周謂之大麾既夕禮云商祝執功布以御柩執披賈釋云謂以葬時乘人故有柩車前執引者及在柩車傍執披者皆御治之又注云居柩車之前若道有低仰傾􅉛則以布為抑揚左右之節使執引者執披者知之也道有低謂下阪時也道有仰謂上阪時也傾􅃜謂道之兩邊在柩車左右轍有髙下也若道有低則抑下其布使執引者知其下阪也若道有仰則揚舉其布使執引者知其上阪也若柩車左邊右邊或髙下傾􅉛亦左右布使知道有傾􅉛也假令車之東轍下則抑下其布向東使西邊執披者持之若車之西轍下則抑下其布向西使東邊執披者持之所以然者使車不傾􅉛也大夫御柩以茅諸侯以羽葆天子以纛指引前後左右皆如功布之施為也又既夕禮將葬啓肂也商祝免袒執功布入自西階注云功布灰治之布也執之以接神為有所拂㧍賈釋云拂㧍猶言拂拭也故下經云商祝拂㧍用功布是拂拭去塵也此始告神而用功布拂拭謂拂拭去凶邪之炁也出聶崇義三禮圖人中錢唐陳鑑如以寫神見推一時嘗持趙文敏公真像來呈公援筆改其所未然者因謂曰唇之上何以謂之人中若曰人身之中半則當在臍腹間蓋自此而上眼耳鼻皆雙竅自此而下口暨二便皆單竅三畫隂三畫陽成泰卦也發燭杭人削松木為小片其薄如紙鎔硫黄塗木片頂分許名曰發燭又曰焠兒蓋以發火及代燈燭用也史載周建徳六年齊后妃貧者以發燭為業豈即杭人之所製與宋翰林學士陶公榖清異録云夜有急苦於作燈之緩有知者批杉條染硫黄置之待用一與火遇得燄穗然既神之呼引光奴今遂有貨者易名火寸按此則焠寸聲相近字之譌也然引光奴之名為新嫁故人女沈仲說右姑蘇人年四十未有子其妻鄒氏候其他適為置一年少貌美之妾及歸命出拜將以奉枕席仲說詢其鄉貫祖父來歴始不肯言詢之再泣而曰妾范復初女也父喪家貧老母見粥於此仲說惻然淚下因囑妻曰此女父吳中名士乃吾故人豈可以為妾當如己子視之即尋其母使擇壻仲說備奩具嫁之邦人稱之至今不置夫嫁人之女為妾為妓為娼者古有其人矣今則未聞也仲說誠賢矣哉平反中書左丞李忠宣公徳輝字仲實通州潞縣人至元七年庚午公為户部尚書歲旱蝗世祖特命公録山西河東囚行至懐仁民有魏氏發得木偶持告其妻挾左道厭勝謀殺已經數獄服詞皆具自以為不免公燭其誣召鞫魏妾榜掠一加服不移晷蓋妬其女君謂獨陷以是罪可必殺之也即直其妻而杖其夫之溺愛受欺當妾罪死觀者神之或咨賞泣下勘釘姚忠肅公至元二十年癸未為遼東按察使武平縣民劉義訟其嫂與其所私同殺其兄成縣尹丁欽以成屍無傷憂懣不食妻韓問之欽語其故韓曰恐頂􅇟有釘塗其迹耳驗之果然獄定上讞公召欽諦詢之欽因矜其妻之能公曰若妻處子邪曰再醮令有司開其夫棺毒與成𩔖并正其辜欽悸卒時比公為宋包孝肅公拯云碑志書法嘗聞諸翰林大老云古碑刻中單書國號曰漢曰宋者蓋其建國號詔曰漢曰宋也我朝大元二字在詔㫖不可單用又凡書官銜俱當從實如廉訪使總管之𩔖若日監司大守是亂其官制久逺莫可考矣又蓋二字止可施諸壙石若於碑須曰額為是雕刻精絶詹成者宋髙宗朝匠人雕刻精妙無比嘗見所造鳥籠四面花版皆於竹片上刻成宫室人物山水花木禽鳥纎悉俱備其細若縷而且玲瓏活動求之二百餘年無復此一人矣題跋劉須溪先生會孟題蘇李泣别圖云事已矣泣何為蘇武節李陵詩噫馮海粟先生子振題楊妃病齒圖云華清宫一齒痛馬嵬坡一身痛漁陽鼙鼓動地來天下痛陳伯敷先生繹曾題楊妃上馬嬌圖云此索清平調詞赴沉香亭時邪抑聞漁陽鼙鼓聲赴馬嵬坡時邪上馬固相似情狀大不同觀者當審諸余觀三先生之跋語痛快嚴峻抑揚感傷使後世之為人君而荒於色為人臣而失其節者見之寧不知懼乎隆友道張毅父先生千載廬陵人而宋丞相文公友也公貴顯時屢以官辟不就江南既内屬公自廣還過吉州城下先生來見曰今日丞相赴北某當偕行既至燕寓于公囚所側近日以美饌餽凡三載始終如一且潛製一櫝公受刑日即以藏其首復訪求公之室歐陽氏於俘虜中俾出焚其屍先生收拾骸骨襲以重囊與先所函櫝南歸付公家𦵏之後公之子忽夢公怒云繩鋸髪斷明日起視果有繩束髪其英爽尚如此劉須溪紀其事贊於公畫像上曰閒居忽忽萬古咄咄天風慘然如動生髪如何尋約亦念束芻豈其英爽猶累形軀同時之人能不顙泚昔忌其生今妬其死鄧中齋題曰目烱烱兮疎星曉寒氣鬱鬱兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼曾謂斯人不在世間朱張宋季年群亡賴子相聚乘舟鈔掠海上朱清張瑄最為雄長隂部曲曹伍之當時海濵沙民富家以為苦崇明鎮特甚清嘗傭楊氏夜殺楊氏盜妻子貨財去若捕急輙引舟東行三日夜得沙門島又東北過髙句麗水口見文登夷維諸山又北見燕山與碣石往來若風與鬼影迹不可得稍怠則復來亡慮十五六返私念南北海道此固徑且不逢淺角識之杭吳明越揚楚與幽萊解密遼解俱岸大海固舟航可通相𫝊朐山海門水中流積堆於江沙其長無際浮海者以竿料淺深此淺生角故曰料角明不可度越云廷議兵方興請事招懐奏可清瑄即日來以吏部侍郎左遷七資最下一等授之令部其徒屬為防海民義𨽻提刑節制水軍江南既内附二人者從宰相入見授金符千戸時方輓漕東南供京師運河隘淺不容大舟不能百里五十里輙為堰瀦水又絶江淮遡泗水吕梁彭城古稱險處會通河未鑿東阿茌平道中車運三百里轉輸艱而糜費重二人者建言海漕事試之良便至元十九年也上方注意嚮之初年不過百萬石後乃至三百萬石二人者父子致位宰相弟姪甥壻皆大官田園宅館徧天下庫藏倉庾相望巨艘大舶帆交番夷中輿騎塞隘門巷左右僕從皆佩於莵金符為萬户千戸累爵積貲氣意自得二人者既滿盈父子同時夷戮殆盡沒貲産縣官黨與家破禁錮大徳六年冬也見胡石塘先生所撰何長者𫝊交誼陳子方閔仲達同舍生也皆待次杭府史陳月日在前閔以計力反先之陳殊無怒意因赴都以薦舉入仕歴官浙西廉訪司僉事閔方陞書吏聞陳來歎曰復何面目見之遂稱疾不出陳下車即問左右曰閔仲達何在衆以疾對陳曰必為我故非疾也亟造其家閔皇恐出肅陳曰吾與君氣誼契厚君昔先我而食禄者命也使非此吾又能致是耶今幸同一公署惟有以教正之幸甚寧舍我與閔感激從事相好如初假宅以死吾鄉周待制先生仁榮字本心築一室纔落成友人楊公道輿疾至門曰願假君新宅以死先生讓正寢居之妻子咸不然先生弗顧未幾楊死箱財廿八莫有主者楊之弟詣先生求分財先生曰若兄寄死於我意固在是喪事之費自己出終不利其一毫對衆封籍自平陽呼其子來悉付與之清風堂屍迹福州鄭丞相府清風堂石階上有卧屍迹天隂雨時迹尤顯蓋其當宋季以暮年登科未幾拜相至今閭巷表之曰耆徳魁輔之坊鄭顯時侵漁百姓至奪其屋廬以廣居宅有被逼抑者遂自殺於此今所居為官埶豪奪子孫不絶如綫因記宋臨川吳曾能改齋漫録云建炎四年五月楊勍叛卒由建安宼延平道出小常村掠一婦人逼脅欲犯之婦人毅然誓死不受汚遂遇害横屍道傍賊退人為收瘞之而其屍枕籍處痕迹𨼆然不滅每雨則其迹乾晴即濕宛如人影往來者莫不嗟異鄉人或削去之隨即復見覆以他土而其迹愈明今三十年矣與順昌軍員范旺事畧同但范現迹街磚而此現於土上耳范死以忠婦死以節小常村去劎浦縣治二十里以漫録言之則二人之死足以驚動萬世宜其英烈之氣不泯如此若清風堂者不過寃抑之志不得伸以決絶於一時耳亦何為而然哉豈幽憤所積結致是耶此理殆不可曉坐右銘翰林學士盧疎齋先生摰字處道涿郡人坐右銘大書一天字其下細注六字云有記性不急性可謂知畏天者矣掘墳賊杭瑪瑙寺僧温日觀能書所畫蒲萄須梗枝葉皆草書法也性嗜酒然楊總統飲以酒則不一沾唇見輙罵曰掘墳賊掘墳賊云廉介李仲謙思讓滕州鄒縣人前至元間由嘉興路吏貢補浙西按察司書吏廉介有為上侍父母下撫兩弟毎退食自公則閉户讀書稽今考古而教訓之俸薄奉養不給婦躬紡績以益薪水之費仲謙止有一布衫或須浣濯補紉必俟休暇日至是若賔客見訪則俾小子致謝曰家君治衣弗可出雷彦正號苦齋者清正慎許可人也時為使偶戯謂曰外郎穿布衲到敢裹著珍珠仲謙畧不答徐至本案書寫辭退呈狀壓几上而歸使知深悔失言親謁謝過請其出終不允使去他使來復往請始復役後仕至憲官甲午節氣至元三十一年甲午歲節氣正月一日壬子立春二月二日癸未驚蟄三月三日癸丑清明四月四日甲申立夏五月五日甲寅芒種六月六日乙酉小暑七月七日己卯立秋八月八日乙酉白露九月九日丙辰寒露十月十日丙戌立冬十一月十一日丁巳大雪十二月十二日丁亥大寒先輩謙讓武林錢思復先生惟善嘗言年十六七時以詩見息齋李公於州橋寓居既拜公公答拜命坐辭之再公曰仲尼之席童子隅坐因不敢辭徐永之先生為江浙提舉日客往訪之者無間親疏貴賤必送之門外凡客請納步則曰不可婦人送迎不踰閾右二事可見前輩諸老謙恭退抑汲引後進待人接物者如此雙竹杖白廷玉先生珽號湛淵錢唐人家多竹忽一竿上岐為二人皆異之賦雙竹杖詩未幾先生歿先生有二子或以為先兆云輟耕録卷五
