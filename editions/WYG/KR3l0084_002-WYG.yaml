body:
  text: 輟耕録卷二元陶宗儀撰聖聰至元六年二月二十五日上御玉徳殿命史臣榻前草詔黜謫太師巴延詔文有云其各領所部詔書到日悉還本衞上曰自蚤至暮皆一日也可改日字作時字時巴延以飛放為名挾持皇太子在柳林意將犯分詔既成遣中書平章濟爾噶岱齎至彼處開讀奉皇太子歸國而各枝軍馬即時散去蓋一字之中利害繫焉亶聰明作元后於此有以見之矣隆師重道文定王實喇巴爾今上之師也為學士時嘗在上左右一日體少倦遂於便殿之側偃卧因而就寐上因以藉坐方褥國語所謂都爾伯珍者親扶其首而枕之後嘗患癤額上上於金鉢中取佛手膏躬與貼之上之隆師重道可謂至矣盡矣王字敬臣號山齋輝和爾人受佛戒累朝皇帝先受佛戒九次方正大寳而近侍陪位者必九人或七人譯語謂之囊達實此國俗然也今上之初入戒壇見瑪哈噶拉佛前有物為供因問學士實喇巴爾曰此何物曰羊心上曰曾聞用人心肝者有諸曰嘗聞之而未嘗目睹請問喇嘛喇嘛者帝師也上遂命實喇巴爾𫝊㫖問之荅曰有之凡人萌歹心害人者事覺則以其心肝作供耳以此言復奏上再命問曰此羊曾害人乎帝師無荅減御膳國朝日進御膳例用五羊而上自即位以來日減一羊以歲計之為數多矣聖儉太府少監赫嚕奏取黄金三兩為御鞾刺花用上曰不可因請易以銀而鍍金者上曰亦不可金銀首飾也今民間所用何物對曰用銅上曰可右五事楊太史瑀所言太史居官時日侍上故知其詳后徳今上皇太子之正位東宫也設諭徳置端本堂以處太子講讀忽一日帝師來啓太子母后曰向者太子學佛法頓覺開悟今乃使習孔子之教恐壊太子真性后曰我雖居於深宫不明道徳嘗聞自古及今治天下者須用孔子之道捨此他求即為異端佛法雖好乃餘事耳不可以治天下安可使太子不讀書帝師赧服而退端本堂皇太子方在端本堂讀書近侍之嘗以飛放從者輙臂鷹至廊廡間喧呼馳逐以惑亂之將勾引出游為樂太子授業畢徐令左右戒之曰此讀書之所先生長者在前汝輩安敢䙝狎如此急引去毋召責也衆皆驚懼而退右二事乃貢尚書師泰授經宣文閣下日所目見者至正丙申間避地雲間每談朝廷典故因及此徵聘中書左丞魏國文正公魯齋許先生衡中統元年應召赴都日道謁文靖公靜修劉先生因謂曰公一聘而起毋乃太速乎荅曰不如此則道不行至元二十年徵劉先生至以為贊善大夫未幾辭去又召為集賢學士復以疾辭或問之乃曰不如此則道不尊治天下匠中書令耶律文正王楚材字晉卿在金為燕京行省員外郎國亡歸于我朝從太祖征伐諸國夏人巴勒津者以治弓見知於上詫王曰本朝尚武而明公欲以文進不已左乎王曰且治弓尚須弓匠豈治天下不用治天下匠耶上聞之喜自是用王益密以官為氏中書平章政事廉希憲字善甫封恒陽王諡文正本輝和爾氏王之父布魯堪為回鶻王歸朝官至順徳諸路宣慰使封魏國公諡孝懿拜廉訪使之命時適王生顧曰是兒必大吾門吾聞古者以官受氏天將以廉氏吾宗乎吾其從之舉族承命受孔子戒世祖一日命廉文正王受戒於國師王對曰臣已受孔子戒上曰汝孔子亦有戒耶對曰為臣當忠為子當孝孔門之戒如是而已上喜不食死謝君直先生枋得號疊山信州弋陽人宋景定甲子江東漕闈校文發䇿問權姦誤國趙氏必亡忤賈似道貶興國軍三年遇赦得還天兵南下郡城潰棄家入閩至元二十三年御史程文海承㫖留夢炎等交薦累召不赴二十六年春正月福建行省參知政事魏天祐復被詔㫖集守令戍將迫蹙上道臨行以詩别常所往來者曰雪中松柏愈青青扶植綱常在此行天下豈無龔勝潔人間不獨伯夷清義髙便覺生堪捨禮重方知死甚輕南八男兒終不屈皇天上帝眼分明夏四月至京師不食死年六十有四秋八月子定之奉柩歸葬門人誄而題之曰文節先生謝公墓嗟乎伯夷叔齊在周雖為頑民而在商則為義士孰謂數千載後有商義士之風者復見先生焉染髭中書丞相史忠武王天澤髭髯已白一朝忽盡黑世皇見之驚問曰史巴圖汝之髯何乃更黑邪對曰臣用藥染之故也上曰染之欲何如曰臣覽鏡見髭髯白竊傷年且暮盡忠於陛下之日短矣因染之使𤣥而報效之心不異疇昔耳上大喜人皆以王捷於奏對推此一事則餘可知矣漢人賜名巴圖者惟王與太師張獻武王𢎞範及真定新軍張萬户興祖耳殺虎張真定新軍張萬戸興祖中山無極人至元十九年丞相楚國文定公阿爾哈雅以中書右丞南取漢郢公實從有功授前職平生射虎數十一日遇虎一發而踣語人曰吾聞生虎之髭剔齒疾可已風因拔之虎怒爪鞾裂賴其氣息垂盡不能傷足由是人目之曰殺虎張後賜名巴圖爾訛作㧞突又訛抜都都與突字雖異而聲相近蓋譯語無正音故也御史舉薦姚文公先生燧為中臺監察御史時忽御史大夫謂曰我天子以汝賢故擢居耳目之官今且歲餘至如興利除害之事未嘗有片言及之但惟以薦舉為務何邪先生荅曰某所薦者百有餘人皆經世之才其在中外並能上禆聖治則某之報効亦勤矣又何待屑屑於興利除害然後為監察御史之職任乎大夫曰真宰相器也歎賞久之切諫太宗素嗜酒晩年尤甚日與大臣酣飲耶律文正王數言之不聽一日持酒槽之金口以進曰此乃鐵耳為酒所蝕尚致如此况人之五臟有不損耶上說賜以金帛仍勑左右日惟進酒三鍾而止夫以王之切諫不已而上終納之可謂君明臣良者矣丁祭内翰王文康公鶚字百一開州東明人國初自保定應聘北行時故人馬雲漢以宣聖畫像為贈既達北庭值秋丁公奏行釋奠禮世祖說即命舉其事公為祝文行三獻禮禮畢進胙於上上既飲福熟其胙命左右均霑所賜自是春秋二仲歲以為常蓋上之所以尊師重道者實公有以啓之也髙學士國朝儒者自戊戌選試後所在不務存恤往往混為編氓至於奉一札十行之書崇學校奬秀藝正户籍免徭役皆翰林學士髙公智耀奏陳之力也公河西人今學校中往往有祠之者大黄愈疾丙戌冬十一月耶律文正王從太祖下靈武諸將爭掠子女玉帛王獨取書籍數部大黄兩駝而已既而軍中病疫惟得大黄可愈所活幾萬人吁廉而不貪此固清慎者能之若其先見之明則有非人之所可及者置臺憲御史臺至元五年置秩從二品二十一年陞正二品大徳十一年陞從一品臺有大夫一人後增一人中丞二人後又增二人隨復故侍御史二人治書侍御史二人殿中侍御史二人治朝著之事典事二人掌幙府文書之事後改為都事三人後又以都事之長蒙古若色目一人為經歴檢法二人後廢管勾三人其一人兼照磨監察御史十二人後增至十六人皆漢人又增蒙古色目人如漢人之數今三十二人至元十四年既取宋置南行臺二十七年専蒞江南之地號江南諸道行御史臺秩如内臺而監察御史今二十四人西行臺初由雲南廉訪司陞行臺大徳元年移治陜西號陜西諸道行御史臺蒞陜西甘肅四川雲南之地延祐間暫廢隨復其官秩如南臺而監察御史今二十人各道提刑按察司至元六年置正三品有使副使僉事察判經歴知事二十八年改肅政廉訪司使副使僉事各二人大司農奏罷各道勸農司以農事歸憲司增僉事二人經歴知事照磨各一人今天下凡二十二道始建臺時大夫則塔齊爾也内御史署衘内監察御史署銜無御史臺三字以為天子耳目之官非御史大夫以下所可制也行臺則不然令史國朝凡省臺院吏曰掾史獨江南行臺作令史者蓋縁至元十四年初立行臺日御史大夫授三品秩故也後雖陞一品而樂因循者不為申明改正西臺立視南臺已陞品秩則曰掾史焉臺字三臺凡公文所書臺字並從士從口不敢作其字頭若然則偽文也按許氏說文臺從至從之從髙省則土乃之之正書耳當從土從口為是詔西番累朝皇帝於踐祚之始必布告天下使咸知之惟詔西番者以粉書詔文於青繒而繡以白絨網以真珠至御寳處則用珊瑚遣使齎至彼國張於帝師所居處五刑國初立法以來有笞杖徒流死之制凡七下至五十七下用笞六十七下至一百七十用杖徒之法徒一年杖六十七一年半杖七十七二年杖八十七二年半杖九十七三年杖一百七此麗徒者杖數也鹽徒既決而又鐐之使居役也數用七者建元以前皆用成數今匿稅者笞五十犯私鹽茶者杖七十私宰馬牛者杖一百舊法猶有存者大徳中刑部尚書王約數上言國朝用刑寛恕笞杖十減其三故笞一十減為七今之杖一百者宜止九十七不當反加十也議者憚於變更其事遂寢流則南之遷者之北北之遷者之南死則有斬有凌遲而無絞錢幣世皇嘗以錢幣問太保劉文貞公秉忠公曰錢用於陽楮用於隂華夏陽明之區沙漠幽隂之域今陛下龍興朔漠君臨中夏宜用楮幣俾子孫世守之若用錢四海且將不靖遂絶不用錢迨武宗頗用之不久輙罷此雖術數䜟緯之學然驗之於今果如所言巴爾斯河南江北行中書省參知政事姚忠肅公天福字君祥平陽人至元十一年拜監察御史彈擊權臣無所顧畏世祖賜名巴爾斯國言虎也後條奏宰相阿哈瑪特罪二十有四召廷辯公枚數之彼輙引服數至於三氣沮色喪上曰此三者罪巳不在宥因目公曰巴爾斯臣下有違太祖之制干朕之紀者汝抨擊毋𨼆廷臣皆震悚時方倚相理財姑釋不問衆人莫不為公危之公之太夫人有賢識朂之曰為國者忘其家汝第盡力効忠果不測吾追踪陵母死日猶生年也公泣謝白其長曰萬一得譴乞不以老母連坐語聞上歎曰是母子有古義烈勅侍臣符寳郎董文忠宣付史館書之善諫至元二十四年僧格之為尚書丞相也專權擅政虐燄薰天賄賂公行畧無畏避中書平章武寧正獻王徹爾時為利用監獨奮然數其姦贓於上前上怒以為醜詆大臣命左右批其頰王辨不為止且曰臣思之熟矣國家置臣子猶人家畜犬譬有賊至而犬吠主人初不見賊乃箠犬犬遂不吠豈良犬哉上悟收僧格籍其家明日王拜御史中丞余按北史宋游道𫝊畢義雲奏劾游道楊遵彦曰譬之畜狗本取其吠今以數吠殺之恐將來無復吠犬詔除名則王之以犬自况為有所本矣使交趾翰林學士元文敏公明善字復初清河人參議中書日會朝廷遣蒙古大臣一員使交趾公副之將還國之偽主賚以金蒙古受之公固辭偽主曰彼使臣已受矣公獨何為公曰彼所以受者安小國之心我所以不受者全大國之體偽主歎服刻名印今蒙古色目人之為官者多不能執筆花押例以象牙或木刻而印之宰輔及近侍官至一品者得㫖則用玉圖書押字非特賜不敢用按周廣順二年平章李榖以病臂辭位詔令刻名印用據此則押字用印之始也國璽文宗開奎章閣作二璽一曰天厯之寳一曰奎章閣寳命臣虞集文今上作二小璽一曰明仁殿寳一曰洪禧命臣楊瑀文洪禧璞純白而龜紐墨色宣文閣天厯初建奎章閣於西宫興聖殿之西廊為屋三間髙明敞爽南間以藏物中間諸官入直所北間南嚮設御座左右列珍玩命群玉内司掌之閣官署銜初名奎章閣階正三品隷東宫屬官後文宗復位乃陞為奎章閣學士院階正二品置大學士五員並知經筵事侍書學士二員承制學士二員供奉學士二員並兼經筵官幕職置參書二員典籖二員並兼經筵㕘贊官照磨一員内掾四名内二名兼檢討宣使四名知印二名譯史二名典書四名屬官則有羣玉内司階正三品置監羣玉内司一員司尉一員亞尉二員僉司二員典簿一員令史二名典吏二名司鑰二名司膳四名給使八名専掌祕玩古物藝文監階正三品置太監兼檢校書籍事二員少監同檢校書籍事二員監丞㕘檢校書籍事二員或有兼經筵官者典簿一員照磨一員令史四名典吏二名専掌書籍鑒書博士司階正五品置博士兼經筵參贊官二員書吏一名専一鑒辨書畫授經郎階正七品置授經郎兼經筵譯文官二員専一訓教集賽官大臣子孫藝林庫皆從六品置提典一員大使一員副使一員司吏二名庫子一名専一收貯書籍廣成局階從七品置大使一員副使一員直長二員司吏二名専一印行祖宗聖訓及國制等書特恩剙製象齒小牌五十上書奎章閣三字一面字一面蒙古字與輝和爾字分散各官懸佩出入宫門無禁學士院凡與諸司往復惟劄送參書㕔行移而已命侍讀學士虞集撰記御書刻石閣中今上皇帝改奎章曰宣文其記曰大統既正海内定一乃稽古右文崇徳樂道以天厯二年三月作奎章之閣備燕閒之居將以淵潛遐思緝熙典學乃置學士員俾頌乎祖宗之成訓毋忘乎創業之艱難而守成之不易也又俾陳夫内聖外王之道興亡得失之故而以自儆焉其為閣也因便殿之西廡釋髙明而有容不加飾乎采斵不重勞於土木不過啓乎牖以順清燠樹􅍥閣以棲圖書而已至於器玩之陳非古制作中法度者不得在列其為處也跬步戸庭之間而清嚴邃密非有朝會祠享時巡之事幾無一日而不御於斯於是宰輔有所奏請宥密有所圖維爭臣有所繩糾侍從有所獻替以次入對從容密勿蓋終日焉而聲色狗馬不軌不物者無因而至前矣自古聖明睿知善於怡心養神培本浚源泛應萬變而不窮者未有易乎此者也蓋聞天有恒運日月之行不息矣地有恒勢水土之載不匱矣人君有恒居則天地民物有所係屬而不易矣居是閣也靜焉而天為一動焉而天弗違庶乎有道之福以保我子孫􅀺民於無窮哉至順辛未孟春二日記占驗傅初菴先生立以占筮起東南時杭州初内附世皇以故都之地生聚浩繁貲力殷盛得無有再興者命占其將來如何卦既成對曰其地六七十年後會見城市生荆棘不如今多也今杭連厄於火自至正壬辰以來又數燬於兵昔時歌舞之地悉為草莽之墟軍旅填門畜豕載道乃知立之占亦神矣立乃番昜祝卜泌甥泌精皇極數權臣擅政中書右丞相巴延所署官銜計二百四十六字曰元徳上輔廣忠宣義正節振武佐運功臣太師開府儀同三司秦王達爾罕中書右丞相上柱國録軍國重事監修國史兼徽政院侍正昭功萬戸府都總使虎符威武阿克蘓衞親軍都指揮使司達嚕噶齊忠翊侍衞親軍都指揮使奎章閣大學士領學士院知經筵事太史院宣政院事葉赫千戸哈必齊千戸達嚕噶齊宣忠烏魯斯扈衞親軍都指揮使司達嚕噶齊提調回回漢人司天監群牧監廣惠司内史府左都威衞使司事欽察親軍都指揮使司事宫相都總管府領太禧宗禋院兼都典制神御殿事中政院事宣鎮侍衞親軍都指揮使司達嚕噶齊提調宗人蒙古侍衞親軍都指揮使司事提調哈喇齊額布根徹爾領隆祥使司事當其擅政之日前後左右無非隂邪小輩惟恐獻諂進佞之不至孰能告以忠君愛民之事有一王爵者譯奏云色辰二字人皆可以為名自世祖皇帝廟號之後遂不敢用今太師巴延功髙徳重可以色辰名字與之時御史大夫特穆爾布哈亦其心腹每隂嗾省臣奏允其請文定王實喇巴爾時為學士從容言於上曰萬一曲從所請關係非輕遂命學士歐陽𤣥監丞掲徯斯會議以元徳上輔四字代之加於功臣之上又典瑞院都事某建言凡省官提調軍馬者必佩虎符今太師巴延難與他人同宜錫龍鳳牌以寵異之制可遂製龍鳳牌一面其三珠各函徑寸真珠一枚而飾以紅埓阿勒寳石牌身脫鈒元徳上輔功臣號字仍用白玉嵌造牌成計直數萬錠既被貶黜毁其牌就以珠寳給還物主蓋督勒有司和買元價尚未酬也又京畿都運尼雅斯拉上言太師巴延功􅈴蓋世所授宣命難與百官一體合用泥金書詞以尊榮之省臺院官議不可行宛轉禀白止金書上天眷命皇帝聖㫖八字餘仍墨筆云懐孟蛙大徳間仁宗在潛邸日奉達爾結太后駐輦輝黙圖苦群鼃亂喧終夕無寐翼旦太后命近侍傳㫖諭之曰吾母子方憒憒鼃忍惱人耶自後其毋再鳴故至今此地雖有鼃而不作聲後仁宗入京誅安西王阿南達等迎武宗即位時大徳十一年也越四年而仁宗繼登大寳則知元后者天命攸歸豈行在之所雖未踐祚而山川鬼神以隂來相之不然則蟲魚微物耳又能聽令者乎但迄今不鳴尤可異矣賊臣攝祭至治癸亥十月六日甲子先一夕因晉邸入繼大統告祭太廟之頃隂風北來殿上燈燭皆滅良久方息蓋攝祭官特克實額森特穆爾齊勤特穆爾等皆弑君之元惡也時全思誠以國子生充齋郎目擊之此無他必祖宗威靈在上不使姦臣賊子得以有事於太廟而明示嚴譴之耳彼徒罪無所逃至於身誅族赤而後已吁可畏哉叛黨告遷地至元二十四年宗王納延叛後伏誅徙其餘黨於慶元之定海縣延祐間伊納托克托公來為浙相其黨屢以水土不便為訴乞遷善地公曰汝輩自尋一箇不死人的田地當為汝遷之衆遂不敢再言土人作掾至元間伯勒齊爾布哈公為江浙丞相議以本省所轄土人不得為掾史時左丞法珠公謂曰若然則中書掾當用外國人為之矣相有赧色議遂不行蕭先生蕭貞敏公􅆽字維斗京兆人蚤歲吏於府一日呈牘尹前尹偶墜筆目公拾之公陽為不解而止白所議公事如此者三公曰某所言者王事也拾筆責在皁𨽻非吏所任尹怒公即辭退𨼆居十五年惟以讀書為志從公游者屨交戸外平章咸寧王額森聞其賢薦之於世祖徵不至授陜西儒學提舉繼而成宗武宗仁宗累徵授國子司業集賢直學士未赴改集賢侍講又以太子右諭徳徵始至京師授集賢學士國子祭酒尋復得告還山年七十七以夀終諡貞敏
