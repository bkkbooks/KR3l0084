body:
  text: 輟耕録卷十九元陶宗儀撰脈人稟天地五行之氣以生手三陽三隂足三陽三隂合為十二經以環絡一身徃來流通無少間㫁其脈應於兩手三部焉夫衇者血也脈不自動氣實使之故有九候之法内經云脈者血之府説文云血理分袤行體者從􅏨從血亦作脈通釋云五藏六府之氣血分流四體也釋名云脈幕也幕絡一體字從肉從􅏨􅏨音普拜切水之邪流也脈字從􅏨取脈行之象無求子云脈之字從肉從􅏨又作􅂒盖脈以肉為陽􅂒以血為隂華佗云脈者血氣之先也氣血盛則脈盛氣血衰則脈衰血熱則脈數血寒則脈遲血㣲則脈弱氣血平則脈緩晉王叔和分為七表八裏可謂詳且至矣然文理䋣多學者卒難究白宋淳熙中南康崔子虚𨼆君嘉彦以難經於六難專言浮沉九難專言遲數故用為宗以統七表八裏而總萬病其説以為浮者為表為陽外得之病也有力主風無力主氣浮而無力為芤有力為洪又沉為實沉者為裏為隂内受之病也有力主積無力主氣沉而極小為㣲至骨為伏無力為弱遲者為隂主寒内受之病也有力主痛無力主冷遲而少駃為緩短細為濇無力為濡數者為陽主熱外得之病也有力主熱無力主瘡數而極弦為𦂳有力為弦流利為滑他若九道六極之殊三焦五藏之辨與夫持脈之道療病之方其間元妙具在四脈元文及西原脈訣等書世以為秘授始由𨼆君傳之劉復真先生先生傳之朱宗陽鍊師鍊師傳之張元白高士今徃徃有得其法者學者其求諸四司六局俗稱四司六局者多不能舉其目古杭夢游録云官府貴家置四司六局各有所掌故筵席排當凡事整齊都下街市亦有之常時人户毎遇禮席以錢倩之四司六局皆可致四司者帳設司厨司茶酒司臺盤司也六局者果子局􅁡煎局菜􅂼局油燭局香藥局排辦局也凡四司六局人祗應慣熟便省賔主一半力稽古閣博古圖宋徽廟朝所修書故世知有博古之名而不知更有稽古等閣蔡京保和殿曲燕記云宣和元年九月十二日皇帝召臣京等燕保和殿臣鯈等東曲水朝於玉華殿上歩西曲水循酴醿架至太寕閣登層原闕其室氏乃宋内夫人余年十四五尚猶識之但兩􅁂俱秃問知在宫中任此職者例裹巾巾帶之末各綴一金錢毎晨用以掠髪入巾故乆而致然也因曰吾為内夫人日毎日輪流六人侍帝左右以紙一畨從後端起筆書帝起居旋書旋卷至暮封付史館内夫人别居一宫宫門金字大牌曰官家無故至此罰金一鎰以二者言之可見宋朝家法之嚴闌駕上書至正乙酉冬朝廷遣官奉使宣撫諸道問民疾苦然而政績昭著者十不二三明年秋江右儒人黄如徴邀駕上書指數察察爾王士宏等罪狀且及國家利害斧鉞在前有所不避古之所謂豪傑之士如徴其人者與天子親覽其書喜見于色又虞如徴必為權豪所中顧近臣館穀以俟越數日特授江西等處儒學提舉勑侍衛䕶送出都如徴感上徳意受命而不領職天下共賢之察察爾王士宏等雖免譴責終以不顯死其書略曰江西布衣書生黄如徴百拜上書皇帝陛下如徴忝生僻土遭遇明時用竭愚衷冐干天聽伏望采覽萬一焉夫皇朝版圖之廣歴古所無法制之良萬世莫易而水旱災變連年不息者實由官皆汙濫民悉怨咨之所致也欽惟陛下憂民之心日夕孜孜遂於去年冬分遣大臣奉使宣撫諸道正欲其察政事之臧否問生民之疾苦禮賢德振貧乏信寃抑起淹滯俾所至之處如陛下親臨焉茍能宣布聖澤各盡乃職則雍熈泰和之治正在今日然江西福建一道地處蠻方去京師萬里外傳聞奉使之來皆若大旱之望雲霓赤子之仰慈母而察察爾王士宏等不體聖天子撫綏元元之意鷹揚虎噬雷厲風飛聲色以淫吾中賄賂以緘吾口上下交征公私朘剥贓吏貪婪而不問良民塗炭而㒺知閭閻失望田里寒心乃歌曰九重丹詔頒恩至萬兩黄金奉使回又歌曰奉使來時驚天動地奉使去時烏天黒地官吏都懽天喜地百姓却啼天哭地又歌曰官吏黒漆皮燈籠奉使來時添一重如此怨謠未能枚舉皆百姓不平之氣鬱結于懐而發諸聲者然也此盖廟堂遴選非人使生民感陛下憂恤之虚恩受奉使掊剥之實禍陛下於此而不察將何以取法於後世哉如徴無官守無言責所以不憚江河之險不畏斧鉞之誅而詣闕以陳其事者正恐察察爾王士宏等囘覲之日各飾巧言妄稱官清民泰欺詐百端昬蔽主聽陛下不悟為姦邪所賣擢任省臺恣行威福流毒四海則江西福建一道之痛苦與天下共之以此而望隂陽和風雨時年嵗登邊隅静不亦難乎倘陛下不棄蒭蕘之言委官察其實蹟責以欺天㒺民之罪投諸遐荒雪江西福建一道之痛苦以為百官勸則天下幸甚萬世幸甚如陛下以為誹謗大臣置而不問非惟今日禍起蕭牆抑且天下萬世之不幸矣如徴鄙語俗言不知避諱觸犯清蹕罪在不赦請伏鑕以俟命錢武肅鐡券吾鄉錢叔琛氏贇乃武肅王之諸孫也其家在郡城外東北隅亭臺沼沚聨絡暎帶猶是先朝賜第與余相友善嘗出示所藏鐡券形宛如瓦高尺餘濶二尺許券詞黄金商嵌一角有斧痕盖至元丙子天兵南下時其家人竊負以逃而死於難券亦莫知所在越再丙子漁者偶網得之乃在黄岩州南地名澤庫深水内漁意寳物試斧擊之則銕焉因棄諸幽一村學究與漁隣頗聞賜券之説買以銕價然二人皆不悟其字乃金也有報於叔琛之兄者用十斛穀易得青氊復還誠為異事時余就録券詞一通叔琛又出武肅當日謝表藁併録之昨晚檢閱經笥偶得於故紙中轉首已三十餘年矣人生能幾何哉謾志于此詞云維乾寜四年嵗次丁巳八月甲辰朔四日丁未皇帝若曰咨爾鎮海鎮東等軍節度浙江東西等道觀察處置營田招討等使兼兩浙鹽鐡制置發運等使開府儀同三司檢校太尉兼中書令使持節閩越等州諸軍事兼閩越等州刺史上柱國彭城郡王食邑五千戸食實封一百戶錢鏐朕聞銘鄧隲之勲言垂漢典載孔悝之徳事美魯經則知褒徳䇿勲古今一致頃者董昌僣偽為皆鏡水狂謀惡慣㳿染齊人而爾披攘兇渠盪定江表忠以衛社稷恵以福生靈其機也氛祲清其化也疲羸泰拯甌越於塗炭之上師無私焉保餘杭於金湯之間政有經矣志奬王室績冠侯藩溢于旂常流在丹素雖鍾繇刻五熟之釡竇憲勒燕然之山未足顯功抑有異數是用錫其金版申以誓詞長河有似帶之期泰山有如拳之日唯我念功之㫖永將延祚子孫使卿長襲寵榮克保富貴卿恕九死子孫三死或犯常刑有司不得加責承我信誓徃惟欽哉宜付史館頒示天下表云恩主賜臣金書鐡劵一道臣恕九死子孫三死者出於睿眷形此綸言録臣以絲髮之勞賜臣以山河之誓鐫金作字指日成文震動神祇飛揚肝膽伏念臣爰従筮仕迨及秉麾每自揣量是何叨忝所以行如履薄動若持盈惟憂福過禍生敢忘慎初䕶末豈期此志上感宸聰憂臣以處極多危慮臣以防㣲不至遂開聖澤永保私門屈以常則宥其必死雖君親囑念皆云必恕必容而臣子為心豈敢傷慈傷愛謹當日慎一日戒子戒孫不敢因此而累恩不敢乘此而賈禍聖主萬歳愚臣一心按史唐禧宗乾符五年王仙芝餘黨曹師雄冦掠二浙杭州募兵使石鏡都將董昌等將以討之臨安人錢鏐以驍勇事昌為兵馬使中和元年昌為杭州刺史光啓二年昌謂鏐曰汝能取越州吾以杭授汝鏐攻尅之昌遂徙越以鏐知杭州事三年昌為越州觀察使鏐為杭州刺史昭宗景福元年為武勝軍防禦使二年為鎮海節度使乾寜二年昌僣號鏐遺書曰與其關門作天子與九族百姓俱䧟塗炭豈若開門作節度使終身冨貴耶昌不聽鏐以狀聞削奪昌官爵委鏐討之三年昌伏誅鏐令吏民上表請兼領浙東朝廷不得已以為鎮海鎮東節度使改威勝曰鎮東天復二年進爵越王天祐元年更封吳王梁太祖開平九年以為吳越王乾化二年加尚父末帝貞明二年以為諸道兵馬元帥三年以為天下兵馬元帥龍徳三年以為呉越王鏐始建國儀衛名稱多如天子之制惟不改元置百官有丞相侍郎客省等使唐明宗天成四年削鏐官爵初鏐嘗遺安重誨書辭禮甚倨及朝廷遣奉使烏昭遇韓玟使鏐還玟奏昭遇見鏐稱臣拜舞重誨奏賜昭遇死鏐以太師致仕自餘官爵皆削之長興二年鏐卒鏐寢疾出印鑰授子元瓘曰子孫善事中國勿以易姓廢事大之禮卒年八十一史稱乾寜三年秋九月以鏐為鎮海鎮東節度使而劵詞乃四年秋八月何耶史稱儀衛名稱多如天子之制惟不改元程大昌演繁露云寳正六年歳在辛夘見封落星石制書辛夘乃唐明宗長興二年寳太元年羅𨼆記新城縣記云癸未歳癸未乃唐莊宗同光元年以此知吳越雖稟中原正朔既長興同光年號與其寳正寳太同嵗而名不同知吳越自嘗改元審矣又僧文瑩湘山野録云唐昭宗以錢武肅平董昌拜為鎮海鎮東節度使中書令賜鐡劵羅𨼆為譔謝表逮莊宗入洛又遣使貢奉懇請玉冊金劵有司定議非天子不得用後竟賜之鏐即以節鉞授其子元瓘自稱吳越國王名其居曰殿官屬悉稱臣又於衣錦軍大建玉冊金券詔書三樓遣使冊東夷諸國封拜其君長㡬極其勢與向之謝表所陳處極防㣲累恩賈禍之誡殊相戾矣禪月貫休嘗以詩投之有滿堂花醉三千客一劔霜寒十四州之句鏐愛其詩遣客吏諭之曰教和尚改十四為四十方與見休性􅄶介謂吏曰州亦難添詩亦不改然閒雲野鶴何天而不飛耶遂飄然入蜀鏐後果為安重誨奏削王爵以太師致仕重誨死明宗乃復鏐爵位夫武肅之踰越固莫逃乎二書所論射字法有教予射字法必湏彼我二人俱聰明熟於翻切優於記問者方乃便㨗倘遇人以詩詞或言語示我彼在隔坐不及知聞我則拊掌彼便説出與所示同然片段文章皆可成誦非特一句一字而已用拊掌代擊鼔殊無勾肆市井俗態此天下太平優游無事謾以取一時之笑樂耳使鼙鼓之聲震天干戈之鋒耀日又能留情於此耶其法七字詩十二句逐句排寫前四句括定字母後八句括定叶韻詩曰輕輕牽兵兵邊平平便明明眠逢興興掀征征煎經經堅迎迎年俜俜偏停停田應應烟成成涎聲聲羶清清千澄澄纒星星鮮晴晴涎丁丁顛檠檠䖍盈盈延能能稱稱千非精精煎零零連汀汀天橙橙纒東蒙鍾江支兹為㣲魚胡模齊乖佳灰咍真諄臻匡虧元魂痕寒歡關山先森蕭宵爻豪歌戈麻陽唐耕斜榮青蒸登尤侯車侵潭譚鹽添横光凡如欲切春字清諄清清千春清字在第三行第一字諄字在第七行第四字拊掌則前三後一少歇又前七後四夏字平聲為霞盈麻盈盈延霞盈字在第三行第七字麻字在第十行第二字拊掌則前三後七少歇又前十後二少歇又三盖夏字去聲所以又三也若入聲則四矣餘倣此但字母不離二十八字而叶韻莫逃五十六字此為至要後見賔退録一則與此略同併志之其曰俗間有擊鼓射字之伎莫知所始盖全用切字該以兩詩詩皆七言一篇六句四十二字以代三十六字母全用五支至十二齊韻取其聲相近便於誦習一篇七句四十九字以該平聲五十七韻而無側聲如一字字母在第三句第四字則鼓節前三後四叶韻亦如之又以一二三四為平上去入之别亦有不擊鼓而揮扇之𩔖其實一也詩曰西希低之機詩資非卑妻欺癡梯歸披皮肥其辭移題􅂝持齊時依眉㣲離為兒儀伊鋤尼醯雞箆溪批毗迷此字母也羅來𤓰藍斜凌倫思戈交勞皆來論流連王郎龍南闗盧甘林巒雷聊隣簾櫳羸婁參辰闌楞根灣離驢寒間懐横榮鞵庚光顔此叶韻也神人獅子松江之横雲山古冢纍纍然世傳以為多晉陸氏所藏山人封生業盜冢至正甲辰春發一冢冢磚上有太元二年造五字按太元東晉武帝時也逆數而上計九百一十餘年矣或者謂冢有志石但恐事泄秘弗示人冢中得古銅罍勺壺洗尊鼎雜器之物二百餘件内一水滴作獅子昻首軒尾走躍狀而一人面部方大髭鬚飄蕭騎獅子背左手握無底圎桶右手臂鷹人之腦心為竅以安吸子吸子頂㣲大正盖腦心儼一席㡌象人衣褶及獅鷹羽毛種種具備通身青緑吸子渾若碧玉論其製作膚理則非晉人所能乃漢器無疑必其平生寳惜而以殉葬約長五寸高四寸許誠竒物也至秋夏士安偶過生生出以售捐錢五十緡買之歸剔鑿沙土飾澤蠟石神氣百倍於昔韞櫝寳藏時以示博古好雅者一日為有勢力時貴奪去昔鮮于困學公嘗畜一水滴正與士安者大同小異相承曰蠻人獅子愛之未嘗去手寓杭州㫁橋日臨湖有水閣倚闌把玩偶墮吸子於湖水中百計求之不可見悒怏嘅嘆形神為之凋枯既他徃踰三年復來杭仍居昔所寓舎追懐故物徃視湖波適當霜降水静之時吸子儼在土内亟命僕下取欣然如獲至珍即易號曰神人獅子遂序述顛末求館閣諸老與夫騷人雅士歌咏以張之寖成巨軸公歿子孫不能世守水滴與詩卷皆歸婺州陶氏陶亦不能乆有又將求善賈而沽諸今不知所在自我朝百餘年來僅聞公得其一於先而士安得其一於今非若他古銅器比可以屈指數也至元鈔様中書左丞葉公亦愚李錢唐人宋太學生上書詆賈似道公田關子不便專權誤國似道怒嗾林徳夫告公泥金飾齋扁不法令獄吏鞫之云只要你做一箇麻糊公即口占一詩曰如今便一似麻糊也是人間大丈夫筆裏無時那解有命中有處未應無百千萬世傳名節二十三年非故居寄語長安朱紫客盡心好上帝王書遂遭黥流嶺南及蒙恩放還與似道遇諸途公以詞贈云君來路吾歸路來來去去何時住公田關子竟何如國事當時誰汝誤雷州戸厓州戸人生㑹有相逢處客中頗恨乏蒸羊聊贈一篇長短句歸附後入京上書言時相併獻至元鈔様此様在宋時固嘗進呈請以代關子朝廷不能用故今别改年號而復獻之世皇嘉納使用鑄板以功累官至今任而終妓聰敏歌妓順時秀姓郭氏性資聰敏色藝超絶教坊之白眉也翰林學士王公元鼎甚眷之偶有疾思得馬版腸充饌公殺所騎千金五花馬取腸以供至今都下傳為佳話時中書叅政阿哩衮尤屬意焉因戱謂曰我比元鼎如何對曰叅政宰相也學士才人也燮理隂陽致君澤民則學士不及叅政嘲風咏月惜玉憐香則叅政不如學士叅政付之一笑而罷郭氏亦善於應對者矣日無光至正辛丑四月朔日日未沒三四竿許忽然無光漸漸作蕉葉様天且昏黑如夜星斗燦然飯頃方復舊天再開星斗亦𨼆又少時乃沒按天官書王𨼆晉書曰日無光臣有隂謀京房易傳曰臣專刑兹謂分威蒙微而日不明松江志異至正壬寅八月中上海縣三十四保辰字圍金壽一家已閹雄狗生小狗八其一嘴爪紅如鮮血然犬之為妖多見於占騐之書而未有若此者若男變為女男子孕育則嘗聞之古昔盖陽衰隂盛兵戈亂離之兆今夫牡物而生兒陽化隂也又犬屬火一嘴爪紅紅亦火也豈非主兵主火者與甲辰四月十五日華亭縣五保楊巷邵浦雲之西清菴廊屋一十九間毎間屋柱皆有聲其聲若以桶覆水面而擊其底者人以手按之則振掉而起經時乃止按乾坤變異録人君宫室無故有音聲主兵起若人家主家亡六月二十三日夜四更松江近海去處潮忽驟至人皆驚訝以非正候至辰時潮方來乃知先非潮也後見湖泖人説湖泖素不通潮忽平擁起高三四尺若潮漲之勢正與此時同又聞平江嘉興亦如之按五行志水自盈溢主兵興乾坤變異録河水大壅臣下執政有背叛郡縣君國朝品官母妻四品贈郡君五品贈縣君然古邦君之妻邦人曰小君禮士喪妾不得匹其夫必曰君妻曰女君後世封羊祜妻為萬歳君則此可謂令甲之原面不畏寒人之四支百骸莫不畏寒獨面則否醫書謂頭者諸陽之㑹諸隂脈至頸及胷而還獨諸陽脈上至頭所以然也輟耕録卷十九
