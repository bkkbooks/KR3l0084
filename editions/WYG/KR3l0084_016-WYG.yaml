  text: 十六
  hash: sha256:adff0166a2f6a97a411c858da24f45fe65c1e742e6322e224eca7737de8534e7
body:
  text: 元陶宗儀撰陶氏二譜宋泰山王質所著雲韜堂紹陶録録中首載栗里華陽二譜惟先生之大節髙風流播千古而質者乃能次第其出處作為年譜且以名吾書紹陶之志是可尚已遂録于此云書陶栗里譜元亮髙風發扵宋晉去就之際君曽祖事晉懋著勲勞自宋武帝芟元復馬逆揣其末流即不出武帝将收賢士以繫人心見要亦不應陶謝皆世臣君世地色言俱辟而靈運為武帝秉任最後乃欲詭忠義雜江海逺師送君過虎溪而却靈運不入蓮社素心皆所鍳知譜具左右興寧三年乙丑晉哀帝君生扵潯陽柴桑今徳安縣楚城市是父軼名命子詩云於穆仁考澹焉虚止寄迹風雲宜兹愠喜陶氏自侃以武功擅世後裔稍襲故風多流亂岐盖折翼之祥發之旁𣲖𫝊淡𫝊君父子皆以𨼆徳著稱侃女適孟嘉嘉女適君父是生君其氣所傳造化必有可言者大元元年丙子晉武帝君年十二失母祭妹文云慈妣早世我年二六大元九年甲申君年二十失妾楚調詩云弱冠逢世阻始室䘮其偏妻翟氏偕老所謂夫耕扵前妻鉏扵後當是翟湯家湯荘矯法賜四世以𨼆行知名亦柴桑大元十九年甲午君年三十有歸園田詩云誤落塵網中一去三十年初為州祭酒當在其前不堪乃觧歸故云久在樊籠裏復得返自然尋亦却主簿隆安四年庚子晉安帝君年三十六五月有従都還阻風規林詩當是㕘鎮軍銜命自京都上江陵故在始作鎮軍㕘軍經曲阿詩後父在柴桑故云一欣侍温顔又云久㳺戀所生父為人度不肯適都當是已舍單行見還舊居詩軍僚差彊郡吏故云時来茍冥㑹宛轡憩通衢投䇿命晨装暫與田園䟽隆安五年辛丑君年三十七正月有㳺斜川詩云開嵗倐五日方三十七作五日是當是故嵗五月還潯陽今嵗七月適江陵有赴假還江陵夜行途中詩留潯陽踰年當是予告在鄉至是往赴云閒居三十載自未參鎮軍以前得三十六年當是不堪勞役遂起歸意故云詩書敦宿好園林無俗情如何捨此去遥遥至南荆失父祭妹文云昔在江陵重罹天罰觸事未逺書䟽猶存當是妹自武昌報江陵時父在柴桑元興二年癸卯君年三十九正月有始春懐古田舍詩當是自江陵歸柴桑復適京都宅憂居家思湓城故有懐古田舍又云良苖懐新十二月有與従弟敬逺詩云寝迹衡門下在都亦當是處野元興三年甲辰君年四十有連雨獨飲詩云僶仰四十年有飲酒詩云是時向立年志氣多所耻遂盡介然分終死歸田里當是在壬辰癸巳為州祭酒之時所謂投耒去學仕又云冉冉星氣流亭亭復一紀至是得十二年義熙元年乙巳君年四十一三月有為建威參軍使都經錢溪詩當是故嵗自都還里即吉庚子始事鎮軍繼事建威中經罹憂至是得六年復銜命至都其家尚未歸柴桑還舊居詩云疇昔家上京六載去還歸往来時經鄉閭不常留稍成疏故云阡陌不移舊邑屋或時非履歴周故居隣老䍐復遺至是始定居斷他適十一月有歸去来辭九月家留柴桑身往彭澤至是免歸當是不堪軍役故求縣不堪縣役故歸家所謂風波未定心憚逺役彭澤去家百里公田足以為酒少日眷然有歸與之情平生之志始决見序及辭甚詳失妹所謂情在駿奔自免去軄是嵗劉將軍録尚書義熙三年丁未君年四十三有祭程氏妹文自乙巳至是所謂服制再周義熈四年戊申君年四十四有六月遇火詩云奄出四十年義熈五年己酉君年四十五有九日詩義熈六年庚戌君年四十六有西田穫早稲詩義熙七年辛亥君年四十七有祭從弟敬逺文云絶粒委務考槃山隂晨采上藥夕閒素琴當時同志見文甚詳義熙十年甲寅君年五十有雜詩云奈何五十年棄官来歸至是得十年故云荏苒經十載暫為人所覊義熙十一年乙卯君年五十一有與子儼等疏云年過五十又云見樹木交䕃時鳥變聲亦復欣然五六月北窓下卧遇凉風暫至自號羲皇上人見䟽甚詳義熙十二年丙辰君年五十二有下潠田舍穫詩云曰余為此来三四星火頽當是得此在癸丑甲寅之間義熈十四年戊午君年五十四楚調云僶俛六九年召為著作佐郎不應是嵗宋公為相國元熙元年己未晉恭帝君年五十五王休元為江州自造不得見遣其故人龐通之等齎酒扵半道栗里要之即引酌野亭休元出與相聞極歡終日嘗九日把菊無酒休元餉之有九日閒居詩所謂秋菊滿園時醪靡至當是未獲所遺休元在江州幾六載未審的在何年自乙巳至丁卯訖死未嘗他適獨暫為休元入州永初元年庚申宋武帝君年五十六同𨼆周續之召至都為顔延之連挫義熙間檀韶為江州邀續之在城北講禮讐書有示周掾祖謝詩云馬隊非講肆校書亦已勤又云但願還渚中從我潁水濵江城尚不欲周往奚况京師劉遺民亦同𨼆有和劉柴桑詩云挈杖還西廬又云春醪觧饑劬其還以春有酬劉柴桑云嘉穗眷南疇又云慨然知已秋其還至是及秋初自西廬移南村有移居詩云聞多素心人樂與數朝夕又云過門更相呼有酒斟酌之遷居殆為遺民之徒尋還西廬度相距亦不逺與遺民更相酬酢不改賞文析義之時未審的在何年或恐劉柴桑似縣令劉或嘗為此縣存此呼或有命不為猶續之嘗命為撫軍參軍不就因呼周掾皆不可知但非時為宰者語皆冷交非熱官丁柴桑詩云秉直司聰于恵百里此乃當官無疑尋詩鍾情扵劉過厚扵周遺民自𨼆之餘無聞續之在𨼆之中㣲婉君與周劉號潯陽三𨼆校情義稍有淺深是嵗宋武帝踐祚景平元年癸亥晉營陽王君年五十九顔延之為始安過潯陽日造飲酣醉臨去留二萬錢送酒家相知乆間驟見益驩延之未審何時来柴桑所謂自爾分居及我多假伊好之洽接簷隣舍當是不詣劉穆之之時又未審何時去柴桑當是為豫章世子㕘軍之時據誄㕘傳略見元嘉三年丙寅宋文帝君年六十二檀道濟為江州時抱羸疾多瘠餒往候饋以粱肉不受元嘉四年丁卯君年六十三有自祭文云律中無射擬挽歌詩云嚴霜九月中送我出逺郊當是杪秋下世顔延之誄云視化如歸臨凶若吉藥劑弗嘗禱祠弗恤其臨終髙態見誄甚詳君平生好談歸盡蕭統以為處百齡之内居一世之中倐忽白駒寄寓逆旅與大塊而榮枯随中和而放蕩豈能勞扵憂畏役扵人間最知深心形贈影答神􅇚本趣略見所謂縦浪大化中不喜亦不懼應盡便湏盡無復獨多慮惟患不知既已洞知安坐待此夫復何言杜甫許避俗未許逹道識者更詳之書陶華陽譜通明髙風發扵梁齊宋去就之際君祖父皆食宋禄身又生宋代自齊髙帝代宋旋引去梁武帝代齊益退蔵平時以師待君然大節有定操豈復以恩禮推移暫至丹陽應簡文之命不少至京都慰武帝之懐抑何其堅忍壮年果扵遺世炤之審故判之不疑譜具左方孝建三年丙申宋世祖君生扵丹陽秣陵今上元縣治村是母郝氏夢兩天人持罏􅋹香来前有娠今世為君再世為孫思邈兩世肇啓扵郝故其兆先形當是本居天仙趣報盡還入人趣植根弗凡受形亦異生以火年火月又夏至極陽日悉禀純陽多起飛心累功積行所升當益髙推佛言參君迹略見大明四年庚子君年五嵗常持荻畫灰學書泰始元年乙巳宋明帝君年十嵗得葛洪神仙𫝊即有志養生語人仰青天睹白日不覺為逺及長博讀書䆳觧文武諸伎自後天文地理人事雖至淵妙咸臻底極當時已罕𫝊歴年愈逺行世寖稀梁𫝊所載十二種今𫝊惟三種傳不能紀十種唐志所載九種今𫝊惟四種𫝊有志無八種𫝊無志有五種本草後人增衍考正益詳間與集注差異元徽二年甲寅宋蒼梧王君年十九蕭將軍録尚書引為諸王侍讀故事止典文學無他務除奉朝請故事止奉朝㑹請召本不為官雖在宦途亦居静地及求縣乃不遂縁勢可見永明十年壬申齊世祖君年三十七家貧求宰縣不遂脫朝服挂神武門去止句曲山體即輕㨗性嗜山水所歴必吟咏盤旋不已語人吾見朱門廣厦雖適其華樂而無欲往之心望髙巖瞰大澤知難立止自常欲就之永明中求禄得輙差舛不爾豈得為今日之事亦縁勢使然此語甚真是事先有根次有縁次有勢相符乃入所謂道生之徳畜之物形之勢成之惟難契故曠世難就隆昌元年癸酉齊鬱林王君年三十八沈約為東陽屢要不至自棲句曲不出所謂徧歴名山求訪仙藥或未然一至句章禮育王塔一至丹陽應太子召他適皆無考又言往東陽従孫㳺嶽授符圖經法亦無考惟楊羲靈寳五符𫝊句容葛粲粲以𫝊陸修静陸以傳孫許翽二景歌東陽章靈民出都遇得以與孫度所得止在秣陵句曲之間非逺適而後𫝊永元元年己卯齊東昏侯君年四十四在句曲築樓髙三層身處其上弟子居其中賔客至其下與物遂絶不娶無子他眷亦不通先斷此根可議他事特愛松風庭院皆植松聆響為樂閒獨逰泉石此門忌濁便清神仙上景多雲霞下景多山水物多金玉色多紫碧他皆𩔖是所謂熟之養之覆之若欲成辨必加將護大要離塵換境為上中興元年辛巳齊和帝君年四十六蕭都督至新林遣弟子戴猛之迎謁初齊末作水丑木之歌至是援䜟文成梁字令弟子進之遂以梁建國後覆没亦預言朱㸃己巳詩嘆朝陽重離七元卒騐雖𨼆茅山不卻人主詢謀中大通初獻善勝成勝二刀度武帝狃陳慶之覆魏洛陽好大之心寖侈參㑹侯景大觸駭機豈盡忘救世者但觀時耳蚤慕張良甚深黄石編書盖𫝊真秘諜兵法其間餘事推已及物亦致平緒術此門𨼆除魔顯定亂學道者問及君著水鏡握鏡當是早為豈挂晚念天監元年壬午梁髙祖君年四十七梁武帝在西邸與㳺及即位恩禮彌篤問訊弗絶屢招不出畫兩牛一牧放水草之間一金絡頭人執杖驅之知不可復致旁族季直亦不肯事梁武帝嘗嘆梁有天下遂不見此人門風何繇乃爾天監四年乙酉君年五十移居積金澗泉石益竒無蛇虎有佳木及雜藥初乏青林及来居皆自茂在句曲東壟中大通元年己酉君年七十四遇異人宣闓以本草用蝱蟲水蛭之屬傷物遲一紀可觧形至期果化尸觧凡十餘種世𫝊闓自青城来句曲先升以君聞帝録其積水之功化後為蓬莱都水監見仙𫝊及拾遺甚略今茅山相𫝊稍詳但㣲渉異大同二年丙辰君年八十一􅃗眼或方夢勝力菩薩授菩提記乃請鄮縣禮阿育王塔自誓受戒世傳吕巖從鍾離權受劍訣後二百餘年来㕘黄龍恵南始竟佛言不修正覺别得生理休止深山大島絶扵人境報盡還来散入諸趣晩年始堅此願唐志有所著草堂法師𫝊當時佛敎雖隆禪宗未開圓覺以大通五年至以是年去留臺城十九日度君不及相見大同六年庚申君年八十五逆尅亡日仍為告逝詩及卒顔色如常香氣彌山華陽頌云號期行當滿亥數未終丁迨乃承唐世將賔来聖庭化後一遇丁亥為陳臨海王光大元年再遇丁亥為唐太宗貞觀元年升平之盛降古所稀聖庭當是此時初隋文帝輔周以國子博士召孫思邈不應宻言後五十年有聖人出吾且助以濟人宣政元年至貞觀元年適滿五十年應命来見太宗官之不受辭歸太白山風素極𩔖𨼆居他無種不𩔖形有轉移神無變易自是至丁卯獨孤信鎮洛陽之時正七嵗至丁亥太宗召至長安之時得八十七嵗暮齡有少容所以驚嗟盧照鄰稱其自謂生開皇辛酉當時已不信若爾豈得聖童之稱博士之召貞觀丁亥方二十七嵗豈得少容之嘆若言數百嵗豈得七嵗弱冠之譽度思邈之生適繼𨼆居之没其為後身何疑挺契頌又云重離倘或似謂簡文與武帝俱非令終又云七夕乃扶胥謂武帝凡七改元世稱推戴為䇿立侯景嘗為懐朔鎮功曹吏至是簒梁稱漢故云扶胥所謂篇中字皆有義㫖後人自以篇中事求之則機萌一頌二十字頋豈虚設矧又彰明業運頌又云濟神既有在去留従所宜神既濟矣在扵何所華原孫氏即其所在也已當知佛言報盡還来及舍生趣生至確可信識者更推之藥譜清異録二卷乃宋陶翰林榖所撰凡天文地理君道官志人事女行君子么麽􅇚族仙宗草木花果蔬藥禽獸蟲魚支體作用居室衣服粧飾陳設器具文用武器酒漿茗荈饌羞䘮𦵏鬼妖皆創為異名新說而藥譜一則尤竒甚因備録之苾蒭清本良扵醫藥數百品各以角貼所題名字詭異余大駭究其源底答言天成中進士侯寧極戯造藥譜一卷盡出新意改立别名因時多艱不𫝊于世余以禮求假一通用娱閒暇假君子牽牛昌明童子川烏頭淡伯厚朴木叔胡椒雪眉同氣白扁豆金丸使者椒馘毒仙預知子貴老陳皮逺秀卿沉香化米先生神麴九日三官吴茱萸燄􅙕硫黄三閭小玉白芷中黄節士麻黄時美中蒔蘿導河掾木猪苓嗽神五味子削堅中尉三稜曲方氏防風白大夀吴术洞庭奴𨽻枳殻黄英古檀香緑劍真人菖蒲魏去疾阿魏禹孫澤㵼槖籥尊師仙靈脾風稜御史史君子雪如来白芨風味團頭縮砂赦肺侯欵冬花骨鯁元君萆􅐺苦督郵黄芩調睡㕘軍酸棗仁黑司命蓯蓉知㣲老白􅅔太清尊者朴硝既濟公升麻冷翠金剛石楠葉脫核嬰兒桃仁澀翁訶棃勒抱靈居士香附子隨湯給事中甘遂斜枝大士草龍膽野丈白頭翁建陽八座蛇牀子𤣥房仲長統皁荚藂生藥王覆盆子仁棗川練子石仲寧滑石命門録事安息香𨼆上座郁李仁水状元紫蘇飛風道者牙硝畢和尚蓽澄茄金山力士自然銅麝男甘松氷喉尉薄荷草東牀大腹皮腎曹都䕶葫蘆巴夀祖威靈仙玲瓏霍去病藿香千眼油㽔人延年卷雪桑白皮水銀腊輕粉黄香影子梔子六停劑五味子顯明􅘣阿膠出様珊瑚木通中央粉蒲黄瘡帚何首鳥支觧香丁皮洗瘴丹㯽郎海腊騏驎竭水磨橄欖金鈴子無名印地榆無憂扇枇杷葉鬼木串槐角黑殺星夜明砂續命筒乾漆蠻龍舌血没藥清凉種香薷羽化魁五加皮度厄錢連翹聖蘢鬆瞿麦翻胃木常山湯主山茱茰醒心杖逺志玉黄𤓰馬兠鈴偷􅁡珊瑚甘草徳兒杏仁混沌螟蛉寄生永嘉聖脯乾薑紅心石赤石脂藥本五靈脂静風尾荆芥正坐丹砂附子迎陽子兎絲子山屠黄蘗脾家瑞氣肉豆􅅳甜面淳于蜜陀僧剔骨香青皮痰宫劈歴半夏玉虚飯龍腦鎖眉根苦參黑龍衣鱉甲小帝青青鹽百辣雲生薑綬帶米麥芽半夏精天南星夜金雄黄沙田髓黄精無聲虎大黄小昌明草烏頭草兵巴豆巢煙九肋烏梅百子堂草果子雛面還丹人參琥珀孫松脂賊參薺苨不死麫茯苓火泉竹瀝比目沉香烏藥陸續丸蔓荆子地白𤓰蔞根天豆破故紙滴膽芝黄連新羅白肉白附子痩香嬌丁香破闗符蓬莪术玉絲皮杜仲血櫃牡丹皮川元蠢川芎九女春鹿茸百藥綿黄耆英華庫益智通天柱杖牛膝赤天佩薑黄丹田霖雨巴㦸百丈􅂡石斛飛天蕋旋覆花安神隊杖麥門冬鄆芝天麻錦繡根芍藥草魚目薏苡茅君寳箧蒼术尉佗圭桂錬形松子柏子仁蘆頭豹子柴胡丒寳牛黄肚裏屏風艾九畹菜澤蘭女二天當歸大通緑木香旱水晶硼砂還元大品地黄兩平草羌活死氷白僵蠺一寸樓臺蜂窠三尺籙枸杞無情手碙砂拔萃團麝香緑􅂡薑細辛笑靨金菊花走根梅乾葛八月珠茴香銀條徳星山藥埋光烏藥良薑椹聖蓽撥破軍殺大㦸吉祥杵桔梗金母蛻鬱金線子檀茅香良醫匕首葶􅏣産家大器秦艽滴金卵延胡索鬼丹盧㑹宜州様子白豆􅅳瓦壠斑貝母孝梗知母萬金茸紫苑秦尖疾黎西天蔓前胡蕨臣卷柏五福臠白歛保生叢藁本狨奴狗脊蒜腦藷百合脩身弩芫花帝膏蘇合香玉靈片石膏世系宋馬永卿嬾真孑録云古人重譜系故雖世胄綿逺可以考究淵明命子詩云天集有漢眷于愍侯赫赫愍侯運當攀龍撫劍風邁顯兹武功㕘誓山河啓土開封按漢功臣表開封愍侯舍以左司馬從漢破代封侯昔髙帝與功臣盟云使黄河如帶泰山若礪國以永存爰及苖裔所謂㕘誓山河謂此盟也髙帝功臣百有二十人舍其一也又云亹亹丞相允廸前従渾渾長源鬱鬱洪柯羣川載導衆條載羅時有語黙運同隆窊此盖謂青也功臣表開封愍侯舍封十一年薨十二年夷侯青嗣四十八年薨所謂羣川衆流以喻支𣲖之分散也語黙隆窊以言自青後未有顯者也淵明乃長沙公之曾孫然侃𫝊亡不載世家獨扵此見之後世累經亂離譜籍散亡然又士大夫因循滅裂不如古人所以家譜不𫝊扵世惜哉輟耕録卷十六
