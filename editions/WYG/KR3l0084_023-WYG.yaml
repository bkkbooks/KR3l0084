body:
  text: 輟耕録卷二十三元陶宗儀撰書畫褾軸唐貞觀開元間人主崇尚文雅其書畫皆用紫龍鳯紬綾為表緑文紋綾為裏紫檀雲花杵頭軸白檀通身柿心軸此外又有青赤琉璃二等軸牙籖錦帶大和間王涯自鹽鐡據相印家既羡於財始用金玉為軸甘露之變人皆剥剔無遺南唐則褾以㢠廻鸞墨錦籖以潢紙宋御府所蔵青紫大綾為褾文錦為帶玉及水晶檀香為軸靖康之變民間多有得者高宗渡江後和議既成𣙜塲購求為多装褫之法已具名畫記及紹興定式兹更不贅姑以所聞見者使賞鑒之士有考焉錦褾克絲作樓閣克絲作龍水克絲作百花攅龍克絲作龍鳯紫寳階地紫大花五色簟文俗呼山和尚紫小滴珠方勝鸞鵲青緑簟文俗呼閣婆又曰蛇皮紫鸞鵲一等紫地紫鸞鵲一等白地紫鸞鵲紫百花龍紫龜紋紫珠燄紫曲水俗呼落花流水紫湯荷花紅霞雲鸞黄霞雲鸞俗呼綘霄其名甚雅青樓閣閣又作臺青大落花紫滴珠龍團青櫻桃皂方團白花褐方團白花方勝盤象毬路衲柿紅龜背樗蒲宜男寳照龜蓮天下樂練鵲方勝練鵲綬帶瑞草八花暈銀鈎暈紅細花盤鵰翠色獅子盤毬水藻戯魚紅徧地雜花紅徧地翔鸞紅遍地芙蓉紅七寳金龍倒仙牡丹白蛇龜紋黄地碧牡丹方勝皂木綾引首及託裏碧鸞白鸞皂鸞皂大花碧花薑牙雲鸞樗蒲大花雜花盤鵰濤頭水波紋仙紋重蓮雙鴈方棋龜子方轂紋鸂䳵􅀥花鑑花疊勝白毛遼國回文金國白鷲花並高麗國贉卷紙高麗蠲夾背蠲揩光軸出等白玉碾龍簮頂或碾花白玉平頂瑪瑙漿水紅金星石珊瑚水晶蠟沉香古玉象牙犀角軸桿檀香木匣螺鈿宋高宗内府皆鈿匣爐鳴至元庚寅冬江浙行省官立僧格沙布迪音輩徳政碑穹窿莫比特闕坐石時趙若晦者素善謟媚因以楊和王墳域所有為言役人夫數千拖拽而至畢工之日是夜省堂中火爐鳴直至昧爽方休嗣是夜以為常又梟鳴梁壓虎入城市越明年春相哥敗諸公俱罹竒禍豈非事有先兆與田夫人劉公復新為上都留守時有令史亢子春者值公退食偶與同列據案判事以戯遂為仇家發之公大怒責問罪状枷項示衆及歸怒容未霽其夫人田氏問公何故不樂公語其故夫人曰此小節耳何足怒也即令人呼亢至請公為脫其枷且勞以酒云此一盃與汝壓驚此一盃與汝慶喜男子大丈夫何所不至留守之位何患不到亢感謝而退不數年公卒而無子止一女適田直長直長遄卒女病雙瞽後亢官湖廣參政迎夫人母子歸沒齒敬養不怠公乃廉訪使劉廷幹之從祖父也嗓大名王和卿滑稽佻達傳播四方中統初燕市有一蝴蝶其大異常王賦醉中天小令云掙破荘周夢兩翅駕東風三百處名園一采一箇空難道風流種諕殺尋芳􅁡蠭輕輕的飛動賣花人搧過橋東由是其名益著時有闗漢卿者亦高才風流人也王常以譏謔加之闗雖極意還答終不能勝王忽坐逝而鼻垂雙涕尺餘人皆歎駭闗來弔唁詢其由或對云此釋家所謂坐化也復問鼻懸何物又對云此玉筯也闗云我道你不識不是玉筯是嗓咸發一笑或戯闗云你被王和卿輕侮半世死後方才還得一籌凢六畜勞傷則鼻中常流膿水謂之嗓病又愛訐人之短者亦謂之嗓故云爾金蓮盃楊鐡崖耽好聲色每於筵間見歌兒舞女有纒足纎小者則脫其鞵載盞以行酒謂之金蓮盃予竊怪其可厭後讀張邦基墨荘漫録載王深輔道雙鳬詩云時時行地羅裙掩雙手更擎春㶑灔傍人都道不須辭儘做十分能幾㸃春柔淺醮蒲萄暖和笑勸人教引滿洛塵忽浥不勝嬌剗蹈金蓮行款款觀此詩則老子之踈狂有自來矣大佛頭宋高宗朝錢塘喻氏出家為沙門名思浄建妙行院於北闕接待供僧三百萬畫阿彌陀佛入於神妙楊侍郎傑賛為喻彌陀人從而稱之浄又於西湖之北鐫石為大佛頭父老相傳云此石乃秦始皇繫纜石盖是時皆浙江耳初無西湖之名始皇將登㑹稽為風浪所阻故泊舟此處揚州白菜揚州至正丙申丁酉間兵燹之餘城中屋址徧生白菜大者重十五斤小者亦不下八九斤有膂力人所負纔四五窠耳亦異譎誕有配天下之事未嘗無配雖譎詐誕妄之談亦有然者松江衛山齋有材譽時庸醫兒孫華孫頗知嗜學山齋因奬予之使得儕於士𩔖山齋既死華孫忽謂人曰嘗夢天使持黄封小合授吾曰上帝有勑以衛山齋聲價畀汝吾受命謝恩而寤華孫才思極遲凡作一詩必數十日乃就則曰吾登溷偶得一聯或又曰枕上得此故人戱贈以詩有浪得詩名索價高及山齋聲價黄封合之句陸居仁每謂人曰吾讀書至得意時見慶雲一朶現家人皆不能覩又一日讀詩集傳有不安處思所以易之忽若夢寐中見尼父拱立於前而呼吾字曰陸宅之朱熹誤矣汝說是也偶與友人之􅃛者言及此友人曰足下得非稟受素弱乎曰何為曰吾見足下眼目眊眩又夢寐顛倒故知其然也居仁慙赧不復辨客來談及拊几大笑命筆識之檢田吏有一老翁如病起破衲􅧑􅆴痩如鬼曉來扶向官道傍哀告行人乞錢米時予奉檄離江城邂逅一見憐其貧倒囊贈與五升米試問何故為窮民老翁答言聽我語我是東鄊李福五我家無本為經商只種官田三十畆延祐七年三月初賣衣買得犁與鉏朝耕暮耘受辛苦要還私債輸官租誰知六月與七月雨水絶無潮又竭欲求一㸃半㸃水却比農夫眼中血滔滔黄浦如溝渠農家争水如爭珠數車相接接不到稻田一旦成沙塗官司八月受災狀我恐徵糧喫官棒相隨鄰里去告災十石官糧望全放當年隔岸分吉凶高田盡荒低田豐縣官不見高田旱將謂亦與低田同文字下鄊如火速逼我將田都首伏只因嗔我不肯首却把我田批作熟太平九月開早倉主首貧乏無可償男名阿孫女阿惜逼我嫁賣陪官糧阿孫賣與運糧户即目不知在何處可憐阿惜猶未笄嫁向湖州山裏去我今年已七十竒饑無口食寒無衣東求西乞度殘喘無因早向黄泉歸旋言旋拭腮邊淚我忽驚慙汗沾背老翁老翁勿復言我是今年檢田吏此𡊮介􅂿災行也是可以為民牧不恤民瘼者之勸介字可潛嘗掾松江盖能以儒術飾吏事者因載之玉鹿盧霍清甫治書云考古圖載古衣服今有玉轆轤玉具劒古樂府曰腰間轆轤劒此器以塊然之璞既觧為環中復為轉闗而上下之隙僅通絲髪作宛轉其間今之名玉工者往往嘆其所未覩按漢雋不疑帶􅀈鑘同具劒晉灼曰古長劒首以玉作井轆轤形上刻木作山形如蓮花初生未敷時今大劒末首其狀如此前說乃宋李公麟之所紀也余昔宦遊錢唐因識吳和之者性慧巧博物收一轆轤玉青色形如吕字環口中間轆轤旋轉無分毫縫罅形色極古人皆以為鬼工因土漬用白梅熬水煮之良乆脫開詳視竅中有雙玉軸在焉中嵌一物形若牛筋意度必是當間煮之胖脹撐塞雙軸入竅闗住所以宛轉無礙年深腐敗縮瘦因而煮脫試用乾牛筋搥實置軸兩間對勘孔竅以線縳定煮之少時雙軸果湧入竅中湏臾取出依前動轉不脫後余亦收一小者狀若旋環製作大約相似後因損折轉軸中亦有一物形似翎桶想亦同一闗捩其玉具劒自三代有之今止以兩漢為始至於宋朝且千餘年未有能窮其轆轤底藴今偶以煮脫乃得其機軸亦云竒矣猴盗夏雪簑云嘗見優人杜生彦明說向自江西回至韶州寓宿旅邸邸先有客曰相公者居焉刺繡衣服琢玉㡌頂而僅皮履生惑具酒肴延欵問以姓名履歴客具答甚悉初不知其為盗也次日客酬讌邀至其室見柱上鎻一小猴形神精狡既而縱使周旋席間忽畨語遣之俄捧一楪至復畨語詈之即易一碗至生驚異詢其故客曰某有婢得子彌月而亡時此猴生旬有五日其母斃於獵犬終日呌號可憐因令此婢就乳之及長成遂能隨人指使兼觧畨語耳生别後至清州留吳同知處忽報客有㩦一猴入城者吳語生云此人乃江湖巨盗凡至人家窺見房室路徑并蔵蓄所在至夜使猴入内偷竊彼則在外應接吾必奪此猴為人除害也明日客謁吳吳欵以飯需其猴初甚拒吳曰否則就此斷其首客不得已允許吳酬白金十兩臨去畨語囑猴適譯史聞得來告呉曰客教猴云汝若不飲不食彼必觧爾縳可亟逃來我只在十里外小寺中伺也吳未之信至晩試與之果核水食之𩔖皆不食急使人覘之此客果未行歸報引猴撾殺之盗有道後至元間盗入浙省丞相府是夕月色微明相於紗帷中窺見之美髭髯身長七尺餘時一侍姬亦見之大呼有賊相急止之曰此相府何賊敢來盖虞其有所傷犯故也縱其自取七寳繫腰金玉器皿席捲而去翼旦責令有司官兵肖形掩捕刻期獲觧沿門搜索終不可得越明年纔於紹興諸暨州敗露掠問其情乃云初至杭寓相府之東相去三十餘家是夜自外大醉歸倒於門外主人扶掖登樓而卧湏臾嘔吐狼籍滿地至二更開樓窓縁房簷進府内脚履尺餘木級面帶優人假髯既得物直攜至江頭置於白塔上復回寓所侵晨邏者至察其人酒尚未醒酣睡正熟且身材侏儒畧無髭髯竟不之疑數日後方攜所盗物抵浙東因此被擒盗亦有道其斯之謂與預知改元省掾李孟容度為余言元統間在都間見一全真先生年五十餘相貎魁偉嘗坐省東茶肆中所言輙有驗因訪其寓所乃在五門外第二橋民家遂以出處叩之全真曰汝仕不在北方且冝南歸四十後方可食禄臨别偶問及時事全真曰此後當改至元至元後改至貞天下亂矣僕曰國初已有至元全真曰汝苐識之僕南還至闗河聞改至元心益信之及改至正則知貞者正也四十後方補饒州府史夫全真之言如燭照數計特不知果何術也豈非至人者乎醉太平小令堂堂大元姦佞專權開河變鈔禍根源惹紅巾萬千官法濫刑法重黎民怨人喫人鈔買鈔何曽見賊做官官做賊混愚賢哀哉可憐右醉太平小令一闋不知誰所造自京師以至江南人人能道之古人多取里巷之歌謠者以其有闗於世教也今此數語切中時病故録之以俟采民風者焉譏省臺集慶失守行御史臺移置紹興路前御史大夫納琳再任時浙省丞相達實特穆爾得便冝行事民間頗言其貪後又以大夫子安安判行樞宻院護臺治大夫之政一聽決於院判有人作詩云舊省新丞相新臺舊大夫大夫聽子語丞相愛金珠又有人大書於臺之門曰包苴賄賂尚公行天下承平徳未能二十四官徒獬廌越王臺上望金陵造物有報復㑹稽陳思可睿云至正丙申御史大夫納琳開行臺於紹興於時慶元慈溪則有縣尹陳文昭本路餘姚則有同知圖卜戬在城則有録事達嚕噶齊穆爾古蘓皆總制團結民義者納琳之子安安以三人為不易制思有以去之乃先紿召圖卜戬至拘於寳林寺夜半率臺軍擒殺之從而方國珍亦執陳文昭沈之海獨存穆爾古蘓一人耳人皆以圖卜戬之死歸罪於穆爾古蘓不能力救殊不知當時之執圖卜戬乃所以擒穆爾古蘓也執圖卜戬之謀出於潘子素子素亦為安安縊諸途執子素之謀出於辛敬所敬所間闗投張士誠客死平江僧舍及拜克代納琳為大夫又不能容穆爾古蘓撾殺於其私第拜克以弟吹斯絅拜中書右相詔入朝既得罪兄弟誅戮家無噍𩔖但未知安安死所耳静而思之若有尸於𠖇𠖇之中者不知造物果如何也鎻鎻回紇野馬川有木曰鎻鎻燒之其火經年不滅且不作灰彼處女取根製㡌入火不焚如火鼠布云葉氏還金葉公政字克明淮隂人行宣政院都事季實之子翰林直學士蟾心之從子也至政甲午公政以浙西幕史奉布延平章檄轉餉鄂閫時丹陽富民束子章先與是役㑹飲於蘄志相合即以兄禮事公政未幾子章起赴沔泣别公政曰弟今濟大江涉重地兄言行篤信願以貲囊相託公政辭弗獲俾子章手緘而為謹蔵之越兩月子章之友朱君譲率其奴來謁曰子章不幸入蓮䑓湖遇盗死矣子章昔寄囊中亦有某物在間欲啓嚢而請之公政曰汝寓物子章未嘗語我子章已矣家固無恙也義必質諸其家明以付汝君讓以公政匿為已有衘之去明年既竣事還坐丹陽驛門要束朱二氏父子啓囊緘得鈔二百五十緡黄金五十兩銀三百兩珠八千枚衣帛有差歸之束氏餘鈔五十緡黄金五兩銀五十兩珠千枚有朱題封歸之朱氏盛具酒饌以謝辭之前翰林院編修膠西張復初嘉公政義為作傳且稱公政㓜知讀書嘗從平章克池之諸縣破蘭溪渠魁徐真一平蘄水寨司輜糧四年無纎芥譴呵平章凡七薦中書不報人謂公侯子孫必復其始天道豈獨逺耶江隂王逢詩曰蘄春肥羊采石酒君為玉昆我金友夜談接膝晝握手乾坤意氣同高厚霜風吹蘆客衣薄濕雲覊鴻飛漠漠蓬忩篝燈照囊槖嗟君逺行感君託蓮臺湖深浪拍銀鷓鴣杜若傷心神天生禍亂有今日誰謂交遊無故人葉郎還金何愧竇禹鈞傅氏死義傅氏紹興諸暨人年十八適同里章瑜瑜為苛吏脅軍興期㑹廹死道上訃至傅氏蒲伏抱屍歸號泣三日猶不忍入櫬屍有腐氣猶依屍呵琀曰冀甦既入棺至嚙其棺成穴及葬投其身壙中母强挽以出制未百日母欲敓志語聞遂大慟連日不食母囑侍婢謹視之閱數日紿婢吾當浴若輩理沐具俟予既而失所在明日婢汲井見二足倒植井中乃傅氏也楊鐡史維楨嘗賛之曰余讀古節婦事至青陵臺及祝英氏以為後無繼者世道降也乆矣今瑜妻乃爾謂世降徳薄者吾信歟夫婦倫與君臣等世之稱臣子者獨不能以瑜妻之義於夫者義其君歟噫武官可笑張氏據有平江日其部將左丞吕珍守紹興參軍陳庶子饒介之在張左右一日陳賦詩饒染翰題一紈扇以寄吕云後來江左英賢傳又是淮西保相家聞說錦袍酣戰罷不驚越女采荷花饒素負書名且詩語俊麗為作者所稱吕俾人讀罷忽大怒曰吾為主人守邉疆萬死鋒鏑間豈務愛女子而不驚之耶見則必殺之又元帥李其姓者杭州庚子之圍解頗著功勞一士人投之以詩將有求焉其詩有黄金合鑄李將軍之句李大怒曰吾勞苦數年止是將軍今年纔得元帥乃復令我為將軍耶命帳下䇿出之右二事雖相傳以為笑亦可因以為戒云鞫獄吳人高伯厚云元統間某吏杭東北録事一日有部民某甲與某乙鬭毆某甲之母勸解被某乙用木棒就腦後一擊仆地而死適某承該檢驗腦骨唇齒皆有重傷某乙招伏繫獄經二載遇赦以非謀殺合宥既得釋放來致謝因言與某甲鬭毆時其母來勸力牽其子之裾手脫仰跌自搕其腦昏絶在地隣里有剪刀挑母唇齒灌藥不甦乃死故腦唇有傷實未嘗持棒擊之也某問何為招伏某乙言倉皇之際惟恐箠楚但欲招承償命弗暇計也鄰里見我已招遂皆不復言矣吁今之鞫獄者不欲研窮磨究務在廣陳刑具以張施厥威或有以𠂻曲告訴者輙便呵喝震怒畧不之恤從而吏隸輩奉承上意拷掠鍛鍊靡所不至其不置人於寃枉者鮮矣使聞伯厚之言寧不知懼乎聖鐡杭州張存㓜患一目時稱張瞎子忽遇巧匠為安一磁睛障蔽於上人皆不能辨其偽至元丙子後流寓泉州起家販舶越六年壬午回杭自言於蕃中獲聖鐡一塊厚濶僅及二寸作法撒沙布地噙鐡於口刀刄不能傷其身後傳聞既廣有烏瑪喇奉使來取試以鐡納於羊口籠其首作法撒沙驗之劒果無所傷去鐡復揮應手首落遂就進呈鬼爺爺元統間杭州鹽倉宋監納者嘗客大都求功名不遂甚至窮窘然頗慎行止不敢非為遂出齊化門求一死所望見水潭將欲投入虚空中有鬼作人聲云宋某陽夀未終不可死也四顧一無所有於是黙黙而回中途拾得一紙帖云宋某可於吏部某令史下某典吏處習學書冩翼日物色之果得其人遂獲進歩再得一帖云汝可求託某人謀請俸禄因依所言一舉而成凡歴俸數十月至於受勑命獲財寳取妻買妾生子育女為富家翁一皆隂𡨕所佑平昔却未嘗覩其形状祗見一矮小影子而已但有所見即便祭獻稱名爺爺忽一日有一帖云我要葉子金一百八十兩索之甚急未免數數祭獻求免因問云爺爺要此何用一帖云我要去揚州天寧寺妝佛也又一夕其妻臂上失去金釧金鐲急告之一帖云在汝第幾􅃗箱内權且付還又一日失去熟羊背皮一帖云我借用了明日當還次日一大綿羊自外走入如此等𩔖甚多不可枚舉及宋受前職鬼亦隨到恐被竊其所有乃令人詣龍虎山求天師符命懸於所寓室内晨興但見一様四十道皆倒懸之莫可辨其真偽及禮請功行法師驅治而壇内牌位顛倒錯亂弗能措手而止又一日鹽倉印信不知所在告之哀切一帖云在汝第四十幾􅃗箱内第幾箇段子下開尋果有時與張大使同寅將印寄於伊家一帖飛告云印信當長官收掌若不送還一棒打碎汝頭也大使驚恐急送還之後有一過路道人詣門偶以始末訴之道人曰我當為汝遣之乃於桃𣗳上砟取朝向東南大枝作一搥一椹便以椹釘東南隅地上囑云每月逢五則擊五下當自絶也後果絶無影響竟不知何等鬼也江隂陳範季模與宋交代所以極知其詳季模盖余友也死䕶文廟胡善字師善紹興諸暨人泰定進士胡一中高第弟子也至正乙未以憲僉趙公舉為松江儒學經師越明年二月苗冦至欲燬孔子廟善坐經席罵冦冦怒殺之廟得免於災先是善以死自許題詩於壁曰領檄來司教臨危要致身及難死果不誣今校官貎其像祀於先賢堂輟耕録卷二十三
