body:
  text: 輟耕録巻十一元陶宗儀撰寫像秘訣王思善繹自號癡絶生其先睦人居杭之新門篤志好學雅有才思至正乙酉間檇李葉居仲廣居寓思善之東里教授余從永嘉李五峯先生孝光往訪之時思善在諸生中年方十二三已能丹青亦能寫真先生即俾作一圓光小像面部僅大如錢而宛然無毫髪異先生喜作文以華之爾後余復託交於其尊人日華曅遂與思善為忘年友思善繼得吳中顧周道逵緒言開發益造精㣲是故於小像特妙非惟貎人之形似抑且得人之神氣嘗授余秘訣并采繪法今著於此與好事者共之凡寫像須通曉相法盖人之面貎部位與夫五嶽四瀆各各不侔自有相對照處而四時氣色亦異彼方呌嘯談話之間本真性情發見我則静而求之黙識於心閉目如在目前放筆如在筆底然後以淡墨覇定逐旋積起先蘭臺廷尉次鼻凖鼻凖既成以之為主若山根髙取印堂一筆下来如低取眼堂邊一筆下来或不髙不低在乎八九分中則側邊一筆下来次人中次口次眼堂次眼次眉次額次頰次髪際次耳次髪次頭次打圏打圏者面部也必宜如此一一對去庶幾無纎毫遺失近代俗工膠柱鼓瑟不知變通之道必欲其正襟危坐如泥塑人方乃傳寫因是萬無一得此又何足怪哉吁吾不可柰何矣采繪法凡面色先用三朱膩粉方粉藤黄檀子土黄京墨合和襯底上面仍用底粉薄籠然後用檀子墨水斡染面色白者粉入少土黄燕支不用臙脂則三朱紅者前件色入少土朱紫堂者粉檀子老青入少臙脂黄者粉土黄入少土朱青黒者粉入檀子土黄老青各一㸃粉薄罩檀墨斡已上看顔色清濁加減用又不可執一也口角燕支淡如要帶笑容口角兩筆畧放起眼中白染瞳子外兩筆次用煙子㸃睛墨打圏眼梢㣲起有摺便笑口唇上臙脂驀鼻色紅臙脂㣲籠面雀斑淡墨水斡麻檀水斡髯色黒者依􅁂髪渲紫者檀墨間渲黄紅者藤黄檀子渲髪先用墨染次用煙子渲有間渲排渲亂渲當自取用手指甲先用臙脂染次用粉染根凡染婦女面色臙脂粉襯薄粉籠淡檀墨斡凡染法白紙上先染後却罩粉然後再染提掇絹則先襯背後凡調合服飾器用顔色者緋紅用銀朱紫花合桃紅用銀朱臙脂合肉紅用粉為主入臙脂合栢枝緑用枝條緑入漆緑合黒緑用漆緑入螺青合栁緑用枝條緑入槐花合官緑即枝條緑是鴨頭緑用枝條緑入髙漆緑合月下白用粉入京墨合柳黄用粉入三緑標并少藤黄合鵝黄用粉入槐花合磚褐用粉入煙合荆褐用粉入槐花螺青上黄標合艾褐用粉入槐花螺青土黄檀子合鷹背褐用粉入檀子煙墨土黄合銀褐用粉入藤黄合珠子褐用粉入藤黄臙脂合藕絲褐用粉入螺青臙脂合露褐用粉入少土黄檀子合茶褐用土黄為主入漆緑煙墨槐花合麝香褐用土黄檀子入煙墨合檀褐用土黄入紫花合山谷褐用粉入土黄標合楛竹褐用粉土黄入檀子一㸃合湖水褐用粉入三緑合蔥白􅄄用粉入三緑標合棠梨褐用粉入土黄銀朱合秋茶褐用土黄入三緑槐花合油裏墨用紫花土黄煙墨合玉色用粉入髙三緑合鮀色用粉漆緑標墨入少土黄合氁子用粉土黄檀子入墨一㸃合藍青用三青入髙三緑合金黄用槐花粉入臙脂合雅青用蘇青襯螺青罩鼠毛褐用土黄粉入墨合不老紅用紫花銀朱合葡蔔褐用粉入三緑紫花合丁香褐用肉紅為主入少槐花合杏子絨用粉墨螺青入檀子合氁綾用紫花底紫粉搭花様畨皮用土黄銀朱合鹿胎用白粉底紫花様水獺氊用粉土黄合牙笏用好粉一㸃土黄粉凝皂鞾用煙墨標柘木交椅用粉檀子土黄煙墨合金絲柘同上不入墨紫袍用三青臙脂合其餘一一不能備載在對物用色可也凡合用顔色細色頭青二青三青深中青淺中青螺青與蘇青二緑三緑花葉緑枝條緑南緑油緑漆緑黄丹飛丹三朱土朱銀朱枝紅紫花藤黄槐花削粉石榴顆綿臙脂檀子其檀子用銀朱淺入老墨臙脂合相地理江隂州宋季時兵馬司在州治東南里許平地上司之後置土牢歸附後有善地理者以為宜帝王居之人問其故曰君山龍脉正結於此是以知其然也皆弗之信越數年就其上起盖三皇廟亦竒術哉君山州之主山也狎娼遭毒姑蘇鄭君輔放浪不覊為漕府小吏時督運至直沽狎遊羣娼佻逹太甚殊弗堪之或有進藥於鄭曰此助陽竒劑也鄭試傅之數日後隂器消縮若閹宦然竟以此終其身漫書為後人戒夢應之紹才錢唐人以鄉貢下第任嘉興學正丁父憂仍寓居授徒至正壬辰秋避難於其諸生李氏子家去城數十里曰奉賢鄉李之從祖號太無為道士住持紫虚觀之紹一見若平生歡八月廿九日太無得中風疾之紹饋藥療之獲蘇日一再詣問九月四日又自紫虚問疾還寓忽得疾一中而殂其妻楊氏太史同僉瑀之女就所館治喪且以訃其母若弟於海寜及嘉興城中紫虚之徒以其疾與太無同不以告是夜將半太無忽呼弟子卓處潜輩謂曰適得夢甚怪俾取紙筆書之云於本觀所奉岳祠之前見有某姓名一吏及卒二人押男女各一併持公文而来因讀其詞曰嘉興路城隍司准海寧州城隍司牒為陸小蓮告至正八年内溺水事寃屈未伸今發陳喜兒應偉前去勒要應才同解岳祠周府君取問太無詢来使之詳荅曰陸小蓮者嘉興百福坊人而應才之婢也為其妻妬逐之遂赴水死陳喜兒者才之母也時居海寧偉字之竒才之弟也居嘉興城東謂彼時不為救䕶故連逮耳太無見陳氏帶鎻衣白衣黄裙問之年六十有四應偉荷校衣青衣録其罪狀皆歴歴可記来使云今若貴司移牒温都統為之解釋則尚可也遂覺始知之紹已逝王昌言與之紹有交承之好同寓其所明旦来紫虚太無因問應母之年及之竒之貎皆如所夢乃以告之昌言馳報楊氏楊即詣紫虛拜懇太無於床下謂夢中事皆實有之復自訴其詳且言其夫胸間尚温手足猶軟故求移文解釋仍躬禱岳祠冀之紹之復生也是日午後之竒自城東来衣青衣云昨日亦得疾與兄同所見如太無夢今雖少甦猶憒憒莫知所以然至夜楊氏以憂懼亦疾作旋即無他而之紹氣已絶矣時建徳邵清溪偶宿紫虚目擊其事翌日遂行不知往訃陳氏者歸報何如及之竒之死生耳白醉開元時髙太素𨼆商山起六逍遥館各製一銘其三為冬日初出銘曰折膠墮指夢想負背金鑼騰空映簷白醉見清異録樓攻媿嘗取白醉二字以銘閣賢母辭拾遺鈔聶以道宰江右一邑日有村人早出賣菜拾得至元鈔十五定歸以奉母母怒曰得非盜来而欺我乎縱有遺失亦不過三兩張耳寧有一束之理況我家未嘗有此立當禍至可急速送還毋累我為也言之再子弗從母曰必如是我須訴之官子曰拾得之物送還何人母曰但於原拾處俟候定有失主来矣子遂依命携往頃間果見㝷鈔者村人本朴質竟不詰其數便以付還傍觀之人皆令分取為賞失主靳曰我原三十定方纔一半安可賞之爭閙不已相持至㕔事下聶推問村人其詞實又宻喚其母審之合乃俾二人各具失者實三十定得者實十五定文狀在官後却謂失主曰此非汝鈔必天賜賢母以養老者若三十定則汝鈔也可自别尋去遂給付母子聞者稱快女奴義烈多納克者杭城東輝和爾氏女奴也年十九勤敏謹愿主卒某郡官所多納克奉主婦日謹主婦亦委以腹心至正壬辰秋七月初十日冦䧟杭刼官民府庫至輝和氏家不得物乃反接主婦柱下㧞刀礪頸上諸侍婢皆散走多納克獨以身覆主婦請代死且告曰將軍利吾財豈利殺人哉凡家之貨寳皆我所藏主母固弗知若免主母死我當悉與將軍不吝冦允解主婦縳多納克乃探金銀珠玉幣帛等散置堂上冦爭奪之竟又欲犯多納克身多納克持刀欲自屠曰我主二千石我誓不奴他姓主況汝賊乎冦驚異捨而去多納克泣拜主婦曰棄主貨全主命權也妾受命主鑰貨今失貨而全身非義也請從此死遂自殺時人莫不稱之曰義烈義烈云龍廣寒龍廣寒江西人移居錢唐挾預知之術游湖海間咸推為異人或謂專持寂感報耳秘呪故爾寂感即俗所謂萬回哥哥之師號也釋氏傳燈録師姓張九嵗乃能語兄戌安西父母遣問訊朝往夕返以萬里而回號萬回又䕶法論虢州閿鄉張萬回法雲公者生於唐貞觀六年五月五日有兄萬年乆征遼左相去萬里母程氏思其信音公早晨先母而徃至暮持書而還䕶法論乃宋無盡居士張商英譔必有所據按此則師之靈通容有之廣寒又行服氣導引之法常佩小龜十數於身至晩仍解飼之事母至孝六月一日母生辰方舉觴為夀忽見北窓外梅花一枝盛開人皆以為孝行所感士大夫遂稱之曰孝梅贈詩者甚多惟張菊存一篇最可膾炙曰南風吹南枝一白㸃萬緑嵗寒誰知心孟宗林下竹至治初間廣寒卒時年百有八嵗猶童顔緑髮云夜航船凡篙師於城埠市鎮人煙湊集去處招聚客旅裝載夜行者謂之夜航船太平之時在處有之然古樂府有夜航船曲皮日休詩有明朝有物充君信㰂酒三瓶寄夜航之句則此名亦古矣不快世謂有疾曰不快陳夀作華陀傳亦然雷雪至正庚子二月六日浙西諸郡震霆掣電雪大如掌頃刻積深尺餘人甚驚異後閱李復中青唐雜記云宋元符二年九月廿一日夜鎮洮大雷自初更至四鼓凡一百三十餘雷雪深二尺後旬日西羌叛以有備無患出師大捷又周宻癸辛雜識云庚寅正月二十九日癸酉余至博陸大雷雪下如織而雷不止天地為之陟黒平生所未見據二説如此然杭州自去嵗十二月被圍至三月兵退豈即青唐之䜟與分疏人之自辨白其事之是否者俗曰分䟽䟽平聲漢書𡊮盎傳以不親為解顔師古注曰解者若今分䟽矣北齊書祖珽髙元海奏珽不合作領軍并與傳廣寜王交結珽亦見帝令引入自分䟽西皮髹器謂之西皮者世人誤以為犀角之犀非也乃西方馬􅀈自黒而丹自丹而黄時復改易五色相疊馬鐙磨擦有凹處粲然成文遂以髹器倣為之事見因話録煖屋今之入宅與遷居者隣里醵金治具過主人飲謂之曰煖屋或曰煖房王建宫詞太儀前日煖房来則煖屋之禮其来尚矣鬼室温州監郡某一女及笄未出室貌美而性慧父母之所鍾愛者以疾卒命畫工寫其像嵗序張設哭奠常時則庋置之任滿偶忘取去新監郡復居是屋其子未婚忽得此心竊念曰娶妻能若是平生願事足矣因以懸於卧室一夕見其下從軸中詣榻前叙殷勤遂與好合自此無夜不来踰半載形狀羸弱父母詰責以實告且云至必深夜去以五鼓或齎佳果啖我我荅與餅餌則堅郤不食父母教其此番須力勸之既而女不得辭為咽少許天漸明竟不可去宛然人耳特不能言語而已遂真為夫婦而病亦無恙矣此事余童子時聞之甚熟惜不能記兩監郡之名近讀杜荀鶴松窓雜記云唐進士趙顔於畫工處得一軟障圖一婦人甚麗顔謂畫工曰世無其人也如可令生余願納為妻工曰余神畫也此亦有名曰真真呼其名百日晝夜不歇即必應之應則以百家綵灰酒灌之必活顔如其言乃應曰諾急以百家綵灰酒灌之遂活下步言笑飲食如常終嵗生一兒兒年兩嵗友人曰此妖也必與君為患余有神劒可斬之其夕遺顔劒劒纔及顔室真真乃曰妾南岳地仙也無何為人畫妾之形君又呼妾名既不奪君願今疑妾妾不可住言訖携其子却上軟障覩其障惟添一孩子皆是畫焉讀竟轉懐舊聞已三十餘年若杜公所書不虚則監郡子之異遇有之矣牙郎今人謂駔儈者為牙郎本謂之互郎謂主互市事也唐人書互作牙互與牙字相似因訛而為牙耳墓屍如生松江蟠龍塘普門寺側一無主古墓至正己亥春為其里之張雕盜發有誌石乃宋時錢叅政良仁妹諱恵淨以該恩奏封孺人生一男五女年六十有五嘗捨田入寺因於紹興四年十月祔夫墓之右破棺無􅁾氣顔色如生口脂面澤若初傅者冠服鮮新亦不朽腐得金銀首􅎖器皿甚多至放其繡履傳相玩弄人以為異余聞漢廣川王去疾發魏王子且渠冡無棺槨有石床床下悉是雲母末上二屍一男一女皆年二十餘東首祼卧顔色如生人􅁂髪亦如生人此恐雲母之功今此婦𦵏日距今百七八十年而亦不損壊其理又何邪枯井有毒平江在城峨嵋橋葉剃者門首簷下有一枯井深可丈許偶所畜猫墮入適隣家浚井遂與井夫錢一緡俾下取猫夫父子諾子既入井乆不出父繼入視之亦不出葉惶恐繫索於腰令家人次第放索將及井底亟呼救命比拽起下體已僵木如屍而氣息奄奄鄉里救活之白於官官来驗視令火下燭彷彿見若有旁空者向之死人一横卧地上一斜倚不倒鈎其髪提出遍身無恙止紫黒耳衆議以恐是蛟蜃之屬實之土焉余意山嵐蠻瘴尚能殺人何況乆年乾涸隂毒凝結納其氣而死復奚疑哉此事在至正己亥秋八月初旬也後讀酉陽雜爼有云凡冡井間氣秋夏多殺人先以鷄毛投之直下無毒迴舞而下者不可犯當以泔數斗澆之方可入矣得此一章信余意之誠是也賢孝前至元間杭州有鄭萬戸者天性峻急不能有所容而奉事母夫人備極孝道母誕日垂至預市文繡氁段製袍為夀鍼工持歸縫綴既成為油所汚時估貴重工莫能償自經不死隣婦有識其母者潜送入白之至日卧不起子至候問安否見有憂色請其故曰昨莫偶視新袍適几上油缶飜濺漬成玷我情思殊不佳耳子告曰一袍壊復製一袍可也夫人何重惜乃爾母陽為自解遂起受子孫拜賀如常嵗儀人咸以此為賢母而益見萬戸之孝國朝婦人禮服逹靼曰袍漢人曰團衫南人曰大衣無貴賤皆如之服章但有金素之别耳惟處子則不得衣焉今萬戸有姓者而亦曰袍其母豈逹靼與然俗謂男子布衫曰布袍則凡上盖之服或可槩曰袍事物異名暇日讀書遇事物之異名者偶記一二以備采覽云割政割剥之政也史記帝紀三父馬牡馬也史記平凖書毳布罽也説文曰西胡毳布香物夢書曰夢得香物婦女歸也藏魚説文鮓藏魚也請室獄也史𡊮盎𫝊猊糖獅子乳糖也後漢顯宗記令草宜男花也傅𤣥賦毛席氊也後漢西域傳注竹綀竹布也庾翼與燕王書曰竹綀三端竹萌筍也説文練香和香也李賀詩練香薰宋鵲南威橄欖也太平廣記石􅁡櫻桃也同上木􅁡􅀥子也同上雜馥合香也通典四十三脂炬燭也杜陽雜編竹胎筍也説文調香和香也華嚴經曰粥香長者善調香毛布褐也詩七月箋獵碣石鼔曰獵碣蘇朂載記玉窪酒器也緯畧挾日從甲至甲凡十一日也周禮天官浹辰辰十二辰自子至亥也左𫝊成九年丹若石榴也酉陽雜俎金鎞刺肉茂巴爾字西瑛西域人其軀􅆬魁偉故人咸曰長西瑛一日方與妻對飯妻以小金鎞刺臠肉將入口門外有客至西瑛出肅客妻不及啖且置器中起去治茶比回無覔金鎞處時一小婢在側執作意其竊取栲問萬端終無認辭竟至損命嵗餘召匠者整屋掃瓦瓴積垢忽一物落石上有聲取視之乃向所失金鎞也與朽骨一塊同墜原其所以必是猫来偷肉故帶而去婢偶不及見而含寃以死哀哉世之事有如此者甚多姑書焉以為後人鑒也杭人遭難杭民尚淫奢男子誠厚者十不二三婦人則多以口腹為事不習女工至如日用飲膳惟尚新出而價貴者稍賤便鄙之縱欲買又恐貽笑隣里至正己亥冬十二月金陵游軍斬闗而入突至城下城門閉三月餘各路糧道不通城中米價踴貴一斗直二十五緡越數日米既盡糟糠亦與常日米價等有貲力人則得食貧者不能也又數日糟糠亦盡乃以油車家糠餅搗屑啖之老幼婦女三五為羣行乞於市雖姿色艶麗而衣裳濟楚不暇自愧也至有合家父子夫婦兄弟結袂把臂共沈於水亦可憐已一城之人餓死者十六七軍既退吳淞米航輻輳藉以活而又太半病疫死豈平昔浮靡暴殄之過造物者有以警之與承天閣平江承天寺初畜大木將造千佛閣㑹浙省災責有司籍所在木植官酬以價寺一􅃛僧於閣木上皆鑿萬嵗閣三字於是有司不敢取及閣成其字固在諸寺觀凡起造必作儷語題梁間其餘則記住持檀越主名此所必然獨承天諸殿俱否至正丙申春今張太尉士誠未歸順時偽稱誠王國號大周改元天佑歴日明時由淮渡浙攻破平江即承天以居盡撤去殿上像設坐於其中且以僧元鑿字名其閣豈亦有定數乎阿癐癐淮人㓂江南日於臨陣之際齊聲大喊阿癐癐以助軍威按朝野僉載武后時滄州南皮縣丞郭勝静每廵鄉喚百姓婦託以縫補而姦之其夫至縛勝静鞭數十主簿李懋往救解之勝静羞諱其事低身荅云忍痛不得口唱阿癐癐勝静不被打阿癐癐據此乃有所本海運國朝海運糧儲自朱清張瑄始以為古来未嘗有此按杜工部詩出塞云漁陽豪俠地擊鼔吹笙竽雲帆轉遼海粳稻来東吳又昔游云幽燕盛用武供給亦勞哉吳門持粟帛汎海凌蓬萊如此則唐時已有海運矣朱張特舉行耳夫婦死孝杜陽父友開江隂人隱居教授妻吳辟纑以資之天歴間浙右菑荒米價騰踴學徒散去困於饑餓吳之兄弟屢勸斬邱木粥基地以少延餘息陽父堅持不可繼欲挈吳歸吳曰夫既盡孝妾獨以不義自處寜不食若粟遂相枕藉而卒猪妖至正辛夘春江隂永寜鄉陸氏家一猪産十四兒内一兒人之首面手足而猪身輟耕録卷十一
