front:
  text: 南村輟耕録卷之十七
  hash: sha256:6624278f48c2e8f0311feabfaf165638c16ad1411ea76053d5f9f702d1f6b085
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_017-1a}
body:
  text: 天台陶宗儀九成宋番昜張世南㳺䆠紀聞云辨愽書畫古器前輩盖甞著書矣其間有論議而未詳明者如臨摹硬黄響榻是四者各有其說今人皆謂臨摹爲一体殊不知臨之與摹逈然不同臨謂置𥿄在傍觀其大小濃淡形埶而學之若臨淵之臨摹謂以薄𥿄覆上随其曲折婉轉用筆曰摹硬黄謂置𥿄熱熨斗上以黄蠟塗勻儼如枕角毫釐必見饗榻謂以𥿄覆其上就明窓牗間映光摹之辨古器則有所謂款識臘茶色朱砂班真青緑井口之類方為真古其製作有雲紋雷紋山紋䡖重雷紋垂花雷紋鱗紋細紋粟紋蟬紋黄目飛㢘饕餮蛟螭虬龍麟鳯熊虎龜蛇鹿馬象鵉䕫犧蜼鳬雙魚蟠虺如意圜絡盤雲百乳鸚耳貫耳偃耳直耳附耳挾耳獸耳虎耳獸足䕫足百獸三螭穟草瑞草篆帶若蚪結之埶星帶四㫄飾以星象輔乳鍾名用以節楽者碎乳鍾名大乳三十六外復有小乳周之立䕫雙䕫之類凡古器制度一有合此則以名之如雲雷鍾鹿馬洗鸚耳壷之類是也如有款識則以款識名如周叔液䁀齊侯鍾之類是也古器之名則有鍾大曰特中曰鎛小曰編䁀尊罍彛舟類洗而有耳卣音酉又音由中尊器也有攀盖足類壷瓶爵斗有耳有流有足流即觜也巵觶之豉切酒觴也角類彛而無柱桮敦簠其形方簋類鼎而矮盖有四足豆甗牛偃切無底甑也錠徒徑切又都定切斚觚鬲形製同鼎漢志謂空足曰鬲鍑方宥切玉篇云似金而大其實類小瓮而有環盉户戈切又胡卧切盛五味之噐也似鼎而有盖有觜有埶攀壷其類有四曰圓曰匾曰方曰温盫於合切覆盖也似洗様而腰大有足有提攀瓿蒲後切類壷而矮鋪類豆鋪陳薦献之義罌類釡鑑盛氷器上方如斗􅍢底如風窓下設盤以盛之匜戈支切沃盤噐盤洗盆鋗呼玄切類洗玉篇云小盆也杅磬錞鐸征類鍾而矮鐃戚鐓飾物柄者奩鑑即鏡節鉞戈矛盾弩機表坐旂鈴刀筆杖頭蹲龍宫廟乗輿之飾或云闌楯間物鳩車鬼戯之具提梁龜蛇硯滴車輅托轅之属此其大㮣難於盡俻然知此者亦思過半矣所謂欵識乃分二義欵謂隂字是凹入者刻畫成之識謂陽字是挺出者正如臨之與摹各自不同也臘茶色亦有差别三代及秦漢間噐流傳世間歲月寑乆其色微黄而潤澤今士大夫間論古噐以極薄為真此盖一偏之見也亦有極薄者有極厚者但觀製作色澤自可見也亦有数百年前句容所鑄其藝亦精今鑄不及必竟黒而燥須自然古色方為真古也趙希鵠洞天清禄集古鍾鼎彛噐辨云夏尚忠啇尚質周尚文其制噐亦然啇噐質素無文周噐雕篆細宻此固一定不易之論而夏噐獨不然余甞見夏琱戈於銅上相嵌以金其細如髪夏噐大抵皆然歲乆金脫則成隂窽以其刻畫者成凹也銅噐入土千年純青如鋪翠其色子後稍淡牛後乗隂氣翠潤欲滴間有土蝕䖏或穿或剥並如蝸篆自然或有斧痕則是偽也銅器墜水千年則純緑色而瑩如玉未及千年緑而不瑩其蝕䖏如前今人皆以此二品體䡖者為古不知噐大而厚者銅性未盡其重止能減三分之一或減半噐小而薄者銅性為水土蒸淘易盡至有鉏擊破䖏並不見銅色惟翠緑徹骨或其中有一線紅色如丹然尚有銅声傳世古則不曽入水土惟流傳世間色紫褐而有朱砂班甚者其班凸起如上等辰砂入釡以沸湯煑之良乆班愈見偽者以􅃮調朱為之易辨也三等古銅並無腥氣惟土古新出土尚帶腥氣乆則否若偽作者熱摩手心以檫之銅腥觸鼻可畏識文款紋亦不同識乃篆字以紀功所謂銘書鍾鼎夏用鳥跡篆啇則蟲魚周以蟲魚大篆秦用大小篆漢以小篆隸書三國隷書晋宋以來用楷書唐秦用楷隸三代用隂識謂之偃嚢字其字凹入也漢以来或用陽識其字凸間有凹者或用刀刻如鐫碑盖隂識難鑄陽識易為决非三代物也款乃花紋以易飾古噐款居外而凸識居内而凹夏周噐有欵有識啇噐多無欵有識古人作事精緻工人預四民之列非若後世賤大夫之事故古噐𣢾必細如髪而匀整分暁無纎毫糢餬識文筆畫宛宛如仰瓦而不深峻大小深淺如一亦明浄分暁無纎毫糢餬此盖用銅之精者並無砂顆一也良工精妙二也不吝工夫非一朝夕所爲三也今設有古噐欵稍或模餬必是偽作質色臭味亦自不同句容噐非古物盖自唐天寳間至南唐後主時於昇州句容縣置官埸以鑄之故其上多有監官花押其䡖薄􅃮黒欵細雖可愛要非古噐歲乆亦有微青色者世所見天寳時大鳯環瓶此極品也偽古銅噐其法以水銀雜錫末即今磨鏡薬是也先上在新銅噐上令勻然後以釅醋調細􅔈砂末筆蘸勻上候如臘茶面色急入新汲水滿浸即成臘茶色候如􅃮急入新水浸成􅃮色浸稍緩即変色矣若不入水則成纯翠色三者並以新布擦令光瑩其銅腥為水銀所匱並不彂露然古銅聲微而清新銅声濁而関不能逃識者之見古人惟鍾䁀祭噐稱功頌徳則有識盤盂寓戒則有識它噐亦有無識者不可遽以為非但辨其體質欵紋顔色臭味足矣夫二書之論銅噐固巳粲然具備然清脩好古之士又不可不讀經傳紀録以求其源委如薛尚功欵識法帖及重廣鍾鼎韻七卷者宣和愽古圖吕大臨考古圖王俅嘨堂集古録黄睿東觀餘論董逌廣川書䟦等書皆當熟味徧叅而断之以經庶可言精鑒也今人家正門適當巷陌橋道之衝則立一小石将軍或植一小石碑鐫其上曰石敢當以厭禳之按西漢史㳺急就章云石敢當顔師古注曰衞有石碏石買石惡鄭有石制皆爲石氏周有石速齊有石之紛如其後以命族敢當所向無敵也㩀所說則世之用此亦欲以爲保瘴之意俗謂不通時宜者爲方頭陸魯望詩云頭方不㑹王門事塵土空緇白紵衣玉臺詩入門時左顧但見双夗央夗央七十二羅列自成行孟東野和薔薇歌仙機軋軋飛鳯皇花開七十有二行二詩皆用七十二不知何所祖京師旃檀佛以靈異著聞海宇王侯公相士庻婦女捐金荘嚴以丐福利者歲無虚日故老相傳云其像四體無所倚著君有道則至其國國𥘉時尚可通一綫無礙今則不然矣按翰林學士程鉅夫瑞像殿碑刻云釋迎如來𥘉爲太子生七日母摩耶棄世生忉利天佛既成道思念母恩遂昇忉利天爲毋說法優填國王自以乆失瞻仰於如来欲見無從乃刻旃檀爲像目犍連尊者慮有闕陋躬以神力攝三十二匠昇忉利天諦觀相好三返乃得其真既成國王臣民奉之猶真佛焉及佛自忉利天復至人間王卒臣庻同徃迎佛此像騰歩空中向佛稽首佛為摩頂授記曰我滅度千年之後汝從震旦東土也廣利人天由是西土一千二百八十五年龜茲六十八年涼州十四年長安一十七年江南一百七十三年淮南三百六十七年復至江南二十一年汴梁一百七十七年北至燕京居聖安寺十二年北至上京大儲慶寺二十年南還燕官内殿五十四年丁丑歲三月燕宫火迎還聖安寺居今五十九年乙亥歲當今大元世祖皇帝至元十二年也帝遣大臣孛羅等四衆俻法駕仗衞音伎迎奉萬夀山仁智殿丁丑建大聖安寺已丑歲自仁智殿迎安寺之後殿大作佛事瑞像計自優填王造始之歲至今延祐丙辰凡二千三百有七年又釋氏感通録云梁武帝遣郝騫等徃天竺國迎佛旃檀像其王模刻一像付騫天監十年至建康帝迎奉太極殿建齋度僧大赦断殺自是𬞞食絶慾㩀此說又與碑文不同即今聖安寺所安之像抑優填之所刻欤天竺之摹刻欤今人家娶婦輿轎迎至大門則傳席以入弗令履地然唐人巳尓樂天春深娶婦家詩云青衣轉去声氊褥錦繍一條斜吉之永豐劉氏女天共南下日為東平王郎中宥所虜後王聞其父母兄弟舅姑夫子咸在因放之歸且作歸婦吟以送之詩曰烈火都将玉石焚死生契闊憶中分信音一絶思青鳥淚眼雙穿望白雲殘日鶺鴒還有難北風鴻雁正離群新詩送尓還家去重續當年織錦文吁固雖劉氏有莫大之幸而王亦仁人者矣或者謂晋唐間人所畫士女多不帶耳環以為古無穿耳者然荘子曰天子之侍御不义揃不穿耳則穿耳自古亦有之矣呉中呼女子之賤者為丫頭劉賔客寄贈小樊詩花面丫頭十二三春來綽約向人時今以早飯前及飯後午前午後晡前小食為點心唐史鄭傪為江淮留後家人備夫人晨饌夫人頋其弟曰治妆未畢我未及餐尓且可點心則此語唐時已然今蒙古色目人之臧獲男曰奴女曰婢縂曰驅口盖國𥘉平定諸國日以俘到男女匹配為夫妻而所生子孫永為奴婢又有曰紅契買到者則其元主轉賣於人立劵投稅者是也故買良為驅者有禁又有曰陪送者則摽撥随女出嫁者是也奴婢男女止可互相婚嫁例不許聘娶良家若良家願娶其女者聽然奴或致富主利其財則俟少有過犯杖而錮之席卷而去名曰抄估亦有自碩納財以求脫免奴籍則主署執憑付之名曰放良刑律私宰馬牛杖一百毆死驅口常人減死一等杖一百七所以視奴婢與馬牛無異按周禮其奴男子入于皁隸女子入于舂藁說文奴婢皆古罪人夫今之奴婢其父祖𥘉無罪惡而世世不可逃亦可痛巳又奴婢所生子亦曰家生孩児按漢書陳勝傳秦令少府章邯免驪山徒人奴産子師古曰奴産子猶今人云家生奴也則家生児亦有所㩀愠羝謂腋氣也唐崔令欽教坊記云范漢女大娘子亦是竿木家開元二十一年出内有姿媚而㣲愠羝張公可與者濟南人律身㢘正持法公平苟可以納忠於國雖斧鉞有所不避為中書郎中日先帝時一大姦以元惡受顯􅓍後二子夤縁入侍幸沐天脊特各授行省平章陛辤叩首言曰先臣在九原弗獲霑一命之榮當不瞑目臣敢昧死請上命左右傳㫖中書獨公不奉詔越数日上召丞相面諭丞相退謂公曰聖意寵遇之深當復柰何公曰朝廷果欲舉行贈典必須雪其非罪若然是先帝不合誅之以先帝為何如主哉則上之於先帝反不若大姦之有後矣不孝孰大焉丞相備公言以聞上為動容而止公以病在告都堂有人訴宗室謀逆奏送刑部問状逮鞫有證驗而死于獄宗室之妻見上泣曰臣妾夫某無罪枉死上但知送部而不謂其已死聖怒命御史臺鞫問丞相懼謀之公即扶疾至省取牘𥙷署花押衆皆愕然丞相曰恐掾史所行有錯欲照畧耳非謂此也公曰自丞相以下皆當聽問某何獨求免邪既而緘牘令該掾抱詣臺臺官首問曰張郎中曽書卷否曰然臺官議曰張郞中所行未甞差錯况此一事中書得㫖施行執法者復何罪因覆奏曰臣等取省案根勘宗室某之死不枉上頷之其事遂寝如公者誠天子之争臣也矣宋張文濳明道雜志云經傳中無嬸妗二字嬸字乃世母字二合呼妗字乃舅母字二合呼也二合如真言中合兩字音為一蘇小小見諸古今吟咏者多矣而世有圖寫以玩之一何動人也如此哉春渚紀聞云司馬才仲𥘉在洛下晝寝夢一羙姝牽帷而歌曰妾本錢唐江上住花落花開不管流年度燕子䘖将春色去紗窓㡬陣黄梅雨才仲愛其詞日詢曲名云是黃金縷且曰後日相見於錢唐江上及才仲以東坡先生薦應制舉中等遂為錢唐幙官其廨舎後堂蘇小墓在焉時秦少章為錢唐尉為續其詞後云斜挿犀梳雲半吐檀板䡖𫾣唱徹黄金縷夢断綵雲無覔䖏夜涼明月生春浦不逾年而才仲得疾所乗畫水輿艤泊河塘柁工遽見才仲擕一麗人登舟即前声喏而火起舟尾狼忙走報家巳慟哭矣能改齋漫録云劉次荘樂府解題曰錢唐蘇小小歌蘇小小非唐人世見樂天夢得詩多稱咏遂謂與之同時耳次荘雖知蘇小小非唐人而無所㩀余按郭茂倩所編引廣題曰蘇小小錢唐名娼也盖南齊時人西陵在錢唐江之西故古辤云何䖏結同心西陵松􅍬下余甞記虞羙人長短句云槐隂別院宜清晝人坐春風秀羙人圖子阿誰留都是宣和名筆内家收鶯鶯燕燕分飛後粉淡棃花痩只除蘇小不風流斜挿一枝萱草鳯釵頭亦藴藉可喜乃元遺山先生所作也某人以善經紀積貲至鉅萬計而既鄙且嗇不欲書其姓名其尊行錢素菴者抱素逸士也多㳺名公卿間善詩曲有集行于世某甞以貴富驕之故作今樂府一闋譏警焉哨遍試把賢愚窮究看錢奴自古呼銅臭徇巳苦貪求特不教泉貨周流忍包羞油鐺挿手血海舒拳肯落它人後暁夜尋思機彀縁情鉤距巧取㫄摉蠅頭場上苦驅馳馬足塵中厮追逐積儧下無厭就捨死忘生出乖弄醜耍孩児安貧知足神明佑好聚歛多招悔尤王戎遺下舊牙籌夜連明計筭無休不思日月搬烏兎只與児孫作馬牛添消瘦不調相鼎恣逞戈矛十煞漸消磨双臉春已凋䬒兩鬂秋終朝不樂眉長皱恨不得櫃頭錢五分息招人借架上一周年不放贖狠毒性如狼狗把平人骨肉做自已膏油九有心待拜五侯教人喚甚半州忍飢寒儧得家私厚待壘做錢山児倩軍士喝號提鈴守怕化做錢龍児請法官行罡布氣留半炊児入徧把牙関叩只碩得無支有管少出多收八虧心事儘意為不義財儘力掊那裏問親弟兄親姊妹親姑舅只待要春風金谷驕王凱一任教夜雨新豐困馬周無親舊只知敬明眸皓齒不想共肥馬輕裘七資生利轉多貪婪意不休為錙銖捨命尋争闘田連阡陌心猶窄架挿詩書眼不瞅也學采東籬菊子是箇􅏻呵元亮豹子浮丘六恨不得揚子江変做酒早穣金積到斗為幾文贉背錢受了些㫄人呪一斗粟與親眷分了顔面二斤麻把相知結下冦讎真紕繆一味的驕而且吝甚的是樂以忘憂五這財曽燃了董卓臍曽梟了元載頭聚而不散遭殃咎怕不是堆金積玉連城富眨眼早野草閒花滿地愁干生受生財有道受用無由四有一日大小運併在命宫死囚限纏在邜酉甚的散得疾子為你聚來得驟恰待調和新曲歌金帳逼臨得佳人墜玉楼難收救一壁相投河奔井一壁相爛額焦頭三窓隔毎都颭颭的飛椅卓毎都出出的走金銀錢米都消為塵垢山魈木客相呼喚寡宿孤辰厮趂逐喧白晝花月妖将家人狐媚虚耗鬼把倉庫潜偷二惱天公降下灾犯官刑繫在囚它用錢時難叅透待買它上木驢釘子䡖䡖釘吊脊觔鈎児淺淺鈎便用殺難寛宥魂飛蕩蕩魄散悠悠尾出落它平生聚歛的情都寫做臨刑犯罪由将它死骨頭告示向通衢裏甃任它日灸風吹慢慢朽樂府中押逐贖菊字韻者盖中州又音䡖與尤字韻相近故也此曲雖曰為某而作然亦可以為世勸蜀主孟昶納徐匡璋女拜貴妃別號花蕊夫人意花不足擬其色似花蕊之翾䡖也或以為姓費氏則誤矣余向在武林日於一友人䖏見陳居中所畫唐崔麗人圖其上有題云並燕鶯為字聮微氏姓崔非煙冥采畫秀玉勝江梅薄命千年恨芳心一寸灰西廂舊紅樹曽與月徘徊余丁邜春三月䘖命陜右道出于蒲東普救之僧舎所謂西廂者有唐麗人崔氏女遺照在焉因命畫師陳居中繪模真像意非登徒子之用心迨将勉惰鍾始終之戒仍拾四十言使好事者知百勞之歌以記云㤗和丁邜林鍾吉日十洲種玉大誌宜之題延祐庚申春二月余傳命至東平頋市粥雙鷹圖觀乆之弗見主人而歸夜宿府治西軒夢一麗人綃裳玉質逡廵而前曰君玩双鷹圖雖佳非君几席間物妾流落乆矣有双鷹名冠古今頋託君為重覺而恠之未卜其何祥遲明欲行忽主人擕鷹圖來且四軸余意麗人双鷹符此数耳継出一小軸乃夢所見有詩四十字䟦語九十八識日㤗和丁邜出蒲東普救僧舎繪唐崔氏鶯鶯真十洲種玉大誌宜之題畫詩書皆絶神品也余驚詫良乆時有司群官吏環視囙縮不囙託以䟦語佳勝贖之吁物理相感果何如邪豈法書名畫自有靈邪抑名不朽者随神邪遇合有定数邪余甞謂関雎碩人姿德兼俻君子之配也琴心雪句才艶聮芳文士之偶也自詩書道廢丈夫弗學況女流乎故近世非無秀色徃徃脂粉腥穢鴉鳯莫辨求其彷彿待月章之萬一絶代無聞焉此亦慨世降之一端也因歸于我義弗辤已宜之者盖前金趙愚軒之字曽為鞏西簿遺山謂㤗和有詩名五言平淡它人未易造信然㤗和丁邜迨今百十四年云其月三日壁水見士思容題右共五百九字雖不知壁水見士為何如人然二君之風韻可想見矣因俾嘉禾繪工盛懋臨寫一軸適舅氏趙公待制雝見而愛之就為録文於上按唐元微之傳竒鶯鶯事以為張生寓蒲之普救寺適有崔氏孀婦亦止兹寺崔氏婦鄭氏也生出於鄭視鄭則異派之從母因丁文雅軍擾掠蒲人鄭惶駭不知所措生與将之黨善請吏護之不及於難鄭厚生徳謂曰姨之弱子㓜女當以仁兄之禮奉承命鶯鶯出拜顔色艶異光輝動人生問其年紀鄭曰十七歲矣生自是惓之私禮鶯鶯之侍婢紅娘間道其衷既而詩章徃復遂酬所碩中間離合多故然不能終諧伉儷說者以為生即張子野宋王性之著傳竒辨正按微之作姨母鄭氏墓銘云其既䘮夫遭軍乱微之為保護其家又作陸氏誌云余外祖睦州刺史鄭濟白樂天作微之母鄭氏誌亦言鄭濟女而唐崔氏譜永寧尉鵬娶鄭済女則鶯鶯者乃崔鵬之女於微之為中表傳竒言生年二十二樂天作微之墓誌以大和五年薨年五十三即當以大暦十四年己未生至貞元庚辰正二十二歲凡此数端决為微之無疑特託它姓以避就耳事具侯鯖録中江浙行省建治所于杭陸路赴都三千九百二十四里若水程則四千四百四十里東至大海四百九里順風海洋七日七夜可到日本國西至鄱陽湖接連江西省南康路界一千三百四十五里南至汀州路接連廣東潮州界二千四百二十里北至揚子江接連淮南省揚州界七百二十里東到大海四百九里西到江西省南康路一千七百五里南到廣東潮州路二千五百一十里北到淮南省揚州路七百六十五里東南到漳州路海岸二千四百九十九里西南到江西省建昌路一千五百九十里東北到松江海岸五百二十二里西北到池州路接連河南省安慶路一千三百四十二里此四至八到也今割福建道立行省則又不同矣今人謂易其所守者為改常北夢瑣言左軍容使嚴遵羙閹官中仁人也甞一日彂狂手足舞蹈傍有一猫一犬猫忽謂犬曰軍容改常也
