front:
  text: 列聖授受正統
  hash: sha256:4a2fdf97ef107f82ff70cde191c2daedc8df1f4ceaab105ce06271e6390f7ec0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_001-1a}
body:
  text: 始祖諱孛端義兒烈祖神元皇帝諱也速該姓竒渥溫氏太祖應天啓運聖武皇帝諱鐵木真國語曰成吉思宋開禧二年丙寅十二月即位于斡難河自號可汗至宋寶慶三年丁亥七月己丑崩于薩里川在位二十二年壽六十六葬起輦谷太宗英文皇帝諱窩闊台宋紹定二年己丑八月己未即位于忽魯班雪不只至宋淳祐元年辛丑十一月崩于胡䦨山在位一十三年壽五十六葬起輦谷太皇后秃里吉納臨朝稱制皇后乃馬真氏睿宗仁聖景襄皇帝諱拖雷憲宗追諡定宗簡平皇帝諱貴由宋淳祐二年壬寅至乙巳皇后當國丙午七月歸政即位于答蘭答八思至戊申三月崩于胡眉斜陽吉兒在位三年壽四十三葬起輦谷皇太后秃里吉納復治國事憲宗桓肅皇帝諱蒙哥宋淳祐十一年辛亥六月即位于闊帖兀阿蘭至宋開慶元年己未七月二十七日癸亥崩于鈎魚山在位九年壽五十世祖聖德神功文武皇帝諱忽必烈國語曰薛禪宋景定元年庚申四月一日戊辰即位于開平建元中統至至元三十一年甲午正月十九日庚午崩于紫檀殿在位三十五年壽八十葬起輦谷中統四至元三十一𥙿宗文惠明孝皇帝諱真金成宗追諡順宗昭聖衍孝皇帝諱答刺麻八刺武宗追諡成宗欽明廣孝皇帝諱鐵木耳國語曰完者篤至元三十一年甲午四月十四日甲午即位于上都改至元三十二為元貞至大德十一年丁未正月八日癸酉崩于王德殿在位十三年壽四十二葬起輦谷元貞二大德十一武宗仁惠宣孝皇帝諱海山國語曰曲律大德十一年丁未五月十一日甲戌即位于上都十二月詔改大德十二為至大至四年辛亥正月八日庚辰崩于玉德殿在位四年壽三十一葬起輦谷至大四仁宗聖文欽孝皇帝諱愛育黎拔刁八逹國語曰普顔篤至大四年辛亥三月十八日庚寅即位于大明殿九月壬子詔改至大五為皇慶至延祐七年庚申正月二十一日辛丑崩于光天宫在位九年壽三十六葬起輦谷皇慶二延祐七英宗睿聖文孝皇帝諱碩德八刺國語曰革堅延祐七年庚申三月十一日庚寅即位十二月乙巳詔改延祐八為至治至三年癸亥八月四日癸亥遇弒崩于上都途中南坡行幄在位四年壽二十一從葬諸帝陵至治三顯宗光聖仁孝皇帝諱甘刺麻泰定追諡今出廟泰定皇帝諱也先帖木兒元封晉王至治三年癸亥九月四日癸巳即位于上都龍居河十二月丁亥昭改至治四為泰定至五年戊辰二月庚申改致和七月十日庚午崩文宗追廢在位五年壽二十六泰定四泰定伍改致和文宗即改天曆明宗翼獻景孝皇帝諱和世刺國語曰忽都篤天曆二年己巳正月二十八日丙戌即位于和寧北八月二日大駕次王忽察都六日暴崩不改元在位八月壽三十葬起輦谷文宗聖明元孝皇帝諱脫脫木兒國語曰扎牙篤致和元年戊辰九月十三日壬申即位于大明殿改元天曆詔讓大兄明宗明年己巳五月帝發京師北迎八月二日丙戌遇于王忽察都庚寅明宗暴崩巳亥復即位于上都至三年庚午五月戊午改至順至三年壬申八月十二日己酉崩在位五年壽二十九葬起輦谷後至元六年庚辰六月丙申以帝謀不軌使明宗飲恨而崩詔撤其廟主天曆二至順三寧宗冲聖嗣孝皇帝諱懿璘質班至順三年壬申十月四日庚子即位于大明殿至十一月十六日壬午崩不改元年七歲葬起輦谷今上皇帝御名妥歡帖睦爾至順四年癸酉六月八日己巳即位于上都十月戊辰改元元統至三年乙亥十一月辛丑改至元至七年正月一日改至正元統二至元六至正今二十六年氏族蒙古七十二種阿刺刺扎刺兒歹忽神忙兀歹瓮吉刺歹晃忽攤永吉列思兀魯兀郭兒刺思别刺歹怯烈歹秃别歹八魯刺忽曲吕律也里吉斤扎刺只刺脫里别歹塔塔兒哈答兒散兒歹乞要歹列木歹顔不花歹歹列里飬賽散木兀歹滅里吉歹阿火里吉歹兀羅歹别帖里歹蠻歹也可抹合刺那顔吉歹阿塔里吉歹亦乞列歹合惑乞歹木里乞外兀歹外抹歹阿兒刺歹伯要歹揑古歹外刺歹末里乞歹許火歹晃兀攤别速歹顔不萆歹木溫塔歹忙兀歹塔塔歹那顔乞台阿塔力吉歹忽神塔一兒元魯歹撒木歹滅里吉阿火里力歹扎馬兒歹兀羅羅歹答答兒歹别帖乞乃蠻歹也可林合刺瓮吉歹木里歹忙古歹外抹歹乃朵里别歹八憐察里吉歹八魯忽歹哈答歹外刺色目三十一種哈刺魯欽察唐兀阿速秃八康里苦里魯刺乞歹赤乞歹畏吾兀回回乃蠻歹阿兒渾合魯歹火里刺撒里哥秃伯歹雍古歹賽亦思夯力苦魯丁貴赤匣刺魯秃魯花哈刺吉答歹拙兒察歹秃魯入歹火里刺甘木魯徹兒哥乞失迷兒漢人八種契丹髙麗女直竹因歹术里闊歹竹溫竹赤歹渤海女直同金人姓氏完顔漢姓曰王烏古論曰商乞石烈曰高徒單曰杜女奚烈曰郎兀顔曰朱蒲察曰李顔盞曰張溫迪罕曰溫石抹曰蕭奧屯曰曹孛术魯曰魯移刺曰劉斡勤曰石納刺曰康夾谷曰全裴滿曰麻尼忙古曰魚斡准曰趙阿典曰雷阿里侃曰何溫敦曰空吾魯曰惠抹顔曰孟都烈曰强散答曰駱呵不哈曰田烏林答曰蔡僕散曰林术虎曰董右里甲曰汪至元十一年甲戌宋之咸淳十年也秋七月世祖命中書右丞相伯顔總制大軍取宋諭之若曰朕聞曹彬不嗜殺人一舉而定江南汝其體朕心法彬事毋使吾赤子橫罹鋒刃伯顔叩首奉命惟謹既而混一職方豈非不嗜殺人之驗與明年乙亥春諸郡望風降敗丞相伯顔遣貟外郎石天麟詣闕奏聞世皇喜顧謂侍臣曰朕兵巳到江南宋之君臣必知恐畏茲若遣使議和邀索歲幣想無不從者遂敕伯顔按兵乃命禮部尚書廉希賢侍郎嚴忠範計議官宋德秀祕書丞柴紫芝等齎奉國書使宋次建康希賢等借兵衛送伯顔曰方今兩軍相厄互有設險宜令行人先往道意若便擁兵前進吾恐别生罅隙則和議之事必難成矣希賢等謹請乃簡閲鋭卒五百卑之至獨松關戍關者宋浙西安撫司參議官張濡也以為北兵叩關率衆掩擊殺忠範執希賢希賢亦病創死世皇聞之大怒趣進攻嗟夫宋之亡也非有桀紂之惡特以始之以拘留使者肇天兵之興終之以誤殺使者激世皇之怒耳藉使獨松之使不死宋之存亡未可知其亦有數也與明年正月甲申丞相伯顔駐軍皋亭山宋奉表及國璽以降遣千戶囊加歹等入城慰諭令居民門首各貼好投拜三字及聞益王廣王如婺州即命分兵守屯諸門范文虎安營浙江沙滸太皇太后望祝曰海若有靈當使波濤大作一洗而空之潮汐三日不至軍馬晏然文虎吕文煥壻安慶守臣降于我者宋之興始於後周恭帝顯德七年恭帝方八歲及其亡也終于少帝德祐元年少帝時四歲名顯而顯德二字竟與得國時合周以主幼而失國宋亦以主幼而失國周有太后在上宋亦有太后在上始終興亡之數昭然如此萬歲山在大內西北太液池之陽金人名瓊花島中統三年修繕之其山皆以玲瓏石疊罍峰巒隱映松檜隆鬱秀若天成引金水河至其後轉機運紏汲水至山頂出石龍口注方池伏流至仁智殿後有石刻蟠龍昻首噴水仰出然後東西流入于太液池山上有廣寒殿七間仁智殿則在山半為屋三間山前白玉石橋長二百尺直儀天殿後殿在太液池中之圓坻上十一溋正對萬歲山山之東為靈囿竒獸珍禽在焉車駕歲巡上都先宴百官于此浙省參政赫德爾嘗云向任留守司都事時聞故老言國家起朔漠日塞上有一山形藝雄偉金人望氣者謂此山有王氣非我之利金人謀欲厭勝之計無所出時國巳多事乃求通好入貢既而曰它無所冀願得某山以鎮壓我土耳衆皆鄙笑而許之金人乃大發卒鑿掘輦運至幽州城北積纍成山因開挑海子栽植花木營構宫殿以為遊幸之所未幾金亡世皇徙都之至元四年興築宫城山適在禁中遂賜今名云留守司在宫城西南角樓之南專掌宫禁工役者世皇取江南大軍次黃河苦乏舟擑夜夢一老叟曰陛下欲渡河當隨我來引至一所指曰此即是巳帝遂以物標識之及覺歷歷可記明日循行河滸尋夢中所見處果是方驚顧間忽有人進曰此間水淺可渡時帝徴夢中語因謂曰汝能先涉否其人乃行大軍自後從之無一不濟帝欲重旌其功對曰富與貴悉非所願但得自在足矣遂封為答刺罕與五品印撥三百戶以食之今其子孫尚有存者此事楊元誠太史瑀所云世皇下江南檄枚舉賈似道無君之罪宋國臣民其不誠服者與其文曰宅中圖大天開一統之期自北而南雷動六師之衆先謂吊民而伐罪蓋將用夏而變夷欲制江浙以削平極汝海隅而混一堪嗟此宋信任非人處之師相之尊委以國柄之重世濟其惡真凶悖之賈充謀及乃心效姦雄之曹操不學無識舞術弄權誇滸黃僅免其身比河清莫大之績承君之寵如彼之專貪天之功確乎不拔惜官爵以總寶貨苛條法以苦賢才奪土田而無地可耕變關㑹而物價溢湧藉鄙猥者伴食於廟堂任反側者失兵於邊徼恬視雷星之召異罔聞水火之降災滿朝皆其私人用將因其重賂用白札而破世守之法曲丹筆而容天討之刑民心巳離而不知天命將革而未悟方且貪湖山之樂聚寶玉之珍弗顧毋死奪制以貪榮乃乘君寵立幼而固位以巳峻功碩德而自比於周公欺人寡婦孤兒反不如於石勒深懷禍慝恣肆姦邪合正兩觀之誅可紓百姓之怒我大元皇帝聰明智睿神武慈仁焚香祝天誓莫殺而混海宇振兵略地隨所向而宣皇威一戰乘勝而渡江諸將列降而獻土厥魚稽首迎我前矛後實先聲易如破竹昭天順人信之助成我風行草偃之功合宇宙以清寧蘇人民而鎮撫恩寬幼主以下罪止元惡之身自今檄到應守令以境土投拜除大支犒賞外仍其官職謹檄大元受天命肇造區夏列聖相承至于世皇至元𥘉尚未遑興建宫闕凡遇稱賀則臣庶皆集帳前無有尊卑貴賤之辨執法官厭其喧雜揮杖擊逐去而復來者數次翰林承㫖王文忠公盤時兼太常卿慮將貽笑外國奏請立朝儀遂如其言皇慶癸丑冬十一月詔曰其以皇慶三年八月天下郡縣興其賢者能者充賦有司明年二月會試京師中選者朕將親䇿焉按遺山元公好問所撰廉訪使楊文憲公奂墓碑云太宗即位之十年戊戌開舉選特詔宣德課稅使劉公用之試諸道進士公試東平兩平賦論第一奏授河南路徴收課稅所長官兼廉訪使則國朝科舉之設己肇於此寥寥七十餘年而普顔篤皇帝克不墜祖宗之令典尊號曰仁不亦宜乎𥘉焉試論賦蓋又宋金餘習後則一以經學為夲非復向時比矣汲郡王公玉堂嘉話云宋未下時江南謠云江南若破百鴈來過當時莫喻其意及宋亡蓋知指丞相伯顔也太宗時諸國來朝者多以冒禁應死耶律文正王楚材進奏曰願無汗白道子從之蓋國俗尚白以白為吉故也大德七年詔內外官年及七十並聽致仕時郭守敬字若思順德邢臺人知太史院事以舊臣且熟朝廷所施為獨不許其請至今翰林太史司天官不致仕者咸自公始答刺罕譯言一國之長得自由之意非勳戚不與焉太祖龍飛日朝廷草創官制簡古惟左右萬戶次及千户而巳丞相順德忠獻王哈刺哈孫之曽祖啓昔禮以英材見遇擢任千戶錫號答刺罕至元壬申世祖録勳臣後拜王宿衛官􅊞號答刺罕己丑秋八月太宗即皇帝位耶律文正王時為中書令定冊立儀禮皇族尊長皆令就班列拜尊長之有拜禮蓋自此始內八府宰相八員視二品秩而不降授宣命時中書照㑹之任而已寄位於翰林之掃鄰掃鄰宫門外院官㑹集處也所職視草制若詔赦之文則非其掌也至於院之公事亦不得與焉例以國戚與勳貴之子弟充之國朝有四怯薛太官怯薛者分宿衛供奉之士為四畨畨三晝夜凡上之起居飲食諸服御之政令怯薛之長皆總焉中有雲都赤乃侍衛之至親近者雖官隨朝諸司亦三日一次輪流入直負骨朵於肩佩環刀於要或二人四人多至八人時若上御控鶴則在宫車之前上御殿廷則在墀陛之下蓋所以虞姦回也雖宰輔之日覲清光然有所奏請云都赤在固不敢進今中書移咨各省或有須備録奏文事者內必有云都赤某等以此之故余又究骨朵字義嘗記宋景文筆記云關中人以腹大為􅍺􅞷上音孤下音都俗因謂杖頭大者赤曰􅍺後訛為骨朵朵平聲國朝鎮殿將軍募選身驅長大異常者充凡有所請給名曰大漢衣糧年過五十方許出官貴由赤者快行是也每歲一試之名曰放走以腳力便捷者膺上賞故監臨之官齊其名數而約之以繩使無後先參差之爭然後去繩放行在大都則自河西務起程若上都則自泥河兒起程越三時走一百八十里直抵御前俯伏呼萬歲先至者賜銀一餅餘則段匹有差昔寶赤鷹房之執役者每歲以所飬海青獲頭鵝者賞黃金一錠頭鵝天鵝也以首得之又重過三十餘斤且以進御膳故曰頭南村輟耕録卷之一
