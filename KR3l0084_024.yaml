body:
  text: 天台陶宗儀九成國𥘉張公可與李公仲方鮮于公伯機同仕于朝既而張除浙省郎中李除都事鮮于除浙東宣慰經歷胥會于歡甚李卒于官張移書鮮于曰仲方殁矣家貧子小吾輩若不為之經紀則孤寡何所依也吾以一女許配其仲子矣公以為何如鮮于聞訃哀祭成禮亦以一女許贅其長子即從善也後官至紹興推官仲子字復𥘉官至淮安捴官于此可見前輩結交重氣義不以貴賤貧富易其心誠可敬也張公官至中書左丞國朝每宴諸王大臣謂之大聚會是日盡出諸獸于萬歲山若虎豹熊象之屬一一列置訖然後獅子至身材短小絶類人家所畜金毛猱狗諸獸見之畏懼俯伏不敢仰視氣之相壓也如此及各飼以雞鴨野味之類諸獸不免以瓜按定用舌去其毛羽惟獅子則以掌擎而吹之毛羽紛然脫落有若燖洗者此其所以異於諸獸也古云獅子吼蓋不易於吼一吼則百獸為之辟易也至元壬寅夏松江府前勾闌鄰居顧百一者一夕蘿𬒳攝入城隍廟中同𬒳攝者約四十餘人一皆責狀畫字時有沈氏子以摶銀為業亦夢與顧同鬱鬱不樂家人無以紓之勸入勾闌觀俳戲獨顧以宵夢匪貞不敢出門有女官奴習謳唱每聞勾闌鼓鳴則入是日入未幾棚屋拉然有聲衆驚散既而無恙復集焉不移時棚阽壓顧走入抱其女不謂女巳出矣遂斃於顛木之下死者凡四十一人內有一僧人二道士獨歌兒天生秀全家不損一人其死者皆碎首折脅斷筋潰髓亦有𬒳壓而幸免者見衣朱紫人指示其出不得出者亦曲為遮護云顔清甫曲阜人顔子四十八代孫嘗臥病其幼子偶彈得一鵓鴿歸以供膳於梢翎間得書一緘書上題云家書付男郭禹開拆禹乃曲阜縣尹郭仲賢也蓋其父自真定寄至者時仲賢改授逺平縣尹去鴿未及知盤桓尋覔遂遇害清甫見之責其子便耴木匣函鴿候病稍愈直抵仲賢官所獻書與鴿且語其故仲賢戚然曰畜此鴿巳十七年矣凡有家書雖隔數千里亦能傳致誠異禽也命左右瘞之以清甫長厚君子留之纍日問及子弟出處仲賢告言長子國祥頗習儒業及仲賢知霍州召輔州史貢山東廉訪奏差升書吏後官至漢中廉訪使嘉興林叔大鏞掾江浙行省時貪墨鄙吝然頗交接名流以沽美譽其於逹官顯宦則刲羔殺豕品饌甚盛若士夫君子不過素湯餅而巳一日延黃大癡作畫多士畢集而此品復出捫腹闊步譏謔交作叔大赧甚不敢仰視遂揖潘子素求題其畫子素即書一絶句云阿翁作畫如説法信手拈來種種佳好水好山塗抹盡阿婆臉上不曽搽大癡笑謂曰好水好山言逹官顯宦也阿婆臉不搽言素面也言未巳子素復加一句云諸佛菩薩摩訶蕯俱不解其意子素曰此謝語即僧家纎悔也閧堂大笑而散叔大數日羞出見客人之鄙吝一至於此亦可憐巳陳雲嶠柏泗州人性豪宕結客其祖平章故宋制置郎龍麟洲題琵琶亭以譏之者凡積金七屋不數年散盡嘗為侍儀舍人館閣諸老朝省名公莫不折輩行與交咸稱之曰公子其妻鐵太保女也恃富貴近戚偶以一言驕之遂終身不見嘗𬒳命監鑄祭器于杭無錫倪元鎮慕其名來見之張燕湖山間羅設甚至酒終為别以一帖饋米百石雲嶠命從者移置近所舉巨􅘑引妭樂趨從者而前悉分散之顧倪曰吾在京時即熟爾名云南士之清者它無與比其所以章章者蓋以米沽之也諸從令日絶交且罵諸嘗譽之者時張伯禹在坐不勝局蹐其豪氣類如此嘗雪中騎牛拜米南宫墓詩云少年不解事買駿輕千金何如小黃犢踏雪空山深小小雙牧童吹笛穿松林醉拜南宫墓地下有知言世上無知音也平日喜居錢唐好古有餘而治才不足又不樂小官怒罵宰相年逾六十不得志而死其畢命時作偈云前身本是泗州僧霍治書云紫陽楊煥然先生讀通鑑至論漢魏正閏大不平之遂修漢書駁正其事因作詩云風煙慘淡駐三巴漢燼將燃蜀婦髽欲起溫公問書法武侯入寇寇誰家後攻宋軍回始見通鑑綱目其書乃寢順德劉道濟先生尤不平之修書名三為亦見綱目閟而不行中統改元陵川郝伯常先生使宋𬒳留儀真執不得還就買書作續漢史既脫藁會同僚苟正甫諸公飲至數行忽長歎曰某辛苦十餘年莫不𬒳高頭巾輩巳做了也皆對云不聞之至元丁亥余分臺江西購得蕭常續漢書全部因喟然曰惜乎郝君不及見此剛卯者按許慎説文㱾音開改大剛昴以遂鬼也玉篇開改剛卯也大印以辟鬼也廣韻㱾改大開堅也王莾傳服虔注曰剛卯以正月卯日作佩之長三寸廣一寸四分或用玊或用金或用桃著佩之又注當中央從穿作孔以綵絲茸其刻其上文曰正月剛卯既央靈殳四方赤青白黃四色是當帝令祝融以教夔龍庶疫剛疸莫我敢當又曰疾日嚴卯帝令夔化順尓國化伏兹靈殳既正既直既觚既方庶使剛疸莫我敢當凡六十六字㱾改者佩印也以正月卯日作故謂剛卯又謂之大堅以辟邪也金刀之利者皆不得行服虔曰剛卯以正月卯日作佩之長三寸廣一寸四分或用金或用桃著革帶佩之金有玊在者銘其一靣曰正月剛卯金刀莾所鑄之錢也晉灼曰剛卯長一寸廣五分四分當中央從穿作孔以綵絲茸其底如冠纓頭㽔刻其上靣作兩行書文曰正月剛卯既央靈殳四方云云同前其一銘曰疾日嚴卯帝令夔化順尓故一作固伏化兹靈殳云云同前師古曰今泩泩於土中得玊剛卯者案大小及文服説是也莾以劉字上有卯下有金旁有又刀故禁剛卯及金刀也慱謀卿士僉曰天人同應昭然著明其去剛卯莫以為佩除刀錢勿以為利承順天心快百姓意乃更作小錢徑六分重一銖文曰小錢直一與大泉五十者為二品並行後漢輿服志佩雙印長寸二分方六分乘輿諸侯及王公列侯以白玊中二千石以下四百石皆以黑犀三百石以至私學弟子皆以象牙上合絲乘輿以縢貫白珠赤罽㽔諸侯王以下以槂赤絲𬎼槂各如其印質刻書曰正月剛卯既決云云同前慎尓周伏伯兹靈殳云云同前凡六十六字前書注云正月剛卯作霍治書清甫云嘗於吳中得白玊剛嚴雙印四牧完具者二剛卯銘詞三十四字嚴卯銘詞三十二字其二字筆畫損缺剛卯無既央二字餘十字難辨嘗考王莾傳輿服志説文剛卯銘與説文及王莾傳同輿服志央為決嚴卯疾日為曰疑志誤又順尓故化伏與莾傳同説文作順爾國化伏輿服志作填尓周伏化未詳孰是其服用制度遞相引據亦不同後見徐容齋參政藏剛卯一梁貢父尚書藏剛嚴二並係古玉篆體剛卯銘三十四字字畫亦損缺制度銘詞與前雙印大約不異續收嚴卯二一以玉為之一若瑟瑟俗傳葛仙翁練丹頭又名藥注子其文曰制曰嚴卯帝命莫忘日資唯是黑青白黃既正既直既觚既方庶使罔談莫我敢當與前嚴卯銘詞並差鮮于伯機經歷收一枚高彥敬尚書收二枚並真楷書皆似近代制作未見所出偶得金陵學宫所刻黃山谷先生辨剛卯遺迹其説與前相同但云絲繩也音護古文無此字按五紐繩器也罟兔罟也豈紐絲繩與兔罟相類故同此音耶又馬永卿懶真子録公漢人以正月卯日作佩之銘其一靣曰剛卯乃知今人立春或戴春勝亦古制也蓋剛者強也卯者劉也正月佩之尊國姓也與陳湯所謂強漢也同義顧仲庸泰州人以財雄一鄉倜儻好義有古豪俠風自奉甚薄而禮賢飬士無虛日名公巨儒多館其家張蛻菴承旨亦其人也仲庸與保定張文友交文友􅌘縣尹秩滿僑居江隂一日暴卒時仲庸留京師友人以訃告戒勿泄友詢其故曰文友賢而貧在六品選中吾將與其子為地即走告當路者曰張文友末疾病矣願致仕因代入狀中書遂獲以奉政大夫嘉定知州致仕既領宣命數月又代文友之子告蔭尋注常州晉陵縣尉便其飬毋也其家悉無所知仲庸南歸遣人致賵奠奉宣勑以授其子聞者驚嘆仲庸行事類如此會稽陽明洞天在秦望山後禹廟之西南云即古禹穴越之勝境也諸峯環聳盤鬱空曲中有東嶽行祠及老子宫余嘗宿留其間一老道士者朱顔鶴髮延至其室室橫一空棺云巳十餘年矣未能即棄浮世而入此匣也其後兵攻越城遊騎四出道士乃沐浴冠佩絶粒飲與衆永訣卧于其中七日不死軍至彂棺挈之出兵退乃入城一病而卒向之棺不可得矣豈非分定歟喬公仲山官吏部中好古博雅仍喜諧謔所交皆名人才士公家製餛飩得法常苦賔朋需索一日於每客前先置一帖且戒云食畢展卷既而取視乃製造方法也大笑而散自後無復言矣劉元字秉元薊之寶坁人官至昭文館大學士正奉大夫袐書監卿元嘗為黃冠師事青州祀道録傳其藝非一而獨長于至元七年世祖建大護國仁王寺嚴設梵天佛像特求奇工為之有以元薦者及𬒳召又從阿尼哥國公學西天梵相神思妙合遂為紀藝凡兩都名剎有塑土範金搏換為佛一出元之手天下無與比所謂摶換者漫帛土偶上而髹之巳而去其土髹帛儼然像也昔人嘗為之至元尤妙摶丸又曰脫活京師語如此繆孝子倫字叔彛東平人侍父宦遊寓居錢唐至正十六年淮兵寇城執其父將殺之倫哀號乞免弗聽傾家資以贖又弗聽乃自縳請代于是殺倫而釋其父甚哉賊之不仁也趙孝子天爵字伯廉平陽解州夏縣人嘗為史多平反惇行孝弟治家甚嚴三子皆頎然玉立毋喪廬墓三年父繼喪又如之惟𬞞食菜美不飲酒食肉不與妻妾見有司以聞于朝旌表其門閭復其身王義士天爵字世傑亦夏縣人家饒於財有善行以粟貸人不圖重息年豐僅取十之二三稍飢但收其本大凶則巳皆之鄉里不知字咸稱義士焉每值生身之辰寢苫一月以報父毋朝廷于歲首例遣使祭嶽瀆至正乙巳翰林應奉李國鳯代祀嵩恆醫無閭抵汴路閉即城中望祭嵩嶽時閏月下旬也二月十三日遊相國寺池上群僧方聚觀從之仰視日旁一月一星月如𥘉弦者又十日雨木氷狀如樓閣人物冠帶鳥獸卉木百態具備殆非人工髙林大樹珠葆羽憧彌望不絶凡五日始解又十日復冰自汴至中灤皆然不一歲盜陷汴據之亦集乃路在西北方有山曰蹇占山比多龍湫土人𣣔有所事則役之吉安道士劉學仙嘗至其地見有烹羔桐酪祠焉數皮而沈之祝曰神為我鞣而治之為期日而去至期復祠之則得成革矣若有鬼工然不可測也歸語于虞邵菴先生先生𥘉以為誑及質諸其土人之在京師者則始信蓋其人習以為常不以為異耳杭州屬邑有一巨室怙財挾執虐害良善邑官貪墨莫敢孰何衆不能堪走訴憲府巨室逃匿憲使怒督責有司示罪賞揭大逵且家至壁白隱藏者罪連坐首捕者賞萬緡其友人王一山者丗業儒居湖山第一樓儔彼於密期月不彂鄰家察知圖給賞錢告報于官官􅊧索得之併王逮繫囚見憲使使問云女知彼所犯乎王曰知之女聞國有制乎曰知之女見揭示罪賞乎曰見之女奚不就利避害乎曰朋友顛連來奔乘其危以售之則名教中有所不容某誠弗忍為事覺連坐乃甘心焉使竦然曰君子所謂臨難毋苟免其人踐之矣真義士也若加以罪是吾政苛而刑濫民何以勸遂釋之使即許攴正公子也徐彥璋云啇人某海舶失風漂至山島匍匐登岸深夜昏黑偶墜入一穴其穴險峻不可攀緣比明穴中微有光見大蛇無數蟠結在內始甚懼久稍與之狎蛇亦無吞噬意所苦飢渴不可當但見蛇時時舐石璧間小石絶不飲啖於是商人亦漫尓取小石噙之頓忘飢渴一日聞雷聲隱隱蛇始伸展相繼騰升才知其為神龍遂急攙蛇尾得出附舟還家携所噙小石數十至京城示識者皆雅鶻等寶石也乃信神龍之窟多異􅎇焉自此貨之致富彥璋親見啇人道其始末如此嘗至松江鍾山淨行菴見籠一雄雞置于殿之東簷請問其故寺僧云蓄此以司晨蓋十有餘年矣時刻不爽余竊記張公文潛明道雜志云雞能司晨見於經傳以為至論而未必然也或天寒雞懶至將旦而未鳴或夜月出時鄰雞悉鳴大抵有情之物自不能有常而或變也若然則張公之言非歟因舉似以詢其所以僧云司晨之雞必以童若壞其天真豈能有常哉蓋張公特未知此理故耳閩廣多種木綿紡績為布名曰吉貝松江府東去五十里許曰烏泥涇其地土田磽瘠民食不給因謀樹藝以資生業遂覔種於彼𥘉無踏車椎弓之製率用手剖去子線弦竹弧置案間振棹成劑厥功甚艱國𥘉時有一嫗名黃道婆者自崖州來乃教以做造捍彈紡織之具至于錯紗配色綜餞挈花各有其法以故織成𬒳褥帶悅其上折枝團鳳棋局字棣粲然若寫人既受教競相作為轉貨它郡家計就殷未幾嫗卒莫不感恩灑泣而共葬之又為立祠嵗時享之越三十年祠毀鄉人趙愚軒重立今祠復毀無人為之創建道婆之名日漸泯滅無聞矣至正丙午八月辛酉上海縣浦東俞店橋南牧羊兒三四聞頭上恰恰有聲仰視之流光中隕一魚刺麻佳上成一創其狀不常見自首至尾根僅盈尺似闊霸而短是日晴無隂雲亦無雕觀之類是可怪也日昳時縣市人閧然指流星自南投北即此時也橋下一細家取欲烹食其妻鹽而藏之來者多就觀焉或者曰志有云天隕魚人民失所之象至元丁丑民間謡言拘刷童男女以故婚嫁不問長幼而亂倫者多矣平江蘇逹卿特為上海吏有女年十二贅里人浦仲明之子為壻明年生一子劉節婦泰州坂埨人至正丙申春隨父渡江居吳門適張士誠部將曺某方數月夫陳亡劉不避凶險躬至死所求得其尸歸􅌾欲以身徇父不許既而權貴人聞劉美且賢爭欲強委禽焉劉擔死不二遂削髮為比丘尼夫劉夲一閭閻女子其操行乃尓蓋有貴為后妃而莫之及者謂非天性也歟歷代醫師三皇僦貸季天師岐伯鬼臾區少師少俞伯髙桐君太乙雷公馬師皇五帝巫咸伊尹周巫彭矯氏俞氏盧氏醫緩醫竘文摯醫和范蠡鳯綱秦長桑君李豹神應王扁鵲子陽安期先生太醫令李醯崔文子西漢樓護元里公楊慶公孫光秦信太倉公淳于意王遂宋邑馮信髙期王禺唐安杜信玄俗東漢張機仲景郭玊程高涪翁沈建張伯祖杜度魏沉淮南子蜀漢李撰唐慎微韓保升孟昶魏華陀李當吳普青牛道士封君逹樊阿韓康吳吕摶負局先生董奉西晉王叔和李子豫仰道士殷仲堪李法存皇甫諡玄晏先生張苗裴頠裴顗劉德史脫宫泰靳邵張華蔡謨趙泉阮德東晉葛洪抱朴子范注程據南宋少主元徽王繤胡治徐㷩秋夫徐道度秋夫長子徐叔嚮道度弟薛伯宗徐仲融徐文伯徐嗣伯僧深劉涓子羊晣秦承祖南齊張子信馬嗣明張逺逰北齊顧歡李元忠李密崔季舒祖挺禇澄鄧宣文顔光祿龍樹王菩薩徐之才徐林卿之才長子徐同卿林卿弟梁貞白先生蘇恭陶弘景後魏王顯徐謇徐雄謇長子後周徐之範杜善方隋徐敏齋許智藏巢元方楊善唐金元起真人孫思􅥞許㣧宗宋俠藥王韋慈藏甄權甄立信王氷啓玄子張文仲孟詵蘭陵處士蕭炳李虔縱楊玄操元珠先生楊損之王方慶秦鳴鶴許孝宗陳士良李含光張鼎陳藏器五代日華子宋趙從古謝復古劉溫舒朱昡無求子孫用和紀天錫劉元賔通真子翟煦劉禹錫𥘉虞世道士馬志龐安時宋道方許叔微王從藴吳復圭張洞曹孝忠林億秦宗古丁德用賈祐蘇頌朱有章孫兆王惟一王光祐蔣淮安自長張素陳遇明劉翰金成無巳何公務劉守真侯德和張子和馬守素楊從政李道源張元素潔古老人袁景安南村輟耕録卷之二十四
