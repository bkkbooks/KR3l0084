front:
  text: 南村輟耕録卷之九
  hash: sha256:7323d84ebc75cbf7aee2dfc300f5b89cbe1a7ca54640684b56dd5b7f6d2719cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_009-1a}
body:
  text: 天台陶宗儀九成盧踈齊先生文章宗旨云大凡作詩須用三百篇與離騷言不關於世教義不存於比興詩亦徒作夫詩彂乎情止乎禮義關睢樂而不淫哀而不傷斯得性情之正古人於此觀風焉賦者古詩之流也前極宏侈之規後歸簡約之制古班固二都之賦冠絶千古前極鋪張巨麗故後必稱典謨訓誥之作終焉厥後十𢾗作者倣而俲之蓋詩人之賦必麗以則也古今文章大家數甚不多見六經不可尚矣戰國之文反覆善辨孟軻之條暢莊周之竒偉屈原之清深為大家西漢之文渾厚典雅賈誼之俊健司馬之雄放為大家三國之文孔明之二表建安諸子之數書而已西晋之文淵明歸去來辭李令伯陳情表王逸少蘭亭叙而以唐之文韓之雅健栁之刻削為大家夫孰不知然古文亦有數漢文司馬相如揚雄名教罪人其文古唐文韓外元次山近古樊宗師作為苦澀非古宋文章家尤多老歐之雅粹老蘇之蒼徑長蘇之神俊而古作甚不多見蓋清廟茅屋謂之古朱門大厦謂之華屋可謂之古不可大羔玄酒謂之古八珍謂之美味可謂之古不可知此者可與言古文之妙矣夫古文以辨而不華質而不俚為髙無排角無陳言無贅辭夫記者所以紀日月之逺近工費之多寡主佐之姓名叙事如書史法尚書顧命是也叙事之後略作議論以結之然不可多蓋記者以備不忘也夫叙者次序其語前之說勿施於後後之說勿施於前其語次第不可顛倒故次叙其語曰叙尚書序毛詩序古今作序大格樣書序首言晝卦書契之始次言皇墳帝典三代之書及夫子定書之由又次言秦亡漢興求書之事詩序首言六義之始次言變風變雅之作又次言二南王化之自碑文惟韓公最髙每碑行文言人人殊面目首尾决不再行蹈􅊞神道碑揭於外行文稍可加詳埋文壙記最宜謹嚴銘字從金一字不況用善為文者宜如古詩雅頌之作行實之作當取其人平生忠孝大節其餘小善寸長書法宜略為人立傳之法亦然跋取古詩狼跋其胡之義犯前則躐其胡跋語不可多多則冗尾語冝峻峭以其不可復加之意說則出自巳意橫說竪說其文詳贍抑楊無所不可如韓公師說是也真公編次古文自西漢而下它並不録迄唐惟存韓公四記栁公遊西山六記而巳古文之難豈其然乎耶律文正王於星曆醫卜雜算內算音律儒釋異國之書無不通究嘗言西域曆五星密於中國乃作麻答杷曆蓋回鶻曆名也白湛淵先生續演雅十詩彂揮云海青羽中虎燕燕能制之小隙沉大舟關尹不吾欺者海青俊禽也而群燕緣擈之即墜物受於所制者無小大也右一草食押不蘆雖死元不死未見滌腸人先聞棄簀子者莫北有名押不蘆食其汁立死然以它藥解之即蘇華他洗腸胃攻疾疑先服此也右二誰令珠玉唾出彼藜藿腸仁人不為寶良賈宜深藏者和林有尼能吐珠玉雜寶也右三嬰啼聞木枝羝乳見茅茹何如百年身反尓無根據者漠北種羊角能産羊其大如兔食之肥美嬰啼木枝見山海經所載右四西狩獲白麟至死意不吐代北有角端能通諸國語者角端北地異獸也能人言其髙如浮圖右五才脫海鶴喙已登方物輿仰靣勿啾啾我長非僑如者小人長僅七寸夫婦二枚形躰畢具也右六羯尾大如斛堅車載不起此以不掉滅彼以不掉死者西漠有羯尾大於身之半非車載尾不可行也右七八珍殽龍鳯此出龍鳯外荔枝配江䖴徒誇有風味者謂迤北八珍也所謂八珍則醍醐麆沆野駝蹄鹿唇駝乳糜天鵝炙紫玉漿玄玉漿也玄玉漿即馬妳子右八灤人新巨松童山八百里世無奚超勇惆悵度易水者取松煤於灤陽即今上都去上都二百里即古松林千里其大十圍居人薪之將八百里也右九兩駝侍雪立終日飢不起一覺沙日黃肉屏那足擬者沙漠雪盛命兩駝趺其旁終夜不動用斷梗架片氈其上而寢處於下暖勝肉屏且不起心兵也右十今婦人面飾用花子起自唐昭容上官氏所製以掩點迹大曆巳前士大夫妻多妒悍婢妾小不如意輒印靣故有月點錢點事見酉陽雜爼今上之長公主之駙馬剛哈刺咱慶王因墜馬得一竒疾兩眼黑睛俱無而舌出至胸諸醫罔知所措廣惠司卿聶只兒乃也里可溫人也嘗識此證遂剪去之頃間復生一舌亦剪之又於真舌兩側各去一指許却塗以藥而愈時元統癸酉也廣惠司者回回之為醫者隸焉襄州榖城縣城門外道傍石人缺剝腹上有字云磨兜鞬慎勿言是亦金人之流也距縣西五十里有石人二相偶而立腹上題刻一云已及一云未匝不可得而詳也浮休閲目集吾鄉臨海章安鎮有蔡木匠者一夕手持斧斤自外歸道由東山東山衆所殯葬之處蔡沉醉中將謂抵家捫其棺曰是我榻也寢其上夜半酒醒天且昏黑不可前未免坐以待旦忽聞一人髙呌棺中應云喚我何事彼云某家女病損證蓋其後園葛大哥淫之耳却請法師捉鬼我與你同行一觀如何捾中云我有客至不可去蔡明日詣主人曰娘子之疾我能愈之主人驚喜諾以厚謝因問屋後曽種葛否曰然蔡遍地翻掘內得一根甚巨斫之且有血煮啖女子病即痊京師城外萬栁堂亦一宴遊處也野雲廉公一日於中置酒招疏齊盧公松雪趙公同飲時歌兒劉氏名解語花者左手折荷花右手執杯歌小聖樂云緑葉隂濃遍池亭水閣偏趂涼多海榴𥘉綻朵朵蹙紅羅乳燕雛鶯弄語對髙栁鳴蟬相和驟雨過似璚珠亂撒打遍新荷人生百年有幾念良辰美景休放虛過富貧前定何用苦張羅命友邀賔宴賞飲芳醑淺斟低歌且酩酊從教二輪來往如梭既而行酒趙公喜即席賦詩曰萬栁堂前數畝池平鋪雲錦蓋漣漪主人自有滄洲趣逰女仍歌白雪詞手把荷花來勸酒步隨芳草去尋詩誰知只尺京城外便有無窮萬里思此詩集中無小聖樂乃小石調曲元遺山先生好問所製而名姬多歌之俗以為驟雨打新荷者是也金石草木之變異雜見於傳記數年來天下擾攘怪事尤甚信前人之書不誣也至正丙申浙西都郡皆有兵正月嘉興楓涇鎮戴君實門首栁樹若牛鳴者三主人與㒒從悉聞之斬其樹不一月苗軍抄掠資産又兩月屋燬于兵是歲寒食日海鹽州趙𥘉心率子姪輩詣先壟汛掃松揪忽聞如老􅔏作聲戞戞不絶審聽所在乃是一柏樹頃間衆樹同聲和之一二時方止舉家惶惑至八月苗軍火其居明年六月紅軍掠貨財婦女而姪善如死於難余親見君實館賔黃伯成與𥘉心之孫元衡說元衡善如子也其事雖遲速不同而二家之遭禍則一吁誠異哉至正丙申正月常熟州陷松江府印造官號給散吏兵佩帶以防姦僞號之製作畫為圓圈繞圈皆火𦦨圈之內一府字以府印印府字上圈之外四角府官花押民間謡曰滿城都是火府官四散躲城裏無一人紅軍府上坐不二月城破悉如所言杭州赤山之隂曰筲箕泉黃大癡所嘗結廬處其徒弟沈生狎近側一女道姑閭門有欲白之於師沈懼引厨刀自割其執幾死衆救得活而瘡口流血經月餘不合偶問諸閹奴教以煆所割執搗粉酒服如其言不數日而愈三寶柱字延圭色目人頗以才學知名雖湛於酒色而能練逹吏事剛正有守為浙省郎中日大書四句於門屏之上曰逆刮蛟龍鱗順捋虎豹尾若將二伎論尤比干人易其意蓋以杜絶人之求請耳然亦隘矣哉終不大顯逹而死於難至元間平原郡公趙氏與芮宋福王也其子娶全竹齊少保之女婚啓內一聮云依光薊北苟安公位之居回首江南惟重毋家之念儘有味陶侃毋得古正之道彂人倫之本將示教於天下謂朴散俗壞樂潰禮闕有子不教不至於道若失大訓不可登于偉望乃求師傅延英茂終日迫于用不欲于郤缺俄而車蓋載止餼饋並竭茍失其人子將不進計畫始成確然獨斷謂髮可棄訓不可失乃金刀既止黰髮雲散怡然無咨嗟之色儼若待賔之具上恐不足以顯恭下未可謂訓子顧其母激忿填膺寸晷是學不逮于至以超聖人之域煥乎賢者之業且禮信仁義君子之事婦人何得而知蓋至道大喪其俗巳亂故婦人賢君得以行其事千古之下厥行獨明當時為人之父為人之母覩斯行聞斯舉得不激厲乎苟天下皆如陶母之志則天下皆陶之子也蓋人謂子幼而蒙稚不致精訓致悖大道亂人紀良可惜哉銘曰髮也者為飬之具賔也者致教之英茍非異禮孰能作世之程千載之下如陶之毋安可繼乎齊英宗儀因讀唐皇甫持正先生湜文集見陶母碑不覺泣數行下追惟先妣拳拳於教子真有陶母之志是故今翰林承旨蛻菴張先生翥所撰墓銘有曰夫家貧劬力紡績以給諸子無廢學之辭自顧不肖不克勉于學已成令名罪莫大焉謹録于此庶亦可以自懼也婺州許白雲先生謙字益之隱居金華山四十年不入城府著書立言足以垂教後世浙東廉使王公繼學訪先生於山中謂先生清氣逼人可畏既退明日以學行薦于朝有録其舉文至者先生方講說目不一少視其無意於仕䆠如此先生殁追諡文懿先生後至元丁草夏六月民間謡言朝廷將采童男女以授韃靼為奴婢且俾父母護送抵直北交割故自中原至于江之南府縣村落凡品官庶人家但有男女年十二三以上便為㛰嫁六禮既無片言即合至於巨室有不待車輿親迎輒徒步以往者蓋惴惴焉惟恐使命戻止不可逃也雖守土官吏與夫韃靼色目之人亦如之竟莫能曉經十餘日才息自後有貴賤貧富長幼妍醜匹配之不齊者各生悔怨或夫棄其妻或妻憎其夫或訟于官或死于天此亦天下之大變從古未知聞也吳中僧祖柏號子庭者素稱滑稽口占絶句曰一封丹䛇未為真三杯淡酒便成親夜來明月樓頭望惟有姮娥不嫁人又有人集古句云翡翠屏風燭影深良宵一刻直千金共君今夜不須睡明日池塘是緑隂可謂深於命意者矣世以療馬者曰獸醫療牛者曰牛醫周禮天官冡宰篇獸醫下士八人注獸牛馬之屬按此則療牛者亦當曰獸醫矣天下兵甲方殷而淮右之軍嗜食人以小兒為上婦女次之男子又次之或使坐兩缸間外逼以火或於鐵架上生炙或縛其手足先用沸湯澆潑却以竹帚刷去苦皮或盛夾袋中入巨鍋活煮或刲作事件而淹之或男子則止斷其雙腿婦女則特剜其兩乳酷毒萬狀不可具言總名曰想肉以為食之而使人想之也此與唐初朱粲以人為糧置搗磨寨謂啖醉人如食糟豚者無異固在所不足論唐張鷟朝野僉載云武后時杭州臨安尉薛震好食人肉有債主及奴詣臨安止於客舍飲之醉並殺之水銀和煎并骨銷盡後又欲食其婦婦知之踰墻而遁以告縣令令詰之具得其情申州録事奏奉勑杖一百而死假成式酉陽雜爼云李廓在頴州獲火光賊七人前後殺人必食其肉獄具廓問食肉之故其首言某受教於巨盜食人肉者夜入人家必昏沉或有魘不窹者盧氏雜說云唐張茂昭為節鎮頻喫人肉及除統軍到京班中有人問曰聞尚書在鎮好人肉虛實笑曰人肉腥而且䏰爭堪喫五代史云萇從簡家世屠羊從簡仕至左金吾衛上將軍嘗歷河陽忠武武寧諸鎮好食人肉所至多潜捕民間小兒以食之趙思綰好食人肝及長安城中食盡取婦女幼稚為軍糧每犒軍輒屠數百人三國志云吳將髙澧好使酒嗜殺人而飲其血日莫必於宅前後掠行人而食之宋莊季𥙿雞肋編云自靖康丙午歲金狄亂華盜賊官兵以至居民更互相食全軀暴以為臘登州范溫率忠義之人泛海到錢唐有持至行在猶食者老瘦男子瘦詞謂之饒把火婦人少艾者名之不羡羔小兒呼為和骨爛又通目為兩腳羊趙與峕賔退録云本朝王繼勳孝明皇后母弟太祖時屢以罪貶後以右監門衛率府副率分司西京殘暴愈甚强市民間子女以備給使小不如意即殺而食之太宗即位㑹有訴者斬于洛陽又知欽州林千之坐食人肉削籍隸海南嗟夫食人之肉人亦食其肉此兵革間之流慘耳君子所不碩聞者其薛震輩當天下宴安之日而又身為顯䆠豈無珍羞美善足以厭其口腹顧乃喜啖人肉是雖人類而無人性者矣終至於誅斬竄逐而後巳天之報施不亦宜乎王眉叟夀衍號溪月杭州人出家為道士受知晋邸後以弘文輔道粹德真人管領郡之開元宫浙省都事劉君時中致者海內名士也既卒貧無以為􅌾躬往吊哭周其遺孤舉其柩葬於德清縣與巳之夀穴相近春秋祭掃不怠然此事行之於異教中尤不易得錢唐二字其來甚逺按史記始皇本紀至雲夢浮江下丹陽至錢唐臨浙江上㑹稽立石刻頌秦德西漢地理志亦有錢唐縣今唐字從土則誤矣蓋以錢易土及捐錢築塘等事皆傅㑹之辭自注世說者巳然况後世乎道士張伯雨雨號句曲外史又號貞居嘗從王溪月真人入京𥘉燕地未有梅花吳閒閒宗師全節時為嗣師新從江南移至護以穹廬扁曰漱芳亭伯雨偶造其所恍若與西湖故人遇徘徊既久不覺熟寢于中真人終日不見伯雨深以為憂意其出外迷失街道也夢覺日巳莫矣歸道所由嗣師笑曰伯雨素有詩名冝作詩以贖過伯雨遂賦長詩有風沙不憚五千里將身跳入仙人壷之句嗣師大喜送翰林集賢嘗所往來者袁學士伯長謝博士敬德馬御史伯庸吳助教飬浩虞修撰伯生和之它日伯雨往謁謝諸公惟虞先生全不言儒者事只問道家典故雖答之或不能詳末問能作幾家符篆曰不能先生曰某試書之以質是否連書七十二家伯雨汗流浹背輒下拜曰真吾師也自是託交甚契故與先生書必稱弟子焉伯雨杭州人水之鹹淡相交處産河豚河豚魚類也無鱗頰常怒氣滿腹形殊弗雅然味極佳煮治不精則能殺人所以東坡先生在資善堂與人談河豚之美云據其味真是消得一死浙西惟江隂人尤珍之每春首𥘉出時必用羞祭品畢然後作羔而鄰里間互相餽送以為禮腹中之膟曰西施乳夫西施一美婦耳豈乳亦異於人耶顧千載而下乃使人道之不置如此則夫差之亡國非偶然矣若鱭魚子名螳螂子及松江之上海杭州之海寧人皆喜食蟛蜞螯名曰鸚哥觜以有極紅者似之故也二物象形而云又非西施乳之比矣按類編魚部引博雅云鯸䱌盈之反魨也背青腹白觸物即怒其肝殺人正今人名為河豚者也然則豚當為魨至正辛巳莫春之𥘉江浙行省平章政事只理瓦台入城知任之日衣紅兒童謡曰火殃來矣至四月十九日杭州灾燬官民房屋公𪠘寺觀一萬五千七百五十五間燒死七十四人明年壬午四月一日又灾尤甚於先自昔所未有也數百年浩繁之地日就凋弊實基於此余嘗見落水蘭亭一卷乃五字不損本今吳中分湖陸氏所藏而趙彛齊之物也彛齊宋宗室子諱孟堅字子固彛齊其自號居嘉興之廣陳酷嗜古法書名畫能作墨花於水仙尤長此帖姜白石舊藏後歸霅川俞夀翁彛齊復從夀翁易得喜甚來夜回櫂至升山大風覆舟行李皆淹溺無餘彛齊立淺水中手持此帖示人曰蘭亭在此餘不足分吾意也因題八字于卷首云性命可䡖至寶是保李子昭者松江府提控案牘李宗慶子也側室刁氏有娠妻怒之箠撻苦楚晝夜不息數次自經與溺以省覺不得死竊自念曰我若就蓐亦必死耳等死何自求早死之為幸因多食海蟄與冷水胎既落血上衝心而身隨亡不數日鬼怪百出妻得竒疾宛若死者但只心胸微溫支躰不僵其家就牀褥作一竅任其便溺時以少飲納口中輒咽不與亦不言肌經三年餘形骸枯槁無復生理家人益厭之一夕忽詣舅姑所叩寢室户舅姑曰汝惡得至此必為鬼矣曰妾已復生實非鬼也碩見舅姑具告所然舅姑驚恐呼家人悉起取火燭之果此病軀及覘其卧榻已空始信之因問其詳曰妾為亡婢訴冤攝至隂府即今嶽祠也命妾與婢對詞妾以汝懷孕時打罵則或有之然未嘗令汝吞藥損墮婢仇執甚堅妾不得白遂招承枷禁幽圄中日得小叔以餅餌粥飯之類相餽故不餒今復得送妾還入門弄其兒戲撻之一下兒哭遂推妾置竈上即若夢覺者但覺怠倦故勉强至此舅姑曰汝既𬒳禁何自得釋曰㑹上帝有赦故也急呼小郎妻問之曰適間兒子驚啼云夢見乃父擊其首小郎蓋提控之次子泰甫先為其妹夫金可大所殺者此婦至今強健與夫見寓府城西郭又復生兩子矣志怪古或多然漫書于此以為世之妒婦勸趙魏公云作詩用虛字殊不佳中兩聮填滿方好出處才使唐巳下事便不古莊綽雞肋編云太史公作伯夷傳但云伯夷叔齊孤竹君之二子也而論語音注引春秋少陽篇謂伯夷姓墨名允一名元字公信叔齊名智字公逹夷齊諡也陸德明取之不知少陽篇何人所著今世猶有此書否吾衍閒居録云孤竹君姓墨音眉名台音怡𥘉見孔叢子注中子名伯遼見周曇咏史詩注伯當作仲若如吾說則伯夷叔齊似又是名非諡矣淮海龔翠岩先生開寓吳門日一僧權道衡者頗聰慧識道理先生與之遊偶市肆粥漢印一顆權嘗酬價歸取鏹先生適見主人以實告遂用十五緡買之語諸女女曰大人乃亦奪人所好先生驚悟即持送權遇諸道權曰先生愛而收藏奚以贈曰在彼猶在此也權固辭曰在彼猶在此也相讓久之沉諸淵而别吁若先生者可謂善矣孰謂異端中有此哉然先生之女尤可敬也吳江華嚴寺浮圖之頴望之二矢著其上簳羽宛然可辨相傳宋南渡𥘉金人粘罕乘快一彂而中又賈似道出督時祝矢自誓亦中焉故留題者有至今塔杪留遺鏃猶是元戎金僕姑之句大德庚子春寺主僧善信大修浮圖更其頴而新之視向二矢實圓鐵條二交貫橫亘蓋必昔人以是輔頴且以防􅔏鶻之巢故耳傳者所謂乃大妄也因著此以祛後世之惑長樂郭德基嘗有華嚴塔頴辨疑行於時蓋郭嘗官此州目擊其非項後白髮曰素領漢馮唐白首為郎官素髮垂領
