  - {type: variant, offset: 2326, length: 0, content: '', WYG: 果湧入竅中湏臾取出依前動轉不脫後余亦收一小者狀若旋環製作大約相似後因損折轉軸中亦有一物形似翎桶想亦同一闗捩其玉具劒自三代有之今止以兩漢為始至於宋朝且千餘年未有能窮其轆轤底藴今偶以煮脫乃得其機軸亦云竒矣猴盗夏雪簑云嘗見優人杜生彦明說向自江西回至韶州寓宿旅邸邸先有客曰相公者居焉刺繡衣服琢玉㡌頂而僅皮履生惑具酒肴延欵問以姓名履歴客具答甚悉初不知其為盗也次日客酬讌邀至其室見柱上鎻一小猴形神精狡既而縱使周旋席間忽畨語遣之俄捧}
