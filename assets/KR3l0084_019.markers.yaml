  - {type: variant, offset: 711, length: 725, content: 峦林霄騫鳯垂雲亭始至保和殿三楹楹七十架兩挾閣中楹置榻東西二間列寳玩與古鼎彛器玉在挾閣曰妙有設古今儒書史子楮墨右曰日宣道家金櫃玉笈之書與神霄諸天隱文上歩前行稽古閣有宣王石鼔歴邃古尚古鑑古作古傳古博古袐古諸閣蔵祖宗訓謨與夏啇周尊彛鼎鬲爵斚卣敦盤盂漢晋隋唐書畫多不知識上親指示為言其㮣今人以善能營生者為經紀唐滕王元嬰與蔣王皆好聚歛太宗甞賜諸王帛敕曰滕叔蔣兄自能經紀不須賜物韓昌黎作栁子厚墓志云舅弟盧遵又将經紀其家則自唐已有此言世斥貪利之人必曰汝便是龐居士矣盖相傳以為居士家資巨萬殊用勞神竊自念曰若以與人又恐人之我若不如置諸無何有之鄊因輦送大海中舉家脩道縂成證果又以為居士即㐮陽龐德公釋氏傳燈録龐居士傳云㐮州居士龐藴者衡州衡陽縣人也字道玄世本業儒志求真諦徳宗貞元初謁石頭遷禅師豁然有省後叅馬祖問不與萬法為佀者是甚麽人荅曰待汝一口吸盡西江水却向汝道遂於言下頓悟玄旨乃留駐叅承有偈曰有男不婚有女不嫁大家團欒頭共說無生話元和六年北遊㐮漢隨䖏而居女靈照賣竹鹿籬以供朝夕将入滅謂曰視日早晚以報靈照遽曰日巳中矣而有蝕也居士出户觀視即登父座合掌坐亡居士曰我女機鋒捷矣更延七日州牧于公頔聞之來問居士謂曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖枕公膝而化龐婆走田中謂其子龐大曰汝父死矣龐大曰嗄倚鉏脫去婆為焚燒畢自後莫知其所按此傳知非龐徳公明矣但亦不言其富何耶輦財之說特恐後人所傳㑹耳然今之積金蓄榖倍息計贏校斗斛合􅕛詐欺不得自休息又否則射歉飢彂積授枚識出布籌㑹入窮日疲極而睡者能以居士之事便作真想豈不為飬生之福哉鄭遂昌言宋巨璫李太尉者國亡為道士號梅溪余童時甞侍其游故内指點歴歴如在過葫蘆井揮涕曰是盖宋之先朝位上釘金字大牌曰皇帝過此罰金百兩近周申父言先表叔祖金二提舉住杭州暗問, WYG: 原闕}
