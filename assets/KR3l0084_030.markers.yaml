  - {type: variant, offset: 5, length: 0, content: '', WYG: 上兼六經百氏之㫖下極稗官小史之談昔之所未考今之所未聞其採摭之博侈於白帖研覈之精擬於洪筆論議抑揚有傷今慨古之思鋪張盛美為忠臣孝子之勸文章制度不辨而明疑似根據可覽而悉蓋唐宋以來專門史學之所未讓雖周室之藏郯子之對有不待環轍而後知又豈抵掌談笑以求賢於優孟者哉九成名宗儀少工舉子業晩乃棄去闔戸著書此其一云至正丙午夏六月江隂孫作大雅序欽定四庫全書輟耕録}
