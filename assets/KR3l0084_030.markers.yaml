  - {type: variant, offset: 7, length: 0, content: '', WYG: 文章曰樂府有尾聲曰套數時行小令曰葉兒套數當有樂府氣味樂府不可似套數詞山曲海千生萬熟三千小令四十大曲莊蓼塘藏書莊蓼塘住松江府上海縣青龍鎮嘗為宋秘書小史其家蓄書數萬卷且多手抄者經史子集山經地志醫卜方伎稗官小説靡所不具書目以甲乙分十門蓼塘既沒子孫不知保惜或為蟲䑕蝕囓或為隣識盗竊或供飲博之需或應糊覆之用編帙散亂所存無幾至正六年朝廷開局修宋遼金三史詔求遺書有以書獻者予一官江南藏書多者止三家莊其一也繼命危學士樸特來𨕖取其家慮恐兵遁圖䜟干犯禁條悉付祝融氏及收拾燼餘存者又無幾矣其孫羣玉悉載入京覬領恩澤宿畱日乆仍布衣而歸書之不幸如此買假山陳愛山買顧氏廢族石假山一所移置家園一日邀淵白觀之指而謂曰此公族中之物淵白笑荅曰東搬西倒陳黙然戴氏絶嗣華亭楓涇戴君實其家巨富妻王氏妬悍無比僅有一女贅謝季初為壻君實納一妾于嘉興外舍得男王聞之蚤夜怒詈君實不得已遣其妾取兒以歸而女恐其長大分我財産遂於襁褓中酷加陵虐致成驚疾又不容醫療竟就夭亡大為喜幸越三年自孕將産夢抱此兒及娩得男後隨殞於蓐兒亦不育此婦女妬悍之報今戴氏絶嗣天道豈逺也哉事在至正十五年四月上旬也妓妾守志汪佛奴歌兒也姿色秀麗嘉興富户濮樂閒以中統鈔一千錠娶為妾一日桂花盛開濮置酒佛奴奉觴濮有感于中澘然墮淚佛奴請問其故濮曰吾老矣非乆於人世者汝宜善事後人佛奴亦泣下誓無貳志人莫之信既而濮果死佛奴獨居尼寺深藏簡出操行潔白以終其身譏巴延太師重紀至元間太師丞相巴延專權蠧政貪惡無比以罪左遷南恩州達嚕噶齊至隆興卒寄棺驛舍滑稽者題于壁云百千萬定猶嫌少垜積金銀北斗邊可惜太師無運智不將些子到黄泉譏方士丙子歲松江亢旱聞方士沈雷伯道術高妙府官遣吏齎香幣過嘉興迎請以來驕傲之甚以為雨可立致結壇仙鶴觀行月孛法下鐡簡于湖泖潭井日取蛇燕焚之了無應驗羞赧宵遁僧柏子庭有詩其一聨云誰呼蓬島青頭鴨來殺松江赤縺蛇聞者絶倒燕都賦檇李顧淵白恃才傲物嘗入京獻燕都賦翰長元公復初不喜曰今大朝四海一統六合一家燕盖昔時戰國名何燕之稱慚恨而歸晚年始得領教岳陽高照菴先生以詩送之云豪氣欲吞天下士冷官初到岳陽城切中其實淵白自出一對句云天下秀才爺有刀鑷人對之曰村中和尚種裱背十三科世人但知醫有十三科畫有十三科殊不知裱背亦有十三科一織造綾錦絹帛一染練上件一抄造紙劄一染製上件顔色一糊料麥麪一糊藥礬蠟一界尺裁版桿帖一軸頭或金或玉或石或瑪瑙水晶珊瑚沉檀花梨烏木每軸上用一色所以只歸一科一糊刷一鉸鍊一絛一經帶一裁刀數内闕其一則不能成全畫矣其糊刷裁尺亦皆有名糊刷㯶軟者謂之平分㯶硬者謂之糊㮶大小得中者謂之黏合狹小者謂之寸金裁尺極等濶者曰滿手次等曰三指又次等曰兩指最狹者曰單指厲狄越人朱仲桓武云至正丙申歲大旱余在蕭山觀方士陳希微禱雨于北嶺將軍廟累日俄降筆云吾秦人厲狄也與項羽起事山隂雖功不竟而死然有徳于民其父老不忘我者俾血食于此爾來幾千五百年世代雲變遂湮我姓名至蔑焉無聞故以相告目擊其事感嘆彌日旗聨中原紅軍初起時旗上一聨云虎賁三千直抵幽燕之地龍飛九五重開大宋之天其後毛貴一賊横行山東侵犯畿甸駕幸灤京賊勢猖獗無異唐末桃符䜟張之翰字周卿邯鄲人由翰林學士除授松江知府自題桃符云雲間太守過三載天下元貞第二年是歲卒亦䜟也金甲嘉定州大塲沈氏因下番買賣致巨富一日自番中還先報家信有云番船今到何處發金甲先囘金甲者碓坊甲頭也後因逐一幹僕僕出此書首告以為玉印未到金甲先囘沈厚賂官府得理聞者亦可為戒藺節婦許叔瑛璞云陳友諒部屬稱鄧平章者䧟江西某縣有婦藺氏其夫以財雄一鄉因賂鄧之帥某丐免剽戮帥聞藺有殊色輙殱其家獨生藺及四歲嬰將納之藺曰帥貴人妾事之無恨然吾良人以禮幣聘妾為婦者若干年與生二子妾不忍即背恩軍中禮不備請持一月喪服乃為帥婦未晚帥許之服未終移兵别縣帥曰吾如汝約今夕諧吾婚乎藺曰諾既而帥上馬他之使二卒守藺曰為取雞酒具香火今夕吾為帥婦敢告先良人靈卒俱出乃先殺嬰嚙指血書壁曰涇渭難分濁與清此身不幸厄紅巾孤兒未忍更他姓烈婦何曽嫁二人白刃自揮心似鐡黄泉欲到骨如銀荒村日落猿啼處過客聞之亦慘神書罷即自刎帥返驚歎訊二卒欲罪之卒指壁間題倩人讀其詩馳白鄧鄧聞之陳陳為立廟旌表云忠孝里至正壬辰秋七月紅巾䧟錢唐九月䧟吳興延陵冬十月䧟江隂州州大姓許晉字徳昭者有武畧善格鬭仲子如璋亦英勇遂相謀曰烏合之衆敗亡可待我族我里何忍坐累焉乃潜聚無頼惡少資以飲食保䕶隣井日有餘黨四散抄掠則誘使深入悉殪而埋之所居素隱僻賊無知者尋聞官軍駐近郊隂遣人約為内應十一月八日浙東宣慰元帥觀孫統兵入城晉率所募應之官軍少却晉弗之知尚與賊戰於城北之祥符寺前㑹賊黨自他所來掎其後如璋遂與家僮徃救手刃數人破圍而入偕父力戰衆寡不敵父子皆死明日官軍復進攻賊遂潰家人得父子屍歛而葬之柩車相繼于道見者無不墮淚鄉之父老誄之曰父死於忠子死於孝私表其里曰忠孝郡上其事于朝不報胡仲彬聚衆胡仲彬乃杭州勾闌中演説野史者其妹亦能之時登省官之門因得夤縁注授廵檢至正十七年七月内招募游食無藉之徒文其背曰赤心䕶國誓殺紅巾八字作號將遂作亂為乃叔首告搜其書名簿得三册纔以一册到官餘火之亦誅三百六十餘人扶箕詩天遣魔軍殺不平不平人殺不平人不平人殺不平者殺盡不平方太平此扶箕語驗之今日果然輟耕録卷二十七欽定四庫全書輟耕録卷二十八元陶宗儀撰非程文各行省鄉試則有人取發解進士姓名一如登科記鋟梓印行以圗少利至正四年甲申江浙揭曉後乃有四六長篇題曰非程文語與抄白省榜同時版行不知何人所造而路府州縣盛傳之語曰設科取士深感聖世之恩倚公挾私無奈吏胥之弊豈期江浙之大省壊於禹疇之小劉名錫眉山人當該掾史斯文孔艱衷情痛憤待士無禮呼名散餅於路傍懐璧有謀打號貼圖於墻上厨𫝊用猾吏内外之消息可通試官取貪夫上下之機關不泄陽揭題駕言無弊實自生姦宄之心覔厚賂力舉還魂特欲箝是非之口五服之親不避故違國朝之典章雜犯之卷俱抄恐失手本之名字應才杭州鼓勇於終塲之日局長之信已通劉環即環翁杭州知名於未榜之前代筆之錢盡去萬户侯之關節可驗丈人峯之氣力何勤吕將鉛山萬户吕天澤監門進樂平之八子許援董彛徐復鄒成操琬汪緈許道傅戴用海郎吳縣主簿海魯丁受卷通括蒼之二林松慶彬祖本生之地増輝同列之情不薄黄璋松江稱幹首二三月已買試官鮑恂嘉興在榜中十四名全頼妻父建徳知事俞鎮藉開元真人之力葉氏葉瓉信州禮經依永嘉縣尹林泉生之門江郎兄弟輝晃建寕劉大希賢慶元在列頼為省郎之師沈小惟時杭州登科誰知運吏之壻黄岩趙藺友藺得家兄寕海丞由欽為簾外之官瑞安高明託館主有堂上之友紛紛在眼歴歴難言許瑗饒州作魁三百定賣幾千株之木鄒成饒州駝牓十八日納七萬户吕天澤之錢左者如斯右其可見尺牘先来於柏府仕宦勢高槀文潜出於􅁄闈師生情宻逓手帖全憑廵綽寫懐挾不避軍人四子入塲代筆有此劉之手一家在牓瞞人起各路之文所謀不臧其忠何在王賀紹興偹牓省中典吏不讀書亦解成名李思思齊婺山村童未知禮焉宜中𨕖錯春秋之年分臨海夢龍姓趙備牓亂周易之隂陽平江俞鼎耳目之所及者如此心術之潜運者難知姑舍舉人更陳坐主俞鎮建德知事夤縁考試這番豐卒嵗之貲吳暾峽州知事買題登科方得證舊時之本麟經錯亂因賂取林泉之生生何如永嘉尹林泉生易義駁雜以名尋夏日之孜孜安用㑹稽尹夏日孜其餘汎汎不必叨叨分經考卷得便私情自開科曽無此例出院改文以欺公論雖刋板乃是訛傳歴觀解據之非益見文衡之繆指實告官者反罹其罪懐才抱藝者虚費其勞趙俶蔣堂空仰天而歎息江孚沈幹徒踏地以咨嗟潘伯修蔡餘慶兩舉奚為聞夢吉陸居仁再來告免嗚呼文運已矣吾道安之何等主司汙濫壊今年之𨕖舉既生聖世進修冀異日之公明此非一口之經陳實乃衆賢之願告有人心者念天理焉至二十二年壬寅復有作彈文云文運重開多士歡騰於此日科塲作弊醜聲莫甚於今年啟姦人僥倖之門負賢相賔興之意事既如此人其奈何切惟考試官實文章之司命詎宜偽定於臨期員外郎執科舉之權衡安可公然而受賂憸謀既遂清議難容聞人樞膚淺之學翰林懐賔主之舊情啜靄山游狹之徒座主念梓桑之宿好只因厚契便擢科名尸位憲賔進鄉閭之十子居喪臺掾升里閈之三王沈庭珪錯破書經混死生於同列戰惟肅不明詩意強今古於已然朱舜民乃瀕海之強梁喻宜之實許門之童子新昌庭瑞輸彩叚之幾縑霅水莫孜奉白金之一錠張誼罔知彖象皆徐中造就之私楊明不辨春秋拜周溥作成之賜施省憲貼書之手叚壊鄉閭整肅之綱常唐肅以詞賦而見收明經安在柯理以梯媒而得中對䇿何長舍弟致謀甚矣有心之唐溥家兄代筆嗟哉無學之鄭沂靖而思之良可醜也白頭錢宰感綈袍戀戀之情碧眼倪中發倉廪陳陳之粟俞潜徐鼎三月初早買試官邱民韓明五日前預知題目元孚乃泉南之大賈揮金不啻於泥沙許徴實雲間之富家納粟猶同於瓦礫㧞頴之於陋巷餘波有自於楊明超宋祀於窮途主意必資於張誼既正榜之若此則備選之可知姑舍前言更陳餘意屈仲孚於受卷易經可謂失人進公甫於考文麟史大孤衆望不分報賽叔通豈可與言詩繆講進修孺子烏足以論易重載連檣之白粲始諧校藝於青藜逯信止素乏文才嗟老夫之已耄孟天暐每稱好觜奈舉業之乆疏大壊士風難逃輿論嗚呼天之將喪斯文實係興衰之運士欲致用於國豈期貢舉之私此非一口之誣謀實乃衆情之公論用書既徃以警將來于闐玉佛丞相巴延嘗至于闐國於其國中鑿井得一玉佛高三四尺色如截肪照之皆見筋骨脉絡即貢上方又有白玉一叚高六尺闊五尺長十七歩以重不可致處士門前集賽杜清碧先生本應召次錢唐諸儒者爭趨其門燕孟初作詩嘲之有紫藤帽子高麗靴處士門前當集賽之句聞者傳以為笑用紫色㯶藤縛㡌而製靴作高麗國様皆一時所尚集賽則内府執役者之譯語也憲僉案判松江府儒學直學沈伯雲因花破錢糧乃與教授陳仲微有隙伯雲之父曰君實者老吏也一日率婢妾詈箠仲微于途適憲僉吕公思誠分按至府具狀以訴公怒其詬辱師表有傷風化勾攝赴官服辜君實年逾七旬乞以銅贖公判云既能為不能為之事正當受不當受之刑卒杖斷之詩䜟張起字起之四明人有詩名嘗作一聨云别來越樹長為客看盡吳山不是家未幾卒詩亦有䜟歟邱機山邱機山松江人宋季元初以滑稽聞于時商謎無出其右遨遊湖海間嘗至福州譏其秀才不識字衆怒無以難之一日構思一對欲令其辭屈心服對云五行金木水火土邱隨口荅曰四位公侯伯子男其博學敏捷類如此不孝䧟地死杭州楊鎮一兇徒素不孝於母尤凌虐其妻有子三歲愛惜甚至妻常抱負偶失手攧損其頭泣而謂姑曰夫歸婦必被毆死不若先溺水之為幸姑曰汝第無憂但云是我之誤我却去避汝小姑處俟其怒息而還至晚夫歸見兒頭破徑捽妻欲殺之妻告曰非我過也婆攧之耳懼汝怒已徃小姑家去遂釋之次日持刀尋母中途藏諸石下却到妹家好言誘母還至石邊忿躁詈罵取刀殺母竟失藏刀所在惟見巨蛇介道畏怯退縮不覺雙足䧟入地中湏臾即没至膝七竅流血聲罪自咎母急扶抱無計可施走報於婦婦掘地隨掘隨䧟啖以飲食三日乃死觀者日數千人莫不稱快時至正甲辰六月也嘲囘囘杭州薦橋側首有高樓八間俗謂八間樓皆富實囘囘所居一日娶婦其昬禮絶與中國殊雖伯叔姊妹有所不顧街巷之人肩摩踵接咸来窺視至有攀縁簷闌窓牖者踏翻樓屋賔主壻婦咸死此亦一大怪事也郡人王梅谷戯作下火文云賔主滿堂歡閭里盈門看洞房忽崩摧喜樂成禍患壓落瓦碎兮倒落沙泥彆都釘析兮木屑飛揚玉山摧坦腹之郎金谷墜落花之相難以乘龍兮魄散魂消不能跨鳳兮筋斷骨折氁絲脫兮塵土昏頭袖碎兮珠翠黯壓倒象鼻塌不見猫睛亮嗚呼守白頭未及一朝賞黄花却在半餉移厨聚景園中歇馬飛來峯上阿剌郎葛反一聲絶無聞哀哉樹倒胡孫散阿老瓦倒刺沙别都丁木偰非皆囘囘小名故借音及之象鼻猫睛其貎氁上聲絲頭袖其服色也阿剌其語也聚景園囘囘叢冡在焉飛来峯猿猴来徃之處白縣尹詩嘉興白縣尹得代過姚莊訪僧勝福州閒遊市井間見婦人女子皆濃粧艶飾因問從行者或答云風俗使然少艾者僧之寵下此則皆道人所有白遂戱題一絶于壁云紅紅白白好花枝盡被山僧折取歸祗有野薇顔色淺也來鈎惹道人衣勝見亟命去之然已盛傳矣廢家子孫詩秀之斜塘有故宋大姓居焉家富饒田連阡陌宗族雖盛衍而子孫多不肖祖父財産廢敗罄盡郡人金方所談辭滑稽為賦誦好嫚戱因摭其事成近體一律云興廢從來固有之爾家忒煞欠扶持諸墳掘見黄泉骨兩觀番成白地皮宅眷皆為撑目兎舍人總作縮頭龜強奴猾幹欺凌主說與人家子弟知夫兎撑目望月而孕則婦女之不夫而妊也其家有道觀二所語雖鄙俚然為人後者見此寧不知懼也哉樂曲韃靼樂器如箏秦琵琶胡琴和必斯之類所彈之曲與漢人曲調不同大曲哈巴爾圖口温也葛儻兀輝和爾閔古里起土苦里䟦四土魯海舎舎弼揺落四蒙古揺落四閃彈揺落四阿耶兒虎桑哥兒苦不丁江南謂之孔雀雙手彈答罕謂之白翎雀雙手彈苦只把失品弦小曲阿厮闌扯弼回盞曲雙手彈阿林捺花紅哈兒火失哈赤黒雀兒呌洞洞伯曲律買者歸牝疇兀兒把擔葛失削浪沙馬哈相公仙鶴阿下水花囘囘曲附伉里馬黒某當當清泉當當爇梅花文周申父之翰寒夜擁罏􅅡火見缾内所挿折枝梅花氷凍而枯因取投火中戯作下火文云寒勒銅瓶凍未開南枝春斷不歸來這囘勿入梨雲夢却把芳心作死灰共惟地罏中處士梅公之靈生自羅浮𣲖分庾嶺形若槁木稜稜山澤之臞膚如凝脂凛凛雪霜之操春魁占百花頭上歲寒居三友圖中玉堂茅舍總無心金鼎商羮期結果不料道人見挽便離有色之根夫何氷氏相凌遽返華胥之國玉骨擁罏烘不醒氷魂剪紙竟難招紙帳夜長猶作尋香之夢筠窓月淡尚疑弄影之時雖宋廣平鐡石心腸忘情未得使華光老丹青手叚摸索難真却愁零落一枝春好與茶毗三昧火惜花君子還道這一㸃香魂今在何處咦烱然不逐東風散只在孤山水月中如夢令一人娶妻無元𡊮可潜贈之如夢令云今夜盛排筵宴准擬尋芳一遍春去已多時問甚紅深紅淺不見不見還你一方白絹黄門世有男子雖娶婦而終身無嗣育者謂之天閹世俗則命之曰黄門晉海西公嘗有此疾北齊李庶生而天閹按黄帝鍼經曰人有具傷於隂隂氣絶而不起隂不能用然其􅂡不去宦者之獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脉血寫不復皮膚内結唇口不榮故􅂡不生黄帝曰其有天宦者未嘗被傷然其􅂡不生其故何也岐伯曰此天之所不足其任衝不盛宗筋不成有氣無血唇口不榮故􅂡不生又大般若經載五種黄門云梵言扇搋丑皆切半釋迦唐言黄門其類有五一曰半釋迦總名也有男根用而不生子二曰伊利沙半釋迦此云妬謂他行欲即發不見即無亦具男根而不生子三曰扇搋半釋迦謂本來男根不滿亦不能生子四言博叉半釋迦謂半月能男半月能女五曰留拏半釋迦此云割謂被割形者此五種黄門名為人中惡趣受身處然周禮閹人鄭氏註云閹真氣藏者宋趙忠惠帥維揚日幙僚趙參議有婢慧􅃛盡得儕輩之歡趙昵之堅拒不從疑有異强即之則男子也聞于有司盖身二形前後姦狀不一遂寘之極刑近李安民嘗於福州得徐氏處子年十五六交際一再漸具男形盖天真未破則彼亦不自知然小説中有池州李氏女及婢添喜事正相類而此外絶未見於古今傳記等書豈以為人之妖而汙筆墨不復載乎晉五行志謂之人痾惠帝時京洛有人兼男女體亦能兩用人道而性尤淫亂此亂氣所生也玉厯通政經男女兩體主國淫亂而二十八宿真形圖所載心房二星皆兩形與丈夫婦女更為雌雄此又何耶異物志云靈狸一體自為隂陽故能媚人褚氏遺書曰非男非女之身精血散分又曰感以婦人則男脉應診動以男子則女脉順指皆天地不正之氣也事載周宻癸辛雜識花山賊中原紅冦未起時花山賊畢四等僅三十六人内一婦女尤勇捷聚集茅山一道宫縱横出沒畧無忌憚始終三月餘三省撥兵不能收捕殺傷官軍無數朝廷召募鹺徒朱陳率其黨與一鼓而擒之從此天下之人視官軍為無用不三五年自河以南盗賊充斥其數也夫爵禄前定宇文公諒字子貞湖州人初領鄉貢入浙省試院頭塲占一席舍其案上有宇文同知四字不知何人書試官考卷以文不中式將黜之時坐主龍麟洲先生江西老儒也年八十餘始過江浙力主此卷卒置榜中及㑹試果登髙第授同知婺源州事雖曰爵禄前定盖亦陰徳所致人鮮有知者公年少時嘗館授巨室其閨愛中夜來奔堅拒不納明旦託以他故歛書告别此非陰徳也與醋鉢兒俞俊嘉興人巴延太師柄國日嘗賦清平樂長短句云君恩如草秋至還枯槁落落殘星猶弄曉豪傑消磨盡了放開湖海襟懷休教鷗鷺驚猜我是江南倦客等閒容易安排手槀留葉起之處後與葉交惡竟訴于官必欲搆成其罪寅緣賄賂浙省移准中書省咨劄付儒學提舉司議得古人寄情遣興作為閨怨詩詞多有指夫為君者然此亦當禁止以故獲免罪戾而所費已幾萬定矣至正丙申春張士誠僣號誠王據有平江日又以賄通松江偽尹鄭煥署宰華亭用酷刑朘剥邑民恨入骨髓郡士𡊮海叟有詩曰四海清寧未有期諸公衮衮正當時忽然一日天兵至打破王婆醋鉢兒或者不知醋鉢之義以問叟叟曰昔有不軌伏誅暴屍于竿王婆買醋經過其下適索朽屍墜醋鉢為其所壓着地而碎王婆年老無知將謂死者所致顧謂之曰汝只是未曽喫惡官司來聞者皆絶倒棋譜通𤣥集通逺集清逺集清樂集幽𤣥集機深集増廣通逺集𤣥𤣥集忘憂集軍前請法師謝景陽居松江北郭結壇於家行召鬼法至正十一年官兵下海勦捕方國珍傳云賊中有人能呼召風雨必得破其法者乃可擒討千户額森等遂以謝薦總兵官給傳致請省劄有云參裁軍事必訪異人既達天時其為世用時知府王克敏廉介端嚴有聲于時不得已親造其廬起赴軍前其術一無所驗自後全軍敗衂吁宰臣統大兵數十萬勦除草竊如拉朽耳而乃延一方士則其機畧安在哉凌總管出對嘉興總管凌師德以文章政事自居同僚莫敢與抗然其行實貪汙頗聞人有譏議因出對云竹本無心外面自生枝節貢推官對云藕因有竅中間抽出絲毫盖諷之也承天寺平江承天寺遭囘禄殿宇一空僧悅楚南來住持施財者雲集遂大興土木之工金碧殊勝有加於昔或勸題梁悦不從曰當有俗人來暫居悦陞領徑山卒高郵兵攻破城張士誠據以為宫佛像悉毁壊銅觀音鑄為錢既投降作太尉别造府越四五年復為寺義丈夫吳興錢泰窩云至正初二賈自嘉興來平江買舟至海口收市舶貨行二十餘里兩道人詣舟求渡一負磬一持鬼神像既上舟去巾服乃兩甲者從像中出二長刀叱曰吾逐盗至此汝真盗也舟人陽應曰我固知為盗顧無以發今壯士誠與吾意合此未可前途乃可耳故紆行且曰二盗已落公手願治酒助公勇遂命妻取酒勸甲者遲暮醉抽其刀斫賊其一躍起復斫之二盗盡死舟還二賈泣且拜曰非公吾幾不免虎口遂以白金二餅為舟人夀吁決死生於阽危之際不負賈之託不謂之義丈夫可乎解語盃至正庚子秋七月九日飲松江泗濵夏氏清樾堂上酒半折正開荷花置小金巵於其中命歌姬捧以行酒客就姬取花左手執枝右手分開花瓣以口就飲其風致又過碧筩逺甚余因名為解語盃坐客咸曰然戯題小像張句曲戯題黄大癡小像云全真家數禪和口鼓貧子骨頭吏員臓腑唐伯剛題邾仲誼小像云七尺軀威儀濟濟三寸舌是非風起一雙眼看人做官兩􅃗脚沿門報喜仲誼云是誰是誰伯剛云是你是你水仙子張明善作北樂府水仙子譏時云鋪眉苦眼早三公裸袖揎拳享萬鍾胡言亂語成時用大綱來都是烘上聲説英雄誰是英雄五眼雞岐山鳴鳳兩頭蛇南陽臥龍三脚猫渭水非熊銅錢代蓍今人卜卦以銅錢代蓍便於用也又有以錢八文周圍鋪轉而取六爻名曰金井闌但乾卦初爻及復之泰不可變盖止有六十二卦耳此法不可用刑賞失宜至正十二年歲壬辰秋蘄黄徐夀輝賊黨攻破昱嶺關徑抵餘杭縣七月初十日入杭州城偽帥項蔡楊蘇一屯明慶寺一屯北關門妙行寺稱彌勒佛出世以惑衆浙省參政樊執敬死于天水橋寳格與妻同溺于西湖其賊不殺不淫招民投附者署姓名于簿籍府庫金帛悉輦以去至二十六日浙西廉訪使自紹興率鹽塲竈丁過江同羅木營官軍尅復城池賊遂潰散三平章鼎鼎逃徃嘉興郎中托克托過江南越數日携省印來㑹權署省事至是亦囘四平章嘉琿自湖州統軍歸舉火焚城殘蕩殆盡附賊充偽職者范縣尹等明正典刑里豪施遵禮顧八為迎敵官軍咼于市家産悉没縣官明慶妙行亦然省都事以下坐失守城池罷黜不叙省官復任如故朝廷法度既隳刑賞失宜欲天下宴安不可復得矣畫家十三科佛菩薩相玉帝君王道相金剛鬼神羅漢聖僧風雲龍虎宿世人物全境山林花竹翎毛野騾走獸人間動用界畫樓臺一切傍生耕種機織雕青嵌緑輟耕録卷二十八欽定四庫全書輟耕録卷二十九元陶宗儀撰紀隆平張士誠弟兄四淮南泰州白駒塲人泰州地濵海海上鹽塲三十有六𨽻兩淮運鹽使司士誠與弟士義士德士信並駕運鹽綱船兼業私販初無異於人先是中書省右丞相托克托在任災異疊見黄河變遷至正十一年遣工部尚書賈魯役民夫一十五萬軍二萬决河故道民不聊生河南韓山童首事作亂以彌勒佛出世為名誘集無頼惡少燒香結㑹漸致滋蔓䧟淮西諸郡繼而湖廣江西荆襄等處皆淪賊境山東杜遵道以李氏子為主起汝寧蕭縣李二老彭張君用攻䧟徐州李二號芝麻李鄒普勝徐夀輝即真一據蘄黄鎮南班據江東又有毛貴陳友諒輩不可枚數分據各處方國珍弟兄嘯聚台州海上朱定一陳賢五江宗三作亂江隂初王克柔者亦泰州人家富好施多結游俠將為不軌高郵知府季齊收捕于獄李華甫與麫張四素感克柔恩謀聚衆刼獄齊以克柔解發揚州後招安華甫為泰州判四為千夫長十三年五月士誠又與華甫同謀起事未幾士誠黨與十有八人共殺華甫遂併其衆焚掠村落驅民為盗䧟通泰高郵自號誠王改元天祐設官分職把截要衝南北梗塞立淮南行中書省於楊州以扼其勢既而亦招安之立義兵元帥府以官其黨然狙詐百出卒不就降殺知府季齊十五年五月攻破楊州路殺淮南行省參政趙璉士義被獲伏誅既而退還高郵至九月二十五日又攻破楊州適湖廣行省右丞鄂爾和引苖軍來十月初一日復退丞相托克托親總大軍以擒之衆號百萬旌旗輜重首尾千里以為高郵刻日可平然托克托與弟御史大夫額森特穆爾專權日乆及出師遂有議其後者詔托克托安置淮安路額森特穆爾安置寧夏路别選相臣統其兵詔未下時部將董摶霄每對托克托言天兵南下勢如破竹今老師費財何面目歸報天子不若先攻其易托克托從其言分兵破天長六合賊皆潰散所殺者悉良民及攻高郵墮其外城城中震恐自分亡在旦夕忽聞詔解其權勇氣百倍出城拒敵諸衛鐡甲軍抱不平者盡皆散去或相聚山林為盗高郵不可得而復矣江隂羣冦互相吞啖江宗三朱英分黨戕殺宗三將入城殺英時英就招安為判官州之僚佐無如之何遂申白江浙行省云朱英謀反省差元帥郭松壓境觀孫利其貨賂逗遛不進英因乘間挈家逸去過江求救於士誠仍質妻子借兵復讐士誠初亦疑惑弗聽英盛陳江南土地之廣錢糧之多子女玉帛之富以動其中於是先遣士德率高郵賊衆擊横坍渡鏑山十六年正月朔攻破常熟州江南自兵興以來官軍死鋒鏑郡縣荐罹饑饉鄉村農夫離父母棄妻子投充壯丁生不習兵而驅之死地以故烏合瓦解卒無成功江浙行省丞相達實特穆爾有㫖得便宜行事陞漕運萬户托音為叅政統領官軍民義捍禦境上平江達嚕噶齊陸實病亡陞松江府達嚕噶齊哈克繖刷為平江達嚕噶齊領兵出戰除都水庸田使貢師泰為平江總管巡守城池吳江境上止有元帥王與敬官軍一戰而敗死者過半殘兵千餘欲走入城城中閉門不納退屯嘉興旋抵松江士誠賊衆纔三四千人長驅而前直造北門弓不發矢劒不接刃明旦縁城而上遂據有平江路二月壬子朔也刼掠姦殺慘不忍言托音匿俞家園自刎不死游兵殺之哈克繖刷在境外聞城破自溺死既而崑山嘉定崇明州人相繼來降維揚蘇昌齡比先避亂居吳門士德用為叅謀稱曰蘇學士毁承天寺佛像為王宫易平江路為隆平郡立省院六部百司凡有寺觀菴院豪門巨室將士爭奪分占而居了無虚者幾月進攻嘉興全師覆沒與敬據松江叛以城降常州豪俠黄貴甫間道歸欵許為内應不戰而城破易為毘陵郡分兵入湖州一鼓而得易為吳興郡隆平太守周仁家本鍜工稍習吏事性資深刻與士德同心僇力躬親細故三月癸巳士誠來自高郵服御器用皆假乘輿改至正十六年為天佑三年國號大周厯曰明時設學士員開𢎞文館以隂陽術人李行素為丞相弟士德為平章提調各郡兵馬蔣輝為右丞居内省理庶務潘元明為左丞鎮吳興史文炳為樞宻院同知鎮松江郡州縣正官郡稱太守州稱通守縣仍曰尹郡同知稱府丞知事曰從事餘則損益而已南向欲取嘉興嘉興則有參政楊旺札勒統領苖獠猺獞名曰達爾罕守禦甚堅屢攻不克秋八月文炳大舉兵臨其東門悉為所殱文炳僅以身免士德又與與敬提兵入杭州軍氣甚鋭杭州大軍歛鋒不敵丞相退避蕭山士德軍檢刮虜掠羅木營萬户普賢努乃慶元路萬户矩珠爾之子年未弱冠智勇過人率兵先出旺札勒圖領苖軍繼進民亦挺身巷戰士德大潰收拾殘兵十喪八九及攻海鹽又為乍浦鍾氏所撓後得馬道驍勇禽獲苖軍無算西南接境頼此無虞不然松江非士誠有矣崑山數為方國珍海軍攻擊託丁氏徃來説合結為婚婣崑山之民幸遂蘇息湖之長興武康與廣德相界花鎗軍出没之地雖互為勝負然亦不勝其苦所跨三州皆鄰勍敵可畏者特集慶一軍最盛陸路則無錫宜興長興水路則太湖士馬震耀舳艫相銜自後長興䧟常州又䧟士德戰敗被擒俘致集慶俾其作書勸士誠歸附士德以身徇之終無降意士誠勢窮力迫願就丞相招安使者徃返訖莫成就仁親詣江浙省堂具陳自願休兵息民之意議始定時十八年秋八月也朝廷詔赦其罪後授士誠太尉開府平江士誠以下授爵有差立江淮分省江浙分樞宻院于平江以設其官屬降真香道家者流為人典行醮事曰高功其有行業精白者則必移檄南岳魏夫人請借仙鶴或二􅃗或四􅃗青鸞導衛翔騖澄空昭揚道妙徃徃親見之偶讀本草有云降真香出黔南伴和諸雜香燒烟直上天召鶴得盤旋於上注按仙傳云燒之或引鶴降醮星辰燒之甚為第一度籙燒之功力極驗若然則鶴之來香所致也非歟宋二十二帝長編所載宋二十一帝盖自順宣僖三祖及太祖太宗真仁英神哲徽欽高孝光寧理度少帝并端宗帝昺也字音吾衍子行閒居録云舜生諸馮及馮婦等皆音皮氷切古不音符容切也馮婦與徐夫人皆男子三國時有暨艶乃吳人附陸杭傳當音結不音暨也許負綘侯周亞夫自未侯為河内守時許負相之曰君後三歲而侯見史記綘侯傳註謂索隱曰應劭云負河内温人老嫗也按楚漢春秋高祖封負為鳴雌侯是知婦人亦有封邑李玉溪先生趙公琪字元德官至贈湖廣行省參政諡文惠臨淄人飄然有神仙思常使方士燒水銀硫黄朱砂黄金等物為神丹以資服食有玉溪李簡易先生者得道為神仙數訪公授以其術乆乆隱去人或以為不死公思之一日見其至喜而固留之先生曰吾逺來甚熱請具浴公即具浴先生就浴室乆之不聞聲日且暮公親候之見有光昱然在水上圓如初日出不復見先生所在先生書藏公家今稍稍傳人間虞文靖序其事如此云稱地為雙嘗讀金黄華老人詩有招客先開四十雙之句殊不可曉近讀雲南雜誌曰夷有田皆種稻其佃作三人使二牛前牽中壓而後驅之犁一日為一雙以二乏為己二己為角四角為雙約有中原四畆地則老人之詩意見矣骨咄犀骨咄犀蛇角也其性至毒而能解毒盖以毒攻毒也故曰蠱毒犀唐書有古都國必其地所産今人訛為骨咄耳一門五節奉化陳氏婦以貞節稱者五人初陳元娶竺氏生子侗而元卒竺氏年纔二十二義不再適後三十三年卒侗娶璩氏生子瑞泰二人侗亦以疾夭璩氏年二十六後五十八年卒瑞娶王氏生子通甫而瑞復夭王氏年三十後五十五年卒通甫娶樓氏樓氏甫笄歸于陳至二十六而寡父母欲奪其志泣不從其姑王氏年老樓氏事之尤謹姑卒歛葬悉如禮子四人長養才娶樓氏生子孟雍孟熈而養才遇疾不愈方卒時樓氏年二十六所守如其姑云一門三節隴西李子平氏子茂德聘同郡張氏女年十七歸李氏生子庸甫六歲而寡舅姑憐其少也欲嫁之使左右風之即引刀截髮以見志乃止茂德之弟仲德亦早卒其妻張氏年二十有八生子慶方齓亦誓不再適從弟希賢妻陳氏二十有四希賢卒時其子度方孕四月守志益堅一門三婦以貞白聞庸至正間仕至同知濟南路總管府事推恩贈父同知益州路總管府事隴西郡伯母封隴西郡夫人再調關襄宣慰階中奉大夫而夫人始卒黄龍洞黄龍洞在吳興郡北去城闉廿里枕太湖其山皆怪石林立中有一石最尊上大其本小危立如種自石上湧起輕撼則揺動稍加力排輒不動人甚異之洞旁壁立千仞頫瞰不能見底投以石不應以聲呼則相答深窅不測每歲旱郡民禱之東坡先生曽遊題詩述龍之跡山谷先生書黄龍洞三字刻猶存黏接紙縫法王古心先生筆録内一則云方外交青龍鎮隆平寺主藏僧永光字絶照訪予觀物齋時年已八十有四話次因問光前代藏經接縫如一線日乆不脱何也光云古法用楮樹汁飛麫白笈末三物調和如糊以之黏接紙縫永不脱解過如膠漆之堅先生上海人井珠人欲娶妻而未得謂之尋河覔井已娶而料理家事謂之擔雪填井男婚女嫁財禮奩具種種不可闕謂之投河奔井凡納婢僕初來時曰擂盤珠言不撥自動稍乆曰算盤珠言撥之則動既乆曰佛頂珠言終日凝然雖撥亦不動此雖俗諺實切事情一錢太守廟一錢太守劉寵廟在紹興錢清鎮王叔能參政過廟下賦詩曰劉寵清名舉世傳至今遺廟在江邊近來仕路多能者也學先生揀大錢全真教全真紀實云金主亮貞元元年有吏員咸陽人王中孚者倡全真教談馬邱劉和之其教盛焉章宗泰和四年元學士作紫微觀記所載詳悉馬孝子馬伯傑山東鄒縣人父某拜江南行臺監察御史不以家行傑獨與母居盗起汝頴轉畧齊魯境傑負母匿草間母死倉卒不能具棺歛聚石葬鄆地西盗入鄆城傑伏于墓上衆欲驅而前脅以白刃傑大慟曰母在此母在此盗曰此孝子也乃舍之復遺以衣糧既而邑刳于兵失墓所在求之二年得於榛莽中故衣尚存始克遷祔祖塋御史轉浙西憲僉留江南者八年遂冐鋒鏑間走數千里省之錢唐人咸稱為馬孝子云楊貞婦天台金沙里女王靜安年十七歸同邑楊伯瑞瑞為樞宻院斷事官未幾死於兵靜安守節不嫁權貴爭求之至截髮自剄不殊窑器宋葉寘垣齋筆衡云陶器自舜時便有三代迄于秦漢所謂甓器是也今土中得者其質渾厚不務色澤末俗尚靡不貴金玉而貴銅磁遂有秘色窑器世言錢氏有國日越州燒進不得臣庶用故云祕色陸龜蒙詩九秋風露越窑開奪得千峯翠色來如向中霄盛沆瀣共稽中散鬭遺桮乃知唐世已有非始於錢氏本朝以定州白磁器有芒不堪用遂命汝州造青窑器故河北唐鄧耀州悉有之汝窑為魁江南則處州龍泉縣窑質頗麤厚政和間京師自置窑燒造名曰官窑中興渡江有邵成章提舉後苑號邵局襲故京遺製置窑于修内司造青器名内窑澄泥為範極其精製油色瑩徹為世所珍後郊壇下别立新窑比舊窑大不侔矣餘如烏泥窑餘杭窑續窑皆非官窑比若謂舊越窑不復見矣墨上古無墨竹挺㸃漆而書中古方以石磨汁或云是延安石液至魏晉時始有墨丸乃漆烟松煤夾和為之所以晉人多用凹心硯者欲磨墨貯瀋耳自後有螺子墨亦墨丸之遺製唐高麗歲貢松烟墨用多年老松烟和麋鹿膠造成至唐末墨工奚超與其子廷珪自易水渡江遷居歙州南唐賜姓李氏廷珪父子之墨始集大成然亦尚用松烟廷珪初名廷邽故世有奚廷珪墨又有李廷珪墨或有作庭珪字者偽也墨亦不精宋熈豐間張遇供御墨用油烟入腦麝金箔謂之龍香劑元祐間潘谷墨見稱於時自後蜀中蒲大韶梁杲徐伯常及雪齋齊峯葉茂實翁彦卿等出世不乏墨惟茂實得法清黒不凝滯彦卿莫能及中統至元以來各有所傳可以倣古唐祖敏奚鼐易水奚鼎鼐之弟奚起鼐之子陳朗兖州王君得柴珣並唐末五代南唐李超鼐之子始居歙州南唐賜姓李氏李廷珪李廷寛李承宴皆超之子李文用承宴之子李惟慶李惟一李仲宣皆文用子耿遂仁歙州耿文政耿文夀皆遂仁子耿德耿盛盛匡道宣州盛通盛真盛舟盛信盛浩宋張遇潘衡蒲大韶欵曰書窓輕煤佛帳餘韻葉世英嘗造德夀宫墨朱知常欵曰朱知常香齊梁杲李世英欵曰叢佳堂李世英胡友直潘衡孫秉􅂜徐知常葉邦憲嘗造復古殿墨雪齋欵曰雪齋墨寳周朝式李世英男克恭樂温蒲彦輝劉文通郭忠厚鏡湖方氏黄表之齊峯劉士先嘗造緝熈殿墨寓菴得李潘心法俞林丘攽謝東徐禧葉茂實三衢翁彦卿元潘雲谷清江胡文忠長沙林松泉錢唐於材仲宜興杜清碧武夷衛學古松江黄脩之天台朱萬初豫章丘可行金溪丘世英丘南傑皆可行子斵琴名手隋趙取利唐雷霄雷盛雷珏雷文雷迅郭亮一作諒皆蜀人沈鐐張鉞皆江南人金儒大中進士僧三慧大師宋蔡睿朱仁濟衛中正慶厯中道士趙仁濟興國中馬希仁馬希先一作仙崇寧中金淵紹興初金公路即金道紹興初陳亨道高宗朝嚴樽馬大夫梅四官人龔老應奉林杲東卿元嚴古清恭字子安樽之孫梅四之壻施溪雲施谷雲施牧州古琴名冰清春雷玉振黄鵠秋嘯鳴玉瓊響秋􅄜懐古南薰大雅松雪浮磬奔雷存古寒玉百衲響泉冠古韻磬渉深天球混沌材萬壑松雪夜冰玉澗鳴泉石上清泉秋塘寒玉九霄環珮戯語至正丙申高郵兵累攻嘉興不克或人撰戯語云史帥一日下令行兵叅謀掌史進言自古行師必先祭旗史曰王元帥破松江時曽祭否答曰不祭史曰王元帥不祭我也不祭盖祭濟字音同傳以為笑又有一説紅軍與苖軍戰不勝禀主帥曰彼中軍前有十丈大旗旗上字大元統兵官五字帥曰我此間亦效之旗成軍吏禀所寫何字帥曰八分書寫趙王令既而寫趙字未成纔寫得走字傳報苖軍到走走走二說皆可捧腹日家安命法日家者流以日月五星及計羅炁孛四餘氣􅄤度過宫遲留伏逆推人之生年日月時可以知休咎定夀夭其書曰百中經經首有安命法曰周天宿度十二宫安命例凡十葉有術士以其例節為一葉簡明易見其法但看本生日太陽所􅄤何度便以本生時加在上向下逐宫虚數如下面已盡則又於此行自上而下見夘住即是此度安命真㨗徑也子丑寅卯辰巳午未申酉戍亥淮渦神泗州塔下相傳泗州大聖鎻水母處謬也按地志云水神在臨淮縣龜山之下形若獼猴縮鼻高額青軀白首金目雪牙頸伸百尺力踰九象禹獲之鎻其頸於龜山之足淮水乃安流注海邇來漁者知鎻所在古嶽瀆經云禹治水三至桐栢山獲淮渦水神曰無支祈乃命庚辰制之鎻于龜山之足淮水乃安唐永泰初楚州有漁人夜釣山下其鈎為物所掣沈水視之見大鐡鎻繞山足一獸形如青猿兀若昏醉涎沫腥􅁾不可近又東坡濠州塗山詩川鎻支祈水尚渾註程演曰異聞集載古嶽瀆經禹治水至桐栢山獲淮渦水神名曰巫支祈善應對辨淮之淺深源之逺近而神曰庚辰者鎻於龜山之足淮乃安流唐時有漁者釣得一古鎻牽出其末有如獼猴者盖此物也國史補曰楚州漁人於淮中釣得古鐡鎻刺史李陽大集人力引之鎻窮有青獼猴躍出水而逝山海經水獸好為雲雨禹鎻於軍山之下其名無支祈寄衣洞庭劉氏有夫葉正甫乆客都門因寄衣侑以詩云情同牛女隔天河又喜秋來得一過歲歲寄郎身上服絲絲是妾手中梭剪聲自覺和腸斷線脚那能抵淚多長短只依先去様不知肥瘦近如何先去亦作舊時輟耕録卷二十九欽定四庫全書輟耕録卷三十元陶宗儀撰印章制度}
