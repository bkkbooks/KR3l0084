士之易述其不銓次豈縁聲律不韙之辠莫敢自䘏尚同好事之君子幸有以釘愚之失顔無繇音遙音由縣音𤣥成公祖句音鈞兹句音勾井疆宓音宻當作伏不齊邽音圭巽鄡音梟單音善漆雕哆音侈潘昻霄志曰延祐乙夘春聖天子以四海萬國之廣軫念庶民艱虞罔控告也分使詣外郡諸道布揚徳心戚休興替之清洿揚激之畿甸宻邇獨不得均其澤越五月詔前翰林學士承㫖臣庫庫楚翰林侍讀臣昻霄奉使宣撫京畿西道臣昻霄承命驚悸㒺措唯務罄竭忠赤盡恤民瘼後已闊公一日語昻霄余嘗從余兄榮禄公都實抵西國窮河源耳之不覺瞿然以駭有是乎哉請畢其語公曰世祖皇帝至元十七年歳在庚辰欽承聖諭黄河之入中國夏后氏導之知自積石矣漢唐所不能悉其源今為吾地朕欲極其源之所出營一城俾畨賈互市規置航傳凡物貢水行達京師古無有也朕為之以永後來無窮利益盖難其人都實汝舊人且習諸國語往圖汝諧授招討使佩金虎符以行是歳四月至河州州東六十里有寧河驛驛西南五六十里山曰殺馬闗林麓穹隘譯言塔斯達巴啓足寖高一日程至巔西邁愈高四閱月約四五千里始抵河源冬還圖城傳位置以聞上悅往營之授土蕃等處都元帥仍金虎符置寮寀督工工師悉資内地造航為艘六十城傳措工物完庫庫楚驛聞適僧格征恭噶蔵布爾力沮遂止翼歳兄都實旋都河源在土蕃朶甘斯西鄙有泉百餘泓或泉或潦水沮洳散渙方可七八十里且泥淖溺不勝人跡逼觀弗克旁履高山下眎燦若列星以故名鄂端諾爾鄂端譯言星宿也羣流奔湊近五七里匯二巨澤名鄂楞諾爾自西徂東連屬吞噬廣輪馬行一日程迤邐東騖成川號齊必勒河二三日程水西南來名伊爾齊與齊必勒河合三四日程南來名呼蘭又水東南來名伊拉齊合流入齊必勒其流寖大始名黄河然水清人可渉又一二日岐裂八九股名伊遜鄂羅木譯言九度通廣六七里馬亦可度又四五日程水渾濁土人抱革囊乘馬過之民聚落紏木幹象舟傅毛革以濟僅容兩人繼是兩山峽東廣可一里二里或半里深叵測矣朶甘斯東北鄙有大雪山名伊拉瑪博囉其山最高譯言騰格哩哈達即崑崙也山腹至頂皆雪冬夏不消土人言逺年成氷時六月見之自八九股水至崑崙行二十日程河行崑崙南半日程地又四五日程至地名庫濟克特二地相屬又三日程地名哈喇伯勒齊爾四達之衝也多冦盗有官兵鎮防崑崙迤西人簡少多處山南山皆不穹峻水亦散漫獸有髦牛野馬狼狍羱羊之𩔖其東山益高地亦漸下岸狹隘有狐可一躍越之者行五六日程有水西南來名納琳哈喇譯言細黄河也又兩日程水南來名竒爾穆蘓二水合流入河河北行轉西至崑崙北二日程地水過之北流少東又北流約行半月程至貴徳州地名必齊勒始有州事官府州隸河州置司土蕃等處宣慰司所轄又四五日程至積石州即禹貢積石五日程至河州安鄉闗一日程至打羅坑東北行一日程洮河水南來入河又一日程至蘭州其下過北卜渡至鳴沙州過應吉里州正東行至寧夏府南東行即東勝州隸西京大同路地面自發源至漢地南北澗溪細流傍貫莫知紀極山皆草山石山至積石方林木暢茂世言河九折彼地有二折盖竒爾穆蘓及貴徳州必齊勒也漢張騫使絶域覊聨拘執艱厄百罹歴大宛月氐等數國其傍大國五六皆稱傳聞以為窮河源烏能覩所謂河源哉史稱河有兩源一出于闐一出葱嶺于闐水北行出蔥嶺河注蒲𩔖海不流洑至臨洮出焉今洮水自南來非蒲𩔖明矣詢之土人言于闐葱嶺水其下流散之沙磧又有言河與天河通尋源得織女支機石以歸亦妄也崑崙至嵩高五萬里閬風元圃積瑤華盖仙人所居又何耶唐史土蕃傳河上流由河洪濟梁南二千里水益狹春可渉秋夏乃勝舟其南三百里三山中高而四下曰紫山古所謂崑崙其言頗𩔖然止稱河源其間云國家敞天威亘天所覆燾無間海内外冠帶萬國罔非臣妾視漢唐為不足訝故窮河源去萬里若歩閨闥嘻盛典也不可不志因志之都實族女真富察氏統烏思藏路暨招討都元帥凡三至吐蕃庫庫楚今除甘肅行省參知政事是歳八月初吉翰林侍讀學士中奉大夫知制誥同修國史臣潘昻霄謹述柯九思序云河源有志自本朝始前乎此曷為未有志河源者道路遼阻所傳聞異辭莫能䆒河之源也山經曰敦薨之水西流注於泑澤出於崑崙之東北陬實惟河源而水經載河出崑崙經十餘國乃至泑澤山經又稱陽紆之山河出其中凌門之山河出其中穆天子傳亦云陽紆之山河曰馮夷所居是惟河宗氏釋氏西域志稱阿耨達大山上有大淵水即崑崙山也地里志亦稱崑崙山在臨羌西而漢書載河出兩源或稱有或稱無而河源所著異同况世殊代易名地亦異終莫能有究之者我太祖皇帝二十有一年春正月征西夏夏取甘肅等城秋取西凉府遂過沙陀至黄河九渡按崑崙當九渡下流則崑崙固已歸我職方氏矣憲宗皇帝二年命皇太弟實喇帥諸部軍征西域凡六年闢封疆四萬里於是河源及所注枝出者盡在封域之内當時在行有能記其說皆得於目擊非放也逮世祖皇帝功成治定天下殷富遂命臣都實置郡河源故翰林侍讀學士潘公得究其詳實搜源析𣲖而作斯志乃知更崑崙行一月始窮河源於戯當四海混一之盛聞廣見覈致數千載莫能究者俾後世有考而傳信焉豈斯文之光實邦家無疆之休也公之子詡能不墜其先業増光而潤色之至順間以同知嘉定州事來吳將刋是書行於世屬九思叙其說于篇端元統元年冬十有一月日南至奎章閣學士院鍳書博士文林郎柯九思序皇太子署牒國朝政事正六品以下官中書奉勑署牒以命之牒具中書官位最尊者令也署牒者自丞相以下而不敢以煩令惟皇太子立必兼中書令樞宻使皇太子既受冊即中書上日獨署一牒明日省臣以其名聞天子即以宣命超拜五品官其人自非素親近有譽望取於羣臣者不得也禽戲余在杭州日嘗見一弄百禽者蓄龜七枚大小凡七等置龜几上擊鼓以使之則第一等大者先至几心伏定第二等者從而登其背直至第七等小者登第六等之背乃竪身直伸其尾向上宛如小塔状謂之烏龜疊塔又見蓄蝦䗫九枚先置一小墩於席中其􅇰大者乃踞坐之餘八小者左右對列大者作一聲衆亦作一聲大者作數聲衆亦作數聲既而小者一一至大者前㸃首作聲如作禮状而退謂之蝦蟆說法至松江見一全真道士寓太古菴一日取二鰍魚一黄色一黒色小大相侔者用藥塗利刃各斷其腰互換接綴首尾異色投放水内浮游如故郡人衛立中以盆池養之經半月方死疊塔說法固教習之功但其質性蠢蠢非他禽鳥可比誠難矣哉若夫斷而復續死而復生藥歟法歟是未可知也但劇戱中似此者果亦罕見哉虎禍大徳間荆南境内有九人山行值雨避於路傍舊土洞中忽有一虎來踞洞口哮咆怒視目光射人内一人素愚八人者宻議虎若不得人惡得去因紿愚者先出我輩共掩殺之愚者意未決遂各解一衣縳作人形擲而出之虎愈怒八人倂力排愚者於外虎即銜置洞口怒視如前湏臾土洞壓塌八人皆死愚者獲生夫當顛沛患難之際乃欲以八人之智而䧟一人之愚其用心亦險矣天道果夢夢耶河南婦死河南婦世為河南民家天兵下江南婦被虜姑與夫行求數年得之湖南婦已妻千戸某饒於財情好甚洽視夫姑若塗人㑹有㫖凡婦人被虜許銀贖敢匿者死某懼罪亟遣婦婦堅不行夫姑留以俟婦閉其室弗與通遂號慟頓絶而去行未百歩青天無雲而雷回視婦已震死錢唐白湛囦先生記以詩曰從軍古云樂獲罪禱應難母望明珠復夫求破鏡完押衙逢義士公主奉春官為報河南婦天刑不可干玊堂嫁妓姚文公燧為翰林學士承㫖日玉堂設宴歌妓羅列中有一人秀麗閒雅微操閩音公使來前問其履歴初不以實對叩之再泣而訴曰妾乃建寧人氏真西山之後也父官朔方時禄薄不足以給侵貸公帑無償遂賣入娼家流落至此公命之坐仍遣使詣丞相三寳努請為落籍丞相素敬公意公欲以侍巾櫛即令教坊檢籍除之公得報語一小吏黄㻖後顯官者曰我以此女為汝妻女即以我為父也吏忻然從命京師之人相傳以為盛事云嘉興貝闕嘗有詩曰斷絲棄道邊何日縁長松墮羽别炎洲不復巢梧桐昔在至元日六合車書同玉堂盛文士燕集來雍雍金刀手割鮮酒給葡萄濃坐有一枝春秀色不可雙叶娉婷劉碧玉綽約商玲瓏寳釧金雀釵已覺燕趙空或聞操南音未解歌北風上客驚且疑姓氏初未通問之慚復泣乃起陳始終妾本建寧女逺出西山翁父母生妾時謂是金母童梨花鎻院落燕子窺簾櫳迢迢官朔方位卑食不充侵貸國有刑桎梏加父躬粥女以自贖白璧淪泥中秋娘教歌舞屢入明光宫永為娼家婦遂屬梨園工京華多少年門外嘶青驄不如孟光醜猶得嫁梁鴻自傷妾薄命失落似秋􅅫客聞為三歎天道何懵懵遣使白宰相削籍歸舊宗小史十八九勿恨相如窮配爾執箕箒今夕看乘龍鴛鴦並玉𣗳鸚鵡開金籠棄汝桃花扇紅牙不復從提瓮自汲水絺綌自御冬時多困轗軻事或忻遭逢安知百尺井忽登羣玉峯借問為者誰内相姚文公數䜟至元甲子阿哈瑪特拜中書平章領制國用使司時樂府中盛唱胡十八小令知䜟緯者謂其當擅重權十八年人未之信果於至元壬午伏誅越五年丁亥閏二月僧格拜中書平章立尚書省貪暴殘忍又十倍於阿哈瑪特人亦謂桑字拆而為四十八桑字後改作相字亦拆為四十八竟不知應之於夀或應之於職然自立省之日至辛夘正月敗績恰四十八月其神驗如是案僧格原文作桑哥故當時附㑹如此戎顯再生大徳戊戍二月二十日張漢臣尚書趙松雪學士費北山漕侯同在杭州泛舟過西湖至毛家步上岸乘肩輿將遊水樂洞行里餘逢一尼寺趙公偕二公入寺訪親俄而從人來報張公之老㒒戎顯卒死矣亟回至其所呼救不省氣絶身僵忽有二道士過一老一㓜云不妨事老者即於死人面上吹呵㓜者就籬落間摘一青葉度於老者若作法書符状置死人頂上隨即再生頃間失二道士所在或云恐是洞賔變現隐括其姓如此耳算命得子檇李郭宗夏嘗見建徳路總管趙良臣言都下有李總管者官三品家巨富年逾五十而無子聞樞宻院東有術者設肆算命談人休咎多竒中試往叩焉且語之曰吾之禄夀已不必言但推有子與否術者笑曰君有子矣何為紿我李曰吾實無子豈紿汝耶術者怒曰君年四十當有子今年五十六矣非紿我而何同坐者皆軍官見二人争執甚訝之李沉吟良乆曰吾年四十時一婢有娠吾以職事赴上都比歸則吾妻粥之矣莫知所徃若有子則此是也術者曰此子終當還君相别而出時坐中一千户邀李入茶坊告之曰十五年前吾亦無子因到都置一婢則已有孕到家時適吾妻亦有孕前後一兩月間各生一男今皆十五六矣豈君之子也兩人各言婦人之容貎嵗齒相同李歸語於妻妻往日誠悍妬至是見夫無嗣心頗慚而憐之翼日邀千户至家享以盛饌與之刻期而别千户先歸南陽府李以實告於所管近侍大官乞假前往大官曰此美事也我當與汝奏聞既而有㫖得給驛以行凡筵席之費皆從官辦李至衆官郊迎徃千户宅設大宴李所以餽獻千户并其妻子㒒妾之物甚侈千户命二子出拜風度不殊衣冠如一莫知何者為己子致請於千户千户曰君自認之李諦視良乆天性感通前抱一人曰此吾子也千户曰然於是父子相持而哭坐中皆為墮淚舉盃交賀大醉而罷明日千户荅禮㑹客如昨謂李曰吾既與君子矣豈可使母子分離今幷其母以奉李喜出望外回都攜見大官大官曰佳兒也引之入覲通籍宿衛後亦官至三品大抵人之有子無子數使之然非人力所能也而術士之業亦精矣夫婦入道王氏守素錢唐民家女其夫丁棄家為全真道士於吳山之紫陽菴一日召守素入山自付四句云􅈸散六十三妙用無人識逆順兩俱忘虚空鎮常寂坐抱一膝而逝方外者流謂之騎鶴化守素遂亦束髪簮冠着道士服奉夫遺屍二十年迹不下山年逾七十幾於得道者神仙渺茫故未暇論貞守一節乃可尚也丁夘進士薩都刺天錫贈之詩曰不見遼東丁令威舊遊城郭昔人非鏡中春去青鸞老華表山空白鶴歸石竹淚乾斑雨在玉簫聲斷綵雲飛洞門花落無人迹獨坐蒼苔𥙷道衣項節婦燕山項氏其夫江南人行賈燕薊間聘項與居未幾夫死項時年二十奉柩回江南誓以夫餘貲養姑以自終比至姑已改適勵志孑居以守夫祀旴江李宗烈閔其事而賦之詩曰少無依倚老何堪白髪婆娑亂不簮夢裏尚思江北好悔將夫骨葬江南西域竒術任子昭云向寓都下時隣家兒患頭疼不可忍有回回醫官用刀割開額上取一小蟹堅硬如石尚能活動頃焉方死疼亦遄止當求得蟹至今蔵之夏雪簑云嘗於平江閶門見過客馬腹膨脹倒地店中偶有老回回見之於左腿内割取小塊出不知何物也其馬隨即騎而去信西域多竒術哉童子屬對湖廣行省平章歸自雨中有一童子年七八歳直造傘下避雨平章問曰學生能屬對否曰能平章曰青衿來避雨即應聲曰紫綬去朝天平章喜引至家遺以果肴明日除書至拜中書平章之命復大喜再以楮幣綵繒贈之先輩風致龍麟州先生過福建憲府設宴命宫妓小玉帶佐觴酒半憲使舉盃請曰今日之歡皆玉帶為也願先生酬之以詩先生其毋辭時先生負海内重名雅畏清議又不能違憲使之請遂書一絶句云菡蓞池邊風滿衣木樨亭下雨霏霏老夫記得坡仙語病體難禁玉帶圍於是舉席稱嘆盡歡而散盖前輩既不肯拂人意又不欲失所守而且用事清切一時風致可想見信非野儒俗士所能及也司馬善諫御史大夫額森特穆爾與夫人不睦已數年矣翰林學士承㫖阿穆恰巴拉死大夫遣司馬明埓往唁之及歸問其所以明埓云承㫖帶罟罟娘子十有五人皆務爭奪家財全無哀戚之情惟正室坐守靈幃哭泣不已大夫黙然是夜遂與夫人同寢歡愛如初若司馬者可謂善於寓諌者矣俞竹心術士俞竹心者居慶元嗜酒落魄與人寡合順其意者即與推算醉筆如飛畧不構思頃刻千餘言道已往之事極驗時皆以為異人至元己夘間婁敬之為本路治中嘗以休咎叩之荅曰公他日直至一品便休婁深信其說棄職别進適值壬午更化俯就省掾陞除益都府判改換押字再宛然真書一品二字未幾卒於官所此偶然耶抑數使然耶犬脇生子元貞丙申秋大都南城武仲祥家有乳犬懷胎在脇下忽腫成瘡六七日後於瘡生五子色皆青蒼每當􅆃梁自頂至尾生逆毛一道他無所異又數日瘡亦平復輟耕録卷二十二欽定四庫全書輟耕録卷二十三元陶宗儀撰書畫褾軸唐貞觀開元間人主崇尚文雅其書畫皆用紫龍鳯紬綾為表緑文紋綾為裏紫檀雲花杵頭軸白檀通身柿心軸此外又有青赤琉璃二等軸牙籖錦帶大和間王涯自鹽鐡據相印家既羡於財始用金玉為軸甘露之變人皆剥剔無遺南唐則褾以㢠廻鸞墨錦籖以潢紙宋御府所蔵青紫大綾為褾文錦為帶玉及水晶檀香為軸靖康之變民間多有得者高宗渡江後和議既成𣙜塲購求為多装褫之法已具名畫記及紹興定式兹更不贅姑以所聞見者使賞鑒之士有考焉錦褾克絲作樓閣克絲作龍水克絲作百花攅龍克絲作龍鳯紫寳階地紫大花五色簟文俗呼山和尚紫小滴珠方勝鸞鵲青緑簟文俗呼閣婆又曰蛇皮紫鸞鵲一等紫地紫鸞鵲一等白地紫鸞鵲紫百花龍紫龜紋紫珠燄紫曲水俗呼落花流水紫湯荷花紅霞雲鸞黄霞雲鸞俗呼綘霄其名甚雅青樓閣閣又作臺青大落花紫滴珠龍團青櫻桃皂方團白花褐方團白花方勝盤象毬路衲柿紅龜背樗蒲宜男寳照龜蓮天下樂練鵲方勝練鵲綬帶瑞草八花暈銀鈎暈紅細花盤鵰翠色獅子盤毬水藻戯魚紅徧地雜花紅徧地翔鸞紅遍地芙蓉紅七寳金龍倒仙牡丹白蛇龜紋黄地碧牡丹方勝皂木綾引首及託裏碧鸞白鸞皂鸞皂大花碧花薑牙雲鸞樗蒲大花雜花盤鵰濤頭水波紋仙紋重蓮雙鴈方棋龜子方轂紋鸂䳵􅀥花鑑花疊勝白毛遼國回文金國白鷲花並高麗國贉卷紙高麗蠲夾背蠲揩光軸出等白玉碾龍簮頂或碾花白玉平頂瑪瑙漿水紅金星石珊瑚水晶蠟沉香古玉象牙犀角軸桿檀香木匣螺鈿宋高宗内府皆鈿匣爐鳴至元庚寅冬江浙行省官立僧格沙布迪音輩徳政碑穹窿莫比特闕坐石時趙若晦者素善謟媚因以楊和王墳域所有為言役人夫數千拖拽而至畢工之日是夜省堂中火爐鳴直至昧爽方休嗣是夜以為常又梟鳴梁壓虎入城市越明年春相哥敗諸公俱罹竒禍豈非事有先兆與田夫人劉公復新為上都留守時有令史亢子春者值公退食偶與同列據案判事以戯遂為仇家發之公大怒責問罪状枷項示衆及歸怒容未霽其夫人田氏問公何故不樂公語其故夫人曰此小節耳何足怒也即令人呼亢至請公為脫其枷且勞以酒云此一盃與汝壓驚此一盃與汝慶喜男子大丈夫何所不至留守之位何患不到亢感謝而退不數年公卒而無子止一女適田直長直長遄卒女病雙瞽後亢官湖廣參政迎夫人母子歸沒齒敬養不怠公乃廉訪使劉廷幹之從祖父也嗓大名王和卿滑稽佻達傳播四方中統初燕市有一蝴蝶其大異常王賦醉中天小令云掙破荘周夢兩翅駕東風三百處名園一采一箇空難道風流種諕殺尋芳􅁡蠭輕輕的飛動賣花人搧過橋東由是其名益著時有闗漢卿者亦高才風流人也王常以譏謔加之闗雖極意還答終不能勝王忽坐逝而鼻垂雙涕尺餘人皆歎駭闗來弔唁詢其由或對云此釋家所謂坐化也復問鼻懸何物又對云此玉筯也闗云我道你不識不是玉筯是嗓咸發一笑或戯闗云你被王和卿輕侮半世死後方才還得一籌凢六畜勞傷則鼻中常流膿水謂之嗓病又愛訐人之短者亦謂之嗓故云爾金蓮盃楊鐡崖耽好聲色每於筵間見歌兒舞女有纒足纎小者則脫其鞵載盞以行酒謂之金蓮盃予竊怪其可厭後讀張邦基墨荘漫録載王深輔道雙鳬詩云時時行地羅裙掩雙手更擎春㶑灔傍人都道不須辭儘做十分能幾㸃春柔淺醮蒲萄暖和笑勸人教引滿洛塵忽浥不勝嬌剗蹈金蓮行款款觀此詩則老子之踈狂有自來矣大佛頭宋高宗朝錢塘喻氏出家為沙門名思浄建妙行院於北闕接待供僧三百萬畫阿彌陀佛入於神妙楊侍郎傑賛為喻彌陀人從而稱之浄又於西湖之北鐫石為大佛頭父老相傳云此石乃秦始皇繫纜石盖是時皆浙江耳初無西湖之名始皇將登㑹稽為風浪所阻故泊舟此處揚州白菜揚州至正丙申丁酉間兵燹之餘城中屋址徧生白菜大者重十五斤小者亦不下八九斤有膂力人所負纔四五窠耳亦異譎誕有配天下之事未嘗無配雖譎詐誕妄之談亦有然者松江衛山齋有材譽時庸醫兒孫華孫頗知嗜學山齋因奬予之使得儕於士𩔖山齋既死華孫忽謂人曰嘗夢天使持黄封小合授吾曰上帝有勑以衛山齋聲價畀汝吾受命謝恩而寤華孫才思極遲凡作一詩必數十日乃就則曰吾登溷偶得一聯或又曰枕上得此故人戱贈以詩有浪得詩名索價高及山齋聲價黄封合之句陸居仁每謂人曰吾讀書至得意時見慶雲一朶現家人皆不能覩又一日讀詩集傳有不安處思所以易之忽若夢寐中見尼父拱立於前而呼吾字曰陸宅之朱熹誤矣汝說是也偶與友人之􅃛者言及此友人曰足下得非稟受素弱乎曰何為曰吾見足下眼目眊眩又夢寐顛倒故知其然也居仁慙赧不復辨客來談及拊几大笑命筆識之檢田吏有一老翁如病起破衲􅧑􅆴痩如鬼曉來扶向官道傍哀告行人乞錢米時予奉檄離江城邂逅一見憐其貧倒囊贈與五升米試問何故為窮民老翁答言聽我語我是東鄊李福五我家無本為經商只種官田三十畆延祐七年三月初賣衣買得犁與鉏朝耕暮耘受辛苦要還私債輸官租誰知六月與七月雨水絶無潮又竭欲求一㸃半㸃水却比農夫眼中血滔滔黄浦如溝渠農家争水如爭珠數車相接接不到稻田一旦成沙塗官司八月受災狀我恐徵糧喫官棒相隨鄰里去告災十石官糧望全放當年隔岸分吉凶高田盡荒低田豐縣官不見高田旱將謂亦與低田同文字下鄊如火速逼我將田都首伏只因嗔我不肯首却把我田批作熟太平九月開早倉主首貧乏無可償男名阿孫女阿惜逼我嫁賣陪官糧阿孫賣與運糧户即目不知在何處可憐阿惜猶未笄嫁向湖州山裏去我今年已七十竒饑無口食寒無衣東求西乞度殘喘無因早向黄泉歸旋言旋拭腮邊淚我忽驚慙汗沾背老翁老翁勿復言我是今年檢田吏此𡊮介􅂿災行也是可以為民牧不恤民瘼者之勸介字可潛嘗掾松江盖能以儒術飾吏事者因載之玉鹿盧霍清甫治書云考古圖載古衣服今有玉轆轤玉具劒古樂府曰腰間轆轤劒此器以塊然之璞既觧為環中復為轉闗而上下之隙僅通絲髪作宛轉其間今之名玉工者往往嘆其所未覩按漢雋不疑帶􅀈鑘同具劒晉灼曰古長劒首以玉作井轆轤形上刻木作山形如蓮花初生未敷時今大劒末首其狀如此前說乃宋李公麟之所紀也余昔宦遊錢唐因識吳和之者性慧巧博物收一轆轤玉青色形如吕字環口中間轆轤旋轉無分毫縫罅形色極古人皆以為鬼工因土漬用白梅熬水煮之良乆脫開詳視竅中有雙玉軸在焉中嵌一物形若牛筋意度必是當間煮之胖脹撐塞雙軸入竅闗住所以宛轉無礙年深腐敗縮瘦因而煮脫試用乾牛筋搥實置軸兩間對勘孔竅以線縳定煮之少時雙軸果湧入竅中湏臾取出依前動轉不脫後余亦收一小者狀若旋環製作大約相似後因損折轉軸中亦有一物形似翎桶想亦同一闗捩其玉具劒自三代有之今止以兩漢為始至於宋朝且千餘年未有能窮其轆轤底藴今偶以煮脫乃得其機軸亦云竒矣猴盗夏雪簑云嘗見優人杜生彦明說向自江西回至韶州寓宿旅邸邸先有客曰相公者居焉刺繡衣服琢玉㡌頂而僅皮履生惑具酒肴延欵問以姓名履歴客具答甚悉初不知其為盗也次日客酬讌邀至其室見柱上鎻一小猴形神精狡既而縱使周旋席間忽畨語遣之俄捧一楪至復畨語詈之即易一碗至生驚異詢其故客曰某有婢得子彌月而亡時此猴生旬有五日其母斃於獵犬終日呌號可憐因令此婢就乳之及長成遂能隨人指使兼觧畨語耳生别後至清州留吳同知處忽報客有㩦一猴入城者吳語生云此人乃江湖巨盗凡至人家窺見房室路徑并蔵蓄所在至夜使猴入内偷竊彼則在外應接吾必奪此猴為人除害也明日客謁吳吳欵以飯需其猴初甚拒吳曰否則就此斷其首客不得已允許吳酬白金十兩臨去畨語囑猴適譯史聞得來告呉曰客教猴云汝若不飲不食彼必觧爾縳可亟逃來我只在十里外小寺中伺也吳未之信至晩試與之果核水食之𩔖皆不食急使人覘之此客果未行歸報引猴撾殺之盗有道後至元間盗入浙省丞相府是夕月色微明相於紗帷中窺見之美髭髯身長七尺餘時一侍姬亦見之大呼有賊相急止之曰此相府何賊敢來盖虞其有所傷犯故也縱其自取七寳繫腰金玉器皿席捲而去翼旦責令有司官兵肖形掩捕刻期獲觧沿門搜索終不可得越明年纔於紹興諸暨州敗露掠問其情乃云初至杭寓相府之東相去三十餘家是夜自外大醉歸倒於門外主人扶掖登樓而卧湏臾嘔吐狼籍滿地至二更開樓窓縁房簷進府内脚履尺餘木級面帶優人假髯既得物直攜至江頭置於白塔上復回寓所侵晨邏者至察其人酒尚未醒酣睡正熟且身材侏儒畧無髭髯竟不之疑數日後方攜所盗物抵浙東因此被擒盗亦有道其斯之謂與預知改元省掾李孟容度為余言元統間在都間見一全真先生年五十餘相貎魁偉嘗坐省東茶肆中所言輙有驗因訪其寓所乃在五門外第二橋民家遂以出處叩之全真曰汝仕不在北方且冝南歸四十後方可食禄臨别偶問及時事全真曰此後當改至元至元後改至貞天下亂矣僕曰國初已有至元全真曰汝苐識之僕南還至闗河聞改至元心益信之及改至正則知貞者正也四十後方補饒州府史夫全真之言如燭照數計特不知果何術也豈非至人者乎醉太平小令堂堂大元姦佞專權開河變鈔禍根源惹紅巾萬千官法濫刑法重黎民怨人喫人鈔買鈔何曽見賊做官官做賊混愚賢哀哉可憐右醉太平小令一闋不知誰所造自京師以至江南人人能道之古人多取里巷之歌謠者以其有闗於世教也今此數語切中時病故録之以俟采民風者焉譏省臺集慶失守行御史臺移置紹興路前御史大夫納琳再任時浙省丞相達實特穆爾得便冝行事民間頗言其貪後又以大夫子安安判行樞宻院護臺治大夫之政一聽決於院判有人作詩云舊省新丞相新臺舊大夫大夫聽子語丞相愛金珠又有人大書於臺之門曰包苴賄賂尚公行天下承平徳未能二十四官徒獬廌越王臺上望金陵造物有報復㑹稽陳思可睿云至正丙申御史大夫納琳開行臺於紹興於時慶元慈溪則有縣尹陳文昭本路餘姚則有同知圖卜戬在城則有録事達嚕噶齊穆爾古蘓皆總制團結民義者納琳之子安安以三人為不易制思有以去之乃先紿召圖卜戬至拘於寳林寺夜半率臺軍擒殺之從而方國珍亦執陳文昭沈之海獨存穆爾古蘓一人耳人皆以圖卜戬之死歸罪於穆爾古蘓不能力救殊不知當時之執圖卜戬乃所以擒穆爾古蘓也執圖卜戬之謀出於潘子素子素亦為安安縊諸途執子素之謀出於辛敬所敬所間闗投張士誠客死平江僧舍及拜克代納琳為大夫又不能容穆爾古蘓撾殺於其私第拜克以弟吹斯絅拜中書右相詔入朝既得罪兄弟誅戮家無噍𩔖但未知安安死所耳静而思之若有尸於𠖇𠖇之中者不知造物果如何也鎻鎻回紇野馬川有木曰鎻鎻燒之其火經年不滅且不作灰彼處女取根製㡌入火不焚如火鼠布云葉氏還金葉公政字克明淮隂人行宣政院都事季實之子翰林直學士蟾心之從子也至政甲午公政以浙西幕史奉布延平章檄轉餉鄂閫時丹陽富民束子章先與是役㑹飲於蘄志相合即以兄禮事公政未幾子章起赴沔泣别公政曰弟今濟大江涉重地兄言行篤信願以貲囊相託公政辭弗獲俾子章手緘而為謹蔵之越兩月子章之友朱君譲率其奴來謁曰子章不幸入蓮䑓湖遇盗死矣子章昔寄囊中亦有某物在間欲啓嚢而請之公政曰汝寓物子章未嘗語我子章已矣家固無恙也義必質諸其家明以付汝君讓以公政匿為已有衘之去明年既竣事還坐丹陽驛門要束朱二氏父子啓囊緘得鈔二百五十緡黄金五十兩銀三百兩珠八千枚衣帛有差歸之束氏餘鈔五十緡黄金五兩銀五十兩珠千枚有朱題封歸之朱氏盛具酒饌以謝辭之前翰林院編修膠西張復初嘉公政義為作傳且稱公政㓜知讀書嘗從平章克池之諸縣破蘭溪渠魁徐真一平蘄水寨司輜糧四年無纎芥譴呵平章凡七薦中書不報人謂公侯子孫必復其始天道豈獨逺耶江隂王逢詩曰蘄春肥羊采石酒君為玉昆我金友夜談接膝晝握手乾坤意氣同高厚霜風吹蘆客衣薄濕雲覊鴻飛漠漠蓬忩篝燈照囊槖嗟君逺行感君託蓮臺湖深浪拍銀鷓鴣杜若傷心神天生禍亂有今日誰謂交遊無故人葉郎還金何愧竇禹鈞傅氏死義傅氏紹興諸暨人年十八適同里章瑜瑜為苛吏脅軍興期㑹廹死道上訃至傅氏蒲伏抱屍歸號泣三日猶不忍入櫬屍有腐氣猶依屍呵琀曰冀甦既入棺至嚙其棺成穴及葬投其身壙中母强挽以出制未百日母欲敓志語聞遂大慟連日不食母囑侍婢謹視之閱數日紿婢吾當浴若輩理沐具俟予既而失所在明日婢汲井見二足倒植井中乃傅氏也楊鐡史維楨嘗賛之曰余讀古節婦事至青陵臺及祝英氏以為後無繼者世道降也乆矣今瑜妻乃爾謂世降徳薄者吾信歟夫婦倫與君臣等世之稱臣子者獨不能以瑜妻之義於夫者義其君歟噫武官可笑張氏據有平江日其部將左丞吕珍守紹興參軍陳庶子饒介之在張左右一日陳賦詩饒染翰題一紈扇以寄吕云後來江左英賢傳又是淮西保相家聞說錦袍酣戰罷不驚越女采荷花饒素負書名且詩語俊麗為作者所稱吕俾人讀罷忽大怒曰吾為主人守邉疆萬死鋒鏑間豈務愛女子而不驚之耶見則必殺之又元帥李其姓者杭州庚子之圍解頗著功勞一士人投之以詩將有求焉其詩有黄金合鑄李將軍之句李大怒曰吾勞苦數年止是將軍今年纔得元帥乃復令我為將軍耶命帳下䇿出之右二事雖相傳以為笑亦可因以為戒云鞫獄吳人高伯厚云元統間某吏杭東北録事一日有部民某甲與某乙鬭毆某甲之母勸解被某乙用木棒就腦後一擊仆地而死適某承該檢驗腦骨唇齒皆有重傷某乙招伏繫獄經二載遇赦以非謀殺合宥既得釋放來致謝因言與某甲鬭毆時其母來勸力牽其子之裾手脫仰跌自搕其腦昏絶在地隣里有剪刀挑母唇齒灌藥不甦乃死故腦唇有傷實未嘗持棒擊之也某問何為招伏某乙言倉皇之際惟恐箠楚但欲招承償命弗暇計也鄰里見我已招遂皆不復言矣吁今之鞫獄者不欲研窮磨究務在廣陳刑具以張施厥威或有以𠂻曲告訴者輙便呵喝震怒畧不之恤從而吏隸輩奉承上意拷掠鍛鍊靡所不至其不置人於寃枉者鮮矣使聞伯厚之言寧不知懼乎聖鐡杭州張存㓜患一目時稱張瞎子忽遇巧匠為安一磁睛障蔽於上人皆不能辨其偽至元丙子後流寓泉州起家販舶越六年壬午回杭自言於蕃中獲聖鐡一塊厚濶僅及二寸作法撒沙布地噙鐡於口刀刄不能傷其身後傳聞既廣有烏瑪喇奉使來取試以鐡納於羊口籠其首作法撒沙驗之劒果無所傷去鐡復揮應手首落遂就進呈鬼爺爺元統間杭州鹽倉宋監納者嘗客大都求功名不遂甚至窮窘然頗慎行止不敢非為遂出齊化門求一死所望見水潭將欲投入虚空中有鬼作人聲云宋某陽夀未終不可死也四顧一無所有於是黙黙而回中途拾得一紙帖云宋某可於吏部某令史下某典吏處習學書冩翼日物色之果得其人遂獲進歩再得一帖云汝可求託某人謀請俸禄因依所言一舉而成凡歴俸數十月至於受勑命獲財寳取妻買妾生子育女為富家翁一皆隂𡨕所佑平昔却未嘗覩其形状祗見一矮小影子而已但有所見即便祭獻稱名爺爺忽一日有一帖云我要葉子金一百八十兩索之甚急未免數數祭獻求免因問云爺爺要此何用一帖云我要去揚州天寧寺妝佛也又一夕其妻臂上失去金釧金鐲急告之一帖云在汝第幾􅃗箱内權且付還又一日失去熟羊背皮一帖云我借用了明日當還次日一大綿羊自外走入如此等𩔖甚多不可枚舉及宋受前職鬼亦隨到恐被竊其所有乃令人詣龍虎山求天師符命懸於所寓室内晨興但見一様四十道皆倒懸之莫可辨其真偽及禮請功行法師驅治而壇内牌位顛倒錯亂弗能措手而止又一日鹽倉印信不知所在告之哀切一帖云在汝第四十幾􅃗箱内第幾箇段子下開尋果有時與張大使同寅將印寄於伊家一帖飛告云印信當長官收掌若不送還一棒打碎汝頭也大使驚恐急送還之後有一過路道人詣門偶以始末訴之道人曰我當為汝遣之乃於桃𣗳上砟取朝向東南大枝作一搥一椹便以椹釘東南隅地上囑云每月逢五則擊五下當自絶也後果絶無影響竟不知何等鬼也江隂陳範季模與宋交代所以極知其詳季模盖余友也死䕶文廟胡善字師善紹興諸暨人泰定進士胡一中高第弟子也至正乙未以憲僉趙公舉為松江儒學經師越明年二月苗冦至欲燬孔子廟善坐經席罵冦冦怒殺之廟得免於災先是善以死自許題詩於壁曰領檄來司教臨危要致身及難死果不誣今校官貎其像祀於先賢堂輟耕録卷二十三欽定四庫全書輟耕録卷二十四元陶宗儀撰結交重氣義國初張公可與李公仲方鮮于公伯機同仕于朝既而張除浙省郎中李除都事鮮于除浙東宣慰經歴胥㑹於杭驩甚李卒於官張移書鮮于曰仲方殁矣家貧子㓜吾輩若不為之經紀則孤寡何所依也吾以一女許配其仲子矣公以為何如鮮于聞訃哀祭成禮亦以一女許贅其長子即從善也後官至紹興推官仲子字復初官至淮安總管於此可見前輩結交重義氣不以貴賤貧富易其心誠可敬也張公官至中書左丞帝廷神獸國朝毎宴諸王大臣謂之大聚㑹是日盡出諸獸於萬歳山若虎豹熊象之屬一一列置訖然後獅子至身才短小絶𩔖人家所畜金毛猱狗諸獸見之畏懼俯伏不敢仰視氣之相壓也如此及各飼以雞鴨野味之𩔖諸獸不免以爪按定用舌去其毛羽惟獅子則以掌擎而吹之毛羽紛然脫落有若燖洗者此其所以異於諸獸也古云獅子吼盖不易於吼一吼則百獸為之辟易也勾䦨壓至元壬寅夏松江府前勾欄隣居顧百一者一夕夢攝入城隍廟中同被攝者約四十餘人一皆責状畫字時有沈氏子以搏銀為業亦夢與顧同鬱鬱不樂家人無以紓之勸入勾欄觀排戯獨顧以宵夢匪貞不敢出門有女官奴習嘔唱毎聞勾欄鼓鳴則入是日入未幾棚屋拉然有聲衆驚散既而無恙復集焉不移時棚阽壓顧走入抱其女不謂女已出矣遂斃於顚木之下死者凡四十二人内有一僧人二道士獨歌兒天生秀全家不損一人其死者皆碎首折脇斷筋潰髓亦有被壓而幸免者見衣朱紫人指示其出不得出者亦曲為遮䕶云鵓鴿傳書顔清甫曲阜人顔子四十八代孫嘗卧病其㓜子偶彈得一鵓鴿歸以供膳於梢翎間得書一緘書上題云家書付男郭禹開拆禹乃曲阜縣尹郭仲賢也盖其父自真定寄至者時仲賢改授逺平縣尹去鴿未及知盤桓尋覔遂遇害清甫見之責其子便取木匣函鴿候病稍愈直抵仲賢官所獻書與鴿且語其故仲賢戚然曰畜此鴿已十七年矣凡有家書雖隔數千里亦能傳致誠異禽也命左右瘞之以清甫長厚君子留之累日商及子弟出處清甫告言長子國祥頗習儒業及仲賢知霍州召補州史貢山東廉訪奏差陞書吏後官至漢中廉訪使待士鄙吝嘉興林叔大鏞椽江浙行省時貪墨鄙吝然頗交接名流以沽美譽其於達官顯宦則刲羔殺豕品饌甚盛若士夫君子不過素湯餅而已一日延黄大癡作畫多士畢集而此品復出捫腹濶歩譏謔交作叔大赧甚不敢仰視遂揖潘子素求題其畫子素即書一絶句云阿翁作畫如說法信手拈來種種佳好水好山塗抹盡阿婆臉上不曾搽大癡笑謂曰好水好山言達官顯宦也阿婆臉不搽言素面也言未己子素復加一句云諸佛菩薩摩訶薩俱不解其意子素曰此謝語即僧家懴悔也閧堂大笑而散叔大數日羞出見客人之鄙吝一至於此亦可憐已陳公子陳雲嶠栢泗州人性豪宕結客其祖平章故宋制置即龍麟洲題琵琶亭以譏之者凡積金七屋不數年散盡嘗為侍儀舍人館閣諸老朝省名公莫不折輩行與交咸稱之曰公子其妻銕太保女也恃富貴近戚偶以一言驕之遂終身不見嘗被命監鑄祭器於杭無錫倪元鎮慕其名來見之張燕湖山間羅設甚至酒終為别以一帖饋米百石雲嶠命從者移置近所舉巨觥引妓樂騶從者而前悉分散之顧倪曰吾在京時即熟爾名云南士之清者它無與比其所以章章者盖以米沽之也請從今日絶交且罵諸嘗譽之者時張伯雨在坐不勝跼􅐲其豪氣𩔖如此嘗雪中騎牛拜米南宫墓詩云少年不解事買駿輕千金何如小黄犢踏雪空山深小小雙牧童吹笛穿松林醉拜南宫墓地下有知音言世上無知音也平日喜居錢唐好古有餘而治才不足又不樂小官怒罵宰相年逾六十不得志而死其畢命時作偈云前身本是泗州僧漢魏正閏霍治書云紫陽楊煥然先生讀通鑑至論漢魏正閏大不平之遂修漢書駁正其事因作詩云風煙慘淡駐三巴漢燼將燃蜀婦髽欲起温公問書法武侯入冦冦誰家後攻宋軍㢠廻始見通鑑綱目其書乃寢順徳劉道濟先生尤不平之修書名三為亦見綱目閟而不行中統改元陵川郝伯常先生使宋被留儀真埶不得還就買書作續漢史既脫藁㑹同僚茍正甫諸公飲至數行忽長嘆曰某辛苦十餘年莫不被高頭巾輩已做了也皆對云不聞之至元丁亥予分臺江西購得蕭常續漢書全部因喟然曰惜乎郝君不及見此剛夘剛夘者按許慎說文㱾音開改大剛昴以逐鬼也玉篇開改剛夘大印以辟鬼也廣韻㱾改大開堅也王莽傳服䖍注曰剛夘以正月夘日作佩之長三寸廣一寸四分或用玉或用金或用桃著佩之又注當中央從穿作孔以綵絲葺其底刻其上文曰正月剛夘既央靈殳四方赤青白黄四色是當帝令祝融以教䕫龍庶疫剛癉莫我敢當又曰疾日嚴夘帝令䕫化順爾固伏化兹靈殳既正既直既觚既方庶使剛癉莫我敢當凡六十六字㱾改者佩印也以正月夘日作故謂剛夘又謂之大堅以辟邪也金刀之利者皆不得行服䖍曰剛夘以正月夘日作佩之長三寸廣一寸四方或用金或用桃著革帶佩之今有玉在者銘其一面曰正月剛夘金刀莽所鑄之錢也晉灼曰剛夘長一寸廣五分四方當中央従穿作孔以綵絲葺其底如冠纓頭㽔刻其上面作兩行書文曰正月剛夘既央靈殳四方云云同前其一銘曰疾日嚴夘帝今䕫化順爾故一作固伏化兹靈殳云云同前師古曰今往往於土中得玉剛夘者按大小及文服說是也莽以劉字上有夘下有金旁又有刀故禁剛夘及金刀也博謀卿士僉曰天人同應昭然著明其去剛夘莫以為佩除刀錢勿以為利承順天心快百姓意乃更作小錢徑六分重一銖文曰小錢直一與大泉五十者為二品並行後漢輿服志佩雙印長寸二分方六分乘輿諸侯及王公列侯以白玉中二千石以下至四百石皆以黒犀三百石以至私學弟子皆以象牙上合絲乘輿以縢貫白珠赤罽㽔諸侯王以下以槂赤絲㽔縢槂各如其印質刻書曰正月剛夘既決云云同前慎爾周伏化兹靈殳云云同前凡六十六字前書注云正月剛夘作霍治書清甫云嘗於吳中得白玉剛嚴雙印四枚完具者二剛夘銘詞三十四字嚴夘銘詞三十二字其二字筆畫損缺剛夘無既央二字餘十字難辯嘗考王莽傳輿服志說文剛夘銘與說文及王莽傳同輿服志央為決嚴夘疾日為曰疑志誤又順爾故化伏與莾傳同說文作慎爾國化伏輿服志作填爾周化伏未詳孰是其服用制度逓相引據亦不同後見徐容齋叅政藏剛夘一梁貢父尚書蔵剛嚴二並係古玉體剛夘銘三十四字字畫亦損缺制度銘詞與前雙印大約不異續收嚴夘二一以玉為之一若琴瑟俗傳葛仙翁煉丹頭又名藥注子其文曰制曰嚴夘帝命莫忘日資唯是黒青白黄既正既直既觚既方庶使罔談莫我敢當與前嚴夘銘詞並差鮮于伯機經歴收一枚高彦敬尚書收二枚並真楷書皆似近代制作未見所出偶得金陵學宫所刻黄山谷先生辯剛夘遺蹟其說與前相同但云槂絲繩也音護古文無此字按五紐繩器也􅀢兎罟也豈紉絲繩與兎罟相𩔖故同此音耶又馬永鄉􅈸真子録云漢人以正月卯日作佩之銘其一面曰剛夘乃知今人立春或戴春勝亦古制也盖剛者強也夘者劉也正月佩之尊國姓也與陳湯所謂強漢者同義倜儻好義顧仲庸泰州人以財雄一鄉倜儻好義有古豪俠風自奉甚薄而禮賢養士無虚日名公鉅儒多館其家張蛻菴承㫖亦其人也仲庸與保定張文友交文友嵊縣尹秩滿僑居江隂一日暴卒時仲庸留京師友人以訃告戒勿泄友詢其故曰文友賢而貧在六品選人中吾將與其子為地即走告當路者曰張文友已疾病矣願致仕因代入状中書遂獲以奉政大夫嘉定知州致仕既領宣命數月又代文友之子告廕尋注常州晉陵縣尉便其養母也其家悉無所知仲庸南歸遣人致賻奠奉宣勑以授其子聞者驚嘆仲庸行事𩔖如此道士夀函㑹稽陽明洞天在秦望山後禹廟之西南云即古禹穴越之勝境也諸峯環聳盤鬱空曲中有東嶽行祠及老子宫余嘗宿留其間一老道士者朱顔鶴髪延至其室室横一空棺云已十餘年矣未能即棄浮世而入此匣也其後兵攻越城遊騎四出道士乃沭浴冠佩絶粒飲與衆永訣卧於其中七日不死軍至發棺挈之出兵退乃入城一病而卒向之棺不可得矣豈非分定歟餛飩方喬公仲山官吏部郎中好古博雅仍喜諧謔所交皆名人才士公家製餛飩得法常苦賔朋需索一日於毎客前先置一帖且戒云食畢展卷既而取視乃製造方法也大笑而散自後無復言矣精塑佛像劉元字秉元薊之寳坻人官至昭文館大學士正奉大夫祕書監卿元嘗為黄冠師事青州杞道録傳其藝非一而獨長于塑至元七年世祖建大護國仁王寺嚴設梵天佛像特求竒工為之有以元薦者及被召又從阿納噶木國公學西天梵相神思妙合遂為絶藝凡兩都名刹有塑土範金摶換為佛一出元之手天下無與比所謂摶換者漫帛土偶上而髹之已而去其土髹帛儼然像也昔人嘗為之至元尤妙摶丸又曰脫活京師語如此繆孝子繆孝子倫字叔彛東平人侍父宦遊寓居錢唐至正十六年淮兵冦城執其父將殺之倫哀號乞免弗聽傾家貲以贖又弗聽乃自縳請代於是殺倫而釋其父甚哉賊之不仁也趙孝子趙孝子天爵字伯廉平陽解州夏縣人嘗為吏多平反惇行孝弟治家甚嚴三子皆頎然玉立母喪廬墓三年父繼喪又如之惟蔬食菜羮不飲酒食肉不與妻妾見有司以聞于朝旌表其門閭復其身王義士王義士天爵字仁傑亦夏縣人家饒於財有善行以粟貸人不圖重息年豐僅取十之二三稍饑但收其本大凶則皆已之鄉里不知字咸稱義士云每值生身之辰寝苫一月以報父母木氷朝廷於歳首例遣使祭嶽瀆至正乙巳翰林應奉李國鳯代祀嵩恒醫無閭抵汴路閉即城中望祭嵩嶽時閏月下旬也二月十三日游相國寺池上羣僧方聚觀從之仰視日旁一月一星月如初弦者又十日雨木氷状如樓閣人物冠帶鳥獸卉木百態具備殆非人工高林大𣗳珠葆羽幢彌望不絶凡五日始解又十日復氷自汴至中灤皆然不一歳盗䧟汴據之龍湫獻靈額齊訥路在西北方有山曰蹇占山北多龍湫土人欲有所事則投之吉安道士劉學仙嘗至其地見有烹羔桐酪祠焉數皮而沈之祝曰神為我鞣而治之為期而去至期復祠之則得成革矣若有曰􅄦工然不可測也歸語於虞邵菴先生先生初以為誑及質諸其土人之在京師者則始信盖其人習以為常不以為異耳王一山杭州屬邑有一巨室怙財挾勢虐害良善邑官貪墨莫敢誰何衆不可堪走訴憲府巨室逃匿憲使怒督責有司示罪賞揭大逵且家至壁白𨼆蔵者罪連坐首捕者賞萬緡其友人王一山者世業儒居湖山第一樓幬彼於宻期月不發隣家察知圖給賞錢告報於官官搜索得之倂王逮繫囚見憲使使問云女知彼所犯乎王曰知之女聞國有制乎曰知之女見揭示罪賞乎曰見之女奚不就利避害乎曰朋友顛連來奔乘其危以售之則名教中有所不容某誠弗忍為事覺連坐乃甘心焉使竦然曰君子所謂臨難毋茍免其人踐之矣真義士也若加以罪是吾政苛而刑濫民何以勸遂釋之使即許文正公子也誤墮龍窟徐彦璋云商人某海舶失風飄至山島匍匐登岸深夜昏黑偶墜入一穴其穴險峻不可攀縁比明穴中微有光見大蛇無數蟠結在内始甚懼乆稍與之狎蛇亦無吞噬意所苦飢渴不可當但見蛇時時䑛石壁間小石絶不飲㗖於是商人亦漫爾取小石噙之頓忘饑渴一日聞雷聲𨼆𨼆蛇始伸展相繼騰升纔知其為神龍遂挽蛇尾得出附舟還家攜所噙小石數十至京城示識者皆鴉鶻等寳石也乃信神龍之窟多異珍焉自此貨之致富彦璋親見商人道其始末如此雞司晨有凖嘗至松江鍾山浄行菴見籠一雄雞置於殿之東簷請問其故寺僧云蓄此以司晨盖十有餘年矣時刻不爽余竊記張公文潛明道雜志云雞能司晨見於經傳以為至論而未必然也或天寒雞􅈸至將旦而未鳴或夜月出時隣雞悉鳴大抵有情之物自不能有常而或變也若然則張公之言非歟因舉似以詢其所以僧云司晨之雞必以童若壞其天真豈能有常哉盖張公特未知此理故耳黄道婆閩廣多種木棉紡績為布名曰吉貝松江府東去五十里許曰烏泥涇其地土田磽瘠民食不給因謀𣗳藝以資生業遂覔種於彼初無踏車椎􅃓之製率用手剖去子線弦竹弧置按間振掉成劑厥功甚艱國初時有一嫗名黄道婆者自崖州來乃教以做造捍彈紡織之具至於錯紗配色綜綫挈花各有其法以故織成被褥帶帨其上折枝團鳳棋局字様粲然若寫人既受教競相作為轉貨他郡家既就殷未幾嫗卒莫不感恩灑泣而共葬之又為立祠歳時享之越三十年祠毁鄉人趙愚軒重立今祠復毁無人為之創建道婆之名日漸泯滅無聞矣天隕魚至正丙午八月辛酉上海縣浦東俞店橋南牧羊兒三四聞頭上恰恰有聲仰視之流光中隕一魚剌麻佳上成二創其状不常見自首至尾根僅盈尺似濶覇而短是日晴無隂雲亦無鵰鸛之𩔖是可怪也日昳時縣市人閧然指流星自南投北即此時也橋下一細家取欲烹食其妻鹽而藏之來者多就觀焉或者曰志有云天隕魚人民失所之象十二生子至元丁丑民間謠言拘刷童男女以故㛰嫁不問長㓜而亂倫者多矣平江蘇達卿時為上海吏有女年十二贅里人浦仲明之子為壻明年生一子劉節婦劉節婦泰州坂埨人至正丙申春隨父渡江居吳門適張士誠部將曹某方數月夫陣亡劉不避凶險躬至死所求得其屍歸葬欲以身殉父不許既而權貴人聞劉美且賢爭欲強委禽焉劉誓死不貳遂削髪為比丘尼夫劉本一閭閻女子其操行乃爾盖有貴為后妃而莫之及者謂非天性也歟歴代醫師三皇僦貸季天師岐伯鬼臾區少師少俞伯高桐君太乙雷公馬師皇五帝巫咸伊尹周巫彭矯氏俞氏盧氏醫緩醫竘文摯醫和范蠡鳯綱秦長桑君李豹神應王扁鵲子陽安期先生太醫令李􅀈崔文子西漢樓䕶元里公楊慶公孫光秦信太倉公淳于意王遂宋邑馮信高期王禺唐安杜信俗東漢張機仲景郭玉程高涪翁沈建張伯祖杜度魏沉淮南子蜀漢李譔唐慎微韓保昇孟昶魏華佗李當吳普青牛道士封君達樊阿韓康吳吕博負局先生董奉西晉王叔和李子豫仰道士殷仲堪李法存皇甫謐𤣥晏先生張苗裴頠裴顗劉徳史脫宫泰靳邵張華蔡謨趙泉阮徳東晉葛洪抱朴子范汪程據南宋少主元微王纂胡洽徐熙秋夫徐道度秋夫長子徐叔嚮道度弟薛伯宗徐仲融徐文伯徐嗣伯僧深劉涓子羊晰秦承祖南齊張子信馬嗣明張逺遊北齊顧歡李元忠李宻崔季舒祖挺禇澄鄧宣文顔光禄龍𣗳王菩薩徐之才徐林卿之才長子徐同卿林卿弟梁貞白先生蘇恭陶𢎞景後魏王顯徐謇徐雄謇長子後周徐之範杜善方隋徐敏齋許智蔵巢元方楊善唐金元起真人孫思邈許𦙍宗宋俠藥王韋慈蔵甄權甄立言王氷啓𤣥子張文仲孟詵蘭陵處士蕭炳李䖍縱楊𤣥操𤣥珠先生楊損之王方慶秦鳴鶴許孝宗陳士良李含光張鼎陳蔵器五代日華子宋趙從古謝復古劉温舒朱肱無求子孫用和紀天錫劉元賔通真子翟煦宋道方許叔微王從藴吳復圭張泂曹孝忠林億秦宗古丁徳用賈祐蘇頌朱有章劉禹錫初虞世道士馬志寵安時孫兆王惟一王光祐蔣淮安自良張素陳遇明劉翰金成無已何公務劉守真侯徳和張子和馬守素楊從政李道源張元素㓗古老人𡊮景安輟耕録卷二十四欽定四庫全書輟耕録卷二十五元陶宗儀撰論秦蜀秦皇坑儒武侯相漢未有置異議於其間者偶讀宋蕭森希通録及俞文豹吹劒録而得其說可采森曰李斯曰非博士官所職天下敢有藏詩書百家語者皆詣守尉雜燒之則是天下之書雖焚而博士官猶有存者惜乎入關收圖籍而不及此竟為楚人一炬耳前輩嘗論之但坑儒一事未有究極之者僕按史書所坑特侯生盧生四百六十餘人非能盡坑天下儒者為其所坑又非儒者何以知之始皇三十二年使盧生求羡門刻碣石門壊城郭決通隄防又盧生入海還因奏録圖書曰亡秦者胡也始皇乃遣蒙恬發兵三十萬人北伐匈奴起臨洮築遼水又盧生說始皇曰日方中人主時為微行以辟惡鬼惡鬼辟真人至願上所居宫毋令人知然後不死之藥始可得也其後建阿房宫千間萬落必自此言發之觀其二事皆盧生稔其惡又縱臾之特方伎之流耳豈所謂儒者哉始皇因封禪之議謗口紛紛已懐殺意及其一怒而坑之或者天理之不容方其求藥海上也則挾童男童女以行皆取於民間奪其無告之孤肆厥不軌之状如今所謂妖教竊其中死無辜者多矣此一罪也因亡胡之䜟興北伐之師築長城斷地脉南北生靈因是役而死者不可勝算骸積如山血流成川調發頻仍剥及閭左原始要終誰生厲階此二罪也獻辟鬼之術覬真人之來咸陽宫觀二百七十􅃨道相連有言其所幸之處者罪死梁山之上其語一泄時在旁者盡殺之自是莫知行之所在此三罪也有一於此罪不容於死况兼有之以四百六十餘人之坑償萬人之命良不為過天網恢恢䟽而不漏真可畏哉始皇曰盧生等吾尊賜之甚厚今乃誹謗我諸生在咸陽者吾使廉問或為妖言以亂黔首於是使御史按問諸生傳相告引僕亦信盧生非吾儒中人况始皇自謂尊賜甚厚豈非如前三者方術圖䜟之類有以中其欲故尊賜之初不聞其誦孔子之言以進古今相承皆曰坑儒盖惑於扶蘇之諫扶蘇曰諸子皆誦法孔子皇上皆重法繩之臣恐天下不安嗚呼至若盧生者何嘗誦法孔子自扶蘇言之誤使儒者蒙不韙之名自我一洗亦萬世之快也不然如兩生四皓伏生之流鴻飛冥冥弋人何慕肯揺唇鼓吻自投於䧟穽哉僕故曰盧生四百六十餘人皆方伎之士也天下之大所謂儒者固不止此其坑之者此而已矣有道之士秦不能坑火德一炎兩生以講禮聞四皓以羽翼之功聞伏生以口授古書聞豈非天夀其脉留此數公以見吾儒不可磨滅而朋姦黨惡小人終不能為長乆計商君以變法禍秦竟遭車裂盧生以方伎禍秦坑於咸陽其罪等也天其或者假手於秦歟商君裂矣盧生坑矣而秦以不祀抑亦自相擠䧟之明報而禍淫之道為不偏矣僕惡夫坑儒之名故論其顛末如此文豹曰古今論孔明者莫不以忠義許之然余兄文龍嘗考其顛末以為孔明之才謂之識時務則可謂之明大義則未也謂之忠於劉備則可謂之忠於漢室則未也其說有四一者備雖稱為中山靖王之後然其服屬疏逺世數難攷温公謂猶宋高祖自稱楚元王後故通鑑不敢以紹漢統况備又非人望之所歸周瑜以梟雄目之劉巴以誰人視之司馬懿以詐力鄙之孫權以猾虜呼之亮獨何見而委身焉藉使以為劉氏族屬然獻帝在上猶當如光武之事更始東征西伐一切聽命焉可也二者備之枉駕草廬也始謀不過曰主上蒙塵孤不度德量力欲伸大義於天下其辭甚正其志甚偉自亮開之以跨荆益成覇業之利而備之志向始移無復以獻帝為念由建安舉兵以來二十四年天子或都許或居長安或幸洛陽宫室煨燼越在籬􅁄間備未嘗使一介行李詣行在所今年合衆萬餘明年合衆三萬未嘗一言禀命朝廷而亮亦未嘗一談及焉盖其帝蜀之心已定於草廬一見之時矣三者曹操欲順流東下求救於吳無一言及獻帝而獨說以鼎足之說夫鼎足之說始於蒯通然通之說韓信以此猶有漢之一足當三國時而為是說則獻帝無復染指之望矣頼周瑜漢賊之罵足以激怒孫權故能成赤壁之勝若亮若備何以厲將士之氣服曹操之心哉荆楚之士從之如雲非從備也乃從漢也四者備之稱王漢中則建安二十四年也獻帝在上而敢於自王及稱帝武擔則聞獻帝之遇害也亮不能如董公說高祖率三軍為義帝縞素仗大義連孫吳聲罪討賊乃遽乘此即帝位而反鋒攻吳晉文公有言父死之謂何又因以為利故費詩以為大敵未克便先自立恐人心疑惑而諫以高祖不敢王秦之事亮反怒而黜之夫以操之姦雄其王其公猶必待天子之命荀彧且以此憤死以丕之簒逆亦必待獻帝之禪楊彪且不肯臣之備雖稱宗室而亦臣也何所禀命而自王自帝固方嘵嘵以興復漢室為辭不知興復漢室為獻帝耶為劉備耶亮即有心於帝備矣萬一果能興復將置獻帝於何地出師一表雖忠誠懇懇特忠於所事耳其於大義實有所未明也管仲樂毅之事君子所羞道者以其但知有燕齊而不知有王室也亮乃以管樂自許宜其志慮之所圖囘功業之所成就止於區區一蜀耳或者但為備劉氏宗也備帝蜀則漢祚存矣亮忠於備即忠於漢矣吁無獻帝則可有獻帝在而君臣自相推戴則赤眉之立盆子亦有辭於世矣春秋之末諸侯爭强周室微弱孔子無一日不以尊王為心若如亮之見則魯同姓也亦可奉之為王矣天下後世惟持此見故於亮之事無敢置異議於其間文中子曰通也敢忘大皇昭烈之懿識孔明公瑾之盛心噫漢之君既稱獻帝魏之君又稱武帝吳之君又稱大皇帝蜀之君又稱昭烈皇帝天無二日民無二王一天下而四帝並立可乎通之見如此宜其為續書之僣也余兄嘗以是說取解於同文館院本名目唐有傳竒宋有戯曲唱諢詞說金有院本雜劇諸公調院本雜劇其實一也國朝院本雜劇始釐而二之院本則五人一曰副淨古謂之參軍一曰副末古謂之蒼鶻鶻能擊禽鳥末可打副淨故云一曰引戯一曰未泥一曰孤裝又謂之五花㸑弄或曰宋徽宗見㸑國人來朝衣裝鞵履巾裹傅粉墨舉動如此使優人效之以為戯又有燄叚亦院本之意但差簡耳取其如火燄易明而易滅也其間副淨有散說有道念有筋斗有科汎教坊色長魏武劉三人鼎新編輯魏長於念誦武長於筋斗劉長於科汎至今樂人皆宗之偶得院本名目載于此以資博識者之一覽和曲院本月明法曲鄆王法曲燒香法曲送香法曲上墳伊州澆花新水熈州駱駝列良嬴府病鄭逍遥樂四皓逍遥樂四酸逍遥樂賀貼萬年歡􅀈廪降黄龍列女降黄龍上皇院本壺春堂太湖石金明池戀鰲山六變妝萬歲山打草陣賞花燈錯入内問相思探花街斷上皇打毬㑹春從天上來題目院本栁絮風紅索冷墻外道共粉淚楊栁枝蔡消閒方偷眼呆太守畫堂前夢周公梅花底三笑圖窄布衫呆秀才隔年期賀方囘王安石斷三行競尋芳􅀟打梨花院覇王院本悲怨覇王范增覇王草馬覇王散楚覇王三官覇王補塑覇王諸雜大小院本喬記孤旦判孤計算孤􅀟判孤百戯孤哨􅥦孤燒棗孤孝經孤菜園孤貨郎孤合房酸麻皮酸花酒酸狗皮酸還魂酸别離酸王纒酸謁食酸三揲酸哭貧酸揷撥酸酸孤旦毛詩旦老孤遣旦纒三旦禾哨旦哮賣旦貧富旦書櫃兒紙襴兒蔡奴兒刴毛兒喜牌兒卦册兒繡篋兒粥碗兒似娘兒卦鋪兒師婆兒教學兒雞鴨兒黄丸兒稜角兒田牛兒小丸兒醜奴兒病襄王馬明王閙學堂閙浴堂寛布衫泥布衫趕湯瓶紙湯瓶閙旗亭芙蓉亭壊食店閙酒店壊粥店荘周夢花酒夢蝴蝶夢三出舍三入舍瑶池㑹八仙㑹蟠桃㑹洗兒㑹藏􅍐㑹打五臟蘭昌宫廣寒宫閙結親倦成親强風情大論情三園子紅娘子太平還鄉衣錦還鄉四論藝殿前四藝競敲門都子撞門呆大郎四酸擂問前程十様錦長慶館癩將軍兩相同競花枝五變妝洪福無疆白牡丹赤壁鏖兵窮相思金壇謁宿調􅀟漸官吏不和閙巡鋪判不由己大勘刀同官不睦閙平康趕門不上賣花容同官賀授無鬼論四酸諱偌閙䙀闌􅀟藥盤街閙文林四國來朝雙捉壻酒色財氣醫作媒風流藥院監法童漁樵問話鬬鵪鶉杜甫遊春鴛鴦簡四酸提猴滿朝歡月夜聞箏鼓角將閙芙蓉城􅀟鬬醫張生煑海賖饅頭文房四寳謝神天陳橋兵變􅀟揭榜矇啞質庫􅀟福神院公狗兒告和來佛印燒猪酸賣徠琴劒書箱花前飲五鬼聽琴白雲菴迓鼓二郎壊道塲獨脚五郎賣花聲進奉伊州錯上墳醫五方打五鋪拷梅香四道姑隔簾聽硬行蔡義養娘􅥦師姨論秋蟬劉盼盼墻頭馬上刺董卓鋸周朴四柏板大論談撁龍舟擊梧桐渰藍橋入桃園􅀟防送海棠春香藥車四方和九頭頂閙元宵趕村禾眼藥孤兩同心更漏子隂陽孤提頭巾三索債防送哨偌賣旦是耶酸怕水酸囘囘梨花院晉宣成道記院么海棠軒海棠園海棠怨海棠院魯李王慶七夕再相逢風流壻王子端捲簾記紫雲迷四季張與夢孟楊妃女状元春桃記粉墻梨花院妮女梨花院龐方温道德經大江東注吳彦舉不抽關不掀簾紅梨花玎璫天賜暗婣縁諸雜院㸑閙夾棒六么閙夾棒法曲望瀛法曲分拐法曲送宣道人歡逍遥樂打馬鋪撦綵延夀樂諱老長夀仙夜半樂打明星歡呼萬里山水日月集賢賔打三教打白雪歌地水火風夜深深三磕胞佳景堪遊琴棋書畫喜遷鶯刴草鞋大公家教十五郎滕王閣閙八妝春夏秋冬風花雪月上小樓衮頭子噴水胡僧汀注論語恨秋風鬼㸃偌詩書禮樂論語謁食下角瓶大醫淡再遊恩地累受恩深送羮湯放火子擂鼓孝經香茶酒果船子和尚四不犯徐演黄河單兠望梅花皇都好景四偌大提猴雙聲疊韻上皇四軸畫三偌一卜調猿卦鋪倬刀饅頭河轉迓鼔背箱伊州酒樓伊州簑衣百家詩埋頭百家詩偷酒牡丹香雪詩打樊噲抹麫長夀仙四偌賈諢四偌祈雨松竹龜鶴王母祝夀四偌抹紫粉四偌劈馬樁截紅閙浴堂和燕歸梁蘇武和番羮湯六么河陽舅舅偌請都子雙女賴飯一貫質庫兒私媒質庫兒清朝無事豐稔太平一人有慶四海民和金皇聖德皇家萬歲背鼓千字文變龍千字文􅀈盒千字文錯打千字文木驢千字文埋頭千字文講來年好講聖州序講樂章序講道德經神農大說藥食店提猴人參腦子㸑斷朱温㸑變二郎㸑講百果㸑講百花㸑講蒙求㸑講百禽㸑講心字㸑變栁七㸑三跳澗㸑打王樞宻㸑水酒梅花㸑調猿香字㸑三分食㸑煎布衫㸑賴布衫㸑雙揲紙㸑謁金門㸑跳布袋㸑文房四寳㸑開山五花㸑衝撞引首打三十打謝樂打八哥錯打了錯取兒說狄青憨郭郎枝頭巾小閙摑鶯哥猫兒大陽唐小陽唐歇貼韻三般尿大驚睡小驚睡大分界小分界雙鴈兒唐韻六貼我來也情知本分喬捉蛇鐺鍋釜竈代元保母子御頭觜苗兒山梨柿子打淡的一日一箇村城詩胡椒雖小蔡伯喈遮截架解窄磚兒三打歩穿百倬盤榛子四魚名四坐山提頭帶天下樂四怕水四門兒說古人山麻稭喬道塲黄風蕩蕩貪狼觀通一母串梆子拖下來啞伴哥劉