  - {type: variant, offset: 6, length: 0, content: '', WYG: 轉揺欠遏透歌之節奏停聲待拍偷吹拽棒字真句篤依腔貼調凡歌一聲聲有四節起末過度揾簮攧落凡歌一句句有聲韻一聲平一聲背一聲圓聲要圓熟腔要徹滿凡一曲中各有其聲變聲敦聲抗聲啀聲困聲三過聲偷氣取氣換氣歇氣就氣愛者有一口氣歌聲變件三臺破子遍子攧落實催全篇尾聲賺煞隨煞隔煞羯煞本調煞拐子煞三煞十煞唱曲門户小唱寸唱慢唱壇唱歩虚道情撒鍊帶煩瓢呌唱曲題目曲情鐡騎故事采蓮擊壤叩角結席添夀宫詞采詞花詞湯詞酒詞燈詞江景雪景夏景冬景秋景春景凱歌櫂歌漁歌挽歌楚歌杵歌歌之所桃花扇竹葉尊柳枝詞桃葉怨堯民鼓腹壯士擊節牛童馬僕閭閻女子天涯遊客洞裏仙人閨中怨女江邊商婦塲上少年闤闠優伶華屋蘭堂衣冠文㑹小樓狹閣月館風亭雨窓雪屋柳外花前凡聲音各應律吕分六宫十一調共十七宫調仙吕宫唱清新緜邈南吕宫唱感嘆傷悲中吕宫唱高下閃賺黄鍾宫唱富貴􅅶緜正宫唱惆悵雄壯道宫唱飄逸清幽大石唱風流藴藉小石唱旖旎嫵媚高平唱條物滉漾般渉唱拾掇坑塹歇指唱急併虚歇商角唱悲傷宛轉雙調唱健棲激裊商調唱悽愴怨慕角調唱嗚咽悠揚宫調唱典雅沉重越調唱陶寫泠笑有子母調有姑舅兄弟有字多聲少有聲少字多所謂一串驪珠也比如仙吕㸃絳唇大石青杏兒人喚作殺唱的劊子有愛唱的有學唱的有能唱的有㑹唱的有高不揭低不咽有排字兒打截兒放指兒唱意兒有明掯兒暗掯兒長掯兒短掯兒碎掯兒有一曲入數調者如啄木兒女冠子抛毬樂鬭鵪鶉黄鶯兒金盞兒之類是也凡唱曲有地所東平唱木蘭花慢大名唱摸魚子南京唱生查子彰徳唱木斛沙陜西唱陽關三疊黒漆弩凡唱所忌子弟不唱作家歌浪子不唱及時曲男不唱艶詞女不唱雄曲南人不唱北人不歌凡人聲音不等各有所長有川嗓有堂聲皆合破簫管有唱得雄壯的失之村沙唱得藴拽的失之乜斜唱得輕巧的失之寒賤唱得本分的失之老實唱得用意的失之穿鑿唱得打稻的失之本調凡唱節病有困的灰的涎的呌的大的有樂官聲撒錢聲拽鋸聲猫呌聲不入耳不著人不徹腔不入調工夫少徧數少歩力少官塲少字様訛文理差無叢林無傳授嗓抝劣調落架漏氣凡唱聲病散散焦焦乾乾冽冽啞啞􅀈􅀈尖尖低低雌雌雄雄短短憨憨濁濁赸赸格嗓囊鼻揺頭歪口合眼張口撮唇撇口昻頭咳𠻳凡添字病則他兀那是他家俺子道我不見兀的不呢一條弓唇撒了一片子團圞子茄子了大忌鄭衛之淫聲續雅樂之後絲不如竹竹不如肉以其近之也又云取来歌裏唱勝向笛中吹}
