去多納克泣拜主婦曰棄主貨全主命權也妾受命主鑰貨今失貨而全身非義也請從此死遂自殺時人莫不稱之曰義烈義烈云龍廣寒龍廣寒江西人移居錢唐挾預知之術游湖海間咸推為異人或謂專持寂感報耳秘呪故爾寂感即俗所謂萬回哥哥之師號也釋氏傳燈録師姓張九嵗乃能語兄戌安西父母遣問訊朝往夕返以萬里而回號萬回又䕶法論虢州閿鄉張萬回法雲公者生於唐貞觀六年五月五日有兄萬年乆征遼左相去萬里母程氏思其信音公早晨先母而徃至暮持書而還䕶法論乃宋無盡居士張商英譔必有所據按此則師之靈通容有之廣寒又行服氣導引之法常佩小龜十數於身至晩仍解飼之事母至孝六月一日母生辰方舉觴為夀忽見北窓外梅花一枝盛開人皆以為孝行所感士大夫遂稱之曰孝梅贈詩者甚多惟張菊存一篇最可膾炙曰南風吹南枝一白㸃萬緑嵗寒誰知心孟宗林下竹至治初間廣寒卒時年百有八嵗猶童顔緑髮云夜航船凡篙師於城埠市鎮人煙湊集去處招聚客旅裝載夜行者謂之夜航船太平之時在處有之然古樂府有夜航船曲皮日休詩有明朝有物充君信㰂酒三瓶寄夜航之句則此名亦古矣不快世謂有疾曰不快陳夀作華陀傳亦然雷雪至正庚子二月六日浙西諸郡震霆掣電雪大如掌頃刻積深尺餘人甚驚異後閱李復中青唐雜記云宋元符二年九月廿一日夜鎮洮大雷自初更至四鼓凡一百三十餘雷雪深二尺後旬日西羌叛以有備無患出師大捷又周宻癸辛雜識云庚寅正月二十九日癸酉余至博陸大雷雪下如織而雷不止天地為之陟黒平生所未見據二説如此然杭州自去嵗十二月被圍至三月兵退豈即青唐之䜟與分疏人之自辨白其事之是否者俗曰分䟽䟽平聲漢書𡊮盎傳以不親為解顔師古注曰解者若今分䟽矣北齊書祖珽髙元海奏珽不合作領軍并與傳廣寜王交結珽亦見帝令引入自分䟽西皮髹器謂之西皮者世人誤以為犀角之犀非也乃西方馬􅀈自黒而丹自丹而黄時復改易五色相疊馬鐙磨擦有凹處粲然成文遂以髹器倣為之事見因話録煖屋今之入宅與遷居者隣里醵金治具過主人飲謂之曰煖屋或曰煖房王建宫詞太儀前日煖房来則煖屋之禮其来尚矣鬼室温州監郡某一女及笄未出室貌美而性慧父母之所鍾愛者以疾卒命畫工寫其像嵗序張設哭奠常時則庋置之任滿偶忘取去新監郡復居是屋其子未婚忽得此心竊念曰娶妻能若是平生願事足矣因以懸於卧室一夕見其下從軸中詣榻前叙殷勤遂與好合自此無夜不来踰半載形狀羸弱父母詰責以實告且云至必深夜去以五鼓或齎佳果啖我我荅與餅餌則堅郤不食父母教其此番須力勸之既而女不得辭為咽少許天漸明竟不可去宛然人耳特不能言語而已遂真為夫婦而病亦無恙矣此事余童子時聞之甚熟惜不能記兩監郡之名近讀杜荀鶴松窓雜記云唐進士趙顔於畫工處得一軟障圖一婦人甚麗顔謂畫工曰世無其人也如可令生余願納為妻工曰余神畫也此亦有名曰真真呼其名百日晝夜不歇即必應之應則以百家綵灰酒灌之必活顔如其言乃應曰諾急以百家綵灰酒灌之遂活下步言笑飲食如常終嵗生一兒兒年兩嵗友人曰此妖也必與君為患余有神劒可斬之其夕遺顔劒劒纔及顔室真真乃曰妾南岳地仙也無何為人畫妾之形君又呼妾名既不奪君願今疑妾妾不可住言訖携其子却上軟障覩其障惟添一孩子皆是畫焉讀竟轉懐舊聞已三十餘年若杜公所書不虚則監郡子之異遇有之矣牙郎今人謂駔儈者為牙郎本謂之互郎謂主互市事也唐人書互作牙互與牙字相似因訛而為牙耳墓屍如生松江蟠龍塘普門寺側一無主古墓至正己亥春為其里之張雕盜發有誌石乃宋時錢叅政良仁妹諱恵淨以該恩奏封孺人生一男五女年六十有五嘗捨田入寺因於紹興四年十月祔夫墓之右破棺無􅁾氣顔色如生口脂面澤若初傅者冠服鮮新亦不朽腐得金銀首􅎖器皿甚多至放其繡履傳相玩弄人以為異余聞漢廣川王去疾發魏王子且渠冡無棺槨有石床床下悉是雲母末上二屍一男一女皆年二十餘東首祼卧顔色如生人􅁂髪亦如生人此恐雲母之功今此婦𦵏日距今百七八十年而亦不損壊其理又何邪枯井有毒平江在城峨嵋橋葉剃者門首簷下有一枯井深可丈許偶所畜猫墮入適隣家浚井遂與井夫錢一緡俾下取猫夫父子諾子既入井乆不出父繼入視之亦不出葉惶恐繫索於腰令家人次第放索將及井底亟呼救命比拽起下體已僵木如屍而氣息奄奄鄉里救活之白於官官来驗視令火下燭彷彿見若有旁空者向之死人一横卧地上一斜倚不倒鈎其髪提出遍身無恙止紫黒耳衆議以恐是蛟蜃之屬實之土焉余意山嵐蠻瘴尚能殺人何況乆年乾涸隂毒凝結納其氣而死復奚疑哉此事在至正己亥秋八月初旬也後讀酉陽雜爼有云凡冡井間氣秋夏多殺人先以鷄毛投之直下無毒迴舞而下者不可犯當以泔數斗澆之方可入矣得此一章信余意之誠是也賢孝前至元間杭州有鄭萬戸者天性峻急不能有所容而奉事母夫人備極孝道母誕日垂至預市文繡氁段製袍為夀鍼工持歸縫綴既成為油所汚時估貴重工莫能償自經不死隣婦有識其母者潜送入白之至日卧不起子至候問安否見有憂色請其故曰昨莫偶視新袍適几上油缶飜濺漬成玷我情思殊不佳耳子告曰一袍壊復製一袍可也夫人何重惜乃爾母陽為自解遂起受子孫拜賀如常嵗儀人咸以此為賢母而益見萬戸之孝國朝婦人禮服逹靼曰袍漢人曰團衫南人曰大衣無貴賤皆如之服章但有金素之别耳惟處子則不得衣焉今萬戸有姓者而亦曰袍其母豈逹靼與然俗謂男子布衫曰布袍則凡上盖之服或可槩曰袍事物異名暇日讀書遇事物之異名者偶記一二以備采覽云割政割剥之政也史記帝紀三父馬牡馬也史記平凖書毳布罽也説文曰西胡毳布香物夢書曰夢得香物婦女歸也藏魚説文鮓藏魚也請室獄也史𡊮盎𫝊猊糖獅子乳糖也後漢顯宗記令草宜男花也傅𤣥賦毛席氊也後漢西域傳注竹綀竹布也庾翼與燕王書曰竹綀三端竹萌筍也説文練香和香也李賀詩練香薰宋鵲南威橄欖也太平廣記石􅁡櫻桃也同上木􅁡􅀥子也同上雜馥合香也通典四十三脂炬燭也杜陽雜編竹胎筍也説文調香和香也華嚴經曰粥香長者善調香毛布褐也詩七月箋獵碣石鼔曰獵碣蘇朂載記玉窪酒器也緯畧挾日從甲至甲凡十一日也周禮天官浹辰辰十二辰自子至亥也左𫝊成九年丹若石榴也酉陽雜俎金鎞刺肉茂巴爾字西瑛西域人其軀􅆬魁偉故人咸曰長西瑛一日方與妻對飯妻以小金鎞刺臠肉將入口門外有客至西瑛出肅客妻不及啖且置器中起去治茶比回無覔金鎞處時一小婢在側執作意其竊取栲問萬端終無認辭竟至損命嵗餘召匠者整屋掃瓦瓴積垢忽一物落石上有聲取視之乃向所失金鎞也與朽骨一塊同墜原其所以必是猫来偷肉故帶而去婢偶不及見而含寃以死哀哉世之事有如此者甚多姑書焉以為後人鑒也杭人遭難杭民尚淫奢男子誠厚者十不二三婦人則多以口腹為事不習女工至如日用飲膳惟尚新出而價貴者稍賤便鄙之縱欲買又恐貽笑隣里至正己亥冬十二月金陵游軍斬闗而入突至城下城門閉三月餘各路糧道不通城中米價踴貴一斗直二十五緡越數日米既盡糟糠亦與常日米價等有貲力人則得食貧者不能也又數日糟糠亦盡乃以油車家糠餅搗屑啖之老幼婦女三五為羣行乞於市雖姿色艶麗而衣裳濟楚不暇自愧也至有合家父子夫婦兄弟結袂把臂共沈於水亦可憐已一城之人餓死者十六七軍既退吳淞米航輻輳藉以活而又太半病疫死豈平昔浮靡暴殄之過造物者有以警之與承天閣平江承天寺初畜大木將造千佛閣㑹浙省災責有司籍所在木植官酬以價寺一􅃛僧於閣木上皆鑿萬嵗閣三字於是有司不敢取及閣成其字固在諸寺觀凡起造必作儷語題梁間其餘則記住持檀越主名此所必然獨承天諸殿俱否至正丙申春今張太尉士誠未歸順時偽稱誠王國號大周改元天佑歴日明時由淮渡浙攻破平江即承天以居盡撤去殿上像設坐於其中且以僧元鑿字名其閣豈亦有定數乎阿癐癐淮人㓂江南日於臨陣之際齊聲大喊阿癐癐以助軍威按朝野僉載武后時滄州南皮縣丞郭勝静每廵鄉喚百姓婦託以縫補而姦之其夫至縛勝静鞭數十主簿李懋往救解之勝静羞諱其事低身荅云忍痛不得口唱阿癐癐勝静不被打阿癐癐據此乃有所本海運國朝海運糧儲自朱清張瑄始以為古来未嘗有此按杜工部詩出塞云漁陽豪俠地擊鼔吹笙竽雲帆轉遼海粳稻来東吳又昔游云幽燕盛用武供給亦勞哉吳門持粟帛汎海凌蓬萊如此則唐時已有海運矣朱張特舉行耳夫婦死孝杜陽父友開江隂人隱居教授妻吳辟纑以資之天歴間浙右菑荒米價騰踴學徒散去困於饑餓吳之兄弟屢勸斬邱木粥基地以少延餘息陽父堅持不可繼欲挈吳歸吳曰夫既盡孝妾獨以不義自處寜不食若粟遂相枕藉而卒猪妖至正辛夘春江隂永寜鄉陸氏家一猪産十四兒内一兒人之首面手足而猪身輟耕録卷十一欽定四庫全書輟耕録卷十二元陶宗儀撰園池記唐南陽樊宗師字紹述所譔絳守居園池記艱深竒澁讀之往往昧其句讀况義乎哉韓文公謂其文不蹈襲前人一言一句觀此記則誠然矣宋王晟劉忱嘗為解釋今不復有偶得灤陽趙仁舉字伯昻箋註本句分字析詞理焕然因書其記傳其句讀以便披覽云有未解者又須觀全註可也㸃法為句為讀記曰絳即東雍雍去聲為守去聲理所禀參所今切實沈分分去聲氣畜兩河潤有陶唐冀遺風餘思思去聲晉韓魏之相剥剖世說總其土田士人今無磽口交切雜擾宜得地形勝㵼水施法豈新田又蕞猥不可居州地或自有興廢州字或屬上句人因得附為奢儉將為守恱致平理與與平聲益侈心耗物害時與與平聲自將失敦窮華終披夷不可知陴􅀈音脾睨也􅀈疑作緬孤顛跒倔上苦下切下渠勿切𤣥武踞守居割有北自甲辛苞太池泓横硖旁潭中癸次木腔暴三丈餘或屬上句涎玉沫珠子午梁貫亭曰洄漣虹蜺雄雌穹鞠覷蜃時忍切礙佷胡懇切島坻音池淹淹委委平聲莎靡縵莫半切蘿蕃翠蔓紅刺相拂綴南連軒井陣中湧曰香承守寢睟雖遂切思西南有門曰虎豹左書虎搏𥙷各切立萬力千氣底音㫖發􅇾匿地努肩腦口牙快􅎨電火雷風黑山震將合右胡人鬅黄㠾於元切累力追切珠丹碧錦襖身刀囊鞾檛縚上刀切白豹𤣥班飫距掌脾意相得東南有亭曰新前含音領曰槐有槐屓虛器切䕶䨴鬱䕃後頤渠決決緑池西直南折廡赴可宴可衙又東騫渠曰望月騫音軒又東騫窮角池硏雲曰栢有栢蒼青官士擁列與槐朋友巉鉏銜切隂洽色北俯渠憧憧來刮級面西巽㬂疑作隅間黄原玦天汾水鈎帶白言謁行旦艮間逺岡青縈近樓臺井閭㸃畫察可四時合竒士觀雲風霜露雨雪所為去聲發生收歛賦歌詩正東曰蒼塘遵瀕西漭望瑶翻碧㶑光文切鏤棃深撓撓奴巧切收窮正北曰風隄乘携左右隄勢北囘股努墆徒計切捩刀計切蹴墉御渠歆池南楯楹景怪孎蛟龍鉤牽寳龜靈蠯薄猛切一音睥文文章章隂欱呼合切墊都念切㰹呼括切煙潰靄聚桃李蘭􅈍神君仙人衣裳雅冶可㑹脫赤熱西北曰鼇䖶音灰原開咍呼來切儲虚明􅃼􅃼嵬眼􅐓耳可大客旅鐘鼓樂提鷴挈鷺􅷏音弼池豪渠憎乖憐圍正西曰白濵薈烏外切深憐梨素女雪舞百佾水翠披㬑㬑虚郭切干幅迎西引東士長崖挾横埒埒音劣日夘酉日或作自樵途隖徑幽委蟲鳥聲無人風日燈火之晝夜漏刻詭姽魚毁切絢化大小亭餖池渠間走池隄上亭後前陴乘墉如連山羣峰擁地髙下如原隰隄谿壑水引古自源三十里鑿髙槽絶竇墉為或作其池溝沼渠瀑潨音叢潺終出汨汨于筆切音骨非街衖畦町阡陌間入汾巨𣗳木資士悍水沮將預切宗族盛茂旁䕃逺映錦繡交菓枝香畹麗麗上下可通作一句絶他郡考其臺亭沼池之増葢豪王才侯襲以竒意相勝至今過客尚往往有指可創起處余退常吁後其能無果有不音否𥙷建者池由於煬及當作反者雅文安薛雅裴文安二人發土築臺為拒幾平聲附於汚宫水本於正平軌病井滷生物瘠引古沃澣人便幾附於河渠嗚呼為附於河渠則可為汚於汙宫其可書以薦後君子長慶三年五月十七日記又見一本亦註解者不著姓名所分句讀與前略有不同處併附于此絳即東雍為守理所作一句世説土田士人宜得地形勝自將失暾窮華陴􅀈孤顛跒倔𤣥武守居割有北自甲辛苞大池泓横硖旁作一句潭中癸次木腔作一句瀑三丈餘作一句子午梁虹蜺雄雌穹鞠覷蜃作一句莎靡縵南連軒井陣左畫虎摶立萬力千氣底發作一句彘匿地電火雷風右胡人鬅黄㠾纍珠丹碧錦襖身刀囊鞾撾縚白豹𤣥班飫距掌脾作一句有槐屓䕶䨴作一句鬱䕃渠決決縁池西直南折廡赴擁列與槐朋友巽㬂間白言謁行旦艮間逺岡青縈近可四時合竒士觀雲風霜露雨雪所為發生收歛正東曰蒼塘蹲瀕西漭望作一句瑶翻碧㶑正北曰風隄乘携左右作一句隄勢北囘股努墆披蹴墉作一句南楯楹景怪爥蛟龍鉤牽烟漬靄聚開咍儲虚明茫茫提鷴絜鷺䁨䁨千幅迎引西東日夘酉樵途隖徑幽委蟲鳴聲晝夜大小亭餖池渠間走池隄上亭後前陴乘墉作一句如連山群峯擁地髙下作一句鑿髙槽作一句絶竇墉作一句為此作其池溝沼渠瀑潨每字汨汨街衖町畦阡陌每字間入汾作句水祖宗族茂盛作一句旁䕃逺映錦繡交菓枝香畹麗絶地郡作一句考其臺亭沼沚之増後其能無果有不補建者作一句池由於煬及者雅文安作一句誅此本多比字病井滷生物瘠引古沃澣作一句人便幾附於河渠作一句廁籌今寺觀削木為籌置溷圊中名曰廁籌北史齊文宣王嗜酒淫泆肆行狂暴雖以楊愔為相使進廁籌然則愔所進者豈即此與按說文廁清也從廁則聲韻初吏切間也雜也次也圊也居髙臨垂邊曰廁髙岸夹水曰廁史記太倉公𫝊䜿奉劍從王之廁汲黯𫝊衛青大將軍侍中上踞廁見之注如淳曰廁音則謂牀邊據牀視之一云溷廁也廁牀邊側漢書注如淳曰廁溷也孟康曰廁邊側也師古曰如說是也仲馮曰廁當從孟說愚意古者見大臣則御坐為起夫武帝固以奴𨽻待青亦不應踞溷􅀈而見之然漢文居㶚北臨廁使慎夫人鼓瑟注韋昭曰髙岸夹水為廁即此推之則凡廁者皆取其在兩物間為義又郅都𫝊賈姬如廁有野􅇾入廁命都擊之則此之如廁亦恐非是溷圊他如劉安别傳謫守都厠三年莊子庚桑篇適其偃註偃屏廁也屏廁則以偃儀禮既夕禮甸人築坅坎𨽻人温廁塞廁萬石君𫝊建取親中裙廁牏身自澣洒注孟康曰廁行清牏行中受糞函也至於晉侯食麥脹如廁䧟而卒趙襄子如厠執豫讓髙祖鴻門㑹如廁召樊噲等及如廁見柏人金日磾如廁擒莽何羅范睢佯死置廁中李斯如廁見䑕陶侃如廁見朱衣王敦如廁食􅀥劉寔誤入石崇廁郭璞􅀍髪廁上劉季和廁上置香爐沈慶之夢鹵簿入側中崔浩焚經投廁中錢義廁神李赤廁鬼蒯瞶盟孔悝於廁曹植戒露頂入廁之𩔖則真溷圊矣抝花南方或謂折花曰抝花唐元㣲之詩試問酒旗歌板地今朝誰是抝花人又古樂府抝折楊栁枝連枝秀京師教坊官妓連枝秀姓孫氏葢以色事人者年四十餘因投禮逸士風髙老為師而主教者褒以空湛静慧散人之號挟二女童放浪江海間偶至松江愛其風物秀麗將結數椽為棲息所郡人陸宅之居仁嘗往訪焉秀頗不以禮貌因其請作募縁疏遂為譔之疏曰京師第一部教坊占排塲曽使萬人喝采道德五千言公案抽鎖鑰只因片語投機向林下得大道髙風指雲間問前縁福地一跳身纔離了百戱棚中圏子䨇擺手便作箇三清門下閒人赤𦂳地無是無非到大來自由自在識盡悲歡離合幻打開老病死生闗交媾功成隂陽炭燒空慾海修持行滿雌雄劍劈破愁城七星冠剛替下鳯頭釵合歡帶生紉做鹿皮袋空非空色非色色即是空道可道名可名强名曰道往常時紅裙翠袖生綃帕猛可里草履麻衣匾皂絛銷金帳冷落風情養丹爐消磨火性半世連枝帶葉算從前歴盡虛花一朝剗草除根到此際方成結果尋幾箇烟霞外逍遥伴侣抵多少塵埃中浮浪男兒存一㸃志誠心百事可做少幾處風流債一筆都勾試問他濁酒狂歌争如我清茶淡話迷魂陣當時落䧟人負我我負人總是虚脾𤣥闗竅今日㸃開心即道道即心無非妙用牢着眼看烏飛兎走急囘頭怕鶴怨猿啼五陵人買笑追歡掉頭不頋三島客談𤣥論道稽首相迎大都來幾箇知音多管是前生有分玉樓花下千鍾酒幾畨歌白苧遏行雲紙帳梅邊一炷香從此誦黄庭消永日桃花扇深蔵明月影椰子瓢長醉白雲鄉皓齒細腰打疊少年歌舞錦心繡腹宣揚老子經文發科打諢不離機鋒課嘴撩牙長存道眼燒夜香非尋佳偶披鶴􅌁星月下禮拜茅君登春臺不望逺人駕鸞車雲霄上追尋蕭史歌館化為仙館静戯房畨作道房幽浄洗臙脂見全真本來面目輕敲檀板聽歩虚别是宫商人盡誇七真堂添上箇小孫姑我只道五城山冊立下新王母不比尋常鉤子曽經老大鉗鎚百鍊不囘萬夫難敵疇昔㣲通一笑白面郎争與􅅶頭如今頓悟三生青眼客便當擡手既不作入夢朝雲暮雨也須撇等閒秋月春風若教了蒲團上工夫便可到蓬壺中境界肯莊嚴一處千年香火是成就到頭陸地神仙金銀鈔等物是必大塊子捨來福禄夀利錢擬定加倍兒還你得道者多助看琳宫寳殿日月交輝愛人者必親仗玉磬金鐘晨昏報德疏文一出逺邇傳誦以資笑談秀不可留遂宵遁然文雖新竒固近於俳視厚德君子有間矣而其帷箔之不修者豈偶然哉卻鞭文真王額琳特穆爾之夫人卓勒約蘓徳濟以賢行稱一日有獻馬鞭於王者鞭内暗蔵一鐡簡拔靶取之則得王喜持示夫人將酬以幣夫人曰君平昔若嘗害人則防人之必我害也茍無此心焉用為王悟亟還之奉母避難泰州人𡊮氏兄弟二人同居養母至正壬辰紅巾壓境兄弟負母逃避至中途兄念妻子不置辭母歸惟弟與母借居田舎後城䧟其一房盡遭殺戮獨弟之妻子獲免乘間奔避適夫婦父子相㑹時傳為孝行所感匠官仁慈杭州行金玉府副總管羅國器世榮郡人也天性仁慈有匠人程限稽違案具吏請引决羅曰吾聞其新娶若責之舅姑必以新婦不利口舌之餘不測係焉姑置勿問後或再犯重加懲治可也夫羅軄在造作耳尚能知此而受民命之寄者則反貪墨苛慘惟以鞭扑立威為務哀哉著衣喫飯諺云三代仕宦學不得着衣喫飯按魏書文帝詔羣臣云三世長者知被服五世長者知飲食則古已有此語文章政事吕仲實先生思誠僉浙西憲司事時有自首不合令女習學謳唱者先生案議云男女無父母之命私有所從王法不許父母違男女之願置之非地公論豈容所首宜不准合依律杖斷又有年七十之上而毆人者案議云既能為不能為之事必當受不當受之刑先生文章政事皆過人逺甚而廉潔不汚家甚貧至正間官至中書左丞先生未顯時一日晨炊不繼欲携布袍貿米於人室氏有吝色因戱作一詩曰典却春衫辦早厨老妻何必更躊躇瓶中有醋堪燒菜囊裏無錢莫買魚不敢妄為些子事只因曾讀數行書嚴霜烈日皆經過次第春風到草廬後果及第浙江潮候浙江一名錢唐江一名羅刹江所謂羅刹者江心有石即秦望山脚横截波濤中商旅船到此多值風濤所困而傾覆遂呼云此事見吳越時僧賛寧傳載中其晝夜二潮甚信上人以詩括之曰午未未未申申夘卯辰辰巳巳巳午午朔望一般輪此晝候也初一日午未初二日未初十五日如初一夜候則六時對衝子午丑未之𩔖漢東宣伯聚先生嘗作浙江潮候圖說云大江而東凡水之入于海者無不通潮而浙江之潮獨為天下竒觀地勢然也浙江之口有兩山焉其南曰龕山其北曰赭山並峙於江海之㑹謂之海門下有沙潬跨江西東三百餘里若伏檻然潮之入于浙江也發乎浩渺之區而頓就歛束逼礙沙潬囘薄激射折而趨于兩山之間抝怒不拽則奮而上隮如素蜺横空奔雷殷地觀者膽掉渉者心悸故為東南之至險非他江之可同也原其消長之故者曰天河激湧曰地機翕張揆其晨夕之候者曰依隂而附陽曰隨日而應月地志濤經言殊㫖異胡可得而一哉葢圓則之運大氣舉之方儀之静大水承之氣有升降地有浮沉而潮汐生焉月有盈虚潮有起伏故盈於朔望虚於兩弦息於朓朒消於朏魄而大小凖焉月為隂精水之所生日為陽宗水之所從故晝潮之期日常加子夜潮之候月必在午而晷刻定焉卯酉之月隂陽之交故潮大於餘月大梁析木河漢之津也朔望之後天地之變故潮大於餘日寒暑之大建丑未也一晦一明再潮再汐一朔一望再虚再盈天一地二之道也月經於上水緯於下進退消長相為生成歴數可推毫釐不爽斯天地之至信幽贊於神明而古今不易者也杭之為郡枕帶江海逺引甌閩近控吳越商賈之所輻湊舟航之所駢集則浙江為要津焉而其行止之淹速無不畢聽於潮汐者或違其大小之信爽其緩急之宜則必至於傾墊底滯故不可以不之謹也某承乏兹郡屬兵革未弭之秋信使之往來師旅之進退雖期㑹紛紜邊陲警急必告之曰謹候潮汐毋躁進以自危然而跡累肩摩晨馳夕騖有不能人喻而户說之者考之郡志得四時潮候圖簡明可信故為之說而刻石于浙江亭之壁間使凡行李之過此者皆得而觀之以毋蹈夫觸險躁進之害亦庶乎思患而預防之意云此說博極羣書辭理超詣而古今之論潮汐者葢莫能過之矣因併録之貞烈墓千夫長李某戍天台縣日一部卒妻郭氏有令姿見之者無不嘖嘖稱賞李心慕焉去縣七八十里有私盗出没處李分兵往戍卒遂在行既而日至卒家百計調之郭氏毅然莫犯經半載夫歸具以白為屬所轄㒺敢誰何一日李過卒門卒邀入治茶忽憶得前事怒形於色亟轉身持刃出而李幸脫走訴于縣縣捕繫窮竟案議持刃殺本部官罪死縣桎梏囹圄中從而邑之惡少年與官之吏胥皂𨽻輩無有不起覬覦之心者郭氏躬餽食於卒外閉户業績紡以資衣食人不敢一至其家久之府檄調黄巖州一獄卒葉其姓者至尤有意於郭氏乃頋視其卒日飲食之情若手足卒感激入骨髓忽傳有五府官出五府之官所以斬决罪囚者葉報卒知且謂曰汝或可活我與為義兄弟萬一不保汝之妻尚少汝之子若女纔八九嵗耳奚以依顧我尚未娶寧肯俾為我室乎若然我之視汝子女猶我子女也卒喜諾葉遂令郭氏私見卒卒謂曰我死有日此葉押獄性柔善未有妻汝可嫁之郭氏曰汝之死以我之色我又能二適以求生乎既歸持二幼痛泣而言曰汝爹行且死娘死亦在旦夕我兒無所怙恃終必死於饑寒我今賣汝與人娘豈忍哉葢勢不容已將復柰何汝在他人家非若父母膝下比母仍似是嬌癡為也天茍有知使汝成立嵗時能以巵酒奠父母則是我有後矣其子女頗聰慧解母語意抱母而號引裾不肯釋手遂携二兒出市召人與之行路亦為之墮淚邑人有憐之者納其子女贈錢三十緡郭氏以三之一具酒饌携至獄門謂葉曰願與夫一再見葉聽入哽咽不能語既而曰君擾押獄多矣可用此少禮答之又有錢若干可收取自給我去一富家執作為口食計恐旬日不及看君故也相别垂泣而出走至仙人渡溪水中危坐而死此處水極險惡竟不為衝􅈭倒仆人有見者報之縣縣官往驗視得實皆驚異失色為具棺歛就葬於死所之側山下又為申達上司仍表其墓曰貞烈郭氏之墓大書刻石墓上至正丙戍朝廷遣奉使宣撫循行列郡廉得其事原卒之情釋之人遂付還子女終身誓不再娶特徤藥墨藪載徐氏書記云平一齠齓之嵗見育宫中嘗覩先后閱書法數軸將榻以賜藩邸令女學内人出六十餘函於億嵗殿曝之多裝以鏤牙軸紫羅縹云是太宗時所裝其中有故青綾縹玳瑁軸者云是梁氏舊跡楷書每函可二十餘卷别有一小函有十餘卷所記憶者是扇書樂毅告誓黄庭私訪於所主女學問其函出盡否答云尚有不知其幾至中宗神龍初貴戚寵盛宫禁不嚴御府之珍多歸私室先盡金壁次及書法嬪主之家因此擅出或有報安樂公主者於内出二十餘函駙馬武延秀乆踐外國無功於此徒聞二王之迹强効寳持時呼薛稷鄭愔及平一詳其善惡諸人隨事答稱上者登時去牙軸紫縹易以漆軸黄麻紙縹題云特徤藥是外國語其書合作者時有太宗御筆於後題之嘆其雄逸云及考之書苑菁華特徤藥作云特徤樂恐是鋟梓誤耳乞求世之曰乞求葢謂正欲若是也然唐時已有此言王建宫詞只恐他時身到此乞求自在得還家又花蕊夫人宫詞種得海柑纔結子乞求自過與君王張道人暨陽之南門橋軍人張旺者人咸稱之曰張牌素兇狠無賴嘗夜盗城西田父菜被執濡其首溺池而􅇚之以故恨入骨髓每思有以為報而未能一夕宿火瓦罌往燒其家道由觀溝時月色㣲明畫師吳碧山尚未寢偶聞歩履聲穴窻窺之見張前行而殤鬼百數踵其後飯頃又聞歩履聲復窺之則張囘而青衣童子二人前𨗳焉吳甚驚怪葢張乃吳常所厚善者詰旦往叩張張初不承及語之審因以前事告且曰我實欲燬其室以快所憤因念寃寃相報無有了時遂棄火歸他無見也吳乃告以其詳張大感悟曰一念之頃可不謹哉即捨俗出家人又咸稱之曰張道人後竟得道云此在至正五年事也隂德延夀昔真州一巨商每嵗販粥至杭時有挟姑布子之術曰鬼眼者設肆省前言皆竒中故門常如市商方坐下坐忽指之曰公大富人也惜乎中秋前後三日内數不可逃商懼即戒程時八月之初舟次楊子江見江濵一婦仰天大號商問焉答曰妾之夫作小經紀止有本錢五十緡每買鵝鴨過江貨賣歸則計本於妾然後持􅑿息易柴米餘貲盡付酒家率以為常今妾偶遺失所留本錢非惟飲食之計無所措亦必被箠死寧自沉商聞之歎曰我今厄於命設令鑄金可代我無虞矣彼乃自夭其生哀哉亟贈錢一百緡婦感謝去商至家具以鬼眼之言告父母且與親戚故舊叙永訣閉户待盡父母親故宛轉寛解終弗自悟踰期無他故復之杭舟阻風偶泊向時贈錢處登岸散適此婦襁負嬰孩遇諸道迎拜且告曰自蒙恩府持拔數日後乃產母子二人没齒感再生之賜者豈敢忘哉商至杭便過鬼眼所驚顧曰公中秋胡不死乃詳觀形色而笑曰公隂德所致必曽救一老隂少陽之命矣商異其術捐錢若干以報之帝師帕克斯巴帝師法號曰皇天之下一人之上開教宣文輔治大聖至德普覺真知佑國如意大寳法王西天佛子大元帝師班第達帕克巴巴克實輟耕録卷十二欽定四庫全書輟耕録卷十三元陶宗儀撰中書鬼案中書省准陕西行省咨察罕諾爾宣慰司呈巴咱爾街禮敬坊王弼告至正三年九月内到義利坊平易店見有算卦王先生因問來歴致争當月二十九日夜睡房窻下似風吹葫蘆聲不時有之請到李法師遣送虚空人言算卦先生使我來哭聲内稱寃枉弼祝之曰爾神爾鬼明以告我鬼云我是豐州黒河村周大親女月惜至正二年九月十七日夜因出後院被這王先生將我殺了做奴婢使喚如今教在你家作怪哭者索要衣服抄冩所說赴官陳告差盧捕盗等與社長吳信甫於王先生房内搜獲木印二顆黒羅繩二條上釘鐵鍼四箇魘鎮女身小紙人八箇五色綵五色絨上俱有頭髪相􅅶又小葫蘆一箇上拴紅頭繩一條内盛琥珀珠二顆外包五色絨朱書符命一沓又告十二月初三日有鬼空中言我是奉元路南坊開張機房耿大第二男頑驢這先生改名頑童我年一十八嵗被那老先生引三箇伴當殺了我二十二日又有鬼空中云我是察罕諾爾李帖家孩兒延奴又名搶灰那老賊殺了我改名買賣我被殺時年十四嵗勘問得犯人王萬里即王先生狀招年五十一嵗江西省吉安路民於襄陽周先生處習㑹隂陽課命至順二年三月内到興元府逢見劉先生云我㑹使術法迷惑人心收採生魂使去人家作禍廣得財物我有收下的賣與你一箇隨於身畔取出五色綵帛并頭髪相結一塊言稱這箇小名喚延奴我課算揀性格聰明的童男童女用符命法水呪語迷惑活割鼻口唇舌尖耳朶眼睛呪取活氣剖腹掏割心肝各小塊曬乾搗羅為末收裹及用五色綵帛同生魂頭髪相結用紙作人形様符水呪遣往人家作怪跟隨到伊下處至夜劉先生焚香念呪燒符聽得口言不見形影問師父你教我誰家裏索甚去劉先生分付李延奴你與這先生做伴去說罷將呪語收禁萬里與訖鈔七十五兩買得五色綵帛頭髪相結一塊稱說可改名買賣傳教採生遣使收禁符命呪水又云牛狗肉破法休喫續後於房州山地面經過逢見廣州舊識鄺先生云我亦㑹遣使鬼魂我有收下的生魂賣與你萬里與訖鈔一錠鄺先生取出五色綵帛頭髪相結紙人兒一箇云此名耿頑童萬里將與李買賣一處遣使以課算為由前到大同路豐州黑河村地面往來至正二年八月内到於周大家課命將伊女周月惜八字看算性格聰慧要將殺害收采生魂至九月十七日夜於周大住宅後院墻下黑影内潛藏間見一人往後院内來認得係是月惜在彼出後萬里密念咒語向前拖拽往東奔走將月惜禁止端立脫下沿身衣服用元帶魚刀將其額皮割開扯下懸葢眼睛及將頭髪割下一縷用紙人并五色采帛絨線相結作塊一如人形様然後割下鼻口唇舌耳尖眼睛手十指梢脚十趾梢却剖開胷腹纔方倒地氣絶又將心肝肺各割一塊曬乾搗末裝於小葫蘆内至正三年九月内來到察罕諾爾平易店安下開張卦肆與王弼相争挟讐令生魂周月惜等三名前往本家作禍為買馬肉食因店内將牛肉作馬肉賣與因此不能收禁事發到官及責得李福寳即李帖狀結生到孩兒延奴常有疾病於五岳觀口許出家落在紙灰内改名搶灰天歴二年二月内令其趕牛牧放不歸此時饑􅂽想得􅀍人虧害不曾根尋及行移奉元路咸寧縣并大同路豐州照勘耿頑童周月惜致死縁由相同呈乞咨請施行准此送據刑部擬得王萬里殘忍不道合令凌遲處死其妻子遷徙海南安置烏寳傳余幼時嘗見胡石塘先生𤣥寳傳今不能記其全篇有人出永嘉髙則誠明烏寳傳相示雖曰以文為戱要亦有闗於世教傳曰烏寳者其先出於㑹稽禇氏世尚儒務詞藻然皆不甚顯至寳厭祖父業變姓名從墨氏㳺盡得其通神之術由是知名初寳之先有錢氏者亦以通神之術顯迨寳出而錢氏遂廢然其術亦頗相𩔖故不知者猶以為錢云寳輕薄柔黙外若方正内實垢汚善隨時舒卷常自得聖人一貫之道故無入而不自得流俗多惑之凡有謀於寳小大輕重多寡精粗無不曲隨人所求自公卿以下莫不敬愛其子姓蕃衍散處郡國者皆官給廬舎而加守䕶焉其有老死者則官為聚其屍而焚之葢知墨之末俗也寳之所在人争迎取邀致茍得至其家則老稚婢𨽻無不忻恱且重扄邃宇敬事保愛惟恐其他適也然素趍勢利其富室勢人每屈輙往雖終身服役弗厭其窶人貧氓有傾心願見終不肯一往尤不喜儒雖有暫相與往來者亦終不能乆留也葢儒墨之素不相合若此寳好逸惡勞愛儉素疾華侈常客於𢎞農田氏田氏朴且嗇寳竭誠與交田氏没其子好奢靡日以聲色宴㳺為事寳甚厭之隣有商氏者亦若田氏父之為也遂挈其族往依焉葢墨之道貴清浄故也然其為人也多詐反覆不常凡逹官勢人無不願交而率皆不利敗事故其廉介自持者率不與寳交自寳之術行挟詐者往往偽為寳術以售于時後皆敗死故寳之術益尊是時崑崙抱璞公南海𤣥珠子永昌從革生皆能濟人與世俯仰曲隨人意而三人者亦願為寳交茍得寳一往則三人亦無不可致故術譽咸歸於寳焉寳族雖夥然其狀貌技術亦頗相似知與不知咸謂之烏寳云論曰烏氏見於春秋世本姓苑若存餘技烏獲皆為顯仕至唐承恩重𦙍始盛迨寳而益著寳裔本禇氏而自謂烏氏則變詐亦可知矣寳之學雖出於墨而其害道傷化尤甚雖孟軻氏復生不能闢也然使寳生於唐虞三代時其術未必若是顯然則寳之得行其志者亦其時有以使之嗚呼豈獨寳之罪哉緑窻遺藁新喻傅汝礪先生若金嘗志其妻殯云君諱淑字􅈍蘭姓孫氏其先汴人年二十三歸我於湘中五月而卒君髙朗秀惠生六嵗母卒父教以書稍長習女工晨起獨先盥櫛適父母所問安畢佐諸母具食飲退治女工晡時觀經史或鳴琴自休既夕聚家人瞑坐說古貞女孝婦傳燭至治女工如初富貴家多求婚父不許及以許余家人不恱一日有幸余疾者欲因動之君曰大人以愛子許人必慎所擇矣即有不諱命也若等謂我且慕世俗富貴而改聘耶有死而已皆愧謝不敢復言事繼母盡孝道死之日母大慟既瞑目久忽徐起止母哭令自寛及母出私泣告余曰妾為父母所偏愛即死必傷其心然終必死矣為將奈何君後富貴幸念之言既復瞑目泰定五年八月廿有一日也後三日寓殯湘中及序其遺藁云故妻孫氏蕙蘭早失母父周卿先生以孝經論語及凡女誡之書敎之詩固未之學也因其弟受唐詩家法於庭取而讀之得其音格輙能為近體五七言語皆閒雅可誦非茍學所能至者然不多為又恒毁其藁家人或竊收之令勿毁則曰偶適情耳女子當治織絍組紃以致其孝敬辭翰非所事也既卒家人哭而稱之因出其藁得五言七首七言十一首五七言未成章者廿六句特為編集成帙題曰緑窻遺藁序而藏之五言詩曰窻裏人初起窻前栁正嬌捲簾衝落絮開鏡見垂條坐對分金線行防拂翠翹流鶯空巧語倦聽不須調右一小閣烹香茗䟽簾下玉鈎燈光翻出鼎釵影倒沉甌婢捧消春困親嘗散暮愁吟詩因坐久月轉晩妝樓右二燈前催曉妝把酒向髙堂但願梅花月年年映夀觴右三采閣閉朝寒妝成擬問安忽聞春雪下喚婢捲簾看右四粲粲梅花𣗳盈盈似玉人甘心對氷雪不愛艶陽春右五小小春羅扇團團秋月生蟠桃花𣗳裏繡得董䨇成右六自拂䨇眉黛何曽慣得愁若教如翠栁便恐不禁秋右七七言詩曰樓前楊栁發青枝樓下春寒病起時獨坐小窻無氣力隔簾風亂海棠絲右一緑窻寂寞掩殘春繡得羅衣懶上身昨日翠帷新病起滿簾飛絮正愁人右二小妹方纔習孝經可憐嬌怯性偏靈自尋女誡窻前讀嗔道家人不與聽右三幾㸃梅花發小盆氷肌玉骨伴黄昏隔窻久坐憐清影閒劃金釵記月㾗右四繡被寒多未欲眠梨花枝上聽春鵑明朝又是清明節愁見人家買紙錢右五春雨隨風濕粉墻園花滴滴斷人膓愁紅怨白知多少流過長溝水亦香右六春風昨夜碧桃開正想瑶池月滿臺欲折一枝寄王母青鸞飛去幾時來右七空堦日晚雨纔乾小婢相隨倚畫䦨金釵誤掛緋桃落羅袖愁依翠竹寒右八小窻今夕繡鍼閒坐對銀蟾整翠鬟凡世何曽到天上月宫依舊似人間右九乞巧樓前雨乍晴彎彎新月伴䨇星隣家小女都相學鬭取金盆看五生右十庭院深深早閉門停鍼無語對黄昏碧紗窻外初生月照見梅花欲斷䰟右十一未成章詩曰露下庭梧葉風吹月桂花登樓聞過鴈開户見棲鵶繡簾當雪卷銀燭背風然雪晴山顯翠風暖水生紋萱草當堦緑櫻桃落地紅芍藥開時病荼䕷落處愁玉釵簮茉莉羅扇繡芙蓉窻前垂栁分春色鏡裏幽蘭對曉妝花間影過那知燕栁外聲來不見鶯慈親教婢囘金剪驕妹嗔人奪繡鍼妝成寳鏡楊花過行出珠簾燕子歸自傾瓮裏春泉水親灌堦前石竹花海棠帶雨臙脂重楊栁凝烟翡翠濃先生既䘮妻哀戚之情多見於詩悼亡曰驚颷吹羅幙明月照堦戺春草忽不芳秋蘭亦同死斯人藴淑德夙昔明詩禮靈質奄獨化孤䰟將安止迢迢湘西山湛湛江中水水深有時極山髙有時已憂思何能齊日月從此始右一皇天平四時白日一何遽勤儉畢婚姻新人忽復故衾裳歛遺襲棺槨無完具送葬出北門徘徊怛歸路玉顔不可恃况乃紈與素纍纍花下墳鬱鬱塋西𣗳他人亮同此胡為獨哀慕右二新婚誓偕老恩義永且深旦暮為夫婦哀戚奄相尋涼月燭西樓悲風鳴北林空帷奠巾櫛中房虚織絍辭章餘婉孌琴瑟有餘音睠言瞻故物惻愴内不任豈無新人好焉知諧我心掩穴撫長暮涕下霑衣襟右三人生貴有别室家各有宜貧賤逺結婚中心兩不移前日良宴㑹今為死别離親戚各在前臨訣不成辭傍人拭我淚令我要裁悲共盡固人理誰能心勿思右四感獨曰幽幽蕙草晚靡靡蘭芳斷皎皎夜泉人㝠㝠不復旦流塵棲暗壁凉吹經虚幔無論懽意消日復愁思亂䰟傷夕方永氣變秋將晏當窻慘斷素捐箧悲柔翰憶初成好合誓且同憂患何言遂長終獨處増永嘆寤寢忽如在展轉驚復散念兹何嗟及哀至聊自判百日曰人生悲死别矧在心相知新婚未及久杳杳遽何之昔為連理木今為斷腸枝相去時幾何百日奄在兹􅃜月有圓夕逝水無還期棄置非人情何以為我思入室曰妝閣閉長夜幽蘭坐復春猶疑挑錦字不見掩羅巾故物空在目蕭條生網塵右一虚窻明月滿芳砌緑苔滋花間時染翰尚憶解題詩寂寞幽泉下貞心空自知右二追和蕙蘭曰小窻開盡碧桃枝憶得青鸞化去時昨夜秋風妬幽怨夢中吹斷素琴絲右一江上愁時復值春帶圍寛盡不宜身階前舊種櫻桃𣗳日暮飛花故著人右二嗟夫孫氏之詩依乎禮義先生之詩哀而不傷舉得性情之正是可傳也已為將嗜殺王皮者住鳯翔府城外八九里許盛暑中入城買皮料歸至中途憩道傍大𣗳下忽有二卒來前狀貌竒怪似非凡世間人遽問曰汝王皮歟王竊疑懼然不敢不以實對乃曰某是已卒曰隂府攝汝王曰某平生無他過惡望賜矜憐卒不諾又告曰容到家與妻子一别可乎卒乃諾將及門卒力挽之不能入王大呌救我救我比妻子來前王已仆地氣絶既歛胷間微煖如生經宿未敢葢棺王於㝠漠中隨卒至一所儼若王者之庭儀衛吏𨽻無不備具問曰汝為秦白起偏將坑趙降卒四十萬知其罪否王答曰某傭工平生不曾讀書不知白起為何人亦不知降卒為何事於是令王起凡再歴二庭問亦如之答亦如之乃反接王一大池邊取池中泥塗其胸寒氣凛冽洞腹透背王即悟曰某巳記前身事矣遂解其縛復引至原問第三庭王告曰某曽為白起偏將其當年殺趙降卒時某曽力諫不從非某之罪頃間牽一荷鐡校者跪王側王認得似是白起而形骸骨立又若非似葢因久囚故也起見王曰子來矣余復何言方招承庭吏發王還第一庭檢録陽夀及閱籍尚有若干年即命原攝卒引至原憩𣗳下一推而王乃在棺中跳躍而起妻子親隣既驚且喜叩問之備言其故有傳之至京師者差進士卨哲篤來鳯翔覆察果實時王元吉為本府照磨元吉能備言其詳且有抄録公文此一事然雖若幻誕端可為為將而嗜殺人之戒故畧節大槩如上釋怨結姻揚州泰興縣馬駝沙農夫司大者其里中富人陳氏之佃家也家貧不能出租以輸主乃將以所佃田轉質於他姓陳氏田傍有李慶四者亦業佃種潛賂主家兒約能奪田與我而不以與陳氏者以所酬錢十倍之一分之家兒素用事因以利㗖其主主聽奪田歸李氏司固無可奈何既以榖田不相侔輕其直十之一司愈不平㑹歸而李與嘗所用力及為立劵者殺雞飲酒司因隨所之李欲卻司輙先將一巵酒飲之司忿恨去對妻語所以與李怨仇之故妻苦口諫曰吾之窮命也柰何仇人哉不聽夜持炬火往燒其家忽聞得内有人娩司竊念吾所讐者其家公也何故殺其母子遂棄火溝中而歸司無以為養生計即所償錢為豆乳釀酒貨賣以給食乆之不復乏絶更自有餘而李日益貧更十年李復出所佃田質陳氏司還用李計復其田過種之錢比前又損其一為劵悉值前人相視驚嘆司記為李所辱時今幸可一報復遂具雞酒飲亦如之李忘前過不自責反怨薄已怒甚歸積膏火破盎中夜抵司家司妻方就蓐李猶豫間聞人啟户懼事覺遺火亟走而司家實不有人旦得火器塲中驗器底有李字因悟昔我焚彼家以其家人産子不欲焚今彼焚我家而我之妻亦産子而不被焚此天也非人也持錢五千往李曰昨日小人無狀失禮義不得共飲兹願少伸謝意幸毋督過李疑紿以疾卧不起強請不已遂同之酒家邀酤兒與飲酒半自起酌酒勸李曰子之孫某年月日夜子時生而吾子亦夜者子時生怨仇之事慎勿復為具白前所仇事瀝酒為誓語酤兒曰子識之試用此警世間人不善慎勿為也劇飲盡歡乃更約為婚姻自是李亦不貧兩家至今豐給此在至正初元間吾謂司氏婦之極諌與司氏之易慮時天固已監之所以李不復可加害也向使司氏决快所欲未必能復田縱復田未必其無禍一念之善從而兩家子孫皆蒙其利澤書曰天道福善禍淫又曰惟上帝不常作善降之百祥作不善降之百殃嗚呼天豈逺人哉天豈逺人哉杜荀鶴詩嘗讀杜荀鶴詩其亂後逢村叟曰經亂衰翁居破村村中何事不傷䰟因供寨木無桑柘為著鄉兵絶子孫還似平寧徴賦稅未嘗州縣畧安存至於雞犬皆星散日落前山獨倚門山中寡婦曰夫因兵死守蓬茅麻苧衣衫􅁂髪焦桑柘廢來猶納稅田園荒後尚徴苗時挑野菜和根煮旋斫生柴帶葉燒任爾深山更深處也應無計避征徭旅泊遇郡中亂曰握手相看誰敢言軍家刀劍在要邊徧搜寳貨無藏處亂殺平人不怕天古寺拆為修寨木荒墳掘作甃城磚郡侯逐去渾閒事正是鑾輿幸蜀年然方之今日始信其非寓言也太公今人謂曾祖父曰太公此葢相承之謬當稱祖父為是後漢李固之父郃為司空固女當固伏誅日曰太公以來云注太公謂祖父郃也剛介御史臺准陕西行臺咨監察御史烏克遜良禎呈狀聞綱常者天之所以經天下者也天子所以為天守綱常者也臣而不忠子而不孝凡觸罪於綱常者不容於死又烏可處以相位俾之重任乎謹按遼陽行省丞相達實特穆爾即駙馬丞相也心懷隂險行畜姦邪敗壊彛倫反側不道通天之罪無所於容昔在晉邸擢登首相居百僚之上極一品之榮受任託孤躬承頋命君臣分義至重且深及乎大事之時干戈之際盡領北土之兵以救顛危本官隂畜二心坐觀成敗南至紅橋逗遛不進致於敗亡不能死義靦面入降大􅃜臣節反以藉口矜為己功天下義士聞之莫不為恥昔丁公為項王一將耳嘗二心於漢及天下定髙帝誅之後世稱其明斷方楚之與漢敵國之勢未分尚以大義責之以示垂戒今達實特穆爾之於晉邸爵禄之寵己崇君臣之分素定較之丁公不忠之罪又有甚焉况天歴之初營充樞密知院御史已嘗紏言又復賄賂權臣出為江西行省丞相兩居江浙至與房隣拜降都運賄賂交通壊亂鹽法至今官民皆􅀍其害中間徇私敗政不可枚舉所至之處流毒一方今則移置遼陽遼陽民奚罪焉原其本官昔既不忠今豈盡節又兼遼陽即係東方重鎮反覆之人豈宜處此脫有邊釁闗繫非輕似此賣國賣臣之罪使其人已死猶當追貶今既未死得以幸逭天誅設居相位是國法不行邪正不辨愚恐姦臣賊子接迹倣傚甚非國家之福伏望聞奏為天下正綱常之義將達實特穆爾流竄遐荒追奪累受宣命庶幾人臣分嚴罪於綱常者死有餘辜以為不忠不道之勸其於治道不為小補天下幸甚公論幸甚至正元年八月十二日伯勒齊爾布哈集賽第一日呼嚕圖巴納裏有時分伊勒都齊汪嘉努殿中巴咱爾大夫額琳沁巴勒經歴桑節孟古古筆且齊托多等奏臺官備著西臺文書俺商量來行與省家文書將他見行的勾當黜罷了呵怎生奏呵奉聖㫖那般者欽此初良禎之父江東建康道肅政廉訪使潤甫公澤年五十未有子夫人杜氏深以為憂屢請公再聘公不允仕西廣時聞寡居王安人者美而宜子夫人自為公謀聘之既歸執婦禮甚恭長夫人數嵗夫人推讓正寢以居之相處雍睦宛若姊娣飲食起居罔有不同公獨内不自安越明年夫人生良禎一日王氏告公曰君自有婦所以再娶妾者為嗣續計耳今夫人既生子妾又何事焉即出道家冠服一襲以示曰妾之志决矣請從此辭夫人固留不得公因謂夫人曰向吾再娶懼無後也若不改圖人其以我為汰乎乃聽王氏去奩貲萬金悉返之自是出居一女道菴戒行嚴謹人未嘗能見其面而夫人嵗時問遺彌至後良禎貴顯迎以歸事之如親母嗟夫自古求忠臣於孝子之門今良禎外有嚴君内有賢母教誨造就之道有過人者宜乎在家為孝子而在朝為忠臣也然其敭歴臺省秉性剛介不畏彊禦事無不言言必有中如駙馬丞相恃居國戚莫敢孰何乃必發其底裏直使去位而後已推此一節則凡忠君之事𩔖可知矣後至中書左丞而卒發墓至元間釋氏豪横改宫觀為寺削道士為髠且各處陵墓發掘迨盡孤山林和靖處士墓屍骨皆空惟遺一玉簪時有人作詩以悼之曰生前不繫黄金帶身後空餘白玉簮輟耕録巻十三欽定四庫全書輟耕録卷十四元陶宗儀撰忠烈蕭景茂漳州龍溪隔洲里人儒而有文以謹厚信扵鄉里後至元間漳冦亂景茂率鄊人立柵保險堅不可破㑹旁里有人導之從間道入景茂􅀍執賊使拜曰汝賊也何拜賊欲脅之降以従民望景茂罵曰逆賊國家何負汝而反汝族汝里何負汝而坐累之賊相語曰吾殺官軍將吏多矣至吾砦皆愞靡求生未有若此餓夫之倔彊者察其志終不為吾用留之祗取辱耳遂縛之扵樹刲其肉使自㗖之且嚼且罵曰我食我肉無若汝賊行將萬叚狗􅇾棄不食賊怒絶其舌而死又江州路總管李黼字子威汝寧人泰定丁卯状元及第至正十年庚寅来守是郡政修民和明年辛卯夏五月紅巾冦逼淮西公即申告江西行省以謂九江為豫章藩屏之地蘄黄乃九江唇齒之邦不可不早為進兵守護或者非其過慮公乃張文榜以諭民曰為臣死忠為子死孝在黼之分惟知盡死守土而已所謂城存與存城亡與亡者也聞者悚然秋九月冦侵蘄黄屬邑公復上言宜速乘機進援茍淮西失守長江之險與彼共之非所恃矣行省不報既而蘄州䧟冬十月黄州䧟十一月二十五日行省平章圖卜戬布哈奉中書省命領兵至公極陳攻守之策圖卜戬布哈以隄備把截為辭越明年壬辰春正月初二日行省左丞博囉特穆爾奉總兵御史大夫領樞宻院額森特穆爾命領兵進攻淮西亦来屯住逗遛不前十四日武昌䧟十六日藩王大臣官民舟航蔽江而下我民觧散十九日圖卜戬布哈博囉特穆爾皆遯去僚佐司屬悉為一空公亟發廩賑民收召士卒數日稍輯機務繁劇不遑寝食以二十三日卧病然猶扶憊乗肩輿領兵出境行省以公忠誠昭著授本省參知政事行江州南康軍民都總管便宜行事二月初九日圖卜戬布哈懼臺憲公議自三山移兵入城十一日冦忽至城下甘棠湖縱火焚西門公立城上身當矢石圖卜戬布哈從北門遯去日中勢益熾分衆攻北門城遂䧟公猶執鐵撾指揮左右迎戰衆驚潰公􅀍執脅以刃不肯降口罵不絶聲遂殺之姪男秉昭亦遇害初武昌䧟時公謂子秉方曰我國之守臣當死此土汝可奉母往下江依伯父以存吾後秉方曰父死國子死父有何不可公怒曰汝不遵命是不孝也秉昭亦告其兄曰兄不去則叔父無後不孝莫大扵是某當與叔父同死生矣兄無慮焉秉方不獲已買舟奉母夫人行舟次何家堡遲留不忍捨公聞之手批責以大義遂去不半月公死又江浙行省參知政事樊執敬字時中鄆人是年秋七月初十日紅巾自徽犯杭時公守宿衛于省有報已入北闗門省吏皆次第引去公獨􅀍甲上馬率宿衛兵急出省將捄闗従者止之公曰吾封疆之守不守而去是以私利廢臣道行至清河坊口遇他走将又以兵孤且散控其馬首返公怒引佩刀斫其人曰城不守何適遂躍馬逆戰以死死時猶嚼齒罵不絶聲死之所則天水橋也又福寧州尹王巴延字伯敬濵州人由湖廣行省知印歴官至兹任撫字多方政敎大行是年春除福建鹽運司同知將行㑹鄰境賊衆勢頗張州民羣擁馬前拜且泣曰公吾之父母豈容捨我去方今兵戈蠭起公去吾民将孰賴父老千餘人詞上司乞留公遂復留至秋賊衆自邵武間道迫福寧公募民兵得一千五百餘人為守禦備冬十一月庚辰賊進至青皎屯楊梅嶺公與中子相引兵直抵其營與戰破之既而益衆復進我兵僅千餘人乃分為二道拒之公以五百人還守州治壬午賊衆萬餘平旦攻西門衆寡不敵吏卒奔潰公獨身奮以死自誓俄馬中流矢遂為賊所執其魁首王兼善者謂曰聞公廉能著稱欲屈再尹此州公厲聲叱曰我天子守臣義當殺賊不幸敗有死耳魁怒令公跪公曰此膝豈跪賊耶魁益怒令左右毆之公曰我為人臣當為國死乃嚙舌出血噴其面罵曰殺我即殺毆何也然可殺我不可害吾民官軍旦暮且至殺爾等無噍𩔖矣㑹其執逹嚕噶齊額森都喇至責之曰汝何得與王君同起兵拒我額森都喇股慄口噤不能對公曰吾義當起兵殺賊何名拒汝因大罵不絶口且曰吾死當為神以殺汝曹魁大怒遂害之臨死色不變立而受刃頸斷㣲有血如乳時年七十矣子相亦􅀍執魁欲官之相曰汝逆吾君又殺吾父義不共戴天我忠臣子詎能事賊耶魁知不可屈亦殺之相妻潘氏逃民間有惡少欲亂之不従執獻魁潘慟哭曰吾既失所天義豈受辱乃絶不飲食及其二幼女皆死又溧陽儒學敎授林夢正字古泉吾鄉人中書以著述薦得官是嵗賊衆寇溧陽獲其魁張某先生問曰爾何人也應曰我父為軍千户紅巾入境逼我父為帥父以年老不堪從事令我代先生痛罵之曰爾之父祖世為國家臣子而爾忍偽耶既而其勢復盛竟奪張去下令曰生得林敎授者有賞先生匿他處捜得張曰前日罵我者非爾耶先生曰然張曰降我則俾爾為元帥同享富貴先生曰爾偽也我何為降再三終不屈縛于樹不觧衣冠而殺之又江浙行省員外郎楊乗字文載濵州人蚤為天官小史辟中書參議掾歴官至榖城介休二縣尹拜監察御史擢今任是年杭州䧟公與郎中赫徳爾王仲温員外裕呼諾都事張鏞俱坐黜公退居松江之青龍鎮後御史臺以公等職在賛理不當罪宜復其官爵上之事遂白十六年丙申淮人䧟平江連䧟松江秋七月十八日遣所署官吴縣丞張經等齎禮幣造請公遣人告曰吾廢處田里乆不足以辱使者吾當擇日受命請以幣置里門外經等如其言公命子卣卓具牲醴告祖禰既竣事復命酒飲逮暮起行後圃中頋西日晴好慨然曰晚節如是足矣命卣等治畦處置家事如平日撫其孫虎林若怡怡自得也歸坐至夜分二子立侍命曰二子行且休吾將就寢公儉約無姬侍其燕息寝處人莫得與俱詰旦卣等怪寝門未啓發視之則公已自經得手書遺語大意言死生晝夜之理且以得全晩節為快又西臺監察御史張公謝職居雄山縣而䧟賊賊魁者素聞公有治績置公上坐脅之受偽官公唾罵之遂縛公妻奴九人至前先殺妾次殺子女以及妻每殺一人則諭公曰御史若降餘可免公弗為動容其罵如初魁怒拽下坐殺之此在至正辛卯秋八月間公諱桓字彦威南村野史曰天下之事戰争十有餘年于兹矣為臣辱國為将辱師敗降奔竄不可勝計甚者含詬忍恥偷生冐榮以為得志名節大閑一蕩去弗頋求其忠義英烈于千百之中莫克什一噫忠義英烈雖出扵天性要亦講之有素處之甚安故扵造次顛沛之際决然行之而無疑如李總管黼王州尹巴延樊參政執敬張御史桓林敎授夢正蕭處士景茂之殺身成仁視死如歸是必講之熟而處之當一旦出扵人所不肯為遂以驚動天下而精英忠烈之氣在宇宙間與嵩華相髙者自不容冺若桓之居在閒地乗之久坐廢黜夢正之分顓講敎視握將帥之權受民社之託任大而責重者有間矣一皆従容就義是尤難也景茂里中一儒生耳初未嘗得斗升之禄以養其父母尺寸之組以榮其身始扵保民終扵保國臨大節而不可奪古稱烈丈夫又豈能過是與至于子為父死婦為夫死聲光赫奕照映史冊使百世而下知綱常大義之不可廢天理人心之不可滅如此其有功扵名敎為何如是亦深仁厚澤涵養所致孰謂百年之國而無人哉瘞鶴銘瘞鶴銘華陽真逸譔上皇山樵鶴夀不知其紀也壬辰嵗得于華亭甲午嵗化扵朱方天其未遂吾翔寥廓耶奚奪之遽也迺裹以𤣥黄之幣蔵兹山之下仙家無𨼆我故立石旌事銘不朽詞曰相此胎禽浮邱著經乃徴前事我𫝊爾銘余欲無言爾其蔵靈雷門去鼓華表留形義惟彷彿事亦㣲㝠爾將何之觧化惟寧後蕩洪流前固重扄右割荆門歴下華亭奚集真侣瘞爾作銘丹陽外仙尉江隂真宰右刻在鎮江焦山下頑石上潮落方可模相𫝊為晉王右軍書惟宋黄睿東觀餘論云為陶𨼆居書良是其曰今審定文格字法殊𩔖陶𢎞景𢎞景自號華陽𨼆居今號真逸者豈其别號與又其著真誥但云己卯嵗而不著年名其他書亦爾今此銘壬辰嵗甲午嵗亦不書年名此又可證云壬辰嵗梁天監十一年也甲午者十三年也按𨼆居天監七年東㳺海嶽權駐㑹稽永嘉十一年乙未嵗始還茅山其弟子周子良仙去為之作傳即十一年十三年正在華陽矣後又有題丹陽尉江隂宰數字當是效陶書故題扵石側也王逸少以晉恵帝大安二年癸亥嵗年五十九至穆帝升平五年辛酉嵗卒則成帝咸和九年甲午嵗逸少方年二十三至永和七年辛亥嵗年三十八始去㑹稽閒居不應二十三嵗已自稱真逸也又未官扵朝及閒居時不在華陽以是考之决非王右軍書也審矣歐陽文忠公以為不𩔖王右軍法而𩔖顔魯公又疑是頋况云道號同又疑王瓉皆非睿字長孺號雲林子邵武人又董逌書跋第六卷載南陽張舉子厚所記云瘞鶴銘今存扵焦山凡文章句讀之可識及㸃畫之僅存者百三十餘言而所亡失幾五十字計其完書盖九行行之全者二十五字而首尾不預焉熙寧三年春余索其逸遺扵焦山之隂偶得十二字扵亂石間石甚迫隘偃卧其下然後可讀故昔人未之見而世不𫝊其後又有丹陽外仙江隂真宰八字與華陽真逸上皇山樵為似是真侣之號今取其可考者次序之如此又董君自書其後云文忠集古録謂得六百字今以石校之為行凡十八為字二十五安得字至六百疑書之誤也余扵崖上又得唐人詩詩在貞觀中已列銘後則銘之刻非頋况時可知集古録豈又并詩繫之耶君字彦逺號廣川東平人又國朝鄭枃衍極第二巻論瘞鶴銘而劉有定釋云潤州圖經以為王羲之書或曰華陽真逸頋况號也蔡君謨曰瘞鶴文非逸少字東漢末多善書惟𨽻最盛至扵晉魏之分南北差異鍾王楷法為世所尚元魏間盡習𨽻法自隋平陳中國多以楷𨽻相參瘞鶴文有楷𨽻筆當是隋代書曹士冕曰焦山瘞鶴銘筆法之妙為書家冠冕前輩慕其字而不知其人最後雲林子以為華陽𨼆居為陶𢎞景及以句曲所刻𨼆居朱陽館帖參校然後衆疑􅇚然其鍳賞可謂精矣以余考之一本山樵下有書字真宰下有立石二字一本我𫝊爾銘作出扵上真爾其蔵靈作紀爾嵗辰張舉本作丹陽外仙邵亢本作丹陽仙尉又有作丹陽外仙尉者且中間詞句亦多先後不同尚俟拏舟過揚子手自模印以稽其得失之一二可也風入松吾鄉柯敬仲先生九思際遇文宗起家為奎章閣鍳書博士以避言路居吴下時虞邵菴先生在館閣賦風入松長短句寄博士云畫堂紅袖倚清酣華髮不勝簮幾回晚直金鑾殿東風軟花裏停驂書詔許𫝊宫燭香羅初翦朝衫御溝氷泮水挼藍飛燕又呢喃重重簾幕寒猶在憑誰寄錦字泥緘報道先生歸也杏花春雨江南詞翰兼美一時争相𫝊刻而此曲遂徧滿海内矣翦一作試四卦睦人邵𤣥同先生桂子嘗作忍黙恕退四卦掲之坐隅真得保身慎言絜矩知止之道者矣其忍卦曰忍亨初難終吉利君子貞不利小丈夫􅂏曰忍剛發乎内柔制乎外故亨初若甚難乃終有吉惟君子為能動心忍性不利小丈夫其中淺也象曰刃在心上忍君子以含容成徳初一小不忍則亂大謀象曰小不克忍成大亂也次二必有忍其乃有濟象曰能忍于中事克濟也次三一朝之忿亡其身以及其親象曰一朝之忿至易忍也亡身及親禍孰大焉次四出于跨下以成漢功韓信以之象曰跨下之辱小辱也成漢之功大功也次五張公藝九世同居書一忍字以對于天子象曰同居之義忍克致也積而九世有容徳也上六血氣方剛戒之在鬬象曰方剛之氣忍則滅也形而為鬬自求禍也其黙卦曰黙無咎可貞不利有所言􅂏曰黙不言也亂之所生也則言語以為階是以君子慎宻而不出故無咎黙以自守其道可貞也不利有所言尚口乃窮也象曰口尚𤣥曰黙君子以去辨養静初一守口如瓶終吉象曰守口如瓶謹所出也其初能黙終則吉也次二多言不如守中象曰言不如黙得中道也次三駟不及舌有悔象曰駟不及舌滕口說也一言之失悔何追也次四無以利口亂厥官卿士戒之象曰位髙而言輕亦可戒也次五聖人之敎不言而信象曰不言而信淵黙之化也上六君子之道或黙或語象曰時然後言黙不可長也其恕卦曰恕有孚終吉􅂏曰恕之為道善推其所為而已以己之心合人之心己所不欲勿施扵人故有孚能以一言終身而行之其吉可知矣象曰如心恕君子以明好惡同物我初一强恕而行求仁莫近焉象曰强而行之恕之始也行而不已違道不逺也次二君子有絜矩之道象曰絜矩之道恕也次三好人之所惡惡人之所好是謂拂人之性菑必逮夫身象曰拂人從欲身之菑也次四己欲立而立人己欲逹而逹人象曰立而逹恕以從人也次五聖人與衆同欲象曰與衆同欲聖人之恕也上六責己重以周待人輕以約象曰待人之法可用恕也責己之道不可自恕也其退卦曰退勿用有攸往􅂏曰退止也勿用有攸往知止也日中則退而昃月盈則退而􅃜四時之運成功者退而况扵人乎退之時義大矣哉象曰艮止其所退君子以晦蔵扵宻初一退无咎象曰其進未銳義无咎也次二難進易退象曰難進易退可事君也次三兼人凶象曰兼人之凶勇不知退也次四見可而進知難而退象曰知難而退終无尤也次五終日如愚以退為進顔子以之象曰顔子之退進不可御也上六蝜蝂升髙躓而不悔象曰蝜蝂升髙其道窮也躓而不悔亦可戒也㸃鬼録文章用事填塞故實舊謂之㸃鬼録又謂之堆垜死屍見江氏𩔖苑房中術今人以邪僻不經之術如運氣逆流采戰之𩔖曰房中術按史周有房中樂漢書禮樂志髙祖時有房中詞樂唐山夫人所作武帝時有房中歌又曰房中者情性之極至道之際是以聖王制外樂以禁内情而為之節文樂而有節則和平夀考及迷者弗頋以生疾而殞性命禮記曾子問衆主人卿大夫士房中皆哭注房中婦人也然房中之謂豈取此一書與婦女曰娘娘子俗書也古無之當作孃按說文頻擾也肥大也從女襄聲女良切其義如此今乃通為婦女之稱故子謂母曰娘而世謂穏婆曰老娘女巫曰師娘都下及江南謂男覡亦曰師娘娼婦曰花娘蒙古又謂曰草娘苖人謂妻曰夫娘南方謂婦人之無行者亦曰夫娘謂婦人之卑賤者曰某娘曰幾娘鄙之曰婆娘考之風俗通漢何敞為鬼蘇珠娘按誅亭長龔夀隋書韋世康為絳州刺史與子弟書云况娘春秋已髙温凊宜奉敎坊記北齊時丈夫着婦人衣行歌傍人齊和云􅂿謡娘南史梁元徐妃與帝左右暨季江私通季江曰徐娘雖老尚猶多情又梁臨川王宏侵魏魏遺以巾幗歌曰不畏蕭娘與吴姥但畏合肥有韋虎謂韋睿吕僧珍也大業拾遺隋煬帝宫婢曰雅娘唐史張旭草書見公孫大娘舞劒器而通神又武承嗣聞喬知之婢􅆼娘美奪取之杜工部詩耶娘妻子走相送又黄四娘家花滿蹊白樂天詩吴娘暮雨蕭蕭曲韋應物詩春風一曲杜韋娘栁子厚下殤女墓磚記始名和娘樂府雜録張紅紅唱歌丐於市韋青納為姬敬宗召入宫號記曲娘又望江南曲始自朱崖李太尉鎮浙西日為姬謝秋娘所製明皇雜録呼白鸚鵡為雪衣娘甘澤謡武三思晚獲一妓曰綺娘狄仁傑至遂逃壁隙中曰我天上花月之妖也樊川集杜秋娘年十五為李錡妾錡敗入宫後坐譴歸故里又竇桂娘父良建中初為汴州户曹掾李希烈破汴州取桂娘去李賀集賀撰申胡子觱篥歌成翔客喜擎觴起立命花娘出幙徘徊拜客劉賔客集泰娘本韋尚書家主謳者河東記唐進士叚何卧病遇妊娘留詩而愈𫝊竒崔氏鸎鸎婢曰紅娘霍小玉𫝊長安中有媒氏鮑十二娘薛蒼駙馬青衣也余媚娘叙録陸希聲娶余媚娘媚娘約媒曰陸郎中若必得兒侍巾櫛須立誓不置側室及女奴圖經􅅙神謂之馬頭娘杜陽雜編南海貢竒女盧媚娘工巧無比麗情集陳敏兄妾越娘貌美兄死遂與欵狎續齊諧記齊穎寓山隂夜見前宰妾萬文娘墨荘漫録李后主令宫嬪窅娘以帛繞脚令纎小右畧舉一二不能悉載是則今之云云皆有所本然都下自庶人妻以及大官之國夫人皆曰娘子未嘗有稱夫人郡君等封贈者載考之史隋柴紹妻李氏起兵應李淵與紹各置幕府號娘子軍唐平陽公主兵與秦王定京師號娘子軍花蕋夫人宫詞諸院各分娘子位韓昌黎有祭周氏二十娘子文以此推之古之公主宫妃已與民間共稱娘子則今之不分尊卑亦自有来矣古刻至正壬辰春城平江扵古城基内掘得一碑其文云三十六十八子寅卯年至辰巳合收張翼同為利不在常不在揚切湏欵欵細思量且卜水莫問米浮圖倒地莫扶起修古岸重開河軍民拍手笑呵呵日出屋東頭鯉魚山上逰星従月裏過㑹在午年頭右不曉所言何事姑識之或者以為三十六四九也張翼巳午之交也今張太尉第行九四而同首亂者適十八人也豈其然與上頭入月今世女子之笄曰上頭而倡家處女初得薦寝扵人亦曰上頭花蕊夫人宫詞年初十五最風流新賜雲鬟使上頭又天癸曰月事黄帝内經女子二七而天癸至月事以時下又曰女子不月史記濟北王侍者韓女病月事不下診其腎脉嗇而不屬故曰月不下又程姬有所避不願進注天子諸侯羣妾以次進御有月事者止不御更不口說故以丹注面目的的為識令女史見之王察神女賦施𤣥的的即上所云也然入月二字尤新王建宫詞宻奏君王知入月喚人相伴洗裙裾人腊至正乙巳春平江金國寳袖人腊出售余獲一觀其形長六寸許口耳目鼻與人無異亦有髭􅂡頭髮披至臋下須髪皆黄色間有白髪一根徧身黄毛長二分許臍下隂物乃男子也相𫝊云至元間世皇受外國貢獻以賜國公阿爾尼格者無幾何時即死因剖開背後剜去腸臓實以他物仍縫合烘乾故至今無恙按漢武故事東郡送一短人長七寸名巨靈神異經西海有一鶴國人長七寸山海經有小人國名靖人詩含神霧東北極有人長九寸殆為此小人也靖或作竫音同然古尺短今六寸比之周尺將九寸矣則所腊者豈其人與張翰林詩天子臨軒授鉞頻東南無地不紅巾鐵衣逺道三軍老白骨中原萬鬼新義士精靈虹貫日仙家談笑海揚塵都将兩眼淒涼淚哭盡平生幾故人此至正辛丑間張蛻菴承㫖翥在都下寄浙省周玉坡參政伯琦詩也夫翰苑詞臣而寓言如此則感時之意從可知矣輟耕録巻十四欽定四庫全書輟耕録巻十五元陶宗儀撰淳化閣帖淳化閣帖非精扵鍳賞者莫能辨其真偽非博扵討論者不可得其源流第六巻中嘗記祖石刻之說今復究研大略於稽古之書質正是否扵好事之人用贅于此云宋太宗留意翰墨淳化中出御府所蔵命侍書王著臨榻以棗木鏤刻釐為一十巻扵每卷末題云淳化三年壬辰嵗十一月六日奉聖㫖模勒上石至仁宗又詔僧希白刻石于秘閣前有目録卷後無題世𫝊以為二王府帖者非也盖元祐中親賢宅從禁中借板墨百本但用潘谷墨光輝有餘而不甚黟黑又多木横裂紋時有皴皵失字處親賢宅魏王所居魏王二王也又有髙宗紹興中國子監本其首尾與淳化略無少異當時御前拓者多用匱紙盖打金銀箔者也自後碑工作蟬翼本且以厚紙覆板上𨼆然為銀鋌痕以愚人但損剥非復拓本之遒勁矣初徽宗建中靖國間出内府續所收書令刻石即今續法帖也大觀中又奉㫖摹榻歴代真跡刻石于太清樓字行稍髙而先後之次與淳化則少異其間數帖多寡不同各卷末題云大觀三年正月一日奉聖㫖摹勒上石此蔡京書也而以建中靖國續帖十巻易去嵗月名銜以為後帖又刻孫過庭書譜及貞觀十七帖總為二十二卷謂之大觀太清樓帖絳帖者尚書郎潘師旦以官帖摹刻于家為石本而𫝊冩字多譌舛世稱為潘駙馬帖凡二十卷其次序卷帖雖與淳化官帖不同而實則祖之特有所增益耳單炳文曰淳化官本法帖今不復多見其次絳帖最佳而舊本亦已艱得嘗以數本較之字畫多不侔煒家蔵舊本比之今本第九巻内今本多誤筆法且俗曹士冕曰帖總二十卷元無字號及斷眼數目單炳文曹士冕各有模刻本世𫝊潘氏析居法帖分而為二其後絳州公庫乃得其一扵是補刻餘帖名東庫本第九卷之舛誤盖始于此且逐卷逐叚各分字號以日月光天徳等二十字為次第後避金主亮諱但庾亮帖内亮字皆去右邊轉筆謂之亮字不全本又有新絳本北方别本武岡新舊本福清烏鎮彭州資州本木本前十巻等𩔖皆絳帖之别也潭帖者慶歴中劉丞相帥潭日以淳化官帖命慧照大師希白模刻于石置之郡齋增入傷寒十七日王濛顔真卿諸帖而字行頗髙與淳化閣本差不同逐卷有慧照大師希白重模字而嵗月各異中間繆處甚多朱文公譏其極為可笑者是也潭帖之别則有劉丞相私第本長沙碑匠新刻本三山木本蜀本廬陵蕭氏本等𩔖甚多戯魚即臨江帖也元祐間劉次荘以家蔵淳化閣帖十卷摹刻于戱魚堂除去題而増􅇚文慶元中四川總領權安節又重摹扵利州黔江者黔人秦世章扵長沙買石摹僧寳月古法帖十巻寳月慧照也謀舟載入黔中壁之黔江之紹聖院後題云長沙湯正臣重摹鼎帖板本校諸帖増益最多灃陽石刻散失僅存者右軍數帖而已又有淳熙修内司本北方印成本烏鎮張氏福清李氏本若此之𩔖大抵皆法帖一再之翻摹殊失筆意無足觀者汪逵字季路衢州人官至端明殿學士建集古堂蔵竒書秘蹟金石遺文二千巻著淳化閣帖辨記共十卷極為詳備末云其本乃木刻計一百八十四版二千二百八十七行其逐叚以一二三四刻扵旁或刻人名或有銀鋌印痕則是木裂其墨乃李廷珪墨黒甚如漆其字精明而豐􅃾比諸刻為肥劉潜夫曰近人多不識閣帖某家寳蔵本皆非真真者字極豐穰有神采如潭絳則太痩臨江則太媚又用李廷珪墨印造余始得汪端明所記閣帖行數恨無真帖㕘校晚使江左用二千楮致一本尤伯晦見之曰寳物也夫真帖可辨者有數條墨色一也他本刋巻數在上版數在下惟此本巻數版數字皆相聨屬二也他本行數字比帖字小而瘦此本行數字比帖中字皆大而濃三也余所得江左本每版皆全紙無接黏處一部十卷無一版不與端明所記合乃知昔人装背之際寧使每版行數或多或寡而不肯剪截湊合者欲舊帖之真面目四也幽圄太師丞相托克托之死盖副樞哈瑪爾與其弟蘓蘓并詹事僧格實哩等擠陷之也哈瑪爾輩得侍上帷幄而僧格在東宫為近侍故哈瑪爾黨僧格而私相誓曰若太師去位後我能作右相則左相必詹事矣既而入中書又虞僧格來其權不顓奏除宣政使而以弟蘇蘇為御史大夫僧格殊失望未幾哈瑪爾得罪杖死蘓蘓亦仰藥死初僧格有侍從人亦曰僧格實哩服勞執事得僧格意僧格舉充院宣使一日奄然長逝經日乃醒云方坐卧室榻上見二卒自外躍入導之往都城隍廟轉發嶽祠祠吏曰来矣可亟觧去旋又行入祠西北隅大林内有殿宇若王者居入拜殿下已仰視之則太師也太師曰我所攝者院使也於汝無預因俾左右引之觀幽圄見哈瑪爾兄弟括髪闗械頋僧格泣下及出太師謂曰汝可即歸此非人間世也退而覺恍若一夢然明日同寅有来約往院使家僧格辭疾且曰君幸毋泄吾恐院使不久生矣衆問其故告以詳皆相頋驚愕曰昨日院使將上馬以體少不安而入豈遽至此乎語未畢有報院使已暴卒近見浙西憲司經歴何伯大所說甚悉此特其略耳煑豆帖黄山谷煑豆帖云庭堅頓首失牛兒来終日惘然至今頭昏眼痛雖取所喜者為之亦不能如意也以是不能修問辱手誨喜承日用輕安所湏諸方既無人可抄又意緒不佳嬾動耳煑黑豆法確豆一升挼莎極浄用貫衆一斤細剉如骰子同豆斟酌水多少慢火煑豆香熟日乾之翻覆令展盡餘汁簸取黑豆去貫衆空心日㗖五七粒食百草木枝葉皆有味可飽也世間不强學力行自致扵古人者不可不畜此方庭堅頓首翰禮秘校足下妓妾守節妓妾之以色藝取憐妬寵扵主家者亦曰我之富與貴有以感動其中耳設遇患難貧病彼必戚戚然求為脫身之計又肯守志不貳者哉如金谷園緑珠燕子樓盼盼韓香之扵葉氏愛愛之扵張逞者真絶無而僅有也大元混一以来得三人焉李翠娥維揚名娼也石九山萬户納置别業石没李誓不適他姓以辱身終日閉閣誦經而已年及七十餘萬户之子若孫遇嵗時咸往拜之樂籍中相傳以為盛事王巧兒京師上色也陳雲嶠同知與之狎擕至杭陳卒奉正室鐵氏以清慎勤儉終其身汪憐憐湖州角妓也訥古伯經歴常屬意焉汪曰君若不棄寒㣲當以側室處妾䑕竊狗偷妾决不為此態訥乃遣媒妁備財禮娶之經三載死汪髠髮尼寺時公卿士夫有往訪之者汪故毁其身形以絶狂念卒老于尼若此者亦可以追踪前古之懿徳矣與妓下火文錢唐道士洪丹谷與一妓通因娶為室病且革頋謂洪曰妾死在旦夕卿湏自執薪還肯作一轉語乎夫妾歌兒也卿能集曲調扵妾未死時使預聞之雖死無憾矣洪固滑稽輕佻者遂作文曰二十年前我共伊只因彼此太癡迷忽然四大相離後你是何人我是誰恭惟稱呼秀鍾谷水聲遏楚雲玉交枝堅一片心錦傳道餘二十載遽成如夢令休憶少年逰哭相思兩手託空意難􅁯一筆勾斷且道如何是一筆勾斷孝順哥終無孝順逍遥樂永遂逍遥聴畢一笑而卒因記中吴紀聞載一事云崑山娼周氏係籍部中張子韶為守時娼暴亾適道川来訪因命作下火文云可惜許可惜許大家且道可惜許箇甚麽可惜巫山一段雲眼如新水㸃絳唇昔年繡閣迎仙客今日桃源憶故人休記醜奴兒臉子便湏抖擻好精神南柯夢斷如何也一曲離愁别是春大衆還知某人向甚麽處去這裏分明㑹得驀山溪畔頭頭盡是喜相逢芳草渡頭處處六么花十八其或未然更聽下句咦與君一把無明火燒盡千愁萬恨心其事頗相𩔖併附于此云賀人妾得子啟陸伯麟側室育子友人陸象翁以啓戱賀之曰犯簾前禁尋竈下盟玉雖種扵藍田珠將還於合浦移夜半鷺鷥之歩㡬度驚惶得天上麒麟之兒這囘喝采既可續詩書禮樂之脉深嗅得油鹽醤醋之香蘇東坡咏婢謔詞有掲起裙兒一陣油鹽醤醋香之句弔四狀元詩平江一驛舟中有題弔四狀元詩者不知誰所作詩曰四榜状元逢此日他年公論定難逃空令太守提三尺不見元戎用六韜元舉何如兼善死公平争似子威髙世間多少偷生者黄甲由来出俊髦元舉王宗哲字也至正戊子科三元進士時為湖廣憲僉兼善台哈布哈字也時為台州路逹嚕噶齊公平李齊字也時為髙郵府知府子威李黼字也時為江州路總管此四公者或大􅃜臣節或盡忠王事或遇難而亾故云若論其優劣則江州第一台州次之髙郵又次之憲僉不足道也雞妖至正丁酉春三月上海李勝一家雞伏七雛一雛作大雞状鼓翼長鳴明年戊戌春正月錢唐盧子明家一雞伏九雛一雛有三足二足在前一足在後三月諸暨𡊮彦城家一雞伏五雛一雛有四足二足在翼下不數日皆死而各家亦無他異胡烈女越嵊縣剡溪胡氏諱妙端適同邑祝某至正庚子春為苖䝤虜至金華縣将妻之義不受辱乘間嚙指血題詩壁上已赴水而死三月廿四日也䝤帥服其節為立廟祀之邑人咸曰烈女廟詩曰弱質空懐漆室憂捜山千騎入深幽旌旗影亂天同慘金鼓聲淫鬼亦愁父母劬勞何日報夫妻恩愛此時休九泉有路還歸去那箇雲邊是越州鼃獄盧伯玉文璧至正初尹荆山日忽有一巨鼃登㕔前兩目瞠視𩔖有所訴者令卒尾之行去縣六七里有廢井遂跳入不出既得報往集里社汲井獲死屍乃兩日前二人同出為商一人謀其財而殺之掩捕究問抵罪死者之家屬云其在生不食鼃見即買放豈一念之善為造物者固已鍳之鼃能雪寃良有以也沁園春宋劉改之先生造詞贍逸有思致賦沁園春二首以咏美人之指甲與足者尤纎麗可愛一曰銷薄春氷碾輕寒玉漸長漸彎見鳯鞵泥汙偎人强剔龍涎香斷撥火輕翻學撫瑶琴時時欲剪更掬水魚鱗波底寒纎柔處試摘花香滿鏤棗成斑時將粉淚偷彈記綰玉曾敎栁傅看算恩情相著搔便玉體歸期暗數畫徧䦨干每到相思沉吟静處斜倚朱唇皓齒間風流甚把仙郎暗搯莫放春閒一曰洛浦淩波為誰㣲歩輕塵暗生記􅂿花芳徑亂紅不損歩苔幽砌嫩緑無痕襯玉羅慳銷金様窄載不起盈盈一叚春嬉㳺倦笑敎人欵捻㣲褪些根有時自度歌聲悄不覺㣲尖㸃拍頻憶金蓮移換文鴛得侣繡茵催衮舞鳯輕分懊恨深遮牽情半露出没風前煙縷裙知何似似一鉤新月淺碧籠雲近邵清溪亨貞嗣其體調以咏眉目真雋永有味一曰巧鬭彎環纎凝嫵媚明装未收似江亭曉望遥山拂翠宫簾暮捲新月横鉤掃黛嫌濃塗鉛訝淺能畫張郎不自由傷春倦為皺多無力翻做嬌羞填来不滿横秋料著得人間多少愁記魚箋緘啟背人偷歛鴈鈿膠併運指輕揉有喜先占長顰難效栁葉輕黄金在否雙尖鎖試臨鸞一展依舊風流一曰漆㸃填眶鳯稍侵􅁂天然俊生記隔花瞥見踈星烱烱倚䦨凝注止水盈盈端正窺簾瞢騰並枕睥睨檀郎長是青端相乆待嫣然一笑宻意將成困酣曾􅀍鶯驚强臨鏡挼挱猶未醒憶帳中親見似嫌羅宻尊前相頋翻怕燈明醉後看承歌䦨鬭弄㡬度孜孜頻送情難􅁯處是鮫綃揾透别淚雙零恭敏坊李恭敏公者所居在江隂之南門其門首巷坊亦題曰恭敏不知當日名坊之義而七八十年来子孫消削第宅傾圯殆盡棄遺故址竟為里豪薛得昭所吞土木一新鄉閭徤羡忽有人獻謟扵薛云若不除去舊坊終非君家利也薛深然之指數恭敏之族尊且長者惟李唐卿可主其事乃呼至贈泉百緡李欣然撤之一夕囈語呻吟甚苦妻急呼之覺問其故曰我夢見袍笏大官自云是我祖責以不能世守其業又毁其坊既罵且撻我負痛呌號故致此耳語既暴死莫救又數年城燬扵兵薛氏室屋財産悉空貧無為計遂執幹役扵時貴之家噫子孫之不肖强覇之用心皆可為後人鍳也𨼆趣余家天台萬山中茅屋可以芘風雨石田可以具饘粥雖行江海上而泉石草木之勝未嘗不在夢寐時見也偶讀廬陵羅景綸大經所著鶴林玉露曰唐子西云山静似太古日長如小年余家深山之中每春夏之交蒼蘚盈階落花滿逕門無剥啄松影參差禽聲上下午睡初足旋汲山泉拾松枝煑苦茗啜之随意讀周易國風左氏𫝊離騷太史公書及陶杜詩韓蘇文數篇從容歩山徑撫松竹與麛犢共偃息扵長林豐草間坐弄流泉潄齒濯足既歸竹窓下則山妻稚子作筍蕨供麥飯欣然一飽弄筆窓間随大小作數十字展所蔵法帖墨蹟畫卷縦觀之興到則吟小詩或草玉露一兩叚再烹苦茗一杯出歩溪邊邂逅園翁溪友問桑麻說秔稲量晴校雨探節數時相與劇談一餉歸而倚杖柴門之下則夕陽在山紫緑萬状變幻頃刻恍可人目牛背笛聲兩兩来歸而月印前溪矣味子西此句可謂絶妙然此句妙矣識其妙者盖少彼牽黄臂蒼馳獵扵聲利之塲者但見衮衮馬頭塵匆匆駒隙影耳烏知此句之妙哉人能真知此妙則東坡所謂無事此静坐一日是兩日若活七十年便是百四十所得不已多乎此羅君語也余盖亦知此妙乆矣風塵􅐓洞豺虎咬人㡬賦歸與之詩計無所得又未知何日可以遂吾志也掩卷為之三嘆日書三萬字江浙平章子山公書法妙一時自松雪翁之後便及之嘗問客有人一日能寫得幾字客曰聞趙學士言一日可寫萬字公曰余一日寫三萬字未嘗以力倦而輟筆公號正齋恕叟又號蓬累叟康里人妓出家李當當者敎坊名妓也姿藝超出輩流忽翻然若有所悟遂著道士服江浙儒學提舉叚吉甫先生天祐贈之以詩曰歌舞當今第一流洗妝拭面别青樓便随南嶽夫人去不為蘇州刺史留璚館月明簫鳯下綺窓雲散鏡鸞收却嫌癡絶潯陽婦嫁得商人已白頭能改齋漫録云唐陽郇伯作妓人出家詩曰盡出花鈿與四隣雲鬟剪落向殘春暫驚風燭難留世便是池蓮不染身貝葉欲翻迷錦字梵聲初落誤梁塵従今艶色歸空後湘浦應無觧佩人湘山野録乃謂陳彭年作此不考之過也吁二先生之風流餘韻扵此可以想見矣河南王河南王布琳濟達為本省丞相時一日掾吏田榮甫抱牘詣府請印王留田侍宴命司印開匣取印至前田誤觸墜地王適更新衣而印朱濺汙滿襟王色不少動歡飲竟夕又一日行郊天氣且暄王易凉帽左右捧笠侍風吹堕石上擊碎御賜玉頂王笑曰是有數也諭令毋懼噫此其所以為丞相之量妖異至正辛卯夏松江普照寺僧舍一弊帚開花又嘉興儒學閽人陶氏磨上木肘發青條開白花又吴江分湖里煆工一栁樹樁以安鐵碪者且十餘年矣發長條數莖如葦三家雖有此怪而皆無恙豈非闗係國家之氣數乎塔影入屋平江虎丘閣版上有一竅當日色清朗時以掌大白紙承其影則一寺之形勝悉扵此見之但頂反居下耳此固有象可寓非幻出者松江城中有四塔西曰普照又西曰延恩西南曰超果東南曰興聖夏監運家乃在四塔之東而小室内却有一塔影長五寸許倒懸于西壁之上不知從何而来然不常有或時見之焉是又不可曉也錢唐懐古詞傅按察者􅁯其名錢唐懐古嘗作一詞云静中看記昔日湖山𨼆𨼆宛若虎踞龍蟠下襄樊指揮湘漢鞭雲騎圍繞江干勢不成三時當混一過唐之數不為難陳橋驛孤兒寡婦乆假當還掛征㠶龍舟催發紫宸初卷朝班禁庭空土花暈碧輦路悄訶喝聲乾縦餘得西湖風景花栁亦凋殘去國三千㳺仙一夢依然天淡夕陽間昨宵也一輪明月還照臨安盖鴨頭緑調也人命至重後至元間同知兩浙都轉運鹽使司事趙君伯常休日與書吏談官府政事因曰吾曩為中書提控掾史時夜坐私第一室忽有兩𨽻来前𫝊都堂鈞㫖呼喚遂即上馬頴前導至一官府樹木隂翳大官危坐聽事上問曰河南饑省咨至乃緩七日不報彼處死者甚衆汝知之乎吾答曰某提控耳該掾稽遲之罪已嘗呈舉官沉思良久曰非汝過也汝退又命前𨽻曰可急追該掾某人来吾遂夢覺也明日晨起令人覘之夜暴死矣人命至重爾輩其愼之度量宏深建德路達嚕噶齊衮都羅丹字志道守贑州路任滿聽除時有故吏某往臨江貼補介衮都羅丹尺牘見總管穆巴喇即日録用就遣某持俸鈔五十定餽之時衮都羅丹家甚貧朋友間每分財以濟某竟匿其鈔後穆巴喇數得書而謝不及疑焉因使問之衮都羅丹知為某匿即具書請失謝之罪某聞惶赧無地令兒子奉鈔還終不受且為𨼆其惡未嘗與人言衮都羅丹西域人也度量之宏深如是可謂厚德君子矣若某者名教中所不可容尚孰責哉髙麗氏守節中書平章庫庫岱之側室髙麗氏有賢行平章死誓弗貳適正室子巴特瑪多爾濟說其色欲妻之而不可得乃以其父所有大塔納環子獻扵太師巴延此物盖巴延所屬意者巴延喜問所欲遂白前事巴延特為奏聞奉㫖命巴特瑪多爾濟收繼小母髙麗氏髙麗氏夜與親母踰垣而出削髮為尼巴延怒以為故違聖㫖拜奏命省臺洎侍正府官鞫問諸官奉命惟謹鍜錬備極慘酷時國公庫哩濟蘓扵鞫問官中獨秉權力持正府都事特穆爾布哈數致語曰誰無妻子安能相守至死得有如此守節者莫大之幸而反坐以罪恐非我治朝之盛典也國公悟為言扵巴延之前宛曲觧釋其事遂已特穆爾布哈漢名劉正卿後至監察御史而卒寒號蟲五臺山有鳥名寒號蟲四足有肉翅不能飛其糞即五靈脂當盛暑時文采絢爛乃自鳴曰鳯凰不如我比至深冬嚴寒之際毛羽脫落索然如鷇雛遂自鳴曰得過且過嗟夫世之人中無所守者率不甘湛涪鄉里必振拔自豪求尺寸名詫九族儕𩔖則便志滿意得出肆入揚以為天下無復我加矣及乎稍遇貶抑遽若䘮家之狗垂首貼耳揺尾乞憐惟恐人不我恤視寒號蟲何異哉是可哀已鄧思賢嘗見人戱呼一譁訐者為鄧思賢初不可曉後讀筆談始得其說云世𫝊江西人好訟有一書名鄧思賢皆訟牒法也其始則教以侮文侮不可得則欺誣以取之欺誣不可得則求其罪刦之盖思賢人名也人𫝊其術遂以名書村校中往往以授生徒醫科醫有十三科考之聖濟總録大方脉雜醫科小方脉科風科産科兼婦人雜病科眼科口齒兼咽喉科正骨兼金鏃科瘡腫科鍼灸科祝由科則通兼言輟耕録巻十五欽定四庫全書輟耕録卷十六元陶宗儀撰陶氏二譜宋泰山王質所著雲韜堂紹陶録録中首載栗里華陽二譜惟先生之大節髙風流播千古而質者乃能次第其出處作為年譜且以名吾書紹陶之志是可尚已遂録于此云書陶栗里譜元亮髙風發扵宋晉去就之際君曽祖事晉懋著勲勞自宋武帝芟元復馬逆揣其末流即不出武帝将收賢士以繫人心見要亦不應陶謝皆世臣君世地色言俱辟而靈運為武帝秉任最後乃欲詭忠義雜江海逺師送君過虎溪而却靈運不入蓮社素心皆所鍳知譜具左右興寧三年乙丑晉哀帝君生扵潯陽柴桑今徳安縣楚城市是父軼名命子詩云於穆仁考澹焉虚止寄迹風雲宜兹愠喜陶氏自侃以武功擅世後裔稍襲故風多流亂岐盖折翼之祥發之旁𣲖𫝊淡𫝊君父子皆以𨼆徳著稱侃女適孟嘉嘉女適君父是生君其氣所傳造化必有可言者大元元年丙子晉武帝君年十二失母祭妹文云慈妣早世我年二六大元九年甲申君年二十失妾楚調詩云弱冠逢世阻始室䘮其偏妻翟氏偕老所謂夫耕扵前妻鉏扵後當是翟湯家湯荘矯法賜四世以𨼆行知名亦柴桑大元十九年甲午君年三十有歸園田詩云誤落塵網中一去三十年初為州祭酒當在其前不堪乃觧歸故云久在樊籠裏復得返自然尋亦却主簿隆安四年庚子晉安帝君年三十六五月有従都還阻風規林詩當是㕘鎮軍銜命自京都上江陵故在始作鎮軍㕘軍經曲阿詩後父在柴桑故云一欣侍温顔又云久㳺戀所生父為人度不肯適都當是已舍單行見還舊居詩軍僚差彊郡吏故云時来茍冥㑹宛轡憩通衢投䇿命晨装暫與田園䟽隆安五年辛丑君年三十七正月有㳺斜川詩云開嵗倐五日方三十七作五日是當是故嵗五月還潯陽今嵗七月適江陵有赴假還江陵夜行途中詩留潯陽踰年當是予告在鄉至是往赴云閒居三十載自未參鎮軍以前得三十六年當是不堪勞役遂起歸意故云詩書敦宿好園林無俗情如何捨此去遥遥至南荆失父祭妹文云昔在江陵重罹天罰觸事未逺書䟽猶存當是妹自武昌報江陵時父在柴桑元興二年癸卯君年三十九正月有始春懐古田舍詩當是自江陵歸柴桑復適京都宅憂居家思湓城故有懐古田舍又云良苖懐新十二月有與従弟敬逺詩云寝迹衡門下在都亦當是處野元興三年甲辰君年四十有連雨獨飲詩云僶仰四十年有飲酒詩云是時向立年志氣多所耻遂盡介然分終死歸田里當是在壬辰癸巳為州祭酒之時所謂投耒去學仕又云冉冉星氣流亭亭復一紀至是得十二年義熙元年乙巳君年四十一三月有為建威參軍使都經錢溪詩當是故嵗自都還里即吉庚子始事鎮軍繼事建威中經罹憂至是得六年復銜命至都其家尚未歸柴桑還舊居詩云疇昔家上京六載去還歸往来時經鄉閭不常留稍成疏故云阡陌不移舊邑屋或時非履歴周故居隣老䍐復遺至是始定居斷他適十一月有歸去来辭九月家留柴桑身往彭澤至是免歸當是不堪軍役故求縣不堪縣役故歸家所謂風波未定心憚逺役彭澤去家百里公田足以為酒少日眷然有歸與之情平生之志始决見序及辭甚詳失妹所謂情在駿奔自免去軄是嵗劉將軍録尚書義熙三年丁未君年四十三有祭程氏妹文自乙巳至是所謂服制再周義熈四年戊申君年四十四有六月遇火詩云奄出四十年義熈五年己酉君年四十五有九日詩義熈六年庚戌君年四十六有西田穫早稲詩義熙七年辛亥君年四十七有祭從弟敬逺文云絶粒委務考槃山隂晨采上藥夕閒素琴當時同志見文甚詳義熙十年甲寅君年五十有雜詩云奈何五十年棄官来歸至是得十年故云荏苒經十載暫為人所覊義熙十一年乙卯君年五十一有與子儼等疏云年過五十又云見樹木交䕃時鳥變聲亦復欣然五六月北窓下卧遇凉風暫至自號羲皇上人見䟽甚詳義熙十二年丙辰君年五十二有下潠田舍穫詩云曰余為此来三四星火頽當是得此在癸丑甲寅之間義熈十四年戊午君年五十四楚調云僶俛六九年召為著作佐郎不應是嵗宋公為相國元熙元年己未晉恭帝君年五十五王休元為江州自造不得見遣其故人龐通之等齎酒扵半道栗里要之即引酌野亭休元出與相聞極歡終日嘗九日把菊無酒休元餉之有九日閒居詩所謂秋菊滿園時醪靡至當是未獲所遺休元在江州幾六載未審的在何年自乙巳至丁卯訖死未嘗他適獨暫為休元入州永初元年庚申宋武帝君年五十六同𨼆周續之召至都為顔延之連挫義熙間檀韶為江州邀續之在城北講禮讐書有示周掾祖謝詩云馬隊非講肆校書亦已勤又云但願還渚中從我潁水濵江城尚不欲周往奚况京師劉遺民亦同𨼆有和劉柴桑詩云挈杖還西廬又云春醪觧饑劬其還以春有酬劉柴桑云嘉穗眷南疇又云慨然知已秋其還至是及秋初自西廬移南村有移居詩云聞多素心人樂與數朝夕又云過門更相呼有酒斟酌之遷居殆為遺民之徒尋還西廬度相距亦不逺與遺民更相酬酢不改賞文析義之時未審的在何年或恐劉柴桑似縣令劉或嘗為此縣存此呼或有命不為猶續之嘗命為撫軍參軍不就因呼周掾皆不可知但非時為宰者語皆冷交非熱官丁柴桑詩云秉直司聰于恵百里此乃當官無疑尋詩鍾情扵劉過厚扵周遺民自𨼆之餘無聞續之在𨼆之中㣲婉君與周劉號潯陽三𨼆校情義稍有淺深是嵗宋武帝踐祚景平元年癸亥晉營陽王君年五十九顔延之為始安過潯陽日造飲酣醉臨去留二萬錢送酒家相知乆間驟見益驩延之未審何時来柴桑所謂自爾分居及我多假伊好之洽接簷隣舍當是不詣劉穆之之時又未審何時去柴桑當是為豫章世子㕘軍之時據誄㕘傳略見元嘉三年丙寅宋文帝君年六十二檀道濟為江州時抱羸疾多瘠餒往候饋以粱肉不受元嘉四年丁卯君年六十三有自祭文云律中無射擬挽歌詩云嚴霜九月中送我出逺郊當是杪秋下世顔延之誄云視化如歸臨凶若吉藥劑弗嘗禱祠弗恤其臨終髙態見誄甚詳君平生好談歸盡蕭統以為處百齡之内居一世之中倐忽白駒寄寓逆旅與大塊而榮枯随中和而放蕩豈能勞扵憂畏役扵人間最知深心形贈影答神􅇚本趣略見所謂縦浪大化中不喜亦不懼應盡便湏盡無復獨多慮惟患不知既已洞知安坐待此夫復何言杜甫許避俗未許逹道識者更詳之書陶華陽譜通明髙風發扵梁齊宋去就之際君祖父皆食宋禄身又生宋代自齊髙帝代宋旋引去梁武帝代齊益退蔵平時以師待君然大節有定操豈復以恩禮推移暫至丹陽應簡文之命不少至京都慰武帝之懐抑何其堅忍壮年果扵遺世炤之審故判之不疑譜具左方孝建三年丙申宋世祖君生扵丹陽秣陵今上元縣治村是母郝氏夢兩天人持罏􅋹香来前有娠今世為君再世為孫思邈兩世肇啓扵郝故其兆先形當是本居天仙趣報盡還入人趣植根弗凡受形亦異生以火年火月又夏至極陽日悉禀純陽多起飛心累功積行所升當益髙推佛言參君迹略見大明四年庚子君年五嵗常持荻畫灰學書泰始元年乙巳宋明帝君年十嵗得葛洪神仙𫝊即有志養生語人仰青天睹白日不覺為逺及長博讀書䆳觧文武諸伎自後天文地理人事雖至淵妙咸臻底極當時已罕𫝊歴年愈逺行世寖稀梁𫝊所載十二種今𫝊惟三種傳不能紀十種唐志所載九種今𫝊惟四種𫝊有志無八種𫝊無志有五種本草後人增衍考正益詳間與集注差異元徽二年甲寅宋蒼梧王君年十九蕭將軍録尚書引為諸王侍讀故事止典文學無他務除奉朝請故事止奉朝㑹請召本不為官雖在宦途亦居静地及求縣乃不遂縁勢可見永明十年壬申齊世祖君年三十七家貧求宰縣不遂脫朝服挂神武門去止句曲山體即輕㨗性嗜山水所歴必吟咏盤旋不已語人吾見朱門廣厦雖適其華樂而無欲往之心望髙巖瞰大澤知難立止自常欲就之永明中求禄得輙差舛不爾豈得為今日之事亦縁勢使然此語甚真是事先有根次有縁次有勢相符乃入所謂道生之徳畜之物形之勢成之惟難契故曠世難就隆昌元年癸酉齊鬱林王君年三十八沈約為東陽屢要不至自棲句曲不出所謂徧歴名山求訪仙藥或未然一至句章禮育王塔一至丹陽應太子召他適皆無考又言往東陽従孫㳺嶽授符圖經法亦無考惟楊羲靈寳五符𫝊句容葛粲粲以𫝊陸修静陸以傳孫許翽二景歌東陽章靈民出都遇得以與孫度所得止在秣陵句曲之間非逺適而後𫝊永元元年己卯齊東昏侯君年四十四在句曲築樓髙三層身處其上弟子居其中賔客至其下與物遂絶不娶無子他眷亦不通先斷此根可議他事特愛松風庭院皆植松聆響為樂閒獨逰泉石此門忌濁便清神仙上景多雲霞下景多山水物多金玉色多紫碧他皆𩔖是所謂熟之養之覆之若欲成辨必加將護大要離塵換境為上中興元年辛巳齊和帝君年四十六蕭都督至新林遣弟子戴猛之迎謁初齊末作水丑木之歌至是援䜟文成梁字令弟子進之遂以梁建國後覆没亦預言朱㸃己巳詩嘆朝陽重離七元卒騐雖𨼆茅山不卻人主詢謀中大通初獻善勝成勝二刀度武帝狃陳慶之覆魏洛陽好大之心寖侈參㑹侯景大觸駭機豈盡忘救世者但觀時耳蚤慕張良甚深黄石編書盖𫝊真秘諜兵法其間餘事推已及物亦致平緒術此門𨼆除魔顯定亂學道者問及君著水鏡握鏡當是早為豈挂晚念天監元年壬午梁髙祖君年四十七梁武帝在西邸與㳺及即位恩禮彌篤問訊弗絶屢招不出畫兩牛一牧放水草之間一金絡頭人執杖驅之知不可復致旁族季直亦不肯事梁武帝嘗嘆梁有天下遂不見此人門風何繇乃爾天監四年乙酉君年五十移居積金澗泉石益竒無蛇虎有佳木及雜藥初乏青林及来居皆自茂在句曲東壟中大通元年己酉君年七十四遇異人宣闓以本草用蝱蟲水蛭之屬傷物遲一紀可觧形至期果化尸觧凡十餘種世𫝊闓自青城来句曲先升以君聞帝録其積水之功化後為蓬莱都水監見仙𫝊及拾遺甚略今茅山相𫝊稍詳但㣲渉異大同二年丙辰君年八十一􅃗眼或方夢勝力菩薩授菩提記乃請鄮縣禮阿育王塔自誓受戒世傳吕巖從鍾離權受劍訣後二百餘年来㕘黄龍恵南始竟佛言不修正覺别得生理休止深山大島絶扵人境報盡還来散入諸趣晩年始堅此願唐志有所著草堂法師𫝊當時佛敎雖隆禪宗未開圓覺以大通五年至以是年去留臺城十九日度君不及相見大同六年庚申君年八十五逆尅亡日仍為告逝詩及卒顔色如常香氣彌山華陽頌云號期行當滿亥數未終丁迨乃承唐世將賔来聖庭化後一遇丁亥為陳臨海王光大元年再遇丁亥為唐太宗貞觀元年升平之盛降古所稀聖庭當是此時初隋文帝輔周以國子博士召孫思邈不應宻言後五十年有聖人出吾且助以濟人宣政元年至貞觀元年適滿五十年應命来見太宗官之不受辭歸太白山風素極𩔖𨼆居他無種不𩔖形有轉移神無變易自是至丁卯獨孤信鎮洛陽之時正七嵗至丁亥太宗召至長安之時得八十七嵗暮齡有少容所以驚嗟盧照鄰稱其自謂生開皇辛酉當時已不信若爾豈得聖童之稱博士之召貞觀丁亥方二十七嵗豈得少容之嘆若言數百嵗豈得七嵗弱冠之譽度思邈之生適繼𨼆居之没其為後身何疑挺契頌又云重離倘或似謂簡文與武帝俱非令終又云七夕乃扶胥謂武帝凡七改元世稱推戴為䇿立侯景嘗為懐朔鎮功曹吏至是簒梁稱漢故云扶胥所謂篇中字皆有義㫖後人自以篇中事求之則機萌一頌二十字頋豈虚設矧又彰明業運頌又云濟神既有在去留従所宜神既濟矣在扵何所華原孫氏即其所在也已當知佛言報盡還来及舍生趣生至確可信識者更推之藥譜清異録二卷乃宋陶翰林榖所撰凡天文地理君道官志人事女行君子么麽􅇚族仙宗草木花果蔬藥禽獸蟲魚支體作用居室衣服粧飾陳設器具文用武器酒漿茗荈饌羞䘮𦵏鬼妖皆創為異名新說而藥譜一則尤竒甚因備録之苾蒭清本良扵醫藥數百品各以角貼所題名字詭異余大駭究其源底答言天成中進士侯寧極戯造藥譜一卷盡出新意改立别名因時多艱不𫝊于世余以禮求假一通用娱閒暇假君子牽牛昌明童子川烏頭淡伯厚朴木叔胡椒雪眉同氣白扁豆金丸使者椒馘毒仙預知子貴老陳皮逺秀卿沉香化米先生神麴九日三官吴茱萸燄􅙕硫黄三閭小玉白芷中黄節士麻黄時美中蒔蘿導河掾木猪苓嗽神五味子削堅中尉三稜曲方氏防風白大夀吴术洞庭奴𨽻枳殻黄英古檀香緑劍真人菖蒲魏去疾阿魏禹孫澤㵼槖籥尊師仙靈脾風稜御史史君子雪如来白芨風味團頭縮砂赦肺侯欵冬花骨鯁元君萆􅐺苦督郵黄芩調睡㕘軍酸棗仁黑司命蓯蓉知㣲老白􅅔太清尊者朴硝既濟公升麻冷翠金剛石楠葉脫核嬰兒桃仁澀翁訶棃勒抱靈居士香附子隨湯給事中甘遂斜枝大士草龍膽野丈白頭翁建陽八座蛇牀子𤣥房仲長統皁荚藂生藥王覆盆子仁棗川練子石仲寧滑石命門録事安息香𨼆上座郁李仁水状元紫蘇飛風道者牙硝畢和尚蓽澄茄金山力士自然銅麝男甘松氷喉尉薄荷草東牀大腹皮腎曹都䕶葫蘆巴夀祖威靈仙玲瓏霍去病藿香千眼油㽔人延年卷雪桑白皮水銀腊輕粉黄香影子梔子六停劑五味子顯明􅘣阿膠出様珊瑚木通中央粉蒲黄瘡帚何首鳥支觧香丁皮洗瘴丹㯽郎海腊騏驎竭水磨橄欖金鈴子無名印地榆無憂扇枇杷葉鬼木串槐角黑殺星夜明砂續命筒乾漆蠻龍舌血没藥清凉種香薷羽化魁五加皮度厄錢連翹聖蘢鬆瞿麦翻胃木常山湯主山茱茰醒心杖逺志玉黄𤓰馬兠鈴偷􅁡珊瑚甘草徳兒杏仁混沌螟蛉寄生永嘉聖脯乾薑紅心石赤石脂藥本五靈脂静風尾荆芥正坐丹砂附子迎陽子兎絲子山屠黄蘗脾家瑞氣肉豆􅅳甜面淳于蜜陀僧剔骨香青皮痰宫劈歴半夏玉虚飯龍腦鎖眉根苦參黑龍衣鱉甲小帝青青鹽百辣雲生薑綬帶米麥芽半夏精天南星夜金雄黄沙田髓黄精無聲虎大黄小昌明草烏頭草兵巴豆巢煙九肋烏梅百子堂草果子雛面還丹人參琥珀孫松脂賊參薺苨不死麫茯苓火泉竹瀝比目沉香烏藥陸續丸蔓荆子地白𤓰蔞根天豆破故紙滴膽芝黄連新羅白肉白附子痩香嬌丁香破闗符蓬莪术玉絲皮杜仲血櫃牡丹皮川元蠢川芎九女春鹿茸百藥綿黄耆英華庫益智通天柱杖牛膝赤天佩薑黄丹田霖雨巴㦸百丈􅂡石斛飛天蕋旋覆花安神隊杖麥門冬鄆芝天麻錦繡根芍藥草魚目薏苡茅君寳箧蒼术尉佗圭桂錬形松子柏子仁蘆頭豹子柴胡丒寳牛黄肚裏屏風艾九畹菜澤蘭女二天當歸大通緑木香旱水晶硼砂還元大品地黄兩平草羌活死氷白僵蠺一寸樓臺蜂窠三尺籙枸杞無情手碙砂拔萃團麝香緑􅂡薑細辛笑靨金菊花走根梅乾葛八月珠茴香銀條徳星山藥埋光烏藥良薑椹聖蓽撥破軍殺大㦸吉祥杵桔梗金母蛻鬱金線子檀茅香良醫匕首葶􅏣産家大器秦艽滴金卵延胡索鬼丹盧㑹宜州様子白豆􅅳瓦壠斑貝母孝梗知母萬金茸紫苑秦尖疾黎西天蔓前胡蕨臣卷柏五福臠白歛保生叢藁本狨奴狗脊蒜腦藷百合脩身弩芫花帝膏蘇合香玉靈片石膏世系宋馬永卿嬾真孑録云古人重譜系故雖世胄綿逺可以考究淵明命子詩云天集有漢眷于愍侯赫赫愍侯運當攀龍撫劍風邁顯兹武功㕘誓山河啓土開封按漢功臣表開封愍侯舍以左司馬從漢破代封侯昔髙帝與功臣盟云使黄河如帶泰山若礪國以永存爰及苖裔所謂㕘誓山河謂此盟也髙帝功臣百有二十人舍其一也又云亹亹丞相允廸前従渾渾長源鬱鬱洪柯羣川載導衆條載羅時有語黙運同隆窊此盖謂青也功臣表開封愍侯舍封十一年薨十二年夷侯青嗣四十八年薨所謂羣川衆流以喻支𣲖之分散也語黙隆窊以言自青後未有顯者也淵明乃長沙公之曾孫然侃𫝊亡不載世家獨扵此見之後世累經亂離譜籍散亡然又士大夫因循滅裂不如古人所以家譜不𫝊扵世惜哉輟耕録卷十六欽定四庫全書輟耕録卷十七元陶宗儀撰古銅器宋番昜張世南宦㳺紀聞云辨博書畫古器前輩盖嘗著書矣其間有論議而未詳明者如臨摹硬黄響榻是四者各有其說今人皆謂臨摹為一體殊不知臨之與摹逈然不同臨謂置紙在旁觀其大小濃淡形勢而學之若臨淵之臨摹謂以薄紙覆上随其曲折婉轉用筆曰摹硬黄謂置紙熱熨斗上以黄蠟塗匀儼如枕角毫釐必見響榻謂以紙覆其上就明窓牖間映光摹之辨古器則有所謂欵識臘茶色朱砂斑真青緑井口之𩔖方為真古其製作有雲紋雷紋山紋輕重雷紋垂花雷紋鱗紋細紋粟紋蟬紋黄目飛廉饕餮蛟螭虬龍麟鳯熊虎龜蛇鹿馬象鸞䕫犧蜼鳬雙魚蟠虺如意圜絡盤雲百乳鸚耳貫耳偃耳直耳附耳挟耳獸耳虎耳獸足䕫足百獸三螭穟草瑞草帶若蚪結之勢星帶四旁飾以星象輔乳鐘名用以節樂者碎乳鐘名大乳三十六外復有小乳周之立䕫雙䕫之𩔖凡古器制度一有合此則以名之如雲雷鐘鹿馬洗鸚耳壺之𩔖是也如有欵識則以欵識名如周叔液鼎齊侯鐘之𩔖是也古器之名則有鐘大曰特中曰鎛小曰編鼎尊罍彛舟𩔖洗而有耳卣音酉又音由中尊器也有攀盖足𩔖壺瓶爵斗有耳有流有足流即觜也巵觶之豉切酒觴也角𩔖彛而無柱桮敦簠其形方簋𩔖鼎而矮盖有四足豆獻牛偃切無底甑也錠徒徑切又都定切斚觚鬲形製同鼎漢志謂空足曰鬲鍑才宥切玉篇云似釜而大其實𩔖小瓮而有環盉户戈切又胡臥切盛五味之器也似鼎而有盖有觜有執攀壺其𩔖有四曰圓曰匾曰方曰温盫於含切覆盖也似洗様而腰大有足有提攀瓿蒲後切𩔖壺而矮鋪𩔖豆鋪陳薦獻之義罌𩔖釜鑑盛水器上方如斗鏤底如風窓下設盤以盛之匜代支切沃盥器盤洗盆鋗呼𤣥切𩔖洗玉篇云小盆也杅磬錞鐸征𩔖鐘而矮鐃戚鐓飾物柄者奩鑑即鏡節鉞戈矛盾弩機表坐旂鈴刀筆杖頭蹲龍宫廟乗輿之飾或云䦨楯間物鳩車兒戱之具提梁龜蛇硯滴車輅托轅之屬此其大槩難扵盡備然知此者亦思過半矣所謂欵識乃分二義欵謂隂字是凹入者刻畫成之識謂陽字是挺出者正如臨之與摹各自不同也臘茶色亦有差别三代及秦漢間器流𫝊世間嵗月寖乆其色㣲黄而潤澤今士大夫間論古器以極薄為真此盖一偏之見也亦有極薄者有極厚者但觀製作色澤自可見也亦有數百年前句容所鑄其藝亦精今鑄不及必竟黑而燥須自然古色方為真古器也趙􅛽鵠洞天清録集古鐘鼎彛器辨云夏尚忠商尚質周尚文其制器亦然商器質素無文周器雕細宻此固一定不易之論而夏器獨不然余嘗見夏琱戈扵銅上相嵌以金其細如髮夏器大抵皆然嵗久金脫則成隂窽以其刻畫者成凹也銅器入土千年純青如鋪翠其色子後稍淡午後乗隂氣翠潤欲滴間有土蝕處或穿或剥並如蝸自然或有斧痕則是偽也銅器墜水千年則純緑色而瑩如玉未及千年緑而不瑩其蝕處如前今人皆以此二品體輕者為古不知器大而厚者銅性未盡其重止能減三分之一或減半器小而薄者銅性為水土蒸淘亦盡至有鉏擊破處並不見銅色惟翠緑徹骨或其中有一線紅色如丹然尚有銅聲𫝊世古則不曾入水土惟流傳人間色紫褐而有硃砂斑甚者其斑凸起如上等辰砂入釜以沸湯煑之良久斑愈見偽者以漆調朱為之易辨也三等古銅並無腥氣惟土古新出土尚帶土氣久則否若偽作者熱摩手心以擦之銅腥觸鼻所謂識紋欵紋亦不同識乃字以紀功所謂銘書鐘鼎夏用鳥跡商則蟲魚周以蟲魚大秦用大小漢以小𨽻書三國𨽻書晉宋以来用楷書唐用楷隸三代用隂識謂之偃蹇字其字凹入也漢已来或用陽識其字凸間有凹者或用刀刻如鐫碑盖隂識難鑄陽識易為决非三代物也欵乃花紋以為飾古器欵居外而凸識居内而凹夏周器有欵有識商器多無欵有識古人作事精緻工人預四民之列非若後世賤丈夫之事故古器欵必細如髮匀整分曉無纎毫糢糊識文之筆畫宛宛如仰瓦而不深峻大小深淺如一亦明浄分曉無纎毫糢糊此盖用銅之精者並無砂顆一也良工精妙二也不吝工夫非一朝夕所為三也今設有古器欵稍或糢糊必是偽作質色臭味亦自不同句容器非古物盖自唐天寳間至南唐後主時扵昇州句容縣置官塲以鑄之故其上多有監官花押其輕薄漆黑欵細雖可愛要非古器嵗乆亦有㣲青色者世所見天寳時大鳯環瓶此極品也偽古銅器其法以水銀雜錫末即今磨鏡藥是也先上在新銅器上令匀然後以釅醋調細碙砂末筆蘸匀上候如臘茶面色急入新汲水滿浸即成臘茶色候如漆急入新水浸成漆色浸稍緩即變色矣若不入水則成純翠色三者並以新布擦令光瑩其銅腥為水銀所匱並不發露然古銅聲㣲而清新銅聲濁而閧不能逃識者之見古人惟鐘鼎祭器稱功頌徳則有識盤盂寓戒則有識他器亦有無識者不可遽以為非但辨其體質欵紋顔色臭味足矣夫二書之論銅器固已粲然具備然清修好古之士又不可不讀經傳紀録以求其源委如薛尚功欵識法帖及重廣鐘鼎韻七卷者宣和博古圖吕大臨考古圖王俅嘯堂集古録黄睿東觀餘論董逌廣川書跋等書皆當熟味徧㕘而斷之以經庶可言精鍳也石敢當今人家正門適當巷陌橋道之衝則立一小石將軍或植一小石碑鐫其上曰石敢當以厭禳之按西漢史㳺急就章云石敢當顔師古注曰衛有石碏石買石惡鄭有石制皆為石氏周有石速齊有石之紛如其後以命族敢當所向無敵也據所說則世之用此亦欲以為保障之意方頭俗謂不通時宜者為方頭陸魯望詩云頭方不㑹王門事塵土空緇白紵衣七十二玉臺詩入門時左頋但見雙鴛鴦鴛鴦七十二羅列自成行孟東野和薔􅅔歌仙機軋軋飛鳯凰花開七十有二行詩皆用七十二不知何所祖旃檀佛京師旃檀佛以靈異著聞海宇王侯公相士庶婦女捐金荘嚴以丐福利者嵗無虚日故老相𫝊云其像四體無所倚着人君有道則至其國國初時尚可通一綫無礙今則不然矣按翰林學士程鉅夫瑞像殿碑刻云􅇚迦如来初為太子生七日母摩耶棄世生忉利天佛既成道思念母恩遂昇忉利天為母說法優填國王自以乆失瞻仰扵如来欲見無從乃刻旃檀為像目犍連尊者慮有闕陋躬以神力攝三十二匠昇忉利天諦觀相好三返乃得其真既成國王臣民奉之猶真佛焉及佛自忉利天復至人間王率臣庶同往迎佛此像騰歩空中向佛稽首佛為摩頂授記曰我滅度千年之後汝従震旦東士也廣利人天由是西土一千二百八十五年龜兹六十八年凉州十四年長安一十七年江南一百七十三年淮南三百六十七年復至江南二十一年汴梁一百七十七年北至燕京居聖安寺十二年北至上京大儲慶寺二十年南還燕宫内殿五十四年丁丒嵗三月燕宫火迎還聖安寺居今五十九年乙亥嵗當今大元世祖皇帝至元十二年也帝遣大臣博囉等四衆備法駕仗衛音伎迎奉萬夀山仁智殿丁丒建大聖安寺己丑嵗自仁智殿迎安寺之後殿大作佛事瑞像計自優填王造始之嵗至今延祐丙辰凡二千三百有七年又釋氏感通録云梁武帝遣郝騫等往天竺國迎佛旃檀像其王模刻一像付騫天監十年至建康帝迎奉太極殿建齋度僧大赦斷殺自是蔬食絶慾據此說又與碑文不同即今聖安寺所安之像抑優填之所刻歟天竺之摹刻歟𫝊席今人家娶婦輿轎迎至大門則𫝊席以入弗令履地然唐人已爾樂天春深娶婦家詩云青衣轉去聲氊褥錦繡一條斜歸婦吟吉之永豐劉氏女天兵南下日為東平王郎中宥所虜後王聞其父母兄弟舅姑夫子咸在因放之歸且作歸婦吟以送之詩曰烈火都將玉石焚死生契濶憶中分信音一絶思青鳥望眼雙穿見白雲殘日鶺鴒還有難北風鴻鴈正離羣新詩送爾還家去重續當年織錦紋吁固雖劉氏有莫大之幸而王亦仁人者矣穿耳或者謂晉唐間人所畫士女多不帶耳環以為古無穿耳者然荘子曰天子之侍御不叉揃不穿耳自古亦有之矣丫頭吴中呼女子之賤者為丫頭劉賔客寄贈小樊詩花面丫頭十三四春来綽約向人時㸃心今以早飯前及飯後午前午後晡前小食為㸃心唐史鄭傪為江淮留後家人備夫人晨饌夫人頋其弟曰治妝未畢我未及餐爾且可㸃心則此語唐時已然奴婢今蒙古色目人之臧獲男曰奴女曰婢總曰驅口盖國初平定諸國日以俘到男女匹配為夫婦而所生子孫永為奴婢又有曰紅契買到者則其元主轉賣扵人立劵投稅者是也故買良為驅者有禁又有陪送者則摽撥随女出嫁者是也奴婢男女止可互相婚嫁例不許聘娶良家若良家願娶其女者聽然奴或致富主利其財則俟少有過犯杖而錮之席卷而去名曰抄估亦有自願納其財以求脫免奴籍則主署執憑付之名曰放良刑律私宰牛馬杖一百敺死驅口比常人减死一等杖一百七所以視奴婢與馬牛無異按周禮其奴男子入于皁隸女子入于舂藁說文奴婢皆古罪人夫今之奴婢其父祖初無罪惡而世世不可逃亦可痛已又奴婢所生子亦曰家生孩兒按漢書陳勝𫝊秦令少府章邯免驪山徒人奴産子師古曰奴産子猶人云家生奴也則家生兒亦有所據愠羝愠羝謂腋氣也唐崔令欽敎坊記云范漢女大娘子亦是竿木家開元二十一年出内有姿媚而㣲愠羝天子争臣張公可與者濟南人律身廉正持法公平茍可以納忠扵國雖斧鉞有所不避為中書郎中日先帝時一大姦以元惡受顯戮後二子夤縁入侍幸沐天眷特各授行省平章陛辭叩首言曰先臣在九原弗獲霑一命之榮當不瞑目臣敢昧死請上命左右𫝊㫖中書獨公不奉詔越數日上召丞相面諭之丞相退謂公曰聖意寵遇之深當復奈何公曰朝廷果欲舉行贈典必湏雪其非罪若然是先帝不合誅之以先帝為何如主哉則上之扵先帝反不若大姦之有後矣不孝孰大焉丞相備公言以聞上為動容而止公以病在告都堂有人訴宗室謀逆奏送刑部問状逮鞫有證驗而死于獄宗室之妻見上泣曰臣妾夫某無罪枉死上但知送部而不謂其已死聖怒命御史臺鞫問丞相懼謀之公即扶疾至省取牘補署花押衆皆愕然丞相曰恐掾史所行有錯欲照略耳非謂此也公曰自丞相以下皆當聽問某何獨求免耶既而緘牘令該掾抱詣臺臺官首問曰張郎中曽書卷否曰然臺官議曰張郎中所行未嘗差錯况此一事中書得㫖施行執法者復何罪因覆奏曰臣等取省案根勘宗室某之死不枉上頷之其事遂寝如公者誠天子之争臣也夫嬸妗宋張文潜明道雜志云經𫝊中無嬸妗二字嬸字乃世母字二合呼妗字乃舅母字二合呼也二合如真言中合兩字音為一黄金縷蘇小小見諸古今吟咏者多矣而世又圖寫以玩之一何動人也如此哉春渚紀聞云司馬才仲初在洛下晝寝夢一美姝牽帷而歌曰妾本錢唐江上住花落花開不管流年度燕子銜將春色去紗窓幾陣黄梅雨才仲愛其詞因詢曲名云是黄金縷且曰後日相見扵錢唐江上及才仲以東坡先生薦應制舉中等遂為錢唐幕官其􅇬舍後堂蘇小墓在焉時秦少章為錢唐尉為續其詞後云斜揷犀梳雲半吐檀板輕敲唱徹黄金縷夢斷綵雲無覔處夜凉明月生春浦不逾年而才仲得疾所乗畫水輿犧泊河塘柁工遽見才仲擕一麗人登舟即前聲喏而火起舟尾蒼忙走報家已慟哭矣能改齋漫録云劉次荘樂府觧題曰錢唐蘇小小歌蘇小小非唐人世見樂天夢得詩多稱咏遂謂與之同時耳次荘雖知蘇小小非唐人而無所據余按郭茂倩所編引廣題曰蘇小小錢唐名娼也盖南齊時人西陵在錢唐江之西故古辭云何處結同心西陵松柏下余嘗記虞美人長短句云槐隂别院宜清晝入坐春風秀美人圖子阿誰留都是宣和名筆内家收鶯鶯燕燕分飛後粉淡梨花痩只除蘇小不風流斜揷一枝萱草鳯釵頭亦藴藉可喜乃元遺山先生所作也哨遍某人以善經紀積貲至鉅萬計而既鄙且嗇不欲書其姓名其尊行錢素菴者抱素逸士也多㳺名公卿間善詩曲有集行於世某嘗以貴富驕之故作今樂府一闋譏警焉哨遍試把賢愚窮究看錢奴自古呼銅臭徇已苦貪求待不敎泉貨周流忍包羞油鐺揷手血海舒拳肯落他人後曉夜尋思機彀縁情鉤鉅巧取旁捜蠅頭塲上苦驅馳馬足塵中厮追逐積儧下無厭就捨死忘生出乖弄醜耍孩兒安貧知足神明佑好聚歛多招悔尤王戎遺下舊牙籌夜連明計算無休不思日月搬烏兎只與兒孫作馬牛添消痩不調䄄鼎恣逞戈矛十煞漸消磨雙臉春已凋颼兩􅁂秋終朝不樂眉長皺恨不得櫃頭錢五分息招人借架上袑一周年不放贖狠毒性如狼狗把平人骨肉做自己膏油九有心待拜五侯敎人喚甚半州忍饑寒儧得家私厚待壘做錢山兒倩軍士喝號提鈴守怕化做錢龍兒請法官行罡布氣留半炊兒八徧把牙闗叩只願得無支有管少出多收八􅃜心事儘意為不義財儘力掊那裏問親弟兄親姊妹親姑舅只待要春風金谷驕王凱一任敎夜雨新豐困馬周無親舊只知敬明眸皓齒不想共肥馬輕裘七資生利轉多貪婪意不休為錙銖捨命尋争鬭田連阡陌心猶窄架揷詩書眼不瞅也學采東籬菊子是箇装呵元亮豹子浮邱六恨不得楊子江變作酒棗穰金積到斗為幾文贉背錢受了些旁人呪一斗粟與親眷分了顔面二斤麻把相知結下冦讐真紕繆一味的驕而且吝甚的是樂以忘憂五這財曾然了董卓臍曽梟了元載頭聚而不散遭殃咎怕不是堆金積玉連城富眨眼早野草閒花滿地愁干生受生財有道受用無由四有一日大小運併在命官死囚限􅅶在卯酉甚的散得疾只為你聚来得驟恰待調和新曲歌金帳逼臨得佳人墜玉樓難收救一壁相投河奔井一壁相爛額焦頭三窓槅每都颭颭的飛椅卓每都出出的走金銀錢米都消為塵垢山魈木客相呼喚寡宿孤辰厮趂逐喧白晝花月妖將家人狐媚虚耗鬼把倉庫潜偷二惱天公降下災犯官刑繫在囚他用錢時難參透待買他土木驢釘子輕輕釘弔脊筋鈎兒淺淺鈎便用殺難寛宥魂飛蕩蕩魄散悠悠尾出落他平生聚歛的情都寫做臨刑犯罪由將他死骨頭告示向通衢裏甃任他日炙風吹慢慢的朽樂府中押逐贖菊字韻者盖中州之音輕與尤字韻相近故也此曲雖曰為某而作然亦可以為世勸花蕋夫人蜀主孟昶納徐匡璋女拜貴妃别號花蘂夫人意花不足擬其色似花蘂之翾輕也或以為姓費氏則誤矣崔麗人余向在武林日扵一友人處見陳居中所畫唐崔麗人圖其上有題云並燕鶯為字聨徽氏姓崔非烟宜采畫秀玉勝江梅薄命千年恨芳心一寸灰西廂舊紅樹曾與月徘徊余丁卯春三月銜命陕右道出扵蒲東普救之僧舍所謂西廂者有唐麗人崔氏女遺照在焉因命畫師陳居中繪模真像意非登徒子之用心迨將勉情鍾始終之戒仍拾四十言使好事者知百勞之歌以記云泰和丁卯林鐘吉日十洲種玉大誌宜之題延祐庚申春二月余傳命至東平頋市粥雙鷹圖觀乆之弗見主人而歸夜宿府治西軒夢一麗人綃裳玉質逡廵而前曰君玩雙鷹圖雖佳非君几席間物妾流落乆矣有雙鷹名冠古今願託君為重覺而怪之未卜其何祥遲明欲行忽主人携鷹圖来且四軸余意麗人雙鷹符此數耳繼出一小軸乃夢所見有詩四十字跋語九十八識曰泰和丁卯出蒲東普救僧舍繪唐崔氏鶯鶯真十洲種玉大誌宜之題畫詩書皆絶神品也余驚詫良乆時有司羣官吏環視因縮不目託以跋語佳勝贖之吁物理相感果何如耶豈法書名畫自有靈耶抑名不朽者随神耶遇合有定數耶余嘗謂闗雎碩人姿徳兼備君子之配也琴心雪句才艶聨芳文士之偶也自詩書道廢丈夫弗學况女流乎故近世非無秀色往往脂粉腥􅁾鴉鳯莫辨求其彷彿待月章之萬一絶代無聞焉此亦慨世降之一端也因歸于我義弗辭已宜之者盖前金趙愚軒之字曾為鞏西簿遺山謂泰和有詩名五言平淡他人未易造信然泰和丁卯迨今百十四年云其月二日壁水見士思容題右共五百九字雖不知壁水見士為何如人然二君之風韻可想見矣因俾嘉禾繪工盛懋臨寫一軸適舅氏趙公待制雝見而愛之就為録文扵上按唐元㣲之𫝊竒鶯鶯事以為張生寓蒲之普救寺適有崔氏孀婦亦止兹寺崔氏婦鄭氏也生出扵鄭視鄭則異𣲖之從母因丁文雅軍擾掠蒲人鄭惶駭不知所措生與將之靈善請吏䕶之不及扵難鄭厚生徳謂曰姨之弱子幼女當以仁兄之禮奉承命鶯鶯出拜顔色艶異光輝動人生問其年紀鄭曰十七嵗矣生自是惓之私禮鶯鶯之侍婢紅娘間道其意既而詩章往復遂酬所願中間離合多故然不能終諧伉儷說者以為生即張子野宋王性之著傳竒辨正按㣲之作姨母鄭氏墓銘云其既䘮夫遭軍亂㣲之為保護其家又作陸氏誌云余外祖睦州刺史鄭濟白樂天作㣲之母鄭氏誌亦言鄭濟女而唐崔氏譜永寧尉鵬娶鄭濟女則鶯鶯乃崔鵬之女扵㣲之為中表也𫝊竒言生年二十二樂天作㣲之墓誌以太和五年薨年五十三即當以大歴十四年己未生至貞元庚辰正二十二嵗凡此數端决為㣲之無疑特託他姓以避就耳事具侯鯖録中江浙省地分江浙行省建治所于杭陸路赴都三千九百二十四里若水程則四千四百四十里東至大海四百九里順風海洋七日七夜可到日本國西至鄱陽湖接連江西省南康路界一千三百四十五里南至汀洲路接連廣東潮州界二千四百二十里北至楊子江接連淮南省揚州界七百二十里東到大海四百九里西到江西省南康路一千七百五里南到廣東潮州路二千五百一十里北到淮南省揚州路七百六十五里東南到漳州路海岸二千四百九十九里西南到江西省建昌路一千五百九十里東北到松江海岸五百二十二里西北到池州路接連河南省安慶路一千三百四十二里此四至八到也今割福建道立行省則又不同矣改常今人謂易其所守者曰改常北夢瑣言左軍容使嚴遵美閹官中仁人也嘗一日發狂手足舞蹈傍有一猫一犬猫忽謂犬曰軍容改常也輟耕録卷十七欽定四庫全書輟耕録卷十八元陶宗儀撰叙畫唐張彦逺著歴代名畫記十卷自軒轅時至㑹昌元年能畫者三百七十餘人其敘畫之源流曰夫畫者成教化助人倫窮神變測幽㣲與六籍同功古先聖王受命應籙則有龜字効靈龍圖呈寳自巢燧已來皆有此瑞庖犧氏發於滎河中典籍圖畫萌矣軒轅氏得於温洛中史皇蒼頡狀焉是時也書畫同體而未分象制肇創而猶畧無以傳其意故有書無以見其形故有畫按字學之部其六曰鳥書在幡信上書端象鳥頭者則畫之流也顔光禄云圖載之意有三一曰圖理卦象是也二曰圖識字學是也三曰圖形繪畫是也又周官教國子以六書其三曰象形則畫之意也是故知書畫異名而同體也洎乎有虞作繪繪畫明矣既就彰施仍深比象於是禮樂大闡教化由興故能揖讓而天下治廣雅云畫𩔖也爾雅云畫形也說文云畫畛也象曰畛畔所以畫也釋名云畫掛也以采色掛物象也故鐘鼎刻則識魑魅而知神姦旂章明則昭軌度而備國制清廟肅而尊彛陳廣輪度而疆理辨以忠以孝盡在於雲臺有烈有勲皆登於麟閣見善足以戒惡見惡足以思賢故陸士衡云宣物莫大於言存形莫善於畫此之謂也其論畫六法曰昔謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨𩔖傳采五曰經營位置六曰傳模移寫自古畫人罕能兼之彦逺試論之曰古之畫或能遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得形似而氣韻不生以氣韻求其畫則形似在其間矣上古之畫迹簡意淡而雅正顧陸之流是也中古之畫細宻精緻而臻麗展鄭之流是也近代之畫煥爛而求備今人之畫錯亂而無㫖衆工之迹是也夫象物必在乎形似形似須全其骨氣骨氣形似皆本乎立意而歸乎用筆顧愷之曰畫人最難次山水次狗馬其臺閣一定器耳差易為也斯言得之至於鬼神人物有生動之可狀湏神韻而後全故韓子曰狗馬難鬼神易狗馬乃凡俗所見鬼神乃譎怪之狀斯言得之至於經營位置則畫之總要然今之畫人粗善寫貌得其形似則無其氣韻具其采色則失其筆法豈曰畫也其論畫體工用榻寫曰夫畫物特忌形貌采章歴歷具足甚謹甚細而外露巧宻所以不患不了而患於了既知其了亦何必了此非不了也若不識其了是真不了也夫失於自然而後神失於神而後妙失於妙而後精精之為病也而成謹細自然者為上品之上神者為上品之中妙者為上品之下精者為中品之上謹而細者為中品之中余今立此五等以包六法以貫衆妙其間詮量可有數百等孰能周知非夫神邁識高情超心慧者豈可議乎知畫宋郭若虚著圖畫見聞志六卷自唐㑹昌元年至神宗熈寜七年能畫者二百七十四人其論製作楷模曰大率圖畫風力氣韻固在當人其如種種之要不可不察畫人物必分貴賤氣貌朝代衣冠釋門有善功方便之顔道像具修真度世之範帝王崇上聖天日之表外夷得慕華欽順之情儒賢見忠信禮義之風武士多勇悍英烈之貌𨼆逸識肥遯高世之節貴戚尚紛華侈靡之容天帝明威福嚴重之儀鬼神作魗䰩尺者反馳趡干鬼反之狀士女宜秀色婑鳥果反媠奴坐反之態田家有醇甿朴野之真畫衣紋林石用筆全𩔖于書衣紋有重大而調暢者有縝細而勁健者勾綽縱掣理無妄下以狀高側深斜卷摺飄舉之勢林木有樛枝梃􅆬屈節皴皮紐裂多端分敷萬狀作怒龍驚􅚣之勢聳凌霄翳日之姿山石多作礬頭亦為稜面落筆便見堅重之性皴淡即生窊凸之形破墨之功尤難畫畜獸全要停分向背筋力精神肉質肥圓毛骨𨼆起畫龍窮游泳蜿蜒之妙得回蟠升降之宜畫水湯湯若動使觀者有浩然之氣畫屋木折算無􅃜筆畫匀壯深逺透空畫花竹有四時㬌候隂陽向背筍篠老嫩苞蕚先後自然艶麗閒野逮諸園蔬野草咸有出土體性畫禽鳥識形體各件之異悟翔舉飛集之態其論氣韻非師曰謝赫六法精論萬古不移然而骨法用筆以下五法可學如其氣韻必在生知固不可以巧宻得復不可以歲月到黙契神㑹不知然而然其論用筆得失曰凡畫氣韻本乎游心神采生於用筆意在筆先筆周意内畫盡意在像應神全夫内自足然後神閒意定神閒意定則思不竭而筆不困也畫有三病皆繫用筆一曰版二曰刻三曰結版者腕弱筆痴全􅉛取與物狀平􅄶不能圓混也刻者運筆中疑心手相戾勾畫之際妄生圭角也結者欲行未行當散不散似物凝滯不能流暢也其論古今優劣曰佛道人物士女牛馬近不及古山水林石花竹禽魚古不及近何以明之且顧愷之陸探㣲張僧繇吳道𤣥及閻立徳立本皆純重雅正性出天然吳生之作為萬世法號曰畫聖張萱周昉韓幹戴嵩氣韻骨法皆出意表後之學者終莫能到故曰近不及古如李成關仝范寛董源之迹徐熈黄筌居宷之蹤前不籍師資後無復繼踵者借使二李三王之輩復起邊鸞陳庻之倫再生亦將何以措手於其間哉故曰古不及近鄧椿著畫繼十卷自熈寧七年至孝宗乾道三年能畫者一百一十九人其論逺曰畫之為用大矣盈天地間者萬物悉皆含豪運思曲盡其態而所以能曲盡者止一法耳一者何也曰傳神而已矣世徒知人之有神而不知物之有神此若虚深鄙衆工謂雖曰畫而非畫者蓋止能傳其形不能傳其神也故畫法以氣韻生動為第一而若虚獨歸於軒冕巖穴有以哉又曰自昔鑒賞家分品有三曰神曰妙曰能獨唐朱景真譔唐賢畫録三品之外更増逸品其後王休復作益州名畫記乃以逸為先而神妙能次之景真雖云逸格不拘常法用表賢愚然逸之高豈得附於三品之末未若休復首推之為當也又有畫繼𥙷遺一卷不知誰所譔則自乾道以後至理度間能畫者八十餘人爾後陳徳輝著續畫記一卷再自高宗建炎初至幼主徳祐乙亥能畫者一百五十一人然與畫繼補遺則相出入者耳二書僅可考閱姓名無足觀也趙希鵠洞天清録集云古畫多直幅至有畫身長八尺者雙幅亦然横披始於米氏父子非古制也河北絹經緯一等故無背面江南絹則經粗而緯細有背面唐人畫或用搗熟絹為之然止是生搗令絲褊不礙筆非如今煑鍊如漿也古絹自然破者必有鯽魚口與雪絲僞作者則否古畫色墨或淡黑則積塵所成自有一種古香可愛若偽作者多作黄色而鮮明不塵暗此可辨也米芾畫史云古畫若得之不脫不湏背褾若不佳換褾一次背一次壊屢更矣深可惜蓋人物精神髪采花之濃艶蜂蝶只在約畧濃淡之間一經背多或失之也古畫至唐初皆生絹至吳生周昉韓幹後來皆以熟湯湯半熟搥如銀版故作人物精采入筆今人收唐畫必以絹辨見紋粗便云不是唐非也張僧繇閻令畫皆生絹南唐畫皆粗絹徐熈絹或如布絹素百破必好畫裂文各有辨長幅横卷裂紋横横幅直卷裂紋直各隨軸勢裂也直㫁不當一縷歳乆卷自兩頭蘇開㫁不相合不作毛搯亦蘇不可僞作其僞者快刀直過當縷兩頭依舊生作毛起搯又堅紉也濕染者色棲縷間乾熏者烟臭上深下淺古紙素有一般古香真絹色淡雖百破而色明白精神采色如新惟佛像多經香烟熏損本色染絹作溫香色棲塵文間最易辨仍盖色上作一重古破不直裂湏連兩三經不可僞作國朝東楚湯垕字君載號采真子著畫鑒一卷論歴代名畫悉有依據其雜論曰古人作畫皆有深意運思落筆莫不各有所主况名下無虚士相傳既乆必有過人處今人看畫出自己見不經師授不閱記録但合其意者為佳不合其意者為不佳及問其如何是佳則茫然失對僕自十七八歳時便有迂濶之意見圖畫愛玩不去手見鑒賞之士便加禮問徧借記録彷彿成誦詳味其言歴觀名迹叅考古說始有少悟若不留心不過為聽聲隨影終不精鑒也燈下不可看畫醉餘酒邊不可看畫俗客尤不可示之卷舒不得其法最為害物至於庸人孺子見畫必看妄加雌黄品藻本不識物亂訂真僞令人短氣古人畫藁謂之粉本前輩多寳畜之蓋其草草不經意處有天然之妙宣和紹興所藏粉本多有神妙古人作畫有得意者多再作之如李成寒林范寛雪山王詵烟江疊嶂不可枚舉看畫如看美人其風神骨相有體肌之外者今人看古迹必先求形似次及傅染次及事實殊非賞鑒之法也元章謂好事家與賞鑒家自是兩等家多資力貪好名勝遇物收置不過聴聲此謂好事若鑒賞則天資高明多閱傳録或自能畫或深畫意毎得一圖終日寳玩如對古人不能奪也觀六朝畫先觀絹素次觀筆法次觀氣韻大槩十中可信者一二有御府題印者尤不可信古畫東移西掇撏補成章此弊自高宗朝莊宗古始也余友人吳興夏文彦字士良號蘭渚生其家世藏名蹟鮮有比者朝夕玩索心領神㑹加以游於畫藝悟入厥趣是故鑒賞品藻萬不失一因取各畫記圖畫見聞志畫繼續畫記為本叅以宣和畫譜南渡七朝畫史齊梁魏陳唐宋以來諸家畫録及傳記雜說百氏之書捜潜剔祕網羅無遺自軒轅時至宋幼主徳祐乙亥得能畫者一千二百八十餘人又女真三十人本朝自至元丙子至今九十餘年間二百餘人共一千五百餘人其考覈誠至矣其用心良勤矣所論畫之三品蓋擴前人所未發論曰氣韻生動出於天成人莫窺其巧者謂之神品筆墨超絶傅染得宜意趣有餘者謂之妙品得其形似而不失䂓矩者謂之能品古人畫墨色俱入絹縷精神逈出偽者雖極力彷彿而粉墨皆浮於縑素之上神氣亦索然蓋古人筆法圓熟用意精到初若率易愈玩愈佳今人雖極工緻一覽而意盡矣唐及五代絹素粗厚宋絹輕細望而可别也御題畫真僞相雜徃徃有當時名筆臨摹之作故祕府所藏臨摹本皆題為真迹惟明昌所題最多具眼自能識也吁可謂真知畫者哉記宋宫殿廉訪使楊文憲公煥字煥然乾州奉天人嘗作汴故宫記云己亥春三月按部至于汴汴長史宴于廢宫之長生殿懼後世無以考為纂其大槩云皇城南外門曰南薫南城之北新城門曰豐宜橋曰龍津橋北曰丹鳳而其門三丹鳯北曰州橋橋少北曰文武樓遵御路而北横街也東曰太廟西曰郊社正北曰承天門而其門五雙闕前引東曰登聞檢院西曰登聞鼔院檢院之東曰左掖門門之南曰待漏院鼓院之西曰右掖門門之南曰都堂承天之北曰大慶門而日精門左昇平門居其東月華門右昇平門居其西正殿曰大慶殿東廡曰嘉福樓西廡曰嘉瑞樓大慶之後曰徳儀殿徳儀之東曰左昇龍門西曰右昇龍門王門曰隆徳曰蕭牆曰丹墀曰隆徳殿隆徳之左曰東上閣門右曰西上閣門皆南嚮東西二樓鐘鼓之所在鼔在東鐘在西隆徳之次曰仁安門仁安殿東則内侍局内侍之東曰近侍局近侍之東曰嚴祗門宫中則曰撤合門少南曰東樓即授除樓也西曰西樓仁安之次曰純和殿正寢也純和西曰雪香亭雪香之北后妃位也有樓樓西曰瓊香亭亭西曰涼位有樓樓北少西曰玉清殿純和之次曰寧福殿寧福之後曰苑門由苑門而北曰仁智殿有二大石左曰敷錫神運萬歳峰右曰玉京獨秀太平巖殿曰山莊莊之西南曰翠㣲閣苑門東曰仙韶院院北曰湧翠峰峰之洞曰大滌湧翠東連長生殿殿東曰湧金殿湧金之東曰蓬萊殿長生西浮玉殿浮玉之西曰瀛洲殿長生之南曰閲武殿閱武南曰内藏庫由嚴祗門東曰尚食局尚食東曰宣徽院宣徽北曰御藥院御藥北曰右藏庫右藏之東曰左藏宣徽東曰㸃檢司㸃檢北曰祕書監祕書北曰學士院學士之北曰諫院諫院之北曰武器署㸃檢之南曰儀鸞局儀鸞之南曰尚輦局宣徽之南曰拱衛司拱衛之南曰尚衣局尚衣之南曰繁禧門繁禧南曰安泰門安泰西與左升龍門直東則夀聖宫兩宫太后位本明俊殿試進士之所宫北曰徽音殿徽音之北曰燕夀殿燕壽殿垣後少西曰震肅衛司東曰中衛尉司儀鸞之東曰小東華門更漏在焉中衛尉司東曰祗肅門祗肅門東少南曰將軍司徽音夀聖之東曰太后苑苑之殿曰慶春慶春與燕夀並小東華與正東華對東華門内正北尚廏局尚廏西北曰臨武殿左掖門正北尚食局局南曰宫苑司宫苑司西北曰尚醖局湯藥局侍儀司少西曰符寳局器物局西則撒合門嘉瑞樓西曰三廟正殿曰徳昌東曰文昭殿西曰光興殿並南嚮徳昌之後宣宗廟也宫西門曰西華與東華直其北門曰安貞二大石外凡花石臺榭池亭之細並不録觀其制度簡素比土階茅茨則過矣視漢之所謂千門萬户珠璧華麗之室則無有也然後之人因其制度而損益之以求其稱斯可矣公又有録汴梁宫人語五言絶句一十九首雖一時之所寄興亦不無有傷感之意今併附于此詩曰一入深宫裏經今十五年長因批帖子呼到御床前右一歲歳逢元夜金蛾閙簇巾見人心自怯終是女兒身右二殿前輪直罷偷去賭金釵怕見黄昏月殷勤上玉階右三翠翹珠掘背小殿夜藏鈎驀地羊車至低頭笑不休右四内府頒金帛教酬賀節盤兩宫新有㫖先與問孤寒右五人間多􅀥栗不到九重天長􅀍黄衫吏花攤月賜錢右六仁聖生辰節君王進玉巵夀棚兼夀表留待北還時右七邊奏行臺急東華夜啓封内人催歩輦不候景陽鐘右八畫燭雙雙引珠簾一一開輦前齊下拜歡飲辟寒盃右九聖躬香閣内只道下朝遲扶杖嬌無力紅綃貼玉肌右十今日天顔喜東朝内宴開外邊農事動詔遣教坊回右十一駕前雙白鶴日日候朝回自送鑾輿去經今更不來右十二陡覺文書靜相將立夕陽傷心寧福位無復夜熏香右十三二后睢陽去潜身泣到明却回誰敢問校似有心情右十四為道圍城乆妝奩鬭犒軍入春渾㫁絶饑苦不堪聞右十五監國推梁邸初頭靜不知但疑牆外笑人有看宫時右十六别殿弓刀嚮倉皇接鄭王尚愁宫正怒含淚强添妝右十七一向傳宣喚誰知不復還來時舊鍼線記得在窓間右十八北去遷沙漠誠心畏從行不如當日死頭白若為生右十九陳隨應南度行宫記云杭州治舊錢王宫也紹興因以為行宫皇城九里入和寧門左進奏院玉堂右中殿外庫至北宫門循廊左序巨璫幕次列如魚貫祥曦殿朶殿接修廊為後殿對以御酒庫御藥院慈元殿外庫内侍省内東門司大内都廵檢司御厨天章等閣廊回路轉衆班排列又轉内藏庫對軍器庫又轉便門垂拱殿五間十二架修六丈廣八丈四尺簷屋三間修廣各丈五朶殿四兩廊各二十間殿門三間内龍墀折檻殿後擁舍七間為延和殿右便門通後殿殿左一殿隨時易名明堂郊祀曰端誠䇿士唱名曰集英宴對奉使曰崇徳武舉及軍班授官曰講武東宫在麗正門内南宫門外本宫會議所之側入門垂楊夾道間芙蓉環朱闌二里至外宫門節堂後為財帛生料二庫環以官屬直舎轉外窑子入内宫門廊右為贊導春坊直舎左講堂七楹扁新益外為講官直舎正殿向明左聖堂右祠堂後凝華殿瞻箓堂環以竹左寢室右齊安位内人直舎百二十楹左彛齋太子賜號也接繡香堂便門通繹已堂重簷􅃨屋昔楊太后垂簾於此曰慈明殿前射圃竟百歩環修廊右愽雅樓十二間左轉數十歩雕闌花甃萬卉中出秋千對陽春亭清霽亭前芙蓉後木樨玉質亭梅繞之由繹已堂過錦臙廊百八十楹直通御前廊外即後苑梅花千𣗳曰梅崗亭曰氷花亭枕小西湖曰水月境界曰澄碧牡丹曰伊洛傳芳芍藥曰冠芳山茶曰鶴丹桂曰天闕清香堂曰本支百世祐聖祠曰慶和泗洲曰慈濟鍾吕曰得真橘曰洞庭佳味茅亭曰昭儉木香曰架雪竹曰賞静松亭曰天陵偃盖以日本國松木為翠寒堂不施丹艧白如象齒環以古松碧琳堂近之一山崔嵬作觀堂為上焚香祝天之所吳知古掌焚修每三茅觀鐘鳴觀堂之鐘應之則駕興山背芙蓉閣風㠶沙鳥履舄下山下一溪縈帶通小西湖亭曰清漣恠石夾列獻瑰逞秀三山五湖洞穴深杳豁然平朗翬飛翼拱凌虚樓對瑞慶殿損齋緝熈崇正殿之東為欽先孝思復古紫宸等殿木圍即福寜殿射殿曰選徳坤寧殿貴妃昭儀婕妤等位宫人直舎螘聚焉又東過閣子庫睿思殿儀鸞修内八作翰林諸司是謂東華門右二記書法詳贍宋之宫闕槩可見矣廉察徐文獻公任西浙廉訪使日遇有訴訟者必歴問其郡邑官吏臧否分為三等載諸集第一等純臧者第二等臧否相半者第三等極否者又用覆察相同候分司按巡時遂以畀之曰第一等褒舉之第二等勿問第三等懲戒之使改可也慎勿罷其職役分司遵奉一道肅清宣髪人之年壯而髪斑白者俗曰算髪以為心多思慮所致蓋髪乃血之餘心主血血為心役不能上廕乎髮也然本草云蕪菁子壓油塗頭能變蒜髪則亦可作蒜易說卦巽為寡髪陸徳明曰寡本作宣黑白雜為宣髪據此則當用宣字為是檄書露布檄書露布何所起乎漢陳琳草檄曹操見之頓愈頭風遂謂檄起於琳説文檄二尺書徐鍇通釋曰檄徴兵之書也漢高祖以羽檄徴天下兵有急則挿以羽爾雅木無枝為檄注檄擢直上也文心雕龍有張儀檄楚書隗囂檄亡新文文選有司馬相如喻蜀檄文則檄非自琳始也明矣隋禮儀志後魏毎戰尅書帛於漆竿上名露布世說桓宣武征鮮卑喚𡊮粲作露布倚馬手不輟筆俄成七紙如隋志世說所云則露布起於後魏而晉因之然漢官儀凡制書皆彌封唯赦贖令司徒印露布州郡又漢書賈洪為馬超作伐曹操露布則漢時已然及讀初學記引春秋佐助期曰武露布文露沉宋均云甘露見其國布散者人上武文采者則甘露沉重豈露布之義當取於此與靸鞵西浙之人以草為履而無跟名曰靸鞵婦女非纒足者通曵之炙轂子雜録引實録云靸鞵舄三代皆以皮為之朝祭之服也始皇二年遂以蒲為之名曰靸鞵二世加鳳首仍用蒲晉永嘉元年用黄草宫内妃御皆著始有伏鳩頭履子梁天監中武帝易以絲名解脫履至陳隋間吳越大行而模様差多唐大歴中進五朶草履子建中元年進百合草履子據此則靸鞵之製其來甚古然北夢瑣言載霧是山巾子船為水靸鞵之句抑且咏諸詩矣靸悉合切在颯字韻下今俗呼與翣同音者誤書手世稱鄉胥為書手處處皆然報應記宋衎江淮人應明經舉元和初至河隂縣因疾病廢業為鹽鐡院書手盖唐時已有此名輟耕録卷十八欽定四庫全書輟耕録卷十九元陶宗儀撰脈人稟天地五行之氣以生手三陽三隂足三陽三隂合為十二經以環絡一身徃來流通無少間㫁其脈應於兩手三部焉夫衇者血也脈不自動氣實使之故有九候之法内經云脈者血之府説文云血理分袤行體者從􅏨從血亦作脈通釋云五藏六府之氣血分流四體也釋名云脈幕也幕絡一體字從肉從􅏨􅏨音普拜切水之邪流也脈字從􅏨取脈行之象無求子云脈之字從肉從􅏨又作􅂒盖脈以肉為陽􅂒以血為隂華佗云脈者血氣之先也氣血盛則脈盛氣血衰則脈衰血熱則脈數血寒則脈遲血㣲則脈弱氣血平則脈緩晉王叔和分為七表八裏可謂詳且至矣然文理䋣多學者卒難究白宋淳熙中南康崔子虚𨼆君嘉彦以難經於六難專言浮沉九難專言遲數故用為宗以統七表八裏而總萬病其説以為浮者為表為陽外得之病也有力主風無力主氣浮而無力為芤有力為洪又沉為實沉者為裏為隂内受之病也有力主積無力主氣沉而極小為㣲至骨為伏無力為弱遲者為隂主寒内受之病也有力主痛無力主冷遲而少駃為緩短細為濇無力為濡數者為陽主熱外得之病也有力主熱無力主瘡數而極弦為𦂳有力為弦流利為滑他若九道六極之殊三焦五藏之辨與夫持脈之道療病之方其間元妙具在四脈元文及西原脈訣等書世以為秘授始由𨼆君傳之劉復真先生先生傳之朱宗陽鍊師鍊師傳之張元白高士今徃徃有得其法者學者其求諸四司六局俗稱四司六局者多不能舉其目古杭夢游録云官府貴家置四司六局各有所掌故筵席排當凡事整齊都下街市亦有之常時人户毎遇禮席以錢倩之四司六局皆可致四司者帳設司厨司茶酒司臺盤司也六局者果子局􅁡煎局菜􅂼局油燭局香藥局排辦局也凡四司六局人祗應慣熟便省賔主一半力稽古閣博古圖宋徽廟朝所修書故世知有博古之名而不知更有稽古等閣蔡京保和殿曲燕記云宣和元年九月十二日皇帝召臣京等燕保和殿臣鯈等東曲水朝於玉華殿上歩西曲水循酴醿架至太寕閣登層原闕其室氏乃宋内夫人余年十四五尚猶識之但兩􅁂俱秃問知在宫中任此職者例裹巾巾帶之末各綴一金錢毎晨用以掠髪入巾故乆而致然也因曰吾為内夫人日毎日輪流六人侍帝左右以紙一畨從後端起筆書帝起居旋書旋卷至暮封付史館内夫人别居一宫宫門金字大牌曰官家無故至此罰金一鎰以二者言之可見宋朝家法之嚴闌駕上書至正乙酉冬朝廷遣官奉使宣撫諸道問民疾苦然而政績昭著者十不二三明年秋江右儒人黄如徴邀駕上書指數察察爾王士宏等罪狀且及國家利害斧鉞在前有所不避古之所謂豪傑之士如徴其人者與天子親覽其書喜見于色又虞如徴必為權豪所中顧近臣館穀以俟越數日特授江西等處儒學提舉勑侍衛䕶送出都如徴感上徳意受命而不領職天下共賢之察察爾王士宏等雖免譴責終以不顯死其書略曰江西布衣書生黄如徴百拜上書皇帝陛下如徴忝生僻土遭遇明時用竭愚衷冐干天聽伏望采覽萬一焉夫皇朝版圖之廣歴古所無法制之良萬世莫易而水旱災變連年不息者實由官皆汙濫民悉怨咨之所致也欽惟陛下憂民之心日夕孜孜遂於去年冬分遣大臣奉使宣撫諸道正欲其察政事之臧否問生民之疾苦禮賢德振貧乏信寃抑起淹滯俾所至之處如陛下親臨焉茍能宣布聖澤各盡乃職則雍熈泰和之治正在今日然江西福建一道地處蠻方去京師萬里外傳聞奉使之來皆若大旱之望雲霓赤子之仰慈母而察察爾王士宏等不體聖天子撫綏元元之意鷹揚虎噬雷厲風飛聲色以淫吾中賄賂以緘吾口上下交征公私朘剥贓吏貪婪而不問良民塗炭而㒺知閭閻失望田里寒心乃歌曰九重丹詔頒恩至萬兩黄金奉使回又歌曰奉使來時驚天動地奉使去時烏天黒地官吏都懽天喜地百姓却啼天哭地又歌曰官吏黒漆皮燈籠奉使來時添一重如此怨謠未能枚舉皆百姓不平之氣鬱結于懐而發諸聲者然也此盖廟堂遴選非人使生民感陛下憂恤之虚恩受奉使掊剥之實禍陛下於此而不察將何以取法於後世哉如徴無官守無言責所以不憚江河之險不畏斧鉞之誅而詣闕以陳其事者正恐察察爾王士宏等囘覲之日各飾巧言妄稱官清民泰欺詐百端昬蔽主聽陛下不悟為姦邪所賣擢任省臺恣行威福流毒四海則江西福建一道之痛苦與天下共之以此而望隂陽和風雨時年嵗登邊隅静不亦難乎倘陛下不棄蒭蕘之言委官察其實蹟責以欺天㒺民之罪投諸遐荒雪江西福建一道之痛苦以為百官勸則天下幸甚萬世幸甚如陛下以為誹謗大臣置而不問非惟今日禍起蕭牆抑且天下萬世之不幸矣如徴鄙語俗言不知避諱觸犯清蹕罪在不赦請伏鑕以俟命錢武肅鐡券吾鄉錢叔琛氏贇乃武肅王之諸孫也其家在郡城外東北隅亭臺沼沚聨絡暎帶猶是先朝賜第與余相友善嘗出示所藏鐡券形宛如瓦高尺餘濶二尺許券詞黄金商嵌一角有斧痕盖至元丙子天兵南下時其家人竊負以逃而死於難券亦莫知所在越再丙子漁者偶網得之乃在黄岩州南地名澤庫深水内漁意寳物試斧擊之則銕焉因棄諸幽一村學究與漁隣頗聞賜券之説買以銕價然二人皆不悟其字乃金也有報於叔琛之兄者用十斛穀易得青氊復還誠為異事時余就録券詞一通叔琛又出武肅當日謝表藁併録之昨晚檢閱經笥偶得於故紙中轉首已三十餘年矣人生能幾何哉謾志于此詞云維乾寜四年嵗次丁巳八月甲辰朔四日丁未皇帝若曰咨爾鎮海鎮東等軍節度浙江東西等道觀察處置營田招討等使兼兩浙鹽鐡制置發運等使開府儀同三司檢校太尉兼中書令使持節閩越等州諸軍事兼閩越等州刺史上柱國彭城郡王食邑五千戸食實封一百戶錢鏐朕聞銘鄧隲之勲言垂漢典載孔悝之徳事美魯經則知褒徳䇿勲古今一致頃者董昌僣偽為皆鏡水狂謀惡慣㳿染齊人而爾披攘兇渠盪定江表忠以衛社稷恵以福生靈其機也氛祲清其化也疲羸泰拯甌越於塗炭之上師無私焉保餘杭於金湯之間政有經矣志奬王室績冠侯藩溢于旂常流在丹素雖鍾繇刻五熟之釡竇憲勒燕然之山未足顯功抑有異數是用錫其金版申以誓詞長河有似帶之期泰山有如拳之日唯我念功之㫖永將延祚子孫使卿長襲寵榮克保富貴卿恕九死子孫三死或犯常刑有司不得加責承我信誓徃惟欽哉宜付史館頒示天下表云恩主賜臣金書鐡劵一道臣恕九死子孫三死者出於睿眷形此綸言録臣以絲髮之勞賜臣以山河之誓鐫金作字指日成文震動神祇飛揚肝膽伏念臣爰従筮仕迨及秉麾每自揣量是何叨忝所以行如履薄動若持盈惟憂福過禍生敢忘慎初䕶末豈期此志上感宸聰憂臣以處極多危慮臣以防㣲不至遂開聖澤永保私門屈以常則宥其必死雖君親囑念皆云必恕必容而臣子為心豈敢傷慈傷愛謹當日慎一日戒子戒孫不敢因此而累恩不敢乘此而賈禍聖主萬歳愚臣一心按史唐禧宗乾符五年王仙芝餘黨曹師雄冦掠二浙杭州募兵使石鏡都將董昌等將以討之臨安人錢鏐以驍勇事昌為兵馬使中和元年昌為杭州刺史光啓二年昌謂鏐曰汝能取越州吾以杭授汝鏐攻尅之昌遂徙越以鏐知杭州事三年昌為越州觀察使鏐為杭州刺史昭宗景福元年為武勝軍防禦使二年為鎮海節度使乾寜二年昌僣號鏐遺書曰與其關門作天子與九族百姓俱䧟塗炭豈若開門作節度使終身冨貴耶昌不聽鏐以狀聞削奪昌官爵委鏐討之三年昌伏誅鏐令吏民上表請兼領浙東朝廷不得已以為鎮海鎮東節度使改威勝曰鎮東天復二年進爵越王天祐元年更封吳王梁太祖開平九年以為吳越王乾化二年加尚父末帝貞明二年以為諸道兵馬元帥三年以為天下兵馬元帥龍徳三年以為呉越王鏐始建國儀衛名稱多如天子之制惟不改元置百官有丞相侍郎客省等使唐明宗天成四年削鏐官爵初鏐嘗遺安重誨書辭禮甚倨及朝廷遣奉使烏昭遇韓玟使鏐還玟奏昭遇見鏐稱臣拜舞重誨奏賜昭遇死鏐以太師致仕自餘官爵皆削之長興二年鏐卒鏐寢疾出印鑰授子元瓘曰子孫善事中國勿以易姓廢事大之禮卒年八十一史稱乾寜三年秋九月以鏐為鎮海鎮東節度使而劵詞乃四年秋八月何耶史稱儀衛名稱多如天子之制惟不改元程大昌演繁露云寳正六年歳在辛夘見封落星石制書辛夘乃唐明宗長興二年寳太元年羅𨼆記新城縣記云癸未歳癸未乃唐莊宗同光元年以此知吳越雖稟中原正朔既長興同光年號與其寳正寳太同嵗而名不同知吳越自嘗改元審矣又僧文瑩湘山野録云唐昭宗以錢武肅平董昌拜為鎮海鎮東節度使中書令賜鐡劵羅𨼆為譔謝表逮莊宗入洛又遣使貢奉懇請玉冊金劵有司定議非天子不得用後竟賜之鏐即以節鉞授其子元瓘自稱吳越國王名其居曰殿官屬悉稱臣又於衣錦軍大建玉冊金券詔書三樓遣使冊東夷諸國封拜其君長㡬極其勢與向之謝表所陳處極防㣲累恩賈禍之誡殊相戾矣禪月貫休嘗以詩投之有滿堂花醉三千客一劔霜寒十四州之句鏐愛其詩遣客吏諭之曰教和尚改十四為四十方與見休性􅄶介謂吏曰州亦難添詩亦不改然閒雲野鶴何天而不飛耶遂飄然入蜀鏐後果為安重誨奏削王爵以太師致仕重誨死明宗乃復鏐爵位夫武肅之踰越固莫逃乎二書所論射字法有教予射字法必湏彼我二人俱聰明熟於翻切優於記問者方乃便㨗倘遇人以詩詞或言語示我彼在隔坐不及知聞我則拊掌彼便説出與所示同然片段文章皆可成誦非特一句一字而已用拊掌代擊鼔殊無勾肆市井俗態此天下太平優游無事謾以取一時之笑樂耳使鼙鼓之聲震天干戈之鋒耀日又能留情於此耶其法七字詩十二句逐句排寫前四句括定字母後八句括定叶韻詩曰輕輕牽兵兵邊平平便明明眠逢興興掀征征煎經經堅迎迎年俜俜偏停停田應應烟成成涎聲聲羶清清千澄澄纒星星鮮晴晴涎丁丁顛檠檠䖍盈盈延能能稱稱千非精精煎零零連汀汀天橙橙纒東蒙鍾江支兹為㣲魚胡模齊乖佳灰咍真諄臻匡虧元魂痕寒歡關山先森蕭宵爻豪歌戈麻陽唐耕斜榮青蒸登尤侯車侵潭譚鹽添横光凡如欲切春字清諄清清千春清字在第三行第一字諄字在第七行第四字拊掌則前三後一少歇又前七後四夏字平聲為霞盈麻盈盈延霞盈字在第三行第七字麻字在第十行第二字拊掌則前三後七少歇又前十後二少歇又三盖夏字去聲所以又三也若入聲則四矣餘倣此但字母不離二十八字而叶韻莫逃五十六字此為至要後見賔退録一則與此略同併志之其曰俗間有擊鼓射字之伎莫知所始盖全用切字該以兩詩詩皆七言一篇六句四十二字以代三十六字母全用五支至十二齊韻取其聲相近便於誦習一篇七句四十九字以該平聲五十七韻而無側聲如一字字母在第三句第四字則鼓節前三後四叶韻亦如之又以一二三四為平上去入之别亦有不擊鼓而揮扇之𩔖其實一也詩曰西希低之機詩資非卑妻欺癡梯歸披皮肥其辭移題􅂝持齊時依眉㣲離為兒儀伊鋤尼醯雞箆溪批毗迷此字母也羅來𤓰藍斜凌倫思戈交勞皆來論流連王郎龍南闗盧甘林巒雷聊隣簾櫳羸婁參辰闌楞根灣離驢寒間懐横榮鞵庚光顔此叶韻也神人獅子松江之横雲山古冢纍纍然世傳以為多晉陸氏所藏山人封生業盜冢至正甲辰春發一冢冢磚上有太元二年造五字按太元東晉武帝時也逆數而上計九百一十餘年矣或者謂冢有志石但恐事泄秘弗示人冢中得古銅罍勺壺洗尊鼎雜器之物二百餘件内一水滴作獅子昻首軒尾走躍狀而一人面部方大髭鬚飄蕭騎獅子背左手握無底圎桶右手臂鷹人之腦心為竅以安吸子吸子頂㣲大正盖腦心儼一席㡌象人衣褶及獅鷹羽毛種種具備通身青緑吸子渾若碧玉論其製作膚理則非晉人所能乃漢器無疑必其平生寳惜而以殉葬約長五寸高四寸許誠竒物也至秋夏士安偶過生生出以售捐錢五十緡買之歸剔鑿沙土飾澤蠟石神氣百倍於昔韞櫝寳藏時以示博古好雅者一日為有勢力時貴奪去昔鮮于困學公嘗畜一水滴正與士安者大同小異相承曰蠻人獅子愛之未嘗去手寓杭州㫁橋日臨湖有水閣倚闌把玩偶墮吸子於湖水中百計求之不可見悒怏嘅嘆形神為之凋枯既他徃踰三年復來杭仍居昔所寓舎追懐故物徃視湖波適當霜降水静之時吸子儼在土内亟命僕下取欣然如獲至珍即易號曰神人獅子遂序述顛末求館閣諸老與夫騷人雅士歌咏以張之寖成巨軸公歿子孫不能世守水滴與詩卷皆歸婺州陶氏陶亦不能乆有又將求善賈而沽諸今不知所在自我朝百餘年來僅聞公得其一於先而士安得其一於今非若他古銅器比可以屈指數也至元鈔様中書左丞葉公亦愚李錢唐人宋太學生上書詆賈似道公田關子不便專權誤國似道怒嗾林徳夫告公泥金飾齋扁不法令獄吏鞫之云只要你做一箇麻糊公即口占一詩曰如今便一似麻糊也是人間大丈夫筆裏無時那解有命中有處未應無百千萬世傳名節二十三年非故居寄語長安朱紫客盡心好上帝王書遂遭黥流嶺南及蒙恩放還與似道遇諸途公以詞贈云君來路吾歸路來來去去何時住公田關子竟何如國事當時誰汝誤雷州戸厓州戸人生㑹有相逢處客中頗恨乏蒸羊聊贈一篇長短句歸附後入京上書言時相併獻至元鈔様此様在宋時固嘗進呈請以代關子朝廷不能用故今别改年號而復獻之世皇嘉納使用鑄板以功累官至今任而終妓聰敏歌妓順時秀姓郭氏性資聰敏色藝超絶教坊之白眉也翰林學士王公元鼎甚眷之偶有疾思得馬版腸充饌公殺所騎千金五花馬取腸以供至今都下傳為佳話時中書叅政阿哩衮尤屬意焉因戱謂曰我比元鼎如何對曰叅政宰相也學士才人也燮理隂陽致君澤民則學士不及叅政嘲風咏月惜玉憐香則叅政不如學士叅政付之一笑而罷郭氏亦善於應對者矣日無光至正辛丑四月朔日日未沒三四竿許忽然無光漸漸作蕉葉様天且昏黑如夜星斗燦然飯頃方復舊天再開星斗亦𨼆又少時乃沒按天官書王𨼆晉書曰日無光臣有隂謀京房易傳曰臣專刑兹謂分威蒙微而日不明松江志異至正壬寅八月中上海縣三十四保辰字圍金壽一家已閹雄狗生小狗八其一嘴爪紅如鮮血然犬之為妖多見於占騐之書而未有若此者若男變為女男子孕育則嘗聞之古昔盖陽衰隂盛兵戈亂離之兆今夫牡物而生兒陽化隂也又犬屬火一嘴爪紅紅亦火也豈非主兵主火者與甲辰四月十五日華亭縣五保楊巷邵浦雲之西清菴廊屋一十九間毎間屋柱皆有聲其聲若以桶覆水面而擊其底者人以手按之則振掉而起經時乃止按乾坤變異録人君宫室無故有音聲主兵起若人家主家亡六月二十三日夜四更松江近海去處潮忽驟至人皆驚訝以非正候至辰時潮方來乃知先非潮也後見湖泖人説湖泖素不通潮忽平擁起高三四尺若潮漲之勢正與此時同又聞平江嘉興亦如之按五行志水自盈溢主兵興乾坤變異録河水大壅臣下執政有背叛郡縣君國朝品官母妻四品贈郡君五品贈縣君然古邦君之妻邦人曰小君禮士喪妾不得匹其夫必曰君妻曰女君後世封羊祜妻為萬歳君則此可謂令甲之原面不畏寒人之四支百骸莫不畏寒獨面則否醫書謂頭者諸陽之㑹諸隂脈至頸及胷而還獨諸陽脈上至頭所以然也輟耕録卷十九欽定四庫全書輟耕録卷二十元陶宗儀撰納音六十甲子之有納音世人鮮知其理嘗觀筆談有曰六十甲子納音盖六十律旋相為宫也一律合五音十二律納六十音也凡氣始於東方而右行音起於西方而左行隂陽相錯而生變化所以氣始於東方者四時始於木右行傳於火火傳於土土傳於金金傳於水所謂音始于西方者五音始于金左旋傳於火火傳於木木傳於水水傳於土納音與易納甲同法乾納甲而坤納癸始于乾而終于坤納音始于金金乾也終於土土坤也納音之法同𩔖娶妻隔八生子此漢志語也此律吕相生之法也五行先仲而後孟孟而後季此遁甲三元之紀也甲子金之仲黄鍾之商同位娶乙丑大吕之商同位謂甲與乙丙與丁之􅁼下皆倣此隔八下生壬申金之孟夷則之商隔八謂大吕下生夷則也下皆倣此壬申同位娶癸酉南吕之商隔八上生庚辰金之季姑洗之商此金三元終若只以陽辰言之則依遁甲逆轉仲孟季若兼妻言則順傳孟仲季也庚辰同位娶辛巳仲吕之南隔八下生戊子火之仲黄鍾之徴金三元終則左行傳南方火也戊子娶己丑大吕之徴生丙申火之孟夷則之徴丙申娶丁酉南吕之徵生甲辰火之季姑洗之徴甲辰娶乙巳仲吕之徴生壬子木之仲黄鍾之角火三元終則左行傳于東方木如是左行至於丁巳中吕之宫五音一終復自甲午金之仲娶乙未隔八生壬寅一如甲子之法終于癸亥謂㽔賔娶林鍾上生太簇之􅁼自子至于巳為陽故自黄鍾至于中吕皆下生自午至于亥為隂故自林鍾至于應鍾皆上生甲子乙丑金與甲午乙未金雖同然甲子乙丑為陽律陽律皆下生甲午乙未為陽吕陽吕皆上生六十律相反所以分為一紀也得此一説固己判然及讀瑞桂堂暇録亦論及此則尤明白簡易其曰六十甲子之納音此以金木水火土之音而明之也一六為水二七為火三八為木四九為金五十為土然五行之中惟金木為自然之音水火土必相假而後成音盖水假土火假水土假火故金音四九木音三八水音五十火音一六土音二七此不易之論也何以言之甲巳子午九也乙庚丑未八也丙辛寅申七也丁壬卯酉六也戊癸辰戌五也己亥四也甲子乙丑其數三十有四四者金之音也故曰金戊辰己巳其數二十有八八者木之音也故曰木庚午辛未其數三十有二二者火也土以火為音故曰土甲申乙酉其數三十十者土也水以土為音故曰水戊子己丑其數三十有一一者水也火以水為音故曰火凡六十甲子皆然此納音之所起也大抵六十甲子歴也納音律也支干納音之别也此天地自然之數河圖生數也生者左旋故以中央之土而生西方之金西方之金而生北方之水北方之水而生東方之木東方之木而生南方之火南方之火而復生中央之土洛書尅數也尅者右轉故以中央之土而尅北與西北之水北與西北之水而尅西與西南之火西與西南之火而尅南與東南之金南與東南之金而尅東與東北之木東與東北之木而又尅中央之土此圖書生尅自然之數也又見日家一書専解海中爐中之𩔖其辭雖鑿亦自頗通因併録之曰甲子乙丑海中金者子屬水又為湖又為水旺之地兼金死於子墓於丑水旺而金死墓故曰海中金也丙寅丁卯爐中火者寅為三陽卯為四陽火既得地又得寅卯之木以生之此時天地開爐萬物始生故曰爐中火也戊辰己巳大林木者辰為原野巳為六陽木至六陽則枝榮葉茂以茂盛之木而在原野之間故曰大林木也庚午辛未路傍土者未中之木而生午位之旺火火旺則土於斯而受刑土之始生未能育物猶路傍土若也故曰路傍土也壬申癸酉劔鋒金者申酉金之正位兼臨官申帝旺酉金既生旺則成剛矣剛則無踰於劔鋒故曰劔鋒金也甲戍乙亥山頭火者戌亥為天門火照天門其光至高故曰山頭火也丙子丁丑澗下水者水旺於子衰於丑旺而反衰則不能為江河故曰澗下水也戊寅己卯城頭土者天干戊己屬土寅為艮山上積而為山故曰城頭土也庚辰辛巳白蠟金者金養於辰生於巳形質初成未能堅利故曰白蠟金也壬午癸未楊柳木者木死於午墓於未木既死墓雖得天干壬癸之水以生之終是柔弱故曰楊柳木也甲申乙酉井泉水者金臨官申帝旺酉金既生旺則水由以生然方生之際力量未洪故曰井泉水也丙戌丁亥屋上土者丙丁屬火戌亥為天門火既炎上則土非在下而生故曰屋上土也戊子己丑霹􅆮火者丑屬土子屬水水居正位而納音乃火水中之火非龍神則無故曰霹􅆮火也庚寅辛卯松柏木者木臨官寅帝旺卯木既生旺則非柔弱之比故曰松栢木也壬辰癸巳長流水者辰為水庫巳為金長生之地金生則水性已存以庫水而逢生金則泉源終不竭故曰長流水也甲午乙未沙中金者午為火旺之地火旺則金敗未為火衰之地火衰則金冠帶敗而方冠帶未能斫伐故曰沙中金也丙申丁酉山下火者申為地戸酉為日入之門日至此時而藏光故曰山下火也戊戌己亥平地木者戌為原野亥為木生之地夫木生於原野則非一根一株之比故曰平地木也庚子辛丑壁上土者丑雖土家正位而子則水旺之地土見水多則為泥也故曰壁上土也壬寅癸卯金箔金者寅卯為木旺之地木旺則金羸又金絶於寅胎於卯金既無力故曰金箔金也甲辰乙巳覆燈火者辰為食時巳為禺中日之將中艶陽之勢光於天下故曰覆燈火也丙午丁未天河水者丙丁屬火午為火旺之地而納音乃水水自火出非銀漢不能有也故曰天河水也戊申己酉大驛土者申為坤坤為地酉為兑兌為澤戊巳之土加於坤澤之上非其他浮薄之土也故曰大驛土也庚戌辛亥釵釧金者金至戌而衰至亥而病金既衰病則誠柔矣故曰釵釧金也壬子癸丑桑柘木者子屬水丑屬金水方生木金則伐之猶桑柘方生人便以餧􅁞故曰桑柘木也甲寅乙卯大溪水者寅為東北維卯為正東水流正東則其性順而川澗池沼俱合而歸故曰大溪水也丙辰丁巳沙中土者土庫辰絶巳而天干丙丁之火至辰冠帶巳臨官土既庫絶旺火復與生之故曰沙中土也戊午己未天上火者午為火旺之地未中之木又復生之火性炎上及逢生地故曰天上火也庚申辛酉石榴木者申為七月酉為八月此時木則絶矣惟石榴之木反結實故曰石榴木也壬戌癸亥大海水者水冠帶戌臨官亥水臨官冠帶則力厚矣兼亥為江非他水之比故曰大海水也化氣甲己土乙庚金丁壬木丙辛水戊癸火此十干化五行真氣也其法取歳首月建之干如甲己丙作首丙屬火火生土故化土餘倣此又一説亦通謂遇龍則化龍辰也甲巳得戊辰戊屬土故化土乙庚得庚辰庚屬金故化金丙辛以下皆然應聘不遇胡石塘先生嘗應聘入京世皇召見於便殿趨進張皇不覺笠子欹側上問曰秀才何學對曰脩身齊家治國平天下之學上笑曰自家一笠尚不端正又能平天下耶然憐其貧特授揚州路儒學教授吁以先生之學行而不見遇於明君是果命矣夫皇舅墓河間路景州蓨縣河滸一土阜相傳為皇舅墓自國家奄混區夏即有謡云皇舅墓門閉運糧向北去水渰墓門開運糧却回來至正辛卯中原大水舟行木杪間及水退土阜崩圮墓門顯露繼後天下多事海道不通先是張蛻菴翥嘗有詩云青州刺史河上墳墳不可識碑仍存維舟上讀半磨滅使君乃縁戚里恩當時賜葬宜過厚冢闕樹立湏雄尊豈知陵谷有遷變石馬盡沒龜趺蹲驛夫指我元傍岸縣官恐墜移高原岸濵徃徃多古冢零落空餘秋草根至今父老傳䜟記野人之語那足論我疑其藏必深錮或謂已被湍流吞安得壯士塞河水萬古莫令開墓門讀公之詩傷今之世則䜟緯之説誠不可誣矣真率㑹林昉田間書載㑹友人遊山檄云人有殘縑敗素繪一山一水愛之若寳售之必千金至於目與眞景㑹則略不加喜毋乃貴僞而賤真耶求樂之真今日正在我輩春雪既霽春風亦和或坐釣於鷗邊或行歌於犢外百年瞬息懽樂㡬何肴核盃盤隨意所命毋以豐約拘也檄書馳告盍勇而前此文殊清新向予避兵雲間泗濵時其地有林泉之勝而無烽燧之虞同時嘉遯者皆文人高士因倣司馬温公故事俾予作約語云百嵗光隂萬物乃天地逆旅四時行樂我輩亦風月主人幸居同泗水之濱况地接九山之勝儘可傍花隨柳庻㡬㳺目騁懐節序駸駸莫負芒鞵竹杖盃盤草草何慚野蔌山肴雖云一餉之清懽亦是百年之嘉話敢煩同志互作遨頭慨元祐之耆英衣冠逺矣集永和之少長觴咏依然訂約既勤踐言弗替用附於此以見真率之㑹不讓逰山之樂也珠簾秀歌兒珠簾秀姓朱氏姿容姝麗雜劇當今獨歩胡紫山宣慰極鍾愛之嘗擬沉醉東風小曲以贈云錦織江邊翠竹絨穿海上明珠月淡時風清處都隔斷落紅塵土一片閒情任卷舒挂盡朝雲暮雨馮海粟先生亦有鷓鴣天云十二闌干映逺眸醉香空㫁楚天秋鰕􅂡影薄㣲㣲見龜背紋輕細細浮香霧歛翠雲收海霞為帶月為鈎夜來捲盡西山雨不着人間半㸃愁皆咏珠簾以寓意也由是聲譽益彰漢兒字聖㫖至元丙子秋八月宋揚州守臣朱煥以城降後於煥之孫道存家欽覩世祖招諭詔㫖其文曰上天眷命大元皇帝聖㫖諭淮安州安撫朱煥據陳楚客奏臣與朱安撫同年又有通家之好自戊午歸順之後不相見者十有八載今王師弔伐諸道並進數内一路領漣河清河將士攻取淮東未附州郡切恐城䧟之日玉石俱焚臣於故人情分不容緘黙且彼所以嬰城自守者無他原其本心但未知趨向之方初無執迷抗拒之意今大江南北西至全蜀悉入版圖若蒙聖慈特發使命宣示徳音開其生路彼亦識時達變之士也寧不以數萬生靈為念乎臣昧死上言伏候勑㫖准奏今遣使特㫖前去宣布大信若能識時逹變可保富貴應在城守禦將帥同謀歸順者意不殊此故兹詔示想宜知悉至元十二年七月日白麻正書北方謂之漢兒字聖㫖此詔嵗月在城未降一載先則煥之來歸必先有所期矣煥之子徳輝承父廕仕至漢陽同知道存徳輝之子也亦以父廕仕至江隂知事既而復受僞周戸部主事之職將命揚州被執至淮安殺之弟兄子姪客居上海又悉死於苗獠之刼掠煥之宗族所遺殆無噍𩔖夫煥既不能盡忠於前而道存又不能盡忠於後􅀍執遭戮之地適在揚州淮安天之報施固其宜也謾書於此以為叛逆之勸碧瀾妾吳興趙公碧瀾宋宗室也老而益貧二妾方少艾慮無以安其心因遣之去咸弗肯嫁數獻肴酒致殷勤焉公於卒也覆諸水曰慎毋再見昔吾割情忍愛以去爾爾弗我忘祗攪我心耳既而各與其父母俱至泣而言曰妾家每歳請給足可養贍願執事終身為尼以報主恩公遂復留之他日公死果如所言公有寡女復資育之四明黄伯成先生玠嘗有詩曰感之以誠感必深應之以真應必㨗真情一合了弗離聽我長歌碧瀾妾碧瀾亦是諸王孫世殊事異老且貧少陵尚愛燕玉煖况是當時真貴人春衣典盡春寒峭二妾朱顔正姝好忍將羅帶拆同心懊恨浮生頭白早珠鈿翠靨幸僅存此時猶及嫁夫君十二樓頭燕子去揮手不可留仙裠去妾相悲兩相約既去猶煩送肴酌主君詎忍覆棄之見此翻令心緒惡一心專天天得知忍着主衣還事誰遂携衾襥與俱來後君死者當為尼碧瀾堂下雙溪水使客徃來豈知此不願新懽戀舊恩千萬人中兩人耳箕仙咏史懸箕扶鸞召仙徃徃皆古名人高士來格所作詩文間有絶佳者意必英爽不昧之鬼依馮精魄以闡揚其靈恠耳友人檇李顧元凱舜舉亦善此術嘗召一仙至大書曰獨樂園主也可命題衆以咏史請鸞不停留作成長篇自非熟於史學者弗能焉殊不知此等為何如鬼也詩曰三皇之前不可傳堯舜垂衣化自然夏衰商敗兵革起征討有罪非傳賢蒼姬種徳極深厚歴載八百何緜緜孔丘孟軻不得位唯有文字登書編春秋筆削嚴一字誅惡褒善持大權丘明作傳詳本末下迨戰國何茫然秦皇併吞六王畢始廢封建迷井田功高自謂傳萬世仁義不施徒託仙東遊弗返祖龍死赤靈火徳明中天漢朝文景稱至治刑措可比成康前無端雜用黄老術是以未得稱其全王莽賊臣簒漢祚賴有光武如周宣雲臺名將應列宿婉婉良䇿扶戎軒絶勝高祖􅊽彭越可比周召終天年崇儒徃謁曲阜廟典章燦燦羅星􅄤後人不省創業苦寵任閹宦皆貂蟬西園粥爵誠可恥黨錮忠士災何延一朝曹氏帝稱魏銅駝荆棘生荒烟關張早死後主弱典午自帝開坤埏五方雲擾亂中國五馬南渡何翩翩六朝興廢有得失豈知合併歸楊堅瓊花城裏建宫闕汴河春水浮龍船亂離思治否復泰唐室高祖催飛騫秦王神武不可及遂承天祚傳高𤣥大綱不正有慚色我嘗撫卷思其淵紛紛女禍握神器擾擾藩鎮横戈鋋乘輿避亂數奔竄翠華幾度遊西川黄巢殘賊不忍説白骨山積血成泉侵凌漸使唐祚絶江海雖大猶㳙㳙朱溫降將乃一賊僣號暫時得復失後唐石晉暨知逺但以功利不尚徳周家亦僣登天基獨有世宗明治術我朝列聖皆深仁天下蒼生得蘇息史書浩浩充屋棟人主欲觀寧遍及小臣纂集作通鑑治亂興亡明似日願言乙夜細垂觀比美成王戒無逸夫婦同棺張春兒葉縣軍士李青之妻也年二十青疾革顧謂春曰吾殆矣汝其善事後人春截髮示信誓弗再適未幾青死春慟垂絶且囑匠人曰造棺宜極大將以盡納亡者衣服􅃓劔之屬匠如其言既歛乃自經鄰里就用此棺同葬之事奏上于朝旌其墓時至正戊子也嗚呼春兒生長寒㣲不閑禮節尚知夫婦大義如此顧世之名門巨族動以衣冠自眩徃徃有夫骨未寒而求匹之念已萌于中者豈不為春兒萬世之罪人也與宋幼主詩寄語林和靖梅花㡬度開黄金臺下客應是不歸來此宋幼主在京都所作也始終二十字含蓄無限凄戚意思讀之而不興感者幾希孔掾史孔某者皇慶癸丑間為江浙省掾史身軀短小僅與堂上公案相等凡呈署牘文必用低凳閣足令高托歡丞相以其先聖子孫而且才學優長甚禮遇之時有詔許文正公從祀夫子廟庭公之子參知政事惡孔風度不雅因小過叱之退丞相曰他祖公容得參政父親坐參政反不容他一箇子孫立耶許大慚挽文教授詩至元間宋文丞相有子出為郡教授行數驛而卒人皆作詩以悼之閩人翁某一聨云地下修文同父子人間讀史各君臣獨為絶唱狷潔鄭所南先生思肖福州連江人宋太學上舎應博學宏詞科剛介有立志㑹天兵南叩闕上䟽犯新禁衆爭目之由是遂變今名曰肖曰南義不忘趙北面他姓也𨼆居吳下一室蕭然坐必南向嵗時伏臘望南野哭而再拜乃返人莫識焉誓不與朔客交徃或於朋友坐上見有語音異者便引去人咸知其狷㓗亦弗為怪工畫墨蘭不妄與人邑宰求之不得聞先生有田三十畆因脅以賦役取先生怒曰頭可斫蘭不可畫嘗自寫一㢧長丈餘高可五寸許天真爛漫超出物表題云純是君子絶無小人深山之中以天為春過齊子芳之書塾云此世但除君父外不曾别受一人恩寒菊云禦寒不籍水為命去國自同金鑄心其忠肝義膽於此可見晚年究竟性命之學以夀終鴈書零落風高恣所如歸期回首是春初上林天子援􅃓繳窮海纍臣有帛書中統十五年九月一日放鴈獲者勿殺國信大使郝經書于真州忠勇軍營新館右五十九字郝公書也公字伯常澤州陵川人世皇召居潜邸嵗己未扈従濟江授江淮宣慰司副使中統元年拜翰林侍讀學士充國信使宋館于真州凡十有六年始得歸此書當在至元十一年是時南北隔絶但知紀元為中統也先是有以鴈獻命畜之鴈見公輒鼓翼引吭似有所訴者公感悟擇日率從者具香案北向拜舁鴈至前手書尺帛親繫鴈足而縦之後虞人獲之􅁐中以聞上惻然曰四十騎留江南曽無一人鴈比乎遂進師南伐越二年宋亡至今祕監帛書尚存碑刻印識李和錢唐人國初時尚存粥故書為業尤精於碑刻凡博古之家或有贗本求一印識毅然弗從其印文李和鑒定石刻印九姑元女課吳楚之地村巫野叟及婦人女子輩多能卜九姑課其法折草九莖屈之為十八握作一束祝而呵之兩兩相結止留兩端已而抖開以占休咎若續成一條者名曰黄龍儻仙又穿一圏者名曰仙人上馬圏不穿者名曰蟢窠落地皆吉兆也或紛錯無緒不可分理則㓙矣又一法曰九天元女課其法折草一把不計莖數多寡茍用算籌亦可兩手隨意分之左手在上竪放右手在下横放以三除之不及者為卦一竪一横曰大陽二竪一横曰靈通二竪二横曰老君二竪三横曰太吳三竪一横曰洪石三竪三横曰祥雲皆吉兆也一竪二横曰太隂一竪三横曰懸崕三竪三横曰隂中皆凶兆也愚意俗謂九姑豈即九天元女歟離騷經云索璚茅以筳篿兮命靈氛為余卜注曰璚茅靈草也筳小破竹也楚人名結草折竹以卜曰篿據此則亦有所本矣白翎雀白翎雀者國朝教坊大曲也始甚雍容和緩終則急躁繁促殊無有餘不盡之意竊嘗病焉後見陳雲嶠先生云白翎雀生于烏桓朔漠之地雌雄和鳴自得其樂世皇因命伶人碩徳閭製曲以名之曲成上曰何其末有怨怒衰婺之音乎時譜已傳矣故至今卒莫能改㑹稽張思廉憲作歌以咏之曰真人一統開正朔馬上鞮鞻手親作教坊國手碩徳閭傳得開基太平樂檀槽􅞛呀鳯凰齶十四銀環挂冰索摩訶不作兠率聲聽奏筵前白翎雀霜皬皬風殻殻白草黄雲日色薄玲瓏碎玉九天來亂撒冰花灑毡幕玉翎琤珄起盤礴左旋右折入寥廓崒嵂孤高繞羊角啾啁百鳥紛叅錯須臾力倦忽下躍萬㸃寒星墜叢薄砉然一聲震雷撥一十四弦喑一抹鴐鵞飛起暮雲平鷙鳥東來海天濶黄羊之尾文豹胎玉液淋漓萬壽盃九龍殿高紫帳煖􅂿歌聲裏懽如雷白翎雀樂極哀節婦死忠臣摧八十一年生草萊鼎湖龍去何時回天下士漫浪野録云蘇子瞻泛愛天下士無賢不肖懽如也嘗自言上可以陪玉皇大帝下可以陪卑田院乞兒子由晦黙少許可嘗戒子瞻擇交子瞻曰吾眼前見天下無一箇不好人此乃一病以余言之先生天下士也此其所以汎愛天下士顧今之忌才嫉能口堯舜而心盜蹠者使先生視之乃土苴之不若矣輟耕録卷二十欽定四庫全書輟耕録卷二十一元陶宗儀撰宫闕制度至元四年正月城京師以為天下本右擁太行左注滄海撫中原正南面枕居庸奠朔方峙萬歳山浚太液池𣲖玉泉通金水縈畿帶甸負山引河壯哉帝居擇此天府城方六十里里二百四十歩分十一門正南曰麗正南之右曰順承南之左曰文明北之東曰安貞北之西曰健徳正東曰崇仁東之右曰齊化東之左曰光熈正西曰和美西之右曰肅清西之左曰平則大内南臨麗正門正衙曰大明殿曰延春閣宫城周囘九里三十歩東西四百八十歩南北六百十五歩高三十五尺甎甃至元八年八月十七日申時動土明年三月十五日即工分六門正南曰崇天十二間五門東西一百八十七尺深五十五尺高八十五尺左右􅝔樓二􅝔樓登門兩斜廡十門闕上兩觀皆三􅝔樓連􅝔樓東西廡各五間西􅝔樓之西有塗金銅幡竿附宫城南面有宿衛直廬凡諸宫門皆金鋪朱戶丹楹藻繪彤壁琉璃瓦飾簷脊崇天之左曰星拱三間一門東西五十五尺深四十五尺高五十尺崇天之右曰雲從制度如星拱東曰東華七間三門東西一百十尺深四十五尺高八十尺西曰西華制度如東華北曰厚載五間一門東西八十七尺深高如西華角樓四據宫城之西隅皆三􅝔樓琉璃瓦飾簷脊直崇天門有白玉石橋三虹上分三道中為御道鐫百花蟠龍星拱南有御膳亭亭東有拱辰堂盖百官㑹集之所東南角樓東差北有生料庫庫東為柴塲夾垣東北隅有羊圏西南角樓南紅門外留守司在焉西華南有儀鸞局西有鷹房厚載北為御苑外周垣紅門十有五内苑紅門五御苑紅門四此兩垣之内也大明門在崇天門内大明殿之正門也七間三門東西一百二十尺深四十四尺重簷日精門在大明門左月華門在大明門右皆三間一門大明殿乃登極正旦壽節會朝之正衙也十一間東西二百尺深一百二十尺高九十尺柱廊七間深二百四十尺廣四十四尺高五十尺寢室五間東西夾六間後連香閣三間東西一百四十尺深五十尺高七十尺青石花礎白玉石圎磶文石甃地上