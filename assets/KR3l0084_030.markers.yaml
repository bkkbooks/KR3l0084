  - {type: variant, offset: 1, length: 1, content: 台, WYG: 命之來際合於青宫也臣區區之情無任傾嚮輒罄所見以賛其萬一謹將寳璽之出處古今始末詳據考按許慎説文璽玉者印也以守土故為文從爾從土其義盖曰天付爾此器俾寳之以守爾土也至周太史籀易為從爾從玉義取天付爾此玉寳以為天下君也三代以上璽文無所考諸史籍并寳璽文圗説曰傳國璽方四寸其文文飾如前楚以卞和所獻之璞琢而成璧後求昬於趙以納聘焉秦昭王請以十城易之而不獲始皇併六國得之命李斯其文玉工孫夀刻之太平御覽又以為藍田玉所刻二世子嬰奉璽降沛公於軹道旁高祖即位服其璽因世傳之謂為傳國璽厥後孺子未立藏於長樂宫及莽簒位使安陽侯王舜廹太后求之太后怒罵而不與舜言益切出璽投之地璽因歸莽及更始滅莽校尉公賔得璽詣宛獻於更始赤眉殺更始立盆子璽為盆子所有後盆子面縛奉璽於光武至獻帝董卓作亂掌璽者投於井中孫堅征董卓於井中得之𡊮術奪於堅妻術死荆州刺史徐璆聞帝為曹操迎在許昌以璽送之帝後遜位并以璽歸魏常道鄉公禪位璽歸於晉懐帝遇劉聰之害璽歸於聰聰死歸曜曜為石勒所滅璽入於勒勒滅入於冉閔閔敗見收於閔之將軍蔣幹晉征西將軍謝尚購得之以還東晉時穆帝永和八年也自璽寄於劉石共五十三年晉復得之是後宋齊梁陳相傳以至於隋滅陳蕭后與太子正道并傳國璽並入於突厥唐太宗即位寳璽未獲乃自刻玉曰皇帝景命有徳者昌貞觀四年蕭后與正道自突厥奉璽歸於唐唐始得焉朱溫簒唐璽入於溫荘宗定亂璽入於後唐荘宗遇害明宗嗣立再傳養子從珂是為廢帝后氏簒立自焚自是璽不知所在至宋哲宗咸陽民叚義獻玉璽及徽宗為金所執凡有寳璽金皆取之内璽一十有四青玉傳國璽一其色與今所獻玉璽相同則知宋之南遷二百年無此寳璽也明矣然自金既取於宋之後寳璽出處得失亦未見明説以及我元適集皇太孫寳命所歸之際應期而出臣職總御史親會盛事不可以不録又圗中别有璽其文亦八旁注曰此傳國璽背文也今見寳璽之背皆刻螭形蟠屈凹凸不齊徧視壓四際無地可置此文按太平御覽太元十九年雝州刺史郄恢表慕容永稱藩奉璽方六寸厚七分蟠螭為鼻今高四寸六分四邊龜文下有字曰受天之命皇帝夀昌原其所由未詳厥始以斯言之當别是一璽非今傳國璽也此又不可不辨臣彧誠惶誠恐頓首頓首謹奉牋上進以聞伏希聽覽微臣不勝瞻望之至謹言此文乃桓所譔桓字武子兖州人㓜警悟為人寛厚事親篤孝愽覽羣籍尤精籀之學由儒學教授仕至國子司業卒庫庫珠拓䟦氏成宗即位近臣以其事聞授漢中廉訪司僉事仕至湖廣廉訪使卒國史於安札爾傳謂實廸乃國王繅古察之子謂桓辯其文曰受命于天既夀永昌於桓傳謂桓辯其文曰受天之命既夀永昌盖秦别有受天之命皇帝夀昌一璽又非此璽此則史之誤也今取宋薛尚功此編歴代鐘鼎彛器欵識法帖碑本第十八卷内璽文模勒于後以備愽古者之一覽云尚功云二璽文本只一器縁傳摹字畫不同形制大小有異因併刻之亦疑以傳疑之意也瑞應泉湖州長興州金沙泉唐時用此水造紫筍茶進貢泉不常出有司具牲牢祭之始得水事訖即涸宋季屢加浚治泉迄不出至元十五年嵗戊寅中書省遣官致祭一夕水溢可溉田千畆遂賜名瑞應泉疑冢曹操疑冢七十二在漳河上宋俞應符有詩題之曰生前欺天絶漢統死後欺人設疑冡人生用智死即休何有餘機到丘壟人言疑冢我不疑我有一法君未知直湏盡發疑冢七十二必有一冢藏君屍此亦詩之斧鉞也盧橘世人多用盧橘以稱枇杷按司馬相如上林賦云盧橘夏熟黄柑橙楱枇杷橪而善切柿夫盧橘與枇杷並列則盧橘非枇杷明矣郭璞注蜀中有給客橙冬夏花實相繼通嵗食之謂即盧橘也意者橙橘惟熟於冬而盧橘夏亦熟故舉以為重歟唐三體詩裴庾註云廣州記盧橘皮厚大如柑酢多至夏熟土人呼為壺橘又曰盧橘五龍車葉公李為宋太學生時上書極言賈似道權姦誤國幾為所害及世祖平江南即召見官之至中書右丞凡有軍國大事必問曰曽與蠻子秀才商量否盖指李也一日議事大廷乃不在列問其故則病足遂以所御五龍車召之至命坐而諮決焉嘗於其孫以道處見當時所畫應召圗五龍車中坐一山野質朴之老其遭遇有如此者使無賈似道以發其正大之論直一書生耳而望功名顯天下亦難矣伏波將軍瓊州一水南北有兩伏波將軍廟世人莫明其故嘗考之史記及東漢書盖漢元鼎五年衛尉路博徳為伏波將軍出桂林下滙水不特馬援為伏波將軍也至元鈔料至元印造通行寳鈔分一十一料貳貫壹貫伍伯文叄伯文貳伯文壹伯文伍拾文叄拾文貳拾文壹拾文伍文鵰傳某人浮湛里中無以為生偵民有小不平嗾之訟佐之請謁已旁縁自資且既餌臨政者因持其短長以蠧民梗政遂有人作鵰傳以警之傳曰昔黄帝少皥氏之世鳳鳥適至故為鳥師而鳥名命鳳凰為百禽長當是時南山有鳥其名曰鵰鵰之性鷙而徤貪而狡稻粱之甘木實之美鵰不屑焉資衆禽之肉以為食鵰之徒實繁其與鵰同氣而異質者鷹鸇鳶隼鷂鶻鴟鶚皆助鵰為虐者也其異類而同姓者鴟鴞鵂鶹梟鴆訓狐鬼車其惡與鵰同特其材異爾然鵰有大小小者從鷦鷯鷃雀力可制則制之大者雖鴻鵠不畏也故鵰之所在衆禽皆逃散逺去摽枝無安巢灌叢無息羽鵰無所得食則遣操詭辭招衆禽之過而愬諸鳳曰鴻鴈背北而來南是叛者也鸚鵡舍禽言習人語是姦者也倉庚出幽谷遷喬木是冐越者也鷾鴯秋冬逺遁是避役者也烏知吉凶言妖祥以惑衆聽鵲填河以阻水利鳲鳩攘鵲之居鴛鴦荒淫無度鷗好閒鷄好鬭毆相傷鳬鷖鵝鴨習水戰鸕鷀白鷺得魚不税孔雀有異相杜鵑催歸令戍卒逃亡提壺勸人飲酒生事是皆有罪不治將益甚鳳凰惑焉命爽鳩氏治之鵰與爽鳩相為表裏窮山谷搜林麓禽之出者搏之逐之攫之拏之啄胔扼吭裂肪絶筋磔毛揚風灑血殷地凡遇之者無噍類其餘皆周章振掉謀所以免禍者毁巢破鷇空所積以奉爽鳩且以賂鵰使勿執於是鵰之勢益張而衆禽之生理日蹙其爪距稍利者慕鵰所為則起而效之其鈍者深藏逺竄餒死於草莽相藉也而鳳凰始憂之聞蓬萊之顛有胎仙焉胎仙名鶴號青田翁廉介而潔白和平而好生於是徴爽鳩使鶴乘軒而治之鶴乃與鳳凰謀曰夫鵰其始一而已自子之不戒而使之蔓延今之為鵰者何其多耶昔之鵰名鵰字鵰形鵰性鵰本為鵰者也今有非鵰而鵰者何也鵰則得食不鵰則不得食鵰則有利而無害不鵰則利未見而害常隨之故不容其不鵰也今禽之産子者願為鵰鶵之習飛者學為鵰形状與鵰異者又冐為鵰不誅其渠魁殱其兇醜以勵其餘吾恐鸞鷃鵷鸑神雀大鵬金翅皆化為鵰耳鳳凰曰善奏請于帝帝遣虞人持弓矢張網羅隨鵰而磔之鵰之徒盡斃勑天下無留鵰故其餘黨皆屏迹匿形不敢出衆禽始得安於生養以盡其天年此皆少皥氏之恩鳳凰與鶴之力也太史公曰鵰姦禽也暴惡受誅固宜吾獨懼今之人子務養鵰意有所欲舉鵰而放之求衆禽之血肉以肥其軀殊不知少皥氏之戒也嗟夫害物而日益者刑雖未及天必譴之其鵰豈足恤哉三瓦戒陳衆仲先生嘗題樂全堂有能守不成三瓦戒之句人多不知所出按史記龜筴傳云天尚不全故世為屋不成三瓦而陳之注陳猶居也酸齋辭世詩貫酸齋先生臨終有辭世詩曰洞花幽草結良縁􅀍我瞞他四十年今日不留生死相海天秋月一般圓洞花幽草乃先生二妾名高昌世家虞文靖公集撰高昌王世勲碑序其世家曰輝和爾之地有和林山二水出焉一曰圗喇一曰索隆噶一夕有天光降于樹在兩河之間國人即而候之樹生癭若人姙身然自是光恒見者越九月又十日而癭裂得嬰兒五收養之其最穉者名曰布克汗既壯遂能有其民人土田而為之君長傳三十餘君是為伊嚕勒徳濟數與唐人相攻戰乆之乃議和親以息民而罷兵於是唐以金蓮公主妻伊嚕勒徳濟之子格哷勒徳濟居和林伯哩伯哩特言婦所居山也後遷交州至太祖龍飛朔漠當是時巴哩珠阿勒坦徳濟伊克都䕶在位伊克都䕶者其國王號也舉國入朝太祖嘉之妻以公主曰伊埒鄂端自是子孫皆封王后德今上皇后鴻吉哩氏名巴延呼圖克武宗宣懿惠聖皇后之姪毓德王博囉特穆爾女後至元二年丁丒三月立性節儉不妬忌動以禮法自持第三皇后竒氏素有寵居興聖西宫帝希幸東内左右以為言后無幾微怨望意嘗從帝時廵上京次中道帝遣内官傳㫖欲臨幸辭曰莫夜非至尊徃來之時内官徃來再三竟拒不納帝益賢之居坤德殿終日端坐未嘗妄踰户閾至正二十五年乙巳八月丁未崩年四十二文宗能畫文宗居金陵潜邸時命臣房大年畫京都萬歲山大年辭以未嘗至其地上索紙為運筆布畫位置令按槀圖上大年得槀敬藏之意匠經營格法遒整雖積學專工所莫能及武當山降筆至元十三年江南初内附民間盛傳武當山真武降筆書長短句曰西江月者鋟刻于梓黄紙模印貼壁間其詞云九九乾坤已定清明節候開花米田天下亂如麻直待龍蛇繼馬繼一作暨依舊中華福地黎民一度還家當初指望作生涯死在西江月下箕仙有驗虞邵菴先生布衣時落落不偶乆客錢唐一日偕友人楊公仲𢎞薛公宗海范公徳機訪方外宰淵微鍊師於西湖之曲求召鬼仙以卜行蔵鍊師即置箕懸筆書符作法有頃箕動筆運而附降云某非仙乃當境神也鍊師叱曰吾不汝召汝神何来神附云某欲乞虞公譔一保文申達上帝用求遷陞耳因衆勸先生其無辭神請先生遂諾翼日文成火於湖濵逾旬再詣鍊師禱卜神復降云某已獲授城隍謹候謁謝公必貴顯幸母自忽既而先生由校官至奉章閣侍書學士贈江西行中書省參知政事封仁夀郡公謚文靖以文章名四海豈非先世積有餘慶天將報施於先生之躬而鬼神預有知耶詩畫題三絶高文簡公一日與客遊西湖見素屏潔雅乘興畫竒石古木數日後文敏公為補叢竹後為户部楊侍郎所得虞文靖公題詩其上云不見湖州三百年高公尚書生古燕西湖醉歸寫古木吳興為補幽篁妍國朝名筆誰第一尚書醉後妙無敵老蛟欲起風雨來星墮天河化為石趙公自是真天人獨與尚書情最親高懐古誼兩相得慘澹醻酢皆天真侍郎得此自京國使我觀之三嘆息今人何必非古人淪落文章付陳迹此圖遂成三絶矣浙西園苑浙江園苑之勝惟松江下砂瞿氏為最古宋秀州守方岳亦有詩留題壁間後紫陽虚谷翁來游繼題十絶其一云壁間墨客掃龍蛇所寫詩佳字亦佳忽見一詩増感慨吾家宗伯老秋厓是也次則平江福山之曹横澤之顧又其次則嘉興魏塘之陳當愛山全盛時春二三月間遊人如織及其卒未及數月花木一空廢弛之速未有若此者自後其地吳氏之園曰竹荘盖元有池陂數十畆天然若湖瑩之嘗買得水殿圖據圖位置構亭水心瀟灑莫比譁訏之徒欲聞諸官亟塑三教像于中易曰三教堂人不可得而入矣瑩之卒荐遭兵燹今無一存者福山横澤下砂皆無有乆矣可勝嘆哉吳江長橋吳江長橋七十二間作橋者僧從雅師立總其役崇敬率衆以給其費居士姚行獨任勞以終事經始於泰定乙丒二月期年而成後九年州守徳濟哈雅作鉅閣奉觀音像于上輟耕録卷二十六欽定四庫全書輟耕録卷二十七元}
