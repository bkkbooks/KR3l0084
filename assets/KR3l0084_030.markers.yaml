皇天非有徳有道則不親不享也又聞之書曰皇天無親惟徳是輔又曰天命有徳克享天心受天明命作善降之百祥歴觀上世詩書之㫖未有無徳而能致天命之歸也欽惟太祖聖武皇帝秉資神裕始為天下除禍定亂隆功盛徳簡在天心受命而為天下主以至我憲天述道仁文義武大光孝皇帝徳配乾坤功包海嶽孝格宗廟子育􅀺元輿地所記悉主悉臣照臨無幽咸遂生樂施及明孝太子天錫仁慈之徳上感君親之悦下係億兆之望至元建號日月重明無為而治者迨廿年雖由太子進徳修業之洪溢亦頼元妃内助之淵宻也敬惟皇太妃聰明淑懿母儀崇嚴徳量溥厚孝敬慈恕出乎天性徃古未有也自明孝太子升遐内則皇孫翼翼訓導端嚴外則百司班班臨御整飭由是聖上君父大見倚重雖于時皇太孫未昭儲副之託而詹事之司未嘗一日廢闕以見皇天定命於青宫之位無時不在誠非人力所能為也欽惟皇太孫殿下徳資剛明才兼文武英謀獨斷大肖祖宗族屬係望遐邇歸心聖祖憲天述道仁文義武太光孝皇帝灼知天命之所在乆存隆顧將付以撫軍之重於至元三十年夏六月二十二日賜以皇太子金寳大正儲位而後詔以出師之期天下聞之室家胥慶和氣穰穰出於兩間是歳秋稔數年罕遇臣切念天象無言託命不爽豈期又於大行皇帝宫車晚出之後甫八日傳國神寳不求而出於大功臣子孫之家速由臺諫耳目之司直達於皇太妃御前斯葢皇天授命皇太孫誕膺龍飛以正九五之位俾符寳璽之文既夀而永永而又昌臣又見皇天之心大頼我皇元繼體之君不疾不遲景命適至以允四海之望者其瑞應之兆有三按唐史代宗之將為太子先封楚王及位正儲副而監國楚州獻定國寳一十有三因曰楚者太子之封今天降寳于楚宜建元寳應盖以寳為太子瑞應也昔明孝太子封為燕王今皇太孫燕王之子也將主神器而神寳出於燕適與前事相符此瑞應之兆一也又寳璽之出正當皇元聖天子六合一統之時宫車晚出之近朝以見天心正為繼體之君設也此瑞應之兆二也又寳璽之出適當月}
