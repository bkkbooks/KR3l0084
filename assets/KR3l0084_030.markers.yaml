  - {type: variant, offset: 6, length: 0, content: '', WYG: 一元陶宗儀撰大元宗室世系列聖授受正統始祖諱勃端察爾烈祖神元皇帝諱伊蘇克依姓却特氏太祖應天啓運聖武皇帝諱特穆津國語曰青吉斯宋開禧二年丙寅十二月即位於鄂諾河自號為汗至宋寳慶三年丁亥七月己丑崩於薩里川在位二十二年夀六十六葬起輦谷太宗英文皇帝諱諤格徳依宋紹定二年己丑八月己未即位於固爾班蘇巴克至宋淳祐元年辛丑十一月崩於呼蘭山在位一十三年壽五十六𦵏起輦谷六皇后塔納竒納臨朝稱制皇后鼐瑪錦氏睿宗仁聖景襄皇帝諱托壘憲宗追諡定宗簡平皇帝諱庫裕克宋淳祐二年壬寅至乙巳皇后當國丙午七月歸政即位於達蘭達巴至戊申三月崩於和碩瑪勒昻吉爾在位三年夀四十三𦵏起輦谷皇太后塔納竒納復治國事憲宗桓肅皇帝諱孟克宋淳祐十一年辛亥六月即位於奎騰敖拉至宋開慶元年己未七月二十七日癸亥崩於釣魚山在位九年壽五十世祖聖德神功文武皇帝諱呼必賚國語曰色辰宋景定元年庚申四月一日戊辰即位於開平建元中統至至元三十一年甲午正月十九日庚午崩於紫檀殿在位三十五年壽八十𦵏起輦谷中統四至元三十一裕宗文恵明孝皇帝諱珍戩成宗追諡順宗昭聖衍孝皇帝諱達爾瑪巴拉武宗追謚成宗欽明廣孝皇帝諱特穆爾國語曰諤勒哲圖至元三十一年甲午四月十四日甲午即位於上都改至元三十二為元貞至大德十一年丁未正月八日癸酉崩於玉徳殿在位十三年壽四十二𦵏起輦谷元貞二大德十一武宗仁惠宣孝皇帝諱哈尚國語曰庫魯克大德十一年丁未五月十一日甲戌即位於上都十二月詔改大徳十二為至大至四年辛亥正月八日庚辰崩於玉徳殿在位四年夀三十一葬起輦谷至大四仁宗聖文欽孝皇帝諱阿裕爾巴哩巴特喇國語曰布延圖至大四年辛亥三月十八日庚寅即位於大明殿九月壬子詔改至大五為皇慶至延祐七年庚申正月二十一日辛丑崩於光天宫在位九年夀三十六𦵏起輦谷皇慶二延祐七英宗睿聖文孝皇帝諱碩迪巴拉國語曰格根延祐七年庚申三月十一日庚寅即位十二月乙巳詔改延祐八為至治至三年癸亥八月四日癸亥遇弑崩於上都途中南坡行幄在位四年夀二十一從𦵏諸帝陵至治三顯宗光聖仁孝皇帝諱噶瑪拉泰定追諡今出廟泰定皇帝諱伊蘇特穆爾元封晉王至治三年癸亥九月四日癸巳即位於上都龍居河十二月丁亥詔改至治四為泰定至五年戊辰二月庚申改致和七月十日庚午崩文宗追廢在位五年夀二十六泰定四泰定五改致和文宗即改天厯明宗翼獻景孝皇帝諱和實拉國語曰胡土克圖天厯二年己巳正月二十八日丙戌即位於和寧北八月二日大駕次翁郭察圖六日暴崩不改元在位八月夀三十𦵏起輦谷文宗聖明元孝皇帝諱圖卜特穆爾國語曰濟雅圖致和元年戊辰九月十三日壬申即位於大明殿改元天厯詔讓大兄明宗明年己巳五月帝發京師北迎八月二日丙戌遇於呼察圖庚寅明宗暴崩己亥復即位於上都至三年庚午五月戊午改至順至三年壬申八月十二日己酉崩在位五年夀二十九𦵏起輦谷後至元六年庚辰六月丙申以帝謀不軌使明宗飲恨而崩詔撤其廟主天厯二至順三寧宗冲聖嗣孝皇帝諱伊埒哲伯至順三年壬申十月四日庚子即位於大明殿至十一月十六日壬午崩不改元年七嵗葬起輦谷今上皇帝御名托歡特穆爾至順四年癸酉六月八日己巳即位於上都十月戊辰改元元統至三年乙亥十一月辛丑改至元至七年正月一日改至正元統二至元六至正今二十六年氏族蒙古七十二種阿爾拉扎拉爾岱庫克新莽固岱翁吉喇特鴻和岱雲吉喇實烏爾固果爾羅斯必嚕岱齊哩克岱圖卜岱巴哩勒呼竒哩婁伊埒齊勤扎拉濟蘭圖嚕卜岱塔塔爾哈塔錦薩里岱濟雅岱婁珠克岱雅克布哈岱塔拉爾約蘇沙卜珠岱黙勒吉岱阿爾德哷濟達鄂勒對拜達勒岱瑪勒岱伊克穆爾哈喇納延濟達阿爾德哷濟達伊奇爾岱和塔濟達摩哩齊諤爾古岱鄂摩克岱阿喇勒岱巴約特丹濟岱衛喇特黙爾吉濟特碩岱台鴻和岱伯蘇岱雅克布色岱穆爾温塔岱莽固岱塔塔爾岱納延濟達阿爾徳哷濟達忽神塔尼勒烏嚕克岱沙卜珠岱黙勒吉阿古拉里達扎瑪勒岱烏嚕勒岱布德吉鼐滿岱塔塔爾岱伊克埒哈喇昻吉岱卓囉岱蒙固岱鄂摩克岱圖魯卜岱巴琳徹爾濟達巴爾固岱哈達岱衛喇特色目三十一種哈喇婁欽察唐古阿克蘇圖巴喀喇科爾羅拉察岱奇徹勒岱輝和爾回回鼐滿岱阿勒呼木和羅岱和爾拉薩拉噶土伯特永和爾岱密持斯巴勒哩科爾羅丹珪齊實喇婁圖爾哈哈喇濟達岱卓爾齊岱圖魯卜岱和爾拉噶瑪拉齊徳徳哩克實宻爾漢人八種契丹髙麗女直準台珠爾噶岱哲衮卓沁台渤海女直同金人姓氏完顔漢姓曰王烏庫哩曰商赫舍哩曰髙圖克坦曰杜紐祜禄曰郎烏雅曰朱富察曰李延扎曰張温特赫曰温舒穆嚕曰蕭鄂屯曰曹富珠哩曰魯伊喇曰劉沃哷曰石納喇曰康𤓰爾佳曰仝費摩曰麻尼瑪哈曰魚威準曰趙阿克展曰雷阿里罕曰何温都曰空烏嚕曰惠穆延曰孟都哷曰強薩塔曰駱阿布哈曰田烏凌阿曰蔡布薩曰林珠格曰董果爾嘉曰汪平江南至元十一年甲戌宋之咸淳十年也秋七月世祖命中書右丞相巴延總制大軍取宋諭之若曰朕聞曹彬不嗜殺人一舉而定江南汝其體朕心法彬事毋使吾赤子横罹鋒刃巴延叩首奉命惟謹既而混一職方豈非不嗜殺人之驗與獨松闗明年乙亥春諸郡望風降敗丞相巴延遣員外郎石天麟詣闕奏聞世皇喜顧謂侍臣曰朕兵已到江南宋之君臣必知畏恐兹若遣使議和邀索嵗幣想無不從者遂勅巴延按兵乃命禮部尚書亷希賢侍郎嚴忠範計議官宋德秀祕書丞柴紫芝等齎奉國書使宋次建康希賢等借兵衛送巴延曰方今兩軍相阨互有設險宜令行人先往道意若便擁兵前進吾恐别生罅隙則和議之事必難成矣希賢等堅請乃簡閲鋭卒五百畀之至獨松闗戍闗者宋浙西安撫司參議官張濡也以為北兵叩闗率衆掩擊殺忠範執希賢希賢亦病創死世皇聞之大怒趣進攻嗟夫宋之亡也非有桀紂之惡特以始之以拘留使者肇天兵之興終之以誤殺使者激世皇之怒耳藉使獨松之使不死宋之存亡未可知其亦有數也與浙江潮明年正月甲申丞相巴延駐軍臯亭山宋奉表及國璽以降遣千户囊嘉特等入城慰諭令居民門首各貼好投拜三字及聞益王廣王如婺州即命分兵屯守諸門范文虎安營浙江沙滸太皇太后望祝曰海若有靈當使波濤大作一洗而空之潮汐三日不至軍馬宴然文虎吕文煥壻安慶守臣降於我者宋興亡宋之興始於後周恭帝顯徳七年恭帝方八歲及其亡也終於少帝徳祐元年少帝時四歲名顯而顯徳二字竟與得國時合周以主幼而失國宋亦以主幼而失國周有太后在上宋亦有太后在上始終興亡之數昭然如此萬歲山萬歲山在大内西北太液池之陽金人名瓊花島中統三年修繕之其山皆以玲瓏石疊壘峰巒𨼆暎松檜隆鬱秀若天成引金水河至其後轉機運􅆽汲水至山頂出石龍口注方池伏流至仁智殿後有石刻蟠龍昂首噴水仰出然後東西流入於太液池山上有廣寒殿七間仁智殿則在山半為屋三間山前白玉石橋長二百尺直儀天殿後殿在太液池中圓坻上十一楹正對萬歲山山之東也為靈囿奇獸珍禽在焉車駕歲巡上都先宴百官于此浙省參政齊達爾嘗云向任留守司都事時聞故老言國家起朔漠日塞上有一山形埶雄偉金人望氣者謂此山有王氣非我之利金人謀欲厭勝之計無所出時國已多事乃求通好入貢既而曰他無所冀願得某山以鎮壓我土耳衆皆鄙笑而許之金人乃大發卒鑿掘輦運至幽州城北積累成山因開挑海子栽植花木營構宫殿以為遊幸之所未幾金亡世皇徙都之至元四年興築宫城山適在禁中遂賜今名云留守司在宫城西南角樓之南專掌宫禁工役者大軍渡河世皇取江南大軍次黄河苦乏舟楫夜夢一老􅅱曰陛下欲渡河當隨我來引至一所指曰此即是已帝遂以物標識之及覺歴歴可記明日循行河滸尋夢中所見處果是方驚顧間忽有人進曰此間水淺可渡時帝徵夢中語因謂曰汝能先涉否其人乃行大軍自後從之無一不濟帝欲重旌其功對曰富與貴悉非所願但得自在足矣遂封為達爾罕與五品印撥三百戸以食之今其子孫尚有存者此事楊元誠太史瑀所云檄世皇下江南檄枚舉賈似道無君之罪宋國臣民其有不誠服者與其文曰宅中圖大天開一統之期自北而南雷動六師之衆先謂弔民而伐罪蓋將用夏而變夷欲制江浙以削平極汝海隅而混一堪嗟此宋信任非人處之師相之尊委以國柄之重世濟其惡真兇悖之賈充謀及迺心效姦雄之曹操不學無識舞術弄權誇滸黄僅免其身比河清莫大之績承君之寵如彼之專貪天之功確乎不拔惜官爵以總寳貨苛條法以苦賢才奪土田而無地可耕變關會而物價溢湧藉鄙猥者伴食於廟堂任反側者失兵於邊徼恬視雷星之召異罔聞水火之降災滿朝皆其私人用將因其重賂用白劄而破世守之法曲丹筆而容天討之刑民心已離而不知天命將革而未悟方且貪湖山之樂聚寳玉之珍弗顧母死奪制以貪榮乃乘君寵立幼而固位以已峻功碩徳而自比於周公欺人寡婦孤兒反不如於石勒深懐禍慝自肆奸邪合正兩觀之誅可紓百姓之怒我大元皇帝聰明智睿神武慈仁焚香祝天誓莫殺而混海宇振兵畧地隨所向而宣皇威一戰乘勝而渡江諸將列降而獻土厥角稽首迎我前矛後實先聲易如破竹昭天順人信之助成風行草偃之功合宇宙以清寜蘇人民而鎮撫恩寛幼主以下罪止元惡之身自今檄到應守令以境土投拜除大支犒賞外仍其官職謹檄朝儀大元受天命肇造區夏列聖相承至於世皇至元初尚未遑興建宫闕凡遇稱賀則臣庶皆集帳前無有尊卑貴賤之辨執法官厭其喧雜揮杖擊逐之去而復來者數次翰林承㫖王文忠公磐時兼太常卿慮將貽笑外國奏請立朝儀遂如其言科舉皇慶癸丑冬十一月詔曰其以皇慶三年八月天下郡縣興其賢者能者充賦有司明年二月會試京師中選者朕將親䇿焉按遺山元公好問所撰廉訪使楊文憲公奐墓碑云太宗即位之十年戊戌開舉選特詔宣徳課稅使劉公用之試諸道進士公試東平兩中賦論第一奏授河南路徵收課稅所長官兼廉訪使則國朝科舉之設已肇於此寥寥七十餘年而布延圖皇帝克不墜祖宗之令典尊號曰仁不亦宜乎初焉試論賦蓋反宋金餘習後則一以經學為本非復向時比矣江南謡汲郡王公玉堂嘉話云宋未下時江南謡云江南若破百鴈來過當時莫喻其意及宋亡蓋知指丞相巴延也白道子太宗時諸國來朝者多以冒禁應死耶律文正王楚材進奏曰願無汙白道子從之蓋國俗尚白以白為吉故也官不致仕大徳七年詔内外官年及七十並聽致仕時郭守敬字若思順徳邢臺人知太史院事以舊臣且熟朝廷所施為獨不許其請至今翰林太史司天官不致仕者咸自公始達爾罕達爾罕譯言一國之長得自由之意非􅈴戚不與焉太祖龍飛日朝廷草創官制簡古惟左右萬户次及千户而已丞相順徳忠獻王哈喇哈遜之曾祖竒徹勒以英材見遇擢任千戸錫號達爾罕至元壬申世祖録􅈴臣後拜王宿衞官襲號達爾罕皇族列拜己丑秋八月太宗即皇帝位耶律文正王時為中書令定冊立儀禮皇族尊長皆令就班列拜尊長之有拜禮蓋自此始内八府宰相内八府宰相八員視二品秩而不降授宣命特中書照會之任而已寄位於翰林之繅琳繅琳宫門外院官會集處也所職視草制若詔赦之文則非其掌也至於院之公事亦不得與焉例以國戚與􅈴貴之子弟充之伊勒都齊國朝有四集賽台官集賽者分宿衞供奉之士為四畨畨三晝夜凡上之起居飲食諸服御之政令集賽之長皆總焉中有伊勒都齊乃侍御之至親近者雖官隨朝諸司亦三日一次輪流入直負骨朶於肩佩環刀於要或二人四人多至八人時若上御控鶴則在墀陛之下蓋所以虞姦回也雖宰輔之日覲清光然有所奏請伊勒都齊在固不敢進今中書移咨各省或有須備録奏文事者内必有伊勒都齊某等以此之故余又究骨朶字義嘗記宋景文筆記云關中人以腹大為􅍺􅞷上音孤下音都俗音謂杖頭大者亦曰􅍺􅞷後譌為骨朶朶平聲大漢國朝鎮殿將軍募選身軀長大異常者充凡有所請給名曰大漢衣糧年過五十方許出官珪齊珪齊者快行是也每歳一試之名曰放走以脚力便捷者膺上賞故監臨之官齊其名數而約之以繩使無後先參差之爭然後去繩放行在大都則自河西務起程若上都則自泥河兒起程越三時走一百八十里直抵御前俯伏呼萬歲先至者賜銀一餅餘者賜段匹有差實保齊實保齊鷹房之執役者每嵗以所養海青有獲頭鵞者賞黄金一錠頭鵞天鵞也以首得之又重過三十餘斤且以進御膳故曰頭輟耕録卷一欽定四庫全書輟耕録卷二元陶宗儀撰聖聰至元六年二月二十五日上御玉徳殿命史臣榻前草詔黜謫太師巴延詔文有云其各領所部詔書到日悉還本衞上曰自蚤至暮皆一日也可改日字作時字時巴延以飛放為名挾持皇太子在柳林意將犯分詔既成遣中書平章濟爾噶岱齎至彼處開讀奉皇太子歸國而各枝軍馬即時散去蓋一字之中利害繫焉亶聰明作元后於此有以見之矣隆師重道文定王實喇巴爾今上之師也為學士時嘗在上左右一日體少倦遂於便殿之側偃卧因而就寐上因以藉坐方褥國語所謂都爾伯珍者親扶其首而枕之後嘗患癤額上上於金鉢中取佛手膏躬與貼之上之隆師重道可謂至矣盡矣王字敬臣號山齋輝和爾人受佛戒累朝皇帝先受佛戒九次方正大寳而近侍陪位者必九人或七人譯語謂之囊達實此國俗然也今上之初入戒壇見瑪哈噶拉佛前有物為供因問學士實喇巴爾曰此何物曰羊心上曰曾聞用人心肝者有諸曰嘗聞之而未嘗目睹請問喇嘛喇嘛者帝師也上遂命實喇巴爾𫝊㫖問之荅曰有之凡人萌歹心害人者事覺則以其心肝作供耳以此言復奏上再命問曰此羊曾害人乎帝師無荅減御膳國朝日進御膳例用五羊而上自即位以來日減一羊以歲計之為數多矣聖儉太府少監赫嚕奏取黄金三兩為御鞾刺花用上曰不可因請易以銀而鍍金者上曰亦不可金銀首飾也今民間所用何物對曰用銅上曰可右五事楊太史瑀所言太史居官時日侍上故知其詳后徳今上皇太子之正位東宫也設諭徳置端本堂以處太子講讀忽一日帝師來啓太子母后曰向者太子學佛法頓覺開悟今乃使習孔子之教恐壊太子真性后曰我雖居於深宫不明道徳嘗聞自古及今治天下者須用孔子之道捨此他求即為異端佛法雖好乃餘事耳不可以治天下安可使太子不讀書帝師赧服而退端本堂皇太子方在端本堂讀書近侍之嘗以飛放從者輙臂鷹至廊廡間喧呼馳逐以惑亂之將勾引出游為樂太子授業畢徐令左右戒之曰此讀書之所先生長者在前汝輩安敢䙝狎如此急引去毋召責也衆皆驚懼而退右二事乃貢尚書師泰授經宣文閣下日所目見者至正丙申間避地雲間每談朝廷典故因及此徵聘中書左丞魏國文正公魯齋許先生衡中統元年應召赴都日道謁文靖公靜修劉先生因謂曰公一聘而起毋乃太速乎荅曰不如此則道不行至元二十年徵劉先生至以為贊善大夫未幾辭去又召為集賢學士復以疾辭或問之乃曰不如此則道不尊治天下匠中書令耶律文正王楚材字晉卿在金為燕京行省員外郎國亡歸于我朝從太祖征伐諸國夏人巴勒津者以治弓見知於上詫王曰本朝尚武而明公欲以文進不已左乎王曰且治弓尚須弓匠豈治天下不用治天下匠耶上聞之喜自是用王益密以官為氏中書平章政事廉希憲字善甫封恒陽王諡文正本輝和爾氏王之父布魯堪為回鶻王歸朝官至順徳諸路宣慰使封魏國公諡孝懿拜廉訪使之命時適王生顧曰是兒必大吾門吾聞古者以官受氏天將以廉氏吾宗乎吾其從之舉族承命受孔子戒世祖一日命廉文正王受戒於國師王對曰臣已受孔子戒上曰汝孔子亦有戒耶對曰為臣當忠為子當孝孔門之戒如是而已上喜不食死謝君直先生枋得號疊山信州弋陽人宋景定甲子江東漕闈校文發䇿問權姦誤國趙氏必亡忤賈似道貶興國軍三年遇赦得還天兵南下郡城潰棄家入閩至元二十三年御史程文海承㫖留夢炎等交薦累召不赴二十六年春正月福建行省參知政事魏天祐復被詔㫖集守令戍將迫蹙上道臨行以詩别常所往來者曰雪中松柏愈青青扶植綱常在此行天下豈無龔勝潔人間不獨伯夷清義髙便覺生堪捨禮重方知死甚輕南八男兒終不屈皇天上帝眼分明夏四月至京師不食死年六十有四秋八月子定之奉柩歸葬門人誄而題之曰文節先生謝公墓嗟乎伯夷叔齊在周雖為頑民而在商則為義士孰謂數千載後有商義士之風者復見先生焉染髭中書丞相史忠武王天澤髭髯已白一朝忽盡黑世皇見之驚問曰史巴圖汝之髯何乃更黑邪對曰臣用藥染之故也上曰染之欲何如曰臣覽鏡見髭髯白竊傷年且暮盡忠於陛下之日短矣因染之使𤣥而報效之心不異疇昔耳上大喜人皆以王捷於奏對推此一事則餘可知矣漢人賜名巴圖者惟王與太師張獻武王𢎞範及真定新軍張萬户興祖耳殺虎張真定新軍張萬戸興祖中山無極人至元十九年丞相楚國文定公阿爾哈雅以中書右丞南取漢郢公實從有功授前職平生射虎數十一日遇虎一發而踣語人曰吾聞生虎之髭剔齒疾可已風因拔之虎怒爪鞾裂賴其氣息垂盡不能傷足由是人目之曰殺虎張後賜名巴圖爾訛作㧞突又訛抜都都與突字雖異而聲相近蓋譯語無正音故也御史舉薦姚文公先生燧為中臺監察御史時忽御史大夫謂曰我天子以汝賢故擢居耳目之官今且歲餘至如興利除害之事未嘗有片言及之但惟以薦舉為務何邪先生荅曰某所薦者百有餘人皆經世之才其在中外並能上禆聖治則某之報効亦勤矣又何待屑屑於興利除害然後為監察御史之職任乎大夫曰真宰相器也歎賞久之切諫太宗素嗜酒晩年尤甚日與大臣酣飲耶律文正王數言之不聽一日持酒槽之金口以進曰此乃鐵耳為酒所蝕尚致如此况人之五臟有不損耶上說賜以金帛仍勑左右日惟進酒三鍾而止夫以王之切諫不已而上終納之可謂君明臣良者矣丁祭内翰王文康公鶚字百一開州東明人國初自保定應聘北行時故人馬雲漢以宣聖畫像為贈既達北庭值秋丁公奏行釋奠禮世祖說即命舉其事公為祝文行三獻禮禮畢進胙於上上既飲福熟其胙命左右均霑所賜自是春秋二仲歲以為常蓋上之所以尊師重道者實公有以啓之也髙學士國朝儒者自戊戌選試後所在不務存恤往往混為編氓至於奉一札十行之書崇學校奬秀藝正户籍免徭役皆翰林學士髙公智耀奏陳之力也公河西人今學校中往往有祠之者大黄愈疾丙戌冬十一月耶律文正王從太祖下靈武諸將爭掠子女玉帛王獨取書籍數部大黄兩駝而已既而軍中病疫惟得大黄可愈所活幾萬人吁廉而不貪此固清慎者能之若其先見之明則有非人之所可及者置臺憲御史臺至元五年置秩從二品二十一年陞正二品大徳十一年陞從一品臺有大夫一人後增一人中丞二人後又增二人隨復故侍御史二人治書侍御史二人殿中侍御史二人治朝著之事典事二人掌幙府文書之事後改為都事三人後又以都事之長蒙古若色目一人為經歴檢法二人後廢管勾三人其一人兼照磨監察御史十二人後增至十六人皆漢人又增蒙古色目人如漢人之數今三十二人至元十四年既取宋置南行臺二十七年専蒞江南之地號江南諸道行御史臺秩如内臺而監察御史今二十四人西行臺初由雲南廉訪司陞行臺大徳元年移治陜西號陜西諸道行御史臺蒞陜西甘肅四川雲南之地延祐間暫廢隨復其官秩如南臺而監察御史今二十人各道提刑按察司至元六年置正三品有使副使僉事察判經歴知事二十八年改肅政廉訪司使副使僉事各二人大司農奏罷各道勸農司以農事歸憲司增僉事二人經歴知事照磨各一人今天下凡二十二道始建臺時大夫則塔齊爾也内御史署衘内監察御史署銜無御史臺三字以為天子耳目之官非御史大夫以下所可制也行臺則不然令史國朝凡省臺院吏曰掾史獨江南行臺作令史者蓋縁至元十四年初立行臺日御史大夫授三品秩故也後雖陞一品而樂因循者不為申明改正西臺立視南臺已陞品秩則曰掾史焉臺字三臺凡公文所書臺字並從士從口不敢作其字頭若然則偽文也按許氏說文臺從至從之從髙省則土乃之之正書耳當從土從口為是詔西番累朝皇帝於踐祚之始必布告天下使咸知之惟詔西番者以粉書詔文於青繒而繡以白絨網以真珠至御寳處則用珊瑚遣使齎至彼國張於帝師所居處五刑國初立法以來有笞杖徒流死之制凡七下至五十七下用笞六十七下至一百七十用杖徒之法徒一年杖六十七一年半杖七十七二年杖八十七二年半杖九十七三年杖一百七此麗徒者杖數也鹽徒既決而又鐐之使居役也數用七者建元以前皆用成數今匿稅者笞五十犯私鹽茶者杖七十私宰馬牛者杖一百舊法猶有存者大徳中刑部尚書王約數上言國朝用刑寛恕笞杖十減其三故笞一十減為七今之杖一百者宜止九十七不當反加十也議者憚於變更其事遂寢流則南之遷者之北北之遷者之南死則有斬有凌遲而無絞錢幣世皇嘗以錢幣問太保劉文貞公秉忠公曰錢用於陽楮用於隂華夏陽明之區沙漠幽隂之域今陛下龍興朔漠君臨中夏宜用楮幣俾子孫世守之若用錢四海且將不靖遂絶不用錢迨武宗頗用之不久輙罷此雖術數䜟緯之學然驗之於今果如所言巴爾斯河南江北行中書省參知政事姚忠肅公天福字君祥平陽人至元十一年拜監察御史彈擊權臣無所顧畏世祖賜名巴爾斯國言虎也後條奏宰相阿哈瑪特罪二十有四召廷辯公枚數之彼輙引服數至於三氣沮色喪上曰此三者罪巳不在宥因目公曰巴爾斯臣下有違太祖之制干朕之紀者汝抨擊毋𨼆廷臣皆震悚時方倚相理財姑釋不問衆人莫不為公危之公之太夫人有賢識朂之曰為國者忘其家汝第盡力効忠果不測吾追踪陵母死日猶生年也公泣謝白其長曰萬一得譴乞不以老母連坐語聞上歎曰是母子有古義烈勅侍臣符寳郎董文忠宣付史館書之善諫至元二十四年僧格之為尚書丞相也專權擅政虐燄薰天賄賂公行畧無畏避中書平章武寧正獻王徹爾時為利用監獨奮然數其姦贓於上前上怒以為醜詆大臣命左右批其頰王辨不為止且曰臣思之熟矣國家置臣子猶人家畜犬譬有賊至而犬吠主人初不見賊乃箠犬犬遂不吠豈良犬哉上悟收僧格籍其家明日王拜御史中丞余按北史宋游道𫝊畢義雲奏劾游道楊遵彦曰譬之畜狗本取其吠今以數吠殺之恐將來無復吠犬詔除名則王之以犬自况為有所本矣使交趾翰林學士元文敏公明善字復初清河人參議中書日會朝廷遣蒙古大臣一員使交趾公副之將還國之偽主賚以金蒙古受之公固辭偽主曰彼使臣已受矣公獨何為公曰彼所以受者安小國之心我所以不受者全大國之體偽主歎服刻名印今蒙古色目人之為官者多不能執筆花押例以象牙或木刻而印之宰輔及近侍官至一品者得㫖則用玉圖書押字非特賜不敢用按周廣順二年平章李榖以病臂辭位詔令刻名印用據此則押字用印之始也國璽文宗開奎章閣作二璽一曰天厯之寳一曰奎章閣寳命臣虞集文今上作二小璽一曰明仁殿寳一曰洪禧命臣楊瑀文洪禧璞純白而龜紐墨色宣文閣天厯初建奎章閣於西宫興聖殿之西廊為屋三間髙明敞爽南間以藏物中間諸官入直所北間南嚮設御座左右列珍玩命群玉内司掌之閣官署銜初名奎章閣階正三品隷東宫屬官後文宗復位乃陞為奎章閣學士院階正二品置大學士五員並知經筵事侍書學士二員承制學士二員供奉學士二員並兼經筵官幕職置參書二員典籖二員並兼經筵㕘贊官照磨一員内掾四名内二名兼檢討宣使四名知印二名譯史二名典書四名屬官則有羣玉内司階正三品置監羣玉内司一員司尉一員亞尉二員僉司二員典簿一員令史二名典吏二名司鑰二名司膳四名給使八名専掌祕玩古物藝文監階正三品置太監兼檢校書籍事二員少監同檢校書籍事二員監丞㕘檢校書籍事二員或有兼經筵官者典簿一員照磨一員令史四名典吏二名専掌書籍鑒書博士司階正五品置博士兼經筵參贊官二員書吏一名専一鑒辨書畫授經郎階正七品置授經郎兼經筵譯文官二員専一訓教集賽官大臣子孫藝林庫皆從六品置提典一員大使一員副使一員司吏二名庫子一名専一收貯書籍廣成局階從七品置大使一員副使一員直長二員司吏二名専一印行祖宗聖訓及國制等書特恩剙製象齒小牌五十上書奎章閣三字一面字一面蒙古字與輝和爾字分散各官懸佩出入宫門無禁學士院凡與諸司往復惟劄送參書㕔行移而已命侍讀學士虞集撰記御書刻石閣中今上皇帝改奎章曰宣文其記曰大統既正海内定一乃稽古右文崇徳樂道以天厯二年三月作奎章之閣備燕閒之居將以淵潛遐思緝熙典學乃置學士員俾頌乎祖宗之成訓毋忘乎創業之艱難而守成之不易也又俾陳夫内聖外王之道興亡得失之故而以自儆焉其為閣也因便殿之西廡釋髙明而有容不加飾乎采斵不重勞於土木不過啓乎牖以順清燠樹􅍥閣以棲圖書而已至於器玩之陳非古制作中法度者不得在列其為處也跬步戸庭之間而清嚴邃密非有朝會祠享時巡之事幾無一日而不御於斯於是宰輔有所奏請宥密有所圖維爭臣有所繩糾侍從有所獻替以次入對從容密勿蓋終日焉而聲色狗馬不軌不物者無因而至前矣自古聖明睿知善於怡心養神培本浚源泛應萬變而不窮者未有易乎此者也蓋聞天有恒運日月之行不息矣地有恒勢水土之載不匱矣人君有恒居則天地民物有所係屬而不易矣居是閣也靜焉而天為一動焉而天弗違庶乎有道之福以保我子孫􅀺民於無窮哉至順辛未孟春二日記占驗傅初菴先生立以占筮起東南時杭州初内附世皇以故都之地生聚浩繁貲力殷盛得無有再興者命占其將來如何卦既成對曰其地六七十年後會見城市生荆棘不如今多也今杭連厄於火自至正壬辰以來又數燬於兵昔時歌舞之地悉為草莽之墟軍旅填門畜豕載道乃知立之占亦神矣立乃番昜祝卜泌甥泌精皇極數權臣擅政中書右丞相巴延所署官銜計二百四十六字曰元徳上輔廣忠宣義正節振武佐運功臣太師開府儀同三司秦王達爾罕中書右丞相上柱國録軍國重事監修國史兼徽政院侍正昭功萬戸府都總使虎符威武阿克蘓衞親軍都指揮使司達嚕噶齊忠翊侍衞親軍都指揮使奎章閣大學士領學士院知經筵事太史院宣政院事葉赫千戸哈必齊千戸達嚕噶齊宣忠烏魯斯扈衞親軍都指揮使司達嚕噶齊提調回回漢人司天監群牧監廣惠司内史府左都威衞使司事欽察親軍都指揮使司事宫相都總管府領太禧宗禋院兼都典制神御殿事中政院事宣鎮侍衞親軍都指揮使司達嚕噶齊提調宗人蒙古侍衞親軍都指揮使司事提調哈喇齊額布根徹爾領隆祥使司事當其擅政之日前後左右無非隂邪小輩惟恐獻諂進佞之不至孰能告以忠君愛民之事有一王爵者譯奏云色辰二字人皆可以為名自世祖皇帝廟號之後遂不敢用今太師巴延功髙徳重可以色辰名字與之時御史大夫特穆爾布哈亦其心腹每隂嗾省臣奏允其請文定王實喇巴爾時為學士從容言於上曰萬一曲從所請關係非輕遂命學士歐陽𤣥監丞掲徯斯會議以元徳上輔四字代之加於功臣之上又典瑞院都事某建言凡省官提調軍馬者必佩虎符今太師巴延難與他人同宜錫龍鳳牌以寵異之制可遂製龍鳳牌一面其三珠各函徑寸真珠一枚而飾以紅埓阿勒寳石牌身脫鈒元徳上輔功臣號字仍用白玉嵌造牌成計直數萬錠既被貶黜毁其牌就以珠寳給還物主蓋督勒有司和買元價尚未酬也又京畿都運尼雅斯拉上言太師巴延功􅈴蓋世所授宣命難與百官一體合用泥金書詞以尊榮之省臺院官議不可行宛轉禀白止金書上天眷命皇帝聖㫖八字餘仍墨筆云懐孟蛙大徳間仁宗在潛邸日奉達爾結太后駐輦輝黙圖苦群鼃亂喧終夕無寐翼旦太后命近侍傳㫖諭之曰吾母子方憒憒鼃忍惱人耶自後其毋再鳴故至今此地雖有鼃而不作聲後仁宗入京誅安西王阿南達等迎武宗即位時大徳十一年也越四年而仁宗繼登大寳則知元后者天命攸歸豈行在之所雖未踐祚而山川鬼神以隂來相之不然則蟲魚微物耳又能聽令者乎但迄今不鳴尤可異矣賊臣攝祭至治癸亥十月六日甲子先一夕因晉邸入繼大統告祭太廟之頃隂風北來殿上燈燭皆滅良久方息蓋攝祭官特克實額森特穆爾齊勤特穆爾等皆弑君之元惡也時全思誠以國子生充齋郎目擊之此無他必祖宗威靈在上不使姦臣賊子得以有事於太廟而明示嚴譴之耳彼徒罪無所逃至於身誅族赤而後已吁可畏哉叛黨告遷地至元二十四年宗王納延叛後伏誅徙其餘黨於慶元之定海縣延祐間伊納托克托公來為浙相其黨屢以水土不便為訴乞遷善地公曰汝輩自尋一箇不死人的田地當為汝遷之衆遂不敢再言土人作掾至元間伯勒齊爾布哈公為江浙丞相議以本省所轄土人不得為掾史時左丞法珠公謂曰若然則中書掾當用外國人為之矣相有赧色議遂不行蕭先生蕭貞敏公􅆽字維斗京兆人蚤歲吏於府一日呈牘尹前尹偶墜筆目公拾之公陽為不解而止白所議公事如此者三公曰某所言者王事也拾筆責在皁𨽻非吏所任尹怒公即辭退𨼆居十五年惟以讀書為志從公游者屨交戸外平章咸寧王額森聞其賢薦之於世祖徵不至授陜西儒學提舉繼而成宗武宗仁宗累徵授國子司業集賢直學士未赴改集賢侍講又以太子右諭徳徵始至京師授集賢學士國子祭酒尋復得告還山年七十七以夀終諡貞敏端厚文貞王額琳特穆爾嘗言婁師徳唾面自乾以為美事我思之雖狗亦不可惡他且如有一狗自卧於地無故以足蹴之或擲以物狗固不便咬人亦吠數聲而去却有甚好聽處㢧字㢧即卷字真誥中謂一卷為一㢧或以為弔字及篇字者皆非輟耕録卷二欽定四庫全書輟耕録卷三元陶宗儀撰正統辨至正二年壬午春三月十有四日上御咸寧殿中書右丞相托克托等奏命史臣纂修宋遼金三史制曰可越二年甲申春三月進遼史本紀三十卷志三十一卷表八卷列𫝊四十六卷冬十一月進金史本紀一十九卷志三十九卷表四卷列𫝊七十三卷又明年乙酉冬十一月進宋史本紀四十七卷志一百六十二卷表三十二卷列𫝊世家二百五十五卷初會稽楊維楨嘗進正統辨可謂一洗天下紛紜之論公萬世而為心者也惜三史已成其言終不見用後之秉史筆而續通鑑綱目者必以是為本矣維楨字廉夫號鐵崖人咸稱之曰鐵史先生泰定丁卯李黼榜相甲及第以文章名當世表曰至正三年五月日伏覩皇帝詔㫖起大梁張京兆杜本等爵某官職専修宋遼金三史越明年史有成書而正統未有所歸臣維楨謹撰三史正統辨凡二千六百餘言謹表以上者右伏以一代離合之殊固繫乎天數盛衰之變萬年正閏之統實出於人心是非之公蓋統正而例可興猶綱舉而目可備前代異史今日兼修是非之論既明正閏之統可定奈三史雖云有作而一統猶未有歸恭惟世祖皇帝以湯武而立國皇帝陛下以堯舜而為君建極建中致中和而育物惟精惟一大一統以書元嘗怪遼金史之未成必列趙宋編而全備芸臺大啓草澤髙升宜開三百載之編年以垂千萬代之大典豈料諸儒之謙筆徒為三國之志書春秋之首例未聞綱目之大節不舉臣維楨素讀春秋之王正月公羊謂大一統之書再觀綱目之紹春秋文公有在正統之說故以始皇二十六年而繼周統髙祖成功五年而接秦亡晉始於平吳而不始於泰和唐始於滅盜而不始於武徳稽之于古證之于今况當世祖命巴延平江南之時式應宋祖命曹彬下江南之歲親𫝊詔㫖有過唐不及漢之言確定統宗有繼宋不繼遼之禪故臣維楨敢痛排浮議力建公言挈大宋之編年包遼金之紀載置之上所用成一代可鑒之書傳之將來永示萬世不刋之典冒干天聽深懼氷兢下情無任瞻天望闕激切屏營之至辨曰正統之說何自而起乎起於夏后𫝊國湯武革世皆出於天命人心之公也統出於天命人心之公則三代而下厯數之相仍者可以妄歸於人乎故正統之義立於聖人之經以扶萬世之綱常聖人之經春秋是也春秋萬代之史宗也首書王正於魯史之元年者大一統也五伯之權非不強於王也而春秋必黜之不使奸此統也吳楚之號非不竊於王也而春秋必外之不使僭此統也然則統之所在不得以割據之地強梁之力僭偽之名而論之也尚矣先正論統於漢之後者不以劉蜀之祚促與其地之偏而奪其統之正者春秋之義也彼志三國降昭烈以儕吳魏使漢嗣之正下與漢賊並稱此春秋之罪人矣復有作元經自謂法春秋者而又帝北魏黜江左其失與志三國者等耳以致尊昭烈續江左兩魏之名不正而言不順者大正於宋朱氏之綱目焉或問朱氏述綱目主意曰在正統故綱目之挈統者在蜀晉而抑統者則秦昭襄唐武氏也至不得巳以始皇之廿六年而始繼周漢始於髙帝之五年而不始於降秦晉始于平吳而不始於泰和唐始於羣盜既夷之後而不始於降武徳之元又所以法春秋之大一統也然則今日之修宋遼金三史者宜莫嚴於正統與大一統之辨矣自我世祖皇帝立國史院嘗命承㫖百一王公修遼金二史矣宋亡又命詞臣通修三史矣延祐天厯之間屢勤詔㫖而三史卒無成書者豈不以二史正統之議未決乎夫其議未決者又豈不以宋渡于南之後拘於遼金之抗於北乎吾嘗究契丹之有國矣自呼紐氏之部落始廣其初枯骨化形戴豬服豕荒唐怪誕中國之人所不道也八部之雄至於按巴堅披其黨而自尊迨耶律光而其埶浸盛契丹之號立於梁貞明之初大遼之號復改於漢天福之日自按巴堅訖於天祚凡七主歴二百一十有五年夫遼固唐之邊夷也乘唐之衰草竊而起石晉氏通之且割幽燕以與之遂得窺釁中夏而石晉氏不得不亡矣而議者以遼乘晉統吾不知其何統也再考金之有國矣始於完顔氏實又臣屬於契丹者也至阿固達苟逃性命於道宗之世遂敢萌人臣之將而簒有其國僭稱國號於宋重和之元相傳九主凡歴一百一十有七年而議者又以金之平遼尅宋帝有中原而謂接遼宋之統吾又不知其何統也議者又謂完顔氏世為君長保其肅慎至太祖時南北為敵國素非君臣遼祖神冊之際宋祖未生遼祖比宋前興五十餘年而宋嘗遣使卑辭以告和結為兄弟晩年且遼為翁而宋為孫矣此又其說之曲而陋也漢之匈奴唐之突厥不皆興於漢唐之前乎而漢唐又與之通和矣吳魏之於蜀也亦一時角立而不相統攝者也而秉史筆者必以匈奴突厥為紀𫝊而以漢唐為正統必以吳魏為分繫而以蜀漢為正統何也天理人心之公閱萬世而不可泯者也議者之論五代又以朱梁氏為簒逆不當合為五代史其說似矣吾又不知朱晃之簒克用氏父子以為仇矣契丹氏背唐兄弟之約而稱臣於梁非逆黨乎春秋誅逆重誅其黨契丹氏之誅為何如哉且石敬瑭事唐不受其命而簒唐謂之承晉可乎縱承晉也謂之統可乎又謂東漢四主逺兼郭周宋至興國四年始受其降遂以周為閏以宋統不為受周禪之正也吁茍以五代之統論之則南唐李昪嘗立大唐宗廟而自稱為憲宗五代之孫矣宋於開寳八年滅南唐則宋統繼唐不優於繼周繼漢乎但五代皆閏也吾無取其統吁天之厯數自有歸代之正閏不可紊千載厯數之統不必以承先朝續亡主為正則宋興不必以膺周之禪接漢接唐之閏為統也宋不必膺周接漢接唐以為統則遂謂歐陽子不定五代為南史為宋膺周禪之張本者皆非矣當唐明宗之祝天也自以夷虜不任社稷生靈之主願天早生聖人以主生靈自是天人交感而宋祖生矣天厭禍亂之極使之君主中國非欺孤弱寡之所致也朱氏綱目於五代之年皆細注於歲之下其餘意固有待於宋矣有待於宋則直以宋接唐統之正矣而又何計其受周禪與否乎中遭陽九之阨而天猶不泯其社稷𤓰瓞之系在江之南子孫享國又凡百五十有五年金泰和之議以靖康為游魂餘魄比之昭烈在蜀則泰和之議固知宋有遺統在江之左矣而金欲承其絶為得統可乎好黨君子遂斥紹興為偽宋吁吾不忍道矣張邦昌迎康邸之書曰由康邸之舊藩嗣宋朝之大統漢家之戹十世而光武中興獻公之子九人而重耳尚在兹惟天意夫豈人謀是書也邦昌肯以靖康之後為游魂餘魄而代有其國乎邦昌不得革宋則金不得以承宋是則後宋之與前宋即東漢前漢之比耳又非劉蜀牛晉族屬疎逺馬牛疑迷者之可以同日語也論正閏者猶以正統在蜀正朔相仍在江東矧嗣祚親切比諸光武重耳者乎而又可以偽斥之乎此宜不得以南渡為南史也明矣再考宋祖生於丁亥而建國於庚申我太祖之降年與建國之年亦同宋以甲戌渡江而平江南於乙亥丙子之年而我王師渡江平江南之年亦同是天數之有符者不偶然天意之有屬者不茍然矣故我世祖平宋之時有過唐不及漢宋統當絶我統當續之喻是世祖以厯數之正統歸之於宋而以今日接宋統之正者自屬也當時一二大臣又有奏言曰其國可滅其史不可滅也是又以編年之統在宋矣論而至此則中華之統正而大者不在遼金而在於天付生靈之主也昭昭矣然則論我元之大一統者當在平宋而不在平遼與金之日又可推矣夫何今之君子昧於春秋大一統之旨而急於我元開國之年遂欲接遼以為統至於咈天數之符悖世祖君臣之喻逆萬世是非之公論而不恤也吁不以天數之正華統之大屬之我元承乎有宋如宋之承唐唐之承隋承晉承漢也而妄分閏代之承欲以荒夷非統之統屬之我元吾又不知今之君子待今日為何時待今聖人為何君也哉於乎春秋大統之義吾已悉之請復以成周之大統明之於今日也文王在諸侯凡五十年至三分天下有其二遂誕膺天命以撫方夏然猶九年而大統未集必至武王十有三年代商有天下商命始革而大統始集焉蓋革命之事間不容髪一日之命未絶則一日之統未集當日之命絶則當日之統集也宋命一日而未革則我元之大統亦一日而未集也成周不急文王五十年武王十三年而集天下之大統則我元又豈急於太祖開國五十年及世祖十有七年而集天下之大統哉抑又論之道統者治統之所在也堯以是𫝊之舜舜以是𫝊之禹湯文武周公孔子孔子沒幾不得其𫝊百有餘年而孟子𫝊焉孟子沒又幾不得其𫝊千有餘年而濂洛周程諸子𫝊焉及乎中立楊氏而吾道南矣既而宋亦南渡矣楊氏之𫝊為豫章羅氏延平李氏及於新安朱子朱子沒而其𫝊及於我朝許文正公此歴代道統之源委也然則道統不在遼金而在宋在宋而後及於我朝君子可以觀治統之所在矣於乎世隔而後其議公事久而後其論定故前代之史必修於異代之君子以其議公而論定也晉史修於唐唐史修於宋則宋史之修宜在今日而無讓矣而今日之君子又不以議公論定者自任而又諉曰付公論於後之儒者吾又不知後之儒者又何儒也此則予為今日君子之痛惜也今日堂堂大國林林鉅儒議事為律吐辭為經而正統大筆不自竪立又闕之以遺將來不以貽千載綱目君子之笑為厚恥吾又不知負儒名於我元者何施眉目以誦孔子之遺經乎洪惟我聖天子當朝廷清明四方無虞之日與賢宰臣親覽經史有志於聖人春秋之經制故斷然定修三史以繼祖宗未遂之意甚盛典也知其事大任重以在館之諸賢為未足而又遣使草野以聘天下之良史才負其任以往者有其人矣而問之以春秋之大法綱目之主意則槩乎其無以為言也於乎司馬遷易編年為紀傳破春秋之大法唐儒蕭茂挺能議之孰謂林林鉅儒之中而無一蕭茂挺其人乎此草野有識之士之所甚惜而不能倡其言於上也故私著其說為宋遼金正統辨以伺千載綱目之君子云若其推子午卯酉及五運之王以分正閏之說者此日家小技之論君子不取也吾無以為論貞烈至元十三年丙子春正月十八日淮安王巴延以中書右相統兵入杭宋謝全兩后以下皆赴北有王昭儀者題滿江紅詞於驛云太液芙蓉渾不似舊時顔色曾記得春風雨露玉樓金闕名播蘭簪妃后裏暈潮蓮臉君王側忽一朝鼙鼓揭天來緐華歇龍虎散風雲滅千古恨慿誰説對山河百二淚霑襟血驛館夜驚塵土夢宫車曉碾關山月願嫦娥相顧肯從容隨圓缺昭儀名清蕙字冲華後為女道士五月二日抵上都朝見世皇十二日夜故宋宫人安定夫人陳氏安康夫人朱氏與二小姬沐浴整衣焚香自縊死朱夫人遺四言一篇於衣中云既不辱國幸免辱身世食宋禄羞為北臣妾輩之死守於一貞忠臣孝子期以自新丙子五月吉日泣血書明日奏聞上命斷其首縣全后寓所夫此四人之貞烈視前日之託𨼆憂於辭章者相去蓋萬萬矣是年丞相偏師徇台之臨海民婦王氏者美姿容被掠至師中千夫長殺其舅姑與夫而欲私之婦誓死不可自念且被汚因陽曰能俾我為舅姑與夫服朞月乃可事主君千夫見其不難於死從所請仍使俘婦雜守之師還挈行至嵊過上清風嶺婦仰天竊歎曰吾知所以死矣即囓拇指出血冩口占詩於崖石上曰君王無道妾當災棄女抛男逐馬來夫面不知何日見此身料得幾時回兩行清淚偷頻滴一片愁眉鎖未開迴首故山看漸逺存亡兩字實哀哉冩畢即投崖下以死死之日距今且將八九十年石上血僨起如始冩時不為風雨所剥蝕予昔過其下尚能讀所冩詩嵊丞徐君端樹石祠刻碑於死所浙東元帥白野台哈布哈公字兼善狀元及第守越日為立廟像鄉之人私表曰貞婦著作李五峯先生孝光為記郡上其事於朝請封如民所表先是岳州破時韓氏為游卒所掠以獻諸主將韓知必不免乘間赴水死越三日有得其屍於練裙中題五言長句曰宋未有天下堅正臣禮秉開國百戰功每陣惟雄整及侍周幼主臣心常烱烱帝曰卿北伐山戎今有警死狗莫擊尾此行當繫頸即日辭陛下盡敵心欲逞陳橋忽兵變不得守箕潁禪讓法堯舜民物普安靜有國三百年仁義道馳騁未改祖宗法天胡肆大𤯝細思天地理中有幸不幸天果喪中原大似裂冠衽君誠不獨活臣實無魏丙失人焉得人垂戒嘗耿耿江南無謝安塞北有王猛所以戎馬來飛渡以陵境大江限南北今此一舴艋本期固封疆誰謂如畫餅烈火燎昆岡不辨金玉礦妾本良家子性僻守孤梗嫁與尚書兒銜署紫蘭省直以才徳合不棄宿瘤癭初結合歡帶誓比日月昞鴛鴦㑹雙飛比目願長並豈期金石堅化作桑榆景旄頭埶正然􅃖尤氣先屏不意風馬牛復及此燕郢一方遭刼虜六族死俄頃退鷁落迅風孤鸞弔空影簪堅折白玉瓶沉斷青綆一死空冥府憂心長炳炳意堅志不移改邑不改井我本瑚璉器安肯作溺皿志節匪轉石氣噎如吞鯁不作爝火燃願為死灰冷貪生念麴蛾乞憐羞虎穽借此清江水葬我全首領皇天如有知定作血面請願魂化精衞填海使成嶺此詩士大夫多稱道之韓名希孟年十有八魏公五世孫襄陽賈尚書之子瓊之婦死且三十年而其英爽不昧復能託夢趙魏公為書其詩則節婦之名因公之翰墨而愈不朽矣又岳州徐君寳妻某氏亦同時被虜來杭居韓蘄王府自岳至杭相從數千里其主者數欲犯之而終以巧計脫蓋某氏有令姿主者弗忍殺之也一日主者怒甚將欲強焉因告曰俟妾祭謝先夫然後乃為君婦不遲也君奚用怒哉主者喜諾即嚴籹焚香再拜黙祝南向飲泣題滿庭芳詞一闋於壁上已投大池中以死詞曰漢上繁華江南人物尚遺宣政風流緑牕朱戸十里爛銀鈎一旦刀兵齊舉旌旗擁百萬􅆛貅長驅入歌樓舞榭風捲落花愁清平三百載典章文物掃地俱休幸此身未北猶客南州破鑑徐郎何在空惆悵相見無由從今後斷魂千里夜夜岳陽樓杭徐子祥與韓府居相隣嘗聞長老嗟悼之及見所書詞故能言其詳某氏余偶忘其姓噫使宋之公卿將相貞守一節若此數婦者則豈有賣降覆國之禍哉宜乎秦賈之徒為萬世之罪人也岳鄂王岳武穆王飛墓在杭棲霞嶺下王之子雲祔焉自國初以來墳漸傾圮江州岳氏諱士迪者於王為六世孫與宜興州岳氏通譜合力以起廢廟與寺復完美久之王之諸孫有為僧者居墳之西為其廢壊廟與寺靡有孑遺天台僧可觀以訴於官時何君頤貞為湖州推官柯君敬仲九思以書白其事田之沒於人者復歸然廟與寺無寸椽片瓦會李君全初為杭總管府經歴慨然以興廢為己任而鄭君明徳元祐為作疏語曰西湖北山褒忠演福禪寺竊見故宋贈太師武穆岳鄂王忠孝絶人功名蓋世方畧如霍驃姚不逢漢武徒結志於忘家意氣如祖豫州乃遇晉元空誓言於擊楫賜墓田棲霞嶺下建祀祠秋水觀西落日鼓鐘長為聲寃於草木空山香火猶將薦爽於淵泉豈期破蕩子孫盡壊久長規制典祊田隳佛宇春秋無所烝嘗塞墓道毁神棲風雨遂頽廟貌休留夜啼拱木躑躅春開斷垣淚落路人事關世教蓋忠臣烈士每詔條有致祭之文豈狂子野僧攙國典出募縁之疏望明有司告之臺省冀聖天子錫之圭璋褒忠義在天之靈激生死為臣之勸周武封比干墓事著遺經唐宗建白起祠恩覃異代疏成郡人王華父一力興建於是寺與廟又復完美且杭州申明浙省轉咨中書以求褒贈適趙公子期在禮部倡議奏聞降命勅封並如宋止加保義二字自我元統一函夏以來名人佳士多有詩弔之不下數十百篇其最膾炙人口者如葉靖逸先生紹翁云萬古知心只老天英雄堪恨亦堪憐如公少緩須㬰死彼國安能八十年漠漠凝塵空偃月堂堂遺像在凌烟早知埋骨西湖路悔不鴟夷理釣船趙魏公孟頫云岳王墳上草離離秋日荒涼石獸危南渡君臣輕社稷中原父老望旌旗英雄已死嗟何及天下中分遂不支莫向西湖歌此曲水光山色不勝悲髙則誠先生明云莫向中州歎黍離英雄生死係安危内廷不下班師詔絶漠全收大將旗父子一門甘伏節山河萬里竟分支孤臣尚有埋身地二帝游魂更可悲潘子素先生純云海門寒日澹無輝偃月堂深晝漏遲萬竈􅆛貅江上老兩宫環珮夢中歸内園羯鼓催花發小殿珠簾看雪飛不道帳前胡旋舞有人行酒著青衣林清源先生泉生云誰收將骨葬西湖已卜他年必沼吳孤冢有人來下馬六陵無樹可棲烏廟堂短計慚􅊔婦宇宙惟公是丈夫往事重觀如敗局一龕燈火屬浮屠讀此數詩而不墮淚者幾希然賊檜欺君賣國雖擢髪不足以數其罪翻四海之波不足以湔其惡而武穆之精忠藹然與天地相終始死猶生也彼思陵者信任姦邪竟無父兄之念亦獨何心哉故余亦有詩云精忠祠宇西湖上再拜荒墳感昔遊斷碣草深蒙奰􅂒空山日落呌鈎輈天移宋祚難恢復帝幸燕雲困楚囚逆檜隂圖傾大業思陵無意問神州偷安甫遂邦家志飲痛甘忘父母讐信使北和憐屈膝策文南駐忍含羞兩宫五國瞻征幟丹詔班師下節樓萬里長城真自壊中興武績遂云休烏乎竟死姦邪手顛沛誰為社稷憂黯黯寃魂遊狴犴紛紛雨淚灑􅆛貅唯餘滿地萇𢎞血不見中流祖逖舟氛􅟓已塵金匼匝冕旒終換鐵兠鍪姓名竹帛書千載父子英雄土一邱老樹尚知朝禹穴遺􅀺總解說王猷復田起廢憐僧寺移檄褒嘉賴省侯聖世即今崇祀典佇看寵渥到松楸精忠宋所賜廟額此詩在未曾加封前作故云時至正己丑也木乃伊回回田地有年七十八歲老人自願捨身濟衆者絶不飲食惟澡身啖蜜經月便溺皆蜜既死國人礆以石棺仍滿用蜜浸鐫志歲月於棺蓋瘞之俟百年後啓封則蜜劑也凡人損折肢體食少許立愈雖彼中亦不多得俗曰蜜人畨言木乃伊輟耕録卷三欽定四庫全書輟耕録卷四元陶宗儀撰發宋陵寢吳興王筠菴先生國器示余所藏唐義士𫝊讀之不覺令人泣下謹録之𫝊曰辛亥秋友人端容倪君過余溪上示游杭雜藁中有識唐玉潛事一篇余讀大驚頓足起立曰異哉今世乃有此人有此事願詳告我容乃言曰唐君名珏字玉潛會稽山隂人家貧聚徒授經營滫􅔱以養其母歲戊寅有總江南浮屠者楊璉真珈怙恩横肆埶燄爍人窮驕極淫不可具狀十二月十有二日帥徒役頓蕭山發趙氏諸陵寢至斷殘支體攫珠襦玉柙焚其胔棄骨草莽間唐時年三十二歲聞之痛憤亟貨家具得白金百星許執券行貸得白金又百星許乃具酒醪市羊豕邀里中少年若干輩狎坐轟飲酒且酣少年起請曰君儒者若是將何為焉唐慘然具以告願收遺骸共瘞之衆謝曰諾中一少年曰發丘中郎將耽耽餓虎事露奈何唐曰余固籌矣今四郊多暴骨取竄以易誰復知之乃斵文木為匱複黄絹為囊各署其表曰某陵某陵分委而散遣之蕝地以藏為文而告詰旦事訖來集出白金羡餘酬戒勿泄越七日總浮屠下令裒陵骨雜置牛馬枯骼中築一塔壓之名曰鎮南杭民悲戚不忍仰視了不知陵骨之猶存也禍淫不爽流𫝊京師上達四聰天怒赫赫飛風雷號令捽首禍者北焉山隂人始有藉藉𫝊唐氏者由是唐之義風震動吳越聲生埶長若胥江掀八月之濤名雖髙困固自若明年己卯後上元兩日唐出觀燈歸忽坐􅯠息奄奄若將絶者良久始蘇曰吾見黄衣吏持文書來告曰王召君導我往觀闕巍峩宫宇靚麗殆非人間有一冕旒坐殿上數黄衣貴人逡巡降揖曰藉君掩骸其有以報唐乃陞謁造王前王謂曰汝受命窶且貧兼無妻若子今忠義動天帝命錫汝伉儷子三人田三頃拜謝降出遂覺罔不知其何也踰時越有治中𡊮俊齋至始下車為子求師有以唐薦者一見置賔館一日問曰吾渡江聞有唐氏瘞宋諸陵骨子豈其宗耶左右指君曰此是已𡊮大駭拱手曰君此舉豫讓不能抗也曳之坐北面而納拜焉禮敬特加情欵益篤叩知家徒四壁惻然嗟矜語左右曰唐先生家甚寒吾當料理使有妻有田以給左右逢迎爰諏爰度不數月二事俱愜聘婦偶故國之公女負郭食故國之公田所費一一自𡊮出人固奇唐之節而又竒唐之遇兩高之曰二公真義士義士爾後獲三丈夫子鼎立頎頎凡夢中神所許稽其數無一不合咄咄怪事乃如此唐葬骨後又於宋常朝殿掘冬青樹植於所函土堆上作冬青行二首曰馬箠問髐形南面欲起語野麕尚屯束何物敢盜取餘花拾飄蕩白日哀后土六合忽怪事蛻龍掛茅宇老天鑒區區千載䕶風雨又曰冬青花不可折南風吹涼積香雪遥遥翠蓋萬年枝上有鳳巢下龍穴君不見犬之年羊之月劈歴一聲天地裂復有夢中詩四首曰珠亡忽震蛟龍睡軒弊寧忘犬馬情親拾寒瓊出幽草四山風雨鬼神驚一坏自築珠邱土雙匝親𫝊竺國經只有春風知此意年年杜宇哭冬青昭陵玉匣走天涯金粟堆寒起莫鴉水到蘭亭轉嗚咽不知真帖落誰家珠鳬玉鴈又成埃斑竹臨江首重回猶憶年時寒食節天家一騎奉香來余客錢唐久熟悉其事唐至今無恙靈卿既具聞始末謂端曰江左運窮天水源涸宋之亡非有商辛流毒為白旄黄鉞之招也直以千載河清六合埶一大火運移海濱道盡卧榻側難容他人鼾睡耳聖朝量包覆燾恩完獝狨喣育亡國遺嗣坦無驚猜何物異端無忌憚敢爾至今言之可為痛哭已抑吾不能無慨異時會稽近畿世家林邱雖蓬萊清淺陵岸變遷豈無一二慷慨僅存者卓哉斯舉乃出閭里一寒士何歟豈所養非所用而民彞物則獨具於埶卑位下者之資禀與余又怪世之言命者窮通禍福罔不在厥初生一成而不可變今忠義所感定命靡常六極轉移易若反掌乃知元命自作多福自求樞機由人雖天有所不能制聖言豈欺我哉一分行通神明捷於影響况力又有大者其積彌厚其澤當彌長又可以槩量乎哉吾謂趙氏昔者家已破程嬰公孫杵臼強有其真孤今者國已亡唐君玉潛匱藏其真骨兩雄力當無能優劣以其繫人倫關世教有足多尚援筆以紀待編野史者采焉此雲溪羅先生有開所撰也先生徳興人董石林吉翁題其後曰釋燄熏天墨毒殘骨不啻鞭屍刖骸之慘埶張威懾孰攫其鋒儒流唐進士念世籍陽和生育雨露涵濡之恩忠憤激發毁室捐貲仗義集儔潛遺骼於暴露之後拔游魂於獸髑之中身首免異處支體脫烈炎視漆身隕鉞者盡在下風精誠動天奇節震世錫佳麗偶送麒麟兒陽施隂報捷若影響善者勸矣詹厚齋載道復題曰嘗疑武王伐商劒鉞斬擊事竊意王者之師未必爾也紂死矣既擊之又斷其首注太白不已甚乎當時舉天下無非之者而西山餓夫獨非之昌􅀺頌之曰若伯夷者特立獨行窮天地亘萬古而不顧者也會稽諸陵非有商辛之虐不幸而遭樊崇當時曾無一人動孟陽之哀者嗚呼痛哉唐生一寒士耳其埶位非如孤竹君之子徒以故國遺􅀺不忍視其上之人之禍之慘憤激於中毁家取義為人所不敢為於不可為之時深謀祕計全而歸之智名勇功足以驚世絶俗視伯夷固未易同日語而一念之烈行之而不顧豈非韓子所謂千百年乃一人者與余讀羅君所為𫝊為之掩卷泣下嗚呼尚忍言哉天地惟一感應之理有感必應其得報固其理耳不然天者有時而難必神者有時而難明善者怠矣厥後越有新治中來聞其事異其人下車首物色得之亟拜亟為禮羅而致之館下又從而振徳之唐固義士治中亦偉人皆出秉􅂜好徳之真微唐君不能成治中之義微治中不能著唐君之忠是大有功於人倫世教者也此𫝊之所以不可不作也皇慶二年夏五月題及見遂昌鄭明徳先生元祐所書林義士事蹟云宋太學生林徳陽字景曦號霽山當楊總統發掘諸陵寢時林故為杭丐者背竹籮手持竹夾遇物即以夾投籮中林鑄銀作兩許小牌百十繫腰間取賄西畨僧曰餘不敢望收其骨得髙家孝家斯足矣番僧左右之果得髙孝兩朝骨為兩函貯之歸𦵏於東嘉其詩有夢中作一十首其一絶曰一坏未築珠宫土雙匣親𫝊竺國經只有東風知此意年年杜宇哭冬青又曰空山急雨洗岩花金粟堆寒起莫鴉水到蘭亭更嗚哽不知真帖落誰家又曰喬山弓劎未成灰玉匣珠襦一夜開猶記去年寒食日天家一騎捧香來餘七首猶悽怨則忘之葬後林於宋常朝殿掘冬青一株置於所函土堆上又有冬青花一首曰冬青花冬青花花時一日腸九折隔江風雨清影空五月深山落微雪石根雲氣龍所藏尋常螻螘不敢穴移來此種非人間曾識萬年觴底月蜀魂飛繞百鳥臣夜半一聲山竹裂又一首有曰君不記羊之年馬之月劈歴一聲山石裂聞其事甚異不欲書若林霽山者其亦可謂義士也已此五詩與前所録語句微不同詩中有雙匣字則是收兩陵骨之意得非林義士詩羅雲溪以𫝊者之誤而寫入傳中者乎但曰移宋常朝殿冬青植所函土上而作冬青詩吾意會稽去杭止隔一水或者可以致之若夫東嘉相望千餘里豈能容易持去縱持去又豈能不枯瘁作如此想則又疑是唐義士詩且𦵏骨一事豈唐方起謀時林已先得髙孝兩陵骨邪抑得唐所易之骨邪蓋各行其所志不相知會理固有之載考之齊人周草牕先生密癸辛雜識所記云至元二十二年乙酉八月楊髠發陵之事起於天長寺福僧聞號西山者成於演福寺剡僧澤號雲夢者初天長乃魏憲靖王墳寺聞欲媚楊髠遂獻其寺旋又發魏王冢多得金玉以此起發陵之想澤一力贊成之俾泰寧寺僧宗愷宗允等詐稱楊侍郎汪安撫侵占寺地為名告詞出給文書將帶河西僧及凶黨如沈照磨之徒部令人夫發掘時有中官陵使羅銑者守陵不去與之極力爭執為澤痛箠脇之以刃令人逐去大哭而出遂先啓寧宗理宗度宗楊后四陵劫取寳玉極多惟理宗之陵所藏尤多啓棺之初有白氣亘天蓋寳氣也理宗之屍如生其下皆藉以錦錦之下承以竹絲細簟一小厮攫取擲地有聲乃金絲所成或對云含珠有夜明者乃倒懸其屍樹間瀝取水銀如此三日竟失其首或謂西番僧回回其俗以得帝王髑髏可以厭勝致富故盜去耳事竟羅陵使買棺製衣收歛大慟垂絶隣里為之感泣是夕聞西山皆有哭聲凡晝夜不絶至十一月復發徽欽髙孝光五帝陵孟韋吳謝四后陵初欽徽葬五國城數遣使祈請於金人欲歸梓宫凡六七年而後許以梓宫還行在髙宗親至臨平奉迎易緦服寓于龍徳别宫一時朝野以為大事諸公論功受賞費於官帑者不貲先是選人楊偉貽書執政乞奏聞命大臣取神櫬之最下者斵而視之既而禮官請用安陵故事梓宫入境即承之以槨仍納衮冕翬衣於槨中不改斂從之至此被發掘欽徽二陵皆空無一物徽陵有朽木一段欽陵有木燈檠一枚而已蓋當時已料其真偽不可知不欲逆詐亦以慰一時之人心耳而二帝遺骸浮沉沙漠初未嘗還也髙宗陵骨髪盡化畧無寸餘止錫器數件端硯一隻硯為澤所得孝陵亦蛻化無餘止頂骨小片内有玉罏瓶一副古銅鬲一隻亦為澤所得昔聞有道之士能蛻骨而仙未聞并骨蛻者真天人也若光寧與諸后儼然如生羅陵使亦如前棺歛後悉從火化可謂忠且義矣當與張承業同𫝊陵中金錢以萬計皆為屍氣所蝕如銅鐵狀以故諸兇棄而不收往往為村民所得聞有得猫晴異寳者一村翁於孟后陵得一髻其髻長六尺餘其色紺碧髻根有短金釵遂取以歸以其帝后遺物􅍥置佛堂中奉事之自此家道寖豐凡得金錢之家非病即死翁恐甚亟送龍洞中而此翁今成富家矣方移理宗屍時澤在傍以足蹴其首以示無懼隨覺奇痛一㸃起於足心自此苦足疾數年以致潰爛雙股墮落十指而亡聞既得志且富不義之財復倚楊髠埶豪奪鄉人産業後為鄉夫二十人伺道間屠而臠之罪不加衆各不過受杖而已其愷與楊髠分􅂍不平已受杖死尚有允在據此說則雲溪所傳歲月絶不同蓋嘗論之至元丙子天兵下江南至乙酉將十載版圖必已定法制必已明安得有此事然戊寅距丙子不三年竊恐此時庶事草創而妖髠得以肆其惡與妖髠就戮羣兇接踵隕於非命天之所以禍淫者亦嚴矣但云髙宗陵骨髪盡化孝宗陵頂骨小片不知唐義士所易者何骨也林義士所收者又何骨也惜余生晩不及識宋季以來老儒先生以就正其是非姑以待熟兩朝典故之人問焉相術國初有李國用者自北來杭能望氣占休咎能相人其人崖岸倨傲而時貴咸敬之謝后諸孫字退樂者設早饌延致至即據中位省幕官皆坐下坐不得其一言以及禍福時趙文敏公謂之七司户與謝婣戚屈來同飯文敏公風瘡滿面李遥見即起迎謂坐客曰我過江僅見此人耳瘡愈即面君公輩記取異日官至一品名聞四海方襄陽未破時世皇命其即軍中望氣行踰三兩舍遄還奏曰臣見卒伍中往往有台輔器襄陽不破江南不平置此人於何地噫李之術亦神矣國用登州人嘗為卒遇神仙教以觀日之法能洞見肺腑世稱神相前輩謙讓延祐間興聖宫成中官李丞相邦寧𫝊奉太后懿㫖命趙集賢孟頫書額對曰凡禁扁皆李雪菴所書公宜奏聞既而命李趙偕至雪菴處雪菴曰子昂何不書而以屬吾邪李因具言之雪菴遂不固辭前輩推讓之風豈後人所可企哉不茍取胡汲仲先生長儒號石塘特立獨行剛介有守趙松雪嘗為羅司徒奉鈔百錠為先生潤筆請作乃父墓銘先生怒曰我豈為宦官作墓銘邪是日先生正絶糧其子以情白坐上諸客咸勸受之先生卻愈堅觀此則一毫不茍取於人從可知矣故雖凍餒有所不顧也先生送蔡如愚歸東陽詩有云薄糜不繼襖不煖謳吟猶是鍾球鳴語之曰此余祕密藏中休糧方也論詩虞伯生先生集楊仲𢎞先生載同在京日楊先生每言伯生不能作詩虞先生載酒請問作詩之法楊先生酒既酣盡為傾倒虞先生遂超悟其理繼有詩送𡊮伯長先生桷扈駕上都以所作詩介他人質諸楊先生先生曰此詩非虞伯生不能也或曰先生嘗謂伯生不能作詩何以有此曰伯生學問髙余曾授以作詩法餘莫能及又以詣趙魏公孟頫詩中有山連閣道晨留輦野散周廬夜屬櫜之句公曰美則美矣若改山為天野為星則尤美虞先生深服之故國朝之詩稱虞趙楊范揭焉范即徳機先生椁揭即曼碩先生傒斯也嘗有問於虞先生曰仲𢎞詩如何先生曰仲𢎞詩如百戰健兒徳機詩如何曰徳機詩如唐臨晉帖曼碩詩如何曰曼碩詩如美女簪花先生詩如何笑曰虞集乃漢廷老吏蓋先生未免自負公論以為然賢妻致貴程公鵬舉在宋季被虜於興元版橋張萬戸家為奴張以虜到宦家女某氏妻之既婚之三日即竊謂其夫曰觀君之才貌非久在人後者何不為去計而甘心於此乎夫疑其試已也訴於張張命箠之越三日復告曰君若去必可成大器否則終為人奴耳夫愈疑之又訴於張張命出之遂粥于市人家妻臨行以所穿繡鞵一易程一履泣而曰期執此相見矣程感悟奔歸宋時年十七八以䕃補入官迨國朝統一海宇程為陜西行省參知政事自與妻别已三十餘年義其為人未嘗再娶至是遣人擕向之鞵履往興元訪求之市家云此婦到吾家執作甚勤遇夜未嘗解衣以寢每紡績達旦毅然莫可犯吾妻異之視如己女將半載以所成布匹償元粥鏹物乞身為尼吾妻施貲以成其志見居城南某菴中所遣人即往尋見以曝衣為由故遺鞵履在地尼見之詢其所從來曰吾主翁程參政使尋其偶耳尼出鞵履示之合亟拜曰主母也尼曰鞵履復全吾之願畢矣歸見程相公與夫人為道致意竟不再出告以參政未嘗娶終不出旋報程移文本省遣使檄興元路路官為具禮委幙屬李克復防護其車輿至陜西重為夫婦焉奇遇揭曼碩先生未達時多游湖湘間一日泊舟江涘夜二鼓攬衣露坐仰視明月如晝忽中流一櫂漸近舟側中有素妝女子歛袵而起容儀甚清雅先生問曰汝何人荅曰妾商婦也良人久不歸聞君逺來故相迎耳因與談論皆世外恍惚事且云妾與君有夙縁非同人間之淫奔者幸勿見卻先生深異之迨曉戀戀不忍去臨别謂先生曰君大富貴人也亦宜自重因留詩曰盤塘江上是奴家郎若閒時來喫茶黄土築牆茅蓋屋庭前一樹紫荆花明日舟阻風上岸沽酒問其地即盤塘鎮行數步見一水仙祠墻垣皆黄土中庭紫荆芬然及登殿所設像與夜中女子無異余往聞先生之姪孫立禮說及此亦一奇事也今先生官至翰林侍講學士可知神女之言不誣矣賢烈戴石屏先生復古未遇時流寓江右武寧有富家翁愛其才以女妻之居二三年忽欲作歸計妻問其故告以曾娶妻白之父父怒妻宛曲解釋盡以奩具贈夫仍餞以詞云惜多才憐薄命無計可留汝揉碎花牋忍寫斷腸句道傍楊柳依依千絲萬縷抵不住一分愁緒捉月盟言不是夢中語後回君若重來不相忘處把杯酒澆奴墳土夫既别遂赴水死可謂賢烈也矣挽文丞相詩宋丞相文公天祥其事載在史冊雖使三尺之童亦能言其忠義翰林學士徐威卿先生世隆有詩挽之曰大元不殺文丞相君義臣忠兩得之義似漢王封齒日忠如蜀將斫顔時乾坤日月華夷見嶺海風霜草木知只恐史官編不盡老夫和淚寫新詩可謂善風刺者矣虞伯生先生集亦有詩曰徒把金戈挽落暉南冠無奈北風吹子房本為韓仇出諸葛安知漢祚移雲暗鼎湖龍去逺月明華表鶴歸遲何須更上新亭飲大不如前灑淚時讀此二詩而不泣下者幾希禱雨往往見蒙古人之禱雨者非若方士然至於印令旗劎符圖氣訣之𩔖一無所用惟取淨水一盆浸石子數枚而已其大者若雞卵小者不等然後黙持密呪將石子淘漉玩弄如此良久輙有雨豈其靜定之功已成特假此以愚人耳抑果異物耶石子名曰鮓荅乃走獸腹中所産獨牛馬者最妙恐亦是牛黄狗寳之屬耳廣寒秋虞邵菴先生集在翰苑時宴繖薩爾學士家歌兒郭氏順時秀者唱今樂府其折桂令起句云博山銅細裊香風一句而兩韻名曰短柱極不易作先生愛其新奇席上偶談蜀漢事因命紙筆亦賦一曲曰鸞輿三顧茅廬漢祚難扶日莫桑榆深渡南瀘長驅西蜀力拒東吳美乎周瑜妙術悲夫關羽云殂天數盈虚造物乘除問汝何如早賦歸歟蓋兩字一韻比之一句兩韻者為尤難先生之學問該博雖一時娛戱亦過人逺矣折桂令一名廣寒秋一名天香第一枝一名蟾宫引今中州之韻入聲似平聲又可作去聲所以蜀術等字皆與魚虞相近無恙戰國䇿趙威后問齊使歲無恙耶王亦無恙耶楚辭九辨曰還及君之無恙說苑魏文侯語倉庚曰擊無恙乎又曰子之君無恙乎漢書元帝詔貢禹曰今生有恙何至不已乃上疏乞骸骨聘禮亦曰公問君賔對公再拜鄭注云拜其無恙者顧愷之與殷仲堪牋行人安穏布帆無恙隋日本遣使稱日出處皇帝致書日没處皇帝無恙神異經曰北方大荒中有獸咋人則疾名曰㺊㺊恙也嘗入人室屋黄帝殺之人無憂疾謂之無恙爾雅曰恙憂也應劭風俗通曰上古之時草居露宿恙噬人蟲也善食人心大患苦之凡相問曰無恙恙或以為獸或以為蟲或謂無憂廣干禄書兼取憂及蟲事物紀原兼取憂及獸廣韻㺊字下云㺊獸如獅子食虎豹及人恙字下云憂也病也噬蟲善食人心是㺊恙二義神異經合而一之則誤矣不亂附妾維揚秦君昭妙年游京師其執友鄧載酒祖餞既而舁一殊色小鬟至前令拜秦因指之曰此吾為部主事某人所買妾也幸君便航可以附達秦弗敢諾鄧作色曰縱君自得之亦不過二千五百緡耳何峻辭乃爾秦勉強從命迤􅆔至臨清天漸暄夜多蟲蚋可畏内之帳中同寢直抵都下置舍館主婦處持書往見主事問曰足下與家眷來耶曰無有主事意極不恱隨以小車取歸踰三日謁謝曰足下長者也昨已作答簡附便驛報吾鄧公且使知足下果能不孤公付託之意矣遂相與痛飲盡歡而散夫柳下惠夜宿郭門有女子來同宿恐其凍死坐之於懐至曉不為亂顔叔子獨居夜大雨有女子投之令其執燭至明不二志故千古以為美事今秦之於此女子也相從數千里飲食起居無適而不同又非造次顛沛者之比可謂厚徳君子矣後秦之子孫咸至顯宦輟耕録卷四欽定四庫全書輟耕録卷五元陶宗儀撰角端金華黄先生溍嘗云子將以舉子經學取科第有一賦題曰角端亦曾求其事實否乎余曰未也因記史記司馬相如𫝊獸則麒麟角􅗧之語退而閱之按注郭璞曰角􅗧音端似豬角在鼻上堪作弓又云似麒麟而無角毛詩疏云麟黄色角端有肉張楫云角端似牛角可以為弓以此推之豈亦麟之屬與及考符瑞志名臣事畧癸辛雜識等書乃始得其詳蓋太祖皇帝駐師西印度忽有大獸其髙數十丈一角如犀牛然能作人語云此非帝世界宜速還左右皆震懾獨耶律文正王進曰此名角端乃旄星之精也聖人在位則斯獸奉書而至且能日馳萬八千里靈異如鬼神不可犯也帝即回馭載稽之前志神禹氏治水功成天降飛莬日行三萬里而未嘗善言也又后土趺蹄之獸至善言而未聞其獨角也軒轅獲飛黄而獨角漢武獲獸并角而五蹄又未嘗聞其能言善馳也及聖祖誕膺天命而角端出焉夫一角者所以明海宇之一萬八千里之涉者所以示無逺弗屆也此又天將開天下於大一統之象也至正庚寅江浙鄉試八月二十二日夜二鼓院中彷彿見一物馳過甚疾其狀若猛獸者軍卒從而喧哄因出角端為賦題劈正斧劈正斧以蒼水玉碾造髙二尺有奇廣半之徧地文藻粲然或曰自殷時流𫝊至今者如天子登極正旦天夀節御大明殿會朝時則一人執之立於陛下酒海之前蓋所以正人不正之意興隆笙興隆笙在大明殿下其制植衆管於柔韋以象大匏土鼓二韋橐按其管則簧鳴簨首為二孔雀笙鳴機動則應而舞凡燕會之日此笙一鳴衆樂皆作笙止樂亦止尚食麫磨尚食局進御麥麫其磨在樓上於樓下設機軸以旋之驢畜之蹂踐人役之往來皆不能及且無塵土臭穢所侵乃巧工瞿氏造焉僧有口才大徳間僧丹巴者一時朝貴咸敬之徳夀太子病㿀薨布爾罕皇后遣人問曰我夫婦崇信佛法以師事汝止有一子寧不能延其夀邪荅曰佛法譬猶燈籠風雨至乃可蔽若燭盡則無如之何矣此語即吾儒死生有命之意異端中得此亦可謂有口才者矣鄧中齋鄧光薦先生剡號中齋廬陵人宋亡以義行著其所賦鷓鴣詩曰行不得也哥哥痩妻弱子羸㹀䭾天長地闊多網羅南音漸少北語多肉飛不起可奈何行不得也哥哥其意可見矣又有贊文丞相像曰目煌煌兮疎星曉寒氣英英兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼孰謂斯人不在世間汪水雲汪元量先生大有號水雲天兵平杭日詩曰西塞山邊日落處北關門外雨來天南人墮淚北人笑臣甫低頭拜杜鵑又曰錢塘江上雨初乾風入端門陣陣酸萬馬亂嘶臨警蹕三宫灑淚濕鈴鸞童兒賸遣追徐福癘鬼須當滅賀蘭若說和親能活國嬋娟應是嫁呼韓此語尤悲哽先生詩有水雲集厚徳徐文獻公琰字子方至元間為陜西省郎中有屬路申解到省誤漏聖字案吏指為不敬議欲問罪公改其牘云照得來解内第一行脫去第三字今將元文隨此發下可重别申來時皆稱為厚徳長者毁前朝玉璽後至元間太師巴延出太府監所藏歴代玉璽磨去文改造押字圖書及鷹墜等物以分散其黨與蓋先以奏請故也獨唐武氏一璽玉色瑩白製作如官印璞僅半寸許因不可他用遂付藝文監收之竟獲永存豈武氏之智能料之乎披秉歌訣天子郊祀與祭太廟日百官陪位者皆法服凡披秉須依歌訣次第則免顛倒之失歌曰襪履中單黄帶先裙袍蔽膝綬紳連方心曲領藍腰帶玉珮丁當冠笏全三教富珠哩翀子翬公在翰林時進講罷上問曰三教何者為貴對曰釋如黄金道如白璧儒如五榖上曰若然則儒賤邪對曰黄金白璧無亦何妨五榖于世豈可一日闕哉上大說授時厯法授時厯要法歌曰授時厯法君要知但以九年舊厯推古云但看九年兔望日便是今年正月一月大月小起初一看其初一天地支天不言干者為詩句所拘然舉支以見干也當推九年前厯每月初一是何干支便以此干支依後法數去大月天干五支九且如大月天干五地支九假令初一日甲子甲至戊五數也子至申九數也即以戊申為今月朔小月天四地八耦且如小月天干四地支八假令初一日丙寅丙至已四數也寅至酉八數也即以己酉為今月朔古云前九之年起􅈫法大月五九小四八月大三十日無差如初一日己酉數至次月朔見己卯即月大也月小分明只廿九如月朔數至次月朔止廿九日即月小也節氣只憑九年厯假若造甲午年厯則看丙戌年節氣二十四氣真端的要知今年節氣則看前九年中是何節氣天干三數地支七假如癸亥日癸見乙三數亥見己七數也熟記心中須歴歴定時二十四年取逢時遇八君無慮如逢子時交節氣却用未時亦交也中氣如之若依此法箇中推方省隂陽𤣥奥處閏月本來中氣無古云閏月無中氣何勞物外更他圖世人諳得神仙術不是愚氓是丈夫又歌曰九年二月半便是正月一前九年二月十五日辰即今年正月初一日辰該九十七箇半月二千八百八十日六甲轉四十八周只九年中取大小無差失又歌曰若要求立春相衝對食神假如前九年甲子日立春甲食丙子衝午即今年丙午日立春也二十四氣准此閏月無中氣說與惺惺人又一法云古有數九九之語蓋自至後起數至九九則春已分矣正如至後一百六日為寒食之𩔖豈特此為然凡推算皆有約法推閏歌括云欲知來歲閏先算至之餘更看大小盡決定不差殊謂如來歲合置閏止以今年冬至後餘日為率且如今年十一月二十二日冬至則本月尚餘八日則來年之閏當在八月或小盡則七月若冬至在上旬則以望日為斷十二日足則復起一數焉推節氣歌括云中氣與節氣但有半月隔若要知仔細兩時零五刻謂如正月甲子日子時初初刻立春則數至己卯日寅時正一刻則是雨水節也推立春歌括云今歲先知來歲春但隔五日三時辰謂如今年是甲子日子時立春則明年合是己巳日卯時立春若夫刻數則用前法推之又求節氣歌曰驚蟄五時二刻求清明十時四刻流立夏一日三時六芒種一日九時周小暑二日二時二立秋二日七時四白露三日零六刻寒露三日六時至立冬三日十一二大雪四日四時四小寒四日九時六五日三時交新歲節遇子時加一日此為捷法君須記又一年約法云一周年三百六十五日零三時一月節三十日零五時二刻半月一氣十五日零二時五刻又食神定法云甲食丙乙食丁丙食戊丁食己戊食庚巳食辛庚食壬辛食癸壬食甲癸食乙其捷要但取我生之干陽配陽隂配隂是也又時刻約法歌云二十四氣漸差除循環時刻四同途單逢正四換初一正三依舊復初初又乘除法推算二十四氣時刻云其法不論何歲何月但以日為百數時為十數刻為零數初一至初十於百上下數如過初十於千上下數假如正月十一日亥正一刻立春欲求中氣則先下一千一百數十一日故也再下十二數亥時故也如子一丑二之𩔖復加一千五百二十五數共得一七三三則二十七日寅初二刻雨水也何以知為初二刻蓋零一數初初刻二數初一刻三數初二刻四數初三刻五數正初刻六數正一刻七數正二刻八數正三刻此立成法也今零三數乃是初二刻矣欲求二月節則於前數上加一五二五即前一千五百二十五也此項數節氣中氣皆以之加用為前正月小盡除去二十九日如遇大月除去三十日算中氣則不除大小月剩下一三五八則十三日辰時正三刻驚蟄也餘倣此十二時為一日如遇十三時以上則退十二時為一日八刻為一時如遇九刻以上則退八刻為一時也喪大記云士葬用國車國音船示專反或作團又誤作國二綍無碑比出宫用功布注云比出宫用功布則出宫而止至壙無矣舊圖云功布謂以大功之布長三尺以御柩居前為行者之節度又𨼆義云羽葆功布等其象皆如麾則旌旗無旒者周謂之大麾既夕禮云商祝執功布以御柩執披賈釋云謂以葬時乘人故有柩車前執引者及在柩車傍執披者皆御治之又注云居柩車之前若道有低仰傾􅉛則以布為抑揚左右之節使執引者執披者知之也道有低謂下阪時也道有仰謂上阪時也傾􅃜謂道之兩邊在柩車左右轍有髙下也若道有低則抑下其布使執引者知其下阪也若道有仰則揚舉其布使執引者知其上阪也若柩車左邊右邊或髙下傾􅉛亦左右布使知道有傾􅉛也假令車之東轍下則抑下其布向東使西邊執披者持之若車之西轍下則抑下其布向西使東邊執披者持之所以然者使車不傾􅉛也大夫御柩以茅諸侯以羽葆天子以纛指引前後左右皆如功布之施為也又既夕禮將葬啓肂也商祝免袒執功布入自西階注云功布灰治之布也執之以接神為有所拂㧍賈釋云拂㧍猶言拂拭也故下經云商祝拂㧍用功布是拂拭去塵也此始告神而用功布拂拭謂拂拭去凶邪之炁也出聶崇義三禮圖人中錢唐陳鑑如以寫神見推一時嘗持趙文敏公真像來呈公援筆改其所未然者因謂曰唇之上何以謂之人中若曰人身之中半則當在臍腹間蓋自此而上眼耳鼻皆雙竅自此而下口暨二便皆單竅三畫隂三畫陽成泰卦也發燭杭人削松木為小片其薄如紙鎔硫黄塗木片頂分許名曰發燭又曰焠兒蓋以發火及代燈燭用也史載周建徳六年齊后妃貧者以發燭為業豈即杭人之所製與宋翰林學士陶公榖清異録云夜有急苦於作燈之緩有知者批杉條染硫黄置之待用一與火遇得燄穗然既神之呼引光奴今遂有貨者易名火寸按此則焠寸聲相近字之譌也然引光奴之名為新嫁故人女沈仲說右姑蘇人年四十未有子其妻鄒氏候其他適為置一年少貌美之妾及歸命出拜將以奉枕席仲說詢其鄉貫祖父來歴始不肯言詢之再泣而曰妾范復初女也父喪家貧老母見粥於此仲說惻然淚下因囑妻曰此女父吳中名士乃吾故人豈可以為妾當如己子視之即尋其母使擇壻仲說備奩具嫁之邦人稱之至今不置夫嫁人之女為妾為妓為娼者古有其人矣今則未聞也仲說誠賢矣哉平反中書左丞李忠宣公徳輝字仲實通州潞縣人至元七年庚午公為户部尚書歲旱蝗世祖特命公録山西河東囚行至懐仁民有魏氏發得木偶持告其妻挾左道厭勝謀殺已經數獄服詞皆具自以為不免公燭其誣召鞫魏妾榜掠一加服不移晷蓋妬其女君謂獨陷以是罪可必殺之也即直其妻而杖其夫之溺愛受欺當妾罪死觀者神之或咨賞泣下勘釘姚忠肅公至元二十年癸未為遼東按察使武平縣民劉義訟其嫂與其所私同殺其兄成縣尹丁欽以成屍無傷憂懣不食妻韓問之欽語其故韓曰恐頂􅇟有釘塗其迹耳驗之果然獄定上讞公召欽諦詢之欽因矜其妻之能公曰若妻處子邪曰再醮令有司開其夫棺毒與成𩔖并正其辜欽悸卒時比公為宋包孝肅公拯云碑志書法嘗聞諸翰林大老云古碑刻中單書國號曰漢曰宋者蓋其建國號詔曰漢曰宋也我朝大元二字在詔㫖不可單用又凡書官銜俱當從實如廉訪使總管之𩔖若日監司大守是亂其官制久逺莫可考矣又蓋二字止可施諸壙石若於碑須曰額為是雕刻精絶詹成者宋髙宗朝匠人雕刻精妙無比嘗見所造鳥籠四面花版皆於竹片上刻成宫室人物山水花木禽鳥纎悉俱備其細若縷而且玲瓏活動求之二百餘年無復此一人矣題跋劉須溪先生會孟題蘇李泣别圖云事已矣泣何為蘇武節李陵詩噫馮海粟先生子振題楊妃病齒圖云華清宫一齒痛馬嵬坡一身痛漁陽鼙鼓動地來天下痛陳伯敷先生繹曾題楊妃上馬嬌圖云此索清平調詞赴沉香亭時邪抑聞漁陽鼙鼓聲赴馬嵬坡時邪上馬固相似情狀大不同觀者當審諸余觀三先生之跋語痛快嚴峻抑揚感傷使後世之為人君而荒於色為人臣而失其節者見之寧不知懼乎隆友道張毅父先生千載廬陵人而宋丞相文公友也公貴顯時屢以官辟不就江南既内屬公自廣還過吉州城下先生來見曰今日丞相赴北某當偕行既至燕寓于公囚所側近日以美饌餽凡三載始終如一且潛製一櫝公受刑日即以藏其首復訪求公之室歐陽氏於俘虜中俾出焚其屍先生收拾骸骨襲以重囊與先所函櫝南歸付公家𦵏之後公之子忽夢公怒云繩鋸髪斷明日起視果有繩束髪其英爽尚如此劉須溪紀其事贊於公畫像上曰閒居忽忽萬古咄咄天風慘然如動生髪如何尋約亦念束芻豈其英爽猶累形軀同時之人能不顙泚昔忌其生今妬其死鄧中齋題曰目烱烱兮疎星曉寒氣鬱鬱兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼曾謂斯人不在世間朱張宋季年群亡賴子相聚乘舟鈔掠海上朱清張瑄最為雄長隂部曲曹伍之當時海濵沙民富家以為苦崇明鎮特甚清嘗傭楊氏夜殺楊氏盜妻子貨財去若捕急輙引舟東行三日夜得沙門島又東北過髙句麗水口見文登夷維諸山又北見燕山與碣石往來若風與鬼影迹不可得稍怠則復來亡慮十五六返私念南北海道此固徑且不逢淺角識之杭吳明越揚楚與幽萊解密遼解俱岸大海固舟航可通相𫝊朐山海門水中流積堆於江沙其長無際浮海者以竿料淺深此淺生角故曰料角明不可度越云廷議兵方興請事招懐奏可清瑄即日來以吏部侍郎左遷七資最下一等授之令部其徒屬為防海民義𨽻提刑節制水軍江南既内附二人者從宰相入見授金符千戸時方輓漕東南供京師運河隘淺不容大舟不能百里五十里輙為堰瀦水又絶江淮遡泗水吕梁彭城古稱險處會通河未鑿東阿茌平道中車運三百里轉輸艱而糜費重二人者建言海漕事試之良便至元十九年也上方注意嚮之初年不過百萬石後乃至三百萬石二人者父子致位宰相弟姪甥壻皆大官田園宅館徧天下庫藏倉庾相望巨艘大舶帆交番夷中輿騎塞隘門巷左右僕從皆佩於莵金符為萬户千戸累爵積貲氣意自得二人者既滿盈父子同時夷戮殆盡沒貲産縣官黨與家破禁錮大徳六年冬也見胡石塘先生所撰何長者𫝊交誼陳子方閔仲達同舍生也皆待次杭府史陳月日在前閔以計力反先之陳殊無怒意因赴都以薦舉入仕歴官浙西廉訪司僉事閔方陞書吏聞陳來歎曰復何面目見之遂稱疾不出陳下車即問左右曰閔仲達何在衆以疾對陳曰必為我故非疾也亟造其家閔皇恐出肅陳曰吾與君氣誼契厚君昔先我而食禄者命也使非此吾又能致是耶今幸同一公署惟有以教正之幸甚寧舍我與閔感激從事相好如初假宅以死吾鄉周待制先生仁榮字本心築一室纔落成友人楊公道輿疾至門曰願假君新宅以死先生讓正寢居之妻子咸不然先生弗顧未幾楊死箱財廿八莫有主者楊之弟詣先生求分財先生曰若兄寄死於我意固在是喪事之費自己出終不利其一毫對衆封籍自平陽呼其子來悉付與之清風堂屍迹福州鄭丞相府清風堂石階上有卧屍迹天隂雨時迹尤顯蓋其當宋季以暮年登科未幾拜相至今閭巷表之曰耆徳魁輔之坊鄭顯時侵漁百姓至奪其屋廬以廣居宅有被逼抑者遂自殺於此今所居為官埶豪奪子孫不絶如綫因記宋臨川吳曾能改齋漫録云建炎四年五月楊勍叛卒由建安宼延平道出小常村掠一婦人逼脅欲犯之婦人毅然誓死不受汚遂遇害横屍道傍賊退人為收瘞之而其屍枕籍處痕迹𨼆然不滅每雨則其迹乾晴即濕宛如人影往來者莫不嗟異鄉人或削去之隨即復見覆以他土而其迹愈明今三十年矣與順昌軍員范旺事畧同但范現迹街磚而此現於土上耳范死以忠婦死以節小常村去劎浦縣治二十里以漫録言之則二人之死足以驚動萬世宜其英烈之氣不泯如此若清風堂者不過寃抑之志不得伸以決絶於一時耳亦何為而然哉豈幽憤所積結致是耶此理殆不可曉坐右銘翰林學士盧疎齋先生摰字處道涿郡人坐右銘大書一天字其下細注六字云有記性不急性可謂知畏天者矣掘墳賊杭瑪瑙寺僧温日觀能書所畫蒲萄須梗枝葉皆草書法也性嗜酒然楊總統飲以酒則不一沾唇見輙罵曰掘墳賊掘墳賊云廉介李仲謙思讓滕州鄒縣人前至元間由嘉興路吏貢補浙西按察司書吏廉介有為上侍父母下撫兩弟毎退食自公則閉户讀書稽今考古而教訓之俸薄奉養不給婦躬紡績以益薪水之費仲謙止有一布衫或須浣濯補紉必俟休暇日至是若賔客見訪則俾小子致謝曰家君治衣弗可出雷彦正號苦齋者清正慎許可人也時為使偶戯謂曰外郎穿布衲到敢裹著珍珠仲謙畧不答徐至本案書寫辭退呈狀壓几上而歸使知深悔失言親謁謝過請其出終不允使去他使來復往請始復役後仕至憲官甲午節氣至元三十一年甲午歲節氣正月一日壬子立春二月二日癸未驚蟄三月三日癸丑清明四月四日甲申立夏五月五日甲寅芒種六月六日乙酉小暑七月七日己卯立秋八月八日乙酉白露九月九日丙辰寒露十月十日丙戌立冬十一月十一日丁巳大雪十二月十二日丁亥大寒先輩謙讓武林錢思復先生惟善嘗言年十六七時以詩見息齋李公於州橋寓居既拜公公答拜命坐辭之再公曰仲尼之席童子隅坐因不敢辭徐永之先生為江浙提舉日客往訪之者無間親疏貴賤必送之門外凡客請納步則曰不可婦人送迎不踰閾右二事可見前輩諸老謙恭退抑汲引後進待人接物者如此雙竹杖白廷玉先生珽號湛淵錢唐人家多竹忽一竿上岐為二人皆異之賦雙竹杖詩未幾先生歿先生有二子或以為先兆云輟耕録卷五欽定四庫全書輟耕録卷六元陶宗儀撰蘭亭集刻蘭亭一百一十七刻裝禠作十册乃宋理宗内府所藏每版有内府圖書鈐縫玉池上後歸賈平章至國朝有江南八十餘年之間凡又易數主矣往在錢唐謝氏處見之後陸國瑞携至松江因得再三披閱併録其目真傳世之寳也甲集一十二刻州郡修城本葉仲山䟦定武濶行若合一契行濶定武肥定武瘦定武板刻霍子明䟦定武缸石定武斷石定武古刻兩京斷石永興古懿郡齋宣城乙集一十三刻舊梅花三衢板刻安吉古苔真草臨川麻石臨賀豫章二靜江府復州鼎州後有武陵二字古潭新梅花宣城南陵丙集一十刻蘇州府治福州府治福州棗木道州金陵三米米芾米友仁米尹知永嘉古霅斷石隆州郴州蘭亭重言丁集一十刻紹興府治二紹興倉司紹興府學紹興古刻餘姚縣治曲水詩蘭亭曲水詩前曲水詩後婺州府治禇遂良摹戊集一十刻内府髙宗臨定武米友仁䟦唐貞觀太清開皇祕首内殿内司四京師玉堂已集九刻雜集玉枕花石栁誠懸大字唐人硬黄臨唐人雙鈎晉唐刻孫過庭草京師鵝黄􅀥木黄紙印彭城小字庚集一十一刻故家蔡君謨臨薛紹彭秦少游小字安定家藏辛道宗建康晁謙之紹興湯氏南昌京氏廬陵胡氏蜀劉涇唐摹刻辛集一十四刻吳詵草書吳璜劉無言臨龍潭潘氏方朔習寫周平所藏臨江張氏天台丁氏新安汪氏江西故家廬山甲秀堂九江陶氏循王家藏米芾跋云壬午閏六月九日大江濟川亭􅋈寳晉齋艎對紫金浮玉羣山迎快風消暑重裝番陽洪氏壬集一十四刻金陵畢氏廬山呉氏紹興曾氏紹興石氏二毘陵尤遂初李忠愍所刻新唐李氏江隂邱氏二東陽郭氏昌谷曹氏三癸集一十四刻趙虚齋吕氏家藏建鄴朱氏大梁曾朴陸子與韓松陸載之胡氏將玉林二趙菊坡不題名二錢唐李和禊帖考姜白石先生禊帖偏傍考云永字無畫發筆處㣲折轉和字口下横筆稍出年字懸筆上湊頂在字左反剔嵗字有㸃在山之下戈畫之右事字脚斜拂不挑流字内公字處就回筆不是㸃殊字挑脚帶横是字下疋凡三轉不斷趣字波畧反捲向上欣字欠右一筆作章草發筆之狀不是捺抱字已開口死生亦大矣亦字是四㸃興感感字戈邊是直作一筆不是㸃未嘗不不字下反挑脚處有一闕右法如此甚多畧舉其大概持此法亦可以觀天下之蘭亭矣五字損本者湍流帶右天五字有損也喪師衰絰顧徳玉字潤之槜李人自幼從寧國路儒學教授俞觀光先生學先生無子嘗與人曰吾昔寢疾於杭潤之侍湯藥情至切若父子醫為之感動弗忍受金今我行且老必託之以死既而訪醫吳中病且革趣舟歸潤之進次尹山卒時後至元初元閏十二月戊子也明日乃至槜李潤之奉其屍歛於家衰絰就位邦人士為潤之來弔者潤之拜之越明年𦵏於海鹽近顧氏之先塋嵗時祭享惟謹或曰歛於家禮與曰吾聞師哭諸寢又云生於我乎館死於我乎殯非家歛之則將師尸委諸草莾生服其訓死而委諸草莾有人心者弗為也曰師無服而為衰絰固近於掠美者矣曰疑衰加麻之絰帶禮也故曰二三子絰而出至𦵏除之心喪戚容終三年夫民生於三師居其一於父子也何異今吾則加一等以行之盖出於人心天理之本然若之何其惑也聞者嘆伏先生諱長孺越之新昌人吁聖逺言湮世道不古乆矣朝為師生而莫若途人者比比皆是潤之乃獨能行人之所難行於不可行之時盖絶無而僅有者真仁矣哉天下後世之為人弟子而忘其師聞潤之之言寧不有動於中歟法帖譜系法帖譜系云熙陵以武定四方載櫜弓矢文治之餘留意翰墨乃出御府歴代所藏真蹟命侍書王著摹勒刻板禁中釐為十卷各於卷尾題奉聖㫖模勒入石此歴代法帖之祖評帖劉後村先生云閣帖為祖十㢧綘帖次之二十㢧臨江又次之潭又次之武岡又次之大觀尤妙武岡佳者可亂絳臨江佳者可亂閣潭乃僧希白所模有江左風味希白工於摹字拙於尋行數墨文理錯繆然則雖工其如難讀何其字比之淳化帖為勝東坡推潭帖勝閣帖韓侂胄家開羣玉帖字好薛紹彭亦有家塾帖好淳化祖石刻大梁劉衍卿世昌云大徳己亥婦翁張君錫携余同觀淳化祖石帖卷尾各有題識第一卷邊髙平范仲淹曽觀年月日題第五卷東坡張文潜等題又有姜白石小楷三四十字第六卷洛陽伊川老夫不知為何人又太學博士陳士元云此正祖石又有蘇舜欽題第七卷陳簡齋奉㫖觀於秋香亭下云魏晉法書非人間合有自我太宗皇帝刻石寵錫下方見不滿十數臣與義頓首謹書第八卷蘇頌云此帖世不多見是日賞牡丹得觀於相君西齋張舜民題亦在此卷第十卷太宗書淳化四年六月廿二日賜畢士安賜字上寳後段畢丞相黄字書子孫保享等語百餘字逐卷有髙宗内府印百餘顆後有賈氏長字印又有一小印合縫云是蔡太師印山和尚錦裝禠籖頭題云淳化祖石刻及見吳郡陸友仁又云嘗觀禇伯秀所記江南李後主命徐鉉以所藏古今法帖入石名昇元帖此則在淳化之前當為法帖之祖劉陸之説殊不相合偶讀劉䟦暇日記亦載此事云馬傳慶説此帖本唐保大年摹上石題云保大七年倉曹㕘軍王文炳摹勒校對無差國朝下江南得此石淳化中太宗令將書館所有増作十卷為版本而石本復以火斷缺人家時收得一二卷然閣帖於各卷尾書題云淳化三年壬辰嵗十一月六日奉聖㫖模勒上石此侍書王著筆也而陳簡齋亦云太宗刻石則衍卿所謂祖石刻豈即南唐時帖乎抑太宗増刻者但不知南唐亦作十巻否徐鉉馬傳慶二説又不同今世言淳化閣帖用銀錠􅗚棗木板刻而以澄心堂紙李廷珪墨印者則傳慶板本之説合故趙希鵠洞天清録集亦云用棗木板摹刻故時有銀錠紋用李廷珪墨打手揩之不汚手余嘗見閣本數十止三本真者其紙墨法度種種逈别妙在心悟固難以言語形容然又傳仁宗嘗詔僧希白刻石於秘閣前有目録卷尾無書題字所謂祖石刻者豈即此與家翁世言家之尊者曰家主翁亦曰家公唐代宗謂郭子儀曰鄙諺有云不癡不聾不作家翁奴材世之鄙人之不肖者為奴材郭子儀曰子儀諸子皆奴材也沙魘湖南益陽州夜中同寢之人無故忽自相打每每有之名曰沙魘土人熟此不以為異惟取冷水噴噀候稍息飲之湯徐就醒然猶二三日如醉餘不知者殊用驚駭孝行延祐乙夘冬平江常熟之支塘里民朱良吉者母錢氏年六十餘病將死良吉沐浴禱天以刀剖胷割取心肉一臠煑粥以飲母母食粥而病愈良吉心痛就榻不可起隣里憐其且欲絶乃裒財命頥貞觀道士馬碧潭者醮告神明祈隂祐之是日邑人俞浩齋聞而過其家觀良吉胷間瘡裂幾五寸氣騰出痛莫能言俞為納其心以桑白皮線縫合未及期月已無恙矣予因述其事以為勸郡宋翠巖先生有詩紀之其小序曰夫孝為百行宗人以父母遺體而生乳哺鞠育教誨劬勞其恩號罔極然而剖心刲股恐其傷生而或死也父母存而子死故又有禁止之令焉觀今世降俗薄悖逆其父母者視良吉何如哉如良吉者自當旌異為世教勸而有司曾莫能省原其一念之純剖心之際動天地感鬼神固不待賞之於有司而天地神明固已隂録其孝矣太上感應篇所謂若人者人敬之天佑之福禄隨之衆邪逺之神靈衛之今日謝世明日為地下主進補仙階若良吉者有焉故為顯白其孝以為人子之勸省也宗儀之先人有孝感一事人多傳道會稽張君思㢘嘗書於楊鐡崖先生所譔墓銘之後矣今併録於此云元故白雲漫士陶明元氏諱煜弱冠時用道家法事所謂𤣥武神甚謹明元母病心痛痛則拍張跳躅齧牀簀衾褥號呌以紓苦楚嵗瀕死者六七發醫莫能愈明元每搯心嚼舌以代母痛一日危甚計無所出走禱𤣥武前曰刲股割肝非先王禮在法當禁某非不知也今事急矣敢犯死取一臠為湯劑神爾有靈疾庶幾其瘳禱畢即引刀欲下忽有二童自外躍入叱曰毋自損我天醫也明元大駭伏地乞哀童子取案上筆書十數字於几面擲筆二童子咸仆地隨呼家人救之噀以水良乆蘇乃鄰氏兒也叩之無所知焉視其書藥方也隨讀隨𨼆明元私喜曰此必𤣥武神也吾母其瘳矣即如方治之藥甫及口而痛已失終母身不再舉張子曰齊諧志怪聖人不道左氏尚誣君子非之明元之事遂昌鄭元祐狀行㑹稽先生楊維楨誌墓皆不書非逸也畏譏而削之也彼以謂𤣥武神者西北方之氣也莽蒼無知非如俞跗岐扁能切脉察色投湯熨火抉腸剔胃以取人疾在理所不通故不書雖然動天地感鬼神莫大乎孝焉知𠖇𠖇中英魂烈氣不散者或如俞跗岐扁依馮精魄以遂孝子之請也不然何穹然漠然之體而有所謂天醫乎明元子宗儀與余友善其寓殯又在玉笥山下去余居不逺以是得其實尤詳故寧受左氏之譏不敢没明元之孝書曰與其殺不辜寧失不經先王之過盖如此㑹稽張憲譔㢘使長厚徐文獻公為浙西㢘使時治所尚在平江有㫖遷置於杭嵗云莫矣擇日啓行一書吏者掌照刷支郡諸司案牘官吏合受稽違罪責已皆取狀至是引決公謂曰正旦在邇此曹乃職官俸吏禮宜陪位望闕致賀受刑而從事無耻也否則為不敬盍别議之吏以白於幕官因進曰相公長厚之道固如此然將若之何公曰奚難立案候明年分司施行可也庭下歡聲如雷此亦厚風化之一端故記之私第延賔公既遷司至杭一日有本路總管與一萬戸謁公私第公以賔禮延之上坐適書吏從外来見而趍避伺其退入見曰總管萬户皆屬官耳得無禮貎之過與公曰在公府則有尊卑之辨若私宅須明主客之分我輩能㢘介則百司自然知懼何待恃威埶以驕凌之然後為尊嚴乎吏赧甚句曲山房熟水句曲山房熟水法削沉香釘數箇揷入林禽中置缾内沃以沸湯宻封缾口乆之乃飲其妙莫量吾竹房先生吾子行先生衍大末人大父為宋太學諸生因家錢唐先生踈曠故髙不事之節其所厭棄者或請謁從樓上遥謂曰吾出有間矣顧彈琴吹洞簫撫弄如意不輟求室委巷教小學常數十人與客對笑談喧樓上下羣童一是肅安其所著述有尚書要略聽𤣥集造𤣥集九歌譜十二月樂譜辭重正卦氣楚史檮杌晉文春秋兼通聲音律吕之學工書初先生年四十未娶所知宛丘趙君天錫為買酒家孤女為妾年饑女嘗事人後夫知妻在先生所訟之因逮妾父母父母至客先生家又偽楮幣事覺因言舎主人先生固弗知因邏捽辱先生南出數百步録事張君景亮識先生叱邏曰是不知情攝之何為即解縱遣歸先生不勝慚明日持𤣥絛緇笠詣仇山村先生别值晨出因留詩一章詩有西冷橋外斷橋邊之句意將從靈均於斯明日有得遺履於橋上者後衛大𨼆以六壬筮之得亥子丑順流象曰是其骨朽淵泥九十日矣西湖多寳院僧可權從先生學聞先生之死哭甚哀乃𦵏先生遺文於後山與其師骨塔相對曰皆吾師仍乞銘於胡石塘先生庶幾先生有後世名銘曰生弗瀆死弗辱貞哉白余習書極愛先生翰墨得一紙半幅如獲至珍以故於書法頗有助偶與鄭遂昌先生談先生之始末就識之竹房竹素貞白皆先生號也抗䟽諫伐宋何公巨川者京師長春宫道士也㑹世皇將取宋乃上䟽抗言宋未有可伐之罪遂命副國信使翰林學士郝文忠公經使江南殁於真州至正間詔追贈二品官有人作詩悼之云竒才不泄神仙事抗䟽曾干世祖知每恨南邦本無罪比留北使欲何為忠魂乆掩孤城館褒詔新鎸二品碑地上若逢姦似道為言故國􅁰離離髪䐈婦人頭髪有時為膏澤所黏必沐乃解者謂之䐈按攷工記弓人注云䐈亦黏也音職則髪䐈之䐈正當用此字鬼􅂍陜西某縣一老嫗者住村莊間日有道流乞食與之無吝色忽問曰汝家得無為妖異所苦乎嫗曰然曰我為汝除之即命取火焚囊中符頃之聞他所有震霆聲曰妖已誅殛纔遁其一廿年後汝家當有難今以鐡簡授汝至時亟投諸火言訖而去自是乆之嫗之女長而且美一日有曰大王者騎從甚都借宿嫗家遣左右謂曰聞嘗得異人鐡簡可出示否盖嫗平日數為他人借觀因造一偽物而以真者懸腰間不置也遂用偽獻留不還謂曰可呼汝女行酒以疾辭大王怒便欲為姦意嫗竊思道流之説計􅈫嵗數又合乃解所佩鐡簡投酒竈火内既而電掣雷轟煙火滿室須􅁷平息擊死獼猴數十其一最鉅疑即向之逃者所齎隨行器用悉係金銀寳玉赴告有司籍入官庫台哈布哈元師為西臺御史日閱其案朱語曰鬼􅂍云余親聞台公説甚詳且有鈔具案文惜不随即記録今則忘邑里姓名嵗月矣居士今人以居士自號者甚多考之六經中惟禮記玉藻有曰居士錦帶注謂道藝處士也吳曾能改齋漫録云居士之號起於商周之時按韓非子書曰太公封於齊東海上有居士任矞華仕昆弟二人立議曰吾不臣天子不友諸侯耕而食之掘而飲之吾無求於人無上之名無君之禄不仕而事力云然則居士云者處士之𩔖是已官奴今以妓為官奴即官婢也周禮天官酒人奚三百人注今之待史官婢右此石是南唐寳石乆為吾齋研山今被道祖易去中美舊有詩云研山不易見移得小翠峯潤色裛書几𨼆約煙朦朧巉巖自有古獨立髙崧巃安知無雲霞造化與天通立壁照春野當有千丈松﨑嶇浮波瀾偃仰蟠蛟龍蕭蕭生風雨儼若山林中塵夢忽不到觸目萬慮空公家富竒石不許常人同研山出層碧崢嶸實天工淋漓上山泉滴瀝助毫端揮成驚世丈主意皆逢原江南秋色起風逺洞庭寛往往入佳趣揮掃出妙言願公珍此石美與衆物肩何必嵩少𨼆可藏為地仙今每誦此詩必懐此石近余亦有作云研山不復見哦詩徒嘆息唯有玉蟾蜍向余頻淚滴此石一入渠手不得再見每同交友往觀亦不出示紹彭公真忍人也余今筆想成圖彷彿在目從此吾齋氣秀尤不復泯矣崇寜元年八月望米芾書余二十年前嘉興吳仲圭為畫圖錢唐吳孟思書文後携至吳興燬於兵偶因清暇黙懐往事漫記於此衛夫人翰墨志云衛夫人名鑅字茂漪晉汝隂太守李矩妻善鍾法能正書入妙王逸少師之西溪藂語云夫人廷尉展之弟恒之從妹中書郎李充之母親家凡男女締姻者兩家相謂曰親家此二字見唐蕭嵩𫝊今北方以親字為去聲按盧綸作王駙馬花燭詩云人主人臣是親家則是亦有所祖親家又曰親家翁五代史劉昫傳昫與馮道為姻家而同為相道罷李愚代之愚素惡道之為人凡事有稽失者愚必指以誚昫曰此公親家翁所為蘇氏開談録馮道與趙鳳同在中書鳳有女適道中子以飲食不中為道夫人譴罵趙令婢長號知院者来訴凡數百言道都不荅及去但云傳語親家翁今日好雪梵嫂唐鄭熊番禺雜記廣中僧有室家者謂之火宅僧宋陶榖清異録京師大相國寺僧有妻曰梵嫂房老王子年拾遺記石季倫有妾名翔風及色衰退為房老輟耕録卷六欽定四庫全書輟耕録卷七元陶宗儀撰趙魏公書畫魏國趙文敏公孟頫以書法稱雄一世畫入神品其書人但知自魏晉中来晩年則稍入李北海耳嘗見千字文一卷以為唐人字絶無一㸃一畫似公法度閱至後方知為公書公自題云僕廿年来寫千文以百數此卷殆數年前所書當時學禇河南孟法師碑故結字規模八分今日視之不知孰為勝也田君良卿於駱駝橋市中買得此卷持来求䟦為書其後因思自五嵗入小學學書不過如世人漫爾學之耳不意時人持去可以粥錢而吾良卿又捐錢若干緡以購之皆可笑也元貞二年正月十八日子昻題則知公之書所以妙者無帖不習也又嘗見公題所畫馬云吾自幼好畫馬自謂頗盡物之性友人郭祐之嘗贈余詩云世人但解比龍眠那知巳出曹韓上曹韓固是過許使龍眠無恙當與之並驅耳然往往閱公所畫馬及人物山水花竹禽鳥等圖無慮數十百軸又豈止龍眠並驅而已哉又聞公偶得米海岳書壯懐賦一卷中闕數行因取刻本摹榻以補其闕凡易五七紙終不如意乃嘆曰今不逮古多矣遂以刻本完之公之翰墨為國朝第一猶且服善如此近有一等人僅能㸃畫如意便自誇大者於公寧不愧乎金鼇山吾鄉于佩逺先生演題金鼇山詩曰金鼇之山金碧浮重𤣥寳坊居上頭鐘聲夜度海門月樹色逺攬豐山秋龍伯國人真妙手掣此巨靈鎮江口丹丘逸士来跨之石窪為尊江當酒黄鬚天子七寳鞭黄頭漁郎櫂江船百年塵跡果何在芒碭雲去山蒼然歴試諸難固天造中興開國何草草腹心有疾日月昏英雄無聲天地老兩宫不歸汴水流此地空傳帝子遊惜無徤筆驅風雨一洗江山萬古愁此詩至今膾炙人口山枕海屬臨海縣章安鎮初宋髙宗在潜邸日泰州人徐神翁云能知前来事羣閹言於髙宗召至以賔禮接之一日獻詩於帝曰牡蠣灘頭一艇横夕陽西去待潮生與君不負登臨約同上金鼇背上行及兩宫北狩匹馬南渡建炎庚戌正月三日帝航海次章安鎮灘淺閣舟落㠶於鎮之福濟寺前以候潮顧問左右曰此何山曰金鼇山又問此何所曰牡蠣灘因黙思神翁之詩乃屏去警蹕易衣徒步登岸見此詩在寺壁間題墨若新方信其為異人也時住持僧方陞坐道祝聖之詞帝趾忽前聞其稱讃之語甚喜戒左右勿驚怖而諦聽之少焉千乗萬騎畢集始知為六龍臨幸野僧初不閑禮節恐怖失措從行有司教以起居之儀山下曰黄椒村村之婦女聞天子至咸来瞻拜龍顔歡聲如雷曰不圖今日得覩天日帝喜𠡠夫人各自遂便故至今村婦皆曰夫人雖易世其稱謂尚然不改宋史但載御舟幸章安鎮而不見金鼇之詳偶與張善初話鄉中舊事因筆之善初章安人也委羽山吾鄉台之黄巖諸山脉絡相連屬大江越州治北自州出南門陸行四五里許有委羽山特立不倚形如落舞鳳故得名然州人與之朝夕者俱弗自知其為勝山旁廣而中深青樹翠蔓䕃翳蓊鬱幽泉琮琤若鳴珮環於修竹間千變萬態不可狀其畧中藏洞宂仙家所謂空明洞天者是也好道之士嘗持炬入行兩日不可窮聞櫓聲乃出洞之側産方石周正光澤五色錯雜雖加琢磨殆不是過大者三四分小者比米粒而小以斧粉碎之亦無不端方見長老言嘗有素服靚妝飄飄若仙之女者當風清月白時則逍遥乎松杉竹柏之下或時變服叩里人門求水火里人所居去洞所不能百步異其狀宻覘之迤􅆔從洞中去里人以為怪糞其地越數日里人家夜失火埶張甚不可滅室宇一空妻子僅以身免遂流離他處識者以為厭􅁾仙境故致此竒禍自是仙女不復出矣余幼時尚及見里人故址至今有欲得方石者裹糧撮許往洞口撒之隨意拾地上土則有石在土中不爾絶無有也斛銘鎮國上將軍福建宣慰使費榮敏公㮤余内子之曾大父也吳興人今著籍松江之上海器度𢎞厚不以富貴驕人輕財好施勇於為義人皆稱曰費佛子陵陽牟先生瓛所撰墓誌銘載其事甚詳家之量衡無二致刻銘於斛之四面曰出以是入以是子孫永如是推此則真古仁人之用心者矣内子之大父良顯侯拱辰父昭武大將軍雄皆世守其業克不墜先志云孝感越楓橋里人丁氏母雙目失明丁至孝每朝盥漱訖即舐母之目積有年矣俄而母左目明未乆右目復明憲司上其事於朝表其閭曰孝子之門至治年間也因讀江南别録彭李者世為義門陳氏之傭夫喪明已乆有子一人嘗聞陳之子弟言舜為父瞽叟舐目而致明乃歸效之不旬日父目忽然明朗右二事誠孝行所感今段吉父先生母夫人劉雙目乆失明醫弗能愈先生中鄉舉一目忽自見物先生及第一目又如之雖夫人喜溢於中不自知其然而然亦先生學業有成所致與傳曰立身揚名以顯於後世孝之至也其此之謂焉先生諱天佑汴梁蘭陵人仕至江浙儒學提舉和沙拉卜都和沙拉卜都者回回田地所産藥也其形如木鱉子而小可治一百二十種證每證有湯引屈戍今人家窓戸設鉸具或鐡或銅名曰環紐即古金鋪之遺意北方謂之屈戌其稱甚古梁簡文詩織成屏風金屈戍李商𨼆詩鎻香金屈戍李賀詩屈膝銅鋪鎻阿甄屈膝當是屈戌回回石頭回回石頭種𩔖不一其價亦不一大徳間本土商賣紅埒阿勒一塊於官重一兩三錢估直中統鈔一十四萬定用嵌帽頂上自後累朝皇帝相承寳重凡正旦及天夀節大朝賀時則服用之曰埓阿勒方言也今問得其種𩔖之名具記於後紅石頭四種同出一坑俱無白水埒阿勒淡紅色嬌必扎達深紅色石薄方嬌齊拉尼黑紅色古里朗紅帶黒黄不正之色塊雖大石至低者緑石頭三種同出一坑賚雅實勒上等暗深緑色濟拉里克雅實勒中等明緑色阿持雅實勒下等𢃄石淺緑色鴉鶻紅雅古特上有白水宻斯堪尼帶石無光二種同坑青雅古特上等深青色尼勒朗中等淺青色烏帕尼勒朗下等如水樣帶石渾青色黄雅古特白雅古特猫睛猫睛中含活光一縷走水石新坑出者似猫睛而無光甸子尼沙布哩即回回甸子文理細尼爾瑪尼即河西甸子文理麄荆州石即襄陽甸子色變黄巢地藏趙生者宋宗室子也家苦貧居閩之深山業薪以自給一日伐木溪滸忽見一巨蛇章質盡白昻首吐舌若將噬已生棄斧斤奔避得脱妻問故具以言因竊念曰白鼠白蛇豈寳物變幻耶即拉夫同往蛇尚宿留未去見其夫婦来回首遡流而上尾之行數百步則入一巖宂中就啟之得石石隂刻押字與嵗月姓名乃黄巢手瘞治為九宂中宂置金甲餘八宂金銀無􅈫生掊取畸零仍舊掩盖自是家用日饒不復事薪鄰家疑其為盜告其姊之夫嘗為吏者吏詢之嚴不敢𨼆隨餽白金五錠吏貪求無厭訟之官生不獲已主一巨室悉以九宂奉巨室廣行賄賂有司莫能問迨帥府特委福州路一官往㢘之巨室私獻金甲因回申云具問本根所以實不曾掘發寳藏其事遂絶路官得金甲珍襲甚至任滿他適其妻徙置榻下一夕聞繞榻風雨聲頃刻而止頗怪之夫歸共取視鐍鑰如故啓籠乃無有也生無子夫婦終老巨室嗟夫天地間物茍非我有雖得之亦終失也巢之亂唐天下剽掠寳貨歴三四百年至於我朝而為編氓所得氓固得之不能保之而卒歸於富家其路官者得金甲自以為子孫百世計一旦作神物化去是皆可為貪婪妄求者勸鴛衾孟蜀主一錦被其濶猶今之三幅帛而一梭織成被頭作二宂若雲版様盖以叩於項下如盤領狀兩側餘錦則擁覆於肩此之謂鴛衾也楊元誠太史言兒時聞尊人樞宻公云嘗於宋官庫見之奚奴温酒宋季叅政相公鉉翁於杭將求一容貎才藝兼全之妾經旬餘未能惬意忽有以奚奴者至姿色固美問其藝則曰能温酒左右皆失笑公漫爾留試之及執事初甚熱次略寒三次㣲温公方飲既而每日並如初之第三次公喜遂納焉終公之身未嘗有過不及時歸附後公携入京公死囊槖皆為所有因而巨富人稱曰奚娘子者是也吁彼女流賤隸耳一事精至便能動人亦其專心致志而然士君子之學為窮理正心修己治人之道而不能至於當然之極者視彼有間矣掛牌延客江右胡存齋叅政能折節下士賔客至如家焉故南北士大夫有經過其地無不願見者每虞閽人不為通刺茍不出日即於門首掛一牌云胡存齋在家買宅有䜟松江在城金世昌者出繼夏氏嘗買廢宅修葺前㕔梁内有鑿成金世昌三字必昔時客商所記姓名人以為有定數云待士恒陽㢘文正王希憲字善父輝和氏由父孝懿王布瀂凱官㢘訪使氏焉國初拜為平章政事秉政日中書右丞劉武敏公整以初附為都元帥騎從甚都詣門求見王之弟兄凡十人後皆至一品内王弟昭文舘大學士光禄大夫薊國公希貢猶布衣為通報王方讀書畧不荅薊公出整復凂入言之因令徹去坐椅自據中坐令整入整展拜起側立不予之一言整求退謂曰此是我私宅汝欲有所言明日當詣政事堂及出慚赧無人色頃之宋士之在覊旅者寒餓狼狽冠衣􅀈縷袖詩求見王之兄弟皆揶揄之薊公復為入言急令鋪設坐椅且戒内人備酒饌出至大門外肅入對坐出酒饌執禮甚恭且録其居止諸儒但言困苦乞歸王明日遂言於世皇皆遂其請是夜諸兄弟問曰今日劉元帥者主上之所倚任反菲薄之江南窮秀才却以禮遇如此其至我等不能無疑王曰我是國家大臣言動嚬笑繫天下重輕整雖貴賣國叛臣也故折辱之令其知君臣義重若寒士數十皆誦法孔子者也在宋朝不坐燕不與何故而拘執於此况今國家起朔漠斯文不絶如綫我更不尊禮則儒術且將掃地矣王之作興斯文若此是大有功於名教者也雇僕役許魯齋先生在中書日命牙儈雇一僕役特選一能應對閑禮節者進郤之曰特欲老實耳他日領一蓬首垢面愚騃之人来遂用之儈請問其故先生曰諺云馬騎上等馬牛用中等牛人使下等人馬上等能致逺牛中等良善人下等易馴若其聰明過我則我反為所使矣假如司馬温公家一僕三十年止稱君實秀才蘇子瞻學士来謁聞而教之明日改稱大叅相公公驚問以實告公曰好一僕被蘇東坡教壊了這便是樣子志異至正壬辰春自杭州避難居湖州三月廿三日黒氣亘天雷電以雨有物若果核與雨雜下五色間錯光瑩堅固破其實食之似松子仁人皆曰娑婆樹子閏月十二日復雨八月過杭州因知三月十八日亦雨如湖州郡人初不以為異及九月十日紅巾犯省治雨核之地悉被兵火無有處屋宇如故余弗之信九月廿六日湖州䧟儀鳳橋四向焚戮特甚追思雨核時橋四向為最多信前言不誣也後聞池州亦然與杭日同池州之禍尤可慘也按白樂天詩集載月中嘗墜桂子於天竺寺葉石林玉澗雜書亦云仁宗天聖中七月八月兩月之望有桂子從空降如雨其大如豆雜黄白黒三色食之味辛寺僧道式取以種得二十五本二書豈盡妄耶此理殊不可曉但今又為時䜟尤可異也課馬俗呼牝馬為課馬者唐六典凡牝四游五課羊則當年而課之課嵗課駒犢也客作今人之指傭工者曰客作三國時已有此語焦光飢則出為人客作飽食而已鹹杬子今人以米湯和入鹽草灰以團鴨卵謂曰鹹杬子按齊民要術用杬木皮淹漬故名之若作圓字寫則誤矣鷹背狗北方凡皁鵰作巢所在官司必令人窮巢探卵較其多寡如一巢而三卵者置卒守護日覘視之及其成鷇一乃狗耳取以飼飬進之於朝其狀與狗無異但耳尾上多毛羽數根而已田獵之際鵰則戾天狗則走陸所逐同至名曰鷹背狗官制資品奎章政要文宗之御奎章日學士虞集博士柯九思常侍從以討論法書名畫為事時授經郎揭徯斯亦在列比之集九思之承寵眷者則稍䟽因潜著一書曰奎章政要以進二人不知也萬幾之暇每賜披覽及晏朝有畫授經郎獻書圖行於世厥有深意存焉句曲外史張伯雨題詩曰侍書愛題博士畫日日退朝書滿牀奎章閣上觀政要無人知有授經郎盖柯作畫虞必題故云義奴劉信甫揚州人郡富商曹氏奴曹瀕死以孤託之孤漸長孤之叔利孤財妄訴於府曰某家貲産未嘗分析今悉為姪所據郡守劉察其詐直之叔之子以父訟不勝慚且憤毒父死而復訴於府曰弟挾怨殺吾父適達嚕噶齊穆穆呼者受署之初與守不和竟欲置孤法并得以中守引致百餘人皆抑使誣服曰孤俾某等殺叔守受孤賄若干末鞠信甫信甫曰殺人者某也孤實不知守亦無賄既被鍛鍊無完膚終無兩辭初信甫先遣人宻送孤過京師避於一達宦家囑之曰慎毋出至是乃厚以金帛賂達嚕噶齊孤得無預而信甫減死既而叩蹕陳告達嚕噶齊以罪罷去守復官凡獄訟道里費盖鉅萬計孤歸悉􅈫償信甫曰奴之富皆主翁之䕃也今主有難奴救脱之分内事耳寧望求報哉力辭不受忠倡至正壬辰秋邊宼䧟常州守吏望風奔潰徐婦倡者㓂命以佐燕乃憤詈弗從竟刺死之未幾江浙平章定定来尅復儒流吳寅夫趙君謨等以從逆伏誅嘉興張翔南翼作忠徐倡詩以白於世曰西神峩峩睢孽蔓乗兵塗甿膏國武乏興唶爾尸素營賄朋城弗典守妖狐凌彼章逢之徒冠倫魁能蒲伏讋服倒授太阿傔以承天廓不白暑雨氷綱常淪隳綫絶罔憑胡為優徐倡冶容倚市矜鬕妖驅之俾侑樂頩玉肆詈無陵兢噤謳裭舞餘怒鬟植鬅鬙鉛為鋼刃劃膺載營覇灼上升顧守臣鉅儒汗恧銜愧死莫懲二儀磅礴忠義氣猶出下里孰可仍桓桓執夷徒乃反經溝塍爾倡丹𠂻燭日月易粉黛譽聲繩繩汙瀆流回清澂盖吳嘗室其少妹且與生子名教中所不齒者一死固有餘辜趙頗純謹老成乃亦在列可哀也已隨隱漫録載宋端平二年李全據髙郵城叛召官奴毛惜惜佐酒罵曰汝本徤兒官家何負於汝而反吾有死耳不能為反賊行酒全以刃裂口立命臠之罵至死不絶後閫臣以聞特封英烈夫人且賜廟潘紫巖有詩曰淮海艷姬毛惜惜蛾眉有此萬人英恨無匕首學秦女向使裹頭真杲卿玉骨花顔城下土氷魂雪魄史閒名古今無限要金者歌舞筵中過一生噫當是時也姦兇得志埶熖熏天雖厚禄重臣峩冠世儒罔不效力執事戰兢奔走於指揮之下而倡優下賤乃能奮不顧身獨何人與夫徐氏之與英烈夫人同一死耳而無有為之舉申朝廷褒贈封號以為世勸惜哉志怪至正乙未正月廿三日日入時平江在城忽望東南方軍聲且漸近驚走覘視他無所有但見黒雲一簇中彷彿皆𩔖人馬而前後火光若燈燭者莫知其􅈫迤􅆔由西北方而没惟葑門至齊門居民屋脊龍腰悉揭去屋内牀榻屏風俱仆醋坊橋董家雜物鋪失白米十餘石醬一缸不知置之何地此等怪事竟不可曉粥爵至正乙未春中書省臣進奏遣兵部員外郎劉謙来江南募民補路府州司縣官自五品至九品入粟有差非舊例之職專茶鹽務塲者比雖功名逼人無有願之者既而抵松江時知府崔思誠惟知曲承使命不問民間有粟與否也乃拘集屬縣巨室㸃科十二名衆皆號泣告訴曽弗之顧輒施拷掠抑使承伏即填空名告身授之平江路達嚕噶齊卒不避譴斥力爭以為不可竟無一人應募者崔聞之深自悔赧還金絶交曹公克明鑑號以齋宛平人為湖廣行省員外郎日麻陽主簿顧淵白致書問訊且以辰砂一包見寄未及啓封漫爾置箧笥中後有憲官過訪因論製藥為苦無好辰砂公曰我一故人嘗以此為恵當奉送及取視乃有砂金三兩雜其内公驚嘆曰淵白以我為何如人也時淵白已没呼其子歸之其㢘潔如此官至禮部尚書諡文穆畫師王淵字若水錢唐人善山水人物尤長於花竹翎毛幼時獲侍趙魏公故多得公指教所以傅色特妙天歴中畫集慶龍翔寺兩廡壁時都下劉總管者總其事劉命若水於門首壁上作一鬼其壁髙三丈餘難於着筆因取紙連粘粉本以呈劉曰好則好矣其如手足長短何若水不得其理因具酒禮再拜求教於劉劉曰子能不耻下問吾當告焉若先配定尺寸畫為躶體然後加以衣冠則不差矣若水受教而退依法為之果善輟耕録卷七欽定四庫全書輟耕録巻八元陶宗儀撰寫山水訣黄子乆散人公望自號大癡又號一峯本姓陸世居平江之常熟繼永嘉黄氏穎悟明敏博學彊記畫山水宗董巨自成一家可入逸品其所作寫山水訣亦有理致邇来初學小生多效之但未有得其髣髴者正所謂畫虎刻鵠之不成也近代作畫多宗董源李成二家筆法樹石各不相似學者當盡心焉樹要四面俱有榦與枝盖取其圓潤樹要有身分畫家謂之紐子要折搭得中樹身各要有發生樹要偃仰稀宻相間有葉樹枝軟面後皆有仰枝畫石之法先從淡墨起可改可救漸用濃墨者為上石無十步真石看三面用方圓之法湏方多圓少董源坡脚下多有碎石乃畫建康山埶董石謂之麻皮皴坡脚先向筆畫邊皴起然後用淡墨破其深凹處著色不離乎此石著色要重董源小山石謂之礬頭山中有雲氣此皆金陵山景皴法要滲軟下有沙地用淡墨掃屈曲為之再用淡墨破山論三逺從下相連不斷謂之平逺從近隔開相對謂之濶逺從山外逺景謂之髙逺山水中用筆法謂之筋骨相連有筆有墨之分用描處糊突其筆謂之有墨水筆不動描法謂之有筆此畫家𦂳要處山石樹木皆用此大槩樹要填空去聲小樹大樹一偃一仰向背濃淡各不少相犯繁處間踈處須要得中若畫得純熟自然筆法出現畫石之妙用滕黄水浸入墨筆自然潤色不可用多多則要滯筆間用螺青入墨亦妙吳妝容易入眼使墨士氣皮袋中置描筆在内或於好景處見樹有怪異便當模寫記之分外有發生之意登樓望空濶處氣韻看雲采即是山頭景物李成郭熈皆用此法郭熈畫石如雲古人云天開圖畫者是也山水中唯水口最難畫逺水無灣逺人無目水出髙源自上而下切不可斷𣲖要取活流之源山頭要折搭轉換山脉皆順此活法也衆峯如相揖遜萬樹相從如大軍領卒森然有不可犯之色此寫真山之形也山坡中可以置屋舎水中可置小艇從此有生氣山腰用雲氣見得山埶髙不可測畫石之法最要形象不要石有三面或在上在左側皆可為面臨筆之際殆要取用山下有水潭謂之瀬畫此甚有生意四邊用樹簇之畫一窠一石當逸墨撇脱有士人家風纔多便入畫工之流矣或畫山水一幅先立題目然後著筆若無題目便不成畫更要記春夏秋冬景色春則萬物發生夏則樹木繁冗秋則萬象肅殺冬則煙雲黯淡天色糢糊能畫此者為上矣李成畫坡脚須要數層取其濕厚米元章論李光丞有後代兒孫昌盛果出為官者最多畫亦有風水存焉松樹不見根喻君子在野雜樹喻小人崢嶸之意夏山欲雨要帶水筆山上有石小塊堆在上謂之礬頭用水筆暈開加淡螺青又是一般秀潤畫不過意思而已冬景借地為雪要薄粉暈山頭山水之法在乎隨機應變先記皴法不雜布置逺近相映大槩與寫字一般以熟為妙紙上難畫絹上礬了好著筆好用顔色易入眼先命題目此為之上品古人作畫胷次寛濶布景自然合古人意趣畫法盡矣好絹用水噴濕石上槌眼匾然後上幀子礬法春秋膠礬停夏月膠多礬少冬天礬多膠少著色螺青拂石上藤黄入墨畫樹甚色潤好看作畫祇是箇理字最𦂳要吳融詩云良工善得丹青理作畫用墨最難但先用淡墨積至可觀處然後用焦墨濃墨分出畦徑逺近故在生紙上有許多滋潤處李成惜墨如金是也作畫大要去邪甜俗賴四箇字鄧山房平江會道觀主鄧山房道樞綿州人在宋季為道士時齋法已精際遇理度兩朝一日謝后遣巨璫召至内後門泣降徳音且令其責軍令狀使無他泄後謂曰吾昨夜夢見濟王怒甚以為吾且將兵由獨松闗入滅汝社稷矣吾此夢頗可怪汝可就南髙峯頂為謄心章哀告上帝已而黄頭先鋒斬闗而来宋亡後鄧遂築今觀狗站髙麗以北名别十八華言連五城也罪人之流尼嚕罕者必經此其地極寒海亦氷自八月即合至明年四五月方解人行其上如履平地征東行省每嵗委官至尼嚕罕給散囚糧須用站車每車以四狗挽之狗悉諳人性站有狗分例若尅減之必嚙其主者至死乃已五馬入門吾鄉陳剛中先生孚臨海縣人國初時嘗為僧以避世變一日大書所作詩於其父執某之粉墻上云我不學㓂丞相地黄變髪髪如漆又不學張長史醉後揮毫掃狂墨平生紺髪三十丈幾度和雲眠石上不合感時怒衝冠天公罰作圓頂相肺肝本無兒女情亦豈惜此雙髩青只憶山間秋月冷搔首不見髼鬆影父執見之曰此子欲歸俗也呼来館榖之命養髪經半年餘謂曰汝當娶吾將以女事汝先生辭謝再三既而命寓他所遣媒妁行言擇日迎歸父執喜曰五馬入門矣先生雖獲佳偶自妻母以至妻之兄姊弟妹皆不然遂挈家入京館閣諸老交章薦舉入翰林會朝廷遣使交趾授先生禮部郎中副之至交州嘗有詩曰老母越南垂白髪病妻塞北倚黄昏蠻烟瘴雨交州客三處相思一夢魂及抵安南國以文字言語諭之其國遂降將其世子并國相入朝後以功授治中典鄉郡終老焉若父執者可謂識人也已隱逸吾鄉吕徽之先生闕家仙居萬山中博學能詩文問無不知者而安貧樂道常逃其名耕漁以自給一日携楮幣詣富家易榖種值大雪立門下人弗之顧徐至庭前聞東閣中有人分韻作雪詩一人得滕字苦吟弗就先生不覺失笑閣中諸貴㳺子弟輩聞得遣左右詰之先生初不言衆愈疑親自出見先生露頂短褐布襪草屨輒侮之詢其見笑之由先生不得已乃曰我意舉滕王蛺蝶事耳衆始歎伏邀先生入坐先生曰我如此形狀安可厠諸君子問請之益堅遂入閣衆以藤滕二字請先生足之即援筆書曰天上九龍施法水人間二鼠嚙枯藤鶩鵝聲亂功收蔡蝴蜨飛來妙過滕復請和曇字韻詩又隨筆寫云萬里闗河凍欲含渾如天地尚函三橋邊驢子詩何惡帳底羔兒酒正酣竹委長身寒郭索松埋短髪老瞿曇不如乗此擒元濟一洗江南草木慚寫訖便出門留之不可得問其姓字亦不荅皆驚訝曰嘗聞吕處士名欲一見而不能先生豈其人邪曰我農家安知吕處士為何如人恵之榖怒曰我豈取不義之財必易之刺船而去遣人遥尾其後路甚僻逺識其所而返雪晴徃訪焉惟草屋一間家徒壁立忽米桶中有人乃先生妻也因天寒故坐其中試問徽之先生何在荅曰在溪上捕魚始知真為先生矣至彼果見之告以特來候謝之意隔溪謂曰諸公先到舎下我得魚當換酒飲諸公也少頃携魚與酒至盡歡而散回至中途夜黒不良於行暫憇一露棚下適主人自外歸乃嘗識面者問所從來語以故喜曰是固某平日所願見者止客宿翼旦客别主人躡其蹤則先生已遷居矣又一日先生與陳剛中治中遇於道治中䇿蹇驢時猶布衣見先生風神髙簡問曰得非吕徽之乎曰然足下非陳剛中乎曰然握手若平生歡共論驢故事先生言一事治中荅一事互至四十餘事治中止矣先生曰我尚記得有某出某書某出某傳又三十餘事治中深敬之闗節梯媒杜陽雜編云元載寵姬薛瑶英善為巧媚載惑之瑶英之父曰宗本兄曰從義與趙娟相逓出入以搆賄賂號為闗節趙娟本岐王愛妾後出為薛氏妻生瑶英三人更與中書主吏卓倩等為腹心而宗本輩以事告者載未嘗不領之天下齎寳貨求大官無不恃載權埶指薛卓為梯媒又李肇國史補總叙進士科云造請權要謂之闗節劉軻牛羊日歴云由是輕薄奔走揚鞭馳騖以闗節𦂳慢為甲乙以此推之則諺所謂打闗節有梯媒者不為無祖矣市利利市之説到處皆然易説卦巽為利市三倍老苖楊旺札勒字彦英武岡綏寜之赤水人為人隂鷙酷烈嗜斬殺初羣無賴嘯聚溪洞旺扎勒深賊持權詐故衆推以為長王事日􅁄湖廣陶夢禎氏舉師勤王聞苖有衆習鬬擊遣使往招之由千戸累階至元帥夢禎死樞宻院判鄂爾和總兵駐淮西仍用招納既得旁縁入中國不復可控制畧上江順流而下直抵揚州禽獸之行絶天逆理民怨且怒共起義攻殺之餘黨奔潰度揚子宿留廣徳吳興間至正十六年春二月朔淮人䧟平江時江浙行中書省丞相達實特穆爾有㫖得便宜從事嘉興北連平江南去杭州無二百里為藩鎮喉舌有司告援急星火驛使交道中不絶丞相兵少䇿無所出以旺札勒來守之旺札勒取道自杭以兵刼丞相陞本省參知政事填募民入粟空名告身予之即拜添設左丞所統苖䝤洞猺達拉哈等無尺籍伍符無統屬相謂曰阿哥曰麻線至稱主將亦然喜著斑斕衣製衣袖廣狹脩短與臂同衣幅長不過膝袴如袖裙如衣總名曰草裙草袴固脰以獸皮曰護項束要以帛兩端懸凥後若尾無間晴雨被氊毯狀絶𩔖犬按邕管雜記溪蠻叢笑等書所載五溪之蠻盡槃瓠種屬曰猫曰徭曰􅱒曰犵狑曰犵狫字皆從犬則諺所謂苖犬者信然軍中無金鼔雜鳴小鑼以節進止其鑼若賣貨郎擔人所敲者夜遣士卒伏路日坐草軍行尚首功資抄掠抄掠曰檢刮檢刮者盡取而靡有孑遺之意所過無不殘滅擄得男女老羸者甚幼者色陋者殺之壯者曰土乖幼者曰賴子皆驅以為奴人之投其黨者曰入火婦人艶而晢者畜為婦曰夫娘人有三四婦多至十數一語不合即剸以刃與之處者得至日莫無恙則心竊自賀古云好則人怒則獸形容盡之矣是月丞相又以王與敬攝元帥事守松江與敬據郡應平江完者遣部將蕭亮員成來與敬奔苗有松江火一月不絶城邑殆無噍𩔖偶獲免者亦舉則去兩耳掠婦女刼貨財殘忍貪􅁾慘不忍言官庾尚有粟四十萬餘籍為己有越五十日平江兵破澱湖栅苖夜遁去秋平江兵入杭苗將吳大旺敗旺札勒自嘉興來駐兵城中菜市橋外未即進民自為戰勝旺札勒兵滛刑以逞嘉興僅保孤城城之外悉遭兵燹有窮目力所至無寸草尺木處旺札勒雖陽浮尊事丞相生殺予奪於己是決丞相僅得署成案然浙江之南則行御史臺總督官穆爾古蘓建徳路則逹嚕噶齊衮都羅丹各自為守苗不敢犯其境旺札勒之威令僅行於杭州嘉興兩郡而已築營徳勝堰周圍三四里子女玉帛皆在焉且以為郿塢計用法刻深任埶立威而鄧子文金希尹王彦良之徒又悉邪佞輕佻左右交煽氣燄翕忽時左丞李伯昇行樞宻同知史文炳行樞宻同僉吕珍等皆先魁淮旅而降順者丞相以其衆攻殺之既受圍遣吏致牲酒於文炳為可憐之意曰願少須㬰毋死得以底裏上路報不可旺札勒乗躁力戰敗盡殺所有婦女自經以死獨平章慶童女以先往在富陽得免平章女已嘗許嫁親王為旺札勒强委禽焉至是未及三月故數其罪者此居首諸軍開門納欵惟恐弗先文炳解衣裹屍瘞之祭哭盡哀十八年秋八月也旺札勒部將宋興在嘉興閉城自守亦攻降之城中燔燬者三之二民遇害者十之七南村野史曰苗入華夏民之不幸亦國家之不幸也國以民為本本不固矣邦奚以寧為之將若相者在於明黜陟嚴賞罸奉將天威降者招之逆者討之以培國家之本可也顧於此而不為又無他竒謀逺畧而乃借重於非𩔖正猶開虎兕之柙而使赴犬羊耳尚冀保民命為社稷計一何愚哉罪惡貫盈天怒於上敗亡戮辱身膏草野民爭以為快實亦自取之也惟旺札勒則有説焉旺札勒寵榮過望豈有貳志忠君愛民之道頗亦見諸行事獨矜已犯分貪財好色固苗性所然君子責備賢者於此可以畧之則罪亦未至於死也兼以所部吏卒視旺札勒起身等寒㣲故威令有所不信急之則恐内變緩之則壞法敗度遂卒至於如此亦可哀矣又惜乎草草之舉斷自一時吾恐國家之本剷刈殆盡雖有智謀之士亦無如之何矣天乎人乎吾不得而知也雙硯堂周待制月巖先生仁榮買地於府城之鄭􅑃兒坊剏義塾以淑後進築礎時掘地深纔數尺有青石獲雙硯硯有欵識乃唐鄭司戸䖍故物塾既成遂名雙硯堂爾後先生之弟本道先生仔肩登庚申科仕至恵州判官䖍字弱齊俗譌為􅑃兒云嫁妾猶處子先師錢先生壁字伯全壬申科進士端重清慎語不傷氣嘗内一女鬟風姿秀雅殊可人意室氏勸先生私之正色而荅曰我之所以置此者欲以侍巾櫛耳豈有他意哉汝乃反欲敗吾徳耶即具貲嫁之果處子也先生雲間人聶碧窓詩京口天慶觀主聶碧窓江西人嘗為龍翔宫書記國初時詔赦至感而有詩曰乾坤殺氣正沉沉又聽燕臺降徳音萬口盡𫝊新詔好累朝誰念舊恩深分茅列土將軍志問舎求田父老心麗正立班猶昨日小臣無語淚霑襟又哀被虜婦云當年結髪在深閨豈料人生有别離到底不知因色誤馬前猶自買臙脂又咏燕姬云雙栁垂鬟别樣梳醉來馬上倩人扶江南有眼何曾見爭捲珠簾看固姑玉􅃾江鄰幾雜志云丁正臣齎玉􅃾來館中沈休文云福州人謂之佩羮即今魚脬是也蟹斷陸龜蒙蟹志云稻之登也率執一穂以朝其魁然後任其所之蚤夜嘈沸指江而奔漁者緯蕭承其流而障之名曰蟹斷然緯蕭二字尤竒作今樂府法喬孟符吉博學多能以樂府稱嘗云作樂府亦有法曰鳳頭猪肚豹尾六字是也大槩起要美麗中要浩蕩結要響亮尤貴在首尾貫穿意思清新茍能若是斯可以言樂府矣此所謂樂府乃今樂府如折桂令水仙子之𩔖岷江緑太師巴延擅權之日剡王齊齊克圖髙昌王特穆爾布哈皆以無罪殺山東憲吏曹明善時在都下作岷江緑二曲以風之大書揭於五門之上巴延怒令左右暗察得實肖形捕之明善出避吳中一僧舎居數年伯顔事敗方再入京其曲曰長門栁絲千萬縷總是傷心處行人折柔條燕子銜芳絮都不由鳳城春做主長門栁絲千萬結風起花如雪離别重離别攀折復攀折苦無多舊時枝葉也此曲又名清江引俗曰江兒水温暾南人方言曰温暾者乃懐暖也唐王建宫詞新晴草色煖温暾又白樂天詩池水煖温暾則古已然矣飛雲渡飛雲渡風浪甚惡每有覆舟之患有一少年子放縱不羈嘗以所生年月日時就日者問平生富貧夀夭有告曰汝之夀莫能踰三旬及徧叩他日者言亦多同於是意謂非乆於人世乃不娶妻不事生産作業每以輕財仗義為志嘗俟船渡傍見一了鬟女子徘徊悲戚若將赴水少年亟止之問曰何為輕生如此荅曰我本人家小婢主人有姻事暫借親眷珠子耳環一雙直鈔三十餘定今日送還竟於中途失去寜死耳焉敢歸少年曰我適拾得但不審果是汝物否方再三磨問顆數裝束實是遂同造主人主人感謝欲贈以禮辭不受既而主人怒此婢遣嫁業梳剃者所居去渡所咫尺間期嵗少年與同行二十有八人將過渡道遇一婦人拜且謝視之乃失環女也因告其故於夫屈留午飯餘人先登舟俄風濤大作皆𦵏魚腹盖少年能救人一命而造物者亦救其一命以荅之後少年以夀終渡在温之瑞安漢子今人謂賤丈夫曰漢子按北齊魏愷自散騎常侍遷青州長史固辭文宣帝大怒曰何物漢子與官不就又叚成式廬陵官下記韋令去西蜀時彭州刺史被縣令宻論訴韋前期勘知屈刺史詣府陳謝及迴日諸縣令悉逺迎所訴者為首大言曰使君今日可謂朱研益丹矣刺史笑曰則公便是研朱漢子也長年吾鄉稱舟人之老者曰長老長上聲盖唐已有之矣杜工部詩云長年三老歌聲裏白晝攤錢髙浪中古今詩話謂川峽以篙手為三老乃推一船之最尊者言之耳因思海舶中以司柁曰大翁是亦長老三老之意龍見嘉興檇李郭元之言至正乙未秋七月三日城東馬橋上白龍掛盲風怪雨天闇黒若深夜然壞民居五百餘所大木盡㧞木自半空墜下悉折為二雜以萬瓦亂飛溪水直立人皆呌號奔走不暇顧妻子龍由馬橋歴城北北麗橋望太湖而去時方在家家去城可三里許如聞萬屋齊壓急出戸四望黒雲洶湧失府城所在經一二時方乃開霽不一年為戰鬬之地凡龍所過處荆棘寒烟衰草野燐視昔時之繁華如一夢也星入月松江孫元璘言至正己未七月六日夜自平江歸泊舟城西栅口方掀篷露坐忽見一星大如桮碗色白而㣲青尾長四五丈光燄燭天戞然有聲由東北方飛入月中而止此時月如仰瓦正乗之無偏倚若人以手拾置其中者嘗記宋張端義貴耳集云丁亥年余為儀真録參十月二十三日夜因觀天象見一星入月􅈫歴者鄒淮絶早相别云昨夜星入月恐兩淮兵動不可住徑喚渡過建康余問之古有此否鄒云漢獻帝時一次星入月今再見也十一月十二日劉倬舉兵僇孝姑姑反戈一城狼狽僅以身免繼此兵禍未泯也據此説則松江之禍亦非偶然松江自丙申二月十八日軍亂越三日苗来尅復首尾兩月之間焚殺擄掠十里之城悉化瓦礫之區視他郡尤可畏是則星入月不知此時在於何所分野顧乃松江獨應其兆與軍中禮士浙省參政董公搏霄字孟起以名行當至正癸巳之間總兵戌昱嶺獨松千秋三闗日號令嚴肅民賴以安及尅復諸郡不殺擄不抄掠其御將帥也凛然不可犯而四方之士歸之者禮遇勤至尊酒在前起立捧觴既恭且和然後取其所長而任之若董公者可謂得待士之體矣不耐煩不耐煩三字見宋書庾登之弟仲文𫝊阿誰阿誰二字見三國志龎統𫝊輟耕録卷八欽定四庫全書輟耕録卷九元陶宗儀撰文章宗㫖盧踈齋先生文章宗㫖云大凡作詩須用三百篇與離騷言不闗於世教義不存於比興詩亦徒作夫詩發乎情止乎禮義闗睢樂而不滛哀而不傷斯得性情之正古人於此觀風焉賦者古詩之流也前極宏侈之規後歸簡約之制故班固二都之賦冠絶千古前極鋪張鉅麗故後必稱典謨訓誥之作終焉厥後十數作者倣而傚之盖詩人之賦必麗以則也古今文章大家數甚不多見六經不可尚矣戰國之文反覆善辨孟軻之條暢莊周之竒偉屈原之清深為大家西漢之文渾厚典雅賈誼之俊健司馬之雄放為大家三國之文孔明之二表建安諸子之數書而已西晉之文淵明歸去來辭李令伯陳情表王逸少蘭亭叙而已唐之文韓之雅徤栁之刻削為大家夫孰不知然古文亦有數漢文司馬相如揚雄名教罪人其文古唐文韓外元次山近古樊宗師作為苦澁非古宋文章家尤多老歐之雅粹老蘇之蒼勁長蘇之神俊而古作甚不多見盖清廟茅屋謂之古朱門大厦謂之華屋可謂之古不可太羮𤣥酒謂之古八珍謂之美味可謂之古不可知此者可與言古文之妙矣夫古文以辨而不華質而不俚為髙無排句無陳言無贅辭夫記者所以紀日月之逺近工費之多寡主佐之姓名叙事如書史法尚書顧命是也叙事之後略作議論以結之然不可多盖記者以備不忘也夫叙者次序其語前之説勿施於後後之説勿施於前其語次第不可顛倒故次序其語曰叙尚書叙毛詩序古今作序大格樣書序首言畫卦書契之始次言皇墳帝典三代之書及夫子定書之由又次言秦亡漢興求書之事詩序首言六義之始次言變風變雅之作又次言二南王化之自碑文惟韓公最髙每碑行文言道人人殊面目首尾決不再行蹈襲神道碑揭於外行文稍可加詳埋文壙記最宜謹嚴銘字從金一字不汎用善為文者宜如古詩雅頌之作行實之作當取其人平生忠孝大節其餘小善寸長書法宜畧為人立傳之法亦然䟦取古詩狼䟦其胡之義犯前則躐其胡䟦語不可多多則宂尾語宜峻峭以其不可復加之意説則出自己意横説堅説其文詳贍抑揚無所不可如韓公師説是也真公編次古文自西漢而下他並不録迄唐惟尊韓公四記栁公游西山六記而已古文之難豈其然乎瑪達巴歴耶律文正王於星歴筮卜雜􅈫内􅈫音律儒釋異國之書無不通究嘗言西域歴五星宻於中國乃作瑪達巴歴盖回鶻歴名也續演雅發揮白湛淵先生續演雅十詩發揮云海青羽中虎燕燕能制之小隙沉大舟闗尹不吾欺者海青俊禽也而羣燕縁撲之即墜物受於所制者無小大也右一草食押不蘆雖死元不死未見滌腸人先聞棄簀子者漠北有名押不蘆食其汁立死然以他藥解之即蘇華佗洗腸胃攻疾疑先服此也右二誰令珠玉唾出彼藜藿腸仁人不為寳良賈宜深藏者和林有尼能吐珠玉雜寳也右三嬰啼聞木枝羝乳見茅茹何如百年身反爾無根據者漠北種羊角能産羊其大如兎食之肥美嬰啼木枝見山海經所載右四西狩獲白麟至死意不吐代北有角端能通諸國語者角端北地異獸也能人言其髙如浮圖右五纔脱海鶴啄已登方物輿仰面勿啾啾我長非僑如者小人長僅七寸夫婦二枚形體畢具也右六羯尾大如斛堅車載不起此以不掉滅彼以不掉死者西漢有羯尾大於身之半非車載尾不可行也右七八珍殽龍鳳此出龍鳳外荔枝配江珧徒誇有風味者謂迤北八珍也所謂八珍則醍醐麆沆野駝蹄鹿唇駝乳糜天鵝炙紫玉漿𤣥玉漿也𤣥玉漿即馬妳子右八灤人薪巨松童山八百里世無奚超勇惆悵度易水者取松煤於灤陽即今上都去上都二百里即古松林千里其大十圍居人薪之將八百里也右九兩駝侍雪立終日饑不起一覺沙日黄肉屏那足擬者沙漠雪盛命兩駝趺其旁終夜不動用斷梗架片氊其上而寢處於下煖勝肉屏且不起心兵也右十面花子本婦人面飾用花子起自唐昭容上官氏所製以掩黥迹大歴已前士大夫妻多妬悍婢妾小不如意輒印面故有月黥錢黥事見酉陽雜爼竒疾今上之長公主之駙馬剛噶勒藏慶王因墜馬得一竒疾兩眼黒睛俱無而舌出至胷諸醫罔知所措廣恵司卿能哲哷鼐葉爾羌人也嘗識此證遂剪去之頃間復生一舌亦剪之又於真舌兩側各去一指許却塗以藥而愈時元統癸酉也廣恵司者回回之為醫者隸焉磨兠鞬襄州榖城縣城門外道傍石人缺剥腹上有字云磨兠鞬慎勿言是亦金人之流也距縣四五十里有石人二相偶而立腹上題刻一云已及一云未匝不可得而詳也浮休閱日集葛大哥吾鄉臨海章安鎮有蔡木匠者一夕手持斧斤自外歸道由東山東山衆所殯𦵏之處蔡沉醉中將謂抵家捫其棺曰是我榻也寢其上夜半酒醒天且昏黒不可前未免坐以待旦忽聞一人髙呌棺中應云喚我何事彼云某家女病損證盖其後園葛大哥滛之耳却請法師捉鬼我與你同行一觀如何棺中云我有客至不可去蔡明日詣主人曰娘子之疾我能愈之主人驚喜許以厚謝因問屋後曾種葛否曰然蔡徧地翻掘内得一根甚巨斫之且有血煑啖女子病即除萬栁堂京師城外萬栁堂亦一宴游處也野雲㢘公一日於中置酒招䟽齋盧公松雪趙公同飲時歌兒劉氏名解語花者左手折荷花右手執盃歌小聖樂云緑葉隂濃徧池亭水閣偏趂涼多海榴初綻朶朶蹙紅羅乳燕穉鶯弄語對髙栁鳴蟬相和驟雨過似瓊珠亂撒打遍新荷人生百年有幾念良辰美景休放虚過富貧前定何用苦張羅命友邀賔宴賞飲芳醑淺斟低歌且酩酊從教二輪往来如梭既而行酒趙公喜即席賦詩曰萬栁堂前數畆池平鋪雲錦盖漣漪主人自有滄洲趣遊女仍歌白雪詞手把荷花来勸酒步隨芳草去尋詩誰知只尺京城外便有無窮萬里思此詩集中無小聖樂乃小石調曲元遺山先生好問所製而名姬多歌之俗以為驟雨打新荷者是也樹鳴金石草木之變異雜見於傳記數年来天下擾攘怪事尤甚信前人之書不誣也至正丙申浙西諸郡皆有兵正月嘉興楓涇鎮戴君實門首栁樹若牛鳴者三主人與僕從悉聞之斬其樹不一月苗軍抄掠貲産又兩月屋燬於兵是嵗寒食日海鹽州趙初心率子姓輩詣先壟汛掃松楸忽聞如老鶴作聲戞戞不絶審聽所在乃是一栢樹頃間衆樹同聲和之一二時方止舉家惶惑至八月苗軍火其居明年六月紅軍掠貨財婦女而姪善如死於難予親見君實館賔黄伯成與初心之孫元衡説元衡善如子也其事雖遲速不同而二家之遭禍則一吁誠異哉松江官號至正丙申正月常熟州䧟松江府印造官號給散吏兵佩帶以防姦偽號之製作畫為圓圏繞圏皆火燄圏之内一府字以府印印府字上圏之外四角府官花押民間謡曰滿城都是火府官四散躱城裏無一人紅軍府上坐不二月城破悉如所言割埶杭州赤山之隂曰簫箕泉黄大癡所嘗結廬處其徒弟沈生狎近側一女道姑同門有欲白之於師沈懼引厨刀自割其埶㡬死衆救得活而瘡口流血經月餘不合偶問諸閹奴教以煆所割埶搗粉酒服如其言不數日而愈題屏謝客三寳柱字廷珪色目人頗以才學知名雖湛於酒色而能練達吏事剛正有守為浙省郎中日大書四句於門屛之上曰逆刮蛟龍鱗順捋虎豹尾若將二伎論尤比於人易其意盖以杜絶人之求請耳然亦隘矣哉終不顯達而死於難婚啓至元間平原郡公趙氏與苪宋福王也其子娶全竹齋少保之女婚啓内一聨云休光薊北茍安公位之居回首江南惟重母家之念儘有味陶母碑陶侃母得古正之道發人倫之本將示教於天下謂朴散俗壊樂潰禮闕有子不教不至於道若失大訓不可登於偉望乃求師傅延英茂終日迫於用不欲子郤客俄而車盖載止餼饋並竭茍失其人子將不進計畫始成確然獨斷謂髪可棄訓不可失乃金刀既止黰􅄠雲散怡然無咨嗟之色儼若待賔之具上恐不足以顯㳟下未可謂訓子顧其母激忿填膺寸晷是學不迨於至以超聖人之域煥乎賢者之業且禮信仁義君子之事婦人何得而知盖世道大喪其俗已亂故婦人賢者得以行其事千古之下厥行獨明當時為人之父為人之母覩斯行聞斯舉得不激厲乎茍天下皆如陶母之志則天下皆陶之子也盖人謂子幼而蒙穉不致精訓致悖大道亂人紀良可惜哉銘曰髪也者為養之具賔也者致教之英茍非異禮孰能作世之程千載之下如陶之母安可繼乎齊英宗儀因讀唐皇甫持正先生湜文集見陶母碑不覺淚數行下追惟先妣拳拳於教子真有陶母之志是故今翰林承㫖蜕菴張先生翥所譔墓銘有曰夫家貧劬力紡績以給諸子無廢學之辭自顧不肖不克勉於學以成令名罪莫大焉謹録於此庶亦可以自懼也許文懿先生婺州許白雲先生謙字益之隱居金華山四十年不入城府著書立言足以垂教後世浙東亷使王公繼學訪先生於山中謂先生清氣逼人可畏既退明日出學行薦於朝有録其舉文至者先生方講説目不一少視其無意於仕宦如此先生殁追諡文懿先生謡言後至元丁丒夏六月民間謡言朝廷將采童男女以授韃靼為奴婢且俾父母䕶送抵直北交割故自中原至於江之南府縣村落凡品官庶人家但有男女年十二三以上便為婚嫁六禮既無片言即合至於巨室有不待車輿親迎輒徒步以往者盖惴惴焉惟恐使命戾止不可逃也雖守土官吏與夫韃靼色目之人亦如之竟莫能曉經十餘日纔息自後有貴賤貧富長幼妍醜匹配之不齊者各生悔怨或夫棄其妻或妻憎其夫或訟於官或死於夭此亦天下之大變從古未之聞也吳中僧祖伯號子庭者素稱滑稽口占絶句曰一封丹詔未為真三杯淡酒便成親夜来明月樓頭望惟有姮娥不嫁人又有人集古句云翡翠屏風燭影深良宵一刻直千金共君今夜不須睡明日池塘是緑隂可謂深於命意者矣獸醫世以療馬者曰獸醫療牛者曰牛醫周禮天官冡宰篇獸醫下士八人注獸牛馬之屬按此則療牛者亦當曰獸醫矣想肉天下兵甲方殷而淮右之軍嗜食人以小兒為上婦女次之男子又次之或使坐兩缸間外逼以火或於銕架上生炙或縛其手足先用沸湯澆潑却以竹帚刷去苦皮或乗夾袋中入巨鍋活煑或刲作事件而淹之或男子則止斷其雙腿婦女則特剜其兩乳酷毒萬狀不可具言總名曰想肉以為食之而使人想之也此與唐初朱粲以人為糧置搗磨寨謂啖醉人如食糟豚者無異固在所不足論唐張鷟朝野僉載云武后時杭州臨安尉薛震好食人肉有債主及奴詣臨安止於客舎飲之醉並殺之水銀和煎并骨銷盡後又欲食其婦婦知之踰墻而遯以告縣令令詰之具得其情申州録事奏奉勑杖一百而死段成式酉陽雜爼云李廓在頴州獲火光賊七人前後殺人必食其肉獄具廓問食肉之故其首言某受教於巨盜食人肉者夜入人家必昏沉或有魘不寤者盧氏雜説云唐張茂昭為節鎮頻喫人肉及除統軍到京班中有人問曰聞尚書在鎮好人肉虚實笑曰人肉腥而且䏰爭堪喫五代史云萇從蕳家世屠羊從蕳仕至左金吾衛上將軍嘗歴河陽忠武武寧諸鎮好食人肉所至多潜捕民間小兒以食之趙思綰好食人肝及長安城中食盡取婦女幼稚為軍糧每犒軍輒屠數百人三國志云吳將髙灃好使酒嗜殺人而飲其血日暮必於宅前後掠行人而食之宋莊季裕鷄肋編云自靖康丙午嵗大金入汴盜賊官兵以至居民更互相食全軀暴以為腊登州范温率忠義之人泛海到錢唐有持至行在猶食者老瘦男子庾詞謂之饒把火婦人少艾者名之下羮羊小兒呼為和骨爛又通目為兩脚羊趙與時賔退録云本朝王繼勲孝明皇后母弟太祖時屢以罪貶後以右監門衛率府副率分司西京殘暴愈甚强市民間子女以備給使小不如意即殺而食之太宗即位會有訴者斬於洛陽又知欽州林千之坐食人肉削籍隸海南嗟夫食人之肉人亦食其肉此兵革間之流慘耳君子所不願聞者其薛震輩當天下宴安之日而又身為顯宦豈無珍羞美膳足以厭其口腹顧乃喜啖人肉是雖人𩔖而無人性者矣終至於誅斬竄逐而後已天之報施不亦宜乎王眉叟王眉叟夀延號溪月杭州人出家為道士受知晉邸後以𢎞文輔道粹徳真人管領郡之開元宫浙省都事劉君時中致者海内名士也既卒貧無以為𦵏躬往弔哭周其遺孤舉其柩𦵏於徳清縣與己之夀穴相近春秋祭掃不怠然此事行之於異教中尤不易得錢唐錢唐二字其来甚逺按史記始皇本紀至雲夢浮江下丹陽至錢唐臨浙江上會稽立石刻頌秦徳西漢地理志亦有錢唐縣今唐字從土則誤矣盖以錢易土及捐錢築塘等事皆傅會之辭自注世説者已然况後世乎漱芳亭道士張伯雨雨號句曲外史又號貞居嘗從王溪月真人入京初燕地未有梅花吳間閒宗師全節時為嗣師新從江南移至䕶以穹廬扁曰漱芳亭伯雨偶造其所恍若與西湖故人遇徘徊既乆不覺熟寢於中真人終日不見伯雨深以為憂意其出外迷失街道也夢覺日已莫矣歸道所由嗣師笑曰伯雨素有詩名宜作詩以贖過伯雨遂賦長詩有風沙不憚五千里將身跳入仙人壺之句嗣師大喜送翰林集賢嘗所往来者𡊮學士伯長謝博士敬徳馬御史伯庸吳助教養浩虞修譔伯生和之他日伯雨往謁謝諸公惟虞先生全不言儒者事只問道家典故雖荅之或不能詳末問能作幾家符曰不能先生曰某試書之以質是否連書七十二家伯雨汗流浹背輒下拜曰真吾師也自是託交甚契故與先生書必稱弟子焉伯雨杭州人食品有名水之鹹淡相交處産河豚河豚魚𩔖也無鱗頰常怒氣滿腹形殊弗雅然味極佳煑治不精則能殺人所以東坡先生在資善堂與人談河豚之美云據其味真是消得一死浙西惟江隂人尤珍之每春首初出時必用羞祭品畢然後作羮而鄰里間互相餽送以為禮腹中之膟曰西施乳夫西施一美婦也豈乳亦異於人耶顧千載而下乃使人道之不置如此則夫差之亡國非偶然矣若鱭魚子名螳螂子及松江之上海杭州之海寜人皆喜食蟛蜞螯名曰鸚哥嘴以有極紅者似之故也二物象形而云又非西施乳之比矣按𩔖編魚部引博雅云鯸䱌盈之反魨也背青腹白觸物即怒其肝殺人正今人名為河豚者也然則豚當為魨火災至正辛巳莫春之初江浙行省平章政事濟爾噶岱入城之任之日衣紅兒童謡曰火殃来矣至四月十九日杭州災燬官民房屋公􅅟寺觀一萬五千七百五十五間燒死七十四人明年壬午四月一日又災尤甚於先自昔所未有也數百年浩繁之地日就凋弊實基於此落水蘭亭予嘗見落水蘭亭一卷乃五字不損本今吳中分湖陸氏所藏而趙彛齋之物也彛齋宋宗室子諱孟堅字子固彛齋其自號居嘉興之廣戌酷嗜古法書名畫能作墨花於水仙尤長此帖姜白石舊藏後歸霅川俞夀翁彛齋復從夀翁易得喜甚乗夜回櫂至昇山大風覆舟行李皆渰溺無餘彛齋立淺水中手持此帖示人曰蘭亭在此餘不足介吾意也因題八字於卷云性命可輕至寳是保隂府辯詞李子昭者松江府提控案牘李宗慶子也側室刁氏有娠妻怒之箠撻苦楚晝夜不息數次自經與溺以省覺不得死竊自念曰我苦就蓐亦必死耳等死何自求早死之為幸因多食海蟄與冷水胎既落血上充心而身遂亡不數日鬼怪百出妻得竒疾宛若死者但只心胷㣲温支體不僵其家就床褥作一竅任其便溺時以少飲納口中輒咽不與亦不言饑經三年餘形骸枯槁無復生理家人益厭之一夕忽詣舅姑所扣寢室戸舅姑曰汝惡得至此必為鬼矣曰妾已復生實非鬼也願見舅姑具告所然舅姑驚恐呼家人悉起取火燭之果此病軀及覘其卧榻已空始信之因問其詳曰妾為亡婢訴寃攝至隂府即今嶽祠也命妾與婢對詞妾以汝懐孕時打罵則或有之然未嘗令汝吞藥損墮婢仇執甚堅妾不得白遂招承枷禁幽圄中日得小叔以餅餌粥飯之𩔖相餽故不餒今復得送妾還入門弄其兒戱撻之一下兒哭遂推妾置竈上即若夢覺者但覺怠倦故勉强至此舅姑曰汝既被禁何自得釋曰㑹上帝有赦故也急呼小郎妻問之曰適間兒子驚啼云夢見乃父擊其首小郎盖提控之次子泰甫先為其妺夫金可大所殺者此婦至今强徤與夫見寓府城西郭又復生兩子矣志怪古或多然漫書於此以為世之妬婦勸詩法趙魏公云作詩用虚字殊不佳中兩聨填滿方好出處纔使唐已下事便不古姓名者莊綽鷄肋編云太史公作伯夷傳但云伯夷叔齊孤竹君之二子也而論語音註引春秋少陽篇謂伯夷姓墨名允一名元字公信叔齊名智字公達夷齊諡也陸徳明取之不知少陽篇何人所著今世猶有此書否吾衍閒居録云孤竹君姓墨音眉名台音怡初見孔叢子注中子名伯遼見周曇詠史詩注伯當作仲若如吾説則伯夷叔齊似又是名非諡矣女諫買印淮海龔翠巖先生開寓吳門日一僧權道衡者頗聰慧識道理先生與之遊偶市肆粥漢印一顆權嘗酬價歸取鏹先生適見主人以實告遂用十五緡買之語諸女女曰大人乃亦奪人所好先生驚悟即持送權曰先生愛而收藏奚以贈曰在彼猶在此也權固辭曰在彼猶在此也相讓乆之沉諸淵而别吁若先生者可謂善矣孰謂異端中有此哉然先生之女尤可敬也吳江塔顛箭吳江華嚴寺浮圖之顛望之二矢著其上簳羽宛然可辨相傳宋南渡初金人尼瑪哈乗快一發而中又賈似道出督時祝矢自誓亦中焉故留題者有至今塔杪留遺跡猶是元戎金僕姑之句大徳庚子其寺主僧善信大修浮圖更其顛而新之視向二矢實圓鐡條二交貫横亘盖必昔人以示輔顛且以防鸛鶻之巢故耳傳者所謂大妄也且著此以祛後世之惑長樂郭徳基嘗有華嚴塔頴辨疑行於時盖郭嘗官此州目擊其非素領項後白髪曰素領漢馮唐白首為郎官素髪垂領輟耕録卷九欽定四庫全書輟耕録卷十元陶宗儀撰御史五常周景逺先生馳名能文為南臺御史時分治過浙省每日與朋友往復其書吏不樂似有舉刺之意大書壁上曰御史某日訪某人某日某人来訪御史忽見呼謂曰我嘗又訪某人汝乃失記何也第補書之因復謂曰人之所以讀書為士君子者正欲為五常主張也使我今日謝絶故舊是為御史而無一常寜不為御史不可滅人理吏赧服而退官倉入粟今官府收歛秋糧之際比先涓吉啓倉於青龍方敖房入粟六石六斗六升六合以應日蓋國家初無定制不知各處何以一皆如此予意必取上下四方六合之意耳食物相反凡食河豚者一日内不可服湯藥恐内有荆芥蓋與此物大相反亦惡烏頭附子之屬予在江陰時親見一儒者因此䘮命其子尤不可食能使人脹死嘗水寖試之經宿顆大如芡實世傳中其毒者亟飲􅁾物乃解否則必亡又聞不必用此以龍腦浸水或至寳丹或橄欖皆可解後得一方用槐花㣲炒過與乾燕支各等分同搗粉水調灌大妙先輩諧謔趙魏公刻私印曰水晶宫道人錢唐周草窓先生宻以瑪瑙寺行者屬比之魏公遂不用此印後見先生同郡崔進之藥肆懸一牌曰養生主藥室乃以敢死軍醫人對之進之亦不復設此牌魏公語人曰吾今日方為水晶宫吐氣矣先輩雖諧謔自是可喜馬判馮公士啓夢弼嘗言為八番雲南宣慰司令史曰嘗因公差抵一站日已莫矣站吏告曰今夜馬判上岸麻線須暫停驛程以避之問其故閉目揺手不敢言公怒便上馬行數十里至大溪忽見一物如屋所謂烏剌赤者下馬跪泣若告訴狀呼問何為亦閉目揺手弗荅於是下馬祝之曰某許昌人竊禄来此茍天命合盡爾其啖之否則容我行祝畢即轉入溪中腥風臭霧觸人口鼻既而各上馬比曙抵前站站吏驚曰是何麻線大膽若是耶公問此為何物始敢言曰馬蟥精也麻線方言曰官人烏剌赤站之牧馬者公官至禮部尚書字訓善字訓多字詩載馳女子善懐鄭箋善猶多也漢書岸善崩善亦多也丘真人大宗師長春真人姓丘氏名處機字通宻號長春子登州棲霞縣濵都里人也祖父業農世稱善門金皇統戊辰正月十九日生生而聰敏有日者相之曰此子當為神仙宗伯大定丙戌年十九辭親居崑崙山依道者脩真丁亥謁重陽全真開化王真君嘉於海寜請為弟子戊申召見闕下隨還終南山貞祐乙亥太祖平燕城金主奔汴丙子復召不起己夘居萊州時魯齊入宋宋遣使来召亦不起是年五月太祖自乃蠻國遣近侍劉仲禄持一手詔致聘十一月至𨼆所詔文云制曰天厭中原驕華大極之性朕居北野嗜慾莫生之情反朴還淳去奢從儉每一衣一食與牛竪馬圉共弊同饗視民如赤子養士若兄弟謀素和思素畜練萬衆以身人之先臨百陣無念我之後七載之中成大業六合之内為一統非朕之行有徳蓋金之政無恒是以受天之佑獲承至尊南連趙宋北接回紇東夏西夷悉稱臣佐念我單于國千載百世以来未之有也然而任大守重治平猶懼有闕且夫刳舟剡楫將欲濟江河也聘賢選佐將以安天下也朕踐祚已来勤心庶政而三九之位未見其人訪聞丘師先生體真履規博物洽聞探􅄨窮理道冲徳著懐古君子之肅風抱真上人之雅操乆棲巖谷藏身𨼆形闡祖宗之遺化坐致有道之士雲集仙逕莫可稱數自干戈而後伏知先生猶𨼆山東舊境朕心仰懐無已豈不聞渭水同車茅廬三顧之事奈何山川懸濶有失躬迎之禮朕但避位側身齋戒沐浴選差近侍官劉仲禄備輕騎素車不逺千里謹邀先生暫屈仙歩不以沙漠悠逺為念或以憂民當世之務或以恤朕保身之術朕親侍仙座欽惟先生將咳唾之餘但授一言斯可矣今者聊發朕之㣲意萬一明於詔章誠望先生既著大道之端要善無不應亦豈違衆生之願哉故兹詔示惟宜知悉五月初一日筆庚辰正月北行二月至燕欲候駕回朝謁仲禄今從官哈喇馳奏真人進表陳情表曰登州棲霞縣志道丘處機近奉宣㫖逺召不才海上居民心皆恍惚處機自念謀生太拙學道無成辛苦萬端老而不死名雖播於諸國道不加於衆人内顧自傷𠂻情誰測前者南京及宋國屢召不從今者龍庭一呼即至何也伏聞皇帝天賜勇智今古絶倫道恊威靈華夷率服是故便欲投山竄海不忍相違且當冐雪衝霜圖其一見蓋聞車駕只在桓撫之北及到燕京聽得車駕遥逺不知其幾千里風塵澒洞天氣蒼黄老弱不堪切恐中途不能到得假之皇帝所則軍國之事非己所能道徳之心令人戒欲悉為難事遂與宣差劉仲禄商議不若且在燕京徳興府等處盤桓住坐先令人前去奏知其劉仲禄不從故不免自納奏帖念處機肯来歸命逺冐風霜伏望皇帝早下寛大之詔詳其可否兼同時四人出家三人得道惟處機虚得其名顔色憔顇形容枯槁伏望聖裁龍兒年三月日奏十月哈喇回復奉𠡠㫖曰青吉斯皇帝𠡠真人丘師省所奏應召而来者具悉惟師道踰三子徳重多方命臣奉厥𤣥纁馳傳訪諸滄海時與願適天不人違兩朝屢召而弗行單使一邀而肯起謂朕天啓所以身歸不辭暴露於風霜自願䟦渉於沙磧書章来上喜慰何言軍國之事非朕所期道徳之心誠云可尚朕以彼酋不遜我伐用張單旅試臨邊陲底定来從去背實力率之故然乆逸暫勞冀心服而後已於是載揚威徳畧駐車徒重念雲軒既發於蓬萊鶴馭可遊於天竺逹磨東邁元印法以傳心老氏西行或化人而成道顧川途之雖濶瞻几杖以非遙爰荅来章可明朕意秋暑師比平安好㫖不多及十四日辛巳十一月至賽瑪爾堪城壬午三月過鐡門闗四月逹行在所時上在雪山之陽舎館定入見上勞曰他國徴聘皆不應今逺踰萬里而来朕甚嘉焉賜坐就食設二帳於御幄之東以居之約日問道以回紇叛親征不果至九月設庭燎虚前席延問至道真人大略荅以節慾保躬天道好生惡殺治尚無為清淨之理上説命左史書諸䇿癸未乞東還賜號神仙爵大宗師掌管天下道教甲申三月至燕八月奉㫖居太極宫丁亥五月特改太極為長春七月九日留頌而逝年八十至元己巳正月㫖詔贈五祖七真徽號而曰長春演道主教真人已上見蟠溪集鳴道集西游記風雲慶㑹録七真年譜等書初真人自行在歸道由宣徳日一富家新居落成禮致下顧將冀一言以為福既入其室黙然無語輙以所持鐡拄杖於窓戸墻壁上頗毁數處而出主人再拜希解悟曰爾屋完矣美矣完而必毁理執然也吾不爾毁爾將無以圖厥終今毁矣爾宜思其毁而欲完克保全之則爾與爾子子孫孫庶幾歌斯哭斯永終弗替主人説服吁真人真知道哉南池鼃宋季城信州掘土處為濠百畆許在郡南曰南池池之旁可居舊為里人屋歸附後逹嚕噶齊瑪察據有其地每春夏之交羣鼃聒耳寢食不安會三十八代天師張廣微與材朝京回因以告天師朱書符新瓦上使人投池中戒之曰汝鼃母再喧自是至今寂然鴈子漢書太液池中鳬雛鴈子布滿充積用鴈子甚佳王維詩蘆筍穿荷葉菱花罥鴈兒又新趂辦官錢浙省廣濟庫嵗差杭城諲實戸若干名充役庫子以司出納比一家中侵用官錢太多無可為償府判王某素號殘忍乃拘其妻妾子女於官又無可為計則命小舟載之求食於西湖以貲納官鬼妾鬼馬不肖輩羣趨焉鮮于伯幾先生樞作湖邊曲云湖邊蕩漿誰家女緑慘紅愁羞不語低回忍淚傍郎船貪得纒頭強歌舞玉壺美酒不須憂魚腹熊蹯棄如土陽臺夢短匆匆去鴛鎻生寒愁日暮安得義士擲千金遂令桑濮歌行路後王之子孫有為娼者天之報施一何捷也鼎作牛鳴義興王子明家饒於財所藏三代彛鼎六朝以来法書名畫實冠浙右每年必祈一籖於烈帝廟以卜休咎一嵗籖詞有曰開溝鑿井當得古鼎殊不以為意家人以商賈至汴夾谷郎中者藏一商彛絶精妙示之曰恐爾主翁未必有此物也歸以白即遣齎金購得之比舊藏皆不能及至正壬辰宼起蘄黄將由義興取道犯浙西子明罄其所藏鑿深窖以埋之彛亦在列既入窖作牛鳴者七夜頗可怪取出寄田家其窖後遭發掘獨此彛獲存鏖糟俗語以不潔為鏖糟按霍去病傳鏖皋蘭下注以世俗謂盡死殺人為鏖糟然義雖不同却有所出越民考穆爾古蘓字善卿西夏人僑居松江家貧授徒以養母性至孝然落落不羈善諧謔名人士多與之遊至正甲午進士及第授紹興路録事司達嚕噶齊比視天下雲擾所在悉􅂒瘵君撫字周至民愛之如父母乙未秋杭破遄即克復浙省左丞楊諤勒哲以本部苖將持露布至統洞蠻甚衆意實覘視虚實又將流毒於我民也縱虐恣暴民皆束手惴惴不敢與爭無故刼府架閣照磨陳修家妻妾幾被汚君激怒填膺指揮吏兵收之郡民讙呼從事苗遂盡死後諤勒哲聞越民結義且固終不敢調兵渡浙江方集慶䧟時江南行臺官流避抵慶元奉㫖置治所於越遂檄君總統義民䕶城池君更募得勇悍者二千餘人以果毅二字為號曰果毅軍練習武事分撥守要害乃日與常所徃來者擊鮮飫醲酣咏呌嘯以為娛樂雖戸外上官坌至不少延納永康㓂起據有縣境君收復朝廷旌其功除江南浙西道亷訪司知事未上又除江東建康道經歴浙省丞相達實特穆爾便宜除行樞宻院判官君即自署諸叅謀為幕官曰經歴曰都事者不可枚舉時御史大夫拜珠克任奸􅃛吏為爪牙又自統軍三千曰臺軍紀律不嚴民横被擾害有訴於君君輒抑之衆軍皆怨怒然拜委𤨏齷齪惟以鈎距致財為務君不禮之或以諫君曰吾知上有君下有民耳安問其他拜頗聞銜之遂與臺軍元帥埒克戬永安張某萬戸閻塔斯布哈王哈喇特穆爾等謀殺之未得間戊戌十月廿二日首事出兵踰曹娥江與平章方國珍部下萬戸馮某鬬既不利駐軍東闗單騎馳歸拜意决矣廿三日遲明召君私第議事入至中門左右以鐡槌撾殺之初甚秘守閽軍自相謂無已殺總督官我輩幸也民始有聞之者走白君部將浙東僉元帥黄中諸叅謀聞變奔避不顧至有墜城以出行四五十里者初夜二鼔中提軍入城屯戒珠山拜未及知中臥病方飲藥得少汗尚昏潰困頓左右扶翼擐甲上馬遇臺軍於江橋鬬十數合破陣䧟堅身當矢石郡民老幼皆號泣曰殺我總督官我尚何生為壯者助中軍殊死戰臺軍一敗塗地屠其二營入拜家姬侍奴𨽻死者相枕藉一女為隊官陳某所掠舉君屍無元大索三日得於溺池中拜與二子匿梵宇幽𨼆處民搜見之齊唾其面且罵曰瞎賊我總督官何罪而令致於此耶不自殺執以歸中冀中殺之中解其縛率諸軍羅拜之曰總督官忠肝義膽照映天地人神所共知公信任憸邪使國家之柱石隕於無辜我之復讐明大義也殺我主將者既已斬之公幸毋罪拜執中以泣曰我之罪尚何言尚何言繼而軍民為君持服為位以祭私諡曰越民考越六日拜自劾納印綬去其印是夜遺失中以白金百兩購得於一卒以還行臺者君未死先三日有星大如桮椀紅光燭天墜鎮粤門化為石及君出師識者已卜君之有死兆矣至是果驗云南村野史曰兵凶器也戰逆徳也聖人不得已而用之故吾夫子必以臨事而懼好謀而成荅子路行三軍之問夫穆爾古蘓受任之初殊有古賢縣令之風一握兵柄志滿意得酣觴廢事輕謀首亂不旋踵而身首異處蓋亦平昔越己之過有以釀成此禍與㣲中則老母稚子亦皆几上之肉耳原其忠君愛民之心昞然與日星相昭明者則無可議也拜珠為國大臣坐鎮四省百官庶司孰不聽令邁之不奉臺檄擅興師旅明問其罪黜之可也斬之可也而乃陰結小醜作為此態是盜殺之非公論矣民心之所以不服良以是也噫享有尊爵重禄而當國步艱難之日既不思㳙埃補報之道又不責自己貪饕之非反以謀害忠良為先務謂之無罪得乎故其妻妾子女遭罹戮辱實自取之尚復可憐哉三姑六婆三姑者尼姑道姑卦姑也六婆者牙婆媒婆師婆䖍婆藥婆穩婆也蓋與三刑六害同也人家有一於此而不致姦盜者幾希矣若能謹而逺之如避蛇蠍庶乎淨宅之法不中用不中用不可用也左傳成二年郤子曰克於先大夫無能為役杜預注不中為之役使國字杜清碧先生本字伯原有所編五聲韻自大小分隸真草以至於外蕃書及國朝蒙古新字靡不收録題曰華夏同音至正壬午中書奏修三史以翰林待制聘先生起至武林辭疾不行盤桓久之浙省平章喀喇子山公庫庫時来訪一日語及聲律之學因問國字何以用可侯此喉音也有音無字字為首先生曰正如嬰兒初堕地時作此一聲乃得天地之全氣也平章甚説服水畜陶朱公養魚經曰夫治生之法有五水畜第一水畜魚也此二字亦竒纒足張邦基墨莊漫録云婦人之纒足起於近世前世書傳皆無所自南史齊東昏侯為潘貴妃鑿金為蓮花以帖地令妃行其上曰此歩歩生蓮花然亦不言其弓小也如古樂府玉臺新咏皆六朝詞人纎艶之言𩔖多體狀美人容色之姝麗及言妝飾之華眉目唇口要支手指之𩔖無一言稱纒足者如唐之杜牧之李白李商𨼆之輩作詩多言閨幃之事亦無及之者韓偓香奩集有咏屧子詩云六寸膚圓光緻緻唐尺短以今校之亦自小也而不言其弓惟道山新聞云李後主宫嬪窅娘纎麗善舞後主作金蓮髙六尺飾以寳物細帶纓絡蓮中作品色瑞蓮令窅娘以帛繞脚令纎小屈上作新月狀素韈舞雲中回旋有凌雲之態唐鎬詩曰蓮中花更好雲裏月長新因窅娘作也由是人皆效之以纎弓為妙以此知札脚自五代以来方為之如熈寜元豐以前人猶為者少近年則人人相效以不為者為耻也溺水不躍漳州龍溪縣澳里人陳端才之妻蔡氏三玉後至元間本處㓂起掠其里里媪集里中婦女同舟避難㓂追及三玉亟以水漬衣㓂視三玉有姿色欲先汙之三玉紿曰衣濕更求衣間㓂取衣投水死㓂曰溺者必躍以長竿絡鈎俟其躍而舉之屍竟不躍㓂退三玉之父端廣舟次上流屍遂逆流附父舟捭之不去移舟遡河而上屍從之上者三父異甚視則其女也夫三玉一婦人耳寧死不辱出於天性宜其貞爽不昧如此鎻陽韃靼田地野馬或與蛟龍交遺精入地乆之發起如笋上豐下儉鱗甲櫛比筋脉連絡其形絶𩔖男陰名曰鎻陽即肉從容之𩔖或謂里婦之滛者就合之一得陰氣勃然怒長土人掘取洗滌去皮薄切曬乾以充藥貨功力百倍於從容也輥吝諞三卦淮南潘子素純嘗作輥卦譏世之仕宦人以突梯滑稽而得顯爵者雖曰資一時之謔浪調笑不為無補於名教卦辭曰輥亨可小事亦可大事􅂏曰輥亨天地輥而四時行日月輥而晝夜明上下輥而萬事成輥之時義大矣哉象曰地上有木輥君子以容身固位初六輥出門無咎象曰出門便輥又何咎也六二傳於銕轊象曰傳於銕轊天下可行也六三君子終日輥輥厲無咎象曰終日輥輥雖危無咎也九四模稜吉象曰模稜之吉以隨時也六五神輥象曰六五神輥老於事也上六或錫之髙爵天下揶揄之象曰以輥受爵亦不足敬也此篇或者又謂自宋末即有非潘所造未審是否後平江蔡宗魯衛作吝卦爻配之曰吝亨利居閒不利有所為􅂏曰吝鄙嗇也利居閒無所求也不利有所為恐致禍也初六居富吝於周急悔亡無攸利象曰吝於周急不恤其貧也悔亡無攸利己終有望也六二聽婦言至吝不養其親不恤其弟貞凶象曰聽婦言昵於私也不養其親忘大恩也不恤其弟失大義也雖養弗時亦致災也故貞凶九三極吝吝其財不吝其身於行非宜象曰吝其財斯致富也不吝其身乃輕生也六四太吝君子吉小人凶象曰吝於君子雖有言無尤也吝於小人雖不有言終有悔也六五不吝於色務所欲終以死亡凶朋來吝於酒食弗克歡無咎象曰不吝於色惑於淫也務所欲樂其順從也終以死亡凶可知也朋来從其𩔖也吝於酒食誠大謬也雖弗克歡而無咎也上九居其家不吝於内吝於教子弗叶吉象曰居其家妄自尊也不吝於内畏寡妻也吝於教子終無所成也近扶風馬文璧琬又作諞卦曰諞貞亨初吉終凶利見小人不利於君子􅂏曰貞正也亨通也通乎正言諞或庶幾也終凶諞不由初也利見小人猶同𩔖也不利於君子入於邪也象曰麗口掉舌諞君子以求名干禄初九諞於同朋無咎象曰同朋於諞又誰咎也九二略施於民吉象曰九二之吉以新衆聽也六三来其諞酒食用享象曰来其諞民取則也享其酒食以崇功也九四飾言如簧以娛彼心用獲南金象曰娛人獲金不足道也九五君子終日髙諞王用徴安車以迎終嵗弗寜後有凶象曰以諞受徴不羞也終嵗弗寧祗足煩勞也後有凶不副實也上六莾諞不已四方欲殺之象曰莾諞衆怒殺之何過也右三卦切中時病真得風刺之正因併録之烏蜑戸廣東采珠之人懸絙於腰沉入海中良乆得珠撼其絙舶上人挈出之𦵏於黿鼉蛟龍之腹者比比有焉有司名曰烏蜑戸蜑音但仁宗登極特㫖故免時敬公戴卿為江西行省叅知政事俾該管掾史立案令廣東帥府抄具烏蜑戸一一籍貫姓名置册申解他省官曰中書咨文無是恐不必也公曰萬一乃申明舊典庶不害及良民未幾太后中使至人咸服公先見之明重臺凡婢役於婢者俗謂之重臺按左氏傳昭公五年日之數十故有十時亦當十位自王以下其二為公其三為卿注云日中為王食時為公平旦為卿鷄鳴為士夜半為皂人定為輿黄昏為𨽻日入為僚晡時為僕日昳為臺㬂日中出闕不在第等王公曠其位又昭公七年天有十日人有十等故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣臺則所謂臺者十等之至卑今豈亦本是與然加以重字尤有意日子文選曹公檄吳將校部曲文年月朔日子注發檄時也輟耕録卷十欽定四庫全書輟耕録巻十一元陶宗儀撰寫像秘訣王思善繹自號癡絶生其先睦人居杭之新門篤志好學雅有才思至正乙酉間檇李葉居仲廣居寓思善之東里教授余從永嘉李五峯先生孝光往訪之時思善在諸生中年方十二三已能丹青亦能寫真先生即俾作一圓光小像面部僅大如錢而宛然無毫髪異先生喜作文以華之爾後余復託交於其尊人日華曅遂與思善為忘年友思善繼得吳中顧周道逵緒言開發益造精㣲是故於小像特妙非惟貎人之形似抑且得人之神氣嘗授余秘訣并采繪法今著於此與好事者共之凡寫像須通曉相法盖人之面貎部位與夫五嶽四瀆各各不侔自有相對照處而四時氣色亦異彼方呌嘯談話之間本真性情發見我則静而求之黙識於心閉目如在目前放筆如在筆底然後以淡墨覇定逐旋積起先蘭臺廷尉次鼻凖鼻凖既成以之為主若山根髙取印堂一筆下来如低取眼堂邊一筆下来或不髙不低在乎八九分中則側邊一筆下来次人中次口次眼堂次眼次眉次額次頰次髪際次耳次髪次頭次打圏打圏者面部也必宜如此一一對去庶幾無纎毫遺失近代俗工膠柱鼓瑟不知變通之道必欲其正襟危坐如泥塑人方乃傳寫因是萬無一得此又何足怪哉吁吾不可柰何矣采繪法凡面色先用三朱膩粉方粉藤黄檀子土黄京墨合和襯底上面仍用底粉薄籠然後用檀子墨水斡染面色白者粉入少土黄燕支不用臙脂則三朱紅者前件色入少土朱紫堂者粉檀子老青入少臙脂黄者粉土黄入少土朱青黒者粉入檀子土黄老青各一㸃粉薄罩檀墨斡已上看顔色清濁加減用又不可執一也口角燕支淡如要帶笑容口角兩筆畧放起眼中白染瞳子外兩筆次用煙子㸃睛墨打圏眼梢㣲起有摺便笑口唇上臙脂驀鼻色紅臙脂㣲籠面雀斑淡墨水斡麻檀水斡髯色黒者依􅁂髪渲紫者檀墨間渲黄紅者藤