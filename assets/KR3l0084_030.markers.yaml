  - {type: variant, offset: 5, length: 0, content: '', WYG: 撰四位配享封爵顔子唐𤣥宗太極元年壬子二月贈太子太師配享孔子廟宋真宗大中祥符二年己酉四月封兖國公曽子同前贈太子太保配享孔子廟宋理宗咸淳三年癸卯二月封郕國公配食大成殿子思宋度宗咸淳三年丁卯二月封沂國公配食大成殿孟子宋神宗元豐七年甲子五月追封鄒國公配享先聖位次兖國公下宋黄震云徃嵗顔孟配享並列先聖左近升曽子子思又並列先聖左而虚其右不以相向震聞太學博士陸鵬舉云初制顔孟配享左顔而右孟熈豐新經盛行以王安石為聖人没而躋之配享位顔子下故左則顔子及安石右則孟子未幾安石女壻蔡卞當國謂安石不當在孟子下遷安石於右與顔子對而移孟子位第三次顔子之下遂左列顔孟而右列安石又未幾蔡卞再欲升安石壓顔子漸次而升為代先聖張本優人有以藝諫於殿下者設一大言之士戯薄先聖顔子出爭之不勝子貢出爭之不勝子路出而盛氣爭之又不勝然後設為公冶長有繫其首而叱之曰汝何不出一爭且看他人家女壻盖蔡卞安石壻而公冶長先聖壻也蔡卞聞之遂不敢進安石於顔子上顔孟左而安石右遂為定制南渡後安石罷配享宜遷孟子以對顔子如舊制議者失於討論故安石既去其右遂虚而顔孟並列於左岳珂嘗記其事近嵗増曽子子思又並列於左亦未有討論者金果成都府江瀆廟前有樹六株世傳自漢唐以来即有之其樹高可五六十丈圍約三四尋挺直如矢無他柯榦頂上纔生枝葉若㯶櫚狀皮如龍鱗葉如鳳尾實如􅀥而加大每嵗仲冬有司具牲饌祭畢然後采摘金鼓儀衛迎入公􅅟差㸃醫工以刀逐箇劙去青皮石灰湯焯過入熬熟冷􅁡浸五七日漉起控乾再換熟􅁡如此三四次却入瓶缶封貯進獻不如此修製則生澁不可食泉州萬年􅀥三株識者謂即四川金果也畨中名為苦魯麻􅀥盖鳳尾蕉也李哥貞烈河南理幕沈易云灞州倡女李哥年十二三時母教之歌舞哥泣曰女率有工繄我獨為此乎母告以業不可廢哥曰若此聽母母亦當從我好否則有死而已母陽許之因是不粉澤不茹葷所歌多仙曲道情有召者必先詢主客姓名然後徃人亦預相戒毋戯狎哥凝立筵前酒行歌闋目不流盼與之酒弗飲州判官嘗忤哥徑還誓不與見孟津縣達嚕噶齊厚賂哥母夜抵舍哥懐利刃閉臥内罵之曰汝職在牧民而狗􅇾之不若可急去不且血汙吾刃矣慚怒以囘明日知州聞之嘆曰州有貞女而吾不知是一失也吾次子明經舉秀才真若配以禮聘娶之未幾紅巾入㓂夫婦被執見哥妍麗將殺其夫哥走前抱夫項大呼曰吾斷不從汝求活㓂并殺之劉節婦劉節婦冀之衡水人通古文孝經小學書適同郡曹泰財紅巾䧟河朔因避兵聊城村賊掩至大掠見節婦居羣人中特妍整持刀驅之行節婦曰吾婦人惟知從夫而已不從賊也賊欲移其心乃盛陳金玉珠璣仍用錦繡衣服被節婦身節婦裂碎之强擁上馬墮地者數四賊怒繩其項就馬上曵之節婦以手􅎲地以頭觸石流血罵賊不絶聲遂遇害病潔毘陵倪元鎮有潔病一日眷歌姬趙買兒留宿别業中心疑其不潔俾之浴既登榻以手自項至踵且捫且嗅捫至隂有􅁾氣復俾浴凡再三東方既白不復作巫山之夢徒贈以金趙或自談必至絶倒雜劇曲名稗官廢而傳竒作傳竒作而戲曲繼金季國初樂府猶宋詞之流傳竒猶宋戲曲之變世傳謂之雜劇金章宗時董解元所編西廂記世代未逺尚罕有人能解之者况今雜劇中曲調之冗乎因取諸曲名分調類編以備後來好事稽古者之一覽云正宫端正好衮繡毬倘秀才脱布衫小梁州朝天子四換頭十二月堯民歌收尾叨叨令醉太平呆古朶笑和尚蠻姑兒伴讀書剔銀燈道和柳青娘雙鴛鴦攤破滿庭芳月照庭塞鴻秋白鶴子中吕出入快活三中吕出入黄鍾願成雙醉花隂喜遷鶯出隊子刮地風四門子神伏兒挂金索水仙子興龍引金殿樂三臺侍香金童降黄龍衮塞鴈兒接接高南吕一枝花梁州第七賀新郎牧羊關隔尾紅芍藥菩薩梁州三煞罵玉郎感皇恩采茶歌隨煞尾鬭蝦䗫四塊玉哭皇天烏夜啼隔尾黄鍾煞攤破采茶歌楚天秋隔尾隨煞中吕粉蝶兒醉春風迎仙客石榴花鬬鵪鶉上小樓快活三正宫出入鮑老兒般渉哨遍耍孩兒收尾紅繡鞵喜春來堯民歌滿庭芳鮑老來醉高歌十二月普天樂呌聲雙鴛鴦白鶴子正宫出入窮河西朝天子乾荷葉剔銀燈菩薩蠻墻頭花喬捉蛇鶻打􅇠酥􅀥兒鎮江囘鵪鶉兒鴛鴦兒風流體賣花聲蔓菁菜仙吕賣花時㸃絳唇油葫蘆天下樂那叱令鵲踏枝六么序后庭花青哥兒賺煞混江龍金盞兒醉中天村里迓鼓元和令上馬嬌聖葫蘆江西後庭花柳葉兒寄生草賺煞尾攤破天下樂醉扶歸低過金盞兒八聲甘州遊四門賺尾憶王孫一半兒得勝樂雁兒祅神急翠裙腰六么遍大安樂柳葉兒商調集賢賔逍遥樂梧葉兒後庭花雙雁兒金菊香浪來里醋葫蘆青哥兒上京馬隨調煞柳葉兒仙吕出入黄鶯兒踏莎行垂絲釣盖天旗大石青杏子好觀音六國朝念奴嬌歸塞北初問口怨離别擂鼓體雁過南樓憨郭郎催拍子玉翼蟬荼䕷香女冠子林里雞近驀山溪喜秋風淨瓶兒鷓鴣天雙調新水令駐馬聽甜水令折桂令落梅風沉醉東風小將軍清江引碧玉簫鴈兒落徳勝令喬牌兒掛玉鈎川撥棹殿前歡七弟兄梅花酒收江南水仙子滴滴金鴛鴦煞歩歩嬌攪箏琶豆葉黄風入松撥不斷慶東原沽美酒太平令一錠銀荆湘怨阿納忽夜行船鎮江囘中吕出入胡十八掛玉鈎序伍供養行香子梧桐樹離亭宴煞鴛鴦兒煞尾太平歌十棒鼓小婦孩兒挂打燈喬木查蝶戀花慶宣和棗卿調石竹子山