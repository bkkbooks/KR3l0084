  - {type: variant, offset: 0, length: 2, content: 南村, WYG: 命館臣録存楊維楨正統辨諭元楊維楨著宋遼金正統辨大㫖以元承宋統而排斥遼金其文不見本集惟陶宗儀}
  - {type: page-break, offset: 0, content: '', id: KR3l0084_WYG_000-1a, image: WYG1040/WYG1040-0409a.png}
  - {type: variant, offset: 5, length: 1, content: 叙, WYG: 載之今館臣編輯四庫全書謂其持論紕繆並輟耕録内所載者亦與刪除且言隋先代周繼乃平陳未聞唐宋諸儒謂隋承陳不承周也此語似是而非葢嘗論之春秋大一統之義尊王黜霸所以立萬世之綱常使名正言順出於天命人心之正紫陽綱目義在正統是以始皇之廿六年秦始繼周漢始於髙帝之五年而不始於秦降之嵗三國不以魏吳之强奪漢統之正春秋之義然也楊維楨撰三史正統辨凡二千六百餘言義本春秋法宗綱目其欲以元繼南宋為正統而不及遼金持論頗正不得謂之紕繆夫維楨身為元臣入明雖不仕而應明太祖之召且上鐃歌鼓吹曲頌美新朝非刺故國幾於劇秦美新其進退無據較之錢謙益託言不忘故君者鄙倍尤甚向屢於詩文中斥之而維楨正統之辨則不可以人廢言也夫正統者繼前統受新命也東晉以後宋齊梁陳雖江左偏安而所承者晉之正統其時若拓跋魏氏地大勢强北齊北周繼之亦較南朝為盛而中華正統不得不屬之宋齊梁陳者其所承之統正也至隋則平陳以後混一區宇始得為大一統即唐之末季藩鎮擾亂自朱温以訖郭威等或起自冦竊或身為叛臣五十餘年之間更易數姓甚且稱臣稱姪於契丹然中國統緒相承宋以前亦不得不以正統屬之梁唐晉漢周也至於宋南渡後偏處臨安其時遼金元相繼起於北邉奄有河北宋雖稱姪於金而其所承者究仍北宋之正統遼金不得攘而有之也至元世祖平宋始有宋統當絶我統當續之語則統緒之正元世祖已知之稔矣我皇祖御批通鑑及朕向所批通鑑輯覽俱以此論定葢春秋大義綱目大法實萬世不易之凖我朝為明復讐討賊定鼎中原合一海宇為自古得天下最正然朕猶於通鑑輯覽内存福王建國之號一年使其能保守南都未嘗不可如南宋之承統綿延不絶而奈其當陽九之運天弗與人弗歸自覆其宗社也此實大公至正天下萬世可以共見共守之論然館臣之刪楊維楨正統辨者其意葢以金為滿洲欲令承遼之統故曲為之説耳不知遼金皆自起北方本無所承繼非若宋元之相承逓及為中華之主也若以此立論轉覺狹小天下萬世必有起而議之者是不可以不辨朕以為不但輟耕録中所載楊維楨之正統辨不必刪除即楊維楨文集内亦當補録是編並將此諭各載卷首以昭天命人心之正以存春秋綱目之義特諭乾隆辛丑孟春欽定四庫全書子部十二輟耕録小説家𩔖一雜事之屬提要臣等謹案輟耕録三十巻元陶宗儀撰宗儀有國風尊經已著録此書乃􅇎記聞見瑣事前有至正丙午孫作序書中稱明兵曰集慶軍或曰江南游軍葢丙午為至正二十七年猶未入明時所作也郎瑛七修𩔖稿謂宗儀多録舊書如廣客談通本録之率皆攘為己作今其書未見𫝊本無由證瑛説之確否但就此書而論則於有元一代法令制度及至正東南兵亂之事紀録頗詳所考訂書畫文藝亦多足備㕘證惟多􅇎以俚俗戲謔之語閭里鄙􅁾之事頗乖著作之體葉盛水東日記深病其所載猥䙝良非苛論然其首尾賅貫要為能留心於掌故故朱彛尊靜志居詩話謂宗儀練習舊章元代朝野舊事實借此書以存而許其有禆史學則雖瑜不掩瑕固亦論古者所不廢矣惟第三卷中載楊維楨正統辨二千六百餘言大㫖欲以元承南宋之統而排斥遼金攷隋先代周繼乃平陳未聞唐宋諸儒謂隋承陳不承周也持論殊為紕繆後維楨編東維子集不載此文葢已自悟其謬而削之宗儀乃掇拾縷載尤為寡識今刪除此條用昭公義焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀輟耕録序}
