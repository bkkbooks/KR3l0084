  - {type: variant, offset: 289, length: 295, content: 君九成著書三十卷凢六合之内朝野之間天理人事有関於風化者皆采而録之非徒作也然又能不忘稼穡艱難盖有取於聖門餒在其中禄在其中之㫖乃名之曰南村輟耕録朋㳺間咸欲為之版行以備太史氏采擇而未有倡首之者於是僣為䟽引以伸其意同志之士有觀其書者必皆樂聞而興起焉伏以兒寛帯經而鉏名髙前史陶亮既耕還讀教及後昆頋服田力穡乃士之常然著書立言於世為重比覩輟耕之録實為載道之文凢例既明書法尤備鈎玄提要匪按啚索驥之空言攷古驗今得閉户斵輪之大意盍亦寫諸琬琰庻可緝于簡編惟鏤板乃見全書在司帑當無難色同門曰明合志曰友幸慫慂以相成副墨之子洛誦之孫共流傳於不朽學海之波瀾無障研田之稼穡有秋謹䟽今月日䟽青溪野史邵亨貞南村輟耕録總目卷之一, WYG: 宗儀撰}
