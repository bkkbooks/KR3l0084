  - {type: variant, offset: 4224, length: 558, content: 巳凡男女締姻者兩家相謂曰親家此二字見唐蕭嵩傳今北方以親字為去聲按盧綸作王駙馬花燭詩云人主人臣是親家則是亦有所祖親家又曰親家翁五代史劉昫傳昫與馮道為姻家而同為相道罷李愚代之愚素惡道之為人凡事有稽失者愚必指以誚昫曰此公親家翁所為蘇氏開談録馮道與趙鳯同在中書鳯有女適道中子以飲食不中為道夫人譴罵趙令婢長號知院者来訴凡數百言道都不荅及去但云傳語親家翁今日好雪右此石是南唐寳石乆為吾齋研山今𬒳道祖易去中羙舊有詩云研山不易見移得小翆峯潤色裛書几隱約烟朦朧巉岩自有古獨立髙崧巃安知無雲霞造化與天通立璧照春野當有千丈松﨑嶇浮波瀾偃仰蟠蛟龍蕭䔥生風雨儼若山林中塵夢忽不到觸目萬慮空公家富竒石不許常人同研山出層碧峥嵘實天工淋漓上山泉滳瀝助毫端揮成驚世文主意皆逢原江南秋色起凨逺洞庭寛往往入佳趣揮􅣁出妙言碩公珍此石羙與衆物肩何必嵩少隱可蔵為地仙余每誦此詩必懐此石近余亦有作云研山不復見哦詩從嘆息唯有玉蟾蜍向余頻唳滴此石一入渠手不得再見每同交友徃觀亦不出示紹彭公真忍人也余今筆想成圖彷彿在目從此吾齋秀氣尤不復泯矣崇寕元年八月望米芾書余二十年前嘉興呉仲圭為畫啚錢唐呉孟思書文後擕至吴興燬千兵偶因清睱黙懐徃事漫記于此翰墨志云衛夫人名鑠字茂漪晋汝隂太守李矩妻善鍾法能正書入妙王逸少師之西溪藂語云夫人廷尉展之弟恒之從妹中書郎李充之母南村輟耕録卷之六, WYG: 已}
