  - {type: variant, offset: 3174, length: 0, content: '', WYG: 㢘使長厚徐文獻公為浙西㢘使時治所尚在平江有㫖遷置於杭嵗云莫矣擇日啓行一書吏者掌照刷支郡諸司案牘官吏合受稽違罪責已皆取狀至是引決公謂曰正旦在邇此曹乃職官俸吏禮宜陪位望闕致賀受刑而從事無耻也否則為不敬盍别議之吏以白於幕官因進曰相公長厚之道固如此然將若之何公曰奚難立案候明年分司施行可也庭下歡聲如雷此亦厚風化之一端故記之私第延賔公既遷司至杭一日有本路總管與一萬戸謁公私第公以賔禮延之上坐適書吏從外来見而趍避伺其退入見曰總管萬户皆屬官耳得無禮貎之過與公曰在公府則有尊卑之辨若私宅須明主客之分我輩能㢘介則百司自然知懼何待恃威埶以驕凌之然後為尊嚴乎吏赧甚句曲山房熟水句曲山房熟水法削沉香釘數箇揷入林禽中置缾内沃以沸湯宻封缾口乆之乃飲其妙莫量吾竹房先生}
