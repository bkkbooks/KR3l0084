  - {type: variant, offset: 1, length: 1, content: 村, WYG: 唐寳石乆為吾齋研山今被道祖易去中美舊有詩云研山不易見移得小翠峯潤色裛書几𨼆約煙朦朧巉巖自有古獨立髙崧巃安知無雲霞造化與天通立壁照春野當有千丈松﨑嶇浮波瀾偃仰蟠蛟龍蕭蕭生風雨儼若山林中塵夢忽不到觸目萬慮空公家富竒石不許常人同研山出層碧崢嶸實天工淋漓上山泉滴瀝助毫端揮成驚世丈主意皆逢原江南秋色起風逺洞庭寛往往入佳趣揮掃出妙言願公珍此石美與衆物肩何必嵩少𨼆可藏為地仙今每誦此詩必懐此石近余亦有作云研山不復見哦詩徒嘆息唯有玉蟾蜍向余頻淚滴此石一入渠手不得再見每同交友往觀亦不出示紹彭公真忍人也余今筆想成圖彷彿在目從此吾齋氣秀尤不復泯矣崇寜元年八月望米芾書余二十年前嘉興吳仲圭為畫圖錢唐吳孟思書文後携至吳興燬於兵偶因清暇黙懐往事漫記於此衛夫人翰墨志云衛夫人名鑅字茂漪晉汝隂太守李矩妻善鍾法能正書入妙王逸少師之西溪藂語云夫人廷尉展之弟恒之從妹中書郎李充之母親家凡男女締姻者兩家相謂曰親家此二字見唐蕭嵩𫝊今北方以親字為去聲按盧綸作王駙馬花燭詩云人主人臣是親家則是亦有所祖親家又曰親家翁五代史劉昫傳昫與馮道為姻家而同為相道罷李愚代之愚素惡道之為人凡事有稽失者愚必指以誚昫曰此公親家翁所為蘇氏開談録馮道與趙鳳同在中書鳳有女適道中子以飲食不中為道夫人譴罵趙令婢長號知院者来訴凡數百言道都不荅及去但云傳語親家翁今日好雪梵嫂唐鄭熊番禺雜記廣中僧有室家者謂之火宅僧宋陶榖清異録京師大相國寺僧有妻曰梵嫂房老王子年拾遺記石季倫有妾名翔風及色衰退為房老}
