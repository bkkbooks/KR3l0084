  - {type: variant, offset: 0, length: 5135, content: 南村輟耕録卷之二十九天台陶宗儀九成張士誠第九四淮南泰州白駒塲人泰州地濵海海上塩塲三十有六隷两淮運塩使司士誠與弟士義士徳士信並駕運塩綱船兼業私販初無異扵人先是中書省右丞相脫脫在任災異疊見黄河變遷至正十一年遣工部尚書賈魯役民夫一十五萬軍二萬决河故道民不聊生河南韓山童首事作亂以弥勒佛出世爲名誘集無頼悪少燒香結㑹漸致滋蔓䧟淮西諸郡継而湖廣江西荆襄等䖏皆淪賊境山東杜遵道以李氏子爲主起汝寕蕭縣李二老彭張君用攻䧟徐州李二號芝麻李鄒普勝徐夀輝即真一㩀蘄黄鎮南班㩀江東又有毛貴陳友諒輩不可枚數分㩀各䖏方國珍弟兄嘨聚台州海上朱定一陳賢五江宗三作亂江隂初王克柔者亦泰州人家富好施多結游俠将為不軌髙郵知府季齊收捕于獄李華甫與䞛張四素感克柔恩謀聚衆劫獄齊以克柔觧發楊州後招安華甫為㤗州判四為千夫長十三年五月士誠又與華甫同謀起事未幾士誠黨與十有八人共殺華甫遂併其衆焚掠村落驅民為盗䧟通泰髙郵自號誠王改元天祐設官分職把截要衝南北梗塞立淮南中書省扵楊州以阨其勢既而亦招安之立義兵元帥府以官其黨然徂詐百出卒不就降殺知府李齊十五年五月攻破楊州路殺淮南行省叅政趙璉士義𬒳獲伏誅既而退還髙郵至九月二十五日又攻破楊州適湖廣行省右丞阿魯恢引苗軍來十月𥘉一日復退丞相脫脱親捴大軍以擒之衆號百萬旌旗輜重首尾千里以為髙郵刻日可平然脫脱與弟御史大夫也先帖木児專權日乆及出師遂有議其後者詔脫脫安置淮安路也先帖木児安置寕夏路别選相臣統其兵詔未下時部将董摶霄毎對脫脫言天兵南下勢如破竹今老師費財何面目歸報天子不若先攻其易脫脫從其言分兵破天長六合賊皆潰散所殺者悉良民及攻髙郵隳其外城城中震恐自分亡在旦夕忽聞詔觧其權勇氣百倍岀城拒敵諸衞鐵甲軍抱不平者盡皆散去或相聚山林為盜髙郵不可得而復矣江隂群㓂互相吞啖江宗三朱英分黨戕殺宗三将入城殺英州之僚佐無如之何遂申白江浙行省云朱英謀反省差元帥觀孫壓境觀孫利其貨賂逗遛不進英因乗間挈家逸去過江求救扵士誠仍質妻子借兵復讎士誠𥘉亦疑惑弗聼英盛陳江南土地之廣錢糧之多子女玉帛之富以動其中於是先遣士徳率髙郵賦衆擊橫坍渡福山十六年正月朔攻破常熟州江南自兵興以来官軍死鋒鏑郡縣荐罹饑饉郷村農夫離父母棄妻子投充壮丁生不習兵而驅之死地以故烏合瓦觧卒無成功江浙行省丞相逹識帖木児有旨得便冝行事陞漕運萬戸脱因為叅政統領官軍民義捍禦境上平江逹魯花赤六十病亡陞松江府逹魯花赤哈散沙為平江達魯花赤領兵出戰除都水庸田使貢師泰為平江摠管巡守城池呉江境上止有元帥王與敬官軍一戦而敗死者過半殘兵千餘欲走入城城中閑門不納退屯嘉興旋抵松江士誠賊衆纔三四千人長軀而前直造北門弓不發矢劒不接刃明旦縁城而上遂㩀有平江路二月壬子朔也刼掠姦殺慘不忍言脫因匿俞家園自刎不死㳺兵殺之哈散沙在境外聞城破自溺死既時崑山嘉定崇明州人相継来降維楊蘇昌齡比先避亂居呉門士徳用為叅謀稱曰蘇學士毀承天寺佛像為王宫易平江路為隆平郡立省院六部百司凡有寺觀菴院豪門巨室将士爭奪分占而居了無虚者㡬月進攻嘉興全師覆沒與敬㩀松江叛以城降常州豪侠黄貴甫問道歸欵許為内應不戦而城破易爲毗陵郡分兵入湖州一鼓而得易爲吳興郡隆平太守周仁家本鍜工稍習吏事性資深刻與士徳同心僇力躬親細故三月癸巳士誠来自髙郵服御器用皆假乗興改至正十六年爲天祐三年國號大周暦曰明時設學士員開弘文館以隂陽術人李行素爲丞相弟士徳爲平章提調各郡兵馬蔣輝爲右丞鎮呉興史文炳爲樞宻院同知鎮松江郡州縣正官郡稱太守州稱通守縣仍曰尹郡同如稱府丞知事曰從事餘則損益而巳南向欲取嘉興嘉興則有叅政楊完者統領苗獠猺撞名曰答刺罕守禦甚堅屢攻不克秋八月文炳大舉兵臨其東門悉為所殱文炳僅以身免士徳又與與敬提兵入杭州軍器甚銳杭州大軍歛鋒不敵丞相退避蕭山士徳軍檢刮虜掠羅木營萬户普賢奴乃慶元路萬戸金駒児之子年未弱冠智勇過人率兵先出完者部領苗軍継進民亦挺身巷戦士徳大潰收拾殘兵十喪八九及攻海塩又為乍浦鍾氏所撓後得馬道驍勇擒獲苗軍無筭西南接境頼此無虞不然松江非士誠有矣崑山數為方國珍海軍攻擊託丁氏徃来說合結為婚姻崑山之民幸遂蘇息湖之長興武康與廣徳相界花鎗軍出沒之地雖互有勝負然亦不勝其苦所跨三州皆隣勍敵可畏者特集慶一軍盛陸路則無錫宜興長興水路則太湖士馬震耀舳艫相衘自後長興䧟常州又䧟士徳戦敗𬒳擒縛致集慶俾其作書勸士誠歸附士徳以身徇之終無降意士誠勢竆力迫願就丞相招安使者徃返訖莫成就仁親詣江浙省堂具陳自願休兵息民之意議始定時十八年秋八月也朝廷詔赦其罪後授士誠太尉開府平江士誠以下授爵有差立江淮分省江浙分樞宻院于平江以設其官属道家者流爲人典行醮事曰髙功其有行業精白者則必移檄南岳魏夫人請借仙鶴或二隻或四隻青鸞導衛翔鶩澄空昭揚道妙徃住親見之偶讀本草有云降真香出黔南伴和諸雜香燒煙直上天召鶴得盤旋於上注按仙傳云燒之或引鶴降醮星辰焼之甚爲第一度籙燒之功力極驗若然則鶴之来香所致也非歟長編所載宋二十一帝盖自順宣僖三祖及太祖太宗真仁英神哲徽欽髙孝光寕理度少帝并端宗帝昺也吾衍子行間居録云舜生諸馮及馮婦等皆音皮氷切古不音符容切也馮婦與徐夫人皆男子三國時有暨艶乃吳人附陸抗傳當音結不音暨也條侯周亞夫自未侯為河内守時許負相之曰君後三歲而侯見史記絳侯傳註謂索隠曰應劭云負河內温人老嫗也按楚漢春秋髙祖封負為鳴雌侯是知婦人亦有封邑趙公琪字元徳官至贈湖廣行省叅政謚文惠臨淄人飄然有神仙思常使方士燒水銀硫黄朱砂黃金䓁物為神丹以資服食有玉溪李簡易先生者得道為神仙數訪公授以其術乆乆隠去人或以為不死公思之一日見其至喜而固之先生曰吾逺来甚熱請具浴公即具浴先生就浴室乆之不聞聲日且暮公親候之見有光昱然在水上圓如初日出不復見先生所在先生書蔵公家今稍稍傳人間虞文靖序其事如此云甞讀金黄華老人詩有招客先開四十雙之句殊不可暁近讀雲南雜誌曰夷有田皆種稲其佃作三人使二牛前牽中壓而後驅之犁一日為一双以二乏為已二已為角四角為双約有中原四畝地則老人之詩意見矣骨咄犀蛇角也其性至毒而能觧毒盖以毒攻毒也故曰蠱毒犀唐書有古都國必其地所産今人訛為骨咄耳奉化陳氏婦以貞節稱者五人初陳元娶竺氏生子侗而元卒笁氏年纔二十二義不再適後三十三年卒侗娶璩氏生子瑞泰二人侗亦以疾夭璩氏年二十六後五十八年卒瑞娶王氏生子通甫而瑞復夭王氏年三十後五十五年卒通甫娶樓氏樓氏甫笄歸于陳至二十六而寡父母欲奪其志泣下從其姑王氏年老樓氏事之尤謹姑卒斂葬悉如禮子四人長飬才娶樓氏生子孟雍孟熈而飬才遘疾不逾方卒時樓氏年二十六所守如其姑云隴西李子平氏子茂徳聘同郡張氏女年十七歸李氏生子庸甫六歲而寡舅姑憐其少也欲嫁之使左右風之即引刀截髮以見志乃止荗徳之弟仲徳亦蚤卒其妻張氏年二十有八生子慶方齓亦誓不再適從弟希賢妻陳氏年二十有四希賢卒時其子度方孕四月守志益堅一門三婦以貞白聞庸至正間任至同知濟南路捴管府事推恩贈父同知益州路摠管府事隴西郡伯毋封隴西郡夫人再調關襄宣慰階中奉大夫而夫人始卒黄龍洞在呉興郡北去城闉廿里枕太湖其山皆怪石林立中有一石最尊上大其本小危立如幢自石上湧起輕撼則揺動稍加力排輒不動人甚異之洞旁壁立千仞頫瞰不能見底投以石下應以聲呼則相答深窅不測每歲旱郡民禱之東坡先生曽遊題詩述龍之迹山谷先生書黄龍洞三字刻猶存王古心先生筆録内一則云方外交青龍鎮隆平寺主蔵僧永光字絶照訪予觀物齋時年巳八十有四話次因問光前代蔵經接縫如一線歲乆不脫何也光云古法用楮樹汁飛麫白芨末三物調和如糊以之黏接紙縫永不脫觧過如膠􅃮之堅先生上海人人欲娶妻而未得謂之㝷河覔井已娶而料理家事謂之擔雪填井男婚女嫁財禮奩具種種不可闕謂之投河奔井凡納婢僕初来時曰擂盤珠言不撥自動稍乆曰筭盤珠言撥之則動既乆曰佛頂珠言終日凝然雖撥亦不動此雖俗諺實切事情一錢太守劉寵廟在紹興錢清鎮王叙能叅政過廟下賦詩曰劉寵清名舉丗傳至今遺廟在江邉近来仕路多能者也學先生㨂大錢全真紀實云金主亮貞元元年有吏員咸陽人王中孚者倡全真教談馬丘劉和之其教盛焉章宗泰和四年元學士作紫微觀記所載詳悉馬伯傑山東邹縣人父某拜江南行臺監察御史不以家行傑獨與毋居盜起汝頴轉畧齊魯境傑負毋匿草間毋死倉卒不能具棺歛聚石葬鄆地西盜入鄆城傑伏于墓上衆欲驅而前脅以白刃傑大慟曰毋在此毋在此盗曰此孝子也乃舍之復遺以衣糧既而邑刳于兵失墓所在求之二年得於榛莾中故衣尚存始克遷祔祖塋御史轉浙西憲僉留江南者八年遂冒鋒鏑間走數千里省之錢唐人咸稱為馬孝子云天台金沙里女王静安年十七歸同邑楊伯瑞瑞為樞宻院断事官未㡬死于兵静安守節不嫁權貴争求之至截髮自剄不殊宋葉寘坦齋筆衡云陶器自舜時便有三代迄于秦漢所謂甓器是也今土中得者其質渾厚不務色澤末俗尚靡不貴金玉而貴銅磁遂有祕色窑器丗言錢氏有國日越州焼進不得臣庶用故云祕色陸龜蒙詩九秋風露越窑開奪得千峯翠色来如向中霄盛沆瀣共嵇中散闘遺桮乃知唐世巳有非始於錢氏本朝以定州白磁器有芒不堪用遂命汝州造青窑器故河北唐鄧耀州悉有之汝窑為魁江南則䖏州龍泉縣窑質頗麄厚政和間京師自置窑焼造名曰官窑中興渡江有邵成章提舉後苑號邵局􅊞故京遺製置窑于修内司造青噐名内窑澄泥為範極其精緻油色瑩徹為世所珍後郊壇下别立新窑比舊窑不侔矣餘如烏泥窑餘杭窑續窑皆非官窑比若謂舊越窑不復見矣上古無墨竹挺點漆而書中古方以石磨汁或云是延安石浪至魏晋時始有墨丸乃漆煙松煤夾和為之所以晉人多用凹心硯者欲磨墨貯瀋耳自後有螺子墨亦墨丸之遺製唐髙麗歲貢松煙墨用多年老松煙和麋鹿膠造成至唐末墨工奚超與其子廷珪自易水渡江遷居歙州南唐賜姓李氏廷珪父子之墨始集大成然亦尚用松煙廷珪𥘉名廷邽故世有奚廷珪墨又有李廷珪墨或有作庭珪字者偽也墨亦不精宋熈豊間張遇供御墨用油煙入腦麝金箔謂之龍香劑元祐間潘谷墨見稱扵時自後蜀中蒲大韶梁杲徐伯常及雪齋齊峯葉茂實翁彦卿等出世不乏墨惟茂實得法清黒不凝滯彦卿莫能及中統至元以来各有所傳可以倣古唐祖敏奚鼐易水奚鼏鼐之弟奚起鼏之子陳朗兖州王君得柴珣並唐末五代南唐李超鼐之子始居歙州南唐賜姓李氏李廷珪李廷寛李承宴超之子李文用承宴之子李惟慶李惟一李仲宣皆文用子耿遂仁歙州耿文政耿文夀皆遂仁子耿徳耿盛盛匡道宣州盛通盛眞盛舟盛信盛浩宋張遇潘衡蒲大韶欵曰書窓輕音煤佛帳餘韻葉世英嘗造徳壽宫墨朱知常欵曰朱知常香齊梁果徐知常葉邦憲甞造復吉殿墨雪齋欵曰雪齋墨寳李世英欵曰叢桂堂李丗英胡友直潘衡孫秉彛周朝式李丗英男克㳟樂温蒲彦輝劉文通郭忠厚鏡湖方氏黃表之齊峯劉士先甞造緝熈殿墨寓菴得李潘心法俞林丘謝東徐禧葉茂實三衢翁彦卿元潘雲谷清江胡文中長沙林松泉錢唐扵材仲宜興杜清碧武夷衞學士松江黃脩之天台朱萬𥘉豫章丘可行金溪丘丗英丘南傑皆可行子斵琴名手隋趙耴利唐雷霄雷威雷珏雷文雷迅郭亮一作諒皆蜀人沈鐐張鉞皆江南人金儒大中進士僧三慧大師宋蔡朱仁濟衛中正慶暦中道士趙仁濟興囯中馬希仁馬希先一作仙崇寧中金淵紹興𥘉金公路即金道紹㒷𥘉陳亨道髙宗朝嚴撙馬大夫梅四官人龔老應奉林杲東卿元嚴古清㳟字子安撙之孫梅四之壻施溪雲施谷雲施牧洲古琴名冰清春雷玉振黃鴣秋嘯鳴玉瓊嚮秋籟懐古南薫大雅松雪浮磬奔雷存古寒玉百衲響泉冠古韻磬渉深天球混沌材萬􅊤松雪夜冰玉澗鳴泉石上清泉秋塘寒玉九霄環佩至正丙申髙郵兵累攻嘉興不克或人撰戲語云史師一日下令行兵參謀掌史進言自古行師必先祭旗史曰王元師破松江時曽祭否荅曰不祭史曰王元師不祭我也不祭盖祭濟字音同傳以為笑又有一說紅軍與苗軍戰不勝禀主帥曰彼中軍前有十丈大旗旗上篆書大元統兵官五字帥曰我此間亦效之旗成軍吏禀所寫何字帥曰八分書寫趙王令既而冩趙字未成才冩得走字傳報苗軍到走走走二說皆可捧腹日家者流以日月五星及計羅炁孛四餘氣纏度過宫遅留伏逆推人之生年月日時可以知休咎定壽夭其書曰百中經經首有安命法曰周天宿度十二宫安命例凡十葉有術士以其例節為一葉簡明易見其法但看本生日太陽所躔何度便以本生時加在上向下逐宫虚數如下面已盡則又於此行自上而下見卯住即是此度安命真捷徑也泗州塔下相傳泗州大聖鎖水毋䖏繆也按地志云水神在臨淮縣龜山之下形若獼猴縮鼻高額青軀白首金目雪牙頸伸百尺力踰九象禹獲之鎖其頸扵龜山之足淮水乃安流注海迩来漁者知鎖所在古嶽瀆經云禹治水三至桐柏獲淮渦水神曰無支祁乃命庚辰制之鎖子龜山之足淮水乃安唐永泰初楚州有漁人夜釣山下其鈎為物所製沈水視之見大鐵鎖繞山足一獸形如青猿兀若昏醉涎沫腥穢不可近又東坡濠州塗山詩川鎖支祁水尚渾註程演曰異聞集載古嶽瀆經禹治水至桐柏山獲淮渦水神名曰巫支祁善應對辯淮之淺深源之逺近而神曰庚辰者鎖扵龜山之足淮乃安流唐時有漁者釣得一古鎖牽出其末有如猕候者盖此物也國史𥙷曰楚州漁人扵淮中釣得古銅鎖刺史李陽大集人力引之鎖窮有青獼猴躍出水而逝山海經水獸好為雲雨禹鎖扵軍山之下其名曰無支祁洞庭劉氏有夫葉正甫乆客都門因寄衣侑以詩云情同牛女隔天河又喜秋来得一過歲歲寄郎身上服絲絲是妾手中梭剪聲自覺和腸断線脚那能抵淚多長短只依先去様不知肥瘦近如何南村輟耕録卷之二十九, WYG: ''}
