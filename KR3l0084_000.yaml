body:
  text: 南村輟耕録敘余友天台陶君九成避兵三吳間有田一㕓家于松南作勞之暇每以筆墨自隨時時輟耕休于樹隂抱膝而嘆鼓腹而歌遇事肯綮摘葉書之貯一破盎去則埋于樹根人莫測焉如是者十載遂纍盎至十數一日盡發其藏㑭門人小子萃而録之得凡若干條合三十卷題曰南村輟耕録上兼六經百氏之旨下極稗官小史之談昔之所未考今之所未聞其採托之博侈于白帖研核之精擬于洪茟論議抑揚有傷今慨古之思鋪張盛美為忠臣孝子之勸文章制度不辨而明疑似根據可覽而悉蓋唐宋以來專門史學之所未讓雖周室之藏郯子之對有不待環轍而後知又豈抵掌談笑以求賢于優孟者哉九成名宗儀少工舉子業晚乃棄去闔戶著書此其一云至正丙午夏六月江隂孫作大雅序南村輟耕録疏南村田叟陶君九成著書三十卷凡六合之內朝野之間天理人事有關於風化者皆采而録之非徒作也然又能不忘稼穡艱難蓋有取於聖門餒在其中祿在其中之旨乃名之曰南村輟耕録朋遊間咸欲為之版行以備太史氏采擇而未有倡首之者於是僣為疏引以伸其意同志之士有觀其書者必皆樂聞而興起焉伏以兒寬帶經而鉏名髙前史陶亮既耕還讀教及後昆顧服田力穡乃士之常然著書立言於世為重比覩輟耕之録實為載道之文凡例既明書法尤備鈎玄提要匪按啚索驥之空言考古驗今得閉户斫輪之大意盍亦寫諸琬琰庶可緝于簡編惟鏤板乃見全書在司帑當無難色同門曰明合志曰友幸慫慂以相成副墨之子洛誦之孫共流傳於不朽學海之波瀾無障研田之稼穡有秋謹疏今月日疏青溪野史邵亨貞南村輟耕録總目卷之一大元世系列聖正統氏族平江南獨松關浙江潮宋興亡萬歲山大軍渡河檄朝儀科舉江南謡白道子官不致仕答刺罕皇族列拜內八府宰相云都赤大漢貴由赤昔寶赤卷之二聖聰隆師重道受佛戒減御膳聖儉后德端夲堂徵聘治天下匠以官為氏受孔子戒不食死染髭殺虎張御史舉薦切諌丁祭髙學士大黃愈疾置臺憲內御史署御令史臺字詔西畨五刑錢幣巴而思善諌使交趾刻名印國璽宣文閣占驗權臣擅政懷孟蛙賊臣攝祭叛黨告遷地土人作掾蕭先生端厚卷字卷之三正統辨貞烈嶽鄂王木乃伊卷之四發宋陵寢相術前輩謙讓不苟取論詩妻賢致貴竒遇賢烈挽文丞相詩禱雨廣寒秋無恙不亂附妾卷之五角端劈正斧興隆笙尚食麵磨僧有口才鄧中齋汪水雲厚德毁前朝玉璽披秉歌訣三教授時曆法功布人中發燭嫁故人女平反勘釘碑志書法雕刻精絶題跋隆友道朱張交誼假宅以死淸風堂尸迹坐右銘掘墳賊廉介甲午節氣先輩謙讓雙竹杖卷之六蘭亭集刻禊帖考喪師衰經廉使長厚私苐延賔句曲山房熟水法帖譜系評帖淳化祖石刻家翁奴材沙魘孝行吾竹房先生抗疏諌伐宋髮䐈鬼贓居士親家研山圖衛夫人卷之七趙魏公書畫金鰲山委羽山斛銘孝感火失刺把都屈戍回回石頭黃巢地藏官奴𣑽嫂房老鴛衾奚奴溫酒挂牌延客買宅有讖待士雇僕役志異課馬客作鹹杬子官制資品奎章政要義奴忠倡鷹背狗蓋志怪粥爵還金絶交畫鬼卷之八寫山水訣鄧山房狗站五馬入門隱逸關莭梯媒利市志苗雙硯堂嫁妾猶處子聶碧窗詩玉腴蟹斷作今樂府法岷江緑溫暾飛雲渡漢子長年龍見嘉興星入月軍中禮士不耐煩阿誰卷之九文章宗旨麻答把曆續演雅發揮面花子竒疾磨兜鞬葛大哥萬栁堂樹鳴松江官號割藝題屏謝客婚啓陶毋碑許文懿先生謡言獸醫想肉王眉叟錢唐潄芳亭食品有名火災落水蘭亭隂府辨詞詩法姓名考女諌買印吳江塔頴箭素領卷之十御史五常官倉入粟食物相反先輩諧謔馬判字訓丘真人南池蛙堆子趂辦官錢鼎作牛鳴鏖糟越民考三姑六婆不中用國字水畜纒足溺水不躍鎖陽輥吝諞三卦烏蛋户重臺日字卷之十一寫像訣相地理狎娼遭毒夢白醉賢毋辭拾遺鈔女奴義烈龍廣寒夜航船不快雷雪分疏西皮暖屋鬼室牙郎墓尸如生枯井有毒賢孝事物異名金鎞刺肉杭人遭難承天閣阿癐癐海運夫婦死孝豬妖卷之十二園池記厠籌拗花連枝秀郤鞭奉毋避難匠官仁慈著衣喫飯文章政事浙江潮候貞烈墓特健藥乞求張道人隂德延壽帝師卷之十三中書鬼案烏寶傳緑窗遺藁為將嗜殺釋怨結姻杜荀鶴詩太公剛介發墓卷之十四忠烈瘞鶴銘風入松四卦點鬼録房中術婦女曰娘古刻上頭入月人臘張翰林詩卷之十五淳化閣帖幽圄煮豆帖妓妾守節與妓下火文賀人妾得子啓吊四狀元詩雞妖胡烈女蛙獄沁園春恭敏坊隱趣日書三萬字妓出家河南王妖異塔影入屋錢唐懷古詞人命至重度量宏深髙麗民守節寒號蟲鄧思賢醫科卷之十六陶氏二譜藥譜世系卷之十七古銅器石敢當方頭七十二旃檀佛傳席歸婦吟穿耳丫頭點心奴婢愠羝天子爭臣嬸妗黃金縷哨遍花蕊夫人崔麗人江浙省地分改常卷之十八敘畫記宋宫殿廉察宣髮擊書露布靸鞋書手卷之十九脈四司六局稽古閣經紀龐居士宋朝家法闌駕上書錢武肅鐵劵射字法神人獅子至元鈔樣妓聰敏日無光松江志異郡縣君面不畏寒卷之二十納音化氣應聘不遇皇舅墓真率會珠廉秀漢兒字聖旨碧瀾妾箕仙咏史夫婦同棺宋幼主詩孔椽史挽文教授詩狷潔雁書碑刻印識九姑玄女課白翎雀天下士卷之二十一宫闕制度公宇喝盞碧珠示讖卷之二十二聖門弟子河源皇太子署牒禽戲虎禍河南婦玉堂嫁妓數讖戎顯再生算命得子夫婦入道項節婦西域竒術童子屬對先輩風致司馬善諫俞竹心犬脅生子卷之二十三書畫褾軸爐鳴田夫入嗓金蓮杯大佛頭揚州白萊譎誕有配檢田吏玉鹿盧猴盜盜有道預知改元醉太平小令譏省臺造物有報復鎖鎖葉氏還金傅氏死義武官可笑鞠獄聖鐵鬼爺爺死護文廟卷之二十四結交重氣義帝廷神獸勾闌壓鵓鴿傳書待士鄙吝陳公子漢魏正閏剛卯倜儻好義道士壽函餛飩方精塑佛像繆孝子趙孝子王義士木冰龍湫獻靈王一山誤墮龍窟雞司晨有凖黃道婆天隕魚十二生子劉節婦歷代醫師卷之二十五論秦蜀院夲名目遁毋天竺觀音卷之二十六傳國璽瑞應泉疑冡盧橘五龍車伏波將軍至元鈔料雕傳三瓦戒酸齋辭世詩高昌世家后德文宗能畫武當山降筆箕仙有驗詩畫題三絶浙西園苑吳江長橋卷之二十七四位配享金果李哥貞烈劉節婦病潔雜劇曲名唱論莊蓼塘藏書買假山戴氏絶嗣妓妾守志譏伯顔太師譏方士燕都賦裱背十二科厲狄旗聮桃符讖金甲藺節婦忠孝里胡仲彬聚衆扶箕詩卷之二十八非程文于闐玉佛處士門前怯薛憲僉案判詩讖丘機山不孝陷地死嘲回回白縣尹詩廢家子孫詩樂曲爇梅花文如夢令黃門花山賊爵祿前定醋鉢兒棊譜軍前請法師淩捴管出對承天寺義丈夫解語杯戲題小像水仙子銅錢代著刑賞失冝畫家十三科卷之二十九紀隆平降真香宋二十一帝字音許負李玉溪先生稱地為雙骨咄犀一門五節一門三節黃龍洞黏接𥿄縫法井珠一錢太守廟全真教馬孝子楊貞婦窯器墨斫琴名手古琴名戲語日家安命法淮渦神寄衣詩卷之三十印章制度銀工祖孝子白月圜文金靈馬髹器只孫宴服三教一源銀錠字號學宫講説松江之變果典坐詩讖書畫樓物必遇主鎗金銀法磨兜堅針三笑圖官制字訛巾幘考屨舄履考南村輟耕録總目終
