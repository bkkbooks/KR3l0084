front:
  text: 南村輟耕録卷之八
  hash: sha256:74eeda2d8e10e39e1c189a3b2e33fe81b0ed303e94937245fbfd4ee92a52a48d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_008-1a}
body:
  text: 天台陶宗儀九成黄子久散人公朢自號大癡又號一峯本姓陸世居平江之常熟繼永嘉黄氏頴悟明敏博學疆記畫山水宗董巨自成一家可入逸品其所作寫山水訣亦有理致迩来𥘉學小生多效之但未有得其髣髴者正所謂畫虎刻鵠之不成也寫山水訣近代作畫多宗董源李成二家筆法樹石各不相似學者當盡心焉樹要四面俱有幹與枝盖取其圓潤樹要有身分畫家謂之紐子要折搭得中樹身各要有發生樹要偃仰稀宻相間有葉樹枝軟靣後皆有仰枝畫石之法先從淡墨起可改可救漸用濃墨者為上石無十歩真石看三靣用方圓之法湏方多圓少董源坡脚下多有碎石乃畫建康山埶董石謂之麻皮皺坡脚先向筆畫邊皴起然後用淡墨破其深凹䖏著色不離乎此石著色要重董源小山石謂之礬頭山中有雲氣此皆金陵山景皴法要滲軟下有沙地用淡墨掃屈曲為之再用淡墨破山論三逺從下相連不㫁謂之平逺從近隔開相對謂之闊逺從山外逺景謂之髙逺山水中用筆法謂之筋骨相連有筆有墨之分用描䖏糊突其筆謂之有墨水筆不動描法謂之有筆此畫家緊要䖏山石樹木皆用此大槩樹要填空去聲小樹大樹一偃一仰向背濃淡各不可相犯繁䖏間䟽䖏湏要得中若盡得純熟自然筆法岀現畫石之妙用藤黃水侵入墨筆自然潤色不可用多多則要滯筆間用縲青入墨亦妙呉妝容易入眼使墨士氣皮袋中置描筆在内或於好景䖏見樹有恠異便當模寫記之分外有發生之意登楼望空闊䖏氣韻看雲采即是山頭景物李成郭熈皆用此法郭熈畫石如雲古人云天開圖畫者是也山水中唯水口最難畫逺水無痕逺人無目水岀髙源自上而下切不可㫁派要取活流之源山頭要折搭轉換山脉皆順此活法也衆峯如相揖遜萬樹相從如大軍領卒森然有不可犯之色此寫真山之形也山坡中可以置屋舎水中可置小艇從此有生氣山腰用雲氣見得山埶髙不可測畫石之法最要形象不悪石有三靣或在上在左側皆可為靣臨筆之際殆要取用山下有水潭謂之瀬畫此甚有生意四邊用樹簇之畫一窠一石當逸墨撇脫有士人家風纔多便入畫工之流矣或畫山水一幅先立題目然後著筆若無題目便不成畫更要記春夏秋冬景色春則萬物發生夏則樹木繁冗秋則萬象肅殺冬則煙雲黯淡天色糢餬能畫此者為上矣李成畫坡脚湏要数層取其濕厚米元章論李光丞有後代兒孫昌盛果岀為官者最多畫亦有風水存焉松樹不見根喻君子在野雜樹喻小人崢嵘之意夏山欲雨要帯水筆山上有石小塊堆在上謂之礬頭用水筆暈開加淡螺青又是一般秀潤畫不過意思而巳冬景借地為雪要薄粉暈山頭山水之法在乎隨機應變先記皴法不雜布置逺近相映大槩與寫字一般以熟為妙𥿄上難畫絹上礬了好著筆好用顔色易入眼先命題目此為之上品古人作畫胸次寛闊布景自然合古人意趣畫法盡矣好絹用水噴濕石上槌眼匾然後上幀子礬法春秋膠礬停夏月膠多礬少冬天礬多膠少著色螺青拂石上藤黄入墨畫樹甚色潤好看作畫秪是箇理字最緊要呉融詩云良工善得丹青理作畫用墨最難但先用淡墨積至可觀䖏然後用焦墨濃墨分出畦徑逺近故在生𥿄上有許多滋潤䖏李成惜墨如金是也作畫大要去邪甜俗頼四箇字平江㑹道觀主鄧山房道樞綿州人在宋季為道士時齋法巳精際遇理度兩朝一日謝后遣巨璫召至内後門泣降徳音且令其責軍令狀使無泄然後謂曰吾昨夜夢見濟王怒甚以為吾且将兵由獨松関入滅汝社稷矣吾此夢頗可恠汝可就南髙峯頂為謄心章哀告上帝巳而黄頭先鋒斬関而来宋亡後鄧遂築今觀髙麗以北名别十八華言連五城也罪人之流奴兒干者必經此其地極寒海亦氷自八月即合至明年四五月方解人行其上如履平地征東行省毎歲委官至奴児干給散囚糧湏用站車毎車以四狗挽之狗悉諳人性站有狗分例若剋减之必嚙其主者至死乃巳吾鄊陳剛中先生浮臨海縣人國𥘉時嘗為僧以避世變一日大書所作詩於其父執某之粉墙上云我不學宼丞相地黄變髮髮如􅃮又不學張長史醉後揮毫掃狂墨平生紺髮三千丈㡬度和雲眠石上不合感時怒衝冠天公罰作圓頂相肺肝本無児女情亦豈惜此雙鬢青只憶山間秋月冷搔首不見髼鬆影父執見之曰此子欲歸俗也呼来館榖之命飬髮經半年餘謂曰汝當娶吾将以女事汝先生辭謝再三既而命寓他所遣媒妁行言擇日迎歸父執喜曰五馬入門矣先生雖獲住偶自妻毋以至妻之兄姊弟妹皆不然遂挈家入京館閣諸老交章薦舉入翰林㑹朝廷遣使交趾授先生禮部郎中副之至交州甞有詩曰老毋越南垂白髪病妻塞北倚黄昏蠻煙瘴雨交州客三䖏相思一夢䰟及抵安南國以文字言語諭之其國遂降将其世子并國相入朝後以功授治中典郷郡終老焉若父執者可謂識人也巳吾郷李徽之先生家仙居萬山中博學能詩文問無不知者而安貧樂道常逃其名耕漁以自給一日擕楮幣詣富家昜榖種值大雪立門下人弗之頋徐至庭前聞東閤中有人分韻作雪詩一人得滕字苦吟弗就先生不覺失笑閤中諸貴游子弟軰聞得遣左右詰之先生𥘉不言衆愈疑親自出見先生露頂短褐布韈草屦輒侮之詢其見笑之由先生不得已乃曰我意舉滕王蛺蜨事耳衆始歎伏邀先生入坐先生曰我如此形狀安可厠諸君子間請之益堅遂入閤衆以藤滕二字請先生足之即援筆書曰天上九龍施法水人間一䑕嚙枯藤鶩鵝聲亂功收蔡蝴蜨飛来妙過滕復請和曇字韻詩又隨筆冩云萬里関河凍欲含渾如天地尚凾三橋邊驢子詩何悪帳底羔兒酒正酣竹委長身寒郭索松埋短髪老瞿曇不如来此擒元濟一洗江南草木慚寫訖便出門留之不可得問其姓字亦不荅皆驚訝曰甞聞吕䖏士名欲一見而不能先生豈其人邪曰我農家安知吕䖏士為何如人惠之榖怒曰我豈取不義之財必易之刺船而去遣人遥尾其後路甚僻逺識其所而返雪睛徃訪焉惟草屋一間家徒壁立忽米桶中有人乃先生妻也因天寒故坐其中試問徽之先生何在荅曰在溪上捕魚始知真為先生矣至彼果見之告以特来候謝之意隔溪謂曰諸公先到舎下我得魚當換酒飲諸公也少頃擕魚與酒至盡歡而散回至中途夜黒不良于行暫憇一露棚下適主人自外歸乃甞識靣者問所從来語以故喜曰是固某平日所碩見者止客宿翼旦客别主人躡其蹤則先生巳遷居矣又一日先生與陳剛中治中遇于道治中䇿蹇驢時猶布衣見先生風神髙簡問曰得非吕徽之乎曰然足下非陳剛中乎曰然握手若平生歡共論驢故事先生言一事治中荅一事互至四十餘事治中止矣先生曰我尚記得有某出某書某岀某傳又三十餘事治中深敬之杜陽雜編云元載寵姬薛瑶英善為巧媚載惑之瑶英之父曰宗本兄曰從義與趙娟相逓出入以搆賄賂號為閧節趙娟本岐王愛妾後出為薛氏妻生瑶英三人更與中書主吏卓倩等為腹心而宗本軰以事告者載未甞不領之天下費寳貨求大官無不恃載權埶指薛卓為梯媒又李肇國史𥙷捴叙進士科云造請權要謂之関節牛軻牛羊日暦云由是輕薄奔走揚鞭馳騖以関節緊慢為甲乙以此推之則諺所謂打関節有梯媒者不為無祖矣利市之說到䖏皆然易說卦巽為利市三倍楊完者字彦英武岡綏寕之赤水人為人隂鷙酷烈嗜斬殺𥘉群無頼嘯聚溪洞完者内深賊持權詐故衆推以為長王事日棘湖廣陶夢禎氏舉師勤王聞苗有衆習闘擊遣使徃招之由千户累階至元帥夢禎及樞宻院判阿魯恢捴兵駐淮西仍用招納旣得㫄縁入中國不復可控制畧上江順流而下直抵楊州禽獸之行絶天逆理民怨且怒共起義攻殺之餘黨奔潰度楊子宿留廣徳呉興間至正十六年春二月朔淮人䧟平江時江浙行中書省丞相塔失帖木児有㫖得便宜従事嘉興北連平江南去杭州無二百里為藩鎮喉舌有司告援急星火馹使交道中不絶丞相兵少䇿無所出以完者来守之完者取道自杭以兵刼丞相陞夲省參知政事填募民人粟空名告身予之即拜添設左丞所統苗䝤洞揺荅刺䍐等無尺籍伍符無統属相謂曰阿哥曰麻線至稱主将亦然喜著斑斕衣製衣䄂廣狭脩短與臂同衣幅長不過膝袴如䄂裙如衣総名曰草裙草袴固脰以獸皮曰護項䇿要以帛两端懸尻後若尾無間晴雨𬒳氊毯状絶類犬按邕管雜記溪蠻叢笑等書所載伍溪之蠻盡槃瓠種属曰猫曰猺曰􅱒曰犵狑曰犵狫字皆从犬則諺所謂猫犬者信然軍中無金鼓雑鳴小鑼以莭進止其鑼若賣貨郎擔人所𫾣者夜遣士卒伏路曰坐草軍行尚首功資抄掠抄椋曰檢刮檢刮者盡取而靡有孑遺之意所過無不殘㓕擄得男女老羸者甚㓜者色陋者殺之壮者曰土乖㓜者曰頼子皆驅以為奴人之投其黨者曰入火婦人艶而晳者畜為婦曰夫娘人有三四婦多至十数一語不合即剚以刃與之䖏者得至日莫無恙則心竊自賀古云好則人怒則獸形容盡之矣是月丞相又以王與敬攝元帥事守松江與敬㩀郡應平江完者遣部将蕭亮貟成来與敬奔苗有松江火一月不絶城邑殆無噍類偶獲免者亦舉刵去两耳掠婦女刼貨財殘忍貪穢惨不忍言官庾尚有粟四十萬餘籍為巳有越五十日平江兵破澱湖栅苗夜遁去秋平江兵入杭苗将吴太旺敗完者自嘉興来駐兵城東菜市橋外未即進民自為戰勝完者兵淫刑以逞嘉興僅保孤城城之外悉遭兵燹有窮目力所至無寸草天木䖏完者雖陽浮尊事丞相生殺予奪扵已是决丞相僅得署成案然浙江之南則行御史臺捴督官邁里古思建徳路則逹魯花赤古篤魯丁各自為守苗不敢犯其境完者之威令僅行扵杭州嘉興两郡而巳築營徳勝堰周圍三四里子女玉帛皆在焉且以為郿隖計用法刻深任埶立威而鄧子文金希尹王彦良之徒又悉邪佞䡖佻左右交煽氣𦦨翕忽時左丞李伯昇行樞宻同知史文炳行樞宻同僉吕珎等皆先魁淮旅而降順者丞相以其衆攻殺之既受圍遣吏致牲酒於文炳為可憐之意曰碩少湏臾毋死得以底裏上露報不可完者乗躁力戰敗盡殺所有婦女自經以死獨平章慶童女以先徃在富陽得兑平章女已甞許嫁親王為完者強委禽焉至是未及三月故數其罪者此居首諸軍開門納欵惟恐弗先文炳觧衣褁屍瘞之祭哭盡哀十八年秋八月也完者部将宋興在嘉興閉城自守亦攻降之城中燔燬者三之二民遇害者十之七南村野史曰苗入華夏民之不幸亦國家之不幸也國以民為本夲不固矣邦奚以寜為之将若相者在於明黜陟嚴賞罸奉将天威降者招之逆者討之以培國家之本可也頋於此而不為又無它竒謀逺畧而乃借重扵非類正猶開虎兕之椑而使赴犬羊耳尚兾保民命為社稷計一何愚哉罪惡貫盈天怒扵上敗亡􅓍辱身膏草野民争以為快寔亦自取之也惟完者則有說焉完者寵榮過望豈有貳志忠君愛民之道頗亦見諸行事獨矜巳犯分貪財好色固夷性所然君子責備賢者於此可以畧之則罪亦未至扵死也兼以所部吏卒視完者起身等寒微故威令有所不信急之則恐内變緩之則壊法敗度遂卒至扵如此亦可哀矣又惜乎草草之舉㫁自一時吾恐國家之本剷刈殆盡雖有智謀之士亦無如之何矣天乎人乎吾不得而知也周待制白岩先生仁榮買地扵府城之鄭揑兒坊剏義塾以淑後進築礎時掘地深纔数尺有青石獲雙硯硯有欵識乃唐鄭司户䖍故物塾旣成遂名雙硯堂尓後先生之弟夲道先生仔肩登庚申科仕至恵州判官䖍字弱齊俗偽為揑兒云先師錢先生璧字伯全壬申科進士端重清慎語不傷氣嘗内一女鬟風姿秀雅殊可人意室氏勸先生私之正色而荅曰我之所以置此者欲以侍巾櫛耳豈有它意哉汝乃反𣣔敗吾徳邪即具貲嫁之果䖏子也先生雲間人京口天慶觀主聶碧窓江西人嘗為龍翔宫書記國𥘉時䛇赦至感而有詩曰乹坤殺氣正沉沉又徳燕臺降徳音萬口盡傳新詔好累朝誰念舊恩深分茅列土将軍志問舎求田父老心麗正立班猶昨日小臣無語淚霑襟又哀𬒳虜婦云當年結髪在深閨豈料人生有别離到底不知因色誤馬前猶自買臙脂又咏胡婦云双栁垂鬟别様梳酔来馬上倩人扶江南有眼何曽見争捲珠簾看固姑江鄰幾雜誌云丁正臣賷玉腴来館中沈休文云福州人謂之佩羹即今魚脬是也陸龜蒙蟹志云稲之登也率執一穂以朝其魁然後任其所之蚤夜曹沸指江而奔漁者緯蕭承其流而障之名曰蟹断然緯蕭二字尤竒喬孟符吉博學多䏻以樂府稱嘗云作樂府亦有法曰鳳頭猪肚豹尾六字是也大㮣起要羙麗中要浩蕩結要響亮尤貴在首尾貫穿意思清新苟䏻若是斯可以言樂府矣此所謂樂府乃今樂府如折桂令水仙子之類太師伯顔檀權之日剡王徹徹都髙昌王帖木兒不花皆以無罪殺山東憲吏曹明善時在都下作岷江緑二曲以凨之大書掲于五門之上伯顔怒令左右暗察得實肖形捕之明善出避呉中一僧舎居数年伯顔事敗方再入京其曲曰長門栁絲千萬縷緫是傷心䖏行人折柔條燕子䘖芳絮都不由鳯城春做主長門栁絲千萬結凨起花如雪離别重離别攀折復攀折苦無多舊時枝葉也此曲又名清江引俗曰江兒水南人方言曰温暾者乃微煖也唐王建宫詞新晴草色暖温暾又白樂天詩池水煖温暾則古巳然矣飛雲渡風浪甚惡每有覆舟之患有一少年子放縦不覊甞以所生年月日時就日者問平生富貧夀夭有告曰汝之夀莫能踰三旬及徧叩它日者言亦多同扵是意謂非乆於人世乃不娶妻不事生産作業每以䡖財仗義為志甞俟船渡傍見一丫鬟女子徘徊悲戚若将赴水少年亟止之問曰何為䡖生如此荅曰我本人家小婢主人有姻事暫借親眷珠子耳環一双直鈔三十餘定今日送還竟於中途失去寕死耳焉敢歸少年曰我適拾得但不審果是汝物否方再三磨問顆数装束實是遂同造主人主人感謝欲贈以禮辤不受既而主人怒此婢遣嫁業流剃者所居去渡所只尺間期歲少年與同行二十有八人将過渡道遇一婦人拜且謝視之乃失環女也因告其故於夫屈留午飯餘人先登舟俄風濤大作皆塟魚腹盖少年能救人一命而造物者亦救其一命以荅之後少年以夀終渡在温之瑞安今人謂賤丈夫曰漢子按北齊魏愷自散騎常侍遷青州長史固辭文宣帝大怒曰何物漢子與官不就又叚成式廬陵官下記韋令去西蜀時彭州刺史𬒳縣令宻論訴韋前期勘知屈刺史詣府陳謝及逥日諸縣令悉逺迎所訴者為首大言曰史君今日可謂朱研益丹矣刺史咲曰則公便自研朱漢子也吾響稱舟人之老者曰長年長上聲盖唐已有之矣杜工部詩云長年三老歌聲裏白晝攤錢髙浪中古今詩話謂川峡以篙手為三老乃推一船之最尊者言之耳因思海舶中以司柁曰大翁是亦長年三老之意檇李郭元之言至正乙未秋七月三日城東馬橋上白龍掛盲風恠雨天闇黒若深夜然壊民居五百餘所大盡㧞木自半空墜下悉折為二雑以萬瓦亂飛溪水直立人皆呌號奔赱不暇顧妻子龍由馬槗歷城北北麗橋望太湖而去時方在家家去城可三里許如聞萬屋齊壓急岀户四望黒雲洶湧失府城所在經一二時方乃開霽不一年為戰闘之地凡龍所過䖏􅍮棘寒烟衰草野燐視昔時之緐華一如夢也松江孫元璘言至正乙未七月六日夜自平江歸泊舟城西柵口方掀蓬露坐忽見一星大如桮椀色白而微青尾長四五丈光𦦨燭天戞然有聲由東北方飛入月中而止此時月如仰瓦正乗之無偏倚若人以手拾置其中者嘗記宋張端義貴耳集云丁亥年余為儀真録參十月二十三日夜因觀天象見一星入月筭暦者鄒淮絶早相别云昨夜星入月恐兩淮兵動不可住徑喚渡過建康余問之古有此否邹云漢獻帝時一次星入月今再見也十一月十二日劉倬舉兵僇李姑姑反戈一城狼狽僅以身免繼此兵禍未泯也㩀此說則松江之􅍔亦非偶然松江自丙申二月十八日軍亂越三日苗來剋復首尾兩月之間焚殺擄掠十里之城悉化瓦礫之區視它郡尤可畏是則星入月不知此時在於何所分野顧乃松江獨應其兆與浙省參政董公搏霄字孟起以名行當至正癸巳之間緫兵戍昱嶺獨松千秋三関日號令嚴肅民賴以安及剋復諸郡不殺擄不抄掠其御将帥也凛然不可犯而四方之士歸之者禮遇勤至尊酒在前起立捧觴既恭且和然復取其所長而任之若董公者可謂得待士之体矣不耐煩三字見宋書庾登之弟仲文傳阿誰二字見三國志龐統傳南村輟耕録卷之八
