front:
  text: 南村輟耕録卷之二十五
  hash: sha256:f5f9d4a13696ff39d267aa1886b88e79953787bc8bbaa7ebf66d1864ac17d14b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_025-1a}
body:
  text: 天台陶宗儀九成秦皇坑儒武侯相漢未有置異議於其間者偶讀宋蕭森希通録及俞文豹吹劒録而得其説可采森曰李斯曰非慱士官所職天下敢有藏詩書百家語者皆詣守尉雜燒之則是天下之書雖焚而博士官猶有存者惜乎入關收圖籍而不及此竟為楚人一炬耳前輩嘗論也但坑儒一事未有究極之者僕按史書所坑特侯生盧生四百六十餘人非能盡坑天下儒者為其所坑又非儒者何以知之始皇三十二年使盧生求羡門刻碣石門壞城郭決通隄防又盧生入海還因奏録圖書曰亡秦者胡也始皇乃遣蒙恬發兵三十萬人北伐丐奴起臨洮築遼水又盧生説始皇曰日方中人主時為微行以辟惡鬼惡鬼辟真人至願上所居宫毋令人知然後不死之藥殆可得也其後建阿房宫千間萬落必自此言彂之觀此二事皆盧生稔其惡又縱臾之特方伎之流耳豈所謂儒者哉始皇因封禪之議謗口紛紛巳懷殺意及其一怒而坑之或者天理之不容方其求藥海上者則挾童男童女以行皆取于民間奪其無告之孤肆厥不軌之人如今所謂妖教竊其中死無辜者多矣此一罪也因亡胡之讖興北伐之師築長城斷地脈南北生靈因是役而死者不可勝算骸積如山血流成川調彂頻仍剝及閭左原始要終誰生厲階此二罪也獻辟鬼之術覬真人之來咸陽官觀二百七十復道相連有言其所幸之處者罪死梁山之上其語一泄時在旁者盡殺之自是莫知行之所在此三罪也有一於此罪不容於死况兼有之以四百六十餘人之坑償萬民之命良不為過天網恔恔疏而不漏真可畏哉始皇曰盧生等吾尊賜之甚厚今乃誹謗我諸生在咸陽者吾使廉問或為妖言以亂黔首于是使御史按問諸生傳相告引僕亦信盧生非吾儒中人况始皇自謂尊賜甚厚豈非如前三者方術圗讖之類有以中其𣣔故尊賜之𥘉不聞其誦孔子之言以進古今相承皆曰坑儒蓋惑于扶蘇之諌扶蘇曰諸子皆誦法孔子皇上皆重法繩之臣恐天下不安嗚呼至若盧生者何嘗誦法孔子自扶蘇言之誤使儒者蒙不韙之名自我一洗亦萬丗之快也不然如兩生四皓伏生之流鴻飛冥冥弋人何慕肯搖唇鼓吻自投於陷穽哉僕故曰盧生四百六十餘人皆方伎之士也天下之大所謂儒者固不止此其坑之者此而巳矣有道之士秦不能坑火德一炎兩生以講禮聞四皓以羽翼之功聞伏生以口授古書聞豈非天壽其脈留此數公以見吾儒不可磨滅而朋姦黨惡小人終不能為長久計啇君以變法禍秦竟遭車裂盧生以方伎禍秦坑於咸陽其罪等也天其或者假手於秦歟商君裂矣盧生坑矣而秦以不祀抑亦自相擠陷之明報而禍淫之道為不偏矣僕惡夫坑儒之名故論其顛末如此文豹曰古今論孔明者莫不以忠義許之然余兄文龍嘗考其顛末以為孔明之才謂之識時務則可謂之明大義則末也謂之忠於劉備則可謂之忠於漢室則未也其説有四一者備雖稱為中山靖王之後然其服屬疏逺丗數難考溫公謂猶宋髙祖自稱楚元王後故通鑑不敢以紹漢統况備又非人望之所歸周瑜以梟雄目之劉巴也以雄人視之司馬懿以詐力鄙之孫權以猾虜呼之亮獨何見而委身焉藉使以為劉氏族屬然獻帝在上猶當如光武之事更始陳征而伐一切聽命焉可也二者備之枉駕草蘆也始謀不過曰主上蒙塵孤不度德量力欲伸大義於天下其辭甚正其志甚偉自亮開之以跨􅍮益成霸業之利而備之志向始移無復以獻帝為念由建安舉兵以來四十二年天子或都許或居長安或幸洛陽宫室煨燼越在籬棘間備未嘗使一介行李詣行在所今年合衆萬餘明年合衆三萬未嘗一言稟命朝廷而亮亦未嘗一談及焉蓋其帝蜀之心己定於草廬一見之時矣三者曺操欲順流東下求救於吳無一言及獻帝而獨説以鼎足之説夫鼎足之説始於蒯通然通之説韓信以此猶有漢之一足當三國時而為是説則獻帝無復染指之望矣賴周瑜漢賊之罵足以激怒孫權故能成赤壁之勝若備若亮何以厲將士之氣服曺操之心哉􅍮楚之士從之如雲非從備也乃從漢也四者備之稱王漢中則建安二十四年也獻帝在上而敢於自王及稱帝武擔則聞獻帝之遇害也亮不能如董公説髙祖率三軍為義帝縞素仗大義連孫吳聲罪討賊乃遽乘此即帝位而反鋒政吳晉文公有言父死之謂何又因以為利故費詩以為大敵未克便先自立恐人心疑惑而諌以髙祖不敢王秦之事亮反怒而黜之夫以操之姦雄其王其公猶必待天子之命荀彧且以此憤死以丕之篡逆亦必待獻帝之禪楊彪且不肯臣之備雖宗室而亦臣也何所稟命而自王自帝固方嘵嘵以興復漢室為辭不知興復漢室為獻帝耶為劉備耶亮既有心於帝備矣萬一果能興復將置獻帝于何地出師一表雖忠誠懇懇特忠於所事耳其於大義實有所未明也管仲樂毅之事君子所羞道者以其但知有燕齊而不知有王室也亮乃以管樂自許冝其志慮之所圖回功業之所成就止於區區一蜀耳或者但謂備劉氏宗也備帝蜀則漢祚存矣亮忠於備即忠於漢矣吁無獻帝則可有獻帝在而君臣自相推戴則赤眉之立盆子亦有辭於世矣春秋之末諸侯爭強周室微弱孔子無一日不以尊王為心若如亮之見則魯同姓也亦可奉之為王矣天下後丗惟特此見故於亮之事無敢置異議於其間文中子曰通也敢忘太皇昭烈之懿識孔明公瑾之盛心噫漢之君既稱獻魏之君又稱武帝吳之君又稱大皇帝蜀之君又稱昭烈皇帝天無二日民無二王一天下而四帝並立可乎通之見如此宜其為續書之僣也余兄嘗以是説取解於同文館唐有傳竒宋有戲曲唱諢詞説金有院本雜劇諸宫調院本雜劇其實一也國朝院本雜劇始釐而二之院本則五人一曰副淨古謂之參軍一曰副末古謂之蒼鶻鶻能擊禽鳥末可打副淨故云一曰引戲一曰求泥一曰裝孤又謂之五花㸑弄或曰宋徽宗見㸑國人來朝衣裝鞋履巾褁傳粉墨舉動如此使優人效之以為戲又有𦦨假亦院本之意但差簡耳取其如火𦦨易明而易滅也其間副淨有散説有道念有筯斗有科泛教坊色長魏武劉三人鼎新編輯魏長於念誦武長於筯斗劉長於科泛至今樂人皆宗之偶得院本名目用載于此以資博識者之一覽和曲院本月明法曲鄆王法曲燒香法曲送使法曲上墳伊州燒花新水㷩州駱駝列良羸府病鄭逍遙樂四皓逍遙樂賀貼萬年歡􅐝廪降黃電列女降黃電上皇院本壼春堂太湖石金明池戀鰲山六變妝萬嵗山打花陳賞花燈錯入內悶相思探花街斷上皇打毬會春從天上來題目院本栁絮風紅索冷墻外道共粉淚楊栁枝蔡消間方偷眼呆太守畫堂前夢周公梅花底三笑圖脫布衫呆秀才隔年期賀方回王安石斷三行兢尋芳雙打梨花院霸王院本悲怨霸王范增霸王草馬霸王散楚霸王三官霸王輔塑霸王諸雜大小院本喬托孤旦判孤計算孤雙判孤百戲孤哨􅥦孤燒棗孤孝經孤菜園孤貨郎孤合房酸麻皮酸花酒酸狗皮酸還魂酸别離酸三纒酸謁食酸三楪酸哭貧酸插撥酸酸孤旦毛詩旦老孤遣旦纏三旦禾哨旦哮賞旦貧富旦書匱兒𥿄襴兒蔡奴兒刴手兒喜牌兒卦册兒繡篋兒粥碗兒似娘兒卦鋪兒師婆兒教學兒雞鴨兒黃丸兒稜角兒田牛兒小九兒醜奴兒病襄王馬明王閙學堂閙浴堂寬布衫泥布衫趕湯瓶𥿄湯瓶閙棋亭夫容亭壞食店閙酒店壞粥店莊周夢花酒蘿蝴蝶蘿三出舍三入舍瑶池會八仙會蟠桃會洗兒會藏䦰會打五臟蘭昌宫廣寒宫閙結親􅌒成親強風惜大論情三園子紅娘子太平還鄉衣錦還鄉四論藝殿前四藝競敲門都子撞門呆大郎四酸擂問前程十樣錦長慶館癩將軍兩相同競花枝五變妝洪福無強白牡丹赤璧鏖兵窮相思金壇謁宿調奴漸官吏不和閙巡鋪判不由巳大勘刀同官不睦閙平康趕門不上賣花容同官賀授無鬼論四酸諱偌閙棚闌雙藥盤街閙文林四國來朝雙捉壻酒色財氣醫作媒風流藥院監法童漁樵間話閗鶴鶉杜甫逰春卯央簡四酸提猴滿朝歡月夜聞箏鼓角將閙夫容城雙閙醫張生煮海賖徐饅頭文房四寶謝神天陳橋兵變雙揭榜朦啞質庫雙福神院公狗兒告和來佛印燒豬酸賣徠琴劒書箱花前飲五鬼聽琴白雲菴迓鼓二郎壞道場獨腳五郎賣花聲進奉伊州錯上墳醫五方打五鋪拷梅香四道姑隔簾聽硬竹蔡義飬娘􅥦師姨論秋蟬劉盼盼墻頭馬刺董卓鋸周朴四柏板大論淡撁龍舟擊梧桐淹藍橋入桃園雙防送海常春香藥車四方和九頭頂閗元宵趕村禾眼藥孤兩同心更漏子隂陽孤提頭巾三索債防送哨偌賣旦是耶酸怕水酸回回梨花院晉宣成道記院么海棠軒海棠園海棠怨海棠院魯李三慶七夕再相逢風流壻王子端捲廉記紫雲迷四季張與孟楊妃女狀元春桃記粉墻梨花院妮女梨花院龐方溫道德經大江東注吳彥臯不抽開不掀簾紅梨花玎璫天賜暗姻緣諸雜院㸑閙夾棒六么閙夾棒法曲望羸法曲分拐法曲送宣道人歡逍遙樂打馬鋪扯綵延壽樂諱老長壽仙夜半樂打明星歡呼萬里山水日月集賢賔打三教打白雪歌地水火風夜深深三磕胞佳景堪遊十四十五郎喜遷鶯刴草鞋太公家教琴棋書盡滕王閣閙入妝春夏秋冬風花雪月上小樓衮頭子噴水朝僧打注論語恨秋風鬼點偌詩書禮樂論語謁食下角瓶大醫淡再逰恩地纍受恩深送羹湯放火子擂鼓孝經香茶酒果船子和尚四不犯徐演黃河單兜望梅花皇都好景四偌大提猴雙聲疊韻上皇四軸畫三偌一卜調猿卦鋪倬刀饅頭河轉迓鼓背箱伊州酒樓伊州簔衣百家詩埋頭百家詩偷酒牡丹香雪詩打樊噲抹􅔇長夀仙四偌賣諢四偌祈雨松竹龜鶴王毋祝壽四偌抹紫粉四偌劈馬椿截紅閙浴堂和燕歸梁蘇武和畨羹湯六么河湯舅舅偌請都子雙女頗飯一貫質庫兒私媒質庫兒清無事豐稔太平一人有慶四海民和金皇聖德皇家萬歲背鼓千字文變電千字文摔盒千字文錯打千字文木驢千字文埋頭千字文講來年好講聖州序講樂章集講道德經神農大説藥食店提猴人參腦子㸑斷朱溫㸑變二郎㸑講百果㸑講百花㸑講蒙求㸑講百禽㸑講心字㸑變栁七㸑三跳澗㸑打王樞密㸑水酒梅花㸑調猿香字㸑三分食㸑煎布衫㸑賴布衫㸑雙楪紙㸑謁金門㸑跳布袋㸑文房四寶㸑開山五花㸑衝撞引首打三十打謝樂打八哥錯打了錯耴鬼説狄青憨郭郎枝頭巾小閙摑鶯哥貓兒大陽唐小陽唐歇貼韻三般尿大驚睡小驚睡大分界小分界雙堆兒唐韻六貼我來也情知本分喬捉蛇鐺鍋釡竈代元保毋子御頭觜笛兒山梨柿子打淡的一日一箇村城詩胡椒雖小蔡伯喈遮截架解窄磚兒三打步穿百倬盤榛子四魚名四坐山撮頭帶天下樂四帕水四門兒説古人山麻秸喬道場黃風蕩蕩貪狼觀通一毋串邦子拖下來啞伴哥劉千劉義歡會旗生死鼓搗練子三群頭酒槽兒淨瓶兒賣官衣苗青根白調笑令閗鼓笛栁青娘論句兒請車兒身邊有藝調劉滚霸工草難古典左必來香供飬合五百妳妳嗔一偝一與巳巳巳舞秦始皇學像生攴道饅頭打調劫驢城白守呆木大定魂刀説罰錢年紀大小打扇盤蛇相眼告假捉記照淡朦啞投河略通調賊多筆僉押扯狀羅打記水來楞燒奏轉花枝計頭兒長嬌惓歇後語蘆子語回且語大支散拴搐艷假襄陽會驢軸不了拋繡毬鞭􅒱金鐙門簾兒天長地久眼藥里衙府則例金含楞太下太平歸塞北春夏秋冬閗百草呌子蓋頭大劉備石榴花詩啞漢書説古棒唱拄杖日月山河胡餅大觜揾地屋裏藏罵吕布張天覺打論語十果頑十般乞還故里劉今帶四草蟲四厨子四妃艷望長安長安住罵