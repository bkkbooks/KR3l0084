front:
  text: 南村輟耕録卷之十六
  hash: sha256:98ccd0b9aa48f8bc43d223fc61f39ce9dd5ffb9f04a9516cc50e621df46b14dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_016-1a}
body:
  text: 天台陶宗儀九成宋㤗山王質所著雲韜堂紹陶録録中首載栗里華陽二譜惟先生之大節髙風流播千古而質者乃能次第其出䖏作為年譜且以名吾書紹陶之志是可尚巳遂録于此云書陶栗里譜元亮髙風彂扵東晋去就之際君曽祖事晋懋著勲劳自宋武帝芟元復馬逆揣其末流即不出武帝将收賢士繫人心見要亦不應陶謝皆世臣君世地色言俱辟而靈運為武帝秉任最後乃欲詭忠義雜江海逺公送君過虎溪而却靈運不入蓮社素心皆所鑒知譜具左方興寧三年乙丑晋哀帝君生於潯陽柴桑今徳安縣楚城市是父軼名命子詩云於穆仁考澹焉虚止寄迹風雲冝茲愠喜陶氏自侃以武功擅世後裔稍襲故風多流乱岐盖折翼之祥彂之㫄派傳淡傳君父子皆以隱徳著稱侃女適孟嘉嘉女適君父是生君其氣所傳造化必有可言者太元元年丙子晋武帝君年十二失母祭妹文云慈妣早世我年二六太元九年甲申君年二十失妾楚調詩云弱冠逢世阻始室䘮其偏妻翟氏偕老所謂夫畊於前妻鉏於後當是翟湯家湯荘矯法賜四世以隱行之名亦柴桑太元十九年甲午君年三十有歸園田詩云誤落塵網中一去三十年𥘉為州祭酒當在其前不堪乃觧歸故云乆在樊籠裏復得返自然尋亦却主簿隆安四年庚子晋安帝君年三十六五月有從都還阻風規林詩當是叅鎮軍䘖命自京都上江陵故在始作鎮軍叅軍經曲阿詩後父在柴桑故云一欣侍温顔又云乆㳺戀所生父為人度不肯適都當是巳舎單行見還舊居詩軍僚差疆郡吏故云時来苟冥㑹婉戀憇通衢投䇿命晨􅏻暫與田園䟽隆安五年辛丑君年三十七正月有㳺斜川詩云開歲倐五十方二十七作五日是當是故歲五月還潯陽今歲七月適江陵有赴假還江陵夜行途中詩留潯陽踰年當是予告在郷至是徃赴云閒居三十載自未叅鎮軍以前得三十六年當是不堪勞役遂起歸意故云詩書敦宿好園林無俗情如何捨此去遥遥至南荆失父祭妹文云昔在江陵重罹天罰觸事未逺書䟽猶存當是妹自武昌報江陵時父在柴桑元興二年癸夘君年三十九正月有始春懐古田舎詩當是自江陵歸柴桑復適京都宅憂居家思湓城故有懐古田舎又云良苗懐新十二月有與從弟敬逺詩云寝迹衡門下在都亦當是䖏野元興三年甲辰君年四十有連雨獨飲詩云僶仰四十年有飲酒詩云是時向立年志氣多所耻遂盡分然分終死歸田里當是在壬辰癸已為州祭酒之時所謂投耒去學仕又云冉冉星氣流亭亭復一紀至是得十二年義熈元年乙已君年四十一三月有為建威叅軍使都經錢溪詩當是故歲自都還里即言庚子始事鎮軍継事建威中經罹憂至是得六年復䘖命至都其家尚未歸柴桑還舊居詩云疇昔家上京六載去還歸徃来時經郷閭不常留稍成䟽故云阡陌不移舊邑屋或時非履歴周故居隣老罕復遺至是始定居断他適十一月有歸去来辞九月家留柴桑身徃彭澤至是免歸當是不堪軍役故求縣不堪縣役故歸家所謂風波未定心憚逺役彭澤去家百里公田足以為酒少日眷然有歸與之情平生之志始决見序及辞甚詳失妹所謂情在駿奔自免去職是歲劉将軍録尚書義熈三年丁未君年四十三有祭程氏妹文自乙巳至是所謂服制再周義熈四年戊申君年四十四有六月遇火詩云奄出四十年義熈五年巳酉君年四十五有九日詩義熈六年庚戍君年四十六有西田獲早稲詩義熈七年辛亥君年四十七有祭從弟敬逺文云絶粒委務考槃山隂晨采上薬夕閒素琴當是同志見文甚詳義熈十年甲寅君年五十有雜詩云柰何五十年棄官來歸至是得十年故云荏苒經十載暫為人所覊義熈十一年乙邜君年五十一有與子儼等䟽云年過五十又云見樹木交䕃時鳥變声亦復欣然五六月北窓下卧遇涼風暫至自號羲皇上人見䟽甚詳義熈十二年丙辰君年五十二有下潠田舎穫詩云曰為此来三四星火頽當是得此在癸丑甲寅之間義熈十四年戊午君年五十四楚調云僶俛六九年召為著作佐郎不應是歲宋公為相國元熈元年巳未晋恭帝君年五十五王休元為江州自造不得見遣其故人龐通之等齎酒於半道栗里要之即引酌野亭休元出與相聞極歡終日甞九日把菊無酒休元餉之有九日間居詩所謂秋菊滿園時醪靡至當是未獲所遺休元在江州㡬六載未審的在何年自乙巳至丁邜訖死未甞他適獨暫為休元入州永𥘉元年庚申宋武帝君年五十六同隱周續之召至都為顔延之連挫義熈間檀韶為江州􅌽續之在城北講禮讎書有示周掾祖謝詩云馬隊非講肄校書亦巳勤又云但願逺渚中從我潁水濵江城尚不欲周徃奚况京師劉遺民亦同隱有和劉柴桑詩云挈杖還西廬又云春醪觧飢劬其還以春有酬劉柴桑云嘉穟眷南疇又云慨然知巳秋其還至是及秋𥘉自西廬移南村有移居詩云聞多素心又樂與数朝夕又云過門更相呼有酒斟酌之遷居殆為遺民之徒尋還西廬度相距亦不逺與遺民更相酬酢不改賞文析義之時未審的在何年或恐劉柴桑似縣令劉或甞為此縣存此呼或有命不為猶續之甞命為撫軍叅軍不就因呼周掾皆不可知但非時為宰者語皆冷交非熱官丁柴桑詩云秉直司聦于惠百里此乃當官無疑尋詩鍾情於劉過厚於周遺民自隱之餘無聞續之在隱之中微婉君與周劉號潯陽三隱校情義稍有淺深是歲宋武帝踐祚景平元年癸亥晋營陽王君年五十九顔延之為始安過潯陽日造飲酣醉臨去留二萬錢悉送酒家相知乆間驟見益驩延之未審何時來柴桑所謂自尓分居及我多暇伊好之洽接􅉉隣舎當是不詣劉穆之之時又未審何時去柴桑當是為豫章世子叅軍之時㩀誄叅傳畧見元嘉三年丙寅宋文帝君年六十二檀道濟為江州時抱羸疾多瘠餒徃候饋以梁肉不受元嘉四年丁卯君年六十三有自祭文云律中無射擬挽歌詩云嚴霜九月送我出逺郊當是抄秋下世顔延之誄云視化如歸臨凶若吉藥剤弗嘗禱祠弗恤其臨終髙熊見誄甚詳君平生好談歸盡䔥統以為䖏百齡之内居一世之中倐忽白駒寄寓逆旅與大塊而榮枯隨中和而放蕩豈能勞於憂偎役於人間最知深心形贈影荅神釋本趣畧見所謂縦浪大化中不喜亦不懼應盡便須盡無復獨多慮惟患不知既巳洞知安坐待此夫復何言杜甫許避俗未許逹道識者更詳之書陶華陽譜通門髙風彂於梁齊宋去就之際君祖父皆食宋禄身又生宋代自齊髙帝代宋旋引去梁武帝代齊益退蔵平時以師待君然大節有定操豈復以恩禮推移暫至丹陽應簡文之命不少至京都慰武帝之懐抑何其堅忍壯年果於遺世炤之審故判之不疑譜具左方孝建三年丙申宋世祖君生於丹陽秣陵今上元縣冶村是母郝氏夢兩天人持炉爇香來前有娠今世為君再世為孫思􅥞兩世肇啓於郝故其兆先形當是本居天仙趣報盡還入人趣植根弗凡受形亦異生以火年火月又夏至極陽日悉禀純陽多起飛心累功積行所升當益髙推佛言叅君迹畧見大明四年庚子君年五歲常持荻畫灰學書㤗始元年乙巳宋明帝君年十歲得葛洪神仙傳即有志飬生語人仰青天睹白日不覺為逺及長愽讀書邃觧文武諸伎自後天文地理人事雖至淵妙咸臻底極當時巳䍐傳歴年愈逺行世寖梁傳所載十二種今傳惟三種傳不能紀十種唐志所載九種今傳惟四種傳有志無八種傳無志有五種本草後人増衍考正益詳間與集注差異元徽二年甲寅宋蒼梧王君年十九蕭将軍録尚書引為諸王侍讀故事止典文學無它務除奉朝請故事止奉朝㑹請召本不為官雖在䆠途亦居静地及求縣乃不遂縁埶可見永明十年壬申齊世祖君年三十七家貧求宰縣不遂脫朝服挂神武門去止句曲山體即䡖捷性嗜山水所歴必吟咏盤旋不巳語人吾見朱門廣夏雖適其華樂而無欲徃之心望髙岩瞰大澤知難立止自常欲就之永明中求禄得輒差舛不尓豈得為今日之事亦縁埶使然此語甚真是事先有根次有縁次有埶相苻乃入所謂道生之徳畜之物形之埶成之惟難契故曠世難就隆昌元年癸酉齊欝林王君年三十八沈約為東陽屡要不至自棲句曲不出所謂徧歴名山求訪仙藥或未然一至句章禮育王塔一至丹陽應太子召他適皆無考又言徃東陽從孫㳺嶽受符啚經法亦無考惟楊羲靈寳五符傳句容葛粲粲以傳陸脩静陸以傳孫許􅔘二景歌東陽章靈民出都遇得以與孫度所得止在林陵句曲之間非逺適而後傳永元元年已邜齊東昬侯君年四十四在句曲築楼髙三層身䖏其上弟子居其中賔客至其下與物遂絶不娶無子它眷亦不通先断此根可議他事特愛松風庭院皆植松聆響為樂間獨㳺泉石此門忌濁便清神仙上景多雲霞下景多山水物多金玉色多紫碧它皆類是所謂熟之飬之覆之若欲成辦必皆将護大要離塵換境為上中興元年辛巳齊和帝君年四十六蕭都督至新林遣弟子戴猛之迎謁𥘉齊末作水丑木之歌至是援䜟文成梁字令弟子進之遂以梁建國後覆沒亦預言朱點已已詩嘆朝陽重離七元卒驗雖隱茅山不郤人主詢謀中大通𥘉獻善勝成勝二刀度武帝狃陳慶之覆魏洛陽好大之心寖侈叅㑹侯景大觸駭機豈盡忘捄世者但觀時耳蚤慕張良甚深黄石編書盖傳真祕課兵法其間餘事推巳及物亦致平緒術此門隱除魔顯定亂學道者間及君箸水鏡握鏡當是早為豈挂晚念天監元年壬午梁髙帝君年四十七梁武帝在西邸與㳺及即位恩禮彌篤問訊弗絶屡招不出畫兩牛一枚放水草之間一金絡頭人執杖驅之知不可復致㫄族季直亦不肯事梁武帝甞歎梁有天下遂不見此人門風何繇乃尓天監四年乙酉君年五十積居積金澗泉石益竒無蛇虎有佳术及雜藥𥘉乏青林及來居皆自茂在句曲東壟中大通元年已酉君年七十四遇異人宣闓以本草用蝱蟲水蛭之属傷物遅一紀可觧形至期果化尸觧凡十餘種世傳誾自青城來句曲先升以君聞帝録其積水之功化後為蓬萊都水監見仙傳及拾遺甚畧今茅山相傳稍詳但微􅍱異大同二年丙辰君年八十一隻眼或方夢勝力菩薩授菩提記乃詣鄮縣禮阿育王塔自誓受戒世傳吕岩從鍾離權受劒訣後二百餘年來參黄龍恵南始竟佛言不脩正覺別得生理休止深山大島絶於人境報盡還來散入諸趣晚年始堅此碩唐志有所著草堂法師傳當時佛教雖隆禪宗未開圓覺以大通元年至以是年去留臺城十九日度君不及相見大同六年庚申君年八十五逆尅亡日仍為告逝詩及卒顔色如常香氣弥山華陽頌云號其行當滿亥数未終丁迨乃承唐世将賔來聖庭化後一遇丁亥為陳臨海王光大元年再遇丁亥為唐太宗貞觀元年升平之盛降古所稀聖庭當是此時𥘉隋文帝輔周以國子愽士召孫思􅥞不應宻言後五十年有聖人出吾且助以濟人宣政元年至貞觀元年適滿五十年應命來見太宗官之不受辞歸太白山風素極類隱居它無種不類形有轉移神無變易自是至丁卯獨孤信鎮洛陽之時正七歲至丁亥太宗召至長安之時得八十七歲暮齡有少容所以驚嗟盧照鄰稱其自謂生開皇辛酉當時巳不信若尓豈得聖童之稱愽士之召貞觀丁亥方二十七歲豈得少容之歎若言数百歲豈得七歲弱冠之譽度思邈之生適継隱居之沒其為後身何疑挺契頌又云重離倘或似謂簡文與武帝俱非令終又云七夕乃扶胥謂武帝凡七改元世稱推戴為䇿立侯景甞為懐朔鎮功曹吏至是篡梁稱漢故云扶胥所謂篇中字皆有義旨後人自以篇中事求之則機萌一頌二十字頋盖虚設矧又彰明業運頌又云濟神既有在去留徒所冝神既濟矣在於何所華原孫氏即其所在也巳當知佛言報盡還來及舎生趣生至確可信識者更推之清異録二卷乃宋陶翰林榖所譔凡天文地理君道官志人事女行君子么麽釋族仙宗草木花果𬞞薬禽獸蟲魚支體作用居室衣服妆飾陳設噐具文用武噐酒漿茗荈饌羞䘮塟鬼妖皆創為異名新說而藥譜一則尤竒甚因俻録之藥譜苾蒭清本良於醫藥数百品各以角貼所題名字詭異余大駭究其源底荅言天成中進士侯寧極戯造藥譜一卷盡出新意改立别名因時多艱不傳于此余以禮求假録一通用娛閒暇假君子牽牛昌明童子川烏頭淡伯厚朴木叔胡椒雪眉同氣白扁豆含丸使者椒馘毒仙預知子貴老陳皮逺秀卿沉香化米先生神麹九日三呉茱茰𦦨􅙕硫黄三閭小玉白芷中黄節士麻黄時羙中蒔蘿導河掾木猪苓嗽神五味子削堅中尉三稜曲方氏防風白大夀呉术洞庭奴隸抧殻黄英古檀香緑劒真人菖蒲魏去疾阿魏禹孫澤瀉槖籥尊師仙灵脾風稜御史史君子雪如来白及風味團頭縮砂赦肺侯欵冬花骨鯁元君卑觧苦督郵黄岑調睡參軍酸枣仁黒司命從容知微老白薇太青尊者朴硝既濟公升麻冷翠金剛石楠葉脫核嬰児桃仁澀翁訶棃勒抱雪居士香附子随湯給事中甘遂斜枝大士草龍膽野丈白頭翁建陽八座蛇床子玄芳仲長統皁莢藂生藥王覆盆子仁枣川練子石仲寕滑石命門録事安息香隱上座郁李仁水状元紫蘇飛風道者牙硝畢和尚蓽澄茄金山力士自然銅麝男甘松氷喉尉薄苛草東床大腹皮腎曹都護葫芦巴夀祖威灵仙玲瓏藿去病藿香干眼油㽔人延年卷雪桑白皮水銀腊䡖粉黄香影子梔子六停劑五味子顯明􅘣阿膠出様珊瑚木通中央粉蒲黄瘡帚何首烏支觧香丁皮洗瘴丹㯽郎海腊騏驎竭水磨橄㰖金鈴子無名印地榆無憂扇枇杷葉鬼木串槐角黒殺星夜明砂續命筒乾􅃮蛮龍舌血沒薬清凉種香薷羽化魁五加皮度厄錢連翹聖蘢鬆瞿麦翻胃木常山湯主山茱茰醒心杖逺志玉皇瓜馬兠鈴偷蜜珊瑚甘草徳児杏仁混沌螟蛉寄生永嘉聖脯乾姜紅心石赤石脂薬本五灵脂静風尾􅍮介正坐丹砂附子迎湯子免絲子山屠黄蘖脾家瑞氣肉豆􅱍甜面淳于蜜陀僧剔骨香青皮痰宫劈歴半夏玉虚飯龍腦銷眉根苦参黒龍衣鱉甲小帝青青塩百辣雲生姜綬帶米麦蘖半夏精天南星夜金䧺黄沙田髄黄精無声虎大黄小昌明草烏頭草兵巴豆巢煙九肋烏梅百子堂草果子皺面還丹人参琥珀孫松脂賊参薺苨不死􅔇伏令火泉竹瀝比目沉香烏薬陸續丸蔓荆子地白瓜蒌根天豆破故𥿄滴膽芝黄連新羅白肉白附子􅛀香嬌丁香破関符蓬莪术玉絲皮杜仲血櫃牡丹皮川元蠢芎九女春鹿耳百薬綿黄耆英華庫益智通天柱杖牛藤赤天佩姜黄丹田霖雨巴㦸百文鬚石斛飛天蕊旋覆花安神隊杖麦門冬鄆芝天麻錦繍根芍薬草魚目薏苡茅君寳篋蒼术尉佗圭桂錬形松子柏子仁蘆頭豹子柴胡丑寳牛黄肚裏屏風艾九畹菜澤蘭女二天當歸大通緑木香旱水晶鵬砂還元大品地黄兩平草羗活死冰白僵蚕一寸楼臺蜂窠三尸籙拘𣏌無情手碙砂㧞萃團麝香緑鬚姜細辛笑靨金菊花走根梅乾葛八月珠茴香銀條徳星山薬埋光烏薬良姜椹聖畢撥破軍殺大戟吉祥杵桔梗金母蛻欝金線子檀茅香良醫匕首亭歴産家大噐秦芁滴金卵延胡索鬼丹盧㑹宜州様子白豆􅱍瓦壠斑貝母孝梗知毋萬金茸紫苑秦尖疾黎西天蔓前胡蕨臣卷柏五福臠白歛保生叢藁本狨奴狗脊蒜腦藷百合備身弩芫花帝膏蘇合香王靈片石膏宋馬永卿嬾真子録云古人重譜系故雖世胄綿逺可以考究渊明命子詩云天集有漢眷于愍侯赫赫愍侯運當攀龍撫劒風邁顯兹武功參誓山河啓土開封按漢功臣表開封愍侯舎以左司馬從漢破代封侯昔髙帝與功臣盟云使黄河如帶泰山若礪國以永存爰及苗裔所謂參誓山河謂此盟也髙帝功臣百有二十人舎其一也又云亹亹條載羅時有語黙運長源欝欝洪柯群川載導衆條載羅時有語黙運同隆窊此盖謂青也功臣表開封愍侯舎封十一年薨十二年夷侯青嗣四十八年薨所謂群川衆流以諭支派之分散也語黙隆窊以言自青後未有顯者也淵明乃長沙公之曽孫然侃傳亡載世家獨於此見之後世累經乱離譜籍散亡然又士大夫因循滅裂不如古人所以家譜不傳於世惜哉南村輟耕録卷之十六
