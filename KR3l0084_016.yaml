front:
  text: 南村輟耕録卷之十六
  hash: sha256:98ccd0b9aa48f8bc43d223fc61f39ce9dd5ffb9f04a9516cc50e621df46b14dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_016-1a}
body:
  text: 天台陶宗儀九成宋泰山王質所著雲韜堂紹陶録録中首載栗里華陽二譜惟先生之大節髙風流播千古而質者乃能次第其出處作為年譜且以名吾書紹陶之志是可尚巳遂録于此云書陶栗里譜元亮髙風彂于東晉去就之際君曽祖事晉懋著勳勞自宋武帝芟元復馬逆揣其末流即不出武帝將收賢士繫人心見要亦不應陶謝皆世臣君世地色言俱辟而靈運為武帝秉任最後乃欲詭忠義雜江海逺公送君過虎溪而却靈運不入蓮社素心皆所鑒知譜具左方興寧三年乙丑晉哀帝君生於潯陽柴桑今德安縣楚城市是父軼名命子詩云於穆仁考淡焉虛止寄迹風雲冝茲愠喜陶氏自侃以武功擅世後裔稍襲故風多流亂岐蓋折翼之祥彂之旁派傳淡傳君父子皆以隱德著稱侃女適孟嘉嘉女適君父是生君其氣所傳造化必有可言者太元元年丙子晉武帝君年十二失母祭妹文云慈妣早世我年二六太元九年甲申君年二十失妾楚調詩云弱冠逢世阻始室喪其偏妻翟氏偕老所謂夫耕於前妻鉏於後當是翟湯家湯莊矯法賜四世以隱行之名亦柴桑太元十九年甲午君年三十有歸園田詩云誤落塵網中一去三十年𥘉為州祭酒當在其前不堪乃解歸故云久在樊籠裏復得返自然尋亦却主簿隆安四年庚子晉安帝君年三十六五月有從都還阻風規林詩當是參鎮軍䘖命自京都上江陵故在始作鎮軍參軍經曲阿詩後父在柴桑故云一欣侍溫顔又云久遊戀所生父為人度不肯適都當是巳舍單行見還舊居詩軍僚差疆郡吏故云時來苟冥會婉戀憩通衢投䇿命晨􅏻暫與田園疏隆安五年辛丑君年三十七正月有遊斜川詩云開歲倐五十方二十七作五日是當是故歲五月還潯陽今歲七月適江陵有赴假還江陵夜行途中詩留潯陽踰年當是豫告在鄉至是往赴云間居三十載自未參鎮軍以前得三十六年當是不堪勞役遂起歸意故云詩書敦宿好園林無俗情如何捨此去遙遙至南荆失父祭妹文云昔在江陵重罹天罰觸事未逺書疏猶存當是妹自武昌報江陵時父在柴桑元興二年癸卯君年三十九正月有始春懷古田舍詩當是自江陵歸柴桑復適京都宅憂居家思湓城故有懷古田舍又云良苗懷新十二月有與從弟敬逺詩云寢迹衡門下在都亦當是處野元興三年甲辰君年四十有連雨獨飲詩云僶仰四十年有飲酒詩云是時向立年志氣多所耻遂盡分然分終死歸田里當是在壬辰癸已為州祭酒之時所謂投耒去學仕又云冉冉星氣流亭亭復一紀至是得十二年義熙元年乙已君年四十一三月有為建威參軍使都經錢溪詩當是故歲自都還里即言庚子始事鎮軍繼事建威中經罹憂至是得六年復䘖命至都其家尚未歸柴桑還舊居詩云疇昔家上京六載去還歸往來時經鄉閭不常留稍成疏故云阡陌不移舊邑屋或時非履歷周故居鄰老罕復遺至是始定居斷他適十一月有歸去來辭九月家留柴桑身往彭澤至是免歸當是不堪軍役故求縣不堪縣役故歸家所謂風波未定心憚逺役彭澤去家百里公田足以為酒少日眷然有歸與之情平生之志始決見序及辭甚詳失妹所謂情在駿奔自免去職是歲劉將軍録尚書義熙三年丁未君年四十三有祭程氏妹文自乙巳至是所謂服制再周義熙四年戊申君年四十四有六月遇火詩云奄出四十年義熙五年巳酉君年四十五有九日詩義熙六年庚戍君年四十六有西田獲早稻詩義熙七年辛亥君年四十七有祭從弟敬逺文云絶粒委務考槃山隂晨采上藥夕間素琴當是同志見文甚詳義熙十年甲寅君年五十有雜詩云奈何五十年棄官來歸至是得十年故云荏苒經十載暫為人所羈義熙十一年乙邜君年五十一有與子儼等疏云年過五十又云見樹木交蔭時鳥變聲亦復欣然五六月北窗下卧遇涼風暫至自號羲皇上人見疏甚詳義熙十二年丙辰君年五十二有下潠田舍穫詩云曰為此來三四星火頽當是得此在癸丑甲寅之間義熙十四年戊午君年五十四楚調云僶俯六九年召為著作佐郎不應是歲宋公為相國元熙元年巳未晉恭帝君年五十五王休元為江州自造不得見遣其故人龐通之等齎酒於半道栗里要之即引酌野亭休元出與相聞極歡終日嘗九日把菊無酒休元餉之有九日間居詩所謂秋菊滿園時醪靡至當是未獲所遺休元在江州幾六載未審的在何年自乙巳至丁邜訖死未嘗他適獨暫為休元入州永𥘉元年庚申宋武帝君年五十六同隱周續之召至都為顔延之連挫義熙間檀韶為江州􅌽續之在城北講禮讎書有示周掾祖謝詩云馬隊非講肄校書亦巳勤又云但願逺渚中從我潁水濵江城尚不欲周往奚况京師劉遺民亦同隱有和劉柴桑詩云挈杖還西廬又云春醪解飢劬其還以春有酬劉柴桑云嘉穟眷南疇又云慨然知巳秋其還至是及秋𥘉自西廬移南村有移居詩云聞多素心又樂與數朝夕又云過門更相呼有酒斟酌之遷居殆為遺民之徒尋還西廬度相距亦不逺與遺民更相酬酢不改賞文析義之時未審的在何年或恐劉柴桑似縣令劉或嘗為此縣存此呼或有命不為猶續之嘗命為撫軍參軍不就因呼周掾皆不可知但非時為宰者語皆冷交非熱官丁柴桑詩云秉直司聰于惠百里此乃當官無疑尋詩鍾情於劉過厚於周遺民自隱之餘無聞續之在隱之中微婉君與周劉號潯陽三隱校情義稍有淺深是歲宋武帝踐祚景平元年癸亥晉營陽王君年五十九顔延之為始安過潯陽日造飲酣醉臨去留二萬錢悉送酒家相知久間驟見益歡延之未審何時來柴桑所謂自尓分居及我多暇伊好之洽接􅉉鄰舍當是不詣劉穆之之時又未審何時去柴桑當是為豫章世子參軍之時據誄參傳略見元嘉三年丙寅宋文帝君年六十二檀道濟為江州時抱羸疾多瘠餒往候饋以梁肉不受元嘉四年丁卯君年六十三有自祭文云律中無射擬挽歌詩云嚴霜九月送我出逺郊當是抄秋下世顔延之誄云視化如歸臨凶若吉藥劑弗嘗禱祠弗恤其臨終髙熊見誄甚詳君平生好談歸盡蕭統以為處百齡之內居一世之中倐忽白駒寄寓逆旅與大塊而榮枯隨中和而放蕩豈能勞於憂偎役於人間最知深心形贈影答神釋本趣略見所謂縱浪大化中不喜亦不懼應盡便須盡無復獨多慮惟患不知既巳洞知安坐待此夫復何言杜甫許避俗未許逹道識者更詳之書陶華陽譜通門髙風彂於梁齊宋去就之際君祖父皆食宋祿身又生宋代自齊髙帝代宋旋引去梁武帝代齊益退藏平時以師待君然大節有定操豈復以恩禮推移暫至丹陽應簡文之命不少至京都慰武帝之懷抑何其堅忍壯年果於遺世照之審故判之不疑譜具左方孝建三年丙申宋世祖君生於丹陽秣陵今上元縣冶村是母郝氏夢兩天人持爐爇香來前有娠今世為君再世為孫思􅥞兩世肇啓於郝故其兆先形當是本居天仙趣報盡還入人趣植根弗凡受形亦異生以火年火月又夏至極陽日悉稟純陽多起飛心纍功積行所升當益髙推佛言參君迹略見大明四年庚子君年五歲常持荻畫灰學書泰始元年乙巳宋明帝君年十歲得葛洪神仙傳即有志飬生語人仰青天睹白日不覺為逺及長博讀書邃解文武諸伎自後天文地理人事雖至淵妙咸臻底極當時巳罕傳歷年愈逺行世寖梁傳所載十二種今傳惟三種傳不能紀十種唐志所載九種今傳惟四種傳有志無八種傳無志有五種本草後人增衍考正益詳間與集注差異元徽二年甲寅宋蒼梧王君年十九蕭將軍録尚書引為諸王侍讀故事止典文學無它務除奉朝請故事止奉朝會請召本不為官雖在宦途亦居靜地及求縣乃不遂緣藝可見永明十年壬申齊世祖君年三十七家貧求宰縣不遂脫朝服挂神武門去止句曲山體即輕捷性嗜山水所歷必吟咏盤旋不巳語人吾見朱門廣夏雖適其華樂而無欲往之心望髙岩瞰大澤知難立止自常欲就之永明中求祿得輒差舛不尓豈得為今日之事亦緣藝使然此語甚真是事先有根次有緣次有藝相苻乃入所謂道生之德畜之物形之藝成之惟難契故曠世難就隆昌元年癸酉齊鬱林王君年三十八沈約為東陽屢要不至自棲句曲不出所謂遍歷名山求訪仙藥或未然一至句章禮育王塔一至丹陽應太子召他適皆無考又言往東陽從孫遊嶽受符啚經法亦無考惟楊羲靈寶五符傳句容葛粲粲以傳陸修靜陸以傳孫許􅔘二景歌東陽章靈民出都遇得以與孫度所得止在林陵句曲之間非逺適而後傳永元元年已邜齊東昏侯君年四十四在句曲築樓髙三層身處其上弟子居其中賔客至其下與物遂絶不娶無子它眷亦不通先斷此根可議他事特愛松風庭院皆植松聆響為樂間獨遊泉石此門忌濁便清神仙上景多雲霞下景多山水物多金玉色多紫碧它皆類是所謂熟之飬之覆之若欲成辦必皆將護大要離塵換境為上中興元年辛巳齊和帝君年四十六蕭都督至新林遣弟子戴猛之迎謁𥘉齊末作水丑木之歌至是援讖文成梁字令弟子進之遂以梁建國後覆沒亦預言朱點已已詩嘆朝陽重離七元卒驗雖隱茅山不郤人主詢謀中大通𥘉獻善勝成勝二刀度武帝狃陳慶之覆魏洛陽好大之心寖侈參會侯景大觸駭機豈盡忘救世者但觀時耳蚤慕張良甚深黃石編書蓋傳真祕課兵法其間餘事推巳及物亦致平緒術此門隱除魔顯定亂學道者間及君箸水鏡握鏡當是早為豈挂晚念天監元年壬午梁髙帝君年四十七梁武帝在西邸與遊及即位恩禮彌篤問訊弗絶屢招不出畫兩牛一枚放水草之間一金絡頭人執杖驅之知不可復致旁族季直亦不肯事梁武帝嘗歎梁有天下遂不見此人門風何繇乃尓天監四年乙酉君年五十積居積金澗泉石益竒無蛇虎有佳术及雜藥𥘉乏青林及來居皆自茂在句曲東壟中大通元年已酉君年七十四遇異人宣闓以本草用虻蟲水蛭之屬傷物遲一紀可解形至期果化尸解凡十餘種世傳誾自青城來句曲先升以君聞帝録其積水之功化後為蓬萊都水監見仙傳及拾遺甚略今茅山相傳稍詳但微􅍱異大同二年丙辰君年八十一隻眼或方夢勝力菩薩授菩提記乃詣鄮縣禮阿育王塔自誓受戒世傳吕岩從鍾離權受劒訣後二百餘年來參黃龍惠南始竟佛言不修正覺別得生理休止深山大島絶於人境報盡還來散入諸趣晚年始堅此碩唐志有所著草堂法師傳當時佛教雖隆禪宗未開圓覺以大通元年至以是年去留臺城十九日度君不及相見大同六年庚申君年八十五逆尅亡日仍為告逝詩及卒顔色如常香氣彌山華陽頌云號其行當滿亥數未終丁逮乃承唐世將賔來聖庭化後一遇丁亥為陳臨海王光大元年再遇丁亥為唐太宗貞觀元年升平之盛降古所稀聖庭當是此時𥘉隋文帝輔周以國子博士召孫思􅥞不應密言後五十年有聖人出吾且助以濟人宣政元年至貞觀元年適滿五十年應命來見太宗官之不受辭歸太白山風素極類隱居它無種不類形有轉移神無變易自是至丁卯獨孤信鎮洛陽之時正七歲至丁亥太宗召至長安之時得八十七歲暮齡有少容所以驚嗟盧照鄰稱其自謂生開皇辛酉當時巳不信若尓豈得聖童之稱博士之召貞觀丁亥方二十七歲豈得少容之歎若言數百歲豈得七歲弱冠之譽度思邈之生適繼隱居之沒其為後身何疑挺契頌又云重離倘或似謂簡文與武帝俱非令終又云七夕乃扶胥謂武帝凡七改元世稱推戴為䇿立侯景嘗為懷朔鎮功曹吏至是篡梁稱漢故云扶胥所謂篇中字皆有義旨後人自以篇中事求之則機萌一頌二十字顧蓋虛設矧又彰明業運頌又云濟神既有在去留徒所冝神既濟矣在於何所華原孫氏即其所在也巳當知佛言報盡還來及舍生趣生至確可信識者更推之清異録二卷乃宋陶翰林榖所撰凡天文地理君道官志人事女行君子么麼釋族仙宗草木花果𬞞藥禽獸蟲魚支體作用居室衣服妝飾陳設器具文用武器酒漿茗荈饌羞喪葬鬼妖皆創為異名新説而藥譜一則尤竒甚因備録之藥譜苾芻清本良於醫藥數百品各以角貼所題名字詭異余大駭究其源底答言天成中進士侯寧極戲造藥譜一卷盡出新意改立别名因時多艱不傳于此余以禮求假録一通用娛間暇假君子牽牛昌明童子川烏頭淡伯厚朴木叔胡椒雪眉同氣白扁豆含丸使者椒馘毒仙預知子貴老陳皮逺秀卿沉香化米先生神麴九日三吳茱茰𦦨􅙕硫黃三閭小玉白芷中黃節士麻黃時美中蒔蘿導河掾木豬苓嗽神五味子削堅中尉三稜曲方氏防風白大夀吳术洞庭奴隸抧殼黃英古檀香緑劒真人菖蒲魏去疾阿魏禹孫澤瀉槖籥尊師仙靈脾風稜御史史君子雪如來白及風味團頭縮砂赦肺侯欵冬花骨鯁元君卑解苦督郵黃岑調睡參軍酸棗仁黑司命從容知微老白薇太青尊者朴硝既濟公升麻冷翠金剛石楠葉脫核嬰兒桃仁澀翁訶梨勒抱雪居士香附子隨湯給事中甘遂斜枝大士草龍膽野丈白頭翁建陽八座蛇床子玄芳仲長統皂莢藂生藥王覆盆子仁棗川練子石仲寧滑石命門録事安息香隱上座郁李仁水狀元紫蘇飛風道者牙硝畢和尚蓽澄茄金山力士自然銅麝男甘松氷喉尉薄苛草東床大腹皮腎曹都護葫蘆巴夀祖威靈仙玲瓏藿去病藿香干眼油㽔人延年卷雪桑白皮水銀臘輕粉黃香影子梔子六停劑五味子顯明􅘣阿膠出樣珊瑚木通中央粉蒲黃瘡帚何首烏支解香丁皮洗瘴丹檳郎海臘騏驎竭水磨橄欖金鈴子無名印地榆無憂扇枇杷葉鬼木串槐角黑殺星夜明砂續命筒乾􅃮蠻龍舌血沒藥清涼種香薷羽化魁五加皮度厄錢連翹聖蘢鬆瞿麥翻胃木常山湯主山茱茰醒心杖逺志玉皇瓜馬兜鈴偷蜜珊瑚甘草德兒杏仁混沌螟蛉寄生永嘉聖脯乾薑紅心石赤石脂藥本五靈脂靜風尾􅍮介正坐丹砂附子迎湯子免絲子山屠黃蘖脾家瑞氣肉豆􅱍甜面淳于蜜陀僧剔骨香青皮痰宫劈歷半夏玉虛飯龍腦銷眉根苦參黑龍衣鱉甲小帝青青鹽百辣雲生薑綬帶米麥蘖半夏精天南星夜金雄黃沙田髓黃精無聲虎大黃小昌明草烏頭草兵巴豆巢煙九肋烏梅百子堂草果子皺面還丹人參琥珀孫松脂賊參薺苨不死􅔇伏令火泉竹瀝比目沉香烏藥陸續丸蔓荆子地白瓜蔞根天豆破故𥿄滴膽芝黃連新羅白肉白附子􅛀香嬌丁香破關符蓬莪术玉絲皮杜仲血匱牡丹皮川元蠢芎九女春鹿耳百藥綿黃耆英華庫益智通天柱杖牛藤赤天佩薑黃丹田霖雨巴戟百文鬚石斛飛天蕊旋覆花安神隊杖麥門冬鄆芝天麻錦繍根芍藥草魚目薏苡茅君寶篋蒼术尉他圭桂錬形松子柏子仁蘆頭豹子柴胡丑寶牛黃肚裏屏風艾九畹菜澤蘭女二天當歸大通緑木香旱水晶鵬砂還元大品地黃兩平草羌活死冰白僵蠶一寸樓臺蜂窠三尸籙拘𣏌無情手碙砂拔萃團麝香緑鬚薑細辛笑靨金菊花走根梅乾葛八月珠茴香銀條德星山藥埋光烏藥良薑椹聖畢撥破軍殺大戟吉祥杵桔梗金母蛻鬱金線子檀茅香良醫匕首亭歷産家大器秦芁滴金卵延胡索鬼丹盧會宜州樣子白豆􅱍瓦壠斑貝母孝梗知毋萬金茸紫苑秦尖疾黎西天蔓前胡蕨臣卷柏五福臠白斂保生叢藁本狨奴狗脊蒜腦薯百合備身弩芫花帝膏蘇合香王靈片石膏宋馬永卿懶真子録云古人重譜系故雖世胄綿逺可以考究淵明命子詩云天集有漢眷于愍侯赫赫愍侯運當攀龍撫劒風邁顯兹武功參誓山河啓土開封按漢功臣表開封愍侯舍以左司馬從漢破代封侯昔髙帝與功臣盟云使黃河如帶泰山若礪國以永存爰及苗裔所謂參誓山河謂此盟也髙帝功臣百有二十人舍其一也又云亹亹條載羅時有語默運長源鬱鬱洪柯群川載導衆條載羅時有語默運同隆窊此蓋謂青也功臣表開封愍侯舍封十一年薨十二年夷侯青嗣四十八年薨所謂群川衆流以諭支派之分散也語默隆窊以言自青後未有顯者也淵明乃長沙公之曽孫然侃傳亡載世家獨於此見之後世纍經亂離譜籍散亡然又士大夫因循滅裂不如古人所以家譜不傳於世惜哉南村輟耕録卷之十六
