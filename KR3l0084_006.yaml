front:
  text: 南村輟耕録卷之六
  hash: sha256:bab0c75a564ca461703dca8364c4bc36624d77421e4b92608db1468bdd273ae4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_006-1a}
body:
  text: 天台陶宗儀九成蘭亭一百一十七刻􅏻禠作十册乃宋理宗內府所藏每版有內府圖書鈴縫玉池上後歸賈平章至國朝有江南八十餘年之間凡又易數主矣往在錢唐謝氏處見之後陸國瑞携至松江因得再三披閲併録其目真傳世之寶也甲集一十二刻州郡修城本葉仲山跋定武闊行若合一契行闊定武肥定武瘦定武板刻霍子明跋定武缸石定武斷石定武古刻西京斷石永興古懿郡齋宣城乙集一十三刻舊梅花三衢板刻安吉古苔真草臨川麻石臨賀豫章二靜江府復州鼎州後有武陵二字古潭新梅花宣城南陵丙集一十刻蘇州府治福州府治福州棗木道州金陵三米米芾米尹仁米尹知永嘉古霅斷石隆州郴州蘭亭重言丁集一十刻紹興府治二紹興倉司紹興府學紹興古刻餘姚縣治曲水詩蘭亭曲水詩前曲水詩後婺州府治禇遂良摹戊集一十刻內府髙宗臨定武米友仁跋唐貞觀太清開皇祕省內殿內司四京司玉堂已集九刻雜集玉枕花石栁誠懸大字唐人硬黃臨唐人雙鈎晉唐刻孫過庭草京師鵝黃棗木黃𥿄印彭城小字庚集一十一刻故家蔡君謨臨薛紹彭秦少遊小字安定家藏辛道宗建康朝謙之紹興湯氏南昌京氏廬陵胡氏蜀劉涇唐摹刻辛集一十四刻吳詵草書吳璜劉無言臨龍潭潘氏方朔習寫周平所藏臨江張氏天台丁氏新安汪氏江西故家廬山甲秀堂九江陶氏循王家藏米芾跋云壬午閏六月九日大江齊川亭艤寶晉齋艎對紫金浮玉羣山迎快風消暑重􅏻番陽洪氏壬集一十四刻金陵畢氏廬山吳氏紹興曽氏紹興石氏二毗陵尤遂𥘉李忠愍所刻新唐李氏江隂丘氏二東陽郭氏昌谷曺氏三癸集一十四刻趙虛齋吕氏家藏建鄴朱氏大梁曽朴陸子與韓松陸載之胡氏將玉林二趙菊坡不題名二錢唐李和薑白石先生禊帖偏傍考云永字無畫發筆處微折轉和字口下橫筆稍出年字懸筆上湊頂在字左反剔歲字有點在山之下戈畫之右事字腳斜拂不挑流字內字處就回筆不是點殊字挑腳帶橫是字下匹凡三轉不斷趣字波略反捲向上欣字欠右一筆作章草發筆之狀不是捺抱字已開口死生亦大矣亦字是四點興感感字戈邊是直作一筆不是點未嘗不不字下反挑腳處有一闕右法如此其多略舉其大槩持此法亦可以觀天下之蘭亭矣五字損本者湍沉帶右天五字有損也顧德玉字潤之檇李人自幼從寧國路儒學教授俞觀光先生學先生無子嘗與人曰昔吾寢疾于杭潤之侍湯藥情至切若父子醫為之感動弗忍受金今我行且老必託之以死既而訪醫中吳病且革趣舟歸潤之進次尹山卒時後至元𥘉元閏十二月戊子也明日乃至檇李潤之奉其尸斂于家衰經就位邦人士為潤之來吊者潤之拜之越明年葬于海鹽邇顧氏之先塋歲時祭享惟謹或曰斂于家禮與曰吾聞師哭諸寢又云生于我乎養死于我乎殯非家斂之則將尸諸草莾生服其訓死而委諸草莾有仁心者弗為也曰師無服而為衰經固近于掠美者矣曰疑衰加麻之經帶禮也故曰二三子絰而出至葬除之心喪戚容終三年夫民生於三師居其一於父也何異今吾則加一等以行之蓋出於仁心天理之本然若之何其惑也聞者嘆伏先生諱長孺越之新昌人吁聖逺言湮世道不古久矣朝為師生而莫若途人者比比皆是潤之乃獨能行人之所難行於不可行之時蓋絶無而僅有者真仁矣哉天下後世之為人弟子而忘其師聞潤之之言寧不有動于中與徐文獻公為浙西廉使時治所尚在平江有旨遷置于杭歲云莫矣擇日啓行一書吏者掌照刷支郡諸司案牘官吏合受稽違罪責巳皆取狀至是引決公謂曰正旦在邇此曺乃職官俸吏禮宜陪位望闕致賀受刑而從事無恥也否則為不敬盍别議之吏以白于幕官因進曰相公長厚之道固如此然將若之何公曰奚難立案候明年分司施行可也庭下歡聲如雷此亦厚風化之一端故記之公既遷司至杭一日有本路總𬋩與一萬户謁公私第公以賔禮延之上坐適書吏從外來見而趍避伺其退入見曰總𬋩萬户皆屬官耳得無體貌之過與公曰在公府則有尊卑之辨若私宅須明主客之分我輩能廉介則百司自然知懼何待恃威藝以驕凌之然後為尊嚴潭又次之武岡又次之大觀尤妙武岡佳者可亂絳臨江佳者可亂閣潭乃僧希白所模有江左風味希白工于摹字拙于尋行數墨文理錯繆然則雖工其如難讀何其字比之淳化帖為勝東坡推潭帖勝閣帖韓托胄家開群玉帖字好薛紹彭亦有家孰帖好大梁劉衍卿丗昌云大德巳亥婦翁張君錫檇余同觀淳化祖石帖卷尾各有題識第一卷邊髙平范仲淹曽觀年月日題第五卷東坡張文潛等題又有薑白石小楷三四十字第六卷洛陽伊川老夫不知為何人又大學博士陳士元云此正祖石又有蘇舜欽題第七卷陳簡齋奉旨觀於秋香亭下云魏晉法書非人間合有自我太宗皇帝刻石竉錫下方見不滿十數臣與義頓首謹書第八卷蘇頌云此帖世不多見是日賞牡丹得觀于相君西齋張舜民題亦在此卷第十卷太宗淳化四年六月草二者賜畢士安賜字上寶後假畢丞相黃字書子孫保享等語百餘字逐卷有髙宗內府印百餘顆後有賈氏長字印又有一小印合縫云是蔡太師印山和尚錦􅏻禠籖頭題云淳化祖石刻及見吳郡陸友仁友云嘗觀楮伯秀所記江南李後主命徐鉉以所藏古今法帖入石名升元帖此則在淳化之前當為法帖之祖劉陸之説殊不相合偶讀劉跋暇日記亦載此事云馬傳慶説此帖本唐保大年摹上石題云保大七年倉曺參軍王文炳摹勒校對無差國朝下江南得此石淳化中太宗令將書館所有增作十卷為版本而石本復以火斷缺人家時收得一二卷然閣帖於各卷尾篆書題云淳化三年壬辰歲十一月六日奉聖旨模勒上石此侍書王著筆也而陳簡齋亦云太宗刻石則衍卿所謂祖石刻豈即南唐時帖乎仰太宗增刻者但不知南唐亦作十卷否徐鉉馬傳慶二説又不同今世言淳化閣帖用銀錠􅗚棗木板刻而以澄心堂𥿄李廷圭墨印者則傳慶板本之説合故趙希鵠洞天清祿集亦云用棗木板摹刻故時有銀錠紋用李廷圭墨打手楷之不汚手余嘗見閣本數十止三本真者其紙墨法度種種逈别妙在心悟固難以言語形容然又傳仁宗嘗詔僧希白刻石于祕閣前有目録卷尾無篆書題字所謂祖石刻者豈即此與世言家之尊者曰家主翁亦曰家公唐代宗謂郭子儀曰鄙諺有云不癡不聾不作家翁世之鄙人之不肖者為奴材郭子儀曰子儀諸子皆奴材也湖南益陽州夜中同寢之人無故忽自相打每每有之名曰沙魘土人熟此不以為異唯取冷水噴噀候稍息飲之湯徐就醒然猶二三日如醉餘不知者殊用驚駭延祐乙卯冬平江常熟之支塘里民朱良吉日母錢氏年六十餘病將死良吉沭浴禱天以刀剖胸割取心肉一臠煮粥以飲母母食粥而病愈良吉心痛就榻不可起鄰里憐其且欲絶乃裒財命頥真觀道士馬碧潭者醮告神明祈隂祐之是日邑人俞浩齋聞而過其家視良吉胸間瘡裂幾五寸氣騰出痛莫能言俞為納其心以桑白皮線縫合未及期月已無恙矣俞因述其事以為世勸吳郡宋翠岩先生有詩紀之其小序曰夫孝為百行宗人以父母遺體而生乳哺鞠育教誨叩勞其恩號罔極然而剖心封股恐其傷生而或死也父母存而子死故又有禁止之令焉觀今世降俗薄悖逆其父母者視良吉何如哉如良吉者自當旌異為世教勸而有司曽莫能省原其一念之純剖心之際動天地感鬼神固不待賞之於有司而天地神明固已隂録其孝矣太上感應篇所謂若人者人敬之天佑之福録隨之衆邪逺之神靈衛之今日謝世明日為地下主進輔仙階若良吉者有焉故為顯白其孝以為人子之勸省也宗儀之先人有孝感一事人多傳道之會稽張君思廉嘗書于楊鐡崖先生所撰墓銘之後矣今併録于此云元故白雲漫士陶明元氏諱煜弱冠時用道家法事所謂玄武神甚謹明元母病心痛痛則拍張跳躅齧牀簀衾褥號呌以紓苦楚歲瀕死者六七發醫莫能愈明元每搯心嚼舌以代母痛一日危甚計無所出走禱玄武前曰刲股割肝非先王禮在法當禁某非不知也今事急矣敢犯死取一臠為湯劑神尓有靈疾庶幾其瘳禱畢即引刀𣣔下忽有二童自外躍入叱曰毋自損我天醫也明元大駭伏地乞哀童子取案上筆書十數字于几面擲筆二童子咸仆地隨呼家人救之噀以水良久蘇乃鄰氏兒也叩之無所知焉視其書藥方也隨讀隨隱明元私喜曰此必玄武神也吾母其瘳矣即如方治之藥甫及口而痛已失終母身不再舉張子曰齊諧志怪聖人不道左氏尚誣君子非之明元之事遂昌鄭元祐狀行會稽先生楊維禎志墓皆不書非逸也畏譏而削之也彼以謂玄武神者西北方之氣也莾蒼無知非如俞跗岐扁能切脈察也投湯尉火抉腸剔胃以取人疾在理所不通故不書雖然動天地感鬼神莫大乎孝焉知冥冥中英魂烈氣不散者或如俞跗岐扁依慿精魄以遂孝子之請也不然何穹然漠然之體而有所謂天醫乎明元子宗儀與余友善其寓殯又在玉笥山下去余居不逺以是得其實尤詳故寧受左氏之譏不敢沒明元之孝書曰與其殺不辜寧失不經先王之過蓋如此會稽張憲撰吾子行先生衍太末人大父為宋太學諸生因家錢唐先性曠放髙不仕之莭其所厭棄者或請謁從樓上遙謂曰吾出有間矣顧彈琴吹洞簫撫弄如意不輟求室委巷教小學常數十人與客對笑談喧樓上下群童一是肅安其所著述有尚書要略聽玄集造玄集九歌譜十十二月樂譜辭重正卦氣楚史檮杌晉文春秋兼通聲音律吕之學工篆書𥘉先生年四十未娶所知宛丘趙君天錫為買酒家孤女為妾年飢女嘗事人後夫知妻在先生所訟之因逮妾父母父母至客先生家又偽楮幣事覺因言舍主人先生固弗知因邏捽辱先生南出數百步録事張君景亮識先生叱邏曰是不知情攝之何為即解縱遣歸先生不勝慚明日持玄絛緇笠詣仇山村先生别值晨出因留詩一章詩西冷橋外斷橋邊之句意將從靈均于斯明日有得遺履于橋上者後衛大隱以六壬筮之得亥子丑順流象曰是其骨朽淵泥九十日矣西湖多寶院僧可權從先生學聞先生之死哭甚哀乃葬先生遺文于後山與其師骨塔相對曰皆吾師仍乞銘于胡石塘先生庶幾先生有後世名銘曰生弗瀆死弗辱貞哉白余習篆畫極愛先生翰墨得一𥿄半幅如獲至珍以故于書法頗有助偶與鄭遂昌先生談先生之始末就識之竹房竹素貞白皆先生號也何公巨川者京師長春官道士也會世皇將取宋乃上疏抗言宋未有可伐之罪遂命副國信使翰林學士郝文忠公經使江南殁于真州至正間詔追贈二品官有人作詩悼之云竒才不泄神仙事抗疏曽干世祖知每恨南邦本無罪空留北使欲何為忠魂久掩孤城館褒詔新鐫二品碑地上若逢姦似道為言故國黍離離婦人頭髮有時為膏澤所黏必沐乃解者謂之䐈按考工記弓人注云䐈亦黏也音職則髮䐈之䐈正當用此字陕西某縣一老嫗者住村莊間日有道流乞食與之無吝色忽問曰汝家得無為妖異所苦乎嫗曰然曰我為汝除之即命取火焚囊中符篆頃之聞它所有震霆聲曰妖巳誅殛才遁其一草年後汝家當有難今以鐡簡授汝至時亟投諸火言訖而去自是久之嫗之女長而且美一日有曰大王者騎從甚都借宿嫗家遣在右謂曰聞嘗得異人鐡簡可出示否蓋嫗平日數為它人借觀因造一偽物而以真者縣要間不置也遂用偽獻留不還謂曰可呼汝女行酒以疾辭大王怒便𣣔為姦意嫗竊思道流之説計算歲數又合乃解所佩鐡簡投酒竈火內既而電掣雷轟煙火滿室須臾平息擊死獼猴數十其一最巨疑即向之逃者所賫隨器行用悉係金銀寶玉走告有司籍入官庫泰不華元帥為西臺御史日閲其案朱語曰鬼贓云余親聞泰公説甚詳且有鈔具案文惜不隨即紀録今則忘邑里姓名歲月矣今人以居士自號者甚多考之六經中惟禮記玉藻有曰居士錦帶注謂道藝處士也吳曽能改齋漫録云居士之號始於商周之時按韓非子書曰太公封於齊東海上有居士任矞華仕昆弟二人立議曰吾不臣天子不友諸候耕而食之掘而飲之吾無求於人無上之名無君之祿不仕而事力云云然則居士云者處士之類是巳凡男女締姻者兩家相謂曰親家此二字見唐蕭嵩傳今北方以親字為去聲按盧綸作王駙馬花燭詩云人主人臣是親家則是亦有所祖親家又曰親家翁五代史劉昫傳昫與馮道為姻家而同為相道罷李愚代之愚素惡道之為人凡事有稽失者愚必指以誚昫曰此公親家翁所為蘇氏開談録馮道與趙鳯同在中書鳯有女適道中子以飲食不中為道夫人譴罵趙令婢長號知院者來訴凡數百言道都不答及去但云傳語親家翁今日好雪右此石是南唐寶石久為吾齋研山今𬒳道祖易去中美舊有詩云研山不易見移得小翆峯潤色裛書几隱約煙朦朧巉岩自有古獨立髙嵩巃安知無雲霞造化與天通立璧照春野當有千丈松﨑嶇浮波瀾偃仰蟠蛟龍蕭蕭生風雨儼若山林中塵夢忽不到觸目萬慮空公家富竒石不許常人同研山出層碧峥嶸實天工淋漓上山泉滳瀝助毫端揮成驚世文主意皆逢原江南秋色起凨逺洞庭寬往往入佳趣揮􅣁出妙言碩公珍此石美與衆物肩何必嵩少隱可藏為地仙余每誦此詩必懷此石近余亦有作云研山不復見哦詩從嘆息唯有玉蟾蜍向余頻唳滴此石一入渠手不得再見每同交友往觀亦不出示紹彭公真忍人也余今筆想成圖倣佛在目從此吾齋秀氣尤不復泯矣崇寧元年八月望米芾書余二十年前嘉興吳仲圭為畫啚錢唐吳孟思書文後擕至吳興燬千兵偶因清睱默懷往事漫記于此翰墨志云衛夫人名鑠字茂漪晉汝隂太守李矩妻善鍾法能正書入妙王逸少師之西溪藂語云夫人廷尉展之弟恆之從妹中書郎李充之母南村輟耕録卷之六
