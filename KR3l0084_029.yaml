front:
  text: 南村輟耕録卷之二十九
  hash: sha256:aeec2f394afee6efc9839bb274ccc5bf72c614588f63a3e7a721614c0cf168be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_029-1a}
body:
  text: 天台陶宗儀九成張士誠第九四淮南泰州白駒場人泰州地濵海海上鹽場三十有六隸兩淮運鹽使司士誠與弟士義士德士信並駕運鹽綱船兼業私販初無異于人先是中書省右丞相脫脫在任災異疊見黃河變遷至正十一年遣工部尚書賈魯役民夫一十五萬軍二萬决河故道民不聊生河南韓山童首事作亂以弥勒佛出世為名誘集無賴惡少燒香結㑹漸致滋蔓陷淮西諸郡繼而湖廣江西荆襄等處皆淪賊境山東杜遵道以李氏子為主起汝寧蕭縣李二老彭張君用攻陷徐州李二號芝麻李鄒普勝徐夀輝即真一據蘄黃鎮南班據江東又有毛貴陳友諒輩不可枚數分據各處方國珍弟兄嘨聚台州海上朱定一陳賢五江宗三作亂江隂初王克柔者亦泰州人家富好施多結游俠將為不軌髙郵知府季齊收捕于獄李華甫與䞛張四素感克柔恩謀聚衆劫獄齊以克柔解發楊州後招安華甫為泰州判四為千夫長十三年五月士誠又與華甫同謀起事未幾士誠黨與十有八人共殺華甫遂併其衆焚掠村落驅民為盜陷通泰髙郵自號誠王改元天祐設官分職把截要衝南北梗塞立淮南中書省于楊州以厄其勢既而亦招安之立義兵元帥府以官其黨然徂詐百出卒不就降殺知府李齊十五年五月攻破楊州路殺淮南行省參政趙璉士義𬒳獲伏誅既而退還髙郵至九月二十五日又攻破楊州適湖廣行省右丞阿魯恢引苗軍來十月𥘉一日復退丞相脫脫親捴大軍以擒之衆號百萬旌旗輜重首尾千里以為髙郵刻日可平然脫脫與弟御史大夫也先帖木兒專權日久及出師遂有議其後者詔脫脫安置淮安路也先帖木兒安置寧夏路别選相臣統其兵詔未下時部將董摶霄每對脫脫言天兵南下勢如破竹今老師費財何面目歸報天子不若先攻其易脫脫從其言分兵破天長六合賊皆潰散所殺者悉良民及攻髙郵隳其外城城中震恐自分亡在旦夕忽聞詔解其權勇氣百倍出城拒敵諸衛鐵甲軍抱不平者盡皆散去或相聚山林為盜髙郵不可得而復矣江隂群寇互相吞啖江宗三朱英分黨戕殺宗三將入城殺英州之僚佐無如之何遂申白江浙行省云朱英謀反省差元帥觀孫壓境觀孫利其貨賂逗遛不進英因乘間挈家逸去過江求救于士誠仍質妻子借兵復讎士誠𥘉亦疑惑弗聼英盛陳江南土地之廣錢糧之多子女玉帛之富以動其中於是先遣士德率髙郵賦衆擊橫坍渡福山十六年正月朔攻破常熟州江南自兵興以來官軍死鋒鏑郡縣荐罹饑饉鄉村農夫離父母棄妻子投充壯丁生不習兵而驅之死地以故烏合瓦解卒無成功江浙行省丞相逹識帖木兒有旨得便冝行事升漕運萬戶脫因為參政統領官軍民義捍禦境上平江逹魯花赤六十病亡升松江府逹魯花赤哈散沙為平江達魯花赤領兵出戰除都水庸田使貢師泰為平江總管巡守城池吳江境上止有元帥王與敬官軍一戰而敗死者過半殘兵千餘欲走入城城中間門不納退屯嘉興旋抵松江士誠賊衆才三四千人長軀而前直造北門弓不發矢劒不接刃明旦緣城而上遂據有平江路二月壬子朔也劫掠姦殺慘不忍言脫因匿俞家園自刎不死遊兵殺之哈散沙在境外聞城破自溺死既時崑山嘉定崇明州人相繼來降維楊蘇昌齡比先避亂居吳門士德用為參謀稱曰蘇學士毀承天寺佛像為王宫易平江路為隆平郡立省院六部百司凡有寺觀菴院豪門巨室將士爭奪分占而居了無虛者幾月進攻嘉興全師覆沒與敬據松江叛以城降常州豪俠黃貴甫問道歸欵許為內應不戰而城破易為毗陵郡分兵入湖州一鼓而得易為吳興郡隆平太守周仁家本煆工稍習吏事性資深刻與士德同心僇力躬親細故三月癸巳士誠來自髙郵服御器用皆假乘興改至正十六年為天祐三年國號大周曆曰明時設學士員開弘文館以隂陽術人李行素為丞相弟士德為平章提調各郡兵馬蔣輝為右丞鎮吳興史文炳為樞密院同知鎮松江郡州縣正官郡稱太守州稱通守縣仍曰尹郡同如稱府丞知事曰從事餘則損益而巳南向欲取嘉興嘉興則有參政楊完者統領苗獠猺撞名曰答刺罕守禦甚堅屢攻不克秋八月文炳大舉兵臨其東門悉為所殱文炳僅以身免士德又與與敬提兵入杭州軍器甚鋭杭州大軍斂鋒不敵丞相退避蕭山士德軍檢刮虜掠羅木營萬户普賢奴乃慶元路萬戶金駒兒之子年未弱冠智勇過人率兵先出完者部領苗軍繼進民亦挺身巷戰士德大潰收拾殘兵十喪八九及攻海鹽又為乍浦鍾氏所撓後得馬道驍勇擒獲苗軍無算西南接境賴此無虞不然松江非士誠有矣崑山數為方國珍海軍攻擊託丁氏往來說合結為婚姻崑山之民幸遂蘇息湖之長興武康與廣德相界花鎗軍出沒之地雖互有勝負然亦不勝其苦所跨三州皆鄰勍敵可畏者特集慶一軍盛陸路則無錫宜興長興水路則太湖士馬震耀舳艫相銜自後長興陷常州又陷士德戰敗𬒳擒縛致集慶俾其作書勸士誠歸附士德以身徇之終無降意士誠勢窮力迫願就丞相招安使者往返訖莫成就仁親詣江浙省堂具陳自願休兵息民之意議始定時十八年秋八月也朝廷詔赦其罪後授士誠太尉開府平江士誠以下授爵有差立江淮分省江浙分樞密院于平江以設其官屬道家者流為人典行醮事曰髙功其有行業精白者則必移檄南嶽魏夫人請借仙鶴或二隻或四隻青鸞導衛翔鶩澄空昭揚道妙往住親見之偶讀本草有云降真香出黔南伴和諸雜香燒煙直上天召鶴得盤旋於上注按仙傳云燒之或引鶴降醮星辰燒之甚為第一度籙燒之功力極驗若然則鶴之來香所致也非歟長編所載宋二十一帝蓋自順宣僖三祖及太祖太宗真仁英神哲徽欽髙孝光寧理度少帝并端宗帝昺也吾衍子行間居録云舜生諸馮及馮婦等皆音皮氷切古不音符容切也馮婦與徐夫人皆男子三國時有暨艷乃吳人附陸抗傳當音結不音暨也條侯周亞夫自未侯為河內守時許負相之曰君後三歲而侯見史記絳侯傳注謂索隱曰應劭云負河內溫人老嫗也按楚漢春秋髙祖封負為鳴雌侯是知婦人亦有封邑趙公琪字元德官至贈湖廣行省參政諡文惠臨淄人飄然有神仙思常使方士燒水銀硫黃朱砂黃金等物為神丹以資服食有玉溪李簡易先生者得道為神仙數訪公授以其術久久隱去人或以為不死公思之一日見其至喜而固之先生曰吾逺來甚熱請具浴公即具浴先生就浴室久之不聞聲日且暮公親候之見有光昱然在水上圓如初日出不復見先生所在先生書藏公家今稍稍傳人間虞文靖序其事如此云嘗讀金黃華老人詩有招客先開四十雙之句殊不可曉近讀雲南雜志曰夷有田皆種稻其佃作三人使二牛前牽中壓而後驅之犁一日為一雙以二乏為已二已為角四角為雙約有中原四畝地則老人之詩意見矣骨咄犀蛇角也其性至毒而能解毒蓋以毒攻毒也故曰蠱毒犀唐書有古都國必其地所産今人訛為骨咄耳奉化陳氏婦以貞節稱者五人初陳元娶竺氏生子侗而元卒笁氏年才二十二義不再適後三十三年卒侗娶璩氏生子瑞泰二人侗亦以疾夭璩氏年二十六後五十八年卒瑞娶王氏生子通甫而瑞復夭王氏年三十後五十五年卒通甫娶樓氏樓氏甫笄歸于陳至二十六而寡父母欲奪其志泣下從其姑王氏年老樓氏事之尤謹姑卒斂葬悉如禮子四人長飬才娶樓氏生子孟雍孟熙而飬才遘疾不逾方卒時樓氏年二十六所守如其姑云隴西李子平氏子茂德聘同郡張氏女年十七歸李氏生子庸甫六歲而寡舅姑憐其少也欲嫁之使左右風之即引刀截髮以見志乃止荗德之弟仲德亦蚤卒其妻張氏年二十有八生子慶方齓亦誓不再適從弟希賢妻陳氏年二十有四希賢卒時其子度方孕四月守志益堅一門三婦以貞白聞庸至正間任至同知濟南路捴管府事推恩贈父同知益州路總管府事隴西郡伯毋封隴西郡夫人再調關襄宣慰階中奉大夫而夫人始卒黃龍洞在吳興郡北去城闉草里枕太湖其山皆怪石林立中有一石最尊上大其本小危立如幢自石上湧起輕撼則搖動稍加力排輒不動人甚異之洞旁壁立千仞俯瞰不能見底投以石下應以聲呼則相答深窅不測每歲旱郡民禱之東坡先生曽遊題詩述龍之迹山谷先生書黃龍洞三字刻猶存王古心先生筆録內一則云方外交青龍鎮隆平寺主藏僧永光字絶照訪豫觀物齊時年巳八十有四話次因問光前代藏經接縫如一線歲久不脫何也光云古法用楮樹汁飛麵白芨末三物調和如糊以之黏接紙縫永不脫解過如膠􅃮之堅先生上海人人欲娶妻而未得謂之尋河覔井已娶而料理家事謂之擔雪填井男婚女嫁財禮奩具種種不可闕謂之投河奔井凡納婢僕初來時曰擂盤珠言不撥自動稍久曰算盤珠言撥之則動既久曰佛頂珠言終日凝然雖撥亦不動此雖俗諺實切事情一錢太守劉寵廟在紹興錢清鎮王叙能參政過廟下賦詩曰劉寵清名舉丗傳至今遺廟在江邉近來仕路多能者也學先生㨂大錢全真紀實云金主亮貞元元年有吏員咸陽人王中孚者倡全真教談馬丘劉和之其教盛焉章宗泰和四年元學士作紫微觀記所載詳悉馬伯傑山東鄒縣人父某拜江南行臺監察御史不以家行傑獨與毋居盜起汝頴轉略齊魯境傑負毋匿草間毋死倉卒不能具棺斂聚石葬鄆地西盜入鄆城傑伏于墓上衆欲驅而前脅以白刃傑大慟曰毋在此毋在此盜曰此孝子也乃舍之復遺以衣糧既而邑刳于兵失墓所在求之二年得於榛莾中故衣尚存始克遷祔祖塋御史轉浙西憲僉留江南者八年遂冒鋒鏑間走數千里省之錢唐人咸稱為馬孝子云天台金沙里女王靜安年十七歸同邑楊伯瑞瑞為樞密院斷事官未幾死于兵靜安守節不嫁權貴爭求之至截髮自剄不殊宋葉置坦齊筆衡云陶器自舜時便有三代迄于秦漢所謂甓器是也今土中得者其質渾厚不務色澤末俗尚靡不貴金玉而貴銅磁遂有祕色窑器丗言錢氏有國日越州燒進不得臣庶用故云祕色陸龜蒙詩九秋風露越窑開奪得千峯翠色來如向中霄盛沆瀣共嵇中散鬪遺杯乃知唐世巳有非始於錢氏本朝以定州白磁器有芒不堪用遂命汝州造青窑器故河北唐鄧耀州悉有之汝窑為魁江南則處州龍泉縣窑質頗粗厚政和間京師自置窑燒造名曰官窑中興渡江有邵成章提舉後苑號邵局􅊞故京遺製置窑于修內司造青器名內窑澄泥為範極其精緻油色瑩徹為世所珍後郊壇下别立新窑比舊窑不侔矣餘如烏泥窑餘杭窑續窑皆非官窑比若謂舊越窑不復見矣上古無墨竹挺點漆而書中古方以石磨汁或云是延安石浪至魏晋時始有墨丸乃漆煙松煤夾和為之所以晉人多用凹心硯者欲磨墨貯瀋耳自後有螺子墨亦墨丸之遺製唐髙麗歲貢松煙墨用多年老松煙和麋鹿膠造成至唐末墨工奚超與其子廷圭自易水渡江遷居歙州南唐賜姓李氏廷圭父子之墨始集大成然亦尚用松煙廷圭𥘉名廷邽故世有奚廷圭墨又有李廷圭墨或有作庭圭字者僞也墨亦不精宋熙豐間張遇供御墨用油煙入腦麝金箔謂之龍香劑元祐間潘谷墨見稱于時自後蜀中蒲大韶梁杲徐伯常及雪齊齊峯葉茂實翁彥卿等出世不乏墨惟茂實得法清黑不凝滯彥卿莫能及中統至元以來各有所傳可以倣古唐祖敏奚鼐易水奚冪鼐之弟奚起冪之子陳朗兖州王君得柴珣並唐末五代南唐李超鼐之子始居歙州南唐賜姓李氏李廷圭李廷寬李承宴超之子李文用承宴之子李惟慶李惟一李仲宣皆文用子耿遂仁歙州耿文政耿文夀皆遂仁子耿德耿盛盛匡道宣州盛通盛真盛舟盛信盛浩宋張遇潘衡蒲大韶欵曰書窗輕音煤佛帳餘韻葉世英嘗造德壽宫墨朱知常欵曰朱知常香齊梁果徐知常葉邦憲嘗造復吉殿墨雪齊欵曰雪齊墨寶李世英欵曰叢桂堂李丗英胡友直潘衡孫秉彛周朝式李丗英男克恭樂溫蒲彥輝劉文通郭忠厚鏡湖方氏黃表之齊峯劉士先嘗造緝熙殿墨寓菴得李潘心法俞林丘謝東徐禧葉茂實三衢翁彥卿元潘雲谷清江胡文中長沙林松泉錢唐于材仲宜興杜清碧武夷衛學士松江黃修之天台朱萬𥘉豫章丘可行金溪丘丗英丘南傑皆可行子斫琴名手隋趙耴利唐雷霄雷威雷珏雷文雷迅郭亮一作諒皆蜀人沈鐐張鉞皆江南人金儒大中進士僧三慧大師宋蔡朱仁濟衛中正慶曆中道士趙仁濟興國中馬希仁馬希先一作仙崇寧中金淵紹興𥘉金公路即金道紹興𥘉陳亨道髙宗朝嚴撙馬大夫梅四官人龔老應奉林杲東卿元嚴古清恭字子安撙之孫梅四之壻施溪雲施谷雲施牧洲古琴名冰清春雷玉振黃鴣秋嘯鳴玉瓊嚮秋籟懷古南薰大雅松雪浮磬奔雷存古寒玉百衲響泉冠古韻磬涉深天球混沌材萬􅊤松雪夜冰玉澗鳴泉石上清泉秋塘寒玉九霄環佩至正丙申髙郵兵纍攻嘉興不克或人撰戲語云史師一日下令行兵參謀掌史進言自古行師必先祭旗史曰王元師破松江時曽祭否答曰不祭史曰王元師不祭我也不祭蓋祭濟字音同傳以為笑又有一說紅軍與苗軍戰不勝禀主帥曰彼中軍前有十丈大旗旗上篆書大元統兵官五字帥曰我此間亦效之旗成軍吏禀所寫何字帥曰八分書寫趙王令既而寫趙字未成才寫得走字傳報苗軍到走走走二說皆可捧腹日家者流以日月五星及計羅氣孛四餘氣纏度過宫遲留伏逆推人之生年月日時可以知休咎定壽夭其書曰百中經經首有安命法曰周天宿度十二宫安命例凡十葉有術士以其例節為一葉簡明易見其法但看本生日太陽所躔何度便以本生時加在上向下逐宫虛數如下面已盡則又於此行自上而下見卯住即是此度安命真捷徑也泗州塔下相傳泗州大聖鎖水毋處繆也按地志云水神在臨淮縣龜山之下形若獼猴縮鼻高額青軀白首金目雪牙頸伸百尺力踰九象禹獲之鎖其頸于龜山之足淮水乃安流注海邇來漁者知鎖所在古嶽瀆經云禹治水三至桐柏獲淮渦水神曰無支祁乃命庚辰制之鎖子龜山之足淮水乃安唐永泰初楚州有漁人夜釣山下其鈎為物所製沈水視之見大鐵鎖繞山足一獸形如青猿兀若昏醉涎沫腥穢不可近又東坡濠州塗山詩川鎖支祁水尚渾注程演曰異聞集載古嶽瀆經禹治水至桐柏山獲淮渦水神名曰巫支祁善應對辨淮之淺深源之逺近而神曰庚辰者鎖于龜山之足淮乃安流唐時有漁者釣得一古鎖牽出其末有如獼候者蓋此物也國史𥙷曰楚州漁人于淮中釣得古銅鎖刺史李陽大集人力引之鎖窮有青獼猴躍出水而逝山海經水獸好為雲雨禹鎖于軍山之下其名曰無支祁洞庭劉氏有夫葉正甫久客都門因寄衣侑以詩云情同牛女隔天河又喜秋來得一過歲歲寄郎身上服絲絲是妾手中梭剪聲自覺和腸斷線腳那能抵淚多長短只依先去樣不知肥瘦近如何南村輟耕録卷之二十九
