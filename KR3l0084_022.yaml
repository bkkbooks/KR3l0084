front:
  text: 南村輟耕録卷之二十二
  hash: sha256:cf0b06a36d3229398be92dbf3eadcaf6124d9d07074088558e863329d50877b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_022-1a}
body:
  text: 天台陶宗儀九成孔門弟子姓字見諸家語論語史紀等書金華張君孟兼稽訂異同集為章句以便記誦即古急就之義也其文曰繄昔聖門弟子三千身通六藝七十二賢徳行著稱顔回子淵冉耕伯牛閔損子騫及冉雍仲弓為四科之先宰予子我並魯人端木賜子貢衛人言語是稱賜言多中乃多才藝仲由季路陳人冉求子有魯人政事並著言偃子㳺呉人卜商子夏衞人文學著名孰可方駕曽叅子輿純孝全歸父點子晳浴沂舞􅟔囬父無繇並魯人仲由同字有公晢哀齊人字以季次縣成子祺左郢子行並魯人樂欬亡顔噲同字子聲其字子羽澹臺滅明並魯人子之是字公祖句茲亡其有秦非亦字子之孔忠子蔑叔仲㑹子期乃子旗字者粤巫馬施顔之㒒子叔申棖子續啇瞿子木並魯人蘧瑗伯玉衞人有若子有公伯寮子周並魯人其申黨一作續者止字曰周亡司馬黎耕宋人乃字子牛顓孫師子張陳人公冶長子長齊人一字子禽其陳亢子亢陳人名而不字唯句井疆髙柴子羔並衛人公肩㝎子中亡有南宫适子容魯人薛邦子從亡公西蒧魯人及公西輿如亡字子上同穰駟赤子徒秦人廉潔子庸衛人􅃮雕開魯人琴牢子開字同宓不齊子賤並衛人歩叔乗子車齊人其􅃮雕哆邽巽子歛字俱並魯人粤梁鱣者其字叔魚齊人秦祖子南秦人樊湏子遲齊人亦有后䖏字以里之亡原憲魯人燕伋亡同字子思鄭國榮旂字子徒子祺伯䖍子析公首夏子乗施之常子恒並亡公良孺子正陳人冉孺子魯冉季子産字子抑者顔幸並魯人字子象者縣亶石作蜀子明並亡公孫龍子石楚人啇澤子季奚谷箴子晢狄黒晢之䍐父黒子索其原亢籍仍字子籍並亡字子丕者曰惟啇秦楚人秦冉字開顔祖字㐮並亡任不齊子選楚人曹䘏子循􅃮佳周徒父字白子文顔髙一作刻子驕鄡單子家並亡顔何字冉公西赤子華並魯人猗欤多賢升堂入室慨舉世之所傳名固踰乎七十乃稽紀載尚遺其實家語史遷所録不一嗟嗟小子何敢忘逸爰重列以自識俾蒙士之易述其不銓次豈縁声律不韙之辠莫敢自恤尚同好之君子幸有以訂愚之失顔無繇音遥正義云音由縣成縣音玄公祖句兹句音鉤句井疆句正義作勾宓不齊宓音密正義云當音伏􅃮雕哆音赤者反邽巽邽音圭鄡單上音苦尭反下音善黄河源潘昻宵志曰延祐乙卯春聖天子以四海萬國之廣軫念庶民艱虞罔控告也分使詣外郡諸道布揚徳心戚休興替之清洿揚激之畿甸宻邇獨不得均其澤越五月詔前翰林學士承旨臣闊闊出翰林侍讀臣昻霄奉使宣撫京畿西道臣昂霄承命驚悸罔措唯務磬竭忠赤盡民瘼後巳闊公一日語昂霄余甞從余兄榮禄公都實扺西國窮河源耳之不覺瞿然以駭有是乎㦲請畢其語公曰世祖皇帝至元十七年歲在庚辰欽承聖諭黄河之入中國夏后氏導之知自積石矣漢唐所不能悉其源今為吾地朕欲極其源之所出營一城俾蕃賈互市規置航傳凡物貢水行逹京師古無有也朕為之以永後来無窮利益盖難其人都入汝舊人且習諸國語徃圖汝諧授招討使佩金虎符以行是嵗四月至河州州東六十里有寧河馹驛西南五六十里山曰捉一作殺馬関林麓穹隘譯言忝石答班啓足浸髙一日程至巔西邁愈髙四閱月約四五千里始抵河源冬還圖城傳位置以聞上恱徃營之授土蕃等䖏都元帥仍金虎符置寮寀督工工師悉資内地造航為䑹六十城傳措工物完闊闊出驛聞適相哥征昆哥臧不廻力沮遂止翼歲兄都實旋都河源在土蕃朶甘思西鄙有泉百餘泓或泉或潦水沮洳散渙方可七八十里且泥淖弱不勝人迹逼觀弗克旁履髙山下眎燦若列星以故名火敦惱兒火敦譯言星宿也群流奔湊近五七里滙二巨澤名阿刺惱児自西徂東連属吞噬廣輪馬行一日程迤邐東騖成川號赤賔河二三日程水西南来名亦里出合赤賔三四日程南来名忽蘭又水東南来名也里术合流入赤賔其流寢大始名黄河然水清人可渉又一二日岐裂八九股名也孫斡論譯言九渡通廣六七里馬亦可度又四五日程水渾濁土人抱革囊乗騎過之民聚落紏木幹象舟得毛革以濟僅容兩人継是兩山峽東廣可一里二里或半里深巨測矣朶甘思東北鄙有大雪山名亦耳麻不莫刺其山最髙譯言騰乞里塔即崑崙也山腹至頂皆雪冬夏不消土人言逺年成氷時六月見之自八九股水至崑崙行二十日程河行崑崙南半日程地又四五日程至地名闊即及闊提二地相属又三日程地名哈刺别里赤児四逹之衝也多宼盗有官兵鎮防崑崙迤西人簡少多䖏山南山皆不穹峻水亦散漫獸有髦牛野馬狼狗羱羊之類其東山益髙地亦漸下岸狭隘有狐可一躍越之者行五六日程有水西南来名納隣哈刺譯言細黄河也又兩日程水南来名乞児馬出二水合流入河河北行轉西至崑崙北二日程地水過之北流少東又北流約行半月程至貴徳州地名必赤里始有州事官府州隸河州置司土蕃等䖏宣慰司所轄又四五日程至積石州即禹貢積石五日程至河州安郷関一日程至打羅坑東北行一日程洮河水南来入河又一日程至蘭州其下過北一作比卜渡至鳴沙州過應吉里州正東行至寧夏府南東行即東勝州隸西京大同路地靣自彂源至漢地南北澗溪細流傍貫莫知紀極山皆草山石山至積石方林木暢茂世言河九折彼地有二折盖乞児馬出及貴德州必赤里也漢張騫使絶域覊聮拘執艱厄百罹歴大宛月氏等数國其傍大國五六皆稱傳聞以為窮河源烏能覩所謂河源哉史稱河有兩源一出于闐一出䓗嶺于闐水北行合䓗嶺河注蒲類海不流洑至臨洮出焉今洮水自南来非蒲類明矣詢之土人言于闐䓗嶺水其下流散之沙磧又有言河與天河通尋源得織女支機石以歸亦妄也崑崙去嵩髙五萬里閬風玄圃積瑶華盖仙人所居又何耶唐史土蕃傳河上流由洪濟梁南二千里水益狭春可渉秋夏乃勝舟其南三百里三山中髙而四下曰紫石古所謂崑崙其言頗類然止稱河源其間云國家敞天威亘天所覆燾無間海内外冠帶萬國罔非臣妾視漢唐為不足訝故窮河源去萬里若歩閨闥嘻盛典也不可不志因志之都實族女真蒲察氏統烏思臧路暨招討都元帥凡三至吐蕃闊闊出今除甘肅行省叅知政事是歲八月𥘉吉翰林侍讀學士中奉大夫知制誥同脩國史臣潘昻霄謹述柯九思序云河源有志自本朝始前乎此曷為未有志河源者道路遼阻所傳聞異辤莫能究河之源也山經曰敦薨之水西流注于泑澤出于昆侖之東北實惟河源而水經載河出昆侖經十餘國乃至泑澤山經又稱陽紆之山河出其中淩門之山河出其中穆天子傳亦云陽紆之山河伯馮夷所居是惟河宗氏釋氏西域志稱阿耨逹大山上有大淵水即昆侖山也地里志亦稱昆侖山在臨羗西而漢書載河出兩源或稱有或稱無而河源所著異同況世殊代易名地亦異終莫能有究之者我太祖皇帝二十有一年春正月征西夏夏取甘肅等城秋取西涼府遂過沙陀至黄河九渡按昆侖當九渡下流則昆侖固巳歸我職方氏矣憲宗皇帝二年命皇太弟旭烈帥諸部軍征西域凡六年闢封疆四萬里於是河源及所注枝出者盡在封域之内當時在行有能記其說皆得於目擊非放也逮世祖皇帝功成治定天下殷富遂命臣都實置郡河源故翰林侍讀學士潘公得究其詳實􅊧源析派而作斯忠乃知更昆侖行一月始窮河源於戯當四海混一之盛聞廣見覈至数千載莫能究者俾後世有孜而傳信焉豈斯文之光實邦家無疆之休也公之子詡能不墜其先業増光而潤色之至順間以同知嘉定州事来呉将邦是書行于世属九思叙其說于篇端元統元年冬十有一月日南至奎章閣學士院鑒書愽士文林郎柯九思序國朝故事正六品以下官中書奉敕署牒以命之牒具中書官位最尊者今也署牒者自丞相以下而不敢以煩令惟皇太子立必兼中書令樞宻使皇太子既受冊即中書上日獨署一牒明日省臣以其名聞天子即以宣命超拜五品官其人自非素親近有譽望最于群臣者不得也余在杭州日甞見一㺯百禽者蓄龜七枚大小凡七等置龜几上撃鼓以使之則第一等大者先至几心伏定第二等者從而登其背直至第七等小者登第六等之背乃竪身直伸其尾向上宛如小塔状謂之烏龜疊塔又見蓄蝦䗫九枚先置一小墩於席中其最大者乃踞坐之餘八小者左右對列大者作一声衆亦作一声大者作数声衆亦作数声既而小者一一至大者前點首作声如作禮状而退謂之蝦䗫說法至松江見一全真道士寓太古庵一日取二鰍魚一黄色一黒色大小相侔者用藥塗利刃各断其腰互換接續首尾異色投放水内浮逰如故郡人衞立中以盆池飬之經半月方死疊塔說法固教習之功但其質性蠢憃非它禽鳥可比誠難矣哉若夫断而復續死而復生藥欤法欤是未可知也但劇戯中似此者果亦罕見大徳間荆南境内有九人山行値雨避於路傍舊土洞中忽有一虎来踞洞口哮吼怒視目光射人内一人素愚八人者宻議虎若不得人悪得去因紿愚者先出我輩共掩殺之愚者意未决遂各觧一衣縛作人形擲而出之虎愈怒八人併力排愚者于外虎即㗸至洞口怒視如前湏臾土洞壓塌八人皆死愚者獲生夫當顛沛患難之際乃欲以八人之智而䧟一人之愚其用心亦險矣天道果夢夢耶河南婦世為河南民家天兵下江南婦𬒳虜姑與夫行求数年得之湖南婦巳妻千户某饒于財情好甚洽視夫姑若塗人㑹有旨凡婦人𬒳虜許銀贖敢匿者死某懼罪亟遣婦婦堅不行夫姑留以俟婦閉其室弗與通遂號慟頓絶而去行未百歩青天無雲而雷回視婦巳震死錢唐白湛囦先生紀以詩曰從軍古云樂獲罪禱應難毋望明珠復夫求破鏡完押衙逢義士公主奉春官爲報河南婦天刑不可干姚文公燧爲翰林學士承㫖日玉堂設宴歌妓羅列中有一人秀麗閒雅微操閩音公使来前問其履歴𥘉不以實對叩之再泣而訴曰妾乃建寧人真西山之後也父官朔方時禄薄不足以給侵貸公帑無償遂賣入娼家流落至此公命之坐乃遣使詣丞相三寳奴請爲落籍丞相素敬公意公欲以侍巾櫛即令教坊檢籍除之公得報語一小史曰我以此女為汝妻女即以我為父也史忻然從命京師之人相傳以為盛事云嘉興貝闕甞有詩曰断絲棄道邊何日縁長松墮羽别炎洲不復巢梧桐昔在至元日六合車書同主堂盛文士燕集来雍雍金力手割鮮酒給蒲萄濃坐有一枝春秀色不可雙叶娉婷劉碧玉綽約商玲瓏寳釧金雀釵巳覺燕趙空或聞操南音未觧歌北風上客驚且疑姓字初未通問之漸復泣乃起陳始終妾本建寧女逺出西山翁父毋生妾時謂是金毋童梨花鎖院落燕子窺簾櫳迢迢官朔方位卑食不充侵貸國有刑桎梏加父躬粥女以自贖白璧淪泥中秋娘教歌舞屡入明光宮水為倡家婦遂属梨園工京華多少年門外嘶青驄不如孟光醜猶得嫁梁鴻自傷妾薄命失路似秋蓬客聞為三歎天道何懵懵遣使白宰相削籍歸舊宗小史十八九勿恨相如窮配尓執箕帚今夕看乗龍夗央並玉樹鸚鵡開金籠棄汝桃花扇紅牙不復從提瓮自汲水絺綌自御冬時多困轗軻事或所遭逢安知百尺井忽登群玉峯借問為者誰内相姚文公至元甲子阿合馬拜中書平章領制囯用使司時樂府中盛唱胡十八小令知䜟緯者謂其當擅重權十八年人未之信果於至元壬午伏誅越五年丁亥閏二月桑哥拜中書平章立尚書省貪暴殘忍又十倍於阿合馬人亦謂桒字折而為四十八桑字後改作相字亦拆而為四十八竟不知應之於夀或應之於職然自立省之日至辛卯正月敗績恰四十八月其神驗如是大徳戊戌二月二十日張漢臣尚書趙松雪學士費北山漕侯同在杭州泛舟過西湖至毛家歩上岸乗肩輿将㳺水樂洞行里餘逢一尼寺趙公偕二公入寺訪親俄而從人来報張公之老㒒戎顯卒死矣亟回至其所呼救不省氣絶身僵忽有二道士過一老一㓜云不妨事老者即於死人面上吹呵㓜者就籬落間摘一青葉度于老者若作法書符状置死人頂上隨即再生頃間失二道士所在或云恐是洞賔変現隱括其姓如此耳檇李郭宗夏甞見建徳路搃管趙良臣言都下有李搃管者官三品家巨富年逾五十而無子聞樞宻院東有術者設肆筭命談人休咎多竒中試徃叩焉且語之曰吾之禄夀巳不必言但推有子與否術者笑曰君有子矣何為紿我李曰吾實無子豈紿汝耶術者怒曰君年四十當有子今年十五六矣非紿我而何同坐者皆軍官見二人争執甚訝之李沈吟良乆曰吾年四十時一婢有娠吾以職事赴上都比歸則吾妻粥之矣莫知所徃若有子則此是也術者曰此子終當還君相别而出時坐中一千户邀李入茶坊告之曰十五年前吾亦無子因到都置一婢則已有孕到家時適吾妻亦有孕前後一兩月間各生一男今皆十五六矣豈君之子耶兩人各言婦人之容貌齒歲相同李歸語於妻妻徃日誠悍炉至是見夫無嗣心頗慚而憐之翼日邀千户至家享以盛饌與之刻期而别千户先歸南陽府李以實告于所管近侍大官乞假前徃大官曰此羙事也我當與汝奏聞既而有㫖得給驛以行凡筵席之費皆從官辦李至衆官郊迎徃千戸宅設大燕李所以餽献千戸并其妻子僕妾之物甚侈千户命二子岀拜風度不殊衣冠如一莫知何者為巳子致請於千户千户曰君自認之李諦視良乆天性感通前抱一人曰此吾子也千户曰然於是父子相持而哭坐中皆為之墮淚舉盃交賀大醉而罷明日千戸答禮㑹客如昨謂李曰吾既與君子矣豈可使母子分離今并其母以奉李喜出望外回都擕其子見大官大官曰佳児也引入之覲通籍宿衛後亦官至三品大抵人之有子無子数使之然非人力所能也而術士之業亦精矣王氏守素錢唐民家女其夫丁棄家爲全真道士於呉山之𬗋陽菴一日召守素入山書付四句云嬾散六十三妙用無人識逆順兩俱忘虚空鎮常寂坐抱一膝而逝方外者流謂之騎鶴化守素遂亦束髮簮冠着道士服奉夫遺屍二十年迹不下山年餘七十㡬於得道者神仙渺茫故未睱論貞守一節乃可尚也丁夘進士薩都刺天錫贈之詩曰不見遼東丁令威舊㳺城郭昔人非鏡中春去青鵉老華表山中白鶴歸石竹淚乾班雨在玉簫声断綵雲飛洞門花落無人跡獨坐蒼苔補道衣燕山項氏其夫江南人行賈燕薊間聘項與居未㡬夫死項時年二十奉柩回江南誓以夫餘貲飬姑以自終比至姑巳改適勱志孑居以守夫祀旴江李宗冽閔其事而賦之詩曰少無依倚老何堪白髪婆娑乱不簮夢裏尚思江北好悔将夫骨葬江南任子昭云向寓都下時鄰家児患頭疼不可忍有回回醫官用刀劃開額上取一小蟹堅硬如石尚能活動頃焉方死疼亦遄止當求得蟹至今蔵之夏雪簑云甞於平江閶門見過客馬腹膨脹倒地店中偶見老回回見之於左腿内割取小塊出不知何物也其馬隨起即騎而去信西域多竒術哉湖廣行省平章歸自雨中有一童子年七八歲直造傘下避雨平章問曰學生能属對否曰能平章曰青衿来避雨即應聲對曰紫綬去朝天平章喜引至家遺以果肴明日除書至拜中書平章之命復大喜再以楮幣綵繒贈之龍麟洲先生過福建憲府設宴命官奴小玉帶左觴酒半憲使舉盃請曰今日之歡皆玉帶為也願先生酬之以詩先生其毋辤時先生負海内重名雅畏清議又不能違憲使之請遂書一絶句云􅔽蓞池邊風滿衣木犀庭下雨霏霏老夫記得坡仙語病躰難禁玉帶圍於是舉席稱嘆盡歡而散盖前輩既不肯拂人意又不欲失所守而且用事清切一時風致可想見信非野儒俗士所能及也御史大夫也先帖木児與夫人不睦巳数年矣翰林學士承㫖阿目茄八刺死大夫遣司馬明里徃唁之及歸問其所以明里云承㫖帶罟罟娘子十有五人皆務争奪家財全無哀戚之情惟正室坐守靈幃哭泣不巳大夫黙然是夜遂與夫人同寢歡愛如初若司馬者可謂善於寓諌者矣術士俞竹心者居慶元嗜酒落魄與人寡合順其意者即與推筭酔筆如飛畧不搆思頃刻千餘言道巳徃之事極驗時皆以為異人至元巳夘間婁敬之為本路治中甞以休咎叩之荅曰公它日直至一品便休婁深信其說棄職别進適値壬午更化俯就省掾陞除益都府判改換押字宛然真書一品二字未㡬卒於官所此偶然耶抑𢾗使然耶元貞丙申秋大都南城武仲祥家有乳犬懐胎左脇下或腫成瘡六七日後於瘡生五子色皆青蒼毎當脊梁自頂至尾生逆毛一道他無所異又数日瘡亦平復南村輟耕録卷之二十二
