front:
  text: 南村輟耕録卷之二十七
  hash: sha256:7af7d8cc04b6d9c3519cdbae9c01ed42b22f885fd21893519f99ee01c4c0b473
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_027-1a}
body:
  text: 天台陶宗儀九成四位配享封爵顔子唐玄宗太極元年壬子二月贈太子太師配享孔子廟宋真宗大中祥符二年巳酉月封兖國公曽子同前贈太子太保配享孔子廟宋理宗咸淳三年癸夘二月封郕國公配食大成殿子思宋度宗咸淳三年丁卯二月封沂國公配食大成殿孟子宋神宗元豊七年甲子五月追封鄒國公配享先聖位次兖國公下宋黄震云徃歲顔孟配享並列先聖左近升曽子子思又並列先聖左而虚其右不以相向震聞太學愽士陸鵬舉云𥘉制顔孟配享左顔而右孟熈封新經盛行以王安石爲聖人沒而躋之配享位顔子下故左則顔子及安石右則孟子未㡬安石女壻蔡卞當國謂安石不當在孟子下遷安石扵右與顔子對而移孟子位第三次顔子之下遂左列顔孟而右列安石又未幾蔡卞再欲升安石壓孟子漸次而升爲代先聖張本優人有以藝諌於殿下者設一大言之士戯薄先聖顔子出爭之不勝子貢出爭之不勝子路出而盛氣争之又不勝然後設為公冶長有擊其首而叱之曰汝何不出一爭且看他人家女壻盖蔡卞安石壻而公治長先聖壻也蔡卞聞之遂不敢進安石於顔子上顔孟左而安石右遂為定制南渡後安石罷配享冝遷孟子以對顔子如舊制議者失扵討論故安石既去其右遂虚而顔孟並列於左岳珂甞記其事近歲増曽子子思又並列扵左亦未有討論者成郡府江瀆廟前有樹六株世傳自漢唐以来即有之其樹髙可五六十丈圍約三四尋挺直如矢無他柯幹頂上纔生枝葉若㯶櫚状皮如龍鱗葉如鳯尾實如棗而加大毎歲仲冬有司具牲饌祭畢然後采摘金皷儀衞迎入公𪠘左點醫工以刀逐箇劙去青皮石灰湯焯過入熟冷宻浸五七日漉起控乾再換熟宻如此三四次却入瓶缶封貯進獻不如此修製則生澀不可食泉州萬年棗三株識者謂即四川金果也畨中名為苦魯麻棗盖鳯尾蕉也河南理幕沈易云㶚州倡女李哥年十二三時毋教之歌舞哥泣曰女率有工繫我獨為此乎毋告以業不可廢哥曰若此聽毋毋亦當從我好否則有死而已毋陽許之自是不粉澤不茹葷所歌多仙曲道情有召者必先詢主客姓名然後徃人亦預相戒毋戯狎哥凝立筵間酒行歌闋目不流盼與之酒勿飲州判官嘗忤哥徑还誓不與見孟津縣逹魯花赤厚賂哥毋夜抵舍哥懐利刃閉卧内罵之曰汝職在牧民而狗􅮿之不若可急去不且血汙吾刃矣慚怒以回明目知州聞之歎曰州有貞女而吾不知是一失也吾次子明經舉秀才真若配以禮聘娶之未幾紅巾入寇夫婦被執見哥妍麗将殺其夫哥走前抱夫項大呼曰吾断不從汝求活㓂并殺之劉節婦冀之衡水人通古文孝經小學書適同郡曹泰財紅巾䧟河朔因避兵聊城村賊掩至大掠見節婦居群人中時妍整持刀驅之行節婦曰吾婦人惟知從夫而已不賊從也賊𣣔移其心乃盛陳金玉珠璣仍用錦綉衣服𬒳節婦身節婦裂碎之强擁上馬墮地者數四賊怒䋲其項就馬上曳之節婦以手瓜地以頭觸石流血罵賊不絶聲遂遇害毗陵倪元鎮有潔病一日眷歌姫趙買児留宿別業中心疑其不㓗俾之浴既登榻以手自頂至踵且捫且嗅捫至隂有穢氣復俾浴凡再三東方既白不復作巫山之夢徒贈以金趙或自談必至絶倒稗官廢而傳竒作傳竒作而戯曲継金季國𥘉樂府猶宋詞之流傳竒猶宋戯曲之變世傳謂之雜劇金章宗時董觧元所編西廂記世代未遠尚䍐有人能觧之者况今雜劇中曲調之冗乎因取諸曲名分調類編以備後来好事稽古者之一覽云正宫端正好衮綉毬倘秀才脱布衫小梁州朝天子四換頭十二月堯民歌收尾叨叨令醉太平呆古朶笑和尚蠻姑児伴讀書剔銀燈道和栁青娘雙夗央攤破滿庭芳月照庭塞鴻秋白鶴子中吕出入快活三中吕出入黃鍾願成雙醉花隂喜遷鶯出隊子刮地風四門子神仗児推金索水仙子興龍引金殿樂三臺侍香金童降黄龍衮塞鴈児接接髙南吕一枝花梁州第七賀新郎牧羊関隔尾紅芍藥菩薩梁州三煞罵玉郎感皇恩采茶歌隨煞尾闘蠏䗫四塊玉哭皇天烏夜啼隔尾黄鍾煞攤破采茶歌楚天秋隔尾隨煞中吕粉蝶児醉春風迎仙客石榴花闘鵪鶉上小樓快活三正宫出入鮑老児般渉哨遍耍孩児收尾紅繡鞵喜春来堯民歌滿庭芳鮑老衮醉髙歌十二月普天樂呌聲雙夗央白鶴子正宫出入窮河西朝天子乾荷葉剔銀燈菩薩蠻墻頭花喬捉蛇鶻打兎酥棗児鎮江回鵪鶉児夗央児風流體賣花聲蔓菁菜仙吕賞花時點絳唇油葫盧天下樂那吒令鵲踏枝六么序后庭花青歌児賺煞混江龍金盞児醉中天村里迓鼓元和令上馬嬌聖葫蘆江西后庭花栁葉児寄生草賺煞尾攤破天下樂醉扶歸低過金盞児八聲甘州逰四門賺尾憶王孫一半児得勝樂鴈児妖神急翠裙腰六么遍大安樂柳葉児啇調集賢賔逍遥樂梧葉児後庭花雙鴈児金菊香浪来里醋葫蘆青哥児上京馬隨調煞栁葉児仙吕出八黄鶯児踏莎行垂絲鈎盖天旗大石青杏子好觀音六國朝念奴嬌歸塞北𥘉問口怨別離擂皷體鴈過南樓憨郭郞催拍子玉翼蝉荼䕷香女冠子林里鷄近驀山溪喜秋風净缾兒鷓鴣天雙調新水令駐馬聴甜水令折桂令落梅花沉醉東風小将軍清江引碧玉簫鴈児落徳勝令喬牌児掛玉鈎川撥棹殿前歡七弟兄梅花酒收江南水仙子滴滴金夗央煞歩歩嬌攪􅯇琶豆葉黃風入松撥不断慶東原沽羙酒太平令一錠銀荆湘怨阿納忽夜行船鎮江回中吕出入胡十八掛玉鈎序五供飬行香子梧桐樹離亭宴煞夗央児煞尾太平歌十棒皷小婦孩児挂打燈喬木查蝶戀花慶宣和棗卿詞石竹子山石榴山丹花醉娘子駙馬還朝大拜門鷓刺鴣不拜門喜人心忽都白倘兀風流體中吕出入燕南芝菴先生唱論古之善唱者三人韓秦娥沈古之石存符帝王如音者五人唐玄宗後唐荘宗南唐後主宋徽宗金章宗三教所尚道家唱情僧家唱性儒家唱理近丗所謂大曲蘇小小蝶戀花鄧千江望海潮蘇東坡念奴嬌辛稼軒模魚子晏叔原鷓鴣天栁耆卿雨霖鈴吳彦髙春草碧朱㳤真生查子蔡伯堅石州慢張子野天仙子歌之格調抑楊頓挫頂疊垜換縈紆牽結敦拖鳴咽推題丸轉揺欠遏透歌之節奏停聲待拍偷吹拽棒宇真句篤依腔貼調凡歌一聲聲有四節起末過度揾簮落凡歌一句句有聲韻一聲平一聲皆一聲圓聲要圓熟腔要徹滿凡一曲中各有其聲變聲敦聲杌聲啀聲困聲三過聲偷氣取氣換氣歇氣就氣愛者有一口氣歌聲變件三臺破子遍子落實催全篇尾聲賺煞隨煞隔煞羯煞本調煞拐子煞三煞十煞唱曲門戸小唱寸唱慢唱壇唱歩虚道情撒錬帶煩瓢呌唱曲題目曲情鐡騎故事采蓮擊壤叩角結席添壽宫詞禾詞花詞湯詞酒詞燈詞江景雪景夏景冬景秋景春景凱歌櫂歌漁歌挽歌楚歌杵歌歌之所桃花扇竹葉尊栁枝詞桃葉怨尭民鼓腹壮士擊節牛童馬僕閭閻女子天涯逰客洞裏仙人閨中怨女江邉啇婦埸上少年闤闠優伶華屋蘭堂衣冠文㑹小樓狹閣月館風亭雨窓雪屋栁外花前凡聲音各應律吕分六宫十一調共十七宫調仙吕宫唱清新緜邈南吕宫唱感嘆傷悲中吕宫唱髙下閃黄鍾宫唱富貴纒緜正宫唱惆悵雄壮道宫唱飄逸清幽大石唱風流醖藉小石唱旖旎嫵媚髙平唱條物滉漾般涉唱拾掇坑塹歇指唱急併虚歇啇角唱悲傷宛轉雙調唱徤棲激梟啇調唱悽愴怨慕角調唱嗚咽悠揚宫調唱典雅況重越調唱陶冩冷笑有子毋調有姑舅兄弟有字多聲少有聲少字多所謂一串驪珠也比如仙石點絳唇大石青否児人喚作殺唱的劊子有愛唱的有學唱的有能唱的有㑹唱的有髙不掲低不咽有排字児打截児放掯児唱意児有明指児暗掯児長掯児短掯児碎掯児有一曲入數調者如啄木児冠子抱毬樂闘鷯鶉黄鶯児金盞児之類是也凡唱曲有地所東平唱木蘭花慢大名唱摸魚子南京唱生查子彰德唱木斛沙唊西唱陽関三疊黒漆弩凡唱所忌子弟不唱作家歌浪子不唱及時曲男不唱艶詞女不唱雄曲南人不曲北人不歌凡人聲音不等各有所長有川嗓有堂聲皆合𬒳蕭管有唱得雄壮的失之村沙唱得藴栧的失之也斜唱得輕巧的失去寒賤唱得本分的失去老實唱得用意的失之穿鑿唱得打稻的失之本調凡唱節病有困的灰的涎的呌的大的有樂官聲撒錢聲拽鋸聲猫呌聲不入耳不著人不徹腔不入調工夫少徧數少歩力少官塲少字様訛文理差無叢林無傳授嗓拗劣調落架漏氣凡唱聲病散散焦焦乾乾冽冽啞啞尖尖低低雌雌䧺䧺短短憨憨濁濁赸赸格嗓囊鼻摇頭歪口合眼張口撮唇撇撇口昻頭咳嗽凡添字病則他兀那是他家俺子道我不見兀的不呢一條了唇撒了一片子團欒了茄子了大忌鄭衞之淫聲續雅樂之後絲不如竹竹不如肉以以其近之也又云取来歌裏唱勝向笛中吹成文章曰樂府有尾聲曰套數時行小令曰葉児套數當有樂府氣味樂府不可似套數詞山曲海千生萬熟三千小令四十大曲荘蓼塘住松江府上海縣青龍鎮嘗為宋祕書小史其家蓄書數萬卷且多手鈔者經史子集山經地志醫卜方伎稗官小說靡所不具書目以甲乙分十門蓼塘既沒子孫不知保惜或為蟲䑕蝕囓或為隣識盜竊或供飲博之需或應餬覆之用編帙散亂所存無㡬至正六年朝廷開局脩宋遼金三史詔求遺書有以書獻者予一官江南蔵書多者止三家莊其一也継命危學士檏特来選取其家慮恐兵遁圖䜟干犯禁條悉付祝融氏及收拾燼餘存者又無幾矣其孫群玉悉載入京覬領恩澤宿留日乆仍布衣而歸書之不幸如此陳愛山買顧氏廢族石假山一所移置家園十日邀淵白觀之指而謂曰此公族中之物淵白笑答曰東撚西倒陳嘿然華亭楓涇戴君實其家巨富妻王氏妒悍無比僅有一女贅謝季𥘉為壻君實納一妾于嘉興外舎得男王聞之蚤夜怒詈君實不得巳遣其妾取児以歸而女恐其長大分我財産遂於襁褓中酷加淩虐致成驚疾又不容醫療竟就夭亡大為喜幸越三年自孕将産夢抱此児及娩得男後隨殞扵蓐児亦不育此婦女妒悍之報今戴氏絶嗣天道豈逺也哉事在至正十五年四月上旬也汪佛奴歌児也姿色秀麗嘉興富户濮樂間以中統鈔一千定娶為妾一日桂花盛開濮置酒佛奴奉觴濮有感于中澘然墮涙佛奴請問其故濮曰吾老矣非乆於人世者汝冝善事後人佛奴亦泣下誓無貳志人莫之信既而濮果死佛奴獨居尼寺深蔵簡出操行潔白以終其身重紀至元間大師丞相伯顔􅌹權蠧政貪悪無比以罪左遷南恩州逹魯花赤至隆興卒寄棺驛舍滑稽者題于璧云百千萬定猶嫌少垜積金銀北斗邉可情太師無運智不将些子到黃泉丙子歲松江亢旱聞方士沈雷伯道術髙妙府官遣吏齎香幣過嘉興迎請以来驕敖之甚以為雨可立致結壇仙鶴觀行月孛法下鐵簡子湖泖潭井日取蛇燕焚之了無應驗羞報宵遁僧柏子庭有詩其一聮云誰呼蓬島青頭鴨来殺松江赤縺蛇聞者絶倒檇李顧淵白恃才敖物嘗入京獻燕都賦翰長元公復不喜曰今天朝四海一統六合一家燕盖昔時戰國名何燕之稱慚恨而歸晚年始得領教岳陽髙照菴先生以詩送之云豪氣欲吞天下士冷官初到岳陽城切中其實淵白自出一對句云天下秀才爺有刀鑷人對之曰村中和尚種世人但知醫有十三科畫有十三科殊不知裱背亦有十三科一織造綾錦絹帛一染練上件一抄造紙劄一染製上件顔色一餬料麥􅔇一餬藥礬蠟一界尺裁版帖一軸頭或金或玉或石或瑪瑙水晶珊瑚沉檀花梨烏木毎軸止用一色所以只㱕一科一餬刷一鉸練一絛一經帶一裁刀數内闕其一則不能成全畫矣其餬刷裁尺亦皆有名餬刷㯶軟者謂之平分㯶硬者謂之餬㮶大小得中者謂之黏合狹小者謂之寸金裁尺極等闊者曰滿手次等曰三指又次等曰两指最狹者日單指越人朱仲桓武云至正丙申歲大旱余在蕭山觀方士陳希微禱雨于北嶺将軍廟累日俄降筆云吾秦人厲狄也與項羽起事山隂雖功不竟而死然有徳于民其父老不忘我者㑭血食于此尓未㡬千五百年丗代雲變遂湮我姓名至蔑焉無聞故以相告目擊其事感嘆弥日中原紅軍𥘉起時旗上一聮云虎賁三千直抵幽燕之地龍飛九五重開大宋之天其後毛貴一賊横行山東侵犯畿甸駕幸灤京賊勢猖獗無異唐末張之翰字周卿邯鄲人由翰林學士除授松江知府自題桃符云雲間太守過三載天下元貞第二年是歲卒亦䜟也嘉定州大塲沈氏因下畨買賣致巨富一日自畨中還先報家信有云畨船今到何䖏發金甲先回金甲者碓坊甲頭也後因逐一幹僕僕出此書首告以為玉印未到金甲先回沈厚賂官府得理聞者亦可為戒許叔瑛環云陳友諒部属稱鄧平章者䧟江西某縣有婦藺氏其夫以財雄一郷因賂鄧之帥某丐免剽􅓍帥聞藺有殊色輒殱其家獨生藺及四歲嬰将納之藺曰帥貴人妾事之無恨然吾良人以禮幣聘妾為婦者若干年與生二子妾不忍即背恩軍中禮不備請持一月喪服乃為師婦未晚帥許之服未終移兵别縣帥曰吾如汝約今夕諧吾㛰乎藺曰諾既而帥上馬他之使二卒守藺曰為取雞酒具香火今夕吾為帥婦敢告先良人靈卒俱岀乃先殺嬰嚙指血書璧曰涇渭難分濁與清此身不幸厄紅巾孤児未忍更他姓烈婦何曽嫁二人白刃自揮心似鐵黄泉欲到骨如銀荒村日落猨啼䖏過客聞之亦慘神書罷即自刎帥返驚歎訊二卒欲罪之卒指璧間題倩人讀其詩馳白鄧鄧聞之陳陳為立廟旌表云至正壬辰秋七月紅巾䧟錢唐九月䧟呉興延陵冬十月䧟江隂州州大姓許晉字徳昭者有武畧善格闘仲子如璋亦英勇遂相謀曰烏合之衆敗亡可待我族我里何忍坐累焉乃潜聚無頼悪少資以飲食保護隣井日有餘黨四散抄掠則誘使深入悉殪而埋之所居素隠僻賊無知者尋聞官軍駐近郊隂遣人約為内應十一月八日浙東宣慰元帥觀孫統兵入城晉率所募應之官軍少却晉弗之知尚與賊戰於城北之祥符寺前㑹賊黨自他所来掎其後如璋遂與家僮徃救手刃数人破圍而入偕父力戰衆寡不敵父子皆死明日官軍復進攻賊遂潰家人得父子屍歛而葬之柩車相継于道見者無不墮涙郷之父老誄之曰父死於忠子死扵孝私表其里曰忠孝郡上其事于朝不報胡仲彬乃杭城勾䦨中演說野史者其妹亦能之時登省官之門因得夤縁注授延檢至正十四年七月内招募逰食無藉之徒文其皆曰赤心護國擔殺紅巾八字為號将遂作亂為乃叔首告搜其書名薄得三冊纔以一冊到官餘火之亦諒三百六十餘人天遣魔軍殺不平不平人殺不平人殺不平者殺盡不平方太平此扶箕語驗之今日果然南村輟耕録卷之二十七
