front:
  text: 南村輟耕録卷之十七南村輟耕録卷之十八
  hash: sha256:b4967ddc264c7651bb1cdebfd00fef47ce228ff171404b798954cf338e9fa2f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_018-1a}
body:
  text: 天台陶宗儀九成唐張彥逺著歷代名畫記十卷自軒轅時至㑹昌元年能畫者三百七十餘人其叙畫之源流曰夫畫者成教化助人倫窮神變測幽微與六籍同功古先聖王受命應籙則有龜字效靈龍圖呈寶自巢燧巳來皆有此瑞庖犧氏彂於滎河中典籍圖畫萌矣軒轅氏得於溫洛中史皇蒼頡狀焉是時也書畫同體而未分象制肇創而猶略無以傳其意故有書無以見其形故有畫按字學之部其六曰鳥書在幡信上書端象鳥頭者則畫之流也顔光祿云圖載之意有二一曰圖理卦象是也二曰圖識字學是也三曰圖形繪畫是也又周官教國子以六書其三曰象形則畫之意也是故知書畫異名而同體也洎乎有虞作繪繪畫明矣既就彰施仍深比象於是禮樂大闡教化由興故能揖讓而天下治廣雅云畫類也尓雅云畫形也說文云畫畛也象田畛畔所以畫也釋名云畫掛也以采色掛物象也故鍾鼎刻則識魑魅而知神姦旗章明則昭軌度而備國制清廟肅而尊彛陳廣輪度而疆理辨以忠以孝盡在於雲臺有烈有勳皆登於麟閣見善足以戒惡見惡足以思賢故陸士衡云宣物莫大於言存形莫善於畫此之謂也其論畫六法曰昔謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨類傅采五曰經營位置六曰傳模移寫自古畫人罕能兼之彥逺試論之曰古之畫或能遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得形似而氣韻不生以氣韻求其畫則形似在其間矣上古之畫迹簡意淡而雅正顧陸之流是也中古之畫細密精緻而臻麗展鄭之流是也近代之畫煥爛而求備今人之畫錯亂而無㫖衆工之迹是也夫象物必在乎形似形似須全其骨氣骨氣形似皆本乎立意而歸乎用筆顧愷之曰畫人最難次山水次狗馬其臺閣一定器耳差易為也斯言得之至於鬼神人物有生動之可狀須神韻而後全故韓子曰狗馬難鬼神易狗馬乃凡俗所見鬼神乃譎怪之狀斯言得之至於經營位至則畫之總要然今之畫人粗善寫貌得其形似則無其氣韻具其采色則失其筆法豈曰畫也其論畫體工用榻寫曰夫畫物特忌形貌采章歷歷具足甚謹甚細而外露巧密所以不患不了而患於了既知其了亦何必了此非不了也若不識其了是真不了也夫失於自然而後神失於神而後妙失於妙而後精精之為病也而成謹細自然者為上品之上神者為上品之中妙者為上品之下精者為中品之上謹而細者為中品之中余今立此五等以包六法以貫衆妙其間詮量可有數百等孰能周知非夫人邁識髙情超心慧者豈可議乎知畫宋郭若虛著圖畫見聞志六卷自唐㑹昌元年至神宗熙寧七年能畫者二百七十四人其論製作楷模曰大卒圖畫風力氣韻固在當人其如種種之要不可不察畫人物必分貴賤氣韻朝代衣冠釋門有善功方便之顔道像具修真度世之範帝王崇上聖天日之表外夷得慕華欽順之情儒賢見忠信禮義之風武士多勇悍英烈之貌隱逸識肥遁髙世之節貴戚尚紛華侈靡之容天帝明威福嚴重之儀鬼神作魗䰩尺者反馳趡于鬼反之狀士女宜秀色婑烏果反媠奴坐反之態田家有醇氓朴野之真畫衣紋林石用筆全類於書衣紋有重大而調暢者有縝細而徑健者勾綽縱掣理無妄下以狀髙側深斜卷摺飄舉之藝林木有樛枝挺幹屈節皴皮紐裂多端分敷萬狀作怒龍驚虺之藝聳淩霄翳日之姿山石多作礬頭亦為稜面落筆便見堅重之性皴淡即生窊凸之形破墨之功尤難畫畜獸全要停分向背筋力精神肉質肥圓毛骨隱起畫龍窮遊泳蜿蜒之妙得回蟠升降之宜畫水湯湯若動使觀者有浩然之思畫屋木折算無虧筆畫勻壯深逺透空畫花竹有四時景候隂陽向背筍篠老嫩苞蕚先後自然艷麗間野逮諸園𬞞野草咸有出土體性畫禽鳥識形體名件之異悟翔舉飛集之態其論氣韻非師曰謝赫六法精論萬古不移然而骨法用筆以下五法可學如其氣韻必在生知固不可以考密得復不可以歲月到默契神㑹不知然而然其論用筆得失曰凡畫氣韻本乎遊心神采生於用筆意存筆先筆周意內畫盡意在像應神全夫內自足然後神閒意定神閒意定則思不竭而筆不困也畫有三病皆繫用筆一曰版二曰刻三曰結版者腕弱筆癡全虧取與物狀平偏不能圓混也刻者運筆中疑心手相戾勾畫之際妄生乖角也結者欲行未行當散不散似物凝滯不能流暢也其論古今優劣曰佛道人物士女牛馬近不及古山水林石花竹禽魚古不及近何以明之且顧愷之陸探微張僧繇吳道元及閻立德立本皆純重雅正性出天然吳生之作為萬世法號曰畫聖張萱周昉韓幹戴嵩氣韻骨法皆出意表後之學者終莫能到故曰近不及古至如李成關同范寬董源之迹徐熙黃荃居寀之蹤前不藉師資後無復繼踵借使二李三王之輩復起邉鵉陳庶之倫再生亦將何以措手於其間哉故曰古不及近鄧椿著畫繼十卷自熙寧七年至孝宗乾道三年能畫者二百一十九人其論逺曰畫之為用大矣盈天地間者萬物悉皆含豪運思曲盡其態而所以能曲盡者止一法耳一者何也曰傳神而已矣世徒知人之有神而不知物之有神此若虛深鄙衆工謂雖曰畫而非畫者豈止能傳其形不能傳其神也故畫法以氣韻生動為第一而若虛獨歸於軒冕岩穴有以哉又曰自昔鑒賞家分品有三曰神曰妙曰能獨唐朱景真撰唐賢畫録三品之外更增逸品其後王休復作益州名畫記乃以逸為先而神妙能次之景真雖云逸格不拘常法用表賢愚然逸之髙豈得附於三品之未未若復休首推之為當也又有畫繼𥙷遺一卷不知誰所撰則自乾道以後至理度間能畫者八十餘人尓後陳得輝著續畫記一卷再自髙宗建炎𥘉至幼主德祐乙亥能畫者一百五十一人然與畫繼𥙷遺則相出入者耳二書僅可考閲姓名無足觀也趙希鵠洞天清祿集云古畫多直幀至有畫身長八尺者雙幅亦然橫披始於米氏父子非古制也河北絹經緯一等故無背靣江南絹則經粗而緯細有背面唐人畫或用搗熟絹為之然止是生搗令絲楄不礙筆非如今煮練加漿也古絹自然破者必有鯽魚口與雪絲僞作者則否古畫色墨或淡黑則積塵所成自有一種古香可愛若僞作者多作黃色而鮮明不塵暗此可辨也米芾畫史云古畫若得之不脫不須背褾若不佳換褾一次背一次壞屢更矣深可惜蓋人物精神髮采花之穠艷蜂蝶只在約略濃淡之間一經背多或失之也古畫至唐𥘉皆生絹至吳生周昉韓幹後來皆以熱湯湯半熟捶如銀版故作人物精采入筆今人收唐畫必以絹辨見紋粗便云不是唐非也張僧繇閻令畫皆生絹南唐畫皆粗絹徐熙絹或如布絹素百破必好畫裂文各有辨長幅橫卷裂文橫橫幅直卷裂文直各隨軸藝裂也直斷不當一縷歲久卷自兩頭蘇開斷不相合不作毛搯亦蘇不可僞作其僞者快刀直過當縷兩頭依舊生作毛起搯又堅紉也濕染者色棲縷閒乾熏者煙臭上深下淺古𥿄素有一般古香真絹色淡雖百破而色明白精神采色如新惟佛像多經香煙熏損本色染絹作濕香色棲塵文問最易辨仍蓋色上作一重古破不直裂須連兩三經不可僞作國朝東楚湯垕字君載號采真子著畫鑒一卷論歷代名畫悉有依據其雜論曰古人作畫皆有深意運思落筆莫不各有所主况名下無虛士相傳既久必有過人處今人看畫出自巳見不經師授不閲記録但合其意者為佳不合其意者為不佳及問其如何是佳則茫然失對㒒自十七八歲時便有迂闊之意見圖畫愛玩不去手見鑒賞之士便加禮問遍借記録髣佛成誦詳味其言歷觀名迹參考古說始有少悟若不留心不過為聽聲隨影終不精鑒也燈下不可看畫醉餘酒邉不可看畫俗客尤不可示之卷舒不得其法最為害物至於庸人孺子見畫必看妄加雌黃品藻本不識物亂訂真僞令人短氣古人畫槀謂之粉本前輩多寶畜之蓋其草草不經意處有天然之妙宣和紹興所藏粉本多有神妙古人作畫有得意者多再作之如李成寒林范寬雪山王詵煙江疊障不可枚舉看畫如看美人其風神骨相有飢體之外看今人看古迹必先求形似次及傅染次及事實殊非賞鑒之法也元章謂好事家與賞鑒家自是兩等家多資力貪好名勝遇物收置不過聽聲此謂好事若鑒賞則天資髙明多閲傳録或自能畫或深畫意每得一圖終日寶玩如對古人不能奪也觀六朝畫先觀絹素次觀筆法次觀氣韻大概十中可信者一二有御府題印者尤不可信古畫東移西掇撏𥙷成章此弊自髙宗朝莊宗古始也余友人吳興夏文彥字士良號蘭渚生其家世藏名蹟鮮有比者朝夕玩索心領神㑹加以遊於畫藝悟入厥趣是故鑒賞品藻萬不失一因取各畫記圖畫見聞志畫繼續畫記為本參以宣和畫譜南度七朝畫史齊梁魏陳唐宋以來諸家畫録及傳記雜說百氏之書摉潜剔祕網羅無遺自軒轅時至宋幼主德祐乙亥得能畫者一千二百八十餘人又女真三十人本朝自至元丙子至今九十餘年間二百餘人共一千五百餘人其考核誠至矣其用心良勤矣所論畫之三品蓋擴前人所未彂論曰氣韻生動出於天成人莫窺其巧者謂之神品筆墨走絶傅染得宜意趣有餘者謂之妙品得其形似而不失規矩者謂之能品古人畫墨色俱入絹縷精神逈出僞者雖極力髣佛而粉墨皆浮於縑素之上神氣亦索然蓋古人筆法圓熟用意精到𥘉若率易愈玩愈佳今人雖極工緻一覽而意盡矣唐及五伐絹素粗厚宋絹䡖細望而可別也御題畫真僞相雜往往有當時名筆臨摹之作故祕府所藏臨摹本皆題為真迹惟明昌所題最多具眼自能識也吁可謂真知畫者哉廉訪使楊文憲公煥字煥然乾州奉天人嘗作汴故宫記云已亥春三月按部至于汴汴長吏宴于廢宫之長生殿懼後世無以考為纂其大槩云皇城南外門曰南薰南城之北新城門曰豐宜橋曰龍津橋北曰丹鳯而其門三丹鳯北曰州橋橋少北曰文武樓遵御路而北橫街也東曰太廟西曰郊社正北曰承天門而其門五雙闕前引東曰登聞檢院西曰登聞鼓院檢院之東曰左掖門門之南曰待漏院鼓院之西曰右掖門門之南曰都堂承天之北曰大慶門而日精門左升平門居其東月華門右升平門居其西正殿曰大慶殿東廡曰嘉福樓西廡曰嘉瑞樓大慶之後曰德儀殿德儀之東曰左升龍門西曰右升龍門正門曰隆德曰䔥墻曰丹墀曰隆德殿隆德之左曰東上閣門右曰西上閣門皆南嚮東西二樓鍾鼓之所在鼓在東鍾在西隆德之次曰仁安門仁安殿東則內侍局內侍之東曰近侍局近侍之東曰嚴祖門宫中則曰撒合門少南曰東樓即授除樓也西曰西樓仁安之次曰純和殿正寢也純和西曰雪香亭雪香之北后妃位也有樓樓西曰瓊香亭亭西曰涼位有樓樓北少西曰玉清殿純和之次曰寧福殿寧福之後曰苑門由苑門而北曰仁智殿有二大石左曰敷錫神運萬歲峯右曰玉京獨秀太平岩殿曰山莊莊之西南曰翠微閣苑門東曰仙韶院院北曰湧翠峯峯之洞曰大滌湧翠東連長生殿殿東曰湧金殿湧金之東曰蓬萊殿長生西浮玉殿浮玉之西曰瀛洲殿長生之南曰閲武殿閲武南曰內藏庫由嚴祖門東曰尚食局尚食東曰宣徽院宣徽北曰御藥院御藥北曰右藏庫右藏之東曰左藏宣徽東曰點檢司點檢北曰祕書監祕書北曰學士院學士之北曰諌院諌院之北曰武器署點檢之南曰儀鵉局儀鵉之南曰尚輦局宣徽之南曰拱衛司拱衛之南曰尚衣局尚衣之南曰繁禧門繁禧南曰安泰門安泰西與左升龍門直東則夀聖宫兩宫太后位本明俊殿試進士之所宫北曰徽音殿徽音之北曰燕夀殿燕夀殿垣後少西曰震肅衛司東曰中衛尉司儀鵉之東曰小東華門更漏在焉中衛尉司東曰祗肅門祗肅門東少南曰將軍司徽音夀聖之東曰太后苑苑之殿曰慶春慶春與燕夀並小東華與正東華對東華門內正北尚廄局尚廄西北曰臨武殿左掖門正北尚食局局南曰宫苑司宫苑司西北曰尚醖局湯藥局侍儀司少西曰符寶局器物局西則撒合門嘉瑞樓西曰三廟正殿曰德昌東曰文昭殿西曰光興殿並南嚮德昌之後宣宗廟也宫西門曰西華與東華直其北門曰安貞二大石外凡花石臺榭池亭之細並不録觀其制度蕳素比土階茅茨則過矣視漢之所謂千門萬戶珠璧華麗之飾則無有也然後之人因其制度而損益之以求其稱斯可矣公又有録汴梁宫人語五言絶句一十九首雖一時之所寄興亦不無有傷感之意今併附于此詩曰一入深宫裏經今十五年長因批帖子呼到御牀前右一歲歲逢元夜金娥簇巾見人心自怯終是女兒身右二殿前輪直罷偷去賭金叉怕見黃昏月殷勤上玉階右三翠翹掘背小殿夜藏鈎驀地羊車至低頭笑不休右四內府頒金帛教酬賀節盤兩宫新有旨先與問孤寒右五人間多棗栗不到九重天長𬒳黃衫吏花攤月賜錢右六仁聖生辰節君王進玉巵夀棚兼夀表留待北還時右七邉奏行臺急東華夜啓封內人催步輦不候景陽鍾右八畫燭雙雙引珠簾一一開輦前齊下拜歡飲辟寒杯右九聖躬香閣內尺道下朝遲扶仗嬌無力紅綃貼玉飢右十今日天顔喜東朝內宴開外邉農事動詔遣教坊回右十一駕前雙白鶴日日候朝回自送鑾興去經年更不來右十二陡覺文書靜相將立夕陽傷心寧福位無復夜熏香右十三二后睢陽去潜身泣到明却回誰敢問校似有心情右十四為道圍城久收奩鬪犒軍入春渾斷絶飢苦不堪聞右十五監國推梁邸𥘉頭靜不知但疑墻外笑人有看宫時右十六别殿弓刀響倉皇接鄭王尚愁宫正怒含淚強添妝右十七一向傳宣喚誰知不復還來時舊針線記得在窗間右十八北去遷沙漠誠恐畏從行不如當日死頭白若為生右十九陳隨隱南度行宫記云杭州治舊錢王宫也紹興因以為行宫皇城九里入和寧門左進奏院玉堂右中殿外庫至北宫門循廊左序巨璫幕次列如魚貫祥㬢殿朵殿接修廊為後殿對以御酒庫御藥院慈元殿外庫內侍省內東門司大內都巡檢司御厨天章等閣廊回路轉衆班排列又轉內藏庫對軍器庫又轉便門垂拱殿五間十二架修六丈廣八丈四尺􅉉屋三間修廣各丈五朵殿四兩廊各二十間殿門三間內龍墀折檻殿後擁舍七間為延和殿右便門通後殿殿左一殿隨時易名明堂郊祀曰端誠䇿士唱名曰集英宴對奉使曰崇德武舉及軍班授官曰講武東宫在麗正門內南宫門外本宫㑹議所之側入門垂楊夾道間夫容環朱蘭二里至外宫門節堂後為財帛生料二庫環以官屬直舍轉外窑子入內宫門廊右為贊導春坊直舍左講堂七楹扁新益外為講官直舍正殿向明左聖堂右祠堂後凝華殿瞻籙堂環以竹左寢室右齊安位內人直舍百二十楹左彛齊太子賜號也接繍香堂便門通繹已堂重􅉉復屋昔楊太后垂簾於此曰慈明殿前射圃竟百步環修廊右博雅樓十二間左轉數十步雕䦨花甃萬卉中出秋千對陽春亭清霽亭前夫容後木犀玉質亭梅繞之由繹已堂過錦胭廊百八十楹直通御前廊外即後苑梅花千樹曰梅岡亭曰冰花亭枕小西湖曰水月境界曰澄碧牡丹曰伊洛傳芳芍藥曰冠芳山茶曰鶴丹桂曰天闕清香堂曰本支百世佑聖祠曰慶和泗洲曰慈濟鍾吕曰得真橘曰洞庭佳味茅亭曰昭儉木香曰架雪竹曰賞靜松亭曰天陵偃蓋以日本國松木為翠寒堂不施丹艧白如象齒環以古松碧琳堂近之一山崔嵬作觀堂為上焚香祝天之所吳知古掌焚修每三茅觀鍾鳴觀堂之鍾應之則駕興山背夫容閣風帆沙鳥履舄下山下一溪縈帶通小西湖亭曰清漣怪石夾列獻瑰逞秀三山五湖洞穴深杳豁然平朗翬飛翼拱淩虛樓對瑞慶殿損齊緝熙崇政殿之東為欽先孝思復古𬗋宸等殿木圍即福寧殿射殿曰選得坤寧殿貴妃昭儀婕妤等位宫人直舍蟻聚焉又東過閣子庫睿思殿儀鵉修內八作翰林諸司是謂東華門右二記書法詳贍宋之宫闕概可見矣徐文獻公任浙西廉訪使日遇有訴訟者必歷問其郡邑官吏臧否分為三等載諸籍第一等絶臧者第二等臧否相半者第三等極否者又用覆察相同候分司按巡時遂以卑之曰第一等褒舉之第二等勿問第三等懲戒之使改過可也慎勿罷其職役分司遵奉一道肅清人之年壯而髮班白者俗曰算髮以為心多思慮所致蓋髮乃血之餘心主血血為心役不䏻上廕乎髮也然本草云蕪菁子壓油塗頭能變蒜髮則亦可作蒜易說卦巽為寡髮陸德明曰寡本作宣黑白雜為宣髮據此則當用宣字為是檄書露布何所起乎漢陳琳草檄曹操見之頓愈頭風遂謂檄起於琳說文檄二尺書徐鍇通釋曰檄徴兵之書也漢髙祖以羽檄徴天下兵有急則插以羽尓雅木無枝為檄注檄擢直上也文心雕龍有張儀檄楚書隗囂檄亡新文文選有司馬相如喻蜀檄文則檄非自琳始也明矣隋禮儀志後魏每戰剋書帛於􅃮竿上名露布世說桓宣武征鮮卑煥袁粲作露布倚馬手不輟筆俄成七𥿄如隋志世說所云則露布起於後魏而晉因之然漢官儀凡制書皆璽封唯赦贖令司徒印露布州郡又漢書賈洪為馬超作伐曹操露布則漢時已然及讀𥘉學記引春秋佐助期曰武露布文露沉宋均云甘露見其國布散者人上武文采者則甘露沉重豈露布之義當取於此與西浙之人以草為履而無跟名曰靸鞋婦女非纏足者通天之炙轂子雜録引實録云靸鞋舄三代皆以皮為之朝祭之服也始皇二年遂以蒲為之名曰靸鞋二世加鳯首仍用蒲晋永嘉元年用黃草宫內妃御皆著始有伏鳩頭履子梁天監中武帝易以絲名解脫履至陳隋間吳越大行而模樣差多唐大曆中進五朵草履子建中元年進百合草履子據此則靸鞋之製其來甚古然北夢瑣言載霧是山巾子船為水靸鞋之句抑且咏諸詩矣靸悉合切在颯字韻下今俗呼與翣同音者誤世稱鄉胥為書手處處皆然報應記宋衎江淮人應明經舉元和𥘉至河隂縣因疾病廢業為鹽鐡院書手蓋唐時巳有此名南村輟耕録卷之十八
