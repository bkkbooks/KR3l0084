front:
  text: 南村輟耕録卷之二十八
  hash: sha256:36001bfb3db35a8eb02a9b898a6dd3f5082e8a08688db58795697260fd8f3a72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_028-1a}
body:
  text: 天台陶宗儀九成各行省鄉試則有人取發解進士姓名一如登科記鋟梓印行以圖少利至正四年甲申江浙揭曉後乃有四六長篇題曰非程文語與抄曰省榜同時版行不知何人所造而路府州縣盛傳之語曰設科取士深感聖世之恩倚公挾私無奈吏胥之弊豈期江浙之大省壞于禹疇之小劉名錫眉山人當該掾史斯文孔艱衷情痛憤待士無禮呼名散餅於路傍懷璧有謀打號貼圗于墻上厨傳用猾吏內外之消息可通試官取貪夫上下之機關不泄陽揭題駕言無弊實自生姦宄之心覔厚賂力舉還魂特欲箝是非之口五服之親不避故違國朝之典章雜犯之卷俱抄恐失手本之名字應才杭州鼓勇于終埸之日局長之信巳通劉環即環翁杭州知名于未榜之前代筆之錢盡去萬户侯之關節可驗丈人峯之氣力何勤以將鉛山萬户吕天澤監門進樂平之八子許瑗董彛徐復鄒成操琬汪緈許道傳戴用海郎吳縣主簿海魯丁受卷通括蒼之二林松慶祖本生之地增輝同列之情不薄黃璋松江稱幹首一三月已買試官鮑恂嘉興在榜中十四名全賴妻父建德知事俞鎮籍開元真人之力葉氏葉瓉信州禮經依永嘉縣尹林泉生之門江郎兄弟暉晃建寧劉大希賢慶元在列賴為省郎之師沈小推時杭州登科誰知運吏之壻黃岩趙藺友藺得家兄寧海丞由欽為簾外之官瑞安髙明託館主有堂上之友紛紛在眼歷歷難言許瑗饒州作魁三百定賣幾千株之木鄒成饒州駝榜十八日納七萬户吕天澤之錢左者如斯右其可見尺牘先來于柏府仕宦勢髙稿文潛出于棘閙師生情密遞手帖全慿巡綽寫懷挾不避軍人四子入場代筆有此劉之手一家在榜瞞人起各路之文所謀不臧其忠何在王賀紹興備榜省中典吏不讀書亦解成名李思思齊婺山村童未知禮焉宜中選錯春秋之年分臨海夢龍姓趙備榜亂周易之隂陽平江俞䁀耳目之所及者如此心術之潛運者難知姑舍舉人更陳坐主俞鎮建德知事夤緣考試這畨豐卒歲之資吳峽州知事買題登科方得證舊時之本麟經錯亂因賂取林泉之生生何如永嘉尹林泉生易義駁雜以名尋夏日之孜孜安用會稽尹夏日孜其餘泛泛不必叨叨分經考卷得便私情自開科曾無此例出院改文以欺公論雖刋版乃是訛傳歷觀解據之非益見文衡之繆指實告官者反罹其罪懷才抱藝者虛費其勞趙俶蔣堂空仰天而嘆息江孚沈幹徒踏地以咨嗟潘伯修蔡餘慶兩舉矣為聞夢吉陸居仁再來告免鳴呼文運巳矣吾道安之何等主司汙濫壞今年之選舉既生聖丗進修冀異日之公明此非一口之經陳實乃衆賢之願告有人心者念天理焉至二十二年壬寅復有作彈文云文運重開多士歡謄於此日科埸作弊醜聲莫甚於今年啓姦人僥幸之門負賢相賔興之意事既如此人其奈何切惟考試官實文章之司命詎宜偽定于臨期員外郎執科舉之權衡安可公然而受賂憸謀既遂清議難容聞人樞膚淺之學翰林懷賔主之舊情啜靄山遊俠之徒座主念梓桑之宿好只因厚契便擢科名尸位憲賔進鄉閭之十子居喪臺掾升里閈之三王沈庭圭錯破書經混死生于同列戰惟肅不明詩意強今古於巳然朱舜民乃瀕海之強梁喻宜之實許門之童子新昌庭瑞輸綵假之幾縑霅水莫孜奉白金之一錠張誼罔知彖象皆徐中造就之私楊明不辨春秋拜周溥作成之賜施省憲貼書之手假壞鄉閭整肅之綱常唐肅以詞賦而見收明經安在柯理以梯媒而得中對䇿何長舍弟致謀甚矣有心之唐溥家兄代筆嗟哉無學之鄭沂靖而思之良可醜也白頭錢宰感綈𫀆戀戀之情碧眼倪中發倉廪陳陳之粟俞潛徐䁀三月𥘉早買試官丘民韓明五日前預知題目元孚乃泉南之大賈揮金不啻于泥沙許徴實雲間之富家納粟猶同于瓦礫拔頴之於陋巷餘波有自於陽明超宋祀于窮途主意必資于張誼既正榜之若此則備選之可知姑舍前言更陳餘意屈仲孚于受卷易經可謂失人進公甫于考文麟史大孤衆望不分報賽叔通豈可與言詩繆講進孺子烏足以論易重載連檣之白粲始諧校藝于青藜逯信止素乏文才嗟老夫之巳耄盂天每稱好觜奈舉業之久疏大壞士風難逃輿論鳴呼天之將喪斯文實係興衰之運士欲致用於國豈期貢舉之私此非一口之誣謀實乃衆情之公論用書既往以警將來丞相伯顔嘗至于闐國于其國中鑿井得一玉佛髙三四尺色如截肪照之皆見筯骨脈絡即貢上方又有白玉一假髙六尺闊五尺長十七步以重不可致杜清碧先生本應召次錢唐諸儒者爭趨其門燕孟初作詩嘲之有紫藤帽子髙麗靴處士門前當怯薛之句聞者傳以為笑用紫色棕藤縳帽而製靴作髙麗國樣皆一時所尚怯薛則內府執役者之譯語也松江府儒學直學沈伯雲因花破錢糧乃與教授陳仲微有隙伯雲之父曰君實者老吏也一日率婢妾詈箠仲微于途適憲僉吕公思誠分按至府具狀以訴公怒其詬辱師表有傷風化勾攝赴官服辜君實年愈七旬乞以銅贖公判云既能為不能為之事正當受不當受之刑卒杖斷之張起字起之四眀人有詩名嘗作一聮云别來越樹長為客看盡吳山不是家未幾卒詩亦有讖歟丘機山松江人宋季元𥘉以滑稽聞于時啇謎無出其右遨逰湖海間嘗至福州譏其秀才不識字衆怒無以難之一日搆思一對欲令其辭屈心復對云五行金木水火土丘隨口答云四位公侯伯子男其慱學敏捷類如此杭州湯鎮一凶徒素不孝于毋尤􅓸虐其妻有子三歲愛惜甚至妻常抱負偶失手攧損其頭泣而謂姑曰夫歸婦必𬒳毆死不若先溺水之為幸姑曰姑第無憂但云是我之誤我却去避汝小姑處俟其怒息而還至晚夫歸見兒頭破徑捽妻欲殺之妻告曰非我過也婆攧之耳懼汝怒已往小姑家去遂釋之次日持刀尋母中途藏諸石下却到妹家好言誘母還至石邉忿躁詈罵取刀殺母竟失藏刀所在惟見巨蛇介道衆怯退縮不覺雙足陷入地中須臾即沒至膝七竅流血聲罪自咎母急扶抱無計可施走報於婦婦掘地隨掘隨陷啖以飲食三日乃死觀者日數千人莫不稱快時至正甲辰六月也杭州薦橋側首有髙樓八間俗謂八間樓皆冨實回回所居一日娶婦其昏禮絶與中國殊雖伯叔姊妹有所不顧街巷之人肩摩踵接咸來窺視至有攀緣簷闌窗牗者踏翻樓屋賔主壻婦咸死此亦一大怪事也群人王梅谷戲作下火文云賔主滿堂歡閭里盈門看洞房窗崩摧喜樂成禍患壓落瓦碎弓倒落沙泥彆都釘折兮木屑飛揚玉山摧坦腹之郎金谷墜落花之相難以乘龍兮魄散魂消不能跨鳯兮筯斷骨折絲脫兮塵土昏頭神碎兮珠翠黯壓倒象鼻塌不見貓睛亮嗚呼守白頭未及一朝賞黃花却在半晌移厨聚景園中歇馬飛來峯上阿刺郎葛反一聲絶無聞哀哉樹倒胡孫散阿老瓦倒刺沙别都丁木偰非皆回回小名故借音及之象鼻貓晴其貌也氁上聲絲頭神其服也阿刺其語也聚景園回回􅓜冡在焉飛來峯猿猴來往之處嘉興白縣尹得代過姚莊訪僧勝福林間逰市井間見婦人女子皆濃粧艷飾因問從行者或答云風俗使然少艾者僧之寵下此則皆道人所有白遂戲題一絶于壁云紅紅白白好花枝盡𬒳山僧折取歸秪有野薇顔色淺也來鈎惹道人衣勝見亟命去之然已盛傳矣秀之斜塘有故宋大姓居焉家冨饒田連阡陌宗族雖盛衍而子孫多不肖祖父財産廢敗罄盡郡人金方所談辭滑稽為賦誦好嫚戲因托其事成近體一律云興廢從來固有之尓家忒煞欠扶持諸墳掘見黃泉骨兩觀番成白地皮宅眷皆為撑目兔舍人捴作縮頭龜強奴猾幹欺􅓸主説與人家子弟知夫兔撑目望月而孕則婦女之不夫而妊也其家有道觀二所語雖鄙俚然為人後者見此寧不知懼也哉逹逹樂器如筝秦琵琶胡琴渾不似之類所彈之曲與漢人曲調不同大曲哈八兒圖口溫也葛倘兀畏兀兒閔古里起土苦里跋四土魯海舍舍弼搖落四蒙古搖落四閃彈搖落四阿耶兒虎桑哥兒苦不丁江南謂之孔雀雙手彈答刺謂之白翎雀雙手彈阿厮闌扯弼回盞曲雙手彈苦只把共吕弦小曲哈兒火失哈赤黑雀兒呌阿林捺花紅曲律買者歸洞洞伯牝疇兀兒把擔葛失削浪沙馬吞相公仙鶴阿丁水花回回曲伉里馬黑某當當清泉當當周申父之翰寒夜擁罏爇火見瓶內所插折枝梅花氷凍而枯因取投火中戲作下火文云寒勒銅瓶凍未開南枝春斷不歸來這回勿入梨雲夢却把芳心作死灰共惟地罏中處士梅公之靈生自羅浮派分庾嶺形若稿木稜稜山澤之臞膚如凝脂凛凛雪霜之操春魁占百花頭上歲寒居三友圖中玉堂茅舍捴無心金鼎啇羔期結果不料道人見挽便離有色之根夫何氷氏相凌遽返華胥之國玉骨擁罏烘不醒氷魂翦紙竟難招𥿄帳夜長猶作尋香之夢筠窗月淡尚疑弄影之時雖宋廣平鐵石心腸忘情未得使華光老丹青手假摸索難真却愁零落一枝春好與茶毗三昧火惜花君子還道這一點香魂今在何處咦炯然不逐東風散只在孤山水月中一人娶妻無元袁可潛贈之如夢令云今夜盛排筵宴準擬尋芳一遍春去幾多時問甚紅深紅淺不見不見還你一才白絹丗有男子雖娶婦而終身無嗣育者謂之天閹丗俗則命之曰黃門晉海西公嘗有此疾北齊李庶生而天閹按黃帝針經曰人有具傷于隂隂氣絶而不起隂不能用然其鬚不去宦者之獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脈血寫不復皮膚內結唇口不榮故鬚不生黃帝曰其有天宦者未嘗披傷然其鬚不生其故何也岐伯曰此天之所不足其任衝不盛宗筋不成有氣無血唇口不榮故鬚不生又大般若經載五種黃門云𣑽言扇丑皆切半擇迦唐言黃門其類有五一曰半擇迦捴名也有男根用而不生子二曰伊利沙半擇迦此云妬謂他行欲即發不見即無亦具男根而不生子三曰扇半擇迦謂本來男根不滿亦不能生子四曰博又半擇迦謂半月能男半月能女五曰留拿半擇迦此云割謂𬒳割形者此五種黃門名為人中惡趣受身處然周禮閹人鄭氏注云閹真氣藏者宋趙忠惠帥維揚日幕僚趙參議有婢慧點盡得儕輩之歡趙呢之堅拒不從疑有異強即之則男子也聞于有司蓋身二形前後姦狀不一遂置之極刑近李安民嘗於福州得徐氏處子年十五六交際一再漸具男形蓋天真未破則彼亦不自知然小説中有池州李氏女及婢添喜事正相類而此外絶未見於古今傳記等書豈以為人之妖而汙筆墨不復載乎晉五行志謂之人痾惠帝時京洛有人兼男女體亦能兩用人道而性尤淫亂此亂氣所生也玉曆通政經男女兩體主國淫亂而二十八宿真形圖所載心房二星皆兩形與丈夫婦女更為雌雄此又何耶異物志云靈狸一體自為隂陽故能媚人禇氏遺書曰非男非女之身精血散分又曰感以婦人則男脈應診動以男子則女脈順指皆天地不正之氣也右載周密癸辛雜識中原紅冦未起時花山賊畢四等僅三十六人內一婦女尤勇捷聚集茅山一道宮縱橫出沒略無忌憚始終三月餘三省撥兵不能收捕殺傷官軍無數朝廷召募鹺徒朱陳率其黨與一鼓而擒之從此天下之人視官軍為無用不三五年自河以南盜賦克斥其數也夫宇文公諒字子貞湖州人初領鄉貢入浙省試院頭場占一席舍其案上有宇文同知四字不知何人書試官考卷以文不中式將黜之時坐主龍麟洲先生江西老儒也年八十餘始過江浙力主此卷卒置榜中及會試果登髙第授同知婺源州事雖曰爵祿前定蓋亦隂德所致人鮮有知者公少年時嘗館授巨室其閨愛中夜來奔堅拒不納明旦託以他故斂書告別此非隂德也與俞俊其先嘉興人今占籍松江上海縣娶也先普化次兄丑驢女也先普化長兄觀觀死蒸長嫂而妻之次兄丑驢死又蒸次嫂而妻之俊妻毋也既而亦死俊縛綵繒為祭亭綴銀盤十有四于亭兩柱書詩聮盤中云清夢斷栁營風月菲儀表梓里葭莩蓋栁營暗藏亞夫二字非儀謂菲人表梓謂脿子捴賤娼濫婦之稱葭莩皆是夫也郡人莫不多其才而譏其輕薄如此又嘗詣妻父墓所題於廬壁曰柏舟在河可謂節乎二嫂治棲可謂義乎覆宗絶祀可謂孝乎先刺妻毋中刺也先普化末刺妻之弟博顔帖木兒也博顔帖木兒無他兄弟因利也先之財願繼其後竟不恤親父小宗之祀為重故云博顔帖木兒將赴鄉試謂人曰若沗一薦有司以禮敦遣先就北宅上馬赴府公宴畢却歸新宅下馬北宅丑驢所居新宅也先普化所居人戲之曰昔人有二天今子有二父何其幸歟博顔帖木兒赧甚俊弱冠時從顧琛淵白遊負氣傲物當伯顔太師柄國日嘗賦清平樂長短句云君恩如草秋至還枯稿落落殘星猶弄曉豪傑消磨盡了放開湖海襟懷休教鷗鷺驚猜我是江南􅌒客等間容易安排手藁留葉起之處後與葉交惡竟訴于官必欲搆成其罪寅緣賄賂浙省移準中書省咨劄付儒學提舉司議得古人寄情遣興作為閨怨詩詞多有指夫為君者然此亦當禁止以故獲免罪戾而所費巳幾萬定矣至正丙申春張士誠僣號誠王據有平江日又以賄通松江偽尹鄭煥署宰華亭用酷刑朘剝邑民恨入骨髓郡士袁海叟有詩曰四海清寧未有期諸公衮衮正當時忽然一日天兵至打破黃婆醋鉢兒或者不知醋鉢之義以問叟叟曰昔有不軌伏誅暴尸于竿王婆買醋經過其下適索朽尸墜醋鉢為其所壓著地而碎王婆年老無知將謂死者所致顧謂之曰汝只是未曽喫惡官司來聞者皆絶倒棊譜通玄集通遠集清逺集清樂集幽玄集機深集增廣通遠集玄玄集忘憂集謝景暘居松江北郭結壇於家行召鬼法至正十一年官兵下海勦捕方國珍傳云賊中有人能呼召風雨必得破其法者乃可擒討千户也先等遂以謝薦捴兵官給傳致請省劄有云參裁軍事必訪異人既逹天時當為世用時知府王克敏廉分端嚴有聲于時不得巳親造其廬起赴軍前其術一無所驗自後全軍敗衄吁宰臣統大兵數十萬勦除草竊如拉朽耳而乃迎一方士則其機略安在哉嘉興捴管􅓸師德以文章政事自居同僚莫敢與抗然其行實貪汙頗聞人有譏議因出對云竹本無心外靣自生枝節貢推官對云藕因有竅中間抽出絲豪並諷之也平江承天寺遭回祿殿宇一空僧恱楚南來住持施財者雲集遂大興土木之工金璧珠滕有加於昔或勸題梁恱不從曰當有俗人來暫居曰升領徑山卒髙郵兵攻破城張士誠據以為宫佛像悉毀壞銅觀音鑄為錢既投降作太尉別造府越四五年復為寺吳興錢泰窩云至正𥘉二賈自嘉興來平江買舟至海口收市舶貨行二十餘里兩道人詣舟求度一負磬一持鬼神像既上舟去申報乃兩甲者從像中出二長刀叱曰吾逐盜至此汝真盜也舟人陽應曰我固知為盜顧無以彂今壯士誠與吾意合此未可前途乃可耳故紆行且曰二盜已落公手治酒助公勇遂命妻取酒勸甲者遲暮醉抽其刀斫賊其一躍起復斫之二盜盡死舟還二賈泣且拜曰非公吾幾不免虎口遂以白金二餅為舟人壽吁決死生於阽危之際不負賈之託不謂之義丈夫可乎至正庚子秋七月九日飲松江泗濵夏氏清樾堂上酒半折正開荷花置小金巵於其中命歌姬捧以行酒客就姬取花左手執枝右手分開花瓣以口就飲其風致又過碧筒逺甚余因名為解語杯坐客咸曰然張句曲戲題黃大癡小像云全真家數禪和口鼓貧子骨頭吏員臟腑唐伯剛題邾仲誼小像云七尺軀威儀濟濟三寸舌是非風起一雙眼看人做官兩隻腳沿門報喜仲誼云是誰是誰伯剛云是你是你張明善作北樂府水仙子譏時云鋪眉苦眼早三公祼衲揎拳享萬鍾胡言亂語成時用大綱來都視烘上聲説英雄誰是英雄五眼雞岐山鳴鳯兩頭蛇南陽臥龍三腳貓渭水非熊今人卜卦以銅錢代蓍便於用也又有以錢八文周圍鋪轉而取六爻名曰金井闌但乾卦𥘉爻及復之泰不可變蓋止有六十二卦耳此不可用至正十二年歲壬辰秋蘄黃徐夀輝賊黨攻破昱嶺關徑抵餘杭縣七月𥘉十日入杭州城偽項帥蔡楊蘇一屯明慶寺一屯北關門妙行寺稱彌勒佛出世以惑衆浙省參政樊執敬死于天水橋寶歌與妻同溺于西湖其賊不殺不淫招民投附者署姓名于簿籍府庫金帛悉輦以去至二十六日浙西廉訪使自紹興率鹽場竈丁過江同羅木營官軍剋復城池賊遂潰散三平章定定逃往嘉興郎中脫脫過江南越數日擕省印來會權署省事至是亦回四平章教化自湖州統軍歸舉火焚城殘蕩殆盡附賊充偽職者范縣尹等明正典刑里豪施遵禮顧八為迎敵官軍咼于市家産悉沒縣官明慶妙行亦然省都事以下坐失守城池罷黜不敘省官復任如故朝廷法度既隳刑賞失冝欲天下宴安不可復得矣畫家十三科佛菩薩相玉帝君王道相金剛神鬼羅漢聖僧風雲龍虎宿世人物金境山水花竹翎毛野騾走獸人間動用界畫樓臺一切傍生耕種機織雕青嵌緑南村輟耕録卷之二十八
