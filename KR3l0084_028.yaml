front:
  text: 南村輟耕録卷之二十八
  hash: sha256:36001bfb3db35a8eb02a9b898a6dd3f5082e8a08688db58795697260fd8f3a72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_028-1a}
body:
  text: 天台陶宗儀九成各行省郷試則有人取發觧進士姓名一如登科記鋟梓印行以圖少利至正四年甲申江浙掲暁後乃有四六長篇題曰非程文語與抄曰省牓同時版行不知何人所造而路府州縣盛傳之語曰設科取士深感聖世之恩倚公挟私無柰吏胥之弊豈期江浙之大省壞扵禹疇之小劉名錫眉山人當該掾史斯文孔艱衷情痛憤待士無禮呼名散餅於路傍懐璧有謀打號貼圗扵墻上厨傳用猾吏内外之消息可通試官取貪夫上下之機関不泄陽掲題駕言無弊實自生姦宄之心覔厚賂力舉還䰟特欲箝是非之口五服之親不避故違國朝之典章雜犯之卷俱抄恐失手本之名字應才杭州皷勇扵終埸之日局長之信巳通劉環即環翁杭州知名扵未牓之前代筆之錢盡去萬户侯之関節可驗丈人峯之氣力何勤㠯将鉛山萬户吕天澤監門進樂平之八子許瑗董彛徐復邹成操琬汪緈許道傳戴用海郎呉縣主簿海魯丁受卷通括蒼之二林松慶祖本生之地増輝同列之情不薄黃璋松江稱幹首一三月已買試官鮑恂嘉㒷在牓中十四名全頼妻父建德知事俞鎮籍開元真人之力葉氏葉瓉信州禮經依永嘉縣尹林泉生之門江郎兄弟暉晃建寕劉大希賢慶元在列頼為省郎之師沈小推時杭州登科誰知運吏之壻黄岩趙藺友藺得家兄寕海丞由欽為簾外之官瑞安髙明託館主有堂上之友紛紛在眼歴歴難言許瑗饒州作魁三百定賣幾千株之木鄒成饒州駝牓十八日納七萬户吕天澤之錢左者如斯右其可見尺牘先来扵柏府仕宦勢髙槀文潜岀扵棘閙師生情宻逓手帖全慿廵綽冩懐挾不避軍人四子入塲代筆有此劉之手一家在牓瞞人起各路之文所謀不臧其忠何在王賀紹㒷備牓省中典吏不讀書亦觧成名李思思齊婺山村童未知禮焉宜中選錯春秋之年分臨海夢龍姓趙備牓亂周易之隂陽平江俞䁀耳目之所及者如此心術之潜運者難知姑舍舉人更陳坐主俞鎮建徳知事夤縁考試這畨豊卒歲之資吳峽州知事買題登科方得證舊時之本麟經錯亂因賂取林泉之生生何如永嘉尹林泉生易義駁雜以名尋夏日之孜孜安用會稽尹夏日孜其餘汎汎不必叨叨分經考卷得便私情自開科曾無此例出院改文以欺公論雖刋版乃是訛傳歴觀觧㩀之非益見文衡之繆指實告官者反罹其罪懐才抱藝者虚費其勞趙俶蔣堂空仰天而嘆息江孚沈幹徒踏地以咨嗟潘伯脩蔡餘慶两舉矣為聞夢吉陸居仁再来告免鳴呼文運巳矣吾道安之何等主司汙濫壞今年之選舉既生聖丗進脩冀異日之公明此非一口之經陳實乃衆賢之願告有人心者念天理焉至二十二年壬寅復有作弹文云文運重開多士歡謄於此日科埸作弊醜聲莫甚於今年啓姦人僥倖之門負賢相賔興之意事既如此人其柰何切惟考試官寔文章之司命詎宜偽定扵臨期員外郎執科舉之權衡安可公然而受賂憸謀既遂清議難容聞人樞膚淺之學翰林懐賔主之舊情啜靄山㳺俠之徒座主念梓桑之宿好只因厚契便擢科名尸位憲賔進郷閭之十子居喪臺掾升里閈之三王沈庭珪錯破書經混死生扵同列戰惟肅不明詩意强今古於巳然朱舜民乃瀕海之强梁喻宜之實許門之童子新昌庭瑞輸綵叚之幾縑霅水莫孜奉白金之一錠張誼罔知彖象皆徐中造就之私楊明不辯春秋拜周溥作成之賜施省憲貼書之手叚壊郷閭整肅之綱常唐肅以詞賦而見收明經安在柯理以梯媒而得中對䇿何長舍弟致謀甚矣有心之唐溥家兄代筆嗟哉無學之鄭沂靖而思之良可醜也白頭錢宰感綈𫀆戀戀之情碧眼倪中發倉廪陳陳之粟俞潜徐䁀三月𥘉早買試官丘民韓明五日前預知題目元孚乃泉南之大賈揮金不啻扵泥沙許徴實雲間之富家納粟猶同扵瓦礫㧞頴之於陋巷餘波有自於陽明超宋祀扵窮途主意必資扵張誼既正牓之若此則備選之可知姑舍前言更陳餘意屈仲孚扵受卷易經可謂失人進公甫扵考文麟史大孤衆望不分報賽叔通豈可與言詩繆講進孺子烏足以論易重載連檣之白粲始諧校藝扵青藜逯信止素乏文才嗟老夫之巳耄盂天毎稱好觜柰舉業之乆䟽大壞士風難逃輿論鳴呼天之将喪斯文實係興衰之運士欲致用於國豈期貢舉之私此非一口之誣謀實乃衆情之公論用書既徃以警将来丞相伯顔嘗至于闐國扵其國中鑿井得一玉佛髙三四尺色如截肪照之皆見筯骨脉絡即貢上方又有白玉一叚髙六尺闊五尺長十七歩以重不可致杜清碧先生本應召次錢唐諸儒者争趋其門燕孟初作詩嘲之有紫藤帽子髙麗靴䖏士門前當怯薛之句聞者傳以為笑用紫色㯶藤縳㡌而製靴作髙麗國様皆一時所尚怯薛則内府執役者之譯語也松江府儒學直學沈伯雲因花破錢粮乃與教授陳仲微有隙伯雲之父曰君實者老吏也一日率婢妾詈箠仲微于途適憲僉吕公思誠分按至府具状以訴公怒其詬辱師表有傷風化勾攝赴官服辜君實年愈七旬乞以銅贖公判云既能為不能為之事正當受不當受之刑卒杖断之張起字起之四眀人有詩名嘗作一聮云别来越樹長為客看盡呉山不是家未幾卒詩亦有䜟欤丘機山松江人宋季元𥘉以滑稽聞于時啇謎無出其右遨逰湖海間甞至福州譏其秀才不識字衆怒無以難之一日搆思一對欲令其辭屈心復對云五行金木水火土丘隨口答云四位公侯伯子男其慱學敏捷類如此杭州湯鎮一兇徒素不孝扵毋尤􅓸虐其妻有子三歲愛惜甚至妻常抱負偶失手攧損其頭泣而謂姑曰夫歸婦必𬒳毆死不若先溺水之為幸姑曰姑第無憂但云是我之誤我却去避汝小姑䖏俟其怒息而還至晚夫歸見児頭破徑捽妻欲殺之妻告曰非我過也婆攧之耳懼汝怒已往小姑家去遂釋之次日持刀尋母中途蔵諸石下却到妹家好言誘母還至石邉忿躁詈罵取刀殺母竟失蔵刀所在惟見巨蛇介道衆怯退縮不覺雙足䧟入地中湏臾即沒至膝七竅流血聲罪自咎母急扶抱無計可施走報於婦婦掘地隨掘隨䧟啖以飲食三日乃死觀者日數千人莫不稱快時至正甲辰六月也杭州薦橋側首有髙樓八間俗謂八間樓皆冨實回回所居一日娶婦其昏禮絶與中國殊雖伯叔姊妹有所不顧街巷之人肩摩踵接咸来窺視至有攀縁簷䦨窓牗者踏翻樓屋賔主壻婦咸死此亦一大怪事也群人王梅谷戯作下火文云賔主滿堂歡閭里盈門看洞房窓崩摧喜樂成禍患壓落瓦碎弓倒落沙泥彆都釘折兮木屑飛揚玉山摧坦腹之郎金谷墜落花之相難以乗龍兮魄散魂消不能跨鳯兮筯断骨折絲脫兮塵土昏頭神碎兮珠翠黯壓倒象鼻塌不見猫睛亮嗚呼守白頭未及一朝賞黃花却在半晌移厨聚景園中歇馬飛来峯上阿刺郎葛反一聲絶無聞哀哉樹倒胡孫散阿老瓦倒刺沙别都丁木偰非皆回回小名故借音及之象鼻猫晴其貌也氁上聲絲頭神其服也阿刺其語也聚景園回回􅓜冡在焉飛来峯猿猴来徃之䖏嘉興白縣尹得代過姚莊訪僧勝福林閒逰市井間見婦人女子皆濃粧艷飾因問從行者或答云風俗使然少艾者僧之寵下此則皆道人所有白遂戯題一絶于壁云紅紅白白好花枝盡𬒳山僧折取歸秪有野薇顔色淺也来鈎惹道人衣勝見亟命去之然已盛傳矣秀之斜塘有故宋大姓居焉家冨饒田連阡陌宗族雖盛衍而子孫多不肖祖父財産廢敗罄盡郡人金方所談辭滑稽為賦誦好嫚戯因摭其事成近體一律云興廢從来固有之尓家忒煞欠扶持諸墳掘見黃泉骨两觀番成白地皮宅眷皆為撑目兎舍人捴作縮頭龜强奴猾幹欺􅓸主說與人家子弟知夫兎撑目望月而孕則婦女之不夫而姙也其家有道觀二所語雖鄙俚然為人後者見此寕不知懼也哉逹逹樂器如筝秦琵琶胡琴渾不似之類所彈之曲與漢人曲調不同大曲哈八児圖口溫也葛倘兀畏兀児閔古里起土苦里䟦四土魯海舍舍弼揺落四蒙古揺落四閃彈揺落四阿耶児虎桑哥児苦不丁江南謂之孔雀雙手彈答刺謂之白翎雀雙手彈阿厮䦨扯弼回盞曲雙手彈苦只把共吕弦小曲哈児火失哈赤黑雀児呌阿林捺花紅曲律買者歸洞㓊伯牝疇兀児把擔葛失削浪沙馬吞相公仙鶴阿丁水花回回曲伉里馬黒某當當清泉當當周申父之翰寒夜擁罏爇火見缾内所挿折枝梅花氷凍而枯因取投火中戯作下火文云寒勒銅缾凍未開南枝春㫁不歸来這回勿入梨雲夢却把芳心作死灰共惟地罏中䖏士梅公之靈生自羅浮派分庾嶺形若槁木稜稜山澤之臞膚如凝脂凛凛雪霜之操春魁占百花頭上歲寒居三友圖中玉堂茅舍捴無心金鼎啇羔期結果不料道人見挽便離有色之根夫何氷氏相凌遽返華胥之國玉骨擁罏烘不醒氷䰟翦紙竟難招𥿄帳夜長猶作尋香之夢筠窓月淡尚疑弄影之時雖宋廣平鐵石心膓忘情未得使華光老丹青手叚摸索難真却愁零落一枝春好與茶毗三昧火惜花君子還道這一點香䰟今在何䖏咦炯然不逐東風散只在孤山水月中一人娶妻無元袁可潜贈之如夢令云今夜盛排筵宴准擬尋芳一遍春去㡬多時問甚紅深紅淺不見不見還你一才白絹丗有男子雖娶婦而終身無嗣育者謂之天閹丗俗則命之曰黄門晉海西公嘗有此疾北齊李庶生而天閹按黄帝鍼經曰人有具傷扵隂隂氣絶而不起隂不能用然其鬚不去宦者之獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脉血寫不復皮膚内結唇口不榮故鬚不生黄帝曰其有天宦者未嘗披傷然其鬚不生其故何也岐伯曰此天之所不足其任衝不盛宗筋不成有氣無血唇口不榮故鬚不生又大般若經載五種黄門云𣑽言扇丑皆切半擇迦唐言黄門其類有五一曰半擇迦捴名也有男根用而不生子二曰伊利沙半擇迦此云妬謂他行欲即發不見即無亦具男根而不生子三曰扇半擇迦謂本来男根不滿亦不能生子四曰博又半擇迦謂半月能男半月能女五曰留挐半擇迦此云割謂𬒳割形者此五種黃門名為人中惡趣受身䖏然周禮閹人鄭氏註云閹真氣蔵者宋趙忠恵帥維揚日幙僚趙叅議有婢慧點盡得儕輩之歡趙呢之堅拒不從疑有異强即之則男子也聞于有司盖身二形前後姦状不一遂寘之極刑近李安民嘗於福州得徐氏䖏子年十五六交際一再漸具男形盖天真未破則彼亦不自知然小說中有池州李氏女及婢添喜事正相類而此外絶未見於古今傳記等書豈以為人之妖而汙筆墨不復載乎晉五行志謂之人痾惠帝時京洛有人兼男女軆亦能两用人道而性尤淫亂此亂氣所生也玉暦通政經男女两體主國淫亂而二十八宿真形圖所載心房二星皆兩形與丈夫婦女更為雌䧺此又何耶異物志云靈狸一體自為隂陽故能媚人禇氏遺書曰非男非女之身精血散分又曰感以婦人則男脉應診動以男子則女脉順指皆天地不正之氣也右載周宻癸辛雜識中原紅冦未起時花山賊畢四等僅三十六人內一婦女尤勇捷聚集茅山一道宮縱横出沒畧無忌憚始終三月餘三省撥兵不能收捕殺傷官軍無數朝廷召募鹺徒朱陳率其黨與一皷而擒之從此天下之人視官軍為無用不三五年自河以南盗賦克斥其數也夫宇文公諒字子貞湖州人初領鄉貢入浙省試院頭塲占一席舍其案上有宇文同知四字不知何人書試官考卷以文不中式将黜之時坐主龍麟洲先生江西老儒也年八十餘始過江浙力主此卷卒置榜中及㑹試果登髙第授同知婺源州事雖曰爵祿前定盖亦隂德所致人鮮有知者公少年時嘗館授巨室其閨愛中夜来奔堅拒不納明旦託以他故斂書告別此非隂徳也與俞俊其先嘉興人今占籍松江上海縣娶也先普化次兄丑驢女也先普化長兄觀觀死蒸長嫂而妻之次兄丑驢死又蒸次嫂而妻之俊妻毋也既而亦死俊縛綵繒為祭亭綴銀盤十有四于亭两柱書詩聮盤中云清夢㫁栁營風月菲儀表梓里葭莩盖栁營暗蔵亞夫二字非儀謂菲人表梓謂脿子捴賤娼濫婦之稱葭莩皆是夫也郡人莫不多其才而譏其輕薄如此又嘗詣妻父墓所題於廬壁曰柏舟在河可謂節乎二嫂治棲可謂義乎覆宗絶祀可謂孝乎先刺妻毋中刺也先普化末刺妻之弟愽顔帖木兒也博顔帖木兒無他兄弟因利也先之財願継其後竟不恤親父小宗之祀為重故云愽顔帖木兒将赴鄉試謂人曰若沗一薦有司以禮敦遣先就北宅上馬赴府公宴畢却歸新宅下馬北宅丑驢所居新宅也先普化所居人戲之曰昔人有二天今子有二父何其幸欤博顔帖木兒赧甚俊弱冠時從頋琛淵白㳺負氣傲物當伯顔太師柄國日嘗賦清平樂長短句云君恩如草秋至還枯槁落落殘星猶弄暁豪傑消磨盡了放開湖海襟懐休教鷗鷺驚猜我是江南􅌒客等閒容易安排手藁留葉起之䖏後與葉交悪竟訴于官必欲搆成其罪寅縁賄賂浙省移准中書省咨劄付儒學提舉司議得古人寄情遣興作為閨怨詩詞多有指夫為君者然此亦當禁止以故獲免罪戾而所費巳㡬萬定矣至正丙申春張士誠僣號誠王㩀有平江日又以賄通松江偽尹鄭煥署宰華亭用酷刑朘剥邑民恨入骨髄郡士袁海叟有詩曰四海清寕未有期諸公衮衮正當時忽然一日天兵至打破黄婆醋鉢児或者不知醋缽之義以問叟叟曰昔有不軌伏誅暴屍于竿王婆買醋經過其下適索朽屍墜醋缽為其所壓著地而碎王婆年老無知将謂死者所致頋謂之曰汝只是未曽喫悪官司来聞者皆絶倒棊譜通玄集通遠集清逺集清樂集幽玄集機深集増廣通遠集玄玄集忘憂集謝景暘居松江北郭結壇於家行召鬼法至正十一年官兵下海勦捕方國珍傳云賊中有人能呼召風雨必得破其法者乃可擒討千户也先等遂以謝薦捴兵官給傳致請省劄有云叅裁軍事必訪異人既逹天時當為世用時知府王克敏廉分端嚴有聲于時不得巳親造其廬起赴軍前其術一無所驗自後全軍敗衂吁宰臣統大兵數十萬勦除草竊如拉朽耳而乃迎一方士則其機畧安在哉嘉興捴管􅓸師徳以文章政事自居同僚莫敢與抗然其行實貪汙頗聞人有譏議因出對云竹本無心外靣自生枝節貢推官對云藕因有竅中間抽出絲豪並諷之也平江承天寺遭回禄殿宇一空僧恱楚南来住持施財者雲集遂大興土木之工金璧珠滕有加於昔或勸題梁恱不從曰當有俗人来暫居曰陞領徑山卒髙郵兵攻破城張士誠㩀以為宫佛像悉毀壞銅觀音鑄為錢既投降作太尉別造府越四五年復為寺呉興錢泰窩云至正𥘉二賈自嘉興来平江買舟至海口收市舶貨行二十餘里两道人詣舟求度一負磬一持鬼神像既上舟去申報乃两甲者從像中出二長刀叱曰吾逐盗至此汝真盗也舟人陽應曰我固知為盗顧無以彂今壮士誠與吾意合此未可前途乃可耳故紆行且曰二盗已落公手治酒助公勇遂命妻取酒勸甲者遲暮酔抽其刀斫賊其一躍起復斫之二盗盡死舟還二賈泣且拜曰非公吾幾不免虎口遂以白金二餅爲舟人壽吁决死生於阽危之際不負賈之託不謂之義丈夫可乎至正庚子秋七月九日飲松江泗濵夏氏清樾堂上酒半折正開荷花置小金巵於其中命歌姬捧以行酒客就姬取花左手執枝右手分開花瓣以口就飲其風致又過碧筩逺甚余因名爲觧語盃坐客咸曰然張句曲戯題黄大癡小像云全真家數禅和口皷貧子骨頭吏員臓腑唐伯剛題邾仲誼小像云七尺軀威儀濟濟三寸舌是非風起一雙眼看人做官两隻脚沿門報喜仲誼云是誰是誰伯剛云是你是你張明善作北樂府水仙子譏時云鋪眉苦眼早三公祼衲揎拳享萬鍾胡言亂語成時用大綱来都視烘上聲說英䧺誰是英雄五眼雞岐山鳴鳯两頭蛇南陽臥龍三脚猫渭水非熊今人卜卦以銅錢代蓍便於用也又有以錢八文周圍鋪轉而取六爻名曰金井䦨但乾卦𥘉爻及復之泰不可變盖止有六十二卦耳此不可用至正十二年歲壬辰秋蘄黃徐夀輝賊黨攻破昱嶺関徑抵餘杭縣七月𥘉十日入杭州城偽項帥蔡楊蘇一屯明慶寺一屯北関門妙行寺稱弥勒佛出世以惑衆浙省叅政樊執敬死于天水橋寳歌與妻同溺于西湖其賊不殺不淫招民投附者署姓名于簿籍府庫金帛悉輦以去至二十六日浙西㢘訪使自紹興率塩塲竈丁過江同羅木營官軍剋復城池賊遂潰散三平章定定迯徃嘉興郎中脫脫過江南越數日擕省印来㑹權署省事至是亦回四平章教化自湖州統軍歸舉火焚城殘蕩殆盡附賊充偽職者范縣尹等明正典刑里豪施遵禮顧八為迎敵官軍咼扵市家産悉沒縣官明慶妙行亦然省都事以下坐失守城池罷黜不叙省官復任如故朝廷法度既隳刑賞失冝欲天下宴安不可復得矣畫家十三科佛菩薩相玉帝君王道相金剛神鬼羅漢聖僧風雲龍虎宿世人物金境山水花竹翎毛野騾走獸人間動用界畫樓臺一切傍生耕種機織雕青嵌緑南村輟耕録卷之二十八
