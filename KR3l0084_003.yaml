front:
  text: 南村輟耕録卷之三
  hash: sha256:74c1b20131e3fc713f1dc99a834e8ac402612bb9000b3bbc3b21cd94af5d88a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_003-1a}
body:
  text: 天台陶宗儀九成至正二年壬午春三月十有四日上御咸寕殿中書右丞相脫脫等奏命史臣纂脩宋遼金三史制曰可越二年甲申春三月進遼史本紀三十卷志三十一卷表八卷列傳四十六卷冬十一月進金史本紀一十九卷志三十九卷表四卷列傳七十三卷又明年乙酉冬十一月進宋史本紀四十七卷志一百六十二卷表三十二卷列傳世家二百五十五卷𥘉㑹稽楊維禎嘗進正統辨可謂一洗天下紛紜之論公萬世而爲心者也惜三史以成其言終不見用後之秉史筆而續通鑑綱目者必以是爲本矣維禎字廉夫號鐵崖人咸稱之曰鐵史先生泰定丁卯李黼榜相甲及第以文章名當世表曰至正三年五月日伏覩皇帝詔㫖起大梁張京兆社本等爵某官職專脩宋遼金三史越明年史有成書而正統未有所歸臣維禎謹撰三史正統辨凡二千六百餘言謹表以上者右伏以歴代離合之殊固繫乎天數盛衰之変萬年正閏之統實出於人心是非之公盖統正而例可興猶綱舉而目可備前代異史今日兼脩是非之論既明正閏之統可定柰三史雖云有作而一統猶未有歸共惟世祖皇帝以湯武而立國皇帝陛下以尭舜而為君建極建中致中和而育物惟精惟一大一統以書元嘗恎遼金史之未成必列趙宋編而全備芸臺大啓草澤髙升宜開三百載之編年以垂千萬代之大典豈料諸儒之謙筆徒為三局之志書春秋之首例未聞編目之大節不舉臣維禎素讀春秋之王正月公羊謂大一統之書再觀綱目之紹春秋文公有在正統之說故以始皇二十六年而継周統髙祖成功五年而接秦亡晉始於平呉而不始於泰和唐始於滅盜而不始於武徳稽之千古證之于今况當世祖命伯顔平江南之時式應宋祖命曹彬下江南之歲親傳詔㫖有過唐不及漢之吉確定統宗有継宋不継遼之禪故臣維楨敢痛排浮議力建公言挈大宋之編年包遼金之紀載置之上所用成一代可鑒之書傳之将來永示萬世不刋之典冐干天聽深懼冰兢下情無任瞻天望闕激切屏營之至辯曰正統之說何自而起乎起於夏后傅國湯武章世皆出於天命人心之公也統出於天命人心之公則三代而下暦數之相仍者可以妄歸於人乎故正統之義立於聖人之經以扶萬世之綱常聖人之經春秋是也春秋萬代之史宗也首書王正於魯史之元年者大一統也五伯之權非不强於王也而春秋必黜之不使奸此統也呉楚之號非不竊於王也而春秋必外之不使僣此統也然則統之所在不得以割㩀之地强梁之力僣偽之名而論之也尚矣先正論統於漢之後者不以劉蜀之祚促與其地之偏而奪其統之正者春秋之義也彼志三國降昭烈以儕吴魏使漢嗣之正下與漢賊並稱此春秋之罪人矣復有作元經自謂法春秋者而又帝北魏黜江左其失與志三國等耳以致尊昭烈續江左两魏之名不正而言不順者大正於宋朱氏之綱目焉或問朱氏綱目主意曰在正統故綱目之挈統者在蜀晉而抑統者則秦昭襄唐武氏也至不得已以始皇之廿六年而始継周漢始於髙帝之五年而不始於降秦晉始於平吴而不始於㤗和唐始於群盜既夷之後而不始於降武徳之元又所以法春秋之大一統也然則今日之修宋遼金三史者宜莫嚴於正統與大一統之辯矣自我世祖皇帝立國史院嘗命承㫖百一王公修遼金二史矣宋亡又命詞臣通修三史矣延祐天暦之間屢勤詔㫖而三史卒無成書者豈不以三史正統之議未决乎夫其議未决者又豈不以宋渡於南之後拘于遼金之抗于北乎吾嘗究契丹之有國矣自灰牛氏之部落始廣其𥘉枯骨化形戴豬服豕荒唐怪誕中國之所不道也八部之雄至於阿保機披其黨而自尊迨耶律光而其埶浸盛契丹之號立於梁貞明之𥘉大遼之號復改於漢天福之日自阿保機訖于天祚凢九主歴二百一十有五年夫遼固唐之邊夷也乗唐之衰草竊而起石晉氏通之且割幽燕以與之遂得窺釁中夏而石晉氏不得不亡矣而議者以遼乗晉統吾不知其何統也再考金之有國矣始於完顔氏實又臣屬於契丹者也至阿骨打苟逃性命於道宗之世遂敢萌人臣之将而篡有其國僣稱國號於宋重和之元相傳九主凡歴一百一十有七年而議者又以金之平遼剋宋帝有中原而謂接遼宋之統吾又不知其何統也議者又謂完顔氏世為君長保其肅愼至太祖時南北為敵國素非君臣遼祖神冊之際宋祖未生遼祖比宋前興五十餘年而宋嘗遣使卑辭以告和結為兄弟晚年且遼為翁而宋為孫矣此又其說之曲而陋也漢之匈奴唐之突厥不興於漢唐之前乎而漢唐又與之通和矣吴魏之於蜀也亦一時角立而不相統攝者也而秉史筆者必以匈奴突厥為紀傳而以漢唐為正統必以吴魏為分繫而以蜀漢為正統何也天理人心之公閱萬世而不可泯者也議者之論五代又以朱梁氏為篡逆不當合為五代史其說似矣吾又不知朱晃之篡克用氏父子以為仇矣契丹氏背唐兄弟之約而稱臣於梁非逆黨乎春秋誅逆重誅其黨契丹氏之誅為何如㢤且石敬塘事唐不受其命而篡漢謂之承晉可乎縱承晉也謂之統可乎又謂東漢四主遠兼郭周宋至興國四年始受其降遂以周為閏以宋統不為受周禅之正也吁苟以五代之統論之則南唐李昪常立大唐宗廟而自稱為憲宗五代子孫矣宋於開寳八年滅南唐則宋統継唐不優於継周継漢乎但五代皆閏也吾無取其統吁天之暦數自有歸代之正閏不可紊千載暦數之統不必以承先朝續亡主為正則宋興不必以膺周之禅接漢接唐之閏為統也宋不必膺周接漢接唐以為統則遂為毆陽子不定五代為南史為宋膺周禅之張本者皆非矣當唐明宗之祝天也自以夷虜不任社禝生靈之主願天早生聖人以主生靈自是天人交感而宋祖生矣天厭􅍔亂之極使之君主中國非欺孤弱寡之所致也朱氏綱目於五代之年皆細注於歲之下其餘意固有待於宋矣有待於宋則直以宋接唐統之正矣而又何計其受周禅與否乎中遭陽九之阨而天猶不泯其社禝瓜瓞之系在江之南子孫享國又凡百五十有五年金泰和之議以靖康為㳺魂餘魄比之昭烈在蜀則泰和之議固知宋有遺統在江之左矣而金欲承其絶為得統可乎好黨君子遂斥紹興為偽宋吁吾不忍道矣張邦昌迎康邸之書曰由康邱之舊藩嗣宋朝之大統漢家之戹十世而光武中興獻公之子九人而重耳尚在茲惟天意夫豈人謀是書也邦昌肯以靖康之後為㳺魂餘魄而代有其國乎邦昌不得革宋則金不得以承宋是則後宋之與前宋即東漢前漢之比耳又非劉蜀牛晉族属踈遠馬牛疑迷者之可以同日語也論正閏者猶以正統在属正朔相仍在江東矤嗣祚親切比諸光武重耳者乎而又可以偽斥之乎此宜不得以南渡為南史也明矣再考宋祖生于丁亥而建國于庚申我太祖之降年與建國之年亦同宋以甲戌渡江而平江南之年亦同是天數之有符者不偶然天意之有属者不苟然矣故我世祖平宋之時有過唐不及漢宋統當絶我統當續之喻是世祖以暦數之正統歸之於宋而以今日接宋統之正者自属也當時一二大臣又有奏言曰其國可滅其史不可滅也是又以編年之統在宋矣論而至此則中華之統正而大者不在遼金而在於天付生靈之主也昭昭矣然則論我元之大一統者當在平宋而不在平遼與今之日又可推矣夫何今之君子昧於春秋大一統之㫖而急於我元開國之年遂欲接遼以為統至於咈天數之符悖世祖君臣之喻逆萬世是非之公論而不恤也吁不以天數之正華統之大属之我元承乎有宋如宋之承唐唐之承隋承晉承漢也而妄分閏代之承欲以荒夷非統之統属之我元吾又不知今之君子待今日為何時待今聖人為何君也哉於乎春秋大統之義吾巳悉之請復以成周之大統明之於今日也文王在諸侯凡五十年至三分天下有其二遂誕膺天命以撫方夏然猶九年而大統未集必至武王十有三年代啇有天下啇命始革而大統始集焉盖革命之事間不容髮一日之命未絶則一日之統未集當日之命絶則當日之統集也宋命一日而未革則我元之大統亦一日而未集也成周不急文王五十年武王十三年而集天下之大統則我元又豈急於太祖開國五十年及世祖十有七年而集天下之大統哉抑又論之道統者治統之所在也尭以是傳之舜舜以是傳之禹湯禹湯傳之文武周公孔子孔子沒幾不得其傳百有餘年而孟子傳焉孟子沒又幾不得其傳千有餘年而濂洛周程諸子傳焉及乎中立楊氏而吾道南矣既而宋亦南渡矣楊氏之傳為豫章羅氏延平李氏及於新安朱子朱子沒而其傳及於我朝許文正公此歴代道統之源委也然則道統不在遼金而在宋在宋而後及於我朝君子可以觀治統之所在矣於乎世隔而後其議公事乆而後其論定故前代之史必脩於異代之君子以其議公而論定也晉史脩於唐唐史脩於宋則宋史之脩宜在今日而無譲矣而今日之君子又不以議公論定者自任而又諉曰付公論於後之儒者吾又不知後之儒者又何儒也此則予為今日君子之痛惜也今日堂堂大國林林鉅儒議事為律吐辭為經而正統大筆不自竪立又闕之以遺將來不以貽千載綱目君子之咲為厚恥吾又不知負儒名於我元者何施眉目以誦孔子之遺經乎洪惟我聖天子當朝廷清明四方無虞之日與賢宰臣觀覧經史有志於聖人春秋之經制故断然定修三史以継祖宗未遂之意甚盛典也知其事大任重以在舘之諸賢為未足而又遣使草野以聘天下之良史才負其任以徃者有其人矣而問之以春秋之大法綱目之主意則槩乎其無以為言也於乎司馬遷易編年為紀傳破春秋之大法唐儒蕭茂挺能議之孰謂林林鉅儒之中而無一蕭茂挺其人乎此草野有識之士之所甚惜而不能倡其言於上也故私著其說為宋遼金正統辯以伺千載綱目之君子云若其推子午卯酉及五運之王以分正閏之說者此日家小枝之論君子不取也吾無以為論至元十三年丙子春正月十八日淮安王伯顔以中書右相統兵入杭宋謝全兩后以下皆赴北有王昭儀者題滿江紅詞于驛云大液夫容渾不似舊時顔色曽記得春風雨露玉樓金闕名播蘭簮妃后裏暈潮蓮臉君王側忽一朝鼙鼔掲天來緐華歇龍虎散風雲滅千古恨慿誰說對山河百二淚霑襟血驛館夜驚塵土夢官車暁碾関山月願嫦娥相顧肯從容隨圓缺儀名淸惠字沖華後為女道士五月二日抵上都朝見世皇十二日夜故宋宫人安定夫人陳氏安康夫人朱氏與二小姬沭浴整衣焚香自縊死朱夫人遺四言一篇於衣中云既不辱國幸免辱身世食宋祿羞為北臣妾輩之死守於一貞忠臣孝子期以自新丙子五月吉日泣血書明日奏聞上命断其首縣全后寓所夫此四人之貞烈視前日之託隱憂於辭章者相去盖萬萬矣是年丞相偏師徇台台之臨海民婦王氏者羙姿容𬒳掠至師中千夫長殺其舅姑與夫而欲私之婦誓死不可自念且𬒳汙因陽曰能俾我為舅姑與夫服朞月乃可事君千夫見其不難於死從所請仍使俘婦雜守之師還挈行至􅌘過上清風嶺婦仰天竊嘆曰吾知所以死矣即囓拇指出血冩口占詩於崖石上曰君王無道妾當災棄女抛男逐馬來夫靣不知何日見此身料得幾時回两行淸淚偷頻滴一片愁眉鎖未開延首故山看漸逺存亡两字實哀哉寫畢即投崖下以死死之日距今且将八九十年石上血僨起如始冩時不為風雨所剥蝕予昔過其下尚能讀所冩詩􅌘丞徐君樹石祠刻碑於死所浙東元師白野泰不華公字兼善元及弟状首越日為立廟像郷之人私表曰貞婦著作李五峯先生孝光為記郡上其事于朝請封如民所表先是岳州破時韓氏為㳺卒所掠以獻諸主将韓知必不免乗間赴水死越三日有得其屍於練裙中題五言長句曰宋未有天下堅正臣禮秉開國百戰功毎陣惟雄整及侍周㓜主臣心常烱烱帝曰卿北伐山戎今有警死狗莫擊尾此行當繫頸即日辤陛行盡敵心欲逞陳橋忽兵變不得守箕潁禅譲法堯舜民物普安静有國三百年仁義道馳騁未改祖宗法天胡肆大眚細思天地理中有幸不幸天果喪中原大似裂冠祍君誠不獨活臣實無魏丙失人焉得人垂戒當耿耿江南無謝安塞北有王猛所以戎馬來飛渡巴陵境大江限南北今此一舴艋本期固封疆誰謂如畫餅烈火燎昆岡不辨金玉礦妾本良家子性僻守孤􅠹嫁與尚書兒䘖署紫蘭省直以才徳合不棄宿瘤癭𥘉結合歡帶誓比日月昞夗央㑹雙飛比目願常並豈期金石堅化作桑榆景旄頭執正然虽尤氣先屏不意風馬牛復及此燕郢一方遭劫虜六族死俄頃退鷁落迅風孤鸞吊空影簮堅折白玉缾沉断青綆一死空冥府憂心長炳炳妾堅志不移改邑不改井我本瑚璉器安肯作溺皿志節匪轉石氣噎如吞鯁不作爝火然願為死灰冷貪生念麹蛾乞憐羞虎穽借此清江水葬我全首領皇天如有知定作血面請碩䰟化精衞填海使成嶺此詩士大夫多稱道之韓名希孟年十有八魏公五世孫㐮陽賈尚書之子瓊之婦死且三十餘年而其英爽不昧復能託夢趙魏公為書其詩則節婦之名因公之翰墨而愈不朽矣又岳州徐君寳妻某氏亦同時𬒳虜來杭居韓蘄王府自岳至杭相從數千里其主者數欲犯之而終以巧計脫盖某氏有令姿主者弗忍殺之也一日主者怒甚将即强焉因告曰俟妾祭謝先夫然後乃為君婦不遅也君奚用怒㦲主者喜諾即嚴收焚香再拜黙祝南向飲泣題滿庭芳詞一闋于璧上已投大池中以死詞曰漢上繁華江南人物尚遺宣政風流緑窓朱户十里爛銀鈎一旦刀兵齊舉旌旗擁百萬貔貅長驅入歌樓舞榭風捲落花愁清平三百載典章文物埽地俱休幸此身未北猶客南州破鑑徐郎何在空惆悵相見無由從今後断魂千里夜夜岳楊樓杭徐子祥與韓府居相隣嘗聞長老嗟悼之及見所書詞故能言其詳某氏余偶忘其姓噫使宋之公卿将相貞守一節若此數婦者則豈有賣降覆國之禍㦲冝乎秦賈之徒為萬世之罪人也岳府穆王飛墓在杭棲霞嶺下王之子雲祔焉自國𥘉以來墳漸傾圯江州岳氏諱士迪者於王為六世孫與宜興州岳氏通譜合力以起廢廟與寺復完羙乆之王之諸孫有為僧者居墳之西為其廢壊廟與寺靡有孑遺天台僧可觀以訴于官時何君頥貞為湖州推官柯君敬仲九思以書白其事田之沒於人者復歸然廟與寺無寸椽片瓦㑹李君全𥘉為杭捴管府經歴慨然以興廢為巳任而鄭君明徳元祐為作䟽語曰西湖北山褒忠演福禅寺竊見故宋贈太師武穆岳鄂王忠孝絶人功名盖世方畧如霍驃姚不逢漢武徒結志於亡家意氣如祖豫州乃遇晉元空誓言於擊楫賜墓田棲霞嶺下建祀祠秋水觀西落日鼓鍾長為聲冤於草木空山香火猶将薦爽於渊泉豈期破蕩子孫盡壊乆長規制典祊田墮佛宇春秋無所烝嘗塞墓道毀神棲風雨遂頽廟貌休留夜啼拱木躑躅春開断垣淚落路人事関世教盖忠臣烈士每詔條有致祭之文豈狂子野僧攙國典出募縁之䟽朢明有司告之臺省兾聖天子錫之珪璋褒忠義在天之靈激死生為臣之勸周武封比干墓事著遺經唐宗建白起祠恩覃異代䟽成郡人王華父一力興建於是寺與廟又復完羙且杭州路申明淛省轉咨中書以求褒贈適趙公子期在禮部倡議奏聞降命勑封並如宋止加保義二字自我元統一凾夏以來名人士多有詩吊之不下數十百篇其最膾炙人口者如葉靖逸先生紹翁云萬古知心只老天英雄堪恨亦堪憐如公少緩湏臾死此虜安能八十年漠漠凝塵空偃月堂堂遺像在凌煙早知埋骨西湖路悔不鴟夷理鈎船趙魏公孟頫云岳王墳上草離離秋日荒凉石獸危南渡君臣䡖社禝中原父老望旌旗英雄巳死何嗟及天下中分遂不支莫向西湖歌此曲水光不勝悲髙則誠先生明云莫向中河嘆􅎟離英雄生死係安危内廷不下班師詔絶漠全收大将旗父子一門甘伏節山河萬里竟分支孤臣尚有埋身地二帝㳺魂更可悲潘子素先生純云海門寒日澹無輝偃月堂深畫漏遲萬竈貔貅江上老兩宫環珮夢中歸内園羯鼓催花彂小殿珠㢘看雪飛不道帳前胡旋舞有人行酒著靑衣林清源先生泉生云誰收將骨葬西湖已卜他年必沼吴孤冢有人來下馬六陵無樹可棲烏廟堂短計漸釐婦宇宙惟公是丈夫徃事重觀如敗局一龕燈火属浮屠讀此數詩而不墮淚者幾希然賊檜欺君賣國雖擢髪不足以數其罪翻四海之波不足以湔其悪而武穆之精忠靄然與天地相終始死猶生也彼思陵者信任姦邪竟無父兄之念亦獨何心哉故余亦有詩云精忠祠宇西湖上再拜荒墳感昔逰断碣草深蒙奰屭空山日落呌句周天移宋祚難恢復帝幸燕雲困虜囚逆檜隂圖傾大業昭陵無意問神州偷安甫遂邦家志飲痛甘忘父母讎信使北和憐屈膝䇿文南駐忍含羞兩宫五國瞻征幟丹詔班師下節樓萬里長城真自壊中興武績遂云休烏乎竟死姦邪手顛沛誰為社禝憂黯黯冤魂逰狴犴紛紛雨淚泣貔貅唯餘滿地萇弘血不見中流祖逖舟氛􅟓巳塵金匼匝冕旒終换銕兠鏊姓名竹帛書千載父子英䧺土一丘老樹尚知朝禹穴遺黎捴解說王猷復田起廢憐僧寺移檄褒嘉頼省侯聖世即今崇祀典佇看寵渥到松楸精忠宋所賜廟額此詩在未曽加封前作故云時至正巳丑也回回田地有年七八十歲老人自碩捨身濟衆者絶不飲食惟澡身啖蜜經月便溺皆宻既死國人殮以石棺仍滿用宻浸鐫志歲月于棺蓋瘞之俟百年啓封則蜜劑也凡人損折肢體食七許立愈雖彼中亦不多得俗曰蜜人畨言木乃伊南村輟耕録卷之三
