front:
  text: 南村輟耕録卷之二十三
  hash: sha256:cc590aeccd1b945ce603fd16a6572779e152ee5c4a2fb581bab3d63c8302ef6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0084_SBCK_023-1a}
body:
  text: 天台陶宗儀九成唐貞觀開元間人主崇尚文雅其書晝皆用紫龍鳯紬綾為表緑方紋綾爲裏紫檀雲花杵頭軸白檀通身柿心軸此外又有青赤琉璃二等軸牙籖錦帶大和間玉涯自塩鐵㩀相印家既羨扵財始用金玉為軸甘露之變人皆剥剔無遺南唐則褾以廻鸞墨錦籖以潢𥿄宋御府所蔵青紫大綾為褾文錦為帯玉及水晶檀香為軸靖康之變民間多有得者髙宗度江後和議既成摧塲購求為多装裭之法已具名畫記及紹興定式兹更不贅姑以所聞見者使賞鍳之士有考焉錦褾克絲作樓閣克絲作龍水克終作百花攅龍克絲作龍鳯紫寳階地紫大花五色簟文𥙿呼山和尚紫小滴珠方勝鸞鵲青緑簟文俗呼闍婆又日蛇䖍紫鸞鵲一䓁紫地白鵉鵲一䓁白地紫鵉鵲紫百花龍紫龜紋紫珠燄紫曲水俗呼落花流水紫湯荷花紅霞雲鸞黄霞雲鸞俗呼綺霄其名甚雅青樓閣閣又作臺青大藻花紫滴珠龍團青櫻桃皁方團白花褐方團白花方勝盤象毬路衲柿紅龜皆樗蒲宜男寳照龜蓮天下樂練鵲方勝練鵲綬帯瑞草八花暈銀鈎暈細花盤鵰翠色師子盤毬氷藻戯魚紅徧地雜花紅徧地翔鸞紅徧地夫容紅七寳金龍倒仙牡丹白蛇龜紋黄地碧牡丹方勝皁木綾引首及託裏碧鸞白鸞皁鸞皁大花碧花姜牙雲鸞樗蒲大花雜花盤鵰濤頭水波紋仙紋重蓮双鴈方棊龜子方轂紋鸂䳵棗花鑑花疊勝白毛遼囯回文金囯白鷲花並高麗囯贉卷紙髙麗蠲夾背蠲揩光軸岀等白玉碾龍簮頂或碾花白玉平頂瑪瑙漿水金星石珊瑚水晶蠟沉香古紅玉象牙犀角軸桿檀香木匣螺鈿宋高宗内府皆金匣至无庚寅冬江浙行省官立相哥沙不丁輩徳政碑穹窿莫比特闕坐石時趙石晦者素善謟媚因以楊和王墳域所有為言役人夫數千拖拽而至畢工之日是夜省堂中火爐鳴直至昧爽方休嗣是夜以為常又梟鳴梁壓虎入城市越明年春相哥敗諸公俱罹奇禍豈非事有先兆欤劉公復新為上都留守時有令史亢子春者值公退食偶與同列㩀案判事以戯遂為仇家彂之公大怒責問罪状枷項示衆及歸怒容未霽其夫人田氏問公何故不樂公語其故夫人曰此小節耳何足怒也即令人呼亢至請公為脱其枷且勞以酒云此一桮與汝壓驚此一桮與汝慶喜男子丈夫何所不至留守之位何患不到亢感謝而退不數年公卒而無子止一女適田直長直長遄卒女病双瞽後亢官湖廣叅政迎夫人母子㱕沒齒敬飬不怠公乃㢘訪使劉廷幹之從祖父也大名王和卿滑稽挑逹傳播四方中統𥘉燕市有一胡蝶其大異常王賦酔中大小令云挣破荘周萝两趐駕東風三百䖏名園一來一箇空難道風流種諕殺尋芳宻蠭輕䡖的飛動賣花人搧過橋東由是其名益著時有關漢卿者亦高才風流人也王常以譏謔加之関雖極意還荅終不能勝王忽坐逝而鼻垂双涕尺餘人皆嘆駭関来吊唁詢其由或對云此釋家所謂坐化也復問鼻懸何物又對云此玊筯也関云我道你不識不是玉筯是嗓咸發一笑或戯関云你𬒳王和卿䡖侮半世死後方才還得一籌凡六畜勞傷則鼻中常流膿水謂之嗓病又愛訐人之短者亦謂之嗓故云尓揚鐵厓眈好聲色毎扵筵間見歌児舞女有纏足纎小者則脫其鞵載盞以行酒謂之金蓮盃余竊怪其可厭後讀張邦基墨荘謾録載王深輔道双鳬詩云時時行地羅裙掩双手更檠春㶑灔傍人都道不湏辤儘做十分能㡬點春柔淺蘸蒲萄䁔和笑勸人教引滿洛塵忽浥不勝嬌剗踏金蓮行欵欵觀此詩老子之踈狂有自来矣宋高宗朝錢唐喻氏岀家為沙門名思凈逮妙行院于北関接待供僧三百萬畫阿弥陀佛入千神妙楊侍郎傑􅐌為喻弥陀人從而稱之凈又扵西湖之北鐫石為大佛頭父老相傳云此石乃秦始皇繫䌫石盖是時皆浙江耳𥘉無西湖之名始皇将登㑹稽為風浪所阻故泊舟此䖏揚州至正丙申丁酉間兵燹之餘城中屋址徧生白菜大者重十五斤小者亦不下八九斤有膂力人所負纔四五窠耳亦異哉天下之事未嘗無配雖譎詐誕妄之談亦前然者松江衞山齋有休與時庸醫児孫華孫頗知嗜學山齋囙奨予之使得隮扵士類山齋既死華孫忽謂人曰嘗夢天使持黄封小合授吾曰上帝有敕以衞山齋聲價卑汝吾受命謝恩而窹華孫才思極遲凡作一詩必數十日乃就則曰吾登溷偶得一聮或又曰枕上得此故人戯贈以詩有浪得詩名索價髙及山齋聲價黄封合之句陸居仁每謂人曰吾讀書至得意時見慶云一朶現家人皆不能覩又一日讀詩集傳有不安䖏思所以昜之忽若夢寐中見尼父拱立扵前而呼吾字曰陸宅之朱熹誤矣汝説是也偶與友人之黠者言及此友人曰足下得非禀受素弱乎曰何為曰吾見足下眼目眊眩又萝寐顛倒故知其然也居仁慚報不復辯客來談及拊几大笑命筆識之有一老翁如病起破衲􅧑毶瘦如鬼暁来扶向官道傍哀告行人乞錢米時予奉􅊾離江城觧后一見憐其貧倒囊贈與五升米試問何故為貧民老翁答言聽我語我是亰鄕李福五我家無本為經啇只種官田二十畒延祐七年三月𥘉賣牛買得犁與鉏朝耕暮耘受辛苦要還私債輸官租誰知六月至七月雨水絶無潮又竭𣣔求一點兩點水却比農夫眼中血滔滔黄浦如溝渠農家爭水如爭珠數車相接接不到種田一旦成沙塗官司八月受灾状我恐徵粮喫官棒相隨鄰里去告灾十石官粮望全放當年隔岸分吉凶髙田盡荒低田豊縣官不見髙田旱将謂亦與低田同文字下鄉如火速逼我将田都首伏只囙嗔我不肯首却把我田批作熟太平九月開早倉主首貧乏無可償男名阿孫女阿惜抑我嫁賣陪官粮阿孫賣與運粮户即目不知在何䖏可憐阿惜猶未笄嫁向湖州山裏去我今年已七十竒飢無口食寒無衣東求西乞度殘喘無囙早向黄泉㱕旋言旋拭腮邊淚我忽驚慚汗霑背老翁老翁弗復言我是今年檢田吏此袁分踃灾行也足可以為民牧不恤民膜者之勸分字可潜甞椽松江盖能以儒術飾吏事者因載之霍清甫治書云考古圖載古衣服今有玉鹿盧玉具劒古樂府曰腰間轆轤劒此器以塊然之璞既觧為環中復為轉関時上下之隙僅通絲髮作宛轉其間今之名玉工者徃徃歎其所未覩按漢雋不疑帯鑘同具劒晉灼曰古長劒首以玉作井轆轤形上刻木作山形如蓮花𥘉生朱敷時今大劒末首其状如此前說乃宋李公麟之所紀也余昔䆠㳺錢唐因識吴和之者性慧巧博物收一轆轤玉青色形如吕字環口中間轆轤旋轉無分毫縫罅形色極古人皆以為鬼工因土漬用白梅熬水煑之良乆脫開詳視竅中有双玉軸在焉中嵌一物形若牛筋意度必是當間煑之胖脹撑塞双軸入竅関住所以宛轉無碍年深腐敗縮瘦因而煑脫試用乾牛筯搥實置軸两間對勘孔竅以線縳定煑之少時双軸一楪至復畨語詈之即昜一碗至生驚異詢其故客曰某有婢得子弥月而亡時此猴生旬有五日其毋斃扵獵犬終日呌號可憐因令此婢就乳之及長成遂能隨人指使兼觧畨語耳生别後至清州留吴同知䖏忽報客有携一猴入城者呉語生云此人乃江湖巨盗凡至人家窺見房室路徑并蔵蓄所在至夜使猴入内偷竊彼則在外應接吾必奪此猴為人除害也明日客謁吴呉欵以飯需其候𥘉甚拒呉曰否則就此斷其首客不得巳允許呉酬白金十两臨去番語嘱猴適譯史聞得来告呉曰客教猴云汝若不飲不食彼必觧尓縳可亟逃來我只在十里外小寺中伺也吴未之信至晚試與之果核水食之類皆不食急使人覘之此客果未行㱕報引猴撾殺之仍至元間盗入浙省丞相府是夕月色微明相扵紗帷中窺見之羙髭髯身長七尺餘時一侍姬亦見之大呼有賊相急止之曰此相府何賊敢来盖虞其有所傷犯故也縦其自取七寳繫腰金玉器皿席捲而去翌日責令有司官兵肖行掩捕刻期獲觧􅜲門搜索終不可得越明年纔扵紹興諸暨州敗露掠問其情乃云𥘉至杭寓相府之東相去三十餘家是夜自外大醉㱕倒于門外主人扶掖登樓而卧湏臾嘔吐狼籍滿地至二更開樓􅙘縁房簷進府内脚履尺餘木級靣帶優人假髯既得物直携至江頭置于白塔上復回寓所侵晨邏者至察其人酒尚未醒酣睡正熟且身材侏儒畧無髭髯竟不之疑數日後方携所盗物拞浙東因此𬒳擒盗亦有道其斯之謂欤省椽李孟容度為余言元統間在都門見一全真先生年五十餘相貌魁偉甞坐省東茶肆中所言輒有驗因訪其寓所乃在五門外第二橋民家遂以出䖏叩之全真曰汝仕不在北方且宜南㱕四十後方可食禄臨別偶問及時事全真曰此後當改至元至元後至貞天下亂矣㒒曰國𥘉巳有至元全真曰汝苐識之㒒南還至閘河聞改至元心益信之及改至正則知貞者正也四十後方𥙷饒州府史夫全真之言如燭照數計持不知果何術也豈非至人者乎堂堂大元姦佞專權開河變鈔禍根源惹紅巾萬千官法濫刑法重黎民怨人吃人鈔買鈔何曽見賊做官官做賊混愚賢哀哉可憐右酔太平小令一闋不知誰所造自京師以至江南人人能道之古人多耴里巷之歌謡者以其有関扵世教也今此數語切中時病故録之以以俟采民凨者焉集慶失守行御史臺移置紹興路前御史大夫納璘再任時浙省丞相逹失帖木児得便宜行事民間頗言其貪後又以大夫子安安判行樞宻院護臺治大夫之政一聽决扵院判有人作詩云舊省新丞相新臺舊大夫大夫聽子語丞相愛金珠又有人大書于臺之門曰包苴賄賂尚公行天下承平恐未能二十四官徒獬慶越王臺上望金陵㑹稽陳思可睿云至正丙申御史大夫納璘開行臺于紹興于時慶元慈溪則有縣尹陳文昭本路餘姚則有同知秃堅在城則有録事逹魯花赤邁里古思皆摠制團結民義者納璘之子安安以三人為不易制思有以去之乃先紿召秃堅至拘留寳林寺夜半率臺軍擒殺之從而方國珍亦執陳文昭沈之海獨存邁里古思一人耳人皆以秃堅之死㱕罪於邁里古思不能力救殊不知當時之執秃堅乃所以擒邁里古思也執秃堅之謀出扵潘子素子素亦為安安縊諸途執子素之謀出扵辛敬所敬所艱関投張士誠客死平江僧舍及拜住哥代納璘為大夫又不能容邁里古思撾殺于其私苐拜住哥以弟搠思監拜中書右相詔入朝既得罪兄弟誅􅓍家無噍類但未知安安死所耳静而思之若有尸扵冥冥之中者不知造物果何如也回紇野馬川有木曰鎖鎖焼之其火經年不滅且不作灰彼䖏婦女取根製㡌入火不焚如火䑕布云葉公政字克明淮隂人行宣政院都事季實之子翰林直學士蟾公之從子也至正甲午公政以浙省幕史奉卜顔平章檄轉餉鄂閫時丹陽富民束子章先與是役㑹飲于蘄志相合即以兄禮事公政未㡬子章起赴沔泣别公政曰弟今濟大江渉重地兄言行篤信願以貲囊相託公政辤弗獲㑭子章手緘而為謹蔵之越兩月子章之友朱君譲率其奴来謁曰子章不幸入蓮臺湖遇盗死矣子章昔寄嚢中亦有某物在間欲啓嚢而請之公政曰汝寓物子章未甞語我子章巳矣家固無恙也義必質諸其家明以付汝君譲以公政匿為巳有衘之去明年既峻事還坐丹陽驛門要束朱二氏父子啓囊緘得鈔二百五十緡黄金五十两銀三百两珠八千牧衣帛有差㱕之束氏餘鈔五十緡黄金五两銀五十两珠千牧有朱題封㱕之朱氏盛具醴饌以謝辤之前翰林院編脩膠西張復𥘉嘉公政義為作傳且稱公政㓜知讀書甞從平章克池之諸縣破蘭溪渠魁徐真一平蘄水寨司轁粮四年無纎芬譴呵平章凡七薦中書不報人謂公侯子孫必複其始天道豈獨逺耶江隂王逢詩曰蘄春肥羊菜石酒君為玉昆我金友夜談接膝晝握手乾坤意氣同髙厚霜風吹蘆客衣薄湿雲覉鴻飛漠漠篷䆫篝燈照装槖嗟君逺行感君託蓮臺湖深浪拍銀鷓鴣杜若傷心神天生禍乱有今日誰謂交㳺無古人葉郎還金何愧竇禹釣傅氏紹興諸暨人年十八適同里章瑜瑜為苛吏脅軍興期㑹迫死道上訃至傅氏蒲伏抱屍㱕號泣三日夜不忍入襯屍有腐氣猶依屍呵琀曰兾甦既入棺至囓其棺成穴及葬投其身壙中毋强挽以出制未百日毋欲敚志語聞遂大慟連日不食毋嘱侍婢謹視之閱數日紿婢吾當浴若輩理沭具俟予既而失所在明日婢汲井見二足倒植井中乃傅氏也楊鐵史維禎甞􅐌之曰余讀古節婦事至青綾臺及祝英氏以為後無継者丗道降也乆矣今瑜妻乃尓謂丗降徳薄者吾信欤夫婦倫與君臣等丗之稱臣子者獨不能以瑜妻之義于夫者義其君欤噫張氏㩀有平江日其部将左丞吕􅎇守紹興軍陳庶子饒芬之在張左右一日陳賦詩饒染翰題一紈扇以寄吕云後來江左英賢傳又是淮西保相家聞說錦𫀆酣戰罷不驚越女采荷花饒素負書名且詩語俊麗爲作者所稱吕俾人讀罷忽大怒曰吾為主人守邊疆萬死鋒間豈務愛女子而不驚之耶見則必殺之又元帥李其姓者杭州庚子之圍觧頗著功勞一士人投之以詩将有求焉其詩有黃金合鑄李将軍之句李大怒曰吾勞苦數年止是将軍今年纔得元帥乃復令我為将軍耶帳下䇿出之右二事雖相傳以為笑亦可因以為戒云吴人髙伯厚云元統間某吏杭東北録事一日有部民某甲與某乙闘毆某甲之毋勸觧𬒳某乙用木棒就腦後一擊仆地而死適某承該撿驗腦骨唇齒皆有重傷某乙招伏繫獄經二載遇赦以非謀殺合宥既得釋放来致謝因言與某甲闘毆時其毋来勸力牽其子之𥚑手脫仰跌自搕其腦昬絶在地隣里用剪刀桃毋唇齒灌藥不甦乃死故腦唇有傷實未嘗持棒撃之也某問何為招伏某乙言倉皇之際惟恐箠楚但𣣔招承償命弗睱計也隣里見我已招遂皆不復言矣吁今之鞠獄者不𣣔研窮磨究務在廣陳刑具以張施厥威或有以衷曲告訴者輒便訶喝震怒畧不之恤從而吏隷輩奉承上意栲掠鍜鍊靡所不至其不置人扵冤枉者鮮矣使聞伯厚之言寕不知懼乎杭人張存㓜患一目時稱張眼子忽遇巧匠為安一磁晴障蔽扵上人皆不能辯其僞至元丙子後流寓泉州起家販舶越六年壬午回杭自言扵蕃中獲聖鐵一塊厚闊僅及二寸作法撒沙布地噙鐵扵口刀刃不能傷其身後傳聞既廣有烏馬児奉使来取試以鐵納扵羊口籠其首作法撒沙驗之劒果無所傷去鐵復揮應手首落遂就進呈元統間杭州塩倉宋監納者甞客大都求功名不遂至甚窮窘然頗順行止不敢非為遂岀齊化門求一死所望見水潭将欲投入虚空中有鬼作人聲云宋某陽夀未終不可死也四頋一無所有扵是黙黙而回中途拾得一𥿄帖云宋某可扵吏部某令史下某典吏䖏習學書冩異日物色之果得其人遂獲進歩耳得一帖云汝可求託某人謀請俸禄因依所言一舉而成凡歴俸數十月至扵受敕命獲財寳娶妻買妾生子育女為富家翁一皆隂冥所佑平昔却未甞覩其形状祗見一矮小影子而巳但有所見即便祭獻稱名爺爺忽一日有一帖云我要葉子金一百八十两索之甚急未免數數祭獻求免因問云爺爺要此何用一帖云我要去揚州天寜寺妆佛也又一夕其妻臂上失去金釧金鐲急告之一帖云在汝第㡬隻箱内權且付還又一曰失去熟羊背皮一帖云我借用了明日當還次日一大綿羊自外走入如此等類甚多不可牧舉及宋受前職鬼亦隨到恐𬒳竊其所有乃令人詣龍虎求天師符命懸於所寓室内晨興但見一様四十道皆倒懸之莫可辯其真偽及禮請功行法師駈治而壇内牌位顛倒錯亂弗能指手而止又一日塩倉印信不知所在告之哀切一帖云在汝第四十㡬隻箱内第㡬箇叚子一開尋果有時與張大使同寅将印寄于伊家一帖飛告云印信當長官收掌若不送還一捧打砕汝頭也大使驚恐急遂還之後有一過路道人詣門偶以始末訴之道人曰我當為汝遣之乃扵桃樹上斫耴朝向東南大枝作一槌一椹使以椹釘東南隅地上嘱云毎月逢五則擊五下當自絶也後果寂無影嚮竟不知何䓁鬼也江隂陳範季模與宋交代所以極知其詳季模蓋余友也胡善字師善紹興諸暨人泰定進士胡一中髙第弟子也至正乙未以憲僉趙公舉為松江儒學經師越明年二月苗㓂至欲燬孔子廟善坐經席罵㓂㓂怒殺之廟得免扵灾先是善以死自許題詩于壁曰領檄来司教臨危要致身及難死果不誣今校官䫉其像祀于先賢堂南村輟耕録卷之二十三
